            </div>
            <div style={{fontSize:11,color:c.statusText,lineHeight:1.6}}>
              <p>💡 <strong>保存ファイル</strong>は「💾 ブラウザに保存」で保存したファイルです。タブを閉じても残ります。</p>
              <p>💡 <strong>ゴミ箱</strong>にはタブを閉じたときのデータが自動保存されます。{retDays}日後に自動削除されます。</p>
              <p>💡 <strong>LocalStorage</strong>には自動保存データ、設定、ワークスペース情報が保存されています。</p>
            </div>
          </div>}

          {/* Files Tab */}
          {tab==='files'&&<div>
            {files.length>0&&<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <input type="checkbox" checked={selectedFiles.size===files.length&&files.length>0} onChange={()=>{if(selectedFiles.size===files.length)setSelectedFiles(new Set());else setSelectedFiles(new Set(files.map(f=>f.id)))}} style={{margin:0}}/>
              <span style={{fontSize:12,color:c.statusText}}>全選択 ({files.length}件 · {fmt(totalFiles)})</span>
              <div style={{flex:1}}/>
              {selectedFiles.size>0&&<button onClick={()=>handleDeleteFiles(selectedFiles)} style={actionBtn(c.danger)}>🗑 {selectedFiles.size}件を削除</button>}
            </div>}
            {files.length===0&&<div style={{textAlign:'center',padding:32,color:c.statusText}}>
              <div style={{fontSize:32,marginBottom:8}}>📄</div>

              <div style={{fontSize:11,marginTop:4}}>「💾 保存」→「🗄️ ブラウザ保存」で保存できます</div>

            {files.map(f=>(

                  <div style={{fontSize:11,color:c.statusText}}>{fmt(f.size||f.text?.length||0)} · {f.updatedAt?new Date(f.updatedAt).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):''}</div>
                </div>

              </div>

          {/* Trash Tab */}
          {tab==='trash'&&<div>
            {trash.length>0&&<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <input type="checkbox" checked={selectedTrash.size===trash.length&&trash.length>0} onChange={()=>{if(selectedTrash.size===trash.length)setSelectedTrash(new Set());else setSelectedTrash(new Set(trash.map(t=>t.id)))}} style={{margin:0}}/>

              <div style={{flex:1}}/>
              {selectedTrash.size>0&&<button onClick={()=>handleDeleteTrash(selectedTrash)} style={actionBtn(c.danger)}>🗑 {selectedTrash.size}件を完全削除</button>}
              <button onClick={handlePurgeExpired} style={actionBtn(c.primary)}>🧹 期限切れを削除</button>
              <button onClick={handleEmptyTrash} style={actionBtn('#ff9800')}>空にする</button>
            </div>}
            {trash.length===0&&<div style={{textAlign:'center',padding:32,color:c.statusText}}>
              <div style={{fontSize:32,marginBottom:8}}>✨</div>
              <div>ゴミ箱は空です</div>
            </div>}
            {trash.map(t=>{
              const daysAgo=Math.floor((Date.now()-t.deletedAt)/(24*60*60*1000));
              const remaining=retDays-daysAgo;
              return(
                <div key={t.id} style={{...itemRow,background:selectedTrash.has(t.id)?c.primary+'15':'transparent',opacity:remaining<=3?0.7:1,marginBottom:2}}
                  onMouseEnter={e=>e.currentTarget.style.background=selectedTrash.has(t.id)?c.primary+'22':c.hoverBg}
                  onMouseLeave={e=>e.currentTarget.style.background=selectedTrash.has(t.id)?c.primary+'15':'transparent'}>
                  <input type="checkbox" checked={selectedTrash.has(t.id)} onChange={()=>{setSelectedTrash(prev=>{const n=new Set(prev);if(n.has(t.id))n.delete(t.id);else n.add(t.id);return n})}} style={{margin:0,flexShrink:0}}/>
                  <span style={{opacity:0.5}}>📄</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.fileName}</div>
                    <div style={{fontSize:11,color:remaining<=3?c.danger:c.statusText}}>
                      {daysAgo===0?'今日削除':daysAgo+'日前'} · 残り{remaining}日 · {fmt(t.size||t.text?.length||0)}
                    </div>
                  </div>
                  <button onClick={async()=>{try{const r=await IDBService.restoreFromTrash(t.id);showMessage(`"${r.fileName}" を復元しました`);refresh()}catch{showMessage('復元に失敗','error')}}} style={actionBtn(c.primary)} title="復元">↩</button>
                  <button onClick={()=>handleDeleteTrash(new Set([t.id]))} style={actionBtn(c.danger)} title="完全削除">✕</button>
                </div>
              );
            })}
          </div>}

          {/* LocalStorage Tab */}
          {tab==='local'&&<div>
            {lsUsage&&<div>
              <div style={cardStyle}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,color:c.editorText,fontSize:13}}>
                  <span>使用量</span>
                  <span style={{fontWeight:600}}>{fmt(lsUsage.used)} / {fmt(lsUsage.limit)} ({lsUsage.percent.toFixed(1)}%)</span>
                </div>
                <div style={{height:10,background:c.border,borderRadius:5,overflow:'hidden',marginBottom:12}}>
                  <div style={{height:'100%',width:`${Math.min(lsUsage.percent,100)}%`,background:lsUsage.percent>80?c.danger:lsUsage.percent>60?'#ff9800':c.primary,borderRadius:5,transition:'width .3s'}}/>
                </div>
                <div style={{fontSize:13,color:c.editorText,fontWeight:600,marginBottom:8}}>内訳</div>
                {Object.entries(lsUsage.breakdown).map(([group,size])=>(
                  <div key={group} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:12,color:c.editorText}}>
                    <span>{group}</span>
                    <span style={{color:c.statusText}}>{fmt(size)}</span>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={handleClearLocalStorage} style={actionBtn(c.danger)}>⚠️ 全てクリア</button>
              </div>
              <div style={{fontSize:11,color:c.statusText,marginTop:12,lineHeight:1.6}}>
                <p>⚠️ クリアすると自動保存データ、プロファイル設定、ワークスペース情報が全て失われます。</p>
                <p>💡 個別のキーを削除するにはブラウザのDevTools（F12）をご利用ください。</p>
              </div>
            </div>}
          </div>}

        </div>
      </div>
    </div>
  );
}

// --- F-12: Data Purge Dialog (L1/L2/L3) ---
function PurgeDialog(){
  const c=useThemeColors();const m=useModalStyles('md');
  const{showPurge,setShowPurge,showMessage}=React.useContext(UIContext);
  const{purgeEditorState}=React.useContext(EditorContext);
  const[level,setLevel]=React.useState('L1');
  const[confirmText,setConfirmText]=React.useState('');
  const[result,setResult]=React.useState(null);
  if(!showPurge)return null;
  const levels={L1:{label:'L1: ドキュメント破棄',desc:'編集中テキスト + プレビュー + Undo履歴'},L2:{label:'L2: セッション破棄',desc:'L1 + 自動保存 + SessionStorage'},L3:{label:'L3: 完全破棄',desc:'L2 + 全LocalStorage(mde_*) + IndexedDB + キャッシュ'}};
  const executePurge=async()=>{
    if(level==='L3'&&confirmText!=='データを完全に削除'){showMessage('確認文字列が一致しません','error');return}
    setResult('実行中...');
    purgeEditorState();
    const preview=document.querySelector('.preview-content');if(preview)preview.innerHTML='';
    if(level==='L1'){setResult('L1破棄完了');showMessage('ドキュメント破棄完了');return}
    StorageService.remove('autosave');sessionStorage.clear();
    if(level==='L2'){setResult('L2破棄完了');showMessage('セッション破棄完了');return}
    StorageService.clear();
    await IDBService.deleteAll();
    try{if(navigator.clipboard&&navigator.clipboard.writeText)await navigator.clipboard.writeText('')}catch{}
    try{const keys=await caches.keys();for(const k of keys)await caches.delete(k)}catch{}
    const remaining=Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX));
    if(remaining.length>0){setResult('⚠️ 一部データが残っている可能性があります');showMessage('破棄完了（警告あり）','warn')}
    else{setResult('✅ L3完全破棄完了。全データが消去されました。');showMessage('完全破棄完了')}
  };
  return(
    <div style={m.overlay} onClick={()=>{setShowPurge(false);setResult(null);setConfirmText('')}}>
      <div style={m.dialog} onClick={e=>e.stopPropagation()}>
        <div style={{...m.header,borderBottomColor:c.danger+'44'}}>
          <h3 style={{...m.headerTitle,color:c.danger}}>⚠️ データ完全破棄</h3>
          <button style={m.closeBtn} onClick={()=>{setShowPurge(false);setResult(null);setConfirmText('')}}>✕</button>
        </div>
        <div style={m.body}>
          {result?(<div><p style={{color:c.editorText,marginBottom:16,fontSize:14}}>{result}</p></div>):(
          <div>
            <div style={{marginBottom:16}}>
              {Object.entries(levels).map(([k,v])=>(
                <label key={k} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',cursor:'pointer',color:c.editorText,borderRadius:6,background:level===k?c.codeBg:'transparent',marginBottom:4}}>
                  <input type="radio" name="purge" value={k} checked={level===k} onChange={()=>setLevel(k)} style={{marginTop:3}}/>
                  <div><div style={{fontWeight:600,fontSize:14}}>{v.label}</div><div style={{fontSize:12,color:c.statusText,marginTop:2}}>{v.desc}</div></div>
                </label>
              ))}
            </div>
            {level==='L3'&&(<div style={{...m.card,borderLeft:`3px solid ${c.danger}`}}><p style={{fontSize:13,color:c.danger,marginBottom:8}}>この操作は取り消せません。確認のため以下を入力してください:</p><p style={{fontSize:13,color:c.editorText,marginBottom:8,fontWeight:600}}>「データを完全に削除」</p><input value={confirmText} onChange={e=>setConfirmText(e.target.value)} style={{...m.input,width:'100%'}} placeholder="確認文字列を入力"/></div>)}
          </div>)}
        </div>
        <div style={m.footer}>
          {result?<button onClick={()=>{setShowPurge(false);setResult(null);setConfirmText('');if(level==='L3')location.reload()}} style={m.btnPrimary}>OK</button>
          :<><button onClick={()=>{setShowPurge(false);setConfirmText('')}} style={m.btnOutline}>キャンセル</button><button onClick={executePurge} style={m.btnDanger}>🗑️ 破棄実行</button></>}
        </div>
      </div>
    </div>
  );
}

// --- StorageUsagePanel ---
function StorageUsagePanel(){
  const c=useThemeColors();
  const[usage,setUsage]=React.useState(null);
  const[idbSize,setIdbSize]=React.useState(null);

  const refresh=React.useCallback(()=>{
    // LocalStorage
    const u=StorageService.getUsage();
    setUsage(u);
    // IndexedDB (estimate via StorageManager API if available)
    if(navigator.storage&&navigator.storage.estimate){
      navigator.storage.estimate().then(est=>{
        setIdbSize(est.usage||null);
      }).catch(()=>{});
    }
  },[]);

  React.useEffect(()=>{refresh()},[]);

  const fmt=(bytes)=>{
    if(bytes===null||bytes===undefined)return'—';
    if(bytes<1024)return bytes+'B';
    if(bytes<1024*1024)return(bytes/1024).toFixed(1)+'KB';
    return(bytes/1024/1024).toFixed(2)+'MB';
  };

  if(!usage)return<div style={{fontSize:12,color:c.statusText}}>計算中...</div>;

  const pct=Math.min(usage.percent,100);
  const barColor=pct>80?c.danger:pct>60?'#ff9800':c.primary;

  return(
    <div style={{fontSize:12}}>
      {/* Main progress bar */}
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,color:c.editorText}}>
        <span>LocalStorage (mde_*)</span>
        <span style={{fontWeight:600}}>{fmt(usage.used)} / {fmt(usage.limit)}</span>
      </div>
      <div style={{height:8,background:c.border,borderRadius:4,overflow:'hidden',marginBottom:8}}>
        <div style={{height:'100%',width:`${pct}%`,background:barColor,borderRadius:4,transition:'width .3s'}}/>
      </div>
      <div style={{color:pct>80?c.danger:c.statusText,marginBottom:8}}>{pct.toFixed(1)}% 使用中</div>

      {/* Breakdown */}
      {Object.keys(usage.breakdown).length>0&&(
        <div style={{marginBottom:8}}>
          {Object.entries(usage.breakdown).map(([group,size])=>(
            <div key={group} style={{display:'flex',justifyContent:'space-between',padding:'2px 0',color:c.statusText}}>
              <span>　{group}</span>
              <span>{fmt(size)}</span>
            </div>
          ))}
        </div>
      )}

      {/* IndexedDB */}
      {idbSize!==null&&(
        <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderTop:`1px solid ${c.border}`,color:c.statusText}}>
          <span>IndexedDB (全体推定)</span>
          <span>{fmt(idbSize)}</span>
        </div>
      )}

      <button onClick={refresh} style={{marginTop:6,padding:'2px 8px',border:`1px solid ${c.inputBorder}`,borderRadius:3,background:'transparent',color:c.statusText,cursor:'pointer',fontSize:11}}>↻ 更新</button>
    </div>
  );
}

// --- History Panel ---
function HistoryPanel(){
  const c=useThemeColors();const m=useModalStyles('md');
  const{showHistory,setShowHistory}=React.useContext(UIContext);
  const{activeTabId,activeTab,getUndoStack,getRedoStack,jumpToHistory,undo,redo}=React.useContext(EditorContext);
  const[,forceUpdate]=React.useState(0);

  React.useEffect(()=>{if(showHistory){const iv=setInterval(()=>forceUpdate(n=>n+1),500);return()=>clearInterval(iv)}},[showHistory]);

  if(!showHistory)return null;

  const undoStack=getUndoStack(activeTabId);
  const redoStack=getRedoStack(activeTabId);
  const fmtTime=(ts)=>new Date(ts).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const fmtPreview=(text)=>{const lines=text.split('\n');const first=lines[0]||'';return first.length>40?first.substring(0,40)+'...':first||'(空)'};
  const itemBase={display:'flex',alignItems:'center',gap:8,padding:'6px 12px',fontSize:12,cursor:'pointer',borderRadius:5,color:c.editorText};

  return(
    <div style={m.overlay} onClick={()=>setShowHistory(false)}>

        <div style={m.header}>
          <h3 style={m.headerTitle}>📜 編集履歴 — {activeTab?.fileName||''}</h3>

        </div>
        <div style={{padding:'8px 20px 0',fontSize:12,color:c.statusText,flexShrink:0}}>Undo: {undoStack.length}件 / Redo: {redoStack.length}件</div>
        <div style={{...m.body,paddingTop:8}}>
          <div style={{...itemBase,background:c.primary+'18',fontWeight:600,borderLeft:`3px solid ${c.primary}`}}>
            <span>📍</span><span>現在の状態</span>
            <span style={{flex:1}}/>
            <span style={{fontSize:11,color:c.statusText}}>now</span>
          </div>
          {redoStack.length>0&&<div style={{padding:'6px 12px',fontSize:11,color:c.statusText,fontWeight:600,marginTop:8}}>↓ やり直し可能 ({redoStack.length})</div>}
          {[...redoStack].reverse().map((entry,i)=>(
            <div key={'redo-'+i} style={{...itemBase,opacity:0.6}} onClick={()=>{for(let j=0;j<=i;j++)redo();forceUpdate(n=>n+1)}}
              onMouseEnter={e=>e.currentTarget.style.background=c.hoverBg}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span>↪️</span>
              <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fmtPreview(entry.text)}</span>
              <span style={{fontSize:11,color:c.statusText,flexShrink:0}}>{fmtTime(entry.timestamp)}</span>
            </div>
          ))}
          {undoStack.length>0&&<div style={{padding:'6px 12px',fontSize:11,color:c.statusText,fontWeight:600,marginTop:8}}>↑ 元に戻す可能 ({undoStack.length})</div>}
          {[...undoStack].reverse().map((entry,i)=>{
            const actualIdx=undoStack.length-1-i;
            return(
              <div key={'undo-'+i} style={itemBase} onClick={()=>{jumpToHistory(activeTabId,actualIdx);forceUpdate(n=>n+1)}}
                onMouseEnter={e=>e.currentTarget.style.background=c.hoverBg}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <span>↩️</span>
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fmtPreview(entry.text)}</span>
                <span style={{fontSize:11,color:c.statusText,flexShrink:0}}>{fmtTime(entry.timestamp)}</span>
              </div>
            );
          })}
          {undoStack.length===0&&redoStack.length===0&&<div style={{padding:24,textAlign:'center',color:c.statusText}}>編集履歴はまだありません</div>}
        </div>
      </div>
    </div>
  );
}

// --- Save Dialog ---
function SaveDialog(){
  const c=useThemeColors();const m=useModalStyles('md');
  const{showSaveDialog,setShowSaveDialog,showMessage}=React.useContext(UIContext);
  const{activeTab,updateTab,activeTabId}=React.useContext(EditorContext);
  const{active:profile}=React.useContext(ProfileContext);
  const[fileName,setFileName]=React.useState('');
  const[dest,setDest]=React.useState('download');
  const[idbSaving,setIdbSaving]=React.useState(false);

  React.useEffect(()=>{
    if(showSaveDialog&&activeTab)setFileName(activeTab.fileName||'untitled.md');
  },[showSaveDialog,activeTab]);

  if(!showSaveDialog)return null;

  const charCount=activeTab?.text?.length||0;
  const byteCount=new TextEncoder().encode(activeTab?.text||'').length;
  const fmt=(b)=>b<1024?b+'B':b<1024*1024?(b/1024).toFixed(1)+'KB':(b/1024/1024).toFixed(2)+'MB';

  const handleSave=async()=>{
    if(!activeTab)return;
    const name=fileName.trim()||'untitled.md';
    const finalName=name.endsWith('.md')||name.endsWith('.txt')?name:name+'.md';
    updateTab(activeTabId,{fileName:finalName,isDirty:false});
    if(dest==='download'){
      FileService.save(activeTab.text,finalName);
      showMessage(`💾 "${finalName}" をダウンロードしました`);
    }else{
      setIdbSaving(true);
      try{
        await IDBService.saveFile({id:activeTab.id,name:finalName,text:activeTab.text,size:byteCount,createdAt:Date.now(),updatedAt:Date.now(),profileId:profile?.id||'default'});
        showMessage(`💾 "${finalName}" をブラウザに保存しました`);
      }catch{showMessage('保存に失敗しました','error')}
      setIdbSaving(false);
    }
    setShowSaveDialog(false);
  };

  const destBtn=(v)=>({padding:'10px 16px',border:`2px solid ${dest===v?c.primary:c.border}`,borderRadius:6,background:dest===v?c.primary+'15':'transparent',color:dest===v?c.primary:c.editorText,cursor:'pointer',fontSize:13,flex:1,textAlign:'center',transition:'all .15s'});

  return(
    <div style={m.overlay} onClick={()=>setShowSaveDialog(false)}>
      <div style={m.dialog} onClick={e=>e.stopPropagation()}>
        <div style={m.header}>
          <h3 style={m.headerTitle}>💾 保存</h3>
          <button style={m.closeBtn} onClick={()=>setShowSaveDialog(false)}>✕</button>
        </div>
        <div style={m.body}>
          <div style={{marginBottom:14}}>
            <label style={{display:'block',fontSize:12,color:c.statusText,marginBottom:4}}>ファイル名</label>
            <input value={fileName} onChange={e=>setFileName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSave()} style={{...m.input,width:'100%'}} autoFocus/>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:12,color:c.statusText,marginBottom:6}}>保存先</label>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setDest('download')} style={destBtn('download')}>📥 ダウンロード<br/><span style={{fontSize:11,opacity:0.6}}>ローカルファイル</span></button>
              <button onClick={()=>setDest('idb')} style={destBtn('idb')}>🗄️ ブラウザ保存<br/><span style={{fontSize:11,opacity:0.6}}>IndexedDB</span></button>
            </div>
          </div>
          <div style={m.card}>
            <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13,color:c.editorText}}><span>文字数</span><span>{charCount.toLocaleString()} 文字</span></div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13,color:c.editorText}}><span>ファイルサイズ</span><span>{fmt(byteCount)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13,color:c.editorText}}><span>エンコーディング</span><span>UTF-8</span></div>
            {dest==='idb'&&<div style={m.hint}>※ ブラウザのデータを消去すると失われます</div>}
          </div>
        </div>
        <div style={m.footer}>
          <button onClick={()=>setShowSaveDialog(false)} style={m.btnOutline}>キャンセル</button>
          <button onClick={handleSave} disabled={idbSaving} style={m.btnPrimary}>{idbSaving?'保存中...':'保存'}</button>
        </div>
      </div>
    </div>
  );
}

// --- Draggable Modeless Window for Slide Edit ---
function SlideEditWindow({c,slideIdx,editText,setEditText,onClose,onSave,onPreview}){
  const[pos,setPos]=React.useState({x:Math.max(20,window.innerWidth/2-300),y:60});
  const[size,setSize]=React.useState({w:600,h:400});
  const[dragging,setDragging]=React.useState(false);
  const headerRef=React.useRef(null);

  const handleDragStart=React.useCallback((e)=>{
    e.preventDefault();setDragging(true);
    const startX=e.clientX,startY=e.clientY;
    const startPos={...pos};
    const move=(ev)=>{setPos({x:startPos.x+(ev.clientX-startX),y:startPos.y+(ev.clientY-startY)})};
    const up=()=>{setDragging(false);document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up)};
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
  },[pos]);

  const handleResizeStart=React.useCallback((e)=>{
    e.preventDefault();e.stopPropagation();
    const startX=e.clientX,startY=e.clientY;
    const startSize={...size};
    const move=(ev)=>{setSize({w:Math.max(300,startSize.w+(ev.clientX-startX)),h:Math.max(200,startSize.h+(ev.clientY-startY))})};
    const up=()=>{document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up)};
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
  },[size]);

  return(
    <div style={{position:'fixed',left:pos.x,top:pos.y,width:size.w,height:size.h,zIndex:600,display:'flex',flexDirection:'column',background:c.paper,borderRadius:8,boxShadow:'0 8px 32px rgba(0,0,0,0.4)',border:`1px solid ${c.border}`,overflow:'hidden'}}>
      <div ref={headerRef} onMouseDown={handleDragStart} style={{display:'flex',alignItems:'center',padding:'6px 12px',background:c.appBarBg,color:c.appBarText,cursor:dragging?'grabbing':'grab',userSelect:'none',flexShrink:0,gap:6}}>
        <span style={{fontWeight:600,fontSize:13}}>✏️ スライド {slideIdx+1}</span>
        <div style={{flex:1}}/>
        <button onClick={onPreview} style={{background:'rgba(255,255,255,0.15)',border:'none',color:c.appBarText,cursor:'pointer',padding:'2px 8px',borderRadius:3,fontSize:11}} title="編集内容をスライドに反映（保存はしない）">👁 プレビュー</button>
        <button onClick={onSave} style={{background:'rgba(255,255,255,0.2)',border:'none',color:c.appBarText,cursor:'pointer',padding:'2px 10px',borderRadius:3,fontSize:12}}>💾 保存</button>
        <button onClick={onClose} style={{background:'none',border:'none',color:c.appBarText,cursor:'pointer',fontSize:14,padding:'0 4px'}}>✕</button>
      </div>
      <textarea id="slide-edit-textarea" value={editText} onChange={e=>setEditText(e.target.value)} style={{flex:1,padding:12,border:'none',background:c.editorBg,color:c.editorText,fontFamily:"'Consolas','Monaco','Courier New',monospace",fontSize:14,lineHeight:'20px',resize:'none',outline:'none'}}/>
      <div onMouseDown={handleResizeStart} style={{position:'absolute',right:0,bottom:0,width:16,height:16,cursor:'nwse-resize',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontSize:10,color:c.statusText}}>◢</span>
      </div>
    </div>
  );
}

// --- F-31/F-32/F-33: Presentation Mode ---
function PresentationMode(){
  const c=useThemeColors();
  const{showPresentation,setShowPresentation}=React.useContext(UIContext);
  const{activeTab,updateText}=React.useContext(EditorContext);
  const[slideIdx,setSlideIdx]=React.useState(0);
  const[notesWin,setNotesWin]=React.useState(null);
  const[zoom,setZoom]=React.useState(100);
  const[marker,setMarker]=React.useState(false);
  const[markerTrail,setMarkerTrail]=React.useState([]);
  const[inlineEdit,setInlineEdit]=React.useState(false);
  const[editText,setEditText]=React.useState('');
  const[previewOverride,setPreviewOverride]=React.useState(null);
  const slideRef=React.useRef(null);

  const slides=React.useMemo(()=>{
    if(!activeTab||!activeTab.text)return[];
    const parts=activeTab.text.split(/\n---\n|\n___\n|\n\*\*\*\n/);
    const nr=new RegExp('<!--\\s*notes?:\\s*([\\s\\S]*?)-->','i');
    const rr=new RegExp('<!--\\s*notes?:\\s*[\\s\\S]*?-->','gi');
    return parts.map(part=>{
      const m=part.match(nr);
      const notes=m&&m[1]?m[1].trim():'';
      const content=part.replace(rr,'').trim();
      return{content,notes,html:sanitizeHtml(MarkdownService.parse(content))};
    }).filter(s=>s.content.length>0);
  },[activeTab&&activeTab.text]);

  React.useEffect(()=>{if(!showPresentation){setSlideIdx(0);setZoom(100);setMarker(false);setMarkerTrail([]);if(notesWin&&!notesWin.closed)notesWin.close()}},[showPresentation]);

  // Clear marker trail on slide change
  React.useEffect(()=>{setMarkerTrail([]);setInlineEdit(false);setPreviewOverride(null)},[slideIdx]);

  // Render Mermaid diagrams in slides
  React.useEffect(()=>{
    if(!showPresentation||!slideRef.current||!window.mermaid)return;

    const currentSlide=slides[slideIdx];
    if(!currentSlide)return;

    const html=previewOverride||currentSlide.html;
    const divs=slideRef.current.querySelectorAll('.mermaid');
    if(divs.length===0)return;

    const sources=[];
    const regex=/<div class="mermaid">([^]*?)<\/div>/gi;
    let match;

    while((match=regex.exec(html))!==null){
      sources.push(
        match[1]
          .replace(/&amp;/g,'&')
          .replace(/&lt;/g,'<')
          .replace(/&gt;/g,'>')
          .replace(/&quot;/g,'"')
      );
    }

    if(sources.length===0)return;

    const theme=c.previewBg==='#252526'?'dark':'default';

    try{
      mermaid.initialize({
        startOnLoad:false,
        theme,
        securityLevel:'loose',
        flowchart:{
          nodeSpacing:60,
          rankSpacing:80,
          padding:24,
          useMaxWidth:true,
          htmlLabels:false,
          wrappingWidth:220
        },
        sequence:{
          useMaxWidth:true,
          wrap:true,
          width:180
        },
        themeVariables:theme==='dark'
          ?{
            primaryColor:'#333',
            primaryTextColor:'#e0e0e0',
            lineColor:'#666',
            secondaryColor:'#252526',
            fontSize:'14px'
          }
          :{
            fontSize:'14px'
          }
      });

      divs.forEach((d,i)=>{
        const src=sources[i];
        if(!src)return;

        const id='slide-mm-'+slideIdx+'-'+i+'-'+Date.now();
        d.removeAttribute('data-processed');
        d.innerHTML=src;

        mermaid.render(id,src)
          .then(({svg})=>{
            d.innerHTML=svg;
            d.setAttribute('data-processed','true');
          })
          .catch(err=>{
            console.warn('Slide Mermaid render error:',err);
            d.innerHTML='<pre style="color:#e57373;padding:8px;font-size:12px">Mermaid描画エラー: '+escapeHtml(String(err))+'</pre>';
          });
      });
    }catch(e){
      console.warn('Slide Mermaid init error:',e);
    }
  },[showPresentation,slideIdx,slides,previewOverride,c.previewBg]);

  // Keyboard
  React.useEffect(()=>{
    if(!showPresentation)return;
    const handler=(e)=>{
      // Skip keyboard shortcuts when editing in textarea/input
      const tag=document.activeElement?.tagName;
      if(tag==='TEXTAREA'||tag==='INPUT')return;
      if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter'){e.preventDefault();setSlideIdx(p=>Math.min(p+1,slides.length-1))}
      else if(e.key==='ArrowLeft'||e.key==='Backspace'){e.preventDefault();setSlideIdx(p=>Math.max(p-1,0))}
      else if(e.key==='Escape')setShowPresentation(false);
      else if(e.key==='Home')setSlideIdx(0);
      else if(e.key==='End')setSlideIdx(slides.length-1);
      else if(e.key==='+'||e.key==='=')setZoom(p=>Math.min(p+10,400));
      else if(e.key==='-')setZoom(p=>Math.max(p-10,25));
      else if(e.key==='0')setZoom(100);
      else if(e.key.toLowerCase()==='m')setMarker(p=>!p);
      else if(e.key.toLowerCase()==='c')setMarkerTrail([]);
    };
    document.addEventListener('keydown',handler);
    return()=>document.removeEventListener('keydown',handler);
  },[showPresentation,slides.length,setShowPresentation]);

  // Touch swipe
  const touchRef=React.useRef(null);
  const handleTouchStart=React.useCallback(e=>{if(!marker)touchRef.current=e.touches[0].clientX},[marker]);
  const handleTouchEnd=React.useCallback(e=>{
    if(marker||touchRef.current===null)return;
    const diff=e.changedTouches[0].clientX-touchRef.current;
    if(diff<-50)setSlideIdx(p=>Math.min(p+1,slides.length-1));
    else if(diff>50)setSlideIdx(p=>Math.max(p-1,0));
    touchRef.current=null;
  },[slides.length,marker]);

  // Marker (laser pointer) drawing
  const handleMarkerMove=React.useCallback((e)=>{
    if(!marker)return;
    const el=slideRef.current;
    if(!el)return;
    const rect=el.getBoundingClientRect();
    const clientX=e.clientX||e.touches?.[0]?.clientX||0;
    const clientY=e.clientY||e.touches?.[0]?.clientY||0;
    // Account for scroll position within the slide container
    const x=(clientX-rect.left)+el.scrollLeft;
    const y=(clientY-rect.top)+el.scrollTop;
    setMarkerTrail(prev=>{const next=[...prev,{x,y,t:Date.now()}];return next.slice(-80)});
  },[marker]);

  // Fade out old marker points
  React.useEffect(()=>{
    if(!marker||markerTrail.length===0)return;
    const iv=setInterval(()=>{
      const now=Date.now();
      setMarkerTrail(prev=>prev.filter(p=>now-p.t<1500));
    },100);
    return()=>clearInterval(iv);
  },[marker,markerTrail.length]);

  // Speaker notes
  const openNotes=React.useCallback(()=>{
    const w=window.open('','_blank','width=400,height=300');
    if(w){w.document.title='発表者ノート';setNotesWin(w)}
  },[]);

  React.useEffect(()=>{
    if(!notesWin||notesWin.closed||!showPresentation)return;
    const slide=slides[slideIdx];
    const noteHtml=slide?.notes?MarkdownService.parse(slide.notes):'<p style="color:#999">ノートなし</p>';
    notesWin.document.body.innerHTML=`<div style="font-family:sans-serif;padding:16px;line-height:1.6"><h3 style="margin:0 0 8px;color:#666">スライド ${slideIdx+1}/${slides.length}</h3><div>${noteHtml}</div></div>`;
  },[slideIdx,slides,notesWin,showPresentation]);

  if(!showPresentation)return null;
  if(slides.length===0)return(
    <div className="slide-view" style={{background:c.bg,justifyContent:'center',alignItems:'center'}}>
      <div style={{textAlign:'center',color:c.editorText}}><p style={{fontSize:18,marginBottom:16}}>スライドがありません</p><p style={{color:c.statusText}}>Markdownで <code>---</code> を使ってスライドを区切ってください</p><button onClick={()=>setShowPresentation(false)} style={{marginTop:16,padding:'8px 24px',border:`1px solid ${c.inputBorder}`,borderRadius:4,background:'transparent',color:c.editorText,cursor:'pointer'}}>閉じる</button></div>
    </div>
  );

  const slide=slides[slideIdx];
  const zoomScale=zoom/100;
const previewCss=`.slide-md{font-family:'Segoe UI',Roboto,sans-serif;line-height:1.8;color:${c.previewText}}.slide-md h1{font-size:2.2em;margin:0 0 24px;border-bottom:3px solid ${c.primary}}.slide-md h2{font-size:1.7em;margin:0 0 16px}.slide-md h3{font-size:1.3em;margin:0 0 12px}.slide-md p{margin:0 0 16px}.slide-md pre{background:${c.codeBg};padding:16px;border-radius:8px;overflow-x:auto;margin:16px 0}.slide-md code{background:${c.codeBg};padding:2px 6px;border-radius:3px}.slide-md pre code{background:none;padding:0}.slide-md table{border-collapse:collapse;width:100%;margin:16px 0}.slide-md th,.slide-md td{border:1px solid ${c.border};padding:10px 14px}.slide-md th{background:${c.codeBg}}.slide-md img{max-width:100%;border-radius:8px}.slide-md ul,.slide-md ol{padding-left:28px;margin:8px 0}.slide-md li{margin:6px 0}.slide-md blockquote{border-left:4px solid ${c.primary};padding:8px 20px;margin:16px 0;background:${c.codeBg};border-radius:0 8px 8px 0}.slide-md .katex-block{margin:16px 0}.slide-md .mermaid{text-align:center;margin:16px 0;overflow-x:auto;overflow-y:visible;padding:8px 0}.slide-md .mermaid svg{max-width:100%;height:auto!important;min-height:40px;overflow:visible}.slide-md .mermaid .nodeLabel,.slide-md .mermaid .label{font-size:14px;line-height:1.4}.slide-md .mermaid .edgeLabel{font-size:0.85em}`;
  const navBtn={padding:'6px 12px',border:`1px solid ${c.inputBorder}`,borderRadius:4,background:'transparent',color:c.editorText,cursor:'pointer',fontSize:12};
  const activeNavBtn={...navBtn,background:c.primary,color:'#fff',borderColor:c.primary};

  return(
    <div className="slide-view" style={{background:c.bg}} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
      <style>{previewCss}</style>
      {/* Slide content area - scrollable, zoomable, drag-to-scroll when zoomed */}
      <div ref={slideRef} className="slide-content" style={{cursor:marker?'crosshair':zoom>100?'grab':'default',position:'relative'}}
        onMouseMove={marker?handleMarkerMove:undefined}
        onTouchMove={marker?handleMarkerMove:undefined}
        onMouseDown={e=>{if(marker||zoom<=100)return;e.preventDefault();const el=slideRef.current;if(!el)return;el.style.cursor='grabbing';const startX=e.clientX,startY=e.clientY,scrollL=el.scrollLeft,scrollT=el.scrollTop;const move=ev=>{el.scrollLeft=scrollL-(ev.clientX-startX);el.scrollTop=scrollT-(ev.clientY-startY)};const up=()=>{el.style.cursor='grab';document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up)};document.addEventListener('mousemove',move);document.addEventListener('mouseup',up)}}>
        <div
          style={{
            width:zoom>100?`${960 * zoomScale}px`:'100%',
            maxWidth:zoom>100?'none':'960px',
            minHeight:zoom>100?`${540 * zoomScale}px`:'auto',
            display:'grid',
            placeItems:'start center',
            flexShrink:0
          }}
        >
          <div
            style={{
              width:960,
              maxWidth:'100%',
              transform:`scale(${zoomScale})`,
              transformOrigin:'top center',
              transition:'transform 0.2s'
            }}
          >
            <div className="slide-md" dangerouslySetInnerHTML={{__html:previewOverride||slide.html}} onDoubleClick={(e)=>{
              if(marker)return;
              // Find approximate line from click position
              const target=e.target;
              let lineHint=0;
              // Walk up to find text content and estimate line
              const textContent=target.textContent||'';
              const slideContent=slides[slideIdx]?.content||'';
              const lines=slideContent.split('\n');
              // Find which line contains the clicked text
              if(textContent){
                const snippet=textContent.substring(0,30);
                for(let i=0;i<lines.length;i++){if(lines[i].includes(snippet)){lineHint=i;break}}
              }
              setInlineEdit(true);setEditText(slideContent);
              // Scroll textarea to the line after mount
              setTimeout(()=>{
                const ta=document.getElementById('slide-edit-textarea');
                if(ta){
                  const lineHeight=20;
                  ta.scrollTop=Math.max(0,lineHint*lineHeight-100);
                  // Set cursor position
                  let pos=0;for(let i=0;i<lineHint;i++)pos+=lines[i].length+1;
                  ta.selectionStart=ta.selectionEnd=pos;
                  ta.focus();
                }
              },50);
            }}/>
          </div>
        </div>
        {inlineEdit&&<SlideEditWindow c={c} slideIdx={slideIdx} editText={editText} setEditText={setEditText} onClose={()=>{setInlineEdit(false);setPreviewOverride(null)}} onPreview={()=>{
          setPreviewOverride(sanitizeHtml(MarkdownService.parse(editText)));
        }} onSave={()=>{
          if(activeTab&&editText!==slides[slideIdx]?.content){
            const parts=activeTab.text.split(/(\n---\n|\n___\n|\n\*\*\*\n)/);
            let slideCount=0;let targetPartIdx=-1;
            for(let i=0;i<parts.length;i++){if(i%2===0){if(slideCount===slideIdx){targetPartIdx=i;break}slideCount++}}
            if(targetPartIdx>=0){
              const noteMatch=parts[targetPartIdx].match(/(<!--\s*notes?:\s*[\s\S]*?-->)/i);
              parts[targetPartIdx]='\n'+editText+(noteMatch?'\n'+noteMatch[1]:'')+'\n';
              updateText(parts.join(''));
            }
          }
          setInlineEdit(false);setPreviewOverride(null);
        }}/>}
        {/* Marker trail overlay - uses scrollWidth/scrollHeight to cover full scrollable area */}
        {marker&&markerTrail.length>0&&(
          <svg style={{position:'absolute',top:0,left:0,width:slideRef.current?.scrollWidth||'100%',height:slideRef.current?.scrollHeight||'100%',pointerEvents:'none',zIndex:10}}>
            {markerTrail.map((p,i)=>{
              const age=(Date.now()-p.t)/1500;
              const opacity=Math.max(0,1-age);
              const size=Math.max(4,12*(1-age));
              return<circle key={i} cx={p.x} cy={p.y} r={size} fill={`rgba(255,0,0,${opacity})`}/>;
            })}
            {markerTrail.length>=2&&(
              <polyline points={markerTrail.map(p=>`${p.x},${p.y}`).join(' ')} fill="none" stroke="rgba(255,0,0,0.6)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
            )}
          </svg>
        )}
      </div>
      {/* Navigation bar */}
      <div className="slide-nav" style={{background:c.statusBg,borderTop:`1px solid ${c.border}`,flexWrap:'wrap',gap:8}}>
        <button onClick={()=>setSlideIdx(p=>Math.max(p-1,0))} disabled={slideIdx===0} style={{...navBtn,opacity:slideIdx===0?0.3:1}}>◀ 前</button>
        <span style={{color:c.editorText,fontSize:14,minWidth:80,textAlign:'center'}}>{slideIdx+1} / {slides.length}</span>
        <button onClick={()=>setSlideIdx(p=>Math.min(p+1,slides.length-1))} disabled={slideIdx===slides.length-1} style={{...navBtn,opacity:slideIdx===slides.length-1?0.3:1}}>次 ▶</button>
        <span style={{color:c.border}}>|</span>
        <button onClick={()=>setZoom(p=>Math.max(p-10,25))} style={navBtn} title="縮小 (-)">➖</button>
        <span style={{color:c.editorText,fontSize:12,minWidth:40,textAlign:'center'}}>{zoom}%</span>
        <button onClick={()=>setZoom(p=>Math.min(p+10,400))} style={navBtn} title="拡大 (+)">➕</button>
        <button onClick={()=>setZoom(100)} style={navBtn} title="リセット (0)">1:1</button>
        <span style={{color:c.border}}>|</span>
        <button onClick={()=>{setMarker(p=>!p);setMarkerTrail([])}} style={marker?activeNavBtn:navBtn} title="マーカー (M)">🔴</button>
        {marker&&<button onClick={()=>setMarkerTrail([])} style={navBtn} title="マーカー消去 (C)">🧹</button>}
        <div style={{flex:1}}/>
        <button onClick={openNotes} style={navBtn}>📋 ノート</button>
        <button onClick={()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{})}} style={navBtn}>⛶</button>
        <button onClick={()=>setShowPresentation(false)} style={navBtn}>✕ 終了</button>
      </div>
    </div>
  );
}

// --- F-22: Session end auto-purge ---
function SessionPurgeHandler(){
  const{active:profile}=React.useContext(ProfileContext);
  const{purgeEditorState}=React.useContext(EditorContext);
  React.useEffect(()=>{
    if(!profile?.dataPolicy?.purgeOnClose)return;
    const handler=(e)=>{
      StorageService.remove('autosave');sessionStorage.clear();
      // Note: cannot reliably purge all in beforeunload, but clear what we can
    };
    window.addEventListener('beforeunload',handler);
    return()=>window.removeEventListener('beforeunload',handler);
  },[profile]);
  return null;
}

function ConfirmModal(){
  const c=useThemeColors();const m=useModalStyles('sm');
  const{confirmModal}=React.useContext(UIContext);
  const[inputValue,setInputValue]=React.useState('');
  const inputRef=React.useRef(null);
  React.useEffect(()=>{
    if(confirmModal?.input){setInputValue(confirmModal.defaultValue||'');setTimeout(()=>{if(inputRef.current){inputRef.current.focus();inputRef.current.select()}},50)}
  },[confirmModal]);
  if(!confirmModal)return null;
  const handleOk=()=>{confirmModal.onOk(confirmModal.input?inputValue:undefined)};

          <p style={{color:c.editorText,fontSize:14,lineHeight:1.6,whiteSpace:'pre-wrap',margin:0}}>{confirmModal.message}</p>
          {confirmModal.input&&<input ref={inputRef} value={inputValue} onChange={e=>setInputValue(e.target.value)} onKeyDown={handleKeyDown} placeholder={confirmModal.placeholder} style={{...m.input,width:'100%',marginTop:12}}/>}
        </div>
        <div style={m.footer}>
          <button onClick={confirmModal.onCancel} style={m.btnOutline}>{confirmModal.cancelLabel}</button>
          <button onClick={handleOk} style={confirmModal.danger?m.btnDanger:m.btnPrimary}>{confirmModal.okLabel}</button>
        </div>
      </div>
    </div>
  );
}
