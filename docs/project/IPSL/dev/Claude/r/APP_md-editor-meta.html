@media print{
  /* Hide everything except print area */
  .no-print{display:none!important}
  textarea{display:none!important}

  *{overflow:visible!important;height:auto!important;max-height:none!important;flex:none!important;position:static!important}

<script type="text/babel" data-type="module">

// ============================================================
// Infrastructure Layer
// ============================================================
const STORAGE_PREFIX='mde_';
const StorageService={
  get(k,d){try{const r=localStorage.getItem(STORAGE_PREFIX+k);return r!==null?JSON.parse(r):d}catch{return d}},
  set(k,v){try{localStorage.setItem(STORAGE_PREFIX+k,JSON.stringify(v));return true}catch{return false}},
  remove(k){localStorage.removeItem(STORAGE_PREFIX+k)},
  clear(){Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX)).forEach(k=>localStorage.removeItem(k))},
  getUsage(){
    let total=0;const keys={};
    Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX)).forEach(k=>{
      const size=(localStorage.getItem(k)||'').length*2;
      total+=size;
      // Group by key type
      const short=k.replace(STORAGE_PREFIX,'');
      const group=short.startsWith('profile_')?'プロファイル':short==='autosave'?'自動保存':short==='profiles'?'プロファイル一覧':short.startsWith('pdf_')?'PDF設定':'その他';
      keys[group]=(keys[group]||0)+size;
    });
    const limit=5*1024*1024;
    return{used:total,limit,percent:(total/limit)*100,breakdown:keys};
  }
};

// --- F-29: IndexedDB Service ---
const IDBService={
  DB_NAME:'md-editor',VERSION:2,_db:null,
  async open(){
    if(this._db)return this._db;
    return new Promise((res,rej)=>{
      const req=indexedDB.open(this.DB_NAME,this.VERSION);
      req.onupgradeneeded=(e)=>{
        const db=req.result;
        if(!db.objectStoreNames.contains('files')){const s=db.createObjectStore('files',{keyPath:'id'});s.createIndex('name','name',{unique:false});s.createIndex('updatedAt','updatedAt',{unique:false});s.createIndex('profileId','profileId',{unique:false})}
        if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'});
        if(!db.objectStoreNames.contains('trash')){const t=db.createObjectStore('trash',{keyPath:'id'});t.createIndex('deletedAt','deletedAt',{unique:false})}
      };
      req.onsuccess=()=>{this._db=req.result;res(this._db)};
      req.onerror=()=>rej(req.error);
    });
  },
  async saveFile(file){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').put(file);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})},
  async getFile(id){const db=await this.open();return new Promise((res,rej)=>{const req=db.transaction('files').objectStore('files').get(id);req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error)})},
  async listFiles(profileId){const db=await this.open();return new Promise((res,rej)=>{const req=profileId?db.transaction('files').objectStore('files').index('profileId').getAll(profileId):db.transaction('files').objectStore('files').getAll();req.onsuccess=()=>res(req.result||[]);req.onerror=()=>rej(req.error)})},
  async deleteFile(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})},
  async deleteAll(){return new Promise((res)=>{if(this._db){this._db.close();this._db=null}const req=indexedDB.deleteDatabase(this.DB_NAME);req.onsuccess=()=>res(true);req.onerror=()=>res(false);req.onblocked=()=>res(false)})},
  // Trash operations
  async moveToTrash(item){const db=await this.open();const trashItem={...item,id:item.id||uuid(),deletedAt:Date.now()};return new Promise((res,rej)=>{const tx=db.transaction('trash','readwrite');tx.objectStore('trash').put(trashItem);tx.oncomplete=()=>res(trashItem);tx.onerror=()=>rej(tx.error)})},
  async listTrash(){const db=await this.open();return new Promise((res,rej)=>{const req=db.transaction('trash').objectStore('trash').getAll();req.onsuccess=()=>res((req.result||[]).sort((a,b)=>(b.deletedAt||0)-(a.deletedAt||0)));req.onerror=()=>rej(req.error)})},
  async restoreFromTrash(id){const db=await this.open();return new Promise((res,rej)=>{const req=db.transaction('trash').objectStore('trash').get(id);req.onsuccess=()=>{const item=req.result;if(!item){rej(new Error('not found'));return}const tx=db.transaction('trash','readwrite');tx.objectStore('trash').delete(id);tx.oncomplete=()=>res(item);tx.onerror=()=>rej(tx.error)};req.onerror=()=>rej(req.error)})},
  async deleteFromTrash(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('trash','readwrite');tx.objectStore('trash').delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})},
  async purgeExpiredTrash(retentionDays){const db=await this.open();const cutoff=Date.now()-(retentionDays*24*60*60*1000);return new Promise((res,rej)=>{const tx=db.transaction('trash','readwrite');const store=tx.objectStore('trash');const req=store.index('deletedAt').openCursor();let count=0;req.onsuccess=(e)=>{const cursor=e.target.result;if(cursor){if(cursor.value.deletedAt<cutoff){cursor.delete();count++}cursor.continue()}};tx.oncomplete=()=>res(count);tx.onerror=()=>rej(tx.error)})}
};

const FileService={
  read(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error('読み込み失敗'));r.readAsText(file,'UTF-8')})},
  save(text,fn){const b=new Blob([text],{type:'text/markdown;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn||'untitled.md';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)},
  saveHtml(html,fn){const b=new Blob([html],{type:'text/html;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn||'export.html';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)},
  saveBlob(blob,fn){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=fn;a.style.display='none';document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u)},1000)}
};

// --- Lazy Script Loader ---
const LazyLoader={
  _cache:{},
  async load(url,globalName){
    if(globalName&&window[globalName])return window[globalName];
    if(this._cache[url])return this._cache[url];
    return new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src=url;s.onload=()=>{const val=globalName?window[globalName]:true;this._cache[url]=val;res(val)};
      s.onerror=()=>rej(new Error('Failed to load: '+url));
      document.head.appendChild(s);
    });
  }
};

// --- PDF Stability & Page Range Functions ---
function injectPdfStabilityStyles(doc){
  const style=doc.createElement('style');
  style.textContent=`
#pdf-render-target.print-area{width:794px!important;max-width:794px!important;overflow:visible!important;background:#ffffff!important;color:#000000!important}
#pdf-render-target .preview-content *{max-width:100%;box-sizing:border-box}
#pdf-render-target .preview-content .mermaid{width:100%!important;max-width:100%!important;overflow:visible!important;display:flex!important;justify-content:center!important;break-inside:avoid!important;page-break-inside:avoid!important}
#pdf-render-target .preview-content .mermaid svg{max-width:100%!important;max-height:920px!important;height:auto!important;object-fit:contain!important}
#pdf-render-target .preview-content img{max-width:100%!important;max-height:960px!important;object-fit:contain!important}
#pdf-render-target .preview-content pre{white-space:pre-wrap!important;word-break:break-word!important;overflow:visible!important}
#pdf-render-target .preview-content svg{max-width:100%!important;height:auto!important;break-inside:avoid!important;page-break-inside:avoid!important}
#pdf-render-target .preview-content table,#pdf-render-target .preview-content pre,#pdf-render-target .preview-content blockquote,#pdf-render-target .preview-content img,#pdf-render-target .preview-content svg,#pdf-render-target .preview-content .mermaid,#pdf-render-target .preview-content .katex-block,#pdf-render-target .preview-content p,#pdf-render-target .preview-content ul,#pdf-render-target .preview-content ol{break-inside:avoid;page-break-inside:avoid}
#pdf-render-target .preview-content h1,#pdf-render-target .preview-content h2,#pdf-render-target .preview-content h3,#pdf-render-target .preview-content h4,#pdf-render-target .preview-content h5,#pdf-render-target .preview-content h6{break-after:avoid;page-break-after:avoid}
  `;
  doc.head.appendChild(style);
}

function fitOversizedVisualBlocks(target,pageHeightCssPx,options={}){
  const{maxHeight=Math.floor(pageHeightCssPx*0.82),maxWidth=794}=options;
  const visualBlocks=Array.from(target.querySelectorAll('.mermaid, img, svg'));
  const processed=new WeakSet();
  for(const block of visualBlocks){
    const visual=block.matches('img,svg')?block:block.querySelector('svg,img');
    if(!visual||processed.has(visual))continue;
    processed.add(visual);
    const rect=visual.getBoundingClientRect();
    const currentHeight=rect.height;
    const currentWidth=rect.width;
    if(!currentHeight||!currentWidth)continue;
    const overHeight=currentHeight>maxHeight;
    const overWidth=currentWidth>maxWidth;
    if(!overHeight&&!overWidth)continue;
    const scaleH=maxHeight/currentHeight;
    const scaleW=maxWidth/currentWidth;
    const scale=Math.min(scaleH,scaleW,1);
    if(scale>=1)continue;
    const nextWidth=Math.floor(currentWidth*scale);
    const nextHeight=Math.floor(currentHeight*scale);
    // transformではなく実寸を変更する。
    // html2canvasと改ページ計算のズレを防ぐ。
    visual.style.width=`${nextWidth}px`;
    visual.style.height=`${nextHeight}px`;
    visual.style.maxWidth='100%';
    visual.style.maxHeight=`${maxHeight}px`;
    visual.style.objectFit='contain';
    visual.style.display='block';
    visual.style.marginLeft='auto';
    visual.style.marginRight='auto';
    visual.style.transform='none';
    const wrapper=block.matches('.mermaid')?block:visual.parentElement;
    if(wrapper){
      wrapper.style.width='100%';
      wrapper.style.height=`${nextHeight}px`;
      wrapper.style.maxHeight=`${maxHeight}px`;
      wrapper.style.overflow='visible';
      wrapper.style.display='flex';
      wrapper.style.justifyContent='center';
      wrapper.style.alignItems='flex-start';
      wrapper.style.breakInside='avoid';
      wrapper.style.pageBreakInside='avoid';
      wrapper.style.marginTop='10px';
      wrapper.style.marginBottom='10px';
    }
  }
}

function buildSafePageRanges(target,pageHeightCssPx,options={}){
  const totalHeight=target.scrollHeight;
  const ranges=[];
  const minPageFillRatio=options.minPageFillRatio??0.62;
  const minPageHeight=pageHeightCssPx*minPageFillRatio;
  const bottomGuardPx=options.bottomGuardPx??48;
  const minPageAdvancePx=options.minPageAdvancePx??40;
  const headingKeepWithNextPx=options.headingKeepWithNextPx??240;
  const targetRect=target.getBoundingClientRect();
  const getBox=(el)=>{
    const rect=el.getBoundingClientRect();
    return{el,top:rect.top-targetRect.top+target.scrollTop,bottom:rect.bottom-targetRect.top+target.scrollTop,height:rect.height,tag:el.tagName.toLowerCase(),className:typeof el.className==='string'?el.className:''};
  };
  const hardAvoidSelector=['.mermaid','.mermaid svg','svg','img','table','pre','.katex-block'].join(',');
  const softAvoidSelector=['blockquote','ul','ol'].join(',');
  const headingSelector='h1,h2,h3,h4,h5,h6';
  const blockSelector=['h1','h2','h3','h4','h5','h6','p','ul','ol','table','pre','blockquote','img','.mermaid','.katex-block','svg'].join(',');
  const hardAvoidItems=Array.from(target.querySelectorAll(hardAvoidSelector)).map(getBox).filter(item=>item.height>0).sort((a,b)=>a.top-b.top);
  const softAvoidItems=Array.from(target.querySelectorAll(softAvoidSelector)).map(getBox).filter(item=>item.height>0).sort((a,b)=>a.top-b.top);
  const headings=Array.from(target.querySelectorAll(headingSelector)).map(getBox).filter(item=>item.height>0).sort((a,b)=>a.top-b.top);
  const allBlocks=Array.from(target.querySelectorAll(blockSelector)).map(getBox).filter(item=>item.height>0).sort((a,b)=>a.top-b.top);
  const findNextBlock=(heading)=>{
    const candidates=allBlocks.filter(item=>{
      return item.el!==heading.el&&item.top>=heading.bottom-1;
    });
    if(!candidates.length)return null;
    const first=candidates[0];
    // Mermaid内部のsvgではなく、Mermaidコンテナを返す
    const mermaidParent=first.el.closest?.('.mermaid');
    if(mermaidParent){
      const mermaidBox=allBlocks.find(item=>item.el===mermaidParent);
      if(mermaidBox)return mermaidBox;
    }
    return first;
  };
  let start=0;
  while(start<totalHeight){
    const naturalEnd=Math.min(start+pageHeightCssPx,totalHeight);
    if(naturalEnd>=totalHeight){
      ranges.push({y:Math.floor(start),height:Math.ceil(totalHeight-start)});
      break;
    }
    let end=naturalEnd-bottomGuardPx;
    // 1. Mermaid / SVG / img / table / pre / KaTeX は、ページ充填率よりも非分割を優先する
    for(const item of hardAvoidItems){
      const crossesBoundary=item.top<end&&item.bottom>end;
      const startsInsidePage=item.top>=start&&item.top<end;
      const canFitInSinglePage=item.height<=pageHeightCssPx*0.96;
      if(crossesBoundary&&startsInsidePage&&canFitInSinglePage){
        // Mermaid・図・表はページが少し空いても次ページに送る
        end=Math.floor(item.top);
        break;
      }
    }
    // 2. ul / ol / blockquote は、ページが極端に空かない場合だけ分割回避
    for(const item of softAvoidItems){
      const crossesBoundary=item.top<end&&item.bottom>end;
      const startsInsidePage=item.top>=start&&item.top<end;
      const canFitInSinglePage=item.height<=pageHeightCssPx*0.9;
      const doesNotMakePageTooEmpty=item.top-start>=minPageHeight;
      if(crossesBoundary&&startsInsidePage&&canFitInSinglePage&&doesNotMakePageTooEmpty){
        end=Math.floor(item.top);
        break;
      }
    }
    // 3. 見出しだけがページ末尾に残るのを防ぐ
    for(const heading of headings){
      const headingInsidePage=heading.top>=start&&heading.top<end;
      if(!headingInsidePage)continue;
      const nextBlock=findNextBlock(heading);
      if(!nextBlock)continue;
      const nextIsMermaid=nextBlock.el.matches('.mermaid')||nextBlock.el.closest('.mermaid');
      const nextIsHardBlock=nextIsMermaid||nextBlock.el.matches('table,img,svg,.katex-block')||nextBlock.el.closest('table,.katex-block');
      const nextIsCodeBlock=nextBlock.el.matches('pre')||nextBlock.el.closest('pre');
      const nextBlockStartsAfterPage=nextBlock.top>=end;
      // 見出し下に最低限入ってほしい高さ。
      // ここが足りないなら、見出しだけ残さず次ページへ送る。
      const minimumContentAfterHeadingPx=nextIsHardBlock?Math.min(nextBlock.height,pageHeightCssPx*0.55):nextIsCodeBlock?Math.min(nextBlock.height,pageHeightCssPx*0.35):Math.min(nextBlock.height,headingKeepWithNextPx);
      const requiredBottom=Math.min(nextBlock.bottom,heading.bottom+minimumContentAfterHeadingPx);
      const headingHasEnoughFollowingContent=requiredBottom<=end;
      // 見出しがページ下部にある場合は、本文が少し入っても読みづらいので送る
      const headingIsNearBottom=heading.top>start+pageHeightCssPx*0.68;
      // ページ先頭付近の見出しを送ると無限ループや空ページ化しやすいので、
      // 最低限だけ進んでいれば送ってよい
      const canMoveHeadingToNextPage=heading.top-start>=minPageAdvancePx;
      // Mermaid直前の見出しは、図が同ページに入らない時だけ送る
      if(nextIsMermaid&&canMoveHeadingToNextPage){
        const remainingHeight=end-heading.top;
        const mermaidGroupHeight=Math.min(nextBlock.bottom-heading.top,pageHeightCssPx*0.88);
        const mermaidGroupDoesNotFit=mermaidGroupHeight>remainingHeight;
        if(mermaidGroupDoesNotFit||nextBlockStartsAfterPage||headingIsNearBottom){
          end=Math.floor(heading.top);
          break;
        }
      }
      // 通常見出し・表・画像・コード・本文すべてに共通する判定
      if(canMoveHeadingToNextPage&&(nextBlockStartsAfterPage||!headingHasEnoughFollowingContent||headingIsNearBottom)){
        end=Math.floor(heading.top);
        break;
      }
    }
    // 4. end が start に近すぎる場合だけ自然改ページに戻す
    // ただし Mermaid / SVG / table 等の直前で切るケースは許容する
    if(end<=start+minPageAdvancePx){
      end=naturalEnd;
    }
    ranges.push({y:Math.floor(start),height:Math.ceil(end-start)});
    start=end;
  }
  return ranges;
}

// --- Export Service (lazy-loaded PDF/Word/Excel/ZIP) ---
const ExportService={
  async generatePdf(md,options={}){
    const{fileName='export.pdf',onProgress,iframeContainer}=options;
    const updateProgress=(payloadOrStep,message,pageInfo=null)=>{
      if(!onProgress)return;
      if(typeof payloadOrStep==='object'){
        onProgress(payloadOrStep);
        return;

    const{fileName='export.xlsx'}=options;
    const XLSX=window.XLSX;
    const wb=XLSX.utils.book_new();
    // Extract tables from markdown
    const html=MarkdownService.parse(markdownText);
    const div=document.createElement('div');div.innerHTML=html;
    const tables=div.querySelectorAll('table');
    if(tables.length>0){
      tables.forEach((table,i)=>{
        const ws=XLSX.utils.table_to_sheet(table);
        XLSX.utils.book_append_sheet(wb,ws,'Table'+(i+1));
      });
    }else{
      // No tables: put text content as rows
      const lines=markdownText.split('\n');
      const data=lines.map(l=>[l]);
      const ws=XLSX.utils.aoa_to_sheet(data);
      XLSX.utils.book_append_sheet(wb,ws,'Content');
    }
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    FileService.saveBlob(new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),fileName);
    return wbout;

    await LazyLoader.load('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js','JSZip');
    const{fileName='export.zip',onProgress}=options;
    const zip=new JSZip();
    for(let i=0;i<items.length;i++){
      const item=items[i];
      if(onProgress)onProgress(i+1,items.length,item.name);
      zip.file(item.name,item.data);
    }
    const blob=await zip.generateAsync({type:'blob'});
    FileService.saveBlob(blob,fileName);
    return blob;

// Hybrid PDF Generator
// テキスト系は jsPDF.text() で文字として描画
// Mermaid / img / svg / KaTeX / table は html2canvas で画像化
// ============================================================
const HYBRID_PDF_FONT_URL='https://cdn.jsdelivr.net/fontsource/fonts/noto-sans-jp@latest/japanese-400-normal.ttf';
const HYBRID_PDF_FONT_NAME='NotoSansJP';
const HYBRID_PDF_FONT_FILE='NotoSansJP-Regular.ttf';

async function _hybridLoadFont(){
  if(window.__hybridFontBase64)return window.__hybridFontBase64;
  const res=await fetch(HYBRID_PDF_FONT_URL,{mode:'cors',cache:'force-cache'});
  if(!res.ok)throw new Error('フォント取得失敗: '+res.status);
  const buf=await res.arrayBuffer();
  const bytes=new Uint8Array(buf);
  let bin='';
  const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));
  window.__hybridFontBase64=btoa(bin);
  return window.__hybridFontBase64;
}

// mm単位でテキストを折り返して描画し、次のY座標を返す
function _hybridDrawWrappedText(doc,text,x,y,maxW,lineH,pageH,marginTop){
  const lines=doc.splitTextToSize(String(text||''),maxW);
  for(const line of lines){
    if(y+lineH>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
    doc.text(line,x,y);
    y+=lineH;
  }
  return y;
}

// 表を文字として描画する
// 戻り値: 次のY座標
async function _hybridDrawTable(doc,tableEl,x,y,totalWidthMm,pageH,marginTop,fontSize){
  const rows=Array.from(tableEl.querySelectorAll('tr'));
  if(!rows.length)return y;
  // 列数を確定
  const colCount=Math.max(...rows.map(r=>r.children.length));
  if(!colCount)return y;
  // 各列の最大文字数を計測してプロポーショナルに幅を割り当て
  const colMaxLen=Array(colCount).fill(0);
  for(const row of rows){
    Array.from(row.children).forEach((cell,ci)=>{
      const len=String(cell.textContent||'').length;
      if(len>colMaxLen[ci])colMaxLen[ci]=len;
    });
  }
  const totalLen=colMaxLen.reduce((a,b)=>a+b,0)||1;
  const colWidths=colMaxLen.map(l=>Math.max((l/totalLen)*totalWidthMm,12));
  // 実際の合計が totalWidthMm を超えないよう正規化
  const wSum=colWidths.reduce((a,b)=>a+b,0);
  const scale=totalWidthMm/wSum;
  const normWidths=colWidths.map(w=>w*scale);

  const cellPadX=2;
  const cellPadY=1.5;
  const lineH=fontSize*0.352778*1.5; // pt→mm * 行間
  doc.setFontSize(fontSize);

  for(let ri=0;ri<rows.length;ri++){
    const row=rows[ri];
    const isHeader=row.closest('thead')!==null||ri===0;
    const cells=Array.from(row.children);
    // 各セルの折り返し後行数を計算してこの行の高さを決める
    const cellLines=cells.map((cell,ci)=>{
      const w=normWidths[ci]-(cellPadX*2);
      return doc.splitTextToSize(String(cell.textContent||''),w);
    });
    const maxLines=Math.max(...cellLines.map(l=>l.length),1);
    const rowH=maxLines*lineH+cellPadY*2;
    // ページをまたぐ場合は改ページ
    if(y+rowH>pageH-10){
      doc.addPage();
      doc.setFont(HYBRID_PDF_FONT_NAME,'normal');
      y=marginTop;
    }
    // 背景色
    if(isHeader){
      doc.setFillColor(240,240,240);
      doc.rect(x,y,totalWidthMm,rowH,'F');
    }else if(ri%2===0){
      doc.setFillColor(248,248,248);
      doc.rect(x,y,totalWidthMm,rowH,'F');
    }
    // セルごとに罫線とテキスト
    let cx=x;
    for(let ci=0;ci<colCount;ci++){
      const cw=normWidths[ci];
      doc.setDrawColor(180,180,180);
      doc.rect(cx,y,cw,rowH,'S');
      if(cells[ci]){
        if(isHeader){doc.setFont(HYBRID_PDF_FONT_NAME,'bold').catch?.(()=>{});doc.setFont(HYBRID_PDF_FONT_NAME,'normal')}
        const lines=cellLines[ci]||[];
        lines.forEach((line,li)=>{
          doc.text(line,cx+cellPadX,y+cellPadY+lineH*(li+0.8));
        });
      }
      cx+=cw;
    }
    y+=rowH;
  }
  return y+3;
}

// Mermaid / img / svg / KaTeX を html2canvas で画像化して貼り付け
async function _hybridAddElementAsImage(doc,el,x,y,maxWMm,pageH,marginTop){
  let capturedCanvas;
  try{
    capturedCanvas=await html2canvas(el,{
      scale:2,useCORS:true,allowTaint:false,
      backgroundColor:'#ffffff',logging:false,
      scrollX:0,scrollY:0
    });
  }catch(e){
    console.warn('[HybridPDF] html2canvas failed:',e);
    return y;
  }
  if(!capturedCanvas.width||!capturedCanvas.height)return y;
  const imgData=capturedCanvas.toDataURL('image/png');
  const imgWMm=maxWMm;
  const imgHMm=(capturedCanvas.height/capturedCanvas.width)*imgWMm;
  if(y+imgHMm>pageH-10){
    doc.addPage();
    doc.setFont(HYBRID_PDF_FONT_NAME,'normal');
    y=marginTop;
  }
  doc.addImage(imgData,'PNG',x,y,imgWMm,imgHMm);
  capturedCanvas.width=0;capturedCanvas.height=0;
  return y+imgHMm+4;
}

async function generateHybridPdf(markdownText,options={}){
  const{fileName='export.pdf',onProgress}=options;
  const upd=(step,total,msg,pct)=>{
    if(!onProgress)return;
    onProgress({phase:'setup',step,total,percent:pct??Math.round((step/total)*100),message:msg,pageInfo:null});
  };

  upd(1,8,'ライブラリを読み込み中...');
  await LazyLoader.load('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js','jspdf');
  if(!window.html2canvas)await LazyLoader.load('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js','html2canvas');

  upd(2,8,'日本語フォントを読み込み中...');
  const fontBase64=await _hybridLoadFont();

  upd(3,8,'Markdown を変換中...');
  const html=MarkdownService.parse(markdownText);

  upd(4,8,'DOM を準備中...');
  // hidden container に HTML を挿入
  const container=document.createElement('div');
  container.style.cssText='position:fixed;left:-10000px;top:0;width:794px;background:#ffffff;font-family:system-ui,sans-serif;font-size:11pt;line-height:1.7;color:#000';
  container.innerHTML=sanitizeHtml(html);
  document.body.appendChild(container);

  try{
    // Mermaid を SVG に描画
    if(window.mermaid){
      mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose'});
      const blocks=Array.from(container.querySelectorAll('.mermaid'));
      for(let i=0;i<blocks.length;i++){
        const block=blocks[i];
        const src=block.textContent.trim();
        const id='hpdf-mermaid-'+Date.now()+'-'+i;
        try{
          const result=await mermaid.render(id,src);
          block.innerHTML=result.svg||result;
        }catch(e){
          block.textContent='[Mermaid描画エラー: '+e.message+']';
        }
      }
    }
    // KaTeX ブロックを描画（marked が既に変換済みのはずだが念のため）
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

    upd(5,8,'PDF を構築中...');
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4',putOnlyUsedFonts:true,compress:true});
    doc.addFileToVFS(HYBRID_PDF_FONT_FILE,fontBase64);
    doc.addFont(HYBRID_PDF_FONT_FILE,HYBRID_PDF_FONT_NAME,'normal');
    doc.setFont(HYBRID_PDF_FONT_NAME,'normal');

    const pageW=210,pageH=297;
    const marginL=20,marginR=20,marginTop=20;
    const contentW=pageW-marginL-marginR; // 170mm
    let y=marginTop;

    // フォントサイズ→行高さ変換 (pt→mm: 1pt=0.352778mm)
    const ptToMm=pt=>pt*0.352778;
    const lineSpacing=1.35;
    const getLineH=pt=>ptToMm(pt)*lineSpacing;

    // DOM ノードを上から順に処理
    const children=Array.from(container.childNodes);
    const totalNodes=children.length||1;

    // ---- ヘルパー関数: 次の有効ノードを探す ----
    function _hybridFindNextRenderableNode(currentIndex){
      for(let i=currentIndex+1;i<children.length;i++){
        const n=children[i];
        if(n.nodeType!==1)continue;
        const text=(n.textContent||'').trim();
        const tag=n.tagName?.toLowerCase();
        if(text||['img','svg','table','pre','hr'].includes(tag)||n.classList?.contains('mermaid')){
          return n;
        }
      }
      return null;
    }

    // ---- ヘルパー関数: ブロックの推定高さ（mm）を計算 ----
    function _hybridEstimateBlockHeightMm(node){
      if(!node||node.nodeType!==1)return 0;
      const tag=node.tagName.toLowerCase();
      if(/^h[1-6]$/.test(tag)){
        const level=parseInt(tag[1]);
        const sizes=[20,16,13,11,11,11];
        const fs=sizes[level-1]||11;
        doc.setFontSize(fs);
        const lines=doc.splitTextToSize(node.textContent||'',contentW);
        return lines.length*getLineH(fs)+10;
      }
      if(tag==='p'){
        doc.setFontSize(10);
        const lines=doc.splitTextToSize(node.textContent||'',contentW);
        return lines.length*getLineH(10)+4;
      }
      if(tag==='ul'||tag==='ol'){
        doc.setFontSize(10);
        const items=Array.from(node.querySelectorAll(':scope > li'));
        let total=2;
        for(const item of items){
          const lines=doc.splitTextToSize(item.textContent||'',contentW-10);
          total+=Math.max(1,lines.length)*getLineH(10);
        }
        return total+3;
      }
      if(tag==='table'){
        const rows=Array.from(node.querySelectorAll('tr'));
        // 表も見出しと分離すると読みにくいため、最低限まとまった高さを確保する
        return Math.min(Math.max(rows.length*9+8,pageH*0.25),pageH*0.6);
      }
      if(tag==='pre'){
        doc.setFontSize(8.5);
        const lines=doc.splitTextToSize(node.textContent||'',contentW-6);
        return Math.min(lines.length*getLineH(8.5)+10,pageH*0.5);
      }
      if(tag==='img'||tag==='svg'||node.classList.contains('mermaid')||node.classList.contains('katex-block')){
        // 見出し直後の画像・図は、見出しと分離しやすいので大きめに見積もる
        return pageH*0.45;
      }
      doc.setFontSize(10);
      const lines=doc.splitTextToSize(node.textContent||'',contentW);
      return lines.length*getLineH(10)+4;
    }

    for(let ni=0;ni<children.length;ni++){
      const node=children[ni];
      if(node.nodeType!==1)continue; // Element のみ
      const tag=node.tagName.toLowerCase();

      // 進捗更新
      if(onProgress){
        const pct=Math.round(20+((ni/totalNodes)*75));
        onProgress({phase:'pages',step:ni+1,total:totalNodes,percent:pct,
          message:`PDF構築中... ${ni+1}/${totalNodes}`,pageInfo:{current:ni+1,total:totalNodes}});
      }

      // ---- 画像化ブロック ----
      if(node.classList.contains('mermaid')||node.classList.contains('katex-block')||tag==='img'||tag==='svg'){
        y=await _hybridAddElementAsImage(doc,node,marginL,y,contentW,pageH,marginTop);
        continue;
      }

      // ---- 表 ----
      if(tag==='table'){
        y=await _hybridDrawTable(doc,node,marginL,y,contentW,pageH,marginTop,9);
        continue;
      }

      // ---- 水平線 ----
      if(tag==='hr'){
        if(y+4>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
        doc.setDrawColor(180,180,180);
        doc.line(marginL,y+2,marginL+contentW,y+2);
        y+=6;
        continue;
      }

      // ---- 見出し ----
      if(/^h[1-6]$/.test(tag)){
        const level=parseInt(tag[1]);
        const sizes=[20,16,13,11,11,11];
        const fs=sizes[level-1]||11;
        const lh=getLineH(fs);
        
        // 次ブロックを探して、見出し + 次ブロックの最低限が同ページに入るか判定
        const nextNode=_hybridFindNextRenderableNode(ni);
        const nextEstimatedH=_hybridEstimateBlockHeightMm(nextNode);
        // 見出し直後が画像・図・表なら、見出しと分離しやすいので強めに確保
        const nextTag=nextNode?.tagName?.toLowerCase();
        const nextIsVisualBlock=
          nextTag==='img'||
          nextTag==='svg'||
          nextTag==='table'||
          nextTag==='pre'||
          nextNode?.classList?.contains('mermaid')||
          nextNode?.classList?.contains('katex-block');
        const keepWithNextH=nextIsVisualBlock
          ?Math.min(nextEstimatedH,pageH*0.55)
          :Math.min(nextEstimatedH,pageH*0.35);
        const headingGroupH=lh*2+keepWithNextH;
        
        // ページ下部に見出しだけ残る場合は、見出し前で改ページ
        if(y+headingGroupH>pageH-10){
          doc.addPage();
          doc.setFont(HYBRID_PDF_FONT_NAME,'normal');
          y=marginTop;
        }
        
        // 見出し前の余白
        y+=level<=2?6:3;
        doc.setFontSize(fs);
        const text=node.textContent||'';
        const lines=doc.splitTextToSize(text,contentW);
        for(const line of lines){
          if(y+lh>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
          doc.text(line,marginL,y);
          y+=lh;
        }
        // h1/h2 の下線
        if(level<=2){
          doc.setDrawColor(level===1?100:180,level===1?100:180,level===1?100:180);
          doc.setLineWidth(level===1?0.5:0.3);
          doc.line(marginL,y+1,marginL+contentW,y+1);
          doc.setLineWidth(0.2);
          y+=3;
        }
        y+=level<=2?4:2;
        doc.setFontSize(10);
        continue;
      }

      // ---- コードブロック ----
      if(tag==='pre'){
        const code=node.textContent||'';
        const fs=8.5;
        const lh=ptToMm(fs)*1.25;
        doc.setFontSize(fs);
        const lines=doc.splitTextToSize(code,contentW-6);
        const blockH=lines.length*lh+6;
        if(y+Math.min(blockH,pageH*0.4)>pageH-10){
          doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop;
        }
        // 背景
        doc.setFillColor(245,245,245);
        doc.setDrawColor(200,200,200);
        // 複数ページにまたがる場合は分割描画
        let remaining=[...lines];
        while(remaining.length){
          const fitLines=[];
          let testY=y+3;
          for(const l of remaining){
            if(testY+lh>pageH-10)break;
            fitLines.push(l);
            testY+=lh;
          }
          if(!fitLines.length){fitLines.push(remaining[0])} // 最低1行
          const bh=fitLines.length*lh+6;
          doc.setFillColor(245,245,245);
          doc.setDrawColor(200,200,200);
          doc.rect(marginL,y,contentW,bh,'FD');
          fitLines.forEach((l,i)=>doc.text(l,marginL+3,y+3+lh*(i+0.8)));
          y+=bh+3;
          remaining=remaining.slice(fitLines.length);
          if(remaining.length){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
        }
        doc.setFontSize(10);
        continue;
      }

      // ---- 引用 ----
      if(tag==='blockquote'){
        const fs=10;
        const lh=getLineH(fs);
        doc.setFontSize(fs);
        const text=node.textContent||'';
        const lines=doc.splitTextToSize(text,contentW-8);
        const bh=lines.length*lh+4;
        if(y+Math.min(bh,40)>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
        doc.setFillColor(249,249,249);
        doc.setDrawColor(180,180,180);
        doc.rect(marginL,y,contentW,bh,'FD');
        doc.setDrawColor(150,150,150);
        doc.setLineWidth(0.8);
        doc.line(marginL+0.4,y,marginL+0.4,y+bh);
        doc.setLineWidth(0.2);
        lines.forEach((l,i)=>doc.text(l,marginL+5,y+2+lh*(i+0.8)));
        y+=bh+3;
        doc.setFontSize(10);
        continue;
      }

      // ---- リスト ----
      if(tag==='ul'||tag==='ol'){
        const fs=10;
        const lh=getLineH(fs);
        doc.setFontSize(fs);
        const items=Array.from(node.querySelectorAll(':scope > li'));
        for(let ii=0;ii<items.length;ii++){
          const item=items[ii];
          const bullet=tag==='ol'?(ii+1)+'.':'•';
          // li 直下のテキストのみ（ネストは別途）
          const directText=Array.from(item.childNodes)
            .filter(n=>n.nodeType===3||(n.nodeType===1&&!['ul','ol'].includes(n.tagName?.toLowerCase())))
            .map(n=>n.textContent||'').join('').trim();
          const lines=doc.splitTextToSize(directText,contentW-10);
          for(let li=0;li<lines.length;li++){
            if(y+lh>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
            if(li===0)doc.text(bullet,marginL+2,y);
            doc.text(lines[li],marginL+8,y);
            y+=lh;
          }
          // ネストされたリスト
          const nested=Array.from(item.querySelectorAll(':scope > ul, :scope > ol'));
          for(const sub of nested){
            const subItems=Array.from(sub.querySelectorAll(':scope > li'));
            for(let si=0;si<subItems.length;si++){
              const stext=subItems[si].textContent?.trim()||'';
              const sbullet=sub.tagName.toLowerCase()==='ol'?(si+1)+'.':'–';
              const slines=doc.splitTextToSize(stext,contentW-18);
              for(let sl=0;sl<slines.length;sl++){
                if(y+lh>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
                if(sl===0)doc.text(sbullet,marginL+10,y);
                doc.text(slines[sl],marginL+16,y);
                y+=lh;
              }
            }
          }
        }
        y+=2;
        continue;
      }

      // ---- 段落（デフォルト） ----
      {
        const fs=10;
        const lh=getLineH(fs);
        doc.setFontSize(fs);
        // 画像が含まれる場合は画像化
        const imgs=node.querySelectorAll('img,svg,.mermaid,.katex-block');
        if(imgs.length){
          y=await _hybridAddElementAsImage(doc,node,marginL,y,contentW,pageH,marginTop);
          continue;
        }
        const text=(node.textContent||'').trim();
        if(!text){y+=2;continue}
        const lines=doc.splitTextToSize(text,contentW);
        for(const line of lines){
          if(y+lh>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
          doc.text(line,marginL,y);
          y+=lh;
        }
        y+=2;
      }
    }

    upd(8,8,'PDF を保存中...',98);
    const blob=doc.output('blob');
    return blob;
  }finally{
    if(container.parentNode)container.parentNode.removeChild(container);
  }
}

const escapeHtml=(s)=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const MarkdownService={
  _init:false,
  init(){
    if(this._init)return;
    const renderer=new marked.Renderer();
    renderer.link=function(href,title,text){if(typeof href==='object'){title=href.title;text=href.text;href=href.href}if(href&&/^javascript:/i.test(href))return escapeHtml(text||'');const t=title?` title="${escapeHtml(title)}"`:'';return`<a href="${escapeHtml(href||'')}"${t} rel="noopener noreferrer" target="_blank">${text||''}</a>`};
    renderer.image=function(href,title,text){if(typeof href==='object'){title=href.title;text=href.text;href=href.href}if(href&&!/^(https?:|data:image\/)/i.test(href))return`<span>[画像: ${escapeHtml(text||'')}]</span>`;return`<img src="${escapeHtml(href||'')}" alt="${escapeHtml(text||'')}" style="max-width:100%" loading="lazy">`};
    renderer.code=function(code,lang){if(typeof code==='object'){lang=code.lang;code=code.text}if(lang==='mermaid')return`<div class="mermaid">${escapeHtml(code)}</div>`;if(lang==='math'||lang==='latex'){try{return`<div class="katex-block">${katex.renderToString(code,{displayMode:true,throwOnError:false})}</div>`}catch{return`<pre><code>${escapeHtml(code)}</code></pre>`}}if(lang&&hljs.getLanguage(lang))return`<pre><code class="hljs language-${lang}">${hljs.highlight(code,{language:lang}).value}</code></pre>`;return`<pre><code class="hljs">${hljs.highlightAuto(code).value}</code></pre>`};
    renderer.text=function(text){if(typeof text==='object')text=text.text||text.raw||'';
      // Block math: $$...$$
      text=text.replace(/\$\$([^\$]+?)\$\$/g,(m,math)=>{try{return katex.renderToString(math,{displayMode:true,throwOnError:false})}catch{return m}});
      // Inline math: $...$  (not preceded/followed by $)
      text=text.replace(/(?<!\$)\$(?!\$)([^\$\n]+?)(?<!\$)\$(?!\$)/g,(m,math)=>{try{return katex.renderToString(math,{throwOnError:false})}catch{return m}});
      return text};
    marked.setOptions({renderer,gfm:true,breaks:true});
    this._init=true;
  },
  parse(text){this.init();try{
    // Pre-process: convert $$...$$ blocks (multiline) to code blocks for katex
    let processed=(text||'').replace(/^\$\$([\s\S]*?)\$\$/gm,(m,math)=>{
      try{return katex.renderToString(math.trim(),{displayMode:true,throwOnError:false})}catch{return m}
    });
    return marked.parse(processed);
  }catch{return'<p style="color:red">Markdown変換エラー</p>'}}
};

function sanitizeHtml(html){const t=document.createElement('div');t.innerHTML=html;t.querySelectorAll('script,style,iframe,object,embed,form,link,meta,base,applet,frame,frameset').forEach(e=>e.remove());t.querySelectorAll('*').forEach(e=>{[...e.attributes].forEach(a=>{if(/^on/i.test(a.name))e.removeAttribute(a.name);if(a.name==='href'&&/^javascript:/i.test(a.value))e.removeAttribute(a.name);if(a.name==='src'&&/^javascript:/i.test(a.value))e.removeAttribute(a.name)})});return t.innerHTML}

const uuid=()=>'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)});

// --- PDF Quality Presets ---
const PDF_QUALITY_PRESETS={
  light:{
    label:'軽量',
    scale:1.2,
    jpegQuality:0.68,
    compression:'FAST'
  },
  standard:{
    label:'標準',
    scale:1.5,
    jpegQuality:0.78,
    compression:'FAST'
  },
  high:{
    label:'高画質',
    scale:2,
    jpegQuality:0.9,
    compression:'MEDIUM'
  }
};

const getPdfQualityPreset=(options={})=>{
  const quality=options.pdfQuality||'standard';
  return PDF_QUALITY_PRESETS[quality]||PDF_QUALITY_PRESETS.standard;

// --- F-11/F-21: Profile ---
const DEFAULT_PROFILE={id:'default',name:'デフォルト',avatar:'👤',createdAt:Date.now(),lastUsedAt:Date.now(),
  settings:{theme:'system',fontSize:14,lineNumbers:true,autoSave:true,autoSaveInterval:30,scrollSync:true,wordWrap:true,historyLimit:50,trashRetentionDays:30},
  dataPolicy:{retention:'persistent',purgeOnClose:false,purgeOnSwitch:false}};

function ProfileProvider({children}){
  const[profiles,setProfiles]=React.useState(()=>{const p=StorageService.get('profiles',null);return p&&p.length>0?p:[{...DEFAULT_PROFILE}]});
  const[activeId,setActiveId]=React.useState(()=>StorageService.get('active_profile','default'));
  const active=React.useMemo(()=>profiles.find(p=>p.id===activeId)||profiles[0],[profiles,activeId]);

  React.useEffect(()=>{StorageService.set('profiles',profiles);StorageService.set('active_profile',activeId)},[profiles,activeId]);

  const createProfile=React.useCallback((name,avatar,dataPolicy)=>{
    const p={...DEFAULT_PROFILE,id:uuid(),name:name||'新規',avatar:avatar||'👤',createdAt:Date.now(),lastUsedAt:Date.now(),dataPolicy:dataPolicy||DEFAULT_PROFILE.dataPolicy};
    setProfiles(prev=>[...prev,p]);return p;
  },[]);

  const deleteProfile=React.useCallback((id)=>{
    if(id==='default')return;
    setProfiles(prev=>prev.filter(p=>p.id!==id));
    if(activeId===id)setActiveId('default');
    // Clean profile-specific storage
    StorageService.remove('profile_'+id+'_autosave');
  },[activeId]);

  const switchProfile=React.useCallback((id,editorPurge)=>{
    const prev=active;
    if(prev&&prev.dataPolicy.purgeOnSwitch&&editorPurge)editorPurge();
    setActiveId(id);
    setProfiles(ps=>ps.map(p=>p.id===id?{...p,lastUsedAt:Date.now()}:p));
  },[active]);

  const updateProfile=React.useCallback((id,updates)=>{
    setProfiles(prev=>prev.map(p=>p.id===id?{...p,...updates}:p));
  },[]);

  const updateSettings=React.useCallback((settings)=>{
    setProfiles(prev=>prev.map(p=>p.id===activeId?{...p,settings:{...p.settings,...settings}}:p));
  },[activeId]);

  const value=React.useMemo(()=>({profiles,active,activeId,createProfile,deleteProfile,switchProfile,updateProfile,updateSettings}),[profiles,active,activeId,createProfile,deleteProfile,switchProfile,updateProfile,updateSettings]);
  return<ProfileContext.Provider value={value}>{children}</ProfileContext.Provider>;
}

// --- Editor ---
function createTab(fn,text){return{id:uuid(),fileName:fn||'untitled.md',text:text||'',isDirty:false,scrollPos:0,cursorPos:{line:1,col:1}}}

function EditorProvider({children}){
  const[tabs,setTabs]=React.useState(()=>{
    try{
      const s=StorageService.get('autosave',null);
      if(s&&s.tabs&&s.tabs.length>0)return s.tabs.map(t=>({id:t.id||uuid(),fileName:t.fileName||'untitled.md',text:t.text||'',isDirty:false,scrollPos:0,cursorPos:{line:1,col:1}}));
      return[createTab()];
    }catch(e){
      console.error('Error initializing tabs:',e);
      return[createTab()];
    }
  });
  const[activeTabId,setActiveTabId]=React.useState(()=>{
    try{
      const s=StorageService.get('autosave',null);
      if(s&&s.tabs&&s.tabs.length>0){
        // Use saved activeTabId only if it exists in saved tabs
        if(s.activeTabId&&s.tabs.some(t=>t.id===s.activeTabId))return s.activeTabId;
        return s.tabs[0].id||'';
      }
      return '';
    }catch(e){
      console.error('Error initializing activeTabId:',e);
      return '';
    }
  });
  const activeTab=React.useMemo(()=>tabs.find(t=>t.id===activeTabId),[tabs,activeTabId]);

  // Fix: if activeTabId doesn't match any tab, select the first one
  React.useEffect(()=>{
    if(tabs.length>0&&!tabs.find(t=>t.id===activeTabId)){setActiveTabId(tabs[0].id)}
  },[tabs,activeTabId]);

  const updateTab=React.useCallback((tid,u)=>{setTabs(p=>p.map(t=>t.id===tid?{...t,...u,isDirty:true}:t))},[]);

  // Save to storage immediately
  const saveToStorage=React.useCallback(()=>{
    const profiles=StorageService.get('profiles',null);
    const activeProfileId=StorageService.get('active_profile','default');
    const prof=profiles?.find(p=>p.id===activeProfileId);
    if(prof?.settings?.autoSave===false)return;
    const data={tabs:tabs.map(t=>({id:t.id,fileName:t.fileName,text:t.text})),activeTabId,savedAt:Date.now()};
    StorageService.set('autosave',data);
  },[tabs,activeTabId]);

  // --- Undo/Redo with history tracking ---
  const undoStackRef=React.useRef({});
  const redoStackRef=React.useRef({});
  const lastTextRef=React.useRef({});
  const undoTimerRef=React.useRef({});

  const getHistoryLimit=()=>{
    const profiles=StorageService.get('profiles',null);
    const pid=StorageService.get('active_profile','default');
    const prof=profiles?.find(p=>p.id===pid);
    return prof?.settings?.historyLimit||50;
  };

  const pushUndo=React.useCallback((tabId,oldText)=>{
    const limit=getHistoryLimit();
    if(!undoStackRef.current[tabId])undoStackRef.current[tabId]=[];
    undoStackRef.current[tabId].push({text:oldText,timestamp:Date.now()});
    if(undoStackRef.current[tabId].length>limit)undoStackRef.current[tabId].shift();
    if(!redoStackRef.current[tabId])redoStackRef.current[tabId]=[];
    redoStackRef.current[tabId]=[];
  },[]);

  const undo=React.useCallback(()=>{
    const tid=activeTabId;if(!tid)return;
    const stack=undoStackRef.current[tid];if(!stack||stack.length===0)return;
    const entry=stack.pop();
    const tab=tabs.find(t=>t.id===tid);if(!tab)return;
    if(!redoStackRef.current[tid])redoStackRef.current[tid]=[];
    redoStackRef.current[tid].push({text:tab.text,timestamp:Date.now()});
    lastTextRef.current[tid]=entry.text;
    setTabs(p=>p.map(t=>t.id===tid?{...t,text:entry.text,isDirty:true}:t));
  },[activeTabId,tabs]);

  const redo=React.useCallback(()=>{
    const tid=activeTabId;if(!tid)return;
    const stack=redoStackRef.current[tid];if(!stack||stack.length===0)return;
    const entry=stack.pop();
    const tab=tabs.find(t=>t.id===tid);if(!tab)return;
    if(!undoStackRef.current[tid])undoStackRef.current[tid]=[];
    undoStackRef.current[tid].push({text:tab.text,timestamp:Date.now()});
    lastTextRef.current[tid]=entry.text;
    setTabs(p=>p.map(t=>t.id===tid?{...t,text:entry.text,isDirty:true}:t));
  },[activeTabId,tabs]);

  const jumpToHistory=React.useCallback((tabId,index)=>{
    // Jump to a specific point in undo history
    const stack=undoStackRef.current[tabId];if(!stack||index<0||index>=stack.length)return;
    const tab=tabs.find(t=>t.id===tabId);if(!tab)return;
    // Everything after index goes to redo
    const redoEntries=stack.splice(index+1);
    redoEntries.push({text:tab.text,timestamp:Date.now()});
    if(!redoStackRef.current[tabId])redoStackRef.current[tabId]=[];
    redoStackRef.current[tabId]=[...redoStackRef.current[tabId],...redoEntries.reverse()];
    const target=stack.pop();
    lastTextRef.current[tabId]=target.text;
    setTabs(p=>p.map(t=>t.id===tabId?{...t,text:target.text,isDirty:true}:t));
  },[tabs]);

  const getUndoStack=React.useCallback((tabId)=>undoStackRef.current[tabId]||[],[]);
  const getRedoStack=React.useCallback((tabId)=>redoStackRef.current[tabId]||[],[]);

  const canUndo=activeTabId&&undoStackRef.current[activeTabId]?.length>0;
  const canRedo=activeTabId&&redoStackRef.current[activeTabId]?.length>0;

  const updateTextWithUndo=React.useCallback((text)=>{
    if(!activeTabId)return;
    const tab=tabs.find(t=>t.id===activeTabId);
    if(!tab||tab.text===text)return;
    // Debounced undo: only push to undo stack if 800ms elapsed since last push
    const now=Date.now();
    const lastPush=undoTimerRef.current[activeTabId]||0;
    if(now-lastPush>800&&lastTextRef.current[activeTabId]!==text){
      pushUndo(activeTabId,tab.text);
      undoTimerRef.current[activeTabId]=now;
    }
    lastTextRef.current[activeTabId]=text;
    setTabs(p=>p.map(t=>t.id===activeTabId?{...t,text,isDirty:true}:t));
  },[activeTabId,tabs,pushUndo]);

  const openFile=React.useCallback((fn,text)=>{
    // If a tab with same fileName already exists, switch to it and update content
    const existing=tabs.find(t=>t.fileName===fn);
    if(existing){
      setActiveTabId(existing.id);
      if(text!==undefined&&text!==existing.text){
        setTabs(p=>p.map(t=>t.id===existing.id?{...t,text}:t));
        setTimeout(saveToStorage,0);
      }
      return;
    }
    const tab=createTab(fn,text);
    setTabs(p=>[...p,tab]);
    setActiveTabId(tab.id);
    setTimeout(saveToStorage,0);
    // Auto-add to active workspace if one exists
    const awsId=StorageService.get('active_workspace',null);
    if(awsId){
      const wsList=StorageService.get('workspaces',[]);
      const ws=wsList.find(w=>w.id===awsId);
      if(ws&&!(ws.tabs||[]).some(wt=>wt.fileName===fn)){
        const updated=wsList.map(w=>w.id===awsId?{...w,tabs:[...(w.tabs||[]),{fileName:fn,text:text||''}],updatedAt:Date.now()}:w);
        StorageService.set('workspaces',updated);
      }
    }
  },[tabs,saveToStorage]);
  const closeTab=React.useCallback((tid,forceDelete)=>{
    // Check if tab belongs to a workspace (unless forceDelete)
    if(!forceDelete){
      const workspaces=StorageService.get('workspaces',[]);
      const tab=tabs.find(t=>t.id===tid);
      if(tab){
        const wsIdx=workspaces.findIndex(ws=>(ws.tabs||[]).some(wt=>wt.id===tab.id||wt.fileName===tab.fileName));
        if(wsIdx>=0){
          // Sync latest text back to workspace before closing
          const updatedWs=workspaces.map(ws=>{
            if((ws.tabs||[]).some(wt=>wt.id===tab.id||wt.fileName===tab.fileName)){
              return{...ws,tabs:ws.tabs.map(wt=>(wt.id===tab.id||wt.fileName===tab.fileName)?{...wt,text:tab.text,fileName:tab.fileName,id:tab.id}:wt),updatedAt:Date.now()};
            }
            return ws;
          });
          StorageService.set('workspaces',updatedWs);
          // Remove from visible tabs only, data preserved in workspace
          setTabs(p=>{const n=p.filter(t=>t.id!==tid);if(n.length===0)n.push(createTab());if(activeTabId===tid)setActiveTabId(n[n.length-1].id);return n});
          return;
        }
      }
    }
    // Not in workspace or forceDelete: move to trash (unless empty untitled)
    const tabToClose=tabs.find(t=>t.id===tid);
    setTabs(p=>{const n=p.filter(t=>t.id!==tid);if(n.length===0)n.push(createTab());if(activeTabId===tid)setActiveTabId(n[n.length-1].id);
      // Move to trash if tab has content
      if(!forceDelete&&tabToClose&&tabToClose.text&&tabToClose.text.trim()){
        IDBService.moveToTrash({id:tabToClose.id,fileName:tabToClose.fileName,text:tabToClose.text,size:new TextEncoder().encode(tabToClose.text).length}).catch(()=>{});
      }
      setTimeout(()=>{const data={tabs:n.map(t=>({id:t.id,fileName:t.fileName,text:t.text})),activeTabId:activeTabId===tid?n[n.length-1].id:activeTabId,savedAt:Date.now()};StorageService.set('autosave',data)},0);
      return n});
  },[activeTabId,tabs]);
const createUntitledFileName=(tabs)=>{
  const used=new Set(tabs.map(t=>t.fileName));
  if(!used.has('untitled.md'))return 'untitled.md';

  let i=2;
  while(used.has(`untitled-${i}.md`))i++;
  return `untitled-${i}.md`;
};

const newTab=React.useCallback(()=>{
  const fileName=createUntitledFileName(tabs);
  const t=createTab(fileName,'');
  setTabs(p=>[...p,t]);
  setActiveTabId(t.id);
  setTimeout(saveToStorage,0);

  const awsId=StorageService.get('active_workspace',null);
  if(!awsId)return;

  const wsList=StorageService.get('workspaces',[]);
  const ws=wsList.find(w=>w.id===awsId);
  if(!ws)return;

  const updated=wsList.map(w=>{
    if(w.id!==awsId)return w;

    return{
      ...w,
      tabs:[
        ...(w.tabs||[]),
        {
          fileName:t.fileName,
          text:t.text||''
        }
      ],
      updatedAt:Date.now()
    };
  });

  StorageService.set('workspaces',updated);
},[tabs,saveToStorage]);
  const newSession=React.useCallback(()=>{const t=createTab();setTabs([t]);setActiveTabId(t.id);StorageService.remove('autosave');undoStackRef.current={};redoStackRef.current={};lastTextRef.current={};undoTimerRef.current={}},[]);
  const replaceTabs=React.useCallback((newTabsData)=>{
    if(!newTabsData||newTabsData.length===0){const t=createTab();setTabs([t]);setActiveTabId(t.id);return}
    const newTabs=newTabsData.map(t=>createTab(t.fileName,t.text));
    setTabs(newTabs);setActiveTabId(newTabs[0].id);
    StorageService.remove('autosave');undoStackRef.current={};redoStackRef.current={};lastTextRef.current={};undoTimerRef.current={};
  },[]);
  const updateText=React.useCallback((text)=>{updateTextWithUndo(text)},[updateTextWithUndo]);
  const setCursorPos=React.useCallback((pos)=>{
    if(!activeTabId)return;
    setTabs(p=>p.map(t=>t.id===activeTabId?{...t,cursorPos:pos}:t));
    setTimeout(saveToStorage,0);
  },[activeTabId,saveToStorage]);
  const renameTab=React.useCallback((tid,newName)=>{
    if(!newName.trim())return;
    setTabs(p=>p.map(t=>t.id===tid?{...t,fileName:newName.trim()}:t));
    // Also update in workspaces
    const workspaces=StorageService.get('workspaces',[]);
    const tab=tabs.find(t=>t.id===tid);
    if(tab){
      const updated=workspaces.map(ws=>{
        return{
          ...ws,
          tabs:(ws.tabs||[]).map(wt=>wt.fileName===tab.fileName?{...wt,fileName:newName.trim()}:wt)
        };
      });
      StorageService.set('workspaces',updated);
    }
    setTimeout(saveToStorage,0);
  },[tabs,saveToStorage]);
  const reorderTab=React.useCallback((fromId,toId)=>{
    setTabs(prev=>{
      const from=prev.findIndex(t=>t.id===fromId);
      const to=prev.findIndex(t=>t.id===toId);
      if(from<0||to<0||from===to)return prev;
      const next=[...prev];
      const[item]=next.splice(from,1);
      next.splice(to,0,item);
      return next;
    });
    setTimeout(saveToStorage,0);
  },[saveToStorage]);

  // F-12: Purge editor state
  const purgeEditorState=React.useCallback(()=>{setTabs([createTab()]);setActiveTabId(tabs[0]?.id||'')},[]);

  // Auto-save: 1s debounce + 30s interval + beforeunload
  React.useEffect(()=>{
    const doSave=()=>{
      const profiles=StorageService.get('profiles',null);
      const activeProfileId=StorageService.get('active_profile','default');
      const prof=profiles?.find(p=>p.id===activeProfileId);
      if(prof?.settings?.autoSave===false)return;
      const data={tabs:tabs.map(t=>({id:t.id,fileName:t.fileName,text:t.text})),activeTabId,savedAt:Date.now()};
      StorageService.set('autosave',data);
    };
    // 1s debounce save on every change
    const debounceTimer=setTimeout(doSave,1000);
    // 30s interval save
    const intervalTimer=setInterval(doSave,30000);
    // beforeunload save
    const beforeUnload=()=>doSave();
    window.addEventListener('beforeunload',beforeUnload);
    return()=>{clearTimeout(debounceTimer);clearInterval(intervalTimer);window.removeEventListener('beforeunload',beforeUnload)};
  },[tabs,activeTabId]);

  const value=React.useMemo(()=>({tabs,activeTabId,activeTab,setActiveTabId,openFile,closeTab,newTab,newSession,replaceTabs,updateText,updateTab,setCursorPos,purgeEditorState,undo,redo,canUndo,canRedo,renameTab,reorderTab,jumpToHistory,getUndoStack,getRedoStack}),[tabs,activeTabId,activeTab,openFile,closeTab,newTab,newSession,replaceTabs,updateText,updateTab,setCursorPos,purgeEditorState,undo,redo,canUndo,canRedo,renameTab,reorderTab,jumpToHistory,getUndoStack,getRedoStack]);
  return<EditorContext.Provider value={value}>{children}</EditorContext.Provider>;
}

// --- AppBar ---
function AppBarComponent(){
  const c=useThemeColors();const{mode,setMode}=React.useContext(ThemeContext);
  const{activeTab,tabs,activeTabId,openFile,newSession,undo,redo,canUndo,canRedo}=React.useContext(EditorContext);
  const{setShowSettings,setShowSearch,setShowProfileMgr,setShowPdfSettings,setShowPresentation,showSidebar,setShowSidebar,showSaveDialog,setShowSaveDialog,showHistory,setShowHistory,isFullscreen,setIsFullscreen,showMessage,showConfirm}=React.useContext(UIContext);
  const{active:profile}=React.useContext(ProfileContext);
  const fileRef=React.useRef(null);
  const[showExportMenu,setShowExportMenu]=React.useState(false);
  const[width,setWidth]=React.useState(window.innerWidth);
  React.useEffect(()=>{const h=()=>setWidth(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h)},[]);
  const isXs=width<600;

  const handleOpen=()=>fileRef.current?.click();
  const handleFileChange=async(e)=>{const files=e.target.files;if(!files)return;for(const f of files){if(!/\.(md|txt|markdown)$/i.test(f.name)){showMessage('対応: .md, .txt','warn');continue}try{const t=await FileService.read(f);openFile(f.name,t)}catch{showMessage('読み込み失敗','error')}}e.target.value=''};
  const handleSave=()=>setShowSaveDialog(true);
  const handleTheme=()=>{const m=['light','dark','system'];setMode(m[(m.indexOf(mode)+1)%m.length])};
  const handleExportHtml=()=>{if(!activeTab)return;const h=MarkdownService.parse(activeTab.text);const full=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(activeTab.fileName)}</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"><style>body{max-width:800px;margin:40px auto;padding:0 20px;font-family:sans-serif;line-height:1.7}pre{background:#f5f5f5;padding:16px;border-radius:4px;overflow-x:auto}code{background:#f0f0f0;padding:2px 6px;border-radius:3px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px 12px}th{background:#f5f5f5}blockquote{border-left:4px solid #ddd;margin:0;padding:0 16px;color:#666}img{max-width:100%}</style></head><body>${h}</body></html>`;FileService.saveHtml(full,activeTab.fileName.replace(/\.(md|txt)$/i,'.html'));showMessage('HTMLエクスポート完了');setShowExportMenu(false)};
  const{progressModal,setProgressModal,setPdfRenderModal,setExportPreview}=React.useContext(UIContext);
  const handleExportPdf=async()=>{
    if(!activeTab)return;
    setShowExportMenu(false);
    const safeFileBaseName=(name)=>{
      return String(name||'untitled')
        .replace(/\.(md|txt|markdown)$/i,'')
        .replace(/[\\/:*?"<>|]/g,'_')
        .trim()||'untitled';
    };
    const pdfFileName=`${safeFileBaseName(activeTab.fileName)}.pdf`;
    const pdfQuality=profile?.settings?.pdfQuality||'standard';
    setProgressModal({
      phase:'pdf-single-setup',
      current:0,
      total:1,
      fileName:pdfFileName,
      format:'PDF',
      status:'PDF出力を準備中...',
      percent:0,
      fileInfo:{
        current:1,
        total:1,
        name:pdfFileName
      },
      pageInfo:null
    });
    try{
      const onPdfProgress=(p)=>{
        const pageCurrent=p?.pageInfo?.current||0;
        const pageTotal=p?.pageInfo?.total||0;
        const pagePercent=pageTotal
          ?Math.round((pageCurrent/pageTotal)*100)
          :typeof p?.percent==='number'
            ?p.percent
            :0;
        setProgressModal({
          phase:pageTotal?'pdf-single-pages':'pdf-single-setup',
          current:1,
          total:1,
          fileName:pdfFileName,
          format:'PDF',
          status:p?.message||'PDF生成中...',
          percent:pagePercent,
          fileInfo:{current:1,total:1,name:pdfFileName},
          pageInfo:pageTotal?{current:pageCurrent,total:pageTotal,percent:pagePercent}:null
        });
      };
      const pdfBlob=pdfQuality==='hybrid'
        ?await generateHybridPdf(activeTab.text,{fileName:pdfFileName,onProgress:onPdfProgress})
        :await ExportService.generatePdfBlob(activeTab.text,{
          fileName:pdfFileName,
          pdfQuality,
          onProgress:onPdfProgress
        });
      FileService.saveBlob(pdfBlob,pdfFileName);
      setProgressModal({
        phase:'pdf-single-done',
        current:1,
        total:1,
        fileName:pdfFileName,
        format:'PDF',
        status:'PDF出力が完了しました',
        percent:100,
        fileInfo:{
          current:1,
          total:1,
          name:pdfFileName
        },
        pageInfo:null
      });
      setTimeout(()=>setProgressModal(null),1500);
      showMessage('PDF出力完了');
    }catch(e){
      console.error('PDF export failed:',e);
      setProgressModal({
        phase:'pdf-single-error',
        current:0,
        total:1,
        fileName:pdfFileName,
        format:'PDF',
        status:'PDF出力に失敗しました: '+(e?.message||e),
        percent:0,
        error:e?.message||String(e)
      });
      showMessage('PDF出力に失敗: '+(e?.message||e),'error');
    }
  };
  const handleExportWord=async()=>{
    if(!activeTab)return;setShowExportMenu(false);
    setProgressModal({current:0,total:1,fileName:activeTab.fileName,format:'Word',status:'ライブラリ読み込み中...'});
    try{
      const h=MarkdownService.parse(activeTab.text);
      await ExportService.generateWord(h,{fileName:activeTab.fileName.replace(/\.(md|txt)$/i,'.docx')});
      setProgressModal({current:1,total:1,fileName:'',format:'Word',status:'完了'});
      setTimeout(()=>setProgressModal(null),1500);
      showMessage('Word出力完了');
    }catch(e){setProgressModal(null);showMessage('Word出力に失敗: '+e.message,'error')}
  };
  const handleExportExcel=async()=>{
    if(!activeTab)return;setShowExportMenu(false);
    setProgressModal({current:0,total:1,fileName:activeTab.fileName,format:'Excel',status:'ライブラリ読み込み中...'});
    try{
      await ExportService.generateExcel(activeTab.text,{fileName:activeTab.fileName.replace(/\.(md|txt)$/i,'.xlsx')});
      setProgressModal({current:1,total:1,fileName:'',format:'Excel',status:'完了'});
      setTimeout(()=>setProgressModal(null),1500);
      showMessage('Excel出力完了');
    }catch(e){setProgressModal(null);showMessage('Excel出力に失敗: '+e.message,'error')}
  };
  // Listen for Ctrl+P custom event
  React.useEffect(()=>{const h=()=>setShowPdfSettings(true);document.addEventListener('app-print',h);return()=>document.removeEventListener('app-print',h)});
  const handleFullscreen=()=>{if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});setIsFullscreen(true)}else{document.exitFullscreen().catch(()=>{});setIsFullscreen(false)}};
  const themeIcon=mode==='dark'?'🌙':mode==='light'?'☀️':'🖥️';
  const btn={background:'none',border:'none',color:c.appBarText,cursor:'pointer',padding:'4px 8px',borderRadius:4,fontSize:isXs?14:16,display:'flex',alignItems:'center',gap:2,position:'relative'};

      <input ref={fileRef} type="file" accept=".md,.txt,.markdown" multiple style={{display:'none'}} onChange={handleFileChange}/>
      <button style={btn} onClick={handleOpen} title="開く">📂</button>

        <div onClick={handleExportWord} style={{padding:'8px 16px',cursor:'pointer',color:c.editorText,fontSize:13,display:'flex',gap:8,alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.background=c.hoverBg} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>📝 Wordファイル出力</div>

        <div style={{height:1,background:c.border,margin:'4px 0'}}/>
        <div onClick={()=>{if(!activeTab)return;FileService.save(activeTab.text,activeTab.fileName);showMessage('MD出力完了');setShowExportMenu(false)}} style={{padding:'8px 16px',cursor:'pointer',color:c.editorText,fontSize:13,display:'flex',gap:8,alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.background=c.hoverBg} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>📋 Markdownファイル出力</div>

// --- Toolbar ---
function Toolbar(){
  const c=useThemeColors();const{activeTab,activeTabId,updateTab}=React.useContext(EditorContext);
  const[width,setWidth]=React.useState(window.innerWidth);
  React.useEffect(()=>{const h=()=>setWidth(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h)},[]);
  const isXs=width<600;
  const ins=React.useCallback((before,after,ph)=>{const ta=document.getElementById('editor-textarea');if(!ta||!activeTab)return;const s=ta.selectionStart,e=ta.selectionEnd;const sel=activeTab.text.substring(s,e)||ph||'';const nt=activeTab.text.substring(0,s)+before+sel+(after||'')+activeTab.text.substring(e);updateTab(activeTabId,{text:nt});setTimeout(()=>{ta.focus();ta.selectionStart=s+before.length;ta.selectionEnd=s+before.length+sel.length},0)},[activeTab,activeTabId,updateTab]);
  const allBtns=[
    {l:'B',t:'太字',fn:()=>ins('**','**','テキスト'),g:'fmt'},
    {l:'I',t:'斜体',fn:()=>ins('*','*','テキスト'),g:'fmt'},
    {l:'S',t:'取消線',fn:()=>ins('~~','~~','テキスト'),s:{textDecoration:'line-through'},g:'fmt'},
    {l:'|',g:'sep'},
    {l:'H1',t:'見出し1',fn:()=>ins('# ','','見出し'),g:'head'},
    {l:'H2',t:'見出し2',fn:()=>ins('## ','','見出し'),g:'head'},
    {l:'H3',t:'見出し3',fn:()=>ins('### ','','見出し'),g:'head'},
    {l:'|',g:'sep'},
    {l:'🔗',t:'リンク',fn:()=>ins('[','](url)','テキスト'),g:'ins'},
    {l:'🖼',t:'画像',fn:()=>ins('![','](url)','alt'),g:'ins'},
    {l:'<>',t:'コード',fn:()=>ins('`','`','code'),g:'code'},
    {l:'```',t:'コードブロック',fn:()=>ins('```\n','\n```','code'),g:'code'},
    {l:'|',g:'sep'},
    {l:'☰',t:'リスト',fn:()=>ins('- ','','項目'),g:'list'},
    {l:'☑',t:'チェック',fn:()=>ins('- [ ] ','','項目'),g:'list'},
    {l:'>',t:'引用',fn:()=>ins('> ','','引用'),g:'list'},
    {l:'田',t:'テーブル',fn:()=>ins('| 列1 | 列2 |\n|------|------|\n| ',' | |\n','データ'),g:'tbl'},
    {l:'—',t:'水平線',fn:()=>ins('\n---\n','',''),g:'tbl'},
    {l:'|',g:'sep'},
    {l:'📊',t:'Mermaid フローチャート',fn:()=>ins('```mermaid\ngraph TD\n    A[開始] --> B{条件分岐}\n    B -->|Yes| C[処理A]\n    B -->|No| D[処理B]\n    C --> E[終了]\n    D --> E\n','```\n',''),g:'ext'},
    {l:'📈',t:'Mermaid シーケンス図',fn:()=>ins('```mermaid\nsequenceDiagram\n    参加者A->>参加者B: メッセージ\n    参加者B-->>参加者A: 応答\n','```\n',''),g:'ext'},
    {l:'🔢',t:'KaTeX 数式',fn:()=>ins('$$\n','\\nE = mc^2\n$$\n',''),g:'ext'},
  ];
  // On xs, show only essential buttons
  const btns=isXs?allBtns.filter(b=>['fmt','sep'].includes(b.g)||b.l==='🔗'||b.l==='<>'||b.l==='☰'):allBtns;

  const{showMessage}=React.useContext(UIContext);
  const[capturing,setCapturing]=React.useState(false);
  const capturePreview=React.useCallback(async(full)=>{
    const el=document.querySelector('.print-area');
    if(!el||!window.html2canvas)return;
    setCapturing(true);
    try{
      const opts={useCORS:true,scale:2,scrollX:0};
      if(full){opts.scrollY=0;opts.height=el.scrollHeight}else{opts.scrollY=-el.scrollTop;opts.windowHeight=el.clientHeight}
      const canvas=await html2canvas(el,opts);
      canvas.toBlob(async(blob)=>{
        if(!blob){showMessage('キャプチャ失敗','error');setCapturing(false);return}
        try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);showMessage(full?'📋 全体をコピー':'📋 表示範囲をコピー')}
        catch{const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=full?'preview-full.png':'preview.png';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showMessage('📥 画像をダウンロード')}
        setCapturing(false);
      },'image/png');
    }catch{showMessage('キャプチャ失敗','error');setCapturing(false)}
  },[showMessage]);

  const tbBtn={background:'none',border:'none',color:c.tabActiveText,cursor:'pointer',padding:'4px 8px',borderRadius:3,fontSize:12,lineHeight:1};

  return(<div className="no-print" style={{display:'flex',gap:2,padding:'3px 8px',background:c.tabBg,borderBottom:`1px solid ${c.border}`,flexShrink:0,alignItems:'center'}}>
    {btns.map((b,i)=>b.l==='|'?<span key={i} style={{width:1,height:16,background:c.border,margin:'0 3px'}}/>:
      <button key={i} onClick={b.fn} title={b.t} style={{background:'none',border:'none',color:c.tabActiveText,cursor:'pointer',padding:'4px 8px',borderRadius:3,fontSize:12,fontWeight:b.l.length<=2?700:400,fontFamily:'monospace',lineHeight:1,...(b.s||{})}}>{b.l}</button>
    )}
    <div style={{flex:1}}/>
    <span style={{width:1,height:16,background:c.border,margin:'0 3px'}}/>
    <button onClick={()=>{const el=document.querySelector('.preview-content');if(el){el.innerHTML=el.innerHTML}showMessage('プレビュー再描画')}} style={tbBtn} title="プレビュー再描画">🔄</button>
    <button onClick={()=>capturePreview(false)} disabled={capturing} style={tbBtn} title="表示範囲を画像コピー">{capturing?'⏳':'📷'}</button>
    <button onClick={()=>capturePreview(true)} disabled={capturing} style={tbBtn} title="全体を画像コピー">{capturing?'⏳':'🖼️'}</button>
  </div>);
}

// --- TabBar ---
function TabBar(){
  const c=useThemeColors();
  const{tabs,activeTabId,setActiveTabId,closeTab,newTab,renameTab,reorderTab}=React.useContext(EditorContext);
  const{showConfirm}=React.useContext(UIContext);
  const[editingId,setEditingId]=React.useState(null);
  const[editValue,setEditValue]=React.useState('');
  const[dragId,setDragId]=React.useState(null);
  const[dragOverId,setDragOverId]=React.useState(null);
  const inputRef=React.useRef(null);

  const handleClose=(e,tid)=>{
    e.stopPropagation();
    const tab=tabs.find(t=>t.id===tid);
    // Skip confirmation for workspace-owned tabs (data is preserved in workspace)
    if(tab&&tab.isDirty){
      const workspaces=StorageService.get('workspaces',[]);
      const inWorkspace=workspaces.some(ws=>(ws.tabs||[]).some(wt=>wt.id===tab.id||wt.fileName===tab.fileName));
      if(inWorkspace){closeTab(tid);return}
      showConfirm(`"${tab.fileName}" は未保存です。閉じますか？`,()=>closeTab(tid),{title:'未保存の変更',okLabel:'閉じる',danger:true});
      return;
    }
    closeTab(tid);
  };

  const startEdit=(e,tab)=>{e.stopPropagation();setEditingId(tab.id);setEditValue(tab.fileName);setTimeout(()=>{if(inputRef.current){inputRef.current.focus();inputRef.current.select()}},0)};
  const commitEdit=()=>{if(editingId){renameTab(editingId,editValue||'untitled.md');setEditingId(null)}};
  const handleKeyDown=(e)=>{if(e.key==='Enter')commitEdit();else if(e.key==='Escape'){setEditingId(null)}};

  // Drag handlers
  const handleDragStart=(e,tabId)=>{setDragId(tabId);e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',tabId)};

// --- Preview ---
function Preview({html}){
  const c=useThemeColors();const ref=React.useRef(null);
  const{resolved}=React.useContext(ThemeContext);
  const mermaidTheme=resolved==='dark'?'dark':'default';
  const renderIdRef=React.useRef(0);
  const mermaidSourcesRef=React.useRef([]);

  // Extract mermaid sources from raw HTML before React renders it
  // This avoids the problem of data-source attributes being lost on re-render
  React.useMemo(()=>{
    const sources=[];
    const regex=/<div class="mermaid">([^]*?)<\/div>/gi;
    let match;
    while((match=regex.exec(html))!==null){
      // Unescape HTML entities back to original mermaid source
      const decoded=match[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
      sources.push(decoded);
    }
    mermaidSourcesRef.current=sources;
  },[html]);

  React.useEffect(()=>{
    if(!ref.current)return;
    const divs=ref.current.querySelectorAll('.mermaid');
    if(divs.length===0||!window.mermaid)return;
    const sources=mermaidSourcesRef.current;
    if(sources.length===0)return;
    renderIdRef.current++;
    const rid=renderIdRef.current;
    try{
      mermaid.initialize({startOnLoad:false,theme:mermaidTheme,flowchart:{nodeSpacing:50,rankSpacing:60,padding:20,useMaxWidth:true,htmlLabels:true},sequence:{useMaxWidth:true},themeVariables:mermaidTheme==='dark'?{primaryColor:'#333',primaryTextColor:'#e0e0e0',lineColor:'#666',secondaryColor:'#252526'}:{}});
      divs.forEach((d,i)=>{
        const src=sources[i];
        if(!src)return;
        const id='mm-'+rid+'-'+i+'-'+Date.now();
        d.removeAttribute('data-processed');
        d.innerHTML=src;
        mermaid.render(id,src).then(({svg})=>{
          if(renderIdRef.current===rid){d.innerHTML=svg;d.setAttribute('data-processed','true')}
        }).catch(err=>{console.warn('Mermaid render error:',err);d.innerHTML='<pre style="color:#e57373;padding:8px;font-size:12px">Mermaid描画エラー: '+escapeHtml(String(err))+'</pre>'});
      });
    }catch(e){console.warn('Mermaid init error:',e)}
  },[html,mermaidTheme]);

const css=`.preview-content{font-family:'Segoe UI',Roboto,sans-serif;line-height:1.7;color:${c.previewText};max-width:800px;margin:0 auto}.preview-content h1{font-size:2em;border-bottom:2px solid ${c.border};padding-bottom:8px;margin:24px 0 16px}.preview-content h2{font-size:1.5em;border-bottom:1px solid ${c.border};padding-bottom:6px;margin:20px 0 12px}.preview-content h3{font-size:1.25em;margin:16px 0 8px}.preview-content p{margin:0 0 12px}.preview-content a{color:${c.primary}}.preview-content pre{background:${c.codeBg};padding:16px;border-radius:6px;overflow-x:auto;margin:12px 0}.preview-content code{background:${c.codeBg};padding:2px 6px;border-radius:3px;font-size:.9em}.preview-content pre code{background:none;padding:0}.preview-content blockquote{border-left:4px solid ${c.primary};margin:12px 0;padding:4px 16px;background:${c.codeBg};border-radius:0 4px 4px 0}.preview-content table{border-collapse:collapse;width:100%;margin:12px 0}.preview-content th,.preview-content td{border:1px solid ${c.border};padding:8px 12px;text-align:left}.preview-content th{background:${c.codeBg};font-weight:600}.preview-content tr:nth-child(even){background:${c.codeBg}}.preview-content img{max-width:100%;border-radius:4px}.preview-content hr{border:none;border-top:2px solid ${c.border};margin:24px 0}.preview-content ul,.preview-content ol{padding-left:24px;margin:8px 0}.preview-content li{margin:4px 0}.preview-content input[type=checkbox]{margin-right:6px}.preview-content .katex-block{overflow-x:auto;padding:8px 0}.preview-content .mermaid{text-align:center;margin:16px 0;overflow-x:auto;overflow-y:visible;padding:8px 0}.preview-content .mermaid svg{max-width:100%;height:auto!important;min-height:40px;overflow:visible}.preview-content .mermaid .node rect,.preview-content .mermaid .node circle,.preview-content .mermaid .node polygon{rx:5;ry:5}.preview-content .mermaid .nodeLabel,.preview-content .mermaid .label{font-size:14px;line-height:1.4}.preview-content .mermaid .edgeLabel{font-size:0.85em}`;
  return(
    <div ref={ref} className="print-area" style={{flex:1,overflow:'auto',padding:'16px 20px',background:c.previewBg}}>
      <style>{css}</style>
      <div className="preview-content" dangerouslySetInnerHTML={{__html:sanitizeHtml(html)}}/>
    </div>
  );
}

  const doReplace=(all)=>{if(!search||!activeTab)return;try{const f=caseSens?(all?'g':''):(all?'gi':'i');const re=useRegex?new RegExp(search,f):new RegExp(search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),f);const nt=activeTab.text.replace(re,replace);updateTab(activeTabId,{text:nt});showMessage(all?`${mc}件置換`:'1件置換')}catch{showMessage('正規表現エラー','error')}};

// --- Storage Manager Dialog ---
function StorageManagerDialog(){
  const c=useThemeColors();
  const{showStorageMgr,setShowStorageMgr,showMessage,showConfirm}=React.useContext(UIContext);
  const{active:profile}=React.useContext(ProfileContext);
  const[tab,setTab]=React.useState('overview'); // 'overview' | 'files' | 'trash' | 'local'
  const[files,setFiles]=React.useState([]);
  const[trash,setTrash]=React.useState([]);
  const[lsUsage,setLsUsage]=React.useState(null);
  const[idbEst,setIdbEst]=React.useState(null);
  const[loading,setLoading]=React.useState(false);
  const[selectedFiles,setSelectedFiles]=React.useState(new Set());
  const[selectedTrash,setSelectedTrash]=React.useState(new Set());

  const fmt=(bytes)=>{
    if(bytes===null||bytes===undefined)return'—';
    if(bytes<1024)return bytes+'B';
    if(bytes<1024*1024)return(bytes/1024).toFixed(1)+'KB';
    return(bytes/1024/1024).toFixed(2)+'MB';
  };

  const refresh=React.useCallback(async()=>{
    setLoading(true);
    try{
      const f=await IDBService.listFiles();setFiles(f.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)));
      const t=await IDBService.listTrash();setTrash(t);
      setLsUsage(StorageService.getUsage());
      if(navigator.storage&&navigator.storage.estimate){
        const est=await navigator.storage.estimate();
        setIdbEst(est);
      }
    }catch{}
    setLoading(false);
  },[]);

  React.useEffect(()=>{if(showStorageMgr)refresh()},[showStorageMgr]);

  const m=useModalStyles('lg');

  if(!showStorageMgr)return null;

  const tabBtn=(id)=>({padding:'8px 16px',border:'none',borderBottom:tab===id?`2px solid ${c.primary}`:'2px solid transparent',background:'transparent',color:tab===id?c.primary:c.statusText,cursor:'pointer',fontSize:13,fontWeight:tab===id?600:400});
  const cardStyle=m.card;
  const itemRow={display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:6,fontSize:13,color:c.editorText};
  const actionBtn=m.btnSmall;

  const totalFiles=files.reduce((s,f)=>(s+(f.size||f.text?.length||0)),0);
  const totalTrash=trash.reduce((s,t)=>(s+(t.size||t.text?.length||0)),0);
  const retDays=profile?.settings?.trashRetentionDays||30;

  const handleDeleteFiles=async(ids)=>{
    const names=files.filter(f=>ids.has(f.id)).map(f=>f.name).join(', ');
    showConfirm(`${ids.size}件のファイルを削除しますか？\n${names.length>60?names.substring(0,60)+'...':names}`,async()=>{
      for(const id of ids)await IDBService.deleteFile(id).catch(()=>{});
      setSelectedFiles(new Set());
      refresh();
      showMessage(`${ids.size}件を削除しました`);
    },{title:'ファイル削除',okLabel:'削除',danger:true});
  };

  const handleDeleteTrash=async(ids)=>{
    showConfirm(`${ids.size}件を完全に削除しますか？\nこの操作は取り消せません。`,async()=>{
      for(const id of ids)await IDBService.deleteFromTrash(id).catch(()=>{});
      setSelectedTrash(new Set());
      refresh();
      showMessage(`${ids.size}件を完全削除しました`);
    },{title:'完全削除',okLabel:'削除',danger:true});
  };

  const handleEmptyTrash=()=>{
    if(trash.length===0)return;
    showConfirm(`ゴミ箱を空にしますか？\n${trash.length}件（${fmt(totalTrash)}）が完全に削除されます。`,async()=>{
      for(const t of trash)await IDBService.deleteFromTrash(t.id).catch(()=>{});
      refresh();
      showMessage('ゴミ箱を空にしました');
    },{title:'ゴミ箱を空にする',okLabel:'空にする',danger:true});
  };

  const handlePurgeExpired=async()=>{
    const count=await IDBService.purgeExpiredTrash(retDays);
    refresh();
    showMessage(count>0?`${count}件の期限切れアイテムを削除しました`:'期限切れアイテムはありません');
  };

  const handleClearLocalStorage=()=>{
    showConfirm('LocalStorage（mde_*）を全てクリアしますか？\n自動保存データ、設定、ワークスペースが失われます。',()=>{

        {/* Content */}

            <div style={cardStyle}>

                  <div style={{fontSize:11,color:c.statusText}}>{fmt(totalFiles)}</div>
                </div>
                <div style={{background:c.paper,borderRadius:6,padding:12,border:`1px solid ${c.border}`}}>
                  <div style={{fontSize:11,color:c.statusText,marginBottom:4}}>🗑 ゴミ箱</div>
                  <div style={{fontSize:20,fontWeight:600,color:trash.length>0?'#ff9800':c.editorText}}>{trash.length}<span style={{fontSize:12,fontWeight:400,color:c.statusText}}> 件</span></div>
                  <div style={{fontSize:11,color:c.statusText}}>{fmt(totalTrash)} · 保持{retDays}日</div>
                </div>
                <div style={{background:c.paper,borderRadius:6,padding:12,border:`1px solid ${c.border}`}}>
                  <div style={{fontSize:11,color:c.statusText,marginBottom:4}}>💾 LocalStorage</div>
                  <div style={{fontSize:20,fontWeight:600,color:lsUsage&&lsUsage.percent>80?c.danger:c.editorText}}>{lsUsage?lsUsage.percent.toFixed(1):'—'}<span style={{fontSize:12,fontWeight:400,color:c.statusText}}>%</span></div>
                  <div style={{fontSize:11,color:c.statusText}}>{lsUsage?fmt(lsUsage.used):''} / 5MB</div>
                </div>
                <div style={{background:c.paper,borderRadius:6,padding:12,border:`1px solid ${c.border}`}}>
                  <div style={{fontSize:11,color:c.statusText,marginBottom:4}}>🗄 IndexedDB 全体</div>
                  <div style={{fontSize:20,fontWeight:600,color:c.editorText}}>{idbEst?fmt(idbEst.usage):'—'}</div>
                  <div style={{fontSize:11,color:c.statusText}}>{idbEst?'上限 '+fmt(idbEst.quota):''}</div>
                </div>
              </div>
            </div>
            <div style={cardStyle}>
              <div style={{fontSize:14,fontWeight:600,color:c.editorText,marginBottom:12}}>クイック操作</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                <button onClick={handlePurgeExpired} style={actionBtn(c.primary)}>🧹 期限切れゴミ箱を削除</button>
                <button onClick={handleEmptyTrash} style={actionBtn('#ff9800')}>🗑 ゴミ箱を空にする</button>
                <button onClick={handleClearLocalStorage} style={actionBtn(c.danger)}>⚠️ LocalStorageクリア</button>
