  <!--
Workflow Mock Launcher / Runtime Constitution

This file is a self-contained single-file mock launcher framework.
Single HTML is the product boundary.

Core Identity:
- CDN / Babel / React / MUI are the dynamic runtime foundation.
- LAUNCHER is the framework body: scenario control, viewport, step navigation, postMessage, and HTML/PNG export.
- CORE is the 3-screen workflow app: start, scan/register, confirm/output.
- THEME is the swappable business layer: BUSINESS definitions, master data, validation rules, and scenarios.
- LAUNCHER and CORE are reusable assets. THEME is the only layer replaced when targeting a different domain.

Architecture:
- LAUNCHER drives CORE via iframe + postMessage (APPLY_MOCK_STATE).
- CORE renders dynamically from THEME definitions; it owns no business-specific logic.
- THEME defines BUSINESS fields, master constants, validateItem rules, and MOCK_SCENARIOS.
- DynamicField renders any field declared in BUSINESS.itemFields / startFields without CORE changes.
- ?embedded=1 in URL switches the entry point from LauncherApp to WorkflowApp (standalone mode).

Runtime Principles:
- Keep the single-file form; do not convert to npm/build structure by default.
- Keep boot light: CDN loads, Babel transform, ReactDOM.createRoot, done.
- Keep LAUNCHER state local to LauncherApp; do not leak into CORE or THEME.
- Keep CORE state in React hooks + localStorage (storageKey); treat localStorage as a compact cache.
- Keep postMessage payloads small and typed (type: "APPLY_MOCK_STATE").
- Scenario state injected via postMessage must be applied atomically (screen + context + entries together).
- HTML/PNG export (current, scenario, full list, and launcher variants) must remain functional after any THEME change.

Ownership Rules:
- APP_CONFIG owns the storage key, connection mode, API endpoint stub, autoplay, and export timing.
- SCREEN / VIEW_MODE / VIEWPORTS / VIEWPORT_CONFIG own stable UI policy constants.
- BUSINESS owns per-workflow field declarations, labels, output actions, and complete checks.
- PRODUCTS / master constants own the domain data fixtures for the current THEME.
- validateItem owns all business-rule validation; getStatus derives display state from it.
- createDefaultContext / createDefaultItem own safe state initialization from THEME definitions.
- makeScenario / MOCK_SCENARIOS own the launcher scenario registry for the current THEME.
- DynamicField owns field-to-component mapping; new field types are added here only.
- WorkflowApp owns screen routing, localStorage sync, and postMessage reception.
- LauncherApp owns scenario selection, step control, viewport switching, and HTML/PNG export.
- App owns the embedded/launcher entry-point split; nothing else.

THEME Replacement Rules:
- To target a new domain: replace BUSINESS, PRODUCTS, master constants, validateItem, and MOCK_SCENARIOS.
- Do not touch LAUNCHER, CORE components, APP_CONFIG, or SCREEN constants during a THEME swap.
- New field types required by the new THEME must be added to DynamicField before use.
- Preserve the storageKey value unless intentionally migrating stored state.

Change Rule:
Observe -> Plan -> Do -> Check -> Act -> Lock.

Keep this block short.
Update only when runtime identity, architecture, ownership, boot policy,
storage boundary, postMessage contract, THEME boundary, or export behavior changes.
-->

    /**

     */

    // ============================================================
    // [LAUNCHER] 設定
    // ============================================================

    const APP_CONFIG = {
      storageKey: "unified_mobile_workflow_mock_v2",
      connectionMode: "mock",

    // [LAUNCHER] 画面ID・表示モード・ビューポート設定
    const SCREEN = { START: "start", SCAN: "scan", CONFIRM: "confirm" };
    const VIEW_MODE = { CARDS: "cards", TABLE: "table" };
    const VIEWPORTS = { DESKTOP: "desktop", TABLET: "tablet", MOBILE: "mobile" };
    const VIEWPORT_CONFIG = {

    // ============================================================
    // [THEME] 業務定義（スーパーマーケット店頭 6業務）
    // ============================================================
    // BUSINESS・PRODUCTS・マスタ定数・シナリオがテーマ層。

    // ============================================================

    const BUSINESS = {

      returnGoods: {

        helpSteps: ["商品をスキャン", "実売価を入力", "POS登録売価との差異を確認", "作業確定して実績を確認"],
        defaultValues: { quantity: 1 }
      },
      pop: {

        purpose: "商品のPOP発行キューをPOPシステムへ送る",
        userPurpose: "売場に出すPOPの枚数、売価、レイアウトを確認します。",
        startFields: ["department", "layout", "printer"],
        itemFields: ["sku", "quantity", "displayPrice", "layout"],
        quantityLabel: "枚数", amountLabel: "POP売価",
        outputActions: ["pdf", "print", "complete"],
        completeChecks: ["POP内容確認", "売場差し替え", "旧POP回収"],
        helpSteps: ["商品をスキャン", "枚数・POP売価・レイアウトを確認", "作業確定", "POPシステムへの発行キューを確認"],
        defaultValues: { layout: "A4_1面", quantity: 1 }
      },
      label: {
        label: "継承ラベル", shortLabel: "ラベル", icon: "label", color: "secondary",
        purpose: "商品の産地を印字したラベルを発行する",
        userPurpose: "商品に貼る産地ラベルの内容と枚数を確認します。",
        startFields: ["department", "printer"],
        itemFields: ["sku", "traceCode", "origin", "quantity"],
        quantityLabel: "枚数", amountLabel: "枚数",
        outputActions: ["print", "complete"],
        completeChecks: ["ラベル印刷", "原料と一緒に保管", "不要ラベル破棄"],
        helpSteps: ["商品をスキャン", "個体識別番号をスキャンまたは産地を入力", "枚数を確認", "ラベル発行"],
        defaultValues: { quantity: 1, origin: "" }
      }
    };

    const PRODUCTS = [
      // [THEME] 商品マスタ（スーパー7品）
      { sku: "P-1001", barcode: "4901000000012", name: "国産牛 肩ロース うすぎり", department: "精肉", currentPrice: 698 },
      { sku: "P-1002", barcode: "4901000000029", name: "三元豚 ロース 生姜焼き用", department: "精肉", currentPrice: 398 },
      { sku: "P-1003", barcode: "4901000000036", name: "若鶏もも肉 唐揚げ用", department: "精肉", currentPrice: 288 },
      { sku: "P-2001", barcode: "4902000000019", name: "まぐろ切落し", department: "鮮魚", currentPrice: 598 },
      { sku: "P-3001", barcode: "4903000000016", name: "ミックスサラダ", department: "惣菜", currentPrice: 298 },

      { sku: "P-5001", barcode: "4905000000010", name: "バナナ 1袋", department: "青果", currentPrice: 198 }
    ];

    const DEPARTMENTS = ["青果", "鮮魚", "精肉", "惣菜", "日配", "グロサリー"]; // [THEME]
    const LAYOUTS = ["A4_1面", "A4_4面", "A5", "棚札", "値下POP"];               // [THEME]
    const PRINTERS = ["売場プリンター01", "バックヤード01", "ラベルプリンター01"];  // [THEME]
    const REASONS = ["賞味期限切れ", "品質劣化", "売切促進", "競合対応", "本部指示", "売価訂正"]; // [THEME]
    const ADJUSTMENT_TYPES = ["廃棄", "値下", "値上", "本部指示"];                // [THEME]
    const SALE_TYPES = ["通売", "特売", "マネキン販売"];                           // [THEME]
    const ORIGINS = ["国産", "北海道産", "青森県産", "宮城県産", "茨城県産", "千葉県産", "鹿児島県産", "オーストラリア産", "アメリカ産"]; // [THEME]

    // ============================================================
    // [CORE] ユーティリティ関数（テーマに依存しない汎用処理）
    // ============================================================

    function todayText() {
      const date = new Date();
      const pad = number => String(number).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function createSessionName(businessKey = "work") {
      const date = new Date();
      const pad = number => String(number).padStart(2, "0");
      return `${(BUSINESS[businessKey]?.shortLabel || "作業")}-${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function yen(value) {
      return new Intl.NumberFormat("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 }).format(Number(value || 0));
    }
    function signedYen(value) {
      const numericValue = Number(value || 0);
      if (numericValue > 0) return `+${yen(numericValue)}`;
      return yen(numericValue);
    }

    function inferOriginFromTraceCode(traceCode) {
      const value = String(traceCode || "").trim().toUpperCase();
      if (!value) return "";
      if (value.startsWith("JP-01")) return "北海道産";
      if (value.startsWith("JP-02")) return "青森県産";
      if (value.startsWith("JP-04")) return "宮城県産";
      if (value.startsWith("JP-08")) return "茨城県産";
      if (value.startsWith("JP-12")) return "千葉県産";
      if (value.startsWith("JP-46")) return "鹿児島県産";
      if (value.startsWith("JP-")) return "国産";
      if (value.startsWith("AU-")) return "オーストラリア産";
      if (value.startsWith("US-")) return "アメリカ産";
      return "";
    }

    function normalizeCode(value) {
      return String(value || "").trim().replace(/[Ａ-Ｚａ-ｚ０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, "").toUpperCase();
    }

    function findProduct(value) {
      const keyword = normalizeCode(value);
      if (!keyword) return null;
      return PRODUCTS.find(product => [product.sku, product.barcode, product.name].some(text => normalizeCode(text).includes(keyword))) || null;
    }

    // ============================================================
    // [CORE] 状態ファクトリ・バリデーション（THEME定義を参照）
    // ============================================================

    function createDefaultContext(businessKey = "price") {
      const business = BUSINESS[businessKey] || BUSINESS.price;
      return {
        businessKey,
        workGroup: createSessionName(businessKey),
        department: "精肉",
        businessDate: todayText(),
        startDate: todayText(),
        endDate: todayText(),
        layout: business.defaultValues.layout || "A4_1面",
        printer: "売場プリンター01",
        salesFloor: "精肉平台",
        sequenceNo: business.defaultValues.sequenceNo || "001",
        useCountSheet: business.defaultValues.useCountSheet ?? false,
        adjustmentType: business.defaultValues.adjustmentType || "廃棄",
        reason: business.defaultValues.reason || "売切促進"
      };
    }

    function createDefaultItem(businessKey = "price", context = createDefaultContext(businessKey)) {
      const business = BUSINESS[businessKey] || BUSINESS.price;
      return {
        id: null,
        sku: "",
        barcode: "",
        productName: "",
        workGroup: context.workGroup || "セッション1",
        department: context.department,
        currentPrice: 0,
        quantity: business.defaultValues.quantity || 1,
        beforePrice: "",
        afterPrice: context.adjustmentType === "廃棄" ? 0 : "",
        displayPrice: "",
        layout: context.layout || "A4_1面",
        traceCode: "",
        origin: business.defaultValues.origin || "",
        sequenceNo: context.sequenceNo || "001",
        saleType: business.defaultValues.saleType || "通売",
        ticketChanged: business.defaultValues.ticketChanged || false
      };
    }

    function createEntry(productSku, businessKey, overrides = {}) {
      const product = PRODUCTS.find(item => item.sku === productSku) || PRODUCTS[0];
      const context = createDefaultContext(businessKey);
      const item = createDefaultItem(businessKey, context);
      const base = {
        ...item,
        id: overrides.id || `E-${Date.now()}-${Math.random().toString(16).slice(2, 7)}`,
        sku: product.sku,
        barcode: product.barcode,
        productName: product.name,
        department: product.department,
        currentPrice: product.currentPrice,
        beforePrice: product.currentPrice,
        afterPrice: context.adjustmentType === "廃棄" ? 0 : Math.max(0, product.currentPrice - 50),
        displayPrice: product.currentPrice,
        quantity: 1
      };
      return { ...base, ...overrides };
    }

    function calcAmount(row, businessKey) {
      if (businessKey === "price") return Math.abs((Number(row.beforePrice || 0) - Number(row.afterPrice || 0)) * Number(row.quantity || 1));
      if (businessKey === "returnGoods") return Number(row.currentPrice || row.displayPrice || 0) * Number(row.quantity || 1);
      if (businessKey === "priceCheck") return Math.abs(Number(row.displayPrice || 0) - Number(row.currentPrice || 0));
      if (businessKey === "label") return Number(row.quantity || 1);
      return Number(row.displayPrice || row.currentPrice || row.beforePrice || 0) * Number(row.quantity || 1);
    }

    function calcImpact(row, context) {
      if (Number.isFinite(Number(row.correctionDeltaAmount))) return Number(row.correctionDeltaAmount);
      if (context.businessKey === "returnGoods") return -1 * Number(row.currentPrice || row.displayPrice || 0) * Number(row.quantity || 1);
      if (context.businessKey !== "price") return 0;
      return (Number(row.afterPrice || 0) - Number(row.beforePrice || 0)) * Number(row.quantity || 1);
    }

    function getMasterValueLabel(context) {
      if (context.businessKey === "priceCheck") return "POS登録売価";
      if (context.businessKey === "pop") return "現売価";
      return "マスタ";
    }

    function getInputValueLabel(context) {
      if (context.businessKey === "priceCheck") return "実売価";
      if (context.businessKey === "pop") return "POP売価";
      if (context.businessKey === "label") return "産地";
      return "入力";
    }

    function formatInputValue(row, context) {
      if (context.businessKey === "price") return yen(row.afterPrice);
      if (context.businessKey === "label") return row.origin || row.traceCode || "-";
      return yen(row.displayPrice || row.currentPrice);
    }

    function formatDecisionValue(row, context) {
      if (context.businessKey === "pop") return yen(row.displayPrice || row.currentPrice);
      if (context.businessKey === "label") return `${row.quantity || 1}枚`;
      if (context.businessKey === "price") return signedYen(calcImpact(row, context));
      return yen(calcAmount(row, context.businessKey));
    }

    function calcSummaryDecisionValue(entries, context) {
      if (context.businessKey === "pop" || context.businessKey === "label") return entries.reduce((sum, row) => sum + Number(row.quantity || 1), 0);
      if (context.businessKey === "price") return entries.reduce((sum, row) => sum + calcImpact(row, context), 0);
      return entries.reduce((sum, row) => sum + calcAmount(row, context.businessKey), 0);
    }

    function formatSummaryDecisionValue(value, context) {
      if (context.businessKey === "pop" || context.businessKey === "label") return `${value}枚`;
      if (context.businessKey === "price") return signedYen(value);
      return yen(value);
    }

    function isBlank(value) {
      return value === undefined || value === null || String(value).trim() === "";
    }

    function validateItem(row, context) {
      const errors = [];
      const businessKey = context.businessKey;
      if (row.excluded) return errors;
      if (row.duplicate) errors.push("重複登録");
      if (!row.sku) errors.push("商品未選択");
      const qty = Number(row.quantity || 0);
      if (["pop", "price", "label", "inventory", "returnGoods"].includes(businessKey) && (!Number.isFinite(qty) || qty <= 0)) errors.push(`${BUSINESS[businessKey].quantityLabel}は1以上`);
      if (businessKey === "pop") {
        if (isBlank(row.displayPrice)) errors.push("売価未入力");
        if (!isBlank(row.displayPrice) && row.sku && Number(row.displayPrice) !== Number(row.currentPrice)) errors.push("マスタ売価と印字売価が異なります");
      }
      if (businessKey === "price") {
        if (isBlank(row.beforePrice)) errors.push("前売価未入力");
        if (isBlank(row.afterPrice)) errors.push("後売価未入力");
        if (context.adjustmentType === "廃棄" && Number(row.afterPrice) !== 0) errors.push("廃棄の後売価は0円");
        if (context.adjustmentType === "値下" && Number(row.afterPrice) >= Number(row.beforePrice)) errors.push("値下は後売価＜前売価");
        if (context.adjustmentType === "値上" && Number(row.afterPrice) <= Number(row.beforePrice)) errors.push("値上は後売価＞前売価");
      }
      if (businessKey === "label") {
        if (!context.printer) errors.push("プリンター未選択");
        if (!String(row.traceCode || "").trim() && !String(row.origin || "").trim()) errors.push("個体識別番号または産地が必要");
      }
      if (businessKey === "inventory") {
        if (isBlank(row.displayPrice)) errors.push("売価未入力");
      }
      if (businessKey === "priceCheck" && row.sku && Number(row.displayPrice) !== Number(row.currentPrice)) errors.push("売価不一致");
      if (businessKey === "returnGoods" && !row.saleType) errors.push("販売区分未選択");
      return errors;
    }

    function getStatus(row, context) {
      if (row.excluded) return { label: "対象外", color: "default", helper: row.excludeReason || "確認対象外" };
      const errors = validateItem(row, context);
      if (errors.length) return { label: "要確認", color: "error", helper: errors.join(" / ") };
      if (context.businessKey === "priceCheck") return { label: "一致", color: "success", helper: "POS登録売価と一致" };
      return { label: "OK", color: "success", helper: "" };
    }

    function loadState() {
      try {
        const raw = window.localStorage.getItem(APP_CONFIG.storageKey);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function saveState(state) {
      try { window.localStorage.setItem(APP_CONFIG.storageKey, JSON.stringify(state)); } catch (error) { console.warn(error); }
    }

    function createDraftId() {
      return `D-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    }

    function createWorkflowSnapshot({ draftId, screen, context, entries, confirmedRecord, confirmedRecords = [] }) {
      const activeEntries = getActiveEntries(entries);
      return {
        draftId,
        status: confirmedRecord ? "confirmed" : "draft",
        screen,
        context,
        entries,
        activeEntryCount: activeEntries.length,
        confirmedRecord: confirmedRecord || null,
        confirmedRecords,
        savedAt: new Date().toISOString()
      };
    }

    async function syncWorkflowSnapshot(snapshot) {
      if (APP_CONFIG.connectionMode === "mock") {
        return { ok: true, mode: "mock", savedAt: snapshot.savedAt };
      }
      const endpoint = `${APP_CONFIG.apiBaseUrl || ""}${APP_CONFIG.apiEndpoint}`;
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(snapshot)
      });
      if (!response.ok) throw new Error(`Workflow sync failed: ${response.status}`);
      return { ok: true, mode: "server", savedAt: snapshot.savedAt };
    }

    function applyScenarioToState(payload = {}) {
      const context = { ...createDefaultContext(payload.businessKey || "price"), ...(payload.context || {}) };
      // 互換: シナリオが単一の businessDate を渡す場合、開始日/終了日に展開する。
      const legacyDate = payload.context && payload.context.businessDate;
      if (legacyDate) {
        if (!payload.context.startDate) context.startDate = legacyDate;
        if (!payload.context.endDate) context.endDate = legacyDate;
      }
      const entries = Array.isArray(payload.entries) ? payload.entries : [];
      const confirmedRecords = Array.isArray(payload.confirmedRecords) ? payload.confirmedRecords : (payload.confirmedRecord ? [payload.confirmedRecord] : []);
      if (payload.outputSearch !== undefined) context.outputSearch = payload.outputSearch;
      return {
        screen: payload.screen || SCREEN.START,
        context,
        entries,
        confirmedRecord: payload.confirmedRecord || null,
        confirmedRecords,
        openScanDrawer: Boolean(payload.openScanDrawer),
        screenshotModal: payload.screenshotModal || null,
        screenshotRevision: payload.screenshotRevision || payload.revision || null
      };
    }

    function createScenarioConfirmedRecord(businessKey, entries = [], context = createDefaultContext(businessKey)) {
      const activeCount = entries.filter(row => !row.deletedAt).length;
      const approvalStatus = "unapproved";
      const integrationState = createIntegrationState(businessKey, approvalStatus);
      return {
        recordId: `WF-SCENARIO-${businessKey}`,
        status: "confirmed",
        approvalStatus,
        approvedAt: null,
        syncState: integrationState,
        integrationTarget: getIntegrationTarget(businessKey),
        integrationState,
        integrationDate: null,
        registeredAt: new Date().toISOString(),
        businessKey,
        workGroup: context.workGroup || "セッション1",
        context: { ...context },
        entries: entries.filter(row => !row.deletedAt).map(row => ({ ...row })),
        entryCount: activeCount
      };
    }

    function createScenarioRecordVariant(record, overrides = {}) {
      if (!record) return null;
      const businessKey = record.businessKey || record.context?.businessKey || "price";
      const approvalStatus = overrides.approvalStatus || record.approvalStatus || "unapproved";
      const integrationState = overrides.integrationState || createIntegrationState(businessKey, approvalStatus);
      const approvedAt = approvalStatus === "approved" ? (overrides.approvedAt || record.approvedAt || new Date().toISOString()) : null;
      return {
        ...record,
        ...overrides,
        approvalStatus,
        approvedAt,
        syncState: integrationState,
        integrationState,
        integrationDate: overrides.integrationDate ?? (["linked", "printed"].includes(integrationState) ? todayText() : null),
        backendLinkedAt: integrationState === "linked" ? (overrides.backendLinkedAt || approvedAt || new Date().toISOString()) : null
      };
    }

    function createScenarioCorrectionRecord(sourceRecord, context) {
      if (!sourceRecord) return null;
      const sourceEntry = (sourceRecord.entries || []).find(row => !row.deletedAt);
      if (!sourceEntry) return null;
      const sourceContext = context || sourceRecord.context || createDefaultContext(sourceRecord.businessKey);
      const nextQuantity = sourceRecord.businessKey === "price"
        ? Math.max(1, Number(sourceEntry.quantity || 1) - 1)
        : Number(sourceEntry.quantity || 1) + 1;
      const correctionEntry = sourceRecord.businessKey === "price"
        ? { ...sourceEntry, quantity: nextQuantity, correctionScenarioNote: "数量減による値上げ訂正" }
        : { ...sourceEntry, quantity: nextQuantity };
      return createCorrectionRecord(sourceRecord, [correctionEntry], sourceContext);
    }

    function getScenarioDrawerDescription(businessKey, businessLabel) {
      const descriptions = {
        price: "登録ドロワーを開き、バーコード、商品、個数、前売価、後売価を入力します。",
        returnGoods: "登録ドロワーを開き、返品する商品、個数、売価、改票有無を入力します。",
        inventory: "登録ドロワーを開き、棚卸対象の商品、数量、売価、連Noを入力します。",
        priceCheck: "登録ドロワーを開き、商品と実際に確認した売価を入力します。",
        pop: "登録ドロワーを開き、商品、発行枚数、POP売価、レイアウトを入力します。",
        label: "登録ドロワーを開き、商品コード、個体識別番号または産地、発行枚数を入力します。"
      };
      return descriptions[businessKey] || `${businessLabel}の登録ドロワーを開き、必要な明細を入力します。`;
    }

    function makeScenario({ id, business, label, category, context = {}, entries = [], viewport = VIEWPORTS.MOBILE, startDescription, scanDescription, confirmDescription, outputDescription }) {
      const businessLabel = BUSINESS[business]?.label || business;
      const scenarioContext = { ...createDefaultContext(business), ...context };
      const hasIssues = entries.some(row => getStatus(row, scenarioContext).color === "error");
      const canConfirmScenario = entries.filter(row => !row.deletedAt).length > 0 && !hasIssues;
      const isLabelBusiness = business === "label";
      const confirmedScenarioRecord = canConfirmScenario ? createScenarioConfirmedRecord(business, entries, scenarioContext) : null;
      const approvedScenarioRecord = confirmedScenarioRecord ? createScenarioRecordVariant(confirmedScenarioRecord, { recordId: `${confirmedScenarioRecord.recordId}-APPROVED`, workGroup: `${confirmedScenarioRecord.workGroup || "セッション1"} 承認済`, approvalStatus: "approved" }) : null;
      const linkedScenarioRecord = approvedScenarioRecord && !isLabelBusiness ? createScenarioRecordVariant(approvedScenarioRecord, { recordId: `${confirmedScenarioRecord.recordId}-LINKED`, workGroup: `${confirmedScenarioRecord.workGroup || "セッション1"} 日次連携済`, integrationState: "linked", syncState: "linked", integrationDate: todayText(), backendLinkedAt: new Date().toISOString() }) : null;
      const correctionScenarioRecord = linkedScenarioRecord ? createScenarioCorrectionRecord(linkedScenarioRecord, scenarioContext) : null;
      const approvalScenarioRecords = [confirmedScenarioRecord, approvedScenarioRecord].filter(Boolean);
      const correctionScenarioRecords = [linkedScenarioRecord, correctionScenarioRecord].filter(Boolean);
      const confirmStepDescription = canConfirmScenario
        ? (isLabelBusiness ? "継承ラベルの登録明細を確認し、ラベル発行ボタンで未承認の実績として確定します。" : `${businessLabel}の登録明細を確認し、作業確定ボタンで未承認の実績として保存します。`)
        : `${businessLabel}の登録明細で要確認状態を確認します。`;
      const outputStepDescription = outputDescription || (canConfirmScenario
        ? (isLabelBusiness ? "確定済みの継承ラベルを商品単位で確認し、未承認・承認済・印刷状態を確認します。" : `${businessLabel}の確定済み実績を商品単位で確認し、未承認は連携対象外、承認済は日次連携対象になることを確認します。`)
        : `${businessLabel}の要確認を登録明細で修正します。`);
      const correctionStepDescription = outputDescription || confirmDescription || outputStepDescription;
      const basePayload = { businessKey: business, context: scenarioContext };
      const searchKeyword = entries.find(row => row.productName || row.sku)?.productName || entries.find(row => row.productName || row.sku)?.sku || businessLabel;
      const finalStepLabel = isLabelBusiness ? "発行結果" : (business === "pop" ? "POP連携確認" : (business === "priceCheck" ? "売価確認" : "実績確認"));
      const confirmStepLabel = isLabelBusiness ? "ラベル発行" : "作業確定";
      const steps = [
        {
          label: "開始",
          description: startDescription || `${businessLabel}の基本条件を確認します。`,
          payload: { ...basePayload, screen: SCREEN.START, entries: [] }
        },
        {
          label: "条件",
          description: `${businessLabel}の基本条件を入力します。`,
          payload: { ...basePayload, screen: SCREEN.SCAN, entries: [], openStartSettings: true }
        },
        {
          label: "入力ドロワー",
          description: getScenarioDrawerDescription(business, businessLabel),
          payload: { ...basePayload, screen: SCREEN.SCAN, entries: [], openScanDrawer: true }
        },
        {
          label: "カメラ読取",
          description: "カメラスキャンを開き、背面/前面のカメラ切替と読取枠を確認します。",
          payload: { ...basePayload, screen: SCREEN.SCAN, entries: [], screenshotModal: "cameraScan" }
        },
        {
          label: "登録明細",
          description: scanDescription || `${businessLabel}を連続登録し、登録明細に未確定データとして保持します。`,
          payload: { ...basePayload, screen: SCREEN.SCAN, entries }
        }
      ];
      if (canConfirmScenario) {
        steps.push(
          {
            label: confirmStepLabel,
            description: confirmStepDescription,
            payload: { ...basePayload, screen: SCREEN.SCAN, entries }
          },
          {
            label: finalStepLabel,
            description: outputStepDescription,
            payload: { ...basePayload, screen: SCREEN.CONFIRM, entries: [], confirmedRecord: confirmedScenarioRecord, confirmedRecords: [confirmedScenarioRecord] }
          },
          {
            label: "詳細確認",
            description: "確認出力のカードをクリックし、数量、金額、承認、連携、訂正元を詳細モーダルで確認します。",
            payload: { ...basePayload, screen: SCREEN.CONFIRM, entries: [], confirmedRecord: confirmedScenarioRecord, confirmedRecords: [confirmedScenarioRecord], screenshotModal: "recordDetail" }
          },
          {
            label: "承認状態",
            description: `${businessLabel}の実績一覧で未承認と承認済を見比べ、承認済だけが日次連携対象になることを確認します。`,
            payload: { ...basePayload, screen: SCREEN.CONFIRM, entries: [], confirmedRecord: approvedScenarioRecord || confirmedScenarioRecord, confirmedRecords: approvalScenarioRecords }
          },
          {
            label: "一括操作",
            description: "2行目のチェックで商品または作業を選択し、4行目の一括承認・一括未承認・選択削除を確認します。",
            payload: { ...basePayload, screen: SCREEN.CONFIRM, entries: [], confirmedRecord: approvedScenarioRecord || confirmedScenarioRecord, confirmedRecords: approvalScenarioRecords }
          },
          {
            label: "実績検索",
            description: `${businessLabel}の実績一覧で検索ボタンから3行目の検索エリアを開閉し、検索実行で絞り込み、入力欄右端の×でクリアできることを確認します。`,
            payload: { ...basePayload, screen: SCREEN.CONFIRM, entries: [], confirmedRecord: confirmedScenarioRecord, confirmedRecords: [confirmedScenarioRecord], outputSearch: searchKeyword }
          }
        );
        if (correctionScenarioRecords.length > 1) {
          steps.push({
            label: "訂正データ",
            description: business === "price" ? "日次連携済みの価格調整で数量を減らした場合、元の値下げ額との差分が値上げ訂正として追加され、元データ側に訂正ありと紐づきが表示されることを確認します。" : "日次連携済みデータの修正は元データを直接変更せず、訂正データとして追加され、元データ側に訂正ありと紐づきが表示されることを確認します。",
            payload: { ...basePayload, screen: SCREEN.CONFIRM, entries: [], confirmedRecord: correctionScenarioRecord, confirmedRecords: correctionScenarioRecords }
          });
        }
      } else {
        steps.push({
          label: "是正",
          description: correctionStepDescription,
          payload: { ...basePayload, screen: SCREEN.SCAN, entries }
        });
      }
      return {
        id,
        business,
        category,
        label,
        viewport,
        steps
      };
    }

    function SummaryCard({ icon, label, value, helper, color = "primary" }) {
      return (

          </Stack>

      );

    function BusinessIcon({ item, size = 52, iconSize = 30 }) {
      return (
        <Box sx={{ width: size, height: size, minWidth: size, borderRadius: "50%", display: "grid", placeItems: "center", bgcolor: `${item.color}.50`, color: `${item.color}.main`, flex: "0 0 auto" }}>
          <Icon sx={{ width: iconSize, height: iconSize, fontSize: iconSize, display: "grid", placeItems: "center", lineHeight: 1 }}>{item.icon}</Icon>
        </Box>
      );
    }

    function DynamicField({ name, value, onChange, context, onFocus, inputRef, optional = false }) {
      const common = { fullWidth: true, size: "small" };
      const optionalItem = optional ? <MenuItem value="">指定なし</MenuItem> : null;
      if (name === "department") return <FormControl {...common}><InputLabel>部門</InputLabel><Select label="部門" value={value || ""} onChange={e => onChange(name, e.target.value)}>{optionalItem}{DEPARTMENTS.map(item => <MenuItem key={item} value={item}>{item}</MenuItem>)}</Select></FormControl>;
      if (name === "businessDate") return <TextField {...common} type="date" label="登録日" value={value || todayText()} onChange={e => onChange(name, e.target.value)} InputLabelProps={{ shrink: true }} />;
      if (name === "startDate") return <TextField {...common} type="date" label="開始日" value={value || todayText()} onChange={e => onChange(name, e.target.value)} InputLabelProps={{ shrink: true }} />;
      if (name === "endDate") return <TextField {...common} type="date" label="終了日" value={value || todayText()} onChange={e => onChange(name, e.target.value)} InputLabelProps={{ shrink: true }} inputProps={{ min: context.startDate || undefined }} />;
      if (name === "layout") return <FormControl {...common}><InputLabel>レイアウト</InputLabel><Select label="レイアウト" value={optional ? (value || "") : (value || "A4_1面")} onChange={e => onChange(name, e.target.value)}>{optionalItem}{LAYOUTS.map(item => <MenuItem key={item} value={item}>{item}</MenuItem>)}</Select></FormControl>;
      if (name === "printer") return <FormControl {...common}><InputLabel>プリンター</InputLabel><Select label="プリンター" value={optional ? (value || "") : (value || "売場プリンター01")} onChange={e => onChange(name, e.target.value)}>{optionalItem}{PRINTERS.map(item => <MenuItem key={item} value={item}>{item}</MenuItem>)}</Select></FormControl>;
      if (name === "salesFloor") return <TextField {...common} label="売場" value={value || ""} onChange={e => onChange(name, e.target.value)} />;
      if (name === "sequenceNo") return <TextField {...common} label="連No" value={optional ? (value || "") : (value || "001")} inputRef={inputRef} onFocus={event => { event.target.select(); onFocus?.(name); }} onChange={e => onChange(name, e.target.value)} inputProps={{ inputMode: "numeric" }} />;
      if (name === "useCountSheet" && optional) return <FormControl {...common}><InputLabel>つけたて表</InputLabel><Select label="つけたて表" value={value === true ? "true" : value === false ? "false" : ""} onChange={e => onChange(name, e.target.value === "" ? null : e.target.value === "true")}><MenuItem value="">指定なし</MenuItem><MenuItem value="true">あり</MenuItem><MenuItem value="false">なし</MenuItem></Select></FormControl>;
      if (name === "useCountSheet") return <Paper variant="outlined" sx={{ px: 1.2, py: 0.6, display: "flex", alignItems: "center", justifyContent: "space-between" }}><Typography variant="body2" sx={{ fontWeight: 800 }}>つけたて表</Typography><Switch checked={Boolean(value)} onChange={e => onChange(name, e.target.checked)} /></Paper>;
      if (name === "adjustmentType") return <FormControl {...common}><InputLabel>区分</InputLabel><Select label="区分" value={optional ? (value || "") : (value || "廃棄")} onChange={e => onChange(name, e.target.value)}>{optionalItem}{ADJUSTMENT_TYPES.map(item => <MenuItem key={item} value={item}>{item}</MenuItem>)}</Select></FormControl>;
      if (name === "reason") return <FormControl {...common}><InputLabel>理由</InputLabel><Select label="理由" value={value || ""} onChange={e => onChange(name, e.target.value)}>{optionalItem}{REASONS.map(item => <MenuItem key={item} value={item}>{item}</MenuItem>)}</Select></FormControl>;
      if (name === "quantity") return <TextField {...common} type="number" label={BUSINESS[context.businessKey].quantityLabel} value={value ?? 1} inputRef={inputRef} onFocus={event => { event.target.select(); onFocus?.(name); }} onChange={e => onChange(name, Number(e.target.value))} inputProps={{ min: 1, inputMode: "numeric" }} />;
      if (name === "beforePrice") return <TextField {...common} type="number" label="前売価" value={value ?? ""} inputRef={inputRef} onFocus={event => { event.target.select(); onFocus?.(name); }} onChange={e => onChange(name, Number(e.target.value))} inputProps={{ inputMode: "numeric" }} InputProps={{ endAdornment: <InputAdornment position="end">円</InputAdornment> }} />;
      if (name === "afterPrice") return <TextField {...common} type="number" label="後売価" value={value ?? ""} inputRef={inputRef} onFocus={event => { event.target.select(); onFocus?.(name); }} onChange={e => onChange(name, Number(e.target.value))} inputProps={{ inputMode: "numeric" }} InputProps={{ endAdornment: <InputAdornment position="end">円</InputAdornment> }} />;
      if (name === "displayPrice") return <TextField {...common} type="number" label={context.businessKey === "priceCheck" ? "実売価" : "売価"} value={value ?? ""} inputRef={inputRef} onFocus={event => { event.target.select(); onFocus?.(name); }} onChange={e => onChange(name, Number(e.target.value))} inputProps={{ inputMode: "numeric" }} InputProps={{ endAdornment: <InputAdornment position="end">円</InputAdornment> }} />;
      if (name === "traceCode") return <TextField {...common} label="個体識別番号" value={value || ""} onChange={e => onChange(name, e.target.value)} />;
      if (name === "origin") return <Autocomplete freeSolo options={ORIGINS} value={value || ""} onChange={(_, next) => onChange(name, next || "")} onInputChange={(_, next) => onChange(name, next || "")} renderInput={params => <TextField {...params} {...common} label="産地" />} />;
      if (name === "saleType") return <FormControl {...common}><InputLabel>販売区分</InputLabel><Select label="販売区分" value={value || "通売"} onChange={e => onChange(name, e.target.value)}>{SALE_TYPES.map(item => <MenuItem key={item} value={item}>{item}</MenuItem>)}</Select></FormControl>;
      if (name === "ticketChanged") return <Paper variant="outlined" sx={{ px: 1.2, py: 0.6, display: "flex", alignItems: "center", justifyContent: "space-between" }}><Typography variant="body2" sx={{ fontWeight: 800 }}>改票あり</Typography><Switch checked={Boolean(value)} onChange={e => onChange(name, e.target.checked)} /></Paper>;
      return null;
    }

    function EmptyState({ text }) {
      return <Paper variant="outlined" sx={{ p: 3, textAlign: "center", bgcolor: "grey.50" }}><Typography color="text.secondary">{text}</Typography></Paper>;
    }

    function CameraScanDialog({ open, onClose, onDetected }) {
      const videoRef = React.useRef(null);
      const streamRef = React.useRef(null);
      const frameRef = React.useRef(null);
      const [status, setStatus] = React.useState("idle");
      const [errorText, setErrorText] = React.useState("");
      const [cameraFacingMode, setCameraFacingMode] = React.useState("environment");
      const detectorSupported = typeof window !== "undefined" && "BarcodeDetector" in window;

      React.useEffect(() => {
        if (!open) return undefined;
        let disposed = false;
        async function startCamera() {
          setStatus("starting");
          setErrorText("");
          try {
            let stream;
            try {
              stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: cameraFacingMode } }, audio: false });
            } catch (cameraModeError) {
              console.warn(cameraModeError);
              stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            }
            if (disposed) {
              stream.getTracks().forEach(track => track.stop());
              return;
            }
            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              await videoRef.current.play();
            }
            if (!detectorSupported) {
              setStatus("fallback");
              return;
            }
            const detector = new window.BarcodeDetector({ formats: ["ean_13", "ean_8", "code_128", "code_39", "qr_code"] });
            setStatus("scanning");
            const scanFrame = async () => {
              if (disposed || !videoRef.current) return;
              try {
                const codes = await detector.detect(videoRef.current);
                if (codes.length > 0) {
                  onDetected(codes[0].rawValue);
                  return;
                }
              } catch (error) {
                console.warn(error);
              }
              frameRef.current = window.requestAnimationFrame(scanFrame);
            };
            scanFrame();
          } catch (error) {
            console.warn(error);
            setStatus("error");
            setErrorText("カメラを起動できません。ブラウザのカメラ許可、HTTPS、端末設定を確認してください。");
          }
        }
        startCamera();
        return () => {
          disposed = true;
          if (frameRef.current) window.cancelAnimationFrame(frameRef.current);
          streamRef.current?.getTracks?.().forEach(track => track.stop());
          streamRef.current = null;
          if (videoRef.current) videoRef.current.srcObject = null;
        };
      }, [open, cameraFacingMode]);

      return (
        <Dialog open={open} onClose={onClose} fullWidth maxWidth="xs">
          <DialogTitle sx={{ pb: 1 }}>
            <Stack direction="row" spacing={1} alignItems="center" justifyContent="space-between">
              <Typography variant="h6">カメラスキャン</Typography>
              <ToggleButtonGroup
                value={cameraFacingMode}
                exclusive
                onChange={(_, next) => next && setCameraFacingMode(next)}
                size="small"
              >
                <ToggleButton value="environment">外部/背面</ToggleButton>
                <ToggleButton value="user">内側/前面</ToggleButton>
              </ToggleButtonGroup>
            </Stack>
          </DialogTitle>
          <DialogContent dividers>
            <Stack spacing={1.5}>
              <Box sx={{ position: "relative", overflow: "hidden", borderRadius: 2, bgcolor: "grey.900", aspectRatio: "4 / 3" }}>
                <video ref={videoRef} muted playsInline autoPlay style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                <Box sx={{ position: "absolute", inset: "24% 10%", border: "2px solid rgba(255,255,255,0.86)", borderRadius: 2, boxShadow: "0 0 0 999px rgba(0,0,0,0.28)" }} />
              </Box>
              {status === "starting" && <Alert severity="info">カメラを起動しています。</Alert>}
              {status === "scanning" && <Alert severity="info">バーコードを枠内に合わせてください。</Alert>}
              {status === "fallback" && <Alert severity="warning">このブラウザは自動読取に未対応です。モック確認用に下のサンプル読取を使えます。</Alert>}
              {status === "error" && <Alert severity="warning">{errorText}</Alert>}
              {(status === "fallback" || status === "error") && (
                <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap">
                  {PRODUCTS.slice(0, 4).map(product => (
                    <Button key={product.sku} size="small" variant="outlined" onClick={() => onDetected(product.barcode)}>{product.name}</Button>
                  ))}
                </Stack>
              )}
            </Stack>
          </DialogContent>
          <DialogActions>
            <Button onClick={onClose}>閉じる</Button>
          </DialogActions>
        </Dialog>
      );
    }

    function ConfirmDialog({ open, title, description, confirmLabel = "削除", confirmColor = "error", onCancel, onConfirm, children }) {
      return (
        <Dialog open={open} onClose={onCancel} fullWidth maxWidth="xs">
          <DialogTitle>{title}</DialogTitle>
          <DialogContent dividers>
            <Stack spacing={1}>
              {description && <Typography variant="body2" color="text.secondary">{description}</Typography>}
              {children}
            </Stack>
          </DialogContent>
          <DialogActions>
            <Button onClick={onCancel}>キャンセル</Button>
            <Button variant="contained" color={confirmColor} onClick={onConfirm}>{confirmLabel}</Button>
          </DialogActions>
        </Dialog>
      );
    }

    const NUMBER_PAD_FIELDS = ["quantity", "beforePrice", "afterPrice", "displayPrice", "sequenceNo"];

    function getNumericItemFields(context) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      return business.itemFields.filter(field => NUMBER_PAD_FIELDS.includes(field));
    }

    function NumberPad({ open, onToggle, disabled, onInput, onBackspace, onClear, onPrevious, onEnter }) {
      const keepInputFocus = event => event.preventDefault();
      const run = action => {
        if (disabled) return;
        action?.();
      };
      if (!open) {
        return <Button fullWidth variant="outlined" startIcon={<Icon>dialpad</Icon>} onMouseDown={keepInputFocus} onClick={onToggle}>テンキーを表示</Button>;
      }
      return (
        <Paper variant="outlined" sx={{ p: 1, borderRadius: 2, bgcolor: "background.paper" }}>
          <Grid container spacing={0.75}>
            {["1", "2", "3", "4", "5", "6", "7", "8", "9", "00", "0"].map(key => (
              <Grid item xs={4} key={key}>
                <Button fullWidth variant="outlined" size="large" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(() => onInput(key))} sx={{ minHeight: 48, fontSize: "1.1rem", fontWeight: 900 }}>{key}</Button>
              </Grid>
            ))}
            <Grid item xs={4}><Button fullWidth variant="outlined" color="secondary" size="large" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onBackspace)} sx={{ minHeight: 48 }}><Icon>backspace</Icon></Button></Grid>
            <Grid item xs={4}><Button fullWidth variant="outlined" color="secondary" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onPrevious)} sx={{ minHeight: 44 }} startIcon={<Icon>arrow_upward</Icon>}>戻る</Button></Grid>
            <Grid item xs={4}><Button fullWidth variant="outlined" color="secondary" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onClear)} sx={{ minHeight: 44 }}>C</Button></Grid>
            <Grid item xs={4}><Button fullWidth variant="contained" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onEnter)} sx={{ minHeight: 44 }} endIcon={<Icon>keyboard_return</Icon>}>Enter</Button></Grid>
            <Grid item xs={12}><Button fullWidth variant="text" color="secondary" onMouseDown={keepInputFocus} onClick={onToggle}>テンキーを閉じる</Button></Grid>
          </Grid>
        </Paper>
      );
    }

    const TRASH_RETENTION_MS = 2 * 24 * 60 * 60 * 1000;

    function isDeleted(row) {
      return Boolean(row?.deletedAt);
    }

    function getActiveEntries(entries = []) {
      return entries.filter(row => !isDeleted(row));
    }

    function getStartFields(context) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      return business.startFields || [];
    }

    function getEntryWorkGroup(row, context) {
      return row.workGroup || context.workGroup || "未分類";
    }

    function groupEntriesByWorkGroup(entries = [], context) {
      const groups = [];
      entries.forEach(row => {
        const label = getEntryWorkGroup(row, context);
        let group = groups.find(item => item.label === label);
        if (!group) {
          group = { label, entries: [] };
          groups.push(group);
        }
        group.entries.push(row);
      });
      return groups;
    }

    function getTrashEntries(entries = []) {
      return entries.filter(isDeleted).sort((a, b) => Number(b.deletedAt || 0) - Number(a.deletedAt || 0));
    }

    function purgeExpiredTrash(entries = [], now = Date.now()) {
      return entries.filter(row => !row.deletedAt || now - Number(row.deletedAt) < TRASH_RETENTION_MS);
    }

    function trashRemainingText(row) {
      const remaining = TRASH_RETENTION_MS - (Date.now() - Number(row.deletedAt || Date.now()));
      if (remaining <= 0) return "自動完全削除の対象";
      const hours = Math.ceil(remaining / (60 * 60 * 1000));
      if (hours >= 24) return `あと${Math.ceil(hours / 24)}日で完全削除`;
      return `あと${hours}時間で完全削除`;
    }

    function formatDateTimeText(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      const pad = number => String(number).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function getIntegrationTarget(businessKey) {
      if (businessKey === "pop") return "POPシステム";
      if (businessKey === "label") return "印刷";
      if (["price", "returnGoods", "inventory"].includes(businessKey)) return "基幹システム";
      return "確認出力";
    }

    function getApprovalStatus(record) {
      return record?.approvalStatus || record?.approvalState || "unapproved";
    }

    function getApprovalStatusInfo(record) {
      const approvalStatus = getApprovalStatus(record);
      if (approvalStatus === "approved") return { state: approvalStatus, label: "承認済", color: "success" };
      return { state: "unapproved", label: "未承認", color: "warning" };
    }

    function createIntegrationState(businessKey, approvalStatus = "approved") {
      if (approvalStatus !== "approved") return "unapproved";
      if (businessKey === "label") return "printed";
      return "pendingDaily";
    }

    function getIntegrationStatus(record) {
      const businessKey = record?.businessKey || record?.context?.businessKey || "price";
      const target = record?.integrationTarget || getIntegrationTarget(businessKey);
      const approvalStatus = getApprovalStatus(record);
      let state = record?.integrationState || record?.syncState || createIntegrationState(businessKey, approvalStatus);
      if (approvalStatus !== "approved") state = "unapproved";
      else if (businessKey !== "label" && isBackendLinkedRecord(record)) state = "linked";
      const integrationDate = record?.integrationDate || (state === "linked" ? (record?.backendLinkedAt || "").slice(0, 10) || todayText() : "");
      const statusMap = {
        unapproved: { label: "連携対象外", color: "default" },
        printed: { label: "印刷済", color: "success" },
        linked: { label: "日次連携済み", color: "secondary" },
        pendingDaily: { label: "日次連携待ち", color: "warning" },
        pending: { label: "連携待ち", color: "warning" },
        failed: { label: "連携失敗", color: "error" }
      };
      return { target, state, integrationDate, ...(statusMap[state] || { label: "未連携", color: "default" }) };
    }

    function createMockRecord(context, entries) {
      const now = new Date();
      const pad = number => String(number).padStart(2, "0");
      const datePart = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}`;
      const timePart = `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const integrationTarget = getIntegrationTarget(context.businessKey);
      const approvalStatus = "unapproved";
      const integrationState = createIntegrationState(context.businessKey, approvalStatus);
      const activeEntries = getActiveEntries(entries);
      const sourceRecordId = activeEntries.find(row => row.sourceRecordId || row.correctionOf)?.sourceRecordId || activeEntries.find(row => row.sourceRecordId || row.correctionOf)?.correctionOf;
      return {
        recordId: sourceRecordId ? `WF-CORRECTION-${datePart}-${timePart}` : `WF-${datePart}-${timePart}`,
        status: "confirmed",
        approvalStatus,
        approvedAt: null,
        correctionOf: sourceRecordId || undefined,
        correctionType: sourceRecordId ? "daily-linked-correction" : undefined,
        sourceRecordId: sourceRecordId || undefined,
        syncState: integrationState,
        integrationTarget,
        integrationState,
        integrationDate: null,
        registeredAt: now.toISOString(),
        businessKey: context.businessKey,
        workGroup: context.workGroup || "セッション1",
        context: { ...context },
        entries: activeEntries.map(row => ({ ...row, sourceRecordId: row.sourceRecordId || sourceRecordId, correctionOf: row.correctionOf || sourceRecordId })),
        entryCount: activeEntries.length
      };
    }

    function createCorrectionRecord(originalRecord, correctedEntries, context) {
      const now = new Date();
      const pad = number => String(number).padStart(2, "0");
      const datePart = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}`;
      const timePart = `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const businessKey = originalRecord.businessKey || context.businessKey;
      const integrationTarget = getIntegrationTarget(businessKey);
      const approvalStatus = "unapproved";
      const integrationState = createIntegrationState(businessKey, approvalStatus);
      const normalizedEntries = correctedEntries.filter(row => row && !row.deletedAt).map(row => {
        const { __record, __recordIndex, __recordId, ...entry } = row;
        const sourceEntry = (originalRecord.entries || []).find(source => source.id === (entry.sourceEntryId || entry.id)) || {};
        const sourceContext = originalRecord.context || context;
        const sourceImpact = calcImpact(sourceEntry, sourceContext);
        const correctedImpact = entry.correctionAction === "delete" ? 0 : calcImpact(entry, context);
        const correctionDeltaAmount = businessKey === "price" ? correctedImpact - sourceImpact : undefined;
        const quantityDelta = Number(entry.quantity || 0) - Number(sourceEntry.quantity || 0);
        return {
          ...entry,
          id: `E-CORR-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`,
          sourceEntryId: entry.sourceEntryId || entry.id,
          sourceRecordId: originalRecord.recordId,
          correctionOf: originalRecord.recordId,
          correctionType: "daily-linked-correction",
          sourceQuantity: sourceEntry.quantity,
          correctedQuantity: entry.correctionAction === "delete" ? 0 : entry.quantity,
          quantityDelta,
          sourceImpact,
          correctedImpact,
          correctionDeltaAmount,
          correctedAt: now.toISOString(),
          deletedAt: null
        };
      });
      return {
        recordId: `WF-CORRECTION-${datePart}-${timePart}-${Math.random().toString(16).slice(2, 5).toUpperCase()}`,
        status: "confirmed",
        approvalStatus,
        approvedAt: null,
        correctionOf: originalRecord.recordId,
        correctionType: "daily-linked-correction",
        sourceRecordId: originalRecord.recordId,
        sourceRegisteredAt: originalRecord.registeredAt,
        sourceWorkGroup: originalRecord.workGroup,
        syncState: integrationState,
        integrationTarget,
        integrationState,
        integrationDate: null,
        registeredAt: now.toISOString(),
        businessKey,
        workGroup: `${originalRecord.workGroup || "セッション"} 訂正`,
        context: { ...(originalRecord.context || context), workGroup: `${originalRecord.workGroup || "セッション"} 訂正` },
        entries: normalizedEntries,
        entryCount: normalizedEntries.length
      };
    }

    function isBackendLinkedRecord(record) {
      if (!record) return false;
      if (getApprovalStatus(record) !== "approved") return false;
      if (record.syncState === "linked" || record.backendLinkedAt) return true;
      const businessDate = record.context?.businessDate || record.context?.endDate || "";
      return businessDate && businessDate < todayText();
    }

    function getCorrectionRelationLabel(record, row) {
      const sourceRecordId = record?.correctionOf || record?.sourceRecordId || row?.sourceRecordId || row?.correctionOf;
      if (!sourceRecordId) return "";
      const sourceEntryId = row?.sourceEntryId ? ` / 元明細 ${row.sourceEntryId}` : "";
      const actionLabel = row?.correctionAction === "delete" ? " / 削除訂正" : "";
      return `訂正元 ${sourceRecordId}${sourceEntryId}${actionLabel}`;
    }

    function getCorrectionPreviewText(sourceRecord, nextEntry, context) {
      if (!sourceRecord || !nextEntry || context.businessKey !== "price") return "";
      const sourceEntry = (sourceRecord.entries || []).find(row => row.id === (nextEntry.sourceEntryId || nextEntry.id)) || {};
      const sourceImpact = calcImpact(sourceEntry, sourceRecord.context || context);
      const nextImpact = nextEntry.correctionAction === "delete" ? 0 : calcImpact(nextEntry, context);
      const delta = nextImpact - sourceImpact;
      if (!delta) return "連動差分なし";
      const direction = delta > 0 ? "値上げ訂正" : "値下げ訂正";
      const quantityText = Number.isFinite(Number(sourceEntry.quantity)) ? ` / 数量 ${sourceEntry.quantity || 0} -> ${nextEntry.correctionAction === "delete" ? 0 : (nextEntry.quantity || 0)}` : "";
      return `${direction} ${signedYen(delta)}${quantityText}`;
    }

    function cloneRecordEntriesForWork(record, correction = false) {
      return (record.entries || []).map(row => ({
        ...row,
        id: `E-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`,
        deletedAt: null,
        sourceRecordId: record.recordId,
        correctionOf: correction ? record.recordId : undefined
      }));
    }

    function TrashDialog({ open, entries, context, onClose, onRestore, onPermanentDelete }) {
      const [permanentTarget, setPermanentTarget] = React.useState(null);
      const trashEntries = getTrashEntries(entries);
      React.useEffect(() => { if (!open) setPermanentTarget(null); }, [open]);
      return (
        <React.Fragment>
          <Dialog open={open} onClose={onClose} fullWidth maxWidth="sm">
            <DialogTitle sx={{ pb: 1 }}>
              <Stack direction="row" spacing={1} alignItems="center">
                <Icon color="error">delete</Icon>
                <Box sx={{ minWidth: 0 }}>
                  <Typography variant="h6">ごみ箱</Typography>
                  <Typography variant="caption" color="text.secondary">削除した明細は2日後に自動で完全削除されます。</Typography>
                </Box>
              </Stack>
            </DialogTitle>
            <DialogContent dividers sx={{ bgcolor: "background.default" }}>
              <Stack spacing={1}>
                {trashEntries.length === 0 && <EmptyState text="ごみ箱は空です。" />}
                {trashEntries.map(row => (
                  <Paper key={row.id} variant="outlined" sx={{ p: 1.25, bgcolor: "background.paper" }}>
                    <Stack spacing={1}>
                      <Stack direction="row" spacing={1} alignItems="flex-start" justifyContent="space-between">
                        <Box sx={{ minWidth: 0 }}>
                          <Typography variant="subtitle2" noWrap>{row.productName || "商品未選択"}</Typography>
                          <Typography variant="caption" color="text.secondary">{row.barcode || row.sku || "-"} / {trashRemainingText(row)}</Typography>
                        </Box>
                        <Chip size="small" color="error" variant="outlined" label="ごみ箱" />
                      </Stack>
                      <Stack direction="row" spacing={1} justifyContent="flex-end">
                        <Button size="small" variant="outlined" startIcon={<Icon>restore</Icon>} onClick={() => onRestore(row.id)}>復活</Button>
                        <Button size="small" color="error" startIcon={<Icon>delete_forever</Icon>} onClick={() => setPermanentTarget(row)}>完全削除</Button>
                      </Stack>
                    </Stack>
                  </Paper>
                ))}
              </Stack>
            </DialogContent>
            <DialogActions><Button onClick={onClose}>閉じる</Button></DialogActions>
          </Dialog>
          <ConfirmDialog
            open={Boolean(permanentTarget)}
            title="完全削除しますか？"
            description="完全削除した明細は復活できません。"
            confirmLabel="完全削除"
            onCancel={() => setPermanentTarget(null)}
            onConfirm={() => { if (permanentTarget) onPermanentDelete(permanentTarget.id); setPermanentTarget(null); }}
          >
            {permanentTarget && <Alert severity="error" sx={{ py: 0.5 }}>{permanentTarget.productName || "商品未選択"}</Alert>}
          </ConfirmDialog>
        </React.Fragment>
      );
    }


    function EntryCard({ row, context, onEdit, onRemove, readOnly = false, selected = false, onToggleSelect = null }) {
      const status = getStatus(row, context);
      const business = BUSINESS[context.businessKey];
      const isError = status.color === "error";
      return (
        <Paper variant="outlined" sx={{ p: 1.5, borderRadius: 2, borderColor: selected ? "primary.main" : (isError ? "error.light" : "divider"), bgcolor: selected ? "primary.50" : (isError ? "error.50" : "background.paper") }}>
          <Stack direction="row" spacing={1} alignItems="flex-start">
            {!readOnly && onToggleSelect && (
              <Checkbox
                size="small"

    function ScanScreen({ context, setContext, entries, setEntries, setScreen, confirmedRecord, openDrawerRequest, closeDrawerRequest, screenshotModal, screenshotRevision, onBindActions }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const activeEntries = getActiveEntries(entries);
      const isConfirmed = Boolean(confirmedRecord) && activeEntries.length === 0;
      const trashEntries = getTrashEntries(entries);
      const numericFields = getNumericItemFields(context);
      const [productInput, setProductInput] = React.useState("");
      const [item, setItem] = React.useState(() => createDefaultItem(context.businessKey, context));
      const [message, setMessage] = React.useState(null);
      const [sheetOpen, setSheetOpen] = React.useState(false);
      const [numberPadOpen, setNumberPadOpen] = React.useState(true);
      const [activeNumberField, setActiveNumberField] = React.useState(null);
      const [deleteTarget, setDeleteTarget] = React.useState(null);
      const [trashOpen, setTrashOpen] = React.useState(false);
      const [selectedEntryIds, setSelectedEntryIds] = React.useState([]);
      const [entrySearchOpen, setEntrySearchOpen] = React.useState(false);
      const [entrySearchInput, setEntrySearchInput] = React.useState("");
      const [entrySearchQuery, setEntrySearchQuery] = React.useState("");
      const [entryViewMode, setEntryViewMode] = React.useState(VIEW_MODE.CARDS);
      const [cameraOpen, setCameraOpen] = React.useState(false);
      const productInputRef = React.useRef(null);
      const numberInputRefs = React.useRef({});
      const normalizedEntrySearchQuery = normalizeCode(entrySearchQuery);
      const entryMatchesSearch = row => {
        if (!normalizedEntrySearchQuery) return true;
        const status = getStatus(row, context);
        return normalizeCode([
          row.sku,
          row.barcode,
          row.productName,
          row.department,
          row.workGroup,
          row.saleType,
          row.origin,
          row.traceCode,
          row.reason,
          row.adjustmentType,
          status.label,
          status.helper,
          formatDecisionValue(row, context)
        ].filter(Boolean).join(" ")).includes(normalizedEntrySearchQuery);
      };
      const displayedEntries = normalizedEntrySearchQuery ? activeEntries.filter(entryMatchesSearch) : activeEntries;
      const issueCount = activeEntries.filter(row => getStatus(row, context).color === "error").length;
      const selectedEntries = activeEntries.filter(row => selectedEntryIds.includes(row.id));
      const allEntriesSelected = displayedEntries.length > 0 && displayedEntries.every(row => selectedEntryIds.includes(row.id));
      const partialEntriesSelected = displayedEntries.some(row => selectedEntryIds.includes(row.id)) && !allEntriesSelected;

      React.useEffect(() => {
        setItem(createDefaultItem(context.businessKey, context));
        setProductInput("");
        setMessage(null);
        setSheetOpen(false);
        setNumberPadOpen(true);
        setActiveNumberField(null);
        setEntrySearchOpen(false);
        setEntrySearchInput("");
        setEntrySearchQuery("");
        setSelectedEntryIds([]);
      }, [context.businessKey]);
      React.useEffect(() => { if (context.adjustmentType === "廃棄") setItem(prev => ({ ...prev, afterPrice: 0 })); }, [context.adjustmentType]);
      React.useEffect(() => {
        if (activeNumberField && !numericFields.includes(activeNumberField)) setActiveNumberField(numericFields[0] || null);
      }, [context.businessKey, context.adjustmentType, activeNumberField, numericFields.join("|")]);
      React.useEffect(() => {
        if (!sheetOpen) return;
        window.setTimeout(() => {
          if (item.sku) focusNumberField("quantity");
          else productInputRef.current?.focus();
          if (!item.sku) productInputRef.current?.select?.();
        }, 120);
      }, [sheetOpen]);
      React.useEffect(() => {
        if (openDrawerRequest) openForNew();
      }, [openDrawerRequest]);
      React.useEffect(() => {
        if (closeDrawerRequest) setSheetOpen(false);
      }, [closeDrawerRequest]);
      React.useEffect(() => {
        setSelectedEntryIds(prev => prev.filter(id => activeEntries.some(row => row.id === id)));
      }, [activeEntries.length, context.businessKey]);
      React.useEffect(() => {
        setTrashOpen(screenshotModal === "scanTrash");
        setCameraOpen(screenshotModal === "cameraScan");
        setDeleteTarget(screenshotModal === "scanDeleteConfirm" ? (activeEntries[0] || null) : null);
      }, [screenshotModal, screenshotRevision, activeEntries.length, context.businessKey]);

      function updateItem(name, value) {
        setItem(prev => {
          const next = { ...prev, [name]: value };
          if (context.businessKey === "label" && name === "traceCode") {
            const inferredOrigin = inferOriginFromTraceCode(value);
            if (inferredOrigin) next.origin = inferredOrigin;
          }
          return next;
        });
      }
      function focusNumberField(field) {
        if (!field || !numericFields.includes(field)) return;
        setActiveNumberField(field);
        setNumberPadOpen(true);
        window.setTimeout(() => {
          const input = numberInputRefs.current[field];
          input?.focus?.();
          input?.select?.();
        }, 80);
      }
      function moveNumberFocus(delta) {
        if (!numericFields.length) return;
        const currentIndex = activeNumberField ? numericFields.indexOf(activeNumberField) : -1;
        const nextIndex = currentIndex < 0 ? 0 : Math.max(0, Math.min(currentIndex + delta, numericFields.length - 1));
        focusNumberField(numericFields[nextIndex]);
      }
      function selectProduct(product) {
        if (!product) return;
        setProductInput(product.barcode);
        setContext(prev => ({ ...prev, department: product.department }));
        setItem(prev => ({
          ...prev,
          sku: product.sku,
          barcode: product.barcode,
          productName: product.name,
          workGroup: context.workGroup || prev.workGroup || "セッション1",
          department: product.department,
          currentPrice: product.currentPrice,
          quantity: 1,
          beforePrice: product.currentPrice,
          afterPrice: context.adjustmentType === "廃棄" ? 0 : Math.max(0, product.currentPrice - 50),
          displayPrice: product.currentPrice
        }));
        window.setTimeout(() => focusNumberField("quantity"), 120);
      }
      function searchProduct() {
        if (!String(productInput || "").trim()) { productInputRef.current?.focus?.(); productInputRef.current?.select?.(); return; }
        const product = findProduct(productInput);
        if (!product) { setMessage({ severity: "warning", text: "商品が見つかりません。一覧から選択してください。" }); productInputRef.current?.focus?.(); productInputRef.current?.select?.(); return; }
        selectProduct(product);
      }
      function handleCameraDetected(code) {
        setCameraOpen(false);
        setProductInput(code);
        const product = findProduct(code);
        if (product) {
          selectProduct(product);
          setMessage(null);
        } else {
          setMessage({ severity: "warning", text: "読み取ったコードの商品が見つかりません。一覧から選択してください。" });
          window.setTimeout(() => { productInputRef.current?.focus?.(); productInputRef.current?.select?.(); }, 80);
        }
      }
      function runPrimaryDrawerAction() {
        if (item.sku) { saveItem(); return; }
        if (String(productInput || "").trim()) { searchProduct(); return; }
        setMessage(null);
        setCameraOpen(true);
      }
      function clearItem() {

      function requestRemoveItem(row) { setDeleteTarget(row); }

      function applyEntrySearch(value = entrySearchInput) {

                {priceCheckMismatch && <Alert severity="error">POS登録売価 {yen(item.currentPrice)} と実売価 {yen(item.displayPrice)} が不一致です。登録後、確認出力画面で修正対象になります。</Alert>}

          </ConfirmDialog>
          <TrashDialog open={trashOpen} entries={entries} context={context} onClose={() => setTrashOpen(false)} onRestore={restoreItem} onPermanentDelete={permanentDeleteItem} />
        </Stack>
      );
    }


    function ConfirmScreen({ context, setContext, entries, setEntries, confirmedRecord, confirmedRecords, syncStatus, screenshotModal, screenshotRevision, onConfirmRecord, onEditRecord, onUpdateRecord, onAddCorrectionRecord, onBindAction }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const [searchInput, setSearchInput] = React.useState(context.outputSearch || "");
      const [searchQuery, setSearchQuery] = React.useState(context.outputSearch || "");
      const allRecordsForBusiness = (confirmedRecords || []).filter(record => record.businessKey === context.businessKey);
      const allRecordRows = allRecordsForBusiness.flatMap(record => (record.entries || []).map((row, index) => ({ ...row, __record: record, __recordIndex: index })));
      const recordTrashEntries = allRecordRows.filter(row => row.deletedAt);
      const normalizedSearchQuery = normalizeCode(searchQuery);
      const recordMatchesSearch = record => {
        if (!normalizedSearchQuery) return true;
        const addedCorrections = allRecordsForBusiness.filter(item => (item.correctionOf || item.sourceRecordId) === record.recordId && (item.entries || []).some(row => !row.deletedAt));
        const addedCorrectionText = addedCorrections.length ? `訂正データあり ${addedCorrections.length}件` : "";
        return normalizeCode([
          record.recordId,
          record.workGroup,
          record.status,
          getApprovalStatusInfo(record).label,
          getIntegrationStatus(record).label,
          record.integrationState,
          record.syncState,
          record.integrationDate,
          record.approvedAt,
          record.integrationTarget,
          record.correctionOf,
          record.sourceRecordId,
          record.sourceWorkGroup,
          addedCorrectionText,
          formatDateTimeText(record.registeredAt)
        ].filter(Boolean).join(" ")).includes(normalizedSearchQuery);
      };
      const rowMatchesSearch = row => {
        if (!normalizedSearchQuery) return true;
        const record = row.__record || {};
        if (recordMatchesSearch(record)) return true;
        return normalizeCode([
          row.sku,
          row.barcode,
          row.productName,
          row.department,
          row.workGroup,
          row.saleType,
          row.origin,
          row.traceCode,
          row.sourceEntryId,
          row.sourceRecordId,
          row.correctionOf,
          row.correctionAction,
          getCorrectionRelationLabel(record, row),
          formatDecisionValue(row, context)
        ].filter(Boolean).join(" ")).includes(normalizedSearchQuery);
      };
      const recordsForBusiness = normalizedSearchQuery
        ? allRecordsForBusiness.filter(record => recordMatchesSearch(record) || allRecordRows.some(row => row.__record?.recordId === record.recordId && rowMatchesSearch(row)))
        : allRecordsForBusiness;
      const recordRows = allRecordRows.filter(row => !normalizedSearchQuery || rowMatchesSearch(row));
      const outputEntries = recordRows.filter(row => !row.deletedAt);
      const correctionsBySourceRecordId = allRecordsForBusiness.reduce((acc, record) => {
        const sourceRecordId = record.correctionOf || record.sourceRecordId;

      }, {});
      const getAddedCorrections = record => correctionsBySourceRecordId[record?.recordId] || [];

        const priceDelta = corrections.reduce((sum, correction) => sum + (correction.entries || []).reduce((entrySum, row) => entrySum + (Number.isFinite(Number(row.correctionDeltaAmount)) ? Number(row.correctionDeltaAmount) : 0), 0), 0);
        const deltaText = priceDelta ? ` / ${priceDelta > 0 ? "値上げ訂正" : "値下げ訂正"} ${signedYen(priceDelta)}` : "";
        return deleteCount ? `訂正データあり ${corrections.length}件 / 削除訂正 ${deleteCount}件${deltaText}` : `訂正データあり ${corrections.length}件${deltaText}`;
      };
      const hasAddedCorrection = record => getAddedCorrections(record).length > 0;
      const activeEntries = getActiveEntries(entries);

      const [recordDisplayUnit, setRecordDisplayUnit] = React.useState("data");

      const [workRowsPerPage, setWorkRowsPerPage] = React.useState(10);
      const [editNumberPadOpen, setEditNumberPadOpen] = React.useState(true);
      const [activeEditNumberField, setActiveEditNumberField] = React.useState(null);
      const editNumberInputRefs = React.useRef({});
      const issueEntries = outputEntries.filter(row => getStatus(row, context).color === "error");
      const totalQty = outputEntries.reduce((sum, row) => sum + Number(row.quantity || 1), 0);
      const totalAmount = calcSummaryDecisionValue(outputEntries, context);
      const totalImpact = outputEntries.reduce((sum, row) => sum + calcImpact(row, context), 0);
      const outputStartDate = context.startDate || context.businessDate || todayText();
      const outputEndDate = context.endDate || context.businessDate || outputStartDate;
      const periodText = outputStartDate === outputEndDate ? outputStartDate : `${outputStartDate} 〜 ${outputEndDate}`;
      const syncText = syncStatus?.state === "saving" ? "下書き同期中" : syncStatus?.state === "error" ? "下書き同期失敗" : APP_CONFIG.connectionMode === "mock" ? "下書き保存済み（mock）" : "下書き保存済み";
      const stateLabel = recordsForBusiness.length ? "確定済み" : "実績なし";

      const stateDetail = recordsForBusiness.length ? `${recordsForBusiness.length}件 / 最新 ${formatDateTimeText(recordsForBusiness[0].registeredAt)}` : "登録タブで作業確定すると表示されます";
      const impactText = ["price", "returnGoods"].includes(context.businessKey) ? `調整影響 ${signedYen(totalImpact)}` : null;
      const showAmountSummary = !["pop", "label"].includes(context.businessKey);
      const primaryMetric = (() => {

        return { label: "明細", value: `${outputEntries.length}件`, color: "primary" };
      })();
      const outputActionLabels = { pdf: "PDF", print: "印刷" };
      const getRecordRowKey = row => `${row.__record?.recordId || "record"}-${row.id || row.__recordIndex}`;
      const pagedOutputEntries = outputEntries.slice(dataPage * dataRowsPerPage, dataPage * dataRowsPerPage + dataRowsPerPage);
      const pagedRecordsForBusiness = recordsForBusiness.slice(workPage * workRowsPerPage, workPage * workRowsPerPage + workRowsPerPage);
      const selectedRows = outputEntries.filter(row => selectedRecordRows.includes(getRecordRowKey(row)));
      const selectedWorkRecords = recordsForBusiness.filter(record => selectedWorkRecordIds.includes(record.recordId));
      const selectedApprovalRecords = recordDisplayUnit === "work"
        ? selectedWorkRecords

      const canBulkApprove = selectedApprovalRecords.some(record => getApprovalStatus(record) !== "approved");
      const canBulkUnapprove = selectedApprovalRecords.some(record => getApprovalStatus(record) === "approved" && !isBackendLinkedRecord(record));
      const allDataRowsSelected = outputEntries.length > 0 && selectedRecordRows.length === outputEntries.length;
      const partialDataRowsSelected = selectedRecordRows.length > 0 && selectedRecordRows.length < outputEntries.length;
      const allWorkRecordsSelected = recordsForBusiness.length > 0 && selectedWorkRecordIds.length === recordsForBusiness.length;
      const partialWorkRecordsSelected = selectedWorkRecordIds.length > 0 && selectedWorkRecordIds.length < recordsForBusiness.length;
      function updatePeriod(name, value) { setContext(prev => ({ ...prev, [name]: value })); }
      function applyRecordSearch(value = searchInput) {
        const nextQuery = String(value || "").trim();
        setSearchInput(nextQuery);
        setSearchQuery(nextQuery);
        setRecordSearchOpen(Boolean(nextQuery));
        setDataPage(0);
        setWorkPage(0);
        setSelectedRecordRows([]);
        setSelectedWorkRecordIds([]);
        setContext(prev => ({ ...prev, outputSearch: nextQuery }));

      function handleRecordSearchButton() {

      function clearRecordSearch() {

      }
      function updateRecordApproval(record, approvalStatus) {
        if (!record?.recordId) return false;
        const now = new Date().toISOString();
        onUpdateRecord?.(record.recordId, current => {
          const businessKey = current.businessKey || current.context?.businessKey || context.businessKey;
          const businessDate = current.context?.businessDate || current.context?.endDate || "";

    // ============================================================
    // [CORE] WorkflowApp（3画面アプリ本体）
    // ============================================================
    // LAUNCHER から iframe + postMessage で状態を受け取り描画する。
    // スタンドアロン（?embedded=1）でも単体動作可能。
    // ============================================================

    function WorkflowApp() {
      const loaded = loadState();
      const [screen, setScreen] = React.useState(loaded?.screen || SCREEN.START);
      const [context, setContext] = React.useState(loaded?.context || createDefaultContext("price"));
      const [entries, setEntries] = React.useState(() => purgeExpiredTrash(loaded?.entries || []));
      const [confirmedRecord, setConfirmedRecord] = React.useState(loaded?.confirmedRecord || null);
      const [confirmedRecords, setConfirmedRecords] = React.useState(loaded?.confirmedRecords || (loaded?.confirmedRecord ? [loaded.confirmedRecord] : []));
      const [draftId, setDraftId] = React.useState(loaded?.draftId || createDraftId());
      const [syncStatus, setSyncStatus] = React.useState({ state: "idle", savedAt: null, error: null });
      const [startSettingsOpen, setStartSettingsOpen] = React.useState(false);
      const [scanDrawerRequest, setScanDrawerRequest] = React.useState(0);
      const [scanDrawerCloseRequest, setScanDrawerCloseRequest] = React.useState(0);
      const [businessMenuOpen, setBusinessMenuOpen] = React.useState(false);
      const [businessHelpOpen, setBusinessHelpOpen] = React.useState(false);
      const [resetConfirmOpen, setResetConfirmOpen] = React.useState(false);
      const [businessSwitchTarget, setBusinessSwitchTarget] = React.useState(null);
      const [screenshotModal, setScreenshotModal] = React.useState(null);
      const [screenshotRevision, setScreenshotRevision] = React.useState(null);
      const scanActionsRef = React.useRef({ search: null, save: null, clear: null });
      const confirmActionRef = React.useRef(null);
      const visibleEntries = getActiveEntries(entries);
      const issueCount = visibleEntries.filter(row => getStatus(row, context).color === "error").length;

      React.useEffect(() => {
        const purged = purgeExpiredTrash(entries);
        if (purged.length !== entries.length) setEntries(purged);
      }, [entries]);
      React.useEffect(() => saveState({ draftId, screen, context, entries: purgeExpiredTrash(entries), confirmedRecord, confirmedRecords }), [draftId, screen, context, entries, confirmedRecord, confirmedRecords]);

      async function exportScreenshotTargets(targets, filename, successLabel, mode) {
        if (!window.JSZip || !window.html2canvas) {
          setToast({ severity: "error", text: "画像出力ライブラリを読み込めていません。" });
          return;
        }
        const zip = new window.JSZip();
        const errors = [];
        const originalFrameSize = { ...frameSize };
        setScreenshotExport({ running: true, done: 0, total: targets.length, label: "準備中", mode });
        setToast({ severity: "info", text: `画面画像を出力中です。0/${targets.length}` });
        try {
          for (let index = 0; index < targets.length; index += 1) {
            const target = targets[index];
            const label = getScreenshotProgressLabel(target);
            setScreenshotExport({ running: true, done: index, total: targets.length, label, mode });
            try {
              await applyScreenshotTarget(target);
              const blob = await captureCurrentFrameBlob();
              zip.file(makeScreenshotFilename(target), blob);
            } catch (error) {
              console.error(error);
              errors.push({
                kind: target.kind,
                business: target.scenario.business,
                scenarioId: target.scenario.id,
                modal: target.modal?.id || "",
                step: target.step?.label,
                viewport: target.viewportConfig.label,
                message: error.message || String(error)
              });
            }
            const done = index + 1;
            setScreenshotExport({ running: true, done, total: targets.length, label, mode });
            if (done % 10 === 0 || done === targets.length) {
              setToast({ severity: errors.length ? "warning" : "info", text: `画面画像を出力中です。${done}/${targets.length}` });
            }
