    // ============================================================
    // [CORE] WorkflowApp（3画面アプリ本体）
    // ============================================================
    // LAUNCHER から iframe + postMessage で状態を受け取り描画する。
    // スタンドアロン（?embedded=1）でも単体動作可能。
    // ============================================================

    function WorkflowApp() {
      const loaded = loadState();
      const [screen, setScreen] = React.useState(loaded?.screen || SCREEN.START);
      const [context, setContext] = React.useState(loaded?.context || createDefaultContext("price"));
      const [entries, setEntries] = React.useState(() => purgeExpiredTrash(loaded?.entries || []));
      const [confirmedRecord, setConfirmedRecord] = React.useState(loaded?.confirmedRecord || null);
      const [confirmedRecords, setConfirmedRecords] = React.useState(loaded?.confirmedRecords || (loaded?.confirmedRecord ? [loaded.confirmedRecord] : []));
      const [draftId, setDraftId] = React.useState(loaded?.draftId || createDraftId());
      const [syncStatus, setSyncStatus] = React.useState({ state: "idle", savedAt: null, error: null });
      const [startSettingsOpen, setStartSettingsOpen] = React.useState(false);
      const [scanDrawerRequest, setScanDrawerRequest] = React.useState(0);
      const [scanDrawerCloseRequest, setScanDrawerCloseRequest] = React.useState(0);
      const [businessMenuOpen, setBusinessMenuOpen] = React.useState(false);
      const [businessHelpOpen, setBusinessHelpOpen] = React.useState(false);
      const [resetConfirmOpen, setResetConfirmOpen] = React.useState(false);
      const [businessSwitchTarget, setBusinessSwitchTarget] = React.useState(null);
      const scanActionsRef = React.useRef({ search: null, save: null, clear: null });
      const confirmActionRef = React.useRef(null);
      const visibleEntries = getActiveEntries(entries);
      const issueCount = visibleEntries.filter(row => getStatus(row, context).color === "error").length;

      React.useEffect(() => {
        const purged = purgeExpiredTrash(entries);
        if (purged.length !== entries.length) setEntries(purged);
      }, [entries]);
      React.useEffect(() => saveState({ draftId, screen, context, entries: purgeExpiredTrash(entries), confirmedRecord, confirmedRecords }), [draftId, screen, context, entries, confirmedRecord, confirmedRecords]);
      React.useEffect(() => {
        const snapshot = createWorkflowSnapshot({ draftId, screen, context, entries: purgeExpiredTrash(entries), confirmedRecord, confirmedRecords });
        setSyncStatus(prev => ({ ...prev, state: "saving", error: null }));
        const timer = window.setTimeout(() => {
          syncWorkflowSnapshot(snapshot)
            .then(result => setSyncStatus({ state: "saved", savedAt: result.savedAt, error: null, mode: result.mode }))
            .catch(error => {
              console.warn(error);
              setSyncStatus({ state: "error", savedAt: null, error: error.message || String(error) });
            });
        }, APP_CONFIG.autosaveDebounceMs);
        return () => window.clearTimeout(timer);
      }, [draftId, screen, context, entries, confirmedRecord, confirmedRecords]);
      React.useEffect(() => {
        function handleMessage(event) {
          const data = event.data;
          if (!data || data.type !== "APPLY_MOCK_STATE") return;
          const nextState = applyScenarioToState(data.payload || {});
          setScreen(nextState.screen);
          setContext(nextState.context);
          setEntries(purgeExpiredTrash(nextState.entries));
          setConfirmedRecord(nextState.confirmedRecord || null);
          setConfirmedRecords(nextState.confirmedRecords || []);
          setDraftId(data.payload?.draftId || createDraftId());
          setStartSettingsOpen(Boolean(data.payload?.openStartSettings));
          if (nextState.openScanDrawer) setScanDrawerRequest(prev => prev + 1);
          else setScanDrawerCloseRequest(prev => prev + 1);
        }
        window.addEventListener("message", handleMessage);
        if (window.__EXPORTED_MOCK_STATE__) {
          const nextState = applyScenarioToState(window.__EXPORTED_MOCK_STATE__);
          setScreen(nextState.screen); setContext(nextState.context); setEntries(purgeExpiredTrash(nextState.entries)); setConfirmedRecord(nextState.confirmedRecord || null); setConfirmedRecords(nextState.confirmedRecords || []); setDraftId(window.__EXPORTED_MOCK_STATE__.draftId || createDraftId());
          setStartSettingsOpen(Boolean(window.__EXPORTED_MOCK_STATE__.openStartSettings));
          if (nextState.openScanDrawer) setScanDrawerRequest(prev => prev + 1);
          else setScanDrawerCloseRequest(prev => prev + 1);
        }
        return () => window.removeEventListener("message", handleMessage);
      }, []);

      function resetAll() {
        const next = createDefaultContext("price");
        const nextDraftId = createDraftId();
        setDraftId(nextDraftId); setContext(next); setEntries([]); setConfirmedRecord(null); setConfirmedRecords([]); setScreen(SCREEN.START); setStartSettingsOpen(false); setBusinessMenuOpen(false); setBusinessHelpOpen(false); setResetConfirmOpen(false); setBusinessSwitchTarget(null);
        saveState({ draftId: nextDraftId, screen: SCREEN.START, context: next, entries: [], confirmedRecord: null, confirmedRecords: [] });
      }

      function requestReset() {
        if (screen === SCREEN.START && entries.length === 0 && !confirmedRecord) { resetAll(); return; }
        setResetConfirmOpen(true);
      }

      function applyBusinessSelection(key) {
        const next = createDefaultContext(key);
        setDraftId(createDraftId());
        setContext(next);
        setEntries([]);
        setConfirmedRecord(null);
        setScreen(SCREEN.SCAN);
        setBusinessMenuOpen(false);
        setBusinessSwitchTarget(null);
        window.setTimeout(() => setStartSettingsOpen(true), 0);
      }

      function selectBusinessFromMenu(key) {
        if (key === context.businessKey) { setBusinessMenuOpen(false); return; }
        if (visibleEntries.length > 0) { setBusinessSwitchTarget(key); return; }
        applyBusinessSelection(key);
      }

      function editConfirmedRecord(record) {
        const linked = isBackendLinkedRecord(record);
        const nextContext = {
          ...createDefaultContext(record.businessKey || context.businessKey),
          ...(record.context || {}),
          workGroup: linked ? `${record.workGroup || "セッション"} 訂正` : (record.workGroup || "セッション1")
        };
        const nextEntries = cloneRecordEntriesForWork(record, linked).map(row => ({
          ...row,
          workGroup: nextContext.workGroup
        }));
        setContext(nextContext);
        setEntries(nextEntries);
        setConfirmedRecord(null);
        if (!linked) {
          setConfirmedRecords(prev => prev.filter(item => item.recordId !== record.recordId));
        }
        setScreen(SCREEN.SCAN);
        setStartSettingsOpen(false);
      }

      function confirmCurrentWork() {
        if (visibleEntries.length === 0 || issueCount > 0) return;
        const record = createMockRecord(context, entries);
        setConfirmedRecord(record);
        setConfirmedRecords(prev => [record, ...prev.filter(item => item.recordId !== record.recordId)]);
        setEntries([]);
        setContext(prev => ({ ...prev, workGroup: createSessionName(prev.businessKey) }));
        setScreen(SCREEN.CONFIRM);
      }

      let content = null;
      if (screen === SCREEN.START) content = <StartScreen context={context} setContext={setContext} />;
      if (screen === SCREEN.SCAN) content = <ScanScreen context={context} setContext={setContext} entries={entries} setEntries={setEntries} setScreen={setScreen} confirmedRecord={confirmedRecord} openDrawerRequest={scanDrawerRequest} closeDrawerRequest={scanDrawerCloseRequest} onBindActions={(actions) => { scanActionsRef.current = actions; }} />;
      if (screen === SCREEN.CONFIRM) content = <ConfirmScreen context={context} setContext={setContext} entries={entries} setEntries={setEntries} confirmedRecord={confirmedRecord} confirmedRecords={confirmedRecords} syncStatus={syncStatus} onConfirmRecord={(record) => { setConfirmedRecord(record); setConfirmedRecords(prev => [record, ...prev.filter(item => item.recordId !== record.recordId)]); }} onEditRecord={editConfirmedRecord} onUpdateRecord={(recordId, updater) => { setConfirmedRecords(prev => prev.map(record => record.recordId === recordId ? updater(record) : record)); setConfirmedRecord(prev => prev?.recordId === recordId ? updater(prev) : prev); }} onBindAction={(action) => { confirmActionRef.current = action; }} />;

      function bottomBar() {
        const confirmWorkLabel = context.businessKey === "label" ? "ラベル発行" : "作業確定";
        if (screen === SCREEN.START) {
          return <Stack direction="row" spacing={1}><Button fullWidth variant="contained" onClick={() => { setScreen(SCREEN.SCAN); setStartSettingsOpen(true); }}>選択中の業務で開始</Button></Stack>;
        }
        if (screen === SCREEN.SCAN) {
          if (visibleEntries.length > 0) {
            return (
              <Stack direction="row" spacing={1} alignItems="center">
                <Button fullWidth variant="contained" size="large" onClick={confirmCurrentWork} disabled={issueCount > 0}>{confirmWorkLabel}</Button>
                <Button fullWidth variant="outlined" size="large" onClick={() => scanActionsRef.current.openForm?.()}>スキャン</Button>
              </Stack>
            );
          }
          return <Stack direction="row" spacing={1} alignItems="center"><Button fullWidth variant="contained" size="large" onClick={() => scanActionsRef.current.openForm?.()}>スキャン</Button></Stack>;
        }
        const recordsForBusiness = (confirmedRecords || []).filter(record => record.businessKey === context.businessKey);
        if (visibleEntries.length > 0) {
          return <Stack direction="row" spacing={1} alignItems="center"><Button fullWidth variant="contained" size="large" onClick={() => setScreen(SCREEN.SCAN)}>登録明細へ戻る</Button></Stack>;
        }
        if (recordsForBusiness.length === 0) {
          return <Stack direction="row" spacing={1} alignItems="center"><Button fullWidth variant="contained" size="large" onClick={() => setScreen(SCREEN.SCAN)}>登録へ戻る</Button></Stack>;
        }
        return (
          <Stack direction="row" spacing={1} alignItems="center">
            <Button fullWidth variant="outlined" size="large" onClick={() => setScreen(SCREEN.SCAN)}>登録へ戻る</Button>
            <Button fullWidth variant="contained" size="large" color="secondary" onClick={() => setBusinessMenuOpen(true)}>次の作業</Button>
          </Stack>
        );
      }

      return (
        <React.Fragment>
          <ResponsiveShell screen={screen} setScreen={setScreen} context={context} entries={visibleEntries} onReset={requestReset} onOpenSettings={() => setStartSettingsOpen(true)} onOpenBusinessMenu={() => setBusinessMenuOpen(true)} onOpenBusinessHelp={() => setBusinessHelpOpen(true)} bottomBar={bottomBar()}>{content}</ResponsiveShell>
          <StartSettingsDialog open={startSettingsOpen} screen={screen} context={context} setContext={setContext} onClose={() => setStartSettingsOpen(false)} />
          <BusinessHelpDialog open={businessHelpOpen} context={context} onClose={() => setBusinessHelpOpen(false)} />
          <BusinessSelectDialog open={businessMenuOpen} currentBusinessKey={context.businessKey} entries={visibleEntries} onSelect={selectBusinessFromMenu} onClose={() => setBusinessMenuOpen(false)} />
          <ConfirmDialog open={resetConfirmOpen} title="入力内容をリセットしますか？" description="未確定の明細と現在の画面状態をすべてクリアします。" confirmLabel="リセット" onCancel={() => setResetConfirmOpen(false)} onConfirm={resetAll} />
          <ConfirmDialog open={Boolean(businessSwitchTarget)} title="業務を切り替えますか？" description={`現在の未確定明細 ${visibleEntries.length}件はクリアされます。`} confirmLabel="切り替える" confirmColor="warning" onCancel={() => setBusinessSwitchTarget(null)} onConfirm={() => applyBusinessSelection(businessSwitchTarget)} />
        </React.Fragment>
      );
    }

    // ============================================================
    // [LAUNCHER] ユーティリティ（HTML書き出し・URL生成）
    // ============================================================

    function getBaseUrlWithParams(params = {}) {
      const url = new URL(window.location.href);
      url.search = ""; url.hash = "";
      Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
      return url.toString();
    }

    function saveTextFile(filename, content, mimeType = "text/plain;charset=utf-8;") {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url; anchor.download = filename; document.body.appendChild(anchor); anchor.click(); document.body.removeChild(anchor); URL.revokeObjectURL(url);
    }

    async function getCurrentHtmlSource() {
      const baseUrl = new URL(window.location.href); baseUrl.search = ""; baseUrl.hash = "";
      try {
        const response = await fetch(baseUrl.toString(), { cache: "no-store" });
        if (response.ok) return await response.text();
      } catch (error) { console.warn("HTML fetch failed", error); }
      return "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    }

    function formatFileDate(date) {
      const pad = number => String(number).padStart(2, "0");
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function injectStandaloneState(htmlSource, payload) {
      const bootstrap = `  <!-- Export bootstrap: ランチャーなし実画面として起動 -->\n  <script>\n    window.__EXPORTED_MOCK_STATE__ = ${JSON.stringify(payload || {})};\n    try { window.history.replaceState(null, document.title, window.location.pathname + "?embedded=1"); } catch (error) {}\n  <\/script>`;
      return htmlSource.replace("<script type=\"text/babel\">", `${bootstrap}\n\n  <script type=\"text/babel\">`);
    }

    // ============================================================
    // [LAUNCHER] LauncherApp（ランチャーUI本体）
    // ============================================================
    // 右側パネルでシナリオ・ステップ・ビューポートを制御し、
    // iframe 内の WorkflowApp へ postMessage で状態を送る。
    // ============================================================

    function LauncherApp() {
      const [selectedBusinessKey, setSelectedBusinessKey] = React.useState("price");
      const [selectedScenarioId, setSelectedScenarioId] = React.useState("price-01-disposal");
      const [stepIndex, setStepIndex] = React.useState(0);
      const [viewport, setViewport] = React.useState(VIEWPORTS.MOBILE);
      const [launcherOpen, setLauncherOpen] = React.useState(true);
      const [toast, setToast] = React.useState(null);
      const [launcherSize, setLauncherSize] = React.useState({ width: 500, height: 760 });
      const [frameSize, setFrameSize] = React.useState({ width: 390, height: 844 });
      const iframeRef = React.useRef(null);
      const panelRef = React.useRef(null);

      const scenariosForBusiness = MOCK_SCENARIOS.filter(item => item.business === selectedBusinessKey);
      const activeScenario = scenariosForBusiness.find(item => item.id === selectedScenarioId) || scenariosForBusiness[0] || MOCK_SCENARIOS[0];
      const steps = activeScenario.steps || [];
      const activeStep = steps[stepIndex] || steps[0];
      const viewportConfig = VIEWPORT_CONFIG[viewport];
      const frameSrc = React.useMemo(() => getBaseUrlWithParams({ embedded: "1" }), []);
      const scenarioCounts = React.useMemo(() => Object.keys(BUSINESS).reduce((acc, key) => ({ ...acc, [key]: MOCK_SCENARIOS.filter(item => item.business === key).length }), {}), []);

      React.useEffect(() => setViewport(activeScenario.viewport || VIEWPORTS.MOBILE), [activeScenario.id]);
      React.useEffect(() => {
        const nextConfig = VIEWPORT_CONFIG[viewport] || VIEWPORT_CONFIG[VIEWPORTS.MOBILE];
        setFrameSize({
          width: nextConfig.width === "100%" ? Math.max(1024, window.innerWidth) : nextConfig.width,
          height: nextConfig.height === "100vh" ? Math.max(700, window.innerHeight) : nextConfig.height
        });
      }, [viewport]);
      React.useEffect(() => { const timer = window.setTimeout(() => postState(activeStep?.payload || {}), 120); return () => window.clearTimeout(timer); }, [selectedBusinessKey, selectedScenarioId, stepIndex]);

      function postState(payload) {
        if (!iframeRef.current?.contentWindow) return;
        iframeRef.current.contentWindow.postMessage({ type: "APPLY_MOCK_STATE", payload: { ...(payload || {}), revision: Date.now() } }, "*");
      }
      function changeBusiness(key) {
        const firstScenario = MOCK_SCENARIOS.find(item => item.business === key) || MOCK_SCENARIOS[0];
        setSelectedBusinessKey(key);
        setSelectedScenarioId(firstScenario.id);
        setStepIndex(0);
      }
      function changeScenario(id) {
        const scenario = MOCK_SCENARIOS.find(item => item.id === id);
        if (scenario?.business) setSelectedBusinessKey(scenario.business);
        setSelectedScenarioId(id);
        setStepIndex(0);
      }
      function moveStep(delta) { setStepIndex(prev => Math.max(0, Math.min(prev + delta, steps.length - 1))); }
      function clampNumber(value, min, max) { return Math.max(min, Math.min(value, max)); }
      function beginResize(event) {
        event.preventDefault();
        const panel = panelRef.current; if (!panel) return;
        const startX = event.clientX, startY = event.clientY, startWidth = panel.offsetWidth, startHeight = panel.offsetHeight;
        function handleMove(moveEvent) {
          const maxWidth = Math.max(360, window.innerWidth - 32);
          const maxHeight = Math.max(420, window.innerHeight - 32);
          setLauncherSize({ width: clampNumber(startWidth + (startX - moveEvent.clientX), 360, Math.min(760, maxWidth)), height: clampNumber(startHeight + (moveEvent.clientY - startY), 420, maxHeight) });
        }
        function handleUp() { window.removeEventListener("pointermove", handleMove); window.removeEventListener("pointerup", handleUp); document.body.style.userSelect = ""; document.body.style.cursor = ""; }
        document.body.style.userSelect = "none"; document.body.style.cursor = "nesw-resize";
        window.addEventListener("pointermove", handleMove); window.addEventListener("pointerup", handleUp);
      }
      function updateFrameDimension(name, value) {
        const numericValue = Number(value);
        if (!Number.isFinite(numericValue)) return;
        const maxWidth = Math.max(320, window.innerWidth - 32);
        const maxHeight = Math.max(480, window.innerHeight - 32);
        setFrameSize(prev => ({
          ...prev,
          [name]: name === "width" ? clampNumber(numericValue, 320, maxWidth) : clampNumber(numericValue, 480, maxHeight)
        }));
      }
      async function exportCurrent() {
        try {
          const source = await getCurrentHtmlSource();
          const html = injectStandaloneState(source, activeStep?.payload || {});
          saveTextFile(`workflow_mock_embedded_${formatFileDate(new Date())}.html`, html, "text/html;charset=utf-8;");
          setToast({ severity: "success", text: "ランチャーなしの実画面HTMLを出力しました。" });
        } catch (error) { console.error(error); setToast({ severity: "error", text: "HTML出力に失敗しました。" }); }
      }
      async function exportLauncher() {
        try {
          const source = await getCurrentHtmlSource();
          saveTextFile(`workflow_mock_launcher_${formatFileDate(new Date())}.html`, source, "text/html;charset=utf-8;");
          setToast({ severity: "success", text: "ランチャー込みHTMLを出力しました。" });
        } catch (error) { console.error(error); setToast({ severity: "error", text: "ランチャーHTML出力に失敗しました。" }); }
      }
      function exportScenarioList() {
        const csvEscape = value => `"${String(value ?? "").replace(/"/g, '""')}"`;
        const rows = [
          ["シナリオID", "業務", "分類", "シナリオ名", "段数", "ステップ", "説明"],
          ...MOCK_SCENARIOS.flatMap(scenario => {
            const businessLabel = BUSINESS[scenario.business]?.label || scenario.business;
            const stepLabels = (scenario.steps || []).map(step => step.label).join(" > ");
            return (scenario.steps || []).map((step, index) => [
              scenario.id,
              businessLabel,
              scenario.category || "",
              scenario.label,
              `${index + 1}/${scenario.steps.length}`,
              stepLabels,
              step.description || ""
            ]);
          })
        ];
        const csv = "\uFEFF" + rows.map(row => row.map(csvEscape).join(",")).join("\r\n");
        saveTextFile(`workflow_mock_scenarios_${formatFileDate(new Date())}.csv`, csv, "text/csv;charset=utf-8;");
        setToast({ severity: "success", text: "シナリオ一覧CSVを出力しました。" });
      }

      return (
        <Box sx={{ minHeight: "100vh", bgcolor: "#0f172a", overflow: "hidden" }}>
          <Box sx={{ minHeight: "100vh", width: "100%", display: "flex", alignItems: "center", justifyContent: "center", p: 2, overflow: "auto" }}>
            <Box sx={{ position: "relative", width: frameSize.width, maxWidth: "calc(100vw - 32px)", height: frameSize.height, maxHeight: "calc(100vh - 32px)", bgcolor: "white", borderRadius: viewportConfig.radius, overflow: "hidden", boxShadow: "0 22px 70px rgba(0,0,0,0.42)", border: "1px solid rgba(255,255,255,0.16)" }}>
              <iframe ref={iframeRef} title="実画面プレビュー" src={frameSrc} onLoad={() => window.setTimeout(() => postState(activeStep?.payload || {}), 120)} style={{ width: "100%", height: "100%", border: 0, display: "block", background: "#ffffff" }} />
            </Box>
          </Box>

          {!launcherOpen && <Fab color="primary" variant="extended" onClick={() => setLauncherOpen(true)} sx={{ position: "fixed", top: 16, right: 16, zIndex: 1800 }}><Icon sx={{ mr: 1 }}>tune</Icon>Launcher</Fab>}

          {launcherOpen && (
            <Paper ref={panelRef} elevation={14} sx={{ position: "fixed", top: 16, right: 16, zIndex: 1800, width: { xs: "calc(100% - 32px)", sm: launcherSize.width }, height: { xs: "auto", sm: launcherSize.height }, maxHeight: "calc(100vh - 32px)", minWidth: { xs: "auto", sm: 360 }, minHeight: { xs: "auto", sm: 420 }, overflow: "hidden", display: "flex", flexDirection: "column", borderRadius: 2, border: "1px solid rgba(15,23,42,0.14)", bgcolor: "rgba(255,255,255,0.97)", backdropFilter: "blur(10px)", boxShadow: "0 18px 48px rgba(15,23,42,0.24)" }}>
              <Box sx={{ p: 2, borderBottom: "1px solid", borderColor: "divider" }}>
                <Stack direction="row" alignItems="flex-start" justifyContent="space-between" spacing={2}>
                  <Box>
                    <Stack direction="row" spacing={1} alignItems="center" flexWrap="wrap" useFlexGap>
                      <Typography variant="h6" sx={{ fontWeight: 900 }}>6業務共通モック</Typography>
                      <Chip size="small" color="warning" variant="outlined" label="Mock Launcher" />
                      <Chip size="small" color="primary" variant="outlined" label={APP_CONFIG.connectionMode.toUpperCase()} />
                    </Stack>
                  </Box>
                  <Tooltip title="最小化"><IconButton onClick={() => setLauncherOpen(false)} size="small"><Icon>minimize</Icon></IconButton></Tooltip>
                </Stack>
              </Box>
              <Box sx={{ p: 2, overflow: "auto", flex: 1 }}>
                <Stack spacing={2}>
                  {toast && <Alert severity={toast.severity} onClose={() => setToast(null)}>{toast.text}</Alert>}
                  <Paper variant="outlined" sx={{ p: 1.5, bgcolor: "grey.50" }}>
                    <Stack direction="row" alignItems="center" justifyContent="space-between" spacing={1} sx={{ mb: 1 }}>
                      <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>確認シナリオ</Typography>
                      <Chip size="small" color="primary" variant="outlined" label={`${MOCK_SCENARIOS.length}本`} />
                    </Stack>
                    <Stack spacing={1}>
                      <FormControl fullWidth size="small">
                        <InputLabel>業務</InputLabel>
                        <Select label="業務" value={selectedBusinessKey} onChange={event => changeBusiness(event.target.value)} MenuProps={{ disablePortal: true, PaperProps: { sx: { maxHeight: 320 } } }}>
                          {Object.entries(BUSINESS).map(([key, item]) => <MenuItem key={key} value={key}>{item.label}（{scenarioCounts[key] || 0}本）</MenuItem>)}
                        </Select>
                      </FormControl>
                      <FormControl fullWidth size="small">
                        <InputLabel>シナリオ</InputLabel>
                        <Select label="シナリオ" value={activeScenario.id} onChange={event => changeScenario(event.target.value)} MenuProps={{ disablePortal: true, PaperProps: { sx: { maxHeight: 360 } } }}>
                          {scenariosForBusiness.map(scenario => <MenuItem key={scenario.id} value={scenario.id}>{scenario.label}</MenuItem>)}
                        </Select>
                      </FormControl>
                      <Stack direction="row" spacing={0.75} flexWrap="wrap" useFlexGap>
                        <Chip size="small" color={BUSINESS[activeScenario.business]?.color || "primary"} variant="outlined" label={BUSINESS[activeScenario.business]?.label || activeScenario.business} />
                        <Chip size="small" variant="outlined" label={activeScenario.category || "確認"} />
                        <Chip size="small" variant="outlined" label={`${stepIndex + 1}/${steps.length}`} />
                      </Stack>
                    </Stack>
                    <Box sx={{ mt: 1.5 }}>
                      <Stepper activeStep={stepIndex} alternativeLabel sx={{ mb: 1 }}>{steps.map(step => <Step key={step.label}><StepLabel>{step.label}</StepLabel></Step>)}</Stepper>
                      <Stack direction="row" spacing={1} justifyContent="space-between"><Button size="small" variant="outlined" startIcon={<Icon>arrow_back</Icon>} onClick={() => moveStep(-1)} disabled={stepIndex === 0}>戻る</Button><Button size="small" variant="contained" endIcon={<Icon>arrow_forward</Icon>} onClick={() => moveStep(1)} disabled={stepIndex >= steps.length - 1}>次へ</Button></Stack>
                    </Box>
                  </Paper>
                  <Box>
                    <Typography variant="caption" color="text.secondary" display="block" sx={{ mb: 0.8 }}>プレビュー幅</Typography>
                    <ToggleButtonGroup value={viewport} exclusive onChange={(_, next) => next && setViewport(next)} size="small" color="secondary" fullWidth><ToggleButton value={VIEWPORTS.DESKTOP}>Desktop</ToggleButton><ToggleButton value={VIEWPORTS.TABLET}>Tablet</ToggleButton><ToggleButton value={VIEWPORTS.MOBILE}>iPhone</ToggleButton></ToggleButtonGroup>
                    <Stack spacing={1.25} sx={{ mt: 1.2 }}>
                      <Box>
                        <Stack direction="row" justifyContent="space-between" alignItems="center" spacing={1}>
                          <Typography variant="caption" color="text.secondary">横幅</Typography>
                          <Chip size="small" variant="outlined" label={`${Math.round(frameSize.width)}px`} />
                        </Stack>
                        <Slider
                          size="small"
                          value={Math.round(frameSize.width)}
                          min={320}
                          max={Math.max(320, window.innerWidth - 32)}
                          step={10}
                          onChange={(_, value) => updateFrameDimension("width", value)}
                          valueLabelDisplay="auto"
                        />
                      </Box>
                      <Box>
                        <Stack direction="row" justifyContent="space-between" alignItems="center" spacing={1}>
                          <Typography variant="caption" color="text.secondary">縦幅</Typography>
                          <Chip size="small" variant="outlined" label={`${Math.round(frameSize.height)}px`} />
                        </Stack>
                        <Slider
                          size="small"
                          value={Math.round(frameSize.height)}
                          min={480}
                          max={Math.max(480, window.innerHeight - 32)}
                          step={10}
                          onChange={(_, value) => updateFrameDimension("height", value)}
                          valueLabelDisplay="auto"
                        />
                      </Box>
                    </Stack>
                  </Box>
                  <Paper variant="outlined" sx={{ p: 1.5 }}>
                    <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>出力</Typography>
                    <Stack direction={{ xs: "column", sm: "row" }} spacing={1} flexWrap="wrap" useFlexGap><Button variant="outlined" startIcon={<Icon>open_in_new</Icon>} onClick={() => window.open(frameSrc, "_blank", "noopener,noreferrer")}>別タブ</Button><Button variant="contained" color="secondary" startIcon={<Icon>download</Icon>} onClick={exportCurrent}>実画面HTML</Button><Button variant="outlined" color="secondary" startIcon={<Icon>table_view</Icon>} onClick={exportScenarioList}>シナリオCSV</Button><Button variant="text" color="secondary" startIcon={<Icon>code</Icon>} onClick={exportLauncher}>ランチャー込み</Button></Stack>
                  </Paper>
                  <Paper variant="outlined" sx={{ p: 1.5, bgcolor: "grey.50" }}>
                    <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>現在の状態</Typography>
                    <Stack spacing={0.8}><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">シナリオ</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{activeScenario.label}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">ステップ</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{activeStep?.label}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">表示幅</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{viewportConfig.label}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">表示サイズ</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{Math.round(frameSize.width)} × {Math.round(frameSize.height)}</Typography></Stack></Stack>
                  </Paper>
                </Stack>
              </Box>
              <Tooltip title="ドラッグしてランチャーのサイズを変更"><Box role="separator" aria-label="ランチャーサイズ変更" onPointerDown={beginResize} sx={{ position: "absolute", left: 0, bottom: 0, width: 34, height: 34, display: { xs: "none", sm: "grid" }, placeItems: "center", cursor: "nesw-resize", color: "text.secondary", borderTop: "1px solid", borderRight: "1px solid", borderColor: "divider", bgcolor: "rgba(248,250,252,0.92)", '&:hover': { bgcolor: "grey.100", color: "primary.main" } }}><Icon fontSize="small" sx={{ transform: "rotate(45deg)" }}>drag_indicator</Icon></Box></Tooltip>
            </Paper>
          )}
        </Box>
      );
    }

    // ============================================================
    // [CORE] エントリポイント
    // ?embedded=1 → WorkflowApp（実画面）
    // それ以外    → LauncherApp（ランチャー）
    // ============================================================

    function App() {
      const params = new URLSearchParams(window.location.search);
      const isEmbedded = params.has("embedded");
      return (
        <ThemeProvider theme={theme}>
          <CssBaseline />
          <GlobalStyles styles={{ body: { background: isEmbedded ? "radial-gradient(circle at top left, rgba(25,118,210,0.12), transparent 34rem), #f6f7f9" : "#0f172a" }, "input, button, select, textarea": { fontFamily: "Roboto, Meiryo, sans-serif" } }} />
          {isEmbedded ? <WorkflowApp /> : <LauncherApp />}
        </ThemeProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
