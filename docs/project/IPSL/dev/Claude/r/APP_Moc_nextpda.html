  <!--
Workflow Mock Launcher / Runtime Constitution

This file is a self-contained single-file mock launcher framework.
Single HTML is the product boundary.

Core Identity:
- CDN / Babel / React / MUI are the dynamic runtime foundation.
- LAUNCHER is the framework body: scenario control, viewport, step navigation, postMessage, and HTML export.
- CORE is the 3-screen workflow app: start, scan/register, confirm/output.
- THEME is the swappable business layer: BUSINESS definitions, master data, validation rules, and scenarios.
- LAUNCHER and CORE are reusable assets. THEME is the only layer replaced when targeting a different domain.

Architecture:
- LAUNCHER drives CORE via iframe + postMessage (APPLY_MOCK_STATE).
- CORE renders dynamically from THEME definitions; it owns no business-specific logic.
- THEME defines BUSINESS fields, master constants, validateItem rules, and MOCK_SCENARIOS.
- DynamicField renders any field declared in BUSINESS.itemFields / startFields without CORE changes.
- ?embedded=1 in URL switches the entry point from LauncherApp to WorkflowApp (standalone mode).

Runtime Principles:
- Keep the single-file form; do not convert to npm/build structure by default.
- Keep boot light: CDN loads, Babel transform, ReactDOM.createRoot, done.
- Keep LAUNCHER state local to LauncherApp; do not leak into CORE or THEME.
- Keep CORE state in React hooks + localStorage (storageKey); treat localStorage as a compact cache.
- Keep postMessage payloads small and typed (type: "APPLY_MOCK_STATE").
- Scenario state injected via postMessage must be applied atomically (screen + context + entries together).
- HTML export (standalone and launcher variants) must remain functional after any THEME change.

Ownership Rules:
- APP_CONFIG owns the storage key, connection mode, and API endpoint stub.
- SCREEN / VIEW_MODE / VIEWPORTS / VIEWPORT_CONFIG own stable UI policy constants.
- BUSINESS owns per-workflow field declarations, labels, output actions, and complete checks.
- PRODUCTS / master constants own the domain data fixtures for the current THEME.
- validateItem owns all business-rule validation; getStatus derives display state from it.
- createDefaultContext / createDefaultItem own safe state initialization from THEME definitions.
- makeScenario / MOCK_SCENARIOS own the launcher scenario registry for the current THEME.
- DynamicField owns field-to-component mapping; new field types are added here only.
- WorkflowApp owns screen routing, localStorage sync, and postMessage reception.
- LauncherApp owns scenario selection, step control, viewport switching, and HTML export.
- App owns the embedded/launcher entry-point split; nothing else.

THEME Replacement Rules:
- To target a new domain: replace BUSINESS, PRODUCTS, master constants, validateItem, and MOCK_SCENARIOS.
- Do not touch LAUNCHER, CORE components, APP_CONFIG, or SCREEN constants during a THEME swap.
- New field types required by the new THEME must be added to DynamicField before use.
- Preserve the storageKey value unless intentionally migrating stored state.

Change Rule:
Observe -> Plan -> Do -> Check -> Act -> Lock.

Keep this block short.
Update only when runtime identity, architecture, ownership, boot policy,
storage boundary, postMessage contract, THEME boundary, or export behavior changes.
-->

    /**

     * ============================================================
     */

    // ============================================================
    // [LAUNCHER] 設定
    // ============================================================

    const APP_CONFIG = {
      storageKey: "unified_mobile_workflow_mock_v2",
      connectionMode: "mock",
      apiBaseUrl: "",
      apiEndpoint: "/store-workflows",
      autosaveDebounceMs: 650
    };

    // [LAUNCHER] 画面ID・表示モード・ビューポート設定
    const SCREEN = { START: "start", SCAN: "scan", CONFIRM: "confirm" };
    const VIEW_MODE = { CARDS: "cards", TABLE: "table" };
    const VIEWPORTS = { DESKTOP: "desktop", TABLET: "tablet", MOBILE: "mobile" };
    const VIEWPORT_CONFIG = {

      [VIEWPORTS.TABLET]: { label: "Tablet", width: 768, height: 820, radius: "4px" },
      [VIEWPORTS.MOBILE]: { label: "iPhone", width: 390, height: 844, radius: "4px" }
    };

    // ============================================================
    // [THEME] 業務定義（スーパーマーケット店頭 6業務）
    // ============================================================
    // BUSINESS・PRODUCTS・マスタ定数・シナリオがテーマ層。

    // ============================================================

    const BUSINESS = {

        helpSteps: ["商品をスキャン", "数量・売価・連Noを確認", "作業確定", "売価金額と連携状況を確認"],

      },
      priceCheck: {

        quantityLabel: "件数", amountLabel: "売価差異",
        outputActions: ["pdf", "complete"],
        completeChecks: ["差異修正", "POP再発行", "再チェック"],
        helpSteps: ["商品をスキャン", "実売価を入力", "POS登録売価との差異を確認", "作業確定して実績を確認"],
        defaultValues: { quantity: 1 }
      },
      pop: {
        label: "POP発行", shortLabel: "POP", icon: "campaign", color: "primary",
        purpose: "商品のPOP発行キューをPOPシステムへ送る",
        userPurpose: "売場に出すPOPの枚数、売価、レイアウトを確認します。",
        startFields: ["department", "layout", "printer"],
        itemFields: ["sku", "quantity", "displayPrice", "layout"],
        quantityLabel: "枚数", amountLabel: "POP売価",
        outputActions: ["pdf", "print", "complete"],
        completeChecks: ["POP内容確認", "売場差し替え", "旧POP回収"],
        helpSteps: ["商品をスキャン", "枚数・POP売価・レイアウトを確認", "作業確定", "POPシステムへの発行キューを確認"],
        defaultValues: { layout: "A4_1面", quantity: 1 }
      },
      label: {
        label: "継承ラベル", shortLabel: "ラベル", icon: "label", color: "secondary",
        purpose: "商品の産地を印字したラベルを発行する",
        userPurpose: "商品に貼る産地ラベルの内容と枚数を確認します。",
        startFields: ["department", "printer"],
        itemFields: ["sku", "traceCode", "origin", "quantity"],
        quantityLabel: "枚数", amountLabel: "枚数",
        outputActions: ["print", "complete"],
        completeChecks: ["ラベル印刷", "原料と一緒に保管", "不要ラベル破棄"],
        helpSteps: ["商品をスキャン", "個体識別番号をスキャンまたは産地を入力", "枚数を確認", "ラベル発行"],
        defaultValues: { quantity: 1, origin: "" }
      }
    };

    const PRODUCTS = [
      // [THEME] 商品マスタ（スーパー7品）
      { sku: "P-1001", barcode: "4901000000012", name: "国産牛 肩ロース うすぎり", department: "精肉", currentPrice: 698 },
      { sku: "P-1002", barcode: "4901000000029", name: "三元豚 ロース 生姜焼き用", department: "精肉", currentPrice: 398 },
      { sku: "P-1003", barcode: "4901000000036", name: "若鶏もも肉 唐揚げ用", department: "精肉", currentPrice: 288 },
      { sku: "P-2001", barcode: "4902000000019", name: "まぐろ切落し", department: "鮮魚", currentPrice: 598 },
      { sku: "P-3001", barcode: "4903000000016", name: "ミックスサラダ", department: "惣菜", currentPrice: 298 },
      { sku: "P-4001", barcode: "4904000000013", name: "北海道牛乳 1000ml", department: "日配", currentPrice: 228 },
      { sku: "P-5001", barcode: "4905000000010", name: "バナナ 1袋", department: "青果", currentPrice: 198 }
    ];

    const DEPARTMENTS = ["青果", "鮮魚", "精肉", "惣菜", "日配", "グロサリー"]; // [THEME]
    const LAYOUTS = ["A4_1面", "A4_4面", "A5", "棚札", "値下POP"];               // [THEME]
    const PRINTERS = ["売場プリンター01", "バックヤード01", "ラベルプリンター01"];  // [THEME]
    const REASONS = ["賞味期限切れ", "品質劣化", "売切促進", "競合対応", "本部指示", "売価訂正"]; // [THEME]
    const ADJUSTMENT_TYPES = ["廃棄", "値下", "値上", "本部指示"];                // [THEME]
    const SALE_TYPES = ["通売", "特売", "マネキン販売"];                           // [THEME]
    const ORIGINS = ["国産", "北海道産", "青森県産", "宮城県産", "茨城県産", "千葉県産", "鹿児島県産", "オーストラリア産", "アメリカ産"]; // [THEME]

    // ============================================================
    // [CORE] ユーティリティ関数（テーマに依存しない汎用処理）
    // ============================================================

    function todayText() {
      const date = new Date();
      const pad = number => String(number).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function createSessionName(businessKey = "work") {
      const date = new Date();
      const pad = number => String(number).padStart(2, "0");
      return `${(BUSINESS[businessKey]?.shortLabel || "作業")}-${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function yen(value) {
      return new Intl.NumberFormat("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 }).format(Number(value || 0));
    }

    function inferOriginFromTraceCode(traceCode) {
      const value = String(traceCode || "").trim().toUpperCase();
      if (!value) return "";
      if (value.startsWith("JP-01")) return "北海道産";
      if (value.startsWith("JP-02")) return "青森県産";
      if (value.startsWith("JP-04")) return "宮城県産";
      if (value.startsWith("JP-08")) return "茨城県産";
      if (value.startsWith("JP-12")) return "千葉県産";
      if (value.startsWith("JP-46")) return "鹿児島県産";
      if (value.startsWith("JP-")) return "国産";
      if (value.startsWith("AU-")) return "オーストラリア産";
      if (value.startsWith("US-")) return "アメリカ産";
      return "";
    }

    function normalizeCode(value) {
      return String(value || "").trim().replace(/[Ａ-Ｚａ-ｚ０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, "").toUpperCase();
    }

    function findProduct(value) {
      const keyword = normalizeCode(value);
      if (!keyword) return null;
      return PRODUCTS.find(product => [product.sku, product.barcode, product.name].some(text => normalizeCode(text).includes(keyword))) || null;
    }

    // ============================================================
    // [CORE] 状態ファクトリ・バリデーション（THEME定義を参照）
    // ============================================================

    function createDefaultContext(businessKey = "price") {
      const business = BUSINESS[businessKey] || BUSINESS.price;
      return {
        businessKey,
        workGroup: createSessionName(businessKey),
        department: "精肉",
        businessDate: todayText(),
        startDate: todayText(),
        endDate: todayText(),
        layout: business.defaultValues.layout || "A4_1面",
        printer: "売場プリンター01",
        salesFloor: "精肉平台",
        sequenceNo: business.defaultValues.sequenceNo || "001",
        useCountSheet: business.defaultValues.useCountSheet ?? false,
        adjustmentType: business.defaultValues.adjustmentType || "廃棄",
        reason: business.defaultValues.reason || "売切促進"
      };
    }

    function createDefaultItem(businessKey = "price", context = createDefaultContext(businessKey)) {
      const business = BUSINESS[businessKey] || BUSINESS.price;
      return {
        id: null,
        sku: "",
        barcode: "",
        productName: "",
        workGroup: context.workGroup || "セッション1",
        department: context.department,
        currentPrice: 0,
        quantity: business.defaultValues.quantity || 1,
        beforePrice: "",
        afterPrice: context.adjustmentType === "廃棄" ? 0 : "",
        displayPrice: "",
        layout: context.layout || "A4_1面",
        traceCode: "",
        origin: business.defaultValues.origin || "",
        sequenceNo: context.sequenceNo || "001",
        saleType: business.defaultValues.saleType || "通売",
        ticketChanged: business.defaultValues.ticketChanged || false
      };
    }

    function createEntry(productSku, businessKey, overrides = {}) {
      const product = PRODUCTS.find(item => item.sku === productSku) || PRODUCTS[0];
      const context = createDefaultContext(businessKey);
      const item = createDefaultItem(businessKey, context);
      const base = {
        ...item,
        id: overrides.id || `E-${Date.now()}-${Math.random().toString(16).slice(2, 7)}`,
        sku: product.sku,
        barcode: product.barcode,
        productName: product.name,
        department: product.department,
        currentPrice: product.currentPrice,
        beforePrice: product.currentPrice,
        afterPrice: context.adjustmentType === "廃棄" ? 0 : Math.max(0, product.currentPrice - 50),
        displayPrice: product.currentPrice,
        quantity: 1
      };
      return { ...base, ...overrides };
    }

    function calcAmount(row, businessKey) {
      if (businessKey === "price") return Math.abs((Number(row.beforePrice || 0) - Number(row.afterPrice || 0)) * Number(row.quantity || 1));
      if (businessKey === "returnGoods") return Number(row.currentPrice || row.displayPrice || 0) * Number(row.quantity || 1);
      if (businessKey === "priceCheck") return Math.abs(Number(row.displayPrice || 0) - Number(row.currentPrice || 0));
      if (businessKey === "label") return Number(row.quantity || 1);
      return Number(row.displayPrice || row.currentPrice || row.beforePrice || 0) * Number(row.quantity || 1);
    }

    function calcImpact(row, context) {
      if (context.businessKey === "returnGoods") return -1 * Number(row.currentPrice || row.displayPrice || 0) * Number(row.quantity || 1);
      if (context.businessKey !== "price") return 0;
      return (Number(row.afterPrice || 0) - Number(row.beforePrice || 0)) * Number(row.quantity || 1);
    }

    function getMasterValueLabel(context) {
      if (context.businessKey === "priceCheck") return "POS登録売価";
      if (context.businessKey === "pop") return "現売価";
      return "マスタ";
    }

    function getInputValueLabel(context) {
      if (context.businessKey === "priceCheck") return "実売価";
      if (context.businessKey === "pop") return "POP売価";
      if (context.businessKey === "label") return "産地";
      return "入力";
    }

    function formatInputValue(row, context) {
      if (context.businessKey === "price") return yen(row.afterPrice);
      if (context.businessKey === "label") return row.origin || row.traceCode || "-";
      return yen(row.displayPrice || row.currentPrice);
    }

    function formatDecisionValue(row, context) {
      if (context.businessKey === "pop") return yen(row.displayPrice || row.currentPrice);
      if (context.businessKey === "label") return `${row.quantity || 1}枚`;
      return yen(calcAmount(row, context.businessKey));
    }

    function calcSummaryDecisionValue(entries, context) {
      if (context.businessKey === "pop" || context.businessKey === "label") return entries.reduce((sum, row) => sum + Number(row.quantity || 1), 0);
      return entries.reduce((sum, row) => sum + calcAmount(row, context.businessKey), 0);
    }

    function formatSummaryDecisionValue(value, context) {
      if (context.businessKey === "pop" || context.businessKey === "label") return `${value}枚`;
      return yen(value);
    }

    function isBlank(value) {
      return value === undefined || value === null || String(value).trim() === "";
    }

    function validateItem(row, context) {
      const errors = [];
      const businessKey = context.businessKey;
      if (row.excluded) return errors;
      if (row.duplicate) errors.push("重複登録");
      if (!row.sku) errors.push("商品未選択");
      const qty = Number(row.quantity || 0);
      if (["pop", "price", "label", "inventory", "returnGoods"].includes(businessKey) && (!Number.isFinite(qty) || qty <= 0)) errors.push(`${BUSINESS[businessKey].quantityLabel}は1以上`);
      if (businessKey === "pop") {
        if (isBlank(row.displayPrice)) errors.push("売価未入力");
        if (!isBlank(row.displayPrice) && row.sku && Number(row.displayPrice) !== Number(row.currentPrice)) errors.push("マスタ売価と印字売価が異なります");
      }
      if (businessKey === "price") {
        if (isBlank(row.beforePrice)) errors.push("前売価未入力");
        if (isBlank(row.afterPrice)) errors.push("後売価未入力");
        if (context.adjustmentType === "廃棄" && Number(row.afterPrice) !== 0) errors.push("廃棄の後売価は0円");
        if (context.adjustmentType === "値下" && Number(row.afterPrice) >= Number(row.beforePrice)) errors.push("値下は後売価＜前売価");
        if (context.adjustmentType === "値上" && Number(row.afterPrice) <= Number(row.beforePrice)) errors.push("値上は後売価＞前売価");
      }
      if (businessKey === "label") {
        if (!context.printer) errors.push("プリンター未選択");
        if (!String(row.traceCode || "").trim() && !String(row.origin || "").trim()) errors.push("個体識別番号または産地が必要");
      }
      if (businessKey === "inventory") {
        if (isBlank(row.displayPrice)) errors.push("売価未入力");
      }
      if (businessKey === "priceCheck" && row.sku && Number(row.displayPrice) !== Number(row.currentPrice)) errors.push("売価不一致");
      if (businessKey === "returnGoods" && !row.saleType) errors.push("販売区分未選択");
      return errors;
    }

    function getStatus(row, context) {
      if (row.excluded) return { label: "対象外", color: "default", helper: row.excludeReason || "確認対象外" };
      const errors = validateItem(row, context);
      if (errors.length) return { label: "要確認", color: "error", helper: errors.join(" / ") };
      if (context.businessKey === "priceCheck") return { label: "一致", color: "success", helper: "POS登録売価と一致" };
      return { label: "OK", color: "success", helper: "" };
    }

    function loadState() {
      try {
        const raw = window.localStorage.getItem(APP_CONFIG.storageKey);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function saveState(state) {
      try { window.localStorage.setItem(APP_CONFIG.storageKey, JSON.stringify(state)); } catch (error) { console.warn(error); }
    }

    function createDraftId() {
      return `D-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    }

    function createWorkflowSnapshot({ draftId, screen, context, entries, confirmedRecord, confirmedRecords = [] }) {
      const activeEntries = getActiveEntries(entries);
      return {
        draftId,
        status: confirmedRecord ? "confirmed" : "draft",
        screen,
        context,
        entries,
        activeEntryCount: activeEntries.length,
        confirmedRecord: confirmedRecord || null,
        confirmedRecords,
        savedAt: new Date().toISOString()
      };
    }

    async function syncWorkflowSnapshot(snapshot) {
      if (APP_CONFIG.connectionMode === "mock") {
        return { ok: true, mode: "mock", savedAt: snapshot.savedAt };
      }
      const endpoint = `${APP_CONFIG.apiBaseUrl || ""}${APP_CONFIG.apiEndpoint}`;
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(snapshot)
      });
      if (!response.ok) throw new Error(`Workflow sync failed: ${response.status}`);
      return { ok: true, mode: "server", savedAt: snapshot.savedAt };
    }

    function applyScenarioToState(payload = {}) {
      const context = { ...createDefaultContext(payload.businessKey || "price"), ...(payload.context || {}) };
      // 互換: シナリオが単一の businessDate を渡す場合、開始日/終了日に展開する。
      const legacyDate = payload.context && payload.context.businessDate;
      if (legacyDate) {
        if (!payload.context.startDate) context.startDate = legacyDate;
        if (!payload.context.endDate) context.endDate = legacyDate;
      }
      const entries = Array.isArray(payload.entries) ? payload.entries : [];
      const confirmedRecords = Array.isArray(payload.confirmedRecords) ? payload.confirmedRecords : (payload.confirmedRecord ? [payload.confirmedRecord] : []);
      return { screen: payload.screen || SCREEN.START, context, entries, confirmedRecord: payload.confirmedRecord || null, confirmedRecords, openScanDrawer: Boolean(payload.openScanDrawer) };
    }

    function createScenarioConfirmedRecord(businessKey, entries = [], context = createDefaultContext(businessKey)) {
      const activeCount = entries.filter(row => !row.deletedAt).length;
      return {
        recordId: `WF-SCENARIO-${businessKey}`,
        status: "confirmed",
        syncState: createIntegrationState(businessKey),
        integrationTarget: getIntegrationTarget(businessKey),
        integrationState: createIntegrationState(businessKey),
        registeredAt: new Date().toISOString(),
        businessKey,
        workGroup: context.workGroup || "セッション1",
        context: { ...context },
        entries: entries.filter(row => !row.deletedAt).map(row => ({ ...row })),
        entryCount: activeCount
      };
    }

    function getScenarioDrawerDescription(businessKey, businessLabel) {
      const descriptions = {
        price: "登録ドロワーを開き、バーコード、商品、個数、前売価、後売価を入力します。",
        returnGoods: "登録ドロワーを開き、返品する商品、個数、売価、改票有無を入力します。",
        inventory: "登録ドロワーを開き、棚卸対象の商品、数量、売価、連Noを入力します。",
        priceCheck: "登録ドロワーを開き、商品と実際に確認した売価を入力します。",
        pop: "登録ドロワーを開き、商品、発行枚数、POP売価、レイアウトを入力します。",
        label: "登録ドロワーを開き、商品コード、個体識別番号または産地、発行枚数を入力します。"
      };
      return descriptions[businessKey] || `${businessLabel}の登録ドロワーを開き、必要な明細を入力します。`;
    }

    function makeScenario({ id, business, label, category, context = {}, entries = [], viewport = VIEWPORTS.MOBILE, startDescription, scanDescription, confirmDescription, outputDescription }) {
      const businessLabel = BUSINESS[business]?.label || business;
      const scenarioContext = { ...createDefaultContext(business), ...context };
      const hasIssues = entries.some(row => getStatus(row, scenarioContext).color === "error");
      const canConfirmScenario = entries.filter(row => !row.deletedAt).length > 0 && !hasIssues;
      const isLabelBusiness = business === "label";
      const confirmedScenarioRecord = canConfirmScenario ? createScenarioConfirmedRecord(business, entries, scenarioContext) : null;
      const confirmStepDescription = canConfirmScenario
        ? (isLabelBusiness ? "継承ラベルの登録明細を確認し、ラベル発行ボタンで発行対象として確定します。" : `${businessLabel}の登録明細を確認し、作業確定ボタンで実績化します。`)
        : `${businessLabel}の登録明細で要確認状態を確認します。`;
      const outputStepDescription = outputDescription || confirmDescription || (canConfirmScenario
        ? (isLabelBusiness ? "作業確定済みの継承ラベルを商品単位で確認し、ラベル発行・印刷に進みます。" : `${businessLabel}の確定済み実績を商品単位で確認し、修正・削除・ごみ箱を操作します。`)
        : `${businessLabel}の要確認を登録明細で修正します。`);
      const basePayload = { businessKey: business, context: scenarioContext };
      const finalStepLabel = isLabelBusiness ? "発行結果" : (business === "pop" ? "POP連携確認" : (business === "priceCheck" ? "売価確認" : "実績確認"));
      const confirmStepLabel = isLabelBusiness ? "ラベル発行" : "作業確定";
      const steps = [
        {
          label: "開始",
          description: startDescription || `${businessLabel}の基本条件を確認します。`,
          payload: { ...basePayload, screen: SCREEN.START, entries: [] }
        },
        {
          label: "条件",
          description: `${businessLabel}の基本条件を入力します。`,
          payload: { ...basePayload, screen: SCREEN.SCAN, entries: [], openStartSettings: true }
        },
        {
          label: "入力ドロワー",
          description: getScenarioDrawerDescription(business, businessLabel),
          payload: { ...basePayload, screen: SCREEN.SCAN, entries: [], openScanDrawer: true }
        },
        {
          label: "登録明細",
          description: scanDescription || `${businessLabel}を連続登録し、登録明細に未確定データとして保持します。`,
          payload: { ...basePayload, screen: SCREEN.SCAN, entries }
        }
      ];
      if (canConfirmScenario) {
        steps.push(
          {
            label: confirmStepLabel,
            description: confirmStepDescription,
            payload: { ...basePayload, screen: SCREEN.SCAN, entries }
          },
          {
            label: finalStepLabel,
            description: outputStepDescription,
            payload: { ...basePayload, screen: SCREEN.CONFIRM, entries: [], confirmedRecord: confirmedScenarioRecord, confirmedRecords: [confirmedScenarioRecord] }
          }
        );
      } else {
        steps.push({
          label: "是正",
          description: outputStepDescription,
          payload: { ...basePayload, screen: SCREEN.SCAN, entries }
        });
      }
      return {
        id,
        business,
        category,
        label,
        viewport,
        steps
      };
    }

    function CameraScanDialog({ open, onClose, onDetected }) {
      const videoRef = React.useRef(null);
      const streamRef = React.useRef(null);
      const frameRef = React.useRef(null);
      const [status, setStatus] = React.useState("idle");
      const [errorText, setErrorText] = React.useState("");
      const detectorSupported = typeof window !== "undefined" && "BarcodeDetector" in window;

      React.useEffect(() => {
        if (!open) return undefined;
        let disposed = false;
        async function startCamera() {
          setStatus("starting");
          setErrorText("");
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } }, audio: false });
            if (disposed) {
              stream.getTracks().forEach(track => track.stop());
              return;
            }
            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              await videoRef.current.play();
            }
            if (!detectorSupported) {
              setStatus("fallback");
              return;
            }
            const detector = new window.BarcodeDetector({ formats: ["ean_13", "ean_8", "code_128", "code_39", "qr_code"] });
            setStatus("scanning");
            const scanFrame = async () => {
              if (disposed || !videoRef.current) return;
              try {
                const codes = await detector.detect(videoRef.current);
                if (codes.length > 0) {
                  onDetected(codes[0].rawValue);
                  return;
                }
              } catch (error) {
                console.warn(error);
              }
              frameRef.current = window.requestAnimationFrame(scanFrame);
            };
            scanFrame();
          } catch (error) {
            console.warn(error);
            setStatus("error");
            setErrorText("カメラを起動できません。ブラウザのカメラ許可、HTTPS、端末設定を確認してください。");
          }
        }
        startCamera();
        return () => {
          disposed = true;
          if (frameRef.current) window.cancelAnimationFrame(frameRef.current);
          streamRef.current?.getTracks?.().forEach(track => track.stop());
          streamRef.current = null;
          if (videoRef.current) videoRef.current.srcObject = null;
        };
      }, [open]);

      return (
        <Dialog open={open} onClose={onClose} fullWidth maxWidth="xs">
          <DialogTitle sx={{ pb: 1 }}>カメラスキャン</DialogTitle>
          <DialogContent dividers>
            <Stack spacing={1.5}>
              <Box sx={{ position: "relative", overflow: "hidden", borderRadius: 2, bgcolor: "grey.900", aspectRatio: "4 / 3" }}>
                <video ref={videoRef} muted playsInline autoPlay style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                <Box sx={{ position: "absolute", inset: "24% 10%", border: "2px solid rgba(255,255,255,0.86)", borderRadius: 2, boxShadow: "0 0 0 999px rgba(0,0,0,0.28)" }} />
              </Box>
              {status === "starting" && <Alert severity="info">カメラを起動しています。</Alert>}
              {status === "scanning" && <Alert severity="info">バーコードを枠内に合わせてください。</Alert>}
              {status === "fallback" && <Alert severity="warning">このブラウザは自動読取に未対応です。モック確認用に下のサンプル読取を使えます。</Alert>}
              {status === "error" && <Alert severity="warning">{errorText}</Alert>}
              {(status === "fallback" || status === "error") && (
                <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap">
                  {PRODUCTS.slice(0, 4).map(product => (
                    <Button key={product.sku} size="small" variant="outlined" onClick={() => onDetected(product.barcode)}>{product.name}</Button>
                  ))}
                </Stack>
              )}
            </Stack>
          </DialogContent>
          <DialogActions>
            <Button onClick={onClose}>閉じる</Button>
          </DialogActions>
        </Dialog>
      );
    }

    function ConfirmDialog({ open, title, description, confirmLabel = "削除", confirmColor = "error", onCancel, onConfirm, children }) {
      return (
        <Dialog open={open} onClose={onCancel} fullWidth maxWidth="xs">
          <DialogTitle>{title}</DialogTitle>
          <DialogContent dividers>
            <Stack spacing={1}>
              {description && <Typography variant="body2" color="text.secondary">{description}</Typography>}
              {children}
            </Stack>
          </DialogContent>
          <DialogActions>
            <Button onClick={onCancel}>キャンセル</Button>
            <Button variant="contained" color={confirmColor} onClick={onConfirm}>{confirmLabel}</Button>
          </DialogActions>
        </Dialog>
      );
    }

    const NUMBER_PAD_FIELDS = ["quantity", "beforePrice", "afterPrice", "displayPrice", "sequenceNo"];

    function getNumericItemFields(context) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      return business.itemFields.filter(field => NUMBER_PAD_FIELDS.includes(field) && !(field === "afterPrice" && context.adjustmentType === "廃棄"));
    }

    function NumberPad({ open, onToggle, disabled, onInput, onBackspace, onClear, onPrevious, onEnter }) {
      const keepInputFocus = event => event.preventDefault();
      const run = action => {
        if (disabled) return;
        action?.();
      };
      if (!open) {
        return <Button fullWidth variant="outlined" startIcon={<Icon>dialpad</Icon>} onMouseDown={keepInputFocus} onClick={onToggle}>テンキーを表示</Button>;
      }
      return (
        <Paper variant="outlined" sx={{ p: 1, borderRadius: 2, bgcolor: "background.paper" }}>
          <Grid container spacing={0.75}>
            {["1", "2", "3", "4", "5", "6", "7", "8", "9", "00", "0"].map(key => (
              <Grid item xs={4} key={key}>
                <Button fullWidth variant="outlined" size="large" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(() => onInput(key))} sx={{ minHeight: 48, fontSize: "1.1rem", fontWeight: 900 }}>{key}</Button>
              </Grid>
            ))}
            <Grid item xs={4}><Button fullWidth variant="outlined" color="secondary" size="large" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onBackspace)} sx={{ minHeight: 48 }}><Icon>backspace</Icon></Button></Grid>
            <Grid item xs={4}><Button fullWidth variant="outlined" color="secondary" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onPrevious)} sx={{ minHeight: 44 }} startIcon={<Icon>arrow_upward</Icon>}>戻る</Button></Grid>
            <Grid item xs={4}><Button fullWidth variant="outlined" color="secondary" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onClear)} sx={{ minHeight: 44 }}>C</Button></Grid>
            <Grid item xs={4}><Button fullWidth variant="contained" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onEnter)} sx={{ minHeight: 44 }} endIcon={<Icon>keyboard_return</Icon>}>Enter</Button></Grid>
            <Grid item xs={12}><Button fullWidth variant="text" color="secondary" onMouseDown={keepInputFocus} onClick={onToggle}>テンキーを閉じる</Button></Grid>
          </Grid>
        </Paper>
      );
    }

    const TRASH_RETENTION_MS = 2 * 24 * 60 * 60 * 1000;

    function isDeleted(row) {
      return Boolean(row?.deletedAt);
    }

    function getActiveEntries(entries = []) {
      return entries.filter(row => !isDeleted(row));
    }

    function getStartFields(context) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      return business.startFields || [];
    }

    function getEntryWorkGroup(row, context) {
      return row.workGroup || context.workGroup || "未分類";
    }

    function groupEntriesByWorkGroup(entries = [], context) {
      const groups = [];
      entries.forEach(row => {
        const label = getEntryWorkGroup(row, context);
        let group = groups.find(item => item.label === label);
        if (!group) {
          group = { label, entries: [] };
          groups.push(group);
        }
        group.entries.push(row);
      });
      return groups;
    }

    function getTrashEntries(entries = []) {
      return entries.filter(isDeleted).sort((a, b) => Number(b.deletedAt || 0) - Number(a.deletedAt || 0));
    }

    function purgeExpiredTrash(entries = [], now = Date.now()) {
      return entries.filter(row => !row.deletedAt || now - Number(row.deletedAt) < TRASH_RETENTION_MS);
    }

    function trashRemainingText(row) {
      const remaining = TRASH_RETENTION_MS - (Date.now() - Number(row.deletedAt || Date.now()));
      if (remaining <= 0) return "自動完全削除の対象";
      const hours = Math.ceil(remaining / (60 * 60 * 1000));
      if (hours >= 24) return `あと${Math.ceil(hours / 24)}日で完全削除`;
      return `あと${hours}時間で完全削除`;
    }

    function formatDateTimeText(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      const pad = number => String(number).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function getIntegrationTarget(businessKey) {
      if (businessKey === "pop") return "POPシステム";
      if (businessKey === "label") return "印刷";
      if (["price", "returnGoods", "inventory"].includes(businessKey)) return "基幹システム";
      return "確認出力";
    }

    function createIntegrationState(businessKey) {
      if (businessKey === "label") return "printed";
      return "pendingDaily";
    }

    function getIntegrationStatus(record) {
      const businessKey = record?.businessKey || record?.context?.businessKey || "price";
      const target = record?.integrationTarget || getIntegrationTarget(businessKey);
      let state = record?.integrationState || record?.syncState || createIntegrationState(businessKey);
      if (businessKey !== "label" && isBackendLinkedRecord(record)) state = "linked";
      const statusMap = {
        printed: { label: "印刷済", color: "success" },
        linked: { label: "日次連携済み", color: "secondary" },
        pendingDaily: { label: "日次連携待ち", color: "warning" },
        pending: { label: "連携待ち", color: "warning" },
        failed: { label: "連携失敗", color: "error" }
      };
      return { target, state, ...(statusMap[state] || { label: "未連携", color: "default" }) };
    }

    function createMockRecord(context, entries) {
      const now = new Date();
      const pad = number => String(number).padStart(2, "0");
      const datePart = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}`;
      const timePart = `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const integrationTarget = getIntegrationTarget(context.businessKey);
      const integrationState = createIntegrationState(context.businessKey);
      return {
        recordId: `WF-${datePart}-${timePart}`,
        status: "confirmed",
        syncState: integrationState,
        integrationTarget,
        integrationState,
        registeredAt: now.toISOString(),
        businessKey: context.businessKey,
        workGroup: context.workGroup || "セッション1",
        context: { ...context },
        entries: getActiveEntries(entries).map(row => ({ ...row })),
        entryCount: getActiveEntries(entries).length
      };
    }

    function isBackendLinkedRecord(record) {
      if (!record) return false;
      if (record.syncState === "linked" || record.backendLinkedAt) return true;
      const businessDate = record.context?.businessDate || record.context?.endDate || "";
      return businessDate && businessDate < todayText();
    }

    function cloneRecordEntriesForWork(record, correction = false) {
      return (record.entries || []).map(row => ({
        ...row,
        id: `E-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`,
        deletedAt: null,
        sourceRecordId: record.recordId,
        correctionOf: correction ? record.recordId : undefined
      }));
    }

    function TrashDialog({ open, entries, context, onClose, onRestore, onPermanentDelete }) {
      const [permanentTarget, setPermanentTarget] = React.useState(null);
      const trashEntries = getTrashEntries(entries);
      React.useEffect(() => { if (!open) setPermanentTarget(null); }, [open]);
      return (
        <React.Fragment>
          <Dialog open={open} onClose={onClose} fullWidth maxWidth="sm">
            <DialogTitle sx={{ pb: 1 }}>
              <Stack direction="row" spacing={1} alignItems="center">
                <Icon color="error">delete</Icon>
                <Box sx={{ minWidth: 0 }}>
                  <Typography variant="h6">ごみ箱</Typography>
                  <Typography variant="caption" color="text.secondary">削除した明細は2日後に自動で完全削除されます。</Typography>
                </Box>
              </Stack>
            </DialogTitle>
            <DialogContent dividers sx={{ bgcolor: "background.default" }}>
              <Stack spacing={1}>
                {trashEntries.length === 0 && <EmptyState text="ごみ箱は空です。" />}
                {trashEntries.map(row => (
                  <Paper key={row.id} variant="outlined" sx={{ p: 1.25, bgcolor: "background.paper" }}>
                    <Stack spacing={1}>
                      <Stack direction="row" spacing={1} alignItems="flex-start" justifyContent="space-between">
                        <Box sx={{ minWidth: 0 }}>
                          <Typography variant="subtitle2" noWrap>{row.productName || "商品未選択"}</Typography>
                          <Typography variant="caption" color="text.secondary">{row.barcode || row.sku || "-"} / {trashRemainingText(row)}</Typography>
                        </Box>
                        <Chip size="small" color="error" variant="outlined" label="ごみ箱" />
                      </Stack>
                      <Stack direction="row" spacing={1} justifyContent="flex-end">
                        <Button size="small" variant="outlined" startIcon={<Icon>restore</Icon>} onClick={() => onRestore(row.id)}>復活</Button>
                        <Button size="small" color="error" startIcon={<Icon>delete_forever</Icon>} onClick={() => setPermanentTarget(row)}>完全削除</Button>
                      </Stack>
                    </Stack>
                  </Paper>
                ))}
              </Stack>
            </DialogContent>
            <DialogActions><Button onClick={onClose}>閉じる</Button></DialogActions>
          </Dialog>
          <ConfirmDialog
            open={Boolean(permanentTarget)}
            title="完全削除しますか？"
            description="完全削除した明細は復活できません。"
            confirmLabel="完全削除"
            onCancel={() => setPermanentTarget(null)}
            onConfirm={() => { if (permanentTarget) onPermanentDelete(permanentTarget.id); setPermanentTarget(null); }}
          >
            {permanentTarget && <Alert severity="error" sx={{ py: 0.5 }}>{permanentTarget.productName || "商品未選択"}</Alert>}
          </ConfirmDialog>
        </React.Fragment>
      );
    }


    function EntryCard({ row, context, onEdit, onRemove, readOnly = false, selected = false, onToggleSelect = null }) {
      const status = getStatus(row, context);
      const business = BUSINESS[context.businessKey];
      const isError = status.color === "error";
      return (
        <Paper variant="outlined" sx={{ p: 1.5, borderRadius: 2, borderColor: selected ? "primary.main" : (isError ? "error.light" : "divider"), bgcolor: selected ? "primary.50" : (isError ? "error.50" : "background.paper") }}>
          <Stack direction="row" spacing={1} alignItems="flex-start">
            {!readOnly && onToggleSelect && (
              <Checkbox
                size="small"
                checked={selected}
                onChange={() => onToggleSelect(row)}
                inputProps={{ "aria-label": `${row.productName || "明細"}を選択` }}
                sx={{ p: 0.25, mt: -0.25 }}
              />
            )}
            <Box sx={{ minWidth: 0, flex: 1 }}>
              <Stack direction="row" spacing={1} justifyContent="space-between" alignItems="flex-start">
                <Box sx={{ minWidth: 0 }}>
                  <Typography variant="subtitle2" noWrap>{row.productName || "商品未選択"}</Typography>
                  <Typography variant="caption" color="text.secondary">{row.barcode || row.sku || "-"}</Typography>
                </Box>
                <Chip size="small" color={status.color} variant={isError ? "filled" : "outlined"} label={status.label} />
              </Stack>
              <Grid container spacing={1} sx={{ mt: 0.5 }}>
                <Grid item xs={3}><Typography variant="caption" color="text.secondary" display="block">{business.quantityLabel}</Typography><Typography variant="body2" sx={{ fontWeight: 700 }}>{row.quantity || 1}</Typography></Grid>
                <Grid item xs={3}><Typography variant="caption" color="text.secondary" display="block">{getMasterValueLabel(context)}</Typography><Typography variant="body2" sx={{ fontWeight: 700 }}>{yen(row.currentPrice)}</Typography></Grid>
                <Grid item xs={3}><Typography variant="caption" color="text.secondary" display="block">{getInputValueLabel(context)}</Typography><Typography variant="body2" sx={{ fontWeight: 700 }}>{formatInputValue(row, context)}</Typography></Grid>
                <Grid item xs={3}><Typography variant="caption" color="text.secondary" display="block">{business.amountLabel}</Typography><Typography variant="body2" sx={{ fontWeight: 700 }}>{formatDecisionValue(row, context)}</Typography></Grid>
              </Grid>
              {status.helper && <Alert severity={status.color === "default" ? "info" : status.color} sx={{ mt: 1, py: 0 }}>{status.helper}</Alert>}
              {!readOnly && <Stack direction="row" spacing={1} sx={{ mt: 1.2 }}>
                <Button size="small" variant="outlined" startIcon={<Icon>edit</Icon>} onClick={() => onEdit(row)}>修正</Button>
                <Button size="small" color="error" startIcon={<Icon>delete_outline</Icon>} onClick={() => onRemove(row)}>削除</Button>
              </Stack>}
            </Box>
          </Stack>
        </Paper>
      );
    }

    function EntryTable({ entries, context, onEdit, onRemove, readOnly = false, selectedIds = [], allSelected = false, partialSelected = false, onToggleSelect = null, onToggleAll = null }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      return (
        <TableContainer component={Paper} variant="outlined" sx={{ flex: 1, minHeight: 0 }}>
          <Table stickyHeader size="small">
            <TableHead><TableRow>{!readOnly && <TableCell padding="checkbox"><Checkbox size="small" checked={allSelected} indeterminate={partialSelected} onChange={event => onToggleAll?.(event.target.checked)} inputProps={{ "aria-label": "登録明細をすべて選択" }} /></TableCell>}<TableCell>状態</TableCell><TableCell>作業セッション</TableCell><TableCell>商品</TableCell><TableCell align="right">数量</TableCell><TableCell align="right">{getMasterValueLabel(context)}</TableCell><TableCell align="right">{getInputValueLabel(context)}</TableCell><TableCell align="right">{business.amountLabel}</TableCell>{!readOnly && <TableCell>操作</TableCell>}</TableRow></TableHead>
            <TableBody>
              {entries.map(row => {
                const status = getStatus(row, context);
                const selected = selectedIds.includes(row.id);
                return (
                  <TableRow key={row.id} hover selected={selected} sx={status.color === "error" ? { bgcolor: "error.50" } : null}>
                    {!readOnly && <TableCell padding="checkbox"><Checkbox size="small" checked={selected} onChange={() => onToggleSelect?.(row)} inputProps={{ "aria-label": `${row.productName || "明細"}を選択` }} /></TableCell>}
                    <TableCell><Chip size="small" color={status.color} variant={status.color === "error" ? "filled" : "outlined"} label={status.label} /></TableCell>
                    <TableCell>{getEntryWorkGroup(row, context)}</TableCell>
                    <TableCell><Typography variant="body2" sx={{ fontWeight: 700 }}>{row.productName}</Typography><Typography variant="caption" color="text.secondary">{row.barcode}</Typography></TableCell>
                    <TableCell align="right">{row.quantity || 1}</TableCell>
                    <TableCell align="right">{yen(row.currentPrice)}</TableCell>
                    <TableCell align="right">{formatInputValue(row, context)}</TableCell>
                    <TableCell align="right" sx={{ fontWeight: 700 }}>{formatDecisionValue(row, context)}</TableCell>
                    {!readOnly && <TableCell><Stack direction="row" spacing={0.5}><IconButton size="small" onClick={() => onEdit(row)}><Icon>edit</Icon></IconButton><IconButton size="small" color="error" onClick={() => onRemove(row)}><Icon>delete</Icon></IconButton></Stack></TableCell>}
                  </TableRow>
                );
              })}
              {entries.length === 0 && <TableRow><TableCell colSpan={readOnly ? 7 : 9} align="center" sx={{ py: 5 }}><Typography color="text.secondary">登録明細がありません。</Typography></TableCell></TableRow>}
            </TableBody>
          </Table>
        </TableContainer>
      );
    }

    function EntryGroupList({ entries, context, renderEntry }) {
      const groups = groupEntriesByWorkGroup(entries, context);
      return (
        <Stack spacing={1}>
          {groups.map(group => (
            <Box key={group.label}>
              <Stack spacing={1}>{group.entries.map(renderEntry)}</Stack>
            </Box>
          ))}
        </Stack>
      );
    }

    function getFieldLabel(name, context) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const labels = {
        department: "部門",
        businessDate: "登録日",
        startDate: "開始日",
        endDate: "終了日",
        layout: "レイアウト",
        printer: "プリンター",
        salesFloor: "売場",
        sequenceNo: "連No",
        useCountSheet: "つけたて表",
        adjustmentType: "区分",
        reason: "理由"
      };
      if (name === "quantity") return business.quantityLabel;
      return labels[name] || name;
    }

    function formatFieldValue(name, value) {
      if (name === "useCountSheet") return value ? "あり" : "なし";
      if (value === undefined || value === null || value === "") return "未設定";
      return String(value);
    }

    function hasSpecifiedConditionValue(name, value) {
      if (name === "startDate" || name === "endDate") return true;
      return !(value === undefined || value === null || value === "");
    }

    function StartConditionBar({ screen, context, entries, onOpenSettings }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const isConfirmScreen = screen === SCREEN.CONFIRM;
      const fields = getStartFields(context);
      const confirmFields = Array.from(new Set([...fields.filter(field => field !== "businessDate"), "startDate", "endDate"]));
      const outputStartDate = context.startDate || context.businessDate || todayText();
      const outputEndDate = context.endDate || context.businessDate || outputStartDate;
      const conditionFields = isConfirmScreen
        ? confirmFields.filter(field => hasSpecifiedConditionValue(field, field === "startDate" ? outputStartDate : field === "endDate" ? outputEndDate : context[field]))
        : fields.slice(0, 5);
      return (
        <Box sx={{ px: { xs: 1.5, md: 2.5 }, py: 1, borderBottom: "1px solid", borderColor: "divider", bgcolor: "background.paper" }}>
          <Stack direction="row" spacing={0.75} alignItems="center" useFlexGap flexWrap="wrap">
            {conditionFields.map(field => (
              <Chip key={field} clickable size="small" color="primary" variant="outlined" label={`${getFieldLabel(field, context)}: ${formatFieldValue(field, field === "startDate" ? outputStartDate : field === "endDate" ? outputEndDate : context[field])}`} onClick={onOpenSettings} />
            ))}
          </Stack>
        </Box>
      );
    }

    function StartSettingsDialog({ open, screen, context, setContext, onClose }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const isConfirmScreen = screen === SCREEN.CONFIRM;
      const baseFields = getStartFields(context);
      const fields = isConfirmScreen
        ? Array.from(new Set([...baseFields.filter(field => field !== "businessDate"), "startDate", "endDate"]))
        : baseFields;
      function updateContext(name, value) {
        setContext(prev => {
          const next = { ...prev, [name]: value };
          if (name === "adjustmentType" && value === "廃棄") next.reason = "賞味期限切れ";
          if (name === "adjustmentType" && value === "") next.reason = "";
          return next;
        });
      }
      return (
        <Dialog open={open} onClose={onClose} fullWidth maxWidth="sm">
          <DialogTitle sx={{ pb: 1 }}>
            <Stack direction="row" spacing={1} alignItems="center">
              <Icon color={business.color}>{business.icon}</Icon>
              <Box sx={{ minWidth: 0 }}>
                <Typography variant="h6">{business.label} {isConfirmScreen ? "確認出力条件" : "基本条件"}</Typography>
              </Box>
            </Stack>
          </DialogTitle>
          <DialogContent dividers>
            <Grid container spacing={1.5} sx={{ mt: 0 }}>
              {fields.map(field => (
                <Grid item xs={12} key={field}>
                  <DynamicField name={field} value={context[field]} onChange={updateContext} context={context} optional={isConfirmScreen && field !== "startDate" && field !== "endDate"} />
                </Grid>
              ))}
            </Grid>
          </DialogContent>
          <DialogActions>
            <Button onClick={onClose}>閉じる</Button>
            <Button variant="contained" onClick={onClose}>{isConfirmScreen ? "この条件で確認出力" : "この基本条件で続ける"}</Button>
          </DialogActions>
        </Dialog>
      );
    }

    function BusinessHelpDialog({ open, context, onClose }) {

      const steps = business.helpSteps || ["商品をスキャン", "登録明細を確認", context.businessKey === "label" ? "ラベル発行" : "作業確定", "確認出力で実績を確認"];
      return (
        <Dialog open={open} onClose={onClose} fullWidth maxWidth="xs">
          <DialogTitle sx={{ pb: 1 }}>
            <Stack direction="row" spacing={1} alignItems="center">
              <Icon color={business.color}>{business.icon}</Icon>
              <Typography variant="h6">{business.label}</Typography>
            </Stack>
          </DialogTitle>
          <DialogContent dividers>
            <Stack spacing={1.5}>
              <Box>
                <Typography variant="caption" color="text.secondary" display="block">目的</Typography>
                <Typography variant="body2">{business.userPurpose || business.purpose}</Typography>
              </Box>
              <Box>
                <Typography variant="caption" color="text.secondary" display="block">手順</Typography>

        <Dialog open={open} onClose={onClose} fullWidth maxWidth="sm">
          <DialogTitle sx={{ pb: 1 }}>
            <Stack direction="row" spacing={1} alignItems="center">
              <Icon>apps</Icon>
              <Box sx={{ minWidth: 0 }}>
                <Typography variant="h6">業務選択</Typography>
              </Box>

          </DialogTitle>
          <DialogContent dividers sx={{ bgcolor: "background.default" }}>
            {entries.length > 0 && (

                    <CardActionArea onClick={() => onSelect(key)} sx={{ p: 1.75, height: "100%" }}>

          <DialogActions>
            <Button onClick={onClose}>閉じる</Button>

    function ResponsiveShell({ screen, setScreen, context, entries, children, bottomBar, onReset, onOpenSettings, onOpenBusinessMenu, onOpenBusinessHelp }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const isFlow = screen !== SCREEN.START;
      const issueCount = entries.filter(row => getStatus(row, context).color === "error").length;
      const tabValue = screen === SCREEN.CONFIRM ? SCREEN.CONFIRM : SCREEN.SCAN;
      return (
        <Box sx={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden", bgcolor: "background.default" }}>
          <AppBar position="static" elevation={0} sx={{ bgcolor: `${business.color}.main`, color: `${business.color}.contrastText`, backgroundImage: "none" }}>
            <Toolbar sx={{ minHeight: { xs: 56, md: 64 }, gap: 1 }}>
              <Tooltip title="業務を選択"><IconButton color="inherit" onClick={onOpenBusinessMenu} edge="start"><Icon>menu</Icon></IconButton></Tooltip>
              <Box sx={{ minWidth: 0, display: "flex", alignItems: "center", gap: 0.5 }}>
                <Button color="inherit" onClick={onOpenBusinessHelp} sx={{ minWidth: 0, px: 0, textTransform: "none" }}>
                  <Typography variant="h6" noWrap>{isFlow ? business.label : "業務選択"}</Typography>
                </Button>
                <Tooltip title="リセット"><IconButton color="inherit" size="small" onClick={onReset}><Icon sx={{ fontSize: 20 }}>restart_alt</Icon></IconButton></Tooltip>
              </Box>
              <Box sx={{ flex: 1 }} />
              <Tooltip title="アカウント情報">
                <Box sx={{ display: "flex", alignItems: "center", gap: 0.75, minWidth: 0 }}>
                  <Box sx={{ width: 30, height: 30, borderRadius: "50%", display: "grid", placeItems: "center", bgcolor: "rgba(255,255,255,0.22)", fontWeight: 900, fontSize: 13 }}>山</Box>
                  <Box sx={{ display: { xs: "none", sm: "block" }, minWidth: 0 }}>
                    <Typography variant="body2" noWrap sx={{ fontWeight: 800, lineHeight: 1.2 }}>山田 太郎</Typography>
                    <Typography variant="caption" noWrap sx={{ display: "block", opacity: 0.85, lineHeight: 1.1 }}>新宿店</Typography>
                  </Box>
                </Box>
              </Tooltip>
            </Toolbar>
          </AppBar>

          {isFlow && (
            <Paper square elevation={0} sx={{ borderBottom: "1px solid", borderColor: "divider" }}>
              <Tabs value={tabValue} onChange={(_, next) => setScreen(next)} variant="fullWidth" indicatorColor="primary" textColor="primary" sx={{ minHeight: 50 }}>
                <Tab value={SCREEN.SCAN} icon={<Icon>edit_note</Icon>} iconPosition="start" label={`登録 ${entries.length}`} sx={{ minHeight: 50 }} />
                <Tab value={SCREEN.CONFIRM} icon={issueCount ? <Badge color="error" variant="dot"><Icon>fact_check</Icon></Badge> : <Icon>fact_check</Icon>} iconPosition="start" label="確認出力" sx={{ minHeight: 50 }} />
              </Tabs>
            </Paper>
          )}

          {isFlow && <StartConditionBar screen={screen} context={context} entries={entries} onOpenSettings={onOpenSettings} />}

          <Box sx={{ flex: 1, minHeight: 0, overflowY: "auto", overflowX: "hidden" }}>
            <Box sx={{ width: "100%", maxWidth: screen === SCREEN.CONFIRM ? { xs: 760, md: "none" } : 760, mx: "auto", p: { xs: 1.5, md: 2.5 } }}>{children}</Box>
          </Box>

          <Paper elevation={8} square sx={{ borderTop: "1px solid", borderColor: "divider", bgcolor: "background.paper" }}>
            <Box sx={{ maxWidth: 760, mx: "auto", px: { xs: 1.25, md: 1.5 }, pt: 1.25, pb: "calc(env(safe-area-inset-bottom) + 10px)" }}>{bottomBar}</Box>
          </Paper>
        </Box>
      );
    }

    function StartScreen({ context, setContext }) {
      function selectBusiness(key) {
        setContext(createDefaultContext(key));
      }
      return (
        <Box sx={{ display: "grid", gap: 1.25 }}>
          <Typography variant="subtitle2" sx={{ fontWeight: 700 }}>業務を選択</Typography>
          <Grid container spacing={1.25}>
            {Object.entries(BUSINESS).map(([key, item]) => {
              const selected = context.businessKey === key;
              return (
              <Grid item xs={6} md={4} key={key}>
                <Card
                  variant="outlined"
                  sx={{
                    height: "100%",
                    borderRadius: 2,
                    borderColor: selected ? `${item.color}.main` : "divider",
                    borderWidth: selected ? 2 : 1,
                    bgcolor: selected ? `${item.color}.50` : "background.paper",
                    transition: "border-color .15s, background-color .15s, box-shadow .15s",
                    boxShadow: selected ? 1 : 0
                  }}
                >
                  <CardActionArea onClick={() => selectBusiness(key)} sx={{ minHeight: 94, height: "100%", p: 1.5, display: "grid", placeItems: "center" }}>
                    <Box sx={{ display: "grid", justifyItems: "center", alignItems: "center", gap: 1, width: "100%" }}>
                      <BusinessIcon item={item} size={44} iconSize={26} />
                      <Typography variant="subtitle2" align="center" sx={{ width: "100%", fontWeight: 800, lineHeight: 1.3 }}>{item.label}</Typography>
                    </Box>
                  </CardActionArea>
                </Card>
              </Grid>
              );
            })}
          </Grid>
        </Box>
      );
    }

    function ScanScreen({ context, setContext, entries, setEntries, setScreen, confirmedRecord, openDrawerRequest, closeDrawerRequest, onBindActions }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const activeEntries = getActiveEntries(entries);
      const isConfirmed = Boolean(confirmedRecord) && activeEntries.length === 0;
      const trashEntries = getTrashEntries(entries);
      const numericFields = getNumericItemFields(context);
      const [productInput, setProductInput] = React.useState("");
      const [item, setItem] = React.useState(() => createDefaultItem(context.businessKey, context));
      const [message, setMessage] = React.useState(null);
      const [sheetOpen, setSheetOpen] = React.useState(false);
      const [numberPadOpen, setNumberPadOpen] = React.useState(true);
      const [activeNumberField, setActiveNumberField] = React.useState(null);
      const [deleteTarget, setDeleteTarget] = React.useState(null);
      const [trashOpen, setTrashOpen] = React.useState(false);
      const [selectedEntryIds, setSelectedEntryIds] = React.useState([]);
      const [entryViewMode, setEntryViewMode] = React.useState(VIEW_MODE.CARDS);
      const [cameraOpen, setCameraOpen] = React.useState(false);
      const productInputRef = React.useRef(null);
      const numberInputRefs = React.useRef({});
      const issueCount = activeEntries.filter(row => getStatus(row, context).color === "error").length;
      const selectedEntries = activeEntries.filter(row => selectedEntryIds.includes(row.id));
      const allEntriesSelected = activeEntries.length > 0 && selectedEntryIds.length === activeEntries.length;
      const partialEntriesSelected = selectedEntryIds.length > 0 && selectedEntryIds.length < activeEntries.length;

      React.useEffect(() => {
        setItem(createDefaultItem(context.businessKey, context));
        setProductInput("");
        setMessage(null);
        setSheetOpen(false);
        setNumberPadOpen(true);
        setActiveNumberField(null);
      }, [context.businessKey]);
      React.useEffect(() => { if (context.adjustmentType === "廃棄") setItem(prev => ({ ...prev, afterPrice: 0 })); }, [context.adjustmentType]);
      React.useEffect(() => {
        if (activeNumberField && !numericFields.includes(activeNumberField)) setActiveNumberField(numericFields[0] || null);
      }, [context.businessKey, context.adjustmentType, activeNumberField, numericFields.join("|")]);
      React.useEffect(() => {
        if (!sheetOpen) return;
        window.setTimeout(() => {
          if (item.sku) focusNumberField("quantity");
          else productInputRef.current?.focus();
          if (!item.sku) productInputRef.current?.select?.();
        }, 120);
      }, [sheetOpen]);
      React.useEffect(() => {
        if (openDrawerRequest) openForNew();
      }, [openDrawerRequest]);
      React.useEffect(() => {
        if (closeDrawerRequest) setSheetOpen(false);
      }, [closeDrawerRequest]);
      React.useEffect(() => {
        setSelectedEntryIds(prev => prev.filter(id => activeEntries.some(row => row.id === id)));
      }, [activeEntries.length, context.businessKey]);

      function updateItem(name, value) {
        setItem(prev => {
          const next = { ...prev, [name]: value };
          if (context.businessKey === "label" && name === "traceCode") {
            const inferredOrigin = inferOriginFromTraceCode(value);
            if (inferredOrigin) next.origin = inferredOrigin;
          }
          return next;
        });
      }
      function focusNumberField(field) {
        if (!field || !numericFields.includes(field)) return;
        setActiveNumberField(field);
        setNumberPadOpen(true);
        window.setTimeout(() => {
          const input = numberInputRefs.current[field];
          input?.focus?.();
          input?.select?.();
        }, 80);
      }
      function moveNumberFocus(delta) {
        if (!numericFields.length) return;
        const currentIndex = activeNumberField ? numericFields.indexOf(activeNumberField) : -1;
        const nextIndex = currentIndex < 0 ? 0 : Math.max(0, Math.min(currentIndex + delta, numericFields.length - 1));
        focusNumberField(numericFields[nextIndex]);
      }
      function selectProduct(product) {
        if (!product) return;
        setProductInput(product.barcode);
        setContext(prev => ({ ...prev, department: product.department }));
        setItem(prev => ({
          ...prev,
          sku: product.sku,
          barcode: product.barcode,
          productName: product.name,
          workGroup: context.workGroup || prev.workGroup || "セッション1",
          department: product.department,
          currentPrice: product.currentPrice,
          quantity: 1,
          beforePrice: product.currentPrice,
          afterPrice: context.adjustmentType === "廃棄" ? 0 : Math.max(0, product.currentPrice - 50),
          displayPrice: product.currentPrice
        }));
        window.setTimeout(() => focusNumberField("quantity"), 120);
      }
      function searchProduct() {
        if (!String(productInput || "").trim()) { productInputRef.current?.focus?.(); productInputRef.current?.select?.(); return; }
        const product = findProduct(productInput);
        if (!product) { setMessage({ severity: "warning", text: "商品が見つかりません。一覧から選択してください。" }); productInputRef.current?.focus?.(); productInputRef.current?.select?.(); return; }
        selectProduct(product);
      }
      function handleCameraDetected(code) {
        setCameraOpen(false);
        setProductInput(code);
        const product = findProduct(code);
        if (product) {
          selectProduct(product);
          setMessage(null);
        } else {
          setMessage({ severity: "warning", text: "読み取ったコードの商品が見つかりません。一覧から選択してください。" });
          window.setTimeout(() => { productInputRef.current?.focus?.(); productInputRef.current?.select?.(); }, 80);
        }
      }
      function runPrimaryDrawerAction() {
        if (item.sku) { saveItem(); return; }
        if (String(productInput || "").trim()) { searchProduct(); return; }
        setMessage(null);
        setCameraOpen(true);
      }
      function clearItem() {
        setItem(createDefaultItem(context.businessKey, context));
        setProductInput("");
        setActiveNumberField(null);
        window.setTimeout(() => { productInputRef.current?.focus?.(); productInputRef.current?.select?.(); }, 80);
      }
      function openForNew() { clearItem(); setMessage(null); setNumberPadOpen(true); setSheetOpen(true); }
      function startEdit(row) {
        setItem({ ...row });
        setProductInput(row.barcode || row.sku);
        setMessage(null);
        setNumberPadOpen(true);
        setSheetOpen(true);
        window.setTimeout(() => focusNumberField("quantity"), 160);
      }
      function saveItem() {
        const errors = validateItem(item, context);
        if (errors.length && !(context.businessKey === "priceCheck" && errors.includes("売価不一致"))) { setMessage({ severity: "error", text: errors.join(" / ") }); return; }
        const isEdit = Boolean(item.id);
        const next = { ...item, workGroup: item.workGroup || context.workGroup || "セッション1", id: item.id || `E-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`, deletedAt: null };
        setEntries(prev => isEdit ? prev.map(row => row.id === item.id ? next : row) : [next, ...prev]);
        setSheetOpen(!isEdit);
        if (errors.length) setMessage({ severity: "warning", text: "登録しました。まだ確認が必要です。" });
        else setMessage(null);
        clearItem();
      }
      function requestRemoveItem(row) { setDeleteTarget(row); }
      function confirmRemoveItem() {
        if (!deleteTarget) return;
        const now = Date.now();
        setEntries(prev => prev.map(row => row.id === deleteTarget.id ? { ...row, deletedAt: now } : row));
        setSelectedEntryIds(prev => prev.filter(id => id !== deleteTarget.id));
        setDeleteTarget(null);
        setMessage({ severity: "info", text: "明細をごみ箱に移動しました。2日後に完全削除されます。" });
      }
      function toggleEntrySelection(row) {
        setSelectedEntryIds(prev => prev.includes(row.id) ? prev.filter(id => id !== row.id) : [...prev, row.id]);
      }
      function toggleAllEntries(checked) {
        setSelectedEntryIds(checked ? activeEntries.map(row => row.id) : []);
      }
      function bulkRemoveItems() {
        if (selectedEntries.length === 0) return;
        const now = Date.now();
        const selectedIds = new Set(selectedEntryIds);
        setEntries(prev => prev.map(row => selectedIds.has(row.id) ? { ...row, deletedAt: now } : row));
        setSelectedEntryIds([]);
        setMessage({ severity: "info", text: `${selectedEntries.length}件の明細をごみ箱に移動しました。` });
      }
      function restoreItem(id) { setEntries(prev => prev.map(row => row.id === id ? { ...row, deletedAt: null } : row)); setMessage({ severity: "success", text: "明細を復活しました。" }); }
      function permanentDeleteItem(id) { setEntries(prev => prev.filter(row => row.id !== id)); setMessage({ severity: "info", text: "明細を完全削除しました。" }); }
      function setNumberField(field, rawValue) {
        if (!field) return;
        const normalized = rawValue === "" ? "" : (field === "sequenceNo" ? rawValue : Number(rawValue));
        updateItem(field, normalized);
      }
      function appendNumberPadValue(key) {
        const field = activeNumberField;
        if (!field) return;
        const current = item[field];
        const raw = `${current === undefined || current === null ? "" : current}${key}`;
        const nextRaw = field === "sequenceNo" ? raw : raw.replace(/^0+(?=\d)/, "");
        setNumberField(field, nextRaw);
      }
      function backspaceNumberPadValue() {
        const field = activeNumberField;
        if (!field) return;
        const current = item[field];
        const nextRaw = String(current === undefined || current === null ? "" : current).slice(0, -1);
        setNumberField(field, nextRaw);
      }
      function clearNumberPadValue() { setNumberField(activeNumberField, ""); }
      React.useEffect(() => onBindActions({ search: searchProduct, save: saveItem, clear: clearItem, openForm: openForNew }), [productInput, item, context, entries, activeNumberField]);

      const priceCheckMismatch = context.businessKey === "priceCheck" && item.sku && Number(item.displayPrice) !== Number(item.currentPrice);

      return (
        <Stack spacing={1}>
          {!sheetOpen && message && <Alert severity={message.severity} onClose={() => setMessage(null)}>{message.text}</Alert>}

          <Stack spacing={0.75}>
            <Stack direction="row" spacing={0.75} alignItems="center" justifyContent="space-between">
              <Stack direction="row" spacing={0.75} alignItems="center" sx={{ minWidth: 0 }}>
                <Typography variant="subtitle1" noWrap>登録明細（{context.workGroup || "セッション"}：{activeEntries.length}件）</Typography>
              </Stack>
              <Stack direction="row" spacing={0.75} alignItems="center" justifyContent="flex-end" useFlexGap flexWrap="wrap">
                <Tooltip title={`ごみ箱 ${trashEntries.length}件`}>
                  <Button size="small" color={trashEntries.length ? "error" : "inherit"} onClick={() => setTrashOpen(true)} sx={{ minHeight: 30, px: 0.75, fontSize: "1rem", fontWeight: 700, color: trashEntries.length ? "error.main" : "text.secondary" }}>
                    ごみ箱（{trashEntries.length}件）
                  </Button>
                </Tooltip>
              </Stack>
            </Stack>
            <Stack direction="row" spacing={0.75} alignItems="center" justifyContent="flex-start" useFlexGap flexWrap="wrap">
              {activeEntries.length > 0 && (
                <Checkbox
                  size="small"
                  checked={allEntriesSelected}
                  indeterminate={partialEntriesSelected}
                  onChange={event => toggleAllEntries(event.target.checked)}
                  inputProps={{ "aria-label": "登録明細をすべて選択" }}
                  sx={{ p: 0.25 }}
                />
              )}
              {activeEntries.length > 0 && (
                <ToggleButtonGroup value={entryViewMode} exclusive onChange={(_, next) => next && setEntryViewMode(next)} size="small" color="primary">
                  <ToggleButton value={VIEW_MODE.CARDS}>カード</ToggleButton>
                  <ToggleButton value={VIEW_MODE.TABLE}>テーブル</ToggleButton>
                </ToggleButtonGroup>
              )}
              {selectedEntryIds.length > 0 && <Button size="small" color="error" variant="outlined" onClick={bulkRemoveItems}>選択削除 {selectedEntryIds.length}</Button>}
            </Stack>
          </Stack>

          {activeEntries.length === 0 ? (
            <Paper variant="outlined" sx={{ p: 4, textAlign: "center", borderStyle: "dashed", bgcolor: "grey.50" }}>
              <Icon sx={{ fontSize: 46, color: "text.disabled" }}>qr_code_scanner</Icon>
              <Typography color="text.secondary" sx={{ mt: 1, mb: 2 }}>登録明細がありません。</Typography>
              <Button variant="contained" size="large" startIcon={<Icon>add</Icon>} onClick={openForNew}>スキャン登録する</Button>
            </Paper>
          ) : (
            entryViewMode === VIEW_MODE.TABLE ? (
              <EntryTable
                entries={activeEntries}
                context={context}
                selectedIds={selectedEntryIds}
                allSelected={allEntriesSelected}
                partialSelected={partialEntriesSelected}
                onToggleSelect={toggleEntrySelection}
                onToggleAll={toggleAllEntries}
                onEdit={startEdit}
                onRemove={requestRemoveItem}
              />
            ) : (
              <EntryGroupList entries={activeEntries} context={context} renderEntry={row => (
              <EntryCard
                key={row.id}
                row={row}
                context={context}
                selected={selectedEntryIds.includes(row.id)}
                onToggleSelect={toggleEntrySelection}
                onEdit={startEdit}
                onRemove={requestRemoveItem}
              />
              )} />
            )
          )}

          <Drawer anchor="bottom" open={sheetOpen} onClose={() => setSheetOpen(false)} PaperProps={{ sx: { borderTopLeftRadius: 18, borderTopRightRadius: 18, maxHeight: "96vh", maxWidth: 760, mx: "auto", width: "100%" } }}>
            <Box sx={{ pt: 1, display: "grid", placeItems: "center" }}><Box sx={{ width: 40, height: 4, borderRadius: 2, bgcolor: "divider" }} /></Box>
            <Box sx={{ px: 2, pt: 1, pb: 1.25, display: "flex", alignItems: "center", gap: 1 }}>
              <Box sx={{ width: 32, height: 32, borderRadius: 1.5, display: "grid", placeItems: "center", bgcolor: `${business.color}.50`, color: `${business.color}.main` }}><Icon sx={{ fontSize: 20 }}>{business.icon}</Icon></Box>
              <Typography variant="subtitle1" sx={{ flex: 1 }}>{item.id ? "明細を修正" : `${business.label} 登録`}</Typography>
              <Chip size="small" color={activeEntries.length ? "primary" : "default"} variant="outlined" label={`登録中 ${activeEntries.length}件`} />
              <Button size="small" variant="text" color="secondary" onClick={clearItem}>クリア</Button>
              <IconButton onClick={() => setSheetOpen(false)}><Icon>close</Icon></IconButton>
            </Box>
            <Divider />
            <Box sx={{ px: 2, py: 2, overflow: "auto" }}>
              <Stack spacing={1.5}>
                {message && <Alert severity={message.severity} onClose={() => setMessage(null)}>{message.text}</Alert>}
                <TextField label="バーコード / 商品名" value={productInput} inputRef={productInputRef} onFocus={event => event.target.select()} onChange={event => setProductInput(event.target.value)} onKeyDown={event => { if (event.key === "Enter") searchProduct(); }} fullWidth placeholder="スキャンまたは入力" InputProps={{ startAdornment: <InputAdornment position="start"><Icon>qr_code_scanner</Icon></InputAdornment>, endAdornment: <InputAdornment position="end"><Button size="small" onClick={searchProduct}>検索</Button></InputAdornment> }} />
                <FormControl fullWidth><InputLabel>商品</InputLabel><Select label="商品" value={item.sku || ""} onChange={event => selectProduct(PRODUCTS.find(p => p.sku === event.target.value))}><MenuItem value="">未選択</MenuItem>{PRODUCTS.map(product => <MenuItem key={product.sku} value={product.sku}>{product.name}</MenuItem>)}</Select></FormControl>
                {business.itemFields.filter(field => field !== "sku").map(field => <DynamicField key={field} name={field} value={item[field]} onChange={updateItem} context={context} inputRef={node => { if (node) numberInputRefs.current[field] = node; }} onFocus={fieldName => { if (numericFields.includes(fieldName)) { setActiveNumberField(fieldName); setNumberPadOpen(true); } }} />)}
                {numericFields.length > 0 && <NumberPad open={numberPadOpen} onToggle={() => setNumberPadOpen(prev => !prev)} disabled={!activeNumberField} onInput={appendNumberPadValue} onBackspace={backspaceNumberPadValue} onClear={clearNumberPadValue} onPrevious={() => moveNumberFocus(-1)} onEnter={() => moveNumberFocus(1)} />}
                {priceCheckMismatch && <Alert severity="error">POS登録売価 {yen(item.currentPrice)} と実売価 {yen(item.displayPrice)} が不一致です。登録後、確認出力画面で修正対象になります。</Alert>}
              </Stack>
            </Box>
            <Divider />
            <Box sx={{ px: 2, py: 1.5, pb: "calc(env(safe-area-inset-bottom) + 12px)", display: "flex", alignItems: "center", gap: 1 }}>
              <Button variant="outlined" size="large" onClick={() => setSheetOpen(false)}>閉じる</Button>
              <Box sx={{ flex: 1 }} />
              <Button
                variant="contained"
                size="large"
                startIcon={<Icon>{item.sku ? "check" : "qr_code_scanner"}</Icon>}
                onClick={runPrimaryDrawerAction}
              >
                {item.sku ? (item.id ? "更新" : "登録") : "スキャン"}
              </Button>
            </Box>
          </Drawer>

          <CameraScanDialog open={cameraOpen} onClose={() => setCameraOpen(false)} onDetected={handleCameraDetected} />

          <ConfirmDialog
            open={Boolean(deleteTarget)}
            title="この明細をごみ箱に移動しますか？"
            description="ごみ箱へ移動した明細は復活できます。2日後に完全削除されます。"
            confirmLabel="ごみ箱へ移動"
            onCancel={() => setDeleteTarget(null)}
            onConfirm={confirmRemoveItem}
          >
            {deleteTarget && <Alert severity="warning" sx={{ py: 0.5 }}>{deleteTarget.productName || "商品未選択"}</Alert>}
          </ConfirmDialog>
          <TrashDialog open={trashOpen} entries={entries} context={context} onClose={() => setTrashOpen(false)} onRestore={restoreItem} onPermanentDelete={permanentDeleteItem} />
        </Stack>
      );
    }


    function ConfirmScreen({ context, setContext, entries, setEntries, confirmedRecord, confirmedRecords, syncStatus, onConfirmRecord, onEditRecord, onUpdateRecord, onBindAction }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const recordsForBusiness = (confirmedRecords || []).filter(record => record.businessKey === context.businessKey);
      const recordRows = recordsForBusiness.flatMap(record => (record.entries || []).map((row, index) => ({ ...row, __record: record, __recordIndex: index })));
      const outputEntries = recordRows.filter(row => !row.deletedAt);
      const recordTrashEntries = recordRows.filter(row => row.deletedAt);
      const activeEntries = getActiveEntries(entries);
      const isConfirmed = Boolean(confirmedRecord) && activeEntries.length === 0;
      const trashEntries = getTrashEntries(entries);
      const editNumericFields = getNumericItemFields(context);
      const [message, setMessage] = React.useState(null);
      const [previewOpen, setPreviewOpen] = React.useState(false);
      const [editingItem, setEditingItem] = React.useState(null);
      const [deleteTarget, setDeleteTarget] = React.useState(null);
      const [trashOpen, setTrashOpen] = React.useState(false);
      const [recordTrashOpen, setRecordTrashOpen] = React.useState(false);
      const [summaryOpen, setSummaryOpen] = React.useState(false);
      const [recordDisplayUnit, setRecordDisplayUnit] = React.useState("data");
      const [recordViewMode, setRecordViewMode] = React.useState(VIEW_MODE.CARDS);
      const [selectedRecordRows, setSelectedRecordRows] = React.useState([]);
      const [dataPage, setDataPage] = React.useState(0);
      const [dataRowsPerPage, setDataRowsPerPage] = React.useState(10);
      const [workPage, setWorkPage] = React.useState(0);
      const [workRowsPerPage, setWorkRowsPerPage] = React.useState(10);
      const [editNumberPadOpen, setEditNumberPadOpen] = React.useState(true);
      const [activeEditNumberField, setActiveEditNumberField] = React.useState(null);
      const editNumberInputRefs = React.useRef({});
      const issueEntries = outputEntries.filter(row => getStatus(row, context).color === "error");
      const totalQty = outputEntries.reduce((sum, row) => sum + Number(row.quantity || 1), 0);
      const totalAmount = calcSummaryDecisionValue(outputEntries, context);
      const totalImpact = outputEntries.reduce((sum, row) => sum + calcImpact(row, context), 0);
      const outputStartDate = context.startDate || context.businessDate || todayText();
      const outputEndDate = context.endDate || context.businessDate || outputStartDate;
      const periodText = outputStartDate === outputEndDate ? outputStartDate : `${outputStartDate} 〜 ${outputEndDate}`;
