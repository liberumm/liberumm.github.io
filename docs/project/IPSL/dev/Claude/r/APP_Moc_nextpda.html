          zip.file("manifest.json", JSON.stringify({
            generatedAt: new Date().toISOString(),
            total: targets.length,
            captured: targets.length - errors.length,
            errors

          saveBlob(filename, zipBlob);
          setToast({ severity: errors.length ? "warning" : "success", text: errors.length ? `画像ZIPを出力しました。一部失敗: ${errors.length}件` : successLabel });
        } catch (error) {
          console.error(error);
          setToast({ severity: "error", text: "画面画像の出力に失敗しました。" });

          await waitForAnimationFrames(2);

        }

                      <Button variant="outlined" color="secondary" startIcon={<Icon>photo_camera</Icon>} onClick={exportCurrentScreenshot} disabled={imageExportRunning}>{currentScreenshotRunning ? "現在画像出力中" : "現在PNG"}</Button>
                      <Button variant="outlined" color="secondary" startIcon={<Icon>collections</Icon>} onClick={exportActiveScenarioScreenshots} disabled={imageExportRunning}>{screenshotExport.running && screenshotExport.mode === "scenario" ? "シナリオ出力中" : "このシナリオPNG"}</Button>
                      <Button variant="outlined" color="secondary" startIcon={<Icon>image</Icon>} onClick={exportAllScreenshots} disabled={imageExportRunning}>{screenshotExport.running && screenshotExport.mode === "all" ? "一覧出力中" : "画面一覧PNG"}</Button>
                      <Button variant="outlined" color="secondary" startIcon={<Icon>table_view</Icon>} onClick={exportScenarioList} disabled={imageExportRunning}>シナリオCSV</Button>
                      <Button variant="text" color="secondary" startIcon={<Icon>code</Icon>} onClick={exportLauncher} disabled={imageExportRunning}>ランチャー込み</Button>
                    </Stack>
                    {screenshotExport.running && (
                      <Box sx={{ mt: 1.25 }}>
                        <Stack direction="row" justifyContent="space-between" spacing={1} alignItems="center" sx={{ mb: 0.5 }}>
                          <Typography variant="caption" color="text.secondary">{screenshotExport.mode === "scenario" ? "シナリオ画像出力" : "画面一覧画像出力"}</Typography>
                          <Typography variant="caption" sx={{ fontWeight: 900 }}>{screenshotExport.done}/{screenshotExport.total}（{Math.round((screenshotExport.done / Math.max(1, screenshotExport.total)) * 100)}%）</Typography>
                        </Stack>
                        <LinearProgress variant="determinate" value={Math.min(100, Math.round((screenshotExport.done / Math.max(1, screenshotExport.total)) * 100))} sx={{ height: 8, borderRadius: 1 }} />
                        {screenshotExport.label && <Typography variant="caption" color="text.secondary" display="block" noWrap sx={{ mt: 0.5 }}>{screenshotExport.label}</Typography>}
                      </Box>
                    )}
                  </Paper>
                  <Paper variant="outlined" sx={{ p: 1.5, bgcolor: "grey.50" }}>
                    <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>現在の状態</Typography>
                    <Stack spacing={0.8}><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">シナリオ</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{activeScenario.label}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">ステップ</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{activeStep?.label}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">表示幅</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{viewportConfig.label}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">表示サイズ</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{Math.round(frameSize.width)} × {Math.round(frameSize.height)}</Typography></Stack></Stack>
                  </Paper>
                </Stack>
              </Box>
              <Tooltip title="ドラッグしてランチャーのサイズを変更"><Box role="separator" aria-label="ランチャーサイズ変更" onPointerDown={beginResize} sx={{ position: "absolute", left: 0, bottom: 0, width: 34, height: 34, display: { xs: "none", sm: "grid" }, placeItems: "center", cursor: "nesw-resize", color: "text.secondary", borderTop: "1px solid", borderRight: "1px solid", borderColor: "divider", bgcolor: "rgba(248,250,252,0.92)", '&:hover': { bgcolor: "grey.100", color: "primary.main" } }}><Icon fontSize="small" sx={{ transform: "rotate(45deg)" }}>drag_indicator</Icon></Box></Tooltip>
            </Paper>
          )}
        </Box>
      );
    }

    // ============================================================
    // [CORE] エントリポイント
    // ?embedded=1 → WorkflowApp（実画面）
    // それ以外    → LauncherApp（ランチャー）
    // ============================================================

    function App() {
      const params = new URLSearchParams(window.location.search);
      const isEmbedded = params.has("embedded");
      return (
        <ThemeProvider theme={theme}>
          <CssBaseline />
          <GlobalStyles styles={{ body: { background: isEmbedded ? "radial-gradient(circle at top left, rgba(25,118,210,0.12), transparent 34rem), #f6f7f9" : "#0f172a" }, "input, button, select, textarea": { fontFamily: "Roboto, Meiryo, sans-serif" } }} />
          {isEmbedded ? <WorkflowApp /> : <LauncherApp />}
        </ThemeProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
