<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>支払管理書</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
  />

  <style>
    :root {
      --app-bg: #f5f7fb;
      --app-text: rgba(15, 23, 42, 0.92);
      --app-paper: #ffffff;
      --app-border: rgba(15, 23, 42, 0.12);
      --app-accent: #1976d2;
      --app-accent-soft: rgba(25, 118, 210, 0.14);
      --print-preview-bg: #e5e7eb;
    }

    html, body, #root {
      margin: 0;
      min-height: 100%;
      font-family: Roboto, "Meiryo", system-ui, sans-serif;
      background: var(--app-bg);
      color: var(--app-text);
    }

    * {
      box-sizing: border-box;
    }

    .boot-screen {
      padding: 24px;
    }

    .material-icons {
      font-size: 20px;
      line-height: 1;
      vertical-align: middle;
    }

    .dense-resizable-table {
      table-layout: fixed;
      width: max-content;
      min-width: 100%;
    }

    .dense-resizable-table th,
    .dense-resizable-table td {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .dense-resizable-table .MuiInputBase-root,
    .dense-resizable-table .MuiInputBase-input {
      font-size: 12px;
    }

    .resizable-head-cell {
      position: relative;
      user-select: none;
    }

    .column-resize-handle {
      position: absolute;
      top: 0;
      right: -3px;
      width: 7px;
      height: 100%;
      cursor: col-resize;
      z-index: 3;
    }

    .column-resize-handle:hover {
      background: var(--app-accent-soft);
    }

    .print-paper {
      background: #fff;
      padding: 24px;
      color: #111827;
      border-radius: 12px;
    }
    .print-preview-wrap {
      width: 100%;
      overflow: auto;
      padding: 16px;
      background: var(--print-preview-bg);
      border-radius: 12px;
      user-select: none;
      touch-action: none;
    }

    .print-preview-zoom {
      transform-origin: top center;
      transition: transform 120ms ease;
      width: fit-content;
      margin: 0 auto;
    }

    .print-paper.portrait {
      width: 794px;
      min-height: 1123px;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
    }

    .print-paper.landscape {
      width: 1123px;
      min-height: 794px;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
    }


    .print-title {
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid #111827;
      padding-bottom: 10px;
      margin-bottom: 16px;
      gap: 16px;
    }

    .print-title h2 {
      margin: 0;
      font-size: 22px;
    }

    .print-meta {
      font-size: 12px;
      text-align: right;
      line-height: 1.7;
    }

    .print-title-right {
      min-width: 220px;
    }

    .print-summary {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .print-box {
      border: 1px solid #111827;
      padding: 8px;
      font-size: 12px;
    }

    .print-box strong {
      display: block;
      text-align: right;
      font-size: 15px;
      margin-top: 4px;
    }

    .print-signatures {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 14px 0 16px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .print-title-right .print-signatures {
      grid-template-columns: repeat(2, 1fr);
      margin: 8px 0 0;
    }

    .print-stamp {
      border: 1px solid #111827;
      min-height: 72px;
      display: flex;
      flex-direction: column;
    }

    .print-stamp-title {
      border-bottom: 1px solid #111827;
      background: #f1f5f9;
      padding: 4px 6px;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
    }

    .print-stamp-box {
      flex: 1;
      display: grid;
      place-items: center;
      color: #9ca3af;
      font-size: 10px;
    }

    .print-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      break-inside: auto;
      page-break-inside: auto;
    }

    .print-table th,
    .print-table td {
      border: 1px solid #333;
      padding: 5px 6px;
      font-size: 11px;
    }

    .print-table th {
      background: #f1f5f9;
    }

    .print-section {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .print-section h3 {
      break-after: avoid;
      page-break-after: avoid;
    }

    .print-table tr {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .num {
      text-align: right;
    }

    @media (max-width: 700px) {
      .print-summary {
        grid-template-columns: 1fr;
      }

      .print-signatures {
        grid-template-columns: repeat(2, 1fr);
      }

      .print-title {
        display: block;
      }

      .print-meta {
        text-align: left;
        margin-top: 8px;
      }

      .print-title-right {
        min-width: 0;
      }
    }

    @page {
      size: A4 portrait;
      margin: 10mm;
    }

    body.print-landscape { page: landscape-page; }
    body.print-portrait { page: portrait-page; }

    @page landscape-page {
      size: A4 landscape;
      margin: 10mm;
    }

    @page portrait-page {
      size: A4 portrait;
      margin: 10mm;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      body {
        background: #fff;
      }

      .print-preview-wrap {
        padding: 0;
        background: #fff;
        overflow: visible;
        border-radius: 0;
      }

      .print-paper {
        width: auto !important;
        min-height: auto !important;
        margin: 0 !important;
        padding: 0;
        border-radius: 0;
        box-shadow: none !important;
      }

      .print-preview-zoom {
        transform: none !important;
        margin: 0 !important;
      }

      .print-summary {
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
      }

      .print-box {
        padding: 5px;
        font-size: 10px;
      }

      .print-box strong {
        font-size: 12px;
      }

      .print-table th,
      .print-table td {
        font-size: 9px;
        padding: 3px 4px;
      }

      .print-signatures {
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
      }

      .print-stamp {
        min-height: 54px;
      }

      .print-title h2 {
        font-size: 18px;
      }

      .print-meta {
        font-size: 10px;
      }
    }
  </style>
</head>

    let appSetting = structuredClone(DEFAULT_SETTING);
    let appData = structuredClone(DEFAULT_DATA);

    let dataFileHandle = null;
    let settingFileHandle = null;
    let dataAutoSaveTimer = null;

    const CLIENT_STORAGE_POLICY = {
      noBrowserPersistence: true,
      clearLocalStorage: true,
      clearSessionStorage: true,
      clearIndexedDB: true,
      clearCacheStorage: true,
      clearCookies: true,
      unregisterServiceWorkers: true
    };

    const libraryFiles = [
      {
        key: "React",
        cdn: "https://unpkg.com/react@18.3.1/umd/react.development.js",
        local: "./vendor/react.development.js",

        local: "./vendor/react-is.development.js",

      },

      },

      },

      }
    ];

    const optionalLibraryFiles = [

        key: "D3",
        cdn: "https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js",
        local: "./vendor/d3.min.js",
        check: () => window.d3
      }
    ];

    window.addEventListener("DOMContentLoaded", async () => {
      await enforceNoClientStorage("startup-before-load");
      await loadAppFiles();
      await enforceNoClientStorage("startup-after-load");

      const ready = await loadLibrariesWithFallback();

      if (!ready) {
        renderVanillaFallbackApp();
        return;
      }

      runBabelApp();
    });

    window.addEventListener("pagehide", () => {
      clearRuntimeGlobalData();
      enforceNoClientStorage("pagehide");
    });

    window.addEventListener("beforeunload", () => {
      clearRuntimeGlobalData();
      enforceNoClientStorage("beforeunload");
    });

    function getClientDataPolicy(setting = appSetting) {
      return {
        ...CLIENT_STORAGE_POLICY,
        ...(setting?.clientData || {})
      };
    }

    async function enforceNoClientStorage(reason = "manual") {
      const policy = getClientDataPolicy();
      if (!policy.noBrowserPersistence) return;

      clearWebStorage(policy);
      clearSameOriginCookies(policy);
      await Promise.allSettled([
        clearCacheStorage(policy),
        clearIndexedDbStorage(policy),
        unregisterServiceWorkers(policy)
      ]);
    }

    function clearWebStorage(policy) {
      try {
        if (policy.clearLocalStorage && window.localStorage) window.localStorage.clear();
      } catch {}

      try {
        if (policy.clearSessionStorage && window.sessionStorage) window.sessionStorage.clear();
      } catch {}
    }

    async function clearCacheStorage(policy) {
      if (!policy.clearCacheStorage || !("caches" in window)) return;

      try {
        const keys = await window.caches.keys();
        await Promise.all(keys.map(key => window.caches.delete(key)));
      } catch {}
    }

    async function clearIndexedDbStorage(policy) {
      if (!policy.clearIndexedDB || !("indexedDB" in window)) return;

      try {
        if (typeof indexedDB.databases !== "function") return;
        const databases = await indexedDB.databases();
        await Promise.all((databases || []).map(db => deleteIndexedDbDatabase(db.name)));
      } catch {}
    }

    function deleteIndexedDbDatabase(name) {
      if (!name) return Promise.resolve();

      return new Promise(resolve => {
        try {
          const request = indexedDB.deleteDatabase(name);
          const finish = () => resolve();
          request.onsuccess = finish;
          request.onerror = finish;
          request.onblocked = finish;
          setTimeout(finish, 300);
        } catch {
          resolve();
        }
      });
    }

    async function unregisterServiceWorkers(policy) {
      if (!policy.unregisterServiceWorkers || !("serviceWorker" in navigator)) return;

      try {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(registration => registration.unregister()));
      } catch {}
    }

    function clearSameOriginCookies(policy) {
      if (!policy.clearCookies || !document.cookie) return;

      try {
        document.cookie.split(";").forEach(cookie => {
          const name = cookie.split("=")[0]?.trim();
          if (!name) return;
          const expires = "expires=Thu, 01 Jan 1970 00:00:00 GMT";
          document.cookie = `${name}=; ${expires}; path=/`;
          document.cookie = `${name}=; ${expires}; path=${location.pathname || "/"}`;
        });
      } catch {}
    }

    function clearRuntimeGlobalData() {
      try { window.PAYMENT_DATA = undefined; } catch {}
      try { window.PAYMENT_SETTING = undefined; } catch {}
      try { delete window.PAYMENT_DATA; } catch {}
      try { delete window.PAYMENT_SETTING; } catch {}
    }

    async function loadAppFiles() {
      await loadOptionalJsFile("./setting.js?ts=" + Date.now());
      await loadOptionalJsFile("./data.js?ts=" + Date.now());

      const loadedSetting = window.PAYMENT_SETTING || DEFAULT_SETTING;
      const loadedData = window.PAYMENT_DATA || DEFAULT_DATA;

      appSetting = normalizeSetting(loadedSetting);
      appData = normalizeData(loadedData);

      clearRuntimeGlobalData();
    }

    async function loadOptionalJsFile(src) {
      try {
        const response = await fetch(src, {
          cache: "no-store",
          headers: {
            "Cache-Control": "no-store, no-cache, must-revalidate, max-age=0",
            "Pragma": "no-cache"
          }
        });

        if (response.ok) {
          const code = await response.text();

          if (code.trim()) {
            new Function(code)();
            return true;
          }
        }

        return false;
      } catch {
        // file:// や一部のローカル環境ではfetchが失敗するため、scriptタグ読込にフォールバックします。
      }

      return new Promise(resolve => {
        const script = document.createElement("script");
        script.src = src;
        script.async = false;
        script.onload = () => {
          script.remove();
          resolve(true);
        };
        script.onerror = () => {
          script.remove();
          resolve(false);
        };
        document.head.appendChild(script);
      });
    }

    async function loadLibrariesWithFallback() {
      for (const item of libraryFiles) {
        const loaded = await loadScriptWithFallback(item);
        if (!loaded) {
          console.error("Library load failed", item.key);
          return false;
        }
      }

      await loadScriptTag("https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js");

      for (const item of optionalLibraryFiles) {
        const loaded = await loadScriptWithFallback(item);
        if (!loaded) console.warn("Optional library load skipped", item.key);
      }

      return true;
    }

    async function loadScriptWithFallback(item) {
      if (safeCheck(item.check)) return true;

      const cdnLoaded = await loadScriptTag(item.cdn);
      if (cdnLoaded && safeCheck(item.check)) return true;

      if (appSetting.runtime.tryLocalVendor) {
        const localLoaded = await loadScriptTag(item.local);
        if (localLoaded && safeCheck(item.check)) return true;
      }

      return false;
    }

    function loadScriptTag(src) {
      return new Promise(resolve => {
        const script = document.createElement("script");
        script.src = src;
        script.crossOrigin = "anonymous";
        script.onload = () => resolve(true);
        script.onerror = () => resolve(false);
        document.head.appendChild(script);
      });
    }

    function runBabelApp() {
      try {
        const source = document.getElementById("app-jsx").textContent;
        const transformed = Babel.transform(source, {
          presets: ["react"]
        }).code;

        const script = document.createElement("script");
        script.type = "text/javascript";
        script.textContent = transformed;
        document.body.appendChild(script);
      } catch (error) {
        console.error("JSX transform failed", error);
        renderVanillaFallbackApp();
      }
    }

    function safeCheck(checkFn) {
      try {
        return Boolean(checkFn && checkFn());
      } catch {
        return false;
      }
    }

    function normalizeSetting(setting) {
      const merged = structuredClone(DEFAULT_SETTING);
      deepMerge(merged, setting || {});

      merged.options.paymentMethods ||= DEFAULT_SETTING.options.paymentMethods;
      merged.options.budgetCategories ||= DEFAULT_SETTING.options.budgetCategories;
      merged.options.accountSubjects ||= DEFAULT_SETTING.options.accountSubjects;
      merged.options.costTypes ||= DEFAULT_SETTING.options.costTypes;
      merged.options.costPeriods ||= DEFAULT_SETTING.options.costPeriods;
      merged.options.expensePatterns ||= DEFAULT_SETTING.options.expensePatterns;
      merged.options.expenseStartModes ||= DEFAULT_SETTING.options.expenseStartModes;
      merged.options.expenseStartModes = Array.from(new Set(
        merged.options.expenseStartModes
          .map(value => value === "償却予定開始" || value === "償却開始日" || value === "指定した日（償却する勘定科目）" ? "指定した日" : value === "利用開始日（償却する勘定科目）" ? "利用開始日" : value)
          .filter(Boolean)
      ));
      if (!merged.options.expenseStartModes.length) merged.options.expenseStartModes = DEFAULT_SETTING.options.expenseStartModes;
      merged.options.recurringCycles ||= DEFAULT_SETTING.options.recurringCycles;
      merged.options.accountSubjectRules ||= DEFAULT_SETTING.options.accountSubjectRules;
      merged.options.costTypeRules ||= DEFAULT_SETTING.options.costTypeRules;
      merged.options.stampValues ||= DEFAULT_SETTING.options.stampValues;
      merged.print.orientation ||= DEFAULT_SETTING.print.orientation;
      merged.clientData ||= DEFAULT_SETTING.clientData;

      return merged;
    }

    function normalizeData(data) {
      const normalized = structuredClone(data || DEFAULT_DATA);

      normalized.project ||= {};
      normalized.budgets ||= [];
      normalized.payments ||= [];

      normalized.project.name ??= "";
      normalized.project.decisionDate ??= "";
      normalized.project.burdenDepartment ??= "";
      normalized.project.content ??= "";
      normalized.project.notes ??= "";
      normalized.plans = normalizePlanRows(normalized.plans && normalized.plans.length ? normalized.plans : [{
        id: "PLAN-001",
        name: normalized.project.name || "企画書1",
        decisionDate: normalized.project.decisionDate || "",
        content: normalized.project.content || "",
        notes: normalized.project.notes || ""
      }]);

      if (!Array.isArray(normalized.budgets) || normalized.budgets.length === 0) {
        normalized.budgets = structuredClone(DEFAULT_DATA.budgets);
      }

      normalized.budgets = normalizeBudgetRows(normalized.budgets, appSetting.defaults.budgetTaxRate, normalized.plans);
      normalized.payments = normalizePaymentRows(normalized.payments, appSetting.defaults.paymentMethod, normalized.budgets);

      return normalized;
    }

    function normalizeExpenseStartMode(value) {
      if (value === "償却予定開始" || value === "償却開始日" || value === "指定した日（償却する勘定科目）") return "指定した日";
      if (value === "利用開始日（償却する勘定科目）") return "利用開始日";
      return value || "支払日";
    }

    function expenseStartModeLabel(value) {
      const mode = normalizeExpenseStartMode(value);
      if (mode === "利用開始日") return "利用開始日（償却する勘定科目）";
      if (mode === "指定した日") return "指定した日（償却する勘定科目）";
      return mode || "支払日";
    }

    function isRowActive(row) {
      return row?.isActive !== false && !row?.isDeleted;
    }

    function isRowEnabled(row) {
      return row?.isActive !== false;
    }

    function isRowDeleted(row) {
      return Boolean(row?.isDeleted);
    }

    function rowStatusLabel(row) {
      return isRowEnabled(row) ? "有効" : "無効";
    }

    function rowDeleteStatusLabel(row) {
      return isRowDeleted(row) ? "削除済" : "未削除";
    }

    function markRowDeleted(row) {
      return { ...row, isDeleted: true, deletedAt: row.deletedAt || new Date().toISOString() };
    }

    function restoreRowDeleted(row) {
      return { ...row, isDeleted: false, deletedAt: "" };
    }

    function setRowEnabled(row, enabled) {
      return { ...row, isActive: Boolean(enabled) };
    }

    function activeRows(rows) {
      return (rows || []).filter(isRowActive);
    }

    function normalizeRowStatus(row) {
      const isDeleted = Boolean(row.isDeleted);
      return {
        isActive: row.isActive !== false && !isDeleted,
        isDeleted,
        deletedAt: row.deletedAt || ""
      };
    }

    function normalizePlanRows(rows) {
      return (Array.isArray(rows) ? rows : []).map((row, index) => ({
        id: row.id || `PLAN-${String(index + 1).padStart(3, "0")}`,
        name: row.name || `企画書${index + 1}`,
        decisionDate: row.decisionDate || "",
        burdenDepartment: row.burdenDepartment || "",
        content: row.content || "",
        notes: row.notes || "",
        settlementSummaries: normalizePlanSettlementRows(row.settlementSummaries || []),
        ...normalizeRowStatus(row)
      }));
    }

    function normalizePlanSettlementRows(rows) {
      return (Array.isArray(rows) ? rows : []).map(row => ({
        accountSubject: row.accountSubject || "",
        amount: toNumber(row.amount),
        taxRate: toNumber(row.taxRate ?? appSetting.defaults.budgetTaxRate),
        expensePattern: row.expensePattern || inferExpensePattern(row),
        costType: row.costType || "",
        expenseStartMode: normalizeExpenseStartMode(row.expenseStartMode),
        costPeriod: row.costPeriod || "なし",
        depreciationMonths: toNumber(row.depreciationMonths),
        recurringCycle: row.recurringCycle || "",
        paymentDate: row.paymentDate || "",
        recognitionDate: row.recognitionDate || row.depreciationStartDate || "",
        burdenDepartment: row.burdenDepartment || "",
        usageStartDate: row.usageStartDate || "",
        depreciationStartDate: row.depreciationStartDate || "",
        memo: row.memo || "",
        ...normalizeRowStatus(row)
      }));
    }

    function normalizeBudgetRows(rows, defaultTaxRate = 10, plans = []) {
      const defaultPlanId = plans[0]?.id || "PLAN-001";
      return (Array.isArray(rows) ? rows : []).map((row, index) => {
        const no = toNumber(row.no) || index + 1;
        const accountSubject = row.accountSubject || row.category || "";
        const rule = getAccountSubjectRule(accountSubject, appSetting);
        return {
          id: row.id || row.uid || `BUDGET-${String(no).padStart(3, "0")}`,
          no,
          planId: row.planId || defaultPlanId,
          name: row.name || "",
          category: row.category || "",
          accountSubject,
          burdenDepartment: row.burdenDepartment || "",
          amount: toNumber(row.amount),
          taxRate: toNumber(row.taxRate || defaultTaxRate),
          expensePattern: row.expensePattern || rule?.expensePattern || inferExpensePattern(row),
          costType: row.costType || rule?.costType || "",
          depreciationMonths: toNumber(row.depreciationMonths ?? rule?.depreciationMonths),
          expenseStartMode: normalizeExpenseStartMode(row.expenseStartMode || rule?.expenseStartMode),
          usageStartDate: row.usageStartDate || "",
          recognitionDate: row.recognitionDate || row.depreciationStartDate || "",
          depreciationStartDate: row.depreciationStartDate || "",
          costPeriod: row.costPeriod || rule?.costPeriod || "なし",
          recurringCycle: row.recurringCycle || rule?.recurringCycle || "",
          recognitionRule: row.recognitionRule || "auto",
          accountRuleLocked: Boolean(row.accountRuleLocked),
          memo: row.memo || "",
          ...normalizeRowStatus(row)
        };
      });
    }

    function getBudgetInternalId(row) {
      if (!row) return "";
      return row.id || row.uid || (row.no ? `BUDGET-${String(toNumber(row.no)).padStart(3, "0")}` : "");
    }

    function getAccountSubjectRule(accountSubject, setting = appSetting) {
      return setting?.options?.accountSubjectRules?.[accountSubject] || null;
    }

    function getCostTypeRule(costType, setting = appSetting) {
      return setting?.options?.costTypeRules?.[costType] || null;
    }

    function applyAccountSubjectRule(row, accountSubject, setting = appSetting) {
      const rule = getAccountSubjectRule(accountSubject, setting);
      if (!rule) return { ...row, accountSubject };
      return {
        ...row,
        accountSubject,
        expensePattern: rule.expensePattern,
        costType: rule.costType,
        depreciationMonths: toNumber(rule.depreciationMonths),
        expenseStartMode: normalizeExpenseStartMode(rule.expenseStartMode),
        costPeriod: rule.costPeriod,
        recurringCycle: rule.recurringCycle || ""
      };
    }

    function applyCostTypeRule(row, costType, setting = appSetting) {
      const rule = getCostTypeRule(costType, setting);
      if (!rule) return { ...row, costType };
      return {
        ...row,
        costType,
        expensePattern: rule.expensePattern || inferExpensePattern({ ...row, costType }),
        depreciationMonths: toNumber(rule.depreciationMonths),
        expenseStartMode: normalizeExpenseStartMode(rule.expenseStartMode),
        costPeriod: rule.costPeriod || row.costPeriod || "なし",
        recurringCycle: rule.recurringCycle || ""
      };
    }

    function recurringCycleLabel(value) {
      if (value === "monthly") return "月額";
      if (value === "yearly") return "年額";
      return "なし";
    }

    function conditionSummary(row) {
      const pattern = expensePatternLabel(row.expensePattern || inferExpensePattern(row));
      const parts = [pattern, row.costType, row.depreciationMonths ? `${row.depreciationMonths}ヶ月` : "", row.costPeriod && row.costPeriod !== "なし" ? row.costPeriod : "", recurringCycleLabel(row.recurringCycle), expenseStartModeLabel(row.expenseStartMode)].filter(Boolean);
      return parts.join(" / ");
    }

    function inferExpensePattern(row) {
      const type = row.costType || "";
      const period = row.costPeriod || "";
      const months = toNumber(row.depreciationMonths);

      if (row.expensePattern) return row.expensePattern;
      if (months > 0 || type.includes("固定資産") || type.includes("無形固定資産")) return "depreciation";
      if (period === "月度" || period === "年度" || type.includes("保守") || type.includes("ライセンス")) return "recurring";
      return "one_time";
    }

    function expensePatternLabel(value) {
      const options = appSetting.options?.expensePatterns || DEFAULT_SETTING.options.expensePatterns;
      return options.find(item => item.value === value)?.label || "1回だけの費用";
    }

    function normalizePaymentRows(rows, defaultMethod = "振込", budgets = []) {
      const defaultBudgetId = budgets[0]?.no || "";
      const budgetByNo = Object.fromEntries((budgets || []).map(row => [String(row.no), row]));
      return (Array.isArray(rows) ? rows : []).map((row, index) => {
        const taxRate = toNumber(row.taxRate ?? budgetByNo[String(row.budgetId || defaultBudgetId)]?.taxRate ?? appSetting.defaults.budgetTaxRate);
        const amount = toNumber(row.amount);
        const baseAmount = row.baseAmount !== undefined && row.baseAmount !== ""
          ? toNumber(row.baseAmount)
          : taxRate ? Math.round(amount / (1 + taxRate / 100)) : amount;

        return {
          no: toNumber(row.no) || index + 1,
          paymentDate: row.paymentDate || "",
          recognitionDate: row.recognitionDate || row.depreciationStartDate || "",
          depreciationStartDate: row.depreciationStartDate || "",
          baseAmount,
          taxRate,
          amount: amount || Math.round(baseAmount * (1 + taxRate / 100)),
          method: row.method || defaultMethod,
          payee: row.payee || "",
          accountingNo: row.accountingNo || "",
          burdenDepartment: row.burdenDepartment || budgetByNo[String(row.budgetId || defaultBudgetId)]?.burdenDepartment || "",
          budgetId: row.budgetId || defaultBudgetId,
          accountSubject: row.accountSubject || budgetByNo[String(row.budgetId || defaultBudgetId)]?.accountSubject || "",
          costType: row.costType || budgetByNo[String(row.budgetId || defaultBudgetId)]?.costType || "",
          expensePattern: row.expensePattern || budgetByNo[String(row.budgetId || defaultBudgetId)]?.expensePattern || inferExpensePattern(row),
          depreciationMonths: toNumber(row.depreciationMonths || budgetByNo[String(row.budgetId || defaultBudgetId)]?.depreciationMonths),
          usageStartDate: row.usageStartDate || "",
          expenseStartMode: normalizeExpenseStartMode(row.expenseStartMode || budgetByNo[String(row.budgetId || defaultBudgetId)]?.expenseStartMode),
          costPeriod: row.costPeriod || budgetByNo[String(row.budgetId || defaultBudgetId)]?.costPeriod || "なし",
          recurringCycle: row.recurringCycle || budgetByNo[String(row.budgetId || defaultBudgetId)]?.recurringCycle || "",
          sourceBudgetSnapshot: row.sourceBudgetSnapshot || null,
          overrideReason: row.overrideReason || "",
          description: row.description || "",
          staffStamp: row.staffStamp || "",
          managerStamp: row.managerStamp || "",
          staffConfirmed: row.staffConfirmed || row.staffStamp || "",
          managerConfirmed: row.managerConfirmed || row.managerStamp || "",
          ...normalizeRowStatus(row)
        };
      });
    }

    function deepMerge(target, source) {
      Object.keys(source || {}).forEach(key => {
        if (
          source[key] &&
          typeof source[key] === "object" &&
          !Array.isArray(source[key])
        ) {
          target[key] ||= {};
          deepMerge(target[key], source[key]);
        } else {
          target[key] = source[key];
        }
      });

      return target;
    }

    function calcTotals(data = appData) {
      const budgets = activeRows(data.budgets);
      const payments = activeRows(data.payments);
      const budgetBase = budgets.reduce((sum, row) => sum + toNumber(row.amount), 0);
      const budgetTax = budgets.reduce((sum, row) => {
        return sum + Math.round(toNumber(row.amount) * toNumber(row.taxRate) / 100);
      }, 0);
      const budgetTotal = budgetBase + budgetTax;
      const paidTotal = payments.reduce((sum, row) => sum + toNumber(row.amount), 0);
      const balance = budgetTotal - paidTotal;
      const progress = budgetTotal > 0
        ? Math.min(100, Math.max(0, paidTotal / budgetTotal * 100))
        : 0;

      return {
        budgetBase,
        budgetTax,
        budgetTotal,
        paidTotal,
        balance,
        progress
      };
    }

    function getDuplicatePaymentKey(row) {
      return [
        row.paymentDate || "",
        toNumber(row.baseAmount),
        toNumber(row.amount),
        row.payee || "",
        row.description || "",
        row.accountingNo || ""
      ].join("|");
    }

    function validatePaymentData(data, setting = appSetting) {
      const budgets = Array.isArray(data?.budgets) ? data.budgets : [];
      const payments = Array.isArray(data?.payments) ? data.payments : [];
      const budgetIds = new Set(budgets.flatMap(row => [String(row.no), String(getBudgetInternalId(row))]));
      const warnings = [];
      const duplicateMap = new Map();

      budgets.forEach(budget => {
        const label = `予算No.${budget.no || "-"}`;
        if (!isRowActive(budget)) return;
        if (!budget.id) warnings.push(`${label}: 内部IDが未設定です。normalizeDataで補完してください。`);
        if (!budget.name) warnings.push(`${label}: 予算項目名が未入力です。`);
        if (!toNumber(budget.amount)) warnings.push(`${label}: 本体金額が0円です。`);
        if (!budget.accountSubject) warnings.push(`${label}: 勘定科目が未設定です。`);
      });

      payments.forEach(payment => {
        if (!isRowActive(payment)) return;
        const label = `支払いNo.${payment.no || "-"}`;
        const budgetRef = String(payment.budgetUid || payment.budgetId || "");
        const pattern = payment.expensePattern || inferExpensePattern(payment);
        const duplicateKey = getDuplicatePaymentKey(payment);
        duplicateMap.set(duplicateKey, (duplicateMap.get(duplicateKey) || 0) + 1);

        if (budgetRef && !budgetIds.has(budgetRef)) warnings.push(`${label}: 紐づく予算がありません。`);
        if (!budgetRef) warnings.push(`${label}: 予算No.が未設定です。`);
        if (!toNumber(payment.amount)) warnings.push(`${label}: 税込金額が0円です。`);
        if (!payment.paymentDate) warnings.push(`${label}: 支払日が未入力です。`);
        if (!payment.accountSubject) warnings.push(`${label}: 勘定科目が未設定です。`);

        if (pattern === "depreciation") {
          if (!payment.recognitionDate && normalizeExpenseStartMode(payment.expenseStartMode) === "指定した日") {
            warnings.push(`${label}: 指定した日が基準ですが、計上日が未入力です。`);
          }
          if (!toNumber(payment.depreciationMonths)) warnings.push(`${label}: 償却費用ですが、償却月数が未設定です。`);
        }

        if (pattern === "recurring" && !payment.costPeriod) {
          warnings.push(`${label}: 継続費用ですが、月度/年度が未設定です。`);
        }
      });

      duplicateMap.forEach((count, key) => {
        if (key.replaceAll("|", "") && count > 1) warnings.push(`支払い重複候補: 同一条件の支払いが${count}件あります。`);
      });

      const totals = calcTotals({ budgets, payments });
      return {
        ok: warnings.length === 0,
        warningCount: warnings.length,
        warnings,
        summary: {
          budgetCount: budgets.length,
          paymentCount: payments.length,
          totalBudget: totals.budgetTotal,
          totalPaid: totals.paidTotal
        }
      };
    }

    function getFiscalYear(date = new Date()) {
      const value = date instanceof Date ? date : new Date(date);
      if (Number.isNaN(value.getTime())) return new Date().getFullYear();
      return value.getMonth() + 1 >= 4 ? value.getFullYear() : value.getFullYear() - 1;
    }

    function getFiscalYearRange(fiscalYear) {
      return {
        start: new Date(fiscalYear, 3, 1),
        end: new Date(fiscalYear + 1, 2, 31)
      };
    }

    function monthKey(date) {
      return date.getFullYear() * 12 + date.getMonth();
    }

    function addMonths(date, months) {
      const next = new Date(date);
      next.setMonth(next.getMonth() + months);
      return next;
    }

    function getExpenseStartDate(row) {
      const mode = normalizeExpenseStartMode(row.expenseStartMode);
      const source = mode === "支払日"
        ? row.paymentDate
        : mode === "利用開始日"
          ? row.usageStartDate
          : row.recognitionDate || row.depreciationStartDate;
      const date = new Date(source || row.recognitionDate || row.depreciationStartDate || row.paymentDate || row.usageStartDate || "");
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function calcFiscalExpense(row, fiscalYear) {
      const startDate = getExpenseStartDate(row);
      if (!startDate) return 0;

      const amount = toNumber(row.amount);
      const period = row.costPeriod || "なし";
      const pattern = row.expensePattern || inferExpensePattern(row);
      const range = getFiscalYearRange(fiscalYear);

      if (pattern === "recurring") {
        if (period === "月度") {
          const from = Math.max(monthKey(startDate), monthKey(range.start));
          const to = monthKey(range.end);
          return from > to ? 0 : amount * (to - from + 1);
        }

        if (period === "年度") {
          return startDate <= range.end ? amount : 0;
        }

        return startDate <= range.end ? amount : 0;
      }

      if (pattern === "depreciation") {
        const months = Math.max(1, toNumber(row.depreciationMonths));
        const endDate = addMonths(startDate, months - 1);
        const from = Math.max(monthKey(startDate), monthKey(range.start));
        const to = Math.min(monthKey(endDate), monthKey(range.end));
        return from > to ? 0 : Math.round(amount / months * (to - from + 1));
      }

      return startDate >= range.start && startDate <= range.end ? amount : 0;
    }

    function calcExpenseSummary(payments, fiscalYear = getFiscalYear(new Date())) {
      return activeRows(payments).reduce((acc, row) => {
        const pattern = row.expensePattern || inferExpensePattern(row);
        acc.thisYear += calcFiscalExpense(row, fiscalYear);
        acc.future += [1, 2, 3, 4, 5].reduce((sum, offset) => sum + calcFiscalExpense(row, fiscalYear + offset), 0);

        if (pattern === "one_time") acc.oneTime += toNumber(row.amount);
        if (pattern === "recurring") acc.recurring += toNumber(row.amount);
        if (pattern === "depreciation") acc.depreciation += toNumber(row.amount);

        return acc;
      }, {
        thisYear: 0,
        future: 0,
        oneTime: 0,
        recurring: 0,
        depreciation: 0
      });
    }

    function calcBudgetDetailSummary(budget, payments, fiscalYear = getFiscalYear(new Date())) {
      const relatedPayments = activeRows(payments).filter(payment => String(payment.budgetId) === String(budget.no));
      const budgetBase = toNumber(budget.amount);
      const budgetTax = Math.round(budgetBase * toNumber(budget.taxRate) / 100);
      const budgetTotal = budgetBase + budgetTax;
      const paidTotal = relatedPayments.reduce((sum, row) => sum + toNumber(row.amount), 0);
      const sourceRows = relatedPayments.length ? relatedPayments : [budget];
      const expense = calcExpenseSummary(sourceRows, fiscalYear);
      return {
        budgetBase,
        budgetTax,
        budgetTotal,
        paidTotal,
        balance: budgetTotal - paidTotal,
        thisYearExpense: expense.thisYear,
        futureExpense: expense.future,
        oneTimeExpense: expense.oneTime,
        recurringExpense: expense.recurring,
        depreciationExpense: expense.depreciation,
        paymentCount: relatedPayments.length
      };
    }

    function calcPlanSettlementSummary(plan, fiscalYear = getFiscalYear(new Date())) {
      const rows = activeRows(plan.settlementSummaries || []);
      const total = rows.reduce((sum, row) => sum + toNumber(row.amount) + Math.round(toNumber(row.amount) * toNumber(row.taxRate || appSetting.defaults.budgetTaxRate) / 100), 0);
      const expense = calcExpenseSummary(rows, fiscalYear);
      const subjects = Array.from(new Set(rows.map(row => row.accountSubject).filter(Boolean))).join(" / ") || "-";
      return { count: rows.length, total, subjects, ...expense };
    }

    function createPaymentFromBudget(budget, nextNo, setting = appSetting) {
      return {
        no: nextNo,
        paymentDate: "",
        recognitionDate: budget?.recognitionDate || "",
        depreciationStartDate: "",
        usageStartDate: "",
        budgetId: budget?.no || "",
        burdenDepartment: budget?.burdenDepartment || "",
        baseAmount: 0,
        taxRate: toNumber(budget?.taxRate || setting.defaults.budgetTaxRate),
        amount: 0,
        method: setting.defaults.paymentMethod,
        payee: "",
        accountingNo: "",
        accountSubject: budget?.accountSubject || "",
        expensePattern: budget?.expensePattern || "one_time",
        costType: budget?.costType || "",
        depreciationMonths: toNumber(budget?.depreciationMonths),
        expenseStartMode: normalizeExpenseStartMode(budget?.expenseStartMode),
        costPeriod: budget?.costPeriod || "なし",
        recurringCycle: budget?.recurringCycle || "",
        description: budget?.name || "",
        staffStamp: "",
        managerStamp: "",
        staffConfirmed: "",
        managerConfirmed: "",
        isActive: true,
        isDeleted: false,
        deletedAt: "",
        sourceBudgetSnapshot: budget ? {
          budgetNo: budget.no,
          budgetName: budget.name,

    function createCsv(columns, rows) {
      const escape = value => {
        const text = String(value ?? "");
        return /[",\r\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
      };

      return [
        columns.map(col => escape(col.label)).join(","),
        ...rows.map(row => columns.map(col => escape(row[col.key])).join(","))
      ].join("\r\n");
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let quoted = false;

      for (let i = 0; i < text.length; i += 1) {
        const ch = text[i];
        const next = text[i + 1];

        if (quoted) {
          if (ch === '"' && next === '"') {
            value += '"';
            i += 1;
          } else if (ch === '"') {
            quoted = false;
          } else {
            value += ch;
          }
          continue;
        }

        if (ch === '"') {
          quoted = true;
        } else if (ch === ",") {
          row.push(value);
          value = "";
        } else if (ch === "\n") {
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
        } else if (ch !== "\r") {
          value += ch;
        }
      }

      row.push(value);
      if (row.some(cell => cell !== "")) rows.push(row);
      return rows;
    }

    function csvTextToObjects(text, columns) {
      const rows = parseCsv(text).filter(row => row.some(cell => String(cell).trim() !== ""));
      if (rows.length === 0) return [];

      const header = rows[0].map(cell => String(cell).replace(/^\uFEFF/, "").trim());
      const keyByIndex = header.map(label => {
        const col = columns.find(item => item.label === label || item.key === label);
        return col ? col.key : null;
      });

      return rows.slice(1).map(row => {
        const obj = {};
        keyByIndex.forEach((key, index) => {
          if (key) obj[key] = row[index] ?? "";
        });
        return obj;
      });
    }

    function downloadBlob(filename, blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function downloadText(filename, text, type = "application/json;charset=utf-8") {
      downloadBlob(filename, new Blob([text], { type }));
    }

    function exportCsvFile(filename, columns, rows, encoding) {
      const csv = createCsv(columns, rows);

      if (encoding === "shift_jis") {
        if (!window.Encoding) {
          throw new Error("Shift_JIS出力にはEncoding.jsの読み込みが必要です。UTF-8で出力してください。");
        }
        const unicodeArray = window.Encoding.stringToCode(csv);
        const sjisArray = window.Encoding.convert(unicodeArray, {
          to: "SJIS",
          from: "UNICODE"
        });
        downloadBlob(filename, new Blob([new Uint8Array(sjisArray)], { type: "text/csv;charset=shift_jis" }));
        return;
      }

      downloadBlob(filename, new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" }));
    }

    function exportCsvTemplateFile(filename, columns, encoding) {
      const emptyRow = Object.fromEntries(columns.map(column => [column.key, ""]));
      exportCsvFile(filename, columns, [emptyRow], encoding);
    }

    function readTextFile(file, encoding = "utf-8") {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = event => resolve(event.target.result);
        reader.onerror = () => reject(new Error("ファイルを読み込めませんでした。"));
        reader.readAsText(file, encoding === "shift_jis" ? "shift_jis" : "utf-8");
      });
    }

      return Number(String(value).replace(/[^\d.-]/g, "")) || 0;

        setDraftValues(prev => prev.map((item, i) => i === index ? value : item));
      }

      function addValue() {
        setDraftValues(prev => [...prev, ""]);
      }

      function deleteValue(index) {
        setDraftValues(prev => prev.filter((_, i) => i !== index));
      }

      function moveValue(index, direction) {
        setDraftValues(prev => {
          const next = [...prev];
          const target = index + direction;
          if (target < 0 || target >= next.length) return prev;
          [next[index], next[target]] = [next[target], next[index]];
          return next;
        });
      }

      function normalizeValuesForSave() {
        const seen = new Set();
        return draftValues
          .map(value => String(value ?? "").trim())
          .filter((value, index) => {
            if (index === 0 && value === "") return true;
            if (value === "") return false;
            if (seen.has(value)) return false;
            seen.add(value);
            return true;
          });
      }

      const normalizedPreview = normalizeValuesForSave();
      const warningCount = Math.max(0, draftValues.length - normalizedPreview.length);

      return (
        <Drawer
          anchor="right"
          variant="temporary"
          open={Boolean(open)}
          onClose={onClose}
          ModalProps={{
            keepMounted: true,
            container: () => document.body
          }}
          PaperProps={{
            sx: theme => ({
              width: { xs: "100%", sm: 560 },
              maxWidth: "100%",
              zIndex: theme.zIndex.drawer + 20
            })
          }}
        >
          <Box sx={{ p: 2, height: "100%", display: "flex", flexDirection: "column", minHeight: 0 }}>
            <Stack direction="row" justifyContent="space-between" alignItems="flex-start" spacing={1}>
              <Box sx={{ minWidth: 0 }}>
                <Typography variant="h6">{title}</Typography>
                {description && (
                  <Typography variant="body2" color="text.secondary" sx={{ mt: 0.5 }}>
                    {description}
                  </Typography>
                )}
              </Box>
              <IconButton onClick={onClose}>
                <span className="material-icons">close</span>
              </IconButton>
            </Stack>

            <Divider sx={{ my: 2 }} />

            <Box sx={{ flex: 1, minHeight: 0, overflow: "auto", pr: 0.5 }}>
              <Stack spacing={1}>
                {draftValues.map((value, index) => (
                  <Stack key={index} direction="row" spacing={1} alignItems="flex-start">
                    <TextField
                      size="small"
                      fullWidth
                      label={`項目 ${index + 1}`}
                      value={value}
                      onChange={event => updateValue(index, event.target.value)}
                      helperText={index === 0 && value === "" ? "先頭の空欄は未選択用として保持されます。" : " "}
                    />
                    <IconButton onClick={() => moveValue(index, -1)} disabled={index === 0}>
                      <span className="material-icons">arrow_upward</span>
                    </IconButton>
                    <IconButton onClick={() => moveValue(index, 1)} disabled={index === draftValues.length - 1}>
                      <span className="material-icons">arrow_downward</span>
                    </IconButton>
                    <IconButton onClick={() => deleteValue(index)} color="error">
                      <span className="material-icons">delete</span>
                    </IconButton>
                  </Stack>
                ))}
              </Stack>

              {warningCount > 0 && (
                <Alert severity="warning" sx={{ mt: 2 }}>
                  空欄または重複項目があります。保存時に整理されます。
                </Alert>
              )}
            </Box>

            <Divider sx={{ my: 2 }} />

            <Stack direction="row" spacing={1} justifyContent="space-between" sx={{ flexWrap: "wrap", gap: 1 }}>
              <Button variant="outlined" startIcon={<span className="material-icons">add</span>} onClick={addValue}>
                項目追加
              </Button>
              <Stack direction="row" spacing={1}>
                <Button variant="outlined" onClick={onClose}>閉じる</Button>
                <Button
                  variant="contained"
                  startIcon={<span className="material-icons">save</span>}
                  onClick={() => onSave(normalizedPreview)}
                >
                  保存
                </Button>
              </Stack>
            </Stack>
          </Box>
        </Drawer>
      );
    }

    function App() {
      const [tab, setTab] = useState(appSetting.display.defaultTab || "dashboard");

      const [setting, setSetting] = useState(appSetting);

      useEffect(() => {

      }, [dataDirty, settingDirty]);

      function masterValuesToDrawerValues(key, values) {

      function drawerValuesToMasterValues(key, values) {

      function openMasterDrawer(definition) {

      }

      function saveMasterDrawerValues(values) {
        const nextValues = drawerValuesToMasterValues(masterDrawer.key, values);
        updateSetting(`options.${masterDrawer.key}`, nextValues);
        setMasterDrawer(prev => ({ ...prev, values, open: false }));
        setNotice(`${masterDrawer.title}マスタを更新しました。setting.jsへ保存してください。`);
      }

      function markDataChanged(nextData) {
        dataVersionRef.current += 1;
        setData(normalizeData(nextData));
        setDataDirty(true);
      }

      function generateIntegrationModel() {
        setIntegrationText(JSON.stringify(createDataModelFormat(), null, 2));
        setNotice("外部連携用データモデルを表示しました。");
      }

      function exportDataJson() {
        downloadText(
          "payment-data_" + new Date().toISOString().slice(0, 10) + ".json",
          JSON.stringify(data, null, 2)
        );
      }

      function exportIntegrationModel() {
        downloadText(
          "payment-data-model.json",
          JSON.stringify(createDataModelFormat(), null, 2)
        );
      }

      async function importExternalJsonFile(file) {
        if (!file) return;

        try {
          const text = await readTextFile(file, "utf-8");
          const parsed = JSON.parse(text);
          const source = parsed.PAYMENT_DATA || parsed.paymentData || parsed;
          const incomingProject = {
            ...data.project,
            ...(source.project || {})
          };
          const incomingPlans = normalizePlanRows(source.plans || []);
          const nextPlans = incomingPlans.length ? normalizePlanRows([...data.plans, ...incomingPlans]) : data.plans;
          const incomingBudgets = normalizeBudgetRows(source.budgets || [], setting.defaults.budgetTaxRate, nextPlans);
          const incomingPayments = normalizePaymentRows(source.payments || [], setting.defaults.paymentMethod, [...data.budgets, ...incomingBudgets]);

          markDataChanged({
            ...data,
            project: incomingProject,
            plans: nextPlans,
            budgets: normalizeBudgetRows([...data.budgets, ...incomingBudgets], setting.defaults.budgetTaxRate, nextPlans)
              .map((row, i) => ({ ...row, no: i + 1 })),
            payments: normalizePaymentRows(
              [...data.payments, ...incomingPayments],
              setting.defaults.paymentMethod,
              normalizeBudgetRows([...data.budgets, ...incomingBudgets], setting.defaults.budgetTaxRate, nextPlans)
            ).map((row, i) => ({ ...row, no: i + 1 }))
          });
          setNotice("JSONデータを追加インポートしました。");
        } catch (error) {
          showModal("JSONインポート失敗", error.message, "error");
        } finally {
          if (jsonImportRef.current) jsonImportRef.current.value = "";
        }
      }

      function updateProject(field, value) {
        markDataChanged({
          ...data,
          project: {
            ...data.project,
            [field]: value
          }
        });
      }

      function updateBudget(index, field, value) {
        const budgets = data.budgets.map((row, i) => {
          if (i !== index) return row;

          const next = {
            ...row,
            [field]: field === "amount" || field === "taxRate" || field === "no" || field === "depreciationMonths"
              ? toNumber(value)
              : value
          };

          if (field === "accountSubject" && !row.accountRuleLocked) {
            return applyAccountSubjectRule(next, value, setting);
          }

          if (field === "costType") {
            return applyCostTypeRule(next, value, setting);
          }

          return next;
        });

        markDataChanged({
          ...data,
          budgets
        });
      }

      function addBudget() {
        markDataChanged({
          ...data,
          budgets: [
            ...data.budgets,
            {
              no: data.budgets.length + 1,
              planId: data.plans[0]?.id || "PLAN-001",
              name: "",
              category: "",
              accountSubject: setting.options.accountSubjects.find(Boolean) || "",
              amount: 0,
              taxRate: setting.defaults.budgetTaxRate,
              expensePattern: getAccountSubjectRule(setting.options.accountSubjects.find(Boolean) || "", setting)?.expensePattern || "one_time",
              costType: getAccountSubjectRule(setting.options.accountSubjects.find(Boolean) || "", setting)?.costType || "",
              depreciationMonths: toNumber(getAccountSubjectRule(setting.options.accountSubjects.find(Boolean) || "", setting)?.depreciationMonths),
              expenseStartMode: getAccountSubjectRule(setting.options.accountSubjects.find(Boolean) || "", setting)?.expenseStartMode || "支払日",
              usageStartDate: "",
              depreciationStartDate: "",
              costPeriod: getAccountSubjectRule(setting.options.accountSubjects.find(Boolean) || "", setting)?.costPeriod || "なし",
              recurringCycle: getAccountSubjectRule(setting.options.accountSubjects.find(Boolean) || "", setting)?.recurringCycle || "",
              isActive: true,
              isDeleted: false,
              deletedAt: "",
              recognitionRule: "auto",
              accountRuleLocked: false,
              memo: ""
            }
          ]
        });
      }

      function deleteBudget(index) {
        const target = data.budgets[index];
        markDataChanged({
          ...data,
          budgets: !isRowDeleted(target)
            ? data.budgets.map((row, i) => i === index ? markRowDeleted(row) : row)
            : data.budgets.filter((_, i) => i !== index).map((row, i) => ({ ...row, no: i + 1 }))
        });
      }

      function restoreBudget(index) {
        markDataChanged({
          ...data,
          budgets: data.budgets.map((row, i) => i === index ? restoreRowDeleted(row) : row)
        });
      }

      function deleteSelectedBudgets(selectedIndexes) {
        const selected = new Set(selectedIndexes);

        markDataChanged({
          ...data,
          budgets: data.budgets
            .map((row, i) => selected.has(i) && !isRowDeleted(row) ? markRowDeleted(row) : row)
            .filter((_, i) => !(selected.has(i) && isRowDeleted(data.budgets[i])))
            .map((row, i) => ({ ...row, no: i + 1 }))
        });
      }

      function updateSelectedBudgets(selectedIndexes, patch) {
        const selected = new Set(selectedIndexes);

        markDataChanged({
          ...data,
          budgets: data.budgets.map((row, i) => {
            if (!selected.has(i)) return row;
            return { ...row, ...patch };
          })
        });
      }

      function renumberBudgets() {
        markDataChanged({
          ...data,
          budgets: data.budgets.map((row, i) => ({ ...row, no: i + 1 }))
        });
      }

      function clearEmptyBudgets() {
        markDataChanged({
          ...data,
          budgets: data.budgets
            .filter(row => row.name || row.category || row.amount || row.memo)
            .map((row, i) => ({ ...row, no: i + 1 }))
        });
      }

      function appendBudgetRows(rows) {
        markDataChanged({
          ...data,
          budgets: normalizeBudgetRows([...data.budgets, ...rows], setting.defaults.budgetTaxRate, data.plans)
            .map((row, i) => ({ ...row, no: i + 1 }))
        });
        setNotice(`予算CSVを${rows.length}件追加しました。`);
      }

      function updatePayment(index, field, value) {
        const payments = data.payments.map((row, i) => {
          if (i !== index) return row;
          const next = {
            ...row,
            [field]: field === "amount" || field === "baseAmount" || field === "taxRate" || field === "no" || field === "budgetId" || field === "depreciationMonths"
              ? toNumber(value)
              : value
          };

          if (field === "baseAmount" || field === "taxRate") {
            next.amount = Math.round(toNumber(next.baseAmount) * (1 + toNumber(next.taxRate) / 100));
          }

          if (field === "budgetId") {
            const budget = data.budgets.find(item => String(item.no) === String(value));
            if (budget) return applyBudgetToPayment(next, budget, setting);
          }

          if (field === "accountSubject") {
            return applyAccountSubjectRule(next, value, setting);
          }

          if (field === "costType") {
            return applyCostTypeRule(next, value, setting);
          }

          return next;
        });

        markDataChanged({
          ...data,
          payments
        });
      }

      function addPayment() {
        const defaultBudget = data.budgets[0];
        markDataChanged({
          ...data,
          payments: [
            ...data.payments,
            createPaymentFromBudget(defaultBudget, data.payments.length + 1, setting)

      function deletePayment(index) {

            ? data.payments.map((row, i) => i === index ? markRowDeleted(row) : row)
            : data.payments.filter((_, i) => i !== index).map((row, i) => ({ ...row, no: i + 1 }))

      function clearEmptyPayments() {
        markDataChanged({
          ...data,

              row.depreciationStartDate ||

      function appendPaymentRows(rows) {
        markDataChanged({
          ...data,
          payments: normalizePaymentRows([...data.payments, ...rows], setting.defaults.paymentMethod, data.budgets)
            .map((row, i) => ({ ...row, no: i + 1 }))

        setNotice(`支払いCSVを${rows.length}件追加しました。`);
      }

      function updatePlan(index, field, value) {
        const oldId = data.plans[index]?.id;
        markDataChanged({
          ...data,
          plans: normalizePlanRows(data.plans.map((row, i) => i === index ? { ...row, [field]: value } : row)),
          budgets: field === "id"
            ? data.budgets.map(row => row.planId === oldId ? { ...row, planId: value } : row)
            : data.budgets
        });
      }

      function addPlan() {
        const nextNo = data.plans.length + 1;
        markDataChanged({
          ...data,
          plans: normalizePlanRows([
            ...data.plans,
            {
              id: `PLAN-${String(nextNo).padStart(3, "0")}`,
              name: `企画書${nextNo}`,
              decisionDate: "",
              content: "",
              notes: ""
            }
          ])
        });
      }

      function deletePlan(index) {
        const removing = data.plans[index];
        if (activeRows(data.plans).length <= 1 && !isRowDeleted(removing)) {
          showModal("企画書を削除できません", "企画書は最低1件必要です。", "warning");
          return;
        }
        const plans = !isRowDeleted(removing)
          ? data.plans.map((row, i) => i === index ? markRowDeleted(row) : row)
          : data.plans.filter((_, i) => i !== index);
        const fallbackPlanId = activeRows(plans)[0]?.id || plans[0]?.id || "PLAN-001";
        markDataChanged({
          ...data,
          plans,
          budgets: !isRowDeleted(removing)
            ? data.budgets
            : data.budgets.map(row => row.planId === removing.id ? { ...row, planId: fallbackPlanId } : row)
        });
      }

      function restorePlan(index) {
        markDataChanged({
          ...data,
          plans: data.plans.map((row, i) => i === index ? restoreRowDeleted(row) : row)
        });
      }

      function updatePlanSettlement(planIndex, summaryIndex, field, value) {
        const plans = data.plans.map((plan, i) => {
          if (i !== planIndex) return plan;
          const summaries = (plan.settlementSummaries || []).map((row, j) => {
            if (j !== summaryIndex) return row;
            const next = {
              ...row,
              [field]: field === "amount" || field === "taxRate" || field === "depreciationMonths" ? toNumber(value) : value
            };
            if (field === "accountSubject") return applyAccountSubjectRule(next, value, setting);
            if (field === "costType") return applyCostTypeRule(next, value, setting);
            return next;
          });
          return { ...plan, settlementSummaries: summaries };
        });
        markDataChanged({ ...data, plans: normalizePlanRows(plans) });
      }

      function addPlanSettlement(planIndex) {
        const plans = data.plans.map((plan, i) => {
          if (i !== planIndex) return plan;
          return {
            ...plan,
            settlementSummaries: [
              ...(plan.settlementSummaries || []),
              { accountSubject: "", amount: 0, taxRate: setting.defaults.budgetTaxRate, expensePattern: "one_time", costType: "一時費用", expenseStartMode: "支払日", costPeriod: "なし", depreciationMonths: 0, recurringCycle: "", paymentDate: "", recognitionDate: "", usageStartDate: "", depreciationStartDate: "", memo: "", isActive: true, isDeleted: false, deletedAt: "" }
            ]
          };
        });
        markDataChanged({ ...data, plans: normalizePlanRows(plans) });
      }

      function deletePlanSettlement(planIndex, summaryIndex) {
        const plans = data.plans.map((plan, i) => {
          if (i !== planIndex) return plan;
          return {
            ...plan,
            settlementSummaries: (plan.settlementSummaries || []).filter((_, j) => j !== summaryIndex)
          };
        });
        markDataChanged({ ...data, plans: normalizePlanRows(plans) });
      }

      function updateSetting(path, value) {
        const next = structuredClone(setting);
        const keys = path.split(".");
        let target = next;

        keys.slice(0, -1).forEach(key => {
          target[key] ||= {};
          target = target[key];
        });

        target[keys[keys.length - 1]] = value;

        setSetting(next);
        setSettingDirty(true);
      }

      function generateDataJs() {
        const code = createDataJsCode(data);
        setDataText(code);
        setNotice("data.js用テキストを生成しました。");
      }

      function generateSettingJs() {
        const code = createSettingJsCode(setting);
        setSettingText(code);
        setNotice("setting.js用テキストを生成しました。");
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
          setNotice("コピーしました。");
        } catch {
          showModal(
            "コピーできませんでした",
            "ブラウザの制限により自動コピーできませんでした。テキスト欄を選択して手動コピーしてください。",
            "warning"
          );
        }
      }

      function loadDataText() {
        try {
          const matched = dataText.trim().match(/window\.PAYMENT_DATA\s*=\s*([\s\S]*?);?\s*$/);

          if (!matched) {
            throw new Error("window.PAYMENT_DATA = ... の形式ではありません。");
          }

          const parsed = JSON.parse(matched[1]);
          const normalized = normalizeData(parsed);

          setData(normalized);
          setDataDirty(true);
          setNotice("data.jsの内容を画面に読み込みました。");

          const parsed = JSON.parse(matched[1]);
          const normalized = normalizeSetting(parsed);

          setSetting(normalized);
          setSettingDirty(true);
          setNotice("setting.jsの内容を画面に読み込みました。");

    function TooltipTableCell({ children, title, align, sx, maxWidth = 220, ...props }) {

    function NumericTextField({ value, onCommit, align = "right", sx, inputProps, ...props }) {
      const [draft, setDraft] = useState(String(value ?? ""));
      const [focused, setFocused] = useState(false);

      useEffect(() => {
        if (!focused) setDraft(String(value ?? ""));
      }, [value, focused]);

      function commit() {
        setFocused(false);
        const normalized = String(draft ?? "").replace(/,/g, "").trim();
        onCommit && onCommit(normalized);
      }

      return (
        <TextField
          {...props}
          size={props.size || "small"}
          type="text"
          value={draft}
          onFocus={() => setFocused(true)}
          onChange={e => setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={e => {
            if (e.key === "Enter") {
              e.currentTarget.blur();
            }
          }}
          inputProps={{
            inputMode: "decimal",
            style: { textAlign: align },
            ...(inputProps || {})
          }}
          sx={sx}
        />
      );
    }


    function normalizeSortText(value) {
      if (value === null || value === undefined) return "";
      return String(value).toLowerCase();
    }

    function sortIndexedRows(rows, sortConfig, getValue) {
      if (!sortConfig?.key) return rows;
      const direction = sortConfig.direction === "desc" ? -1 : 1;
      return [...rows].sort((a, b) => {
        const av = getValue(a, sortConfig.key);
        const bv = getValue(b, sortConfig.key);
        const an = typeof av === "number" ? av : toNumber(av);
        const bn = typeof bv === "number" ? bv : toNumber(bv);
        const bothNumeric = av !== "" && bv !== "" && !Number.isNaN(an) && !Number.isNaN(bn) && String(av).match(/^-?\d/) && String(bv).match(/^-?\d/);

        if (bothNumeric && an !== bn) return (an - bn) * direction;
        return normalizeSortText(av).localeCompare(normalizeSortText(bv), "ja") * direction;
      });
    }

    function ResizableHeaderCell({ id, label, align, width, minWidth = 56, sortConfig, onSort, onWidthChange, className, children }) {
      const active = sortConfig?.key === id;
      const direction = active ? sortConfig.direction : "asc";

      function startResize(event) {
        event.preventDefault();
        event.stopPropagation();
        const startX = event.clientX;
        const startWidth = width || minWidth;

        function move(moveEvent) {
          const nextWidth = Math.max(minWidth, startWidth + moveEvent.clientX - startX);
          onWidthChange && onWidthChange(id, nextWidth);
        }

        function stop() {
          window.removeEventListener("mousemove", move);
          window.removeEventListener("mouseup", stop);
        }

        window.addEventListener("mousemove", move);
        window.addEventListener("mouseup", stop);
      }

      return (
        <TableCell
          align={align}
          className={`resizable-head-cell ${className || ""}`}
          sx={{ width, minWidth, maxWidth: width }}
          sortDirection={active ? direction : false}
        >
          {children || (
            <TableSortLabel
              active={active}
              direction={direction}
              onClick={() => onSort && onSort(id)}
              hideSortIcon={false}
            >
              {label}
            </TableSortLabel>
          )}
          <Box className="column-resize-handle no-print" onMouseDown={startResize} />
        </TableCell>
      );
    }

    function PrintEditableText({ value, display, onCommit, className, multiline = false, align = "left" }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(String(value ?? ""));

      useEffect(() => {
        if (!editing) setDraft(String(value ?? ""));
      }, [value, editing]);

      function commit() {
        setEditing(false);
        onCommit && onCommit(draft);
      }

      if (editing) {
        const commonProps = {
          value: draft,
          autoFocus: true,
          "data-print-editable": "true",
          onChange: event => setDraft(event.target.value),
          onBlur: commit,
          onKeyDown: event => {
            if (event.key === "Enter" && !multiline) event.currentTarget.blur();
            if (event.key === "Escape") {
              setDraft(String(value ?? ""));
              setEditing(false);
            }
          },
          style: {
            width: "100%",
            minWidth: 48,
            boxSizing: "border-box",
            font: "inherit",
            color: "inherit",
            textAlign: align,
            border: "1px solid #1976d2",
            borderRadius: 4,
            padding: "2px 4px",
            background: "#fff"
          }
        };

        return multiline ? <textarea {...commonProps} rows={4} /> : <input {...commonProps} />;
      }

      return (
        <span
          className={className}
          data-print-editable="true"
          title="ダブルクリックで編集"
          onDoubleClick={() => setEditing(true)}
          style={{ cursor: "text" }}
        >
          {display ?? value ?? "-"}
        </span>
      );
    }
