            <TableSummaryGrid>
              <SummaryCard label="有効表示件数" value={`${activeFilteredPayments.length}件`} />
              <SummaryCard label="本体価格合計" value={yen(filteredBaseTotal)} />
              <SummaryCard label="税込支払合計" value={yen(filteredPaidTotal)} />
              <SummaryCard label="残高" value={yen(unpaidBalance)} color={unpaidBalance < 0 ? "error.main" : unpaidBalance === 0 ? "success.main" : "text.primary"} />
              <SummaryCard label="今年度発生費用" value={yen(paymentExpenseSummary.thisYear)} />
              <SummaryCard label="来年度以降発生費用" value={yen(paymentExpenseSummary.future)} />
              <SummaryCard label="1回だけの費用" value={yen(paymentExpenseSummary.oneTime)} />
              <SummaryCard label="継続する費用" value={yen(paymentExpenseSummary.recurring)} />
              <SummaryCard label="償却する費用" value={yen(paymentExpenseSummary.depreciation)} />
            </TableSummaryGrid>
            <Typography variant="caption" color="text.secondary">押印・確認入力あり：{completedCount}件</Typography>
          </Box>

          <ExpandablePane title="支払い明細" subtitle="カードで概要確認、テーブルで多列編集できます。" actions={[<ListViewToggle key="view" value={viewMode} onChange={setViewMode} />, <Chip key="selected" size="small" label={`選択 ${selected.length} 件`} />]}>
            <Stack direction="row" spacing={1} sx={TOOLBAR_STACK_SX}>
              <Button size="small" variant="contained" onClick={addPayment}>支払いを追加</Button><Button size="small" variant="outlined" onClick={renumberPayments}>No.再採番</Button><Button size="small" variant="outlined" color="error" onClick={clearEmptyPayments}>空行を削除</Button><Button size="small" variant="outlined" onClick={() => setSelected([])} disabled={selected.length === 0}>選択解除</Button>
            </Stack>
            <Stack direction="row" spacing={1} sx={{ ...TOOLBAR_STACK_SX, mb: 2 }}>
              <Button size="small" variant="outlined" color="error" disabled={selected.length === 0} onClick={handleDeleteSelected}>選択削除</Button>
              <FormControl size="small" sx={{ minWidth: 120 }}><InputLabel>方法一括</InputLabel><Select label="方法一括" value={bulkMethod} onChange={e => setBulkMethod(e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.paymentMethods.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></FormControl><Button size="small" variant="outlined" disabled={selected.length === 0} onClick={handleBulkMethod}>方法反映</Button>
              <FormControl size="small" sx={{ minWidth: 120 }}><InputLabel>担当印</InputLabel><Select label="担当印" value={bulkStaffStamp} onChange={e => setBulkStaffStamp(e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.stampValues.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></FormControl><Button size="small" variant="outlined" disabled={selected.length === 0} onClick={handleBulkStaffStamp}>担当印反映</Button>
              <FormControl size="small" sx={{ minWidth: 120 }}><InputLabel>所属長印</InputLabel><Select label="所属長印" value={bulkManagerStamp} onChange={e => setBulkManagerStamp(e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.stampValues.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></FormControl><Button size="small" variant="outlined" disabled={selected.length === 0} onClick={handleBulkManagerStamp}>所属長印反映</Button>
            </Stack>
            <Stack direction="row" spacing={1} sx={{ ...TOOLBAR_STACK_SX, mb: 2 }} alignItems="center">
              <FormControl size="small" sx={{ minWidth: 150 }}><InputLabel>CSV文字コード</InputLabel><Select label="CSV文字コード" value={csvEncoding} onChange={e => setCsvEncoding(e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}><MenuItem value="utf-8">UTF-8</MenuItem><MenuItem value="shift_jis">JIS(Shift_JIS)</MenuItem></Select></FormControl>
              <Button size="small" variant="outlined" startIcon={<span className="material-icons">download</span>} onClick={handleExportCsv}>CSVエクスポート</Button><Button size="small" variant="outlined" startIcon={<span className="material-icons">description</span>} onClick={handleExportTemplateCsv}>CSVテンプレート</Button><Button size="small" variant="outlined" startIcon={<span className="material-icons">upload</span>} onClick={() => csvImportRef.current.click()}>CSVインポート</Button><input ref={csvImportRef} type="file" accept=".csv,text/csv" hidden onChange={e => handleImportCsv(e.target.files[0])} />
            </Stack>
            <TextField size="small" fullWidth label="支払い検索" placeholder="企画書、予算、相手先、勘定科目、支払日、計上日、押印状況など" value={searchText} onChange={e => setSearchText(e.target.value)} onBlur={() => setQuery(searchText)} onKeyDown={e => { if (e.key === "Enter") setQuery(searchText); }} sx={{ mb: 2 }} />

            {viewMode === "cards" ? (
              <CardGrid>
                {visiblePayments.map(({ row, index }) => { const currentCumulative = data.payments.slice(0, index + 1).filter(isRowActive).reduce((sum, item) => sum + toNumber(item.amount), 0); const currentBalance = totals.budgetTotal - currentCumulative; const checked = selected.includes(index); const budget = data.budgets.find(item => String(item.no) === String(row.budgetId)); return (
                  <Card key={index} variant="outlined" sx={{ minWidth: 0, opacity: isRowActive(row) ? 1 : 0.55 }}>
                    <CardContent>
                      <Stack spacing={1.25}>
                        <Stack direction="row" spacing={1} justifyContent="space-between" alignItems="flex-start">
                          <FormControlLabel control={<Checkbox size="small" checked={checked} onChange={e => toggleOne(index, e.target.checked)} />} label={`No.${row.no}`} />
                          <Stack direction="row" spacing={0.5}>
                            <Tooltip title="編集"><IconButton size="small" onClick={() => setEditPaymentIndex(index)}><span className="material-icons" style={{ fontSize: 18 }}>edit</span></IconButton></Tooltip>
                            {isRowDeleted(row) && <Tooltip title="削除取消"><IconButton size="small" color="success" onClick={() => restorePayment(index)}><span className="material-icons" style={{ fontSize: 18 }}>restore</span></IconButton></Tooltip>}
                            <Tooltip title={isRowDeleted(row) ? "物理削除" : "論理削除"}><IconButton size="small" color="error" onClick={() => deletePayment(index)}><span className="material-icons" style={{ fontSize: 18 }}>delete</span></IconButton></Tooltip>
                          </Stack>
                        </Stack>
                        <Box sx={{ minWidth: 0 }}>
                          <Typography variant="subtitle1" sx={{ fontWeight: 800 }} noWrap>{row.description || "-"}</Typography>
                          <Stack direction="row" spacing={0.75} flexWrap="wrap" useFlexGap>
                            <Chip size="small" color={isRowEnabled(row) ? "success" : "default"} label={rowStatusLabel(row)} />
                            {isRowDeleted(row) && <Chip size="small" color="error" label={rowDeleteStatusLabel(row)} />}
                            <Typography variant="caption" color="text.secondary">支払日 {row.paymentDate || "-"} / 計上日 {row.recognitionDate || "-"} / {row.burdenDepartment || "-"} / {row.payee || "-"} / {row.accountSubject || "-"}</Typography>
                          </Stack>
                        </Box>
                        <TableSummaryGrid>
                          <SummaryCard label="累計" value={yen(currentCumulative)} />
                          <SummaryCard label="残高" value={yen(currentBalance)} color={currentBalance < 0 ? "error.main" : "text.primary"} />
                          <SummaryCard label="予算" value={budget?.name || row.budgetId} />
                        </TableSummaryGrid>
                        <Stack direction="row" spacing={0.75} flexWrap="wrap" useFlexGap>
                          <Chip size="small" label={`担当印 ${row.staffStamp || "-"}`} />
                          <Chip size="small" label={`所属長印 ${row.managerStamp || "-"}`} />
                          <Chip size="small" label={`担当確認 ${row.staffConfirmed || "-"}`} />
                          <Chip size="small" label={`所属長確認 ${row.managerConfirmed || "-"}`} />
                        </Stack>
                        <DetailLine label="条件" value={conditionSummary(row)} />
                      </Stack>
                    </CardContent>
                  </Card>
                ); })}
              </CardGrid>
            ) : (
            <TableContainer component={Paper} variant="outlined" sx={{ width: "100%", overflowX: "auto" }}>
              <Table size="small" stickyHeader className="dense-resizable-table">
                <TableHead><TableRow>
                  <ResizableHeaderCell id="select" width={columnWidths.select} minWidth={42} sortConfig={sortConfig} onWidthChange={onWidthChange} className="no-print"><Checkbox size="small" checked={allSelected} indeterminate={partiallySelected} onChange={e => toggleAll(e.target.checked)} /></ResizableHeaderCell>
                  {columns.map(([id, label, align]) => <ResizableHeaderCell key={id} id={id} label={label} align={align} width={columnWidths[id]} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />)}
                  <ResizableHeaderCell id="actions" label="操作" width={columnWidths.actions} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} className="no-print" />
                </TableRow></TableHead>
                <TableBody>{visiblePayments.map(({ row, index }) => { const currentCumulative = data.payments.slice(0, index + 1).filter(isRowActive).reduce((sum, item) => sum + toNumber(item.amount), 0); const currentBalance = totals.budgetTotal - currentCumulative; const checked = selected.includes(index); return (
                  <TableRow key={index} selected={checked} hover sx={{ opacity: isRowActive(row) ? 1 : 0.55 }}>
                    <TableCell padding="checkbox" className="no-print" sx={{ width: columnWidths.select }}><Checkbox size="small" checked={checked} onChange={e => toggleOne(index, e.target.checked)} /></TableCell>
                    <TableCell align="right" sx={{ width: columnWidths.no }}><NumericTextField variant="standard" value={row.no} onCommit={value => updatePayment(index, "no", value)} sx={{ width: "100%" }} /></TableCell>
                    <TableCell sx={{ width: columnWidths.paymentDate }}><TextField variant="standard" type="date" value={row.paymentDate} onChange={e => updatePayment(index, "paymentDate", e.target.value)} sx={{ width: "100%" }} /></TableCell>
                    <TableCell sx={{ width: columnWidths.recognitionDate }}><TextField variant="standard" type="date" value={row.recognitionDate || ""} onChange={e => updatePayment(index, "recognitionDate", e.target.value)} sx={{ width: "100%" }} /></TableCell>
                    <TableCell sx={{ width: columnWidths.depreciationStartDate }}><TextField variant="standard" type="date" value={row.depreciationStartDate} onChange={e => updatePayment(index, "depreciationStartDate", e.target.value)} sx={{ width: "100%" }} /></TableCell>

                    <TableCell align="right" sx={{ width: columnWidths.baseAmount }}><NumericTextField variant="standard" value={row.baseAmount} onCommit={value => updatePayment(index, "baseAmount", value)} sx={{ width: "100%" }} /></TableCell>
                    <TableCell align="right" sx={{ width: columnWidths.taxRate }}><NumericTextField variant="standard" value={row.taxRate} onCommit={value => updatePayment(index, "taxRate", value)} sx={{ width: "100%" }} /></TableCell>
                    <TableCell align="right" sx={{ width: columnWidths.amount }}><NumericTextField variant="standard" value={row.amount} onCommit={value => updatePayment(index, "amount", value)} sx={{ width: "100%" }} /></TableCell>
                    <TableCell align="right" sx={{ width: columnWidths.cumulative }}>{yen(currentCumulative)}</TableCell><TableCell align="right" sx={{ width: columnWidths.balance, color: currentBalance < 0 ? "error.main" : "inherit" }}>{yen(currentBalance)}</TableCell>
                    <TableCell sx={{ width: columnWidths.method }}><Select variant="standard" value={row.method} onChange={e => updatePayment(index, "method", e.target.value)} sx={{ width: "100%" }} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.paymentMethods.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></TableCell>
                    <TableCell sx={{ width: columnWidths.payee }}><TextField variant="standard" value={row.payee} onChange={e => updatePayment(index, "payee", e.target.value)} sx={{ width: "100%" }} /></TableCell><TableCell sx={{ width: columnWidths.accountingNo }}><TextField variant="standard" value={row.accountingNo} onChange={e => updatePayment(index, "accountingNo", e.target.value)} sx={{ width: "100%" }} /></TableCell>
                    <TableCell sx={{ width: columnWidths.burdenDepartment }}><TextField variant="standard" value={row.burdenDepartment || ""} onChange={e => updatePayment(index, "burdenDepartment", e.target.value)} sx={{ width: "100%" }} /></TableCell>

                  </TableRow>); })}</TableBody>

    function PrintPage({ data, setting, totals, printReport, updateSetting, updateProject, updateBudget, updatePayment }) {
      let cumulative = 0;
      const [zoom, setZoom] = useState(1);
      const [previewOffset, setPreviewOffset] = useState({ x: 0, y: 0 });
      const [isPreviewDragging, setIsPreviewDragging] = useState(false);
      const dragStateRef = useRef(null);
      const zoomOptions = [0.1, 0.5, 0.8, 0.9, 1, 1.1, 1.2, 1.5, 2];
      const zoomPercent = Math.round(zoom * 100);
      function updateZoom(nextZoom) {
        setZoom(Math.min(2, Math.max(0.1, Math.round(nextZoom * 100) / 100)));
      }
      function resetPreviewView() {
        setZoom(1);
        setPreviewOffset({ x: 0, y: 0 });
      }
      function startPreviewDrag(event) {
        if (event.button !== undefined && event.button !== 0) return;
        if (event.target.closest?.("[data-print-editable], input, textarea, select, button")) return;
        event.preventDefault();
        event.currentTarget.setPointerCapture?.(event.pointerId);
        dragStateRef.current = {
          clientX: event.clientX,
          clientY: event.clientY,
          x: previewOffset.x,
          y: previewOffset.y
        };
        setIsPreviewDragging(true);
      }
      function movePreviewDrag(event) {
        const dragState = dragStateRef.current;
        if (!dragState) return;
        event.preventDefault();
        setPreviewOffset({
          x: dragState.x + event.clientX - dragState.clientX,
          y: dragState.y + event.clientY - dragState.clientY
        });
      }
      function endPreviewDrag(event) {
        if (event?.pointerId !== undefined) {
          try {
            event.currentTarget.releasePointerCapture?.(event.pointerId);
          } catch (error) {
            // Pointer capture may already be released by the browser.
          }
        }
        dragStateRef.current = null;
        setIsPreviewDragging(false);
      }

      return (
        <Stack spacing={2}>
          <Box className="no-print">
            <PageHeader
              title="印刷レポート"
              subtitle="A4縦・横を切り替えながら、画面上でも紙面レイアウトを確認できます。"
              actions={[
                <Stack key="zoom" direction="row" spacing={1} alignItems="center" sx={{ minWidth: { xs: "100%", sm: 420 }, maxWidth: { xs: "100%", sm: 520 } }}>
                  <Tooltip title="縮小">
                    <IconButton size="small" onClick={() => updateZoom(zoom - 0.1)} disabled={zoom <= 0.1}>
                      <span className="material-icons">zoom_out</span>
                    </IconButton>
                  </Tooltip>
                  <FormControl size="small" sx={{ minWidth: 92 }}>
                    <InputLabel>ズーム</InputLabel>
                    <Select
                      label="ズーム"
                      value={zoomOptions.includes(zoom) ? zoom : ""}
                      onChange={event => event.target.value !== "" && updateZoom(Number(event.target.value))}
                      MenuProps={DROPDOWN_MENU_PROPS}
                    >
                      <MenuItem value="">任意</MenuItem>
                      {zoomOptions.map(value => (
                        <MenuItem key={value} value={value}>{Math.round(value * 100)}%</MenuItem>
                      ))}
                    </Select>
                  </FormControl>
                  <Slider
                    value={zoomPercent}
                    min={10}
                    max={200}
                    step={10}
                    marks={[
                      { value: 10, label: "10%" },
                      { value: 100, label: "100%" },
                      { value: 200, label: "200%" }
                    ]}
                    valueLabelDisplay="auto"
                    valueLabelFormat={value => `${value}%`}
                    onChange={(event, value) => updateZoom(Number(value) / 100)}
                    sx={{ flex: 1, minWidth: 140 }}
                  />
                  <Typography variant="body2" sx={{ width: 44, textAlign: "right", fontVariantNumeric: "tabular-nums" }}>
                    {zoomPercent}%
                  </Typography>
                  <Tooltip title="拡大">
                    <IconButton size="small" onClick={() => updateZoom(zoom + 0.1)} disabled={zoom >= 2}>
                      <span className="material-icons">zoom_in</span>
                    </IconButton>
                  </Tooltip>
                  <Tooltip title="表示位置をリセット">
                    <IconButton size="small" onClick={resetPreviewView}>
                      <span className="material-icons">center_focus_strong</span>
                    </IconButton>
                  </Tooltip>
                </Stack>,
                <FormControlLabel
                  key="orientation"
                  control={<Switch checked={setting.print.orientation === "landscape"} onChange={event => updateSetting("print.orientation", event.target.checked ? "landscape" : "portrait")} />}
                  label={setting.print.orientation === "landscape" ? "横向き" : "縦向き"}
                />,
                <Button key="print" variant="contained" startIcon={<span className="material-icons">print</span>} onClick={printReport}>
                  印刷 / PDF保存
                </Button>
              ]}
            />
          </Box>

          <Box
            className="print-preview-wrap"
            onPointerDown={startPreviewDrag}
            onPointerMove={movePreviewDrag}
            onPointerUp={endPreviewDrag}
            onPointerCancel={endPreviewDrag}
            sx={{ cursor: isPreviewDragging ? "grabbing" : "grab" }}
          >
            <Box
              className="print-preview-zoom"
              sx={{ transform: `translate(${previewOffset.x}px, ${previewOffset.y}px) scale(${zoom})` }}
            >
            <Box className={`print-paper ${setting.print.orientation || "portrait"}`}>
            <Box className="print-title">
              <Box>
                <h2><PrintEditableText value={setting.print.reportTitle} onCommit={value => updateSetting("print.reportTitle", value)} /></h2>
                <div><PrintEditableText value={data.project.name} onCommit={value => updateProject("name", value)} /></div>
                <div>負担部署：<PrintEditableText value={data.project.burdenDepartment || ""} onCommit={value => updateProject("burdenDepartment", value)} /></div>
              </Box>
              <Box className="print-title-right">
                <Box className="print-meta">
                  出力日：{new Date().toISOString().slice(0, 10)}<br />
                  意思決定日：<PrintEditableText value={data.project.decisionDate} onCommit={value => updateProject("decisionDate", value)} /><br />
                  進捗率：{totals.progress.toFixed(1)}%
                </Box>
                <Box className="print-signatures">
                  {["担当者", "所属長"].map(label => (
                    <Box className="print-stamp" key={label}>
                      <Box className="print-stamp-title">{label}</Box>
                      <Box className="print-stamp-box">押印</Box>
                    </Box>
                  ))}
                </Box>
              </Box>
            </Box>

            <Box className="print-summary">
              <Box className="print-box">予算本体合計<strong>{yen(totals.budgetBase)}</strong></Box>
              <Box className="print-box">消費税合計<strong>{yen(totals.budgetTax)}</strong></Box>
              <Box className="print-box">予算総額<strong>{yen(totals.budgetTotal)}</strong></Box>
              <Box className="print-box">累計支払額<strong>{yen(totals.paidTotal)}</strong></Box>
              <Box className="print-box">残高<strong>{yen(totals.balance)}</strong></Box>
            </Box>

            {setting.print.showBudgetList && (
              <Box className="print-section">
                <h3>予算一覧</h3>
                <table className="print-table">
                  <thead>
                    <tr>
                      <th>No.</th>
                      <th>企画書</th>
                      <th>予算項目</th>
                      <th>区分</th>
                      <th>勘定科目</th>
                      <th>負担部署</th>
                      <th>本体金額</th>
                      <th>税率</th>
                      <th>税込金額</th>
                    </tr>
                  </thead>
                  <tbody>
                    {data.budgets.map((row, index) => {
                      if (!isRowActive(row)) return null;
                      const tax = Math.round(toNumber(row.amount) * toNumber(row.taxRate) / 100);
                      return (
                        <tr key={row.no}>
                          <td><PrintEditableText value={row.no} align="right" onCommit={value => updateBudget(index, "no", value)} /></td>
                          <td>{data.plans.find(plan => plan.id === row.planId)?.name || row.planId}</td>
                          <td><PrintEditableText value={row.name} onCommit={value => updateBudget(index, "name", value)} /></td>
                          <td><PrintEditableText value={row.category} onCommit={value => updateBudget(index, "category", value)} /></td>
                          <td><PrintEditableText value={row.accountSubject} onCommit={value => updateBudget(index, "accountSubject", value)} /></td>
                          <td><PrintEditableText value={row.burdenDepartment || ""} onCommit={value => updateBudget(index, "burdenDepartment", value)} /></td>
                          <td className="num"><PrintEditableText value={row.amount} display={yen(row.amount)} align="right" onCommit={value => updateBudget(index, "amount", value)} /></td>
                          <td className="num"><PrintEditableText value={row.taxRate} display={`${row.taxRate}%`} align="right" onCommit={value => updateBudget(index, "taxRate", value)} /></td>

                </table>
              </Box>
            )}

            {setting.print.showPaymentList && (
              <Box className="print-section">
                <h3>支払い一覧</h3>
                <table className="print-table">
                  <thead>
                    <tr>
                      <th>No.</th>
                      <th>支払日</th>
                      <th>計上日</th>
                      <th>予算</th>
                      <th>相手先名</th>
                      <th>負担部署</th>
                      <th>支払内容</th>
                      <th>勘定科目</th>
                      <th>費用種別</th>
                      <th>償却月数</th>
                      <th>費用計上基準日</th>
                      <th>本体価格</th>
                      <th>税率</th>
                      <th>税込金額</th>
                      <th>累計</th>
                      <th>残高</th>
                    </tr>
                  </thead>
                  <tbody>
                    {data.payments.map((row, index) => {
                      if (!isRowActive(row)) return null;
                      cumulative += toNumber(row.amount);
                      return (
                        <tr key={row.no}>
                          <td><PrintEditableText value={row.no} align="right" onCommit={value => updatePayment(index, "no", value)} /></td>
                          <td><PrintEditableText value={row.paymentDate} onCommit={value => updatePayment(index, "paymentDate", value)} /></td>
                          <td><PrintEditableText value={row.recognitionDate || ""} onCommit={value => updatePayment(index, "recognitionDate", value)} /></td>
                          <td>{data.budgets.find(b => String(b.no) === String(row.budgetId))?.name || row.budgetId}</td>
                          <td><PrintEditableText value={row.payee} onCommit={value => updatePayment(index, "payee", value)} /></td>
                          <td><PrintEditableText value={row.burdenDepartment || ""} onCommit={value => updatePayment(index, "burdenDepartment", value)} /></td>
                          <td><PrintEditableText value={row.description} onCommit={value => updatePayment(index, "description", value)} /></td>
                          <td><PrintEditableText value={row.accountSubject} onCommit={value => updatePayment(index, "accountSubject", value)} /></td>
                          <td><PrintEditableText value={row.costType} onCommit={value => updatePayment(index, "costType", value)} /></td>

      const diagnostics = useMemo(() => validatePaymentData(data, setting), [data, setting]);

      return (
        <Stack spacing={1.25} sx={{ height: { md: "calc(100dvh - 132px)" }, minHeight: 0 }}>
          <PageHeader
            title="データ"
            subtitle="data.js、JSON入出力、外部連携モデル、データ診断を管理します。setting.js関連は設定タブで扱います。"
            chips={[
              <Chip key="data" size="small" color={dataSaveReady ? dataDirty ? "warning" : "success" : "default"} label={dataSaveReady ? "data.js保存先あり" : "data.js保存先なし"} />,
              <Chip key="diagnostics" size="small" color={diagnostics.ok ? "success" : "warning"} label={diagnostics.ok ? "診断OK" : `警告${diagnostics.warningCount}件`} />
            ]}
          />

          <SettingsScrollArea>
          <SectionCard title="データ診断" subtitle="data.jsへ保存する前に、予算・支払いの整合性を確認します。">
            <Grid container spacing={1.5}>
              <Grid item xs={12} md={3}>
                <Paper variant="outlined" sx={{ p: 1.5 }}>
                  <Typography variant="caption" color="text.secondary">予算件数</Typography>
                  <Typography variant="h6">{diagnostics.summary.budgetCount}件</Typography>
                </Paper>
              </Grid>
              <Grid item xs={12} md={3}>
                <Paper variant="outlined" sx={{ p: 1.5 }}>
                  <Typography variant="caption" color="text.secondary">支払い件数</Typography>
                  <Typography variant="h6">{diagnostics.summary.paymentCount}件</Typography>
                </Paper>
              </Grid>
              <Grid item xs={12} md={3}>
                <Paper variant="outlined" sx={{ p: 1.5 }}>
                  <Typography variant="caption" color="text.secondary">予算総額</Typography>
                  <Typography variant="h6">¥{yen(diagnostics.summary.totalBudget)}</Typography>
                </Paper>
              </Grid>
              <Grid item xs={12} md={3}>
                <Paper variant="outlined" sx={{ p: 1.5 }}>
                  <Typography variant="caption" color="text.secondary">支払済</Typography>
                  <Typography variant="h6">¥{yen(diagnostics.summary.totalPaid)}</Typography>
                </Paper>
              </Grid>
            </Grid>

            {diagnostics.ok ? (
              <Alert severity="success" sx={{ mt: 2 }}>データ診断に問題はありません。</Alert>
            ) : (
              <Alert severity="warning" sx={{ mt: 2 }}>
                <Typography fontWeight={800} sx={{ mb: 0.5 }}>警告が{diagnostics.warningCount}件あります。</Typography>
                <Box component="ul" sx={{ m: 0, pl: 2 }}>
                  {diagnostics.warnings.slice(0, 12).map((warning, index) => (
                    <li key={index}>{warning}</li>
                  ))}
                  {diagnostics.warnings.length > 12 && <li>ほか{diagnostics.warnings.length - 12}件</li>}
                </Box>
              </Alert>
            )}
          </SectionCard>

          <SectionCard title="外部連携データモデル" subtitle="他システムからJSONでデータを追加するためのフォーマットです。">
              <Stack direction="row" spacing={1} sx={{ ...TOOLBAR_STACK_SX, mb: 2 }}>
                <Button size="small" variant="contained" startIcon={<span className="material-icons">schema</span>} onClick={generateIntegrationModel}>
                  モデルを表示
                </Button>
                <Button size="small" variant="outlined" startIcon={<span className="material-icons">file_download</span>} onClick={exportIntegrationModel}>
                  モデルJSONエクスポート
                </Button>
                <Button size="small" variant="outlined" startIcon={<span className="material-icons">download</span>} onClick={exportDataJson}>
                  現在データをJSONエクスポート
                </Button>
                <Button size="small" variant="outlined" startIcon={<span className="material-icons">upload</span>} onClick={() => jsonImportRef.current.click()}>
                  JSON追加インポート
                </Button>
                <input
                  ref={jsonImportRef}
                  type="file"
                  accept=".json,application/json"
                  hidden
                  onChange={e => importExternalJsonFile(e.target.files[0])}
                />
              </Stack>
              <Alert severity="info" sx={{ mb: 2 }}>
                JSONインポートは既存データを削除せず、予算と支払いを末尾に追加します。projectは指定項目だけ上書きします。
              </Alert>
              <TextField
                fullWidth
                multiline
                minRows={6}
                maxRows={10}
                value={integrationText}
                onChange={e => setIntegrationText(e.target.value)}
                placeholder="モデルを表示すると、他システム連携用JSONフォーマットがここに表示されます。"
                inputProps={{ style: { fontFamily: "Consolas, monospace", fontSize: 12 } }}
              />
          </SectionCard>

          <SectionCard title="data.js 保存 / 読み込み" subtitle="予算・支払いデータの保存ファイルです。">
              <Alert severity={dataSaveReady ? dataDirty ? "warning" : "success" : "warning"} sx={{ mb: 2 }}>
                {dataSaveReady
                  ? dataDirty
                    ? "data.js保存先は設定済みですが、未保存変更があります。"
                    : "data.js保存先は設定済みです。"
                  : "data.js保存先が未設定です。自動保存するには保存先を選択してください。"}
              </Alert>

              <Stack direction="row" spacing={1} sx={{ ...TOOLBAR_STACK_SX, mb: 2 }}>
                <Button size="small" variant="contained" color="success" onClick={chooseDataSaveFile}>
                  data.js保存先を選択
                </Button>
                <Button size="small" variant="contained" onClick={saveDataNow}>
                  data.jsを今すぐ保存
                </Button>
                <Button size="small" variant="outlined" onClick={generateDataJs}>
                  data.jsを画面生成
                </Button>
                <Button size="small" variant="outlined" onClick={() => copyText(dataText)}>
                  コピー
                </Button>
                <Button size="small" variant="outlined" onClick={loadDataText}>
                  下の内容を画面に読み込み
                </Button>
              </Stack>

              <TextField
                fullWidth
                multiline
                minRows={6}
                maxRows={10}
                value={dataText}
                onChange={e => setDataText(e.target.value)}
                placeholder="ここにdata.jsの内容を表示・貼り付け"
              />
          </SectionCard>


          </SettingsScrollArea>
        </Stack>
      );
    }

    function SettingsPage({
      setting,
      updateSetting,
      dataText,
      setDataText,
      settingText,
      setSettingText,
      generateDataJs,
      generateSettingJs,
      copyText,
      loadDataText,
      loadSettingText,
      chooseDataSaveFile,
      chooseSettingSaveFile,
      saveDataNow,
      saveSettingNow,
      dataSaveReady,
      settingSaveReady,
      dataDirty,
      settingDirty,
      integrationText,
      setIntegrationText,
      generateIntegrationModel,
      exportIntegrationModel,
      exportDataJson,
      importExternalJsonFile,
      jsonImportRef,
      masterDefinitions,
      openMasterDrawer
    }) {
      const accountRuleSubjects = (setting.options.accountSubjects || []).filter(Boolean);
      function updateAccountSubjectRule(subject, field, value) {
        const rules = { ...(setting.options.accountSubjectRules || {}) };
        const current = { ...(rules[subject] || {}) };
        const next = {
          ...current,
          [field]: field === "depreciationMonths" ? toNumber(value) : value
        };

        if (field === "costType") {
          Object.assign(next, getCostTypeRule(value, setting) || {});
          next.costType = value;
        }

        if (field === "expenseStartMode") {
          next.expenseStartMode = normalizeExpenseStartMode(value);
        }

        rules[subject] = next;
        updateSetting("options.accountSubjectRules", rules);
      }

      return (
        <Stack spacing={1.25} sx={{ height: { md: "calc(100dvh - 132px)" }, minHeight: 0 }}>
          <PageHeader
            title="設定"
            subtitle="表示、初期値、印刷、マスタ、setting.js保存を管理します。data.js関連はデータタブで扱います。"
            chips={[
              <Chip key="setting" size="small" color={settingSaveReady ? settingDirty ? "warning" : "success" : "default"} label={settingSaveReady ? "setting.js保存先あり" : "setting.js保存先なし"} />
            ]}
          />

          <SettingsScrollArea>
          <SectionCard title="基本設定" subtitle="画面表示と既定値を変更します。">
              <Grid container spacing={2}>
                <Grid item xs={12} md={3}>
                  <TextField
                    label="アプリタイトル"
                    fullWidth
                    size="small"
                    value={setting.app.title}
                    onChange={e => updateSetting("app.title", e.target.value)}
                  />
                </Grid>

                <Grid item xs={12} md={3}>
                  <FormControl size="small" fullWidth>
                    <InputLabel>初期表示タブ</InputLabel>
                    <Select
                      label="初期表示タブ"
                      value={setting.display.defaultTab}
                      onChange={e => updateSetting("display.defaultTab", e.target.value)}
                      MenuProps={DROPDOWN_MENU_PROPS}
                    >
                      <MenuItem value="dashboard">ダッシュボード</MenuItem>
                      <MenuItem value="plans">企画一覧</MenuItem>
                      <MenuItem value="budget">予算一覧</MenuItem>
                      <MenuItem value="payments">支払い一覧</MenuItem>
                      <MenuItem value="print">印刷レポート</MenuItem>
                      <MenuItem value="data">データ</MenuItem>
                      <MenuItem value="settings">設定</MenuItem>
                    </Select>
                  </FormControl>
                </Grid>

                <Grid item xs={12} md={3}>
                  <FormControl size="small" fullWidth>
                    <InputLabel>テーマ</InputLabel>
                    <Select
                      label="テーマ"
                      value={setting.display.themeMode || "light"}
                      onChange={e => updateSetting("display.themeMode", e.target.value)}
                      MenuProps={DROPDOWN_MENU_PROPS}
                    >
                      <MenuItem value="light">ライト</MenuItem>
                      <MenuItem value="dark">ダーク</MenuItem>
                    </Select>
                  </FormControl>
                </Grid>

                <Grid item xs={12} md={3}>
                  <FormControl size="small" fullWidth>
                    <InputLabel>アクセントカラー</InputLabel>
                    <Select
                      label="アクセントカラー"
                      value={setting.display.accentColor || "blue"}
                      onChange={e => updateSetting("display.accentColor", e.target.value)}
                      MenuProps={DROPDOWN_MENU_PROPS}
                    >
                      {Object.entries(THEME_ACCENTS).map(([key, value]) => (
                        <MenuItem key={key} value={key}>{value.label}</MenuItem>
                      ))}
                    </Select>
                  </FormControl>
                </Grid>

                <Grid item xs={12} md={3}>
                  <FormControl size="small" fullWidth>
                    <InputLabel>表示密度</InputLabel>
                    <Select
                      label="表示密度"
                      value={setting.display.uiDensity || "compact"}
                      onChange={e => updateSetting("display.uiDensity", e.target.value)}
                      MenuProps={DROPDOWN_MENU_PROPS}
                    >
                      <MenuItem value="compact">コンパクト</MenuItem>
                      <MenuItem value="comfortable">ゆったり</MenuItem>
                    </Select>
                  </FormControl>
                </Grid>

                <Grid item xs={12} md={3}>
                  <NumericTextField
                    label="予算初期税率"
                    fullWidth
                    size="small"
                    value={setting.defaults.budgetTaxRate}
                    onCommit={value => updateSetting("defaults.budgetTaxRate", toNumber(value))}
                  />
                </Grid>

                <Grid item xs={12} md={3}>
                  <TextField
                    label="支払い初期方法"
                    fullWidth
                    size="small"
                    value={setting.defaults.paymentMethod}
                    onChange={e => updateSetting("defaults.paymentMethod", e.target.value)}
                  />
                </Grid>

                <Grid item xs={12} md={6}>
                  <TextField
                    label="印刷タイトル"
                    fullWidth
                    size="small"
                    value={setting.print.reportTitle}
                    onChange={e => updateSetting("print.reportTitle", e.target.value)}
                  />
                </Grid>

                <Grid item xs={12}>
                  <SectionCard
                    title="マスタ管理"
                    subtitle="ドロップダウンリストの選択肢は右側ドロワーで編集します。項目が増えても設定画面本体は縦に伸びません。"
                    sx={{ boxShadow: "none" }}
                  >
                    <Grid container spacing={1.5}>
                      {(masterDefinitions || []).map(definition => {
                        const rawValues = setting.options?.[definition.key] || [];
                        const values = definition.key === "expensePatterns"
                          ? (Array.isArray(rawValues) ? rawValues.map(item => item.label || item.value).filter(Boolean) : [])
                          : (Array.isArray(rawValues) ? rawValues.filter(Boolean) : []);

                        return (
                          <Grid item xs={12} md={6} key={definition.key}>
                            <Paper variant="outlined" sx={{ p: 1.5, height: "100%" }}>
                              <Stack spacing={1}>
                                <Stack direction="row" justifyContent="space-between" alignItems="center" spacing={1}>
                                  <Box sx={{ minWidth: 0 }}>
                                    <Typography fontWeight={800}>{definition.title}</Typography>
                                    <Typography variant="caption" color="text.secondary">
                                      {values.length}件
                                    </Typography>
                                  </Box>
                                  <Button size="small" variant="outlined" onClick={() => openMasterDrawer(definition)}>
                                    編集
                                  </Button>
                                </Stack>
                                <Typography variant="body2" color="text.secondary" sx={{ minHeight: 40, overflowWrap: "anywhere" }}>
                                  {values.slice(0, 6).join(" / ") || "未設定"}{values.length > 6 ? " ..." : ""}
                                </Typography>
                              </Stack>
                            </Paper>
                          </Grid>
                        );
                      })}
                    </Grid>
                  </SectionCard>
                </Grid>

                <Grid item xs={12}>
                  <SectionCard
                    title="勘定科目別 初期条件セット"
                    subtitle="勘定科目を選んだ時に自動反映する費用種別、費用発生区分、償却月数、費用計上基準日を管理します。"
                    sx={{ boxShadow: "none" }}
                  >
                    <Grid container spacing={1.5}>
                      {accountRuleSubjects.map(subject => {
                        const rule = setting.options.accountSubjectRules?.[subject] || {};
                        return (
                          <Grid item xs={12} key={subject}>
                            <Paper variant="outlined" sx={{ p: 1.25 }}>
                              <Grid container spacing={1} alignItems="center">
                                <Grid item xs={12} md={2}>
                                  <Typography fontWeight={800}>{subject}</Typography>
                                </Grid>
                                <Grid item xs={12} sm={6} md={2}>
                                  <FormControl size="small" fullWidth>
                                    <InputLabel>費用種別</InputLabel>
                                    <Select label="費用種別" value={rule.costType || ""} onChange={e => updateAccountSubjectRule(subject, "costType", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>
                                      {setting.options.costTypes.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}
                                    </Select>
                                  </FormControl>
                                </Grid>
                                <Grid item xs={12} sm={6} md={2}>
                                  <FormControl size="small" fullWidth>
                                    <InputLabel>費用発生区分</InputLabel>
                                    <Select label="費用発生区分" value={rule.expensePattern || "one_time"} onChange={e => updateAccountSubjectRule(subject, "expensePattern", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>
                                      {(setting.options.expensePatterns || DEFAULT_SETTING.options.expensePatterns).map(item => <MenuItem key={item.value} value={item.value}>{item.label}</MenuItem>)}
                                    </Select>
                                  </FormControl>
                                </Grid>
                                <Grid item xs={12} sm={6} md={2}>
                                  <NumericTextField label="償却月数" value={rule.depreciationMonths || 0} onCommit={value => updateAccountSubjectRule(subject, "depreciationMonths", value)} />
                                </Grid>
                                <Grid item xs={12} sm={6} md={2}>
                                  <FormControl size="small" fullWidth>
                                    <InputLabel>費用計上基準日</InputLabel>
                                    <Select label="費用計上基準日" value={normalizeExpenseStartMode(rule.expenseStartMode)} onChange={e => updateAccountSubjectRule(subject, "expenseStartMode", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>
                                      {setting.options.expenseStartModes.map(item => <MenuItem key={item} value={item}>{expenseStartModeLabel(item)}</MenuItem>)}
                                    </Select>
                                  </FormControl>
                                </Grid>
                                <Grid item xs={12} sm={6} md={1}>
                                  <FormControl size="small" fullWidth>
                                    <InputLabel>期間</InputLabel>
                                    <Select label="期間" value={rule.costPeriod || "なし"} onChange={e => updateAccountSubjectRule(subject, "costPeriod", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>
                                      {setting.options.costPeriods.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}
                                    </Select>
                                  </FormControl>
                                </Grid>
                                <Grid item xs={12} sm={6} md={1}>
                                  <FormControl size="small" fullWidth>
                                    <InputLabel>周期</InputLabel>
                                    <Select label="周期" value={rule.recurringCycle || ""} onChange={e => updateAccountSubjectRule(subject, "recurringCycle", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>
                                      {(setting.options.recurringCycles || DEFAULT_SETTING.options.recurringCycles).map(item => <MenuItem key={item || "__empty"} value={item}>{recurringCycleLabel(item)}</MenuItem>)}
                                    </Select>
                                  </FormControl>
                                </Grid>
                              </Grid>
                            </Paper>
                          </Grid>
                        );
                      })}
                    </Grid>
                  </SectionCard>
                </Grid>

                <Grid item xs={12} md={6}>
                  <FormControlLabel
                    control={
                      <Switch
                        checked={setting.save.autoSaveDataAfterFileSelected}
                        onChange={e => updateSetting("save.autoSaveDataAfterFileSelected", e.target.checked)}
                      />
                    }
                    label="data.js保存先選択後は編集時に自動保存"
                  />
                </Grid>

                <Grid item xs={12} md={3}>
                  <NumericTextField
                    label="自動保存待機時間(ms)"
                    fullWidth
                    size="small"
                    value={setting.save.autoSaveDelayMs || 1500}
                    onCommit={value => updateSetting("save.autoSaveDelayMs", toNumber(value) || 1500)}
                  />
                </Grid>
              </Grid>

              <Alert severity="info" sx={{ mt: 2 }}>
                このアプリはlocalStorage / sessionStorage / IndexedDB / CacheStorage / Cookieへ業務データを保存しません。起動時と終了時に同一オリジンのクライアント側ストレージを掃除し、保存・復元はdata.js / setting.jsを中心に行います。
              </Alert>
          </SectionCard>

          <SectionCard title="setting.js 保存 / 読み込み" subtitle="アプリ設定と選択肢の保存ファイルです。">
              <Alert severity={settingSaveReady ? settingDirty ? "warning" : "success" : "info"} sx={{ mb: 2 }}>
                {settingSaveReady
                  ? settingDirty
                    ? "setting.js保存先は設定済みですが、未保存変更があります。"
                    : "setting.js保存先は設定済みです。"
                  : "setting.js保存先は未設定です。必要に応じて明示的に保存してください。"}
              </Alert>

              <Stack direction="row" spacing={1} sx={{ ...TOOLBAR_STACK_SX, mb: 2 }}>
                <Button size="small" variant="contained" color="success" onClick={chooseSettingSaveFile}>
                  setting.js保存先を選択
                </Button>
                <Button size="small" variant="contained" onClick={saveSettingNow}>
                  setting.jsを今すぐ保存
                </Button>
                <Button size="small" variant="outlined" onClick={generateSettingJs}>
                  setting.jsを画面生成
                </Button>
                <Button size="small" variant="outlined" onClick={() => copyText(settingText)}>
                  コピー
                </Button>
                <Button size="small" variant="outlined" onClick={loadSettingText}>
                  下の内容を画面に読み込み
                </Button>
              </Stack>

              <TextField
                fullWidth
                multiline
                minRows={6}
                maxRows={10}
                value={settingText}
                onChange={e => setSettingText(e.target.value)}
                placeholder="ここにsetting.jsの内容を表示・貼り付け"
              />
          </SectionCard>
          </SettingsScrollArea>
        </Stack>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
