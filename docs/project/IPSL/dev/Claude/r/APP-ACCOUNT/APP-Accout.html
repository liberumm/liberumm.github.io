    function D3DashboardViz({ totals, subjects, timings, expenses, fiscalYear, balanceColor }) {
      const progressRef = useRef(null);
      const subjectsRef = useRef(null);
      const timingsRef = useRef(null);
      const expensesRef = useRef(null);
      const hasD3 = Boolean(window.d3);
      const panelSx = {
        p: 1.25,
        overflow: "hidden",
        bgcolor: "background.paper",
        minWidth: 0,
        height: "100%",
        minHeight: { xs: 220, md: 260 }
      };

      useEffect(() => {
        if (!hasD3) return;

        const d3 = window.d3;
        const colors = {
          budget: "#94a3b8",
          paid: totals.balance < 0 ? "#ef4444" : "#2563eb",
          warning: "#f59e0b",
          error: "#ef4444",
          future: "#7c3aed",
          text: "#111827",
          muted: "#64748b",
          grid: "#e2e8f0"
        };

        function initSvg(ref, width, height) {
          const svg = d3.select(ref.current);
          svg.selectAll("*").remove();
          svg.attr("viewBox", `0 0 ${width} ${height}`).attr("role", "img");
          return svg;
        }

        function emptyState(svg, width, height, message) {
          svg.append("text")
            .attr("x", width / 2)
            .attr("y", height / 2)
            .attr("text-anchor", "middle")
            .attr("fill", colors.muted)
            .attr("font-size", 12)
            .text(message);
        }

        if (progressRef.current) {
          const svg = initSvg(progressRef, 720, 100);
          const barX = 16;
          const barY = 34;
          const barW = 520;
          const barH = 20;
          const progress = totals.budgetTotal > 0 ? Math.min(1, totals.paidTotal / totals.budgetTotal) : 0;
          svg.append("rect").attr("x", barX).attr("y", barY).attr("width", barW).attr("height", barH).attr("rx", 10).attr("fill", "#e5e7eb");
          svg.append("rect").attr("x", barX).attr("y", barY).attr("width", barW * progress).attr("height", barH).attr("rx", 10).attr("fill", colors.paid);
          if (totals.balance < 0 && totals.budgetTotal > 0) {
            const over = Math.min(1, Math.abs(totals.balance) / totals.budgetTotal);
            svg.append("rect").attr("x", barX + barW - barW * over).attr("y", barY).attr("width", barW * over).attr("height", barH).attr("rx", 10).attr("fill", colors.error).attr("opacity", 0.55);
          }
          svg.append("text").attr("x", barX).attr("y", 24).attr("fill", colors.muted).attr("font-size", 12).text(`支払済 ${yen(totals.paidTotal)} / 予算総額 ${yen(totals.budgetTotal)}`);
          svg.append("text").attr("x", 570).attr("y", 47).attr("fill", colors.text).attr("font-size", 24).attr("font-weight", 800).text(`${totals.progress.toFixed(1)}%`);
          svg.append("text").attr("x", 570).attr("y", 66).attr("fill", totals.balance < 0 ? colors.error : colors.muted).attr("font-size", 12).text(`残高 ${yen(totals.balance)}`);
        }

        if (subjectsRef.current) {
          const svg = initSvg(subjectsRef, 420, 210);
          if (!subjects.length) {
            emptyState(svg, 420, 210, "対象データがありません");
          } else {
            const subjectMax = Math.max(1, ...subjects.map(row => Math.max(row.budget, row.taxIncluded)));
            const subjectX = d3.scaleLinear().domain([0, subjectMax]).range([0, 230]);
            subjects.slice(0, 6).forEach((row, index) => {
              const y = 18 + index * 32;
              svg.append("text").attr("x", 12).attr("y", y + 10).attr("fill", colors.text).attr("font-size", 11).attr("font-weight", 700).text(row.subject.slice(0, 13));
              svg.append("rect").attr("x", 122).attr("y", y).attr("width", subjectX(row.budget)).attr("height", 8).attr("rx", 4).attr("fill", colors.budget).attr("opacity", 0.55);
              svg.append("rect").attr("x", 122).attr("y", y + 12).attr("width", subjectX(row.taxIncluded)).attr("height", 8).attr("rx", 4).attr("fill", colors.paid);
              svg.append("text").attr("x", 402).attr("y", y + 15).attr("text-anchor", "end").attr("fill", colors.muted).attr("font-size", 10).text(`${Math.round(row.progress)}%`);
            });
          }
        }

        if (timingsRef.current) {
          const svg = initSvg(timingsRef, 420, 210);
          if (!timings.length) {
            emptyState(svg, 420, 210, "時期ずれはありません");
          } else {
            const timingMax = Math.max(1, ...timings.map(row => Math.abs(row.diffDays)));
            const timingX = d3.scaleLinear().domain([-timingMax, timingMax]).range([70, 350]);
            svg.append("line").attr("x1", timingX(0)).attr("x2", timingX(0)).attr("y1", 18).attr("y2", 190).attr("stroke", colors.grid).attr("stroke-width", 2);
            timings.slice(0, 6).forEach((row, index) => {
              const y = 26 + index * 29;
              const x = timingX(row.diffDays);
              svg.append("line").attr("x1", timingX(0)).attr("x2", x).attr("y1", y).attr("y2", y).attr("stroke", row.diffDays < 0 ? colors.error : colors.warning).attr("stroke-width", 6).attr("stroke-linecap", "round");
              svg.append("circle").attr("cx", x).attr("cy", y).attr("r", 5).attr("fill", row.diffDays < 0 ? colors.error : colors.warning);
              svg.append("text").attr("x", 12).attr("y", y - 8).attr("fill", colors.text).attr("font-size", 10).attr("font-weight", 700).text((row.budgetName || row.description || `No.${row.no}`).slice(0, 20));
              svg.append("text").attr("x", 404).attr("y", y + 4).attr("text-anchor", "end").attr("fill", row.diffDays < 0 ? colors.error : colors.muted).attr("font-size", 10).text(`${row.diffDays}日`);
            });
          }
        }

        if (expensesRef.current) {
          const svg = initSvg(expensesRef, 420, 210);
          if (!expenses.length) {
            emptyState(svg, 420, 210, "費用発生スケジュール対象がありません");
          } else {
            const expenseMax = Math.max(1, ...expenses.map(row => row.thisYear + row.nextYears));
            const expenseX = d3.scaleLinear().domain([0, expenseMax]).range([0, 230]);
            expenses.slice(0, 6).forEach((row, index) => {
              const y = 18 + index * 32;
              const thisW = expenseX(row.thisYear);
              const futureW = expenseX(row.nextYears);
              svg.append("text").attr("x", 12).attr("y", y + 10).attr("fill", colors.text).attr("font-size", 10).attr("font-weight", 700).text((row.description || row.payee || `No.${row.no}`).slice(0, 13));
              svg.append("rect").attr("x", 118).attr("y", y).attr("width", thisW).attr("height", 10).attr("rx", 5).attr("fill", colors.paid);
              svg.append("rect").attr("x", 118 + thisW).attr("y", y).attr("width", futureW).attr("height", 10).attr("rx", 5).attr("fill", colors.future).attr("opacity", 0.82);
              svg.append("text").attr("x", 402).attr("y", y + 10).attr("text-anchor", "end").attr("fill", colors.muted).attr("font-size", 10).text(yen(row.thisYear + row.nextYears));
            });
          }
        }
      }, [hasD3, totals, subjects, timings, expenses, fiscalYear]);

      function VizPanel({ title, subtitle, children, wide = false }) {
        return (
          <Paper variant="outlined" sx={{ ...panelSx, gridColumn: { xs: "auto", md: wide ? "span 2" : "auto" } }}>
            <Typography variant="subtitle2" sx={{ fontWeight: 800, lineHeight: 1.2 }}>{title}</Typography>
            <Typography variant="caption" color="text.secondary">{subtitle}</Typography>
            <Box sx={{ mt: 1 }}>{children}</Box>
          </Paper>
        );
      }

      if (!hasD3) {
        return (
          <Box sx={{ display: "grid", gridTemplateColumns: { xs: "1fr", md: "repeat(2, minmax(0, 1fr))" }, gap: 1.25 }}>
            <VizPanel title="支払進捗ステータス" subtitle={`支払済 ${yen(totals.paidTotal)} / 予算総額 ${yen(totals.budgetTotal)}`} wide>
              <LinearProgress variant="determinate" value={totals.progress} sx={{ height: 10, borderRadius: 999, bgcolor: "action.hover", "& .MuiLinearProgress-bar": { borderRadius: 999 } }} color={totals.balance < 0 ? "error" : "primary"} />
              <Stack direction="row" justifyContent="space-between" sx={{ mt: 0.75 }}>
                <Typography variant="caption" color="text.secondary">{totals.progress.toFixed(1)}%</Typography>
                <Typography variant="caption" sx={{ fontWeight: 800, color: balanceColor }}>残高 {yen(totals.balance)}</Typography>
              </Stack>
            </VizPanel>
            <VizPanel title="勘定科目別" subtitle="予算と支払の比較">
              <Stack spacing={0.75}>{subjects.length ? subjects.map(row => <LinearProgress key={row.subject} variant="determinate" value={row.progress} sx={{ height: 8, borderRadius: 999 }} />) : <Typography variant="body2" color="text.secondary">対象データがありません</Typography>}</Stack>
            </VizPanel>
            <VizPanel title="時期ずれ" subtitle="支払日と費用開始日の差">
              <Stack spacing={0.75}>{timings.length ? timings.map(row => <Typography key={row.no} variant="caption">{row.budgetName || row.description || `No.${row.no}`}：{row.diffDays}日</Typography>) : <Typography variant="body2" color="text.secondary">時期ずれはありません</Typography>}</Stack>
            </VizPanel>
            <VizPanel title="年度別 発生費用" subtitle={`${fiscalYear}年度 / 次年度以降`}>
              <Stack spacing={0.75}>{expenses.length ? expenses.map(row => <Typography key={row.no} variant="caption">{row.description || row.payee || `No.${row.no}`}：{yen(row.thisYear + row.nextYears)}</Typography>) : <Typography variant="body2" color="text.secondary">費用発生スケジュール対象がありません</Typography>}</Stack>
            </VizPanel>
          </Box>
        );
      }

      return (
        <Box sx={{ display: "grid", gridTemplateColumns: { xs: "1fr", md: "repeat(2, minmax(0, 1fr))" }, gap: 1.25 }}>
          <VizPanel title="支払進捗ステータス" subtitle="支払済 / 予算総額 / 残高" wide>
            <Box component="svg" ref={progressRef} sx={{ display: "block", width: "100%", height: { xs: 120, sm: "auto" } }} />
          </VizPanel>
          <VizPanel title="勘定科目別" subtitle="予算と支払の比較">
            <Box component="svg" ref={subjectsRef} sx={{ display: "block", width: "100%", height: { xs: 220, sm: "auto" } }} />
          </VizPanel>
          <VizPanel title="時期ずれ" subtitle="支払日と費用開始日の差">
            <Box component="svg" ref={timingsRef} sx={{ display: "block", width: "100%", height: { xs: 220, sm: "auto" } }} />
          </VizPanel>
          <VizPanel title="年度別 発生費用" subtitle={`${fiscalYear}年度 / 次年度以降`}>
            <Box component="svg" ref={expensesRef} sx={{ display: "block", width: "100%", height: { xs: 220, sm: "auto" } }} />
          </VizPanel>
        </Box>
      );
    }

    function Dashboard({ data, totals, setting }) {
      const [scope, setScope] = useState("all");
      const [planId, setPlanId] = useState(data.plans[0]?.id || "");

      const accountOptions = useMemo(() => {
        return Array.from(new Set([
          ...(setting.options.accountSubjects || []).filter(Boolean),
          ...activeRows(data.budgets).map(row => row.accountSubject).filter(Boolean),
          ...activeRows(data.payments).map(row => row.accountSubject).filter(Boolean)
        ]));
      }, [data.budgets, data.payments, setting.options.accountSubjects]);

      const [accountSubject, setAccountSubject] = useState(accountOptions[0] || "");

      useEffect(() => {
        if (!data.plans.some(plan => plan.id === planId)) {
          setPlanId(data.plans[0]?.id || "");
        }
      }, [data.plans, planId]);

      useEffect(() => {
        if (!accountOptions.length) {
          setAccountSubject("");
          return;
        }
        if (!accountSubject || !accountOptions.includes(accountSubject)) {
          setAccountSubject(accountOptions[0]);
        }
      }, [accountOptions, accountSubject]);

      const budgetByNo = Object.fromEntries(activeRows(data.budgets).map(row => [String(row.no), row]));
      const scopedBudgets = activeRows(data.budgets).filter(row => {
        if (scope === "plan") return row.planId === planId;
        if (scope === "account") return row.accountSubject === accountSubject;
        return true;
      });
      const scopedBudgetNos = new Set(scopedBudgets.map(row => String(row.no)));
      const scopedPayments = activeRows(data.payments).filter(row => {
        if (scope === "plan") return scopedBudgetNos.has(String(row.budgetId));
        if (scope === "account") return row.accountSubject === accountSubject;
        return true;
      });

      const scopedTotals = calcTotals({ budgets: scopedBudgets, payments: scopedPayments });
      const balanceColor = scopedTotals.balance < 0 ? "error.main" : scopedTotals.balance === 0 ? "success.main" : "text.primary";
      const currentFiscalYear = getFiscalYear(new Date());

      const subjectMap = scopedBudgets.reduce((acc, row) => {
        const key = row.accountSubject || "未設定";
        acc[key] ||= { budget: 0, base: 0, taxIncluded: 0 };
        acc[key].budget += toNumber(row.amount) + Math.round(toNumber(row.amount) * toNumber(row.taxRate) / 100);
        return acc;
      }, {});

      scopedPayments.forEach(row => {
        const key = row.accountSubject || "未設定";
        subjectMap[key] ||= { budget: 0, base: 0, taxIncluded: 0 };
        subjectMap[key].base += toNumber(row.baseAmount);
        subjectMap[key].taxIncluded += toNumber(row.amount);
      });

      const subjectRows = Object.entries(subjectMap)
        .map(([subject, row]) => ({ subject, ...row, progress: row.budget > 0 ? Math.min(100, row.taxIncluded / row.budget * 100) : 0 }))
        .sort((a, b) => b.taxIncluded - a.taxIncluded)
        .slice(0, 6);

      const timingRows = scopedPayments
        .filter(row => row.paymentDate && getExpenseStartDate(row))
        .map(row => {
          const startDate = getExpenseStartDate(row);
          return {
            ...row,
            diffDays: Math.round((startDate - new Date(row.paymentDate)) / 86400000),
            budgetName: budgetByNo[String(row.budgetId)]?.name || "",
            timingStartDate: startDate.toISOString().slice(0, 10)
          };
        })
        .filter(row => Math.abs(row.diffDays) >= 1)
        .sort((a, b) => Math.abs(b.diffDays) - Math.abs(a.diffDays))
        .slice(0, 6);

      const expenseRows = scopedPayments
        .map(row => ({
          ...row,
          thisYear: calcFiscalExpense(row, currentFiscalYear),
          nextYears: calcFiscalExpense(row, currentFiscalYear + 1) + calcFiscalExpense(row, currentFiscalYear + 2),
          startDate: getExpenseStartDate(row)
        }))
        .filter(row => row.thisYear > 0 || row.nextYears > 0)
        .sort((a, b) => b.thisYear + b.nextYears - (a.thisYear + a.nextYears))
        .slice(0, 6);

      return (
        <Stack spacing={1.25} sx={{ minWidth: 0 }}>
          <Stack
            direction={{ xs: "column", md: "row" }}
            spacing={1}
            alignItems={{ xs: "stretch", md: "center" }}
            justifyContent="space-between"
            sx={{ minWidth: 0 }}
          >
            <Box sx={{ minWidth: 0 }}>
              <Typography variant="h5" sx={{ fontWeight: 800, lineHeight: 1.2, fontSize: { xs: 22, md: 26 } }}>
                ダッシュボード
              </Typography>
              <Typography variant="body2" color="text.secondary" noWrap>
                {data.project.name || "-"}
              </Typography>
            </Box>
            <Stack direction="row" spacing={1} flexWrap={{ xs: "wrap", lg: "nowrap" }} useFlexGap justifyContent={{ xs: "flex-start", md: "flex-end" }}>
              <FormControl size="small" sx={{ minWidth: 132 }}>
                <InputLabel>集計単位</InputLabel>
                <Select label="集計単位" value={scope} onChange={e => setScope(e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>
                  <MenuItem value="all">全体</MenuItem>
                  <MenuItem value="plan">企画書単位</MenuItem>
                  <MenuItem value="account">勘定科目単位</MenuItem>
                </Select>
              </FormControl>
              {scope === "plan" && (
                <FormControl size="small" sx={{ minWidth: 220, maxWidth: 320 }}>
                  <InputLabel>企画書</InputLabel>
                  <Select label="企画書" value={planId} onChange={e => setPlanId(e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>
                    {data.plans.map(plan => <MenuItem key={plan.id} value={plan.id}>{plan.name}</MenuItem>)}
                  </Select>
                </FormControl>
              )}
              {scope === "account" && (
                <FormControl size="small" sx={{ minWidth: 180 }}>
                  <InputLabel>勘定科目</InputLabel>
                  <Select label="勘定科目" value={accountSubject} onChange={e => setAccountSubject(e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>
                    {accountOptions.map(item => <MenuItem key={item} value={item}>{item}</MenuItem>)}
                  </Select>
                </FormControl>
              )}
              <Chip size="small" label={`進捗 ${scopedTotals.progress.toFixed(1)}%`} color={scopedTotals.balance < 0 ? "error" : "primary"} />
            </Stack>
          </Stack>

          <Alert severity={scopedTotals.balance < 0 ? "error" : scopedTotals.balance === 0 ? "success" : "info"} sx={{ py: 0.5 }}>
            {scopedTotals.budgetTotal === 0 ? "予算が未入力です。" : scopedTotals.balance < 0 ? "支払い累計が予算総額を超過しています。" : scopedTotals.balance === 0 ? "予算総額と累計支払額が一致しています。" : "未払い残高があります。"}
          </Alert>

          <TableSummaryGrid>
            <SummaryCard label="予算総額" value={yen(scopedTotals.budgetTotal)} />
            <SummaryCard label="支払済" value={yen(scopedTotals.paidTotal)} />
            <SummaryCard label="残高" value={yen(scopedTotals.balance)} color={balanceColor} />
            <SummaryCard label="予算本体" value={yen(scopedTotals.budgetBase)} />
            <SummaryCard label="消費税" value={yen(scopedTotals.budgetTax)} />
            <SummaryCard label="支払件数" value={`${scopedPayments.length}件`} />
          </TableSummaryGrid>

          <D3DashboardViz
            totals={scopedTotals}
            subjects={subjectRows}
            timings={timingRows}
            expenses={expenseRows}
            fiscalYear={currentFiscalYear}
            balanceColor={balanceColor}
          />
        </Stack>
      );
    }

    function PlanPage({ data, setting, updateProject, updatePlan, addPlan, deletePlan, restorePlan, updatePlanSettlement, addPlanSettlement, deletePlanSettlement }) {
      const [query, setQuery] = useState("");
      const [searchText, setSearchText] = useState("");
      const [viewMode, setViewMode] = useState("cards");
      const [page, setPage] = useState(0);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const [editIndex, setEditIndex] = useState(null);
      const [sortConfig, setSortConfig] = useState({ key: "id", direction: "asc" });
      const [columnWidths, setColumnWidths] = useState({
        id: 120,
        name: 220,
        decisionDate: 130,
        total: 125,
        thisYear: 125,
        future: 135,
        oneTime: 115,
        recurring: 115,
        depreciation: 115,
        subjects: 160,
        summaries: 520,
        content: 220,
        notes: 220,
        actions: 80
      });
      const onSort = createSortHandler(sortConfig, setSortConfig);
      const onWidthChange = (id, width) => setColumnWidths(prev => ({ ...prev, [id]: width }));
      const filteredPlans = data.plans
        .map((plan, index) => ({ plan, index }))
        .filter(({ plan }) => !query || [
          plan.id,
          plan.name,
          plan.decisionDate,
          plan.burdenDepartment,
          plan.content,
          plan.notes,
          rowStatusLabel(plan),
          ...(plan.settlementSummaries || []).flatMap(row => [row.accountSubject, row.amount, row.paymentDate, row.recognitionDate, row.usageStartDate, row.depreciationStartDate, row.expensePattern, row.costType, row.expenseStartMode, row.costPeriod, row.recurringCycle, row.memo])
        ].join(" ").toLowerCase().includes(query.toLowerCase()));
      const sortedPlans = sortIndexedRows(filteredPlans, sortConfig, ({ plan }, key) => {
        const summary = calcPlanSettlementSummary(plan);
        if (key === "summaries" || key === "total") return summary.total;
        if (key === "thisYear") return summary.thisYear;
        if (key === "future") return summary.future;
        if (key === "oneTime") return summary.oneTime;
        if (key === "recurring") return summary.recurring;
        if (key === "depreciation") return summary.depreciation;
        if (key === "subjects") return summary.subjects;
        return plan[key] || "";
      });
      const visiblePlans = rowsPerPage === -1 ? sortedPlans : sortedPlans.slice(page * rowsPerPage, page * rowsPerPage + rowsPerPage);
      const settlementTotal = activeRows(data.plans).reduce((sum, plan) => sum + activeRows(plan.settlementSummaries || []).reduce((s, row) => s + toNumber(row.amount), 0), 0);
      const linkedBudgetTotal = activeRows(data.budgets).reduce((sum, row) => sum + toNumber(row.amount) + Math.round(toNumber(row.amount) * toNumber(row.taxRate) / 100), 0);
      const planExpenseSummary = calcExpenseSummary(activeRows(data.plans).flatMap(plan => activeRows(plan.settlementSummaries || [])));
      const editPlan = editIndex === null ? null : data.plans[editIndex];

      useEffect(() => { setPage(0); }, [query, sortConfig, viewMode]);

      function handleExportTemplateCsv() {
        exportCsvTemplateFile("plan-import-template.csv", PLAN_CSV_COLUMNS, "utf-8");
      }

      return (
        <Stack spacing={1.5}>
          <PageHeader
            title="企画一覧"
            subtitle="案件基本情報と、案件に紐づく複数の企画書をテーブルで管理します。"
            chips={[<Chip key="view" size="small" label="カード初期表示" />]}
          />

          <SectionCard title="案件基本情報" subtitle="案件全体に共通する情報です。">
            <Grid container spacing={2}>
              <Grid item xs={12} md={6}>
                <TextField label="案件名" fullWidth size="small" value={data.project.name} onChange={e => updateProject("name", e.target.value)} />
              </Grid>
              <Grid item xs={12} md={3}>
                <TextField label="意思決定日" type="date" fullWidth size="small" InputLabelProps={{ shrink: true }} value={data.project.decisionDate} onChange={e => updateProject("decisionDate", e.target.value)} />
              </Grid>
              <Grid item xs={12} md={3}>
                <TextField label="負担部署" fullWidth size="small" value={data.project.burdenDepartment || ""} onChange={e => updateProject("burdenDepartment", e.target.value)} />
              </Grid>
              <Grid item xs={12}>
                <TextField label="内容" fullWidth size="small" multiline minRows={3} value={data.project.content} onChange={e => updateProject("content", e.target.value)} />
              </Grid>
              <Grid item xs={12}>
                <TextField label="注意事項" fullWidth size="small" multiline minRows={3} value={data.project.notes} onChange={e => updateProject("notes", e.target.value)} />
              </Grid>
            </Grid>
          </SectionCard>

          <Box sx={{ mt: -0.5 }}>
            <Typography variant="caption" color="text.secondary" sx={{ display: "block", mb: 0.5, fontWeight: 700 }}>企画サマリー：企画書と決済概要の全体感です。</Typography>
            <TableSummaryGrid>
              <SummaryCard label="有効企画書数" value={`${activeRows(data.plans).length}件`} />
              <SummaryCard label="表示中" value={`${filteredPlans.length}件`} />
              <SummaryCard label="決済概要合計" value={yen(settlementTotal)} />
              <SummaryCard label="紐づく予算総額" value={yen(linkedBudgetTotal)} />
              <SummaryCard label="今年度発生費用" value={yen(planExpenseSummary.thisYear)} />
              <SummaryCard label="来年度以降発生費用" value={yen(planExpenseSummary.future)} />
              <SummaryCard label="1回だけの費用" value={yen(planExpenseSummary.oneTime)} />
              <SummaryCard label="継続する費用" value={yen(planExpenseSummary.recurring)} />
              <SummaryCard label="償却する費用" value={yen(planExpenseSummary.depreciation)} />
            </TableSummaryGrid>
          </Box>

          <ExpandablePane
            title="企画書"
            subtitle="列見出しで並び替え、列境界のハンドルで幅を調整できます。"
            actions={[
              <ListViewToggle key="view" value={viewMode} onChange={setViewMode} />,
              <Button key="template" size="small" variant="outlined" startIcon={<span className="material-icons">description</span>} onClick={handleExportTemplateCsv}>CSVテンプレート</Button>,
              <Button key="add" size="small" variant="contained" onClick={addPlan}>企画書を追加</Button>
            ]}
          >
            <TextField
              size="small"
              fullWidth
              label="企画検索"
              placeholder="企画書ID、企画書名、勘定科目、支払日、計上日など"
              value={searchText}
              onChange={e => setSearchText(e.target.value)}
              onBlur={() => setQuery(searchText)}
              onKeyDown={e => { if (e.key === "Enter") setQuery(searchText); }}
              sx={{ mb: 2 }}
            />

            {viewMode === "cards" ? (
              <CardGrid>
                {visiblePlans.map(({ plan, index }) => { const planSummary = calcPlanSettlementSummary(plan); return (
                  <Card key={plan.id || index} variant="outlined" sx={{ minWidth: 0, opacity: isRowActive(plan) ? 1 : 0.55 }}>
                    <CardContent>
                      <Stack spacing={1.25}>
                        <Stack direction="row" justifyContent="space-between" spacing={1} alignItems="flex-start">
                          <Box sx={{ minWidth: 0, flex: 1 }}>
                            <Typography variant="subtitle1" sx={{ fontWeight: 800 }} noWrap>{plan.name || "-"}</Typography>
                            <Stack direction="row" spacing={0.75} flexWrap="wrap" useFlexGap>
                              <Chip size="small" color={isRowEnabled(plan) ? "success" : "default"} label={rowStatusLabel(plan)} />
                              {isRowDeleted(plan) && <Chip size="small" color="error" label={rowDeleteStatusLabel(plan)} />}
                            <Typography variant="caption" color="text.secondary">ID {plan.id || "-"} / 意思決定日 {plan.decisionDate || "-"} / 負担部署 {plan.burdenDepartment || "-"}</Typography>
                            </Stack>
                          </Box>
                          <Stack direction="row" spacing={0.5}>
                            <Tooltip title="編集"><IconButton size="small" onClick={() => setEditIndex(index)}><span className="material-icons" style={{ fontSize: 18 }}>edit</span></IconButton></Tooltip>
                            {isRowDeleted(plan) && <Tooltip title="削除取消"><IconButton size="small" color="success" onClick={() => restorePlan(index)}><span className="material-icons" style={{ fontSize: 18 }}>restore</span></IconButton></Tooltip>}
                            <Tooltip title={isRowDeleted(plan) ? "物理削除" : "論理削除"}><span><IconButton size="small" color="error" disabled={activeRows(data.plans).length <= 1 && !isRowDeleted(plan)} onClick={() => deletePlan(index)}><span className="material-icons" style={{ fontSize: 18 }}>delete</span></IconButton></span></Tooltip>
                          </Stack>
                        </Stack>
                        <TableSummaryGrid>
                          <SummaryCard label="概算総額" value={yen(planSummary.total)} />
                          <SummaryCard label="今年度" value={yen(planSummary.thisYear)} />
                          <SummaryCard label="来年度以降" value={yen(planSummary.future)} />
                        </TableSummaryGrid>
                        <DetailLine label="主要勘定科目" value={planSummary.subjects || "-"} />
                        <Typography variant="body2" color="text.secondary" sx={{ display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{plan.content || "内容未入力"}</Typography>
                        <Stack spacing={0.75}>
                          {(plan.settlementSummaries || []).slice(0, 3).map((summary, summaryIndex) => (
                            <Stack key={summaryIndex} direction="row" spacing={0.75} alignItems="center" flexWrap="wrap" useFlexGap>
                              <Chip size="small" label={summary.accountSubject || "未設定"} />
                              <Typography variant="caption">{yen(summary.amount)}</Typography>
                              <Typography variant="caption" color="text.secondary">支払日 {summary.paymentDate || "-"} / 計上日 {summary.recognitionDate || "-"}</Typography>
                            </Stack>
                          ))}
                          <Button size="small" variant="outlined" onClick={() => setEditIndex(index)}>編集</Button>
                        </Stack>
                      </Stack>
                    </CardContent>
                  </Card>
                ); })}
              </CardGrid>
            ) : (
            <TableContainer component={Paper} variant="outlined" sx={{ width: "100%", overflowX: "auto" }}>
              <Table size="small" stickyHeader className="dense-resizable-table">
                <TableHead>
                  <TableRow>
                    <ResizableHeaderCell id="id" label="企画書ID" width={columnWidths.id} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="name" label="企画書名" width={columnWidths.name} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="decisionDate" label="意思決定日" width={columnWidths.decisionDate} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="total" label="概算総額" align="right" width={columnWidths.total} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="thisYear" label="今年度費用" align="right" width={columnWidths.thisYear} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="future" label="来年度以降" align="right" width={columnWidths.future} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="oneTime" label="1回費用" align="right" width={columnWidths.oneTime} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="recurring" label="継続費用" align="right" width={columnWidths.recurring} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="depreciation" label="償却費用" align="right" width={columnWidths.depreciation} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="subjects" label="主要勘定科目" width={columnWidths.subjects} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="summaries" label="決済概要" width={columnWidths.summaries} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="content" label="内容" width={columnWidths.content} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="notes" label="注意事項" width={columnWidths.notes} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />
                    <ResizableHeaderCell id="actions" label="操作" width={columnWidths.actions} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} className="no-print" />
                  </TableRow>
                </TableHead>
                <TableBody>
                  {visiblePlans.map(({ plan, index }) => { const planSummary = calcPlanSettlementSummary(plan); return (
                    <TableRow key={plan.id || index} hover>
                      <TableCell sx={{ width: columnWidths.id }}><TextField variant="standard" value={plan.id} onChange={e => updatePlan(index, "id", e.target.value)} sx={{ width: "100%" }} /></TableCell>
                      <TableCell sx={{ width: columnWidths.name }}><TextField variant="standard" value={plan.name} onChange={e => updatePlan(index, "name", e.target.value)} sx={{ width: "100%" }} /></TableCell>
                      <TableCell sx={{ width: columnWidths.decisionDate }}><TextField variant="standard" type="date" value={plan.decisionDate} onChange={e => updatePlan(index, "decisionDate", e.target.value)} sx={{ width: "100%" }} /></TableCell>
                      <TooltipTableCell align="right" sx={{ width: columnWidths.total }} title={yen(planSummary.total)}>{yen(planSummary.total)}</TooltipTableCell>
                      <TooltipTableCell align="right" sx={{ width: columnWidths.thisYear }} title={yen(planSummary.thisYear)}>{yen(planSummary.thisYear)}</TooltipTableCell>
                      <TooltipTableCell align="right" sx={{ width: columnWidths.future }} title={yen(planSummary.future)}>{yen(planSummary.future)}</TooltipTableCell>
                      <TooltipTableCell align="right" sx={{ width: columnWidths.oneTime }} title={yen(planSummary.oneTime)}>{yen(planSummary.oneTime)}</TooltipTableCell>
                      <TooltipTableCell align="right" sx={{ width: columnWidths.recurring }} title={yen(planSummary.recurring)}>{yen(planSummary.recurring)}</TooltipTableCell>
                      <TooltipTableCell align="right" sx={{ width: columnWidths.depreciation }} title={yen(planSummary.depreciation)}>{yen(planSummary.depreciation)}</TooltipTableCell>
                      <TooltipTableCell sx={{ width: columnWidths.subjects }} title={planSummary.subjects}>{planSummary.subjects}</TooltipTableCell>
                      <TableCell sx={{ width: columnWidths.summaries }}>
                        <Stack spacing={0.75}>
                          {(plan.settlementSummaries || []).map((summary, summaryIndex) => (
                            <Stack key={summaryIndex} direction="row" spacing={0.75} alignItems="center">
                              <Select variant="standard" value={summary.accountSubject} onChange={e => updatePlanSettlement(index, summaryIndex, "accountSubject", e.target.value)} sx={{ width: 120 }} MenuProps={DROPDOWN_MENU_PROPS}>
                                {setting.options.accountSubjects.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}
                              </Select>
                              <NumericTextField variant="standard" value={summary.amount} onCommit={value => updatePlanSettlement(index, summaryIndex, "amount", value)} sx={{ width: 100 }} />
                              <TextField variant="standard" type="date" value={summary.paymentDate} onChange={e => updatePlanSettlement(index, summaryIndex, "paymentDate", e.target.value)} sx={{ width: 120 }} />
                              <TextField variant="standard" type="date" value={summary.depreciationStartDate} onChange={e => updatePlanSettlement(index, summaryIndex, "depreciationStartDate", e.target.value)} sx={{ width: 120 }} />
                              <ConditionSummaryChip row={summary} />
                              <IconButton size="small" color="error" onClick={() => deletePlanSettlement(index, summaryIndex)}><span className="material-icons" style={{ fontSize: 16 }}>close</span></IconButton>
                            </Stack>
                          ))}
                          <Button size="small" variant="outlined" onClick={() => addPlanSettlement(index)}>概要行を追加</Button>
                        </Stack>
                      </TableCell>
                      <TableCell sx={{ width: columnWidths.content }}><Tooltip title={plan.content || ""} arrow><TextField variant="standard" value={plan.content} onChange={e => updatePlan(index, "content", e.target.value)} sx={{ width: "100%" }} /></Tooltip></TableCell>
                      <TableCell sx={{ width: columnWidths.notes }}><Tooltip title={plan.notes || ""} arrow><TextField variant="standard" value={plan.notes} onChange={e => updatePlan(index, "notes", e.target.value)} sx={{ width: "100%" }} /></Tooltip></TableCell>
                      <TableCell className="no-print" sx={{ width: columnWidths.actions }}>
                        <Stack direction="row" spacing={0.25}>
                          {isRowDeleted(plan) && <Tooltip title="削除取消"><IconButton size="small" color="success" onClick={() => restorePlan(index)}><span className="material-icons" style={{ fontSize: 18 }}>restore</span></IconButton></Tooltip>}
                          <Tooltip title={isRowDeleted(plan) ? "物理削除" : "論理削除"}><span><IconButton size="small" color="error" disabled={activeRows(data.plans).length <= 1 && !isRowDeleted(plan)} onClick={() => deletePlan(index)}><span className="material-icons" style={{ fontSize: 18 }}>delete</span></IconButton></span></Tooltip>
                        </Stack>
                      </TableCell>
                    </TableRow>
                  ); })}
                </TableBody>
              </Table>
            </TableContainer>
            )}
            <TablePagination component="div" count={filteredPlans.length} page={page} onPageChange={(_, nextPage) => setPage(nextPage)} rowsPerPage={rowsPerPage} onRowsPerPageChange={e => { setRowsPerPage(parseInt(e.target.value, 10)); setPage(0); }} rowsPerPageOptions={[10, 25, 50, { label: "全て", value: -1 }]} labelRowsPerPage="表示件数:" />
          </ExpandablePane>
          <ListItemEditDrawer open={editIndex !== null} title="企画書を編集" subtitle="カードでは参照し、詳細項目はここで編集します。" onClose={() => setEditIndex(null)}>
            {editPlan && (
              <>
                <Grid container spacing={1.5}>
                  <Grid item xs={12}><FormControlLabel control={<Switch checked={isRowEnabled(editPlan)} onChange={e => updatePlan(editIndex, "isActive", e.target.checked)} />} label={isRowEnabled(editPlan) ? "有効" : "無効"} /></Grid>
                  <Grid item xs={12} sm={5}><TextField label="企画書ID" fullWidth size="small" value={editPlan.id} onChange={e => updatePlan(editIndex, "id", e.target.value)} /></Grid>
                  <Grid item xs={12} sm={7}><TextField label="企画書名" fullWidth size="small" value={editPlan.name} onChange={e => updatePlan(editIndex, "name", e.target.value)} /></Grid>
                  <Grid item xs={12} sm={6}><TextField label="意思決定日" type="date" fullWidth size="small" InputLabelProps={{ shrink: true }} value={editPlan.decisionDate} onChange={e => updatePlan(editIndex, "decisionDate", e.target.value)} /></Grid>
                  <Grid item xs={12} sm={6}><TextField label="負担部署" fullWidth size="small" value={editPlan.burdenDepartment || ""} onChange={e => updatePlan(editIndex, "burdenDepartment", e.target.value)} /></Grid>
                  <Grid item xs={12}><TextField label="内容" fullWidth size="small" multiline minRows={3} value={editPlan.content} onChange={e => updatePlan(editIndex, "content", e.target.value)} /></Grid>
                  <Grid item xs={12}><TextField label="注意事項" fullWidth size="small" multiline minRows={3} value={editPlan.notes} onChange={e => updatePlan(editIndex, "notes", e.target.value)} /></Grid>
                </Grid>
                <Divider />
                <Stack spacing={1}>
                  <Typography variant="subtitle2" sx={{ fontWeight: 800 }}>決済概要</Typography>
                  {(editPlan.settlementSummaries || []).map((summary, summaryIndex) => (
                    <Paper key={summaryIndex} variant="outlined" sx={{ p: 1 }}>
                      <Grid container spacing={1}>
                        <Grid item xs={12} sm={6}><FormControl size="small" fullWidth><InputLabel>勘定科目</InputLabel><Select label="勘定科目" value={summary.accountSubject} onChange={e => updatePlanSettlement(editIndex, summaryIndex, "accountSubject", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.accountSubjects.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></FormControl></Grid>
                        <Grid item xs={12} sm={6}><TextField label="負担部署" fullWidth size="small" value={summary.burdenDepartment || ""} onChange={e => updatePlanSettlement(editIndex, summaryIndex, "burdenDepartment", e.target.value)} /></Grid>
                        <Grid item xs={12} sm={6}><NumericTextField label="決済金額" value={summary.amount} onCommit={value => updatePlanSettlement(editIndex, summaryIndex, "amount", value)} /></Grid>
                        <Grid item xs={12} sm={4}><TextField label="支払日" type="date" fullWidth size="small" InputLabelProps={{ shrink: true }} value={summary.paymentDate} onChange={e => updatePlanSettlement(editIndex, summaryIndex, "paymentDate", e.target.value)} /></Grid>
                        <Grid item xs={12} sm={4}><TextField label="計上日" type="date" fullWidth size="small" InputLabelProps={{ shrink: true }} value={summary.recognitionDate || ""} onChange={e => updatePlanSettlement(editIndex, summaryIndex, "recognitionDate", e.target.value)} /></Grid>
                        <Grid item xs={12} sm={4}><TextField label="償却開始日" type="date" fullWidth size="small" InputLabelProps={{ shrink: true }} value={summary.depreciationStartDate} onChange={e => updatePlanSettlement(editIndex, summaryIndex, "depreciationStartDate", e.target.value)} /></Grid>
                        <Grid item xs={12} sm={6}><FormControl size="small" fullWidth><InputLabel>費用種別</InputLabel><Select label="費用種別" value={summary.costType || ""} onChange={e => updatePlanSettlement(editIndex, summaryIndex, "costType", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.costTypes.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></FormControl></Grid>
                        <Grid item xs={12} sm={6}><FormControl size="small" fullWidth><InputLabel>費用発生区分</InputLabel><Select label="費用発生区分" value={summary.expensePattern || inferExpensePattern(summary)} onChange={e => updatePlanSettlement(editIndex, summaryIndex, "expensePattern", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{(setting.options.expensePatterns || DEFAULT_SETTING.options.expensePatterns).map(item => <MenuItem key={item.value} value={item.value}>{item.label}</MenuItem>)}</Select></FormControl></Grid>
                        <Grid item xs={12} sm={6}><NumericTextField label="償却月数" value={summary.depreciationMonths || 0} onCommit={value => updatePlanSettlement(editIndex, summaryIndex, "depreciationMonths", value)} /></Grid>
                        <Grid item xs={12} sm={6}><FormControl size="small" fullWidth><InputLabel>費用計上基準日</InputLabel><Select label="費用計上基準日" value={normalizeExpenseStartMode(summary.expenseStartMode)} onChange={e => updatePlanSettlement(editIndex, summaryIndex, "expenseStartMode", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.expenseStartModes.map(item => <MenuItem key={item} value={item}>{expenseStartModeLabel(item)}</MenuItem>)}</Select></FormControl></Grid>
                        <Grid item xs={12}><TextField label="メモ" fullWidth size="small" value={summary.memo} onChange={e => updatePlanSettlement(editIndex, summaryIndex, "memo", e.target.value)} /></Grid>
                      </Grid>
                      <Stack direction="row" justifyContent="flex-end" sx={{ mt: 1 }}>
                        <Button size="small" color="error" onClick={() => deletePlanSettlement(editIndex, summaryIndex)}>概要行を削除</Button>
                      </Stack>
                    </Paper>
                  ))}
                  <Button size="small" variant="outlined" onClick={() => addPlanSettlement(editIndex)}>概要行を追加</Button>
                </Stack>
              </>
            )}
          </ListItemEditDrawer>
        </Stack>
      );
    }


    function BudgetPage({
      data,
      setting,
      updateBudget,
      addBudget,
      deleteBudget,
      restoreBudget,
      deleteSelectedBudgets,
      updateSelectedBudgets,
      renumberBudgets,
      clearEmptyBudgets,
      appendBudgetRows,
      showModal

      const [selected, setSelected] = useState([]);

      const [columnWidths, setColumnWidths] = useState({ select: 46, no: 64, planId: 150, name: 170, category: 110, accountSubject: 130, amount: 120, taxRate: 70, total: 120, expensePattern: 130, thisYearExpense: 125, futureExpense: 135, oneTimeExpense: 115, recurringExpense: 115, depreciationExpense: 115, paymentCount: 90, condition: 230, memo: 160, actions: 90 });
      const csvImportRef = useRef(null);
      const onSort = createSortHandler(sortConfig, setSortConfig);
      const onWidthChange = (id, width) => setColumnWidths(prev => ({ ...prev, [id]: width }));
      const filteredBudgets = data.budgets
        .map((row, index) => ({ row, index }))
        .filter(({ row }) => {
          if (!query) return true;
          const plan = data.plans.find(item => item.id === row.planId);
          return [row.no, rowStatusLabel(row), row.planId, plan?.name, row.name, row.category, row.accountSubject, row.burdenDepartment, row.amount, row.taxRate, row.recognitionDate, row.expensePattern, row.costType, row.expenseStartMode, row.costPeriod, row.recurringCycle, row.memo].join(" ").toLowerCase().includes(query.toLowerCase());
        });
      const sortedBudgets = sortIndexedRows(filteredBudgets, sortConfig, ({ row }, key) => {
        const tax = Math.round(toNumber(row.amount) * toNumber(row.taxRate) / 100);
        const total = toNumber(row.amount) + tax;
        const summary = calcBudgetDetailSummary(row, data.payments);
        if (key === "total") return total;
        if (key === "thisYearExpense") return summary.thisYearExpense;
        if (key === "futureExpense") return summary.futureExpense;
        if (key === "oneTimeExpense") return summary.oneTimeExpense;
        if (key === "recurringExpense") return summary.recurringExpense;
        if (key === "depreciationExpense") return summary.depreciationExpense;
        if (key === "paymentCount") return summary.paymentCount;
        if (key === "condition") return conditionSummary(row);
        return row[key] ?? "";
      });
      const visibleBudgets = rowsPerPage === -1 ? sortedBudgets : sortedBudgets.slice(page * rowsPerPage, page * rowsPerPage + rowsPerPage);
      const allSelected = visibleBudgets.length > 0 && visibleBudgets.every(item => selected.includes(item.index));
      const partiallySelected = visibleBudgets.some(item => selected.includes(item.index)) && !allSelected;
      const activeFilteredBudgets = filteredBudgets.filter(item => isRowActive(item.row));
      const budgetBaseTotal = activeFilteredBudgets.reduce((sum, item) => sum + toNumber(item.row.amount), 0);
      const budgetTaxTotal = activeFilteredBudgets.reduce((sum, item) => sum + Math.round(toNumber(item.row.amount) * toNumber(item.row.taxRate) / 100), 0);
      const planCount = new Set(activeFilteredBudgets.map(item => item.row.planId).filter(Boolean)).size;
      const filteredBudgetNos = new Set(activeFilteredBudgets.map(item => String(item.row.no)));
      const relatedPayments = activeRows(data.payments).filter(row => filteredBudgetNos.has(String(row.budgetId)));
      const budgetExpenseSummary = calcExpenseSummary(relatedPayments);

      useEffect(() => { setPage(0); }, [query, sortConfig, viewMode]);

      function toggleAll(checked) {
        const visibleIndexes = visibleBudgets.map(item => item.index);
        setSelected(prev => checked ? [...new Set([...prev, ...visibleIndexes])] : prev.filter(index => !visibleIndexes.includes(index)));
      }
      function toggleOne(index, checked) { setSelected(prev => checked ? [...new Set([...prev, index])] : prev.filter(i => i !== index)); }
      function handleDeleteSelected() { deleteSelectedBudgets(selected); setSelected([]); }
      function handleBulkTax() { updateSelectedBudgets(selected, { taxRate: toNumber(bulkTaxRate) }); }
      function handleBulkCategory() { updateSelectedBudgets(selected, { category: bulkCategory }); }
      function handleExportCsv() {
        try { exportCsvFile("budget-list_" + new Date().toISOString().slice(0, 10) + ".csv", BUDGET_CSV_COLUMNS, filteredBudgets.map(item => item.row), csvEncoding); }
        catch (error) { showModal("CSVエクスポート失敗", error.message, "warning"); }
      }
      function handleExportTemplateCsv() {
        try { exportCsvTemplateFile("budget-import-template.csv", BUDGET_CSV_COLUMNS, csvEncoding); }
        catch (error) { showModal("CSVテンプレート出力失敗", error.message, "warning"); }
      }
      async function handleImportCsv(file) {
        if (!file) return;
        try {
          const text = await readTextFile(file, csvEncoding);
          const rows = normalizeBudgetRows(csvTextToObjects(text, BUDGET_CSV_COLUMNS), setting.defaults.budgetTaxRate, data.plans).filter(row => row.name || row.category || row.accountSubject || row.burdenDepartment || row.amount || row.memo);
          appendBudgetRows(rows);
        } catch (error) { showModal("CSVインポート失敗", error.message, "error"); }
        finally { if (csvImportRef.current) csvImportRef.current.value = ""; }
      }

      const editBudget = editBudgetIndex === null ? null : data.budgets[editBudgetIndex];

      return (

          <Box sx={{ mt: -0.5 }}>

            <TableSummaryGrid>
              <SummaryCard label="有効表示件数" value={`${activeFilteredBudgets.length}件`} />
              <SummaryCard label="対象企画数" value={`${planCount}件`} />
              <SummaryCard label="本体金額合計" value={yen(budgetBaseTotal)} />
              <SummaryCard label="税込予算合計" value={yen(budgetBaseTotal + budgetTaxTotal)} />
              <SummaryCard label="今年度発生費用" value={yen(budgetExpenseSummary.thisYear)} />
              <SummaryCard label="来年度以降発生費用" value={yen(budgetExpenseSummary.future)} />
              <SummaryCard label="1回だけの費用" value={yen(budgetExpenseSummary.oneTime)} />
              <SummaryCard label="継続する費用" value={yen(budgetExpenseSummary.recurring)} />
              <SummaryCard label="償却する費用" value={yen(budgetExpenseSummary.depreciation)} />
            </TableSummaryGrid>

              <FormControl size="small" sx={{ minWidth: 130 }}><InputLabel>区分一括</InputLabel><Select label="区分一括" value={bulkCategory} onChange={e => setBulkCategory(e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.budgetCategories.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></FormControl>

            <Stack direction="row" spacing={1} sx={{ ...TOOLBAR_STACK_SX, mb: 2 }} alignItems="center">
              <FormControl size="small" sx={{ minWidth: 150 }}><InputLabel>CSV文字コード</InputLabel><Select label="CSV文字コード" value={csvEncoding} onChange={e => setCsvEncoding(e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}><MenuItem value="utf-8">UTF-8</MenuItem><MenuItem value="shift_jis">JIS(Shift_JIS)</MenuItem></Select></FormControl>
              <Button size="small" variant="outlined" startIcon={<span className="material-icons">download</span>} onClick={handleExportCsv}>CSVエクスポート</Button>
              <Button size="small" variant="outlined" startIcon={<span className="material-icons">description</span>} onClick={handleExportTemplateCsv}>CSVテンプレート</Button>

            {viewMode === "cards" ? (
              <CardGrid>
                {visibleBudgets.map(({ row, index }) => { const tax = Math.round(toNumber(row.amount) * toNumber(row.taxRate) / 100); const total = toNumber(row.amount) + tax; const summary = calcBudgetDetailSummary(row, data.payments); const checked = selected.includes(index); return (

                            <Tooltip title={isRowDeleted(row) ? "物理削除" : "論理削除"}><IconButton size="small" color="error" onClick={() => deleteBudget(index)}><span className="material-icons" style={{ fontSize: 18 }}>delete</span></IconButton></Tooltip>
                          </Stack>
                        </Stack>
                        <Box sx={{ minWidth: 0 }}>

                        <TableSummaryGrid>
                          <SummaryCard label="税込金額" value={yen(total)} />
                          <SummaryCard label="今年度" value={yen(summary.thisYearExpense)} />
                          <SummaryCard label="来年度以降" value={yen(summary.futureExpense)} />
                        </TableSummaryGrid>
                        <DetailLine label="本体金額" value={yen(row.amount)} />
                        <DetailLine label="区分" value={row.category} />
                        <DetailLine label="負担部署" value={row.burdenDepartment || "-"} />
                        <DetailLine label="計上日" value={row.recognitionDate || "-"} />
                        <DetailLine label="条件" value={conditionSummary(row)} />
                        <Typography variant="body2" color="text.secondary" sx={{ display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{row.memo || "メモ未入力"}</Typography>
                      </Stack>
                    </CardContent>
                  </Card>
                ); })}
              </CardGrid>
            ) : (
            <TableContainer component={Paper} variant="outlined" sx={{ width: "100%", overflowX: "auto" }}>
              <Table size="small" stickyHeader className="dense-resizable-table">
                <TableHead><TableRow>
                  <ResizableHeaderCell id="select" width={columnWidths.select} minWidth={42} sortConfig={sortConfig} onWidthChange={onWidthChange} className="no-print"><Checkbox size="small" checked={allSelected} indeterminate={partiallySelected} onChange={e => toggleAll(e.target.checked)} /></ResizableHeaderCell>
                  {[
                    ["no","No.","right"],["planId","企画書"],["name","予算項目"],["category","区分"],["accountSubject","勘定科目"],["amount","本体金額","right"],["taxRate","税率","right"],["total","税込金額","right"],["expensePattern","費用区分"],["thisYearExpense","今年度費用","right"],["futureExpense","来年度以降","right"],["oneTimeExpense","1回費用","right"],["recurringExpense","継続費用","right"],["depreciationExpense","償却費用","right"],["paymentCount","支払件数","right"],["condition","条件"],["memo","メモ"]
                  ].map(([id,label,align]) => <ResizableHeaderCell key={id} id={id} label={label} align={align} width={columnWidths[id]} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} />)}
                  <ResizableHeaderCell id="actions" label="操作" width={columnWidths.actions} sortConfig={sortConfig} onSort={onSort} onWidthChange={onWidthChange} className="no-print" />
                </TableRow></TableHead>
                <TableBody>{visibleBudgets.map(({ row, index }) => { const tax = Math.round(toNumber(row.amount) * toNumber(row.taxRate) / 100); const total = toNumber(row.amount) + tax; const summary = calcBudgetDetailSummary(row, data.payments); const checked = selected.includes(index); return (
                  <TableRow key={index} selected={checked} hover sx={{ opacity: isRowActive(row) ? 1 : 0.55 }}>
                    <TableCell padding="checkbox" className="no-print" sx={{ width: columnWidths.select }}><Checkbox size="small" checked={checked} onChange={e => toggleOne(index, e.target.checked)} /></TableCell>
                    <TableCell align="right" sx={{ width: columnWidths.no }}><NumericTextField variant="standard" value={row.no} onCommit={value => updateBudget(index, "no", value)} sx={{ width: "100%" }} /></TableCell>
                    <TableCell sx={{ width: columnWidths.planId }}><Select variant="standard" value={row.planId} onChange={e => updateBudget(index, "planId", e.target.value)} sx={{ width: "100%" }} MenuProps={DROPDOWN_MENU_PROPS}>{data.plans.map(plan => <MenuItem key={plan.id} value={plan.id}>{plan.name}</MenuItem>)}</Select></TableCell>
                    <TableCell sx={{ width: columnWidths.name }}><TextField variant="standard" value={row.name} onChange={e => updateBudget(index, "name", e.target.value)} sx={{ width: "100%" }} /></TableCell>
                    <TableCell sx={{ width: columnWidths.category }}><Select variant="standard" value={row.category} onChange={e => updateBudget(index, "category", e.target.value)} sx={{ width: "100%" }} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.budgetCategories.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></TableCell>
                    <TableCell sx={{ width: columnWidths.accountSubject }}><Select variant="standard" value={row.accountSubject} onChange={e => updateBudget(index, "accountSubject", e.target.value)} sx={{ width: "100%" }} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.accountSubjects.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></TableCell>
                    <TableCell align="right" sx={{ width: columnWidths.amount }}><NumericTextField variant="standard" value={row.amount} onCommit={value => updateBudget(index, "amount", value)} sx={{ width: "100%" }} /></TableCell>

                    <TooltipTableCell align="right" sx={{ width: columnWidths.thisYearExpense }} title={yen(summary.thisYearExpense)}>{yen(summary.thisYearExpense)}</TooltipTableCell>
                    <TooltipTableCell align="right" sx={{ width: columnWidths.futureExpense }} title={yen(summary.futureExpense)}>{yen(summary.futureExpense)}</TooltipTableCell>
                    <TooltipTableCell align="right" sx={{ width: columnWidths.oneTimeExpense }} title={yen(summary.oneTimeExpense)}>{yen(summary.oneTimeExpense)}</TooltipTableCell>
                    <TooltipTableCell align="right" sx={{ width: columnWidths.recurringExpense }} title={yen(summary.recurringExpense)}>{yen(summary.recurringExpense)}</TooltipTableCell>
                    <TooltipTableCell align="right" sx={{ width: columnWidths.depreciationExpense }} title={yen(summary.depreciationExpense)}>{yen(summary.depreciationExpense)}</TooltipTableCell>
                    <TooltipTableCell align="right" sx={{ width: columnWidths.paymentCount }} title={`${summary.paymentCount}件`}>{summary.paymentCount}件</TooltipTableCell>
                    <TableCell sx={{ width: columnWidths.condition }}><ConditionSummaryChip row={row} /></TableCell>
                    <TableCell sx={{ width: columnWidths.memo }}><Tooltip title={row.memo || ""} arrow><TextField variant="standard" value={row.memo} onChange={e => updateBudget(index, "memo", e.target.value)} sx={{ width: "100%" }} /></Tooltip></TableCell>
                    <TableCell className="no-print" sx={{ width: columnWidths.actions }}><Stack direction="row" spacing={0.25}>{isRowDeleted(row) && <Tooltip title="削除取消"><IconButton size="small" color="success" onClick={() => restoreBudget(index)}><span className="material-icons" style={{ fontSize: 18 }}>restore</span></IconButton></Tooltip>}<Tooltip title={isRowDeleted(row) ? "物理削除" : "論理削除"}><IconButton size="small" color="error" onClick={() => deleteBudget(index)}><span className="material-icons" style={{ fontSize: 18 }}>delete</span></IconButton></Tooltip></Stack></TableCell>
                  </TableRow>); })}</TableBody>
              </Table>
            </TableContainer>
            )}

              <>

                  <Grid item xs={12}><FormControlLabel control={<Switch checked={isRowEnabled(editBudget)} onChange={e => updateBudget(editBudgetIndex, "isActive", e.target.checked)} />} label={isRowEnabled(editBudget) ? "有効" : "無効"} /></Grid>

                  <Grid item xs={12} sm={6}><FormControl size="small" fullWidth><InputLabel>区分</InputLabel><Select label="区分" value={editBudget.category} onChange={e => updateBudget(editBudgetIndex, "category", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.budgetCategories.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></FormControl></Grid>

                  <Grid item xs={12} sm={6}><NumericTextField label="償却月数" value={editBudget.depreciationMonths} onCommit={value => updateBudget(editBudgetIndex, "depreciationMonths", value)} /></Grid>

                  <Grid item xs={12} sm={6}><FormControl size="small" fullWidth><InputLabel>費用計上基準日</InputLabel><Select label="費用計上基準日" value={normalizeExpenseStartMode(editBudget.expenseStartMode)} onChange={e => updateBudget(editBudgetIndex, "expenseStartMode", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.expenseStartModes.map(item => <MenuItem key={item} value={item}>{expenseStartModeLabel(item)}</MenuItem>)}</Select></FormControl></Grid>
                  <Grid item xs={12} sm={6}><FormControl size="small" fullWidth><InputLabel>月度/年度</InputLabel><Select label="月度/年度" value={editBudget.costPeriod || "なし"} onChange={e => updateBudget(editBudgetIndex, "costPeriod", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{setting.options.costPeriods.map(item => <MenuItem key={item || "__empty"} value={item}>{item || "未選択"}</MenuItem>)}</Select></FormControl></Grid>
                  <Grid item xs={12} sm={6}><FormControl size="small" fullWidth><InputLabel>継続周期</InputLabel><Select label="継続周期" value={editBudget.recurringCycle || ""} onChange={e => updateBudget(editBudgetIndex, "recurringCycle", e.target.value)} MenuProps={DROPDOWN_MENU_PROPS}>{(setting.options.recurringCycles || DEFAULT_SETTING.options.recurringCycles).map(item => <MenuItem key={item || "__empty"} value={item}>{recurringCycleLabel(item)}</MenuItem>)}</Select></FormControl></Grid>
                  <Grid item xs={12}><TextField label="メモ" fullWidth size="small" multiline minRows={3} value={editBudget.memo} onChange={e => updateBudget(editBudgetIndex, "memo", e.target.value)} /></Grid>
                </Grid>
              </>
            )}
          </ListItemEditDrawer>
        </Stack>
      );
    }


    function PaymentsPage({
      data,
      setting,
      totals,
      updatePayment,
      addPayment,
      deletePayment,
      restorePayment,
      deleteSelectedPayments,
      updateSelectedPayments,
      renumberPayments,
      clearEmptyPayments,
      appendPaymentRows,
      showModal
    }) {
      const [selected, setSelected] = useState([]);
      const [bulkMethod, setBulkMethod] = useState(setting.defaults.paymentMethod);
      const [bulkStaffStamp, setBulkStaffStamp] = useState("済");
      const [bulkManagerStamp, setBulkManagerStamp] = useState("済");
      const [csvEncoding, setCsvEncoding] = useState("utf-8");
      const [page, setPage] = useState(0);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const [query, setQuery] = useState("");
      const [searchText, setSearchText] = useState("");
      const [viewMode, setViewMode] = useState("cards");
      const [sortConfig, setSortConfig] = useState({ key: "no", direction: "asc" });
      const [editPaymentIndex, setEditPaymentIndex] = useState(null);
      const [columnWidths, setColumnWidths] = useState({
        select: 46, no: 60, paymentDate: 120, recognitionDate: 120, depreciationStartDate: 120, budgetId: 150,
        baseAmount: 115, taxRate: 70, amount: 115, cumulative: 115, balance: 115,
        method: 100, payee: 150, accountingNo: 130, burdenDepartment: 130, accountSubject: 130, costType: 150, expensePattern: 140,
        depreciationMonths: 105, usageStartDate: 120, expenseStartMode: 130, costPeriod: 100, recurringCycle: 100, condition: 230,
        description: 160, staffStamp: 80, managerStamp: 90, staffConfirmed: 100, managerConfirmed: 110, actions: 90
      });
      const csvImportRef = useRef(null);
      const onSort = createSortHandler(sortConfig, setSortConfig);
      const onWidthChange = (id, width) => setColumnWidths(prev => ({ ...prev, [id]: width }));
      const filteredPayments = data.payments
        .map((row, index) => ({ row, index }))
        .filter(({ row }) => {
          if (!query) return true;
          const budget = data.budgets.find(item => String(item.no) === String(row.budgetId));
          const plan = data.plans.find(item => item.id === budget?.planId);
          return [row.no, rowStatusLabel(row), row.paymentDate, row.recognitionDate, row.depreciationStartDate, row.budgetId, budget?.name, plan?.name, row.baseAmount, row.taxRate, row.amount, row.method, row.burdenDepartment, row.accountSubject, row.costType, row.expensePattern, row.depreciationMonths, row.usageStartDate, row.expenseStartMode, row.costPeriod, row.payee, row.accountingNo, row.description, row.staffStamp, row.managerStamp, row.staffConfirmed, row.managerConfirmed].join(" ").toLowerCase().includes(query.toLowerCase());
        });
      const sortedPayments = sortIndexedRows(filteredPayments, sortConfig, ({ row, index }, key) => {
        const currentCumulative = data.payments.slice(0, index + 1).filter(isRowActive).reduce((sum, item) => sum + toNumber(item.amount), 0);
        if (key === "cumulative") return currentCumulative;
        if (key === "balance") return totals.budgetTotal - currentCumulative;
        return row[key] ?? "";
      });
      const visiblePayments = rowsPerPage === -1 ? sortedPayments : sortedPayments.slice(page * rowsPerPage, page * rowsPerPage + rowsPerPage);
      const allSelected = visiblePayments.length > 0 && visiblePayments.every(item => selected.includes(item.index));
      const partiallySelected = visiblePayments.some(item => selected.includes(item.index)) && !allSelected;
      const activeFilteredPayments = filteredPayments.filter(item => isRowActive(item.row));
      const filteredBaseTotal = activeFilteredPayments.reduce((sum, item) => sum + toNumber(item.row.baseAmount), 0);
      const filteredPaidTotal = activeFilteredPayments.reduce((sum, item) => sum + toNumber(item.row.amount), 0);
      const unpaidBalance = totals.budgetTotal - filteredPaidTotal;
      const completedCount = activeFilteredPayments.filter(item => item.row.staffStamp || item.row.managerStamp || item.row.staffConfirmed || item.row.managerConfirmed).length;
      const paymentExpenseSummary = calcExpenseSummary(activeFilteredPayments.map(item => item.row));

      useEffect(() => { setPage(0); }, [query, sortConfig, viewMode]);

      function toggleAll(checked) {
        const visibleIndexes = visiblePayments.map(item => item.index);
        setSelected(prev => checked ? [...new Set([...prev, ...visibleIndexes])] : prev.filter(index => !visibleIndexes.includes(index)));
      }
      function toggleOne(index, checked) { setSelected(prev => checked ? [...new Set([...prev, index])] : prev.filter(i => i !== index)); }
      function handleDeleteSelected() { deleteSelectedPayments(selected); setSelected([]); }
      function handleBulkMethod() { updateSelectedPayments(selected, { method: bulkMethod }); }
      function handleBulkStaffStamp() { updateSelectedPayments(selected, { staffStamp: bulkStaffStamp }); }
      function handleBulkManagerStamp() { updateSelectedPayments(selected, { managerStamp: bulkManagerStamp }); }
      function handleExportCsv() {
        try { exportCsvFile("payment-list_" + new Date().toISOString().slice(0, 10) + ".csv", PAYMENT_CSV_COLUMNS, filteredPayments.map(item => item.row), csvEncoding); }
        catch (error) { showModal("CSVエクスポート失敗", error.message, "warning"); }
      }
      function handleExportTemplateCsv() {
        try { exportCsvTemplateFile("payment-import-template.csv", PAYMENT_CSV_COLUMNS, csvEncoding); }
        catch (error) { showModal("CSVテンプレート出力失敗", error.message, "warning"); }
      }
      async function handleImportCsv(file) {
        if (!file) return;
        try {
          const text = await readTextFile(file, csvEncoding);
          const rows = normalizePaymentRows(csvTextToObjects(text, PAYMENT_CSV_COLUMNS), setting.defaults.paymentMethod, data.budgets).filter(row => row.paymentDate || row.recognitionDate || row.depreciationStartDate || row.budgetId || row.baseAmount || row.amount || row.method || row.burdenDepartment || row.accountSubject || row.costType || row.expensePattern || row.depreciationMonths || row.usageStartDate || row.expenseStartMode || row.costPeriod || row.payee || row.accountingNo || row.description || row.staffStamp || row.managerStamp || row.staffConfirmed || row.managerConfirmed);
          appendPaymentRows(rows);
        } catch (error) { showModal("CSVインポート失敗", error.message, "error"); }
        finally { if (csvImportRef.current) csvImportRef.current.value = ""; }
      }

      const editPayment = editPaymentIndex === null ? null : data.payments[editPaymentIndex];

      const columns = [
        ["no", "No.", "right"], ["paymentDate", "支払日"], ["recognitionDate", "計上日"], ["depreciationStartDate", "償却開始日"], ["budgetId", "予算"],
        ["baseAmount", "本体価格", "right"], ["taxRate", "税率", "right"], ["amount", "税込金額", "right"], ["cumulative", "累計", "right"], ["balance", "残高", "right"],
        ["method", "方法"], ["payee", "相手先名"], ["accountingNo", "経理受付番号"], ["burdenDepartment", "負担部署"], ["accountSubject", "勘定科目"], ["costType", "費用種別"], ["expensePattern", "費用発生区分"],
        ["depreciationMonths", "償却月数", "right"], ["usageStartDate", "利用開始日"], ["expenseStartMode", "費用計上基準日"], ["costPeriod", "月度/年度"], ["recurringCycle", "継続周期"], ["condition", "条件"],
        ["description", "支払内容"], ["staffStamp", "担当印"], ["managerStamp", "所属長印"], ["staffConfirmed", "担当確認"], ["managerConfirmed", "所属長確認"]
      ];

      return (
        <Stack spacing={1.5}>
          <PageHeader title="支払い一覧" subtitle="支払実績を入力し、累計と残高を行単位で確認します。" chips={[<Chip key="budget" size="small" label={`予算総額 ${yen(totals.budgetTotal)}`} />, <Chip key="paid" size="small" color="primary" label={`累計支払額 ${yen(totals.paidTotal)}`} />, <Chip key="unit" size="small" label="単位：円" />, <Chip key="view" size="small" label="カード初期表示" />]} />

          <Box sx={{ mt: -0.5 }}>
