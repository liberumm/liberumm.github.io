    /** タスク一覧から案件ステータスを算出 */
    function deriveStatus(tasks, cancelled) {
      if (cancelled) return "取消";
      if (!tasks || tasks.length === 0) return "下書き";
      if (tasks.some(t => t.status === "差戻し")) return "差戻し";
      if (tasks.every(t => t.status === "完了" || t.status === "スキップ")) return "完了";
      const current = tasks.filter(t => t.status === "進行中");
      if (current.length > 0) {
        if (current.some(t => (t.type || t.name).includes("承認") || (t.type || t.name).includes("確認"))) return "承認待ち";
        if (current.some(t => t.name === "受付")) return "受付中";
        return "対応中";
      }
      return "申請済";
    }

    /** 案件オブジェクトからステータスを算出（ショートカット） */
    function requestStatus(r) {
      return deriveStatus(r.tasks, r.cancelled);
    }

    /** タスク進捗率（%） */
    function taskProgress(tasks) {
      if (!tasks || tasks.length === 0) return 0;
      const active = tasks.filter(t => t.status !== "スキップ");
      if (active.length === 0) return 100;
      const done = active.filter(t => t.status === "完了").length;
      return Math.round((done / active.length) * 100);
    }

    /** 現在のアクティブタスクを取得（並列の場合は最初の1つ） */
    function currentTask(tasks) {
      if (!tasks) return null;
      return tasks.find(t => t.status === "進行中") || null;
    }

    /** 現在のアクティブタスク一覧（並列対応） */
    function currentTasks(tasks) {
      if (!tasks) return [];
      return tasks.filter(t => t.status === "進行中");
    }

    /** タスク完了時に次のタスクを進行中にする（並列グループ対応） */
    function advanceTasks(tasks, completedSeq) {
      const completed = tasks.find(t => t.seq === completedSeq);
      if (!completed) return;

      // 並列グループの場合、同グループの全タスクが完了するまで次に進まない
      if (completed.group) {
        const groupTasks = tasks.filter(t => t.group === completed.group);
        const allGroupDone = groupTasks.every(t => t.status === "完了" || t.status === "スキップ");
        if (!allGroupDone) return;
      }

      // 次の未着手タスクを探す
      const nextTasks = [];
      let foundNext = false;
      for (const t of tasks) {
        if (t.status !== "未着手") continue;
        if (!foundNext) {
          nextTasks.push(t);
          foundNext = true;
          // 次のタスクが並列グループなら、同グループの全タスクを進行中にする
          if (t.group) {
            tasks.filter(t2 => t2.group === t.group && t2.status === "未着手" && t2.seq !== t.seq)
              .forEach(t2 => nextTasks.push(t2));
          }
          break;
        }
      }
      nextTasks.forEach(t => { t.status = "進行中"; });
    }

    // CSV ヘルパー
    // ============================================================
    function exportCsv(filename, headers, rows) {
      const bom = "\uFEFF";
      const escape = v => '"' + String(v ?? "").replace(/"/g, '""') + '"';
      const csv = [headers.map(escape).join(","), ...rows.map(r => r.map(escape).join(","))].join("\n");
      const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    }

    function importCsv(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
          const lines = e.target.result.split("\n").filter(l => l.trim());
          if (lines.length < 2) { resolve([]); return; }
          const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g, "").trim());
          const data = lines.slice(1).map(line => {
            const vals = line.match(/(".*?"|[^,]+)/g) || [];
            const obj = {};
            headers.forEach((h, i) => { obj[h] = (vals[i] || "").replace(/^"|"$/g, "").trim(); });
            return obj;
          });
          resolve(data);
        };
        reader.readAsText(file);
      });
    }

    /** テーブル列幅自動調整 */
    function useAutoColWidths(tableRef, columns, data, setColWidths) {
      useEffect(() => {
        if (!tableRef.current || !data.length) return;
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        ctx.font = "13px Roboto, sans-serif";
        const pad = 28;
        const newWidths = {};
        columns.forEach(col => {
          let max = ctx.measureText(col.label).width + pad + 16;
          data.slice(0, 50).forEach(row => {
            const val = String(row[col.key] ?? "");
            max = Math.max(max, ctx.measureText(val).width + pad);
          });
          newWidths[col.key] = Math.min(Math.max(Math.ceil(max), 50), 350);
        });
        setColWidths(newWidths);
      }, [data.length]);
    }

    /** ステータス → FullCalendar イベントカラー */

      "承認待ち":   "#ffa726",
      "受付中":     "#ab47bc",

    };

    function CalendarView({ requests, onSelectRequest }) {
      const calRef = React.useRef(null);
      const calInstance = React.useRef(null);

      // requests → FullCalendar events
      const toEvents = reqs => reqs.map(r => {
        const s = requestStatus(r);
        return {
          id:              r.id,
          title:           r.title,
          start:           r.dueDate,
          allDay:          true,
          backgroundColor: STATUS_COLOR[s] || "#1976d2",
          borderColor:     STATUS_COLOR[s] || "#1976d2",
          extendedProps:   { request: r }
        };
      });

      useEffect(() => {
        if (!calRef.current) return;
        calInstance.current = new FullCalendar.Calendar(calRef.current, {
          initialView:   "dayGridMonth",
          locale:        "ja",
          height:        "auto",
          headerToolbar: {
            left:   "prev,next today",
            center: "title",
            right:  "dayGridMonth,listWeek"
          },
          buttonText: { today: "今日", month: "月", list: "リスト" },
          events: toEvents(requests),
          eventClick: info => onSelectRequest(info.event.extendedProps.request),
          eventDidMount: info => {
            const r = info.event.extendedProps.request;
            info.el.title = `${r.id}\n${r.type}\n申請者: ${r.requester}\n担当: ${r.assignee}`;
          }
        });
        calInstance.current.render();

        // コンテナのリサイズを監視してカレンダーを再描画
        const ro = new ResizeObserver(() => {
          if (calInstance.current) calInstance.current.updateSize();
        });
        ro.observe(calRef.current);

        return () => { ro.disconnect(); calInstance.current && calInstance.current.destroy(); };
      }, []);

      // requests が変わったらイベントを差し替え
      useEffect(() => {
        if (!calInstance.current) return;
        calInstance.current.removeAllEvents();
        toEvents(requests).forEach(e => calInstance.current.addEvent(e));
      }, [requests]);

      return <Box ref={calRef} sx={{ "& .fc": { fontFamily: "Roboto, sans-serif" } }} />;
    }

                    InputLabelProps={{ shrink: true }} />
                </Grid>
                <Grid item xs={12} sm={6} md={2}>
                  <TextField fullWidth size="small" type="date" label="期限終了" 
                    value={filters.dateTo}
                    onChange={e => setFilters({ ...filters, dateTo: e.target.value })}
                    InputLabelProps={{ shrink: true }} />
                </Grid>
                <Grid item xs={12} md={1}>
                  <Typography variant="body2" color="text.secondary" sx={{ textAlign: { md: "right" } }}>
                    {filteredRequests.length} 件
                  </Typography>
                </Grid>
              </Grid>
            </CardContent>
          </Card>

          {/* ① カレンダー */}
          <Card sx={{ mb: 2 }}>
            <CardContent>
              <Stack direction="row" flexWrap="wrap" gap={1} sx={{ mb: 1.5 }}>
                {Object.entries(STATUS_COLOR).map(([s, c]) => (
                  <Stack key={s} direction="row" alignItems="center" spacing={0.5}>
                    <Box sx={{ width: 9, height: 9, borderRadius: "50%", bgcolor: c, flexShrink: 0 }} />
                    <Typography variant="caption" color="text.secondary">{s}</Typography>
                  </Stack>
                ))}
              </Stack>
              <CalendarView requests={filteredRequests} onSelectRequest={onSelectRequest} />
            </CardContent>
          </Card>

          {/* ② ステータスパネル（KPI 3枚） */}
          <Grid container spacing={2} sx={{ mb: 2 }}>
            <Grid item xs={12} sm={4}>
              <KpiCard title="承認・確認待ち" value={waiting}     caption="マネジャー確認対象"    color="warning.main" />
            </Grid>
            <Grid item xs={12} sm={4}>
              <KpiCard title="対応中"         value={progressing} caption="情シス / ベンダ作業中" color="primary.main" />
            </Grid>
            <Grid item xs={12} sm={4}>
              <KpiCard title="完了"           value={completed}   caption="完了済案件"            color="success.main" />
            </Grid>
          </Grid>

          {/* ③ マイタスク */}
          <MyTasksList requests={filteredRequests} currentUser={currentUser} onSelectRequest={onSelectRequest} />

          {/* ④ 案件リスト */}
          <Card>
            <Tabs value={filters.completion} onChange={(e, v) => setFilters({ ...filters, completion: v })}
              sx={{ px: 2, pt: 1, minHeight: 36 }}
              TabIndicatorProps={{ sx: { height: 2 } }}>
              <Tab label="全て"   value="all"        sx={{ minHeight: 36, py: 0.5, fontSize: "0.8rem" }} />
              <Tab label="未完了" value="incomplete" sx={{ minHeight: 36, py: 0.5, fontSize: "0.8rem" }} />
              <Tab label="完了"   value="completed"  sx={{ minHeight: 36, py: 0.5, fontSize: "0.8rem" }} />
            </Tabs>
            <CardContent>
              <Stack spacing={1.5}>
                {filteredRequests.map(r => (
                  <Paper key={r.id} variant="outlined"
                    sx={{ p: 2, cursor: "pointer", "&:hover": { borderColor: "primary.main", boxShadow: 1 } }}
                    onClick={() => onSelectRequest(r)}>
                    <Stack direction={{ xs: "column", sm: "row" }} justifyContent="space-between" spacing={1}>
                      <Box>
                        <Stack direction="row" spacing={1} alignItems="center" flexWrap="wrap">
                          <Typography sx={{ fontWeight: 700 }}>{r.title}</Typography>
                          <StatusChip status={requestStatus(r)} />
                          <Typography variant="caption" color="text.secondary">
                            進捗 {taskProgress(r.tasks)}%
                          </Typography>
                        </Stack>
                        <Typography variant="body2" color="text.secondary" sx={{ mt: 0.5 }}>
                          {r.id} / {r.type} / {r.department} / 申請者: {r.requester}
                        </Typography>
                      </Box>
                      <Box sx={{ minWidth: { sm: 160 } }}>
                        <Typography variant="body2">期限: {r.dueDate}</Typography>
                        <Typography variant="body2" color="text.secondary">担当: {r.assignee}</Typography>
                      </Box>
                    </Stack>
                  </Paper>
                ))}
              </Stack>
            </CardContent>
          </Card>
        </Box>
      );
    }

    // ============================================================
    // 案件一覧画面
    // ============================================================
    // ============================================================
    // スプレッドシート風 案件一覧
    // ============================================================

    /** 列定義（案件一覧） */
    const COLUMNS = [
      { key: "id",         label: "案件番号",   width: 120, sortable: true  },
      { key: "status",     label: "ステータス", width: 110, sortable: true  },
      { key: "dueDate",    label: "期限",       width: 100, sortable: true  },
      { key: "priority",   label: "優先度",     width: 70,  sortable: true  },
      { key: "title",      label: "件名",       width: 200, sortable: true  },
      { key: "type",       label: "申請種別",   width: 160, sortable: true  },
      { key: "requester",  label: "申請者",     width: 100, sortable: true  },
      { key: "department", label: "申請部署",   width: 90,  sortable: true  },
      { key: "assignee",   label: "担当",       width: 100, sortable: true  },
      { key: "system",     label: "対象システム", width: 110, sortable: true },
      { key: "vendor",     label: "取引先",     width: 90,  sortable: true  },
      { key: "progress",   label: "進捗",       width: 70,  sortable: true  },
      { key: "createdAt",  label: "申請日",     width: 100, sortable: true  }
    ];

    const PRIORITY_ORDER = { "最優先": 0, "高": 1, "中": 2, "低": 3 };

    // ============================================================
    // 分析画面
    // ============================================================
    function AnalyticsView({ requests, filters, setFilters, currentUser }) {
      const today = new Date().toISOString().split("T")[0];

      // フィルター適用
      const filteredRequests = useMemo(() => {
        return requests.filter(r => {
          const s = requestStatus(r);
          const keywordMatch = !filters.keyword ||
            [r.id, r.title, r.type, r.requester, r.department, r.assignee, s]
              .join(" ").toLowerCase().includes(filters.keyword.toLowerCase());
          const dateMatch = (!filters.dateFrom || r.dueDate >= filters.dateFrom) &&
                            (!filters.dateTo   || r.dueDate <= filters.dateTo);
          const completionMatch = !filters.completion || filters.completion === "all" ||
            (filters.completion === "incomplete" && s !== "完了" && s !== "取消") ||
            (filters.completion === "completed"  && (s === "完了" || s === "取消"));
          return keywordMatch &&
            (!filters.status || s === filters.status) &&
            (!filters.type   || r.type   === filters.type) &&
            dateMatch && completionMatch;
        });
      }, [requests, filters]);

      const stats = useMemo(() => {
        const byStatus = {}, byType = {}, byDept = {}, byPriority = {};
        const byAssignee = {};
        const byRequester = {};
        let totalTasks = 0, completedTasks = 0, avgProgress = 0;
        let rejectCount = 0;

        filteredRequests.forEach(r => {
          const s = requestStatus(r);
          byStatus[s] = (byStatus[s] || 0) + 1;
          byType[r.type] = (byType[r.type] || 0) + 1;
          byDept[r.department] = (byDept[r.department] || 0) + 1;
          byPriority[r.priority] = (byPriority[r.priority] || 0) + 1;
          byRequester[r.requester] = (byRequester[r.requester] || { total: 0, completed: 0 });
          byRequester[r.requester].total++;
          if (s === "完了") byRequester[r.requester].completed++;
          avgProgress += taskProgress(r.tasks);

          (r.tasks || []).forEach(t => {
            if (t.status === "スキップ") return;
            totalTasks++;
            if (t.status === "完了") completedTasks++;
            if (t.status === "差戻し") rejectCount++;
            if (t.assignee && t.status !== "スキップ") {
              if (!byAssignee[t.assignee]) byAssignee[t.assignee] = { total: 0, completed: 0, inProgress: 0 };
              byAssignee[t.assignee].total++;
              if (t.status === "完了") byAssignee[t.assignee].completed++;
              if (t.status === "進行中") byAssignee[t.assignee].inProgress++;
            }
          });
        });
        avgProgress = filteredRequests.length ? Math.round(avgProgress / filteredRequests.length) : 0;
        const overdue = filteredRequests.filter(r => r.dueDate < today && requestStatus(r) !== "完了" && requestStatus(r) !== "取消").length;

        return { byStatus, byType, byDept, byPriority, byAssignee, byRequester, totalTasks, completedTasks, avgProgress, overdue, rejectCount, total: filteredRequests.length };
      }, [filteredRequests]);

      const statusColorMap = {};
      Object.entries(STATUS_META).forEach(([k, v]) => { statusColorMap[k] = v.color; });

      const StatTable = ({ title, data, colorMap }) => (
        <Card sx={{ height: "100%" }}>
          <CardContent>
            <Typography variant="subtitle2" sx={{ fontWeight: 700, mb: 1 }}>{title}</Typography>
            <Table size="small">
              <TableBody>
                {Object.entries(data).sort((a, b) => b[1] - a[1]).map(([k, v]) => (
                  <TableRow key={k}>
                    <TableCell sx={{ border: 0, py: 0.4 }}>
                      {colorMap ? <Chip size="small" label={k} color={colorMap[k] || "default"} /> : k}
                    </TableCell>
                    <TableCell align="right" sx={{ border: 0, py: 0.4, fontWeight: 700 }}>{v}</TableCell>
                    <TableCell align="right" sx={{ border: 0, py: 0.4, color: "text.secondary", fontSize: "0.75rem" }}>
                      {stats.total ? Math.round(v / stats.total * 100) : 0}%
                    </TableCell>
                  </TableRow>
                ))}
              </TableBody>
            </Table>
          </CardContent>
        </Card>
      );

      // 担当者ランキング（対応数順）
      const assigneeRanking = Object.entries(stats.byAssignee)
        .sort((a, b) => b[1].total - a[1].total);

      // 申請者ランキング
      const requesterRanking = Object.entries(stats.byRequester)
        .sort((a, b) => b[1].total - a[1].total);

      return (
        <Box>
          <Typography variant="h6" sx={{ fontWeight: 700, mb: 2 }}>案件分析</Typography>

          {/* フィルターバー */}
          <Card sx={{ mb: 2 }}>
            <CardContent sx={{ pb: "12px !important", pt: "12px !important" }}>
              <Grid container spacing={1.5} alignItems="center">
                <Grid item xs={12} md={3}>
                  <TextField fullWidth size="small" label="キーワード" value={filters.keyword}
                    onChange={e => setFilters({ ...filters, keyword: e.target.value })}
                    placeholder="案件番号、件名、申請者など" />
                </Grid>
                <Grid item xs={12} md={2}>
                  <FormControl fullWidth size="small">
                    <InputLabel>ステータス</InputLabel>
                    <Select label="ステータス" value={filters.status}
                      onChange={e => setFilters({ ...filters, status: e.target.value })}>
                      <MenuItem value="">すべて</MenuItem>
                      {Object.keys(STATUS_META).map(s => <MenuItem key={s} value={s}>{s}</MenuItem>)}
                    </Select>
                  </FormControl>
                </Grid>
                <Grid item xs={12} md={2}>
                  <FormControl fullWidth size="small">
                    <InputLabel>申請種別</InputLabel>
                    <Select label="申請種別" value={filters.type}
                      onChange={e => setFilters({ ...filters, type: e.target.value })}>
                      <MenuItem value="">すべて</MenuItem>
                      {REQUEST_TYPES.map(t => <MenuItem key={t} value={t}>{t}</MenuItem>)}
                    </Select>
                  </FormControl>
                </Grid>
                <Grid item xs={12} sm={6} md={2}>
                  <TextField fullWidth size="small" type="date" label="期限開始"
                    value={filters.dateFrom}
                    onChange={e => setFilters({ ...filters, dateFrom: e.target.value })}
                    InputLabelProps={{ shrink: true }} />
                </Grid>
                <Grid item xs={12} sm={6} md={2}>
                  <TextField fullWidth size="small" type="date" label="期限終了"
                    value={filters.dateTo}
                    onChange={e => setFilters({ ...filters, dateTo: e.target.value })}
                    InputLabelProps={{ shrink: true }} />
                </Grid>
                <Grid item xs={12} md={1}>
                  <Typography variant="body2" color="text.secondary" sx={{ textAlign: { md: "right" } }}>
                    {filteredRequests.length} 件
                  </Typography>
                </Grid>
              </Grid>
            </CardContent>
          </Card>

          {/* KPI */}
          <Grid container spacing={2} sx={{ mb: 2 }}>
            <Grid item xs={6} sm={4} md={2}>
              <KpiCard title="総案件数" value={stats.total} caption="全案件" color="primary.main" />
            </Grid>
            <Grid item xs={6} sm={4} md={2}>
              <KpiCard title="平均進捗" value={stats.avgProgress + "%"} caption="全案件平均" color="info.main" />
            </Grid>
            <Grid item xs={6} sm={4} md={2}>
              <KpiCard title="タスク完了率" value={stats.totalTasks ? Math.round(stats.completedTasks / stats.totalTasks * 100) + "%" : "—"} caption={stats.completedTasks + " / " + stats.totalTasks} color="success.main" />
            </Grid>
            <Grid item xs={6} sm={4} md={2}>
              <KpiCard title="期限超過" value={stats.overdue} caption="未完了で期限超過" color="error.main" />
            </Grid>
            <Grid item xs={6} sm={4} md={2}>
              <KpiCard title="差戻し" value={stats.rejectCount} caption="差戻しタスク数" color="warning.main" />
            </Grid>
            <Grid item xs={6} sm={4} md={2}>
              <KpiCard title="対応者数" value={assigneeRanking.length} caption="タスク担当者" color="secondary.main" />
            </Grid>
          </Grid>

          {/* 担当者別対応状況 */}
          <Card sx={{ mb: 2 }}>
            <CardContent>
              <Typography variant="subtitle2" sx={{ fontWeight: 700, mb: 1 }}>担当者別 対応状況</Typography>
              <TableContainer>
                <Table size="small">
                  <TableHead>
                    <TableRow>
                      <TableCell sx={{ fontWeight: 700 }}>担当者</TableCell>
                      <TableCell align="center" sx={{ fontWeight: 700 }}>タスク数</TableCell>
                      <TableCell align="center" sx={{ fontWeight: 700 }}>完了</TableCell>
                      <TableCell align="center" sx={{ fontWeight: 700 }}>対応中</TableCell>
                      <TableCell align="center" sx={{ fontWeight: 700 }}>完了率</TableCell>
                      <TableCell sx={{ fontWeight: 700, width: "30%" }}>負荷</TableCell>
                    </TableRow>
                  </TableHead>
                  <TableBody>
                    {assigneeRanking.map(([name, d]) => {
                      const rate = d.total ? Math.round(d.completed / d.total * 100) : 0;
                      const maxTotal = assigneeRanking[0]?.[1]?.total || 1;
                      const barWidth = Math.round(d.total / maxTotal * 100);
                      return (
                        <TableRow key={name}>
                          <TableCell sx={{ fontWeight: 600 }}>{name}</TableCell>
                          <TableCell align="center">{d.total}</TableCell>
                          <TableCell align="center">{d.completed}</TableCell>
                          <TableCell align="center">
                            {d.inProgress > 0 ? <Chip size="small" label={d.inProgress} color="primary" sx={{ height: 20, fontSize: "0.7rem" }} /> : "0"}
                          </TableCell>
                          <TableCell align="center">
                            <Typography variant="body2" sx={{ fontWeight: 700, color: rate >= 80 ? "success.main" : rate >= 50 ? "warning.main" : "error.main" }}>
                              {rate}%
                            </Typography>
                          </TableCell>
                          <TableCell>
                            <Box sx={{ bgcolor: "#e3f2fd", borderRadius: 1, height: 16, position: "relative", overflow: "hidden" }}>
                              <Box sx={{ bgcolor: "#1976d2", height: "100%", width: barWidth + "%", borderRadius: 1 }} />
                            </Box>
                          </TableCell>
                        </TableRow>
                      );
                    })}
                  </TableBody>
                </Table>
              </TableContainer>
            </CardContent>
          </Card>

          {/* 申請者別 */}
          <Card sx={{ mb: 2 }}>
            <CardContent>
              <Typography variant="subtitle2" sx={{ fontWeight: 700, mb: 1 }}>申請者別 案件数</Typography>
              <TableContainer>
                <Table size="small">
                  <TableHead>
                    <TableRow>
                      <TableCell sx={{ fontWeight: 700 }}>申請者</TableCell>
                      <TableCell align="center" sx={{ fontWeight: 700 }}>案件数</TableCell>
                      <TableCell align="center" sx={{ fontWeight: 700 }}>完了</TableCell>
                      <TableCell align="center" sx={{ fontWeight: 700 }}>完了率</TableCell>
                    </TableRow>
                  </TableHead>
                  <TableBody>
                    {requesterRanking.map(([name, d]) => {
                      const rate = d.total ? Math.round(d.completed / d.total * 100) : 0;
                      return (
                        <TableRow key={name}>
                          <TableCell sx={{ fontWeight: 600 }}>{name}</TableCell>
                          <TableCell align="center">{d.total}</TableCell>
                          <TableCell align="center">{d.completed}</TableCell>
                          <TableCell align="center">
                            <Typography variant="body2" sx={{ fontWeight: 700, color: rate >= 80 ? "success.main" : rate >= 50 ? "warning.main" : "text.secondary" }}>
                              {rate}%
                            </Typography>
                          </TableCell>
                        </TableRow>
                      );
                    })}
                  </TableBody>
                </Table>
              </TableContainer>
            </CardContent>
          </Card>

          {/* 内訳 */}
          <Grid container spacing={2} sx={{ mb: 2 }}>
            <Grid item xs={12} md={6}>
              <StatTable title="ステータス別" data={stats.byStatus} colorMap={statusColorMap} />
            </Grid>
            <Grid item xs={12} md={6}>
              <StatTable title="申請種別（どんな案件が多いか）" data={stats.byType} />
            </Grid>
          </Grid>
          <Grid container spacing={2} sx={{ mb: 2 }}>
            <Grid item xs={12} md={6}>
              <StatTable title="部署別（どこからの依頼が多いか）" data={stats.byDept} />
            </Grid>
            <Grid item xs={12} md={6}>
              <StatTable title="優先度別" data={stats.byPriority} />
            </Grid>
          </Grid>

          {/* 期限超過案件 */}
          {stats.overdue > 0 && (
            <Card>
              <CardContent>
                <Typography variant="subtitle2" sx={{ fontWeight: 700, mb: 1, color: "error.main" }}>
                  期限超過案件（{stats.overdue}件）
                </Typography>
                <Table size="small">
                  <TableHead>
                    <TableRow>
                      <TableCell sx={{ fontWeight: 700 }}>案件番号</TableCell>
                      <TableCell sx={{ fontWeight: 700 }}>件名</TableCell>
                      <TableCell sx={{ fontWeight: 700 }}>期限</TableCell>
                      <TableCell sx={{ fontWeight: 700 }}>ステータス</TableCell>
                      <TableCell sx={{ fontWeight: 700 }}>担当</TableCell>
                    </TableRow>
                  </TableHead>
                  <TableBody>
                    {filteredRequests
                      .filter(r => r.dueDate < today && requestStatus(r) !== "完了" && requestStatus(r) !== "取消")
                      .map(r => (
                        <TableRow key={r.id}>
                          <TableCell>{r.id}</TableCell>
                          <TableCell>{r.title}</TableCell>
                          <TableCell sx={{ color: "error.main", fontWeight: 700 }}>{r.dueDate}</TableCell>
                          <TableCell><StatusChip status={requestStatus(r)} /></TableCell>
                          <TableCell>{r.assignee}</TableCell>
                        </TableRow>
                      ))}
                  </TableBody>
                </Table>
              </CardContent>
            </Card>
          )}
        </Box>
      );
    }

    // ============================================================
    // タスク一覧画面
    // ============================================================
    const TASK_COLUMNS = [
      { key: "requestId",    label: "案件番号",   width: 120, sortable: true  },
      { key: "status",       label: "ステータス", width: 90,  sortable: true  },
      { key: "dueDate",      label: "期限",       width: 100, sortable: true  },
      { key: "priority",     label: "優先度",     width: 70,  sortable: true  },
      { key: "requestTitle", label: "案件名",     width: 180, sortable: true  },
      { key: "seq",          label: "#",          width: 40,  sortable: true  },
      { key: "name",         label: "タスク",     width: 110, sortable: true  },
      { key: "assignee",     label: "担当者",     width: 100, sortable: true  },
      { key: "requester",    label: "申請者",     width: 100, sortable: true  },
      { key: "department",   label: "申請部署",   width: 90,  sortable: true  },
      { key: "at",           label: "完了日時",   width: 130, sortable: true  }
    ];

    function TaskListView({ requests, filters, setFilters, onSelectRequest, currentUser }) {
      const [sortKey, setSortKey]   = useState("dueDate");
      const [sortDir, setSortDir]   = useState("asc");
      const [taskTab, setTaskTab]   = useState("pending");
      const [page, setPage]         = useState(0);
      const [rowsPerPage, setRowsPerPage] = useState(25);
      const [checkedKeys, setCheckedKeys] = useState(new Set());
      const [colWidths, setColWidths] = useState(() =>
        Object.fromEntries(TASK_COLUMNS.map(c => [c.key, c.width]))
      );
      const dragging = React.useRef(null);
      const taskTableRef = React.useRef(null);

      const toggleCheck = key => {
        setCheckedKeys(prev => { const n = new Set(prev); n.has(key) ? n.delete(key) : n.add(key); return n; });
      };

      const allTasks = useMemo(() => {
        const tasks = [];
        requests.forEach(r => {
          (r.tasks || []).forEach(t => {
            if (t.status === "スキップ") return;
            tasks.push({ ...t, _key: r.id + "-" + t.seq, requestId: r.id, requestTitle: r.title, request: r, requester: r.requester, department: r.department, priority: r.priority, dueDate: r.dueDate });
          });
        });
        return tasks;
      }, [requests]);

      const filtered = useMemo(() => {
        setPage(0);
        return allTasks.filter(t => {
          if (taskTab === "pending" && (t.status === "完了" || t.status === "差戻し")) return false;
          if (taskTab === "done" && t.status !== "完了" && t.status !== "差戻し") return false;
          if (!isOperatorOrAdmin(currentUser.role) && t.assignee !== currentUser.name) return false;
          if (filters.keyword) {
            const kw = filters.keyword.toLowerCase();
            if (![t.requestId, t.requestTitle, t.name, t.assignee, t.department, t.status].join(" ").toLowerCase().includes(kw)) return false;
          }
          if (filters.dateFrom && t.dueDate < filters.dateFrom) return false;
          if (filters.dateTo && t.dueDate > filters.dateTo) return false;
          return true;
        });
      }, [allTasks, taskTab, filters, currentUser]);

      const sorted = useMemo(() => [...filtered].sort((a, b) => {
        let av = a[sortKey] ?? "", bv = b[sortKey] ?? "";
        if (sortKey === "priority") { av = PRIORITY_ORDER[av] ?? 9; bv = PRIORITY_ORDER[bv] ?? 9; }
        const cmp = typeof av === "number" ? av - bv : String(av).localeCompare(String(bv), "ja");
        return sortDir === "asc" ? cmp : -cmp;
      }), [filtered, sortKey, sortDir]);

      const handleSort = key => {
        if (sortKey === key) setSortDir(d => d === "asc" ? "desc" : "asc");
        else { setSortKey(key); setSortDir("asc"); }
      };

      const onResizeStart = (e, key) => {
        e.preventDefault();
        dragging.current = { key, startX: e.clientX, startW: colWidths[key] };
        const onMove = ev => { setColWidths(prev => ({ ...prev, [key]: Math.max(60, dragging.current.startW + ev.clientX - dragging.current.startX) })); };
        const onUp = () => { dragging.current = null; window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
        window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
      };

      const paginated = rowsPerPage === -1 ? sorted : sorted.slice(page * rowsPerPage, page * rowsPerPage + rowsPerPage);
      const priorityColor = { "最優先": "#e53935", "高": "#fb8c00", "中": "#1976d2", "低": "#757575" };

      useAutoColWidths(taskTableRef, TASK_COLUMNS, sorted, setColWidths);

      return (
        <Box>
          <Stack direction={{ xs: "column", sm: "row" }} justifyContent="space-between" alignItems={{ sm: "center" }} spacing={1} sx={{ mb: 2 }}>
            <Typography variant="h6" sx={{ fontWeight: 700 }}>タスク一覧</Typography>
            <Stack direction="row" spacing={1}>
              <Button size="small" variant="outlined"
                startIcon={<span className="material-icons" style={{ fontSize: 16 }}>download</span>}
                onClick={() => {
                  const h = TASK_COLUMNS.map(c => c.label);
                  const rows = sorted.map(t => TASK_COLUMNS.map(c => t[c.key] ?? ""));
                  exportCsv("タスク一覧_" + new Date().toISOString().slice(0,10) + ".csv", h, rows);
                }}>エクスポート</Button>
            </Stack>
          </Stack>

          <Card sx={{ mb: 1.5 }}>
            <CardContent sx={{ pb: "12px !important", pt: "12px !important" }}>
              <Grid container spacing={1.5} alignItems="center">
                <Grid item xs={12} md={5}>
                  <TextField fullWidth size="small" label="キーワード" value={filters.keyword}
                    onChange={e => setFilters({ ...filters, keyword: e.target.value })}
                    placeholder="案件番号、タスク名、担当者など" />
                </Grid>
                <Grid item xs={12} sm={6} md={3}>
                  <TextField fullWidth size="small" type="date" label="期限開始"
                    value={filters.dateFrom} onChange={e => setFilters({ ...filters, dateFrom: e.target.value })}
                    InputLabelProps={{ shrink: true }} />
                </Grid>
                <Grid item xs={12} sm={6} md={3}>
                  <TextField fullWidth size="small" type="date" label="期限終了"
                    value={filters.dateTo} onChange={e => setFilters({ ...filters, dateTo: e.target.value })}
                    InputLabelProps={{ shrink: true }} />
                </Grid>
                <Grid item xs={12} md={1}>
                  <Typography variant="body2" color="text.secondary" sx={{ textAlign: { md: "right" } }}>{sorted.length} 件</Typography>
                </Grid>
              </Grid>
            </CardContent>
          </Card>

          <Paper variant="outlined" sx={{ overflow: "hidden" }}>
            <Tabs value={taskTab} onChange={(e, v) => setTaskTab(v)}
              sx={{ px: 2, minHeight: 36, borderBottom: "1px solid #e0e0e0" }}
              TabIndicatorProps={{ sx: { height: 2 } }}>
              <Tab label="全て" value="all" sx={{ minHeight: 36, py: 0.5, fontSize: "0.8rem" }} />
              <Tab label="未対応" value="pending" sx={{ minHeight: 36, py: 0.5, fontSize: "0.8rem" }} />
              <Tab label="対応済" value="done" sx={{ minHeight: 36, py: 0.5, fontSize: "0.8rem" }} />
            </Tabs>
            <TableContainer sx={{ overflowX: "auto" }}>
              <Table stickyHeader size="small" sx={{ tableLayout: "fixed", borderCollapse: "separate" }}>
                <TableHead>
                  <TableRow>
                    <TableCell sx={{ width: 40, minWidth: 40, maxWidth: 40, bgcolor: "#f0f4f8", borderRight: "1px solid #d0d7de", borderBottom: "2px solid #c0c8d0", p: 0, textAlign: "center" }}>
                      <input type="checkbox"
                        checked={paginated.length > 0 && paginated.every(t => checkedKeys.has(t._key))}
                        onChange={e => { const n = new Set(checkedKeys); paginated.forEach(t => e.target.checked ? n.add(t._key) : n.delete(t._key)); setCheckedKeys(n); }} />
                    </TableCell>
                    {TASK_COLUMNS.map(col => (
                      <TableCell key={col.key}
                        onClick={() => col.sortable && handleSort(col.key)}
                        sx={{
                          width: colWidths[col.key], minWidth: colWidths[col.key], maxWidth: colWidths[col.key],
                          position: "relative",
                          bgcolor: "#f0f4f8", borderRight: "1px solid #d0d7de",
                          borderBottom: "2px solid #c0c8d0",
                          fontWeight: 700, fontSize: "0.78rem", py: 1,
                          cursor: col.sortable ? "pointer" : "default",
                          userSelect: "none", whiteSpace: "nowrap",
                          "&:hover": col.sortable ? { bgcolor: "#e3eaf2" } : {}
                        }}>
                        <Stack direction="row" alignItems="center" spacing={0.5}>
                          <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{col.label}</span>
                          {sortKey === col.key && (
                            <span className="material-icons" style={{ fontSize: 14, color: "#1976d2" }}>
                              {sortDir === "asc" ? "arrow_upward" : "arrow_downward"}
                            </span>
                          )}
                        </Stack>
                        <Box onMouseDown={e => onResizeStart(e, col.key)}
                          sx={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 5,
                            cursor: "col-resize", zIndex: 1, "&:hover": { bgcolor: "#1976d2", opacity: 0.5 } }} />
                      </TableCell>
                    ))}
                  </TableRow>
                </TableHead>
                <TableBody>
                  {paginated.map((t, i) => {
                    const isMine = t.assignee === currentUser.name;
                    const isCurrent = t.status === "進行中";
                    return (
                      <TableRow key={t._key} hover
                        sx={{ cursor: "pointer", bgcolor: isCurrent && isMine ? "#e3f2fd" : i % 2 === 0 ? "#fff" : "#f9fafb" }}
                        onClick={() => onSelectRequest(t.request)}>
                        <TableCell sx={{ width: 40, p: 0, textAlign: "center", borderRight: "1px solid #e8ecf0", borderBottom: "1px solid #e8ecf0" }}
                          onClick={e => e.stopPropagation()}>
                          <input type="checkbox" checked={checkedKeys.has(t._key)} onChange={() => toggleCheck(t._key)} />
                        </TableCell>
                        {TASK_COLUMNS.map(col => (
                          <TableCell key={col.key} sx={{
                            width: colWidths[col.key], minWidth: colWidths[col.key], maxWidth: colWidths[col.key],
                            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                            fontSize: "0.8rem", py: 0.75,
                            borderRight: "1px solid #e8ecf0", borderBottom: "1px solid #e8ecf0"
                          }}>
                            {col.key === "status" ? (() => { const m = TASK_STATUS[t.status] || { color: "default", label: t.status }; return <Chip size="small" color={m.color} label={m.label} />; })()
                              : col.key === "priority" ? <Typography variant="caption" sx={{ fontWeight: 700, color: priorityColor[t.priority] || "#333" }}>{t.priority}</Typography>
                              : col.key === "requestTitle" ? <Typography variant="body2" sx={{ fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.requestTitle}</Typography>
                              : col.key === "name" ? (
                                <Stack direction="row" spacing={0.5} alignItems="center">
                                  <span>{t.name}</span>
                                  {isCurrent && <Chip size="small" label="現在" color="primary" sx={{ height: 16, fontSize: "0.6rem" }} />}
                                </Stack>
                              )
                              : col.key === "assignee" ? <Typography variant="body2" sx={{ fontWeight: isMine ? 700 : 400, color: isMine ? "primary.main" : "text.primary" }}>{t.assignee || "未割当"}{isMine && " (自分)"}</Typography>
                              : col.key === "at" ? <Typography variant="caption" color="text.secondary">{t.at || "—"}</Typography>
                              : <span>{t[col.key] ?? ""}</span>
                            }
                          </TableCell>
                        ))}
                      </TableRow>
                    );
                  })}
                  {paginated.length === 0 && (
                    <TableRow>
                      <TableCell colSpan={TASK_COLUMNS.length + 1} sx={{ textAlign: "center", py: 4 }}>
                        <Typography variant="body2" color="text.secondary">該当するタスクはありません</Typography>
                      </TableCell>
                    </TableRow>
                  )}
                </TableBody>
              </Table>
            </TableContainer>
            <TablePagination
              component="div" count={sorted.length} page={page} rowsPerPage={rowsPerPage}
              onPageChange={(e, p) => setPage(p)}
              onRowsPerPageChange={e => { setRowsPerPage(parseInt(e.target.value, 10)); setPage(0); }}
              rowsPerPageOptions={[10, 25, 50, { label: "全件", value: -1 }]}
              labelRowsPerPage="表示件数:"
              labelDisplayedRows={({ from, to, count }) => `${from}–${to} / ${count}`}
            />
          </Paper>
        </Box>
      );
    }

    // ============================================================
    // スプレッドシート風 案件一覧
    // ============================================================

    function RequestListView({ requests, filters, setFilters, onSelectRequest, onGoNew, onReuse, onUpdateRequest, currentUser }) {
      const [sortKey, setSortKey]     = useState("dueDate");
      const [sortDir, setSortDir]     = useState("asc");
      const [colWidths, setColWidths] = useState(() =>
        Object.fromEntries(COLUMNS.map(c => [c.key, c.width]))
      );
      const [selectedId, setSelectedId] = useState(null);
      const [editMode,   setEditMode]   = useState(false);
      const [editCell,   setEditCell]   = useState(null);
      const [editValue,  setEditValue]  = useState("");
      const [page,       setPage]       = useState(0);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const [checkedIds, setCheckedIds] = useState(new Set());
      const dragging = React.useRef(null);
      const importRef = React.useRef(null);
      const tableRef = React.useRef(null);

      const toggleCheck = id => {
        setCheckedIds(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      };

      // ロール別編集可能列
      const editableKeys = useMemo(() => {
        const role = currentUser?.role;
        if (isOperatorOrAdmin(role)) return ["title","assignee","priority","dueDate","status"];
        if (role === "approver") return ["title","assignee","priority","dueDate","status"];
        if (role === "staff")    return ["priority"];
        return [];
      }, [currentUser]);

      // フィルター（変更時はページを先頭に戻す）
      const filtered = useMemo(() => {
        setPage(0);
        return requests.filter(r => {
          const s = requestStatus(r);
          const keywordMatch = !filters.keyword ||
            [r.id, r.title, r.type, r.requester, r.department, r.assignee, s]
              .join(" ").toLowerCase().includes(filters.keyword.toLowerCase());
          const dateMatch = (!filters.dateFrom || r.dueDate >= filters.dateFrom) &&
                            (!filters.dateTo   || r.dueDate <= filters.dateTo);
          const completionMatch = !filters.completion || filters.completion === "all" ||
            (filters.completion === "incomplete" && s !== "完了" && s !== "取消") ||
            (filters.completion === "completed"  && (s === "完了" || s === "取消"));
          return keywordMatch &&
            (!filters.status || s === filters.status) &&
            (!filters.type   || r.type   === filters.type) &&
            dateMatch && completionMatch;
        });
      }, [requests, filters]);

      // ソート
      const sorted = useMemo(() => [...filtered].sort((a, b) => {
        let av, bv;
        if (sortKey === "status") {
          av = requestStatus(a); bv = requestStatus(b);
        } else if (sortKey === "progress") {
          av = taskProgress(a.tasks); bv = taskProgress(b.tasks);
        } else {
          av = a[sortKey] ?? ""; bv = b[sortKey] ?? "";
        }
        if (sortKey === "priority") { av = PRIORITY_ORDER[av] ?? 9; bv = PRIORITY_ORDER[bv] ?? 9; }
        const cmp = typeof av === "number" ? av - bv : String(av).localeCompare(String(bv), "ja");
        return sortDir === "asc" ? cmp : -cmp;
      }), [filtered, sortKey, sortDir]);

      const handleSort = key => {
        if (!editMode) {
          if (sortKey === key) setSortDir(d => d === "asc" ? "desc" : "asc");
          else { setSortKey(key); setSortDir("asc"); }
        }
      };

      // 列幅リサイズ
      const onResizeStart = (e, key) => {
        e.preventDefault();
        dragging.current = { key, startX: e.clientX, startW: colWidths[key] };
        const onMove = ev => {
          const delta = ev.clientX - dragging.current.startX;
          setColWidths(prev => ({ ...prev, [key]: Math.max(60, dragging.current.startW + delta) }));
        };
        const onUp = () => {
          dragging.current = null;
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
        };
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
      };

      const priorityColor = { "最優先": "#e53935", "高": "#fb8c00", "中": "#1976d2", "低": "#757575" };

      // セルクリック
      const handleCellClick = (e, r, key) => {
        if (!editMode) { setSelectedId(r.id); onSelectRequest(r); return; }
        if (!editableKeys.includes(key)) return;
        e.stopPropagation();
        setEditCell({ id: r.id, key });
        setEditValue(key === "status" ? requestStatus(r) : (r[key] ?? ""));
      };

      // 編集確定
      const commitEdit = () => {
        if (editCell) { onUpdateRequest(editCell.id, editCell.key, editValue); setEditCell(null); }
      };

      const isEditing = (id, key) => editCell?.id === id && editCell?.key === key;

      // セル表示
      const renderCell = (r, col) => {
        if (isEditing(r.id, col.key)) {
          if (col.key === "priority") return (
            <Select autoFocus size="small" value={editValue} variant="standard" disableUnderline
              onChange={e => { onUpdateRequest(r.id, col.key, e.target.value); setEditCell(null); }}
              onBlur={commitEdit} sx={{ fontSize: "0.8rem", width: "100%" }}>
              {["最優先","高","中","低"].map(p => <MenuItem key={p} value={p}>{p}</MenuItem>)}
            </Select>
          );
          if (col.key === "status") return (
            <Select autoFocus size="small" value={editValue} variant="standard" disableUnderline
              onChange={e => { onUpdateRequest(r.id, col.key, e.target.value); setEditCell(null); }}
              onBlur={commitEdit} sx={{ fontSize: "0.8rem", width: "100%" }}>
              {Object.keys(STATUS_META).map(s => <MenuItem key={s} value={s}>{s}</MenuItem>)}
            </Select>
          );
          return (
            <input autoFocus value={editValue}
              onChange={e => setEditValue(e.target.value)}
              onBlur={commitEdit}
              onKeyDown={e => { if (e.key === "Enter") commitEdit(); if (e.key === "Escape") setEditCell(null); }}
              style={{ width: "100%", border: "none", outline: "2px solid #1976d2", borderRadius: 2,
                fontSize: "0.8rem", padding: "2px 4px", fontFamily: "inherit", background: "#fff" }} />
          );
        }
        if (col.key === "status")   return <StatusChip status={requestStatus(r)} />;
        if (col.key === "priority") return (
          <Typography variant="caption" sx={{ fontWeight: 700, color: priorityColor[r.priority] || "#333" }}>{r.priority}</Typography>
        );
        if (col.key === "title") return (
          <Typography variant="body2" sx={{ fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.title}</Typography>
        );
        if (col.key === "progress") return (
          <Typography variant="caption" sx={{ fontWeight: 700 }}>{taskProgress(r.tasks)}%</Typography>
        );
        return <span>{r[col.key] ?? ""}</span>;
      };

      const canToggleEdit = editableKeys.length > 0;

      // 自動列幅調整
      useAutoColWidths(tableRef, COLUMNS, sorted, setColWidths);

      // 現在ページのデータ
      const paginated = rowsPerPage === -1
        ? sorted
        : sorted.slice(page * rowsPerPage, page * rowsPerPage + rowsPerPage);

      return (
        <Box>
          {/* タイトル + 編集モードボタン */}
          <Stack direction={{ xs: "column", sm: "row" }} justifyContent="space-between" alignItems={{ sm: "center" }} spacing={1} sx={{ mb: 2 }}>
            <Typography variant="h6" sx={{ fontWeight: 700 }}>案件一覧</Typography>
            <Stack direction="row" spacing={1} alignItems="center">
              {checkedIds.size === 1 && onReuse && (
                <Button size="small" variant="outlined"
                  startIcon={<span className="material-icons" style={{ fontSize: 16 }}>content_copy</span>}
                  onClick={() => { const r = requests.find(r => checkedIds.has(r.id)); if (r) onReuse(r); }}>
                  選択案件を再利用
                </Button>
              )}
              {canToggleEdit && (
                <Button size="small"
                  variant={editMode ? "contained" : "outlined"}
                  color={editMode ? "warning" : "inherit"}
                  startIcon={<span className="material-icons" style={{ fontSize: 16 }}>{editMode ? "edit_off" : "edit"}</span>}
                  onClick={() => { setEditMode(v => !v); setEditCell(null); }}>
                  {editMode ? "編集終了" : "編集モード"}
                </Button>
              )}
              {onGoNew && <Button variant="contained" onClick={onGoNew}>新規作成</Button>}
              <Button size="small" variant="outlined"
                startIcon={<span className="material-icons" style={{ fontSize: 16 }}>download</span>}
                onClick={() => {
                  const h = COLUMNS.map(c => c.label);
                  const rows = sorted.map(r => COLUMNS.map(c => {
                    if (c.key === "status") return requestStatus(r);
                    if (c.key === "progress") return taskProgress(r.tasks) + "%";
                    return r[c.key] ?? "";
                  }));
                  exportCsv("案件一覧_" + new Date().toISOString().slice(0,10) + ".csv", h, rows);
                }}>エクスポート</Button>
              <Button size="small" variant="outlined"
                startIcon={<span className="material-icons" style={{ fontSize: 16 }}>upload</span>}
                onClick={() => importRef.current.click()}>インポート</Button>
              <input ref={importRef} type="file" accept=".csv" hidden onChange={async e => {
                if (!e.target.files[0]) return;
                const data = await importCsv(e.target.files[0]);
                alert("インポート: " + data.length + " 件読み込み（デモのため反映されません）");
                e.target.value = "";
              }} />
              <Button size="small" variant="outlined"
                startIcon={<span className="material-icons" style={{ fontSize: 16 }}>description</span>}
                onClick={() => {
                  const h = COLUMNS.map(c => c.label);
                  exportCsv("案件テンプレート.csv", h, []);
                }}>テンプレートDL</Button>
            </Stack>
          </Stack>

          {/* 編集モードバナー */}
          {editMode && (
            <Alert severity="warning" sx={{ mb: 1.5, py: 0.5 }}
              icon={<span className="material-icons" style={{ fontSize: 18 }}>edit</span>}>
              編集モード — セルをクリックして直接編集。編集可能列:&nbsp;
              <strong>{COLUMNS.filter(c => editableKeys.includes(c.key)).map(c => c.label).join(" / ")}</strong>
            </Alert>
          )}

          {/* フィルターバー */}
          <Card sx={{ mb: 1.5 }}>
            <CardContent sx={{ pb: "12px !important", pt: "12px !important" }}>
              <Grid container spacing={1.5} alignItems="center">
                <Grid item xs={12} md={3}>
                  <TextField fullWidth size="small" label="キーワード" value={filters.keyword}
                    onChange={e => setFilters({ ...filters, keyword: e.target.value })}
                    placeholder="案件番号、件名、申請者など" />
                </Grid>
                <Grid item xs={12} md={2}>
                  <FormControl fullWidth size="small">
                    <InputLabel>ステータス</InputLabel>
                    <Select label="ステータス" value={filters.status}
                      onChange={e => setFilters({ ...filters, status: e.target.value })}>
                      <MenuItem value="">すべて</MenuItem>
                      {Object.keys(STATUS_META).map(s => <MenuItem key={s} value={s}>{s}</MenuItem>)}
                    </Select>
                  </FormControl>
                </Grid>
                <Grid item xs={12} md={2}>
                  <FormControl fullWidth size="small">
                    <InputLabel>申請種別</InputLabel>
                    <Select label="申請種別" value={filters.type}
                      onChange={e => setFilters({ ...filters, type: e.target.value })}>
                      <MenuItem value="">すべて</MenuItem>
                      {REQUEST_TYPES.map(t => <MenuItem key={t} value={t}>{t}</MenuItem>)}
                    </Select>
                  </FormControl>
                </Grid>
                <Grid item xs={12} sm={6} md={2}>
                  <TextField fullWidth size="small" type="date" label="期限開始" 
                    value={filters.dateFrom}
                    onChange={e => setFilters({ ...filters, dateFrom: e.target.value })}
                    InputLabelProps={{ shrink: true }} />
                </Grid>
                <Grid item xs={12} sm={6} md={2}>
                  <TextField fullWidth size="small" type="date" label="期限終了" 
                    value={filters.dateTo}
                    onChange={e => setFilters({ ...filters, dateTo: e.target.value })}
                    InputLabelProps={{ shrink: true }} />
                </Grid>
                <Grid item xs={12} md={1}>
                  <Typography variant="body2" color="text.secondary" sx={{ textAlign: { md: "right" } }}>
                    {sorted.length} 件
                  </Typography>
                </Grid>
              </Grid>
            </CardContent>
          </Card>

          {/* スプレッドシート風テーブル */}
          <Paper variant="outlined" sx={{ overflow: "hidden", outline: editMode ? "2px solid #fb8c00" : "none" }}>
            <Tabs value={filters.completion} onChange={(e, v) => setFilters({ ...filters, completion: v })}
              sx={{ px: 2, minHeight: 36, borderBottom: "1px solid #e0e0e0" }}
              TabIndicatorProps={{ sx: { height: 2 } }}>
              <Tab label="全て"   value="all"        sx={{ minHeight: 36, py: 0.5, fontSize: "0.8rem" }} />
              <Tab label="未完了" value="incomplete" sx={{ minHeight: 36, py: 0.5, fontSize: "0.8rem" }} />
              <Tab label="完了"   value="completed"  sx={{ minHeight: 36, py: 0.5, fontSize: "0.8rem" }} />
            </Tabs>
            <TableContainer sx={{ overflowX: "auto" }}>
              <Table stickyHeader size="small" sx={{ tableLayout: "fixed", borderCollapse: "separate" }}>
                <TableHead>
                  <TableRow>
                    <TableCell sx={{ width: 40, minWidth: 40, maxWidth: 40, bgcolor: "#f0f4f8", borderRight: "1px solid #d0d7de", borderBottom: "2px solid #c0c8d0", p: 0, textAlign: "center" }}>
                      <input type="checkbox"
                        checked={paginated.length > 0 && paginated.every(r => checkedIds.has(r.id))}
                        onChange={e => {
                          const next = new Set(checkedIds);
                          paginated.forEach(r => e.target.checked ? next.add(r.id) : next.delete(r.id));
                          setCheckedIds(next);
                        }} />
                    </TableCell>
                    {COLUMNS.map(col => {
                      const editable = editableKeys.includes(col.key);
                      return (
                        <TableCell key={col.key}
                          onClick={() => handleSort(col.key)}
                          sx={{
                            width: colWidths[col.key], minWidth: colWidths[col.key], maxWidth: colWidths[col.key],
                            position: "relative",
                            bgcolor: editMode ? (editable ? "#fff8e1" : "#f0f4f8") : "#f0f4f8",
                            borderRight: "1px solid #d0d7de",
                            borderBottom: editMode ? "2px solid #fb8c00" : "2px solid #c0c8d0",
                            fontWeight: 700, fontSize: "0.78rem", py: 1,
                            cursor: editMode ? "default" : (col.sortable ? "pointer" : "default"),
                            userSelect: "none", whiteSpace: "nowrap",
                            "&:hover": (!editMode && col.sortable) ? { bgcolor: "#e3eaf2" } : {}
                          }}>
                          <Stack direction="row" alignItems="center" spacing={0.5}>
                            <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{col.label}</span>
                            {editMode && editable && (
                              <span className="material-icons" style={{ fontSize: 12, color: "#fb8c00" }}>edit</span>
                            )}
                            {!editMode && sortKey === col.key && (
                              <span className="material-icons" style={{ fontSize: 14, color: "#1976d2" }}>
                                {sortDir === "asc" ? "arrow_upward" : "arrow_downward"}
                              </span>
                            )}
                          </Stack>
                          <Box onMouseDown={e => onResizeStart(e, col.key)}
                            sx={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 5,
                              cursor: "col-resize", zIndex: 1,
                              "&:hover": { bgcolor: "#1976d2", opacity: 0.5 } }} />
                        </TableCell>
                      );
                    })}
                  </TableRow>
                </TableHead>
                <TableBody>
                  {sorted.length === 0 ? (
                    <TableRow>
                      <TableCell colSpan={COLUMNS.length} align="center" sx={{ py: 4, color: "text.secondary" }}>
                        該当する案件はありません
                      </TableCell>
                    </TableRow>
                  ) : paginated.map((r, idx) => {
                    const isSelected = r.id === selectedId;
                    const isEven = idx % 2 === 0;
                    return (
                      <TableRow key={r.id}
                        sx={{
                          cursor: editMode ? "default" : "pointer",
                          bgcolor: isSelected && !editMode ? "#e3f2fd" : isEven ? "#fff" : "#f9fafb",
                          "&:hover": !editMode ? { bgcolor: isSelected ? "#bbdefb" : "#eef2f7" } : {},
                          "&:last-child td": { borderBottom: 0 }
                        }}>
                        <TableCell sx={{ width: 40, minWidth: 40, maxWidth: 40, borderRight: "1px solid #e8ecf0", borderBottom: "1px solid #e8ecf0", p: 0, textAlign: "center" }}
                          onClick={e => e.stopPropagation()}>
                          <input type="checkbox" checked={checkedIds.has(r.id)}
                            onChange={() => toggleCheck(r.id)} />
                        </TableCell>
                        {COLUMNS.map(col => {
                          const canEdit = editMode && editableKeys.includes(col.key);
                          return (
                            <TableCell key={col.key}
                              onClick={e => handleCellClick(e, r, col.key)}
                              sx={{
                                width: colWidths[col.key], minWidth: colWidths[col.key], maxWidth: colWidths[col.key],
                                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                                fontSize: "0.8rem", py: 0.75,
                                borderRight: "1px solid #e8ecf0", borderBottom: "1px solid #e8ecf0",
                                cursor: canEdit ? "cell" : (editMode ? "default" : "pointer"),
                                bgcolor: isEditing(r.id, col.key) ? "#fffde7" : undefined,
                                "&:hover": canEdit && !isEditing(r.id, col.key)
                                  ? { bgcolor: "#fff8e1", outline: "1px dashed #fb8c00" } : {}
                              }}>
                              {renderCell(r, col)}
                            </TableCell>
                          );
                        })}
                      </TableRow>
                    );
                  })}
                </TableBody>
              </Table>
            </TableContainer>
            <Divider />
            <TablePagination
              component="div"
              count={sorted.length}
              page={page}
              onPageChange={(_, p) => setPage(p)}
              rowsPerPage={rowsPerPage}
              onRowsPerPageChange={e => { setRowsPerPage(parseInt(e.target.value, 10)); setPage(0); }}
              rowsPerPageOptions={[10, 25, 50, { label: "すべて", value: -1 }]}
              labelRowsPerPage="表示件数:"
              labelDisplayedRows={({ from, to, count }) => `${from}–${to} / ${count} 件`}
              sx={{ borderTop: 0 }}
            />
          </Paper>
        </Box>
      );
    }

    // ============================================================
    // ワークフローステッパー
    // ============================================================
    function WorkflowStepper({ request }) {
      // タスク一覧からスキップ以外を表示
      const visibleTasks = (request.tasks || []).filter(t => t.status !== "スキップ");
      const activeIdx = visibleTasks.findIndex(t => t.status === "進行中");
      const allDone = visibleTasks.every(t => t.status === "完了");

      const TASK_ICON_COLOR = {
        "完了":   "#43a047",
        "進行中": "#1976d2",
        "未着手": "#bdbdbd",
        "差戻し": "#e53935"
      };

      return (
        <Box sx={{ overflowX: "auto", py: 1 }}>
          <Stepper activeStep={allDone ? visibleTasks.length : activeIdx} alternativeLabel>
            {visibleTasks.map((t, i) => (
              <Step key={t.seq} completed={t.status === "完了"}>
                <StepLabel
                  error={t.status === "差戻し"}
                  optional={
                    <Typography variant="caption" color="text.secondary" sx={{ display: "block", textAlign: "center" }}>
                      {t.assignee || "未割当"}
                    </Typography>
                  }>
                  {t.name}
                </StepLabel>
              </Step>
            ))}
          </Stepper>
        </Box>
      );
    }

    // ============================================================
    // 案件詳細画面
    // ============================================================

    // ============================================================
    // ファイル添付セクション（申請添付 / 証跡 共通）
    // ============================================================
    function FileAttachSection({ label, caption, initialFiles, canUpload }) {
      const [files, setFiles] = useState(initialFiles);
      const [dragOver, setDragOver] = useState(false);
      const [previewUrl, setPreviewUrl] = useState(null);
      const [previewName, setPreviewName] = useState("");
      const inputRef = React.useRef(null);

      const addFiles = fileList => {
        const added = Array.from(fileList).map(f => ({
          name: f.name,
          size: (f.size / 1024).toFixed(1) + " KB",
          addedAt: new Date().toLocaleString("ja-JP"),
          isNew: true,
          blob: f,
          url: URL.createObjectURL(f)
        }));
        setFiles(prev => [...prev, ...added]);
      };

      const handleFileChange = e => { addFiles(e.target.files); e.target.value = ""; };
      const handleDrop = e => { e.preventDefault(); setDragOver(false); if (canUpload && e.dataTransfer.files.length) addFiles(e.dataTransfer.files); };
      const handleDragOver = e => { e.preventDefault(); if (canUpload) setDragOver(true); };
      const handleDragLeave = () => setDragOver(false);
      const handleRemove = idx => setFiles(prev => prev.filter((_, i) => i !== idx));

      const canPreview = name => /\.(png|jpe?g|gif|webp|svg|pdf|txt|md|csv)$/i.test(name);
      const isImage = name => /\.(png|jpe?g|gif|webp|svg)$/i.test(name);

      const handlePreview = f => {
        if (f.url) { setPreviewUrl(f.url); setPreviewName(f.name); }
      };

      const iconFor = name => {
        if (/\.(pdf)$/i.test(name))                    return "picture_as_pdf";
        if (/\.(xlsx?|csv)$/i.test(name))              return "table_chart";
        if (/\.(docx?|txt|md)$/i.test(name))           return "description";
        if (/\.(png|jpe?g|gif|webp|svg)$/i.test(name)) return "image";
        return "attach_file";
      };

      return (
        <Box>
          <Stack direction="row" justifyContent="space-between" alignItems="center" sx={{ mb: 1 }}>
            <Box>
              <Typography variant="subtitle2" sx={{ fontWeight: 700 }}>{label}</Typography>
              <Typography variant="caption" color="text.secondary">{caption}</Typography>
            </Box>
            {canUpload && (
              <>
                <Button size="small" variant="outlined" startIcon={<span className="material-icons" style={{ fontSize: 16 }}>upload</span>}
                  onClick={() => inputRef.current.click()}>
                  ファイルを追加
                </Button>
                <input ref={inputRef} type="file" multiple hidden onChange={handleFileChange} />
              </>
            )}
          </Stack>

          {/* ドロップゾーン */}
          <Box
            onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave}
            sx={{
              border: "2px dashed", borderColor: dragOver ? "primary.main" : "grey.300",
              borderRadius: 1, p: files.length === 0 ? 3 : 1.5,
              textAlign: files.length === 0 ? "center" : "left",
              bgcolor: dragOver ? "#e3f2fd" : "transparent",
              transition: "all 0.2s"
            }}>
            {files.length === 0 ? (
              <Box>
                <span className="material-icons" style={{ fontSize: 32, color: "#bdbdbd" }}>cloud_upload</span>
                <Typography variant="body2" color="text.secondary" sx={{ mt: 0.5 }}>
                  {canUpload ? "ファイルをドラッグ＆ドロップ、またはボタンで追加" : "ファイルなし"}
                </Typography>
              </Box>
            ) : (
              <Stack spacing={0.75}>
                {files.map((f, i) => (
                  <Paper key={i} variant="outlined" sx={{ px: 1.5, py: 0.75, display: "flex", alignItems: "center", gap: 1 }}>
                    {/* サムネイル or アイコン */}
                    {isImage(f.name) && f.url ? (
                      <Box component="img" src={f.url} sx={{ width: 32, height: 32, objectFit: "cover", borderRadius: 0.5, flexShrink: 0 }} />
                    ) : (
                      <span className="material-icons" style={{ color: "#1976d2", fontSize: 20 }}>{iconFor(f.name)}</span>
                    )}
                    <Box sx={{ flexGrow: 1, minWidth: 0 }}>
                      <Typography variant="body2" sx={{ fontWeight: 600, fontSize: "0.8rem" }} noWrap>{f.name}</Typography>
                      <Typography variant="caption" color="text.secondary">
                        {f.size}{f.addedAt ? "　" + f.addedAt : ""}
                        {f.isNew && <Chip size="small" label="新規" color="primary" sx={{ ml: 0.5, height: 16, fontSize: "0.6rem" }} />}
                      </Typography>
                    </Box>
                    {canPreview(f.name) && f.url && (
                      <IconButton size="small" onClick={() => handlePreview(f)} sx={{ color: "grey.500" }}>
                        <span className="material-icons" style={{ fontSize: 16 }}>visibility</span>
                      </IconButton>
                    )}
                    {canUpload && (
                      <IconButton size="small" onClick={() => handleRemove(i)} sx={{ color: "grey.400", "&:hover": { color: "error.main" } }}>
                        <span className="material-icons" style={{ fontSize: 16 }}>close</span>
                      </IconButton>
                    )}
                  </Paper>
                ))}
                {canUpload && (
                  <Typography variant="caption" color="text.secondary" sx={{ textAlign: "center", pt: 0.5 }}>
                    ドラッグ＆ドロップで追加
                  </Typography>
                )}
              </Stack>
            )}
          </Box>

          {/* プレビューダイアログ */}
          <Dialog open={!!previewUrl} onClose={() => setPreviewUrl(null)} fullWidth maxWidth="md">
            <DialogTitle sx={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <Typography variant="subtitle2" noWrap>{previewName}</Typography>
              <IconButton size="small" onClick={() => setPreviewUrl(null)}>
                <span className="material-icons">close</span>
              </IconButton>
            </DialogTitle>
            <DialogContent sx={{ textAlign: "center", p: 2 }}>
              {isImage(previewName) ? (
                <Box component="img" src={previewUrl} sx={{ maxWidth: "100%", maxHeight: "70vh", objectFit: "contain" }} />
              ) : (
                <Box component="iframe" src={previewUrl} sx={{ width: "100%", height: "70vh", border: "none" }} />
              )}
            </DialogContent>
          </Dialog>
        </Box>
      );
    }

    /** メタ情報の1項目（ラベル + 値） */
    function MetaItem({ label, value, children }) {      return (
        <Box>
          <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>
            {label}
          </Typography>
          {children ?? <Typography variant="body2" sx={{ mt: 0.25 }}>{value}</Typography>}
        </Box>
      );
    }

    function RequestDetailView({ request, onBack, onAction, currentUser, onReuse }) {
      const [tab, setTab] = useState(0);
      const [rejectOpen, setRejectOpen] = useState(false);
      const [rejectComment, setRejectComment] = useState("");
      const [rejectTargetSeq, setRejectTargetSeq] = useState("");
      const [reassignOpen, setReassignOpen] = useState(false);
      const [reassignTarget, setReassignTarget] = useState("");
      const [rejectRequestOpen, setRejectRequestOpen] = useState(false);
      const [rejectRequestComment, setRejectRequestComment] = useState("");
      const [rejectRequestTask, setRejectRequestTask] = useState(null);
      const [notifyEditSeq, setNotifyEditSeq] = useState(null);
      const [notifyAddName, setNotifyAddName] = useState("");
      const [cancelConfirmOpen, setCancelConfirmOpen] = useState(false);
      const [resumeConfirmOpen, setResumeConfirmOpen] = useState(false);
      const [resubmitOpen, setResubmitOpen] = useState(false);
      const [editMode, setEditMode] = useState(false);
      const [editDesc, setEditDesc] = useState(request.description || "");
      const [editTitle, setEditTitle] = useState(request.title || "");
      const [editPriority, setEditPriority] = useState(request.priority || "中");

      // request が変わったら編集値をリセット
      useEffect(() => {
        setEditDesc(request.description || "");
        setEditTitle(request.title || "");
        setEditPriority(request.priority || "中");
        setEditMode(false);
      }, [request.id]);

      if (!request) {
        return <Card><CardContent><Typography>案件が選択されていません。</Typography></CardContent></Card>;
      }

      const priorityColor = { "最優先": "error", "高": "warning", "中": "info", "低": "default" }[request.priority] || "default";
      const activeTask = currentTask(request.tasks);
      const derivedStatus = deriveStatus(request.tasks, request.cancelled);
      const progress = taskProgress(request.tasks);

      // 現在のユーザーがアクティブタスクの担当者かどうか
      const isTaskAssignee = activeTask && activeTask.assignee === currentUser.name;
      // operator/admin は全タスクを操作可能
      const canActOnTask = isTaskAssignee || isOperatorOrAdmin(currentUser.role);
      // 差戻し時に申請者が再申請可能か
      const canResubmit = derivedStatus === "差戻し" && request.requester === currentUser.name;
      // 編集権限: 情シス部員、タスク担当者、operator、admin
      const isTaskMember = request.tasks && request.tasks.some(t => t.assignee === currentUser.name);
      const canEdit = currentUser.dept === "情報システム部" || isTaskMember || isOperatorOrAdmin(currentUser.role);

      const handleSaveEdit = () => {
        onAction("updateRequest", request, null, { title: editTitle, description: editDesc, priority: editPriority });
        setEditMode(false);
      };

      const handleReject = () => {
        onAction("taskReject", request, activeTask, rejectComment, rejectTargetSeq ? Number(rejectTargetSeq) : null);
        setRejectComment("");
        setRejectTargetSeq("");
        setRejectOpen(false);
      };

      const handleReassign = () => {
        if (reassignTarget) {
          onAction("taskReassign", request, activeTask, reassignTarget);
          setReassignTarget("");
          setReassignOpen(false);
        }
      };

      return (
        <Box sx={{ p: { xs: 1.5, md: 2 } }}>
          {/* ── ヘッダーバー ── */}
          <Box sx={{
            background: "linear-gradient(135deg, #1565c0 0%, #1976d2 60%, #42a5f5 100%)",
            borderRadius: "8px 8px 0 0", p: { xs: 1.5, md: 2 }, mb: 0, color: "#fff"
          }}>
            {/* 上段: 再利用 + 中止/復活 + 閉じる */}
            <Stack direction="row" justifyContent="space-between" alignItems="center" sx={{ mb: 0.75 }}>
              <Stack direction="row" spacing={1} alignItems="center">
                {onReuse && (
                  <Button size="small" variant="outlined"
                    startIcon={<span className="material-icons" style={{ fontSize: 14 }}>content_copy</span>}
                    onClick={() => onReuse(request)}
                    sx={{ color: "rgba(255,255,255,0.8)", borderColor: "rgba(255,255,255,0.3)", fontSize: "0.7rem",
                      "&:hover": { borderColor: "#fff", bgcolor: "rgba(255,255,255,0.1)" } }}>
                    再利用して新規作成
                  </Button>
                )}
              </Stack>
              <Stack direction="row" spacing={0.5} alignItems="center">
                {(canActOnTask || isOperatorOrAdmin(currentUser.role)) && derivedStatus !== "完了" && derivedStatus !== "取消" && (
                  <Button size="small" variant="outlined"
                    startIcon={<span className="material-icons" style={{ fontSize: 14 }}>cancel</span>}
                    onClick={() => setCancelConfirmOpen(true)}
                    sx={{ color: "#ffcdd2", borderColor: "rgba(255,205,210,0.4)", fontSize: "0.7rem",
                      "&:hover": { borderColor: "#ffcdd2", bgcolor: "rgba(255,205,210,0.1)" } }}>
                    中止
                  </Button>
                )}
                {derivedStatus === "取消" && (isOperatorOrAdmin(currentUser.role) || (request._cancelledBy && request._cancelledBy.includes(currentUser.name))) && (
                  <Button size="small" variant="outlined"
                    startIcon={<span className="material-icons" style={{ fontSize: 14 }}>replay</span>}
                    onClick={() => setResumeConfirmOpen(true)}
                    sx={{ color: "#c8e6c9", borderColor: "rgba(200,230,201,0.4)", fontSize: "0.7rem",
                      "&:hover": { borderColor: "#c8e6c9", bgcolor: "rgba(200,230,201,0.1)" } }}>
                    復活
                  </Button>
                )}
                <IconButton size="small" onClick={onBack} sx={{ color: "#fff", "&:hover": { bgcolor: "rgba(255,255,255,0.15)" } }}>
                  <span className="material-icons">close</span>
                </IconButton>
              </Stack>
            </Stack>
            {/* タイトル + ステータス + 進捗 */}
            <Stack direction="row" spacing={1.5} alignItems="center" flexWrap="wrap">
              <Typography variant="h6" sx={{ fontWeight: 700, color: "#fff" }}>{request.title}</Typography>
              <StatusChip status={derivedStatus} />
              <Typography variant="body2" sx={{ color: "rgba(255,255,255,0.8)" }}>
                進捗 {progress}%
              </Typography>
            </Stack>
            <Typography variant="body2" sx={{ color: "rgba(255,255,255,0.75)", mt: 0.5 }}>
              {request.id} &nbsp;·&nbsp; {request.type}
            </Typography>
          </Box>

          {/* ステータスアラート */}
          {!activeTask && derivedStatus === "完了" && (
            <Alert severity="success" sx={{ mb: 1.5, mt: 1.5 }}>この案件は完了しています。</Alert>
          )}
          {derivedStatus === "取消" && (
            <Alert severity="warning" sx={{ mb: 1.5, mt: 1.5 }}>
              この案件は中止されています。{canEdit && "「復活」ボタンで再開できます。"}
            </Alert>
          )}
          {/* 差戻し依頼の表示 */}
          {request.rejectComment && derivedStatus !== "差戻し" && derivedStatus !== "完了" && (
            <Card sx={{ mb: 1.5, mt: 1.5, border: "2px solid", borderColor: "warning.main" }}>
              <CardContent sx={{ py: 1.5 }}>
                <Stack spacing={1}>
                  <Stack direction="row" spacing={1} alignItems="center">
                    <span className="material-icons" style={{ color: "#ed6c02", fontSize: 20 }}>warning</span>
                    <Typography variant="subtitle2" sx={{ fontWeight: 700, color: "warning.main" }}>差戻し依頼</Typography>
                  </Stack>
                  {typeof request.rejectComment === "object" ? (
                    <Box sx={{ bgcolor: "#fff8e1", borderRadius: 1, p: 1.5 }}>
                      <Stack spacing={0.5}>
                        <Stack direction="row" spacing={2}>
                          <Typography variant="caption" color="text.secondary">依頼者: <strong>{request.rejectComment.by}</strong></Typography>
                          <Typography variant="caption" color="text.secondary">対象タスク: <strong>#{request.rejectComment.taskSeq} {request.rejectComment.taskName}</strong></Typography>
                          <Typography variant="caption" color="text.secondary">{request.rejectComment.at}</Typography>
                        </Stack>
                        <Typography variant="body2">{request.rejectComment.reason}</Typography>
                      </Stack>
                    </Box>
                  ) : (
                    <Typography variant="body2">{request.rejectComment}</Typography>
                  )}
                  {request.rejectComment.by === currentUser.name && (
                    <Chip size="small" label="あなたが差戻し依頼中" color="warning" sx={{ alignSelf: "flex-start" }} />
                  )}
                </Stack>
