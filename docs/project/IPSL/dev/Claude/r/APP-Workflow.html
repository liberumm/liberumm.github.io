              </CardContent>
            </Card>
          )}
          {derivedStatus === "差戻し" && (
            <Card sx={{ mb: 1.5, mt: 1.5, border: "2px solid", borderColor: "error.main" }}>
              <CardContent>
                <Stack spacing={1.5}>
                  <Alert severity="error" sx={{ py: 0.5 }}>この案件は差戻しされています。</Alert>
                  {request.rejectComment && (
                    <Box sx={{ bgcolor: "#fff3e0", borderRadius: 1, p: 1.5 }}>
                      <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 600 }}>差戻しコメント</Typography>
                      <Typography variant="body2" sx={{ mt: 0.5 }}>
                        {typeof request.rejectComment === "object" ? request.rejectComment.reason : request.rejectComment}
                      </Typography>
                    </Box>
                  )}
                  {canResubmit && (
                    <Button variant="contained" color="primary" size="small"
                      startIcon={<span className="material-icons" style={{ fontSize: 16 }}>edit</span>}
                      onClick={() => setResubmitOpen(true)}>
                      内容を修正して再申請
                    </Button>
                  )}
                </Stack>
              </CardContent>
            </Card>
          )}

          {/* 再申請モーダル */}
          <Dialog open={resubmitOpen} onClose={() => setResubmitOpen(false)}
            fullWidth maxWidth="md" scroll="paper">
            <DialogTitle sx={{ fontWeight: 700 }}>内容を修正して再申請</DialogTitle>
            <DialogContent dividers sx={{ p: { xs: 2, md: 3 } }}>
              <NewRequestView
                onSubmitted={form => {
                  onAction("resubmitWithEdit", request, null, form);
                  setResubmitOpen(false);
                }}
                currentUser={currentUser}
                onClose={() => setResubmitOpen(false)}
                initialData={{
                  type: request.type, title: request.title, description: request.description,
                  priority: request.priority, contact: request.contact || "",
                  note: request.note || "", targetSystem: request.system || "",
                  ...(request.formData || {})
                }}
              />
            </DialogContent>
          </Dialog>

          {/* 差戻しコメントダイアログ */}
          <Dialog open={rejectOpen} onClose={() => setRejectOpen(false)} fullWidth maxWidth="sm">
            <DialogTitle>差戻し</DialogTitle>
            <DialogContent dividers>
              <Stack spacing={2}>
                <FormControl fullWidth size="small">
                  <InputLabel>差戻し先タスク</InputLabel>
                  <Select label="差戻し先タスク" value={rejectTargetSeq}
                    onChange={e => setRejectTargetSeq(e.target.value)}>
                    {(request.tasks || [])
                      .filter(t => (t.status === "完了" || (request.rejectComment && typeof request.rejectComment === "object" && t.seq === request.rejectComment.taskSeq)) && t.seq < (activeTask?.seq || 999))
                      .map(t => (
                        <MenuItem key={t.seq} value={String(t.seq)}>
                          #{t.seq} {t.name}（{t.assignee}）
                        </MenuItem>
                      ))}
                  </Select>
                </FormControl>
                <TextField fullWidth multiline minRows={3} label="差戻し理由"
                  value={rejectComment} onChange={e => setRejectComment(e.target.value)}
                  placeholder="差戻しの理由を入力してください" />
              </Stack>
            </DialogContent>
            <DialogActions>
              <Button onClick={() => { setRejectOpen(false); setRejectTargetSeq(""); setRejectComment(""); }}>キャンセル</Button>
              <Button variant="contained" color="error" onClick={handleReject}
                disabled={!rejectComment.trim() || !rejectTargetSeq}>差戻し</Button>
            </DialogActions>
          </Dialog>

          {/* 担当者変更ダイアログ */}
          <Dialog open={reassignOpen} onClose={() => setReassignOpen(false)} fullWidth maxWidth="sm">
            <DialogTitle>担当者変更</DialogTitle>
            <DialogContent dividers>
              <Typography variant="body2" color="text.secondary" sx={{ mb: 2 }}>
                タスク「{activeTask?.name}」の担当者を変更します。
              </Typography>
              <FormControl fullWidth size="small">
                <InputLabel>変更先</InputLabel>
                <Select label="変更先" value={reassignTarget}
                  onChange={e => setReassignTarget(e.target.value)}>
                  {DEMO_ACCOUNTS.filter(u => u.name !== activeTask?.assignee).map(u => (
                    <MenuItem key={u.id} value={u.name}>
                      {u.name}（{u.dept} / {ROLE_LABEL[u.role]}）
                    </MenuItem>
                  ))}
                </Select>
              </FormControl>
            </DialogContent>
            <DialogActions>
              <Button onClick={() => setReassignOpen(false)}>キャンセル</Button>
              <Button variant="contained" onClick={handleReassign}
                disabled={!reassignTarget}>変更</Button>
            </DialogActions>
          </Dialog>

          {/* 差戻し依頼ダイアログ */}
          <Dialog open={rejectRequestOpen} onClose={() => { setRejectRequestOpen(false); setRejectRequestComment(""); setRejectRequestTask(null); }} fullWidth maxWidth="sm">
            <DialogTitle>差戻し依頼</DialogTitle>
            <DialogContent dividers>
              <Stack spacing={2}>
                {rejectRequestTask && (
                  <Alert severity="info" sx={{ py: 0.5 }}>
                    タスク「#{rejectRequestTask.seq} {rejectRequestTask.name}」について、現在のタスク担当者に差戻しを依頼します。
                  </Alert>
                )}
                <TextField fullWidth multiline minRows={3} label="差戻し依頼の理由"
                  value={rejectRequestComment} onChange={e => setRejectRequestComment(e.target.value)}
                  placeholder="差戻しが必要な理由を入力してください" />
              </Stack>
            </DialogContent>
            <DialogActions>
              <Button onClick={() => { setRejectRequestOpen(false); setRejectRequestComment(""); setRejectRequestTask(null); }}>キャンセル</Button>
              <Button variant="contained" color="warning" disabled={!rejectRequestComment.trim()}
                onClick={() => {
                  onAction("rejectRequest", request, rejectRequestTask, rejectRequestComment);
                  setRejectRequestOpen(false); setRejectRequestComment(""); setRejectRequestTask(null);
                }}>差戻し依頼を送信</Button>
            </DialogActions>
          </Dialog>

          {/* 中止確認ダイアログ */}
          <Dialog open={cancelConfirmOpen} onClose={() => setCancelConfirmOpen(false)} maxWidth="xs" fullWidth>
            <DialogTitle>案件を中止しますか？</DialogTitle>
            <DialogContent>
              <Typography variant="body2" color="text.secondary">
                この案件を中止します。進行中のタスクは停止されます。後から復活することも可能です。
              </Typography>
            </DialogContent>
            <DialogActions>
              <Button onClick={() => setCancelConfirmOpen(false)}>キャンセル</Button>
              <Button variant="contained" color="error" onClick={() => { onAction("cancelRequest", request); setCancelConfirmOpen(false); }}>
                中止する
              </Button>
            </DialogActions>
          </Dialog>

          {/* 復活確認ダイアログ */}
          <Dialog open={resumeConfirmOpen} onClose={() => setResumeConfirmOpen(false)} maxWidth="xs" fullWidth>
            <DialogTitle>案件を復活しますか？</DialogTitle>
            <DialogContent>
              <Typography variant="body2" color="text.secondary">
                中止された案件を復活し、タスクを再開します。
              </Typography>
            </DialogContent>
            <DialogActions>
              <Button onClick={() => setResumeConfirmOpen(false)}>キャンセル</Button>
              <Button variant="contained" color="success" onClick={() => { onAction("resumeRequest", request); setResumeConfirmOpen(false); }}>
                復活する
              </Button>
            </DialogActions>
          </Dialog>

          {/* ── ワークフロー進捗 ── */}
          <Card sx={{ mb: 1.5, mt: 1.5 }}>
            <CardContent sx={{ pb: "16px !important" }}>
              <Typography variant="subtitle2" color="text.secondary" sx={{ mb: 1.5, fontWeight: 600 }}>
                ワークフロー進捗
              </Typography>
              <WorkflowStepper request={request} />
            </CardContent>
          </Card>

          {/* ── タスク一覧 ── */}
          <Card sx={{ mb: 1.5 }}>
            <CardContent sx={{ pb: "16px !important" }}>
              <Typography variant="subtitle2" color="text.secondary" sx={{ mb: 1.5, fontWeight: 600 }}>
                タスク一覧
              </Typography>
              <TableContainer>
                <Table size="small">
                  <TableHead>
                    <TableRow>
                      <TableCell sx={{ fontWeight: 700, width: 40 }}>#</TableCell>
                      <TableCell sx={{ fontWeight: 700 }}>タスク</TableCell>
                      <TableCell sx={{ fontWeight: 700 }}>担当者</TableCell>
                      <TableCell sx={{ fontWeight: 700, width: 90 }}>ステータス</TableCell>
                      <TableCell sx={{ fontWeight: 700 }}>完了日時</TableCell>
                      <TableCell sx={{ fontWeight: 700, width: 200 }}>アクション</TableCell>
                      <TableCell sx={{ fontWeight: 700, minWidth: 280 }}>通知先</TableCell>
                    </TableRow>
                  </TableHead>
                  <TableBody>
                    {(request.tasks || []).filter(t => t.status !== "スキップ").map(t => {
                      const isCurrent = currentTasks(request.tasks).some(ct => ct.seq === t.seq);
                      const isMyTask = t.assignee === currentUser.name;
                      const canAct = isCurrent && (isMyTask || isOperatorOrAdmin(currentUser.role));
                      const canRequestReject = isCurrent && !isMyTask && isTaskMember;
                      // 通知設定: デフォルトロール + カスタム
                      const taskNotifyRoles = t.notifyRoles || ["applicant", "handler"];
                      const taskNotifyCustom = t.notifyCustom || [];
                      const isEditingNotify = notifyEditSeq === t.seq;

                      const toggleNotifyRole = roleKey => {
                        if (!canEdit) return;
                        const newRoles = taskNotifyRoles.includes(roleKey)
                          ? taskNotifyRoles.filter(r => r !== roleKey)
                          : [...taskNotifyRoles, roleKey];
                        onAction("updateTaskNotify", request, t, { notifyRoles: newRoles, notifyCustom: taskNotifyCustom });
                      };

                      return (
                        <TableRow key={t.seq}
                          sx={{
                            bgcolor: isCurrent ? "#e3f2fd" : "inherit",
                            "& td": { borderColor: isCurrent ? "primary.200" : undefined }
                          }}>
                          <TableCell>
                            <Typography variant="caption" color="text.secondary">{t.seq}</Typography>
                          </TableCell>
                          <TableCell>
                            <Stack direction="row" spacing={0.5} alignItems="center">
                              <Typography variant="body2" sx={{ fontWeight: isCurrent ? 700 : 400 }}>{t.name}</Typography>
                              {isCurrent && <Chip size="small" label="現在" color="primary" sx={{ height: 18, fontSize: "0.65rem" }} />}
                              {t.mode === "parallel" && <Chip size="small" label="合議" variant="outlined" sx={{ height: 18, fontSize: "0.6rem" }} />}
                            </Stack>
                          </TableCell>
                          <TableCell>
                            <Typography variant="body2" sx={{ fontWeight: isMyTask ? 700 : 400, color: isMyTask ? "primary.main" : "text.primary" }}>
                              {t.assignee || "未割当"}
                              {isMyTask && " (自分)"}
                            </Typography>
                          </TableCell>
                          <TableCell>
                            {(() => {
                              const meta = TASK_STATUS[t.status] || { color: "default", label: t.status };
                              return <Chip size="small" color={meta.color} label={meta.label} />;
                            })()}
                          </TableCell>
                          <TableCell>
                            <Typography variant="caption" color="text.secondary">{t.at || "—"}</Typography>
                          </TableCell>
                          <TableCell>
                            {canAct && (
                              <Stack direction="row" spacing={0.5}>
                                {request.rejectComment ? (
                                  <>
                                    <Button variant="outlined" color="error" size="small" sx={{ minWidth: 0, px: 1, py: 0.25, fontSize: "0.7rem" }}
                                      onClick={() => {
                                        const rc = request.rejectComment;
                                        if (typeof rc === "object") {
                                          // 依頼者が担当した最初の完了済タスクをデフォルトにセット
                                          const requesterFirstTask = (request.tasks || []).find(
                                            ft => ft.assignee === rc.by && ft.status === "完了" && ft.seq < (activeTask?.seq || 999)
                                          );
                                          setRejectTargetSeq(requesterFirstTask ? String(requesterFirstTask.seq) : String(rc.taskSeq));
                                          setRejectComment(rc.reason);
                                        }
                                        setRejectOpen(true);
                                      }}>
                                      差戻し
                                    </Button>
                                    <Typography variant="caption" color="warning.main" sx={{ alignSelf: "center" }}>
                                      差戻し依頼あり
                                    </Typography>
                                  </>
                                ) : (
                                  <>
                                    <Button variant="contained" color="success" size="small" sx={{ minWidth: 0, px: 1, py: 0.25, fontSize: "0.7rem" }}
                                      onClick={() => onAction("taskComplete", request, t)}>
                                      完了
                                    </Button>
                                    <Button variant="outlined" size="small" sx={{ minWidth: 0, px: 1, py: 0.25, fontSize: "0.7rem" }}
                                      onClick={() => { setReassignOpen(true); }}>
                                      担当変更
                                    </Button>
                                    <Button variant="outlined" color="error" size="small" sx={{ minWidth: 0, px: 1, py: 0.25, fontSize: "0.7rem" }}
                                      onClick={() => setRejectOpen(true)}>
                                      差戻し
                                    </Button>
                                  </>
                                )}
                              </Stack>
                            )}
                            {canRequestReject && (
                              <Button variant="text" color="warning" size="small" sx={{ minWidth: 0, px: 1, py: 0.25, fontSize: "0.7rem" }}
                                onClick={() => { setRejectRequestTask(t); setRejectRequestOpen(true); }}>
                                差戻し依頼
                              </Button>
                            )}
                          </TableCell>
                          <TableCell>
                            <Stack direction="row" flexWrap="wrap" gap={0.5} alignItems="center">
                              {/* デフォルトロールチップ（選択/非選択） */}
                              {NOTIFY_ROLES.map(r => (
                                <Chip key={r.key} label={r.label} size="small"
                                  color={taskNotifyRoles.includes(r.key) ? "primary" : "default"}
                                  variant={taskNotifyRoles.includes(r.key) ? "filled" : "outlined"}
                                  onClick={() => toggleNotifyRole(r.key)}
                                  sx={{ height: 20, fontSize: "0.6rem", cursor: canEdit ? "pointer" : "default", opacity: taskNotifyRoles.includes(r.key) ? 1 : 0.5 }} />
                              ))}
                              {/* カスタム通知先 */}
                              {taskNotifyCustom.map((n, i) => (
                                <Chip key={"c" + i} label={n} size="small" color="secondary" sx={{ height: 20, fontSize: "0.6rem" }}
                                  onDelete={canEdit ? () => {
                                    const newCustom = taskNotifyCustom.filter((_, j) => j !== i);
                                    onAction("updateTaskNotify", request, t, { notifyRoles: taskNotifyRoles, notifyCustom: newCustom });
                                  } : undefined} />
                              ))}
                              {/* 追加ボタン */}
                              {canEdit && !isEditingNotify && (
                                <IconButton size="small" onClick={() => { setNotifyEditSeq(t.seq); setNotifyAddName(""); }}
                                  sx={{ width: 18, height: 18 }}>
                                  <span className="material-icons" style={{ fontSize: 12 }}>person_add</span>
                                </IconButton>
                              )}
                              {isEditingNotify && (
                                <Stack direction="row" spacing={0.5} alignItems="center">
                                  <FormControl size="small" sx={{ minWidth: 100 }}>
                                    <Select value={notifyAddName} displayEmpty
                                      onChange={e => setNotifyAddName(e.target.value)}
                                      sx={{ fontSize: "0.7rem", height: 22 }}>
                                      <MenuItem value="" disabled>選択</MenuItem>
                                      {DEMO_ACCOUNTS.filter(u => !taskNotifyCustom.includes(u.name)).map(u => (
                                        <MenuItem key={u.id} value={u.name} sx={{ fontSize: "0.8rem" }}>{u.name}</MenuItem>
                                      ))}
                                    </Select>
                                  </FormControl>
                                  <IconButton size="small" disabled={!notifyAddName}
                                    onClick={() => {
                                      onAction("updateTaskNotify", request, t, { notifyRoles: taskNotifyRoles, notifyCustom: [...taskNotifyCustom, notifyAddName] });
                                      setNotifyAddName(""); setNotifyEditSeq(null);
                                    }} sx={{ width: 18, height: 18, color: "primary.main" }}>
                                    <span className="material-icons" style={{ fontSize: 12 }}>check</span>
                                  </IconButton>
                                  <IconButton size="small" onClick={() => setNotifyEditSeq(null)} sx={{ width: 18, height: 18 }}>
                                    <span className="material-icons" style={{ fontSize: 12 }}>close</span>
                                  </IconButton>
                                </Stack>
                              )}
                            </Stack>
                          </TableCell>
                        </TableRow>
                      );
                    })}
                  </TableBody>
                </Table>
              </TableContainer>
            </CardContent>
          </Card>

          {/* ── タブ ── */}
          <Card>
            <Tabs value={tab} onChange={(e, v) => setTab(v)} variant="scrollable" allowScrollButtonsMobile
              sx={{ borderBottom: 1, borderColor: "divider", px: 2 }}>
              <Tab label="依頼内容・添付" />
              <Tab label="履歴・ログ" />
            </Tabs>
            <CardContent>

              {/* タブ0: 依頼内容・添付 */}
              {tab === 0 && (
                <Stack spacing={3}>
                  {/* 編集モード切替 */}
                  {canEdit && (
                    <Stack direction="row" justifyContent="flex-end">
                      {!editMode ? (
                        <Button size="small" variant="outlined"
                          startIcon={<span className="material-icons" style={{ fontSize: 16 }}>edit</span>}
                          onClick={() => setEditMode(true)}>
                          編集
                        </Button>
                      ) : (
                        <Stack direction="row" spacing={1}>
                          <Button size="small" variant="contained" color="primary"
                            startIcon={<span className="material-icons" style={{ fontSize: 16 }}>save</span>}
                            onClick={handleSaveEdit}>
                            保存
                          </Button>
                          <Button size="small" variant="text"
                            onClick={() => { setEditMode(false); setEditTitle(request.title); setEditDesc(request.description); setEditPriority(request.priority); }}>
                            キャンセル
                          </Button>
                        </Stack>
                      )}
                    </Stack>
                  )}

                  {/* タイトル */}
                  {editMode ? (
                    <TextField fullWidth label="依頼タイトル" value={editTitle}
                      onChange={e => setEditTitle(e.target.value)} />
                  ) : null}

                  {/* 優先度 */}
                  {editMode ? (
                    <TextField select fullWidth label="優先度" value={editPriority}
                      onChange={e => setEditPriority(e.target.value)}>
                      {["低","中","高","最優先"].map(p => <MenuItem key={p} value={p}>{p}</MenuItem>)}
                    </TextField>
                  ) : null}

                  {/* 依頼内容 */}
                  <Box>
                    <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>
                      依頼内容
                    </Typography>
                    {editMode ? (
                      <TextField fullWidth multiline minRows={4} value={editDesc}
                        onChange={e => setEditDesc(e.target.value)} sx={{ mt: 0.5 }} />
                    ) : (
                      <Typography variant="body1" sx={{ mt: 0.5, whiteSpace: "pre-wrap" }}>{request.description}</Typography>
                    )}
                  </Box>
                  <Divider />

                  {/* 基本情報 */}
                  <TableContainer component={Paper} variant="outlined">
                    <Table size="small">
                      <TableBody>
                        <TableRow>
                          <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, width: "15%", color: "text.secondary", fontSize: "0.8rem" }}>申請者</TableCell>
                          <TableCell sx={{ width: "35%" }}>{request.requester}</TableCell>
                          <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, width: "15%", color: "text.secondary", fontSize: "0.8rem" }}>部署</TableCell>
                          <TableCell sx={{ width: "35%" }}>{request.department}</TableCell>
                        </TableRow>
                        <TableRow>
                          <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, color: "text.secondary", fontSize: "0.8rem" }}>担当</TableCell>
                          <TableCell>{request.assignee}</TableCell>
                          <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, color: "text.secondary", fontSize: "0.8rem" }}>対象システム</TableCell>
                          <TableCell>{request.system || "—"}</TableCell>
                        </TableRow>
                        <TableRow>
                          <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, color: "text.secondary", fontSize: "0.8rem" }}>優先度</TableCell>
                          <TableCell><Chip size="small" label={request.priority} color={priorityColor} /></TableCell>
                          <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, color: "text.secondary", fontSize: "0.8rem" }}>期限</TableCell>
                          <TableCell>{request.dueDate || "—"}</TableCell>
                        </TableRow>
                        <TableRow>
                          <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, color: "text.secondary", fontSize: "0.8rem" }}>申請日時</TableCell>
                          <TableCell>{request.createdAt}</TableCell>
                          <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, color: "text.secondary", fontSize: "0.8rem" }}>申請種別</TableCell>
                          <TableCell>{request.type}</TableCell>
                        </TableRow>
                        <TableRow>
                          <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, color: "text.secondary", fontSize: "0.8rem" }}>連絡先</TableCell>
                          <TableCell colSpan={3}>{request.contact || "—"}</TableCell>
                        </TableRow>
                      </TableBody>
                    </Table>
                  </TableContainer>

                  {/* 申請種別別の追加項目 */}
                  {request.formData && (() => {
                    const fd = request.formData;
                    const extras = [];
                    if (fd.jobName)        extras.push(["実行対象ジョブ名", fd.jobName]);
                    if (fd.jobDateTime)    extras.push(["実行希望日時", fd.jobDateTime]);
                    if (fd.jobCondition)   extras.push(["実行条件・補足", fd.jobCondition]);
                    if (fd.targetName)     extras.push(["対象者氏名", fd.targetName]);
                    if (fd.employeeNo)     extras.push(["対象者社員番号", fd.employeeNo]);
                    if (fd.targetSystem)   extras.push(["対象システム", fd.targetSystem]);
                    if (fd.accountAction)  extras.push(["処理区分", fd.accountAction]);
                    if (fd.privilege)      extras.push(["権限内容", fd.privilege]);
                    if (fd.targetId)       extras.push(["対象ID", fd.targetId]);
                    if (fd.identityCheck)  extras.push(["本人確認方法", fd.identityCheck]);
                    if (fd.productName)    extras.push(["対象商品", fd.productName]);
                    if (fd.store)          extras.push(["店舗 / 適用範囲", fd.store]);
                    if (fd.oldPrice)       extras.push(["現行価格", fd.oldPrice]);
                    if (fd.newPrice)       extras.push(["変更後価格", fd.newPrice]);
                    if (fd.applyAt)        extras.push(["適用日時", fd.applyAt]);
                    if (fd.reason)         extras.push(["変更理由", fd.reason]);
                    if (fd.impact)         extras.push(["影響範囲 / 補足", fd.impact]);
                    if (fd.preferredEndDate) extras.push(["希望完了日", fd.preferredEndDate]);
                    if (extras.length === 0) return null;
                    // 2列ペアに整形
                    const rows = [];
                    for (let i = 0; i < extras.length; i += 2) {
                      rows.push([extras[i], extras[i + 1] || null]);
                    }
                    return (
                      <Box>
                        <Divider sx={{ mb: 2 }} />
                        <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, mb: 1, display: "block" }}>
                          申請種別別の詳細
                        </Typography>
                        <TableContainer component={Paper} variant="outlined">
                          <Table size="small">
                            <TableBody>
                              {rows.map((row, i) => (
                                <TableRow key={i}>
                                  <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, width: "15%", color: "text.secondary", fontSize: "0.8rem" }}>{row[0][0]}</TableCell>
                                  <TableCell sx={{ width: "35%" }}>{row[0][1]}</TableCell>
                                  {row[1] ? (
                                    <>
                                      <TableCell sx={{ bgcolor: "#f5f7fa", fontWeight: 600, width: "15%", color: "text.secondary", fontSize: "0.8rem" }}>{row[1][0]}</TableCell>
                                      <TableCell sx={{ width: "35%" }}>{row[1][1]}</TableCell>
                                    </>
                                  ) : (
                                    <TableCell colSpan={2} />
                                  )}
                                </TableRow>
                              ))}
                            </TableBody>
                          </Table>
                        </TableContainer>
                      </Box>
                    );
                  })()}

                  {/* 備考 */}
                  {request.note && (
                    <Box>
                      <Divider sx={{ mb: 2 }} />
                      <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>
                        備考
                      </Typography>
                      <Typography variant="body2" sx={{ mt: 0.5, whiteSpace: "pre-wrap" }}>{request.note}</Typography>
                    </Box>
                  )}

                  <Divider />

                  {/* 申請添付 */}
                  <FileAttachSection
                    label="申請添付"
                    caption="申請時に添付するファイル"
                    initialFiles={request.attachments || []}
                    canUpload={canEdit}
                  />

                  <Divider />

                  {/* 証跡 */}
                  <FileAttachSection
                    label="証跡"
                    caption="対応完了時の証跡ファイル"
                    initialFiles={request.evidences || []}
                    canUpload={canEdit}
                  />
                </Stack>
              )}

              {/* タブ1: 履歴・ログ（Timeline + 監査ログテーブル） */}
              {tab === 1 && (
                <Stack spacing={3}>
                  {/* 承認・対応履歴 Timeline */}
                  <Box>
                    <Typography variant="subtitle2" sx={{ fontWeight: 700, mb: 1.5 }}>承認・対応履歴</Typography>
                    <Box sx={{ pl: 1 }}>
                      {request.history.map((h, i) => {
                        const isLast = i === request.history.length - 1;
                        return (
                          <Box key={i} sx={{ display: "flex", gap: 2 }}>
                            <Box sx={{ display: "flex", flexDirection: "column", alignItems: "center", width: 24, flexShrink: 0 }}>
                              <Box sx={{
                                width: 14, height: 14, borderRadius: "50%", mt: "4px", flexShrink: 0,
                                bgcolor: isLast ? "primary.main" : "grey.400",
                                border: "2px solid", borderColor: isLast ? "primary.main" : "grey.400"
                              }} />
                              {!isLast && <Box sx={{ width: 2, flexGrow: 1, bgcolor: "grey.200", my: "2px" }} />}
                            </Box>
                            <Box sx={{ pb: isLast ? 0 : 3, minWidth: 0 }}>
                              <Typography variant="body2" color="text.secondary" sx={{ lineHeight: 1.4 }}>{h.at}</Typography>
                              <Typography sx={{ fontWeight: 600, mt: 0.25 }}>{h.action}</Typography>
                              <Typography variant="body2" color="text.secondary">{h.by}</Typography>
                            </Box>
                          </Box>
                        );
                      })}
                    </Box>
                  </Box>

                  {/* 監査ログ テーブル（管理者のみ表示） */}
                  {currentUser.role === "admin" && (
                    <Box>
                      <Typography variant="subtitle2" sx={{ fontWeight: 700, mb: 1.5 }}>監査ログ</Typography>
                      <TableContainer component={Paper} variant="outlined">
                        <Table size="small">
                          <TableHead>
                            <TableRow sx={{ bgcolor: "grey.50" }}>
                              <TableCell sx={{ fontWeight: 700 }}>操作日時</TableCell>
                              <TableCell sx={{ fontWeight: 700 }}>操作者</TableCell>
                              <TableCell sx={{ fontWeight: 700 }}>操作種別</TableCell>
                              <TableCell sx={{ fontWeight: 700 }}>操作内容</TableCell>
                              <TableCell sx={{ fontWeight: 700 }}>IPアドレス</TableCell>
                              <TableCell sx={{ fontWeight: 700 }}>結果</TableCell>
                            </TableRow>
                          </TableHead>
                          <TableBody>
                            {request.history.map((h, i) => (
                              <TableRow key={i} sx={{ "&:last-child td": { border: 0 } }}>
                                <TableCell sx={{ whiteSpace: "nowrap", color: "text.secondary", fontSize: "0.8rem" }}>{h.at}</TableCell>
                                <TableCell>{h.by}</TableCell>
                                <TableCell>
                                  <Chip size="small" label={h.op} variant="outlined"
                                    color={
                                      h.op === "CREATE"   ? "primary" :
                                      h.op === "APPROVE"  ? "success" :
                                      h.op === "COMPLETE" ? "success" :
                                      h.op === "NOTIFY"   ? "info"    : "default"
                                    } />
                                </TableCell>
                                <TableCell>{h.action}</TableCell>
                                <TableCell sx={{ fontFamily: "monospace", fontSize: "0.8rem", color: "text.secondary" }}>{h.ip}</TableCell>
                                <TableCell>
                                  <Chip size="small" label={h.result === "success" ? "成功" : "失敗"}
                                    color={h.result === "success" ? "success" : "error"} />
                                </TableCell>
                              </TableRow>
                            ))}
                          </TableBody>
                        </Table>
                      </TableContainer>
                    </Box>
                  )}
                </Stack>
              )}

            </CardContent>
          </Card>
        </Box>
      );
    }

    // ============================================================
    // ルートコンポーネント（App）
    // ============================================================
    function App() {
      const isDesktop = useMediaQuery(theme.breakpoints.up("lg"));

      // --- 状態 ---
      const [mobileOpen,     setMobileOpen]     = useState(false);
      const [sidebarOpen,    setSidebarOpen]    = useState(true);  // デスクトップ折りたたみ
      const [view,           setView]           = useState("dashboard");
      const [openNewRequest, setOpenNewRequest] = useState(false);
      const [detailOpen, setDetailOpen] = useState(false);
      const [reuseData, setReuseData] = useState(null);
      const [currentUser,    setCurrentUser]    = useState(DEMO_ACCOUNTS[0]);
      const [accountAnchorEl, setAccountAnchorEl] = useState(null);
      const [switchAnchorEl,  setSwitchAnchorEl]  = useState(null);
      const [selectedRequest, setSelectedRequest] = useState(MOCK_REQUESTS[0]);
      const [requests,        setRequests]        = useState(MOCK_REQUESTS);
      
      // デフォルト期間：今日から60日後
      const today = new Date().toISOString().split('T')[0];
      const sixtyDaysLater = new Date(Date.now() + 60 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
      
      const [filters, setFilters] = useState({ 
        keyword: "", 
        status: "", 
        type: "",
        completion: "incomplete",
        dateFrom: today,
        dateTo: sixtyDaysLater
      });

      const accountMenuOpen = Boolean(accountAnchorEl);
      const switchMenuOpen  = Boolean(switchAnchorEl);

      // ロールに応じた案件スコープ
      // 自部署の案件 + 自分がタスク担当者として割り当てられている案件
      const scopedRequests = useMemo(() => {
        const { role, dept, name } = currentUser;
        if (isOperatorOrAdmin(role)) return requests;
        return requests.filter(r =>
          r.department === dept ||
          r.requester === name ||
          (r.tasks && r.tasks.some(t => t.assignee === name))
        );
      }, [requests, currentUser]);

      useEffect(() => { if (isDesktop) setMobileOpen(false); }, [isDesktop]);

      // --- ハンドラ ---
      const handleSelectRequest = r => {
        setSelectedRequest(r);
        setDetailOpen(true);
        if (!isDesktop) setMobileOpen(false);
      };

      const handleReuse = r => {
        setReuseData({
          type: r.type, title: r.title, description: r.description,
          priority: r.priority, preferredDate: "", contact: r.contact || "",
          note: r.note || "", targetSystem: r.system || "",
          ...(r.formData || {})
        });
        setDetailOpen(false);
        setOpenNewRequest(true);
      };

      const handleSubmitted = form => {
        const now = new Date().toISOString().replace("T", " ").slice(0, 16);
        const tasks = buildTasks(form.type);
        tasks[0] = { ...tasks[0], assignee: currentUser.name, status: "完了", at: now };
        const nextTask = tasks.find(t => t.status === "未着手");
        if (nextTask) nextTask.status = "進行中";

        const templateId = TYPE_TEMPLATE_MAP[form.type] || "standard_C";
        const newReq = {
          id:          "WF-2026-" + String(requests.length + 1).padStart(4, "0"),
          title:       form.title || "新規申請",
          type:        form.type,
          requester:   currentUser.name,
          department:  currentUser.dept,
          assignee:    "未割当",
          vendor:      "なし",
          priority:    form.priority,
          dueDate:     form.preferredDate || "未設定",
          createdAt:   now,
          description: form.description,
          system:      form.targetSystem || "-",
          contact:     form.contact || "",
          note:        form.note || "",
          formData:    { ...form },
          workflow_def: { templateId, steps: null },
          attachments: (form.attachedFiles || []).map(f => ({
            name: f.name, size: f.size, addedAt: now
          })),
          evidences:   [],
          tasks:       tasks,
          rejectComment: null,
          notify:      defaultNotifySettings(),
          history:     [{ at: now, by: currentUser.name, action: "起票", op: "CREATE", ip: "—", result: "success" }]
        };
        setRequests([newReq, ...requests]);
        setSelectedRequest(newReq);
        setDetailOpen(true);
      };

      const handleAction = (action, request, task, comment, extra) => {
        const now = new Date().toISOString().replace("T", " ").slice(0, 16);
        if (action === "taskComplete" && task) {
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            const newTasks = r.tasks.map(t => {
              if (t.seq === task.seq) return { ...t, status: "完了", at: now };
              return t;
            });
            advanceTasks(newTasks, task.seq);
            const newHistory = [...r.history, { at: now, by: currentUser.name, action: task.name + " 完了", op: "COMPLETE", ip: "—", result: "success" }];
            return { ...r, tasks: newTasks, history: newHistory };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            const newTasks = prev.tasks.map(t => t.seq === task.seq ? { ...t, status: "完了", at: now } : t);
            advanceTasks(newTasks, task.seq);
            return { ...prev, tasks: newTasks, history: [...prev.history, { at: now, by: currentUser.name, action: task.name + " 完了", op: "COMPLETE", ip: "—", result: "success" }] };
          });
        }
        if (action === "taskReject" && task) {
          const rejectComment = comment || "";
          const targetSeq = extra; // 差戻し先タスクのseq
          const resetTasks = t => {
            if (t.status === "スキップ") return t;
            if (t.seq === task.seq) return { ...t, status: "差戻し", at: now };
            if (targetSeq && t.seq >= targetSeq && t.seq < task.seq) {
              return { ...t, status: t.seq === targetSeq ? "進行中" : "未着手", at: null };
            }
            return t;
          };
          const targetTask = request.tasks.find(t => t.seq === targetSeq);
          const targetLabel = targetTask ? " → #" + targetSeq + " " + targetTask.name : "";
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            const newTasks = r.tasks.map(resetTasks);
            const newHistory = [...r.history, { at: now, by: currentUser.name, action: task.name + " 差戻し" + targetLabel + ": " + rejectComment, op: "REJECT", ip: "—", result: "success" }];
            return { ...r, tasks: newTasks, history: newHistory, rejectComment: null };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            const newTasks = prev.tasks.map(resetTasks);
            return { ...prev, tasks: newTasks, rejectComment: null, history: [...prev.history, { at: now, by: currentUser.name, action: task.name + " 差戻し" + targetLabel + ": " + rejectComment, op: "REJECT", ip: "—", result: "success" }] };
          });
        }
        if (action === "resubmit") {
          // 再申請: タスクをリセットして起票から再開
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            const newTasks = r.tasks.map(t => {
              if (t.status === "スキップ") return t;
              if (t.seq === 1) return { ...t, status: "完了", at: now };
              if (t.seq === 2) return { ...t, status: "進行中", at: null };
              return { ...t, status: "未着手", at: null };
            });
            const newHistory = [...r.history, { at: now, by: currentUser.name, action: "再申請", op: "RESUBMIT", ip: "—", result: "success" }];
            return { ...r, tasks: newTasks, history: newHistory, rejectComment: null };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            const newTasks = prev.tasks.map(t => {
              if (t.status === "スキップ") return t;
              if (t.seq === 1) return { ...t, status: "完了", at: now };
              if (t.seq === 2) return { ...t, status: "進行中", at: null };
              return { ...t, status: "未着手", at: null };
            });
            return { ...prev, tasks: newTasks, rejectComment: null, history: [...prev.history, { at: now, by: currentUser.name, action: "再申請", op: "RESUBMIT", ip: "—", result: "success" }] };
          });
        }
        if (action === "resubmitWithEdit") {
          const form = comment;
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            const newTasks = r.tasks.map(t => {
              if (t.status === "スキップ") return t;
              if (t.seq === 1) return { ...t, status: "完了", at: now };
              if (t.seq === 2) return { ...t, status: "進行中", at: null };
              return { ...t, status: "未着手", at: null };
            });
            const newHistory = [...r.history, { at: now, by: currentUser.name, action: "再申請（修正）", op: "RESUBMIT", ip: "—", result: "success" }];
            return {
              ...r, tasks: newTasks, history: newHistory, rejectComment: null,
              title: form.title || r.title,
              description: form.description || r.description,
              priority: form.priority || r.priority,
              system: form.targetSystem || r.system,
              contact: form.contact || r.contact,
              note: form.note || r.note,
              formData: { ...r.formData, ...form }
            };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            const newTasks = prev.tasks.map(t => {
              if (t.status === "スキップ") return t;
              if (t.seq === 1) return { ...t, status: "完了", at: now };
              if (t.seq === 2) return { ...t, status: "進行中", at: null };
              return { ...t, status: "未着手", at: null };
            });
            return {
              ...prev, tasks: newTasks, rejectComment: null,
              title: form.title || prev.title,
              description: form.description || prev.description,
              priority: form.priority || prev.priority,
              system: form.targetSystem || prev.system,
              contact: form.contact || prev.contact,
              note: form.note || prev.note,
              formData: { ...prev.formData, ...form },
              history: [...prev.history, { at: now, by: currentUser.name, action: "再申請（修正）", op: "RESUBMIT", ip: "—", result: "success" }]
            };
          });
        }
        if (action === "taskReassign" && task && comment) {
          const newAssignee = comment;
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            const newTasks = r.tasks.map(t => t.seq === task.seq ? { ...t, assignee: newAssignee } : t);
            const newHistory = [...r.history, { at: now, by: currentUser.name, action: task.name + " 担当変更: " + newAssignee, op: "REASSIGN", ip: "—", result: "success" }];
            return { ...r, tasks: newTasks, history: newHistory };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            const newTasks = prev.tasks.map(t => t.seq === task.seq ? { ...t, assignee: newAssignee } : t);
            return { ...prev, tasks: newTasks, history: [...prev.history, { at: now, by: currentUser.name, action: task.name + " 担当変更: " + newAssignee, op: "REASSIGN", ip: "—", result: "success" }] };
          });
        }
        if (action === "updateRequest" && comment) {
          const updates = comment;
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            const newHistory = [...r.history, { at: now, by: currentUser.name, action: "案件情報更新", op: "UPDATE", ip: "—", result: "success" }];
            return { ...r, ...updates, history: newHistory };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            return { ...prev, ...updates, history: [...prev.history, { at: now, by: currentUser.name, action: "案件情報更新", op: "UPDATE", ip: "—", result: "success" }] };
          });
        }
        if (action === "rejectRequest" && task) {
          const reason = comment || "";
          const rejectReq = {
            by: currentUser.name,
            taskSeq: task.seq,
            taskName: task.name,
            reason: reason,
            at: now
          };
          const historyEntry = { at: now, by: currentUser.name, action: "差戻し依頼 #" + task.seq + " " + task.name + ": " + reason, op: "REJECT_REQUEST", ip: "—", result: "success" };
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            return { ...r, history: [...r.history, historyEntry], rejectComment: rejectReq };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            return { ...prev, history: [...prev.history, historyEntry], rejectComment: rejectReq };
          });
        }
        if (action === "updateTaskNotify" && task && comment) {
          const { notifyRoles, notifyCustom } = comment;
          const updateTasks = tasks => tasks.map(t => t.seq === task.seq ? { ...t, notifyRoles, notifyCustom } : t);
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            return { ...r, tasks: updateTasks(r.tasks) };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            return { ...prev, tasks: updateTasks(prev.tasks) };
          });
        }
        if (action === "cancelRequest") {
          // 中止: 進行中タスクの担当者を記録し、未着手に戻す
          const cancelTasks = tasks => tasks.map(t => {
            if (t.status === "進行中") return { ...t, status: "未着手", _wasCurrent: true };
            return t;
          });
          const activeTasks = request.tasks.filter(t => t.status === "進行中");
          const cancelledBy = activeTasks.map(t => t.assignee).filter(Boolean);
          const entry = { at: now, by: currentUser.name, action: "案件中止", op: "CANCEL", ip: "—", result: "success" };
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            return { ...r, cancelled: true, _cancelledBy: cancelledBy, tasks: cancelTasks(r.tasks), history: [...r.history, entry] };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            return { ...prev, cancelled: true, _cancelledBy: cancelledBy, tasks: cancelTasks(prev.tasks), history: [...prev.history, entry] };
          });
        }
        if (action === "resumeRequest") {
          // 復活: 中止前に進行中だったタスクを復元する
          const entry = { at: now, by: currentUser.name, action: "案件復活", op: "RESUME", ip: "—", result: "success" };
          const resumeTasks = tasks => {
            const newTasks = tasks.map(t => {
              if (t._wasCurrent) return { ...t, status: "進行中", _wasCurrent: undefined };
              return t;
            });
            // _wasCurrent がなければ最初の未着手を進行中にする
            if (!newTasks.some(t => t.status === "進行中")) {
              const next = newTasks.find(t => t.status === "未着手");
              if (next) next.status = "進行中";
            }
            return newTasks;
          };
          setRequests(prev => prev.map(r => {
            if (r.id !== request.id) return r;
            return { ...r, cancelled: false, _cancelledBy: null, tasks: resumeTasks(r.tasks), history: [...r.history, entry] };
          }));
          setSelectedRequest(prev => {
            if (!prev || prev.id !== request.id) return prev;
            return { ...prev, cancelled: false, _cancelledBy: null, tasks: resumeTasks(prev.tasks), history: [...prev.history, entry] };
          });
        }
      };

      // インライン編集: 1件の特定フィールドを更新
      const handleUpdateRequest = (id, field, value) => {
        setRequests(prev => prev.map(r => r.id === id ? { ...r, [field]: value } : r));
      };

      const handleChangeView = nextView => {
        setView(nextView);
        if (!isDesktop) setMobileOpen(false);
      };

      const handleSwitchAccount = user => {
        setCurrentUser(user);
        setSwitchAnchorEl(null);
        setView("dashboard");
      };

      // 全ロール新規作成可
      const canApply = true;

      // デスクトップ時の実効サイドバー幅
      const effectiveDrawerWidth = isDesktop ? (sidebarOpen ? DRAWER_WIDTH : DRAWER_WIDTH_MINI) : 0;

      // --- サイドバー内容 ---
      const drawerContent = (
        <Box sx={{ width: sidebarOpen ? DRAWER_WIDTH : DRAWER_WIDTH_MINI, display: "flex", flexDirection: "column", height: "100%", overflow: "hidden", transition: "width 0.2s" }}>
          {/* ロゴ + 折りたたみボタン */}
          <Box sx={{ display: "flex", alignItems: "center", px: 1.5, py: 1.5, minHeight: 56 }}>
            {sidebarOpen && (
              <Box sx={{ flexGrow: 1, overflow: "hidden" }}>
                <Typography variant="h6" sx={{ fontWeight: 800, whiteSpace: "nowrap" }}>Workflow Mock</Typography>
              </Box>
            )}
            <IconButton size="small" onClick={() => setSidebarOpen(v => !v)} sx={{ ml: sidebarOpen ? 0 : "auto", mr: sidebarOpen ? 0 : "auto" }}>
              <span className="material-icons">{sidebarOpen ? "chevron_left" : "chevron_right"}</span>
            </IconButton>
          </Box>
          <Divider />
          {/* ナビ */}
          <List sx={{ flexGrow: 1 }}>
            {NAV_ITEMS.map(item => (
              <ListItemButton key={item.key} selected={view === item.key}
                onClick={() => handleChangeView(item.key)}
                sx={{ justifyContent: sidebarOpen ? "flex-start" : "center", px: sidebarOpen ? 2 : 0 }}>
                <ListItemIcon sx={{ minWidth: sidebarOpen ? 40 : "unset", justifyContent: "center" }}>
                  <span className="material-icons">{item.icon}</span>
                </ListItemIcon>
                {sidebarOpen && (
                  <>
                    <ListItemText primary={item.label} />
                    {item.key === "list" && <Badge color="primary" badgeContent={scopedRequests.length} />}
                  </>
                )}
                {!sidebarOpen && item.key === "list" && (
                  <Badge color="primary" badgeContent={scopedRequests.length}
                    sx={{ position: "absolute", top: 6, right: 6 }} />
                )}
              </ListItemButton>
            ))}
          </List>
          <Divider />
          {/* 現在のアカウント表示 */}
          <Box sx={{ p: sidebarOpen ? 2 : 1, display: "flex", justifyContent: sidebarOpen ? "flex-start" : "center" }}>
            {sidebarOpen ? (
              <Stack spacing={0.5}>
                <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>
                  ログイン中
                </Typography>
                <Stack direction="row" spacing={1.5} alignItems="center" sx={{ mt: 0.5 }}>
                  <Avatar sx={{ width: 32, height: 32, bgcolor: currentUser.color, fontSize: 14 }}>
                    {currentUser.avatar}
                  </Avatar>
                  <Box sx={{ minWidth: 0 }}>
                    <Typography variant="body2" sx={{ fontWeight: 700 }} noWrap>{currentUser.name}</Typography>
                    <Typography variant="caption" color="text.secondary" noWrap>
                      {currentUser.dept} / {ROLE_LABEL[currentUser.role]}
                    </Typography>
                  </Box>
                </Stack>
              </Stack>
            ) : (
              <Avatar sx={{ width: 32, height: 32, bgcolor: currentUser.color, fontSize: 14 }}>
                {currentUser.avatar}
              </Avatar>
            )}
          </Box>
        </Box>
      );

      // --- 画面レンダリング ---
      const renderView = () => {
        if (view === "dashboard") return (
          <DashboardView requests={scopedRequests}
            filters={filters} setFilters={setFilters}
            onSelectRequest={handleSelectRequest}
            currentUser={currentUser}
            onGoNew={canApply ? () => setOpenNewRequest(true) : null} />
        );
        if (view === "list") return (
          <RequestListView requests={scopedRequests}
            filters={filters} setFilters={setFilters}
            onSelectRequest={handleSelectRequest}
            onGoNew={canApply ? () => setOpenNewRequest(true) : null}
            onReuse={handleReuse}
            onUpdateRequest={handleUpdateRequest}
            currentUser={currentUser} />
        );
        if (view === "tasks") return (
          <TaskListView requests={scopedRequests}
            filters={filters} setFilters={setFilters}
            onSelectRequest={handleSelectRequest}
            currentUser={currentUser} />
        );
        if (view === "analytics") return (
          <AnalyticsView requests={isOperatorOrAdmin(currentUser.role) ? requests : scopedRequests}
            filters={filters} setFilters={setFilters} currentUser={currentUser} />
        );
        return null;
      };

      return (
        <ThemeProvider theme={theme}>
          <CssBaseline />
          <Box sx={{ display: "flex", minHeight: "100%" }}>

            {/* ヘッダー AppBar */}
            <AppBar position="fixed" color="inherit" elevation={1}
              sx={{ width: { lg: `calc(100% - ${effectiveDrawerWidth}px)` }, ml: { lg: `${effectiveDrawerWidth}px` }, bgcolor: "#fff", transition: "width 0.2s, margin 0.2s" }}>
              <Toolbar>
                {!isDesktop && (
                  <IconButton edge="start" onClick={() => setMobileOpen(true)} sx={{ mr: 1 }}>
                    <span className="material-icons">menu</span>
                  </IconButton>
                )}
                <Box sx={{ flexGrow: 1, minWidth: 0 }}>
                  <Typography variant="h6" sx={{ fontWeight: 700, cursor: "pointer", "&:hover": { opacity: 0.8 } }}
                    onClick={() => setView("dashboard")}>ワークフロー</Typography>
                </Box>
                <Stack direction="row" spacing={1} alignItems="center">
                  {/* ロールバッジ */}
                  <Chip
                    size="small"
                    label={ROLE_LABEL[currentUser.role]}
                    sx={{ display: { xs: "none", sm: "inline-flex" },
                      bgcolor: currentUser.color, color: "#fff", fontWeight: 600 }}
                  />
                  {/* アカウントボタン */}
                  <Button color="inherit"
                    onClick={e => setAccountAnchorEl(e.currentTarget)}
                    sx={{ textTransform: "none", minWidth: 0, px: 1 }}>
                    <Stack direction="row" spacing={1} alignItems="center">
                      <Avatar sx={{ width: 28, height: 28, bgcolor: currentUser.color, fontSize: 13 }}>
                        {currentUser.avatar}
                      </Avatar>
                      <Box sx={{ textAlign: "left", display: { xs: "none", sm: "block" } }}>
                        <Typography variant="body2" sx={{ lineHeight: 1.1, fontWeight: 700 }}>{currentUser.name}</Typography>
                        <Typography variant="caption" color="text.secondary">{currentUser.dept}</Typography>
                      </Box>
                    </Stack>
                  </Button>
                </Stack>

                {/* アカウントメニュー */}
                <Menu anchorEl={accountAnchorEl} open={accountMenuOpen}
                  onClose={() => setAccountAnchorEl(null)}>
                  <Box sx={{ px: 2, py: 1, minWidth: 200 }}>
                    <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 600, textTransform: "uppercase" }}>
                      デモアカウント切替
                    </Typography>
                  </Box>
                  <Divider />
                  {DEMO_ACCOUNTS.map(u => (
                    <MenuItem key={u.id} selected={u.id === currentUser.id}
                      onClick={() => { setCurrentUser(u); setAccountAnchorEl(null); setView("dashboard"); }}>
                      <Stack direction="row" spacing={1.5} alignItems="center">
                        <Avatar sx={{ width: 28, height: 28, bgcolor: u.color, fontSize: 13 }}>{u.avatar}</Avatar>
                        <Box>
                          <Typography variant="body2" sx={{ fontWeight: u.id === currentUser.id ? 700 : 400 }}>
                            {u.name}
                          </Typography>
                          <Typography variant="caption" color="text.secondary">
                            {u.dept} / {ROLE_LABEL[u.role]}
                          </Typography>
                        </Box>
                      </Stack>
                    </MenuItem>
                  ))}
                </Menu>
              </Toolbar>
            </AppBar>

            {/* サイドバー */}
            <Box component="nav" sx={{ width: { lg: effectiveDrawerWidth }, flexShrink: { lg: 0 }, transition: "width 0.2s" }}>
              {/* モバイル: 一時ドロワー */}
              <Drawer variant="temporary" open={!isDesktop && mobileOpen}
                onClose={() => setMobileOpen(false)} ModalProps={{ keepMounted: true }}
                sx={{ display: { xs: "block", lg: "none" },
                  "& .MuiDrawer-paper": { width: DRAWER_WIDTH, boxSizing: "border-box" } }}>
                {drawerContent}
              </Drawer>
              {/* デスクトップ: 永続ドロワー（幅をアニメーション） */}
              <Drawer variant="permanent" open={isDesktop}
                sx={{ display: { xs: "none", lg: "block" },
                  "& .MuiDrawer-paper": {
                    width: effectiveDrawerWidth, boxSizing: "border-box",
                    borderRight: "1px solid rgba(0,0,0,0.08)",
                    overflowX: "hidden", transition: "width 0.2s"
                  } }}>
                {drawerContent}
              </Drawer>
            </Box>

            {/* メインコンテンツ */}
            <Box component="main"
              sx={{ flexGrow: 1, minWidth: 0,
                width: { lg: `calc(100% - ${effectiveDrawerWidth}px)` },
                p: { xs: 2, md: 3 }, mt: "64px", transition: "width 0.2s" }}>
              <Container maxWidth="xl">
                {renderView()}
              </Container>

              {/* 新規申請ダイアログ */}
              <Dialog open={openNewRequest} onClose={() => { setOpenNewRequest(false); setReuseData(null); }}
                fullWidth maxWidth="md" fullScreen={!isDesktop}>
                <DialogTitle sx={{ fontWeight: 700 }}>
                  {reuseData ? "案件を再利用して新規作成" : "新規作成"}
                </DialogTitle>
                <DialogContent dividers sx={{ p: { xs: 2, md: 3 } }}>
                  <NewRequestView
                    key={reuseData ? "reuse" : "new"}
                    onSubmitted={handleSubmitted}
                    currentUser={currentUser}
                    onClose={() => { setOpenNewRequest(false); setReuseData(null); }}
                    initialData={reuseData}
                  />
                </DialogContent>
              </Dialog>

              {/* 案件詳細モーダル */}
              <Dialog open={detailOpen} onClose={() => setDetailOpen(false)}
                fullWidth maxWidth="lg" fullScreen={!isDesktop}
                scroll="paper"
                PaperProps={{ sx: { maxHeight: "95vh" } }}>
                <DialogContent sx={{ p: 0 }}>
                  <RequestDetailView request={selectedRequest}
                    onBack={() => setDetailOpen(false)}
                    onAction={handleAction}
                    onReuse={handleReuse}
                    currentUser={currentUser} />
                </DialogContent>
              </Dialog>
            </Box>

          </Box>
        </ThemeProvider>
      );
    }

    // ============================================================
    // エントリポイント
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>
</html>
