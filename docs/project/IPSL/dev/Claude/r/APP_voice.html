<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script type="text/babel">
    const {useCallback,useEffect,useMemo,useRef,useState}=React;
    const APP_VERSION='0.9.0-dev';
    const APP_BUILD='2026-04-26-speaker-style-high-low';
    const SPEAKER_MODEL_VERSION='speaker-v3-style-thin-voice';
    const clamp01=(v)=>Math.max(0,Math.min(1,v));
    const nowIso=()=>new Date().toISOString();
    const makeId=(prefix='id')=>`${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
    const sleep=(ms)=>new Promise((resolve)=>setTimeout(resolve,ms));
    window.__VOICE_CONSOLE_LOG_ENABLED__=false;
    function voiceConsoleInfo(...args){if(window.__VOICE_CONSOLE_LOG_ENABLED__!==false)console.info(...args)}
    function voiceConsoleError(...args){if(window.__VOICE_CONSOLE_LOG_ENABLED__!==false)console.error(...args)}

    function getVoicePresenceScore(analyser,sampleRate){
      if(!analyser||!sampleRate)return 0;
      const data=new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const nyquist=sampleRate/2;
      let voiceSum=0,voiceWeight=0,noiseSum=0,noiseWeight=0;
      for(let i=0;i<data.length;i++){
        const hz=i/data.length*nyquist;
        const value=data[i]/255;
        if(hz>=120&&hz<=3600){const w=hz>=300&&hz<=2800?1.35:.75;voiceSum+=value*w;voiceWeight+=w}
        else if(hz<90||hz>5200){noiseSum+=value;noiseWeight+=1}
      }
      return clamp01((voiceWeight?voiceSum/voiceWeight:0)*2.35-(noiseWeight?noiseSum/noiseWeight:0)*.45);
    }

    function getVoiceSignature(analyser,sampleRate){
      if(!analyser||!sampleRate)return null;
      const data=new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const nyquist=sampleRate/2;
      let total=0,weightedHz=0,weightedHz2=0,peakHz=0,peakValue=0,geometricSum=0,arithmeticSum=0,binUsed=0,rolloffTotal=0,bass=0,lowMid=0,mid=0,upperMid=0,presence=0,brilliance=0,air=0,crestSum=0,previousValue=null,slopeSum=0,slopeWeight=0;
      const values=[];
      for(let i=0;i<data.length;i++){
        const hz=i/data.length*nyquist;
        if(hz<120||hz>4800)continue;
        const value=data[i]/255;
        if(value<=.01)continue;
        total+=value;weightedHz+=hz*value;weightedHz2+=hz*hz*value;rolloffTotal+=value;arithmeticSum+=value;geometricSum+=Math.log(Math.max(value,.000001));binUsed+=1;values.push({hz,value});
        if(hz<250)bass+=value;else if(hz<500)lowMid+=value;else if(hz<1000)mid+=value;else if(hz<2000)upperMid+=value;else if(hz<3000)presence+=value;else if(hz<3900)brilliance+=value;else air+=value;
        if(previousValue!=null)crestSum+=Math.abs(value-previousValue);
        previousValue=value;
        const slopeWeightValue=Math.log2(hz/120+1);
        slopeSum+=value*slopeWeightValue;slopeWeight+=value;
        if(value>peakValue){peakValue=value;peakHz=hz}
      }
      if(total<.6||binUsed<6)return null;
      const centroidHz=weightedHz/total;
      const spreadHz=Math.sqrt(Math.max(0,weightedHz2/total-centroidHz*centroidHz));
      const flatnessRaw=Math.exp(geometricSum/binUsed)/Math.max(.000001,arithmeticSum/binUsed);
      const rolloffTarget=rolloffTotal*.85;

)=>setGraphViewMode('waveform')}>波形</button><button className={graphViewMode==='frequency'?'active':''} onClick={()=>setGraphViewMode('frequency')}>周波数</button></div></div><div className="visuals-body">{!maximizedGraph&&graphViewMode==='combined'&&<div className="canvas-box"><button className="canvas-action" onClick={()=>setMaximizedGraph('combined')}>拡大</button><CombinedAudioCanvas analyser={analyser} fullAnalyser={rawAnalyser} isAudioActive={isAudioActive} thresholdRatio={visualThreshold} voiceFocusMode={effectiveVoiceFocusMode} lowCutHz={effectiveLowCutHz} highCutHz={effectiveHighCutHz} viewKey={graphViewMode}/></div>}{!maximizedGraph&&graphViewMode==='mic'&&<div className="canvas-box"><button className="canvas-action" onClick={()=>setMaximizedGraph('mic')}>拡大</button><MicLevelCanvas level={uiState.meterView.currentLevel} peak={uiState.meterView.peakLevel} voiceLevel={uiState.meterView.voicePresenceScore} inputLabel={uiState.meterView.inputStateLabel} isAudioActive={isAudioActive} viewKey={graphViewMode}/></div>}{!maximizedGraph&&(graphViewMode==='both'||graphViewMode==='stacked'||graphViewMode==='waveform')&&<div className="canvas-box"><button className="canvas-action" onClick={()=>setMaximizedGraph('waveform')}>拡大</button><WaveformCanvas analyser={analyser} isAudioActive={isAudioActive} viewKey={graphViewMode}/></div>}{!maximizedGraph&&(graphViewMode==='both'||graphViewMode==='stacked'||graphViewMode==='frequency')&&<div className="canvas-box"><button className="canvas-action" onClick={()=>setMaximizedGraph('frequency')}>拡大</button><Sunburst360Canvas analyser={analyser} fullAnalyser={rawAnalyser} isAudioActive={isAudioActive} thresholdRatio={visualThreshold} voiceFocusMode={effectiveVoiceFocusMode} lowCutHz={effectiveLowCutHz} highCutHz={effectiveHighCutHz} viewKey={graphViewMode}/></div>}</div><div className="visuals-resize-handle" role="separator" aria-label="グラフエリアの高さを調整" title={`グラフ高さ ${graphHeightVh}vh`} onMouseDown={startGraphResize} onTouchStart={startGraphResize}></div></section><section className={uiState.liveTranscriptRow?'panel live-strip':'panel live-strip empty'}><div className="live-strip-label">LIVE</div><div ref={liveTextRef} className="live-strip-text" title={uiState.liveTranscriptRow?.text||''}>{uiState.liveTranscriptRow?.text||'認識中のテキストはここに表示されます'}</div><div className="live-strip-meta"><span ref={liveConfidenceRef} className="chip blue" style={{display:uiState.liveTranscriptRow?.sttConfidence!=null?'inline-flex':'none'}}>{uiState.liveTranscriptRow?.sttConfidence!=null?`認識 ${Math.round((uiState.liveTranscriptRow.sttConfidence||0)*100)}%`:''}</span><span ref={liveStatusRef} className="chip amber" style={{display:uiState.liveTranscriptRow?.status?'inline-flex':'none'}}>{uiState.liveTranscriptRow?.status||''}</span>{uiState.isListening&&<span className="chip green">認識中</span>}</div></section>{maximizedGraph&&<div className="modal-backdrop" onClick={()=>setMaximizedGraph(null)}/>} {maximizedGraph&&<section className="graph-modal"><div className="graph-modal-head"><div><div className="graph-modal-title">{maximizedGraph==='combined'?'統合 / 波形 + 周波数':maximizedGraph==='mic'?'マイク入力レベル':maximizedGraph==='waveform'?'波形 / 入力レベル':'周波数 / 声帯域'}</div><div className="sub">{maximizedGraph==='combined'?'波形・周波数・声帯域比率を1枚で大きく表示':maximizedGraph==='mic'?'マイク入力レベルを0〜100%で大きく表示':maximizedGraph==='waveform'?'入力レベルとピークを大きく表示':'声帯域比率と周波数分布を大きく表示'}</div></div><button className="action" onClick={()=>setMaximizedGraph(null)}>閉じる</button></div><div className="graph-modal-body"><div className="canvas-box">{maximizedGraph==='combined'?<CombinedAudioCanvas analyser={analyser} fullAnalyser={rawAnalyser} isAudioActive={isAudioActive} thresholdRatio={visualThreshold} voiceFocusMode={effectiveVoiceFocusMode} lowCutHz={effectiveLowCutHz} highCutHz={effectiveHighCutHz} viewKey={graphViewMode}/>:maximizedGraph==='mic'?<MicLevelCanvas level={uiState.meterView.currentLevel} peak={uiState.meterView.peakLevel} voiceLevel={uiState.meterView.voicePresenceScore} inputLabel={uiState.meterView.inputStateLabel} isAudioActive={isAudioActive} viewKey={graphViewMode}/>:maximizedGraph==='waveform'?<WaveformCanvas analyser={analyser} isAudioActive={isAudioActive} viewKey={graphViewMode}/>:<Sunburst360Canvas analyser={analyser} fullAnalyser={rawAnalyser} isAudioActive={isAudioActive} thresholdRatio={visualThreshold} voiceFocusMode={effectiveVoiceFocusMode} lowCutHz={effectiveLowCutHz} highCutHz={effectiveHighCutHz} viewKey={graphViewMode}/>}</div></div></section>}{splitTarget&&<div className="modal-backdrop" onClick={closeSplitTranscript}/>} {splitTarget&&<section className="graph-modal"><div className="graph-modal-head"><div><div className="graph-modal-title">認識結果を後分割</div><div className="sub">1行につき1レコードになります。話者を指定する場合は「話者名: テキスト」と書いてください。</div></div><button className="action" onClick={closeSplitTranscript}>閉じる</button></div><div className="split-modal-body"><div className="chips"><span className="chip blue">元話者 {splitTarget.speaker||'不明'}</span><span className="chip">開始 {formatClock(splitTarget.startedAt||splitTarget.createdAt)}</span><span className="chip">終了 {splitTarget.endedAt?formatClock(splitTarget.endedAt):'-'}</span><span className="chip">音声 {splitTarget.audioId?splitTarget.audioId.slice(-6):'-'}</span></div><textarea className="split-editor" value={splitText} onChange={(e)=>setSplitText(e.target.value)}/><div className="split-actions"><span className="hint">例: 話者1: こんにちは / 話者2: はい、お願いします</span><button className="action" onClick={closeSplitTranscript}>キャンセル</button><button className="action primary" onClick={applySplitTranscript}>分割して保存</button></div></div></section>}{speakerFeatureModal&&<div className="modal-backdrop" onClick={()=>setSpeakerFeatureModal(null)}/>} {speakerFeatureModal&&<section className="graph-modal"><div className="graph-modal-head"><div><div className="graph-modal-title">{speakerFeatureModal.name||speakerFeatureModal.label}</div><div className="sub">{speakerFeatureModal.label} / {speakerFeatureModal.featureBasis}</div></div><button className="action" onClick={()=>setSpeakerFeatureModal(null)}>閉じる</button></div><div className="graph-modal-body"><div className="canvas-box"><SpeakerFeatureSunburstCanvas speaker={speakerFeatureModal}/></div></div></section>}{resultAreaMaximized&&<div className="modal-backdrop" onClick={()=>setResultAreaMaximized(false)}/>}<section className={resultAreaMaximized?'panel tabs maximized':resultsOpen?'panel tabs':'panel tabs results-collapsed'}><div className="result-head"><div className="tab-head"><button className={bottomTab==='results'?'active':''} onClick={()=>setBottomTab('results')}>認識結果 ({transcriptRows.length})</button><button className={bottomTab==='raw'?'active':''} onClick={()=>setBottomTab('raw')}>RAW ({rawRows.length})</button><button className={bottomTab==='speakers'?'active':''} onClick={()=>setBottomTab('speakers')}>話者データ ({speakerRows.length})</button><button className={bottomTab==='audio'?'active':''} onClick={()=>setBottomTab('audio')}>音声データ ({audioRows.length})</button><button className={bottomTab==='logs'?'active':''} onClick={()=>setBottomTab('logs')}>ログ ({logs.length})</button></div><div className="result-head-actions"><button className="action" disabled={resultAreaMaximized} onClick={()=>setResultsOpen((v)=>!v)}>{resultsOpen?'折りたたむ':'開く'}</button><button className="action" onClick={()=>{setResultsOpen(true);setResultAreaMaximized((v)=>!v)}}>{resultAreaMaximized?'元に戻す':'拡大'}</button></div></div>{bottomTab==='results'&&<div className="tab-body"><div className="searchbar"><input type="text" placeholder="認識結果を検索" value={resultFilterInput} onChange={(e)=>setResultFilterInput(e.target.value)}/><button className="action" onClick={()=>setResultFilterApplied(resultFilterInput)}>検索</button><button className="action" onClick={()=>{setResultFilterInput('');setResultFilterApplied('')}}>クリア</button></div><div className="toolbar"><button className="action" disabled={!transcriptRows.length} onClick={()=>setSelectedTranscriptIds(new Set(transcriptRows.map((r)=>r.id)))}>全選択</button><button className="action" disabled={!selectedTranscriptIds.size} onClick={()=>setSelectedTranscriptIds(new Set())}>全解除</button><button className="action" disabled={!selectedTranscriptRows.length} onClick={()=>exportTxt(selectedTranscriptRows)}>TXT</button><button className="action" disabled={!selectedTranscriptRows.length} onClick={()=>exportCsv(selectedTranscriptRows,'transcript-selected')}>CSV</button><button className="action" disabled={!transcriptRows.length} onClick={()=>exportCsv(transcriptRows,'transcript-all')}>全CSV</button><button className="action" disabled={!selectedTranscriptRows.length} onClick={removeSelectedTranscriptRows}>削除</button></div><div className="table-wrap"><table><thead><tr><th></th><th>開始</th><th>終了</th><th>話者</th><th>話者信頼度</th><th>認識信頼度</th><th>テキスト</th><th>状態</th><th>音声</th><th>操作</th></tr></thead><tbody>{displayTranscriptRows.length===0?<tr><td colSpan="10">認識結果はまだありません。</td></tr>:displayTranscriptRows.map((row)=>{const linkedAudio=row.audioId?audioMap.get(row.audioId):null;const selected=!row.isLive&&selectedTranscriptIds.has(row.id);return<tr key={row.id} className={row.isLive?'live-row':''}><td>{row.isLive?null:<input type="checkbox" checked={selected} onChange={()=>toggleTranscript(row.id)}/>}</td><td className="nowrap">{formatClock(row.startedAt||row.createdAt)}</td><td className="nowrap">{row.endedAt?formatClock(row.endedAt):'-'}</td><td className="nowrap">{row.speaker||'不明'}{row.needsReview&&<span className="chip red">要確認</span>}</td><td className="nowrap">{row.speakerConfidence!=null?`${Math.round((row.speakerConfidence||0)*100)}%`:'-'}</td><td className="nowrap">{row.sttConfidence!=null?`${Math.round((row.sttConfidence||0)*100)}%`:'-'}</td><td>{row.text}</td><td className="nowrap">{row.status}{row.speakerSource==='provisional'&&<span className="chip amber">仮</span>}{row.speakerSource==='final-pass'&&<span className="chip green">再判定</span>}{row.speakerSource==='merged-final'&&<span className="chip purple">統合</span>}</td><td className="nowrap">{linkedAudio?linkedAudio.id.slice(-6):'-'}</td><td className="nowrap">{row.isLive?null:<button className="action" onClick={()=>openSplitTranscript(row)}>分割</button>}</td></tr>})}</tbody></table></div><div className="hint">フィルター: {resultFilterApplied||'なし'}</div></div>}{bottomTab==='raw'&&<div className="tab-body" style={{gridTemplateRows:'auto minmax(0,1fr) auto'}}><div className="toolbar"><button className="action" disabled={!rawRows.length} onClick={()=>exportCsv(rawRows,'raw-transcript')}>RAW CSV</button><button className="action" disabled={!rawRows.length} onClick={copyRawRows}>RAWコピー</button><button className="action" disabled={!rawRows.length} onClick={()=>setRawRows([])}>RAW削除</button><span className="hint">RAWは軽量化のため、同一セッションの連続認識をできるだけ1行にまとめます。</span></div><div className="table-wrap"><table><thead><tr><th>作成</th><th>開始</th><th>終了</th><th>モード</th><th>状態</th><th>認識信頼度</th><th>音声</th><th>塊</th><th>RAWテキスト</th></tr></thead><tbody>{rawRows.length===0?<tr><td colSpan="9">RAW認識結果はまだありません。</td></tr>:rawRows.map((row)=><tr key={row.id}><td className="nowrap">{formatClock(row.createdAt)}</td><td className="nowrap">{formatClock(row.startedAt||row.createdAt)}</td><td className="nowrap">{row.endedAt?formatClock(row.endedAt):'-'}</td><td className="nowrap">{row.mode||'-'}</td><td className="nowrap">{row.status||'-'}</td><td className="nowrap">{row.sttConfidence!=null?`${Math.round((row.sttConfidence||0)*100)}%`:'-'}</td><td className="nowrap">{row.audioId?row.audioId.slice(-6):'-'}</td><td className="nowrap">{row.chunkCount||1}</td><td>{row.text}</td></tr>)}</tbody></table></div><div className="hint">RAW {rawRows.length}件 / chunk合計 {rawRows.reduce((sum,row)=>sum+(row.chunkCount||1),0)}</div></div>}{bottomTab==='speakers'&&<div className="tab-body" style={{gridTemplateRows:'auto minmax(0,1fr) auto'}}><div className="toolbar"><label className="check"><span>最終人数</span><select value={finalSpeakerCount} onChange={(e)=>setFinalSpeakerCount(Number(e.target.value))}>{Array.from({length:10},(_,i)=>i+1).map((n)=><option key={n} value={n}>{n}人</option>)}</select></label><button className="action" onClick={()=>mergeSpeakerProfilesToCount(finalSpeakerCount)} disabled={!speakerIdentificationEnabled||speakerRows.length<=finalSpeakerCount}>指定人数へ統合</button><button className="action" onClick={resetSpeakerProfiles} disabled={!speakerIdentificationEnabled||speakerMode!=='auto'}>話者学習リセット</button><span className="hint">リアルタイム学習は残し、多めに分けた話者を最後に指定人数へ統合します。行クリックまたは詳細ボタンで特徴チャートを表示します。</span></div><div className="table-wrap"><table><thead><tr><th>話者</th><th>名前</th><th>状態</th><th>主特徴</th><th>信頼度</th><th>発言</th><th>時間</th><th>文字</th><th>学習</th><th>話速学習</th><th>詳細</th></tr></thead><tbody>{speakerRows.length===0?<tr><td colSpan="11">話者データはまだありません。</td></tr>:speakerRows.map((row)=><tr key={row.label} className="clickable-row" title="クリックで話者特徴を表示" onClick={()=>setSpeakerFeatureModal(row)}><td className="nowrap"><span className="chip blue fixed-sm">{row.label}</span></td><td><input className="speaker-name-input" type="text" value={row.name} onClick={(e)=>e.stopPropagation()} onChange={(e)=>updateSpeakerName(row.label,e.target.value)}/></td><td className="nowrap"><span className={`chip ${row.status.className}`}>{row.status.label}</span></td><td className="speaker-feature-cell">{row.featureBasis}</td><td className="nowrap"><div className="speaker-stat"><div className="speaker-stat-main">{(row.averageConfidence*100).toFixed(0)}%</div><div className={`confidence-meter ${row.status.className}`}><div className="confidence-meter-fill" style={{width:`${Math.round((row.averageConfidence||0)*100)}%`}}/></div></div></td><td className="nowrap"><div className="speaker-stat"><div className="speaker-stat-main">{row.utteranceCount}件</div><div className="speaker-stat-sub">発言数</div></div></td><td className="nowrap"><div className="speaker-stat"><div className="speaker-stat-main">{formatDuration(row.totalSec)}</div><div className="speaker-stat-sub">合計時間</div></div></td><td className="nowrap"><div className="speaker-stat"><div className="speaker-stat-main">{row.charCount}字</div><div className="speaker-stat-sub">文字量</div></div></td><td className="nowrap"><div className="speaker-stat"><div className="speaker-stat-main">{row.sampleCount}</div><div className="speaker-stat-sub">サンプル</div></div></td><td className="nowrap"><div className="speaker-stat"><div className="speaker-stat-main">{row.styleCount}</div><div className="speaker-stat-sub">スタイル</div></div></td><td className="nowrap"><button className="action" onClick={(e)=>{e.stopPropagation();setSpeakerFeatureModal(row)}}>詳細</button></td></tr>)}</tbody></table></div><div className="hint">状態は信頼度・発言数・学習サンプル数から表示します。</div></div>}{bottomTab==='audio'&&<div className="tab-body" style={{gridTemplateRows:'auto minmax(0,1fr) auto'}}><div className="toolbar"><input ref={audioFileInputRef} type="file" accept="audio/*" style={{display:'none'}} onChange={recognizeUploadedAudioFile}/><button className="action" onClick={()=>audioFileInputRef.current?.click()} disabled={!!recognizingAudioId}>{recognizingAudioId?'認識中':'音声ファイル認識'}</button><button className="action" disabled={!audioRows.length} onClick={()=>setSelectedAudioIds(new Set(audioRows.map((r)=>r.id)))}>全選択</button><button className="action" disabled={!selectedAudioIds.size} onClick={()=>setSelectedAudioIds(new Set())}>全解除</button><button className="action" disabled={!selectedAudioRows.length} onClick={removeSelectedAudioRows}>選択削除</button><span className="hint">音声ファイル認識は captureStream のTrackを SpeechRecognition に渡して試します。再生確認・名前編集・出力をカード単位で操作できます。</span></div><div className="audio-list">{audioRows.length===0?<div className="hint">音声データはまだありません。</div>:audioRows.map((row,index)=>{const selected=selectedAudioIds.has(row.id);const labels=row.linkedTranscriptIds.map((id)=>transcriptMap.get(id)).filter(Boolean).slice(0,3).map((t)=>formatClock(t.createdAt));return<article key={row.id} className="audio-card"><input type="checkbox" checked={selected} onChange={()=>toggleAudio(row.id)}/><div className="audio-card-main"><input className="audio-card-name" type="text" value={row.name||`音声${index+1}`} onChange={(e)=>updateAudioName(row.id,e.target.value)}/><div className="audio-meta"><span className="chip blue">#{index+1}</span><span className="chip">開始 {formatClock(row.startedAt)}</span><span className="chip">終了 {formatClock(row.endedAt)}</span><span className="chip">長さ {formatDuration(row.mediaDurationSec||row.durationSec)}</span><span className="chip">{row.approxSizeKB}KB</span><span className="chip">{row.mimeType||'-'}</span>{labels.length>0&&<span className="chip green">認識 {labels.join(', ')}</span>}</div></div><div className="audio-player-wrap">{row.url?<audio className="audio-player" controls src={row.url} onLoadedMetadata={(e)=>updateAudioMediaDuration(row.id,e.currentTarget.duration)}/>: '-'}</div><div className="audio-actions"><button className="action" onClick={()=>recognizeRecordedAudio(row)} disabled={!!recognizingAudioId}>{recognizingAudioId===row.id?'再認識中':'再認識'}</button><button className="action" onClick={()=>downloadAudioRow(row,index)}>出力</button></div></article>})}</div><div className="hint">選択 {selectedAudioRows.length} / 全 {audioRows.length}</div></div>}{bottomTab==='logs'&&<div className="tab-body" style={{gridTemplateRows:'auto minmax(0,1fr) auto'}}><div className="toolbar"><button className="action" disabled={!logs.length} onClick={copyLogs}>ログコピー</button><button className="action" disabled={!logs.length} onClick={()=>setLogs([])}>ログ削除</button><span className="hint">エラーは詳細を展開表示します。コピーには詳細も含まれます。</span></div><div className="logs">{logs.length===0?<div>ログはまだありません。</div>:logs.map((log,index)=>{const item=typeof log==='string'?{id:`legacy-${index}`,time:'',level:'info',message:log,detail:''}:log;return<div key={item.id||index} style={{marginBottom:item.detail?8:2}}><div>{item.time} {item.level==='error'?'[ERROR]':'[INFO]'} {item.message}</div>{item.detail&&<pre style={{whiteSpace:'pre-wrap',margin:'3px 0 0',padding:'6px',border:'1px solid rgba(248,113,113,.25)',borderRadius:8,background:'rgba(127,29,29,.24)',color:'#fee2e2'}}>{item.detail}</pre>}</div>})}</div><div className="hint">ログ {logs.length}件</div></div>}</section></main><footer className="footer"><div className="footer-actions"><label className="footer-recording-toggle"><input type="checkbox" checked={settings.recognition} onChange={(e)=>handleRecognitionToggle(e.target.checked)}/><span>認識</span></label><label className="footer-recording-toggle"><input type="checkbox" checked={settings.recording} onChange={(e)=>handleRecordingToggle(e.target.checked)}/><span>録音</span></label><button className="action" onClick={kickSpeakerChange} disabled={!speakerIdentificationEnabled||!uiState.isListening}>話者違い</button><button className={isActive?'action primary stop':'action primary'} onClick={handleMainAction}>{isActive?'停止':'開始'}</button></div></footer></div>;
    }
