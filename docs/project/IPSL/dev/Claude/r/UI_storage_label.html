<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>他システム共有 UIモック - Refactored</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />

  <style>
    html, body, #root { margin: 0; min-height: 100%; font-family: Roboto, sans-serif; background: #f6f7fb; }
    button, input, textarea, select { font: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18.3.1/umd/react-is.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@emotion/react@11.11.4/dist/emotion-react.umd.min.js"></script>
  <script crossorigin src="https://unpkg.com/@emotion/styled@11.14.1/dist/emotion-styled.umd.min.js"></script>
  <script crossorigin src="https://unpkg.com/@mui/material@5.18.0/umd/material-ui.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script type="text/babel">
    const {
      Alert, AppBar, Box, Breadcrumbs, Button, Checkbox, Chip, Collapse, CssBaseline,
      Dialog, DialogActions, DialogContent, DialogTitle, Divider, FormControl,
      FormControlLabel, Icon, InputLabel, Link, List, ListItemButton, ListItemIcon,
      ListItemText, MenuItem, Paper, Select, Snackbar, Stack, Table, TableBody,
      TableCell, TableContainer, TableHead, TableRow, TextField, Toolbar, Typography
    } = MaterialUI;

    const ACCENTS = {
      content: {
        main: "#1976d2",
        dark: "#115293",
        light: "rgba(25, 118, 210, 0.08)"
      },
      ai: {
        main: "#7b1fa2",
        dark: "#4a0072",
        light: "rgba(123, 31, 162, 0.08)"
      }
    };

    const DEPARTMENTS = [
      { id: "sales", name: "営業部", icon: "business_center" },
      { id: "it", name: "情報システム部", icon: "settings" },
      { id: "training", name: "人材開発部", icon: "school" },
      { id: "hr", name: "人事部", icon: "groups" }
    ];

    const ACCOUNTS = [
      {
        id: "admin",
        name: "全社管理者",
        role: "全社管理",
        departmentIds: ["sales", "it", "training", "hr"]
      },
      {
        id: "sales-manager",
        name: "営業部マネージャー",
        role: "営業部",
        departmentIds: ["sales"]
      },
      {
        id: "it-admin",
        name: "情シス管理者",
        role: "情報システム部",
        departmentIds: ["it"]
      },
      {
        id: "hr-training",
        name: "人事・研修担当",
        role: "人事 / 研修",
        departmentIds: ["hr", "training"]
      }
    ];

    const AGENTS = [
      {
        id: "sales",
        departmentId: "sales",
        name: "営業支援AI",
        description: "製品FAQ・提案資料を参照"
      },
      {
        id: "customer-success",
        departmentId: "sales",
        name: "顧客対応AI",
        description: "顧客向けFAQ・対応履歴を参照"
      },
      {
        id: "helpdesk",
        departmentId: "it",
        name: "社内ヘルプデスクAI",
        description: "社内規程・手順書を参照"
      },
      {
        id: "security",
        departmentId: "it",
        name: "セキュリティQA AI",
        description: "情報セキュリティ資料を参照"
      },
      {
        id: "training",
        departmentId: "training",
        name: "研修AI",
        description: "新人研修・FAQを参照"
      },
      {
        id: "hr",
        departmentId: "hr",
        name: "人事問い合わせAI",
        description: "人事制度・申請手順を参照"
      }
    ];

    const SHARE_SYSTEMS = [
      {
        id: "ai-chatbot",
        name: "AIチャットボット",
        icon: "smart_toy",
        description: "AIエージェントの参照対象として利用します。",
        fields: [
          {
            key: "agentIds",
            label: "AIエージェント",
            type: "checkboxGroup",
            required: true,
            options: AGENTS.map((agent) => ({
              value: agent.id,
              label: agent.name
            }))
          },
          {
            key: "usageMode",
            label: "利用モード",
            type: "select",
            required: true,
            defaultValue: "reference",
            options: [
              { value: "reference", label: "参照のみ" },
              { value: "answer-source", label: "回答根拠として利用" }
            ]
          }
        ]
      },
      {
        id: "knowledge-portal",
        name: "ナレッジポータル",
        icon: "public",
        description: "社内ポータルの公開スペースに共有します。",
        fields: [
          {
            key: "space",
            label: "公開スペース",
            type: "select",
            required: true,
            options: [
              { value: "company", label: "全社ポータル" },
              { value: "sales", label: "営業部ポータル" },
              { value: "training", label: "研修ポータル" }
            ]
          },
          {
            key: "notify",
            label: "関係者に通知する",
            type: "checkbox",
            required: false,
            defaultValue: true
          }
        ]
      },
      {
        id: "workflow",
        name: "承認ワークフロー",
        icon: "approval",
        description: "承認申請の添付参照として共有します。",
        fields: [
          {
            key: "route",
            label: "承認ルート",
            type: "select",
            required: true,
            options: [
              { value: "manager", label: "上長承認" },
              { value: "legal", label: "法務確認" },
              { value: "security", label: "情報システム確認" }
            ]
          },
          {
            key: "comment",
            label: "共有メモ",
            type: "text",
            required: false,
            placeholder: "任意でメモを入力"
          }
        ]
      }
    ];

    const FOLDERS = [
      { path: "/", name: "すべて", parent: null },
      { path: "/規程", name: "規程", parent: "/" },
      { path: "/規程/AI", name: "AI", parent: "/規程" },
      { path: "/営業", name: "営業", parent: "/" },
      { path: "/営業/FAQ", name: "FAQ", parent: "/営業" },
      { path: "/研修", name: "研修", parent: "/" },
      { path: "/研修/新人", name: "新人", parent: "/研修" },
      { path: "/人事", name: "人事", parent: "/" }
    ];

    const FILES = [
      {
        id: "doc-001",
        name: "社内AI利用ポリシー.pdf",
        folder: "/規程/AI",
        type: "PDF",
        updatedAt: "2026-05-20",
        allowed: true
      },
      {
        id: "doc-002",
        name: "製品FAQ.docx",
        folder: "/営業/FAQ",
        type: "DOCX",
        updatedAt: "2026-05-22",
        allowed: true
      },
      {
        id: "doc-003",
        name: "人事評価メモ.xlsx",
        folder: "/人事",
        type: "XLSX",
        updatedAt: "2026-05-18",
        allowed: false
      },
      {
        id: "doc-004",
        name: "新人研修ガイド.pdf",
        folder: "/研修/新人",
        type: "PDF",
        updatedAt: "2026-05-23",
        allowed: true
      }
    ];

    const INITIAL_SHARE_RECORDS = [
      {
        id: "share-001",
        systemId: "ai-chatbot",
        fileId: "doc-002",
        config: {
          agentIds: ["sales"],
          usageMode: "reference"
        }
      },
      {
        id: "share-002",
        systemId: "ai-chatbot",
        fileId: "doc-001",
        config: {
          agentIds: ["helpdesk"],
          usageMode: "reference"
        }
      },
      {
        id: "share-003",
        systemId: "ai-chatbot",
        fileId: "doc-004",
        config: {
          agentIds: ["training"],
          usageMode: "reference"
        }
      }
    ];


    const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    const fileKey = (id) => `file:${id}`;
    const folderKey = (path) => `folder:${path}`;

    const Domain = (() => {
      const byId = (items) => new Map(items.map((item) => [item.id, item]));

      const indexes = {
        departments: byId(DEPARTMENTS),
        accounts: byId(ACCOUNTS),
        agents: byId(AGENTS),
        systems: byId(SHARE_SYSTEMS),
        files: byId(FILES),
        foldersByPath: new Map(FOLDERS.map((folder) => [folder.path, folder])),
      };

      const parentPath = (path) => {
        if (!path || path === "/") return "";
        const parts = path.split("/").filter(Boolean);
        parts.pop();
        return parts.length ? `/${parts.join("/")}` : "/";
      };

      const isUnderFolder = (fileFolder, folderPath) =>
        folderPath === "/" || fileFolder === folderPath || fileFolder.startsWith(`${folderPath}/`);

      const breadcrumbs = (path) => {
        const parts = path.split("/").filter(Boolean);
        const result = [{ label: "ルート", path: "/" }];
        parts.reduce((acc, part) => {
          const next = `${acc}/${part}`.replace("//", "/");
          result.push({ label: indexes.foldersByPath.get(next)?.name || part, path: next });
          return next;
        }, "");
        return result;
      };

      const immediateChildPath = (currentPath, targetFolder) => {
        if (currentPath === targetFolder) return "";
        if (currentPath !== "/" && !targetFolder.startsWith(`${currentPath}/`)) return "";
        const currentParts = currentPath.split("/").filter(Boolean);
        const targetParts = targetFolder.split("/").filter(Boolean);
        return `/${targetParts.slice(0, currentParts.length + 1).join("/")}`;
      };

      const account = (id) => indexes.accounts.get(id) || ACCOUNTS[0];
      const manageableDepartments = (account) => DEPARTMENTS.filter((d) => account.departmentIds.includes(d.id));
      const manageableAgents = (account) => AGENTS.filter((a) => account.departmentIds.includes(a.departmentId));

      const defaultFormValues = (systemId) => {
        const system = indexes.systems.get(systemId);
        if (!system) return {};
        return system.fields.reduce((values, field) => {
          if (field.defaultValue !== undefined) values[field.key] = field.defaultValue;
          else if (field.type === "checkboxGroup") values[field.key] = [];
          else if (field.type === "checkbox") values[field.key] = false;
          else values[field.key] = "";
          return values;
        }, {});
      };

      const effectiveSystem = (systemId, account) => {
        const system = indexes.systems.get(systemId);
        if (!system) return null;

        if (system.id !== "ai-chatbot") return system;

        const allowedAgentIds = new Set(manageableAgents(account).map((agent) => agent.id));
        return {
          ...system,
          fields: system.fields.map((field) =>
            field.key === "agentIds"
              ? {
                  ...field,
                  helperText: "現在のアカウントで管理できるAIエージェントのみ表示しています。",
                  options: field.options.filter((option) => allowedAgentIds.has(option.value)),
                }
              : field
          ),
        };
      };

      return { indexes, parentPath, isUnderFolder, breadcrumbs, immediateChildPath, account,
        manageableDepartments, manageableAgents, defaultFormValues, effectiveSystem };
    })();

    const Selectors = {
      sourceEntries(state) {
        const q = state.keyword.trim().toLowerCase();
        const folders = FOLDERS
          .filter((folder) => folder.parent === state.sourcePath)
          .map((folder) => ({ kind: "folder", key: folderKey(folder.path), ...folder }));
        const files = FILES
          .filter((file) => file.folder === state.sourcePath)
          .map((file) => ({ kind: "file", key: fileKey(file.id), ...file }));

        return [...folders, ...files].filter((item) => {
          if (!q) return true;
          return [item.name, item.folder, item.type].some((value) => String(value || "").toLowerCase().includes(q));
        });
      },

      selectedFiles(state) {
        const files = new Map();
        state.selectedKeys.forEach((key) => {
          if (key.startsWith("file:")) {
            const file = Domain.indexes.files.get(key.replace("file:", ""));
            if (file) files.set(file.id, file);
          }
          if (key.startsWith("folder:")) {
            const path = key.replace("folder:", "");
            FILES.filter((file) => Domain.isUnderFolder(file.folder, path)).forEach((file) => files.set(file.id, file));
          }
        });
        return [...files.values()];
      },

      aiProjection(state, agentId) {
        const fileIds = new Set();
        state.shareRecords.forEach((record) => {
          if (record.systemId !== "ai-chatbot") return;
          const agentIds = Array.isArray(record.config.agentIds) ? record.config.agentIds : [];
          if (agentIds.includes(agentId)) fileIds.add(record.fileId);
        });

        const files = FILES.filter((file) => fileIds.has(file.id));
        const visibleFolders = new Set(["/"]);
        files.forEach((file) => {
          let path = file.folder;
          while (path) {
            visibleFolders.add(path);
            path = Domain.parentPath(path);
          }
        });

        return {
          files,
          folders: FOLDERS.filter((folder) => visibleFolders.has(folder.path)),
        };
      },

      aiEntries(aiPath, aiFiles) {
        const childFolderPaths = new Set();
        aiFiles.forEach((file) => {
          const child = Domain.immediateChildPath(aiPath, file.folder);
          if (child) childFolderPaths.add(child);
        });

        return [
          ...FOLDERS.filter((folder) => childFolderPaths.has(folder.path)).map((folder) => ({ kind: "folder", key: folderKey(folder.path), ...folder })),
          ...aiFiles.filter((file) => file.folder === aiPath).map((file) => ({ kind: "file", key: fileKey(file.id), ...file })),
        ];
      },

      agentFileCounts(state) {
        const counts = Object.fromEntries(AGENTS.map((agent) => [agent.id, 0]));
        AGENTS.forEach((agent) => {
          counts[agent.id] = this.aiProjection(state, agent.id).files.length;
        });
        return counts;
      },
    };

    const SharePlanner = {
      createPlan({ state, account, systemId, form }) {
        const system = Domain.effectiveSystem(systemId, account);
        const selectedFiles = Selectors.selectedFiles(state);
        const targetFiles = selectedFiles.filter((file) => file.allowed);
        return {
          id: `plan-${uid()}`,
          accountId: account.id,
          systemId,
          system,
          form,
          selectedCount: selectedFiles.length,
          targetFiles,
          cost: { recordsToCreate: targetFiles.length },
          strategy: targetFiles.length > 20 ? "batch" : "direct",
        };
      },

      validate(plan) {
        if (!plan.system) return "共有先システムを選択してください。";
        if (plan.selectedCount === 0) return "ファイルまたはフォルダを選択してください。";
        if (plan.targetFiles.length === 0) return "共有可能なファイルがありません。";

        for (const field of plan.system.fields) {
          const value = plan.form[field.key];
          if (field.type === "checkboxGroup") {
            const allowedValues = new Set((field.options || []).map((option) => option.value));
            if (Array.isArray(value) && value.some((item) => !allowedValues.has(item))) {
              return `${field.label}に現在のアカウントでは選択できない項目が含まれています。`;
            }
            if (field.required && (!Array.isArray(value) || value.length === 0)) {
              return `${field.label}を1つ以上選択してください。`;
            }
          } else if (field.required && (value === "" || value === undefined || value === null)) {
            return `${field.label}を選択してください。`;
          }
        }
        return "";
      },

      execute(plan) {
        return plan.targetFiles.map((file) => ({
          id: `share-${uid()}-${file.id}`,
          systemId: plan.systemId,
          fileId: file.id,
          config: { ...plan.form },
        }));
      },
    };

    const initialState = {
      view: "content",
      accountId: "admin",
      sourcePath: "/",
      aiPath: "/",
      selectedKeys: [],
      shareRecords: INITIAL_SHARE_RECORDS,
      dialogOpen: false,
      selectedSystemId: SHARE_SYSTEMS[0].id,
      systemForm: Domain.defaultFormValues(SHARE_SYSTEMS[0].id),
      agentId: "sales",
      keyword: "",
      message: "",
      error: "",
      measurement: { lastStrategy: "-", lastRecords: 0, fallbackRate: 0 },
    };

    function reducer(state, action) {
      switch (action.type) {
        case "SET_VIEW":
          return { ...state, view: action.view };
        case "SET_ACCOUNT": {
          const account = Domain.account(action.accountId);
          const allowedAgents = Domain.manageableAgents(account).map((agent) => agent.id);
          const nextForm = Array.isArray(state.systemForm.agentIds)
            ? { ...state.systemForm, agentIds: state.systemForm.agentIds.filter((id) => allowedAgents.includes(id)) }
            : state.systemForm;
          return {
            ...state,
            accountId: account.id,
            agentId: allowedAgents.includes(state.agentId) ? state.agentId : allowedAgents[0] || "",
            aiPath: "/",
            systemForm: nextForm,
            message: `${account.name} に切り替えました。`,
          };
        }
        case "SET_SOURCE_PATH":
          return { ...state, sourcePath: action.path, selectedKeys: [] };
        case "SET_AI_PATH":
          return { ...state, aiPath: action.path };
        case "SET_AGENT":
          return { ...state, agentId: action.agentId, aiPath: "/" };
        case "SET_KEYWORD":
          return { ...state, keyword: action.keyword };
        case "TOGGLE_SELECT":
          return {
            ...state,
            selectedKeys: state.selectedKeys.includes(action.key)
              ? state.selectedKeys.filter((key) => key !== action.key)
              : [...state.selectedKeys, action.key],
          };
        case "OPEN_SHARE_DIALOG":
          return {
            ...state,
            dialogOpen: true,
            selectedSystemId: SHARE_SYSTEMS[0].id,
            systemForm: Domain.defaultFormValues(SHARE_SYSTEMS[0].id),
            error: "",
          };
        case "CLOSE_SHARE_DIALOG":
          return { ...state, dialogOpen: false };
        case "SET_SYSTEM":
          return {
            ...state,
            selectedSystemId: action.systemId,
            systemForm: Domain.defaultFormValues(action.systemId),
          };
        case "SET_FIELD":
          return { ...state, systemForm: { ...state.systemForm, [action.key]: action.value } };
        case "SHARE_SUCCESS": {
          const nextAgentId = action.systemId === "ai-chatbot"
            ? (Array.isArray(action.form.agentIds) ? action.form.agentIds[0] : state.agentId)
            : state.agentId;
          return {
            ...state,
            shareRecords: [...state.shareRecords, ...action.records],
            dialogOpen: false,
            selectedKeys: [],
            view: action.systemId === "ai-chatbot" ? "ai" : state.view,
            agentId: nextAgentId || state.agentId,
            aiPath: action.systemId === "ai-chatbot" ? "/" : state.aiPath,
            message: `${action.systemName} への利用設定を作成しました。`,
            measurement: { lastStrategy: action.strategy, lastRecords: action.records.length, fallbackRate: 0 },
          };
        }
        case "REMOVE_FROM_AGENT":
          return {
            ...state,
            shareRecords: state.shareRecords.flatMap((record) => {
              if (record.systemId !== "ai-chatbot" || record.fileId !== action.fileId) return [record];
              const agentIds = Array.isArray(record.config.agentIds) ? record.config.agentIds : [];
              if (!agentIds.includes(state.agentId)) return [record];
              const nextAgentIds = agentIds.filter((id) => id !== state.agentId);
              return nextAgentIds.length ? [{ ...record, config: { ...record.config, agentIds: nextAgentIds } }] : [];
            }),
            message: "AIエージェントの利用設定を解除しました。",
          };
        case "ERROR":
          return { ...state, error: action.message };
        case "CLEAR_NOTICE":
          return { ...state, error: "", message: "" };
        default:
          return state;
      }
    }

    function App() {
      const [state, dispatch] = React.useReducer(reducer, initialState);

      const account = React.useMemo(() => Domain.account(state.accountId), [state.accountId]);
      const departments = React.useMemo(() => Domain.manageableDepartments(account), [account]);
      const agents = React.useMemo(() => Domain.manageableAgents(account), [account]);
      const accent = state.view === "content" ? ACCENTS.content : ACCENTS.ai;
      const sourceEntries = React.useMemo(() => Selectors.sourceEntries(state), [state.sourcePath, state.keyword]);
      const selectedFiles = React.useMemo(() => Selectors.selectedFiles(state), [state.selectedKeys]);
      const shareableFiles = selectedFiles.filter((file) => file.allowed);
      const aiProjection = React.useMemo(() => Selectors.aiProjection(state, state.agentId), [state.shareRecords, state.agentId]);
      const aiEntries = React.useMemo(() => Selectors.aiEntries(state.aiPath, aiProjection.files), [state.aiPath, aiProjection.files]);
      const counts = React.useMemo(() => Selectors.agentFileCounts(state), [state.shareRecords]);
      const effectiveSystem = React.useMemo(() => Domain.effectiveSystem(state.selectedSystemId, account), [state.selectedSystemId, account]);

      const openShareDialog = () => {
        const plan = SharePlanner.createPlan({ state, account, systemId: SHARE_SYSTEMS[0].id, form: Domain.defaultFormValues(SHARE_SYSTEMS[0].id) });
        const error = SharePlanner.validate({ ...plan, system: { ...plan.system, fields: [] } });
        if (error) return dispatch({ type: "ERROR", message: error });
        dispatch({ type: "OPEN_SHARE_DIALOG" });
      };

      const confirmShare = () => {
        const plan = SharePlanner.createPlan({ state, account, systemId: state.selectedSystemId, form: state.systemForm });
        const error = SharePlanner.validate(plan);
        if (error) return dispatch({ type: "ERROR", message: error });
        dispatch({
          type: "SHARE_SUCCESS",
          records: SharePlanner.execute(plan),
          strategy: plan.strategy,
          systemId: plan.systemId,
          systemName: plan.system.name,
          form: plan.form,
        });
      };

      return (
        <>
          <CssBaseline />
          <DemoLauncherBar state={state} dispatch={dispatch} />

          <AppBar position="static" elevation={0} sx={{ bgcolor: accent.main }}>
            <Toolbar>
              <Icon sx={{ mr: 1 }}>{state.view === "content" ? "folder" : "smart_toy"}</Icon>
              <Box sx={{ flexGrow: 1 }}>
                <Typography variant="h6">{state.view === "content" ? "コンテンツ管理" : "AIエージェント利用確認"}</Typography>
                <Typography variant="caption" sx={{ opacity: 0.9 }}>
                  Plan化された共有処理 / 権限投影 / AI側Projectionを分離
                </Typography>
              </Box>
              <Chip size="small" label={`last: ${state.measurement.lastStrategy} / ${state.measurement.lastRecords}件`} sx={{ bgcolor: "rgba(255,255,255,0.18)", color: "white", fontWeight: 700 }} />
            </Toolbar>
          </AppBar>

          <Box sx={{ p: { xs: 1.5, md: 3 } }}>
            {state.view === "content" ? (
              <ExplorerLayout
                title="共有元コンテンツ"
                subtitle={`${selectedFiles.length}件選択 / 共有可能 ${shareableFiles.length}件`}
                folders={FOLDERS}
                path={state.sourcePath}
                setPath={(path) => dispatch({ type: "SET_SOURCE_PATH", path })}
                entries={sourceEntries}
                selectedKeys={state.selectedKeys}
                toggleSelect={(key) => dispatch({ type: "TOGGLE_SELECT", key })}
                keyword={state.keyword}
                setKeyword={(keyword) => dispatch({ type: "SET_KEYWORD", keyword })}
                action={<Button variant="contained" startIcon={<Icon>share</Icon>} onClick={openShareDialog} sx={{ bgcolor: accent.main }}>他システムへ共有</Button>}
                accent={accent}
              />
            ) : (
              <Stack spacing={2}>
                <DepartmentAgentPanel
                  currentAccount={account}
                  departments={departments}
                  agents={agents}
                  selectedAgentId={state.agentId}
                  onSelect={(agentId) => dispatch({ type: "SET_AGENT", agentId })}
                  counts={counts}
                  accent={accent}
                />
                <ExplorerLayout
                  title="AIエージェントが参照できるコンテンツ"
                  subtitle="共有設定からAI側の見え方をProjectionとして生成"
                  folders={aiProjection.folders}
                  path={state.aiPath}
                  setPath={(path) => dispatch({ type: "SET_AI_PATH", path })}
                  entries={aiEntries}
                  readonly
                  rowAction={(entry) => (
                    <Button size="small" color="error" onClick={() => dispatch({ type: "REMOVE_FROM_AGENT", fileId: entry.id })}>
                      解除
                    </Button>
                  )}
                  accent={accent}
                />
              </Stack>
            )}
          </Box>

          <ShareDialog
            open={state.dialogOpen}
            onClose={() => dispatch({ type: "CLOSE_SHARE_DIALOG" })}
            systems={SHARE_SYSTEMS}
            selectedSystemId={state.selectedSystemId}
            onChangeSystem={(systemId) => dispatch({ type: "SET_SYSTEM", systemId })}
            system={effectiveSystem}
            values={state.systemForm}
            onChangeField={(key, value) => dispatch({ type: "SET_FIELD", key, value })}
            onConfirm={confirmShare}
            targetCount={shareableFiles.length}
            accent={accent}
          />

          <Snackbar open={Boolean(state.message || state.error)} autoHideDuration={3500} onClose={() => dispatch({ type: "CLEAR_NOTICE" })}>
            <Alert severity={state.error ? "error" : "success"} onClose={() => dispatch({ type: "CLEAR_NOTICE" })}>
              {state.error || state.message}
            </Alert>
          </Snackbar>
        </>
      );
    }

    function DemoLauncherBar({ state, dispatch }) {
      const items = [
        { id: "content", label: "コンテンツ管理", icon: "folder", color: ACCENTS.content.main },
        { id: "ai", label: "AI利用確認", icon: "smart_toy", color: ACCENTS.ai.main },
      ];

      return (
        <Box sx={{ bgcolor: "#202124", color: "white", px: { xs: 1.5, md: 3 }, py: 1 }}>
          <Stack direction={{ xs: "column", md: "row" }} spacing={1.5} justifyContent="space-between" alignItems={{ xs: "stretch", md: "center" }}>
            <Stack direction="row" spacing={1} alignItems="center">
              <Icon fontSize="small">apps</Icon>
              <Typography variant="body2" fontWeight={700}>デモランチャー</Typography>
              <Typography variant="caption" sx={{ opacity: 0.7 }}>アカウント権限ごとの見え方を確認</Typography>
            </Stack>

            <Stack direction={{ xs: "column", sm: "row" }} spacing={1}>
              <FormControl size="small" sx={{ minWidth: 260 }}>
                <Select value={state.accountId} onChange={(e) => dispatch({ type: "SET_ACCOUNT", accountId: e.target.value })} sx={{ color: "white", bgcolor: "rgba(255,255,255,0.06)", ".MuiSelect-icon": { color: "white" }, ".MuiOutlinedInput-notchedOutline": { borderColor: "rgba(255,255,255,0.35)" } }}>
                  {ACCOUNTS.map((account) => <MenuItem key={account.id} value={account.id}>{account.name} / {account.role}</MenuItem>)}
                </Select>
              </FormControl>
              <Stack direction="row" spacing={1}>
                {items.map((item) => {
                  const active = state.view === item.id;
                  return (
                    <Button key={item.id} size="small" variant={active ? "contained" : "outlined"} startIcon={<Icon>{item.icon}</Icon>} onClick={() => dispatch({ type: "SET_VIEW", view: item.id })} sx={{ color: active ? "white" : "rgba(255,255,255,0.9)", borderColor: active ? item.color : "rgba(255,255,255,0.35)", bgcolor: active ? item.color : "transparent", whiteSpace: "nowrap" }}>
                      {item.label}
                    </Button>
                  );
                })}
              </Stack>
            </Stack>
          </Stack>
        </Box>
      );
    }

    function ShareDialog({ open, onClose, systems, selectedSystemId, onChangeSystem, system, values, onChangeField, onConfirm, targetCount, accent }) {
      return (
        <Dialog open={open} onClose={onClose} fullWidth maxWidth="sm">
          <DialogTitle>他システムへの共有設定</DialogTitle>
          <DialogContent>
            <Stack spacing={2} sx={{ pt: 1 }}>
              <Alert severity="info">共有可能な {targetCount} 件を対象に、共有Planを作成してから実行します。</Alert>
              <FormControl fullWidth size="small">
                <InputLabel>共有先システム</InputLabel>
                <Select value={selectedSystemId} label="共有先システム" onChange={(e) => onChangeSystem(e.target.value)}>
                  {systems.map((system) => (
                    <MenuItem key={system.id} value={system.id}>
                      <Stack direction="row" spacing={1} alignItems="center"><Icon>{system.icon}</Icon><span>{system.name}</span></Stack>
                    </MenuItem>
                  ))}
                </Select>
              </FormControl>

              {system && (
                <Paper variant="outlined" sx={{ p: 1.5, bgcolor: accent.light }}>
                  <Typography variant="subtitle2" fontWeight={700}>{system.name}</Typography>
                  <Typography variant="body2" color="text.secondary">{system.description}</Typography>
                </Paper>
              )}

              {(system?.fields || []).map((field) => (
                <DynamicField key={field.key} field={field} value={values[field.key]} onChange={(value) => onChangeField(field.key, value)} />
              ))}
            </Stack>
          </DialogContent>
          <DialogActions>
            <Button onClick={onClose}>キャンセル</Button>
            <Button variant="contained" onClick={onConfirm} sx={{ bgcolor: accent.main }}>共有する</Button>
          </DialogActions>
        </Dialog>
      );
    }

    function DepartmentAgentPanel({ currentAccount, departments, agents, selectedAgentId, onSelect, counts, accent }) {
      const [expanded, setExpanded] = React.useState(true);
      return (
        <Paper variant="outlined" sx={{ borderTop: `4px solid ${accent.main}`, overflow: "hidden" }}>
          <Box sx={{ px: 2, py: 1.25, bgcolor: accent.light }}>
            <Stack direction={{ xs: "column", md: "row" }} spacing={1} alignItems={{ xs: "stretch", md: "center" }} justifyContent="space-between">
              <Stack direction="row" spacing={1.25} alignItems="center">
                <Box sx={{ width: 32, height: 32, borderRadius: "10px", display: "grid", placeItems: "center", bgcolor: accent.main, color: "white" }}>
                  <Icon fontSize="small">smart_toy</Icon>
                </Box>
                <Box>
                  <Typography variant="subtitle2" fontWeight={700}>AIエージェント</Typography>
                  <Typography variant="caption" color="text.secondary">{currentAccount.name} が管理できる範囲のみ表示</Typography>
                </Box>
              </Stack>
              <Button size="small" variant="outlined" onClick={() => setExpanded((v) => !v)} endIcon={<Icon>{expanded ? "expand_less" : "expand_more"}</Icon>} sx={{ bgcolor: "white", borderColor: accent.main, color: accent.main }}>
                {expanded ? "閉じる" : "選択"}
              </Button>
            </Stack>
          </Box>
          <Collapse in={expanded}>
            <Divider />
            <Box sx={{ px: 2, py: 1.5 }}>
              <Stack spacing={1}>
                {departments.map((department) => {
                  const departmentAgents = agents.filter((agent) => agent.departmentId === department.id);
                  if (!departmentAgents.length) return null;
                  return (
                    <Stack key={department.id} direction={{ xs: "column", md: "row" }} spacing={1} alignItems={{ xs: "stretch", md: "center" }}>
                      <Stack direction="row" spacing={0.75} alignItems="center" sx={{ width: { md: 170 }, flexShrink: 0 }}>
                        <Icon sx={{ color: accent.main, fontSize: 20 }}>{department.icon}</Icon>
                        <Typography variant="body2" fontWeight={700}>{department.name}</Typography>
                      </Stack>
                      <Stack direction="row" spacing={1} flexWrap="wrap" useFlexGap>
                        {departmentAgents.map((agent) => {
                          const selected = agent.id === selectedAgentId;
                          return (
                            <Button key={agent.id} size="small" variant={selected ? "contained" : "outlined"} startIcon={<Icon>smart_toy</Icon>} onClick={() => onSelect(agent.id)} sx={{ borderRadius: 999, bgcolor: selected ? accent.main : "white", borderColor: selected ? accent.main : "divider", color: selected ? "white" : "text.primary" }}>
                              {agent.name}<Chip size="small" label={counts[agent.id] || 0} sx={{ ml: 1, height: 20 }} />
                            </Button>
                          );
                        })}
                      </Stack>
                    </Stack>
                  );
                })}
              </Stack>
            </Box>
          </Collapse>
        </Paper>
      );
    }

    function DynamicField({ field, value, onChange }) {
      if (field.type === "select") {
        return (
          <Stack spacing={0.5}>
            <FormControl fullWidth size="small" required={field.required}>
              <InputLabel>{field.label}</InputLabel>
              <Select value={value || ""} label={field.label} onChange={(e) => onChange(e.target.value)}>
                {(field.options || []).map((option) => <MenuItem key={option.value} value={option.value}>{option.label}</MenuItem>)}
              </Select>
            </FormControl>
            {field.helperText && <Typography variant="caption" color="text.secondary">{field.helperText}</Typography>}
          </Stack>
        );
      }

      if (field.type === "checkboxGroup") {
        const checkedValues = Array.isArray(value) ? value : [];
        return (
          <Box>
            <Typography variant="subtitle2" gutterBottom>{field.label}{field.required ? " *" : ""}</Typography>
            {field.helperText && <Typography variant="caption" color="text.secondary" display="block" sx={{ mb: 1 }}>{field.helperText}</Typography>}
            {(field.options || []).length === 0 ? <Alert severity="warning">このアカウントで選択できる項目がありません。</Alert> : (
              <Stack spacing={0.5}>
                {(field.options || []).map((option) => (
                  <FormControlLabel key={option.value} control={<Checkbox checked={checkedValues.includes(option.value)} onChange={() => onChange(checkedValues.includes(option.value) ? checkedValues.filter((v) => v !== option.value) : [...checkedValues, option.value])} />} label={option.label} />
                ))}
              </Stack>
            )}
          </Box>
        );
      }

      if (field.type === "checkbox") {
        return <FormControlLabel control={<Checkbox checked={Boolean(value)} onChange={(e) => onChange(e.target.checked)} />} label={field.label} />;
      }

      return <TextField fullWidth size="small" required={field.required} label={field.label} placeholder={field.placeholder || ""} value={value || ""} onChange={(e) => onChange(e.target.value)} />;
    }

    function FolderTree({ folders, currentPath, onSelect, accent }) {
      return (
        <Paper variant="outlined" sx={{ height: "calc(100vh - 270px)", minHeight: 420, overflow: "auto", borderTop: `4px solid ${accent.main}` }}>
          <List dense>
            {folders.map((folder) => {
              const active = folder.path === currentPath;
              return (
                <ListItemButton key={folder.path} selected={active} onClick={() => onSelect(folder.path)} sx={{ pl: folder.path === "/" ? 1 : 2 + folder.path.split("/").length, "&.Mui-selected": { bgcolor: accent.light } }}>
                  <ListItemIcon sx={{ minWidth: 32 }}><Icon sx={{ color: active ? accent.main : "inherit" }}>{folder.path === "/" ? "home" : "folder"}</Icon></ListItemIcon>
                  <ListItemText primary={folder.name} primaryTypographyProps={{ fontWeight: active ? 700 : 400 }} />
                </ListItemButton>
              );
            })}
          </List>
        </Paper>
      );
    }

    function ExplorerLayout({ title, subtitle, folders, path, setPath, entries, selectedKeys = [], toggleSelect = () => {}, keyword = "", setKeyword = () => {}, action, readonly = false, rowAction, accent }) {
      const colSpan = (readonly ? 0 : 1) + 4 + (rowAction ? 1 : 0);
      return (
        <Stack direction={{ xs: "column", md: "row" }} spacing={2}>
          <Box sx={{ width: { xs: "100%", md: 280 }, flexShrink: 0 }}>
            <FolderTree folders={folders} currentPath={path} onSelect={setPath} accent={accent} />
          </Box>
          <Stack spacing={2} sx={{ flex: 1, minWidth: 0 }}>
            <Stack direction={{ xs: "column", sm: "row" }} justifyContent="space-between" spacing={1}>
              <Box>
                <Typography variant="h6">{title}</Typography>
                {subtitle && <Typography variant="body2" color="text.secondary" sx={{ mb: 0.5 }}>{subtitle}</Typography>}
                <Breadcrumbs>
                  {Domain.breadcrumbs(path).map((item) => (
                    <Link key={item.path} component="button" underline="hover" onClick={() => setPath(item.path)} sx={{ color: item.path === path ? accent.main : "inherit", fontWeight: item.path === path ? 700 : 400 }}>
                      {item.label}
                    </Link>
                  ))}
                </Breadcrumbs>
              </Box>
              {action}
            </Stack>
            {!readonly && <TextField size="small" label="検索" value={keyword} onChange={(e) => setKeyword(e.target.value)} />}
            <TableContainer component={Paper} variant="outlined">
              <Table size="small">
                <TableHead>
                  <TableRow sx={{ bgcolor: accent.light }}>
                    {!readonly && <TableCell padding="checkbox" />}
                    <TableCell>名前</TableCell><TableCell>種別</TableCell><TableCell>状態</TableCell><TableCell>更新日</TableCell>
                    {rowAction && <TableCell align="right">操作</TableCell>}
                  </TableRow>
                </TableHead>
                <TableBody>
                  {entries.map((entry) => {
                    const isFolder = entry.kind === "folder";
                    return (
                      <TableRow key={entry.key} hover>
                        {!readonly && <TableCell padding="checkbox"><Checkbox checked={selectedKeys.includes(entry.key)} onChange={() => toggleSelect(entry.key)} sx={{ color: accent.main, "&.Mui-checked": { color: accent.main } }} /></TableCell>}
                        <TableCell>
                          <Stack direction="row" spacing={1} alignItems="center">
                            <Icon sx={{ color: isFolder ? accent.main : "text.secondary" }}>{isFolder ? "folder" : "description"}</Icon>
                            {isFolder ? <Link component="button" onClick={() => setPath(entry.path)} sx={{ color: accent.main }}>{entry.name}</Link> : <Typography variant="body2">{entry.name}</Typography>}
                          </Stack>
                        </TableCell>
                        <TableCell><Chip size="small" label={isFolder ? "フォルダ" : entry.type} /></TableCell>
                        <TableCell>{isFolder ? "-" : entry.allowed ? <Chip size="small" color="success" label="利用可" /> : <Chip size="small" color="warning" label="利用不可" />}</TableCell>
                        <TableCell>{isFolder ? "-" : entry.updatedAt}</TableCell>
                        {rowAction && <TableCell align="right">{!isFolder && rowAction(entry)}</TableCell>}
                      </TableRow>
                    );
                  })}
                  {entries.length === 0 && <TableRow><TableCell colSpan={colSpan}><Alert severity="info">表示する項目がありません。</Alert></TableCell></TableRow>}
                </TableBody>
              </Table>
            </TableContainer>
          </Stack>
        </Stack>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
