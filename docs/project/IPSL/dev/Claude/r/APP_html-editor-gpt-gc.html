<script type="text/babel" data-type="module">

// ============================================================
// Infrastructure Layer
// ============================================================
const STORAGE_PREFIX='mde_';
const APP_STORAGE_VERSION=2;
const StorageMigrationRuntime={
  key:'storage_schema_version',
  backupKey:'storage_migration_backup',
  run(){
    const current=StorageService.get(this.key,0);
    if(current===APP_STORAGE_VERSION)return true;
    try{
      const backup={version:current,target:APP_STORAGE_VERSION,createdAt:Date.now(),items:{}};
      Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX)).forEach(k=>{try{backup.items[k]=localStorage.getItem(k)}catch{}});
      StorageService.set(this.backupKey,backup);
      StorageService.set(this.key,APP_STORAGE_VERSION);
      return true;
    }catch(e){console.warn('Storage migration failed',e);return false;}
  }
};

const StorageService={
  get(k,d){try{const r=localStorage.getItem(STORAGE_PREFIX+k);return r!==null?JSON.parse(r):d}catch{return d}},
  set(k,v){
    try{localStorage.setItem(STORAGE_PREFIX+k,JSON.stringify(v));return true}
    catch(e){
      try{
        if(e?.name==='QuotaExceededError'||String(e?.message||'').includes('quota')){
          this.compact?.();
          localStorage.setItem(STORAGE_PREFIX+k,JSON.stringify(v));
          return true;
        }
      }catch{}
      console.warn('StorageService.set failed:',k,e);
      return false;
    }
  },
  remove(k){localStorage.removeItem(STORAGE_PREFIX+k)},
  clear(){Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX)).forEach(k=>localStorage.removeItem(k))},
  getUsage(){
    let total=0;const keys={};
    Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX)).forEach(k=>{
      const size=(localStorage.getItem(k)||'').length*2;
      total+=size;
      const short=k.replace(STORAGE_PREFIX,'');
      const group=
        short.startsWith('profile_')?'プロファイル':
        short.startsWith('autosave_')?'自動保存':
        short==='profiles'?'プロファイル一覧':
        short.startsWith('pdf_')?'PDF設定':
        short.startsWith('workspaces_')||short.startsWith('active_workspace_')||short==='workspaces'||short==='active_workspace'?'ワークスペース':
        short.startsWith('field.snapshot:')?'Field Snapshot':
        short.startsWith('field.restore.')?'Restore':
        'その他';
      keys[group]=(keys[group]||0)+size;
    });
    const limit=5*1024*1024;
    return{used:total,limit,percent:(total/limit)*100,breakdown:keys};
  },
  compact(){
    try{
      const keys=[];
      for(let i=0;i<localStorage.length;i++){
        const rawKey=localStorage.key(i);
        if(rawKey&&rawKey.startsWith(STORAGE_PREFIX+'field.snapshot:')&&rawKey.includes('.delta:'))keys.push(rawKey);
      }
      keys.sort();
      const removeCount=Math.ceil(keys.length*0.4);
      keys.slice(0,removeCount).forEach(k=>localStorage.removeItem(k));
      return removeCount;
    }catch{return 0}
  }
};
try{StorageMigrationRuntime.run()}catch(e){console.warn('Storage migration boot failed',e)}

// --- F-29: IndexedDB Service ---
const IDBService={
  DB_NAME:'md-editor',VERSION:4,_db:null,
  async open(){
    if(this._db)return this._db;
    return new Promise((res,rej)=>{
      const req=indexedDB.open(this.DB_NAME,this.VERSION);
      req.onupgradeneeded=(e)=>{
        const db=req.result;
        const tx=e.target.transaction;
        let filesStore;
        if(!db.objectStoreNames.contains('files')){
          filesStore=db.createObjectStore('files',{keyPath:'id'});
        }else{
          filesStore=tx.objectStore('files');
        }
        if(!filesStore.indexNames.contains('name'))filesStore.createIndex('name','name',{unique:false});
        if(!filesStore.indexNames.contains('updatedAt'))filesStore.createIndex('updatedAt','updatedAt',{unique:false});
        if(!filesStore.indexNames.contains('profileId'))filesStore.createIndex('profileId','profileId',{unique:false});
        if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'});
        let trashStore;
        if(!db.objectStoreNames.contains('trash')){
          trashStore=db.createObjectStore('trash',{keyPath:'id'});
        }else{
          trashStore=tx.objectStore('trash');
        }
        if(!trashStore.indexNames.contains('deletedAt'))trashStore.createIndex('deletedAt','deletedAt',{unique:false});
        if(!trashStore.indexNames.contains('profileId'))trashStore.createIndex('profileId','profileId',{unique:false});
      };
      req.onsuccess=()=>{this._db=req.result;res(this._db)};
      req.onerror=()=>rej(req.error);
    });
  },
  async saveFile(file){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').put(file);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})},
  async getFile(id){const db=await this.open();return new Promise((res,rej)=>{const req=db.transaction('files').objectStore('files').get(id);req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error)})},
  async listFiles(profileId){const db=await this.open();return new Promise((res,rej)=>{const req=profileId?db.transaction('files').objectStore('files').index('profileId').getAll(profileId):db.transaction('files').objectStore('files').getAll();req.onsuccess=()=>res(req.result||[]);req.onerror=()=>rej(req.error)})},
  async deleteFile(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})},
  async deleteAll(){return new Promise((res)=>{if(this._db){this._db.close();this._db=null}const req=indexedDB.deleteDatabase(this.DB_NAME);req.onsuccess=()=>res(true);req.onerror=()=>res(false);req.onblocked=()=>res(false)})},
  // Trash operations
  async moveToTrash(item){const db=await this.open();const trashItem={...item,id:item.id||uuid(),deletedAt:Date.now()};return new Promise((res,rej)=>{const tx=db.transaction('trash','readwrite');tx.objectStore('trash').put(trashItem);tx.oncomplete=()=>res(trashItem);tx.onerror=()=>rej(tx.error)})},
  async listTrash(profileId='default'){const db=await this.open();return new Promise((res,rej)=>{const store=db.transaction('trash').objectStore('trash');const req=profileId?store.index('profileId').getAll(profileId):store.getAll();req.onsuccess=()=>res((req.result||[]).sort((a,b)=>(b.deletedAt||0)-(a.deletedAt||0)));req.onerror=()=>rej(req.error)})},
  async restoreFromTrash(id){const db=await this.open();return new Promise((res,rej)=>{const req=db.transaction('trash').objectStore('trash').get(id);req.onsuccess=()=>{const item=req.result;if(!item){rej(new Error('not found'));return}const tx=db.transaction('trash','readwrite');tx.objectStore('trash').delete(id);tx.oncomplete=()=>res(item);tx.onerror=()=>rej(tx.error)};req.onerror=()=>rej(req.error)})},
  async deleteFromTrash(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('trash','readwrite');tx.objectStore('trash').delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})},
  async purgeExpiredTrash(retentionDays,profileId='default'){const db=await this.open();const cutoff=Date.now()-(retentionDays*24*60*60*1000);return new Promise((res,rej)=>{const tx=db.transaction('trash','readwrite');const store=tx.objectStore('trash');const req=profileId?store.index('profileId').openCursor(IDBKeyRange.only(profileId)):store.index('deletedAt').openCursor();let count=0;req.onsuccess=(e)=>{const cursor=e.target.result;if(cursor){if(cursor.value.deletedAt<cutoff){cursor.delete();count++}cursor.continue()}};tx.oncomplete=()=>res(count);tx.onerror=()=>rej(tx.error)})}
};

function downloadBlob(blob,fileName){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=fileName||'download';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{
    if(a.parentNode)a.parentNode.removeChild(a);
    URL.revokeObjectURL(url);
  },1000);
}

const FileService={
  read(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error('読み込み失敗'));r.readAsText(file,'UTF-8')})},
  save(text,fn){this.saveBlob(new Blob([text],{type:'text/markdown;charset=utf-8'}),fn||'untitled.md')},
  saveHtml(html,fn){this.saveBlob(new Blob([html],{type:'text/html;charset=utf-8'}),fn||'export.html')},
  saveBlob(blob,fn){downloadBlob(blob,fn)}
};

  codename:'Q-Capsule Doc',
  version:'0.3.0',

// Dynamic DOM/React element injection is intentionally removed.

const LazyLoader={
  _cache:{},
  _styleCache:{},
  _success:{},
  async load(url,globalName){
    if(globalName&&window[globalName])return window[globalName];
    if(this._cache[url])return this._cache[url];
    this._cache[url]=new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src=url;
      s.async=true;
      s.onload=()=>{
        const val=globalName?window[globalName]:true;
        if(globalName&&!val){delete this._cache[url];rej(new Error('Global not found after load: '+globalName));return}
        this._success[globalName||url]=url;
        res(val);
      };
      s.onerror=()=>{delete this._cache[url];rej(new Error('Failed to load: '+url))};
      document.head.appendChild(s);
    });
    return this._cache[url];
  },
  async loadAny(urls,globalName){
    const list=Array.isArray(urls)?urls:[urls];
    if(globalName&&window[globalName])return window[globalName];
    const preferred=this._success[globalName];
    const ordered=preferred?[preferred,...list.filter(u=>u!==preferred)]:list;
    const errors=[];
    for(const url of ordered){
      try{return await this.load(url,globalName)}
      catch(e){errors.push(e?.message||String(e))}
    }
    throw new Error('All CDN candidates failed for '+(globalName||'resource')+': '+errors.join(' / '));
  },
  async loadStyle(url){
    if(this._styleCache[url])return this._styleCache[url];
    if(document.querySelector(`link[href="${url}"]`))return true;
    this._styleCache[url]=new Promise((res,rej)=>{
      const l=document.createElement('link');
      l.rel='stylesheet';
      l.href=url;
      l.onload=()=>{this._success[url]=url;res(true)};
      l.onerror=()=>{delete this._styleCache[url];rej(new Error('Failed to load style: '+url))};
      document.head.appendChild(l);
    });
    return this._styleCache[url];
  },
  async loadStyleAny(urls){
    const list=Array.isArray(urls)?urls:[urls];
    const errors=[];
    for(const url of list){
      try{return await this.loadStyle(url)}
      catch(e){errors.push(e?.message||String(e))}
    }
    throw new Error('All CDN style candidates failed: '+errors.join(' / '));
  }
};

// ============================================================
// Quantum Capsule Runtime
// - Container-like isolation for heavy capabilities
// - Quantum-like observation: capabilities materialize only when observed
// - Brownout fallback: failed capability does not crash Editor Core
// ============================================================
const CapsuleRuntime={
  capsules:new Map(),
  states:new Map(),

  register(def){
    if(!def?.id)throw new Error('Capsule id is required');
    this.capsules.set(def.id,{id:def.id,provides:def.provides||[],dependsOn:def.dependsOn||[],budget:def.budget||{},load:def.load||(async()=>{}),health:def.health||(()=>true),fallback:def.fallback||null,dispose:def.dispose||(()=>{})});
    this.states.set(def.id,{status:'cold',error:null,loadedAt:null,failedAt:null,failures:0,lastObservedAt:null});
  },

  list(){
    return Array.from(this.capsules.keys()).map(id=>({id,...(this.states.get(id)||{})}));
  },

  getState(id){return this.states.get(id)||null},

  async observe(id,ctx={}){
    const capsule=this.capsules.get(id);
    const state=this.states.get(id);
    if(!capsule||!state)throw new Error('Unknown capsule: '+id);

    state.lastObservedAt=Date.now();
    if(state.status==='ready')return{ok:true,capsule,state};
    if(state.status==='warming')return this._fallback(id,ctx,'Capsule is warming');

    const maxFailures=capsule.budget.maxFailures??3;
    const now=Date.now();
    if(state.circuitOpenUntil&&now<state.circuitOpenUntil){
      return this._fallback(id,ctx,state.error||'Capsule circuit is open');
    }
    if(state.status==='failed'&&state.failures>=maxFailures){
      state.circuitOpenUntil=Date.now()+(capsule.budget.cooldownMs||30000);
      return this._fallback(id,ctx,state.error||'Capsule is isolated');
    }

    state.status='warming';
    state.error=null;
    this._emit('capsule:warming',{id});

    try{
      for(const dep of capsule.dependsOn){
        const depResult=await this.observe(dep,ctx);
        if(!depResult.ok)throw new Error('Dependency failed: '+dep);
      }

      await this._withBudget(Promise.resolve(capsule.load(ctx)),capsule.budget);
      const healthy=await Promise.resolve(capsule.health(ctx));
      if(!healthy)throw new Error('Health check failed: '+id);

      state.status='ready';
      state.loadedAt=Date.now();
      state.error=null;
      this._emit('capsule:ready',{id});
      return{ok:true,capsule,state};
    }catch(e){
      state.status='failed';
      state.error=e?.message||String(e);
      state.failedAt=Date.now();
      state.failures+=1;
      if(state.failures>=(capsule.budget.maxFailures??3))state.circuitOpenUntil=Date.now()+(capsule.budget.cooldownMs||30000);
      this._emit('capsule:failed',{id,error:state.error,failures:state.failures});
      return this._fallback(id,ctx,state.error);
    }
  },

  reset(id){
    const capsule=this.capsules.get(id);
    const state=this.states.get(id);
    if(!capsule||!state)return;
    try{capsule.dispose()}catch{}
    state.status='cold';
    state.error=null;
    this._emit('capsule:reset',{id});
  },

  async _withBudget(promise,budget={}){
    const timeoutMs=budget.timeoutMs||15000;
    return await Promise.race([
      promise,
      new Promise((_,reject)=>setTimeout(()=>reject(new Error('Capsule timeout')),timeoutMs))
    ]);
  },

  _fallback(id,ctx,reason){
    const capsule=this.capsules.get(id);
    const state=this.states.get(id);
    const fallback=typeof capsule?.fallback==='function'?capsule.fallback(ctx,state,reason):capsule?.fallback;
    return{ok:false,capsule,state,fallback,reason};
  },

  _emit(event,payload){
    try{PluginKernel?.emit?.(event,payload)}catch{}
  }
};

// ============================================================
// MetaDocument Runtime
// 文書を「本文」ではなく、意図・状態・観測者・投影を持つメタ実体として扱う。
// ============================================================
class MetaDocument{
  constructor({id,title,markdown='',profileId='default',kind='markdown',intent={},lifecycle='draft',metadata={}}={}){
    this.id=id||uuid();
    this.title=title||'untitled.md';
    this.kind=kind;
    this.profileId=profileId||'default';
    this.version=0;
    this.content={markdown,assets:[],references:[]};
    this.intent={purpose:intent.purpose||'compose',audience:intent.audience||'self',tone:intent.tone||'neutral',desiredOutcome:intent.desiredOutcome||'',constraints:intent.constraints||[]};
    this.lifecycle=lifecycle;
    this.metadata={...metadata,createdAt:metadata.createdAt||Date.now(),updatedAt:metadata.updatedAt||Date.now()};
    this.cache=new Map();
  }

  static fromTab(tab={},options={}){
    return new MetaDocument({
      id:tab.id,
      title:tab.fileName||tab.name||'untitled.md',
      markdown:tab.text||'',
      profileId:options.profileId||options.profile?.id||'default',
      kind:options.kind||'markdown',
      intent:options.intent||tab.meta?.intent||{},
      lifecycle:options.lifecycle||tab.meta?.lifecycle||'draft',
      metadata:{source:'tab',isDirty:!!tab.isDirty,...(tab.meta||{})}
    });
  }

  static fromFile(file={},options={}){
    return new MetaDocument({
      id:file.id,
      title:file.fileName||file.name||'untitled.md',
      markdown:file.text||'',
      profileId:options.profileId||options.profile?.id||file.profileId||'default',
      kind:options.kind||'markdown',
      intent:options.intent||{},
      lifecycle:options.lifecycle||'draft',
      metadata:{source:'file',size:file.size||new TextEncoder().encode(file.text||'').length}
    });
  }

  updateMarkdown(markdown){
    if(markdown===this.content.markdown)return;
    this.content.markdown=markdown;
    this.version+=1;
    this.metadata.updatedAt=Date.now();
    this.decohere();
  }

  decohere(){this.cache.clear()}

  observe(kind,ctx={}){
    const key=`${kind}@${this.version}:${ctx.mode||''}:${ctx.observer||''}`;
    if(this.cache.has(key))return this.cache.get(key);

    const markdown=this.content.markdown||'';
    let value;

    switch(kind){
      case 'raw':
      case 'markdown.raw':
        value=markdown;
        break;
      case 'state':
        value={id:this.id,title:this.title,kind:this.kind,version:this.version,profileId:this.profileId,lifecycle:this.lifecycle,intent:this.intent,metadata:this.metadata};
        break;
      case 'semantics':
        value={outline:DocumentDomain.getOutline(markdown),tasks:DocumentDomain.getTasks(markdown),stats:DocumentDomain.getStats(markdown),links:DocumentDomain.analyzeLinks(markdown),images:DocumentDomain.analyzeImages(markdown),code:DocumentDomain.analyzeCode(markdown)};
        break;
      case 'analysis':
        value=DocumentDomain.analyze(markdown);
        break;
      case 'html.preview.raw':
        value=MarkdownService.parse(markdown,{...ctx,mode:'preview',document:this});
        break;
      case 'html.preview':
        value=sanitizeHtml(this.observe('html.preview.raw',ctx));
        break;
      case 'html.export.body':
        value=sanitizeHtml(MarkdownService.parse(markdown,{...ctx,mode:'export',document:this}));
        break;
      case 'html.export':
        value=buildExportHtml({title:this.title,body:this.observe('html.export.body',ctx),highlight:true,katex:true});
        break;
      case 'projection.manifest':
        value={documentId:this.id,title:this.title,version:this.version,available:['markdown.raw','html.preview','html.export','analysis','semantics','pdf','word','excel','zip'],capsules:CapsuleRuntime.list()};
        break;
      default:
        throw new Error('Unknown document observation: '+kind);
    }

    this.cache.set(key,value);
    return value;
  }

  project(target,ctx={}){
    const map={preview:'html.preview',html:'html.export',htmlBody:'html.export.body',analysis:'analysis',semantics:'semantics',manifest:'projection.manifest',markdown:'markdown.raw'};
    const observation=map[target]||target;
    return{documentId:this.id,title:this.title,target,observation,version:this.version,createdAt:Date.now(),payload:this.observe(observation,{...ctx,observer:target})};
  }
}

function runIdle(fn,options={}){
  if('requestIdleCallback' in window)return requestIdleCallback(fn,{timeout:options.timeout||800});
  return setTimeout(fn,options.delay||120);
}
function cancelIdleJob(id){
  if(id==null)return;
  if('cancelIdleCallback' in window)cancelIdleCallback(id);
  else clearTimeout(id);
}
function throttle(fn,wait=2000){
  let last=0;
  let timer=null;
  return (...args)=>{
    const now=Date.now();
    const rest=wait-(now-last);
    clearTimeout(timer);
    if(rest<=0){last=now;fn(...args);return;}
    timer=setTimeout(()=>{last=Date.now();fn(...args)},rest);
  };
}

// ============================================================
// Incremental Field Runtime / Block Graph
// 情報場を全文文字列ではなく、Block単位で保持し、変更箇所だけを dirty にする。
// ============================================================
function hashText(text=''){
  let h=2166136261;
  const s=String(text||'');
  for(let i=0;i<s.length;i++){
    h^=s.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return (h>>>0).toString(36);
}

function inferBlockForms(type,lang,text=''){
  const source=String(text||'');
  return {
    document:true,
    diagram:type==='diagram'||lang==='mermaid'||source.includes('```mermaid'),
    math:type==='math'||lang==='math'||lang==='latex'||hasMathForm(source),
    table:type==='table',
    task:type==='task',
    decision:source.includes('結論')||source.includes('決定')||source.includes('Decision')||source.includes('decision')
  };
}

const BlockRuntime={
  parse(source=''){
    const lines=String(source||'').split(String.fromCharCode(10));
    const blocks=[];
    let current=[];
    let type='paragraph';
    let inCode=false;
    let codeLang='';

    const flush=()=>{
      if(!current.length)return;
      const text=current.join(String.fromCharCode(10));
      const hash=hashText(type+':'+codeLang+':'+text);
      blocks.push({
        id:'blk-'+hash,
        type,
        lang:codeLang,
        text,
        hash,
        forms:inferBlockForms(type,codeLang,text),
        dirty:true,
        cache:{},
        relations:[]
      });
      current=[];
      type='paragraph';
      codeLang='';
    };

    for(const line of lines){
      const raw=String(line||'');
      const t=raw.trim();

      if(t.startsWith('```')){
        if(!inCode){
          flush();
          inCode=true;
          codeLang=t.slice(3).trim();
          type=codeLang==='mermaid'?'diagram':(codeLang==='math'||codeLang==='latex'?'math':'code');
          current.push(raw);
        }else{
          current.push(raw);
          flush();
          inCode=false;
        }
        continue;
      }

      if(inCode){current.push(raw);continue;}
      if(!t){flush();continue;}

      if(t.startsWith('#')){
        flush();
        type='heading';
        current.push(raw);
        flush();
        continue;
      }

      if(t.startsWith('- [')||t.startsWith('* [')){
        flush();
        type='task';
        current.push(raw);
        flush();
        continue;
      }

      if(t.startsWith('|')&&t.endsWith('|')){
        if(type!=='table')flush();
        type='table';
        current.push(raw);
        continue;
      }

      current.push(raw);
    }

    flush();
    return blocks;
  },

  reconcile(prevBlocks=[],nextBlocks=[]){
    const prevByHash=new Map((prevBlocks||[]).map(block=>[block.hash,block]));
    return (nextBlocks||[]).map(block=>{
      const prev=prevByHash.get(block.hash);
      if(prev)return {...prev,dirty:false};
      return {...block,dirty:true};
    });
  },

  manifest(blocks=[]){
    const dirty=(blocks||[]).filter(block=>block.dirty);
    const target=dirty.length?dirty:(blocks||[]);
    return {
      katex:target.some(block=>block.forms?.math),
      mermaid:target.some(block=>block.forms?.diagram),
      html2canvas:false,
      pdf:false,
      word:false,
      excel:false,
      zip:false
    };
  },

  stats(blocks=[]){
    const all=blocks||[];
    const dirty=all.filter(block=>block.dirty);
    return {
      total:all.length,
      dirty:dirty.length,
      dirtyTypes:[...new Set(dirty.map(block=>block.type))].join(', ')||'none',
      heading:all.filter(block=>block.type==='heading').length,
      paragraph:all.filter(block=>block.type==='paragraph').length,
      code:all.filter(block=>block.type==='code').length,
      diagram:all.filter(block=>block.type==='diagram').length,
      math:all.filter(block=>block.type==='math').length,
      table:all.filter(block=>block.type==='table').length,
      task:all.filter(block=>block.type==='task').length
    };
  }
};

const BlockProjectionRuntime={
  renderLight(block){
    if(!block)return '';
    block.cache=block.cache||{};
    if(!block.dirty&&block.cache.lightHtml)return block.cache.lightHtml;
    const html=LightPreviewService.render(block.text||'');
    block.cache.lightHtml=html;
    block.cache.lightRenderedAt=Date.now();
    return html;
  },
  renderEnhanced(block,ctx={}){
    if(!block)return '';

    let html='';
    try{
      html=MarkdownService.parse(block.text||'',{...ctx,block});
    }catch(e){
      html=this.renderLight(block);
    }
    block.cache.enhancedHtml=html;
    block.cache.enhancedRenderedAt=Date.now();
    block.dirty=false;
    return html;
  },
  renderEnhancedBlocks(blocks=[],ctx={}){

      const id=escapeHtml(block.id||'');

    }).join('');
    return '<div class="enhanced-preview block-preview">'+html+'</div>';
  },
  dirtyBlocks(blocks=[]){

  },
  invalidate(block){
    if(!block)return;
    block.cache=block.cache||{};
    delete block.cache.enhancedHtml;
    delete block.cache.enhancedRenderedAt;
    block.dirty=true;
  },
  compact(blocks=[]){
    return (blocks||[]).map(block=>({
      id:block.id,
      type:block.type,
      lang:block.lang,
      hash:block.hash,
      forms:block.forms,

      }
    }));
  }
};

const PreviewPatchRuntime={
  parse(html=''){
    const template=document.createElement('template');
    template.innerHTML=String(html||'');
    return template.content;
  },
  apply(host,html){
    if(!host)return false;
    // 修正4: data-block-id付きHTMLのみを処理対象にする
    const next=this.parse(html);
    const nextBlocks=Array.from(next.querySelectorAll('[data-block-id]'));
    if(!nextBlocks.length){
      // data-block-idがない場合は通常のHTMLとして処理しない
      return false;
    }
    const currentBlocks=new Map(Array.from(host.querySelectorAll('[data-block-id]')).map(el=>[el.getAttribute('data-block-id'),el]));
    if(!currentBlocks.size){
      // 既存ブロックがない場合は処理しない
      return false;
    }
    let patched=0;
    nextBlocks.forEach(nextBlock=>{
      const id=nextBlock.getAttribute('data-block-id');
      const current=currentBlocks.get(id);
      if(!current)return;
      const nextHash=nextBlock.getAttribute('data-block-hash')||'';
      const currentHash=current.getAttribute('data-block-hash')||'';
      if(nextHash&&currentHash&&nextHash===currentHash)return;
      current.replaceWith(nextBlock.cloneNode(true));
      patched+=1;
    });
    if(patched===0&&nextBlocks.length!==currentBlocks.size){
      // パッチが適用されず、ブロック数が異なる場合は処理しない
      return false;
    }
    return true;
  }
};

const BlockEnhancerRuntime={
  async enhance(host,ctx={}){
    if(!host)return;
    await this.enhanceMermaid(host,ctx);
  },
  async enhanceMermaid(host,ctx={}){

        node.setAttribute('data-enhanced','true');

        node.innerHTML='<pre>'+escapeHtml(src)+'</pre>';
      }
    }
  }
};

const SnapshotDeltaRuntime={
  summarize(snapshot){
    return {id:snapshot?.id,name:snapshot?.name,state:snapshot?.state,blockStats:snapshot?.blockStats,blockManifest:snapshot?.blockManifest,updatedAt:Date.now()};
  },
  delta(prev={},next={}){
    const prevBlocks=new Map((prev.blocks||[]).map(block=>[block.id,block]));
    const nextBlocks=new Map((next.blocks||[]).map(block=>[block.id,block]));
    const added=[];
    const changed=[];
    const removed=[];
    nextBlocks.forEach((block,id)=>{
      const old=prevBlocks.get(id);
      if(!old)added.push(block);
      else if(old.hash!==block.hash)changed.push(block);
    });
    prevBlocks.forEach((block,id)=>{if(!nextBlocks.has(id))removed.push({id,hash:block.hash,type:block.type})});
    return {fieldId:next.id,version:next.state?.version,added,changed,removed,createdAt:Date.now()};
  },
  save(key,snapshot){
    try{
      const prev=StorageService.get(key+'.latest',null);
      const delta=this.delta(prev||{},snapshot||{});
      StorageService.set(key+'.summary',this.summarize(snapshot));
      StorageService.set(key+'.delta:'+Date.now(),delta);
      StorageService.set(key+'.latest',snapshot);
      FieldSnapshotRepository.compact(snapshot?.id||key,20);
      return delta;
    }catch(e){console.warn('SnapshotDeltaRuntime save failed',e);return null;}
  }
};

const PreviewVirtualRuntime={
  estimateVisibleBlockIds(host){
    if(!host)return [];
    const viewportTop=0;
    const viewportBottom=window.innerHeight||900;
    return Array.from(host.querySelectorAll('[data-block-id]')).filter(el=>{
      const r=el.getBoundingClientRect();
      return r.bottom>=viewportTop-300&&r.top<=viewportBottom+300;
    }).map(el=>el.getAttribute('data-block-id'));
  }
};

// Phase 1-6 Acceleration Runtime
// Preview virtualization / Restore / Export Forms / Diagnostics / Worker / Event / Policy / Wonder Capsule
// ============================================================
const PreviewVirtualizationRuntime={
  maxEagerBlocks:80,
  render(blocks=[],ctx={}){
    const visible=new Set(ctx.visibleBlockIds||[]);
    const total=(blocks||[]).length;
    const shouldVirtualize=total>this.maxEagerBlocks;
    const html=(blocks||[]).map((block,index)=>{
      const id=escapeHtml(block.id||'');
      const hash=escapeHtml(block.hash||'');
      const type=escapeHtml(block.type||'block');
      const isVisible=!shouldVirtualize||index<this.maxEagerBlocks||visible.has(block.id);
      if(!isVisible){
        const label=escapeHtml((block.type||'block')+' / '+String((block.text||'').length)+' chars');
        return '<section class="preview-block preview-placeholder preview-block-'+type+'" data-block-id="'+id+'" data-block-hash="'+hash+'" data-virtual="true"><div class="placeholder-card">'+label+'</div></section>';
      }
      // 修正2: 最終表示はGFM経路を使用（enhanced:true時）
      const body=ctx.enhanced===true
        ? BlockProjectionRuntime.renderEnhanced(block,{...ctx,mode:'preview',observer:'preview-virtualization.render',gfm:true})
        : BlockProjectionRuntime.renderLight(block);
      return '<section class="preview-block preview-block-'+type+'" data-block-id="'+id+'" data-block-hash="'+hash+'">'+body+'</section>';
    }).join('');
    return '<div class="light-preview block-preview virtual-preview" data-total-blocks="'+total+'">'+html+'</div>';
  },
  hydrate(host,blocks=[],ctx={}){
    if(!host)return;
    // 修正4: hydrate対象をplaceholder（data-virtual="true"）だけに限定
    const root=host.matches?.('.preview-content')
      ? host
      : host.querySelector?.('.preview-content');
    if(!root)return;
    const virtualNodes=Array.from(root.querySelectorAll('[data-virtual="true"][data-block-id]'));
    if(!virtualNodes.length)return;
    const visibleIds=new Set(PreviewVirtualRuntime.estimateVisibleBlockIds(root));
    const blockMap=new Map((blocks||[]).map(block=>[block.id,block]));
    virtualNodes.forEach(node=>{
      const id=node.getAttribute('data-block-id');
      if(!id||!visibleIds.has(id))return;
      const block=blockMap.get(id);
      if(!block)return;
      const domHash=node.getAttribute('data-block-hash');
      if(domHash&&block.hash&&domHash!==block.hash)return;
      const type=escapeHtml(block.type||'block');
      const hash=escapeHtml(block.hash||'');
      const section=document.createElement('section');
      section.className='preview-block preview-block-'+type+' enhanced-block';
      section.setAttribute('data-block-id',id);
      section.setAttribute('data-block-hash',hash);
      section.setAttribute('data-hydrated','true');
      section.setAttribute('data-renderer','enhanced-gfm');
      // 修正1: hydrate時もrenderEnhanced()でGFM経路を使用
      try{
        section.innerHTML=BlockProjectionRuntime.renderEnhanced(block,{...ctx,mode:'preview',observer:'preview-virtualization.hydrate',gfm:true});
      }catch(e){
        console.warn('Preview hydrate enhanced render failed',e);
        section.innerHTML='<pre>'+escapeHtml(block.text||'')+'</pre>';
        section.setAttribute('data-render-error','true');
      }
      node.replaceWith(section);
    });
  }
};

const FieldSnapshotRepository={
  latestKey(id){return 'field.snapshot:'+id+'.latest'},
  summaryKey(id){return 'field.snapshot:'+id+'.summary'},
  restoreLatest(id){try{return StorageService.get(this.latestKey(id),null)}catch{return null}},
  restoreTabField(id){
    const snapshot=this.restoreLatest(id);
    if(!snapshot)return null;
    const field=new InformationField({id:snapshot.id,name:snapshot.name,source:snapshot.core?.source||snapshot.forms?.markdown||'',intent:snapshot.intent,state:snapshot.state});
    return new TabField({id:snapshot.id,name:snapshot.name,informationField:field,ui:snapshot.ui||{},events:snapshot.events||[]});
  },
  compact(id,limit=20){
    try{
      const logicalPrefix='field.snapshot:'+id+'.delta:';
      const rawPrefix=STORAGE_PREFIX+logicalPrefix;
      const keys=[];
      for(let i=0;i<localStorage.length;i++){
        const rawKey=localStorage.key(i);
        if(rawKey&&rawKey.startsWith(rawPrefix))keys.push(rawKey);
      }
      keys.sort();
      keys.slice(0,Math.max(0,keys.length-limit)).forEach(rawKey=>localStorage.removeItem(rawKey));
      return keys.length;
    }catch{return 0}
  }
};

const RestoreDiffRuntime={
  diff(current='',next=''){
    const a=String(current||'').split(String.fromCharCode(10));
    const b=String(next||'').split(String.fromCharCode(10));
    const max=Math.max(a.length,b.length);
    const rows=[];
    let added=0,removed=0,changed=0,same=0;
    for(let i=0;i<max;i++){
      const before=a[i];
      const after=b[i];
      if(before===after){same+=1;continue;}
      if(before==null){added+=1;rows.push({type:'added',line:i+1,before:'',after});continue;}
      if(after==null){removed+=1;rows.push({type:'removed',line:i+1,before,after:''});continue;}
      changed+=1;rows.push({type:'changed',line:i+1,before,after});
    }
    return {added,removed,changed,same,total:max,rows:rows.slice(0,80),currentChars:String(current||'').length,nextChars:String(next||'').length,charDelta:String(next||'').length-String(current||'').length};
  },
  backup(fieldId,source='',meta={}){
    const key='field.restore.backup:'+fieldId+':'+Date.now();
    const backup={fieldId,source:String(source||''),meta,createdAt:Date.now()};
    try{StorageService.set(key,backup);StorageService.set('field.restore.backup.latest:'+fieldId,backup)}catch(e){console.warn('restore backup failed',e)}
    return {key,backup};
  }
};

const SnapshotTimelineRuntime={
  normalizeKey(rawKey=''){
    return String(rawKey||'').startsWith(STORAGE_PREFIX)?String(rawKey).slice(STORAGE_PREFIX.length):String(rawKey||'');
  },
  readLogical(key){
    try{return StorageService.get(this.normalizeKey(key),null)}catch{}
    try{return JSON.parse(localStorage.getItem(key)||'null')}catch{return localStorage.getItem(key)}
  },
  list(fieldId,limit=40){
    const items=[];
    const pushItem=(type,key,value)=>{
      const createdAt=value?.createdAt||value?.updatedAt||value?.appliedAt||value?.undoneAt||Number(String(key).split(':').pop())||0;
      const size=(()=>{try{return JSON.stringify(value||{}).length}catch{return 0}})();
      items.push({type,key,createdAt,size,label:type+' / '+new Date(createdAt||Date.now()).toLocaleString()});
    };
    try{
      for(let i=0;i<localStorage.length;i++){
        const rawKey=localStorage.key(i);
        if(!rawKey)continue;
        const key=this.normalizeKey(rawKey);
        const matchField=String(key).includes(fieldId);
        const relevant=matchField&&(key.startsWith('field.snapshot:')||key.startsWith('field.restore.backup:')||key.startsWith('field.restore.backup.latest:')||key.startsWith('field.restore.transaction:'));
        if(!relevant)continue;
        const value=this.readLogical(key);
        const type=key.includes('field.restore.transaction:')?'transaction':key.includes('.delta:')?'delta':key.includes('.latest')?'latest':key.includes('.summary')?'summary':key.includes('backup')?'backup':'snapshot';
        pushItem(type,key,value);
      }
      ['field.restore.pending','field.restore.applied','field.restore.undo.pending','field.restore.preview','field.restore.status'].forEach(key=>{
        let value=null;
        try{value=StorageService.get(key,null)}catch{}
        if(value&&(!fieldId||value.fieldId===fieldId))pushItem(key.replace('field.restore.','restore-'),key,value);
      });
    }catch(e){console.warn('SnapshotTimeline list failed',e)}
    return items.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,limit);
  },
  export(fieldId){
    const items=this.list(fieldId,200);
    downloadBlob(new Blob([JSON.stringify({fieldId,items,exportedAt:Date.now()},null,2)],{type:'application/json'}),'snapshot-timeline-'+fieldId+'.json');
    return items.length;
  },
  load(key){return this.readLogical(key)},
  sourceOf(value){
    return value?.snapshot?.core?.source||
      value?.snapshot?.forms?.markdown||
      value?.target?.source||
      value?.before?.source||
      value?.core?.source||
      value?.forms?.markdown||
      value?.source||
      '';
  },
  exportItem(item){
    const value=this.load(item.key);
    downloadBlob(new Blob([JSON.stringify({item,value,exportedAt:Date.now()},null,2)],{type:'application/json'}),'timeline-item-'+item.type+'-'+Date.now()+'.json');
  }
};

const BlockDiffRuntime={
  blocksFromSource(source=''){
    return BlockRuntime.parse(String(source||''));
  },
  compare(currentSource='',nextSource=''){
    const current=this.blocksFromSource(currentSource);
    const next=this.blocksFromSource(nextSource);
    const currentByHash=new Map(current.map(block=>[block.hash,block]));
    const currentById=new Map(current.map(block=>[block.id,block]));
    const added=[];
    const changed=[];
    const unchanged=[];
    next.forEach(block=>{
      if(currentByHash.has(block.hash)){unchanged.push(block);return;}
      const byId=currentById.get(block.id);
      if(byId&&byId.hash!==block.hash)changed.push({before:byId,after:block});
      else added.push(block);
    });
    const nextHashes=new Set(next.map(block=>block.hash));
    const nextIds=new Set(next.map(block=>block.id));
    const removed=current.filter(block=>!nextHashes.has(block.hash)&&!nextIds.has(block.id));
    const affectedForms={
      diagram:added.concat(removed).some(block=>block.forms?.diagram)||changed.some(pair=>pair.before.forms?.diagram||pair.after.forms?.diagram),
      math:added.concat(removed).some(block=>block.forms?.math)||changed.some(pair=>pair.before.forms?.math||pair.after.forms?.math),
      table:added.concat(removed).some(block=>block.forms?.table)||changed.some(pair=>pair.before.forms?.table||pair.after.forms?.table),
      task:added.concat(removed).some(block=>block.forms?.task)||changed.some(pair=>pair.before.forms?.task||pair.after.forms?.task),
      decision:added.concat(removed).some(block=>block.forms?.decision)||changed.some(pair=>pair.before.forms?.decision||pair.after.forms?.decision)
    };
    return {added,removed,changed,unchanged,affectedForms,currentCount:current.length,nextCount:next.length,createdAt:Date.now()};
  },
  summary(diff){
    if(!diff)return 'no block diff';
    return '+'+(diff.added?.length||0)+' / -'+(diff.removed?.length||0)+' / ~'+(diff.changed?.length||0)+' blocks';
  }
};

const RestoreTransactionRuntime={
  begin(fieldId,currentSource='',targetSnapshot=null,meta={}){
    const id='rstx-'+Date.now()+'-'+Math.random().toString(36).slice(2,8);
    const targetSource=targetSnapshot?.core?.source||targetSnapshot?.forms?.markdown||'';
    const tx={
      id,
      fieldId,
      status:'preview',
      meta,
      before:{source:currentSource,chars:String(currentSource||'').length,hash:hashText(currentSource)},
      target:{snapshotId:targetSnapshot?.id,name:targetSnapshot?.name,source:targetSource,chars:String(targetSource||'').length,hash:hashText(targetSource)},
      lineDiff:RestoreDiffRuntime.diff(currentSource,targetSource),
      blockDiff:BlockDiffRuntime.compare(currentSource,targetSource),
      createdAt:Date.now(),
      updatedAt:Date.now()
    };
    this.save(tx);
    return tx;
  },
  save(tx){
    try{StorageService.set('field.restore.transaction:'+tx.id,tx);StorageService.set('field.restore.transaction.latest:'+tx.fieldId,tx)}catch(e){console.warn('restore transaction save failed',e)}
    return tx;
  },
  markApplied(tx,backupKey){
    if(!tx)return null;
    tx.status='applied';
    tx.backupKey=backupKey;
    tx.appliedAt=Date.now();
    tx.updatedAt=Date.now();
    return this.save(tx);
  },
  markUndone(fieldId){
    let tx=null;
    try{tx=StorageService.get('field.restore.transaction.latest:'+fieldId,null)}catch{}
    if(!tx)return null;
    tx.status='undone';
    tx.undoneAt=Date.now();
    tx.updatedAt=Date.now();
    return this.save(tx);
  },
  list(fieldId,limit=20){
    const items=[];
    try{
      const prefix=STORAGE_PREFIX+'field.restore.transaction:';
      for(let i=0;i<localStorage.length;i++){
        const rawKey=localStorage.key(i);
        if(!rawKey||!rawKey.startsWith(prefix)||rawKey.includes('.latest:'))continue;
        const logicalKey=rawKey.slice(STORAGE_PREFIX.length);
        const value=StorageService.get(logicalKey,null);
        if(value&&value.fieldId===fieldId)items.push(value);
      }
    }catch{}
    return items.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).slice(0,limit);
  }
};

const RestoreGraphRuntime={
  build(fieldId){
    const timeline=SnapshotTimelineRuntime.list(fieldId,120);
    const txs=RestoreTransactionRuntime.list(fieldId,30);
    const nodes=[];
    const edges=[];
    timeline.forEach(item=>nodes.push({id:item.key,type:item.type,label:item.type,createdAt:item.createdAt,size:item.size}));
    txs.forEach(tx=>{
      nodes.push({id:tx.id,type:'transaction',label:tx.status,createdAt:tx.createdAt,size:tx.target?.chars||0});
      if(tx.backupKey)edges.push({from:tx.backupKey,to:tx.id,type:'backup'});
      edges.push({from:tx.id,to:'field.current:'+fieldId,type:tx.status});
    });
    nodes.push({id:'field.current:'+fieldId,type:'current',label:'current field',createdAt:Date.now()});
    return {fieldId,nodes:nodes.slice(0,80),edges:edges.slice(0,120),createdAt:Date.now()};
  },
  export(fieldId){
    const graph=this.build(fieldId);
    downloadBlob(new Blob([JSON.stringify(graph,null,2)],{type:'application/json'}),'restore-graph-'+fieldId+'.json');
    return graph;
  }
};

const BlockRestoreRuntime={
  sourceFromSnapshotValue(value){
    return SnapshotTimelineRuntime.sourceOf(value)||value?.core?.source||value?.forms?.markdown||'';
  },
  blocksFromValue(value){
    const source=this.sourceFromSnapshotValue(value);
    if(value?.snapshot?.blocks?.length)return value.snapshot.blocks;
    if(value?.blocks?.length)return value.blocks;
    if(source)return BlockRuntime.parse(source);
    return [];
  },
  restoreBlockSource(currentField,block){
    const currentSource=currentField?.core?.source||'';
    const currentBlocks=BlockRuntime.parse(currentSource);
    const targetText=block?.text||'';
    if(!targetText)return currentSource;
    let replaced=false;
    const nextBlocks=currentBlocks.map(current=>{
      const sameId=current.id&&block.id&&current.id===block.id;
      const sameHash=current.hash&&block.hash&&current.hash===block.hash;
      const sameType=current.type===block.type&&current.lang===block.lang&&current.text.slice(0,24)===targetText.slice(0,24);
      if(!replaced&&(sameId||sameHash||sameType)){
        replaced=true;
        return {...current,text:targetText};
      }
      return current;
    });
    if(!replaced){
      nextBlocks.push({...block,text:targetText});
    }
    return nextBlocks.map(b=>b.text||'').join(String.fromCharCode(10)+String.fromCharCode(10));
  },
  snapshotForBlockRestore(currentField,block,meta={}){
    const source=this.restoreBlockSource(currentField,block);
    return {
      id:currentField?.id||meta.fieldId||uuid(),
      name:(currentField?.name||meta.name||'field')+'.block-restore',
      core:{source},
      forms:{markdown:source},
      state:{blockRestore:true,blockId:block?.id,blockType:block?.type,updatedAt:Date.now()},
      meta
    };
  }
};

const RuntimeRestoreBridge={
  _installed:false,
  install(){
    if(this._installed)return;
    this._installed=true;
    window.addEventListener('field:restore-requested',event=>this.apply(event.detail||{}));
  },
  getSource(snapshot){
    return snapshot?.core?.source||snapshot?.forms?.markdown||snapshot?.document?.content?.markdown||'';
  },
  setNativeValue(el,value){
    const proto=Object.getPrototypeOf(el);
    const descriptor=Object.getOwnPropertyDescriptor(proto,'value');
    if(descriptor?.set)descriptor.set.call(el,value);
    else el.value=value;
  },
  apply({fieldId,snapshot}={}){
    const source=this.getSource(snapshot);
    if(!source){StorageService.set('field.restore.status',{fieldId,status:'empty-source',updatedAt:Date.now()});return false;}
    const textarea=document.querySelector('textarea.editor,textarea[spellcheck="false"],textarea');
    if(!textarea){
      StorageService.set('field.restore.pending',{fieldId,snapshot,createdAt:Date.now(),reason:'no-editor-found'});
      StorageService.set('field.restore.status',{fieldId,status:'pending-no-editor',updatedAt:Date.now()});
      return false;
    }
    textarea.focus();
    this.setNativeValue(textarea,source);
    textarea.dispatchEvent(new Event('input',{bubbles:true}));
    textarea.dispatchEvent(new Event('change',{bubbles:true}));
    StorageService.set('field.restore.applied',{fieldId,snapshotId:snapshot?.id,updatedAt:Date.now(),chars:source.length});
    StorageService.set('field.restore.status',{fieldId,status:'applied-to-editor',updatedAt:Date.now(),chars:source.length});
    return true;
  }
};
RuntimeRestoreBridge.install();

const PolicyEngine={

}

const FieldPulse={
  measure(field){
    const source=field?.core?.source||'';
    const forms=field?.inferForms?field.inferForms():{};
    const scores={
      document:forms.document?.valueOf?0.5:0.5,
      diagram:forms.diagram?0.82:0,
      math:forms.math?0.68:0,
      table:forms.table?0.66:0,
      task:forms.task?0.76:0,
      decision:forms.decision?0.86:0,
      publish:source.length>1200?0.58:0
    };
    const ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    const dominantForm=ranked[0]?.[0]||'document';
    const secondaryForms=ranked.filter(([,score])=>score>0&&score<ranked[0][1]).slice(0,3).map(([name])=>name);
    const energy=Math.min(1,source.length/3000);
    const stability=source.length<80?0.22:source.length<400?0.48:0.72;
    const nextSuggestedObservation=dominantForm==='task'?'form.tasks':dominantForm==='decision'?'form.decision':dominantForm==='diagram'?'form.diagram':dominantForm==='table'?'form.table':'form.preview';
    return {dominantForm,secondaryForms,scores,energy,stability,nextSuggestedObservation,measuredAt:Date.now()};
  }
};

const FormBloom={
  observe(field){
    const forms=field.inferForms();
    const pulse=FieldPulse.measure(field);
    const blooms=[];
    if(forms.diagram)blooms.push({form:'diagram',label:'構造図 Form',reason:'Mermaidブロックがあり、関係性を図として咲かせられます。'});
    if(forms.task)blooms.push({form:'task',label:'Action Form',reason:'チェックリストがあり、次アクションとして抽出できます。'});
    if(forms.decision)blooms.push({form:'decision',label:'Decision Form',reason:'結論や決定が含まれ、意思決定ログとして保存できます。'});
    if(forms.table)blooms.push({form:'table',label:'Table Form',reason:'表構造があり、比較表やExcel Formに展開できます。'});
    if(forms.math)blooms.push({form:'math',label:'Formula Form',reason:'数式表現があり、数理説明として整形できます。'});
    if(blooms.length===0&&field.core.source.length>300)blooms.push({form:'summary',label:'Summary Form',reason:'情報量が増えているため、要約 Form を咲かせられます。'});
    return {pulse,blooms,observedAt:Date.now()};
  }
};

const WonderLens={
  observe(field){
    const pulse=FieldPulse.measure(field);
    const forms=field.inferForms();
    const suggestions=[];
    if(forms.task&&forms.decision)suggestions.push('この情報場は、意思決定ログと実行タスクを一体化した Action Decision Form にできます。');
    if(forms.diagram)suggestions.push('この情報場は、図を中心にした設計資料や説明スライドへ変換できます。');
    if(forms.table)suggestions.push('この情報場は、比較表・評価表・Excel Form として再利用できます。');
    if(forms.math)suggestions.push('この情報場は、数式を軸にした技術説明 Form として整えられます。');
    if(!forms.decision&&field.core.source.length>800)suggestions.push('情報量が増えています。結論 Form を咲かせると、読み手に届きやすくなります。');
    if(!forms.task&&forms.decision)suggestions.push('決定はありますが、次アクションが薄いです。Action Form を咲かせる余地があります。');
    if(suggestions.length===0)suggestions.push('この情報場はまだ柔らかい状態です。Preview Form と Structure Form から育てるのが良さそうです。');
    return {pulse,forms,suggestions,observedAt:Date.now()};
  }
};

class InformationField{
  constructor({id,name,source='',forms={},intent={},state={},metaDocument=null}={}){
    this.id=id||uuid();
    this.name=name||'Untitled Field';
    this.kind='information-field';
    this.core={source,atoms:[],relations:[],claims:[],tasks:[],decisions:[],references:[]};
    this.blocks=BlockRuntime.parse(source);
    this.forms={markdown:source,document:null,preview:null,html:null,pdf:null,word:null,excel:null,zip:null,semantics:null,...forms};
    this.intent={purpose:'compose',audience:'self',desiredOutcome:'',tone:'neutral',constraints:[],...intent};
    this.state={version:0,lifecycle:'draft',createdAt:Date.now(),updatedAt:Date.now(),...state};
    this.document=metaDocument||new MetaDocument({id:this.id,title:this.name,markdown:source,intent:this.intent,lifecycle:this.state.lifecycle});
    this.blockManifest=BlockRuntime.manifest(this.blocks);
    this.cache=new Map();
  }

  get title(){return this.name}
  set title(value){this.name=value;this.document.title=value}
  get version(){return this.state.version}
  get content(){return {markdown:this.core.source,assets:this.document.content?.assets||[],references:this.document.content?.references||[]}}
  get profileId(){return this.document.profileId}
  get lifecycle(){return this.state.lifecycle}
  get metadata(){return this.document.metadata||{}}

  static fromTab(tab={},options={}){
    const doc=MetaDocument.fromTab(tab,options);
    return new InformationField({id:doc.id,name:doc.title,source:doc.content?.markdown||tab.text||'',intent:doc.intent,state:{version:doc.version||0,lifecycle:doc.lifecycle||'draft',source:'tab'},metaDocument:doc});
  }

  static fromFile(file={},options={}){
    const doc=MetaDocument.fromFile(file,options);
    return new InformationField({id:doc.id,name:doc.title,source:doc.content?.markdown||file.text||'',intent:doc.intent,state:{version:doc.version||0,lifecycle:doc.lifecycle||'draft',source:'file'},metaDocument:doc});
  }

  updateSource(source){
    if(source===this.core.source)return;
    this.core.source=source;
    this.forms.markdown=source;
    this.state.version+=1;
    this.state.updatedAt=Date.now();
    this.document.updateMarkdown(source);
    this.blocks=BlockRuntime.reconcile(this.blocks,BlockRuntime.parse(source));
    this.blockManifest=BlockRuntime.manifest(this.blocks);
    this.cache.clear();
  }

  inferForms(){
    const source=this.core.source||'';
    const blocks=this.blocks&&this.blocks.length?this.blocks:BlockRuntime.parse(source);
    return {
      markdown:true,
      document:true,
      preview:true,
      semantics:true,
      diagram:blocks.some(block=>block.forms?.diagram),
      math:blocks.some(block=>block.forms?.math),
      table:blocks.some(block=>block.forms?.table),
      task:blocks.some(block=>block.forms?.task),
      decision:blocks.some(block=>block.forms?.decision)
    };
  }

  observe(form,ctx={}){
    const normalized={raw:'markdown.raw',markdown:'markdown.raw',document:'html.preview',preview:'html.preview',html:'html.export',semantics:'field.semantics',forms:'field.forms',pulse:'field.pulse',bloom:'form.bloom',wonder:'lens.wonder',state:'field.state'}[form]||form;
    const key=normalized+'@'+this.state.version+':'+(ctx.observer||'');
    if(this.cache.has(key))return this.cache.get(key);

    let value;
    switch(normalized){
      case 'field.state':
        value={id:this.id,name:this.name,kind:this.kind,version:this.state.version,lifecycle:this.state.lifecycle,intent:this.intent,forms:this.inferForms(),blocks:BlockRuntime.stats(this.blocks),manifest:this.blockManifest,policies:PolicyEngine.check(this),diagnostics:RuntimeDiagnostics.snapshot(this),document:this.document.observe('state',ctx)};
        break;
      case 'field.forms':
        value={...this.inferForms(),blocks:BlockRuntime.stats(this.blocks),manifest:this.blockManifest};
        break;
      case 'field.pulse':
        value=FieldPulse.measure(this);
        break;
      case 'form.bloom':
        value=FormBloom.observe(this);
        break;
      case 'lens.wonder':
        value=WonderLens.observe(this);
        break;
      case 'field.semantics':
        value={...this.document.observe('semantics',ctx),forms:this.inferForms(),blocks:BlockRuntime.stats(this.blocks),dirtyBlocks:(this.blocks||[]).filter(block=>block.dirty).map(block=>({id:block.id,type:block.type,forms:block.forms})),fieldId:this.id,fieldName:this.name};
        break;
      case 'projection.manifest':
        value={...this.document.observe('projection.manifest',ctx),fieldId:this.id,fieldName:this.name,forms:this.inferForms(),runtime:'InformationField'};
        break;
      default:
        value=this.document.observe(normalized,ctx);
    }

    this.cache.set(key,value);
    return value;
  }

  project(target,ctx={}){
    return {fieldId:this.id,fieldName:this.name,form:target,createdAt:Date.now(),payload:this.observe(target,{...ctx,observer:target})};
  }

  snapshot(){
    return {id:this.id,name:this.name,kind:this.kind,core:this.core,blocks:(this.blocks||[]).map(block=>({id:block.id,type:block.type,lang:block.lang,hash:block.hash,text:block.text,forms:block.forms,cache:{light:!!block.cache?.lightHtml,enhanced:!!block.cache?.enhancedHtml}})),blockProjectionCache:BlockProjectionRuntime.compact(this.blocks),blockStats:BlockRuntime.stats(this.blocks),blockManifest:this.blockManifest,forms:{markdown:this.forms.markdown,inferred:this.inferForms()},intent:this.intent,state:this.state,pulse:FieldPulse.measure(this),wonder:WonderLens.observe(this),policies:PolicyEngine.check(this),diagnostics:RuntimeDiagnostics.snapshot(this),events:EventLogRuntime.recent(this),document:this.document.observe('state',{observer:'snapshot'})};
  }
}

// --- SidebarAccordionHost: Accordion-based Panel Display ---
class PanelErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null}}
  static getDerivedStateFromError(error){return{error}}
  componentDidCatch(error){try{PluginKernel._recordError(this.props.panel?.pluginId||this.props.panel?.id||'panel','panel:render',error)}catch{}}
  render(){
    if(this.state.error){
      const msg=this.state.error?.message||String(this.state.error);
      return React.createElement('div',{style:{fontSize:12,color:'#f44336',padding:8,lineHeight:1.5}},'Panel degraded: '+msg);
    }
    return this.props.children;
  }
}
function SafePanel({panel,ctx}){
  let child=null;
  try{child=panel.render?.(ctx)||null}
  catch(e){
    try{PluginKernel._recordError(panel.pluginId||panel.id,'panel:render',e)}catch{}
    child=React.createElement('div',{style:{fontSize:12,color:'#f44336',padding:8,lineHeight:1.5}},'Panel degraded: '+(e?.message||String(e)));
  }
  return React.createElement(PanelErrorBoundary,{panel},child);
}

const SidebarAccordionHost=React.memo(({ctx})=>{
  const[expandedPanels,setExpandedPanels]=React.useState(new Set(['open-editors','workspaces','saved-files','trash']));
  const[sidebarWidth,setSidebarWidth]=React.useState(()=>AppCore.adapters.storage.get('sidebar_width',280));
  const{setProgressModal}=React.useContext(UIContext);
  const c=useThemeColors();
  
  // Get all sidebar panels from registry
  const allPanels=PluginKernel.getSidebarPanels()
    .filter(p=>p.area==='sidebar'||!p.area);
  
  // Include all panels with optional ordering
  const order={
    'open-editors':10,
    'workspaces':20,
    'saved-files':30,
    'trash':40,
    'analysis-links':50,
    'analysis-images':60,
    'analysis-code':70
  };
  const sidebarPanels=allPanels
    .slice()
    .sort((a,b)=>(order[a.id]||999)-(order[b.id]||999));
  

  
  // Enrich ctx
  const enrichedCtx={
    ...ctx,
    showMessage:(msg,type='info')=>{
      if(window.__appCoreNotify)window.__appCoreNotify(msg,type);
    },
    setProgressModal
  };
  
  // Persist sidebar width
  React.useEffect(()=>{
    AppCore.adapters.storage.set('sidebar_width',sidebarWidth);
  },[sidebarWidth]);
  
  const togglePanel=(panelId)=>{
    setExpandedPanels(prev=>{
      const next=new Set(prev);
      if(next.has(panelId))next.delete(panelId);
      else next.add(panelId);
      return next;
    });
  };
  
  // Resize handler
  const[isResizing,setIsResizing]=React.useState(false);
  React.useEffect(()=>{
    if(!isResizing)return;
    const handleMouseMove=(e)=>{
      const newWidth=Math.max(200,Math.min(600,e.clientX));
      setSidebarWidth(newWidth);
    };
    const handleMouseUp=()=>setIsResizing(false);
    document.addEventListener('mousemove',handleMouseMove);
    document.addEventListener('mouseup',handleMouseUp);
    return()=>{
      document.removeEventListener('mousemove',handleMouseMove);
      document.removeEventListener('mouseup',handleMouseUp);
    };
  },[isResizing]);
  
  return React.createElement('div',{style:{display:'flex',flexDirection:'column',width:sidebarWidth,height:'100%',borderRight:`1px solid ${c.border}`,backgroundColor:c.sidebarBg||'#fafafa',position:'relative',overflow:'auto'}},
    // Accordion sections
    sidebarPanels.map(panel=>React.createElement('div',{key:panel.id,style:{borderBottom:`1px solid ${c.border}`}},
      // Section header
      React.createElement('div',{onClick:()=>togglePanel(panel.id),style:{display:'flex',alignItems:'center',gap:6,padding:'8px 12px',backgroundColor:c.tabBg||'#fff',cursor:'pointer',userSelect:'none',fontSize:12,fontWeight:'bold',color:c.editorText}},
        React.createElement('span',{style:{fontSize:14}},panel.icon||'📋'),
        React.createElement('span',{style:{flex:1}},panel.title||panel.id),
        React.createElement('span',{style:{fontSize:10,opacity:0.5}},expandedPanels.has(panel.id)?'▼':'▶')
      ),
      // Section content
      expandedPanels.has(panel.id)&&React.createElement('div',{style:{padding:'8px',maxHeight:300,overflow:'auto'}},
        React.createElement(SafePanel,{panel,ctx:enrichedCtx})
      )
    )),
    // Resize handle
    React.createElement('div',{onMouseDown:()=>setIsResizing(true),style:{width:'4px',height:'100%',cursor:'col-resize',backgroundColor:isResizing?c.primary:'transparent',position:'absolute',right:0,top:0}})
  );
});

// --- WorkspaceRepository: Manages workspace data (profile-scoped) ---
const WorkspaceRepository={
  list(profileId='default'){
    const pid=profileId||'default';
    return StorageAdapter.get(`workspaces_${pid}`,[]);
  },
  
  saveAll(workspaces,profileId='default'){
    const pid=profileId||'default';
    return StorageAdapter.set(`workspaces_${pid}`,workspaces);
  },
  
  getActiveId(profileId='default'){
    const pid=profileId||'default';
    return StorageAdapter.get(`active_workspace_${pid}`,null);
  },
  
  setActiveId(id,profileId='default'){
    const pid=profileId||'default';
    return StorageAdapter.set(`active_workspace_${pid}`,id);
  },
  
  findById(id,profileId='default'){
    const list=this.list(profileId);
    return list.find(w=>w.id===id);
  },
  
  create(name,tabs=[],profileId='default'){
    const ws={
      id:uuid(),
      name,
      createdAt:Date.now(),
      updatedAt:Date.now(),
      tabs:tabs.map(t=>({id:t.id,fileName:t.fileName,text:t.text}))
    };
    const list=this.list(profileId);
    list.push(ws);
    this.saveAll(list,profileId);
    return ws;
  },
  
  update(id,updates,profileId='default'){
    const list=this.list(profileId);
    const idx=list.findIndex(w=>w.id===id);
    if(idx<0)throw new Error('Workspace not found: '+id);
    list[idx]={...list[idx],...updates,updatedAt:Date.now()};
    this.saveAll(list,profileId);
    return list[idx];
  },
  
  delete(id,profileId='default'){
    const list=this.list(profileId);
    const filtered=list.filter(w=>w.id!==id);
    this.saveAll(filtered,profileId);
    if(this.getActiveId(profileId)===id){
      this.setActiveId(filtered.length>0?filtered[0].id:null,profileId);
    }
  }
};

// --- ProfileRepository: Manages profile data ---
const ProfileRepository={
  list(){
    return StorageAdapter.get('profiles',null);
  },
  
  saveAll(profiles){
    return StorageAdapter.set('profiles',profiles);
  },
  
  getActiveId(){
    return StorageAdapter.get('active_profile','default');
  },
  
  setActiveId(id){
    return StorageAdapter.set('active_profile',id);
  },
  
  findById(id){
    const list=this.list();
    if(!list)return null;
    return list.find(p=>p.id===id);
  },
  
  create(name,avatar,dataPolicy){
    const profile={
      id:uuid(),
      name,
      avatar,
      dataPolicy,
      settings:{autoSave:true,historyLimit:50},
      createdAt:Date.now(),
      updatedAt:Date.now()
    };
    const list=this.list()||[];
    list.push(profile);
    this.saveAll(list);
    return profile;
  },
  
  update(id,updates){
    const list=this.list();
    if(!list)throw new Error('No profiles');
    const idx=list.findIndex(p=>p.id===id);
    if(idx<0)throw new Error('Profile not found: '+id);
    list[idx]={...list[idx],...updates,updatedAt:Date.now()};
    this.saveAll(list);
    return list[idx];
  },
  
  delete(id){
    const list=this.list();
    if(!list)return;
    const filtered=list.filter(p=>p.id!==id);
    this.saveAll(filtered);
    if(this.getActiveId()===id){
      this.setActiveId(filtered.length>0?filtered[0].id:'default');
    }
  }
};

// ============================================================
// AppCore Layer (v1 - Dispatch-based Architecture)
// ============================================================
const AppCore={
  // Main dispatch entry point for Export operations only
  async dispatch(action,payload={}){
    try{
      switch(action){
        // Export operations (via JobRunner)
        case 'export.pdf':
          return await this.jobs.run('export-pdf',async(jobCtx)=>this.exporters.pdf({...payload,...jobCtx}),payload);
        case 'export.html':
          return await this.jobs.run('export-html',async(jobCtx)=>this.exporters.html({...payload,...jobCtx}),payload);
        case 'export.word':
          return await this.jobs.run('export-word',async(jobCtx)=>this.exporters.word({...payload,...jobCtx}),payload);
        case 'export.excel':
          return await this.jobs.run('export-excel',async(jobCtx)=>this.exporters.excel({...payload,...jobCtx}),payload);
        case 'export.zip':
          return await this.jobs.run('export-zip',async(jobCtx)=>this.exporters.zip({...payload,...jobCtx}),payload);
        case 'export.markdown':
          return await this.jobs.run('export-markdown',async(jobCtx)=>this.exporters.markdown({...payload,...jobCtx}),payload);
        
        default:
          throw new Error('Unknown export action: '+action);
      }
    }catch(e){
      this.notify.error('Export に失敗: '+(e?.message||e));
      throw e;
    }
  },

  // Notification API
  notify:{
    info(message){if(window.__appCoreNotify)window.__appCoreNotify(message,'info')},
    warn(message){if(window.__appCoreNotify)window.__appCoreNotify(message,'warn')},
    error(message){if(window.__appCoreNotify)window.__appCoreNotify(message,'error')}
  },

  // Progress tracking for long-running jobs (v8 - Enhanced)
  progress:{
    _callbacks:new Map(), // jobId -> {onProgress, onCancel}
    
    set(jobId,progress){
      const payload={
        jobId,
        percent:typeof progress==='number'?progress:(progress?.percent??0),
        message:typeof progress==='string'?progress:(progress?.message||'処理中...'),
        phase:progress?.phase||null,
        fileInfo:progress?.fileInfo||null,
        pageInfo:progress?.pageInfo||null,
        fileName:progress?.fileName||null,
        format:progress?.format||null,
        error:progress?.error||null,
        status:progress?.status||'running'
      };
      if(window.__appCoreProgress)window.__appCoreProgress(payload);
      // Also notify registered callbacks
      const cb=this._callbacks.get(jobId);
      if(cb?.onProgress){
        cb.onProgress(payload);
      }
    },
    
    clear(jobId){
      if(window.__appCoreProgress)window.__appCoreProgress(null);
      this._callbacks.delete(jobId);
    },
    
    // Register progress callback for a job
    onProgress(jobId,callback){
      if(!this._callbacks.has(jobId)){
        this._callbacks.set(jobId,{});
      }
      this._callbacks.get(jobId).onProgress=callback;
    },
    
    // Register cancel callback for a job
    onCancel(jobId,callback){
      if(!this._callbacks.has(jobId)){
        this._callbacks.set(jobId,{});
      }
      this._callbacks.get(jobId).onCancel=callback;
    },
    
    // Get current progress state
    getState(jobId){
      return AppCore.jobs.getState(jobId);
    }
  },

  // Export operations
  exporters:{
    async pdf(ctx){
      const markdown=ctx?.activeTab?.text||ctx?.file?.text||ctx?.text||'';
      const fieldId=ctx?.activeTab?.id||ctx?.file?.id||'export-field';
      await ObserverScheduler.observeManifest(CapabilityPlanner.forExport('pdf',markdown),{observer:'export.pdf',fieldId});
      const cap=await CapsuleRuntime.observe('capsule.pdf',{...ctx,observer:'export.pdf',fieldId});
      if(!cap.ok){
        AppCore.notify.warn(cap.fallback||'PDF機能は一時停止中です。HTML出力へ縮退します。');
        return await AppCore.exporters.html({...ctx,degradedFrom:'pdf'});
      }
      const {target,mode}=ExportDomain.resolveTargetFromContext(ctx);
      const plan=ExportDomain.createPlan({target,format:'pdf',mode});
      return await ExportExecutor.execute(plan,ctx);
    },
    async html(ctx){
      const {target,mode}=ExportDomain.resolveTargetFromContext(ctx);
      const plan=ExportDomain.createPlan({target,format:'html',mode});
      return await ExportExecutor.execute(plan,ctx);
    },
    async word(ctx){
      const markdown=ctx?.activeTab?.text||ctx?.file?.text||ctx?.text||'';
      const fieldId=ctx?.activeTab?.id||ctx?.file?.id||'export-field';
      await ObserverScheduler.observeManifest(CapabilityPlanner.forExport('word',markdown),{observer:'export.word',fieldId});
      const cap=await CapsuleRuntime.observe('capsule.word',{...ctx,observer:'export.word',fieldId});
      if(!cap.ok){
        AppCore.notify.warn(cap.fallback||'Word機能は一時停止中です。HTML出力へ縮退します。');
        return await AppCore.exporters.html({...ctx,degradedFrom:'word'});
      }
      const {target,mode}=ExportDomain.resolveTargetFromContext(ctx);
      const plan=ExportDomain.createPlan({target,format:'word',mode});
      return await ExportExecutor.execute(plan,ctx);
    },
    async excel(ctx){
      const markdown=ctx?.activeTab?.text||ctx?.file?.text||ctx?.text||'';
      const fieldId=ctx?.activeTab?.id||ctx?.file?.id||'export-field';
      await ObserverScheduler.observeManifest(CapabilityPlanner.forExport('excel',markdown),{observer:'export.excel',fieldId});
      const cap=await CapsuleRuntime.observe('capsule.excel',{...ctx,observer:'export.excel',fieldId});
      if(!cap.ok){
        AppCore.notify.warn(cap.fallback||'Excel機能は一時停止中です。Markdown出力へ縮退します。');
        return await AppCore.exporters.markdown({...ctx,degradedFrom:'excel'});
      }
      const {target,mode}=ExportDomain.resolveTargetFromContext(ctx);
      const plan=ExportDomain.createPlan({target,format:'excel',mode});
      return await ExportExecutor.execute(plan,ctx);
    },
    async zip(ctx){
      const markdown=ctx?.activeTab?.text||ctx?.file?.text||ctx?.text||'';
      const fieldId=ctx?.activeTab?.id||ctx?.file?.id||'export-field';
      await ObserverScheduler.observeManifest(CapabilityPlanner.forExport('zip',markdown),{observer:'export.zip',fieldId});
      const cap=await CapsuleRuntime.observe('capsule.zip',{...ctx,observer:'export.zip',fieldId});
      if(!cap.ok){
        AppCore.notify.warn(cap.fallback||'ZIP機能は一時停止中です。Markdown出力へ縮退します。');
        return await AppCore.exporters.markdown({...ctx,degradedFrom:'zip'});
      }
      const {target,mode}=ExportDomain.resolveTargetFromContext(ctx);
      const plan=ExportDomain.createPlan({target,format:'zip',mode});
      return await ExportExecutor.execute(plan,ctx);
    },
    async markdown(ctx){
      const {target,mode}=ExportDomain.resolveTargetFromContext(ctx);
      const plan=ExportDomain.createPlan({target,format:'markdown',mode});
      return await ExportExecutor.execute(plan,ctx);
    }
  },

  // Job runner for long-running operations (v8 - Enhanced)
  jobs:{
    _jobs:new Map(),  // jobId -> {token, state, progress, error, startTime, endTime}
    _states:new Map(), // jobId -> {status, percent, message, error}
    
    async run(jobId,handler,ctx={}){
      const token={cancelled:false};
      const startTime=Date.now();
      
      // Initialize job state
      this._jobs.set(jobId,{token,state:'running',progress:0,error:null,startTime,endTime:null});
      this._states.set(jobId,{status:'running',percent:0,message:'開始中...',error:null});
      
      try{
        AppCore.progress.set(jobId,0,'開始中...');
        
        const result=await handler({
          ...ctx,
          token,
          setProgress:(p={})=>{
            const progress={
              ...p,
              percent:p.percent??0,
              message:p.message||'処理中...',
              status:'running'
            };
            AppCore.progress.set(jobId,progress);
            // Update internal state
            const job=this._jobs.get(jobId);
            if(job){
              job.progress=progress.percent;
              this._states.set(jobId,{
                status:'running',
                percent:progress.percent,
                message:progress.message,
                phase:progress.phase||null,
                fileInfo:progress.fileInfo||null,
                pageInfo:progress.pageInfo||null,
                error:null
              });
            }
          },
          adapters:{storage:StorageAdapter,idb:IDBAdapter,file:FileAdapter}
        });
        
        // Mark as completed
        const endTime=Date.now();
        const job=this._jobs.get(jobId);
        if(job){
          job.state='completed';
          job.endTime=endTime;
        }
        
        AppCore.progress.set(jobId,{
          percent:100,
          message:'完了',
          status:'completed',
          phase:'completed'
        });
        this._states.set(jobId,{
          status:'completed',
          percent:100,
          message:'完了',
          phase:'completed',
          error:null
        });
        
        return result;
      }catch(e){
        // Mark as error
        const endTime=Date.now();
        const job=this._jobs.get(jobId);
        if(job){
          job.state='error';
          job.error=e;
          job.endTime=endTime;
        }
        
        const errorMsg='エラー: '+(e?.message||e);
        AppCore.progress.set(jobId,{
          percent:0,
          message:errorMsg,
          status:'error',
          phase:'error',
          error:e
        });
        this._states.set(jobId,{
          status:'error',
          percent:0,
          message:errorMsg,
          phase:'error',
          error:e
        });
        
        throw e;
      }finally{
        // Keep job info for a longer time so user can see completion/error
        setTimeout(()=>{
          this._jobs.delete(jobId);
          this._states.delete(jobId);
        },30000);
      }
    },
    
    cancel(jobId){
      const job=this._jobs.get(jobId);
      if(job){
        job.token.cancelled=true;
        job.state='cancelled';
        this._states.set(jobId,{status:'cancelled',percent:0,message:'キャンセルされました',error:null});
        AppCore.progress.set(jobId,null,'キャンセルされました');
      }
    },
    
    isCancelled(jobId){
      const job=this._jobs.get(jobId);
      return job?.token?.cancelled||false;
    },
    
    getState(jobId){
      return this._states.get(jobId)||null;
    },
    
    getStatus(jobId){
      const job=this._jobs.get(jobId);
      if(!job)return null;
      return{
        status:job.state,
        progress:job.progress,
        error:job.error,
        duration:job.endTime?job.endTime-job.startTime:Date.now()-job.startTime
      };
    }
  },

  // Adapter access for direct operations
  adapters:{
    storage:StorageAdapter,
    idb:IDBAdapter,
    file:FileAdapter
  },

  // Repository access for domain operations
  repositories:{
    workspace:WorkspaceRepository,
    profile:ProfileRepository,
    autosave:AutosaveRepository
  }
};

// --- Common Export Helper Function ---
// Unified progress tracking for all export operations
async function runExportWithProgress(action,format,ctx,setProgressModal){
  const fileName=ctx.activeTab?.fileName||ctx.workspaceName||'export';
  window.__appCoreProgress=(payload)=>{
    if(!payload)return;
    setProgressModal({
      current:payload.percent??0,
      percent:payload.percent??0,
      total:100,
      fileName:payload.fileName||fileName,
      format:String(payload.format||format||'export').toUpperCase(),
      status:payload.message||'処理中...',
      phase:payload.phase||payload.status||'running',
      fileInfo:payload.fileInfo||null,
      pageInfo:payload.pageInfo||null,
      error:payload.error||null,
      jobId:payload.jobId
    });
  };
  try{
    return await AppCore.dispatch(action,ctx);
  }finally{
    window.__appCoreProgress=null;
  }
}

// Create Plugin (simplified from createMetaPlugin)
function createPlugin(config){
  return {
    id:config.id,
    name:config.name,
    version:config.version,
    description:config.description,
    owner:config.owner||'core',
    enabledByDefault:config.enabledByDefault!==false,
    contributes:config.contributes||{},
    dependencies:config.dependencies||[],
    capabilities:config.capabilities||[],
    
    setup(api){
      // Register surfaces (UI elements)
      for(const surface of config.surfaces||[]){
        if(surface.type==='toolbar'){
          for(const item of surface.items||[]){
            api.registerToolbarItem(item);
          }
        }else if(surface.type==='command'){
          for(const cmd of surface.items||[]){
            api.registerCommand(cmd.id,cmd);
          }
        }else if(surface.type==='exporter'){
          for(const exp of surface.items||[]){
            api.registerExporter(exp.id,exp);
          }
        }else if(surface.type==='panel'){
          for(const panel of surface.items||[]){
            api.registerPanel(panel);
          }
        }
      }
      
      // Call custom setup if provided
      if(config.setup)config.setup(api);
    }
  };
}

const WorkspaceDomain={
  create(name,tabs=[],isSnapshot=false){
    return{
      id:uuid(),
      name,
      createdAt:Date.now(),
      updatedAt:Date.now(),
      tabs:tabs.map(t=>({
        id:isSnapshot?uuid():t.id,
        fileName:t.fileName,
        text:t.text
      }))
    };
  },

  addTab(workspace,tab){
    return{
      ...workspace,
      tabs:[...workspace.tabs,tab],
      updatedAt:Date.now()
    };
  },

  removeTab(workspace,tabId){
    return{
      ...workspace,
      tabs:workspace.tabs.filter(t=>t.id!==tabId),
      updatedAt:Date.now()
    };
  },

  updateTab(workspace,tabId,updates){
    return{
      ...workspace,
      tabs:workspace.tabs.map(t=>
        t.id===tabId?{...t,...updates}:t
      ),
      updatedAt:Date.now()
    };
  },

  reorderTabs(workspace,fromIndex,toIndex){
    const tabs=[...workspace.tabs];
    const[tab]=tabs.splice(fromIndex,1);
    tabs.splice(toIndex,0,tab);
    return{
      ...workspace,
      tabs,
      updatedAt:Date.now()
    };
  },

  updateOpenTabs(workspace,openTabs){
    return{
      ...workspace,
      tabs:workspace.tabs.map(wt=>{
        const open=openTabs.find(t=>t.id===wt.id);
        return open?{...wt,id:open.id,text:open.text}:wt;
      }),
      updatedAt:Date.now()
    };
  }
};

// --- editorEffects: Side effect handlers ---
const editorEffects={
  // Auto-save effect
  autoSave(tabs,activeTabId,profileId='default'){
    EditorRepository.saveState(tabs,activeTabId,profileId);
  },

  // Workspace sync effect (profile-scoped)
  syncWorkspace(tab,action,profileId='default'){
    if(action==='add'){
      const awsId=AppCore.repositories.workspace.getActiveId(profileId);
      if(!awsId)return;
      const wsList=AppCore.repositories.workspace.list(profileId);
      const ws=wsList.find(w=>w.id===awsId);
      if(ws&&!(ws.tabs||[]).some(wt=>wt.id===tab.id)){
        const updated=wsList.map(w=>
          w.id===awsId
            ?{...w,tabs:[...(w.tabs||[]),{id:tab.id,fileName:tab.fileName,text:tab.text||''}],updatedAt:Date.now()}
            :w
        );
        AppCore.repositories.workspace.saveAll(updated,profileId);
      }
    }else if(action==='remove'){
      const workspaces=AppCore.repositories.workspace.list(profileId);
      const wsIdx=workspaces.findIndex(ws=>
        (ws.tabs||[]).some(wt=>wt.id===tab.id)
      );
      if(wsIdx>=0){
        const updatedWs=workspaces.map((ws,idx)=>{
          if(idx===wsIdx){
            return{
              ...ws,
              tabs:ws.tabs.map(wt=>
                wt.id===tab.id
                  ?{...wt,text:tab.text,fileName:tab.fileName,id:tab.id}
                  :wt
              ),
              updatedAt:Date.now()
            };
          }
          return ws;
        });
        AppCore.repositories.workspace.saveAll(updatedWs,profileId);
      }
    }
  },

  // Trash effect
  moveToTrash(tab,profileId='default'){
    if(tab&&tab.text&&tab.text.trim()){
      AppCore.adapters.idb.moveToTrash({
        id:tab.id,
        fileName:tab.fileName,
        text:tab.text,
        size:new TextEncoder().encode(tab.text).length,
        profileId:profileId||'default'
      }).then(()=>{
        PluginKernel.emit('trash:changed',{source:'editor',fileName:tab.fileName});
      }).catch(()=>{});
    }
  }
};
