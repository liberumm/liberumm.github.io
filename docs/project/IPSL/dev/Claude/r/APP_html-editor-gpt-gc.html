              <div className="llm-panel__bridge-title">📝 文書操作</div>
              <div className="llm-panel__bridge-buttons">
                <button
                  type="button"
                  className="llm-panel__button llm-panel__button--soft llm-panel__button--small"
                  onClick={onInsert}
                  disabled={disabled}
                  title="最後のLLM応答を文書に挿入"
                >
                  ➕ 挿入
                </button>
                <button
                  type="button"
                  className="llm-panel__button llm-panel__button--soft llm-panel__button--small"
                  onClick={onReplace}
                  disabled={disabled}
                  title="選択範囲をLLM応答で置換"
                >
                    置換
                </button>
                <button
                  type="button"
                  className="llm-panel__button llm-panel__button--soft llm-panel__button--small"
                  onClick={onAppend}
                  disabled={disabled}
                  title="最後のLLM応答を文書末尾に追記"
                >
                    追記
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ============================================================
      // ヘルパー関数: 入力欄の自動拡張
      // ============================================================
      function resizeComposerInput(element) {
        if (!element) return;
        element.style.height = "auto";
        element.style.height = `${Math.min(132, Math.max(38, element.scrollHeight))}px`;
      }

      function LLMPanel() {
        const [prompt, setPrompt] = useState("");
        const [messages, setMessages] = useState([
          INITIAL_LLM_MESSAGE
        ]);
        const [chatOrder, setChatOrder] = useState("newest-last"); // "newest-last" or "newest-first"
        const [referenceMenuOpen, setReferenceMenuOpen] = useState(false); // 参照メニュー
        const [llmState, setLLMState] = useState(getInitialLLMState);
        const [running, setRunning] = useState(false);
        const [minimized, setMinimized] = useState(loadPanelMinimized);
        const [dragging, setDragging] = useState(false);
        const [panelPosition, setPanelPosition] = useState(loadPanelPosition);
        const [panelSize, setPanelSize] = useState(loadPanelSize);
        const [resizing, setResizing] = useState(false);
        const [panelMode, setPanelMode] = useState(loadPanelMode);
        const [chatPaneHeight, setChatPaneHeight] = useState(loadChatPaneHeight);
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [settings, setSettings] = useState(loadLLMSettings);
        const [draftSettings, setDraftSettings] = useState(loadLLMSettings);
        const [cacheInfo, setCacheInfo] = useState(null);
        const [cacheBusy, setCacheBusy] = useState(false);

        useEffect(() => {
          savePanelMinimized(minimized);
        }, [minimized]);

        // サイズが決まったら、位置を補正する（サイズが画面内に入るように）
        useEffect(() => {
          if (panelPosition && panelSize) {
            const correctedPosition = clampPanelPosition(panelPosition, panelSize);
            if (correctedPosition.x !== panelPosition.x || correctedPosition.y !== panelPosition.y) {
              setPanelPosition(correctedPosition);
              savePanelPosition(correctedPosition);
            }
          }
        }, [panelSize]);
        const [imageAsset, setImageAsset] = useState(null);
        const [audioAsset, setAudioAsset] = useState(null);
        const [bridgeReady, setBridgeReady] = useState(false);
        const textareaRef = useRef(null);
        const imageInputRef = useRef(null);
        const audioInputRef = useRef(null);
        const dragRef = useRef(null);
        const resizeRef = useRef(null);
        const chatPaneResizeRef = useRef(null);
        const messagesEndRef = useRef(null);

        // Bridge API 初期化確認
        useEffect(() => {
          const checkBridge = () => {
            const ready = !!(window.LFM25?.bridge?.getSelection && window.LFM25?.bridge?.getEditorContent);
            setBridgeReady(ready);
          };
          
          checkBridge();
          const timer = setInterval(checkBridge, 500);
          return () => clearInterval(timer);
        }, []);

        useEffect(() => {
          const root = document.getElementById(ROOT_ID);
          if (!root) return;

          const effectiveSize = getEffectivePanelSize({
            minimized,
            panelSize,
            panelPosition
          });

          const nextPosition = clampPanelPosition(panelPosition, effectiveSize);

          root.classList.toggle("is-llm-minimized", minimized);
          root.classList.toggle("is-llm-compact", isCompactPanelViewport());

          root.style.setProperty("--llm-panel-width", `${effectiveSize.width}px`);

          if (minimized) {
            root.style.removeProperty("--llm-panel-height");
          } else {
            root.style.setProperty("--llm-panel-height", `${effectiveSize.height}px`);
          }

          root.style.setProperty("--llm-panel-left", `${nextPosition.x}px`);
          root.style.setProperty("--llm-panel-top", `${nextPosition.y}px`);
          root.style.setProperty("--llm-panel-right", "auto");
          root.style.setProperty("--llm-panel-bottom", "auto");

          if (
            nextPosition.x !== panelPosition?.x ||
            nextPosition.y !== panelPosition?.y
          ) {
            setPanelPosition(nextPosition);
            savePanelPosition(nextPosition);
          }
        }, [panelSize, panelPosition, minimized]);

        useEffect(() => {
          function handleWindowResize() {
            setPanelSize((current) => clampPanelSize(current, panelPosition));
            setPanelPosition((current) => clampPanelPosition(current));
          }

          window.addEventListener("resize", handleWindowResize);
          return () => window.removeEventListener("resize", handleWindowResize);
        }, [panelPosition]);

        useEffect(() => {
          savePanelMode(panelMode);
        }, [panelMode]);

        useEffect(() => {
          saveChatPaneHeight(chatPaneHeight);
        }, [chatPaneHeight]);

        useEffect(() => {
          messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
        }, [messages]);

        function addAssistantMessage(content) {
          setMessages((prev) => [
            ...prev,
            {
              role: "assistant",
              content: String(content || "")
            }
          ]);
        }

        function updateLastAssistantMessage(content) {
          setMessages((prev) => {
            const next = [...prev];
            for (let index = next.length - 1; index >= 0; index -= 1) {
              if (next[index]?.role === "assistant") {
                next[index] = {
                  ...next[index],
                  content: String(content || "")
                };
                return next;
              }
            }
            return [
              ...next,
              {
                role: "assistant",
                content: String(content || "")
              }
            ];
          });
        }

        function startPanelDrag(event) {
          if (event.target.closest("button, input, textarea, label")) return;

          const root = document.getElementById(ROOT_ID);
          if (!root) return;

          const rect = root.getBoundingClientRect();
          const effectiveSize = getEffectivePanelSize({
            minimized,
            panelSize,
            panelPosition
          });

          const start = {
            pointerId: event.pointerId,
            startX: event.clientX,
            startY: event.clientY,
            x: rect.left,
            y: rect.top
          };

          dragRef.current = start;
          setDragging(true);
          setPanelPosition(clampPanelPosition({ x: rect.left, y: rect.top }, effectiveSize));

          try {
            event.currentTarget.setPointerCapture(event.pointerId);
          } catch (_) {}

          const move = (moveEvent) => {
            const drag = dragRef.current;
            if (!drag) return;

            const next = clampPanelPosition({
              x: drag.x + moveEvent.clientX - drag.startX,
              y: drag.y + moveEvent.clientY - drag.startY
            }, effectiveSize);

            setPanelPosition(next);
          };

          const up = () => {
            const root = document.getElementById(ROOT_ID);
            const rect = root?.getBoundingClientRect?.();

            if (rect) {
              const finalPosition = clampPanelPosition({ x: rect.left, y: rect.top }, effectiveSize);
              setPanelPosition(finalPosition);
              savePanelPosition(finalPosition);
            }

            dragRef.current = null;
            setDragging(false);
            document.removeEventListener("pointermove", move);
            document.removeEventListener("pointerup", up);
            document.removeEventListener("pointercancel", up);
          };

          event.preventDefault();
          document.addEventListener("pointermove", move);
          document.addEventListener("pointerup", up);
          document.addEventListener("pointercancel", up);
        }

        function startChatPaneResize(event) {
          event.stopPropagation();

          const start = {
            pointerId: event.pointerId,
            startY: event.clientY,
            height: chatPaneHeight
          };

          chatPaneResizeRef.current = start;

          try {
            event.currentTarget.setPointerCapture(event.pointerId);
          } catch (_) {}

          const move = (moveEvent) => {
            const resize = chatPaneResizeRef.current;
            if (!resize) return;

            const delta = moveEvent.clientY - resize.startY;
            const nextHeight = Math.max(220, Math.min(720, resize.height + delta));
            setChatPaneHeight(nextHeight);
          };

          const up = () => {
            saveChatPaneHeight(chatPaneHeight);
            chatPaneResizeRef.current = null;
            document.removeEventListener("pointermove", move);
            document.removeEventListener("pointerup", up);
            document.removeEventListener("pointercancel", up);
          };

          event.preventDefault();
          document.addEventListener("pointermove", move);
          document.addEventListener("pointerup", up);
          document.addEventListener("pointercancel", up);
        }

        function startPanelResize(event) {
          if (minimized) return;

          const root = document.getElementById(ROOT_ID);
          if (!root) return;

          const rect = root.getBoundingClientRect();

          const start = {
            pointerId: event.pointerId,
            startX: event.clientX,
            startY: event.clientY,
            width: rect.width,
            height: rect.height,
            x: rect.left,
            y: rect.top
          };

          resizeRef.current = start;
          setResizing(true);

          try {
            event.currentTarget.setPointerCapture(event.pointerId);
          } catch (_) {}

          const move = (moveEvent) => {
            const resize = resizeRef.current;
            if (!resize) return;

            const nextSize = clampPanelSize({
              width: resize.width + moveEvent.clientX - resize.startX,
              height: resize.height + moveEvent.clientY - resize.startY
            }, {
              x: resize.x,
              y: resize.y
            });

            setPanelSize(nextSize);
          };

          const up = () => {
            const root = document.getElementById(ROOT_ID);
            const rect = root?.getBoundingClientRect?.();

            if (rect) {
              const finalSize = clampPanelSize({
                width: rect.width,
                height: rect.height
              }, {
                x: rect.left,
                y: rect.top
              });

              setPanelSize(finalSize);
              savePanelSize(finalSize);

              const finalPosition = clampPanelPosition({ x: rect.left, y: rect.top });
              setPanelPosition(finalPosition);
              savePanelPosition(finalPosition);
            }

            resizeRef.current = null;
            setResizing(false);
            document.removeEventListener("pointermove", move);
            document.removeEventListener("pointerup", up);
            document.removeEventListener("pointercancel", up);
          };

          event.preventDefault();
          event.stopPropagation();

          document.addEventListener("pointermove", move);
          document.addEventListener("pointerup", up);
          document.addEventListener("pointercancel", up);
        }

        function openSettings() {
          setDraftSettings(settings);
          setSettingsOpen(true);
        }

        function closeSettings() {
          setDraftSettings(settings);
          setSettingsOpen(false);
        }

        function applySettings() {
          const previousModelId = settings.modelId;
          const next = saveLLMSettings(draftSettings);
          setSettings(next);

          if (previousModelId !== next.modelId) {
            resetLFM25Runtime("モデルを切り替えました: " + getLLMModel(next.modelId).label);
          }

          setSettingsOpen(false);
        }

        function resetSettings() {
          setDraftSettings(DEFAULT_LFM25_SETTINGS);
        }

        function resetPanelLayout() {
          // 位置・サイズ・チャット高さをリセット
          localStorage.removeItem(PANEL_POSITION_KEY);
          localStorage.removeItem(PANEL_SIZE_KEY);
          localStorage.removeItem(CHAT_PANE_HEIGHT_KEY);
          localStorage.removeItem(PANEL_MINIMIZED_KEY);
          
          // レスポンシブ初期値を計算：サイズ → 位置の順序
          const nextSize = clampPanelSize(getResponsivePanelDefaultSize());
          const nextPosition = clampPanelPosition(getDefaultPanelPosition?.() || null, nextSize);
          const isCompact = isCompactPanelViewport();
          
          // 状態をリセット
          setPanelSize(nextSize);
          setPanelPosition(nextPosition);
          setChatPaneHeight(isCompact ? 240 : 420);
          setPanelMode("normal");
          setMinimized(isCompact);
          
          // 保存
          savePanelSize(nextSize);
          savePanelPosition(nextPosition);
          saveChatPaneHeight(isCompact ? 240 : 420);
          savePanelMode("normal");
          savePanelMinimized(isCompact);
          
          window.LFM25?.bridge?.notifyUser?.('パネルレイアウトをリセットしました', 'success');
        }

        function updateDraftSetting(key, value) {
          setDraftSettings((current) => ({ ...current, [key]: value }));
        }

        async function runCacheTask(task, onError) {
          setCacheBusy(true);
          try {
            return await task();
          } catch (error) {
            if (typeof onError === "function") {
              onError(error);
            } else {
              addAssistantMessage("キャッシュ操作に失敗: " + (error?.message || error));
            }
            return null;
          } finally {
            setCacheBusy(false);
          }
        }

        function setCacheInfoError(error) {
          setCacheInfo({
            supported: false,
            error: error?.message || String(error),
            cacheCount: 0,
            entryCount: 0,
            caches: [],
            updatedAt: Date.now()
          });
        }

        async function refreshCacheInfo() {
          await runCacheTask(async () => {
            setCacheInfo(await getLFM25BrowserCacheInfo());
          }, setCacheInfoError);
        }

        async function clearLLMCache() {
          const ok = window.confirm(
            "LLMモデルのブラウザキャッシュを破棄します。次回起動時にモデルを再ダウンロードします。実行しますか？"
          );
          if (!ok) return;

          await runCacheTask(async () => {
            const result = await purgeLFM25BrowserCache();
            setCacheInfo(await getLFM25BrowserCacheInfo());
            addAssistantMessage(
              result.supported
                ? `LLMキャッシュを破棄しました。削除: ${result.deletedEntries} entries / ${result.deletedCaches} caches`
                : "このブラウザではCache APIを利用できません。"
            );
          }, (error) => {
            addAssistantMessage("キャッシュ破棄に失敗: " + (error?.message || error));
          });
        }

        function resetRuntimeOnly() {
          resetLFM25Runtime("ランタイムのみリセット済み");
          addAssistantMessage("ランタイムをリセットしました。モデルキャッシュは保持しています。");
        }

        function setPanelError(error) {
          const message = error && error.message ? error.message : String(error);
          setLLMState({
            phase: "error",
            status: "エラー",
            progress: 100,
            active: false,
            error: true
          });
          return message;
        }

        const selectedModel = getLLMModel(settings.modelId);
        const selectedModelIsVL = isVisionLanguageModel(selectedModel);
        const selectedModelIsAudio = isAudioModel(selectedModel);
        const selectedModelIsText = isTextGenerationModel(selectedModel);

        useEffect(() => {
          setImageAsset(null);
          setAudioAsset(null);
          setPrompt("");
        }, [settings.modelId]);

        async function handleImageFile(event) {
          const file = event.target.files?.[0];
          if (!file) return;
          try {
            const url = await readFileAsDataURL(file);
            setImageAsset({ name: file.name, size: file.size, url });
          } catch (error) {
            addAssistantMessage("画像読み込みに失敗: " + (error?.message || error));
          } finally {
            event.target.value = "";
          }
        }

        async function handleAudioFile(event) {
          const file = event.target.files?.[0];
          if (!file) return;
          try {
            const url = await readFileAsDataURL(file);
            setAudioAsset({ name: file.name, size: file.size, url });
          } catch (error) {
            addAssistantMessage("音声読み込みに失敗: " + (error?.message || error));
          } finally {
            event.target.value = "";
          }
        }

        const presets = useMemo(() => [
          "要点を3つに整理して",
          "改善案を1つに絞って",
          "この文章を短くして",
          "実装手順に分解して"
        ], []);

        const progress = clampProgress(llmState.progress || 0);
        const badgeText = llmState.error
          ? "ERROR"
          : llmState.active
            ? "ACTIVE"
            : running || progress > 0
              ? "LOADING"
              : "STANDBY";

        const badgeClass = llmState.error
          ? "is-error"
          : llmState.active
            ? "is-active"
            : running || progress > 0
              ? "is-loading"
              : "";

        const phaseItems = [
          { key: "library", label: "ライブラリ", threshold: 12 },
          { key: "tokenizer", label: "Tokenizer", threshold: 28 },
          { key: "model", label: "LLM", threshold: 86 },
          { key: "ready", label: "Active", threshold: 100 }
        ];

        const progressLabel = llmState.active
          ? "モデルは使用可能です"
          : llmState.error
            ? "起動に失敗しました"
            : progress > 0
              ? "初回読込中です"
              : "起動確認で事前読込できます";

        useEffect(() => {
          externalStateSetter = (patch) => {
            setLLMState((current) => ({ ...current, ...patch }));
          };
          window.dispatchEvent(new CustomEvent("lfm25:ready", {
            detail: { modelId: settings.modelId || DEFAULT_MODEL_ID }
          }));
          return () => {
            externalStateSetter = null;
          };
        }, [settings.modelId]);

        async function submit() {
          const text = prompt.trim();
          if (running) return;
          if (!text && !selectedModelIsAudio) return;
          if (selectedModelIsVL && !imageAsset) {
            addAssistantMessage("VLモデルを使うには画像を選択してください。");
            return;
          }
          if (selectedModelIsAudio && !audioAsset && !text) {
            addAssistantMessage("Audioモデルを使うには音声ファイルまたはTTS用テキストを入力してください。");
            return;
          }

          setRunning(true);
          
          // Add user message
          setMessages((prev) => [...prev, {
            role: "user",
            content: selectedModelIsVL && imageAsset
              ? "[画像: " + imageAsset.name + "]" + String.fromCharCode(10) + text
              : selectedModelIsAudio && audioAsset
                ? "[音声: " + audioAsset.name + "]" + (text ? String.fromCharCode(10) + text : "")
                : text
          }]);
          
          // Add empty assistant message that will be updated with streaming
          setMessages((prev) => [...prev, { role: "assistant", content: "" }]);
          
          setPrompt("");

          try {
            const result = await runLFM25(text, {
              maxNewTokens: settings.maxNewTokens,
              temperature: settings.temperature,
              topP: settings.topP,
              doSample: settings.doSample,
              systemPrompt: settings.systemPrompt,
              modelId: settings.modelId,
              image: imageAsset?.url,
              audio: audioAsset?.url,
              onToken: settings.stream && selectedModelIsText
                ? (_token, fullText) => updateLastAssistantMessage(fullText)
                : null
            });

            if (!settings.stream) {
              updateLastAssistantMessage(result);
            }
          } catch (error) {
            updateLastAssistantMessage("エラー: " + setPanelError(error));
          } finally {
            setRunning(false);
          }
        }

        async function warmupPanel() {
          if (running || llmState.active) return;

          setRunning(true);

          try {
            await window.LFM25.warmup({ modelId: settings.modelId });
          } catch (error) {
            addAssistantMessage("起動確認に失敗: " + setPanelError(error));
          } finally {
            setRunning(false);
          }
        }

        function onKeyDown(event) {
          if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
            event.preventDefault();
            submit();
          }
        }

        // ミニ入力欄用キーハンドラ
        function onMiniPromptKeyDown(event) {
          if (event.nativeEvent?.isComposing) return;
          if (event.key === "Enter") {
            event.preventDefault();
            submit();
          }
          if (event.key === "Escape") {
            event.currentTarget.blur();
          }
        }

        // 最小化時用のコンパクト表示テキスト
        const compactModelLabel = selectedModel.label
          .replace(/\s*\/\s*(Text|Vision-Language|Audio.*|ASR.*)$/i, "")
          .replace(/\s*ONNX/i, "")
          .replace("Instruct", "Inst.");

        const compactModeIcon = selectedModelIsVL
          ? "🖼️"
          : selectedModelIsAudio
            ? "🎧"
            : "✨";

        const compactStatusText = llmState.error
          ? "起動に失敗"
          : llmState.active
            ? "使用可能"
            : progress > 0
              ? `${llmState.phase || "loading"} / ${progress}%`
              : llmState.status;

        function addPreset(text) {
          setPrompt((current) => {
            const next = current.trim() ? `${current.trim()}

${text}` : text;
            return next;
          });
          window.requestAnimationFrame(() => textareaRef.current?.focus());
        }

        return (
          <section className={`llm-panel ${minimized ? "is-minimized" : ""} ${dragging ? "is-dragging" : ""} ${resizing ? "is-resizing" : ""}`} data-lfm25-panel>
            <header className="llm-panel__head" onPointerDown={startPanelDrag}>
              {minimized ? (
                <div className="llm-panel__mini-shell">
                  <div className="llm-panel__mini-meta">
                    <div className="llm-panel__mini-icon">{compactModeIcon}</div>

                        レイアウトリセット
                      </button>

                      <div className="llm-settings-spacer" />

                      <button
                        type="button"
                        className="llm-panel__button llm-panel__button--soft"
                        onClick={closeSettings}
                      >
                        キャンセル
                      </button>

                      <button
                        type="button"
                        className="llm-panel__button llm-panel__button--primary"
                        onClick={applySettings}
                      >
                        保存
                      </button>
                    </div>
                  </div>
                </div>,
                document.body
              )}


            {!minimized && (
              <div
                className="llm-panel__resize-handle"
                onPointerDown={startPanelResize}
                title="ドラッグしてLLMパネルの大きさを変更"
                role="separator"
                aria-label="LLMパネルの大きさを変更"
              />
            )}
          </section>
        );
      }

      if (ReactDOM.createRoot) {
        const root = ReactDOM.createRoot(rootEl);
        window.__LFM25_PANEL_REACT_ROOT__ = root;
        root.render(<LLMPanel />);
      } else {
        ReactDOM.render(<LLMPanel />, rootEl);
        window.__LFM25_PANEL_REACT_ROOT__ = {
          unmount: () => ReactDOM.unmountComponentAtNode(rootEl)
        };
      }
    }

    window.LFM25 = {
      modelId: DEFAULT_MODEL_ID,
      models: LLM_MODEL_REGISTRY,
      getModel: getLLMModel,
      hasWebGPU,
      run: runLFM25,
      mount: mountLLMPanel,
      warmup: async (options = {}) => {
        const report = (patch) => emitLLMState(patch);

        try {
          report({
            phase: "checking",
            status: hasWebGPU()
              ? "WebGPU利用可能。初期化します"
              : "WebGPU未検出。WASMで初期化します",
            progress: 3,
            active: false,
            error: false
          });

          const runtime = await initLFMRuntime(report, options);

          report({
            phase: "ready",
            status: "準備完了: " + (runtime.model?.label || runtime.modelId || "LLM"),
            progress: 100,
            active: true,
            error: false
          });

          return true;
        } catch (error) {
          report({
            phase: "error",
            status: "エラー: " + (error?.message || error),
            progress: 100,
            active: false,
            error: true
          });

          throw error;
        }
      },
      reset: () => resetLFM25Runtime("リセット済み"),
      cacheInfo: getLFM25BrowserCacheInfo,
      clearCache: purgeLFM25BrowserCache,
      // ============================================================
      // Bridge API: LLMパネル ↔ Q-Capsule Doc本体 接続
      // ============================================================
      bridge: {
        getEditorContent: () => {
          // 現在のアクティブタブのMarkdown本文を取得
          const textarea = document.querySelector('textarea#editor-textarea');
          return textarea?.value || '';
        },
        getSelection: () => {
          // エディタ内の選択範囲を取得（優先）
          const textarea = document.querySelector('textarea#editor-textarea');
          if (textarea && textarea.selectionStart !== textarea.selectionEnd) {
            const { selectionStart, selectionEnd, value } = textarea;
            return {
              text: value.substring(selectionStart, selectionEnd),
              start: selectionStart,
              end: selectionEnd,
              fullText: value,
              source: 'editor'
            };
          }
          
          // プレビューペイン内の選択を取得（フォールバック）
          const selection = window.getSelection();
          if (selection && selection.toString().trim()) {
            return {
              text: selection.toString(),
              start: 0,
              end: 0,
              fullText: '',
              source: 'preview',
              selectionObject: selection
            };
          }
          
          // 選択がない場合
          return { 
            text: '', 
            start: 0, 
            end: 0,
            fullText: '',
            source: 'none'
          };
        },
        insertContent: (text, position = 'cursor') => {
          // テキストを挿入
          // position: 'cursor' | 'start' | 'end' | { start, end }
          const textarea = document.querySelector('textarea#editor-textarea');
          if (!textarea) return false;
          
          const { value, selectionStart, selectionEnd } = textarea;
          let insertPos = selectionStart;
          
          if (position === 'start') {
            insertPos = 0;
          } else if (position === 'end') {
            insertPos = value.length;
          } else if (typeof position === 'object' && position.start !== undefined) {
            insertPos = position.start;
          }
          
          const newText = value.slice(0, insertPos) + text + value.slice(insertPos);
          textarea.value = newText;
          textarea.selectionStart = insertPos + text.length;
          textarea.selectionEnd = insertPos + text.length;
          
          // 変更イベント発火
          textarea.dispatchEvent(new Event('input', { bubbles: true }));
          textarea.dispatchEvent(new Event('change', { bubbles: true }));
          
          return true;
        },
        replaceSelection: (text) => {
          // 選択範囲をテキストで置換
          const textarea = document.querySelector('textarea#editor-textarea');
          if (!textarea) return false;
          
          const { value, selectionStart, selectionEnd } = textarea;
          const newText = value.slice(0, selectionStart) + text + value.slice(selectionEnd);
          textarea.value = newText;
          textarea.selectionStart = selectionStart + text.length;
          textarea.selectionEnd = selectionStart + text.length;
          
          // 変更イベント発火
          textarea.dispatchEvent(new Event('input', { bubbles: true }));
          textarea.dispatchEvent(new Event('change', { bubbles: true }));
          
          return true;
        },
        appendContent: (text) => {
          // 末尾にテキストを追記
          const textarea = document.querySelector('textarea#editor-textarea');
          if (!textarea) return false;
          
          const { value } = textarea;
          const newText = value + (value.endsWith('\n') ? '' : '\n') + text;
          textarea.value = newText;
          textarea.selectionStart = newText.length;
          textarea.selectionEnd = newText.length;
          
          // 変更イベント発火
          textarea.dispatchEvent(new Event('input', { bubbles: true }));
          textarea.dispatchEvent(new Event('change', { bubbles: true }));
          
          return true;
        },
        getActiveFileName: () => {
          // 現在のアクティブタブのファイル名を取得
          const textarea = document.querySelector('textarea#editor-textarea');
          const tabBar = document.querySelector('[data-active-tab-name]');
          return tabBar?.getAttribute('data-active-tab-name') || 'untitled.md';
        },
        notifyUser: (message, type = 'info') => {
          // ユーザーに通知を表示
          // type: 'info' | 'success' | 'warning' | 'error'
          window.dispatchEvent(new CustomEvent('qcd:notify', {
            detail: { message, type }
          }));
        }
      }
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mountLLMPanel);
    } else {
      mountLLMPanel();
    }
  })();
</script>
</body>
</html>
