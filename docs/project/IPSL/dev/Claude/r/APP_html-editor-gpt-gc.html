// --- ExportDomain: Export business logic ---
//   - buildFileName(baseFileName, format, index): Build output filename
//   - getExtension(format): Get file extension for format
const ExportDomain={
  // Resolve target from context (handles activeTab, workspaceTabs, tabs)
  resolveTargetFromContext(ctx){
    if(ctx.activeTab){
      return {target:ctx.activeTab,mode:'single'};
    }
    
    if(ctx.workspaceTabs&&ctx.workspaceTabs.length){
      return {target:{tabs:ctx.workspaceTabs},mode:'batch'};
    }
    
    if(ctx.tabs&&ctx.tabs.length){
      return {target:{tabs:ctx.tabs},mode:'batch'};
    }
    
    return {target:null,mode:'single'};
  },

  createPlan({target,format,mode='single'}){
    const files=this.resolveFiles(target,mode);
    if(!files.length){
      throw new Error('エクスポート対象がありません');
    }
    return{
      id:uuid(),
      format,
      mode,
      files,
      output:{type:'download'},
      diagnostics:this.diagnose(files)
    };
  },

  resolveFiles(target,mode){
    if(!target)return[];
    switch(mode){
      case 'single':
        return target?[target]:[];
      case 'batch':
      case 'workspace':
        return (target.tabs||[]).filter(Boolean);
      default:
        return target?[target]:[];
    }
  },

  diagnose(files){
    return files.map(f=>({
      fileName:f.fileName,
      issues:DocumentService.diagnose?DocumentService.diagnose(f.text):[]
    }));
  },

  buildFileName(baseFileName,format,index=null){
    const name=replaceExtension(baseFileName,'');
    const ext=this.getExtension(format);
    return index!==null?`${name}_${index}.${ext}`:`${name}.${ext}`;
  },

  getExtension(format){
    const map={
      pdf:'pdf',
      html:'html',
      word:'docx',
      excel:'xlsx',
      markdown:'md',
      zip:'zip'
    };
    return map[format]||format;
  }
};

// --- FormatAdapter: Format-specific export logic ---
const FormatAdapter={
  // PDF format
  async pdf(files,options={}){
    // Get PDF quality setting from profile or options
    const pdfQuality=options.profile?.settings?.pdfQuality||options.pdfQuality||'standard';
    
    if(files.length===1){
      // Single PDF
      const file=files[0];
      const outputFileName=ExportDomain.buildFileName(file.fileName,'pdf');
      
      // Use hybrid PDF for text-searchable output
      const blob=pdfQuality==='hybrid'
        ? await generateHybridPdf(file.text,{
            ...options,
            fileName:outputFileName,
            pdfQuality,
            onProgress:(progress)=>{
              options.setProgress?.({
                percent:progress.percent,
                message:progress.message,
                pageInfo:progress.pageInfo,
                fileName:outputFileName
              });
            }
          })
        : await ExportService.generatePdfBlob(file.text,{
            ...options,
            fileName:outputFileName,
            pdfQuality,
            onProgress:(progress)=>{
              options.setProgress?.({
                percent:progress.percent,
                message:progress.message,
                pageInfo:progress.pageInfo,
                fileName:outputFileName
              });
            }
          });
      return{format:'pdf',blob,fileName:outputFileName};
    }else{
      // Batch PDF (multiple files as separate PDFs in ZIP)
      const blobs=[];
      for(let i=0;i<files.length;i++){
        const file=files[i];
        const outputFileName=ExportDomain.buildFileName(file.fileName,'pdf',i);
        
        // Use hybrid PDF for text-searchable output
        const blob=pdfQuality==='hybrid'
          ? await generateHybridPdf(file.text,{
              ...options,
              fileName:outputFileName,
              pdfQuality,
              onProgress:(progress)=>{
                const filePercent=(i/files.length)*100;
                const currentFilePercent=(progress.percent||0)/files.length;
                options.setProgress?.({
                  percent:Math.round(filePercent+currentFilePercent),
                  message:`${file.fileName}: ${progress.message||'PDF生成中...'}`,
                  fileInfo:{current:i+1,total:files.length,name:file.fileName},
                  pageInfo:progress.pageInfo
                });
              }
            })
          : await ExportService.generatePdfBlob(file.text,{
              ...options,
              fileName:outputFileName,
              pdfQuality,
              onProgress:(progress)=>{
                const filePercent=(i/files.length)*100;
                const currentFilePercent=(progress.percent||0)/files.length;
                options.setProgress?.({
                  percent:Math.round(filePercent+currentFilePercent),
                  message:`${file.fileName}: ${progress.message||'PDF生成中...'}`,
                  fileInfo:{current:i+1,total:files.length,name:file.fileName},
                  pageInfo:progress.pageInfo
                });
              }
            });
        blobs.push({name:outputFileName,data:blob});
      }
      // Create ZIP with PDFs
      await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js','https://unpkg.com/jszip@3.10.1/dist/jszip.min.js','https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'],'JSZip');
      const zip=new JSZip();
      for(const item of blobs){
        zip.file(item.name,item.data);
      }
      const zipBlob=await zip.generateAsync({type:'blob'});
      return{format:'zip',blob:zipBlob,fileName:'export-batch.zip'};
    }
  },

  // HTML format
  async html(files,options={}){
    if(files.length===1){
      // Single HTML
      const file=files[0];
      const doc=createMetaDocumentFromFile(file,{profile:options.profile,intent:{purpose:'export',audience:'reader'}});
      const body=doc.observe('html.export.body',{mode:'export',observer:'export.html'});
      const html=buildExportHtml({
        title:doc.title,
        body,
        highlight:true,
        katex:false
      });
      const blob=new Blob([html],{type:'text/html;charset=utf-8'});
      return{format:'html',blob,fileName:ExportDomain.buildFileName(file.fileName,'html')};
    }else{
      // Multiple HTML files in ZIP
      await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js','https://unpkg.com/jszip@3.10.1/dist/jszip.min.js','https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'],'JSZip');
      const zip=new JSZip();
      for(let i=0;i<files.length;i++){
        const file=files[i];
        const doc=createMetaDocumentFromFile(file,{profile:options.profile,intent:{purpose:'export',audience:'reader'}});
        const body=doc.observe('html.export.body',{mode:'export',observer:'export.html'});
        const html=buildExportHtml({
          title:doc.title,
          body,
          highlight:true,
          katex:false
        });
        zip.file(ExportDomain.buildFileName(file.fileName,'html',i),html);
      }
      const zipBlob=await zip.generateAsync({type:'blob'});
      return{format:'zip',blob:zipBlob,fileName:'export-batch.zip'};
    }
  },

  // Word format
  async word(files,options={}){
    if(files.length===1){
      // Single Word
      const file=files[0];
      const html=MarkdownService.parse(file.text,{mode:'export'});
      const blob=await ExportService.generateWord(html,{...options,fileName:ExportDomain.buildFileName(file.fileName,'word')});
      return{format:'word',blob,fileName:ExportDomain.buildFileName(file.fileName,'word')};
    }else{
      // Multiple Word files in ZIP
      await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js','https://unpkg.com/jszip@3.10.1/dist/jszip.min.js','https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'],'JSZip');
      const zip=new JSZip();
      for(let i=0;i<files.length;i++){
        const file=files[i];
        const html=MarkdownService.parse(file.text,{mode:'export'});
        const blob=await ExportService.generateWord(html,{...options,fileName:ExportDomain.buildFileName(file.fileName,'word',i)});
        zip.file(ExportDomain.buildFileName(file.fileName,'word',i),blob);
      }
      const zipBlob=await zip.generateAsync({type:'blob'});
      return{format:'zip',blob:zipBlob,fileName:'export-batch.zip'};
    }
  },

  // Excel format
  async excel(files,options={}){
    if(files.length===1){
      // Single Excel
      const file=files[0];
      const blob=await ExportService.generateExcel(file.text,{...options,fileName:ExportDomain.buildFileName(file.fileName,'excel')});
      return{format:'excel',blob,fileName:ExportDomain.buildFileName(file.fileName,'excel')};
    }else{
      // Multiple Excel files in ZIP
      await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js','https://unpkg.com/jszip@3.10.1/dist/jszip.min.js','https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'],'JSZip');
      const zip=new JSZip();
      for(let i=0;i<files.length;i++){
        const file=files[i];
        const blob=await ExportService.generateExcel(file.text,{...options,fileName:ExportDomain.buildFileName(file.fileName,'excel',i)});
        zip.file(ExportDomain.buildFileName(file.fileName,'excel',i),blob);
      }
      const zipBlob=await zip.generateAsync({type:'blob'});
      return{format:'zip',blob:zipBlob,fileName:'export-batch.zip'};
    }
  },

  // ZIP format
  async zip(files,options={}){
    await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js','https://unpkg.com/jszip@3.10.1/dist/jszip.min.js','https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'],'JSZip');
    const zip=new JSZip();
    for(let i=0;i<files.length;i++){
      const file=files[i];
      zip.file(file.fileName,file.text);
    }
    const zipBlob=await zip.generateAsync({type:'blob'});
    return{format:'zip',blob:zipBlob,fileName:'export.zip'};
  },

  // Markdown format
  async markdown(files,options={}){
    if(files.length===1){
      // Single Markdown
      const file=files[0];
      const blob=new Blob([file.text],{type:'text/markdown;charset=utf-8'});
      return{format:'markdown',blob,fileName:file.fileName};
    }else{
      // Multiple Markdown files in ZIP
      await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js','https://unpkg.com/jszip@3.10.1/dist/jszip.min.js','https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'],'JSZip');
      const zip=new JSZip();
      for(const file of files){
        zip.file(file.fileName,file.text);
      }
      const zipBlob=await zip.generateAsync({type:'blob'});
      return{format:'zip',blob:zipBlob,fileName:'export.zip'};
    }
  }
};

// --- ExportExecutor: Unified export execution ---
const ExportExecutor={
  async execute(plan,options={}){
    try{
      const{format,files}=plan;
      const adapter=FormatAdapter[format];
      if(!adapter){
        throw new Error(`Unsupported format: ${format}`);
      }
      
      const result=await adapter(files,options);
      
      // Save blob directly and notify
      if(result.blob){
        AppCore.adapters.file.saveBlob(result.blob,result.fileName);
        AppCore.notify.info(`${format.toUpperCase()} ファイルを保存しました`);
      }
      
      return result;
    }catch(e){
      console.error('Export execution failed:',e);
      // Notify error directly
      AppCore.notify.error(`Export に失敗しました: ${e.message}`);
      throw e;
    }
  }
};

// --- DocumentDomain ---
const DocumentDomain={
  // DocumentModel インスタンスキャッシュ
  _modelCache:new Map(),
  _CACHE_MAX_SIZE:20,
  
  // DocumentModel を取得（キャッシュ付き）
  getModel(text){
    const hash=this._hashText(text);
    if(!this._modelCache.has(hash)){
      // Enforce cache size limit
      if(this._modelCache.size>=this._CACHE_MAX_SIZE){
        const firstKey=this._modelCache.keys().next().value;
        this._modelCache.delete(firstKey);
      }
      this._modelCache.set(hash,new DocumentModel(text));
    }
    return this._modelCache.get(hash);
  },
  
  // テキストのハッシュ値を計算
  _hashText(text){
    let hash=0;
    for(let i=0;i<text.length;i++){
      const char=text.charCodeAt(i);
      hash=((hash<<5)-hash)+char;
      hash=hash&hash; // Convert to 32bit integer
    }
    return hash.toString();
  },
  
  // キャッシュをクリア
  clearModelCache(){
    this._modelCache.clear();
  },
  
  parse(text){
    return DocumentService.parseV2(text);
  },

  diagnose(text){
    return DiagnosisService.diagnose(text);
  },

  getOutline(text){
    const parsed=this.parse(text);
    return parsed.structure.headings||[];
  },

  getTasks(text){
    const parsed=this.parse(text);
    return parsed.structure.tasks||[];
  },

  getStats(text){
    const parsed=this.parse(text);
    return parsed.stats||{};
  },
  
  // DocumentModel ベースの高度な分析
  analyze(text){
    const model=this.getModel(text);
    return model.analyze();
  },
  
  // セクション抽出
  getSections(text){
    const model=this.getModel(text);
    return model.getSections();
  },
  
  // リンク分析
  analyzeLinks(text){
    const model=this.getModel(text);
    return model.analyzeLinks();
  },
  
  // 画像分析
  analyzeImages(text){
    const model=this.getModel(text);
    return model.analyzeImages();
  },
  
  // コード分析
  analyzeCode(text){
    const model=this.getModel(text);
    return model.analyzeCode();
  },
  
  // メタデータ取得
  getMetadata(text){
    const model=this.getModel(text);
    return model.getMetadata();
  }
};





// ============================================================
// PluginKernel: Toolbar / Export / Sidebar / Markdown pipeline を管理する最小Plugin基盤
// ============================================================
const PluginKernel={
  // --- Storage ---
  _plugins:new Map(),
  _enabled:{},          // pluginId -> bool (永続化)
  _errors:new Map(),    // pluginId -> [{scope,message,time}]
  _disposables:new Map(), // pluginId -> [fn]

  // --- Extension Points (用途別に分離) ---
  _commands:new Map(),          // 'pluginId.cmdId' -> {label,run}
  _toolbarItems:[],             // [{pluginId,item}]
  _exporters:new Map(),         // 'pluginId.exportId' -> {label,icon,run}
  _previewDecorators:[],        // [{pluginId,fn}]
  _pipelines:new Map(),         // stageName -> [{pluginId,id,order,run}] (v4)
  _events:new Map(),            // eventName -> [{pluginId,handler}]
  _panels:[],                   // [{pluginId,panel}] (v7 - Sidebar Host)

  _config:{storage:null,idb:null,logger:console},

  // --- Init ---
  init(config={}){
    this._config={...this._config,...config};
    // ON/OFF 状態を永続化から復元
    const saved=this._config.storage?.get('plugins_enabled',{});
    if(saved&&typeof saved==='object')this._enabled={...saved};
    this._log('PluginKernel v4 initialized');
  },

  // --- Register ---
  register(plugin){
    if(!plugin?.id){this._log('register: missing id','error');return false}
    if(this._plugins.has(plugin.id)){this._log(`already registered: ${plugin.id}`,'warn');return false}
    try{
      this._plugins.set(plugin.id,plugin);
      // enabledByDefault が false でなければ有効。永続化済みなら永続化を優先
      if(!(plugin.id in this._enabled)){
        this._enabled[plugin.id]=plugin.enabledByDefault!==false;
      }
      this._normalizeContributions(plugin);
      if(plugin.setup&&typeof plugin.setup==='function'){
        plugin.setup(this._createAPI(plugin.id));
      }
      this._log(`registered: ${plugin.id} v${plugin.version||'?'}`);
      return true;
    }catch(err){
      this._recordError(plugin.id,'setup',err);
      return false;
    }
  },

  // --- Enable / Disable (永続化付き) ---
  enable(pluginId){
    const check=this.canEnable(pluginId);
    if(!check.ok){
      this._recordError(pluginId,'dependency',new Error(`Missing dependencies: ${check.missing.join(', ')}`));
      return false;
    }
    if(!this._plugins.has(pluginId))return false;
    this._enabled[pluginId]=true;
    this._saveEnabled();
    this._plugins.get(pluginId)?.activate?.(this._createAPI(pluginId));
    this.emit('plugins:changed',{pluginId,enabled:true});
    this._log(`enabled: ${pluginId}`);
    return true;
  },
  disable(pluginId){
    if(!this._plugins.has(pluginId))return false;
    this._enabled[pluginId]=false;
    this._saveEnabled();
    this._plugins.get(pluginId)?.deactivate?.(this._createAPI(pluginId));
    // disposables を実行して後片付け
    const disposables=this._disposables.get(pluginId)||[];
    for(const fn of disposables){try{fn()}catch(e){this._recordError(pluginId,'dispose',e)}}
    this._disposables.delete(pluginId);
    this.emit('plugins:changed',{pluginId,enabled:false});
    this._log(`disabled: ${pluginId}`);
    return true;
  },
  isEnabled(pluginId){return this._enabled[pluginId]===true},
  _saveEnabled(){
    this._config.storage?.set('plugins_enabled',this._enabled);
  },

  // --- Queries ---
  getPlugins(){return Array.from(this._plugins.values())},
  getPlugin(id){return this._plugins.get(id)},

  // --- Commands ---
  registerCommand(pluginId,cmdId,command){
    if(!this._hasCapability(pluginId,'command')){
      this._recordError(pluginId,'capability',new Error('Missing capability: command'));
      return false;
    }
    const fullId=`${pluginId}.${cmdId}`;
    if(this._commands.has(fullId)){
      this._recordError(pluginId,'registerCommand',new Error(`Command already registered: ${fullId}`));
      return false;
    }
    this._commands.set(fullId,{...command,pluginId});
    return true;
  },
  async runCommand(commandId,ctx={}){
    const cmd=this._commands.get(commandId);
    if(!cmd){this._log(`Command not found: ${commandId}`,'warn');return}
    const pluginId=cmd.pluginId;
    if(!this.isEnabled(pluginId)){this._log(`Command skipped (disabled): ${commandId}`,'warn');return}
    try{
      const result=await cmd.run(ctx);
      return result;
    }catch(err){
      this._recordError(pluginId,`command:${commandId}`,err);
      throw err;
    }
  },
  getCommands(){
    const result=[];
    for(const[id,cmd]of this._commands){
      if(this.isEnabled(cmd.pluginId))result.push({id,...cmd});
    }
    return result;
  },

  // --- Toolbar ---
  getToolbarItems(){
    return this._toolbarItems
      .filter(({pluginId})=>this.isEnabled(pluginId))
      .map(({pluginId,item})=>({...item,pluginId}));
  },

  // --- Sidebar Panels (v7) ---
  getSidebarPanels(){
    return this._panels
      .filter(({pluginId})=>this.isEnabled(pluginId))
      .map(({pluginId,panel})=>({...panel,pluginId}));
  },

  // --- Exporters ---
  getExporters(){
    const result={};
    for(const[id,exp]of this._exporters){
      if(this.isEnabled(exp.pluginId))result[id]=exp;
    }
    return result;
  },

  // --- Preview ---
  decoratePreview(element,ctx={}){
    for(const{pluginId,fn}of this._previewDecorators){
      if(!this.isEnabled(pluginId))continue;
      try{fn(element,ctx)}catch(err){this._recordError(pluginId,'preview:decorate',err)}
    }
  },

  // --- Event Bus ---
  on(event,handler,pluginId='app'){
    if(!this._events.has(event))this._events.set(event,[]);
    this._events.get(event).push({pluginId,handler});
    return()=>{
      const arr=this._events.get(event)||[];
      const idx=arr.findIndex(h=>h.pluginId===pluginId&&h.handler===handler);
      if(idx>=0)arr.splice(idx,1);
    };
  },
  emit(event,payload){
    const handlers=this._events.get(event)||[];
    for(const h of handlers){
      try{h.handler(payload)}catch(err){this._recordError(h.pluginId||'unknown',`event:${event}`,err)}
    }
  },

  // --- Error tracking ---
  _recordError(pluginId,scope,err){
    if(!this._errors.has(pluginId))this._errors.set(pluginId,[]);
    const list=this._errors.get(pluginId);
    list.push({scope,message:err?.message||String(err),time:Date.now()});
    if(list.length>10)list.shift(); // 最大10件
    this._log(`[${pluginId}] ${scope}: ${err?.message||err}`,'error');
  },
  getErrors(pluginId){return this._errors.get(pluginId)||[]},
  hasErrors(pluginId){return(this._errors.get(pluginId)||[]).length>0},

  // --- Contribution Normalizer ---
  _normalizeContributions(plugin){
    const c=plugin.contributes||{};
    const api=this._createAPI(plugin.id);
    
    // Commands (v4: via registerCommand)
    Object.entries(c.commands||{}).forEach(([id,command])=>{
      api.registerCommand(id,command);
    });
    
    // Toolbar items (v4: via registerToolbarItem)
    (c.toolbar||[]).forEach(item=>{
      api.registerToolbarItem(item);
    });
    
    // Preview decorators (v4: via registerPreviewDecorator)
    (c.preview?.decorators||[]).forEach(fn=>{
      api.registerPreviewDecorator(fn);
    });
    
    // Exporters (v4: via registerExporter)
    Object.entries(c.exporters||{}).forEach(([id,exporter])=>{
      api.registerExporter(id,exporter);
    });
    
    // Pipeline handlers (v4: via registerPipeline)
    Object.entries(c.pipelines||{}).forEach(([stage,handlers])=>{
      (handlers||[]).forEach(handler=>{
        api.registerPipeline(stage,handler);
      });
    });
  },

  // --- Capability Check (string | {id,type,kind} 両対応) ---
  _hasCapability(pluginId,capability){
    const plugin=this._plugins.get(pluginId);
    if(!plugin?.capabilities)return true; // capabilities未定義 = 制限なし
    return plugin.capabilities.some(cap=>{
      if(typeof cap==='string')return cap===capability;
      if(cap&&typeof cap==='object'){
        return cap.id===capability||cap.type===capability||cap.kind===capability;
      }
      return false;
    });
  },

  // --- Dependency Check ---
  canEnable(pluginId){
    const plugin=this._plugins.get(pluginId);
    const deps=plugin?.dependencies||[];
    const missing=deps.filter(id=>!this.isEnabled(id));
    return {ok:missing.length===0,missing};
  },

  // --- Internal: Plugin API factory ---
  _createAPI(pluginId){
    const kernel=this;
    return{
      id:pluginId,
      // Storage (namespace 付き)
      storage:{
        get:(k,d)=>kernel._config.storage?.get(`plugin_${pluginId}_${k}`,d),
        set:(k,v)=>kernel._config.storage?.set(`plugin_${pluginId}_${k}`,v),
        remove:(k)=>kernel._config.storage?.remove(`plugin_${pluginId}_${k}`)
      },
      // Commands
      registerCommand(cmdId,command){
        return kernel.registerCommand(pluginId,cmdId,command);
      },
      runCommand(cmdId,ctx){
        return kernel.runCommand(`${pluginId}.${cmdId}`,ctx);
      },
      // Toolbar
      registerToolbarItem(item){
        if(!kernel._hasCapability(pluginId,'toolbar.item')){
          kernel._recordError(pluginId,'capability',new Error('Missing capability: toolbar.item'));
          return;
        }
        // Conflict Guard: セパレータ以外の重複チェック
        if(item.label!=='|'){
          const dup=kernel._toolbarItems.find(t=>t.pluginId===pluginId&&t.item.label===item.label&&t.item.label!=='|');
          if(dup){kernel._recordError(pluginId,'registerToolbarItem',new Error(`Duplicate toolbar item: ${item.label}`));return}
        }
        kernel._toolbarItems.push({pluginId,item});
      },
      // Exporter
      registerExporter(exportId,exporter){
        if(!kernel._hasCapability(pluginId,'exporter')){
          kernel._recordError(pluginId,'capability',new Error('Missing capability: exporter'));
          return;
        }
        const fullId=`${pluginId}.${exportId}`;
        if(kernel._exporters.has(fullId)){
          kernel._recordError(pluginId,'registerExporter',new Error(`Exporter already registered: ${fullId}`));
          return;
        }
        kernel._exporters.set(fullId,{...exporter,pluginId});
      },
      // Sidebar Panel (v7)
      registerPanel(panel){
        if(!kernel._hasCapability(pluginId,'sidebar.panel')){
          kernel._recordError(pluginId,'capability',new Error('Missing capability: sidebar.panel'));
          return;
        }
        kernel._panels.push({pluginId,panel});
      },
      // Markdown pipeline registration
      registerPipeline(stage,handler){
        if(!kernel._hasCapability(pluginId,'markdown.pipeline')){
          kernel._recordError(pluginId,'capability',new Error('Missing capability: markdown.pipeline'));
          return;
        }
        if(!kernel._pipelines.has(stage))kernel._pipelines.set(stage,[]);
        kernel._pipelines.get(stage).push({
          pluginId,
          id:handler.id||`${pluginId}-${stage}`,
          order:handler.order||100,
          run:handler.run
        });
      },
      // Preview
      registerPreviewDecorator(fn){
        if(!kernel._hasCapability(pluginId,'preview.decorate')){
          kernel._recordError(pluginId,'capability',new Error('Missing capability: preview.decorate'));
          return;
        }
        kernel._previewDecorators.push({pluginId,fn});
      },
      // Event bus
      on(event,handler){
        const off=kernel.on(event,handler,pluginId);
        // disposable に登録
        if(!kernel._disposables.has(pluginId))kernel._disposables.set(pluginId,[]);
        kernel._disposables.get(pluginId).push(off);
        return off;
      },
      emit(event,payload){kernel.emit(event,payload)},
      // Disposable 登録
      addDisposable(fn){
        if(!kernel._disposables.has(pluginId))kernel._disposables.set(pluginId,[]);
        kernel._disposables.get(pluginId).push(fn);
      }
    };
  },

  // --- v4 API: Event Bus Enhancement ---
  off(event, handler) {
    if (!this._events.has(event)) return;
    const handlers = this._events.get(event);
    const idx = handlers.findIndex(h => h.handler === handler);
    if (idx >= 0) handlers.splice(idx, 1);
  },

  // --- v4 API: Pipeline Runtime ---
  runPipeline(stage, input, ctx = {}) {
    let result = input;
    
    // Get handlers for this stage from _pipelines Map
    const handlers = (this._pipelines.get(stage) || [])
      .filter(h => this.isEnabled(h.pluginId))
      .sort((a, b) => (a.order || 100) - (b.order || 100));
    
    // Create unified context for entire pipeline stage (shared across all handlers)
    const runtimeCtx = createRuntimeContext(ctx);
    runtimeCtx.pipelineState = runtimeCtx.pipelineState || {};
    
    // Execute handlers in order (same ctx reference for state sharing)
    for (const handler of handlers) {
      try {
        runtimeCtx.pluginId = handler.pluginId;
        result = handler.run(result, runtimeCtx);
      } catch (e) {
        this._recordError(handler.pluginId, `pipeline:${stage}`, e);
      }
    }
    return result;
  },

  // --- Logger ---
  _log(msg,level='log'){
    const method=this._config.logger?.[level]||this._config.logger?.log||console.log;
    method(`[PluginKernel] ${msg}`);
  },

};

// --- Runtime Context Factory ---
function createRuntimeContext(base={}){
  return {
    // Editor State
    activeTab: base.activeTab || null,
    activeTabId: base.activeTabId || null,
    tabs: base.tabs || [],
    updateTab: base.updateTab || (() => {}),
    updateText: base.updateText || (() => {}),
    insert: base.insert || (() => {}),

    // UI
    showMessage: base.showMessage || (() => {}),
    showConfirm: base.showConfirm || (() => {}),

    // Profile
    profile: base.profile || null,

    // Theme
    colors: base.colors || {},

    // Extra (allow any additional properties)
    ...base
  };
}

// --- Format Bytes ---
function formatBytes(bytes,decimals=2){
  if(bytes===0)return '0 Bytes';
  const k=1024;
  const dm=decimals<0?0:decimals;
  const sizes=['Bytes','KB','MB','GB'];
  const i=Math.floor(Math.log(bytes)/Math.log(k));
  return parseFloat((bytes/Math.pow(k,i)).toFixed(dm))+' '+sizes[i];
}

function fitOversizedVisualBlocks(target,pageHeightCssPx,options={}){
  const{maxHeight=Math.floor(pageHeightCssPx*0.82),maxWidth=794}=options;
  const visualBlocks=Array.from(target.querySelectorAll('.mermaid, img, svg'));
  const processed=new WeakSet();
  for(const block of visualBlocks){
    const visual=block.matches('img,svg')?block:block.querySelector('svg,img');
    if(!visual||processed.has(visual))continue;
    processed.add(visual);
    const rect=visual.getBoundingClientRect();
    const currentHeight=rect.height;
    const currentWidth=rect.width;
    if(!currentHeight||!currentWidth)continue;
    const overHeight=currentHeight>maxHeight;
    const overWidth=currentWidth>maxWidth;
    if(!overHeight&&!overWidth)continue;
    const scaleH=maxHeight/currentHeight;
    const scaleW=maxWidth/currentWidth;
    const scale=Math.min(scaleH,scaleW,1);
    if(scale>=1)continue;
    const nextWidth=Math.floor(currentWidth*scale);
    const nextHeight=Math.floor(currentHeight*scale);
    // transformではなく実寸を変更する。
    // html2canvasと改ページ計算のズレを防ぐ。
    visual.style.width=`${nextWidth}px`;
    visual.style.height=`${nextHeight}px`;
    visual.style.maxWidth='100%';
    visual.style.maxHeight=`${maxHeight}px`;
    visual.style.objectFit='contain';
    visual.style.display='block';
    visual.style.marginLeft='auto';
    visual.style.marginRight='auto';
    visual.style.transform='none';
    const wrapper=block.matches('.mermaid')?block:visual.parentElement;
    if(wrapper){
      wrapper.style.width='100%';
      wrapper.style.height=`${nextHeight}px`;
      wrapper.style.maxHeight=`${maxHeight}px`;
      wrapper.style.overflow='visible';
      wrapper.style.display='flex';
      wrapper.style.justifyContent='center';
      wrapper.style.alignItems='flex-start';
      wrapper.style.breakInside='avoid';
      wrapper.style.pageBreakInside='avoid';
      wrapper.style.marginTop='10px';
      wrapper.style.marginBottom='10px';
    }
  }
}

function buildSafePageRanges(target,pageHeightCssPx,options={}){
  const totalHeight=target.scrollHeight;
  const ranges=[];
  const minPageFillRatio=options.minPageFillRatio??0.62;
  const minPageHeight=pageHeightCssPx*minPageFillRatio;
  const bottomGuardPx=options.bottomGuardPx??48;
  const minPageAdvancePx=options.minPageAdvancePx??40;
  const headingKeepWithNextPx=options.headingKeepWithNextPx??240;
  const targetRect=target.getBoundingClientRect();
  const getBox=(el)=>{
    const rect=el.getBoundingClientRect();
    return{el,top:rect.top-targetRect.top+target.scrollTop,bottom:rect.bottom-targetRect.top+target.scrollTop,height:rect.height,tag:el.tagName.toLowerCase(),className:typeof el.className==='string'?el.className:''};
  };
  const hardAvoidSelector=['.mermaid','.mermaid svg','svg','img','table','pre','.katex-block'].join(',');
  const softAvoidSelector=['blockquote','ul','ol'].join(',');
  const headingSelector='h1,h2,h3,h4,h5,h6';
  const blockSelector=['h1','h2','h3','h4','h5','h6','p','ul','ol','table','pre','blockquote','img','.mermaid','.katex-block','svg'].join(',');
  const hardAvoidItems=Array.from(target.querySelectorAll(hardAvoidSelector)).map(getBox).filter(item=>item.height>0).sort((a,b)=>a.top-b.top);
  const softAvoidItems=Array.from(target.querySelectorAll(softAvoidSelector)).map(getBox).filter(item=>item.height>0).sort((a,b)=>a.top-b.top);
  const headings=Array.from(target.querySelectorAll(headingSelector)).map(getBox).filter(item=>item.height>0).sort((a,b)=>a.top-b.top);
  const allBlocks=Array.from(target.querySelectorAll(blockSelector)).map(getBox).filter(item=>item.height>0).sort((a,b)=>a.top-b.top);
  const findNextBlock=(heading)=>{
    const candidates=allBlocks.filter(item=>{
      return item.el!==heading.el&&item.top>=heading.bottom-1;
    });
    if(!candidates.length)return null;
    const first=candidates[0];
    // Mermaid内部のsvgではなく、Mermaidコンテナを返す
    const mermaidParent=first.el.closest?.('.mermaid');
    if(mermaidParent){
      const mermaidBox=allBlocks.find(item=>item.el===mermaidParent);
      if(mermaidBox)return mermaidBox;
    }
    return first;
  };
  let start=0;
  while(start<totalHeight){
    const naturalEnd=Math.min(start+pageHeightCssPx,totalHeight);
    if(naturalEnd>=totalHeight){
      ranges.push({y:Math.floor(start),height:Math.ceil(totalHeight-start)});
      break;
    }
    let end=naturalEnd-bottomGuardPx;
    // 1. Mermaid / SVG / img / table / pre / KaTeX は、ページ充填率よりも非分割を優先する
    for(const item of hardAvoidItems){
      const crossesBoundary=item.top<end&&item.bottom>end;
      const startsInsidePage=item.top>=start&&item.top<end;
      const canFitInSinglePage=item.height<=pageHeightCssPx*0.96;
      if(crossesBoundary&&startsInsidePage&&canFitInSinglePage){
        // Mermaid・図・表はページが少し空いても次ページに送る
        end=Math.floor(item.top);
        break;
      }
    }
    // 2. ul / ol / blockquote は、ページが極端に空かない場合だけ分割回避
    for(const item of softAvoidItems){
      const crossesBoundary=item.top<end&&item.bottom>end;
      const startsInsidePage=item.top>=start&&item.top<end;
      const canFitInSinglePage=item.height<=pageHeightCssPx*0.9;
      const doesNotMakePageTooEmpty=item.top-start>=minPageHeight;
      if(crossesBoundary&&startsInsidePage&&canFitInSinglePage&&doesNotMakePageTooEmpty){
        end=Math.floor(item.top);
        break;
      }
    }
    // 3. 見出しだけがページ末尾に残るのを防ぐ
    for(const heading of headings){
      const headingInsidePage=heading.top>=start&&heading.top<end;
      if(!headingInsidePage)continue;
      const nextBlock=findNextBlock(heading);
      if(!nextBlock)continue;
      const nextIsMermaid=nextBlock.el.matches('.mermaid')||nextBlock.el.closest('.mermaid');
      const nextIsHardBlock=nextIsMermaid||nextBlock.el.matches('table,img,svg,.katex-block')||nextBlock.el.closest('table,.katex-block');
      const nextIsCodeBlock=nextBlock.el.matches('pre')||nextBlock.el.closest('pre');
      const nextBlockStartsAfterPage=nextBlock.top>=end;
      // 見出し下に最低限入ってほしい高さ。
      // ここが足りないなら、見出しだけ残さず次ページへ送る。
      const minimumContentAfterHeadingPx=nextIsHardBlock?Math.min(nextBlock.height,pageHeightCssPx*0.55):nextIsCodeBlock?Math.min(nextBlock.height,pageHeightCssPx*0.35):Math.min(nextBlock.height,headingKeepWithNextPx);
      const requiredBottom=Math.min(nextBlock.bottom,heading.bottom+minimumContentAfterHeadingPx);
      const headingHasEnoughFollowingContent=requiredBottom<=end;
      // 見出しがページ下部にある場合は、本文が少し入っても読みづらいので送る
      const headingIsNearBottom=heading.top>start+pageHeightCssPx*0.68;
      // ページ先頭付近の見出しを送ると無限ループや空ページ化しやすいので、
      // 最低限だけ進んでいれば送ってよい
      const canMoveHeadingToNextPage=heading.top-start>=minPageAdvancePx;
      // Mermaid直前の見出しは、図が同ページに入らない時だけ送る
      if(nextIsMermaid&&canMoveHeadingToNextPage){
        const remainingHeight=end-heading.top;
        const mermaidGroupHeight=Math.min(nextBlock.bottom-heading.top,pageHeightCssPx*0.88);
        const mermaidGroupDoesNotFit=mermaidGroupHeight>remainingHeight;
        if(mermaidGroupDoesNotFit||nextBlockStartsAfterPage||headingIsNearBottom){
          end=Math.floor(heading.top);
          break;
        }
      }
      // 通常見出し・表・画像・コード・本文すべてに共通する判定
      if(canMoveHeadingToNextPage&&(nextBlockStartsAfterPage||!headingHasEnoughFollowingContent||headingIsNearBottom)){
        end=Math.floor(heading.top);
        break;
      }
    }
    // 4. end が start に近すぎる場合だけ自然改ページに戻す
    // ただし Mermaid / SVG / table 等の直前で切るケースは許容する
    if(end<=start+minPageAdvancePx){
      end=naturalEnd;
    }
    ranges.push({y:Math.floor(start),height:Math.ceil(end-start)});
    start=end;
  }
  return ranges;
}

// Document Analysis: リンク・画像・コード・見出し・タスク解析
// ============================================================

// --- DocumentModel: Document AST-based structured representation ---
class DocumentModel{
  constructor(markdown){
    this.markdown=markdown;
    this._ast=null;
    this._analysis=null;
    this._cache={
      sections:null,
      links:null,
      images:null,
      codeBlocks:null,
      metadata:null
    };
    this._isDirty=true;
  }
  
  // AST を取得（キャッシュ付き）
  getAST(){
    if(this._isDirty||!this._ast){
      this._ast=(window.marked&&marked.lexer)?marked.lexer(this.markdown):fallbackMarkdownLexer(this.markdown);
      this._isDirty=false;
      this._invalidateCache();
    }
    return this._ast;
  }
  
  // キャッシュを無効化
  _invalidateCache(){
    this._cache={
      sections:null,
      links:null,
      images:null,
      codeBlocks:null,
      metadata:null
    };
    this._analysis=null;
  }
  
  // セクション抽出（見出しレベル別）
  getSections(){
    if(this._cache.sections!==null){
      return this._cache.sections;
    }
    
    const ast=this.getAST();
    const sections=[];
    let currentSection=null;
    
    for(const token of ast){
      if(token.type==='heading'){
        if(currentSection&&currentSection.level<token.depth){
          // ネストされたセクション
          if(!currentSection.subsections){
            currentSection.subsections=[];
          }
          currentSection.subsections.push({
            level:token.depth,
            title:token.text,
            content:[]
          });
        }else{
          // 新しいトップレベルセクション
          currentSection={
            level:token.depth,
            title:token.text,
            content:[],
            subsections:[]
          };
          sections.push(currentSection);
        }
      }else if(currentSection){
        currentSection.content.push(token);
      }
    }
    
    this._cache.sections=sections;
    return sections;
  }
  
  // リンク分析（内部・外部リンク分類）
  analyzeLinks(){
    if(this._cache.links!==null){
      return this._cache.links;
    }
    
    const ast=this.getAST();
    const links={
      internal:[],
      external:[],
      anchors:[],
      broken:[]
    };
    
    const processText=(text)=>{
      const linkRegex=/\[([^\]]+)\]\(([^)]+)\)/g;
      let match;
      while((match=linkRegex.exec(text))!==null){
        const[,label,href]=match;
        if(href.startsWith('#')){
          links.anchors.push({label,href});
        }else if(href.startsWith('http')){
          links.external.push({label,href});
        }else if(href.startsWith('/')||href.startsWith('./')||href.startsWith('../')){
          links.internal.push({label,href});
        }else if(href.length===0){
          links.broken.push({label,href});
        }else{
          links.internal.push({label,href});
        }
      }
    };
    
    for(const token of ast){
      if(token.type==='paragraph'||token.type==='heading'){
        processText(token.text);
      }else if(token.type==='list'){
        for(const item of token.items){
          processText(item.text);
        }
      }
    }
    
    this._cache.links=links;
    return links;
  }
  
  // 画像分析
  analyzeImages(){
    if(this._cache.images!==null){
      return this._cache.images;
    }
    
    const ast=this.getAST();
    const images={
      local:[],
      remote:[],
      missing:[]
    };
    
    const processText=(text)=>{
      const imageRegex=/!\[([^\]]*)\]\(([^)]+)\)/g;
      let match;
      while((match=imageRegex.exec(text))!==null){
        const[,alt,src]=match;
        if(src.startsWith('http')){
          images.remote.push({alt,src});
        }else if(src.length===0){
          images.missing.push({alt,src});
        }else{
          images.local.push({alt,src});
        }
      }
    };
    
    for(const token of ast){
      if(token.type==='paragraph'||token.type==='heading'){
        processText(token.text);
      }
    }
    
    this._cache.images=images;
    return images;
  }
  
  // コード分析
  analyzeCode(){
    if(this._cache.codeBlocks!==null){
      return this._cache.codeBlocks;
    }
    
    const ast=this.getAST();
    const codeBlocks={
      byLanguage:{},
      total:0,
      languages:[]
    };
    
    for(const token of ast){
      if(token.type==='code'){
        const lang=token.lang||'plaintext';
        if(!codeBlocks.byLanguage[lang]){
          codeBlocks.byLanguage[lang]={
            count:0,
            lines:0,
            blocks:[]
          };
          codeBlocks.languages.push(lang);
        }
        const lines=token.text.split('\n').length;
        codeBlocks.byLanguage[lang].count++;
        codeBlocks.byLanguage[lang].lines+=lines;
        codeBlocks.byLanguage[lang].blocks.push({
          lines,
          preview:token.text.split('\n').slice(0,3).join('\n')
        });
        codeBlocks.total++;
      }
    }
    
    this._cache.codeBlocks=codeBlocks;
    return codeBlocks;
  }
  
  // メタデータ抽出
  getMetadata(){
    if(this._cache.metadata!==null){
      return this._cache.metadata;
    }
    
    const ast=this.getAST();
    const metadata={
      title:null,
      description:null,
      headings:[],
      wordCount:0,
      characterCount:this.markdown.length,
      lineCount:this.markdown.split('\n').length,
      estimatedReadingTime:0
    };
    
    // タイトル（最初の見出し）
    for(const token of ast){
      if(token.type==='heading'&&token.depth===1){
        metadata.title=token.text;
        break;
      }
    }
    
    // 見出し一覧
    for(const token of ast){
      if(token.type==='heading'){
        metadata.headings.push({
          level:token.depth,
          text:token.text
        });
      }
    }
    
    // 単語数
    metadata.wordCount=this.markdown.split(/\s+/).filter(w=>w.length>0).length;
    metadata.estimatedReadingTime=Math.ceil(metadata.wordCount/200);
    
    this._cache.metadata=metadata;
    return metadata;
  }
  
  // 完全な分析結果を取得
  analyze(){
    if(this._analysis!==null){
      return this._analysis;
    }
    
    this._analysis={
      metadata:this.getMetadata(),
      sections:this.getSections(),
      links:this.analyzeLinks(),
      images:this.analyzeImages(),
      code:this.analyzeCode()
    };
    
    return this._analysis;
  }
  
  // ドキュメント更新
  update(markdown){
    if(this.markdown!==markdown){
      this.markdown=markdown;
      this._isDirty=true;
      this._invalidateCache();
    }
  }
}

function fallbackMarkdownLexer(md=''){
  const lines=String(md||'').split(String.fromCharCode(10));
  const tokens=[];
  let inCode=false,codeLang='',code=[];
  for(const line of lines){
    const t=String(line||'').trim();
    if(t.startsWith('```')){
      if(!inCode){inCode=true;codeLang=t.slice(3).trim();code=[]}
      else{tokens.push({type:'code',lang:codeLang,text:code.join(String.fromCharCode(10))});inCode=false;codeLang='';code=[]}
      continue;
    }
    if(inCode){code.push(line);continue}
    let level=0;
    while(level<t.length&&t[level]==='#')level++;
    if(level>0&&level<=6&&t[level]===' '){tokens.push({type:'heading',depth:level,text:t.slice(level+1)});continue}
    if(t.startsWith('- ')||t.startsWith('* ')||t.startsWith('+ ')){
      const body=t.slice(2);
      const task=body.startsWith('[ ] ')||body.toLowerCase().startsWith('[x] ');
      tokens.push({type:'list',ordered:false,items:[{text:task?body.slice(4):body,task,checked:task&&body.toLowerCase().startsWith('[x] ')}]});
      continue;
    }
    if(t.startsWith('|')&&t.endsWith('|')){tokens.push({type:'table',header:[],rows:[]});continue}
    if(t)tokens.push({type:'paragraph',text:line});
  }
  if(inCode)tokens.push({type:'code',lang:codeLang,text:code.join(String.fromCharCode(10))});
  return tokens;
}

// --- Document Service (Markdown 構造化・Outline・Task 抽出) ---
const DocumentService={
  // marked.lexer ベースの高精度解析（v2）
  parseV2(md){
    try{
      const tokens=(window.marked&&marked.lexer)?marked.lexer(md):fallbackMarkdownLexer(md);
      const structure={
        headings:[],
        paragraphs:[],
        lists:[],
        tables:[],
        tasks:[],
        codeBlocks:[],
        images:[],
        links:[]
      };
      const stats={
        headingCount:0,
        paragraphCount:0,
        listCount:0,
        tableCount:0,
        taskCount:0,
        codeBlockCount:0,
        imageCount:0,
        linkCount:0,
        wordCount:0,
        lineCount:md.split('\n').length
      };
      
      for(const token of tokens){
        if(token.type==='heading'){
          structure.headings.push({
            level:token.depth,
            text:token.text,
            lineNumber:null
          });
          stats.headingCount++;
        }else if(token.type==='code'){
          structure.codeBlocks.push({
            lang:token.lang||'',
            lines:token.text.split('\n').length,
            lineNumber:null
          });
          stats.codeBlockCount++;
        }else if(token.type==='table'){
          structure.tables.push({
            rows:token.rows.length,
            cols:token.header.length,
            lineNumber:null
          });
          stats.tableCount++;
        }else if(token.type==='list'){
          structure.lists.push({
            items:token.items.length,
            ordered:token.ordered,
            lineNumber:null
          });
          stats.listCount++;
          // Task extraction (v3: push to structure.tasks)
          for(const item of token.items){
            if(item.task){
              structure.tasks.push({
                completed:!!item.checked,
                text:item.text,
                lineNumber:null
              });
              stats.taskCount++;
            }
          }
        }else if(token.type==='paragraph'){
          structure.paragraphs.push(token.text);
          stats.paragraphCount++;
          // Extract images and links
          const imageMatches=token.text.match(/!\[([^\]]*)\]\(([^)]+)\)/g)||[];
          const textWithoutImages=token.text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'');
          const linkMatches=textWithoutImages.match(/\[([^\]]+)\]\(([^)]+)\)/g)||[];
          stats.imageCount+=imageMatches.length;
          stats.linkCount+=linkMatches.length;
        }
      }
      
      stats.wordCount=md.split(/\s+/).filter(w=>w.length>0).length;
      return{structure,stats};
    }catch(e){
      // Fallback to v1 if lexer fails
      return this.parseV1(md);
    }
  },
  
  // 従来の行ベース解析（v1）- フォールバック用
  parseV1(md){
    const lines=md.split('\n');
    const structure={
      headings:[],
      paragraphs:[],
      lists:[],
      tables:[],
      tasks:[],
      codeBlocks:[],
      images:[],
      links:[]
    };
    const stats={
      headingCount:0,
      paragraphCount:0,
      listCount:0,
      tableCount:0,
      taskCount:0,
      codeBlockCount:0,
      imageCount:0,
      linkCount:0,
      wordCount:0,
      lineCount:lines.length
    };
    
    let i=0;
    let currentParagraph='';
    
    while(i<lines.length){
      const line=lines[i];
      
      // 見出し
      const headingMatch=line.match(/^(#{1,6})\s+(.+)$/);
      if(headingMatch){
        if(currentParagraph.trim()){
          structure.paragraphs.push(currentParagraph.trim());
          stats.paragraphCount++;
          currentParagraph='';
        }
        const level=headingMatch[1].length;
        const text=headingMatch[2];
        structure.headings.push({level,text,lineNumber:i});
        stats.headingCount++;
        i++;
        continue;
      }
      
      // テーブル
      if(line.includes('|')){
        if(currentParagraph.trim()){
          structure.paragraphs.push(currentParagraph.trim());
          stats.paragraphCount++;
          currentParagraph='';
        }
        const tableLines=[line];
        i++;
        while(i<lines.length&&lines[i].includes('|')){
          tableLines.push(lines[i]);
          i++;
        }
        structure.tables.push({rows:tableLines.length,lineNumber:i-tableLines.length});
        stats.tableCount++;
        continue;
      }
      
      // コードブロック
      if(line.startsWith('```')){
        if(currentParagraph.trim()){
          structure.paragraphs.push(currentParagraph.trim());
          stats.paragraphCount++;
          currentParagraph='';
        }
        const codeLines=[line];
        i++;
        while(i<lines.length&&!lines[i].startsWith('```')){
          codeLines.push(lines[i]);
          i++;
        }
        if(i<lines.length)codeLines.push(lines[i]);
        structure.codeBlocks.push({lines:codeLines.length,lineNumber:i-codeLines.length});
        stats.codeBlockCount++;
        i++;
        continue;
      }
      
      // リスト・タスク
      const listMatch=line.match(/^[\s]*[-*+]\s+(.+)$/);
      const taskMatch=line.match(/^[\s]*-\s+\[\s*([xX ])\s*\]\s+(.+)$/);
      if(taskMatch){
        if(currentParagraph.trim()){
          structure.paragraphs.push(currentParagraph.trim());
          stats.paragraphCount++;
          currentParagraph='';
        }
        const completed=taskMatch[1].toLowerCase()==='x';
        const text=taskMatch[2];
        structure.tasks.push({completed,text,lineNumber:i});
        stats.taskCount++;
        i++;
        continue;
      }
      if(listMatch){
        if(currentParagraph.trim()){
          structure.paragraphs.push(currentParagraph.trim());
          stats.paragraphCount++;
          currentParagraph='';
        }
        const listItems=[line];
        i++;
        while(i<lines.length&&lines[i].match(/^[\s]*[-*+]\s+/)){
          listItems.push(lines[i]);
          i++;
        }
        structure.lists.push({items:listItems.length,lineNumber:i-listItems.length});
        stats.listCount++;
        continue;
      }
      
      // 画像
      const imageMatch=line.match(/!\[([^\]]*)\]\(([^)]+)\)/g);
      if(imageMatch){
        structure.images.push(...imageMatch.map(m=>({src:m,lineNumber:i})));
        stats.imageCount+=imageMatch.length;
      }
      
      // リンク
      const linkMatch=line.match(/\[([^\]]+)\]\(([^)]+)\)/g);
      if(linkMatch){
        structure.links.push(...linkMatch.map(m=>({href:m,lineNumber:i})));
        stats.linkCount+=linkMatch.length;
      }
      
      // 段落
      if(line.trim()){
        currentParagraph+=line+'\n';
      }else if(currentParagraph.trim()){
        structure.paragraphs.push(currentParagraph.trim());
        stats.paragraphCount++;
        currentParagraph='';
      }
      
      i++;
    }
    
    if(currentParagraph.trim()){
      structure.paragraphs.push(currentParagraph.trim());
      stats.paragraphCount++;
    }
    
    stats.wordCount=md.split(/\s+/).filter(w=>w.length>0).length;
    return{structure,stats};
  },
  
  // デフォルト: v2 を使用（marked.lexer ベース）
  parse(md){
    return this.parseV2(md);
  },
  
  // Outline（目次）を生成
  generateOutline(md){
    const{structure}=this.parse(md);
    const outline=[];
    
    for(const heading of structure.headings){
      outline.push({
        level:heading.level,
        text:heading.text,
        id:`heading-${uuid()}`,
        children:[]
      });
    }
    
    // ネストされた構造を作成
    const root=[];
    const stack=[];
    
    for(const item of outline){
      while(stack.length>0&&stack[stack.length-1].level>=item.level){
        stack.pop();
      }
      
      if(stack.length===0){
        root.push(item);
      }else{
        stack[stack.length-1].children.push(item);
      }
      
      stack.push(item);
    }
    
    return root;
  },
  
  // 統計情報を取得
  getStats(md){
    const{stats}=this.parse(md);
    const readingTimeMinutes=Math.ceil(stats.wordCount/200);
    
    return{
      ...stats,
      readingTimeMinutes,
      estimatedReadingTime:`${readingTimeMinutes}分`
    };
  }
};

// --- Diagnosis Service (Export 前診断) ---
const DiagnosisService={
  // Export 前に診断を実行
  diagnose(md){
    const{structure,stats}=DocumentService.parse(md);
    const issues=[];
    const warnings=[];
    const info=[];
    
    // 1. 構造チェック
    if(stats.headingCount===0){
      warnings.push('見出しがありません。ドキュメント構造を改善してください。');
    }
    
    // 見出しレベルの妥当性チェック
    let prevLevel=0;
    for(const heading of structure.headings){
      if(heading.level>prevLevel+1){
        const loc=Number.isInteger(heading.lineNumber)?`行${heading.lineNumber+1}`:'行不明';
        issues.push(`見出しレベルが不正です（${loc}）: H${prevLevel}の次にH${heading.level}があります`);
      }
      prevLevel=heading.level;
    }
    
    // 2. リスク検出
    if(stats.imageCount>0&&stats.imageCount>stats.linkCount){
      info.push(`画像が${stats.imageCount}個あります。PDF出力時に画像が正しく表示されるか確認してください。`);
    }
    
    if(stats.tableCount>0){
      info.push(`テーブルが${stats.tableCount}個あります。複雑なテーブルはPDF出力時に崩れる可能性があります。`);
    }
    
    if(stats.codeBlockCount>0){
      info.push(`コードブロックが${stats.codeBlockCount}個あります。長いコードは改行される可能性があります。`);
    }
    
    // 3. 推奨事項
    if(stats.wordCount>10000){
      warnings.push('ドキュメントが長いです。セクションに分割することを検討してください。');
    }
    
    if(stats.taskCount>0){
      const completedTasks=structure.tasks.filter(t=>t.completed).length;
      const incompleteTasks=stats.taskCount-completedTasks;
      if(incompleteTasks>0){
        info.push(`未完了のタスクが${incompleteTasks}個あります。`);
      }
    }
    
    return{
      issues,
      warnings,
      info,
      hasIssues:issues.length>0,
      hasWarnings:warnings.length>0,
      summary:{
        totalIssues:issues.length,
        totalWarnings:warnings.length,
        totalInfo:info.length
      }
    };
  },
  
  // 診断結果をメッセージで表示
  displayDiagnosis(md,showMessage){
    const diagnosis=this.diagnose(md);
    
    if(diagnosis.hasIssues){
      showMessage(`⚠️ エラー: ${diagnosis.issues.join(' / ')}`,'error');
    }
    
    if(diagnosis.hasWarnings){
      showMessage(`⚠️ 警告: ${diagnosis.warnings.join(' / ')}`,'warn');
    }
    
    if(diagnosis.info.length>0){
      showMessage(`ℹ️ 情報: ${diagnosis.info[0]}`);
    }
    
    return diagnosis;
  }
};

      if(!ranges.length){throw new Error('PDFページ範囲を作成できませんでした')}
      if(ranges.length>1000){throw new Error(`PDFページ数が多すぎます: 推定${ranges.length}ページ`)}
      for(let pageIndex=0;pageIndex<ranges.length;pageIndex++){
        const range=ranges[pageIndex];
        const currentPage=pageIndex+1;
        const totalPages=ranges.length;
        const percent=Math.round((currentPage/totalPages)*100);
        updateProgress({
          phase:'pages',
          step:currentPage,
          total:totalPages,
          percent,
          message:`PDFを生成中... ${currentPage}/${totalPages}ページ`,
          pageInfo:{
            current:currentPage,
            total:totalPages
          }
        });
        const pageHeightForCapture=Math.min(range.height,pageHeightCssPx);
        const pageContainer=doc.createElement('div');
        pageContainer.style.cssText=[
          'position:absolute',
          'left:0',
          'top:0',
          `width:${targetWidthCssPx}px`,
          `height:${pageHeightForCapture}px`,
          'overflow:hidden',
          'background:#ffffff',
          'box-sizing:border-box'
        ].join(';');
        const clone=target.cloneNode(true);
        clone.style.position='relative';
        clone.style.left='0';
        clone.style.top=`-${range.y}px`;
        clone.style.width=`${targetWidthCssPx}px`;
        clone.style.margin='0';
        clone.style.transform='none';
        pageContainer.appendChild(clone);
        doc.body.appendChild(pageContainer);
        let capturedCanvas;
        try{
          await new Promise(resolve=>{
            requestAnimationFrame(()=>requestAnimationFrame(resolve));
          });
          capturedCanvas=await html2canvas(pageContainer,{
            scale:outputScale,
            useCORS:true,
            allowTaint:false,
            backgroundColor:'#ffffff',
            logging:false,
            scrollX:0,
            scrollY:0,
            width:targetWidthCssPx,
            height:pageHeightForCapture,
            windowWidth:targetWidthCssPx,
            windowHeight:pageHeightForCapture
          });
        }finally{
          if(pageContainer.parentNode){
            pageContainer.parentNode.removeChild(pageContainer);
          }
        }
        const imgData=capturedCanvas.toDataURL('image/jpeg',jpegQuality);
        const imgWidth=210;
        const imgHeight=(capturedCanvas.height/capturedCanvas.width)*imgWidth;
        if(pageIndex>0)pdf.addPage();
        pdf.addImage(imgData,'JPEG',0,0,imgWidth,imgHeight);
      }
      updateProgress({
        phase:'saving',
        step:1,
        total:1,
        percent:100,
        message:'PDFを保存中...'
      });
      const pdfBlob=pdf.output('blob');
      return pdfBlob;
    }finally{
      if(iframe.parentNode){iframe.parentNode.removeChild(iframe)}
    }
  },
    async generateWord(htmlContent,options={}){
    await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js','https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js'],'htmlDocx');
    const fullHtml=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;line-height:1.7;max-width:800px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:8px}th{background:#f0f0f0}pre{background:#f5f5f5;padding:12px;font-family:monospace}code{background:#f0f0f0;padding:2px 4px}blockquote{border-left:4px solid #ccc;padding-left:16px;color:#666}img{max-width:100%}</style></head><body>${htmlContent}</body></html>`;
    return window.htmlDocx.asBlob(fullHtml);
  },
  async generateExcel(markdownText,options={}){
    await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js','https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js','https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'],'XLSX');
    const XLSX=window.XLSX;
    const wb=XLSX.utils.book_new();
    // Extract tables from markdown
    const html=MarkdownService.parse(markdownText);
    const div=document.createElement('div');div.innerHTML=html;
    const tables=div.querySelectorAll('table');
    if(tables.length>0){
      tables.forEach((table,i)=>{
        const ws=XLSX.utils.table_to_sheet(table);
        XLSX.utils.book_append_sheet(wb,ws,'Table'+(i+1));
      });
    }else{
      // No tables: put text content as rows
      const lines=markdownText.split('\n');
      const data=lines.map(l=>[l]);
      const ws=XLSX.utils.aoa_to_sheet(data);
      XLSX.utils.book_append_sheet(wb,ws,'Content');
    }
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    return new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  },
  async generateZip(items,options={}){
    await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js','https://unpkg.com/jszip@3.10.1/dist/jszip.min.js','https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'],'JSZip');
    const{fileName='export.zip',onProgress}=options;
    const zip=new JSZip();
    for(let i=0;i<items.length;i++){
      const item=items[i];
      if(onProgress)onProgress(i+1,items.length,item.name);
      zip.file(item.name,item.data);
    }
    const blob=await zip.generateAsync({type:'blob'});
    return blob;
  },
};

// ============================================================
// Hybrid PDF Generator
// テキスト系は jsPDF.text() で文字として描画
// Mermaid / img / svg / KaTeX / table は html2canvas で画像化
// ============================================================
const HYBRID_PDF_FONT_URL='https://cdn.jsdelivr.net/fontsource/fonts/noto-sans-jp@latest/japanese-400-normal.ttf';
const HYBRID_PDF_FONT_NAME='NotoSansJP';
const HYBRID_PDF_FONT_FILE='NotoSansJP-Regular.ttf';

async function _hybridLoadFont(){
  if(window.__hybridFontBase64)return window.__hybridFontBase64;
  const res=await fetch(HYBRID_PDF_FONT_URL,{mode:'cors',cache:'force-cache'});
  if(!res.ok)throw new Error('フォント取得失敗: '+res.status);
  const buf=await res.arrayBuffer();
  const bytes=new Uint8Array(buf);
  let bin='';
  const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));
  window.__hybridFontBase64=btoa(bin);
  return window.__hybridFontBase64;
}

// mm単位でテキストを折り返して描画し、次のY座標を返す
function _hybridDrawWrappedText(doc,text,x,y,maxW,lineH,pageH,marginTop){
  const lines=doc.splitTextToSize(String(text||''),maxW);
  for(const line of lines){
    if(y+lineH>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
    doc.text(line,x,y);
    y+=lineH;
  }
  return y;
}

// 表を文字として描画する
// 戻り値: 次のY座標
async function _hybridDrawTable(doc,tableEl,x,y,totalWidthMm,pageH,marginTop,fontSize){
  const rows=Array.from(tableEl.querySelectorAll('tr'));
  if(!rows.length)return y;
  // 列数を確定
  const colCount=Math.max(...rows.map(r=>r.children.length));
  if(!colCount)return y;
  // 各列の最大文字数を計測してプロポーショナルに幅を割り当て
  const colMaxLen=Array(colCount).fill(0);
  for(const row of rows){
    Array.from(row.children).forEach((cell,ci)=>{
      const len=String(cell.textContent||'').length;
      if(len>colMaxLen[ci])colMaxLen[ci]=len;
    });
  }
  const totalLen=colMaxLen.reduce((a,b)=>a+b,0)||1;
  const colWidths=colMaxLen.map(l=>Math.max((l/totalLen)*totalWidthMm,12));
  // 実際の合計が totalWidthMm を超えないよう正規化
  const wSum=colWidths.reduce((a,b)=>a+b,0);
  const scale=totalWidthMm/wSum;
  const normWidths=colWidths.map(w=>w*scale);

  const cellPadX=2;
  const cellPadY=1.5;
  const lineH=fontSize*0.352778*1.5; // pt→mm * 行間
  doc.setFontSize(fontSize);

  for(let ri=0;ri<rows.length;ri++){
    const row=rows[ri];
    const isHeader=row.closest('thead')!==null||ri===0;
    const cells=Array.from(row.children);
    // 各セルの折り返し後行数を計算してこの行の高さを決める
    const cellLines=cells.map((cell,ci)=>{
      const w=normWidths[ci]-(cellPadX*2);
      return doc.splitTextToSize(String(cell.textContent||''),w);
    });
    const maxLines=Math.max(...cellLines.map(l=>l.length),1);
    const rowH=maxLines*lineH+cellPadY*2;
    // ページをまたぐ場合は改ページ
    if(y+rowH>pageH-10){
      doc.addPage();
      doc.setFont(HYBRID_PDF_FONT_NAME,'normal');
      y=marginTop;
    }
    // 背景色
    if(isHeader){
      doc.setFillColor(240,240,240);
      doc.rect(x,y,totalWidthMm,rowH,'F');
    }else if(ri%2===0){
      doc.setFillColor(248,248,248);
      doc.rect(x,y,totalWidthMm,rowH,'F');
    }
    // セルごとに罫線とテキスト
    let cx=x;
    for(let ci=0;ci<colCount;ci++){
      const cw=normWidths[ci];
      doc.setDrawColor(180,180,180);
      doc.rect(cx,y,cw,rowH,'S');
      if(cells[ci]){
        // Use normal font (bold not registered)
        doc.setFont(HYBRID_PDF_FONT_NAME,'normal');
        const lines=cellLines[ci]||[];
        lines.forEach((line,li)=>{
          doc.text(line,cx+cellPadX,y+cellPadY+lineH*(li+0.8));
        });
      }
      cx+=cw;
    }
    y+=rowH;
  }
  return y+3;
}

// Mermaid / img / svg / KaTeX を html2canvas で画像化して貼り付け
async function _hybridAddElementAsImage(doc,el,x,y,maxWMm,pageH,marginTop){
  let capturedCanvas;
  try{
    capturedCanvas=await html2canvas(el,{
      scale:2,useCORS:true,allowTaint:false,
      backgroundColor:'#ffffff',logging:false,
      scrollX:0,scrollY:0
    });
  }catch(e){
    console.warn('[HybridPDF] html2canvas failed:',e);
    return y;
  }
  if(!capturedCanvas.width||!capturedCanvas.height)return y;
  const imgData=capturedCanvas.toDataURL('image/jpeg',0.9);
  const imgWMm=maxWMm;
  const imgHMm=(capturedCanvas.height/capturedCanvas.width)*imgWMm;
  if(y+imgHMm>pageH-10){
    doc.addPage();
    doc.setFont(HYBRID_PDF_FONT_NAME,'normal');
    y=marginTop;
  }
  doc.addImage(imgData,'JPEG',x,y,imgWMm,imgHMm);
  capturedCanvas.width=0;capturedCanvas.height=0;
  return y+imgHMm+4;
}

async function generateHybridPdf(markdownText,options={}){
  const{fileName='export.pdf',onProgress}=options;
  const upd=(step,total,msg,pct)=>{
    if(!onProgress)return;
    onProgress({phase:'setup',step,total,percent:pct??Math.round((step/total)*100),message:msg,pageInfo:null});
  };

  upd(1,8,'ライブラリを読み込み中...');
  await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js','https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js','https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'],'jspdf');
  if(!window.html2canvas)await LazyLoader.loadAny(['https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js','https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js','https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'],'html2canvas');

  upd(2,8,'日本語フォントを読み込み中...');
  const fontBase64=await _hybridLoadFont();

  upd(3,8,'Markdown を変換中...');
  const html=MarkdownService.parse(markdownText);

  upd(4,8,'DOM を準備中...');
  // hidden container に HTML を挿入
  const container=document.createElement('div');
  container.style.cssText='position:fixed;left:-10000px;top:0;width:794px;background:#ffffff;font-family:system-ui,sans-serif;font-size:11pt;line-height:1.7;color:#000';
  container.innerHTML=sanitizeHtml(html);
  document.body.appendChild(container);

  try{
    // Mermaid を SVG に描画
    if(window.mermaid){
      mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose'});
      const blocks=Array.from(container.querySelectorAll('.mermaid'));
      for(let i=0;i<blocks.length;i++){
        const block=blocks[i];
        const src=block.textContent.trim();
        const id='hpdf-mermaid-'+Date.now()+'-'+i;
        try{
          const result=await mermaid.render(id,src);
          block.innerHTML=result.svg||result;
        }catch(e){
          block.textContent='[Mermaid描画エラー: '+e.message+']';
        }
      }
    }
    // KaTeX ブロックを描画（marked が既に変換済みのはずだが念のため）
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

    upd(5,8,'PDF を構築中...');
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4',putOnlyUsedFonts:true,compress:true});
    doc.addFileToVFS(HYBRID_PDF_FONT_FILE,fontBase64);
    doc.addFont(HYBRID_PDF_FONT_FILE,HYBRID_PDF_FONT_NAME,'normal');
    doc.setFont(HYBRID_PDF_FONT_NAME,'normal');

    const pageW=210,pageH=297;
    const marginL=20,marginR=20,marginTop=20;
    const contentW=pageW-marginL-marginR; // 170mm
    let y=marginTop;

    // フォントサイズ→行高さ変換 (pt→mm: 1pt=0.352778mm)
    const ptToMm=pt=>pt*0.352778;
    const lineSpacing=1.35;
    const getLineH=pt=>ptToMm(pt)*lineSpacing;

    // DOM ノードを上から順に処理
    const children=Array.from(container.childNodes);
    const totalNodes=children.length||1;

    // ---- ヘルパー関数: 次の有効ノードを探す ----
    function _hybridFindNextRenderableNode(currentIndex){
      for(let i=currentIndex+1;i<children.length;i++){
        const n=children[i];
        if(n.nodeType!==1)continue;
        const text=(n.textContent||'').trim();
        const tag=n.tagName?.toLowerCase();
        if(text||['img','svg','table','pre','hr'].includes(tag)||n.classList?.contains('mermaid')){
          return n;
        }
      }
      return null;
    }

    // ---- ヘルパー関数: ブロックの推定高さ（mm）を計算 ----
    function _hybridEstimateBlockHeightMm(node){
      if(!node||node.nodeType!==1)return 0;
      const tag=node.tagName.toLowerCase();
      if(/^h[1-6]$/.test(tag)){
        const level=parseInt(tag[1]);
        const sizes=[20,16,13,11,11,11];
        const fs=sizes[level-1]||11;
        doc.setFontSize(fs);
        const lines=doc.splitTextToSize(node.textContent||'',contentW);
        return lines.length*getLineH(fs)+10;
      }
      if(tag==='p'){
        doc.setFontSize(10);
        const lines=doc.splitTextToSize(node.textContent||'',contentW);
        return lines.length*getLineH(10)+4;
      }
      if(tag==='ul'||tag==='ol'){
        doc.setFontSize(10);
        const items=Array.from(node.querySelectorAll(':scope > li'));
        let total=2;
        for(const item of items){
          const lines=doc.splitTextToSize(item.textContent||'',contentW-10);
          total+=Math.max(1,lines.length)*getLineH(10);
        }
        return total+3;
      }
      if(tag==='table'){
        const rows=Array.from(node.querySelectorAll('tr'));
        // 表も見出しと分離すると読みにくいため、最低限まとまった高さを確保する
        return Math.min(Math.max(rows.length*9+8,pageH*0.25),pageH*0.6);
      }
      if(tag==='pre'){
        doc.setFontSize(8.5);
        const lines=doc.splitTextToSize(node.textContent||'',contentW-6);
        return Math.min(lines.length*getLineH(8.5)+10,pageH*0.5);
      }
      if(tag==='img'||tag==='svg'||node.classList.contains('mermaid')||node.classList.contains('katex-block')){
        // 見出し直後の画像・図は、見出しと分離しやすいので大きめに見積もる
        return pageH*0.45;
      }
      doc.setFontSize(10);
      const lines=doc.splitTextToSize(node.textContent||'',contentW);
      return lines.length*getLineH(10)+4;
    }

    for(let ni=0;ni<children.length;ni++){
      const node=children[ni];
      if(node.nodeType!==1)continue; // Element のみ
      const tag=node.tagName.toLowerCase();

      // 進捗更新
      if(onProgress){
        const pct=Math.round(20+((ni/totalNodes)*75));
        onProgress({phase:'pages',step:ni+1,total:totalNodes,percent:pct,
          message:`PDF構築中... ${ni+1}/${totalNodes}`,pageInfo:{current:ni+1,total:totalNodes}});
      }

      // ---- 画像化ブロック ----
      if(node.classList.contains('mermaid')||node.classList.contains('katex-block')||tag==='img'||tag==='svg'){
        y=await _hybridAddElementAsImage(doc,node,marginL,y,contentW,pageH,marginTop);
        continue;
      }

      // ---- 表 ----
      if(tag==='table'){
        y=await _hybridDrawTable(doc,node,marginL,y,contentW,pageH,marginTop,9);
        continue;
      }

      // ---- 水平線 ----
      if(tag==='hr'){
        if(y+4>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
        doc.setDrawColor(180,180,180);
        doc.line(marginL,y+2,marginL+contentW,y+2);
        y+=6;
        continue;
      }

      // ---- 見出し ----
      if(/^h[1-6]$/.test(tag)){
        const level=parseInt(tag[1]);
        const sizes=[20,16,13,11,11,11];
        const fs=sizes[level-1]||11;
        const lh=getLineH(fs);
        
        // 次ブロックを探して、見出し + 次ブロックの最低限が同ページに入るか判定
        const nextNode=_hybridFindNextRenderableNode(ni);
        const nextEstimatedH=_hybridEstimateBlockHeightMm(nextNode);
        // 見出し直後が画像・図・表なら、見出しと分離しやすいので強めに確保
        const nextTag=nextNode?.tagName?.toLowerCase();
        const nextIsVisualBlock=
          nextTag==='img'||
          nextTag==='svg'||
          nextTag==='table'||
          nextTag==='pre'||
          nextNode?.classList?.contains('mermaid')||
          nextNode?.classList?.contains('katex-block');
        const keepWithNextH=nextIsVisualBlock
          ?Math.min(nextEstimatedH,pageH*0.55)
          :Math.min(nextEstimatedH,pageH*0.35);
        const headingGroupH=lh*2+keepWithNextH;
        
        // ページ下部に見出しだけ残る場合は、見出し前で改ページ
        if(y+headingGroupH>pageH-10){
          doc.addPage();
          doc.setFont(HYBRID_PDF_FONT_NAME,'normal');
          y=marginTop;
        }
        
        // 見出し前の余白
        y+=level<=2?6:3;
        doc.setFontSize(fs);
        const text=node.textContent||'';
        const lines=doc.splitTextToSize(text,contentW);
        for(const line of lines){
          if(y+lh>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
          doc.text(line,marginL,y);
          y+=lh;
        }
        // h1/h2 の下線
        if(level<=2){
          doc.setDrawColor(level===1?100:180,level===1?100:180,level===1?100:180);
          doc.setLineWidth(level===1?0.5:0.3);
          doc.line(marginL,y+1,marginL+contentW,y+1);
          doc.setLineWidth(0.2);
          y+=3;
        }
        y+=level<=2?4:2;
        doc.setFontSize(10);
        continue;
      }

      // ---- コードブロック ----
      if(tag==='pre'){
        const code=node.textContent||'';
        const fs=8.5;
        const lh=ptToMm(fs)*1.25;
        doc.setFontSize(fs);
        const lines=doc.splitTextToSize(code,contentW-6);
        const blockH=lines.length*lh+6;
        if(y+Math.min(blockH,pageH*0.4)>pageH-10){
          doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop;
        }
        // 背景
        doc.setFillColor(245,245,245);
        doc.setDrawColor(200,200,200);
        // 複数ページにまたがる場合は分割描画
        let remaining=[...lines];
        while(remaining.length){
          const fitLines=[];
          let testY=y+3;
          for(const l of remaining){
            if(testY+lh>pageH-10)break;
            fitLines.push(l);
            testY+=lh;
          }
          if(!fitLines.length){fitLines.push(remaining[0])} // 最低1行
          const bh=fitLines.length*lh+6;
          doc.setFillColor(245,245,245);
          doc.setDrawColor(200,200,200);
          doc.rect(marginL,y,contentW,bh,'FD');
          fitLines.forEach((l,i)=>doc.text(l,marginL+3,y+3+lh*(i+0.8)));
          y+=bh+3;
          remaining=remaining.slice(fitLines.length);
          if(remaining.length){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
        }
        doc.setFontSize(10);
        continue;
      }

      // ---- 引用 ----
      if(tag==='blockquote'){
        const fs=10;
        const lh=getLineH(fs);
        doc.setFontSize(fs);
        const text=node.textContent||'';
        const lines=doc.splitTextToSize(text,contentW-8);
        const bh=lines.length*lh+4;
        if(y+Math.min(bh,40)>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
        doc.setFillColor(249,249,249);
        doc.setDrawColor(180,180,180);
        doc.rect(marginL,y,contentW,bh,'FD');
        doc.setDrawColor(150,150,150);
        doc.setLineWidth(0.8);
        doc.line(marginL+0.4,y,marginL+0.4,y+bh);
        doc.setLineWidth(0.2);
        lines.forEach((l,i)=>doc.text(l,marginL+5,y+2+lh*(i+0.8)));
        y+=bh+3;
        doc.setFontSize(10);
        continue;
      }

      // ---- リスト ----
      if(tag==='ul'||tag==='ol'){
        const fs=10;
        const lh=getLineH(fs);
        doc.setFontSize(fs);
        const items=Array.from(node.querySelectorAll(':scope > li'));
        for(let ii=0;ii<items.length;ii++){
          const item=items[ii];
          const bullet=tag==='ol'?(ii+1)+'.':'•';
          // li 直下のテキストのみ（ネストは別途）
          const directText=Array.from(item.childNodes)
            .filter(n=>n.nodeType===3||(n.nodeType===1&&!['ul','ol'].includes(n.tagName?.toLowerCase())))
            .map(n=>n.textContent||'').join('').trim();
          const lines=doc.splitTextToSize(directText,contentW-10);
          for(let li=0;li<lines.length;li++){
            if(y+lh>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
            if(li===0)doc.text(bullet,marginL+2,y);
            doc.text(lines[li],marginL+8,y);
            y+=lh;
          }
          // ネストされたリスト
          const nested=Array.from(item.querySelectorAll(':scope > ul, :scope > ol'));
          for(const sub of nested){
            const subItems=Array.from(sub.querySelectorAll(':scope > li'));
            for(let si=0;si<subItems.length;si++){
              const stext=subItems[si].textContent?.trim()||'';
              const sbullet=sub.tagName.toLowerCase()==='ol'?(si+1)+'.':'–';
              const slines=doc.splitTextToSize(stext,contentW-18);
              for(let sl=0;sl<slines.length;sl++){
                if(y+lh>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
                if(sl===0)doc.text(sbullet,marginL+10,y);
                doc.text(slines[sl],marginL+16,y);
                y+=lh;
              }
            }
          }
        }
        y+=2;
        continue;
      }

      // ---- 段落（デフォルト） ----
      {
        const fs=10;
        const lh=getLineH(fs);
        doc.setFontSize(fs);
        // 画像が含まれる場合は画像化
        const imgs=node.querySelectorAll('img,svg,.mermaid,.katex-block');
        if(imgs.length){
          y=await _hybridAddElementAsImage(doc,node,marginL,y,contentW,pageH,marginTop);
          continue;
        }
        const text=(node.textContent||'').trim();
        if(!text){y+=2;continue}
        const lines=doc.splitTextToSize(text,contentW);
        for(const line of lines){
          if(y+lh>pageH-10){doc.addPage();doc.setFont(HYBRID_PDF_FONT_NAME,'normal');y=marginTop}
          doc.text(line,marginL,y);
          y+=lh;
        }
        y+=2;
      }
    }

    upd(8,8,'PDF を保存中...',98);
    const blob=doc.output('blob');
    return blob;
  }finally{
    if(container.parentNode)container.parentNode.removeChild(container);
  }
}
