// Plugin: core-callout (:::note / :::warning / :::idea を追加)
const CoreCalloutPlugin=createPlugin({
  id:'core-callout',
  name:'Callout記法',
  version:'1.0.0',
  description:':::note / :::warning / :::idea をHTML化します',
  capabilities:['markdown.pipeline','toolbar.item'],
  contributes:{
    pipelines:{
      'markdown.preprocess':[
        {
          id:'callout-placeholder',
          order:10,
          run(text,ctx){
            // Replace callout blocks with placeholders
            // Create new cache for this pipeline execution
            const cache={};
            const result=text.replace(
              /^:::(note|warning|idea)\n([\s\S]*?)\n:::/gm,
              (m,type,body)=>{
                const id='CALLOUT_'+Math.random().toString(36).substr(2,9);
                cache[id]={type,body};
                return `@@${id}@@`;
              }
            );
            // Store cache in ctx.pipelineState for postprocess to use
            ctx.pipelineState=ctx.pipelineState||{};
            ctx.pipelineState.callouts=cache;
            return result;
          }
        }
      ],
      'markdown.postprocess':[
        {
          id:'callout-render',
          order:90,
          run(html,ctx){
            const cache=ctx?.pipelineState?.callouts||{};
            // First, handle <p>@@CALLOUT_...@@</p> pattern
            let result=html.replace(
              /<p>@@(CALLOUT_[\w]+)@@<\/p>/g,
              (m,id)=>{
                const{type,body}=cache[id]||{};
                if(!type)return m;
                const colors={note:'#2196F3',warning:'#FF9800',idea:'#4CAF50'};
                const icons={note:'ℹ️',warning:'⚠️',idea:'💡'};
                const bgColor=type==='note'?'33,150,243':type==='warning'?'255,152,0':'76,175,80';
                return `<div style="border-left:4px solid ${colors[type]};background:rgba(${bgColor},0.1);padding:12px 16px;margin:12px 0;border-radius:4px;"><strong>${icons[type]} ${type.toUpperCase()}</strong><div style="margin-top:8px;">${sanitizeHtml(body)}</div></div>`;
              }
            );
            // Then, handle standalone @@CALLOUT_...@@ pattern
            result=result.replace(
              /@@(CALLOUT_[\w]+)@@/g,
              (m,id)=>{
                const{type,body}=cache[id]||{};
                if(!type)return m;
                const colors={note:'#2196F3',warning:'#FF9800',idea:'#4CAF50'};
                const icons={note:'ℹ️',warning:'⚠️',idea:'💡'};
                const bgColor=type==='note'?'33,150,243':type==='warning'?'255,152,0':'76,175,80';
                return `<div style="border-left:4px solid ${colors[type]};background:rgba(${bgColor},0.1);padding:12px 16px;margin:12px 0;border-radius:4px;"><strong>${icons[type]} ${type.toUpperCase()}</strong><div style="margin-top:8px;">${sanitizeHtml(body)}</div></div>`;
              }
            );
            return result;
          }
        }
      ]
    }
  },
  setup(api){
    api.registerToolbarItem({
      label:'💡',
      title:'Calloutを挿入',
      icon:'💡',
      onClick({insert}){
        insert(':::idea\n','\n:::\n','アイデア');
      }
    });
  }
});

// Panel V2: OpenEditorsPanelV2 - 開いているエディタ
// 機能: 複数選択・選択Export・ブラウザ保存・Workspace所属表示・未保存確認close
const OpenEditorsPanelV2=React.memo(function OpenEditorsPanelV2(){
  const c=useThemeColors();
  const{tabs,activeTabId,setActiveTabId,closeTab,updateTab}=React.useContext(EditorContext);
  const{showMessage,showConfirm,setProgressModal}=React.useContext(UIContext);
  const{active:profile}=React.useContext(ProfileContext);
  const profileId=profile?.id||'default';
  const[checkedTabs,setCheckedTabs]=React.useState(new Set());
  const[workspaces,setWorkspaces]=React.useState(()=>AppCore.repositories.workspace.list(profileId));
  
  // Sync workspaces (for showing WS ownership icon)
  React.useEffect(()=>{
    const stored=AppCore.repositories.workspace.list(profileId);
    if(JSON.stringify(stored)!==JSON.stringify(workspaces))setWorkspaces(stored);
  },[tabs,profileId]);
  
  const toggleCheck=(id)=>setCheckedTabs(prev=>{const n=new Set(prev);if(n.has(id))n.delete(id);else n.add(id);return n});
  const toggleAll=()=>{if(checkedTabs.size===tabs.length)setCheckedTabs(new Set());else setCheckedTabs(new Set(tabs.map(t=>t.id)))};
  
  const handleExportSelected=React.useCallback(async(format)=>{
    const selected=tabs.filter(t=>checkedTabs.has(t.id));
    if(selected.length===0){showMessage('タブを選択してください','warn');return}
    const actionMap={md:'export.markdown',html:'export.html',pdf:'export.pdf',word:'export.word',excel:'export.excel',zip:'export.zip'};
    try{
      await runExportWithProgress(actionMap[format],format,{tabs:selected,checkedTabs,profile,showMessage},setProgressModal);
      setCheckedTabs(new Set());
    }catch(e){showMessage(format.toUpperCase()+'出力に失敗: '+e.message,'error')}
  },[tabs,checkedTabs,showMessage,profile,setProgressModal]);
  
  const handleSaveToIDB=React.useCallback(async(tab)=>{
    try{
      await AppCore.adapters.idb.saveFile({id:tab.id,name:tab.fileName,text:tab.text,size:tab.text.length,createdAt:Date.now(),updatedAt:Date.now(),profileId:profile?.id||'default'});
      updateTab(tab.id,{isDirty:false});
      PluginKernel.emit('saved-files:changed',{source:'open-editors-v2',fileName:tab.fileName});
      showMessage(`"${tab.fileName}" を保存しました`);
    }catch{showMessage('保存に失敗しました','error')}
  },[showMessage,updateTab,profile?.id]);
  
  const itemStyle={display:'flex',alignItems:'center',gap:6,padding:'4px 12px 4px 20px',fontSize:13,cursor:'pointer',color:c.editorText,whiteSpace:'nowrap',overflow:'hidden'};
  const smallBtn={background:'none',border:'none',cursor:'pointer',fontSize:11,padding:'0 4px',opacity:0.5,color:c.editorText};
  
  return(
    <div>
      {/* Select all / export bar */}
      <div style={{display:'flex',alignItems:'center',gap:4,padding:'2px 12px 2px 20px',fontSize:11,color:c.statusText,borderBottom:`1px solid ${c.border}`}}>
        <input type="checkbox" checked={checkedTabs.size===tabs.length&&tabs.length>0} onChange={toggleAll} title="全選択/全解除" style={{margin:0}}/>
        <span style={{flex:1}}>全選択 {checkedTabs.size>0&&`(${checkedTabs.size})`}</span>
        {checkedTabs.size>0&&<>
          <button onClick={()=>handleExportSelected('md')} style={{...smallBtn,opacity:1,fontSize:10,color:c.primary}} title="MD出力">MD</button>
          <button onClick={()=>handleExportSelected('html')} style={{...smallBtn,opacity:1,fontSize:10,color:c.primary}} title="HTML出力">HTML</button>
          <button onClick={()=>handleExportSelected('pdf')} style={{...smallBtn,opacity:1,fontSize:10,color:c.primary}} title="PDF出力">PDF</button>
          <button onClick={()=>handleExportSelected('word')} style={{...smallBtn,opacity:1,fontSize:10,color:c.primary}} title="Word出力">Word</button>
          <button onClick={()=>handleExportSelected('excel')} style={{...smallBtn,opacity:1,fontSize:10,color:c.primary}} title="Excel出力">Excel</button>
          <button onClick={()=>handleExportSelected('zip')} style={{...smallBtn,opacity:1,fontSize:10,color:c.primary}} title="ZIP出力">ZIP</button>
        </>}
      </div>
      {tabs.length===0&&<div style={{padding:'8px 20px',fontSize:12,color:c.statusText}}>タブがありません</div>}
      {tabs.map(tab=>{
        const wsOwner=workspaces.find(ws=>(ws.tabs||[]).some(wt=>wt.id===tab.id));
        return(
          <div key={tab.id} draggable style={{...itemStyle,background:tab.id===activeTabId?c.hoverBg:'transparent',fontWeight:tab.id===activeTabId?600:400,cursor:'grab'}}
            onClick={()=>setActiveTabId(tab.id)}
            onDragStart={e=>{e.dataTransfer.setData('text/plain',tab.id);e.dataTransfer.effectAllowed='copy'}}
            onMouseEnter={e=>{if(tab.id!==activeTabId)e.currentTarget.style.background=c.hoverBg}}
            onMouseLeave={e=>{if(tab.id!==activeTabId)e.currentTarget.style.background='transparent'}}>
            <input type="checkbox" checked={checkedTabs.has(tab.id)} onChange={e=>{e.stopPropagation();toggleCheck(tab.id)}} onClick={e=>e.stopPropagation()} style={{margin:0,flexShrink:0}}/>
            <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis'}}>
              {tab.isDirty?'● ':''}{tab.fileName}
              {wsOwner&&<span style={{fontSize:9,color:c.primary,marginLeft:4}} title={`WS: ${wsOwner.name}`}>📂</span>}
            </span>
            <button style={smallBtn} onClick={e=>{e.stopPropagation();handleSaveToIDB(tab)}} title="ブラウザに保存">💾</button>
            <button style={smallBtn} onClick={e=>{e.stopPropagation();if(tab.isDirty){showConfirm(`"${tab.fileName}" は未保存です。閉じますか？`,()=>closeTab(tab.id),{title:'未保存の変更',okLabel:'閉じる',danger:true});return}closeTab(tab.id)}} title={wsOwner?'閉じる（WSに保持）':'閉じる'}>✕</button>
          </div>
        );
      })}
    </div>
  );
});

// Panel V2: WorkspacesPanelV2 - ワークスペース管理（全機能版）
const WorkspacesPanelV2=React.memo(function WorkspacesPanelV2(){
  const c=useThemeColors();
  const{tabs,openFile,replaceTabs}=React.useContext(EditorContext);
  const{showMessage,showConfirm,setProgressModal}=React.useContext(UIContext);
  const{active:profile}=React.useContext(ProfileContext);
  const profileId=profile?.id||'default';
  const[workspaces,setWorkspaces]=React.useState(()=>AppCore.repositories.workspace.list(profileId));
  const[activeWsId,setActiveWsId]=React.useState(()=>AppCore.repositories.workspace.getActiveId(profileId));
  
  React.useEffect(()=>{
    const stored=AppCore.repositories.workspace.list(profileId);
    if(JSON.stringify(stored)!==JSON.stringify(workspaces))setWorkspaces(stored);
  },[tabs,profileId]);
  
  const setWs=React.useCallback((updater)=>{
    setWorkspaces(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      AppCore.repositories.workspace.saveAll(next,profileId);
      return next;
    });
  },[profileId]);
  
  React.useEffect(()=>{AppCore.repositories.workspace.setActiveId(activeWsId,profileId)},[activeWsId,profileId]);
  
  // Profile切替時に workspaces と activeWsId を再読込（バグ修正）
  React.useEffect(()=>{
    const stored=AppCore.repositories.workspace.list(profileId);
    const storedActiveId=AppCore.repositories.workspace.getActiveId(profileId);
    setWorkspaces(stored);
    setActiveWsId(storedActiveId);
  },[profileId]);
  
  // Auto-save active workspace
  React.useEffect(()=>{
    if(!activeWsId)return;
    const timer=setTimeout(()=>{
      setWs(prev=>prev.map(ws=>{
        if(ws.id!==activeWsId)return ws;
        const updatedTabs=(ws.tabs||[]).map(wt=>{
          const openTab=tabs.find(t=>t.id===wt.id);
          return openTab?{...wt,text:openTab.text,id:openTab.id}:wt;
        });
        return{...ws,tabs:updatedTabs,updatedAt:Date.now()};
      }));
    },2000);
    return()=>clearTimeout(timer);
  },[tabs,activeWsId]);
  
  const createWorkspace=React.useCallback((name)=>{
    const wsName=name||`WS ${new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}`;
    const ws=WorkspaceDomain.create(wsName,tabs.map(t=>({id:t.id,fileName:t.fileName,text:t.text})));
    setWs(prev=>[...prev,ws]);setActiveWsId(ws.id);
    showMessage(`📁 ワークスペース "${ws.name}" を作成しました`);
  },[tabs,showMessage]);
  
  const switchWorkspace=React.useCallback((wsId)=>{
    if(wsId===activeWsId)return;
    if(activeWsId){
      setWs(prev=>prev.map(ws=>{
        if(ws.id!==activeWsId)return ws;
        const updatedTabs=(ws.tabs||[]).map(wt=>{
          const ot=tabs.find(t=>t.id===wt.id);
          return ot?{...wt,text:ot.text,id:ot.id}:wt;
        });
        return WorkspaceDomain.updateOpenTabs(ws,updatedTabs);
      }));
    }
    const target=workspaces.find(ws=>ws.id===wsId);
    if(!target)return;
    showConfirm(`ワークスペース "${target.name}" に切り替えますか？\n現在のタブは自動保存されます。`,()=>{
      replaceTabs(target.tabs||[]);
      setActiveWsId(wsId);
      showMessage(`"${target.name}" に切り替えました`);
    },{title:'ワークスペース切替',okLabel:'切替'});
  },[activeWsId,tabs,workspaces,replaceTabs,showMessage,showConfirm]);
  
  const renameWorkspace=React.useCallback((wsId,newName)=>{
    if(!newName.trim())return;
    setWs(prev=>prev.map(ws=>ws.id===wsId?{...ws,name:newName.trim(),updatedAt:Date.now()}:ws));
  },[]);
  
  const deleteWorkspace=React.useCallback((wsId,name)=>{
    showConfirm(`ワークスペース "${name}" を削除しますか？`,()=>{
      setWs(prev=>prev.filter(ws=>ws.id!==wsId));
      if(activeWsId===wsId)setActiveWsId(null);
      showMessage('削除しました');
    },{title:'ワークスペース削除',okLabel:'削除',danger:true});
  },[activeWsId,showMessage,showConfirm]);
  
  const detachFromWorkspace=React.useCallback(()=>{
    if(activeWsId){
      setWs(prev=>prev.map(ws=>{
        if(ws.id!==activeWsId)return ws;
        const updatedTabs=(ws.tabs||[]).map(wt=>{const ot=tabs.find(t=>t.id===wt.id);return ot?{...wt,text:ot.text}:wt});
        return WorkspaceDomain.updateOpenTabs(ws,updatedTabs);
      }));
    }
    setActiveWsId(null);
    showMessage('ワークスペースから切り離しました');
  },[activeWsId,tabs,showMessage]);
  
  const snapshotWorkspace=React.useCallback((wsId)=>{
    const ws=workspaces.find(w=>w.id===wsId);
    if(!ws)return;
    const snapshotName=`${ws.name} (${new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})})`;
    const snapshot=WorkspaceDomain.create(snapshotName,ws.tabs||[],true);
    snapshot.isSnapshot=true;
    snapshot.parentId=wsId;
    setWs(prev=>[...prev,snapshot]);
    showMessage(`📸 スナップショット "${snapshot.name}" を作成しました`);
  },[workspaces,showMessage]);
  
  const addTabToWorkspace=React.useCallback((tabId,wsId)=>{
    const tab=tabs.find(t=>t.id===tabId);
    if(!tab)return;
    let added=false;
    setWs(prev=>prev.map(ws=>{
      if(ws.id!==wsId)return ws;
      const exists=ws.tabs?.some(t=>t.id===tab.id);
      if(exists)return ws;
      added=true;
      return WorkspaceDomain.addTab(ws,{id:tab.id,fileName:tab.fileName,text:tab.text});
    }));
    if(added)showMessage(`"${tab.fileName}" → ワークスペースに追加`);
    else showMessage(`"${tab.fileName}" は既にこのワークスペースに含まれています`,'warn');
  },[tabs,showMessage]);
  
  const removeTabFromWorkspace=React.useCallback((wsId,tabIndex)=>{
    const ws=workspaces.find(w=>w.id===wsId);
    const tab=ws?.tabs?.[tabIndex];
    const tabName=tab?.fileName||'タブ';
    const isOpen=tabs.some(t=>t.id===tab?.id);
    showConfirm(`"${tabName}" をワークスペースから除外しますか？\n${isOpen?'開いているタブはそのまま残ります。':'ゴミ箱に移動されます。'}`,()=>{
      if(!isOpen&&tab&&tab.text&&tab.text.trim()){
        AppCore.adapters.idb.moveToTrash({id:tab.id,fileName:tab.fileName,text:tab.text,size:new TextEncoder().encode(tab.text).length,profileId:profile?.id||'default'}).then(()=>{
          PluginKernel.emit('trash:changed',{source:'workspace-panel-v2',fileName:tab.fileName});
        }).catch(()=>{});
      }
      setWs(prev=>prev.map(w=>{
        if(w.id!==wsId)return w;
        const newTabs=[...(w.tabs||[])];
        newTabs.splice(tabIndex,1);
        return{...w,tabs:newTabs,updatedAt:Date.now()};
      }));
      showMessage(isOpen?'ワークスペースから除外しました':'ゴミ箱に移動しました');
    },{title:'ワークスペースから除外',okLabel:'除外',danger:true});
  },[workspaces,tabs,showMessage,showConfirm,setWs]);
  
  const reorderTabInWorkspace=React.useCallback((wsId,fromIdx,toIdx)=>{
    setWs(prev=>prev.map(ws=>{
      if(ws.id!==wsId)return ws;
      const newTabs=[...(ws.tabs||[])];
      const[item]=newTabs.splice(fromIdx,1);
      newTabs.splice(toIdx,0,item);
      // Directly update tabs with new order, don't use updateOpenTabs which may revert order
      return{...ws,tabs:newTabs,updatedAt:Date.now()};
    }));
  },[setWs]);
  
  const reorderWorkspace=React.useCallback((fromId,toId)=>{
    setWs(prev=>{
      const from=prev.findIndex(w=>w.id===fromId);
      const to=prev.findIndex(w=>w.id===toId);
      if(from<0||to<0||from===to)return prev;
      const next=[...prev];const[item]=next.splice(from,1);next.splice(to,0,item);return next;
    });
  },[]);
  
  const itemStyle={display:'flex',alignItems:'center',gap:6,padding:'4px 12px 4px 20px',fontSize:13,cursor:'pointer',color:c.editorText,whiteSpace:'nowrap',overflow:'hidden'};
  const smallBtn={background:'none',border:'none',cursor:'pointer',fontSize:11,padding:'0 4px',opacity:0.5,color:c.editorText};
  
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',padding:'4px 12px',fontSize:11,color:c.statusText,borderBottom:`1px solid ${c.border}`}}>
        <span style={{flex:1}}>{workspaces.length} 個のWS</span>
        <button onClick={()=>showConfirm('ワークスペース名を入力してください',(name)=>{createWorkspace(name||undefined)},{title:'新規ワークスペース',okLabel:'作成',input:true,placeholder:'ワークスペース名',defaultValue:`WS ${new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}`})} style={{...smallBtn,fontSize:14,opacity:1}} title="現在のタブをワークスペースとして保存">＋</button>
      </div>
      {activeWsId&&<div style={{padding:'4px 20px',fontSize:11,color:c.primary,display:'flex',alignItems:'center',gap:4}}>
        <span>📂</span><span>アクティブ: {workspaces.find(w=>w.id===activeWsId)?.name||'—'}</span>
        <button onClick={detachFromWorkspace} style={{...smallBtn,fontSize:10,color:c.statusText}} title="切り離す">✕</button>
      </div>}
      {workspaces.length===0&&<div style={{padding:'8px 20px',fontSize:12,color:c.statusText}}>ワークスペースなし</div>}
      {workspaces.map(ws=>(
        <WorkspaceItem key={ws.id} ws={ws} isActive={ws.id===activeWsId} c={c} itemStyle={itemStyle} smallBtn={smallBtn}
          onSwitch={()=>switchWorkspace(ws.id)} onDelete={()=>deleteWorkspace(ws.id,ws.name)}
          onRename={(name)=>renameWorkspace(ws.id,name)} onSnapshot={()=>snapshotWorkspace(ws.id)}
          onDropTab={(tabId)=>addTabToWorkspace(tabId,ws.id)}
          onRemoveTab={(idx)=>removeTabFromWorkspace(ws.id,idx)}
          onReorderTab={(from,to)=>reorderTabInWorkspace(ws.id,from,to)}
          onOpenTab={(tab)=>openFile(tab.fileName,tab.text,tab.id)}
          onReorderWorkspace={(fromId)=>reorderWorkspace(fromId,ws.id)}
          allWorkspaceIds={workspaces.map(w=>w.id)}
          onExportAll={async(targetWs,format)=>{
            const wsTabs=targetWs.tabs||[];
            if(wsTabs.length===0){showMessage('タブがありません','warn');return}
            const fmt=format||'zip';
            const actionMap={md:'export.markdown',html:'export.html',pdf:'export.pdf',word:'export.word',excel:'export.excel',zip:'export.zip'};
            try{
              await runExportWithProgress(actionMap[fmt],fmt,{workspaceTabs:wsTabs,workspaceName:targetWs.name,profile,showMessage},setProgressModal);
              showMessage(`${wsTabs.length}件のタブを${fmt.toUpperCase()}出力しました`);
            }catch(e){showMessage(`${fmt.toUpperCase()}出力に失敗: `+e.message,'error')}
          }}/>
      ))}
    </div>
  );
});

// Panel V2: SavedFilesPanelV2 - 保存済みファイル管理
const SavedFilesPanelV2=React.memo(function SavedFilesPanelV2(){
  const c=useThemeColors();
  const{openFile}=React.useContext(EditorContext);
  const{showMessage,showConfirm}=React.useContext(UIContext);
  const{active:profile}=React.useContext(ProfileContext);
  const[savedFiles,setSavedFiles]=React.useState([]);
  const[refreshKey,setRefreshKey]=React.useState(0);
  
  React.useEffect(()=>{
    const off=PluginKernel.on('saved-files:changed',()=>setRefreshKey(k=>k+1),'saved-files-panel');
    return off;
  },[]);
  
  React.useEffect(()=>{
    const timer=setTimeout(()=>{
      AppCore.adapters.idb.listFiles(profile?.id||'default').then(files=>{setSavedFiles(files.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)))}).catch(()=>{});
    },50);
    return()=>clearTimeout(timer);
  },[refreshKey,profile?.id]);
  
  const handleOpen=React.useCallback(async(file)=>{
    try{const f=await AppCore.adapters.idb.getFile(file.id);if(f)openFile(f.name,f.text,f.id)}catch{showMessage('読み込みに失敗しました','error')}
  },[openFile,showMessage]);
  
  const handleDelete=React.useCallback(async(id,name)=>{
    showConfirm(`"${name}" を削除しますか？`,async()=>{
      try{await AppCore.adapters.idb.deleteFile(id);PluginKernel.emit('saved-files:changed',{source:'saved-files-panel-v2',fileName:name});setRefreshKey(k=>k+1);showMessage('削除しました')}catch{showMessage('削除に失敗しました','error')}
    },{title:'ファイル削除',okLabel:'削除',danger:true});
  },[showMessage,showConfirm]);
  
  const itemStyle={display:'flex',alignItems:'center',gap:6,padding:'4px 12px 4px 20px',fontSize:13,cursor:'pointer',color:c.editorText,whiteSpace:'nowrap',overflow:'hidden'};
  const smallBtn={background:'none',border:'none',cursor:'pointer',fontSize:11,padding:'0 4px',opacity:0.5,color:c.editorText};
  
  return(
    <div>
      {savedFiles.length===0&&<div style={{padding:'8px 20px',fontSize:12,color:c.statusText}}>ファイルなし</div>}
      {savedFiles.map(file=>(
        <div key={file.id} style={itemStyle} onClick={()=>handleOpen(file)}
          onMouseEnter={e=>e.currentTarget.style.background=c.hoverBg}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span>📄</span>
          <div style={{flex:1,overflow:'hidden'}}>
            <div style={{overflow:'hidden',textOverflow:'ellipsis'}}>{file.name}</div>
            <div style={{fontSize:10,color:c.statusText}}>{file.size?Math.round(file.size/1024)+'KB':''} {file.updatedAt?new Date(file.updatedAt).toLocaleDateString():''}</div>
          </div>
          <button style={{...smallBtn,color:c.danger}} onClick={e=>{e.stopPropagation();handleDelete(file.id,file.name)}} title="削除">🗑</button>
        </div>
      ))}
    </div>
  );
});

// Panel V2: TrashPanelV2 - ゴミ箱管理（復元・完全削除・空にする・残日数表示）
const TrashPanelV2=React.memo(function TrashPanelV2(){
  const c=useThemeColors();
  const{openFile}=React.useContext(EditorContext);
  const{showMessage,showConfirm}=React.useContext(UIContext);
  const{active:profile}=React.useContext(ProfileContext);
  const[trashItems,setTrashItems]=React.useState([]);
  const[refreshKey,setRefreshKey]=React.useState(0);
  
  React.useEffect(()=>{
    const off=PluginKernel.on('trash:changed',()=>setRefreshKey(k=>k+1),'trash-panel');
    return off;
  },[]);
  
  React.useEffect(()=>{
    AppCore.adapters.idb.listTrash(profile?.id||'default').then(items=>setTrashItems(items)).catch(()=>{});
    // Purge expired
    const days=profile?.settings?.trashRetentionDays||30;
    AppCore.adapters.idb.purgeExpiredTrash(days,profile?.id||'default').then(count=>{
      if(count>0)AppCore.adapters.idb.listTrash(profile?.id||'default').then(items=>setTrashItems(items)).catch(()=>{});
    }).catch(()=>{});
  },[refreshKey,profile]);
  
  const handleRestore=React.useCallback(async(item)=>{
    try{
      const restored=await AppCore.adapters.idb.restoreFromTrash(item.id);
      openFile(restored.fileName,restored.text,restored.id);
      setRefreshKey(k=>k+1);
      // Emit event for other UI components (StorageManagerDialog, etc.)
      PluginKernel.emit('trash:changed',{source:'trash-panel-v2',action:'restore',fileName:restored.fileName,docId:restored.id});
      showMessage(`"${restored.fileName}" を復元しました`);
    }catch{
      showMessage('復元に失敗しました','error');
    }
  },[openFile,showMessage]);
  
  const handleDelete=React.useCallback(async(id,name)=>{
    showConfirm(`"${name}" を完全に削除しますか？\nこの操作は取り消せません。`,async()=>{
      try{
        await AppCore.adapters.idb.deleteFromTrash(id);
        setRefreshKey(k=>k+1);
        // Emit event for other UI components
        PluginKernel.emit('trash:changed',{source:'trash-panel-v2',action:'delete',fileName:name});
        showMessage('完全に削除しました');
      }catch{
        showMessage('削除に失敗しました','error');
      }
    },{title:'完全削除',okLabel:'削除',danger:true});
  },[showMessage,showConfirm]);
  
  const handleEmpty=React.useCallback(()=>{
    if(trashItems.length===0)return;
    showConfirm(`ゴミ箱を空にしますか？\n${trashItems.length}件のアイテムが完全に削除されます。`,async()=>{
      try{
        for(const item of trashItems)await AppCore.adapters.idb.deleteFromTrash(item.id);
        setRefreshKey(k=>k+1);
        // Emit event for other UI components
        PluginKernel.emit('trash:changed',{source:'trash-panel-v2',action:'empty',count:trashItems.length});
        showMessage('ゴミ箱を空にしました');
      }catch{
        showMessage('削除に失敗しました','error');
      }
    },{title:'ゴミ箱を空にする',okLabel:'空にする',danger:true});
  },[trashItems,showMessage,showConfirm]);
  
  const itemStyle={display:'flex',alignItems:'center',gap:6,padding:'4px 12px 4px 20px',fontSize:13,cursor:'pointer',color:c.editorText,whiteSpace:'nowrap',overflow:'hidden'};
  const smallBtn={background:'none',border:'none',cursor:'pointer',fontSize:11,padding:'0 4px',opacity:0.5,color:c.editorText};
  
  return(
    <div>
      {trashItems.length>0&&<div style={{display:'flex',alignItems:'center',padding:'4px 12px',fontSize:11,color:c.statusText,borderBottom:`1px solid ${c.border}`}}>
        <span style={{flex:1}}>{trashItems.length} 件</span>
        <button onClick={handleEmpty} style={{...smallBtn,fontSize:10,color:c.danger,opacity:1}} title="ゴミ箱を空にする">空にする</button>
      </div>}
      {trashItems.length===0&&<div style={{padding:'8px 20px',fontSize:12,color:c.statusText}}>ゴミ箱は空です</div>}
      {trashItems.map(item=>{
        const daysAgo=Math.floor((Date.now()-item.deletedAt)/(24*60*60*1000));
        const retDays=profile?.settings?.trashRetentionDays||30;
        const remaining=retDays-daysAgo;
        return(
          <div key={item.id} style={itemStyle}
            onMouseEnter={e=>e.currentTarget.style.background=c.hoverBg}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <span style={{opacity:0.5}}>📄</span>
            <div style={{flex:1,overflow:'hidden'}}>
              <div style={{overflow:'hidden',textOverflow:'ellipsis',opacity:0.7}}>{item.fileName}</div>
              <div style={{fontSize:10,color:remaining<=3?c.danger:c.statusText}}>{daysAgo===0?'今日':daysAgo+'日前'} · 残{remaining}日</div>
            </div>
            <button style={{...smallBtn,color:c.primary}} onClick={e=>{e.stopPropagation();handleRestore(item)}} title="復元">↩</button>
            <button style={{...smallBtn,color:c.danger}} onClick={e=>{e.stopPropagation();handleDelete(item.id,item.fileName)}} title="完全削除">✕</button>
          </div>
        );
      })}
    </div>
  );
});

// App Root

function App(){
  const c=useThemeColors();
  const{showSidebar}=React.useContext(UIContext);
  const{activeTab,updateText,insertText}=React.useContext(EditorContext);
  const{active:profile}=React.useContext(ProfileContext);
  const{showMessage}=React.useContext(UIContext);
  
  // ============================================================
  // LLM Bridge: LLMパネル ↔ 本体 イベント接続
  // ============================================================
  React.useEffect(()=>{
    const handleLLMAction=(e)=>{
      const{action,content,targetRange,metadata}=e.detail||{};
      if(!action||!content)return;
      
      try{
        switch(action){
          case'insert':
            // カーソル位置にテキスト挿入
            if(activeTab){
              const pos=targetRange?.start||activeTab.text.length;
              const before=activeTab.text.slice(0,pos);
              const after=activeTab.text.slice(pos);
              updateText(before+content+after);
              showMessage('LLMテキストを挿入しました','success');
            }
            break;
          case'replace':
            // 選択範囲を置換
            if(activeTab&&targetRange){
              const before=activeTab.text.slice(0,targetRange.start);
              const after=activeTab.text.slice(targetRange.end);
              updateText(before+content+after);
              showMessage('LLMテキストで置換しました','success');
            }
            break;
          case'append':
            // 末尾に追記
            if(activeTab){
              const newText=activeTab.text+(activeTab.text.endsWith('\n')?'':'\n')+content;
              updateText(newText);
              showMessage('LLMテキストを追記しました','success');
            }
            break;
          case'summarize':
            // 要約を挿入
            if(activeTab){
              const summary='\n\n## 要約\n'+content;
              updateText(activeTab.text+summary);
              showMessage('要約を追記しました','success');
            }
            break;
          default:
            console.warn('Unknown LLM action:',action);
        }
      }catch(err){
        console.error('LLM Bridge error:',err);
        showMessage('LLM操作エラー: '+err.message,'error');
      }
    };
    
    window.addEventListener('qcd:llm-action',handleLLMAction);
    return()=>window.removeEventListener('qcd:llm-action',handleLLMAction);
  },[activeTab,updateText,showMessage]);
  
  // Minimal ctx: only properties actually used by panels
  // - activeTab: used by analysis panels (LinkAnalysisPanel, ImageAnalysisPanel, CodeAnalysisPanel)
  // - profile: used by SidebarAccordionHost enrichedCtx
  // - c: used by SidebarAccordionHost for styling
  // - showSidebar: used by App for conditional rendering
  // Note: Panel data (tabs, workspaces, savedFiles, trashItems) is managed by each Panel via React Context or AppCore repositories
  const ctx={
    c,
    showSidebar,
    activeTab,
    profile
  };
  
  return(<div style={{display:'flex',flexDirection:'column',height:'100vh',background:c.bg,color:c.editorText}}>
    <AppBarComponent/><Toolbar/><TabBar/><SearchReplace/>
    <div style={{display:'flex',flex:1,overflow:'hidden'}}>
      {showSidebar&&<SidebarAccordionHost ctx={ctx}/>}
      <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
        <MainLayout/>
      </div>
    </div>
    <StatusBar/>
    <SettingsDialog/><ProfileManagerDialog/><PurgeDialog/><StorageManagerDialog/><PluginManagerDialog/><PdfPreviewModal/><PresentationMode/><SaveDialog/><HistoryPanel/>
    <Snackbar/><ConfirmModal/><ProgressModal/><KeyboardShortcuts/><SessionPurgeHandler/>
  </div>);
}

function Root(){
  return(<AppThemeProvider><ProfileProvider><UIProvider><EditorProvider><App/></EditorProvider></UIProvider></ProfileProvider></AppThemeProvider>);
}

      {

    const DEFAULT_LFM25_SETTINGS = {
      modelId: DEFAULT_MODEL_ID,
      temperature: 0.7,
      topP: 0.9,
      maxNewTokens: 256,
      doSample: true,
      systemPrompt: "",
      stream: true
    };

    function getLLMModel(modelId) {
      return LLM_MODEL_REGISTRY.find((model) => model.id === modelId) || LLM_MODEL_REGISTRY[0];
    }

    function isLargeLLMModel(model) {
      return model?.supportLevel === "experimental-large" || model?.supportLevel === "experimental-vl-large";
    }

    function isVisionLanguageModel(model) {
      return model?.inputKind === "image-text" || model?.task === "image-text-to-text";
    }

    function isAudioModel(model) {
      return model?.inputKind === "audio" || model?.inputKind === "audio-text" || model?.task === "automatic-speech-recognition" || model?.task === "lfm2-audio";
    }

    function isLFM25AudioModel(model) {
      return model?.id === DEFAULT_AUDIO_MODEL_ID || model?.task === "lfm2-audio";
    }

    function isTextGenerationModel(model) {
      return !isVisionLanguageModel(model) && !isAudioModel(model);
    }

    function getModelRuntimeLabel(model) {
      if (isVisionLanguageModel(model)) return "VL";
      if (isAudioModel(model)) return "Audio";
      return "Text";
    }

    function getBrowserDeviceMemoryGB() {
      if (typeof navigator === "undefined") return null;
      return typeof navigator.deviceMemory === "number" ? navigator.deviceMemory : null;
    }

    async function assertLLMCanRun(selectedModel) {
      const requiresWebGPU = selectedModel?.allowWasm === false || isLargeLLMModel(selectedModel);

      if (requiresWebGPU) {
        if (!hasWebGPU()) {
          throw new Error(
            selectedModel.label + " はブラウザ上ではWebGPU必須です。Chrome/EdgeでWebGPUを有効化するか、より軽いText/Audioモデルを選択してください。"
          );
        }

        if (navigator.gpu?.requestAdapter) {
          const adapter = await navigator.gpu.requestAdapter({ powerPreference: "high-performance" });
          if (!adapter) {
            throw new Error(
              "WebGPUアダプターを取得できませんでした。外部GPU/高性能GPUを有効にするか、より軽いモデルを選択してください。"
            );
          }
        }
      }

      const memoryGB = getBrowserDeviceMemoryGB();
      if (memoryGB && selectedModel?.minimumDeviceMemoryGB && memoryGB < selectedModel.minimumDeviceMemoryGB) {
        throw new Error(
          selectedModel.label + " は推奨メモリ " + selectedModel.minimumDeviceMemoryGB + "GB 以上です。現在の推定は約 " + memoryGB + "GB です。より軽いモデルへ戻してください。"
        );
      }
    }

    const INITIAL_LLM_MESSAGE = {
      role: "assistant",
      content: "LFM2.5 WebGPU LLMを起動確認すると、ここで会話できます。"
    };

    function normalizeLLMSettings(value = {}) {
      return {
        ...DEFAULT_LFM25_SETTINGS,
        ...value,
        modelId: getLLMModel(value.modelId || DEFAULT_LFM25_SETTINGS.modelId).id,
        temperature: Number.isFinite(Number(value.temperature))
          ? Number(value.temperature)
          : DEFAULT_LFM25_SETTINGS.temperature,
        topP: Number.isFinite(Number(value.topP))
          ? Number(value.topP)
          : DEFAULT_LFM25_SETTINGS.topP,
        maxNewTokens: Number.isFinite(Number(value.maxNewTokens))
          ? Number(value.maxNewTokens)
          : DEFAULT_LFM25_SETTINGS.maxNewTokens,
        doSample:
          typeof value.doSample === "boolean"
            ? value.doSample
            : DEFAULT_LFM25_SETTINGS.doSample,
        stream:
          typeof value.stream === "boolean"
            ? value.stream
            : DEFAULT_LFM25_SETTINGS.stream,
        systemPrompt:
          typeof value.systemPrompt === "string"
            ? value.systemPrompt
            : DEFAULT_LFM25_SETTINGS.systemPrompt
      };
    }

    function loadLLMSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        return normalizeLLMSettings(raw ? JSON.parse(raw) : {});
      } catch (error) {
        console.warn("[LFM25] settings load failed:", error);
        return normalizeLLMSettings();
      }
    }

    function saveLLMSettings(settings) {
      const normalized = normalizeLLMSettings(settings);
      try {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(normalized));
      } catch (error) {
        console.warn("[LFM25] settings save failed:", error);
      }
      return normalized;
    }

    function loadPanelPosition() {
      try {
        const raw = localStorage.getItem(PANEL_POSITION_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const x = Number(parsed.x);
        const y = Number(parsed.y);
        if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
        return { x, y };
      } catch (error) {
        console.warn("[LFM25] panel position load failed:", error);
        return null;
      }
    }

    function savePanelPosition(position) {
      if (!position) return;
      try {
        localStorage.setItem(PANEL_POSITION_KEY, JSON.stringify(position));
      } catch (error) {
        console.warn("[LFM25] panel position save failed:", error);
      }
    }

    function isCompactPanelViewport() {
      return (window.innerWidth || 1024) <= 720;
    }

    function loadPanelMinimized() {
      try {
        const raw = localStorage.getItem(PANEL_MINIMIZED_KEY);
        if (raw === "true") return true;
        if (raw === "false") return false;
      } catch {}
      return isCompactPanelViewport();
    }

    function savePanelMinimized(value) {
      try {
        localStorage.setItem(PANEL_MINIMIZED_KEY, value ? "true" : "false");
      } catch {}
    }

    function getPanelViewport() {
      return {
        width: window.innerWidth || 1280,
        height: window.innerHeight || 900
      };
    }

    function getMinimizedPanelSize() {
      const viewport = getPanelViewport();
      const margin = 8;

      return {
        width: Math.min(420, Math.max(280, viewport.width - margin * 2)),
        height: 58
      };
    }

    function getEffectivePanelSize({ minimized, panelSize, panelPosition } = {}) {
      if (minimized) return getMinimizedPanelSize();
      return clampPanelSize(panelSize, panelPosition);
    }

    function getResponsivePanelDefaultSize(position = null) {
      const margin = 8;
      const vw = window.innerWidth || 1280;
      const vh = window.innerHeight || 900;

      const left = Number.isFinite(Number(position?.x)) ? Number(position.x) : margin;
      const top = Number.isFinite(Number(position?.y)) ? Number(position.y) : margin;

      const availableWidth = Math.max(320, vw - left - margin);
      const availableHeight = Math.max(360, vh - top - margin);

      const isCompact = vw <= 720;
      const isTablet = vw > 720 && vw < 1024;

      const targetWidth = isCompact
        ? availableWidth
        : isTablet
          ? Math.min(640, Math.max(520, Math.round(vw * 0.72)))
          : Math.min(780, Math.max(660, Math.round(vw * 0.46)));

      const targetHeight = isCompact
        ? Math.min(availableHeight, Math.max(420, Math.round(vh * 0.72)))
        : isTablet
          ? Math.min(availableHeight, Math.max(680, Math.round(vh * 0.82)))
          : Math.min(
              availableHeight,
              Math.min(940, Math.max(780, Math.round(vh * 0.88)))
            );

      return {
        width: Math.min(targetWidth, availableWidth),
        height: Math.min(targetHeight, availableHeight)
      };
    }

    function clampPanelSize(size = {}, position = null) {
      const minWidth = 340;
      const minHeight = 420;
      const margin = 8;

      const viewport = getPanelViewport();

      const maxWidth = Math.max(minWidth, viewport.width - margin * 2);
      const maxHeight = Math.max(minHeight, viewport.height - margin * 2);

      const defaults = getResponsivePanelDefaultSize(position);

      const width = Number(size?.width);
      const height = Number(size?.height);

      return {
        width: Math.max(
          minWidth,
          Math.min(maxWidth, Number.isFinite(width) ? width : defaults.width)
        ),
        height: Math.max(
          minHeight,
          Math.min(maxHeight, Number.isFinite(height) ? height : defaults.height)
        )
      };
    }

    function loadPanelSize() {
      try {
        const layoutVersion = Number(localStorage.getItem(PANEL_LAYOUT_VERSION_KEY) || 0);
        
        if (layoutVersion < PANEL_LAYOUT_VERSION) {
          localStorage.setItem(PANEL_LAYOUT_VERSION_KEY, String(PANEL_LAYOUT_VERSION));
          return clampPanelSize(getResponsivePanelDefaultSize());
        }
        
        const raw = localStorage.getItem(PANEL_SIZE_KEY);
        if (!raw) return clampPanelSize(getResponsivePanelDefaultSize());
        return clampPanelSize(JSON.parse(raw));
      } catch (error) {
        console.warn("[LFM25] panel size load failed:", error);
        return clampPanelSize(getResponsivePanelDefaultSize());
      }
    }

    function savePanelSize(size) {
      if (!size) return;
      try {
        localStorage.setItem(PANEL_SIZE_KEY, JSON.stringify(clampPanelSize(size)));
      } catch (error) {
        console.warn("[LFM25] panel size save failed:", error);
      }
    }

    function loadPanelMode() {
      try {
        const raw = localStorage.getItem(PANEL_MODE_KEY);
        if (!raw) return "normal";
        const mode = JSON.parse(raw);
        return mode === "easy" ? "easy" : "normal";
      } catch (error) {
        console.warn("[LFM25] panel mode load failed:", error);
        return "normal";
      }
    }

    function savePanelMode(mode) {
      if (!mode) return;
      try {
        localStorage.setItem(PANEL_MODE_KEY, JSON.stringify(mode === "easy" ? "easy" : "normal"));
      } catch (error) {
        console.warn("[LFM25] panel mode save failed:", error);
      }
    }

    function loadChatPaneHeight() {
      try {
        const raw = localStorage.getItem(CHAT_PANE_HEIGHT_KEY);
        if (!raw) return 420;
        const height = Number(JSON.parse(raw));
        return Number.isFinite(height) && height >= 220 && height <= 720 ? height : 420;
      } catch (error) {
        console.warn("[LFM25] chat pane height load failed:", error);
        return 420;
      }
    }

    function saveChatPaneHeight(height) {
      if (!Number.isFinite(height)) return;
      try {
        const clamped = Math.max(220, Math.min(720, height));
        localStorage.setItem(CHAT_PANE_HEIGHT_KEY, JSON.stringify(clamped));
      } catch (error) {
        console.warn("[LFM25] chat pane height save failed:", error);
      }
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("ファイル読み込みに失敗しました"));
        reader.readAsDataURL(file);
      });
    }

    function formatAssetSize(bytes) {
      const value = Number(bytes || 0);
      if (value < 1024) return value + "B";
      if (value < 1024 * 1024) return (value / 1024).toFixed(1) + "KB";
      return (value / 1024 / 1024).toFixed(2) + "MB";
    }

    function clampPanelPosition(position = {}, size = null) {
      const margin = 8;
      const viewport = getPanelViewport();

      const panelSize = size || getResponsivePanelDefaultSize(position);

      const width = Number(panelSize.width) || 420;
      const height = Number(panelSize.height) || 58;

      const maxX = Math.max(margin, viewport.width - width - margin);
      const maxY = Math.max(margin, viewport.height - height - margin);

      const x = Number(position?.x);
      const y = Number(position?.y);

      return {
        x: Math.max(margin, Math.min(maxX, Number.isFinite(x) ? x : maxX)),
        y: Math.max(margin, Math.min(maxY, Number.isFinite(y) ? y : margin))
      };
    }

    let transformersPromise = null;
    let externalStateSetter = null;

    function clampProgress(value) {
      if (!Number.isFinite(value)) return 0;
      return Math.max(0, Math.min(100, Math.round(value)));
    }

    function hasWebGPU() {
      return typeof navigator !== "undefined" && !!navigator.gpu;
    }

    function getInitialLLMState() {
      return {
        phase: "idle",
        status: hasWebGPU() ? "待機中" : "WASM待機中",
        progress: 0,
        active: false,
        error: false
      };
    }

    function emitLLMState(patch = {}, onProgress) {
      const next = { ...patch };
      if (typeof next.progress === "number") {
        next.progress = clampProgress(next.progress);
      }

      if (typeof externalStateSetter === "function") {
        externalStateSetter(next);
      }

      if (typeof onProgress === "function") {
        onProgress(next);
      }
    }


    function injectLLMPanelStyle() {

        #${ROOT_ID} {

          top: var(--llm-panel-top, auto);
          right: var(--llm-panel-right, 20px);
          bottom: var(--llm-panel-bottom, 20px);
          width: min(var(--llm-panel-width, clamp(660px, 46vw, 780px)), calc(100vw - 16px));
          z-index: 99999;
          font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          color: #111827;
        }

        #${ROOT_ID} * {
          box-sizing: border-box;
        }

        .llm-panel {
          position: relative;
          overflow: hidden;
          border: 1px solid rgba(17, 24, 39, 0.08);

          background: rgba(255, 255, 255, 0.95);

          backdrop-filter: blur(18px);
        }

        .llm-panel.is-minimized .llm-panel__body {
          display: none;
        }

        .llm-panel.is-minimized {
          border-color: rgba(255, 255, 255, 0.42);
          background: rgba(255, 255, 255, 0.36);
          box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
          backdrop-filter: blur(24px) saturate(1.45);
          -webkit-backdrop-filter: blur(24px) saturate(1.45);
        }

        .llm-panel.is-minimized .llm-panel__head {
          background: linear-gradient(
            135deg,
            rgba(15, 23, 42, 0.48),
            rgba(55, 65, 81, 0.30)
          );
        }

        .llm-panel.is-minimized .llm-panel__status {
          opacity: 0.68;
        }

        .llm-panel.is-minimized .llm-panel__badge {
          background: rgba(255, 255, 255, 0.18);
        }

        .llm-panel.is-minimized .llm-panel__head {
          padding: 9px 10px;
        }

        .llm-panel:not(.is-minimized) {
          height: min(var(--llm-panel-height, clamp(780px, 88vh, 940px)), calc(100vh - 16px));

    function cleanupCurrentLLMRoot() {
      const root = window.__LFM25_PANEL_REACT_ROOT__;
      if (root && typeof root.unmount === "function") {
        try {
          root.unmount();
        } catch (_error) {
          // stale root は無視
        }
      }
      window.__LFM25_PANEL_REACT_ROOT__ = null;
      document.getElementById(ROOT_ID)?.remove();
    }

    const TF_JS_URLS = [
      "https://esm.sh/@huggingface/transformers@4",
      "https://cdn.jsdelivr.net/npm/@huggingface/transformers@4"
    ];

    const STABLE_MODEL_ID = DEFAULT_MODEL_ID;

    const LFM25_CACHE_KEYWORDS = [
      "huggingface.co",
      "cdn-lfs.huggingface.co",
      "hf.co",
      "onnx-community",
      "liquidai",
      "lfm2.5-350m-onnx",
      "lfm2.5-1.2b-instruct-onnx",
      "lfm2.5-1.2b-jp-onnx",
      "lfm2-1.2b-rag-onnx",
      "smolvlm-256m-instruct",
      "lfm2.5-audio-1.5b-onnx",
      "whisper-tiny",
      "lfm2.5",
      "lfm2",
      "@huggingface/transformers",
      "transformers.js",
      ...LLM_MODEL_REGISTRY.map((model) => model.id.toLowerCase()),
      ...LLM_MODEL_REGISTRY.map((model) => model.id.split("/").pop().toLowerCase())
    ];

    const dynamicImport = new Function("url", "return import(url)");

    let lfmRuntimePromise = null;
    let lfmRuntimeKey = null;

    function isCacheStorageAvailable() {
      return typeof caches !== "undefined" && typeof caches.keys === "function";
    }

    function matchesLFM25CacheTarget(value = "") {
      const text = String(value || "").toLowerCase();
      if (!text) return false;
      return LFM25_CACHE_KEYWORDS.some((keyword) => text.includes(keyword));
    }

    async function getLFM25BrowserCacheInfo() {
      const info = {
        supported: isCacheStorageAvailable(),
        cacheCount: 0,
        entryCount: 0,
        caches: [],
        updatedAt: Date.now()
      };

      if (!info.supported) return info;

      const cacheNames = await caches.keys();

      for (const cacheName of cacheNames) {
        const cache = await caches.open(cacheName);
        const requests = await cache.keys();
        const cacheNameMatched = matchesLFM25CacheTarget(cacheName);
        const matchedRequests = requests.filter((request) =>
          cacheNameMatched || matchesLFM25CacheTarget(request.url)
        );

        if (matchedRequests.length > 0 || cacheNameMatched) {
          info.caches.push({
            name: cacheName,
            entries: matchedRequests.length,
            totalEntries: requests.length
          });
          info.entryCount += matchedRequests.length;
        }
      }

      info.cacheCount = info.caches.length;
      return info;
    }

    async function purgeLFM25BrowserCache() {
      if (!isCacheStorageAvailable()) {
        return {
          supported: false,
          scannedCaches: 0,
          deletedCaches: 0,
          deletedEntries: 0
        };
      }

      resetLFM25Runtime("キャッシュ破棄のためランタイムを停止しました");

      const result = {
        supported: true,
        scannedCaches: 0,
        deletedCaches: 0,
        deletedEntries: 0
      };

      const cacheNames = await caches.keys();

      for (const cacheName of cacheNames) {
        result.scannedCaches += 1;

        if (matchesLFM25CacheTarget(cacheName)) {
          try {
            const cache = await caches.open(cacheName);
            const requests = await cache.keys();
            result.deletedEntries += requests.length;
          } catch (_) {}

          if (await caches.delete(cacheName)) {
            result.deletedCaches += 1;
          }
          continue;
        }

        const cache = await caches.open(cacheName);
        const requests = await cache.keys();

        for (const request of requests) {
          if (!matchesLFM25CacheTarget(request.url)) continue;
          if (await cache.delete(request)) {
            result.deletedEntries += 1;
          }
        }
      }

      return result;
    }

    async function loadTransformers() {
      if (transformersPromise) return transformersPromise;

      transformersPromise = (async () => {
        let lastError = null;

        for (const url of TF_JS_URLS) {
          try {
            const tf = await dynamicImport(url);

            if (!tf || !tf.pipeline) {
              throw new Error("Transformers.js pipeline が見つかりません: " + url);
            }

            const { env } = tf;
            env.allowLocalModels = false;
            env.allowRemoteModels = true;
            env.useBrowserCache = true;
            env.useFSCache = false;

            try {
              if (env.backends?.onnx?.wasm) {
                env.backends.onnx.wasm.numThreads = Math.min(
                  4,
                  navigator.hardwareConcurrency || 1
                );
              }
            } catch (_) {}

            return tf;
          } catch (error) {
            lastError = error;
            console.warn("[LFM25] Transformers.js load failed:", url, error);
          }
        }

        throw lastError || new Error("Transformers.js の読み込みに失敗しました。");
      })().catch((error) => {
        transformersPromise = null;
        throw error;
      });

      return transformersPromise;
    }

    function normalizeProgressInfo(info, base = 10, span = 80) {
      if (!info) return base;

      if (typeof info.progress === "number" && Number.isFinite(info.progress)) {
        return Math.max(0, Math.min(100, Math.round(info.progress)));
      }

      const loaded = Number(info.loaded || 0);
      const total = Number(info.total || 0);

      if (total > 0 && loaded >= 0) {
        return Math.max(
          0,
          Math.min(100, Math.round(base + (loaded / total) * span))
        );
      }

      return base;
    }

    function extractGeneratedText(result) {
      const first = Array.isArray(result) ? result[0] : result;
      const generated = first?.generated_text ?? first?.text ?? first;

      if (typeof generated === "string") {
        return generated.trim();
      }

      if (Array.isArray(generated)) {
        const assistant = [...generated]
          .reverse()
          .find(
            (message) =>
              message?.role === "assistant" &&
              typeof message?.content === "string"
          );

        if (assistant?.content?.trim()) {
          return assistant.content.trim();
        }

        const last = generated.at(-1);

        if (typeof last === "string") {
          return last.trim();
        }

        if (typeof last?.content === "string") {
          return last.content.trim();
        }
      }

      if (Array.isArray(first?.messages)) {
        const assistant = [...first.messages]
          .reverse()
          .find(
            (message) =>
              message?.role === "assistant" &&
              typeof message?.content === "string"
          );

        if (assistant?.content?.trim()) {
          return assistant.content.trim();
        }
      }

      return "";
    }

    async function initLFMRuntime(onProgress, options = {}) {
      const selectedModel = getLLMModel(options.modelId || loadLLMSettings().modelId || DEFAULT_MODEL_ID);
      const modelId = selectedModel.id;

      if (lfmRuntimePromise && lfmRuntimeKey === modelId) {
        return lfmRuntimePromise;
      }

      if (lfmRuntimePromise && lfmRuntimeKey !== modelId) {
        resetLFM25Runtime("モデル切替のためランタイムをリセットしました");
      }

      lfmRuntimeKey = modelId;

      lfmRuntimePromise = (async () => {
        const report =
          typeof onProgress === "function"
            ? onProgress
            : () => {};

        report({
          phase: "preflight",
          status: "実行環境確認中 / " + selectedModel.label,
          progress: 3,
          active: false,
          error: false
        });

        await assertLLMCanRun(selectedModel);

        report({
          phase: "library",
          status: "Transformers.js v4 読み込み中 / " + selectedModel.label,
          progress: 5,
          active: false,
          error: false
        });

        const { pipeline, TextStreamer } = await loadTransformers();

        const progressCallback = (info) => {
          const progress = normalizeProgressInfo(info, 10, 80);
          const file = info?.file || info?.name || "";

          report({
            phase: "model",
            status: file
              ? selectedModel.label + " 読み込み中: " + file
              : selectedModel.label + " 読み込み中",
            progress,
            active: false,
            error: false
          });
        };

        const baseOptions = {
          dtype: "q4",
          progress_callback: progressCallback
        };

        const preferWebGPU = selectedModel.allowWasm === false ? true : hasWebGPU();
        const firstOptions = {
          ...baseOptions,
          ...(preferWebGPU ? { device: "webgpu" } : { device: "wasm" })
        };

        let pipe = null;
        let device = firstOptions.device;

        try {
          report({
            phase: "model",
            status: selectedModel.label + " 初期化中: " + device,
            progress: 10,
            active: false,
            error: false
          });

          if (isLFM25AudioModel(selectedModel)) {
            return {
              modelId,
              selectedModel,
              async run() {
                throw new Error(
                  "LFM2.5-Audio-1.5B-ONNX は Transformers.js pipeline ではなく onnxruntime-web 実行です。" +
                  " ASR/TTS/Interleaved用の専用runnerを接続してください。"
                );
              },
              dispose() {}
            };
          }

          pipe = await pipeline(selectedModel.task || "text-generation", modelId, firstOptions);
        } catch (firstError) {
          console.warn("[LFM25] first init failed:", firstError);

          if (device !== "wasm" && selectedModel.allowWasm !== false) {
            report({
              phase: "fallback",
              status: "WebGPU初期化に失敗。WASMへ縮退中",
              progress: 12,
              active: false,
              error: false
            });

            device = "wasm";

            pipe = await pipeline(selectedModel.task || "text-generation", modelId, {
              ...baseOptions,
              device: "wasm"
            });
          } else {
            const message = firstError?.message || String(firstError);
            if (isLargeLLMModel(selectedModel)) {
              throw new Error(
                selectedModel.label + " のWebGPU初期化に失敗しました。1.2B系はWASMへ縮退せず、メモリ不足を避けるため停止します。350Mモデルへ戻すか、GPUメモリに余裕のあるChrome/Edgeで再実行してください。詳細: " + message
              );
            }
            throw firstError;
          }
        }

        report({
          phase: "ready",
          status: "準備完了: " + selectedModel.label + " / " + device,
          progress: 100,
          active: true,
          error: false
        });

        return {
          pipe,
          TextStreamer,
          device,
          modelId,
          model: selectedModel,

          async run(inputMessagesOrText, options = {}) {
            const messages = Array.isArray(inputMessagesOrText)
              ? inputMessagesOrText
              : [
                  {
                    role: "system",
                    content:
                      options.systemPrompt ||
                      "You are a helpful assistant. Reply in Japanese, briefly and clearly."
                  },
                  {
                    role: "user",
                    content: String(inputMessagesOrText || "")
                  }
                ];

            const requestedMaxNewTokens =
              options.maxNewTokens ||
              options.max_new_tokens ||
              selectedModel.defaultMaxNewTokens ||
              256;

            const callOptions = {
              max_new_tokens: isLargeLLMModel(selectedModel)
                ? Math.min(requestedMaxNewTokens, selectedModel.defaultMaxNewTokens || 128)
                : requestedMaxNewTokens,
              do_sample:
                typeof options.doSample === "boolean"
                  ? options.doSample
                  : false,
              temperature:
                typeof options.temperature === "number"
                  ? options.temperature
                  : 0.7,
              top_p:
                typeof options.topP === "number"
                  ? options.topP
                  : 0.9,
              return_full_text: false
            };

            if (
              typeof options.onToken === "function" &&
              TextStreamer &&
              pipe?.tokenizer
            ) {
              let fullText = "";

              callOptions.streamer = new TextStreamer(pipe.tokenizer, {
                skip_prompt: true,
                skip_special_tokens: true,
                callback_function: (token) => {
                  fullText += token;
                  options.onToken(token, fullText);
                }
              });
            }

            let result;

            if (isAudioModel(selectedModel)) {
              if (isLFM25AudioModel(selectedModel)) {
                throw new Error(
                  "LFM2.5-Audio-1.5B-ONNX は onnxruntime-web 専用runtimeが必要です。" +
                  " このPanelではモデル登録・WebGPU検査・UI切替まで対応済みです。" +
                  " 実推論は audio_encoder / decoder_q4 / vocoder_depthformer_q4 / audio_detokenizer_q4 を読み込む専用runnerを接続してください。"
                );
              }

              if (!options.audio) {
                throw new Error("Audio ASRモデルには音声ファイルが必要です。");
              }

              result = await pipe(options.audio, {
                chunk_length_s: options.chunkLengthSeconds || 30,
                stride_length_s: options.strideLengthSeconds || 5,
                return_timestamps: false
              });
              return extractGeneratedText(result) || result?.text || "文字起こし結果が空でした。";
            }

            if (isVisionLanguageModel(selectedModel)) {
              if (!options.image) {
                throw new Error("VLモデルには画像ファイルが必要です。");
              }

              const textPrompt = Array.isArray(inputMessagesOrText)
                ? inputMessagesOrText.find((message) => message?.role === "user")?.content || "Describe this image."
                : String(inputMessagesOrText || "Describe this image.");

              const vlMessages = [
                {
                  role: "user",
                  content: [
                    { type: "image", image: options.image },
                    { type: "text", text: textPrompt }
                  ]
                }
              ];

              result = await pipe(vlMessages, callOptions);
              return extractGeneratedText(result) || "画像解析結果が空でした。";
            }

            result = await pipe(messages, callOptions);
            return extractGeneratedText(result);
          },

          dispose() {
            if (pipe && typeof pipe.dispose === "function") {
              pipe.dispose();
            }
          }
        };
      })().catch((error) => {
        lfmRuntimePromise = null;
        lfmRuntimeKey = null;
        emitLLMState(
          {
            phase: "error",
            status: "初期化に失敗しました。再試行できます: " + (error?.message || error),
            progress: 100,
            active: false,
            error: true
          },
          onProgress
        );
        throw error;
      });

      return lfmRuntimePromise;
    }

    function resetLFM25Runtime(status = "リセット済み") {
      try {
        lfmRuntimePromise?.then((runtime) => runtime?.dispose?.());
      } catch (_) {}

      transformersPromise = null;
      lfmRuntimePromise = null;
      lfmRuntimeKey = null;

      emitLLMState({
        ...getInitialLLMState(),
        status
      });
    }

    async function runLFM25(prompt, options = {}) {
      const onProgress = options.onProgress;
      const report = (patch) => emitLLMState(patch, onProgress);
      const selectedModel = getLLMModel(options.modelId || loadLLMSettings().modelId || DEFAULT_MODEL_ID);
      const promptText = typeof prompt === "string" ? prompt.trim() : String(prompt || "").trim();

      if (!promptText && !isAudioModel(selectedModel)) {
        throw new Error("promptには空でない文字列を指定してください。");
      }

      if (isVisionLanguageModel(selectedModel) && !options.image) {
        throw new Error("VLモデルには画像ファイルが必要です。");
      }

      if (isAudioModel(selectedModel) && !options.audio && !promptText) {
        throw new Error("Audioモデルには音声ファイルまたはTTS用テキストが必要です。");
      }

      try {
        report({
          phase: "checking",
          status: hasWebGPU()
            ? getModelRuntimeLabel(selectedModel) + "モデルを初期化します"
            : "WebGPU未検出。WASMで初期化します",
          progress: 3,
          active: false,
          error: false
        });

        const runtime = await initLFMRuntime(report, options);

        report({
          phase: "generating",
          status: "生成中",
          progress: 100,
          active: true,
          error: false
        });

        const text = await runtime.run(promptText || "音声を文字起こししてください。", options);

        report({
          phase: "ready",
          status: "準備完了: " + (runtime.model?.label || runtime.modelId || "LLM") + " / " + runtime.device,
          progress: 100,
          active: true,
          error: false
        });

        return text || "生成結果が空でした。";
      } catch (error) {
        console.error("[LFM25] run failed:", error);

        report({
          phase: "error",
          status: "エラー: " + (error?.message || error),
          progress: 100,
          active: false,
          error: true
        });

        throw error;
      }
    }

    function mountLLMPanel() {
      if (!window.React || !window.ReactDOM) {
        console.error("React / ReactDOM が読み込まれていません。Babelより前にReactとReactDOMを読み込んでください。");
        return;
      }

      injectLLMPanelStyle();
      cleanupCurrentLLMRoot();

      const rootEl = document.createElement("div");
      rootEl.id = ROOT_ID;
      document.body.appendChild(rootEl);

      const { useEffect, useMemo, useRef, useState } = React;

      // ============================================================
      // 共通部品: LLMChatMessages
      // ============================================================
      function LLMChatMessages({ 
        messages, 
        messagesEndRef, 
        chatPaneHeight, 
        easy = false, 
        chatOrder = "newest-last", 
        onChatOrderChange,
        onInsert, 
        onReplace, 
        onAppend, 
        onCopy 
      }) {
        const latestAssistantRef = useRef(null);

        const getTimestamp = (index) => {
          const now = new Date();
          const hours = String(now.getHours()).padStart(2, '0');
          const minutes = String(now.getMinutes()).padStart(2, '0');
          return `${hours}:${minutes}`;
        };

        // 最新assistantメッセージを特定（データは古い順のまま）
        const latestAssistantId = useMemo(() => {
          for (let i = messages.length - 1; i >= 0; i--) {
            if (messages[i].role === 'assistant') {
              return i;
            }
          }
          return -1;
        }, [messages]);

        // メッセージを並び替え（表示のみ）
        const displayMessages = chatOrder === "newest-first" 
          ? [...messages].reverse() 
          : messages;

        // 自動スクロール: 最新AI回答カードへ直接スクロール
        useEffect(() => {
          if (!latestAssistantRef.current) return;
          latestAssistantRef.current.scrollIntoView({
            behavior: "smooth",
            block: chatOrder === "newest-first" ? "start" : "end"
          });
        }, [messages, chatOrder, latestAssistantId]);

        return (
          <section className="llm-panel__chat-panel">
            {/* チャットツールバー */}
            <div className="llm-panel__chat-toolbar">
              <div className="llm-panel__chat-title">AI結果・チャット履歴</div>
              <button
                type="button"
                className="llm-panel__chat-order-button"
                onClick={() => onChatOrderChange?.(chatOrder === "newest-last" ? "newest-first" : "newest-last")}
                title={chatOrder === "newest-first" ? "クリックすると最新を下にします" : "クリックすると最新を上にします"}
              >
                {chatOrder === "newest-first" ? "最新位置：上" : "最新位置：下"}
              </button>
            </div>

            {/* メッセージリスト */}
            <div 
              className="llm-panel__message-list"
              style={!easy ? { height: `${chatPaneHeight}px` } : {}}
            >
              {displayMessages.map((message, displayIndex) => {
                // データ内でのインデックスを計算
                const dataIndex = chatOrder === "newest-first" 
                  ? messages.length - 1 - displayIndex 
                  : displayIndex;
                
                const isLatestAssistant = dataIndex === latestAssistantId;
                
                return (
                  <div 
                    key={dataIndex}
                    ref={isLatestAssistant ? latestAssistantRef : null}
                    className={[
                      "llm-message",
                      `llm-message--${message.role}`,
                      isLatestAssistant ? "is-latest-assistant" : ""
                    ].filter(Boolean).join(" ")}
                  >
                    <div className="llm-message__header">
                      <div className="llm-message__role">
                        {message.role === "user" ? "You" : "LLM"}
                      </div>
                      <div className="llm-message__timestamp">
                        {getTimestamp(displayIndex)}
                      </div>
                      {isLatestAssistant && <div className="llm-message__latest-badge">最新回答</div>}
                    </div>
                    <div className="llm-message__content">
                      {message.content}
                    </div>
                    {isLatestAssistant && message.role === 'assistant' && (
                      <div className="llm-message__actions">
                        {onInsert && <button onClick={() => onInsert(message.content)} className="llm-panel__button llm-panel__button--soft">挿入</button>}
                        {onReplace && <button onClick={() => onReplace(message.content)} className="llm-panel__button llm-panel__button--soft">置換</button>}
                        {onAppend && <button onClick={() => onAppend(message.content)} className="llm-panel__button llm-panel__button--soft">追記</button>}
                        {onCopy && <button onClick={() => onCopy(message.content)} className="llm-panel__button llm-panel__button--soft">コピー</button>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </section>
        );
      }

      // ============================================================
      // 共通部品: LLMComposer
      // ============================================================
      function LLMComposer({
        prompt,
        setPrompt,
        submit,
        running,
        onKeyDown,
        easy = false
      }) {
        const textareaRef = useRef(null);

        // 入力欄の自動拡張
        const handleInputChange = (event) => {
          setPrompt(event.target.value);
          resizeComposerInput(event.target);
        };

        // 定型プロンプト
        const presets = [
          "要点を3つに整理して",
          "改善案を1つに絞って",
          "この文章を短くして",
          "実装手順に分解して"
        ];

        const applyPreset = (preset) => {
          setPrompt(preset);
          setTimeout(() => {
            if (textareaRef.current) {
              resizeComposerInput(textareaRef.current);
              textareaRef.current.focus();
            }
          }, 0);
        };

        if (easy) {
          // Easy表示: シンプルな入力
          return (
            <div className="llm-panel__footer-composer">
              <div className="llm-panel__presets">
                {presets.map((preset, idx) => (
                  <button
                    key={idx}
                    type="button"
                    className="llm-panel__preset-chip"
                    onClick={() => applyPreset(preset)}
                    disabled={running}
                  >
                    {preset}
                  </button>
                ))}
              </div>
              <div className="llm-panel__composer-row">
                <textarea
                  ref={textareaRef}
                  className="llm-panel__composer-input"
                  value={prompt}
                  placeholder="何をしたい？"
                  onChange={handleInputChange}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                      e.preventDefault();
                      submit?.();
                    } else {
                      onKeyDown?.(e);
                    }
                  }}
                  disabled={running}
                />
                <button
                  type="button"
                  className="llm-panel__button llm-panel__button--primary"
                  disabled={running || !prompt.trim()}
                  onClick={submit}
                  title="Shift+Enterで改行"
                >
                  {running ? "処理中..." : "送信"}
                </button>
              </div>
            </div>
          );
        }

        // Normal表示: 定型プロンプト + 1行入力
        return (
          <div className="llm-panel__footer-composer">
            <div className="llm-panel__presets">
              {presets.map((preset, idx) => (
                <button
                  key={idx}
                  type="button"
                  className="llm-panel__preset-chip"
                  onClick={() => applyPreset(preset)}
                  disabled={running}
                >
                  {preset}
                </button>
              ))}
            </div>
            <div className="llm-panel__composer-row">
              <textarea
                ref={textareaRef}
                className="llm-panel__composer-input"
                value={prompt}
                placeholder="何をしたい？"
                onChange={handleInputChange}
                onKeyDown={(e) => {
                  if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    submit?.();
                  } else {
                    onKeyDown?.(e);
                  }
                }}
                disabled={running}
              />
              <button
                type="button"
                className="llm-panel__button llm-panel__button--primary"
                disabled={running || !prompt.trim()}
                onClick={submit}
                title="Shift+Enterで改行"
              >
                {running ? "処理中..." : "送信"}
              </button>
            </div>
          </div>
        );
      }

      // ============================================================
      // 共通部品: LLMReflectionActions
      // ============================================================
      function LLMReflectionActions({
        onInsert,
        onReplace,
        onAppend,
        disabled = false,
        easy = false
      }) {

                    className="llm-panel__button llm-panel__button--soft llm-panel__button--small"

        // Normal表示: 5つのボタン
        return (
          <div className="llm-panel__reflection-actions">
