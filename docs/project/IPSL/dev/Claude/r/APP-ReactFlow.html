    function Editor() {
      const flow = useReactFlow();
      const flowRef = useRef(null);
      const resizingRef = useRef(false);
      const pendingParentFitRef = useRef(null);
      const pendingFitNodeIdsRef = useRef(new Set());
      const initialData = useMemo(() => loadInitialData(), []);
      const initialUi = useMemo(() => loadUiState(), []);

      const [nodes, setNodes, onNodesChangeBase] = useNodesState(initialData.nodes);
      const [edges, setEdges, onEdgesChangeBase] = useEdgesState(initialData.edges);
      const [selection, setSelection] = useState({ type: "node", id: initialData.nodes[1]?.id || initialData.nodes[0]?.id || null });
      const [addOpen, setAddOpen] = useState(false);
      const [panelOpen, setPanelOpen] = useState(initialUi.drawerOpen);
      const [previewOpen, setPreviewOpen] = useState(false);
      const [miniMapOpen, setMiniMapOpen] = useState(true);
      const [message, setMessage] = useState("");
      const [saveStamp, setSaveStamp] = useState(initialData.restored ? "自動保存から復元済み" : "");
      const [history, setHistory] = useState({ past: [], future: [] });
      const [draggingNodeId, setDraggingNodeId] = useState(null);

      const mermaidCode = useMemo(() => toMermaid(nodes, edges), [nodes, edges]);
      const [mermaidDraft, setMermaidDraft] = useState(mermaidCode);
      const selectedNode = selection?.type === "node" ? nodes.find((n) => n.id === selection.id) : null;
      const selectedEdge = selection?.type === "edge" ? edges.find((e) => e.id === selection.id) : null;
      const canUndo = history.past.length > 0;
      const canRedo = history.future.length > 0;

      const groupOptions = useMemo(() => {
        if (!selectedNode) return [];
        const descendants = collectDescendants(selectedNode.id, nodes);
        return nodes.filter((node) => isGroup(node) && node.id !== selectedNode.id && !descendants.has(node.id));
      }, [nodes, selectedNode]);

      const selectedGroupId = selectedNode ? (isGroup(selectedNode) ? selectedNode.id : selectedNode.parentId || null) : null;

      useEffect(() => {
        setMermaidDraft(mermaidCode);
      }, [mermaidCode]);
      function defaultSizeForNode(node) {
        if (isGroup(node)) return { width: 400, height: 220 };
        const shape = node.data?.shape || "process";
        if (shape === "text") return { width: 130, height: 54 };
        if (shape === "decision") return { width: 170, height: 100 };
        if (shape === "start") return { width: 150, height: 70 };
        if (shape === "db" || shape === "subroutine" || shape === "io") return { width: 170, height: 82 };
        return { width: 160, height: 80 };
      }

      function estimatedSizeForNode(node) {
        if (isGroup(node)) return nodeSize(node);
        const shape = node.data?.shape || "process";
        const text = String(node.data?.label || node.id || "");
        const lines = text.split(/\r?\n|<br\s*\/?\s*>/i);
        const maxLen = Math.max(1, ...lines.map((line) => line.length));
        const min = defaultSizeForNode(node);
        const width = clamp(maxLen * 12 + 54, min.width, 360);
        const height = clamp(lines.length * 24 + 42, min.height, 220);
        return { width, height };
      }

      function setNodeSizeById(nodeId, size) {
        pushHistory();
        setNodes((current) => {
          const target = current.find((node) => node.id === nodeId);
          if (!target) return current;
          const currentSize = nodeSize(target);
          const desired = {
            width: Number(size.width || currentSize.width),
            height: Number(size.height || currentSize.height)
          };
          const nextSize = isGroup(target)
            ? constrainedGroupSize(current, nodeId, desired)
            : { width: Math.max(90, desired.width), height: Math.max(56, desired.height) };
          const resized = current.map((node) => node.id === nodeId ? { ...node, style: { ...node.style, width: nextSize.width, height: nextSize.height } } : node);
          return target.parentId ? fitAncestorGroups(resized, target.parentId) : sortNodes(resized);
        });
      }

      function resetNodeSizeById(nodeId) {
        const node = nodes.find((item) => item.id === nodeId);
        if (!node) return;
        setNodeSizeById(nodeId, defaultSizeForNode(node));
      }

      function optimizeNodeSizeById(nodeId) {
        const node = nodes.find((item) => item.id === nodeId);
        if (!node) return;
        if (isGroup(node)) {
          fitGroupById(nodeId);
          return;
        }
        setNodeSizeById(nodeId, estimatedSizeForNode(node));
      }

      function show(text) {
        setMessage(text);
        setTimeout(() => setMessage(""), 1400);
      }

      function fitParentChainByNodeId(nodeId) {
        setNodes((current) => {
          const node = current.find((item) => item.id === nodeId);
          if (!node?.parentId) return current;
          return fitAncestorGroups(current, node.parentId);
        });
      }

      function scheduleParentFit(nodeId) {
        if (!nodeId) return;
        pendingFitNodeIdsRef.current.add(nodeId);
        if (pendingParentFitRef.current) return;

        pendingParentFitRef.current = requestAnimationFrame(() => {
          pendingParentFitRef.current = null;
          const ids = Array.from(pendingFitNodeIdsRef.current);
          pendingFitNodeIdsRef.current.clear();

          setNodes((current) => {
            let next = current;
            const groupIds = new Set();

            ids.forEach((id) => {
              const node = next.find((item) => item.id === id);
              if (!node) return;
              if (node.parentId) groupIds.add(node.parentId);
              if (isGroup(node)) groupIds.add(node.id);
            });

            if (!groupIds.size) return current;
            groupIds.forEach((groupId) => {
              next = fitAncestorGroups(next, groupId);
            });
            return next;
          });
        });
      }

      function handleNodesChange(changes) {
        const structural = changes.some((change) => !["select", "position", "dimensions"].includes(change.type));
        if (structural) pushHistory();

        setNodes((current) => {
          const next = applyParentExtents(applyNodeChanges(changes, current));
          const hasResize = changes.some((change) => change.type === "dimensions");

          // V2.5.25: React Flow standard containment is the default.
          // Child nodes use extent: "parent", so movement is constrained by React Flow.
          // We only normalize group sizes after resize events; ordinary dragging no longer
          // runs the heavy all-group fitting loop.
          if (hasResize) return fitAllGroupsToChildren(next, { shrink: false });
          return sortNodes(next);
        });
      }

      const makeSnapshot = useCallback(() => ({ nodes: cloneData(nodes), edges: cloneData(edges) }), [nodes, edges]);

      const pushHistory = useCallback(() => {
        const snap = makeSnapshot();
        const snapKey = JSON.stringify(snap);
        setHistory((current) => {
          const last = current.past[current.past.length - 1];
          if (last && JSON.stringify(last) === snapKey) return current;
          return {
            past: [...current.past, snap].slice(-HISTORY_LIMIT),
            future: []
          };
        });
      }, [makeSnapshot]);

      const undo = useCallback(() => {
        setHistory((current) => {
          if (!current.past.length) return current;
          const previous = current.past[current.past.length - 1];
          const now = makeSnapshot();
          setNodes(applyParentExtents(previous.nodes));
          setEdges(previous.edges);
          setSelection(null);
          return {
            past: current.past.slice(0, -1),
            future: [now, ...current.future].slice(0, HISTORY_LIMIT)
          };
        });
      }, [makeSnapshot, setNodes, setEdges]);

      const redo = useCallback(() => {
        setHistory((current) => {
          if (!current.future.length) return current;
          const next = current.future[0];
          const now = makeSnapshot();
          setNodes(applyParentExtents(next.nodes));
          setEdges(next.edges);
          setSelection(null);
          return {
            past: [...current.past, now].slice(-HISTORY_LIMIT),
            future: current.future.slice(1)
          };
        });
      }, [makeSnapshot, setNodes, setEdges]);

      useEffect(() => {
        const timer = setTimeout(() => {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: 2.610, nodes, edges, viewport: flow.getViewport(), savedAt: new Date().toISOString() }));
            setSaveStamp(`自動保存: ${new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`);
          } catch {
            setSaveStamp("自動保存に失敗");
          }
        }, 350);
        return () => clearTimeout(timer);
      }, [nodes, edges]);

      useEffect(() => {
        try {
          localStorage.setItem(DRAWER_STORAGE_KEY, JSON.stringify({ drawerOpen: panelOpen }));
        } catch {}
      }, [panelOpen]);
      useEffect(() => {
        if (!initialData.viewport) return;
        requestAnimationFrame(() => {
          try {
            flow.setViewport(initialData.viewport, { duration: 0 });
          } catch {}
        });
      }, []);


      const patchNode = useCallback((id, patch) => {
        pushHistory();
        setNodes((current) => current.map((node) => node.id === id ? { ...node, data: { ...node.data, ...patch } } : node));
      }, [setNodes, pushHistory]);

      const resizeNode = useCallback((id, size) => {
        setNodes((current) => {
          const target = current.find((node) => node.id === id);
          if (!target) return current;

          const nextSize = isGroup(target)
            ? constrainedGroupSize(current, id, size)
            : {
                width: Math.max(90, Number(size.width || 90)),
                height: Math.max(56, Number(size.height || 56))
              };

          return current.map((node) => node.id === id ? { ...node, style: { ...node.style, width: nextSize.width, height: nextSize.height } } : node);
        });
      }, [setNodes]);

      const patchEdge = useCallback((id, patch) => {
        pushHistory();
        setEdges((current) => current.map((edge) => edge.id === id ? { ...edge, ...patch } : edge));
      }, [setEdges, pushHistory]);


      function deleteEdgeById(edgeId) {
        pushHistory();
        setEdges((current) => current.filter((edge) => edge.id !== edgeId));
        if (selection?.type === "edge" && selection.id === edgeId) setSelection(null);
      }

      function reverseEdgeById(edgeId) {
        pushHistory();
        setEdges((current) => current.map((edge) => {
          if (edge.id !== edgeId) return edge;
          return {
            ...edge,
            source: edge.target,
            target: edge.source,
            sourceHandle: edge.targetHandle || "left",
            targetHandle: edge.sourceHandle || "right"
          };
        }));
      }

      function nodeZIndex(node) {
        const selected = selection?.type === "node" && selection.id === node.id;
        const dragging = draggingNodeId === node.id;
        if (isGroup(node)) {
          return selected || dragging ? 2 : 0;
        }
        if (dragging) return 30;
        if (selected) return 22;
        return 10;
      }

      const viewNodes = useMemo(() => nodes.map((node) => ({
        ...node,
        zIndex: nodeZIndex(node),
        data: {
          ...node.data,
          parentId: node.parentId || "",
          onPatch: patchNode,
          onResize: resizeNode,
          onResizeStart: () => { pushHistory(); resizingRef.current = true; },
          onResizeEnd: () => {
            requestAnimationFrame(() => {
              resizingRef.current = false;
              if (isGroup(node)) {
                setNodes((current) => fitAllGroupsToChildren(current, { shrink: false }));
              } else {
                scheduleParentFit(node.id);
              }
            });
          },
          onDuplicateNode: duplicateNodeById,
          onDeleteNode: deleteNodeById,
          onAddConnected: addConnectedNode,
          onAddChild: addChildNode,
          onAddChildGroup: addChildGroup,
          onFitGroup: fitGroupById,
          onFitParent: fitParentByNodeId,
          onDetachParent: detachFromParentById,
          onOpenTools: openToolsForNode,
          onSetShape: setNodeShape,
          onOptimizeSize: optimizeNodeSizeById
        }
      })), [nodes, patchNode, resizeNode, pushHistory, selection, draggingNodeId]);

      const viewEdges = useMemo(() => edges.map((edge) => ({
        ...edge,
        type: "editable",
        reconnectable: true,
        zIndex: Number.isFinite(Number(edge.zIndex)) ? Number(edge.zIndex) : DEFAULT_EDGE_OPTIONS.zIndex,
        data: {
          label: edge.label || "",
          line: edge.line || "arrow",
          marker: edge.marker || "arrow",
          isSelected: selection?.type === "edge" && selection.id === edge.id,
          onPatch: patchEdge,
          onSelect: (id) => setSelection({ type: "edge", id }),
          onDeleteEdge: deleteEdgeById,
          onReverseEdge: reverseEdgeById,
          onSetLine: (id, line) => patchEdge(id, { line }),
          onSetMarker: (id, marker) => patchEdge(id, { marker }),
          onOpenTools: (id) => { setSelection({ type: "edge", id }); setPanelOpen(true); }
        }
      })), [edges, patchEdge, selection]);

      const onNodesChange = useCallback((changes) => {
        if (changes.some((change) => !["select", "position", "dimensions"].includes(change.type))) pushHistory();
        onNodesChangeBase(changes);
      }, [onNodesChangeBase, pushHistory]);

      const onEdgesChange = useCallback((changes) => {
        if (changes.some((change) => change.type !== "select")) pushHistory();
        onEdgesChangeBase(changes);
      }, [onEdgesChangeBase, pushHistory]);

      function centerPoint() {
        const rect = flowRef.current?.getBoundingClientRect();
        if (!rect) return flow.screenToFlowPosition({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
        return flow.screenToFlowPosition({ x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 });
      }

      function findGroupAt(point, allNodes, excludeId = null) {
        const excluded = excludeId ? collectDescendants(excludeId, allNodes) : new Set();
        return allNodes
          .filter((node) => isGroup(node) && !excluded.has(node.id))
          .filter((node) => containsPoint(nodeBounds(node, allNodes), point, 0))
          .sort((a, b) => depthOf(b, allNodes) - depthOf(a, allNodes))[0] || null;
      }

      function pointToLocal(point, parentId, allNodes) {
        if (!parentId) return point;
        const parent = allNodes.find((node) => node.id === parentId);
        if (!parent) return point;
        const parentAbs = absolutePosition(parent, allNodes);
        return { x: Math.max(GROUP_PADDING.left, point.x - parentAbs.x), y: Math.max(GROUP_PADDING.top, point.y - parentAbs.y) };
      }

      function addElement(kind, shape = "process", parentId = null, point = centerPoint()) {
        pushHistory();
        const position = pointToLocal(point, parentId, nodes);

        if (kind === "group") {
          const id = nextId(nodes, "G");
          setNodes((current) => sortNodes([...current, {
            id,
            type: "groupNode",
            parentId: parentId || undefined,
            extent: parentId ? "parent" : undefined,
            expandParent: Boolean(parentId),
            position,
            style: { width: 400, height: 220 },
            data: { label: `サブグラフ${id.replace("G", "")}`, ...GROUP_COLORS }
          }]));
          setSelection({ type: "node", id });
          return;
        }

        const id = nextId(nodes, "N");
        const colors = COLORS[shape] || COLORS.process;
        setNodes((current) => sortNodes([...current, {
          id,
          type: "shapeNode",
          parentId: parentId || undefined,
          extent: parentId ? "parent" : undefined,
          expandParent: Boolean(parentId),
          position,
          style: { width: 160, height: 80 },
          data: { label: SHAPES.find(([v]) => v === shape)?.[1] || "ノード", shape, ...colors }
        }]));
        setSelection({ type: "node", id });
      }

      function setParent(childId, parentId) {
        pushHistory();
        setNodes((current) => {
          const child = current.find((node) => node.id === childId);
          const parent = current.find((node) => node.id === parentId);
          if (!child) return current;

          const oldParentId = child.parentId || null;
          const childAbs = absolutePosition(child, current);
          const parentAbs = parent ? absolutePosition(parent, current) : { x: 0, y: 0 };

          const remapped = current.map((node) => {
            if (node.id !== childId) return node;
            const updated = {
              ...node,
              parentId: parentId || undefined,
              position: parentId ? { x: Math.max(GROUP_PADDING.left, childAbs.x - parentAbs.x), y: Math.max(GROUP_PADDING.top, childAbs.y - parentAbs.y) } : childAbs
            };
            return applyParentExtent(updated);
          });

          let next = fitAllGroupsToChildren(remapped, { shrink: false });
          return next;
        });
      }

      function updateParentByPlacement(liveNode) {
        setNodes((current) => {
          const base = mergeLiveNode(current, liveNode);
          const node = base.find((item) => item.id === liveNode?.id);
          if (!node) return current;

          const oldParentId = node.parentId || null;
          const abs = absolutePosition(node, base);
          const size = nodeSize(node);
          const center = { x: abs.x + size.width / 2, y: abs.y + size.height / 2 };
          const group = findGroupAt(center, base, node.id);

          let nextParentId = node.parentId || null;
          if (group && group.id !== node.parentId) nextParentId = group.id;
          if (!group && node.parentId) nextParentId = node.parentId;

          let next = base;

          if ((node.parentId || null) !== nextParentId) {
            const parent = nextParentId ? base.find((item) => item.id === nextParentId) : null;
            const parentAbs = parent ? absolutePosition(parent, base) : { x: 0, y: 0 };

            next = base.map((item) => {
              if (item.id !== node.id) return item;
              return applyParentExtent({
                ...item,
                parentId: nextParentId || undefined,
                position: nextParentId ? { x: Math.max(GROUP_PADDING.left, abs.x - parentAbs.x), y: Math.max(GROUP_PADDING.top, abs.y - parentAbs.y) } : abs
              });
            });
          }

          next = fitAllGroupsToChildren(next, { shrink: false });
          return sortNodes(next);
        });
      }

      function expandParentWhileDragging(liveNode) {
        // V2.5.25: ordinary containment and right/down expansion are handled by React Flow extent: "parent" + expandParent.
        // Keep this hook intentionally light; final parent attachment is handled on drag stop.
        if (liveNode?.id) scheduleParentFit(liveNode.id);
      }

      function deleteNodeById(nodeId) {
        const target = nodes.find((node) => node.id === nodeId);
        if (!target) return;
        pushHistory();
        const ids = collectDescendants(nodeId, nodes);
        setNodes((current) => current.filter((node) => !ids.has(node.id)));
        setEdges((current) => current.filter((edge) => !ids.has(edge.source) && !ids.has(edge.target)));
        if (selection?.id === nodeId) setSelection(null);
      }

      function duplicateNodeById(nodeId) {
        const source = nodes.find((node) => node.id === nodeId);
        if (!source) return;
        pushHistory();
        const prefix = isGroup(source) ? "G" : "N";
        const id = nextId(nodes, prefix);
        const clone = cloneData(source);
        clone.id = id;
        clone.position = { x: source.position.x + 32, y: source.position.y + 32 };
        clone.data = { ...clone.data, label: `${clone.data.label || source.id} コピー` };
        setNodes((current) => sortNodes([...current, applyParentExtent(clone)]));
        setSelection({ type: "node", id });
        show("複製しました。");
      }

      function addConnectedNode(sourceId, shape = "process") {
        const source = nodes.find((node) => node.id === sourceId);
        if (!source) return;
        pushHistory();
        const id = nextId(nodes, "N");
        const size = nodeSize(source);
        const parentId = isGroup(source) ? source.id : source.parentId;
        const colors = COLORS[shape] || COLORS.process;
        const label = SHAPES.find(([value]) => value === shape)?.[1] || "処理";
        const position = isGroup(source)
          ? { x: GROUP_PADDING.left, y: GROUP_PADDING.top }
          : { x: source.position.x + size.width + 120, y: source.position.y };
        const newNode = {
          id,
          type: "shapeNode",
          parentId: parentId || undefined,
          extent: parentId ? "parent" : undefined,
          expandParent: Boolean(parentId),
          position,
          style: { width: 160, height: 80 },
          data: { label, shape, ...colors }
        };
        setNodes((current) => {
          const next = sortNodes([...current, newNode]);
          return parentId ? fitAllGroupsToChildren(next, { shrink: false }) : next;
        });
        if (!isGroup(source)) {
          setEdges((current) => addEdge({
            id: `${source.id}-${id}-${Date.now()}`,
            source: source.id,
            target: id,
            sourceHandle: "right",
            targetHandle: "left",
            label: "",
            line: "arrow",
            marker: "arrow",
            zIndex: DEFAULT_EDGE_OPTIONS.zIndex,
            reconnectable: true
          }, current));
        }
        setSelection({ type: "node", id });
      }

      function addChildNode(groupId, shape = "process") {
        const group = nodes.find((node) => node.id === groupId && isGroup(node));
        if (!group) return;
        pushHistory();
        const id = nextId(nodes, "N");
        const colors = COLORS[shape] || COLORS.process;
        const label = SHAPES.find(([value]) => value === shape)?.[1] || "処理";
        const newNode = {
          id,
          type: "shapeNode",
          parentId: groupId,
          extent: "parent",
          expandParent: true,
          position: { x: GROUP_PADDING.left, y: GROUP_PADDING.top },
          style: { width: 160, height: 80 },
          data: { label, shape, ...colors }
        };
        setNodes((current) => fitAllGroupsToChildren(sortNodes([...current, newNode]), { shrink: false }));
        setSelection({ type: "node", id });
      }

      function addChildGroup(groupId) {
        const group = nodes.find((node) => node.id === groupId && isGroup(node));
        if (!group) return;
        pushHistory();
        const id = nextId(nodes, "G");
        const newGroup = {
          id,
          type: "groupNode",
          parentId: groupId,
          extent: "parent",
          expandParent: true,
          position: { x: GROUP_PADDING.left, y: GROUP_PADDING.top },
          style: { width: 360, height: 200 },
          data: { label: `サブグラフ${id.replace("G", "")}`, ...GROUP_COLORS }
        };
        setNodes((current) => fitAllGroupsToChildren(sortNodes([...current, newGroup]), { shrink: false }));
        setSelection({ type: "node", id });
      }

      function fitGroupById(groupId) {
        const group = nodes.find((node) => node.id === groupId && isGroup(node));
        if (!group) return;
        pushHistory();
        setNodes((current) => fitGroupTreeToChildren(current, groupId, { shrink: true }));
      }

      function fitParentByNodeId(nodeId) {
        const node = nodes.find((item) => item.id === nodeId);
        if (!node?.parentId) {
          show("親サブグラフがありません。");
            return;
        }
        pushHistory();
        setNodes((current) => fitGroupTreeToChildren(current, node.parentId, { shrink: true }));
        show("親サブグラフにフィットしました。");
      }

      function detachFromParentById(nodeId) {
        const node = nodes.find((item) => item.id === nodeId);
        if (!node?.parentId) {
          show("親サブグラフがありません。");
            return;
        }
        setParent(nodeId, null);
        show("親サブグラフから外しました。");
      }

      function openToolsForNode(nodeId) {
        setSelection({ type: "node", id: nodeId });
        setPanelOpen(true);
      }

      function resetNodeColorsById(nodeId) {
        const node = nodes.find((item) => item.id === nodeId);
        if (!node) return;
        const colors = isGroup(node) ? GROUP_COLORS : (COLORS[node.data.shape || "process"] || COLORS.process);
        patchNode(nodeId, colors);
      }

      function setNodeShape(nodeId, shape) {
        patchNode(nodeId, { shape, ...(COLORS[shape] || COLORS.process) });
      }

      function deleteSelected() {
        if (!selection) return;
        pushHistory();
        if (selection.type === "edge") {
          setEdges((current) => current.filter((edge) => edge.id !== selection.id));
          setSelection(null);
            return;
        }

        const ids = collectDescendants(selection.id, nodes);
        setNodes((current) => current.filter((node) => !ids.has(node.id)));
        setEdges((current) => current.filter((edge) => !ids.has(edge.source) && !ids.has(edge.target)));
        setSelection(null);
      }

      function duplicateSelected() {
        if (!selectedNode) return;
        duplicateNodeById(selectedNode.id);
      }

      function resetSelectedNodeColors() {
        if (!selectedNode) return;
        resetNodeColorsById(selectedNode.id);
      }

      function reset() {
        pushHistory();
        setNodes(initialNodes);
        setEdges(initialEdges);
        setSelection({ type: "node", id: "A" });
        setTimeout(() => flow.fitView({ padding: 0.18, duration: 250 }), 0);
      }

      function resolveOverlaps() {
        pushHistory();
        setNodes((current) => {
          const scopeParentId = selectedNode
            ? (isGroup(selectedNode) ? selectedNode.id : (selectedNode.parentId || null))
            : null;
          return resolveNodeCollisions(current, scopeParentId);
        });
        show(selectedNode ? "選択範囲の重なりを解消しました。" : "ルートの重なりを解消しました。");
      }

      function importJson() {
        const text = prompt("JSONを貼り付けてください。");
        if (!text) return;
        try {
          const parsed = JSON.parse(text);
          const fixed = normalizeData(parsed);
          if (!fixed.nodes.length) throw new Error("empty");
          pushHistory();
          setNodes(fixed.nodes);
          setEdges(fixed.edges);
          const viewport = sanitizeViewport(parsed.viewport);
          if (viewport) requestAnimationFrame(() => flow.setViewport(viewport, { duration: 0 }));
          setSelection(null);
          show("JSONを復元しました。");
        } catch {
          show("JSON復元に失敗しました。");
        }
      }


      function importMermaidFlowchart() {
        const text = mermaidDraft || mermaidCode;
        if (!text.trim()) return;
        try {
          const parsed = parseFlowchartMermaid(text);
          const fitted = fitAllGroupsToChildren(parsed.nodes, { shrink: false });
          pushHistory();
          setNodes(fitted);
          setEdges(parsed.edges);
          setSelection(null);
          requestAnimationFrame(() => flow.fitView({ padding: 0.18, duration: 250 }));
          show("Mermaid flowchartを反映しました。");
        } catch (error) {
          console.error(error);
          show("Mermaid反映に失敗しました。基本flowchart構文だけ対応しています。");
        }
      }

      async function exportMermaidSvg() {
        try {
          const result = await mermaid.render(`export-${Date.now()}-${Math.random().toString(36).slice(2)}`, mermaidDraft || mermaidCode);
          downloadBlob(new Blob([result.svg], { type: "image/svg+xml;charset=utf-8" }), exportFileName("svg"));
          show("SVG保存完了");
        } catch (error) {
          console.error(error);
          show("SVG保存に失敗しました。");
        }
      }

      async function exportFlowImage(type) {
        try {
          const viewport = flowRef.current?.querySelector(".react-flow__viewport");
          if (!viewport) throw new Error("viewport not found");
          const imageWidth = 1600;
          const imageHeight = 1000;
          const bounds = getNodesBounds(nodes);
          const transform = getViewportForBounds(bounds, imageWidth, imageHeight, 0.08, 1.6, 0.9);
          const options = {
            backgroundColor: "#ffffff",
            width: imageWidth,
            height: imageHeight,
            style: {
              width: `${imageWidth}px`,
              height: `${imageHeight}px`,
              transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.zoom})`
            },
            filter: (node) => !node?.classList?.contains("react-flow__minimap")
          };
          const dataUrl = type === "jpg"
            ? await toJpeg(viewport, { ...options, quality: 0.92 })
            : await toPng(viewport, options);
          downloadDataUrl(dataUrl, exportFileName(type === "jpg" ? "jpg" : "png"));
          show(`${type.toUpperCase()}保存完了`);
        } catch (error) {
          console.error(error);
          show(`${type.toUpperCase()}保存に失敗しました。`);
        }
      }

      function clearAutoSave() {
        try {
          localStorage.removeItem(STORAGE_KEY);
          setSaveStamp("自動保存をクリア済み");
          show("自動保存をクリアしました。");
        } catch {
          show("自動保存クリアに失敗しました。");
        }
      }

      function onConnect(params) {
        pushHistory();
        setEdges((current) => addEdge({
          ...params,
          id: `${params.source}-${params.target}-${Date.now()}`,
          label: "",
          line: "arrow",
          marker: "arrow",
          zIndex: DEFAULT_EDGE_OPTIONS.zIndex,
          reconnectable: true
        }, current));
      }

      function onReconnect(oldEdge, newConnection) {
        pushHistory();
        setEdges((current) => reconnectEdge(oldEdge, newConnection, current));
      }

      function focusNode(id) {
        const node = nodes.find((item) => item.id === id);
        if (!node) return;
        const bounds = nodeBounds(node, nodes);
        flow.setCenter(bounds.x + bounds.width / 2, bounds.y + bounds.height / 2, { zoom: 1, duration: 260 });
      }

      function focusEdge(id) {
        const edge = edges.find((item) => item.id === id);
        if (!edge) return;
        const source = nodes.find((item) => item.id === edge.source);
        const target = nodes.find((item) => item.id === edge.target);
        if (!source || !target) return;
        const s = nodeBounds(source, nodes);
        const t = nodeBounds(target, nodes);
        flow.setCenter((s.x + s.width / 2 + t.x + t.width / 2) / 2, (s.y + s.height / 2 + t.y + t.height / 2) / 2, { zoom: 1, duration: 260 });
      }

      function miniMapNodeColor(node) {
        return hex(node?.data?.fill, isGroup(node) ? GROUP_COLORS.fill : "#e3f2fd");
      }

      function miniMapNodeStrokeColor(node) {
        return hex(node?.data?.stroke, isGroup(node) ? GROUP_COLORS.stroke : "#1976d2");
      }

      function beginPanelResize(event) {
        event.preventDefault();
      }

      useEffect(() => {
        return () => {
          if (pendingParentFitRef.current) cancelAnimationFrame(pendingParentFitRef.current);
          pendingFitNodeIdsRef.current.clear();
        };
      }, []);

      useEffect(() => {
        function onKeyDown(event) {
          const tag = event.target?.tagName?.toLowerCase();
          const typing = tag === "input" || tag === "textarea" || tag === "select" || event.target?.isContentEditable;
          if (typing) return;
          const mod = event.metaKey || event.ctrlKey;
          const key = event.key.toLowerCase();
          if (mod && key === "z") {
            event.preventDefault();
            if (event.shiftKey) redo();
            else undo();
          }
          if (mod && key === "d") {
            event.preventDefault();
            duplicateSelected();
          }
        }
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
      }, [undo, redo, duplicateSelected]);

      return (
        <div className="app drawer-layout">
          <main className="flow" ref={flowRef}>
            <ReactFlow
              nodes={viewNodes}
              edges={viewEdges}
              defaultEdgeOptions={DEFAULT_EDGE_OPTIONS}
              nodeTypes={nodeTypes}
              edgeTypes={edgeTypes}
              onNodesChange={handleNodesChange}
              onEdgesChange={onEdgesChange}
              onConnect={onConnect}
              onReconnect={onReconnect}
              onNodeDragStart={(_, node) => {
                if (!resizingRef.current) {
                  pushHistory();
                  setDraggingNodeId(node.id);
                }
              }}
              onNodeDrag={(_, node) => {
                if (!resizingRef.current) {
                  scheduleParentFit(node.id);
                }
              }}
              onNodeDragStop={(_, node) => {
                if (!resizingRef.current) {
                  updateParentByPlacement(node);
                  scheduleParentFit(node.id);
                }
                setDraggingNodeId(null);
              }}
              onNodeClick={(_, node) => { setSelection({ type: "node", id: node.id }); }}
              onEdgeClick={(e, edge) => { e.stopPropagation(); setSelection({ type: "edge", id: edge.id }); }}
              onPaneClick={() => { setSelection(null); setAddOpen(false); setDraggingNodeId(null); }}
              defaultViewport={initialData.viewport || { x: 0, y: 0, zoom: 1 }}
              fitView={!initialData.viewport}
              edgesReconnectable
              edgeReconnectRadius={18}
              connectionMode="loose"
              panOnScroll
              zoomOnScroll
              zoomOnPinch
              panOnDrag
              deleteKeyCode={["Backspace", "Delete"]}
              proOptions={{ hideAttribution: true }}
            >
              <Background />
              <svg className="edge-marker-defs" aria-hidden="true" focusable="false">
                <defs>
                  <marker id="edge-marker-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
                  </marker>
                  <marker id="edge-marker-open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                    <path d="M 1 1 L 9 5 L 1 9" fill="none" stroke="#64748b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                  </marker>
                  <marker id="edge-marker-circle" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
                    <circle cx="5" cy="5" r="3.2" fill="#fff" stroke="#64748b" strokeWidth="1.8" />
                  </marker>
                  <marker id="edge-marker-cross" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
                    <path d="M 2 2 L 8 8 M 8 2 L 2 8" stroke="#64748b" strokeWidth="2" strokeLinecap="round" />
                  </marker>
                </defs>
              </svg>
              <Controls position="top-left" />
              {miniMapOpen && (
                <MiniMap
                  pannable
                  zoomable
                  nodeColor={miniMapNodeColor}
                  nodeStrokeColor={miniMapNodeStrokeColor}
                  maskColor="rgba(15,23,42,.08)"
                />
              )}
            </ReactFlow>

            <button className="float-add" onClick={(e) => { e.stopPropagation(); setAddOpen((v) => !v); }}>+</button>
            <button className="float-panel" title="ツール" onClick={(e) => { e.stopPropagation(); setPanelOpen(true); }}>☰</button>
            <button className="float-preview" onClick={() => setPreviewOpen((v) => !v)}>M</button>

            {addOpen && (
              <div className="add-menu" onPointerDown={stop} onClick={stop}>
                <div className="add-menu-title">{selectedGroupId ? `追加先: ${selectedGroupId}` : "追加先: キャンバス中央"}</div>
                <button className="add-item group" onClick={() => { addElement("group", "process", selectedGroupId); setAddOpen(false); }}>サブグラフ</button>
                {SHAPES.map(([value, label]) => (
                  <button key={value} className="add-item" onClick={() => { addElement("shape", value, selectedGroupId); setAddOpen(false); }}>
                    {label}
                  </button>
                ))}
              </div>
            )}

            {previewOpen && (
              <div className="preview-pop">
                <div className="preview-head">
                  <span>Mermaidプレビュー</span>
                  <button className="btn" onClick={() => setPreviewOpen(false)}>閉じる</button>
                </div>
                <div className="preview-body">
                  <MermaidPreview code={mermaidDraft || mermaidCode} />
                </div>
              </div>
            )}

          </main>

          {panelOpen && <div className="drawer-backdrop" onClick={() => setPanelOpen(false)} />}

          <aside className={`panel ${panelOpen ? "open" : ""}`}>
            <div className="drawer-head">
              <span className="panel-mobile-title">ツールエリア</span>
              <button className="btn" onClick={() => setPanelOpen(false)}>閉じる</button>
            </div>
            <div className="stack">
              <section className="section stack">
                <h1 className="title">Core Mermaid Flow Editor V2.6.10</h1>
                <p className="hint">Mermaidを作るための軽量ビジュアルエディタです。</p>
              </section>

              <section className="section stack">
                <div className="grid2">
                  <button className="btn" disabled={!canUndo} onClick={undo}>元に戻す</button>
                  <button className="btn" disabled={!canRedo} onClick={redo}>やり直し</button>
                  <button className="btn" disabled={!selectedNode} onClick={duplicateSelected}>複製</button>
                  <button className="btn danger" disabled={!selection} onClick={deleteSelected}>削除</button>
                  <button className="btn" onClick={reset}>初期化</button>
                  <button className="btn" onClick={clearAutoSave}>保存クリア</button>
                  <button className="btn" onClick={() => setMiniMapOpen((value) => !value)}>{miniMapOpen ? "ミニマップ非表示" : "ミニマップ表示"}</button>
                  <button className="btn" onClick={resolveOverlaps}>重なり解消</button>
                </div>
                <p className="hint">{selection ? `選択中: ${selection.id}` : "未選択"}</p>
                {saveStamp && <p className="hint status-line">{saveStamp}</p>}
              </section>

              <OutlinePanel
                nodes={nodes}
                edges={edges}
                selection={selection}
                onSelectNode={(id) => setSelection({ type: "node", id })}
                onSelectEdge={(id) => setSelection({ type: "edge", id })}
                onFocusNode={focusNode}
                onFocusEdge={focusEdge}
              />

              {selectedNode && (
                <section className="section stack">
                  <div className="field">
                    <label>ラベル</label>
                    <input value={selectedNode.data.label || ""} onChange={(e) => patchNode(selectedNode.id, { label: e.target.value })} />
                  </div>

                  {!isGroup(selectedNode) && (
                    <div className="field">
                      <label>種類</label>
                      <select
                        value={selectedNode.data.shape || "process"}
                        onChange={(e) => {
                          const shape = e.target.value;
                          patchNode(selectedNode.id, { shape, ...COLORS[shape] });
                        }}
                      >
                        {SHAPES.map(([value, label]) => <option key={value} value={value}>{label}</option>)}
                      </select>
                    </div>
                  )}

                  <div className="field">
                    <label>親サブグラフ</label>
                    <select value={selectedNode.parentId || ""} onChange={(e) => setParent(selectedNode.id, e.target.value || null)}>
                      <option value="">なし</option>
                      {groupOptions.map((group) => <option key={group.id} value={group.id}>{group.id}: {group.data.label}</option>)}
                    </select>
                  </div>

                  <div className="grid2">
                    <div className="field">
                      <label>幅 px</label>
                      <input className="size-input" type="number" min={isGroup(selectedNode) ? 240 : 90} value={Math.round(nodeSize(selectedNode).width)} onChange={(e) => setNodeSizeById(selectedNode.id, { width: e.target.value })} />
                    </div>
                    <div className="field">
                      <label>高さ px</label>
                      <input className="size-input" type="number" min={isGroup(selectedNode) ? 150 : 56} value={Math.round(nodeSize(selectedNode).height)} onChange={(e) => setNodeSizeById(selectedNode.id, { height: e.target.value })} />
                    </div>
                    <button className="btn" onClick={() => optimizeNodeSizeById(selectedNode.id)}>{isGroup(selectedNode) ? "子要素にフィット" : "サイズ最適化"}</button>
                    <button className="btn" onClick={() => resetNodeSizeById(selectedNode.id)}>標準サイズ</button>
                  </div>

                  <div className="grid2">
                    <div className="field">
                      <label>塗り</label>
                      <input type="color" value={hex(selectedNode.data.fill, "#ffffff")} onChange={(e) => patchNode(selectedNode.id, { fill: e.target.value })} />
                    </div>
                    <div className="field">
                      <label>枠</label>
                      <input type="color" value={hex(selectedNode.data.stroke, "#555555")} onChange={(e) => patchNode(selectedNode.id, { stroke: e.target.value })} />
                    </div>
                    <div className="field">
                      <label>文字</label>
                      <input type="color" value={hex(selectedNode.data.text, "#111111")} onChange={(e) => patchNode(selectedNode.id, { text: e.target.value })} />
                    </div>
                    <button className="btn" onClick={resetSelectedNodeColors}>初期色</button>
                  </div>
                </section>
              )}

              {selectedEdge && (
                <section className="section stack">
                  <div className="field">
                    <label>線ラベル</label>
                    <input value={selectedEdge.label || ""} onChange={(e) => patchEdge(selectedEdge.id, { label: e.target.value })} />
                  </div>
                  <div className="field">
                    <label>線種</label>
                    <select value={selectedEdge.line || "arrow"} onChange={(e) => patchEdge(selectedEdge.id, { line: e.target.value })}>
                      {LINE_TYPES.map(([value, label]) => <option key={value} value={value}>{label}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label>先端</label>
                    <select value={selectedEdge.marker || "arrow"} onChange={(e) => patchEdge(selectedEdge.id, { marker: e.target.value })}>
                      {EDGE_MARKERS.map(([value, label]) => <option key={value} value={value}>{label}</option>)}
                    </select>
                  </div>
                </section>
              )}

              <section className="section stack">
                <div className="grid2">
                  <button className="btn primary" onClick={async () => { await copyText(mermaidDraft || mermaidCode); show("Mermaidコピー完了"); }}>Mermaidコピー</button>
                  <button className="btn" onClick={async () => { await copyText(JSON.stringify({ version: 2.610, nodes, edges, viewport: flow.getViewport() }, null, 2)); show("JSONコピー完了"); }}>JSONコピー</button>
                </div>
                <div className="grid2">
                  <button className="btn" onClick={importJson}>JSON復元</button>
                  <button className="btn" onClick={importMermaidFlowchart}>Mermaid反映</button>
                </div>
                <div className="grid2">
                  <button className="btn" onClick={exportMermaidSvg}>SVG保存</button>
                  <button className="btn" onClick={() => exportFlowImage("png")}>PNG保存</button>
                  <button className="btn" onClick={() => exportFlowImage("jpg")}>JPG保存</button>
                  <button className="btn" onClick={() => flow.fitView({ padding: 0.18, duration: 250 })}>全体表示</button>
                </div>
                {message && <p className="hint status-line">{message}</p>}
              </section>

              <section className="section stack">
                <div className="field">
                  <label>Mermaidコード</label>
                  <textarea value={mermaidDraft} rows={10} onChange={(e) => setMermaidDraft(e.target.value)} />
                  <div className="mermaid-editor-actions">
                    <button className="btn primary" onClick={importMermaidFlowchart}>Mermaid反映</button>
                    <button className="btn" onClick={() => setMermaidDraft(mermaidCode)}>現在コードに戻す</button>
                  </div>
                </div>
                <MermaidPreview code={mermaidDraft || mermaidCode} />
              </section>
            </div>
          </aside>
        </div>
      );
    }

    function App() {
      return (
        <ReactFlowProvider>
          <Editor />
        </ReactFlowProvider>
      );
    }

    createRoot(document.getElementById("root")).render(<App />);
  
  </script>
</body>
</html>
