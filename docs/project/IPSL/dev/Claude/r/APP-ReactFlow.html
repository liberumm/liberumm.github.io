<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Core Mermaid Flow Editor V2.6.10</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xyflow/react@12.10.2/dist/style.css" />

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/": "https://esm.sh/react@18.3.1/",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "@xyflow/react": "https://esm.sh/@xyflow/react@12.10.2?deps=react@18.3.1,react-dom@18.3.1",
      "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@11.15.0/dist/mermaid.esm.min.mjs",
      "html-to-image": "https://esm.sh/html-to-image@1.11.11"
    }
  }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body, #root {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17202a;
      background: #f5f6f8;
    }
    button, input, select, textarea { font: inherit; }

    .app {
      --panel-width: 360px;
      --splitter-width: 8px;
      height: 100dvh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--splitter-width) var(--panel-width);
      background: #f5f6f8;
    }
    .app.panel-collapsed {
      grid-template-columns: minmax(0, 1fr) 36px 0px;
    }
    .flow {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: #fff;
    }
    .panel {
      min-width: 0;
      overflow: auto;
      padding: 12px;
      border-left: 1px solid #ddd;
      background: #fafafa;
    }
    .app.panel-collapsed .panel {
      padding: 0;
      border-left: 0;
      overflow: hidden;
    }
    .splitter {
      position: relative;
      min-width: 0;
      background: #eef2f7;
      border-left: 1px solid #d8dee8;
      border-right: 1px solid #d8dee8;
      cursor: col-resize;
      display: grid;
      place-items: center;
      z-index: 30;
      touch-action: none;
    }
    .splitter:hover { background: #dde7f3; }
    .splitter::before {
      content: "";
      width: 2px;
      height: 42px;
      border-radius: 999px;
      background: #9aa7b7;
    }
    .splitter-toggle {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 26px;
      height: 34px;
      border: 1px solid #cfd5df;
      border-radius: 10px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
    }
    .panel-mobile-bar {
      display: none;
    }
    .panel-mobile-title {
      font-size: 13px;
      font-weight: 900;
      color: #374151;
    }
    .stack { display: grid; gap: 10px; }
    .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .section {
      padding: 10px;
      border: 1px solid #e1e5eb;
      border-radius: 14px;
      background: #fff;
    }
    .title { margin: 0; font-size: 18px; font-weight: 900; }
    .hint { margin: 0; color: #687789; font-size: 12px; line-height: 1.5; }
    .btn {
      min-height: 36px;
      border: 1px solid #cfd5df;
      border-radius: 10px;
      background: #fff;
      color: #17202a;
      cursor: pointer;
      font-weight: 800;
    }
    .btn.primary { color: #fff; border-color: #1976d2; background: #1976d2; }
    .btn.danger { color: #c62828; border-color: #efb3b3; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .status-line { color: #1976d2; font-weight: 800; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .mini-count {
      color: #687789;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }
    .outline-list { display: grid; gap: 4px; }
    .outline-subtitle {
      margin-top: 4px;
      color: #687789;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .02em;
    }
    .outline-item {
      width: 100%;
      min-height: 30px;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
      border-radius: 9px;
      background: transparent;
      color: #17202a;
      cursor: pointer;
      padding: 5px 7px;
      text-align: left;
      font-size: 12px;
    }
    .outline-item:hover { background: #f3f6fb; border-color: #dce4f0; }
    .outline-item.active { background: #e3f2fd; border-color: #90caf9; color: #0d47a1; font-weight: 900; }
    .outline-icon { text-align: center; opacity: .9; }
    .outline-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .field { display: grid; gap: 4px; }
    .field label { font-size: 12px; font-weight: 800; color: #5f6b7a; }
    .field input, .field select, .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid #cfd5df;
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }
    .field textarea {
      resize: vertical;
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .float-add, .float-panel, .float-preview {
      position: absolute;
      z-index: 20;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 16px;
      color: #fff;
      box-shadow: 0 10px 28px rgba(0,0,0,.22);
      cursor: pointer;
      font-size: 22px;
      font-weight: 900;
    }
    .float-add { left: 12px; top: 50%; transform: translateY(-50%); background: #1976d2; }
    .float-panel { right: 12px; top: 50%; transform: translateY(-50%); background: #374151; display: none; }
    .float-preview { right: 12px; top: 12px; background: #8e24aa; }

    .add-menu {
      position: absolute;
      left: 64px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 22;
      width: 220px;
      padding: 8px;
      border: 1px solid #d8dee8;
      border-radius: 16px;
      background: rgba(255,255,255,.98);
      box-shadow: 0 18px 42px rgba(0,0,0,.22);
      display: grid;
      gap: 6px;
    }
    .add-menu-title {
      padding: 4px 6px;
      font-size: 12px;
      font-weight: 900;
      color: #687789;
    }
    .add-item {
      min-height: 34px;
      border: 1px solid #cfd5df;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      text-align: left;
      padding: 7px 8px;
    }
    .add-item.group {
      color: #6a1b9a;
      border-color: #d8b4fe;
      background: #faf5ff;
    }

    .preview-pop {
      position: absolute;
      inset: 64px 14px 14px auto;
      width: min(620px, calc(100% - 28px));
      z-index: 25;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid #d8dee8;
      border-radius: 18px;
      background: rgba(255,255,255,.96);
      box-shadow: 0 18px 48px rgba(0,0,0,.22);
      overflow: hidden;
    }
    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid #e1e5eb;
      background: #fff;
      font-weight: 900;
    }
    .preview-body, .preview-box {
      overflow: auto;
      background:
        linear-gradient(45deg, #fafafa 25%, transparent 25%),
        linear-gradient(-45deg, #fafafa 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #fafafa 75%),
        linear-gradient(-45deg, transparent 75%, #fafafa 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    }
    .preview-box {
      width: 100%;
      height: 300px;
      border: 1px solid #e1e5eb;
      border-radius: 14px;
    }
    .preview-inner {
      display: inline-block;
      min-width: 100%;
      padding: 18px;
      background: rgba(255,255,255,.7);
      transform-origin: top left;
    }
    .preview-inner svg { max-width: none; height: auto; }

    .shape-node, .group-node { width: 100%; height: 100%; position: relative; }
    .shape-card {
      width: 100%;
      height: 100%;
      min-width: 90px;
      min-height: 56px;
      display: grid;
      place-items: center;
      padding: 12px;
      border: 2px solid var(--stroke, #555);
      background: var(--fill, #fff);
      color: var(--text, #111);
      box-shadow: 0 8px 22px rgba(0,0,0,.14);
      text-align: center;
      overflow: hidden;
    }
    .shape-card.selected {
      box-shadow: 0 0 0 4px rgba(25,118,210,.22), 0 12px 28px rgba(0,0,0,.2);
    }
    .shape-process { border-radius: 8px; }
    .shape-start, .shape-end { border-radius: 999px; }
    .shape-decision { clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); }
    .shape-db { border-radius: 48% / 18%; }
    .shape-io { clip-path: polygon(14% 0, 100% 0, 86% 100%, 0 100%); }
    .shape-subroutine {
      border-radius: 8px;
      box-shadow:
        inset 10px 0 0 rgba(0,0,0,.12),
        inset -10px 0 0 rgba(0,0,0,.12),
        0 8px 22px rgba(0,0,0,.14);
    }
    .shape-prepare { clip-path: polygon(24% 0, 76% 0, 100% 50%, 76% 100%, 24% 100%, 0 50%); }
    .shape-text { border-color: transparent; background: transparent !important; box-shadow: none; }

    .group-box {
      width: 100%;
      height: 100%;
      border: 2px dashed var(--stroke, #8e24aa);
      border-radius: 18px;
      background: var(--fill, rgba(243,229,245,.38));
      color: var(--text, #4a148c);
      overflow: hidden;
    }
    .group-title {
      position: absolute;
      left: 12px;
      top: 8px;
      max-width: calc(100% - 24px);
      border: 0;
      outline: 0;
      background: rgba(255,255,255,.82);
      border-radius: 8px;
      padding: 4px 8px;
      color: inherit;
      font-weight: 900;
      font-size: 13px;
      z-index: 2;
    }
    .node-label {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: inherit;
      text-align: center;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
      resize: none;
      overflow: hidden;
      padding: 0;
    }
    .rf-handle {
      width: 10px !important;
      height: 10px !important;
      border: 2px solid #fff !important;
      background: #1976d2 !important;
      z-index: 5;
    }
    .react-flow__resize-control.handle.touch-resize-handle {
      width: 16px !important;
      height: 16px !important;
      border: 2px solid #fff !important;
      border-radius: 999px !important;
      background: #1976d2 !important;
      pointer-events: all !important;
      touch-action: none !important;
      z-index: 20 !important;
    }
    .react-flow__resize-control.line.touch-resize-line {
      border-color: #1976d2 !important;
      pointer-events: all !important;
      touch-action: none !important;
      z-index: 19 !important;
    }

    .edge-label {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: max-content;
      max-width: min(260px, 70vw);
      border-radius: 999px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 4px 14px rgba(0,0,0,.16);
      pointer-events: all;
    }
    .edge-label.badge {
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid #d8dee8;
      color: #374151;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.25;
      white-space: nowrap;
    }
    .edge-label.badge span {
      display: block;
      max-width: min(240px, 64vw);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .edge-label.editing {
      padding: 3px;
      border-radius: 9px;
    }
    .edge-label input {
      width: auto;
      min-width: 56px;
      max-width: min(220px, 62vw);
      height: 24px;
      border: 1px solid #ccd3dd;
      border-radius: 6px;
      font-size: 12px;
      padding: 2px 6px;
    }

    @media (max-width: 760px) {
      .app, .app.panel-collapsed { display: block; height: 100dvh; }
      .splitter { display: none; }
      .flow { width: 100%; height: 100dvh; }
      .app.panel-collapsed .panel {
        padding: 12px;
        border: 1px solid #d8dee8;
        overflow: auto;
      }
      .panel {
        position: fixed;
        left: 8px;
        right: 8px;
        bottom: max(8px, env(safe-area-inset-bottom));
        z-index: 40;
        height: min(56dvh, 430px);
        border: 1px solid #d8dee8;
        border-radius: 18px;
        background: rgba(255,255,255,.98);
        box-shadow: 0 -12px 36px rgba(0,0,0,.22);
        transform: translateY(calc(100% - 46px));
        transition: transform .2s ease;
      }
      .panel.open { transform: translateY(0); }
      .panel-mobile-bar {
        position: sticky;
        top: 0;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        cursor: pointer;
        min-height: 42px;
        margin: -12px -12px 10px;
        padding: 6px 8px 6px 12px;
        border-bottom: 1px solid #e1e5eb;
        background: rgba(255,255,255,.98);
        border-radius: 18px 18px 0 0;
      }
      .float-panel { display: block; z-index: 55; }
      .add-menu {
        left: 60px;
        width: min(260px, calc(100vw - 76px));
        max-height: 70dvh;
        overflow: auto;
      }
      .preview-pop { inset: 64px 8px 8px 8px; width: auto; }
    }
  

    /* V2.5.5: all-device right drawer, stable editor layers, and node action menus */
    .app, .app.panel-collapsed {
      height: 100dvh;
      display: block !important;
      background: #f5f6f8;
    }
    .flow {
      width: 100%;
      height: 100dvh;
    }
    .splitter { display: none !important; }
    .panel {
      position: fixed !important;
      left: auto !important;
      top: 0 !important;
      bottom: 0 !important;
      right: 0 !important;
      z-index: 90 !important;
      width: min(390px, 86vw) !important;
      height: 100dvh !important;
      min-width: 0;
      padding: 12px !important;
      border: 0 !important;
      border-left: 1px solid #d8dee8 !important;
      border-radius: 18px 0 0 18px !important;
      background: rgba(255,255,255,.98) !important;
      box-shadow: -16px 0 42px rgba(0,0,0,.22) !important;
      overflow: auto !important;
      transform: translateX(105%) !important;
      transition: transform .2s ease !important;
    }
    .panel.open { transform: translateX(0) !important; }
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(15,23,42,.22);
      backdrop-filter: blur(1px);
    }
    .drawer-head {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 42px;
      margin: -12px -12px 10px;
      padding: 8px 10px 8px 12px;
      border-bottom: 1px solid #e1e5eb;
      background: rgba(255,255,255,.98);
      border-radius: 18px 0 0 0;
    }
    .panel-mobile-bar { display: none !important; }
    .float-panel {
      display: block !important;
      left: auto !important;
      right: 12px !important;
      top: 12px !important;
      transform: none !important;
      z-index: 70 !important;
      background: #374151 !important;
    }
    .float-add {
      left: 12px !important;
      top: 72px !important;
      transform: none !important;
      z-index: 60 !important;
    }
    .float-preview {
      right: 12px !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      z-index: 60 !important;
    }
    .add-menu {
      left: 64px !important;
      top: 72px !important;
      transform: none !important;
      z-index: 75 !important;
    }
    .preview-pop { z-index: 100 !important; }
    .react-flow__controls {
      left: 12px !important;
      top: 132px !important;
      bottom: auto !important;
      z-index: 50 !important;
    }
    .react-flow__minimap {
      z-index: 44 !important;
    }
    /* V2.5.28 layer model.
       Connector SVG and normal connector labels stay in the official edge SVG layer.
       EdgeLabelRenderer is used only for interactive editing.
       Node order is controlled by node.zIndex; app UI is controlled by CSS. */
    .react-flow__edgelabel-renderer {
      position: absolute !important;
      z-index: 56 !important;
      pointer-events: none !important;
    }
    .edge-label {
      position: absolute !important;
      z-index: 56 !important;
      pointer-events: all !important;
    }
    .edge-label.lifted,
    .edge-label.editing {
      z-index: 58 !important;
    }
    .rf-handle { z-index: 62 !important; }
    .react-flow__resize-control.handle.touch-resize-handle { z-index: 64 !important; }
    .react-flow__resize-control.line.touch-resize-line { z-index: 63 !important; }
    .shape-card, .group-box { position: relative; z-index: 1; }
    .edge-editor {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.96);
      border: 1px solid #d8dee8;
      box-shadow: 0 8px 20px rgba(0,0,0,.18);
      pointer-events: all;
    }
    .edge-editor input {
      width: auto;
      min-width: 56px;
      height: 26px;
      border: 1px solid #ccd3dd;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
    }
    .react-flow__minimap {
      right: 12px !important;
      bottom: 12px !important;
      z-index: 45 !important;
      border: 1px solid #d8dee8;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,.18);
      background: rgba(255,255,255,.94);
    }
    @media (max-width: 760px) {
      .react-flow__minimap {
        width: 132px !important;
        height: 96px !important;
        right: 8px !important;
        bottom: 8px !important;
      }
    }
    .size-input {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }


    /* V2.6.1: React Flow standard toolbar integration */
    .node-toolbar-ui, .edge-toolbar-ui {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      border: 1px solid #d8dee8;
      border-radius: 999px;
      background: rgba(255,255,255,.98);
      box-shadow: 0 10px 28px rgba(0,0,0,.18);
      pointer-events: all;
    }
    .node-toolbar-ui button, .edge-toolbar-ui button, .edge-toolbar-ui select {
      min-width: 30px;
      height: 30px;
      border: 1px solid #cfd5df;
      border-radius: 999px;
      background: #fff;
      color: #17202a;
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }
    .edge-toolbar-ui select, .node-toolbar-ui select {
      width: auto;
      min-width: 76px;
      padding: 0 8px;
      border-radius: 10px;
    }
    .node-toolbar-ui select { min-width: 96px; }
    .node-toolbar-ui .danger, .edge-toolbar-ui .danger {
      color: #c62828;
      border-color: #efb3b3;
    }


    .edge-marker-defs {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    /* V2.6.4: lightweight official-style context menu and editable Mermaid source */
    @media (max-width: 760px) {
      .node-toolbar-ui button, .edge-toolbar-ui button, .edge-toolbar-ui select {
        min-width: 36px;
        height: 36px;
        font-size: 13px;
      }
    }

  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">

    import React, { useCallback, useEffect, useMemo, useRef, useState } from "react";
    import { createRoot } from "react-dom/client";
    import {
      ReactFlow,
      ReactFlowProvider,
      Background,
      Controls,
      MiniMap,
      NodeToolbar,
      EdgeToolbar,
      NodeResizer,
      BaseEdge,
      EdgeText,
      EdgeLabelRenderer,
      Handle,
      Position,
      addEdge,
      reconnectEdge,
      applyNodeChanges,
      getBezierPath,
      getNodesBounds,
      getViewportForBounds,
      useEdgesState,
      useNodesState,
      useReactFlow
    } from "@xyflow/react";
    import mermaid from "mermaid";
    import { toPng, toJpeg } from "html-to-image";

    mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "loose" });

    const SIDES = ["top", "right", "bottom", "left"];
    const POS = { top: Position.Top, right: Position.Right, bottom: Position.Bottom, left: Position.Left };
    const AUTO_EXPAND_EDGE = 48;
    const AUTO_EXPAND_PADDING = 80;
    const GROUP_PADDING = { left: 36, top: 64, right: 44, bottom: 44 };
    const STORAGE_KEY = "core-mermaid-flow-editor-v2";
    const UI_STORAGE_KEY = "core-mermaid-flow-editor-v2-ui";
    const HISTORY_LIMIT = 30;
    const DRAWER_STORAGE_KEY = "core-mermaid-flow-editor-v2-drawer";

    const SHAPES = [
      ["process", "処理"],
      ["start", "開始/終了"],

    const LINE_TYPES = [
      ["arrow", "通常"],

    const EDGE_MARKERS = [
      ["arrow", "矢印"],

    const EDGE_MARKER_IDS = {

    function edgeMarkerEnd(marker) {

    const COLORS = {

      ["blue", "青", { fill: "#e3f2fd", stroke: "#1976d2", text: "#0d47a1" }],
      ["green", "緑", { fill: "#e8f5e9", stroke: "#2e7d32", text: "#1b5e20" }],

    ];

    const initialNodes = [
      {
        id: "G1",
        type: "groupNode",
        position: { x: 60, y: 70 },

    const initialEdges = [
      { id: "A-B", source: "A", target: "B", sourceHandle: "right", targetHandle: "left", label: "実行", line: "arrow", marker: "arrow", zIndex: 5, reconnectable: true }
    ];

    const DEFAULT_EDGE_OPTIONS = {
      zIndex: 5,
      reconnectable: true
    };

    function hex(value, fallback) {
      return /^#[0-9a-f]{6}$/i.test(value || "") ? value : fallback;
    }

    function safeText(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/"/g, "'")
        .replace(/\|/g, "/")
        .replace(/\r?\n/g, "<br/>");
    }

    function safeId(value) {
      return /^[A-Za-z][A-Za-z0-9_]*$/.test(value);
    }

    function isGroup(node) {
      return node?.type === "groupNode";
    }

    function applyParentExtent(node) {
      if (node?.parentId) return { ...node, extent: "parent", expandParent: true };
      if (!node) return node;
      if (node.extent === undefined && node.expandParent === undefined) return node;
      const { extent, expandParent, ...rest } = node;
      return rest;
    }

    function applyParentExtents(nodes) {
      return nodes.map((node) => applyParentExtent(node));
    }

    function nextId(nodes, prefix) {
      let n = 1;
      while (nodes.some((node) => node.id === `${prefix}${n}`)) n += 1;
      return `${prefix}${n}`;
    }

    function nodeSize(node) {
      const styleWidth = Number(node?.style?.width || 0);
      const styleHeight = Number(node?.style?.height || 0);
      const runtimeWidth = Number(node?.width || node?.measured?.width || 0);
      const runtimeHeight = Number(node?.height || node?.measured?.height || 0);

      if (isGroup(node)) {
        return {
          width: Math.max(styleWidth || 0, runtimeWidth || 0, 240),
          height: Math.max(styleHeight || 0, runtimeHeight || 0, 150)
        };
      }

      return {
        width: styleWidth || runtimeWidth || 160,
        height: styleHeight || runtimeHeight || 80
      };
    }

    function absolutePosition(node, allNodes) {
      let x = node.position.x;
      let y = node.position.y;
      let parentId = node.parentId;
      while (parentId) {
        const parent = allNodes.find((item) => item.id === parentId);
        if (!parent) break;
        x += parent.position.x;
        y += parent.position.y;
        parentId = parent.parentId;
      }
      return { x, y };
    }

    function nodeBounds(node, allNodes) {
      const pos = absolutePosition(node, allNodes);
      const size = nodeSize(node);
      return { x: pos.x, y: pos.y, width: size.width, height: size.height, right: pos.x + size.width, bottom: pos.y + size.height };
    }

    function containsPoint(bounds, point, margin = 0) {
      return point.x >= bounds.x - margin && point.x <= bounds.right + margin && point.y >= bounds.y - margin && point.y <= bounds.bottom + margin;
    }

    function depthOf(node, allNodes) {
      let depth = 0;
      let parentId = node.parentId;
      while (parentId) {
        const parent = allNodes.find((item) => item.id === parentId);
        if (!parent) break;
        depth += 1;
        parentId = parent.parentId;
      }
      return depth;
    }

    function sortNodes(nodes) {
      return [...nodes].sort((a, b) => depthOf(a, nodes) - depthOf(b, nodes));
    }

    function collectDescendants(id, allNodes) {
      const ids = new Set([id]);
      let changed = true;
      while (changed) {
        changed = false;
        allNodes.forEach((node) => {
          if (node.parentId && ids.has(node.parentId) && !ids.has(node.id)) {
            ids.add(node.id);
            changed = true;
          }
        });
      }
      return ids;
    }


    function groupChildrenBounds(allNodes, groupId) {
      const children = allNodes.filter((node) => node.parentId === groupId);
      if (!children.length) return null;
      return {
        minX: Math.min(...children.map((node) => node.position.x)),
        minY: Math.min(...children.map((node) => node.position.y)),
        maxX: Math.max(...children.map((node) => node.position.x + nodeSize(node).width)),
        maxY: Math.max(...children.map((node) => node.position.y + nodeSize(node).height))
      };
    }

    function constrainedGroupSize(allNodes, groupId, requestedSize) {
      const bounds = groupChildrenBounds(allNodes, groupId);
      const minSize = { width: 240, height: 150 };
      if (!bounds) {
        return {
          width: Math.max(minSize.width, Number(requestedSize.width || minSize.width)),
          height: Math.max(minSize.height, Number(requestedSize.height || minSize.height))
        };
      }
      return {
        width: Math.max(Number(requestedSize.width || 0), bounds.maxX + GROUP_PADDING.right, minSize.width),
        height: Math.max(Number(requestedSize.height || 0), bounds.maxY + GROUP_PADDING.bottom, minSize.height)
      };
    }

    function fitGroupToChildren(allNodes, groupId, options = {}) {
      const group = allNodes.find((node) => node.id === groupId);
      if (!isGroup(group)) return allNodes;

      const bounds = groupChildrenBounds(allNodes, groupId);
      if (!bounds) return allNodes;

      const shrink = Boolean(options.shrink);
      const groupSize = nodeSize(group);
      const padding = GROUP_PADDING;
      const minSize = { width: 240, height: 150 };
      const { minX, minY, maxX, maxY } = bounds;

      const parentDeltaX = shrink ? (minX - padding.left) : Math.min(0, minX - padding.left);
      const parentDeltaY = shrink ? (minY - padding.top) : Math.min(0, minY - padding.top);
      const childShiftX = -parentDeltaX;
      const childShiftY = -parentDeltaY;

      // Exact fit must consider both sides.
      // left/top are handled by moving the parent and shifting children.
      // right/bottom are handled by recomputing width/height from the full child bounds.
      const exactWidth = (maxX - minX) + padding.left + padding.right;
      const exactHeight = (maxY - minY) + padding.top + padding.bottom;
      const growWidth = Math.max(groupSize.width - parentDeltaX, maxX + childShiftX + padding.right);
      const growHeight = Math.max(groupSize.height - parentDeltaY, maxY + childShiftY + padding.bottom);
      const width = Math.max(shrink ? exactWidth : growWidth, minSize.width);
      const height = Math.max(shrink ? exactHeight : growHeight, minSize.height);

      if (parentDeltaX === 0 && parentDeltaY === 0 && width === groupSize.width && height === groupSize.height) return allNodes;

      return allNodes.map((node) => {
        if (node.id === groupId) {
          return {
            ...node,
            position: { x: node.position.x + parentDeltaX, y: node.position.y + parentDeltaY },
            style: { ...node.style, width, height }
          };
        }
        if (node.parentId === groupId && (childShiftX || childShiftY)) {
          return {
            ...node,
            position: { x: node.position.x + childShiftX, y: node.position.y + childShiftY }
          };
        }
        return node;
      });
    }

    function fitAncestorGroups(allNodes, parentId, options = {}) {
      let next = allNodes;
      let currentParentId = parentId;
      const seen = new Set();

      while (currentParentId && !seen.has(currentParentId)) {
        seen.add(currentParentId);
        next = fitGroupToChildren(next, currentParentId, options);
        const parent = next.find((node) => node.id === currentParentId);
        currentParentId = parent?.parentId || null;
      }

      return sortNodes(next);
    }

    function fitGroupTreeToChildren(allNodes, groupId, options = {}) {
      let next = allNodes;
      const groupIds = Array.from(collectDescendants(groupId, next))
        .map((id) => next.find((node) => node.id === id))
        .filter((node) => isGroup(node))
        .sort((a, b) => depthOf(b, next) - depthOf(a, next));

      groupIds.forEach((group) => {
        next = fitGroupToChildren(next, group.id, options);
      });

      const group = next.find((node) => node.id === groupId);
      return group?.parentId ? fitAncestorGroups(next, group.parentId, options) : sortNodes(next);
    }

    function fitAllGroupsToChildren(allNodes, options = {}) {
      let next = allNodes;
      const groupIds = next
        .filter((node) => isGroup(node))
        .sort((a, b) => depthOf(b, next) - depthOf(a, next))
        .map((node) => node.id);

      groupIds.forEach((groupId) => {
        next = fitGroupToChildren(next, groupId, options);
      });

      return sortNodes(next);
    }

    function rectsOverlap(a, b, gap = 16) {
      return !(a.right + gap <= b.x || b.right + gap <= a.x || a.bottom + gap <= b.y || b.bottom + gap <= a.y);
    }

    function resolveNodeCollisions(allNodes, scopeParentId = null) {
      let next = [...allNodes];
      const parents = new Set();

      if (scopeParentId !== undefined) {
        parents.add(scopeParentId || "__root__");
      } else {
        next.forEach((node) => parents.add(node.parentId || "__root__"));
      }

      parents.forEach((parentKey) => {
        const parentId = parentKey === "__root__" ? null : parentKey;
        const items = next
          .filter((node) => (node.parentId || null) === parentId)
          .filter((node) => !isGroup(node) || !parentId)
          .sort((a, b) => a.position.y - b.position.y || a.position.x - b.position.x);

        for (let i = 0; i < items.length; i += 1) {
          const a = items[i];
          const aSize = nodeSize(a);
          const aRect = { x: a.position.x, y: a.position.y, right: a.position.x + aSize.width, bottom: a.position.y + aSize.height };
          for (let j = i + 1; j < items.length; j += 1) {
            const b = items[j];
            const bSize = nodeSize(b);
            const bRect = { x: b.position.x, y: b.position.y, right: b.position.x + bSize.width, bottom: b.position.y + bSize.height };
            if (!rectsOverlap(aRect, bRect, 18)) continue;
            const dx = Math.max(36, aRect.right - bRect.x + 32);
            const dy = Math.max(24, aRect.bottom - bRect.y + 24);
            const moveRight = dx <= dy * 1.4;
            b.position = {
              x: b.position.x + (moveRight ? dx : 0),
              y: b.position.y + (moveRight ? 0 : dy)
            };
            bRect.x = b.position.x;
            bRect.y = b.position.y;
            bRect.right = b.position.x + bSize.width;
            bRect.bottom = b.position.y + bSize.height;
          }
        }

        next = next.map((node) => {
          const moved = items.find((item) => item.id === node.id);
          return moved ? { ...node, position: { ...moved.position } } : node;
        });

        if (parentId) next = fitAncestorGroups(next, parentId, { shrink: false });
      });

      return sortNodes(applyParentExtents(next));
    }

    function mergeLiveNode(allNodes, liveNode) {
      if (!liveNode?.id) return allNodes;
      return allNodes.map((node) => {
        if (node.id !== liveNode.id) return node;
        return {
          ...node,
          position: liveNode.position ? { ...liveNode.position } : node.position,
          width: liveNode.width || node.width,
          height: liveNode.height || node.height,
          measured: liveNode.measured || node.measured
        };
      });
    }

    function cloneData(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, Number(value) || min));
    }

    function loadUiState() {
      try {
        const data = JSON.parse(localStorage.getItem(DRAWER_STORAGE_KEY) || "{}");
        return { drawerOpen: Boolean(data.drawerOpen) };
      } catch {
        return { drawerOpen: false };
      }
    }

    function shapeIcon(node) {
      if (isGroup(node)) return "▣";
      const shape = node.data?.shape || "process";
      if (shape === "decision") return "◇";
      if (shape === "start") return "○";
      if (shape === "db") return "◉";
      if (shape === "io") return "▱";
      if (shape === "subroutine") return "▣";
      if (shape === "prepare") return "⬢";
      if (shape === "text") return "T";
      return "▭";
    }

    function nodeLine(node, indent) {
      const id = node.id;
      const label = safeText(node.data.label || node.id);
      const shape = node.data.shape || "process";
      if (shape === "start") return `${indent}${id}([${label}])`;
      if (shape === "decision") return `${indent}${id}{${label}}`;
      if (shape === "db") return `${indent}${id}[(${label})]`;
      if (shape === "io") return `${indent}${id}[/${label}/]`;
      if (shape === "subroutine") return `${indent}${id}[[${label}]]`;
      if (shape === "prepare") return `${indent}${id}{{${label}}}`;
      if (shape === "text") return `${indent}${id}["${label}"]`;
      return `${indent}${id}[${label}]`;
    }

    function edgeLine(edge) {
      const label = safeText(edge.label || "");
      const line = edge.line || "arrow";
      const marker = edge.marker || "arrow";
      if (marker === "circle") return label ? `  ${edge.source} --o|${label}| ${edge.target}` : `  ${edge.source} --o ${edge.target}`;
      if (marker === "cross") return label ? `  ${edge.source} --x|${label}| ${edge.target}` : `  ${edge.source} --x ${edge.target}`;
      if (marker === "none") return label ? `  ${edge.source} ---|${label}| ${edge.target}` : `  ${edge.source} --- ${edge.target}`;
      if (line === "dotted") return label ? `  ${edge.source} -. ${label} .-> ${edge.target}` : `  ${edge.source} -.-> ${edge.target}`;
      if (line === "thick") return label ? `  ${edge.source} == ${label} ==> ${edge.target}` : `  ${edge.source} ==> ${edge.target}`;
      return label ? `  ${edge.source} -->|${label}| ${edge.target}` : `  ${edge.source} --> ${edge.target}`;
    }

    function normalizeData(data) {
      const allowedShapes = new Set(SHAPES.map(([value]) => value));
      const allowedLines = new Set(LINE_TYPES.map(([value]) => value));
      const allowedMarkers = new Set(EDGE_MARKERS.map(([value]) => value));
      const rawNodes = Array.isArray(data?.nodes) ? data.nodes : [];

      const safeNodes = rawNodes
        .filter((node) => safeId(node?.id))
        .map((node) => {
          const group = node.type === "groupNode";
          const shape = allowedShapes.has(node.data?.shape) ? node.data.shape : "process";
          const baseColors = group ? GROUP_COLORS : (COLORS[shape] || COLORS.process);
          return {
            ...node,
            type: group ? "groupNode" : "shapeNode",
            position: {
              x: Number(node.position?.x || 0),
              y: Number(node.position?.y || 0)
            },
            style: {
              ...(node.style || {}),
              width: Math.max(group ? 240 : 90, Number(node.style?.width || (group ? 400 : 160))),
              height: Math.max(group ? 150 : 56, Number(node.style?.height || (group ? 220 : 80)))
            },
            data: {
              label: String(node.data?.label || node.id),
              ...(group ? {} : { shape }),
              fill: hex(node.data?.fill, baseColors.fill),
              stroke: hex(node.data?.stroke, baseColors.stroke),
              text: hex(node.data?.text, baseColors.text)
            }
          };
        });

      const ids = new Set(safeNodes.map((node) => node.id));
      const byId = new Map(safeNodes.map((node) => [node.id, node]));

      function hasParentCycle(node, parentId) {
        const seen = new Set([node.id]);
        let current = parentId;
        while (current) {
          if (seen.has(current)) return true;
          seen.add(current);
          current = byId.get(current)?.parentId;
        }
        return false;
      }

      const fixedNodes = safeNodes.map((node) => {
        const parentId = node.parentId;
        if (!parentId || !ids.has(parentId) || parentId === node.id || hasParentCycle(node, parentId)) {
          const { parentId: _removed, extent: _removedExtent, expandParent: _removedExpandParent, ...rest } = node;
          return rest;
        }
        return { ...node, extent: "parent", expandParent: true };
      });

      const fixedIds = new Set(fixedNodes.map((node) => node.id));
      const rawEdges = Array.isArray(data?.edges) ? data.edges : [];
      const fixedEdges = rawEdges
        .filter((edge) => safeId(edge?.source) && safeId(edge?.target) && fixedIds.has(edge.source) && fixedIds.has(edge.target))
        .map((edge, index) => ({
          ...edge,
          id: edge.id || `${edge.source}-${edge.target}-${index}`,
          label: String(edge.label || ""),
          line: allowedLines.has(edge.line) ? edge.line : "arrow",
          marker: allowedMarkers.has(edge.marker) ? edge.marker : "arrow",
          zIndex: Number.isFinite(Number(edge.zIndex)) ? Number(edge.zIndex) : DEFAULT_EDGE_OPTIONS.zIndex,
          reconnectable: true
        }));

      return { nodes: sortNodes(applyParentExtents(fixedNodes)), edges: fixedEdges };
    }

    function sanitizeViewport(value) {
      if (!value) return null;
      const x = Number(value.x);
      const y = Number(value.y);
      const zoom = Number(value.zoom);
      if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(zoom)) return null;
      return { x, y, zoom: clamp(zoom, 0.1, 2.5) };
    }

    function loadInitialData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { nodes: initialNodes, edges: initialEdges, viewport: null, restored: false };
        const parsed = JSON.parse(raw);
        const fixed = normalizeData(parsed);
        if (!fixed.nodes.length) throw new Error("empty");
        return { ...fixed, viewport: sanitizeViewport(parsed.viewport), restored: true };
      } catch {
        return { nodes: initialNodes, edges: initialEdges, viewport: null, restored: false };
      }
    }

    function toMermaid(nodes, edges) {
      const byParent = new Map();
      const roots = [];
      const ids = new Set(nodes.map((node) => node.id));

      nodes.forEach((node) => {
        if (node.parentId && ids.has(node.parentId)) {
          if (!byParent.has(node.parentId)) byParent.set(node.parentId, []);
          byParent.get(node.parentId).push(node);
        } else {
          roots.push(node);
        }
      });

      function emit(node, level) {
        const indent = "  ".repeat(level);
        if (isGroup(node)) {
          const lines = [`${indent}subgraph ${node.id}["${safeText(node.data.label || node.id)}"]`];
          (byParent.get(node.id) || []).forEach((child) => lines.push(...emit(child, level + 1)));
          lines.push(`${indent}end`);
          return lines;
        }
        return [nodeLine(node, indent)];
      }

      const lines = ["flowchart TD"];
      roots.forEach((node) => lines.push(...emit(node, 1)));

      edges.forEach((edge) => {
        lines.push(edgeLine(edge));
      });

      nodes.forEach((node) => {
        const fill = hex(node.data.fill, "#ffffff");
        const stroke = hex(node.data.stroke, "#555555");
        const color = hex(node.data.text, "#111111");
        if (isGroup(node)) {
          lines.push(`  style ${node.id} fill:${fill},stroke:${stroke},color:${color};`);
        } else {
          const cls = `cls_${node.id.replace(/[^A-Za-z0-9_]/g, "_")}`;
          lines.push(`  classDef ${cls} fill:${fill},stroke:${stroke},color:${color};`);
          lines.push(`  class ${node.id} ${cls};`);
        }
      });

      return lines.join("\n");
    }


    function cleanMermaidLabel(value) {
      return String(value || "")
        .trim()
        .replace(/^"|"$/g, "")
        .replace(/^'|'$/g, "")
        .replace(/<br\s*\/?\s*>/gi, "\n");
    }

    function parseMermaidNodeToken(token) {
      const text = String(token || "").trim().replace(/;$/, "");
      const match = text.match(/^([A-Za-z][A-Za-z0-9_]*)(.*)$/);
      if (!match) return null;
      const id = match[1];
      const rest = match[2].trim();
      if (!rest) return { id, label: id, shape: "process" };

      const pairs = [
        [/^\(\[([\s\S]*)\]\)$/, "start"],
        [/^\[\(([\s\S]*)\)\]$/, "db"],
        [/^\[\/([\s\S]*)\/\]$/, "io"],
        [/^\[\[([\s\S]*)\]\]$/, "subroutine"],
        [/^\{\{([\s\S]*)\}\}$/, "prepare"],
        [/^\{([\s\S]*)\}$/, "decision"],
        [/^\["([\s\S]*)"\]$/, "text"],
        [/^\[([\s\S]*)\]$/, "process"],
        [/^\(([\s\S]*)\)$/, "start"]
      ];
      for (const [regex, shape] of pairs) {
        const found = rest.match(regex);
        if (found) return { id, label: cleanMermaidLabel(found[1]), shape };
      }
      return { id, label: id, shape: "process" };
    }

    function parseMermaidEdgeLine(line) {
      const trimmed = String(line || "").trim().replace(/;$/, "");
      let match = trimmed.match(/^(.+?)\s*-\.\s*(.*?)\s*\.->\s*(.+)$/);
      if (match) return { source: match[1].trim(), target: match[3].trim(), label: cleanMermaidLabel(match[2]), line: "dotted", marker: "arrow" };
      match = trimmed.match(/^(.+?)\s*==\s*(.*?)\s*==>\s*(.+)$/);
      if (match) return { source: match[1].trim(), target: match[3].trim(), label: cleanMermaidLabel(match[2]), line: "thick", marker: "arrow" };
      match = trimmed.match(/^(.+?)\s*(-->|-.->|==>|--o|--x|---)\s*(?:\|([^|]*)\|\s*)?(.+)$/);
      if (!match) return null;
      const op = match[2];
      return {
        source: match[1].trim(),
        target: match[4].trim(),
        label: cleanMermaidLabel(match[3] || ""),
        line: op === "-.->" ? "dotted" : (op === "==>" ? "thick" : "arrow"),
        marker: op === "--o" ? "circle" : (op === "--x" ? "cross" : (op === "---" ? "none" : "arrow"))
      };
    }

    function flowchartHandles(direction) {
      const dir = String(direction || "TD").toUpperCase();
      if (dir === "LR") return { sourceHandle: "right", targetHandle: "left" };
      if (dir === "RL") return { sourceHandle: "left", targetHandle: "right" };
      if (dir === "BT") return { sourceHandle: "top", targetHandle: "bottom" };
      return { sourceHandle: "bottom", targetHandle: "top" };
    }

    function parseFlowchartMermaid(code) {
      const nodeMap = new Map();
      const edges = [];
      const stack = [];
      const counts = new Map();
      let groupCount = 1;
      let graphDirection = "TD";

      function parentId() {
        return stack.length ? stack[stack.length - 1] : null;
      }
      function nextPosition(parent) {
        const key = parent || "__root__";
        const index = counts.get(key) || 0;
        counts.set(key, index + 1);
        const horizontal = graphDirection === "LR" || graphDirection === "RL";
        if (parent) {
          return horizontal
            ? { x: GROUP_PADDING.left + Math.floor(index / 3) * 220, y: GROUP_PADDING.top + (index % 3) * 120 }
            : { x: GROUP_PADDING.left + (index % 3) * 220, y: GROUP_PADDING.top + Math.floor(index / 3) * 120 };
        }
        return horizontal
          ? { x: 80 + Math.floor(index / 3) * 240, y: 80 + (index % 3) * 140 }
          : { x: 80 + (index % 3) * 240, y: 80 + Math.floor(index / 3) * 140 };
      }
      function ensureNode(token, preferredParent = parentId()) {
        const parsed = parseMermaidNodeToken(token);
        if (!parsed || !safeId(parsed.id)) return null;
        const existing = nodeMap.get(parsed.id);
        if (existing) {
          if (parsed.label && parsed.label !== parsed.id) existing.data.label = parsed.label;
          if (parsed.shape) existing.data.shape = parsed.shape;
          return existing;
        }
        const colors = COLORS[parsed.shape] || COLORS.process;
        const node = {
          id: parsed.id,
          type: "shapeNode",
          parentId: preferredParent || undefined,
          extent: preferredParent ? "parent" : undefined,
          expandParent: Boolean(preferredParent),
          position: nextPosition(preferredParent),
          style: { width: 160, height: 80 },
          data: { label: parsed.label || parsed.id, shape: parsed.shape || "process", ...colors }
        };
        nodeMap.set(node.id, node);
        return node;
      }
      function addGroup(id, label) {
        const preferredParent = parentId();
        const safeGroupId = safeId(id) ? id : `G${groupCount++}`;
        if (!nodeMap.has(safeGroupId)) {
          nodeMap.set(safeGroupId, {
            id: safeGroupId,
            type: "groupNode",
            parentId: preferredParent || undefined,
            extent: preferredParent ? "parent" : undefined,
            expandParent: Boolean(preferredParent),
            position: nextPosition(preferredParent),
            style: { width: 420, height: 240 },
            data: { label: cleanMermaidLabel(label || safeGroupId), ...GROUP_COLORS }
          });
        }
        stack.push(safeGroupId);
      }

      String(code || "").split(/\r?\n/).forEach((raw) => {
        let line = raw.trim();
        if (!line || line.startsWith("%%")) return;
        const graphLine = line.match(/^(flowchart|graph)\s+(TD|TB|BT|LR|RL)\b/i);
        if (graphLine) {
          graphDirection = graphLine[2].toUpperCase() === "TB" ? "TD" : graphLine[2].toUpperCase();
          return;
        }
        if (/^(flowchart|graph)\s+/i.test(line)) return;
        if (/^(classDef|class|style)\s+/i.test(line)) return;
        if (/^end\b/i.test(line)) { stack.pop(); return; }

        const sub = line.match(/^subgraph\s+([A-Za-z][A-Za-z0-9_]*)(?:\s*\[\s*"?([^"\]]*)"?\s*\])?/i)
          || line.match(/^subgraph\s+"?([^"\]]+)"?/i);
        if (sub) {
          const id = safeId(sub[1]) ? sub[1] : `G${groupCount++}`;
          addGroup(id, sub[2] || sub[1]);
          return;
        }

        const edge = parseMermaidEdgeLine(line);
        if (edge) {
          const source = ensureNode(edge.source);
          const target = ensureNode(edge.target);
          if (source && target) {
            const handles = flowchartHandles(graphDirection);
            edges.push({
              id: `${source.id}-${target.id}-${edges.length}`,
              source: source.id,
              target: target.id,
              sourceHandle: handles.sourceHandle,
              targetHandle: handles.targetHandle,
              label: edge.label || "",
              line: edge.line || "arrow",
              marker: edge.marker || "arrow",
              reconnectable: true,
              zIndex: DEFAULT_EDGE_OPTIONS.zIndex
            });
          }
          return;
        }

        ensureNode(line);
      });

      if (!nodeMap.size) throw new Error("No supported flowchart nodes found.");
      return normalizeData({ nodes: Array.from(nodeMap.values()), edges });
    }

          try {

            setSvg(result.svg);
            setError("");

            console.error(err, code);
            if (!alive) return;
            setSvg("");

        render();
        return () => { alive = false; };
