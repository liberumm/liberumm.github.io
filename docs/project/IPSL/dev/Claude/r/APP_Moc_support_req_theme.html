Workflow Mock Launcher / Runtime Constitution

This file is a self-contained single-file mock launcher framework.
Single HTML is the product boundary.

Core Identity:
- CDN / Babel / React / MUI are the dynamic runtime foundation.
- LAUNCHER is the framework body: scenario control, viewport, step navigation, postMessage, and HTML/PNG export.
- CORE is the 3-screen workflow app: start, scan/register, confirm/output.
- THEME is the swappable business layer: BUSINESS definitions, master data, validation rules, and scenarios.
- LAUNCHER and CORE are reusable assets. THEME is the only layer replaced when targeting a different domain.

Architecture:
- LAUNCHER drives CORE via iframe + postMessage (APPLY_MOCK_STATE).
- CORE renders dynamically from THEME definitions; it owns no business-specific logic.
- THEME defines BUSINESS fields, master constants, validateItem rules, and MOCK_SCENARIOS.
- DynamicField renders any field declared in BUSINESS.itemFields / startFields without CORE changes.
- ?embedded=1 in URL switches the entry point from LauncherApp to WorkflowApp (standalone mode).

Runtime Principles:
- Keep the single-file form; do not convert to npm/build structure by default.
- Keep boot light: CDN loads, Babel transform, ReactDOM.createRoot, done.
- Keep LAUNCHER state local to LauncherApp; do not leak into CORE or THEME.
- Keep CORE state in React hooks + localStorage (storageKey); treat localStorage as a compact cache.
- Keep postMessage payloads small and typed (type: "APPLY_MOCK_STATE").
- Scenario state injected via postMessage must be applied atomically (screen + context + entries together).
- HTML/PNG export (current, scenario, full list, and launcher variants) must remain functional after any THEME change.

Ownership Rules:
- APP_CONFIG owns the storage key, connection mode, API endpoint stub, autoplay, and export timing.
- SCREEN / VIEW_MODE / VIEWPORTS / VIEWPORT_CONFIG own stable UI policy constants.
- BUSINESS owns per-workflow field declarations, labels, output actions, and complete checks.
- PRODUCTS / master constants own the domain data fixtures for the current THEME.
- validateItem owns all business-rule validation; getStatus derives display state from it.
- createDefaultContext / createDefaultItem own safe state initialization from THEME definitions.
- makeScenario / MOCK_SCENARIOS own the launcher scenario registry for the current THEME.
- DynamicField owns field-to-component mapping; new field types are added here only.
- WorkflowApp owns screen routing, localStorage sync, and postMessage reception.
- LauncherApp owns scenario selection, step control, viewport switching, and HTML/PNG export.
- App owns the embedded/launcher entry-point split; nothing else.

THEME Replacement Rules:
- To target a new domain: replace BUSINESS, PRODUCTS, master constants, validateItem, and MOCK_SCENARIOS.
- Do not touch LAUNCHER, CORE components, APP_CONFIG, or SCREEN constants during a THEME swap.
- New field types required by the new THEME must be added to DynamicField before use.
- Preserve the storageKey value unless intentionally migrating stored state.

Change Rule:
Observe -> Plan -> Do -> Check -> Act -> Lock.

Keep this block short.
Update only when runtime identity, architecture, ownership, boot policy,
storage boundary, postMessage contract, THEME boundary, or export behavior changes.
-->

    const WORKFLOW_TASK_STATUS_PRESENTATIONS = {

    function todayText() {
      const date = new Date();
      const pad = number => String(number).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function createSessionName(businessKey = "work") {
      const date = new Date();
      const pad = number => String(number).padStart(2, "0");
      return `${(BUSINESS[businessKey]?.shortLabel || "作業")}-${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function getDefaultActor() {
      return enrichActor(ACTORS[0]);
    }

    function enrichActor(actor = ACTORS[0]) {
      const base = ACTORS.find(item => item.id === actor?.id) || ACTORS[0];
      const role = ACTOR_ROLES[actor?.roleKey || base.roleKey] || ACTOR_ROLES.store;
      return { ...base, ...actor, roleKey: actor?.roleKey || base.roleKey, roleLabel: role.label, roleColor: role.color, orgType: role.orgType, roleType: role.roleType, permissions: role.permissions };
    }

    function actorHasPermission(actor, permission) {
      return Boolean(enrichActor(actor).permissions.includes(permission));
    }

    function normalizedActorRoleKey(actor) {
      const roleKey = enrichActor(actor).roleKey;
      return LEGACY_ROLE_EQUIVALENTS[roleKey] || roleKey;
    }

    function getWorkflowTask(record) {
      return WORKFLOW_TASK_BY_ID[record?.currentTaskId] || null;
    }

    function canExecuteWorkflowTask(actor, record) {
      const task = getWorkflowTask(record);
      const roleKey = normalizedActorRoleKey(actor);
      return Boolean(task && (roleKey === "service_owner" || roleKey === task.ownerRoleKey));
    }

    function getPendingReturnRequests(record) {
      return (record?.returnRequests || []).filter(request => request.status === "pending");
    }

    function canReturnWorkflow(actor, record) {
      const task = getWorkflowTask(record);
      return Boolean(task && WORKFLOW_RETURN_TARGET_BY_TASK[task.id] && canExecuteWorkflowTask(actor, record));
    }

    function canRequestWorkflowReturn(actor, record) {
      const task = getWorkflowTask(record);
      const roleKey = normalizedActorRoleKey(actor);
      if (!task || task.revisionTask || roleKey === "viewer" || roleKey === "service_owner") return false;
      if (canExecuteWorkflowTask(actor, record) && WORKFLOW_RETURN_TARGET_BY_TASK[task.id]) return false;
      return !getPendingReturnRequests(record).some(request => request.requestedByActorId === enrichActor(actor).id);
    }

    function canSubmitWorkflowWork(actor, businessKey) {
      if (normalizedActorRoleKey(actor) === "service_owner") return true;
      const submittersByBusiness = {
        price: ["internal_operator"],
        returnGoods: ["partner_operator"],
        inventory: ["partner_operator", "internal_operator"],
        priceCheck: ["partner_operator"],
        pop: ["accounting_operator"],
        label: ["accounting_approver", "accounting_operator"]
      };
      return (submittersByBusiness[businessKey] || []).includes(normalizedActorRoleKey(actor));
    }

    function getWorkflowCaseId(record) {
      const firstEntry = (record?.entries || []).find(row => !row.deletedAt) || {};
      return String(record?.caseId || record?.case?.caseId || firstEntry.caseId || record?.context?.sequenceNo || record?.recordId || "");
    }

    function actorCanViewWorkflowContext(actor, context = {}) {
      const currentActor = enrichActor(actor);
      const roleKey = normalizedActorRoleKey(currentActor);
      if (["service_owner", "viewer"].includes(roleKey)) return true;
      if (["internal_operator", "internal_approver"].includes(roleKey)) {
        return [context.department, context.salesFloor, context.requesterOrganization].filter(Boolean).includes(currentActor.organization);
      }
      if (["partner_operator", "partner_approver"].includes(roleKey)) return context.partner === currentActor.organization;
      if (["accounting_operator", "accounting_approver"].includes(roleKey)) return ["pop", "label"].includes(context.businessKey);
      return false;
    }

    function getActorVisibleCaseIds(records, actor) {
      const roleKey = normalizedActorRoleKey(actor);
      const allCaseIds = (records || []).map(getWorkflowCaseId).filter(Boolean);
      if (["service_owner", "viewer"].includes(roleKey)) return new Set(allCaseIds);
      return new Set((records || [])
        .filter(record => actorCanViewWorkflowContext(actor, { ...(record.context || {}), businessKey: record.businessKey || record.context?.businessKey }))
        .map(getWorkflowCaseId)
        .filter(Boolean));
    }

    function getActorVisibilityLabel(actor) {
      const currentActor = enrichActor(actor);
      const roleKey = normalizedActorRoleKey(currentActor);
      if (roleKey === "service_owner") return "全組織・全工程";
      if (roleKey === "viewer") return "全組織（参照のみ）";
      if (["internal_operator", "internal_approver"].includes(roleKey)) return `${currentActor.organization}の依頼案件`;
      if (["partner_operator", "partner_approver"].includes(roleKey)) return `${currentActor.organization}が指定された案件`;
      if (["accounting_operator", "accounting_approver"].includes(roleKey)) return "請求・支払工程へ到達した案件";
      return "表示対象なし";
    }

    function getWorkflowTaskStatusInfo(record, actor) {
      if (record?.overallStatus === "completed" || (record?.businessKey === "label" && record?.integrationState === "linked")) {
        return { code: "completed", label: "支払処理済み・案件完了", color: "success", actionable: false, ownerLabel: "完了", stageKey: "payment" };
      }
      const task = getWorkflowTask(record);
      const stage = WORKFLOW_STAGE_BY_BUSINESS[record?.businessKey || record?.workflowStage];
      const stageStatus = getWorkflowStageStatuses(record)[stage?.key];
      if (!task) return { code: stageStatus?.code || "completed", label: stageStatus?.label || "工程完了", color: stageStatus?.color || "success", actionable: false, ownerLabel: "-", stageKey: stage?.key };
      const actionable = canExecuteWorkflowTask(actor, record);
      const presentation = WORKFLOW_TASK_STATUS_PRESENTATIONS[task.id] || { code: task.id, label: task.label, color: "info" };
      const pendingReturnCount = getPendingReturnRequests(record).length;
      return { ...presentation, label: pendingReturnCount ? `${presentation.label}（差戻依頼 ${pendingReturnCount}件）` : presentation.label, color: presentation.code === "returned" ? "error" : pendingReturnCount || actionable ? "warning" : presentation.color, actionable, ownerLabel: task.ownerLabel, stageKey: stage?.key, pendingReturnCount };
    }

    function getWorkflowStageStatuses(record = {}) {
      const history = Array.isArray(record.taskHistory) ? record.taskHistory : [];
      const invalidatedTaskIds = new Set(record.invalidatedTaskIds || []);
      const completedTaskIds = new Set(history.map(event => event.taskId).filter(taskId => taskId && !invalidatedTaskIds.has(taskId)));
      const currentTask = getWorkflowTask(record);
      const currentStageIndex = WORKFLOW_STAGE_DEFINITIONS.findIndex(stage => stage.businessKey === (currentTask?.businessKey || record.businessKey || record.workflowStage));
      const workflowCompleted = record.overallStatus === "completed" || record.integrationState === "linked" || record.syncState === "linked";

      return Object.fromEntries(WORKFLOW_STAGE_DEFINITIONS.map((stage, stageIndex) => {
        const stageTasks = WORKFLOW_TASKS.filter(task => task.businessKey === stage.businessKey);
        const stageEvents = history.filter(event => stageTasks.some(task => task.id === event.taskId));
        const lastEvent = stageEvents[stageEvents.length - 1] || null;
        const allStageTasksCompleted = stageTasks.length > 0 && stageTasks.every(task => completedTaskIds.has(task.id));
        const isCompleted = workflowCompleted || allStageTasksCompleted || (currentStageIndex >= 0 && stageIndex < currentStageIndex) || (stageIndex === currentStageIndex && !currentTask && record.overallStatus === "stage_completed");

        if (stage.key === "payment" && ["failed", "integrationError"].includes(record.integrationState || record.syncState)) {
          return [stage.key, { stageKey: stage.key, businessKey: stage.businessKey, code: "integration_error", label: "日次連携エラー", color: "error", currentTaskId: currentTask?.id || null, ownerLabel: currentTask?.ownerLabel || "経理部", updatedAt: record.updatedAt || record.registeredAt || null }];
        }
        if (currentTask?.businessKey === stage.businessKey) {
          const presentation = WORKFLOW_TASK_STATUS_PRESENTATIONS[currentTask.id] || { code: currentTask.id, label: currentTask.label, color: "info" };
          return [stage.key, { stageKey: stage.key, businessKey: stage.businessKey, ...presentation, currentTaskId: currentTask.id, ownerLabel: currentTask.ownerLabel, updatedAt: record.updatedAt || lastEvent?.completedAt || record.registeredAt || null }];
        }
        if (isCompleted) {
          return [stage.key, { stageKey: stage.key, businessKey: stage.businessKey, code: "completed", label: stage.completedLabel, color: "success", currentTaskId: null, ownerLabel: "完了", updatedAt: lastEvent?.completedAt || record.updatedAt || record.registeredAt || null, completedAt: lastEvent?.completedAt || null }];
        }
        return [stage.key, { stageKey: stage.key, businessKey: stage.businessKey, code: "not_started", label: "未到達", color: "default", currentTaskId: null, ownerLabel: "-", updatedAt: null }];
      }));
    }

    function withWorkflowStageStatuses(record) {
      const normalizedRecord = { ...record };
      return { ...normalizedRecord, stageStatuses: getWorkflowStageStatuses(normalizedRecord) };
    }

    function nextWorkflowTask(taskId) {
      const index = WORKFLOW_TASKS.findIndex(task => task.id === taskId);
      return index >= 0 ? WORKFLOW_TASKS[index + 1] || null : null;

    function yen(value) {
      return new Intl.NumberFormat("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 }).format(Number(value || 0));
    }
    function signedYen(value) {
      const numericValue = Number(value || 0);
      if (numericValue > 0) return `+${yen(numericValue)}`;
      return yen(numericValue);
    }

    function inferOriginFromTraceCode(traceCode) {
      const value = String(traceCode || "").trim().toUpperCase();
      if (!value) return "";
      if (value.startsWith("JP-01")) return "北海道産";
      if (value.startsWith("JP-02")) return "青森県産";
      if (value.startsWith("JP-04")) return "宮城県産";
      if (value.startsWith("JP-08")) return "茨城県産";
      if (value.startsWith("JP-12")) return "千葉県産";
      if (value.startsWith("JP-46")) return "鹿児島県産";
      if (value.startsWith("JP-")) return "国産";
      if (value.startsWith("AU-")) return "オーストラリア産";
      if (value.startsWith("US-")) return "アメリカ産";
      return "";
    }

    function normalizeCode(value) {
      return String(value || "").trim().replace(/[Ａ-Ｚａ-ｚ０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, "").toUpperCase();
    }

    function findProduct(value) {
      const keyword = normalizeCode(value);
      if (!keyword) return null;
      return PRODUCTS.find(product => [product.sku, product.barcode, product.name].some(text => normalizeCode(text).includes(keyword))) || null;
    }

    function createEntry(productSku, businessKey, overrides = {}) {
      const product = PRODUCTS.find(item => item.sku === productSku) || PRODUCTS[0];

    function timeTextToMinutes(value) {
      const match = String(value || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return null;
      const hours = Number(match[1]);
      const minutes = Number(match[2]);
      if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
      return hours * 60 + minutes;
    }

    function minutesToTimeText(minutes) {
      const normalized = ((Math.round(Number(minutes || 0)) % (24 * 60)) + (24 * 60)) % (24 * 60);
      return `${String(Math.floor(normalized / 60)).padStart(2, "0")}:${String(normalized % 60).padStart(2, "0")}`;
    }

    function calculateWorkMinutes(startTime, endTime, breakMinutes = 0) {
      const start = timeTextToMinutes(startTime);
      const end = timeTextToMinutes(endTime);
      if (start === null || end === null) return 0;
      const elapsed = end >= start ? end - start : 24 * 60 - start + end;
      return Math.max(0, elapsed - Math.max(0, Number(breakMinutes || 0)));
    }

    function formatPersonHours(minutes) {
      const totalMinutes = Math.max(0, Math.round(Number(minutes || 0)));
      const hours = Math.floor(totalMinutes / 60);
      const minutePart = String(totalMinutes % 60).padStart(2, "0");
      return `${hours}:${minutePart}`;
    }

    function calculateLaborAmount(minutes, hourlyRate) {
      return Math.round(Number(minutes || 0) * Number(hourlyRate || 0) / 60);
    }

    function getEntryStageSnapshot(row, businessKey) {
      const map = { price: "request", returnGoods: "quote", inventory: "confirmation", priceCheck: "actual", pop: "billing", label: "payment" };
      return row?.[map[businessKey]] || null;
    }

    function getEntryPersonMinutes(row, businessKey) {
      const snapshot = getEntryStageSnapshot(row, businessKey);
      if (snapshot?.personMinutes !== undefined) return Number(snapshot.personMinutes || 0);
      if (businessKey === "returnGoods") return calculateWorkMinutes(row.proposedStartTime || row.startTime, row.proposedEndTime || row.endTime, row.proposedBreakMinutes ?? row.breakMinutes);
      if (businessKey === "priceCheck") return calculateWorkMinutes(row.actualStartTime || row.startTime, row.actualEndTime || row.endTime, row.actualBreakMinutes ?? row.breakMinutes);
      return calculateWorkMinutes(row.startTime, row.endTime, row.breakMinutes);
    }

    function getEntryHourlyRate(row) {
      return Number(row.confirmation?.appliedHourlyRate || row.request?.offeredHourlyRate || row.offeredHourlyRate || row.displayPrice || 0);
    }

    function buildWorkflowEntryForStage(row, businessKey, context) {
      const workLineId = row.workLineId || `WL-${Date.now()}-${Math.random().toString(16).slice(2, 7)}`;
      const offeredHourlyRate = Number(row.request?.offeredHourlyRate || row.offeredHourlyRate || 0);
      const common = { ...row, workLineId, quantity: 1, offeredHourlyRate, displayPrice: offeredHourlyRate };
      if (businessKey === "price") {
        const personMinutes = calculateWorkMinutes(row.startTime, row.endTime, row.breakMinutes);
        return { ...common, request: { workDate: row.workDate || context.businessDate, startTime: row.startTime, endTime: row.endTime, breakMinutes: Number(row.breakMinutes || 0), personMinutes, requiredSkill: row.requiredSkill || "", offeredHourlyRate, calculatedAmount: calculateLaborAmount(personMinutes, offeredHourlyRate) } };
      }
      if (businessKey === "returnGoods") {
        const personMinutes = calculateWorkMinutes(row.proposedStartTime || row.startTime, row.proposedEndTime || row.endTime, row.proposedBreakMinutes ?? row.breakMinutes);
        return { ...common, quote: { personId: row.personId || null, personName: row.personName || "", startTime: row.proposedStartTime || row.startTime, endTime: row.proposedEndTime || row.endTime, breakMinutes: Number(row.proposedBreakMinutes ?? row.breakMinutes ?? 0), personMinutes, acceptedHourlyRate: offeredHourlyRate, calculatedAmount: calculateLaborAmount(personMinutes, offeredHourlyRate) } };
      }
      if (businessKey === "inventory") {
        const source = row.quote || row.request || {};
        const personMinutes = Number(source.personMinutes || 0);
        return { ...common, confirmation: { personId: source.personId || row.personId || null, personName: source.personName || row.personName || "", startTime: source.startTime, endTime: source.endTime, breakMinutes: Number(source.breakMinutes || 0), personMinutes, appliedHourlyRate: offeredHourlyRate, calculatedAmount: calculateLaborAmount(personMinutes, offeredHourlyRate) } };
      }
      if (businessKey === "priceCheck") {
        const personMinutes = calculateWorkMinutes(row.actualStartTime || row.confirmation?.startTime, row.actualEndTime || row.confirmation?.endTime, row.actualBreakMinutes ?? row.confirmation?.breakMinutes ?? 0);
        const appliedHourlyRate = Number(row.confirmation?.appliedHourlyRate || offeredHourlyRate);
        return { ...common, actual: { personId: row.personId || row.confirmation?.personId || null, personName: row.personName || row.confirmation?.personName || "", startTime: row.actualStartTime || row.confirmation?.startTime, endTime: row.actualEndTime || row.confirmation?.endTime, breakMinutes: Number(row.actualBreakMinutes ?? row.confirmation?.breakMinutes ?? 0), personMinutes, appliedHourlyRate, calculatedAmount: calculateLaborAmount(personMinutes, appliedHourlyRate) } };
      }
      if (businessKey === "pop") {
        const source = row.actual || row.confirmation || {};
        const personMinutes = Number(source.personMinutes || 0);
        const appliedHourlyRate = Number(row.confirmation?.appliedHourlyRate || offeredHourlyRate);
        return { ...common, billing: { billableMinutes: personMinutes, personMinutes, appliedHourlyRate, calculatedAmount: calculateLaborAmount(personMinutes, appliedHourlyRate) } };
      }
      if (businessKey === "label") {
        return { ...common, payment: { paymentAmount: Number(row.billing?.calculatedAmount || 0), personMinutes: Number(row.billing?.personMinutes || 0), integrationState: "pendingDaily" } };
      }
      return common;
    }

    function calcAmount(row, businessKey) {
      return calculateLaborAmount(getEntryPersonMinutes(row, businessKey), getEntryHourlyRate(row));
    }

    function calcImpact(row, context) {
      if (Number.isFinite(Number(row.correctionDeltaAmount))) return Number(row.correctionDeltaAmount);
      return calcAmount(row, context.businessKey);
    }

    function getMasterValueLabel(context) {
      return "提示時間単価";
    }

    function getInputValueLabel(context) {
      return "作業時間";
    }

    function formatInputValue(row, context) {
      return formatPersonHours(getEntryPersonMinutes(row, context.businessKey));
    }

    function formatDecisionValue(row, context) {
      return formatPersonHours(getEntryPersonMinutes(row, context.businessKey));
    }

    function calcSummaryDecisionValue(entries, context) {
      return entries.reduce((sum, row) => sum + getEntryPersonMinutes(row, context.businessKey), 0);
    }

    function formatSummaryDecisionValue(value, context) {
      return formatPersonHours(value);
    }

    function isBlank(value) {
      return value === undefined || value === null || String(value).trim() === "";
    }

    function validateItem(row, context) {
      const errors = [];
      const businessKey = context.businessKey;
      if (row.excluded) return errors;
      if (row.duplicate) errors.push("重複登録");
      if (!row.sku) errors.push("案件未選択");
      if (businessKey === "price") {
        if (!row.workDate) errors.push("作業日未入力");
        if (!row.startTime || !row.endTime) errors.push("作業時間未入力");
        if (calculateWorkMinutes(row.startTime, row.endTime, row.breakMinutes) <= 0) errors.push("正味作業時間は1分以上");
        if (!String(row.requiredSkill || "").trim()) errors.push("必要スキル未入力");
        if (!Number.isFinite(Number(row.offeredHourlyRate)) || Number(row.offeredHourlyRate) <= 0) errors.push("提示時間単価は1円以上");
      }
      if (businessKey === "returnGoods") {
        if (!String(row.personName || "").trim()) errors.push("作業者名未入力");
        if (calculateWorkMinutes(row.proposedStartTime || row.startTime, row.proposedEndTime || row.endTime, row.proposedBreakMinutes ?? row.breakMinutes) <= 0) errors.push("対応可能時間は1分以上");
        if (!Number.isFinite(Number(row.offeredHourlyRate)) || Number(row.offeredHourlyRate) <= 0) errors.push("依頼側提示単価がありません");
      }
      if (businessKey === "priceCheck") {
        if (!String(row.personName || row.confirmation?.personName || "").trim()) errors.push("作業者名未入力");
        if (calculateWorkMinutes(row.actualStartTime || row.confirmation?.startTime, row.actualEndTime || row.confirmation?.endTime, row.actualBreakMinutes ?? row.confirmation?.breakMinutes) <= 0) errors.push("実績時間は1分以上");
      }
      return errors;
    }

    function getStatus(row, context) {
      if (row.excluded) return { label: "対象外", color: "default", helper: row.excludeReason || "確認対象外" };
      const errors = validateItem(row, context);
      if (errors.length) return { label: "要確認", color: "error", helper: errors.join(" / ") };
      if (context.businessKey === "priceCheck") return { label: "確認済", color: "success", helper: "確定作業時間と実績作業時間を確認済み" };
      return { label: "OK", color: "success", helper: "" };
    }

    function loadState() {
      try {
        const raw = window.localStorage.getItem(APP_CONFIG.storageKey);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function saveState(state) {
      try { window.localStorage.setItem(APP_CONFIG.storageKey, JSON.stringify(state)); } catch (error) { console.warn(error); }
    }

    function createDraftId() {
      return `D-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    }

    function createWorkflowSnapshot({ draftId, screen, context, actor, entries, confirmedRecord, confirmedRecords = [] }) {
      const activeEntries = getActiveEntries(entries);
      return {
        draftId,
        status: confirmedRecord ? "confirmed" : "draft",
        screen,
        context,
        actor: enrichActor(actor),
        entries,
        activeEntryCount: activeEntries.length,
        confirmedRecord: confirmedRecord || null,
        confirmedRecords,
        savedAt: new Date().toISOString()
      };
    }

    async function syncWorkflowSnapshot(snapshot) {
      if (APP_CONFIG.connectionMode === "mock") {
        return { ok: true, mode: "mock", savedAt: snapshot.savedAt };
      }
      const endpoint = `${APP_CONFIG.apiBaseUrl || ""}${APP_CONFIG.apiEndpoint}`;
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(snapshot)
      });
      if (!response.ok) throw new Error(`Workflow sync failed: ${response.status}`);
      return { ok: true, mode: "server", savedAt: snapshot.savedAt };

    // GET /store-workflows の想定レスポンス。モックも実APIも必ず同じ検証・正規化経路を通す。
    function createWorkflowApiListResponse(records = [], requestId = `REQ-${Date.now()}`) {
      return {
        apiVersion: "2026-07-22.3",
        meta: { requestId, generatedAt: new Date().toISOString(), total: records.length },
        data: { items: records }
      };
    }

    function normalizeWorkflowApiResponse(payload) {
      if (!payload || typeof payload !== "object") throw new Error("APIレスポンスがJSONオブジェクトではありません。");
      if (!payload.data || !Array.isArray(payload.data.items)) throw new Error("data.items が配列ではありません。");
      const records = payload.data.items.map((record, index) => {
        if (!record?.recordId) throw new Error(`data.items[${index}].recordId がありません。`);
        if (!record?.businessKey || !BUSINESS[record.businessKey]) throw new Error(`data.items[${index}].businessKey が不正です。`);
        if (!record?.context || typeof record.context !== "object") throw new Error(`data.items[${index}].context がありません。`);
        if (!Array.isArray(record.entries)) throw new Error(`data.items[${index}].entries が配列ではありません。`);
        const caseId = record.caseId || record.context.sequenceNo || record.recordId;
        const normalizedEntries = record.entries.map((row, rowIndex) => buildWorkflowEntryForStage({ ...row, workLineId: row.workLineId || `WL-${caseId}-${rowIndex + 1}`, slotNo: row.slotNo || rowIndex + 1 }, record.businessKey, record.context));
        const normalizedRecord = {
          ...record,
          caseId,
          case: record.case || createCaseData(record.context, { caseId, caseName: record.caseName, overallStatus: record.overallStatus }),
          entries: normalizedEntries,
          entryCount: normalizedEntries.filter(row => !row.deletedAt).length,
          workflowStage: record.workflowStage || record.businessKey,
          currentTaskId: record.currentTaskId !== undefined ? record.currentTaskId : ((record.approvalStatus || "unapproved") === "approved" ? null : SUBMITTED_TASK_BY_BUSINESS[record.businessKey]),
          overallStatus: record.overallStatus || "in_progress",
          taskHistory: Array.isArray(record.taskHistory) ? record.taskHistory : [],
          returnHistory: Array.isArray(record.returnHistory) ? record.returnHistory : [],
          returnRequests: Array.isArray(record.returnRequests) ? record.returnRequests : [],
          invalidatedTaskIds: Array.isArray(record.invalidatedTaskIds) ? record.invalidatedTaskIds : [],
          approvalStatus: record.approvalStatus || "unapproved",
          integrationState: record.integrationState || createIntegrationState(record.businessKey, record.approvalStatus || "unapproved")
        };
        return withWorkflowStageStatuses(normalizedRecord);
      });
      return { records, meta: { ...(payload.meta || {}), total: records.length }, apiVersion: payload.apiVersion || "unknown" };
    }

    function createDemoWorkflowApiResponse(caseCount = 7) {
      const stores = ["新宿本店", "大阪中央店", "名古屋駅前店", "札幌駅前店", "福岡天神店", "横浜西口店", "京都四条店"];
      const partners = ["アルタ支援", "ネクストスタッフ", "中央サービス"];
      const flowKeys = Object.keys(BUSINESS);
      // 「取引先へ依頼中」と「取引先回答済み」を同じデモデータで比較できるようにする。
      const demoTaskIndexes = [0, 1, 3, 6, 8, 10, null];
      const records = [];
      const now = new Date();
      PRODUCTS.slice(0, Math.max(1, Math.min(caseCount, PRODUCTS.length))).forEach((product, caseIndex) => {
        const caseId = product.sku;
        const caseName = product.name;
        const taskIndex = demoTaskIndexes[caseIndex % demoTaskIndexes.length];
        const currentTask = taskIndex === null ? null : WORKFLOW_TASKS[taskIndex];
        const currentBusinessKey = currentTask?.businessKey || "label";
        const currentBusinessIndex = flowKeys.indexOf(currentBusinessKey);
        flowKeys.slice(0, currentBusinessIndex + 1).forEach((businessKey, workIndex) => {
          const workDate = new Date(now);
          workDate.setDate(now.getDate() - caseIndex * 2 + workIndex);
          const dateText = `${workDate.getFullYear()}-${String(workDate.getMonth() + 1).padStart(2, "0")}-${String(workDate.getDate()).padStart(2, "0")}`;
          const partnerName = partners[caseIndex % partners.length];
          const rowContext = {
            ...createDefaultContext(businessKey),
            sequenceNo: caseId,
            businessDate: dateText,
            startDate: dateText,
            endDate: dateText,
            department: product.department,
            salesFloor: stores[caseIndex % stores.length],
            partner: partnerName,
            workGroup: `${caseId}-${BUSINESS[businessKey].shortLabel}`
          };
          const lifecycleEntries = Array.from({ length: 1 + (caseIndex % 3) }, (_, slotIndex) => {
            const offeredHourlyRate = 2400 + caseIndex * 100;
            const entry = createEntry(product.sku, businessKey, {
              sequenceNo: caseId,
              caseId,
              caseName,
              workLineId: `WL-${caseId}-${String(slotIndex + 1).padStart(2, "0")}`,
              slotNo: slotIndex + 1,
              workGroup: rowContext.workGroup,
              quantity: 1,
              workDate: dateText,
              startTime: "09:00",
              endTime: slotIndex % 2 ? "16:00" : "17:00",
              breakMinutes: 60,
              proposedStartTime: "09:00",
              proposedEndTime: slotIndex % 2 ? "16:00" : "17:00",
              proposedBreakMinutes: 60,
              actualStartTime: "09:05",
              actualEndTime: slotIndex % 2 ? "15:55" : "16:55",
              actualBreakMinutes: 60,
              requiredSkill: caseIndex % 2 ? "接客経験" : "棚卸経験",
              personName: `応援スタッフ${caseIndex + 1}-${slotIndex + 1}`,
              offeredHourlyRate,
              displayPrice: offeredHourlyRate
            });
            return flowKeys.slice(0, workIndex + 1).reduce((current, stageKey) => buildWorkflowEntryForStage(current, stageKey, { ...rowContext, businessKey: stageKey }), entry);
          });
          const isCurrentStage = businessKey === currentBusinessKey && currentTask;
          const isCompletedCase = !currentTask;
          const stageCompleted = isCompletedCase || !isCurrentStage;
          const integrationState = businessKey !== "label" ? "notApplicable" : (isCompletedCase ? "linked" : "pendingDaily");
          const taskHistory = WORKFLOW_TASKS
            .filter((task, index) => index < (taskIndex === null ? WORKFLOW_TASKS.length : taskIndex))
            .map(task => ({ taskId: task.id, action: task.actionLabel, completedAt: workDate.toISOString(), actorRoleKey: task.ownerRoleKey }));
          const taskActor = ACTORS.find(item => item.roleKey === currentTask?.ownerRoleKey) || ACTORS[0];
          records.push(withWorkflowStageStatuses({
            ...createScenarioConfirmedRecord(businessKey, lifecycleEntries, rowContext),
            recordId: `WF-DEMO-${caseId}-${businessKey}`,
            caseId,
            caseName,
            case: createCaseData(rowContext, { caseId, caseName, overallStatus: isCompletedCase ? "completed" : "in_progress" }),
            actor: enrichActor(taskActor),
            workflowStage: businessKey,
            currentTaskId: isCurrentStage ? currentTask.id : null,
            overallStatus: isCompletedCase && businessKey === "label" ? "completed" : (stageCompleted ? "stage_completed" : "in_progress"),
            taskHistory,
            approvalStatus: stageCompleted || currentTask?.id === "daily_integration" ? "approved" : "pending",
            approvedAt: stageCompleted ? workDate.toISOString() : null,
            integrationState,
            syncState: integrationState,
            integrationDate: integrationState === "linked" ? dateText : null,
            backendLinkedAt: integrationState === "linked" ? workDate.toISOString() : null,
            registeredAt: workDate.toISOString()
          }));
        });
      });
      return createWorkflowApiListResponse(records, `DEMO-${Date.now()}`);
    }

    async function loadWorkflowRecords({ sample = false } = {}) {
      if (sample || APP_CONFIG.connectionMode === "mock") return normalizeWorkflowApiResponse(createDemoWorkflowApiResponse());
      const endpoint = `${APP_CONFIG.apiBaseUrl || ""}${APP_CONFIG.apiEndpoint}`;
      const response = await fetch(endpoint, { method: "GET", headers: { Accept: "application/json" }, cache: "no-store" });
      if (!response.ok) throw new Error(`Workflow load failed: ${response.status}`);
      return normalizeWorkflowApiResponse(await response.json());
    }

    function applyScenarioToState(payload = {}) {
      const context = { ...createDefaultContext(payload.businessKey || "price"), ...(payload.context || {}) };
      // 互換: シナリオが単一の businessDate を渡す場合、開始日/終了日に展開する。
      const legacyDate = payload.context && payload.context.businessDate;
      if (legacyDate) {
        if (!payload.context.startDate) context.startDate = legacyDate;
        if (!payload.context.endDate) context.endDate = legacyDate;
      }
      const entries = Array.isArray(payload.entries) ? payload.entries : [];
      const confirmedRecords = (Array.isArray(payload.confirmedRecords) ? payload.confirmedRecords : (payload.confirmedRecord ? [payload.confirmedRecord] : [])).map(withWorkflowStageStatuses);
      const confirmedRecord = payload.confirmedRecord ? withWorkflowStageStatuses(payload.confirmedRecord) : null;
      if (payload.outputSearch !== undefined) context.outputSearch = payload.outputSearch;
      return {
        screen: payload.screen || SCREEN.START,
        context,
        actor: enrichActor(payload.actor),
        entries,
        confirmedRecord,
        confirmedRecords,
        openScanDrawer: Boolean(payload.openScanDrawer),
        screenshotModal: payload.screenshotModal || null,
        screenshotRevision: payload.screenshotRevision || payload.revision || null
      };
    }

    function createScenarioConfirmedRecord(businessKey, entries = [], context = createDefaultContext(businessKey)) {
      const activeCount = entries.filter(row => !row.deletedAt).length;
      const firstEntry = entries.find(row => !row.deletedAt) || {};
      const caseId = firstEntry.caseId || context.sequenceNo || `CASE-${Date.now()}`;
      const caseName = firstEntry.caseName || firstEntry.productName || caseId;
      const approvalStatus = "unapproved";
      const integrationState = createIntegrationState(businessKey, approvalStatus);
      return withWorkflowStageStatuses({
        recordId: `WF-SCENARIO-${businessKey}`,
        status: "confirmed",
        workflowStage: businessKey,
        currentTaskId: SUBMITTED_TASK_BY_BUSINESS[businessKey],
        overallStatus: "in_progress",
        taskHistory: [],
        returnHistory: [],
        returnRequests: [],
        invalidatedTaskIds: [],
        caseId,
        caseName,
        case: createCaseData(context, { caseId, caseName }),
        approvalStatus,
        approvedAt: null,
        syncState: integrationState,
        integrationTarget: getIntegrationTarget(businessKey),
        integrationState,
        integrationDate: null,
        registeredAt: new Date().toISOString(),
        businessKey,
        workGroup: context.workGroup || "セッション1",
        context: { ...context },
        entries: entries.filter(row => !row.deletedAt).map(row => buildWorkflowEntryForStage({ ...row }, businessKey, context)),
        entryCount: activeCount
      });
    }

    function createScenarioRecordVariant(record, overrides = {}) {
      if (!record) return null;
      const businessKey = record.businessKey || record.context?.businessKey || "price";
      const approvalStatus = overrides.approvalStatus || record.approvalStatus || "unapproved";
      const integrationState = overrides.integrationState || createIntegrationState(businessKey, approvalStatus);
      const approvedAt = approvalStatus === "approved" ? (overrides.approvedAt || record.approvedAt || new Date().toISOString()) : null;
      return {
        ...record,
        ...overrides,
        approvalStatus,
        approvedAt,
        syncState: integrationState,
        integrationState,
        integrationDate: overrides.integrationDate ?? (["linked", "printed"].includes(integrationState) ? todayText() : null),
        backendLinkedAt: integrationState === "linked" ? (overrides.backendLinkedAt || approvedAt || new Date().toISOString()) : null
      };
    }

    function createScenarioCorrectionRecord(sourceRecord, context) {
      if (!sourceRecord) return null;
      const sourceEntry = (sourceRecord.entries || []).find(row => !row.deletedAt);
      if (!sourceEntry) return null;
      const sourceContext = context || sourceRecord.context || createDefaultContext(sourceRecord.businessKey);
      const nextQuantity = sourceRecord.businessKey === "price"
        ? Math.max(1, Number(sourceEntry.quantity || 1) - 1)
        : Number(sourceEntry.quantity || 1) + 1;
      const correctionEntry = sourceRecord.businessKey === "price"
        ? { ...sourceEntry, quantity: nextQuantity, correctionScenarioNote: "数量減による増額訂正" }
        : { ...sourceEntry, quantity: nextQuantity };
      return createCorrectionRecord(sourceRecord, [correctionEntry], sourceContext);
    }

    function makeScenario({ id, business, label, category, context = {}, entries = [], viewport = VIEWPORTS.MOBILE, startDescription, scanDescription, confirmDescription, outputDescription }) {
      const businessLabel = BUSINESS[business]?.label || business;
      const scenarioContext = { ...createDefaultContext(business), ...context };
      const hasIssues = entries.some(row => getStatus(row, scenarioContext).color === "error");
      const canConfirmScenario = entries.filter(row => !row.deletedAt).length > 0 && !hasIssues;
      const isLabelBusiness = business === "label";
      const confirmedScenarioRecord = canConfirmScenario ? createScenarioConfirmedRecord(business, entries, scenarioContext) : null;
      const approvedScenarioRecord = confirmedScenarioRecord ? createScenarioRecordVariant(confirmedScenarioRecord, { recordId: `${confirmedScenarioRecord.recordId}-APPROVED`, workGroup: `${confirmedScenarioRecord.workGroup || "セッション1"} 承認済`, approvalStatus: "approved" }) : null;
      const linkedScenarioRecord = approvedScenarioRecord && !isLabelBusiness ? createScenarioRecordVariant(approvedScenarioRecord, { recordId: `${confirmedScenarioRecord.recordId}-LINKED`, workGroup: `${confirmedScenarioRecord.workGroup || "セッション1"} 日次連携済`, integrationState: "linked", syncState: "linked", integrationDate: todayText(), backendLinkedAt: new Date().toISOString() }) : null;
      const correctionScenarioRecord = linkedScenarioRecord ? createScenarioCorrectionRecord(linkedScenarioRecord, scenarioContext) : null;
      const approvalScenarioRecords = [confirmedScenarioRecord, approvedScenarioRecord].filter(Boolean);
      const correctionScenarioRecords = [linkedScenarioRecord, correctionScenarioRecord].filter(Boolean);
      const confirmStepDescription = canConfirmScenario
        ? (isLabelBusiness ? "支払確認の登録明細を確認し、支払確認ボタンで未承認の実績として確定します。" : `${businessLabel}の登録明細を確認し、作業確定ボタンで未承認の実績として保存します。`)
        : `${businessLabel}の登録明細で要確認状態を確認します。`;
      const outputStepDescription = outputDescription || (canConfirmScenario
        ? (isLabelBusiness ? "確定済みの支払確認を案件単位で確認し、未承認・承認済・支払状態を確認します。" : `${businessLabel}の確定済み実績を案件単位で確認し、未承認は連携対象外、承認済は日次連携対象になることを確認します。`)
        : `${businessLabel}の要確認を登録明細で修正します。`);
      const correctionStepDescription = outputDescription || confirmDescription || outputStepDescription;
      const basePayload = { businessKey: business, context: scenarioContext };
      const searchKeyword = entries.find(row => row.productName || row.sku)?.productName || entries.find(row => row.productName || row.sku)?.sku || businessLabel;
      const finalStepLabel = isLabelBusiness ? "支払結果" : (business === "pop" ? "請求連携確認" : (business === "priceCheck" ? "完了確認" : "実績確認"));
      const confirmStepLabel = isLabelBusiness ? "支払確認" : "作業確定";
      const steps = [
        {
          label: "開始",
          description: startDescription || `${businessLabel}の基本条件を確認します。`,

      if (!snapshot?.startTime || !snapshot?.endTime) return "時間未設定";
      return `${snapshot.startTime}–${snapshot.endTime}`;

    function WorkTimeSummary({ snapshot, compact = false }) {
      if (!snapshot) return <Typography variant="body2" color="text.secondary">-</Typography>;
      const personMinutes = snapshot.personMinutes ?? calculateWorkMinutes(snapshot.startTime, snapshot.endTime, snapshot.breakMinutes);
      return (
        <Stack spacing={0.15} sx={{ minWidth: compact ? 118 : 145 }}>
          <Typography variant="body2" sx={{ whiteSpace: "nowrap" }}>開始 {snapshot.startTime || "-"}</Typography>

          {!compact && <Typography variant="caption" color="text.secondary">休憩 {Number(snapshot.breakMinutes || 0)}分</Typography>}
        </Stack>
      );

    function getRecordTimeRangeSummary(record) {
      const businessKey = record?.businessKey || record?.context?.businessKey;
      const ranges = Array.from(new Set((record?.entries || []).filter(row => !row.deletedAt).map(row => getWorkTimeRangeText(getEntryDisplaySnapshot(row, businessKey)))));
      if (!ranges.length) return "時間未設定";
      return ranges.length === 1 ? ranges[0] : `${ranges[0]} ほか${ranges.length - 1}時間帯`;
    }

    // 登録・修正で共通利用する1種類の作業ドロワー。
    // PC/モバイルで別画面を作らず、同じ内容を下部パネルとして表示する。
    function WorkflowDrawer({ open, onClose, children, maxWidth = "none" }) {
      return (
        <Drawer
          anchor="bottom"
          open={open}
          onClose={onClose}
          PaperProps={{ sx: { borderTopLeftRadius: 18, borderTopRightRadius: 18, maxHeight: "96vh", maxWidth, mx: "auto", width: { xs: "100%", md: "calc(100% - 32px)" }, display: "flex", flexDirection: "column", overflow: "hidden" } }}
        >
          {children}
        </Drawer>
      );
    }

    const NUMBER_PAD_FIELDS = ["quantity", "beforePrice", "afterPrice", "displayPrice", "sequenceNo", "breakMinutes", "proposedBreakMinutes", "actualBreakMinutes", "offeredHourlyRate"];

    function getNumericItemFields(context) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      return business.itemFields.filter(field => NUMBER_PAD_FIELDS.includes(field));
    }

    function NumberPad({ open, onToggle, disabled, onInput, onBackspace, onClear, onPrevious, onEnter }) {
      const keepInputFocus = event => event.preventDefault();
      const run = action => {
        if (disabled) return;
        action?.();
      };
      if (!open) {
        return <Button fullWidth variant="outlined" startIcon={<Icon>dialpad</Icon>} onMouseDown={keepInputFocus} onClick={onToggle}>テンキーを表示</Button>;
      }
      return (
        <Paper variant="outlined" sx={{ p: 1, borderRadius: 2, bgcolor: "background.paper" }}>
          <Grid container spacing={0.75}>
            {["1", "2", "3", "4", "5", "6", "7", "8", "9", "00", "0"].map(key => (
              <Grid item xs={4} key={key}>
                <Button fullWidth variant="outlined" size="large" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(() => onInput(key))} sx={{ minHeight: 48, fontSize: "1.1rem", fontWeight: 900 }}>{key}</Button>
              </Grid>
            ))}
            <Grid item xs={4}><Button fullWidth variant="outlined" color="secondary" size="large" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onBackspace)} sx={{ minHeight: 48 }}><Icon>backspace</Icon></Button></Grid>
            <Grid item xs={4}><Button fullWidth variant="outlined" color="secondary" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onPrevious)} sx={{ minHeight: 44 }} startIcon={<Icon>arrow_upward</Icon>}>戻る</Button></Grid>
            <Grid item xs={4}><Button fullWidth variant="outlined" color="secondary" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onClear)} sx={{ minHeight: 44 }}>C</Button></Grid>
            <Grid item xs={4}><Button fullWidth variant="contained" disabled={disabled} onMouseDown={keepInputFocus} onClick={() => run(onEnter)} sx={{ minHeight: 44 }} endIcon={<Icon>keyboard_return</Icon>}>Enter</Button></Grid>
            <Grid item xs={12}><Button fullWidth variant="text" color="secondary" onMouseDown={keepInputFocus} onClick={onToggle}>テンキーを閉じる</Button></Grid>
          </Grid>
        </Paper>
      );
    }

    const TRASH_RETENTION_MS = 2 * 24 * 60 * 60 * 1000;

    function isDeleted(row) {
      return Boolean(row?.deletedAt);
    }

    function getActiveEntries(entries = []) {
      return entries.filter(row => !isDeleted(row));
    }

    function getStartFields(context) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      return business.startFields || [];
    }

    function getEntryWorkGroup(row, context) {
      return row.workGroup || context.workGroup || "未分類";
    }

    function groupEntriesByWorkGroup(entries = [], context) {
      const groups = [];
      entries.forEach(row => {
        const label = getEntryWorkGroup(row, context);
        let group = groups.find(item => item.label === label);
        if (!group) {
          group = { label, entries: [] };
          groups.push(group);
        }
        group.entries.push(row);
      });
      return groups;
    }

    function getTrashEntries(entries = []) {
      return entries.filter(isDeleted).sort((a, b) => Number(b.deletedAt || 0) - Number(a.deletedAt || 0));
    }

    function purgeExpiredTrash(entries = [], now = Date.now()) {
      return entries.filter(row => !row.deletedAt || now - Number(row.deletedAt) < TRASH_RETENTION_MS);
    }

    function trashRemainingText(row) {
      const remaining = TRASH_RETENTION_MS - (Date.now() - Number(row.deletedAt || Date.now()));
      if (remaining <= 0) return "自動完全削除の対象";
      const hours = Math.ceil(remaining / (60 * 60 * 1000));
      if (hours >= 24) return `あと${Math.ceil(hours / 24)}日で完全削除`;
      return `あと${hours}時間で完全削除`;
    }

    function formatDateTimeText(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      const pad = number => String(number).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function getIntegrationTarget(businessKey) {
      return businessKey === "label" ? "経理システム" : "対象外";
    }

    function getApprovalStatus(record) {
      return record?.approvalStatus || record?.approvalState || "unapproved";
    }

    function getApprovalStatusInfo(record) {
      const approvalStatus = getApprovalStatus(record);
      if (approvalStatus === "approved") return { state: approvalStatus, label: "承認済", color: "success" };
      return { state: "unapproved", label: "未承認", color: "warning" };
    }

    function createIntegrationState(businessKey, approvalStatus = "approved") {
      if (businessKey !== "label") return "notApplicable";
      if (approvalStatus !== "approved") return "unapproved";
      return "pendingDaily";
    }

    function getIntegrationStatus(record) {
      const businessKey = record?.businessKey || record?.context?.businessKey || "price";
      const target = record?.integrationTarget || getIntegrationTarget(businessKey);
      const approvalStatus = getApprovalStatus(record);
      let state = record?.integrationState || record?.syncState || createIntegrationState(businessKey, approvalStatus);
      if (businessKey !== "label") state = "notApplicable";
      else if (record?.overallStatus === "completed" || isBackendLinkedRecord(record)) state = "linked";
      else if (approvalStatus !== "approved") state = "unapproved";
      const integrationDate = record?.integrationDate || (state === "linked" ? (record?.backendLinkedAt || "").slice(0, 10) || todayText() : "");
      const statusMap = {
        notApplicable: { label: "日次連携対象外", color: "default" },
        unapproved: { label: "連携対象外", color: "default" },
        linked: { label: "日次連携済み・支払処理済み", color: "success" },
        pendingDaily: { label: "日次連携待ち", color: "warning" },
        pending: { label: "連携待ち", color: "warning" },
        failed: { label: "連携失敗", color: "error" }
      };
      return { target, state, integrationDate, ...(statusMap[state] || { label: "未連携", color: "default" }) };
    }

    function createMockRecord(context, entries) {
      const now = new Date();
      const pad = number => String(number).padStart(2, "0");
      const datePart = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}`;
      const timePart = `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const integrationTarget = getIntegrationTarget(context.businessKey);
      const approvalStatus = "unapproved";
      const integrationState = createIntegrationState(context.businessKey, approvalStatus);
      const activeEntries = getActiveEntries(entries);
      const firstEntry = activeEntries[0] || {};
      const caseId = firstEntry.caseId || firstEntry.sequenceNo || context.sequenceNo || `CASE-${datePart}-${timePart}`;
      const caseName = firstEntry.caseName || firstEntry.productName || caseId;
      const sourceRecordId = activeEntries.find(row => row.sourceRecordId || row.correctionOf)?.sourceRecordId || activeEntries.find(row => row.sourceRecordId || row.correctionOf)?.correctionOf;
      return withWorkflowStageStatuses({
        recordId: sourceRecordId ? `WF-CORRECTION-${datePart}-${timePart}` : `WF-${datePart}-${timePart}`,
        status: "confirmed",
        workflowStage: context.businessKey,
        currentTaskId: SUBMITTED_TASK_BY_BUSINESS[context.businessKey],
        overallStatus: "in_progress",
        taskHistory: [],
        returnHistory: [],
        returnRequests: [],
        invalidatedTaskIds: [],
        caseId,
        caseName,
        case: createCaseData(context, { caseId, caseName }),
        approvalStatus,
        approvedAt: null,
        correctionOf: sourceRecordId || undefined,
        correctionType: sourceRecordId ? "daily-linked-correction" : undefined,
        sourceRecordId: sourceRecordId || undefined,
        syncState: integrationState,
        integrationTarget,
        integrationState,
        integrationDate: null,
        registeredAt: now.toISOString(),
        businessKey: context.businessKey,
        workGroup: context.workGroup || "セッション1",
        context: { ...context },
        entries: activeEntries.map(row => buildWorkflowEntryForStage({ ...row, sourceRecordId: row.sourceRecordId || sourceRecordId, correctionOf: row.correctionOf || sourceRecordId }, context.businessKey, context)),
        entryCount: activeEntries.length
      });
    }

    function createCorrectionRecord(originalRecord, correctedEntries, context) {
      const now = new Date();
      const pad = number => String(number).padStart(2, "0");
      const datePart = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}`;
      const timePart = `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const businessKey = originalRecord.businessKey || context.businessKey;
      const integrationTarget = getIntegrationTarget(businessKey);
      const approvalStatus = "unapproved";
      const integrationState = createIntegrationState(businessKey, approvalStatus);
      const normalizedEntries = correctedEntries.filter(row => row && !row.deletedAt).map(row => {
        const { __record, __recordIndex, __recordId, ...entry } = row;
        const sourceEntry = (originalRecord.entries || []).find(source => source.id === (entry.sourceEntryId || entry.id)) || {};
        const sourceContext = originalRecord.context || context;
        const sourceImpact = calcImpact(sourceEntry, sourceContext);
        const correctedImpact = entry.correctionAction === "delete" ? 0 : calcImpact(entry, context);
        const correctionDeltaAmount = businessKey === "price" ? correctedImpact - sourceImpact : undefined;
        const quantityDelta = Number(entry.quantity || 0) - Number(sourceEntry.quantity || 0);
        return {
          ...entry,
          id: `E-CORR-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`,
          sourceEntryId: entry.sourceEntryId || entry.id,
          sourceRecordId: originalRecord.recordId,
          correctionOf: originalRecord.recordId,
          correctionType: "daily-linked-correction",
          sourceQuantity: sourceEntry.quantity,
          correctedQuantity: entry.correctionAction === "delete" ? 0 : entry.quantity,
          quantityDelta,
          sourceImpact,
          correctedImpact,
          correctionDeltaAmount,
          correctedAt: now.toISOString(),
          deletedAt: null
        };
      });
      return {
        recordId: `WF-CORRECTION-${datePart}-${timePart}-${Math.random().toString(16).slice(2, 5).toUpperCase()}`,
        status: "confirmed",
        approvalStatus,
        approvedAt: null,
        correctionOf: originalRecord.recordId,
        correctionType: "daily-linked-correction",
        sourceRecordId: originalRecord.recordId,
        sourceRegisteredAt: originalRecord.registeredAt,
        sourceWorkGroup: originalRecord.workGroup,
        syncState: integrationState,
        integrationTarget,
        integrationState,
        integrationDate: null,
        registeredAt: now.toISOString(),
        businessKey,
        workGroup: `${originalRecord.workGroup || "セッション"} 訂正`,
        context: { ...(originalRecord.context || context), workGroup: `${originalRecord.workGroup || "セッション"} 訂正` },
        entries: normalizedEntries,
        entryCount: normalizedEntries.length
      };
    }

    function isBackendLinkedRecord(record) {
      if (!record) return false;
      const businessKey = record.businessKey || record.context?.businessKey;
      if (businessKey !== "label") return false;
      return record.integrationState === "linked" || record.syncState === "linked" || Boolean(record.backendLinkedAt);
    }

    function getCorrectionRelationLabel(record, row) {
      const sourceRecordId = record?.correctionOf || record?.sourceRecordId || row?.sourceRecordId || row?.correctionOf;
      if (!sourceRecordId) return "";
      const sourceEntryId = row?.sourceEntryId ? ` / 元明細 ${row.sourceEntryId}` : "";
      const actionLabel = row?.correctionAction === "delete" ? " / 削除訂正" : "";
      return `訂正元 ${sourceRecordId}${sourceEntryId}${actionLabel}`;
    }

    function getCorrectionPreviewText(sourceRecord, nextEntry, context) {
      if (!sourceRecord || !nextEntry || context.businessKey !== "price") return "";
      const sourceEntry = (sourceRecord.entries || []).find(row => row.id === (nextEntry.sourceEntryId || nextEntry.id)) || {};
      const sourceImpact = calcImpact(sourceEntry, sourceRecord.context || context);
      const nextImpact = nextEntry.correctionAction === "delete" ? 0 : calcImpact(nextEntry, context);
      const delta = nextImpact - sourceImpact;
      if (!delta) return "連動差分なし";
      const direction = delta > 0 ? "増額訂正" : "減額訂正";
      const quantityText = Number.isFinite(Number(sourceEntry.quantity)) ? ` / 数量 ${sourceEntry.quantity || 0} -> ${nextEntry.correctionAction === "delete" ? 0 : (nextEntry.quantity || 0)}` : "";
      return `${direction} ${signedYen(delta)}${quantityText}`;
    }

    function cloneRecordEntriesForWork(record, correction = false) {
      return (record.entries || []).map(row => ({
        ...row,
        id: `E-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`,
        deletedAt: null,
        sourceRecordId: record.recordId,
        correctionOf: correction ? record.recordId : undefined
      }));
    }

    function TrashDialog({ open, entries, context, onClose, onRestore, onPermanentDelete }) {
      const [permanentTarget, setPermanentTarget] = React.useState(null);
      const trashEntries = getTrashEntries(entries);
      React.useEffect(() => { if (!open) setPermanentTarget(null); }, [open]);
      return (
        <React.Fragment>
          <Dialog open={open} onClose={onClose} fullWidth maxWidth="sm">
            <DialogTitle sx={{ pb: 1 }}>
              <Stack direction="row" spacing={1} alignItems="center">
                <Icon color="error">delete</Icon>
                <Box sx={{ minWidth: 0 }}>
                  <Typography variant="h6">ごみ箱</Typography>
                  <Typography variant="caption" color="text.secondary">削除した明細は2日後に自動で完全削除されます。</Typography>
                </Box>
              </Stack>
            </DialogTitle>
            <DialogContent dividers sx={{ bgcolor: "background.default" }}>
              <Stack spacing={1}>
                {trashEntries.length === 0 && <EmptyState text="ごみ箱は空です。" />}
                {trashEntries.map(row => (
                  <Paper key={row.id} variant="outlined" sx={{ p: 1.25, bgcolor: "background.paper" }}>
                    <Stack spacing={1}>
                      <Stack direction="row" spacing={1} alignItems="flex-start" justifyContent="space-between">
                        <Box sx={{ minWidth: 0 }}>
                          <Typography variant="subtitle2" noWrap>{row.productName || "案件未選択"}</Typography>
                          <Typography variant="caption" color="text.secondary">{row.barcode || row.sku || "-"} / {trashRemainingText(row)}</Typography>
                        </Box>
                        <Chip size="small" color="error" variant="outlined" label="ごみ箱" />
                      </Stack>
                      <Stack direction="row" spacing={1} justifyContent="flex-end">
                        <Button size="small" variant="outlined" startIcon={<Icon>restore</Icon>} onClick={() => onRestore(row.id)}>復活</Button>
                        <Button size="small" color="error" startIcon={<Icon>delete_forever</Icon>} onClick={() => setPermanentTarget(row)}>完全削除</Button>
                      </Stack>
                    </Stack>
                  </Paper>
                ))}
              </Stack>
            </DialogContent>
            <DialogActions><Button onClick={onClose}>閉じる</Button></DialogActions>
          </Dialog>
          <ConfirmDialog
            open={Boolean(permanentTarget)}
            title="完全削除しますか？"
            description="完全削除した明細は復活できません。"
            confirmLabel="完全削除"
            onCancel={() => setPermanentTarget(null)}
            onConfirm={() => { if (permanentTarget) onPermanentDelete(permanentTarget.id); setPermanentTarget(null); }}
          >
            {permanentTarget && <Alert severity="error" sx={{ py: 0.5 }}>{permanentTarget.productName || "案件未選択"}</Alert>}
          </ConfirmDialog>
        </React.Fragment>
      );
    }


    function EntryTable({ entries, context, onEdit, onRemove, readOnly = false, selectedIds = [], allSelected = false, partialSelected = false, onToggleSelect = null, onToggleAll = null }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;

              {entries.length === 0 && <TableRow><TableCell colSpan={readOnly ? 8 : 10} align="center" sx={{ py: 5 }}><Typography color="text.secondary">応援依頼明細がありません。</Typography></TableCell></TableRow>}
            </TableBody>
          </Table>
        </TableContainer>
      );
    }

          quantity: group.entries.reduce((sum, row) => sum + Number(row.quantity || 1), 0),
          department: context.department || firstEntry.department || "-",
          partner: context.partner || enrichActor(actor).organization || "-",
          store: context.salesFloor || "-",
          createdAt: "未確定",
          timeRangeText: Array.from(new Set(group.entries.map(row => getWorkTimeRangeText(getEntryDisplaySnapshot(buildWorkflowEntryForStage(row, context.businessKey, context), context.businessKey))))).join(" / ") || "時間未設定",
          amountValue,
          amount: formatSummaryDecisionValue(amountValue, rowContext),
          actionable: canEdit || canConfirm,
          taskLabel: "入力内容を確定",
          taskOwner: enrichActor(actor).roleLabel,
          searchText: [group.label, rowContext.sequenceNo, context.department, context.salesFloor, firstEntry.productName, firstEntry.sku].filter(Boolean).join(" ")
        };
      });

      const recordRows = visibleConfirmedRecords.map(record => {
        const rowContext = record.context || createDefaultContext(record.businessKey);
        const activeRecordEntries = (record.entries || []).filter(row => !row.deletedAt);
        const firstEntry = activeRecordEntries[0] || {};
        const approval = getApprovalStatusInfo(record);
        const integration = getIntegrationStatus(record);
        const linked = isBackendLinkedRecord(record);
        const workflowState = getWorkflowTaskStatusInfo(record, actor);
        const amountValue = calcSummaryDecisionValue(activeRecordEntries, rowContext);
        return {
          rowId: `record-${record.recordId}`,
          caseId: record.caseId || firstEntry.caseId || firstEntry.sequenceNo || rowContext.sequenceNo || firstEntry.sku || record.sourceRecordId || record.recordId,
          caseName: record.caseName || firstEntry.caseName || firstEntry.productName || record.workGroup || record.recordId,
          sourceType: "record",
          source: record,
          firstEntry,
          businessKey: record.businessKey || rowContext.businessKey,
          flowLabel: BUSINESS[record.businessKey || rowContext.businessKey]?.label || "応援依頼",
          flowColor: "primary",
          stateLabel: workflowState.label,
          stateColor: workflowState.color,
          stateKey: `${workflowState.stageKey || record.businessKey}:` + workflowState.code,
          actionable: workflowState.actionable,
          taskLabel: workflowState.label,
          taskOwner: workflowState.ownerLabel,
          date: rowContext.startDate || rowContext.businessDate || "",
          quantity: activeRecordEntries.reduce((sum, row) => sum + Number(row.quantity || 1), 0),
          department: rowContext.department || firstEntry.department || "-",
          partner: rowContext.partner || record.actor?.organization || record.actor?.name || "-",
          store: rowContext.salesFloor || "-",
          createdAt: formatDateTimeText(record.registeredAt),
          timeRangeText: getRecordTimeRangeSummary(record),
          amountValue,
          amount: formatSummaryDecisionValue(amountValue, rowContext),
          searchText: [record.recordId, record.workGroup, rowContext.sequenceNo, rowContext.department, rowContext.salesFloor, firstEntry.productName, firstEntry.sku, workflowState.label, workflowState.ownerLabel, approval.label, integration.label].filter(Boolean).join(" ")
        };
      });

      const allRows = [...draftRows, ...recordRows];
      const todoRows = allRows.filter(row => row.sourceType === "draft" || row.actionable || row.stateColor === "error" || row.stateLabel.includes("失敗"));
      const calendarCounts = allRows.reduce((counts, row) => row.date ? ({ ...counts, [row.date]: (counts[row.date] || 0) + 1 }) : counts, {});
      const [calendarYear, calendarMonthNumber] = calendarMonth.split("-").map(Number);
      const calendarFirstDay = new Date(calendarYear, calendarMonthNumber - 1, 1).getDay();
      const calendarLastDate = new Date(calendarYear, calendarMonthNumber, 0).getDate();
      const calendarCells = [
        ...Array.from({ length: calendarFirstDay }, (_, index) => ({ key: `blank-${index}`, blank: true })),
        ...Array.from({ length: calendarLastDate }, (_, index) => {
          const day = index + 1;
          const date = `${calendarMonth}-${String(day).padStart(2, "0")}`;
          return { key: date, day, date, count: calendarCounts[date] || 0 };
        })
      ];
      const storeOptions = Array.from(new Set(allRows.map(row => row.store).filter(value => value && value !== "-")));
      const normalizedPartner = normalizeCode(appliedFilters.partner);
      const normalizedKeyword = normalizeCode(appliedFilters.keyword);
      const searchedRows = allRows
        .filter(row => !appliedFilters.department || row.department === appliedFilters.department)
        .filter(row => !appliedFilters.store || row.store === appliedFilters.store)
        .filter(row => !appliedFilters.startDate || !row.date || row.date >= appliedFilters.startDate)
        .filter(row => !appliedFilters.endDate || !row.date || row.date <= appliedFilters.endDate)
        .filter(row => !normalizedPartner || normalizeCode(row.partner).includes(normalizedPartner))
        .filter(row => !normalizedKeyword || normalizeCode([row.caseId, row.caseName, row.flowLabel, row.stateLabel, row.partner, row.store, row.searchText].join(" ")).includes(normalizedKeyword));
      const flowCounts = searchedRows.reduce((counts, row) => ({ ...counts, [row.businessKey]: (counts[row.businessKey] || 0) + 1 }), {});
      const flowFilteredRows = searchedRows.filter(row => flowFilter === "all" || row.businessKey === flowFilter);
      const statusOptions = Array.from(flowFilteredRows.reduce((map, row) => {
        if (!map.has(row.stateKey)) map.set(row.stateKey, { key: row.stateKey, label: row.stateLabel, color: row.stateColor, count: 0 });
        map.get(row.stateKey).count += 1;
        return map;
      }, new Map()).values());
      const statusOptionKeys = statusOptions.map(status => status.key).join("|");
      const filteredRows = flowFilteredRows
        .filter(row => statusFilter === "all" || row.stateKey === statusFilter)
        .sort((a, b) => String(b.createdAt).localeCompare(String(a.createdAt), "ja"));
      function collectLifecycleWorkLines(workflows, caseId) {
        const workLineMap = new Map();
        workflows.forEach(workflow => {
          const sourceEntries = workflow.source?.entries || [];
          sourceEntries.filter(entry => !entry.deletedAt).forEach((entry, index) => {
            const lifecycleEntry = buildWorkflowEntryForStage(entry, workflow.businessKey, workflow.source?.context || context);
            const key = lifecycleEntry.workLineId || `WL-${caseId}-${index + 1}`;
            const current = workLineMap.get(key) || { workLineId: key, slotNo: lifecycleEntry.slotNo || index + 1, latestWork: workflow };
            workLineMap.set(key, {
              ...current,
              workTypeId: lifecycleEntry.sku,
              workName: lifecycleEntry.productName,
              personName: lifecycleEntry.actual?.personName || lifecycleEntry.confirmation?.personName || lifecycleEntry.quote?.personName || lifecycleEntry.personName || "未割当",
              request: lifecycleEntry.request || current.request || null,
              quote: lifecycleEntry.quote || current.quote || null,
              confirmation: lifecycleEntry.confirmation || current.confirmation || null,
              actual: lifecycleEntry.actual || current.actual || null,
              billing: lifecycleEntry.billing || current.billing || null,
              payment: lifecycleEntry.payment || current.payment || null,
              latestWork: workflow
            });
          });
        });
        return Array.from(workLineMap.values()).sort((a, b) => Number(a.slotNo || 0) - Number(b.slotNo || 0));
      }
      const caseRows = Array.from(filteredRows.reduce((map, row) => {
        const key = String(row.caseId || row.rowId);
        if (!map.has(key)) map.set(key, { rowId: `case-${key}`, caseId: key, caseName: row.caseName, workflows: [] });
        map.get(key).workflows.push(row);
        return map;
      }, new Map()).values()).map(caseRow => {
        const workflows = [...caseRow.workflows].sort((a, b) => {
          const flowDiff = flowOrder.indexOf(a.businessKey) - flowOrder.indexOf(b.businessKey);
          return flowDiff || String(a.createdAt).localeCompare(String(b.createdAt), "ja");
        });
        const activeWorkflow = [...workflows].reverse().find(workflow => workflow.sourceType === "draft" || workflow.source?.currentTaskId);
        const latest = activeWorkflow || workflows[workflows.length - 1];
        const workLines = collectLifecycleWorkLines(workflows, caseRow.caseId).map(workLine => ({ ...workLine, latestWork: latest }));
        return { ...caseRow, workflows, latest, workLines, caseName: caseRow.caseName || latest.caseName };
