        const csv = "\uFEFF" + rows.map(row => row.map(csvEscape).join(",")).join("\r\n");
        saveTextFile(`workflow_mock_scenarios_${formatFileDate(new Date())}.csv`, csv, "text/csv;charset=utf-8;");
        setToast({ severity: "success", text: "シナリオ一覧CSVを出力しました。" });
      }
      async function exportScreenshotTargets(targets, filename, successLabel, mode) {
        if (!window.JSZip || !window.html2canvas) {
          setToast({ severity: "error", text: "画像出力ライブラリを読み込めていません。" });
          return;
        }
        const zip = new window.JSZip();
        const errors = [];
        const originalFrameSize = { ...frameSize };
        setScreenshotExport({ running: true, done: 0, total: targets.length, label: "準備中", mode });
        setToast({ severity: "info", text: `画面画像を出力中です。0/${targets.length}` });
        try {
          for (let index = 0; index < targets.length; index += 1) {
            const target = targets[index];
            const label = getScreenshotProgressLabel(target);
            setScreenshotExport({ running: true, done: index, total: targets.length, label, mode });
            try {
              await applyScreenshotTarget(target);
              const blob = await captureCurrentFrameBlob();
              zip.file(makeScreenshotFilename(target), blob);
            } catch (error) {
              console.error(error);
              errors.push({
                kind: target.kind,
                business: target.scenario.business,
                scenarioId: target.scenario.id,
                modal: target.modal?.id || "",
                step: target.step?.label,
                viewport: target.viewportConfig.label,
                message: error.message || String(error)
              });
            }
            const done = index + 1;
            setScreenshotExport({ running: true, done, total: targets.length, label, mode });
            if (done % 10 === 0 || done === targets.length) {
              setToast({ severity: errors.length ? "warning" : "info", text: `画面画像を出力中です。${done}/${targets.length}` });
            }
          }
          zip.file("manifest.json", JSON.stringify({
            generatedAt: new Date().toISOString(),
            total: targets.length,
            captured: targets.length - errors.length,
            errors
          }, null, 2));
          if (errors.length) zip.file("errors.json", JSON.stringify(errors, null, 2));
          const zipBlob = await zip.generateAsync({ type: "blob" });
          saveBlob(filename, zipBlob);
          setToast({ severity: errors.length ? "warning" : "success", text: errors.length ? `画像ZIPを出力しました。一部失敗: ${errors.length}件` : successLabel });
        } catch (error) {
          console.error(error);
          setToast({ severity: "error", text: "画面画像の出力に失敗しました。" });
        } finally {
          setScreenshotExport({ running: false, done: 0, total: 0, label: "", mode: null });
          setFrameSize(originalFrameSize);
          await waitForAnimationFrames(2);
          postState(activeStep?.payload || {});
        }
      }
      async function exportAllScreenshots() {
        await exportScreenshotTargets(
          enumerateScreenshotTargets(),
          `workflow_mock_screens_${formatFileDate(new Date())}.zip`,
          "全画面画像ZIPを出力しました。",
          "all"
        );
      }
      async function exportActiveScenarioScreenshots() {
        await exportScreenshotTargets(
          enumerateScenarioScreenshotTargets(activeScenario),
          `workflow_mock_scenario_${safeFilePart(activeScenario.id)}_${formatFileDate(new Date())}.zip`,
          "このシナリオの画像ZIPを出力しました。",
          "scenario"
        );
      }

      return (
        <Box sx={{ minHeight: "100vh", bgcolor: "#0f172a", overflow: "hidden" }}>
          <Box sx={{ minHeight: "100vh", width: "100%", display: "flex", alignItems: "center", justifyContent: "center", p: 2, overflow: "auto" }}>
            <Box sx={{ position: "relative", width: frameSize.width, maxWidth: "calc(100vw - 32px)", height: frameSize.height, maxHeight: "calc(100vh - 32px)", bgcolor: "white", borderRadius: viewportConfig.radius, overflow: "hidden", boxShadow: "0 22px 70px rgba(0,0,0,0.42)", border: "1px solid rgba(255,255,255,0.16)" }}>
              <iframe ref={iframeRef} title="実画面プレビュー" src={frameSrc} onLoad={() => window.setTimeout(() => postState(activeStep?.payload || {}), 120)} style={{ width: "100%", height: "100%", border: 0, display: "block", background: "#ffffff" }} />
            </Box>
          </Box>

          {!launcherOpen && launcherIconOnly && (
            <Tooltip title={`ランチャーを開く - ${activeStep?.label || ""}`}>
              <Fab color="primary" size="medium" onClick={() => { setLauncherIconOnly(false); setLauncherOpen(true); }} sx={{ position: "fixed", top: launcherPosition.top, right: launcherPosition.right, zIndex: 1800, boxShadow: launcherTranslucent ? "0 10px 28px rgba(15,23,42,0.14)" : undefined }}>
                <Icon>tune</Icon>
              </Fab>
            </Tooltip>
          )}

          {!launcherOpen && !launcherIconOnly && (
            <Paper data-launcher-surface="true" onPointerDown={beginLauncherDrag} elevation={12} sx={{ position: "fixed", top: launcherPosition.top, right: launcherPosition.right, zIndex: 1800, p: 1, borderRadius: 2, bgcolor: launcherTranslucent ? "rgba(255,255,255,0.68)" : "rgba(255,255,255,0.96)", backdropFilter: "blur(10px)", border: "1px solid rgba(15,23,42,0.14)", width: { xs: "calc(100% - 32px)", sm: 520 }, maxWidth: "calc(100vw - 32px)", cursor: "move", boxShadow: launcherTranslucent ? "0 10px 28px rgba(15,23,42,0.14)" : undefined }}>
              <Stack direction="row" spacing={1} alignItems="center" sx={{ minWidth: 0 }}>
                <Button size="small" variant="text" startIcon={<Icon>tune</Icon>} onClick={() => { setLauncherIconOnly(false); setLauncherOpen(true); }} sx={{ flexShrink: 0 }}>開く</Button>
                <Box sx={{ minWidth: 0, flex: 1 }}>
                  <Typography variant="caption" color="text.secondary" noWrap display="block">{activeScenario.label}</Typography>
                  <Typography variant="body2" sx={{ fontWeight: 900 }} noWrap>{activeStep?.label} <Typography component="span" variant="caption" color="text.secondary">({stepIndex + 1}/{steps.length}) / {selectedActor.roleLabel}</Typography></Typography>
                </Box>
                <IconButton size="small" onClick={() => { setScenarioAutoplay(false); moveStep(-1); }} disabled={stepIndex === 0 || imageExportRunning} aria-label="前のステップ"><Icon fontSize="small">arrow_back</Icon></IconButton>
                <IconButton size="small" color={scenarioAutoplay ? "warning" : "secondary"} onClick={() => setScenarioAutoplay(prev => !prev)} disabled={imageExportRunning || steps.length <= 1 || stepIndex >= steps.length - 1} aria-label={scenarioAutoplay ? "自動再生を停止" : "自動再生"}><Icon fontSize="small">{scenarioAutoplay ? "pause" : "play_arrow"}</Icon></IconButton>
                <IconButton size="small" color="primary" onClick={() => { setScenarioAutoplay(false); moveStep(1); }} disabled={stepIndex >= steps.length - 1 || imageExportRunning} aria-label="次のステップ"><Icon fontSize="small">arrow_forward</Icon></IconButton>
                <FormControl size="small" sx={{ width: 86, flexShrink: 0 }}>
                  <Select value={scenarioAutoplayMs} onChange={event => setScenarioAutoplayMs(Number(event.target.value))} displayEmpty>
                    {SCENARIO_AUTOPLAY_SPEEDS.map(item => <MenuItem key={item.value} value={item.value}>{item.label}</MenuItem>)}
                  </Select>
                </FormControl>
                <Tooltip title="アイコン化"><IconButton size="small" onClick={() => setLauncherIconOnly(true)} aria-label="ランチャーをアイコン化"><Icon fontSize="small">radio_button_checked</Icon></IconButton></Tooltip>
              </Stack>
            </Paper>
          )}

          {launcherOpen && (
            <Paper ref={panelRef} data-launcher-surface="true" elevation={14} sx={{ position: "fixed", top: launcherPosition.top, right: launcherPosition.right, zIndex: 1800, width: { xs: "calc(100% - 32px)", sm: launcherSize.width }, height: { xs: "auto", sm: launcherSize.height }, maxHeight: "calc(100vh - 32px)", minWidth: { xs: "auto", sm: 360 }, minHeight: { xs: "auto", sm: 420 }, overflow: "hidden", display: "flex", flexDirection: "column", borderRadius: 2, border: "1px solid rgba(15,23,42,0.14)", bgcolor: launcherTranslucent ? "rgba(255,255,255,0.68)" : "rgba(255,255,255,0.97)", backdropFilter: "blur(10px)", boxShadow: launcherTranslucent ? "0 10px 28px rgba(15,23,42,0.14)" : "0 18px 48px rgba(15,23,42,0.24)" }}>
              <Box onPointerDown={beginLauncherDrag} sx={{ p: 2, borderBottom: "1px solid", borderColor: "divider", cursor: "move", bgcolor: launcherTranslucent ? "rgba(255,255,255,0.34)" : "transparent" }}>
                <Stack direction="row" alignItems="flex-start" justifyContent="space-between" spacing={2}>
                  <Box>
                    <Stack direction="row" spacing={1} alignItems="center" flexWrap="wrap" useFlexGap>
                      <Typography variant="h6" sx={{ fontWeight: 900 }}>6業務共通モック</Typography>
                      <Chip size="small" color="warning" variant="outlined" label="Mock Launcher" />
                      <Chip size="small" color="primary" variant="outlined" label={APP_CONFIG.connectionMode.toUpperCase()} />
                    </Stack>
                  </Box>
                  <Stack direction="row" spacing={0.5} alignItems="center" sx={{ flexShrink: 0 }}>
                    <Tooltip title={launcherTranslucent ? "通常表示" : "半透明表示"}>
                      <Switch size="small" checked={launcherTranslucent} onChange={event => setLauncherTranslucent(event.target.checked)} inputProps={{ "aria-label": "半透明表示を切り替え" }} />
                    </Tooltip>
                    <Tooltip title="アイコン化"><IconButton onClick={() => { setLauncherIconOnly(true); setLauncherOpen(false); }} size="small" aria-label="ランチャーをアイコン化"><Icon>radio_button_checked</Icon></IconButton></Tooltip>
                    <Tooltip title="操作ツールバーへ最小化"><IconButton onClick={() => { setLauncherIconOnly(false); setLauncherOpen(false); }} size="small"><Icon>minimize</Icon></IconButton></Tooltip>
                  </Stack>
                </Stack>
              </Box>
              <Box sx={{ p: 2, overflow: "auto", flex: 1 }}>
                <Stack spacing={2}>
                  {toast && <Alert severity={toast.severity} onClose={() => setToast(null)}>{toast.text}</Alert>}
                  <Paper variant="outlined" sx={{ p: 1.5, bgcolor: "grey.50" }}>
                    <Stack direction="row" alignItems="center" justifyContent="space-between" spacing={1} sx={{ mb: 1 }}>
                      <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>確認シナリオ</Typography>
                      <Chip size="small" color="primary" variant="outlined" label={`${MOCK_SCENARIOS.length}本`} />
                    </Stack>
                    <Stack spacing={1}>
                      <FormControl fullWidth size="small">
                        <InputLabel>業務</InputLabel>
                        <Select label="業務" value={selectedBusinessKey} onChange={event => changeBusiness(event.target.value)} MenuProps={{ disablePortal: true, PaperProps: { sx: { maxHeight: 320 } } }}>
                          {Object.entries(BUSINESS).map(([key, item]) => <MenuItem key={key} value={key}>{item.label}（{scenarioCounts[key] || 0}本）</MenuItem>)}
                        </Select>
                      </FormControl>
                      <FormControl fullWidth size="small">
                        <InputLabel>シナリオ</InputLabel>
                        <Select label="シナリオ" value={activeScenario.id} onChange={event => changeScenario(event.target.value)} MenuProps={{ disablePortal: true, PaperProps: { sx: { maxHeight: 360 } } }}>
                          {scenariosForBusiness.map(scenario => <MenuItem key={scenario.id} value={scenario.id}>{scenario.label}</MenuItem>)}
                        </Select>
                      </FormControl>
                      <FormControl fullWidth size="small">
                        <InputLabel>アカウント</InputLabel>
                        <Select label="アカウント" value={selectedActorId} onChange={event => setSelectedActorId(event.target.value)} MenuProps={{ disablePortal: true, PaperProps: { sx: { maxHeight: 320 } } }}>
                          {ACTORS.map(actor => {
                            const fullActor = enrichActor(actor);
                            return <MenuItem key={actor.id} value={actor.id}>{fullActor.roleLabel}：{fullActor.name}（{fullActor.organization}）</MenuItem>;
                          })}
                        </Select>
                      </FormControl>
                      <Stack direction="row" spacing={0.75} flexWrap="wrap" useFlexGap>
                        <Chip size="small" color={BUSINESS[activeScenario.business]?.color || "primary"} variant="outlined" label={BUSINESS[activeScenario.business]?.label || activeScenario.business} />
                        <Chip size="small" variant="outlined" label={activeScenario.category || "確認"} />
                        <Chip size="small" color={selectedActor.roleColor} variant="outlined" label={selectedActor.roleLabel} />
                        <Chip size="small" variant="outlined" label={`${stepIndex + 1}/${steps.length}`} />
                      </Stack>
                    </Stack>
                    <Box sx={{ mt: 1.5 }}>
                      <Stack spacing={0.6} sx={{ maxHeight: scenarioListHeight, overflowY: "auto", pr: 0.5 }}>
                        {steps.map((step, index) => {
                          const active = index === stepIndex;
                          return (
                            <Button
                              key={`${step.label}-${index}`}
                              fullWidth
                              size="small"
                              variant={active ? "contained" : "outlined"}
                              color={active ? "primary" : "inherit"}
                              disabled={imageExportRunning}
                              onClick={() => jumpToStep(index)}
                              sx={{ justifyContent: "flex-start", textAlign: "left", py: 0.65, px: 1, borderColor: active ? "primary.main" : "divider" }}
                            >
                              <Stack direction="row" spacing={1} alignItems="center" sx={{ minWidth: 0, width: "100%" }}>
                                <Box sx={{ width: 24, height: 24, borderRadius: "50%", display: "grid", placeItems: "center", flexShrink: 0, bgcolor: active ? "rgba(255,255,255,0.22)" : "grey.100", color: active ? "inherit" : "text.secondary", fontSize: 12, fontWeight: 900 }}>
                                  {index + 1}
                                </Box>
                                <Box sx={{ minWidth: 0, flex: 1 }}>
                                  <Typography variant="body2" sx={{ fontWeight: 900, lineHeight: 1.2 }} noWrap>{step.label}</Typography>
                                  <Typography variant="caption" color={active ? "inherit" : "text.secondary"} display="block" noWrap>{step.description}</Typography>
                                </Box>
                              </Stack>
                            </Button>
                          );
                        })}
                      </Stack>
                      <Tooltip title="ドラッグしてシナリオリストの高さを変更">
                        <Box onPointerDown={beginScenarioListResize} role="separator" aria-label="シナリオリスト高さ変更" sx={{ height: 14, my: 0.5, display: "grid", placeItems: "center", cursor: "ns-resize", color: "text.secondary", borderRadius: 1, '&:hover': { bgcolor: "grey.100", color: "primary.main" } }}>
                          <Box sx={{ width: 44, height: 4, borderRadius: 2, bgcolor: "divider" }} />
                        </Box>
                      </Tooltip>
                      <Stack direction="row" spacing={1} justifyContent="space-between" alignItems="center">
                        <Button size="small" variant="outlined" startIcon={<Icon>arrow_back</Icon>} onClick={() => { setScenarioAutoplay(false); moveStep(-1); }} disabled={stepIndex === 0 || imageExportRunning}>戻る</Button>
                        <Button size="small" variant={scenarioAutoplay ? "contained" : "outlined"} color={scenarioAutoplay ? "warning" : "secondary"} startIcon={<Icon>{scenarioAutoplay ? "pause" : "play_arrow"}</Icon>} onClick={() => setScenarioAutoplay(prev => !prev)} disabled={imageExportRunning || steps.length <= 1 || stepIndex >= steps.length - 1}>{scenarioAutoplay ? "停止" : "自動再生"}</Button>
                        <Button size="small" variant="contained" endIcon={<Icon>arrow_forward</Icon>} onClick={() => { setScenarioAutoplay(false); moveStep(1); }} disabled={stepIndex >= steps.length - 1 || imageExportRunning}>次へ</Button>
                      </Stack>
                      <Stack direction="row" spacing={1} alignItems="center" sx={{ mt: 1 }}>
                        <Typography variant="caption" color="text.secondary" sx={{ flexShrink: 0 }}>再生速度</Typography>
                        <ToggleButtonGroup value={scenarioAutoplayMs} exclusive onChange={(_, next) => next && setScenarioAutoplayMs(next)} size="small" color="secondary" fullWidth>
                          {SCENARIO_AUTOPLAY_SPEEDS.map(item => <ToggleButton key={item.value} value={item.value}>{item.label}</ToggleButton>)}
                        </ToggleButtonGroup>
                      </Stack>
                    </Box>
                  </Paper>
                  <Box>
                    <Typography variant="caption" color="text.secondary" display="block" sx={{ mb: 0.8 }}>プレビュー幅</Typography>
                    <ToggleButtonGroup value={viewport} exclusive onChange={(_, next) => next && setViewport(next)} size="small" color="secondary" fullWidth><ToggleButton value={VIEWPORTS.DESKTOP}>Desktop</ToggleButton><ToggleButton value={VIEWPORTS.TABLET}>Tablet</ToggleButton><ToggleButton value={VIEWPORTS.MOBILE}>iPhone</ToggleButton></ToggleButtonGroup>
                    <Stack spacing={1.25} sx={{ mt: 1.2 }}>
                      <Box>
                        <Stack direction="row" justifyContent="space-between" alignItems="center" spacing={1}>
                          <Typography variant="caption" color="text.secondary">横幅</Typography>
                          <Chip size="small" variant="outlined" label={`${Math.round(frameSize.width)}px`} />
                        </Stack>
                        <Slider
                          size="small"
                          value={Math.round(frameSize.width)}
                          min={320}
                          max={Math.max(320, window.innerWidth - 32)}
                          step={10}
                          onChange={(_, value) => updateFrameDimension("width", value)}
                          valueLabelDisplay="auto"
                        />
                      </Box>
                      <Box>
                        <Stack direction="row" justifyContent="space-between" alignItems="center" spacing={1}>
                          <Typography variant="caption" color="text.secondary">縦幅</Typography>
                          <Chip size="small" variant="outlined" label={`${Math.round(frameSize.height)}px`} />
                        </Stack>
                        <Slider
                          size="small"
                          value={Math.round(frameSize.height)}
                          min={480}
                          max={Math.max(480, window.innerHeight - 32)}
                          step={10}
                          onChange={(_, value) => updateFrameDimension("height", value)}
                          valueLabelDisplay="auto"
                        />
                      </Box>
                    </Stack>
                  </Box>
                  <Paper variant="outlined" sx={{ p: 1.5 }}>
                    <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>出力</Typography>
                    <Stack direction={{ xs: "column", sm: "row" }} spacing={1} flexWrap="wrap" useFlexGap>
                      <Button variant="outlined" startIcon={<Icon>open_in_new</Icon>} onClick={() => window.open(frameSrc, "_blank", "noopener,noreferrer")} disabled={imageExportRunning}>別タブ</Button>
                      <Button variant="contained" color="secondary" startIcon={<Icon>download</Icon>} onClick={exportCurrent} disabled={imageExportRunning}>実画面HTML</Button>
                      <Button variant="outlined" color="secondary" startIcon={<Icon>photo_camera</Icon>} onClick={exportCurrentScreenshot} disabled={imageExportRunning}>{currentScreenshotRunning ? "現在画像出力中" : "現在PNG"}</Button>
                      <Button variant="outlined" color="secondary" startIcon={<Icon>collections</Icon>} onClick={exportActiveScenarioScreenshots} disabled={imageExportRunning}>{screenshotExport.running && screenshotExport.mode === "scenario" ? "シナリオ出力中" : "このシナリオPNG"}</Button>
                      <Button variant="outlined" color="secondary" startIcon={<Icon>image</Icon>} onClick={exportAllScreenshots} disabled={imageExportRunning}>{screenshotExport.running && screenshotExport.mode === "all" ? "一覧出力中" : "画面一覧PNG"}</Button>
                      <Button variant="outlined" color="secondary" startIcon={<Icon>table_view</Icon>} onClick={exportScenarioList} disabled={imageExportRunning}>シナリオCSV</Button>
                      <Button variant="text" color="secondary" startIcon={<Icon>code</Icon>} onClick={exportLauncher} disabled={imageExportRunning}>ランチャー込み</Button>
                    </Stack>
                    {screenshotExport.running && (
                      <Box sx={{ mt: 1.25 }}>
                        <Stack direction="row" justifyContent="space-between" spacing={1} alignItems="center" sx={{ mb: 0.5 }}>
                          <Typography variant="caption" color="text.secondary">{screenshotExport.mode === "scenario" ? "シナリオ画像出力" : "画面一覧画像出力"}</Typography>
                          <Typography variant="caption" sx={{ fontWeight: 900 }}>{screenshotExport.done}/{screenshotExport.total}（{Math.round((screenshotExport.done / Math.max(1, screenshotExport.total)) * 100)}%）</Typography>
                        </Stack>
                        <LinearProgress variant="determinate" value={Math.min(100, Math.round((screenshotExport.done / Math.max(1, screenshotExport.total)) * 100))} sx={{ height: 8, borderRadius: 1 }} />
                        {screenshotExport.label && <Typography variant="caption" color="text.secondary" display="block" noWrap sx={{ mt: 0.5 }}>{screenshotExport.label}</Typography>}
                      </Box>
                    )}
                  </Paper>
                  <Paper variant="outlined" sx={{ p: 1.5, bgcolor: "grey.50" }}>
                    <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>現在の状態</Typography>
                    <Stack spacing={0.8}><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">シナリオ</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{activeScenario.label}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">ステップ</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{activeStep?.label}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">アカウント</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{selectedActor.roleLabel} / {selectedActor.name}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">表示幅</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{viewportConfig.label}</Typography></Stack><Stack direction="row" justifyContent="space-between" spacing={2}><Typography variant="body2" color="text.secondary">表示サイズ</Typography><Typography variant="body2" sx={{ fontWeight: 900 }}>{Math.round(frameSize.width)} × {Math.round(frameSize.height)}</Typography></Stack></Stack>
                  </Paper>
                </Stack>
              </Box>
              <Tooltip title="ドラッグしてランチャーのサイズを変更"><Box role="separator" aria-label="ランチャーサイズ変更" onPointerDown={beginResize} sx={{ position: "absolute", left: 0, bottom: 0, width: 34, height: 34, display: { xs: "none", sm: "grid" }, placeItems: "center", cursor: "nesw-resize", color: "text.secondary", borderTop: "1px solid", borderRight: "1px solid", borderColor: "divider", bgcolor: "rgba(248,250,252,0.92)", '&:hover': { bgcolor: "grey.100", color: "primary.main" } }}><Icon fontSize="small" sx={{ transform: "rotate(45deg)" }}>drag_indicator</Icon></Box></Tooltip>
            </Paper>
          )}
        </Box>
      );
    }

    // ============================================================
    // [CORE] エントリポイント
    // ?embedded=1 → WorkflowApp（実画面）
    // それ以外    → LauncherApp（ランチャー）
    // ============================================================

    function App() {
      const params = new URLSearchParams(window.location.search);
      const isEmbedded = params.has("embedded");
      return (
        <ThemeProvider theme={theme}>
          <CssBaseline />
          <GlobalStyles styles={{ body: { background: isEmbedded ? "radial-gradient(circle at top left, rgba(25,118,210,0.12), transparent 34rem), #f6f7f9" : "#0f172a" }, "input, button, select, textarea": { fontFamily: "Roboto, Meiryo, sans-serif" } }} />
          {isEmbedded ? <WorkflowApp /> : <LauncherApp />}
        </ThemeProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
