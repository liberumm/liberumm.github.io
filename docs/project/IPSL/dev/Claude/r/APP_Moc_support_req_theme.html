      const lifecycleWorkRows = caseRows.flatMap(caseRow => caseRow.workLines.map(workLine => ({
        ...workLine.latestWork,
        rowId: `lifecycle-${caseRow.caseId}-${workLine.workLineId}`,
        caseId: caseRow.caseId,
        caseName: caseRow.caseName,
        lifecycle: workLine,
        amount: formatPersonHours(workLine.actual?.personMinutes ?? workLine.confirmation?.personMinutes ?? workLine.quote?.personMinutes ?? workLine.request?.personMinutes ?? 0)
      })));
      const displayRows = displayUnit === "case" ? caseRows : lifecycleWorkRows;
      const pagedRows = displayRows.slice(page * rowsPerPage, page * rowsPerPage + rowsPerPage);
      const actionRow = actionTarget?.row || null;
      const actionDisplayRow = actionTarget?.caseRow?.latest || actionRow;
      const actionRecord = actionRow?.sourceType === "record" ? actionRow.source : null;
      const actionStatusRecord = actionTarget?.caseRow?.latest?.source || actionRecord;
      const actionOperationRecord = actionStatusRecord || actionRecord;
      const actionStageStatuses = actionStatusRecord ? getWorkflowStageStatuses(actionStatusRecord) : null;
      const actionDetailRecord = actionStatusRecord || actionRecord;
      const actionDetailContext = actionDetailRecord?.context || actionRecord?.context || {};
      const actionDetailEntries = (actionDetailRecord?.entries || actionRecord?.entries || []).filter(row => !row.deletedAt);
      const actionHistory = [...(actionDetailRecord?.taskHistory || [])].reverse();
      const actionReturnHistory = [...(actionDetailRecord?.returnHistory || [])].reverse();
      const actionStageTotals = ["request", "quote", "confirmation", "actual"].reduce((totals, stageKey) => ({
        ...totals,
        [stageKey]: actionDetailEntries.reduce((sum, row) => sum + Number(row?.[stageKey]?.personMinutes || 0), 0)
      }), {});
      const actionTotalAmount = actionDetailEntries.reduce((sum, row) => sum + Number(row.billing?.calculatedAmount ?? row.actual?.calculatedAmount ?? row.confirmation?.calculatedAmount ?? row.quote?.calculatedAmount ?? row.request?.calculatedAmount ?? 0), 0);
      const actionLinked = actionOperationRecord ? isBackendLinkedRecord(actionOperationRecord) : false;
      const actionTask = actionOperationRecord ? getWorkflowTask(actionOperationRecord) : null;
      const actionCurrentTask = actionDetailRecord ? getWorkflowTask(actionDetailRecord) : null;
      const canRunTask = actionOperationRecord ? canExecuteWorkflowTask(actor, actionOperationRecord) : false;
      const actionNeedsCrud = Boolean(actionTask && (["quote_register", "completion_register"].includes(actionTask.id) || actionTask.revisionTask));
      const canCorrectActionRecord = Boolean(actionOperationRecord && canCorrectRecord && (normalizedActorRoleKey(actor) === "service_owner" || canSubmitWorkflowWork(actor, actionOperationRecord.businessKey)));
      const canDirectReturn = actionOperationRecord ? canReturnWorkflow(actor, actionOperationRecord) : false;
      const canRequestReturn = actionOperationRecord ? canRequestWorkflowReturn(actor, actionOperationRecord) : false;
      const pendingReturnRequests = actionOperationRecord ? getPendingReturnRequests(actionOperationRecord) : [];

      React.useEffect(() => { if (page > 0 && page * rowsPerPage >= displayRows.length) setPage(0); }, [displayRows.length, rowsPerPage]);
      React.useEffect(() => { if (statusFilter !== "all" && !statusOptions.some(status => status.key === statusFilter)) setStatusFilter("all"); }, [statusFilter, statusOptionKeys]);

      function runSearch() {
        setAppliedFilters({ startDate, endDate, store, department, partner: partner.trim(), keyword: keyword.trim() });
        setPage(0);
      }
      function clearFilters() {
        setStartDate("");
        setEndDate("");
        setStore("");
        setDepartment("");
        setPartner("");
        setKeyword("");
        setAppliedFilters({ startDate: "", endDate: "", store: "", department: "", partner: "", keyword: "" });
        setPage(0);
      }
      function toggleCase(caseId) {
        setExpandedCases(prev => prev.includes(caseId) ? prev.filter(id => id !== caseId) : [...prev, caseId]);
      }
      function shiftCalendarMonth(delta) {
        const next = new Date(calendarYear, calendarMonthNumber - 1 + delta, 1);
        setCalendarMonth(`${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, "0")}`);
      }
      function selectCalendarDate(date) {
        setStartDate(date);
        setEndDate(date);
        setAppliedFilters(prev => ({ ...prev, startDate: date, endDate: date }));
        setPage(0);
      }
      function openRow(row) {
        if (row.sourceType === "draft") {
          if (canEdit) onEditDraft?.(row.firstEntry);
        } else onOpenRecord?.(row.source);
      }
      function openActionPanel(row, caseRow = null) {
        setActionTarget({ row, caseRow });
      }
      function runRecordAction(action) {
        if (!actionOperationRecord) return;
        onRecordAction?.(action, actionOperationRecord);
        setActionTarget(null);
      }
      function openReturnDialog(mode, request = null) {
        if (!actionOperationRecord) return;
        setReturnReason(request?.reason || "");
        setReturnDialog({ mode, record: actionOperationRecord, request });
      }
      function submitReturnDialog() {
        const reason = returnReason.trim();
        if (!returnDialog?.record || !reason) return;
        if (returnDialog.mode === "request") onRequestWorkflowReturn?.(returnDialog.record, reason);
        else onReturnWorkflow?.(returnDialog.record, reason, returnDialog.request || null);
        setReturnDialog(null);
        setReturnReason("");
        setActionTarget(null);
      }
      function rejectReturnRequest(request) {
        if (!actionOperationRecord || !request) return;
        onResolveReturnRequest?.(actionOperationRecord, request.id, "rejected");
        setActionTarget(null);
      }

      return (
        <Stack spacing={1.25}>
          <CollapsibleSection title="検索" icon="search" summary="期間・店舗・部門・取引先・フリーワード">
            <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap" alignItems="center" component="form" onSubmit={event => { event.preventDefault(); runSearch(); }}>
              <TextField size="small" type="date" label="開始日" value={startDate} onChange={event => setStartDate(event.target.value)} InputLabelProps={{ shrink: true }} sx={{ minWidth: 155 }} />
              <TextField size="small" type="date" label="終了日" value={endDate} onChange={event => setEndDate(event.target.value)} InputLabelProps={{ shrink: true }} inputProps={{ min: startDate || undefined }} sx={{ minWidth: 155 }} />
              <FormControl size="small" sx={{ minWidth: 150 }}><InputLabel>店舗</InputLabel><Select label="店舗" value={store} onChange={event => setStore(event.target.value)}><MenuItem value="">すべて</MenuItem>{storeOptions.map(item => <MenuItem key={item} value={item}>{item}</MenuItem>)}</Select></FormControl>
              <FormControl size="small" sx={{ minWidth: 150 }}><InputLabel>部門</InputLabel><Select label="部門" value={department} onChange={event => setDepartment(event.target.value)}><MenuItem value="">すべて</MenuItem>{DEPARTMENTS.map(item => <MenuItem key={item} value={item}>{item}</MenuItem>)}</Select></FormControl>
              <TextField size="small" label="取引先" value={partner} onChange={event => setPartner(event.target.value)} sx={{ minWidth: 170 }} />
              <TextField size="small" label="フリーワード" placeholder="依頼No、案件名など" value={keyword} onChange={event => setKeyword(event.target.value)} sx={{ minWidth: { xs: "100%", sm: 220 } }} InputProps={{ startAdornment: <InputAdornment position="start"><Icon>search</Icon></InputAdornment> }} />
              <Button type="submit" size="medium" variant="contained" startIcon={<Icon>search</Icon>}>検索</Button>
              <Button size="medium" variant="outlined" onClick={clearFilters}>クリア</Button>
            </Stack>
          </CollapsibleSection>

          <CollapsibleSection title="カレンダー" icon="calendar_month" summary={`${calendarYear}年${calendarMonthNumber}月`} defaultExpanded={false}>
            <Stack direction="row" alignItems="center" justifyContent="center" spacing={1} sx={{ mb: 1 }}>
              <IconButton size="small" aria-label="前月" onClick={() => shiftCalendarMonth(-1)}><Icon>chevron_left</Icon></IconButton>
              <Typography variant="subtitle1" sx={{ minWidth: 130, textAlign: "center", fontWeight: 900 }}>{calendarYear}年{calendarMonthNumber}月</Typography>
              <IconButton size="small" aria-label="翌月" onClick={() => shiftCalendarMonth(1)}><Icon>chevron_right</Icon></IconButton>
            </Stack>
            <Box sx={{ display: "grid", gridTemplateColumns: "repeat(7, minmax(0, 1fr))", gap: 0.5 }}>
              {["日", "月", "火", "水", "木", "金", "土"].map((label, index) => <Typography key={label} variant="caption" align="center" color={index === 0 ? "error.main" : index === 6 ? "primary.main" : "text.secondary"} sx={{ fontWeight: 900, py: 0.5 }}>{label}</Typography>)}
              {calendarCells.map(cell => cell.blank ? <Box key={cell.key} /> : (
                <Button key={cell.key} color={cell.date === todayText() ? "primary" : "inherit"} variant={cell.count ? "outlined" : "text"} onClick={() => selectCalendarDate(cell.date)} sx={{ minWidth: 0, minHeight: 54, p: 0.5, display: "flex", flexDirection: "column", lineHeight: 1.1 }}>
                  <Typography variant="body2" sx={{ fontWeight: cell.date === todayText() ? 900 : 600 }}>{cell.day}</Typography>
                  {cell.count > 0 && <Chip size="small" color="primary" label={`${cell.count}件`} sx={{ mt: 0.35, height: 19, "& .MuiChip-label": { px: 0.75, fontSize: 10 } }} />}
                </Button>
              ))}
            </Box>
            <Typography variant="caption" color="text.secondary" display="block" sx={{ mt: 1 }}>日付を選択すると、その日の開始日・終了日を検索条件へ反映します。</Typography>
          </CollapsibleSection>

          <CollapsibleSection title="やることリスト" icon="checklist" summary={`${todoRows.length}件`} defaultExpanded={true}>
            {todoRows.length === 0 ? <Typography color="text.secondary" sx={{ py: 1 }}>現在対応が必要な項目はありません。</Typography> : (
              <Stack spacing={0.75}>
                {todoRows.slice(0, 8).map(row => (
                  <Paper key={`todo-${row.rowId}`} variant="outlined" sx={{ px: 1.25, py: 0.9 }}>
                    <Stack direction="row" spacing={1} alignItems="center">

                      </Box>

                    </Stack>
                  </Paper>
                ))}
                {todoRows.length > 8 && <Typography variant="caption" color="text.secondary">ほか {todoRows.length - 8}件</Typography>}
              </Stack>

          </CollapsibleSection>

          <Paper variant="outlined" sx={{ p: 1.5 }}>
            <Stack direction="row" spacing={1} alignItems="center" sx={{ mb: 1 }}>
              <Icon color="primary" sx={{ fontSize: 21 }}>timeline</Icon>
              <Typography variant="subtitle1" sx={{ flex: 1, fontWeight: 900 }}>進行状況</Typography>
              <Typography variant="caption" color="text.secondary">{searchedRows.length}作業</Typography>
            </Stack>
            <ToggleButtonGroup exclusive size="small" value={flowFilter} onChange={(_, value) => { if (value !== null) { setFlowFilter(value); setPage(0); } }} aria-label="進行状態で絞り込み" sx={{ flexWrap: "wrap", gap: 0.75, "& .MuiToggleButtonGroup-grouped": { border: "1px solid", borderColor: "divider", borderRadius: "8px !important", px: 1.5 } }}>
              <ToggleButton value="all" aria-label="すべて">すべて（{searchedRows.length}）</ToggleButton>
              {Object.entries(BUSINESS).map(([key, item]) => <ToggleButton key={key} value={key} aria-label={item.label}>{item.shortLabel}（{flowCounts[key] || 0}）</ToggleButton>)}
            </ToggleButtonGroup>
            <Divider sx={{ my: 1.25 }} />
            <Typography variant="caption" color="text.secondary" display="block" sx={{ mb: 0.75, fontWeight: 800 }}>対応状態で絞り込み</Typography>
            <ToggleButtonGroup exclusive size="small" value={statusFilter} onChange={(_, value) => { if (value !== null) { setStatusFilter(value); setPage(0); } }} aria-label="対応状態で絞り込み" sx={{ flexWrap: "wrap", gap: 0.75, "& .MuiToggleButtonGroup-grouped": { border: "1px solid", borderColor: "divider", borderRadius: "8px !important", px: 1.25, py: 0.5 } }}>
              <ToggleButton value="all" aria-label="すべての対応状態">すべて</ToggleButton>
              {statusOptions.map(status => <ToggleButton key={status.key} value={status.key} aria-label={status.label}>{status.label}（{status.count}）</ToggleButton>)}
            </ToggleButtonGroup>

          <CollapsibleSection title="データテーブル" icon="table_view" summary={`${displayRows.length}件`} contentSx={{ p: 0 }}>

              <Box>

                <ToggleButtonGroup exclusive size="small" value={displayUnit} onChange={(_, value) => { if (value !== null) { setDisplayUnit(value); setPage(0); } }} aria-label="一覧の表示単位">

                </ToggleButtonGroup>
                {draftRows.length > 0 && <Button variant="outlined" onClick={onConfirmDraft} disabled={!canConfirm || confirmDisabled}>作業確定</Button>}

                  <TableBody>
                    {pagedRows.map((caseRow, index) => {
                      const open = expandedCases.includes(caseRow.caseId);
                      const latest = caseRow.latest;
                      return (
                        <React.Fragment key={caseRow.rowId}>
                          <TableRow hover onClick={() => toggleCase(caseRow.caseId)} onKeyDown={event => { if (event.key === "Enter" || event.key === " ") { event.preventDefault(); toggleCase(caseRow.caseId); } }} tabIndex={0} role="button" aria-expanded={open} sx={{ cursor: "pointer" }}>

                            <TableCell sx={{ fontWeight: 800 }}>{caseRow.caseId}</TableCell>

                          </TableRow>

                                  <Box sx={{ flex: 1, minWidth: 0 }}><Typography variant="body2" sx={{ fontWeight: 800 }}>{event.action || task?.actionLabel || task?.label || event.taskId}</Typography><Typography variant="caption" color="text.secondary" display="block">{actorLabel}{event.actorRoleKey ? ` / ${ACTOR_ROLES[event.actorRoleKey]?.label || event.actorRoleKey}` : ""}</Typography></Box>
                                  <Typography variant="caption" color="text.secondary" sx={{ whiteSpace: "nowrap" }}>{formatDateTimeText(event.completedAt)}</Typography>
                                </Stack>
                              </React.Fragment>
                            );

                      )}
                    </Stack>

                )}

              <Button variant="outlined" size="large" onClick={() => setActionTarget(null)}>閉じる</Button>

            confirmLabel={returnDialog?.mode === "request" ? "差戻依頼を送信" : "差し戻す"}

                <Button fullWidth variant="contained" startIcon={<Icon>dataset</Icon>} disabled={demoLoading} onClick={() => runDemoAction(onGenerateDemoData, result => `${result?.caseCount || 0}案件・${result?.recordCount || 0}作業を読み込みました。`)}>サンプルデータ生成・読込</Button>
                <Button fullWidth variant="outlined" startIcon={<Icon>rule</Icon>} disabled={demoLoading} onClick={() => runDemoAction(onValidateApiData, result => `API形式の検証に成功しました（${result?.recordCount || 0}作業）。`)}>現在データをAPI形式で検証</Button>

    function ScanScreen({ actor, context, setContext, entries, setEntries, setScreen, confirmedRecord, openDrawerRequest, closeDrawerRequest, screenshotModal, screenshotRevision, onBindActions }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const canRegister = actorHasPermission(actor, "register");
      const canEdit = actorHasPermission(actor, "edit");
      const canDelete = actorHasPermission(actor, "delete");
      const activeEntries = getActiveEntries(entries);
      const isConfirmed = Boolean(confirmedRecord) && activeEntries.length === 0;
      const trashEntries = getTrashEntries(entries);
      const numericFields = getNumericItemFields(context);
      const [productInput, setProductInput] = React.useState("");
      const [item, setItem] = React.useState(() => createDefaultItem(context.businessKey, context));
      const [message, setMessage] = React.useState(null);
      const [sheetOpen, setSheetOpen] = React.useState(false);
      const [numberPadOpen, setNumberPadOpen] = React.useState(false);
      const [responseConsentOpen, setResponseConsentOpen] = React.useState(false);
      const [activeNumberField, setActiveNumberField] = React.useState(null);
      const [deleteTarget, setDeleteTarget] = React.useState(null);
      const [trashOpen, setTrashOpen] = React.useState(false);
      const [selectedEntryIds, setSelectedEntryIds] = React.useState([]);
      const [entrySearchOpen, setEntrySearchOpen] = React.useState(false);
      const [entrySearchInput, setEntrySearchInput] = React.useState("");
      const [entrySearchQuery, setEntrySearchQuery] = React.useState("");
      const productInputRef = React.useRef(null);
      const numberInputRefs = React.useRef({});
      const normalizedEntrySearchQuery = normalizeCode(entrySearchQuery);
      const entryMatchesSearch = row => {
        if (!normalizedEntrySearchQuery) return true;
        const status = getStatus(row, context);
        return normalizeCode([
          row.sku,
          row.barcode,
          row.productName,
          row.department,
          row.workGroup,
          row.saleType,
          row.origin,
          row.traceCode,
          row.reason,
          row.adjustmentType,
          status.label,
          status.helper,
          formatDecisionValue(row, context)
        ].filter(Boolean).join(" ")).includes(normalizedEntrySearchQuery);
      };
      const displayedEntries = normalizedEntrySearchQuery ? activeEntries.filter(entryMatchesSearch) : activeEntries;
      const issueCount = activeEntries.filter(row => getStatus(row, context).color === "error").length;
      const selectedEntries = activeEntries.filter(row => selectedEntryIds.includes(row.id));
      const allEntriesSelected = displayedEntries.length > 0 && displayedEntries.every(row => selectedEntryIds.includes(row.id));
      const partialEntriesSelected = displayedEntries.some(row => selectedEntryIds.includes(row.id)) && !allEntriesSelected;
      const isQuoteSlotAssigned = row => Boolean(row?.personName && row?.proposedStartTime && row?.proposedEndTime);
      const quoteSlotEntries = context.businessKey === "returnGoods" ? [...activeEntries].sort((a, b) => Number(a.slotNo || 0) - Number(b.slotNo || 0)) : [];
      const quoteCurrentIndex = quoteSlotEntries.findIndex(row => row.id === item.id);
      const quoteAssignedCount = quoteSlotEntries.filter(isQuoteSlotAssigned).length;
      const quoteHasUnassignedOther = quoteSlotEntries.some(row => row.id !== item.id && !isQuoteSlotAssigned(row));

      React.useEffect(() => {
        setItem(createDefaultItem(context.businessKey, context));
        setProductInput("");
        setMessage(null);
        setSheetOpen(false);
        setNumberPadOpen(false);
        setResponseConsentOpen(false);
        setActiveNumberField(null);
        setEntrySearchOpen(false);
        setEntrySearchInput("");
        setEntrySearchQuery("");
        setSelectedEntryIds([]);
      }, [context.businessKey]);
      React.useEffect(() => { if (context.adjustmentType === "廃棄") setItem(prev => ({ ...prev, afterPrice: 0 })); }, [context.adjustmentType]);
      React.useEffect(() => {
        if (activeNumberField && !numericFields.includes(activeNumberField)) setActiveNumberField(numericFields[0] || null);
      }, [context.businessKey, context.adjustmentType, activeNumberField, numericFields.join("|")]);
      React.useEffect(() => {
        if (!sheetOpen) return;
        window.setTimeout(() => {
          if (item.sku) focusNumberField("quantity", false);
          else productInputRef.current?.focus();
          if (!item.sku) productInputRef.current?.select?.();
        }, 120);
      }, [sheetOpen]);
      React.useEffect(() => {
        if (openDrawerRequest) openForNew();
      }, [openDrawerRequest]);
      React.useEffect(() => {
        if (closeDrawerRequest) setSheetOpen(false);
      }, [closeDrawerRequest]);
      React.useEffect(() => {
        setSelectedEntryIds(prev => prev.filter(id => activeEntries.some(row => row.id === id)));
      }, [activeEntries.length, context.businessKey]);
      React.useEffect(() => {
        setTrashOpen(screenshotModal === "scanTrash");
        setDeleteTarget(screenshotModal === "scanDeleteConfirm" ? (activeEntries[0] || null) : null);
      }, [screenshotModal, screenshotRevision, activeEntries.length, context.businessKey]);

      function updateItem(name, value) {
        setItem(prev => {
          const next = { ...prev, [name]: value };
          if (name === "offeredHourlyRate") {
            next.currentPrice = Number(value || 0);
            next.displayPrice = Number(value || 0);
          }
          if (context.businessKey === "label" && name === "traceCode") {
            const inferredOrigin = inferOriginFromTraceCode(value);
            if (inferredOrigin) next.origin = inferredOrigin;
          }
          return next;
        });
      }
      function updateRequestCondition(name, value) {
        setContext(prev => {
          const next = { ...prev, [name]: value };
          if (name === "adjustmentType" && value === "棚卸応援") next.reason = "棚卸対応";
          if (name === "adjustmentType" && value === "") next.reason = "";
          return next;
        });
      }
      function assignPartnerStaff(personId) {
        const staff = PARTNER_STAFF_CANDIDATES.find(candidate => candidate.id === personId);
        setItem(prev => ({
          ...prev,
          personId: staff?.id || null,
          personName: staff?.name || "",
          proposedStartTime: staff?.availableStart || prev.proposedStartTime,
          proposedEndTime: staff?.availableEnd || prev.proposedEndTime
        }));
      }
      function copyRequestedTimeToQuote() {
        setItem(prev => ({
          ...prev,
          proposedStartTime: prev.request?.startTime || prev.startTime || "09:00",
          proposedEndTime: prev.request?.endTime || prev.endTime || "17:00",
          proposedBreakMinutes: Number(prev.request?.breakMinutes ?? prev.breakMinutes ?? 0)
        }));
      }
      function shiftProposedEndTime(deltaMinutes) {
        setItem(prev => {
          const currentEnd = timeTextToMinutes(prev.proposedEndTime || prev.request?.endTime || prev.endTime);
          if (currentEnd === null) return prev;
          return { ...prev, proposedEndTime: minutesToTimeText(currentEnd + deltaMinutes) };
        });
      }
      function focusNumberField(field, openPad = true) {
        if (!field || !numericFields.includes(field)) return;
        setActiveNumberField(field);
        if (openPad) setNumberPadOpen(true);
        window.setTimeout(() => {
          const input = numberInputRefs.current[field];
          input?.focus?.();
          input?.select?.();
        }, 80);
      }
      function moveNumberFocus(delta) {
        if (!numericFields.length) return;
        const currentIndex = activeNumberField ? numericFields.indexOf(activeNumberField) : -1;
        const nextIndex = currentIndex < 0 ? 0 : Math.max(0, Math.min(currentIndex + delta, numericFields.length - 1));
        focusNumberField(numericFields[nextIndex]);
      }
      function selectProduct(product) {
        if (!product) return;
        setProductInput(product.barcode);
        setContext(prev => ({ ...prev, department: product.department }));
        setItem(prev => ({
          ...prev,
          sku: product.sku,
          barcode: product.barcode,
          productName: product.name,
          workGroup: context.workGroup || prev.workGroup || "セッション1",
          department: product.department,
          currentPrice: Number(prev.offeredHourlyRate || 2500),
          quantity: 1,
          beforePrice: "",
          afterPrice: "",
          displayPrice: Number(prev.offeredHourlyRate || 2500)
        }));
        window.setTimeout(() => productInputRef.current?.blur?.(), 120);
      }
      function searchProduct() {
        if (!String(productInput || "").trim()) { productInputRef.current?.focus?.(); productInputRef.current?.select?.(); return; }
        const product = findProduct(productInput);
        if (!product) { setMessage({ severity: "warning", text: "作業が見つかりません。一覧から選択してください。" }); productInputRef.current?.focus?.(); productInputRef.current?.select?.(); return; }
        selectProduct(product);
      }
      function runPrimaryDrawerAction() {
        if (!canRegister) { setMessage({ severity: "warning", text: `${enrichActor(actor).roleLabel}は登録できません。ランチャーで登録可能なアカウントに切り替えてください。` }); return; }
        if (item.sku) { saveItem(); return; }
        if (String(productInput || "").trim()) { searchProduct(); return; }
        setMessage({ severity: "info", text: "案件コードまたは応援内容を入力して検索するか、案件一覧から選択してください。" });
        window.setTimeout(() => { productInputRef.current?.focus?.(); productInputRef.current?.select?.(); }, 80);
      }
      function clearItem() {
        setItem(createDefaultItem(context.businessKey, context));
        setProductInput("");
        setActiveNumberField(null);
        setNumberPadOpen(false);
        window.setTimeout(() => { productInputRef.current?.focus?.(); productInputRef.current?.select?.(); }, 80);
      }
      function openForNew() {
        if (context.businessKey === "returnGoods" && quoteSlotEntries.length) {
          loadEntryIntoDrawer(quoteSlotEntries.find(row => !isQuoteSlotAssigned(row)) || quoteSlotEntries[0]);
          return;
        }
        clearItem();
        setMessage(null);
        setNumberPadOpen(false);
        setSheetOpen(true);
      }
      function loadEntryIntoDrawer(row) {
        if (!row) return;
        setItem({ ...row });
        setProductInput(row.barcode || row.sku);
        setMessage(null);
        setNumberPadOpen(false);
        setSheetOpen(true);
      }
      function startEdit(row) {
        if (!canEdit) { setMessage({ severity: "warning", text: `${enrichActor(actor).roleLabel}は明細を修正できません。` }); return; }
        loadEntryIntoDrawer(row);
        window.setTimeout(() => focusNumberField("quantity", false), 160);
      }
      function saveItem(options = {}) {
        if (!canRegister) { setMessage({ severity: "warning", text: `${enrichActor(actor).roleLabel}は登録できません。` }); return; }
        const errors = validateItem(item, context);
        if (errors.length && !(context.businessKey === "priceCheck" && errors.includes("売価不一致"))) { setMessage({ severity: "error", text: errors.join(" / ") }); return; }
        if (context.businessKey === "returnGoods" && !options.skipConsent) {
          setResponseConsentOpen(true);
          return;
        }
        const isEdit = Boolean(item.id);
        const next = { ...item, workLineId: item.workLineId || `WL-${Date.now()}-${Math.random().toString(16).slice(2, 7)}`, slotNo: item.slotNo || activeEntries.length + 1, quantity: 1, workGroup: item.workGroup || context.workGroup || "セッション1", id: item.id || `E-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`, deletedAt: null };
        const nextQuoteSlot = context.businessKey === "returnGoods" ? quoteSlotEntries.find(row => row.id !== item.id && !isQuoteSlotAssigned(row)) : null;
        setEntries(prev => isEdit ? prev.map(row => row.id === item.id ? next : row) : [next, ...prev]);
        setResponseConsentOpen(false);
        if (isEdit && nextQuoteSlot) {
          loadEntryIntoDrawer(nextQuoteSlot);
          setMessage({ severity: "success", text: `枠${item.slotNo || "-"}を保存しました。次の未割当枠を表示しています。` });
        } else {
          setSheetOpen(!isEdit);
          if (errors.length) setMessage({ severity: "warning", text: "登録しました。まだ確認が必要です。" });
          else setMessage(null);
          clearItem();
        }
      }
      function requestRemoveItem(row) {
        if (!canDelete) { setMessage({ severity: "warning", text: `${enrichActor(actor).roleLabel}は明細を削除できません。` }); return; }
        setDeleteTarget(row);
      }
      function confirmRemoveItem() {
        if (!deleteTarget) return;
        const now = Date.now();
        setEntries(prev => prev.map(row => row.id === deleteTarget.id ? { ...row, deletedAt: now } : row));
        setSelectedEntryIds(prev => prev.filter(id => id !== deleteTarget.id));
        setDeleteTarget(null);
        setMessage({ severity: "info", text: "明細をごみ箱に移動しました。2日後に完全削除されます。" });
      }
      function toggleEntrySelection(row) {
        setSelectedEntryIds(prev => prev.includes(row.id) ? prev.filter(id => id !== row.id) : [...prev, row.id]);
      }
      function toggleAllEntries(checked) {
        const visibleIds = new Set(displayedEntries.map(row => row.id));
        setSelectedEntryIds(prev => checked ? Array.from(new Set([...prev, ...displayedEntries.map(row => row.id)])) : prev.filter(id => !visibleIds.has(id)));
      }
      function applyEntrySearch(value = entrySearchInput) {
        const nextQuery = String(value || "").trim();
        setEntrySearchInput(nextQuery);
        setEntrySearchQuery(nextQuery);
        setEntrySearchOpen(Boolean(nextQuery));
        setSelectedEntryIds([]);
      }
      function toggleEntrySearchArea() {
        setEntrySearchOpen(prev => !prev);
      }
      function clearEntrySearch() {
        setEntrySearchInput("");
        setEntrySearchQuery("");
        setEntrySearchOpen(true);
        setSelectedEntryIds([]);
      }
      function bulkRemoveItems() {
        if (!canDelete) { setMessage({ severity: "warning", text: `${enrichActor(actor).roleLabel}は明細を削除できません。` }); return; }
        if (selectedEntries.length === 0) return;
        const now = Date.now();
        const selectedIds = new Set(selectedEntryIds);
        setEntries(prev => prev.map(row => selectedIds.has(row.id) ? { ...row, deletedAt: now } : row));
        setSelectedEntryIds([]);
        setMessage({ severity: "info", text: `${selectedEntries.length}件の明細をごみ箱に移動しました。` });
      }
      function restoreItem(id) { setEntries(prev => prev.map(row => row.id === id ? { ...row, deletedAt: null } : row)); setMessage({ severity: "success", text: "明細を復活しました。" }); }
      function permanentDeleteItem(id) { setEntries(prev => prev.filter(row => row.id !== id)); setMessage({ severity: "info", text: "明細を完全削除しました。" }); }
      function setNumberField(field, rawValue) {
        if (!field) return;
        const normalized = rawValue === "" ? "" : (field === "sequenceNo" ? rawValue : Number(rawValue));
        updateItem(field, normalized);
      }
      function appendNumberPadValue(key) {
        const field = activeNumberField;
        if (!field) return;
        const current = item[field];
        const raw = `${current === undefined || current === null ? "" : current}${key}`;
        const nextRaw = field === "sequenceNo" ? raw : raw.replace(/^0+(?=\d)/, "");
        setNumberField(field, nextRaw);
      }
      function backspaceNumberPadValue() {
        const field = activeNumberField;
        if (!field) return;
        const current = item[field];
        const nextRaw = String(current === undefined || current === null ? "" : current).slice(0, -1);
        setNumberField(field, nextRaw);

    function ConfirmScreen({ actor, context, setContext, entries, setEntries, confirmedRecord, confirmedRecords, syncStatus, screenshotModal, screenshotRevision, onConfirmRecord, onEditRecord, onUpdateRecord, onAddCorrectionRecord, onBindAction }) {
      const business = BUSINESS[context.businessKey] || BUSINESS.price;
      const canApproveRecord = actorHasPermission(actor, "approve");
      const canUnapproveRecord = actorHasPermission(actor, "unapprove");
      const canCorrectRecord = actorHasPermission(actor, "correct") || actorHasPermission(actor, "edit");
      const canDeleteRecord = actorHasPermission(actor, "delete") || actorHasPermission(actor, "correct");
      const canOutputRecord = actorHasPermission(actor, "output") || canApproveRecord;
      const [searchInput, setSearchInput] = React.useState(context.outputSearch || "");
      const [searchQuery, setSearchQuery] = React.useState(context.outputSearch || "");
      const allRecordsForBusiness = (confirmedRecords || []).filter(record => record.businessKey === context.businessKey);
      const allRecordRows = allRecordsForBusiness.flatMap(record => (record.entries || []).map((row, index) => ({ ...row, __record: record, __recordIndex: index })));
      const recordTrashEntries = allRecordRows.filter(row => row.deletedAt);
      const normalizedSearchQuery = normalizeCode(searchQuery);
      const recordMatchesSearch = record => {
        if (!normalizedSearchQuery) return true;
        const addedCorrections = allRecordsForBusiness.filter(item => (item.correctionOf || item.sourceRecordId) === record.recordId && (item.entries || []).some(row => !row.deletedAt));
        const addedCorrectionText = addedCorrections.length ? `訂正データあり ${addedCorrections.length}件` : "";
        return normalizeCode([
          record.recordId,
          record.workGroup,
          record.status,
          getApprovalStatusInfo(record).label,
          getIntegrationStatus(record).label,
          record.integrationState,
          record.syncState,
          record.integrationDate,
          record.approvedAt,
          record.integrationTarget,
          record.correctionOf,
          record.sourceRecordId,
          record.sourceWorkGroup,
          addedCorrectionText,
          formatDateTimeText(record.registeredAt)
        ].filter(Boolean).join(" ")).includes(normalizedSearchQuery);
      };
      const rowMatchesSearch = row => {
        if (!normalizedSearchQuery) return true;
        const record = row.__record || {};
        if (recordMatchesSearch(record)) return true;
        return normalizeCode([
          row.sku,
          row.barcode,
          row.productName,
          row.department,
          row.workGroup,
          row.saleType,
          row.origin,
          row.traceCode,
          row.sourceEntryId,
          row.sourceRecordId,
          row.correctionOf,
          row.correctionAction,
          getCorrectionRelationLabel(record, row),
          formatDecisionValue(row, context)
        ].filter(Boolean).join(" ")).includes(normalizedSearchQuery);
      };
      const recordsForBusiness = normalizedSearchQuery
        ? allRecordsForBusiness.filter(record => recordMatchesSearch(record) || allRecordRows.some(row => row.__record?.recordId === record.recordId && rowMatchesSearch(row)))
        : allRecordsForBusiness;
      const recordRows = allRecordRows.filter(row => !normalizedSearchQuery || rowMatchesSearch(row));
      const outputEntries = recordRows.filter(row => !row.deletedAt);
      const correctionsBySourceRecordId = allRecordsForBusiness.reduce((acc, record) => {
        const sourceRecordId = record.correctionOf || record.sourceRecordId;
        if (!sourceRecordId) return acc;
        if (!(record.entries || []).some(row => !row.deletedAt)) return acc;
        acc[sourceRecordId] = [...(acc[sourceRecordId] || []), record];
        return acc;
      }, {});
      const getAddedCorrections = record => correctionsBySourceRecordId[record?.recordId] || [];
      const getAddedCorrectionDetail = record => {
        const corrections = getAddedCorrections(record);
        if (!corrections.length) return "";
        const deleteCount = corrections.reduce((sum, correction) => sum + (correction.entries || []).filter(row => !row.deletedAt && row.correctionAction === "delete").length, 0);
        const priceDelta = corrections.reduce((sum, correction) => sum + (correction.entries || []).reduce((entrySum, row) => entrySum + (Number.isFinite(Number(row.correctionDeltaAmount)) ? Number(row.correctionDeltaAmount) : 0), 0), 0);
        const deltaText = priceDelta ? ` / ${priceDelta > 0 ? "増額訂正" : "減額訂正"} ${signedYen(priceDelta)}` : "";
        return deleteCount ? `訂正データあり ${corrections.length}件 / 削除訂正 ${deleteCount}件${deltaText}` : `訂正データあり ${corrections.length}件${deltaText}`;
      };
      const hasAddedCorrection = record => getAddedCorrections(record).length > 0;
      const activeEntries = getActiveEntries(entries);
      const isConfirmed = Boolean(confirmedRecord) && activeEntries.length === 0;
      const trashEntries = getTrashEntries(entries);
      const editNumericFields = getNumericItemFields(context);

                <Stack spacing={1.25}>
                  <Paper variant="outlined" sx={{ p: 1.5, bgcolor: "background.default" }}>
                    <Stack direction="row" spacing={1.5} alignItems="baseline" justifyContent="space-between">
                      <Box>
                        <Typography variant="caption" color="text.secondary" display="block">{business.quantityLabel}</Typography>
                        <Typography variant="h5" sx={{ fontWeight: 900 }}>{detailTarget.quantity || 1}</Typography>
                      </Box>
                      <Box sx={{ textAlign: "right" }}>
                        <Typography variant="caption" color="text.secondary" display="block">{business.amountLabel}</Typography>
                        <Typography variant="h5" sx={{ fontWeight: 900 }}>{formatDecisionValue(detailTarget, context)}</Typography>
                      </Box>
                    </Stack>
                  </Paper>
                  <Grid container spacing={1}>
                    <Grid item xs={12} sm={6}><Typography variant="caption" color="text.secondary" display="block">JAN / SKU</Typography><Typography variant="body2">{detailTarget.barcode || detailTarget.sku || "-"}</Typography></Grid>
                    <Grid item xs={12} sm={6}><Typography variant="caption" color="text.secondary" display="block">作業</Typography><Typography variant="body2">{detailRecord?.workGroup || detailTarget.workGroup || "セッション"}</Typography></Grid>
                    <Grid item xs={12} sm={6}><Typography variant="caption" color="text.secondary" display="block">{getMasterValueLabel(context)}</Typography><Typography variant="body2">{yen(detailTarget.currentPrice)}</Typography></Grid>
                    <Grid item xs={12} sm={6}><Typography variant="caption" color="text.secondary" display="block">{getInputValueLabel(context)}</Typography><Typography variant="body2">{formatInputValue(detailTarget, context)}</Typography></Grid>
                    <Grid item xs={12} sm={6}><Typography variant="caption" color="text.secondary" display="block">登録日時</Typography><Typography variant="body2">{formatDateTimeText(detailRecord?.registeredAt)}</Typography></Grid>
                    <Grid item xs={12} sm={6}><Typography variant="caption" color="text.secondary" display="block">連携先</Typography><Typography variant="body2">{detailIntegration?.target || "-"}</Typography></Grid>
                    <Grid item xs={12} sm={6}><Typography variant="caption" color="text.secondary" display="block">承認</Typography><Typography variant="body2">{detailApproval?.label || "-"}</Typography></Grid>
                    <Grid item xs={12} sm={6}><Typography variant="caption" color="text.secondary" display="block">連携状況</Typography><Typography variant="body2">{detailIntegration?.label || "-"} / 連携日 {detailIntegration?.integrationDate || "未定"}</Typography></Grid>
                  </Grid>
                  {(detailRelationLabel || detailAddedCorrection || Number.isFinite(Number(detailTarget.correctionDeltaAmount))) && (
                    <Paper variant="outlined" sx={{ p: 1.25, bgcolor: "warning.50", borderColor: "warning.light" }}>
                      {detailRelationLabel && <Typography variant="body2">{detailRelationLabel}</Typography>}
                      {detailAddedCorrection && <Typography variant="body2">{detailAddedCorrection}</Typography>}
                      {Number.isFinite(Number(detailTarget.correctionDeltaAmount)) && <Typography variant="body2" sx={{ fontWeight: 900 }}>連動差分 {Number(detailTarget.correctionDeltaAmount) > 0 ? "増額訂正" : "減額訂正"} {signedYen(detailTarget.correctionDeltaAmount)}</Typography>}
                    </Paper>
                  )}
                </Stack>
              )}
            </DialogContent>
            <DialogActions>
              <Button onClick={() => setDetailTarget(null)}>閉じる</Button>
              {detailTarget && canDeleteRecord && <Button color="error" onClick={() => { const target = detailTarget; setDetailTarget(null); deleteRecordRow(target); }}>削除</Button>}
              {detailTarget && canCorrectRecord && <Button variant="contained" onClick={() => { const target = detailTarget; setDetailTarget(null); startConfirmEdit(target); }}>{detailLinked ? "訂正登録" : "当日修正"}</Button>}
            </DialogActions>
          </Dialog>
        </Stack>
      );
    }


    // ============================================================
    // [CORE] WorkflowApp（3画面アプリ本体）
    // ============================================================
    // LAUNCHER から iframe + postMessage で状態を受け取り描画する。
    // スタンドアロン（?embedded=1）でも単体動作可能。
    // ============================================================

    function WorkflowApp() {
      const loaded = loadState();
      const loadedConfirmedRecord = loaded?.confirmedRecord ? withWorkflowStageStatuses(loaded.confirmedRecord) : null;
      const loadedConfirmedRecords = (loaded?.confirmedRecords || (loaded?.confirmedRecord ? [loaded.confirmedRecord] : [])).map(withWorkflowStageStatuses);
      const [screen, setScreen] = React.useState(loaded?.screen || SCREEN.START);
      const [context, setContext] = React.useState(loaded?.context || createDefaultContext("price"));
      const [entries, setEntries] = React.useState(() => purgeExpiredTrash(loaded?.entries || []));
      const [confirmedRecord, setConfirmedRecord] = React.useState(loadedConfirmedRecord);
      const [confirmedRecords, setConfirmedRecords] = React.useState(loadedConfirmedRecords);
      const [actor, setActor] = React.useState(enrichActor(loaded?.actor));
      const [draftId, setDraftId] = React.useState(loaded?.draftId || createDraftId());
      const [syncStatus, setSyncStatus] = React.useState({ state: "idle", savedAt: null, error: null });
      const [scanDrawerRequest, setScanDrawerRequest] = React.useState(0);
      const [scanDrawerCloseRequest, setScanDrawerCloseRequest] = React.useState(0);
      const [businessHelpOpen, setBusinessHelpOpen] = React.useState(false);
      const [resetConfirmOpen, setResetConfirmOpen] = React.useState(false);
      const [screenshotModal, setScreenshotModal] = React.useState(null);
      const [screenshotRevision, setScreenshotRevision] = React.useState(null);
      const scanActionsRef = React.useRef({ search: null, save: null, clear: null });
      const confirmActionRef = React.useRef(null);
      const visibleEntries = getActiveEntries(entries);
      const issueCount = visibleEntries.filter(row => getStatus(row, context).color === "error").length;

      React.useEffect(() => {
        const purged = purgeExpiredTrash(entries);
        if (purged.length !== entries.length) setEntries(purged);
      }, [entries]);
      React.useEffect(() => saveState({ draftId, screen, context, actor, entries: purgeExpiredTrash(entries), confirmedRecord, confirmedRecords }), [draftId, screen, context, actor, entries, confirmedRecord, confirmedRecords]);
      React.useEffect(() => {
        const snapshot = createWorkflowSnapshot({ draftId, screen, context, actor, entries: purgeExpiredTrash(entries), confirmedRecord, confirmedRecords });
        setSyncStatus(prev => ({ ...prev, state: "saving", error: null }));
        const timer = window.setTimeout(() => {
          syncWorkflowSnapshot(snapshot)
            .then(result => setSyncStatus({ state: "saved", savedAt: result.savedAt, error: null, mode: result.mode }))
            .catch(error => {
              console.warn(error);
              setSyncStatus({ state: "error", savedAt: null, error: error.message || String(error) });
            });
        }, APP_CONFIG.autosaveDebounceMs);
        return () => window.clearTimeout(timer);
      }, [draftId, screen, context, actor, entries, confirmedRecord, confirmedRecords]);
      React.useEffect(() => {
        function handleMessage(event) {
          const data = event.data;
          if (!data || data.type !== "APPLY_MOCK_STATE") return;
          const nextState = applyScenarioToState(data.payload || {});
          setScreen(nextState.screen);
          setContext(nextState.context);
          setActor(nextState.actor);
          setEntries(purgeExpiredTrash(nextState.entries));
          setConfirmedRecord(nextState.confirmedRecord || null);
          setConfirmedRecords(nextState.confirmedRecords || []);
          setDraftId(data.payload?.draftId || createDraftId());
          setScreenshotModal(nextState.screenshotModal);
          setScreenshotRevision(nextState.screenshotRevision);
          setBusinessHelpOpen(nextState.screenshotModal === "businessHelp");
          setResetConfirmOpen(nextState.screenshotModal === "resetConfirm");
          if (nextState.openScanDrawer || data.payload?.openStartSettings || nextState.screenshotModal === "startSettings") setScanDrawerRequest(prev => prev + 1);
          else setScanDrawerCloseRequest(prev => prev + 1);
        }
        window.addEventListener("message", handleMessage);
        if (window.__EXPORTED_MOCK_STATE__) {
          const nextState = applyScenarioToState(window.__EXPORTED_MOCK_STATE__);
          setScreen(nextState.screen); setContext(nextState.context); setActor(nextState.actor); setEntries(purgeExpiredTrash(nextState.entries)); setConfirmedRecord(nextState.confirmedRecord || null); setConfirmedRecords(nextState.confirmedRecords || []); setDraftId(window.__EXPORTED_MOCK_STATE__.draftId || createDraftId());
          setScreenshotModal(nextState.screenshotModal);
          setScreenshotRevision(nextState.screenshotRevision);
          setBusinessHelpOpen(nextState.screenshotModal === "businessHelp");
          setResetConfirmOpen(nextState.screenshotModal === "resetConfirm");
          if (nextState.openScanDrawer || window.__EXPORTED_MOCK_STATE__.openStartSettings || nextState.screenshotModal === "startSettings") setScanDrawerRequest(prev => prev + 1);
          else setScanDrawerCloseRequest(prev => prev + 1);
        }
        return () => window.removeEventListener("message", handleMessage);
      }, []);

      function resetAll() {
        const next = createDefaultContext("price");
        const nextDraftId = createDraftId();
        setDraftId(nextDraftId); setContext(next); setEntries([]); setConfirmedRecord(null); setConfirmedRecords([]); setScreen(SCREEN.SCAN); setBusinessHelpOpen(false); setResetConfirmOpen(false); setScreenshotModal(null); setScreenshotRevision(null);
        saveState({ draftId: nextDraftId, screen: SCREEN.SCAN, context: next, actor, entries: [], confirmedRecord: null, confirmedRecords: [] });
      }

      function requestReset() {
        if (entries.length === 0 && !confirmedRecord && confirmedRecords.length === 0) { resetAll(); return; }
        setResetConfirmOpen(true);
      }

      function editConfirmedRecord(record) {
        const linked = isBackendLinkedRecord(record);
        const workflowEditTask = getWorkflowTask(record);
        const workflowSubmitTaskId = !linked && workflowEditTask && (["quote_register", "completion_register"].includes(workflowEditTask.id) || workflowEditTask.revisionTask) ? workflowEditTask.id : null;
        const nextContext = {
          ...createDefaultContext(record.businessKey || context.businessKey),
          ...(record.context || {}),
          workGroup: linked ? `${record.workGroup || "セッション"} 訂正` : (record.workGroup || "セッション1")
        };
        const nextEntries = cloneRecordEntriesForWork(record, linked).map(row => ({
          ...row,
          workGroup: nextContext.workGroup,
          workflowSourceRecordId: linked ? undefined : record.recordId,
          workflowSourceCurrentTaskId: linked ? undefined : (record.currentTaskId ?? null),
          workflowSourceTaskHistory: linked ? undefined : [...(record.taskHistory || [])],
          invalidatedTaskIds: linked ? undefined : [...(record.invalidatedTaskIds || [])],
          workflowSubmitTaskId: workflowSubmitTaskId || undefined
        }));
        setContext(nextContext);
        setEntries(nextEntries);
        setConfirmedRecord(null);
        if (!linked) {
          setConfirmedRecords(prev => prev.filter(item => item.recordId !== record.recordId));
        }
        setScreen(SCREEN.SCAN);
        if (nextEntries[0]) window.setTimeout(() => scanActionsRef.current.edit?.(nextEntries[0]), 180);
      }

      function confirmCurrentWork() {
        if (visibleEntries.length === 0 || issueCount > 0) return;
        const sourceEntry = visibleEntries[0] || {};
        const sourceRecordId = sourceEntry.workflowSourceRecordId;
        const submitTaskId = sourceEntry.workflowSubmitTaskId;
        const sourceHistory = Array.isArray(sourceEntry.workflowSourceTaskHistory) ? sourceEntry.workflowSourceTaskHistory : [];
        const submitTask = WORKFLOW_TASK_BY_ID[submitTaskId] || null;
        const nowIso = new Date().toISOString();
        const taskHistory = submitTask && !sourceHistory.some(event => event.taskId === submitTask.id)
          ? [...sourceHistory, { taskId: submitTask.id, action: submitTask.actionLabel, completedAt: nowIso, actorId: actor.id, actorName: actor.name, actorRoleKey: normalizedActorRoleKey(actor) }]
          : sourceHistory;
        const baseRecord = createMockRecord(context, entries);
        const nextTask = submitTask ? (submitTask.revisionTask ? WORKFLOW_TASK_BY_ID[submitTask.resumeTaskId] : nextWorkflowTask(submitTask.id)) : null;
        const sanitizedEntries = (baseRecord.entries || []).map(row => {
          const { workflowSourceRecordId, workflowSourceCurrentTaskId, workflowSourceTaskHistory, workflowSubmitTaskId, invalidatedTaskIds, ...entry } = row;
          return entry;
        });
        const record = withWorkflowStageStatuses({
          ...baseRecord,
          recordId: sourceRecordId || baseRecord.recordId,
          currentTaskId: submitTask ? nextTask?.id || null : (sourceRecordId ? sourceEntry.workflowSourceCurrentTaskId : baseRecord.currentTaskId),
          workflowStage: submitTask ? nextTask?.businessKey || context.businessKey : baseRecord.workflowStage,
          taskHistory: sourceRecordId ? taskHistory : baseRecord.taskHistory,
          invalidatedTaskIds: sourceRecordId ? (sourceEntry.invalidatedTaskIds || []).filter(taskId => taskId !== submitTask?.id) : [],
          entries: sanitizedEntries,
          entryCount: sanitizedEntries.length,
          actor,
          lastActor: enrichActor(actor),
          updatedAt: nowIso
        });
        setConfirmedRecord(record);
        setConfirmedRecords(prev => [record, ...prev.filter(item => item.recordId !== record.recordId)]);
        setEntries([]);
        setContext(prev => ({ ...prev, workGroup: createSessionName(prev.businessKey) }));
        setScreen(SCREEN.SCAN);
      }

      function startNextWorkflow(record, nextBusinessKey) {
        if (!record || !BUSINESS[nextBusinessKey]) return;
        const sourceContext = record.context || {};
        const caseId = record.caseId || sourceContext.sequenceNo || record.recordId;
        const caseName = record.caseName || (record.entries || []).find(row => !row.deletedAt)?.caseName || (record.entries || []).find(row => !row.deletedAt)?.productName || caseId;
        const nextContext = {
          ...createDefaultContext(nextBusinessKey),
          ...sourceContext,
          businessKey: nextBusinessKey,
          sequenceNo: caseId,
          workGroup: `${caseId}-${BUSINESS[nextBusinessKey].shortLabel}`
        };
        const nextEntries = (record.entries || []).filter(row => !row.deletedAt).map((row, index) => ({
          ...createDefaultItem(nextBusinessKey, nextContext),
          ...row,
          id: `E-NEXT-${Date.now()}-${index}`,
          caseId,
          caseName,
          sequenceNo: caseId,
          workGroup: nextContext.workGroup,
          deletedAt: null
        }));
        setContext(nextContext);
        setEntries(nextEntries);
        setConfirmedRecord(null);
        setScreen(SCREEN.SCAN);
        if (nextEntries[0]) window.setTimeout(() => scanActionsRef.current.edit?.(nextEntries[0]), 180);
      }

      function advanceWorkflow(record) {
        const currentTask = getWorkflowTask(record);
        if (!record?.recordId || !currentTask || !canExecuteWorkflowTask(actor, record)) return;
        const now = new Date();
        const nowIso = now.toISOString();
        const completedEvent = {
          taskId: currentTask.id,
          action: currentTask.actionLabel,
          completedAt: nowIso,
          actorId: actor.id,
          actorName: actor.name,
          actorRoleKey: normalizedActorRoleKey(actor)
        };
        const nextTask = nextWorkflowTask(currentTask.id);
        const taskHistory = [...(record.taskHistory || []), completedEvent];
        const invalidatedTaskIds = (record.invalidatedTaskIds || []).filter(taskId => taskId !== currentTask.id);

        if (!nextTask) {
          const completedRecord = withWorkflowStageStatuses({
            ...record,
            currentTaskId: null,
            overallStatus: "completed",
            case: { ...(record.case || createCaseData(record.context, { caseId: record.caseId, caseName: record.caseName })), overallStatus: "completed" },
            approvalStatus: "approved",
            approvedAt: record.approvedAt || nowIso,
            taskHistory,
            invalidatedTaskIds,
            integrationTarget: "経理システム",
            integrationState: "linked",
            syncState: "linked",
            integrationDate: todayText(),
            backendLinkedAt: nowIso,
            lastActor: enrichActor(actor),
            updatedAt: nowIso
          });
          setConfirmedRecords(prev => prev.map(item => item.recordId === record.recordId ? completedRecord : item));
          setConfirmedRecord(completedRecord);
          return;
        }

        if (nextTask.businessKey === currentTask.businessKey) {
          const updatedRecord = withWorkflowStageStatuses({
            ...record,
            currentTaskId: nextTask.id,
            workflowStage: nextTask.businessKey,
            overallStatus: "in_progress",
            taskHistory,
            invalidatedTaskIds,
            lastActor: enrichActor(actor),
            updatedAt: nowIso
          });
          setConfirmedRecords(prev => prev.map(item => item.recordId === record.recordId ? updatedRecord : item));
          setConfirmedRecord(updatedRecord);
          return;
        }

        const completedStageRecord = withWorkflowStageStatuses({
          ...record,
          currentTaskId: null,
          overallStatus: "stage_completed",
          case: { ...(record.case || createCaseData(record.context, { caseId: record.caseId, caseName: record.caseName })), overallStatus: "in_progress" },
          approvalStatus: "approved",
          approvedAt: nowIso,
          taskHistory,
          invalidatedTaskIds,
          integrationState: currentTask.businessKey === "label" ? record.integrationState : "notApplicable",
          syncState: currentTask.businessKey === "label" ? record.syncState : "notApplicable",
          lastActor: enrichActor(actor),
          updatedAt: nowIso
        });
        const sourceContext = record.context || {};
        const caseId = record.caseId || sourceContext.sequenceNo || record.recordId;
        const caseName = record.caseName || (record.entries || []).find(row => !row.deletedAt)?.caseName || (record.entries || []).find(row => !row.deletedAt)?.productName || caseId;
        const nextContext = {
          ...createDefaultContext(nextTask.businessKey),
          ...sourceContext,
          businessKey: nextTask.businessKey,
          sequenceNo: caseId,
          workGroup: `${caseId}-${BUSINESS[nextTask.businessKey].shortLabel}`
        };
        const nextEntries = (record.entries || []).filter(row => !row.deletedAt).map((row, index) => buildWorkflowEntryForStage({
          ...createDefaultItem(nextTask.businessKey, nextContext),
          ...row,
          id: `E-${nextTask.businessKey}-${Date.now()}-${index}`,
          workLineId: row.workLineId || `WL-${caseId}-${index + 1}`,
          slotNo: row.slotNo || index + 1,
          caseId,
          caseName,
          case: createCaseData(nextContext, { caseId, caseName, overallStatus: "in_progress" }),
          sequenceNo: caseId,
          workGroup: nextContext.workGroup,
          deletedAt: null
        }, nextTask.businessKey, nextContext));
        const nextIntegrationState = createIntegrationState(nextTask.businessKey, nextTask.id === "daily_integration" ? "approved" : "pending");
        const nextRecord = withWorkflowStageStatuses({
          ...record,
          recordId: `WF-${caseId}-${nextTask.businessKey}-${Date.now()}`,
          caseId,
          caseName,
          businessKey: nextTask.businessKey,
          workflowStage: nextTask.businessKey,
          currentTaskId: nextTask.id,
          overallStatus: "in_progress",
          status: "confirmed",
          approvalStatus: nextTask.id === "daily_integration" ? "approved" : "pending",
          approvedAt: null,
          taskHistory,
          invalidatedTaskIds,
          registeredAt: nowIso,
          workGroup: nextContext.workGroup,
          context: nextContext,
          entries: nextEntries,
          entryCount: nextEntries.length,
          integrationTarget: getIntegrationTarget(nextTask.businessKey),
          integrationState: nextIntegrationState,
          syncState: nextIntegrationState,
          integrationDate: null,
          backendLinkedAt: null,
          actor: enrichActor(actor),
          lastActor: enrichActor(actor),
          updatedAt: nowIso
        });
        setConfirmedRecords(prev => [nextRecord, ...prev.map(item => item.recordId === record.recordId ? completedStageRecord : item)]);
        setConfirmedRecord(nextRecord);
      }

      function requestWorkflowReturn(record, reason) {
        if (!record?.recordId || !String(reason || "").trim()) return;
        const nowIso = new Date().toISOString();
        const request = {
          id: `RR-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`,
          status: "pending",
          reason: String(reason).trim(),
          requestedAt: nowIso,
          requestedByActorId: actor.id,
          requestedByActorName: actor.name,
          requestedByRoleKey: normalizedActorRoleKey(actor),
          taskId: record.currentTaskId
        };
        const update = item => item.recordId === record.recordId ? withWorkflowStageStatuses({ ...item, returnRequests: [...(item.returnRequests || []), request], updatedAt: nowIso }) : item;
        setConfirmedRecords(prev => prev.map(update));
        setConfirmedRecord(prev => prev?.recordId === record.recordId ? update(prev) : prev);
      }

      function resolveWorkflowReturnRequest(record, requestId, resolution) {
        if (!record?.recordId || !requestId || resolution !== "rejected") return;
        const nowIso = new Date().toISOString();
        const update = item => item.recordId === record.recordId ? withWorkflowStageStatuses({
          ...item,
          returnRequests: (item.returnRequests || []).map(request => request.id === requestId ? { ...request, status: "rejected", resolvedAt: nowIso, resolvedByActorId: actor.id, resolvedByActorName: actor.name } : request),
          updatedAt: nowIso
        }) : item;
        setConfirmedRecords(prev => prev.map(update));
        setConfirmedRecord(prev => prev?.recordId === record.recordId ? update(prev) : prev);
      }

      function returnWorkflow(record, reason, sourceRequest = null) {
        const currentTask = getWorkflowTask(record);
        const targetTaskId = WORKFLOW_RETURN_TARGET_BY_TASK[currentTask?.id];
        const targetTask = WORKFLOW_TASK_BY_ID[targetTaskId];
        if (!record?.recordId || !currentTask || !targetTask || !String(reason || "").trim()) return;
        const nowIso = new Date().toISOString();
        const targetStageIndex = WORKFLOW_STAGE_DEFINITIONS.findIndex(stage => stage.businessKey === targetTask.businessKey);
        const invalidatedTaskIds = WORKFLOW_TASKS
          .filter(task => WORKFLOW_STAGE_DEFINITIONS.findIndex(stage => stage.businessKey === task.businessKey) >= targetStageIndex)
          .map(task => task.id);
        const returnEvent = {
          id: `RET-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`,
          fromTaskId: currentTask.id,
          toTaskId: targetTask.id,
          reason: String(reason).trim(),
          returnedAt: nowIso,
          actorId: actor.id,
          actorName: actor.name,
          actorRoleKey: normalizedActorRoleKey(actor),
          sourceReturnRequestId: sourceRequest?.id || null
        };
        const resolvedRequests = (record.returnRequests || []).map(request => request.id === sourceRequest?.id ? { ...request, status: "accepted", resolvedAt: nowIso, resolvedByActorId: actor.id, resolvedByActorName: actor.name } : request);
        const common = {
          currentTaskId: targetTask.id,
          workflowStage: targetTask.businessKey,
          overallStatus: "returned",
          approvalStatus: "pending",
          approvedAt: null,
          invalidatedTaskIds,
          returnHistory: [...(record.returnHistory || []), returnEvent],
          returnRequests: resolvedRequests,
          returnedFromTaskId: currentTask.id,
          returnedReason: returnEvent.reason,
          lastActor: enrichActor(actor),
          updatedAt: nowIso
        };

        if (targetTask.businessKey === record.businessKey) {
          const returnedRecord = withWorkflowStageStatuses({ ...record, ...common });
          setConfirmedRecords(prev => prev.map(item => item.recordId === record.recordId ? returnedRecord : item));
          setConfirmedRecord(returnedRecord);
          return;
        }

        const sourceContext = record.context || {};
        const caseId = getWorkflowCaseId(record);
        const targetContext = {
          ...createDefaultContext(targetTask.businessKey),
          ...sourceContext,
          businessKey: targetTask.businessKey,
          sequenceNo: caseId,
          workGroup: `${caseId}-${BUSINESS[targetTask.businessKey].shortLabel}-差戻し`
        };
        const targetEntries = (record.entries || []).filter(row => !row.deletedAt).map((row, index) => buildWorkflowEntryForStage({
          ...row,
          id: `E-RETURN-${Date.now()}-${index}`,
          workLineId: row.workLineId || `WL-${caseId}-${index + 1}`,
          slotNo: row.slotNo || index + 1,
          workGroup: targetContext.workGroup,
          deletedAt: null
        }, targetTask.businessKey, targetContext));
        const sourceRecord = withWorkflowStageStatuses({ ...record, currentTaskId: null, overallStatus: "returned_to_previous", returnHistory: common.returnHistory, returnRequests: resolvedRequests, updatedAt: nowIso, lastActor: enrichActor(actor) });
        const returnedRecord = withWorkflowStageStatuses({
          ...record,
          ...common,
          recordId: `WF-RETURN-${caseId}-${targetTask.businessKey}-${Date.now()}`,
          businessKey: targetTask.businessKey,
          context: targetContext,
          workGroup: targetContext.workGroup,
          entries: targetEntries,
          entryCount: targetEntries.length,
          registeredAt: nowIso,
          integrationTarget: getIntegrationTarget(targetTask.businessKey),
          integrationState: createIntegrationState(targetTask.businessKey, "pending"),
          syncState: createIntegrationState(targetTask.businessKey, "pending")
        });
        setConfirmedRecords(prev => [returnedRecord, ...prev.map(item => item.recordId === record.recordId ? sourceRecord : item)]);
        setConfirmedRecord(returnedRecord);
      }

      function runRecordAction(action, record) {
        confirmActionRef.current?.[action]?.(record);
      }

      function changeDemoActor(nextActor) {
        setActor(enrichActor(nextActor));
      }

      async function generateAndLoadDemoData() {
        const result = await loadWorkflowRecords({ sample: true });
        const records = result.records;
        setEntries([]);
        setConfirmedRecords(records);
        setConfirmedRecord(records[0] || null);
        if (records[0]?.context) setContext({ ...records[0].context });
        setScreen(SCREEN.SCAN);
        return { recordCount: records.length, caseCount: new Set(records.map(record => record.caseId || record.context?.sequenceNo || record.recordId)).size, meta: result.meta };
      }

      async function validateCurrentApiData() {
        const result = normalizeWorkflowApiResponse(createWorkflowApiListResponse(confirmedRecords, `VALIDATE-${Date.now()}`));
        return { recordCount: result.records.length, meta: result.meta };
      }

    function getBaseUrlWithParams(params = {}) {
      const url = new URL(window.location.href);
      url.search = ""; url.hash = "";
      Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
      return url.toString();
    }

    function saveTextFile(filename, content, mimeType = "text/plain;charset=utf-8;") {
      const blob = new Blob([content], { type: mimeType });
      saveBlob(filename, blob);
    }

    function saveBlob(filename, blob) {
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url; anchor.download = filename; document.body.appendChild(anchor); anchor.click(); document.body.removeChild(anchor); URL.revokeObjectURL(url);
    }

    function safeFilePart(value) {
      return String(value || "untitled").trim().replace(/[\\/:*?"<>|]+/g, "_").replace(/\s+/g, "_").slice(0, 80);

      return "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

    function formatFileDate(date) {

      return htmlSource.replace("<script type=\"text/babel\">", `${bootstrap}\n\n  <script type=\"text/babel\">`);
