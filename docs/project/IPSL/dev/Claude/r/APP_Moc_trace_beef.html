    const TraceRepository = {
      async searchByLotNumber(lotNumber) {
        if (TRACE_CONFIG.connectionMode === "api") return searchCustomerByApi(lotNumber);
        return searchCustomerByMock(lotNumber);
      },
      async listTraceRecords(filters) {
        if (TRACE_CONFIG.connectionMode === "api") return listTraceRecordsByApi(filters);
        return listTraceRecordsByMock(filters);
      },
      async listIfExecutionHistory(filters) {
        if (TRACE_CONFIG.connectionMode === "api") return listIfExecutionHistoryByApi(filters);
        return listIfExecutionHistoryByMock(filters);
      }
    };

    function normalizeLotNumber(value) {
      return String(value || "")
        .trim()
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/\s+/g, "")
        .toUpperCase();
    }

    function normalizeFreeText(value) {
      return String(value || "").trim();
    }

    function validateLotNumber(lotNumber) {
      if (!lotNumber) return "ロット番号を入力してください。";
      if (lotNumber.length > 30) return "ロット番号が長すぎます。商品ラベルの表記をご確認ください。";
      if (!/^[A-Z0-9_-]+$/.test(lotNumber)) return "ロット番号は半角英数字、ハイフン、アンダースコアで入力してください。";
      return "";
    }

    async function searchCustomerByMock(lotNumber) {
      await wait(240);
      const activeRecords = MOCK_TRACE_RECORDS.filter(row => row.lotNumber === lotNumber && row.processingFlag === "0");
      if (activeRecords.length === 0) {
        return { found: false, lotNumber, productName: "", individualIdentificationNumbers: [], updatedAt: "" };
      }
      const first = activeRecords[0];
      return {
        found: true,
        lotNumber: first.lotNumber,
        productName: first.productName,
        individualIdentificationNumbers: [...new Set(activeRecords.map(row => row.individualId))],
        updatedAt: activeRecords.map(row => row.createdAt).sort().slice(-1)[0]
      };
    }

    async function searchCustomerByApi(lotNumber) {
      const controller = new AbortController();
      const timerId = window.setTimeout(() => controller.abort(), TRACE_CONFIG.requestTimeoutMs);
      try {
        const url = new URL(TRACE_CONFIG.customerEndpoint, TRACE_CONFIG.apiBaseUrl);
        url.searchParams.set("lotNumber", lotNumber);
        const response = await fetch(url.toString(), {
          method: "GET",
          headers: { "Accept": "application/json" },
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`Trace API error: ${response.status}`);
        const json = await response.json();
        return normalizeCustomerApiResponse(json, lotNumber);
      } finally {
        window.clearTimeout(timerId);
      }
    }

    function normalizeCustomerApiResponse(apiResponse, searchedLotNumber) {
      return {
        found: Boolean(apiResponse.found),
        lotNumber: apiResponse.lotNumber || searchedLotNumber,
        productName: apiResponse.productName || "",
        individualIdentificationNumbers: Array.isArray(apiResponse.individualIdentificationNumbers) ? apiResponse.individualIdentificationNumbers : [],
        updatedAt: apiResponse.updatedAt || ""
      };
    }

    async function listTraceRecordsByMock(filters) {
      await wait(200);
      const lotNumber = normalizeLotNumber(filters.lotNumber);
      const productName = normalizeFreeText(filters.productName).toLowerCase();
      const individualId = normalizeFreeText(filters.individualId);
      const processingFlag = filters.processingFlag || "all";
      const keyword = normalizeFreeText(filters.keyword).toLowerCase();

      return MOCK_TRACE_RECORDS.filter(row => {
        if (lotNumber && !row.lotNumber.includes(lotNumber)) return false;
        if (productName && !row.productName.toLowerCase().includes(productName)) return false;
        if (individualId && !row.individualId.includes(individualId)) return false;
        if (processingFlag !== "all" && row.processingFlag !== processingFlag) return false;
        if (keyword) {
          const joined = [row.id, row.lotNumber, row.productName, row.individualId, row.rawMaterialLotNumber, row.createdLocation, row.companyGroupCode, row.createdAt].join(" ").toLowerCase();
          if (!joined.includes(keyword)) return false;
        }
        return true;
      });
    }

    async function listTraceRecordsByApi(filters) {
      const controller = new AbortController();
      const timerId = window.setTimeout(() => controller.abort(), TRACE_CONFIG.requestTimeoutMs);
      try {
        const url = new URL(TRACE_CONFIG.internalListEndpoint, TRACE_CONFIG.apiBaseUrl);
        Object.entries(filters).forEach(([key, value]) => {
          if (value && value !== "all") url.searchParams.set(key, value);
        });
        const response = await fetch(url.toString(), {
          method: "GET",
          headers: { "Accept": "application/json" },
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`Trace records API error: ${response.status}`);
        const json = await response.json();
        return normalizeInternalListApiResponse(json);
      } finally {
        window.clearTimeout(timerId);
      }
    }

    function normalizeInternalListApiResponse(apiResponse) {
      const records = Array.isArray(apiResponse.records) ? apiResponse.records : [];
      return records.map(row => ({
        id: row.id || `${row.lotNumber}-${row.individualId}-${row.rawMaterialLotNumber}`,
        lotNumber: row.lotNumber || "",
        productName: row.productName || "",
        individualId: row.individualId || "",
        rawMaterialLotNumber: row.rawMaterialLotNumber || "",
        createdLocation: row.createdLocation || "",
        companyGroupCode: row.companyGroupCode || "",
        processingFlag: String(row.processingFlag ?? "0"),
        createdAt: row.createdAt || ""
      }));
    }

    async function listIfExecutionHistoryByMock(filters = {}) {
      await wait(180);
      const status = filters.status || "all";
      const sourceFileName = normalizeFreeText(filters.sourceFileName).toLowerCase();
      const interfaceName = normalizeFreeText(filters.interfaceName).toLowerCase();
      const keyword = normalizeFreeText(filters.keyword).toLowerCase();

      return MOCK_IF_EXECUTION_HISTORY.filter(row => {
        if (status !== "all" && row.status !== status) return false;
        if (sourceFileName && !row.sourceFileName.toLowerCase().includes(sourceFileName)) return false;
        if (interfaceName && !row.interfaceName.toLowerCase().includes(interfaceName)) return false;
        if (keyword) {
          const joined = [row.id, row.interfaceName, row.executionType, row.sourceFileName, row.status, row.message, row.startedAt, row.endedAt].join(" ").toLowerCase();
          if (!joined.includes(keyword)) return false;
        }
        return true;
      });
    }

    async function listIfExecutionHistoryByApi(filters = {}) {
      const controller = new AbortController();
      const timerId = window.setTimeout(() => controller.abort(), TRACE_CONFIG.requestTimeoutMs);
      try {
        const url = new URL(TRACE_CONFIG.ifHistoryEndpoint, TRACE_CONFIG.apiBaseUrl);
        Object.entries(filters).forEach(([key, value]) => {
          if (value && value !== "all") url.searchParams.set(key, value);
        });
        const response = await fetch(url.toString(), {
          method: "GET",
          headers: { "Accept": "application/json" },
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`IF history API error: ${response.status}`);
        const json = await response.json();
        return normalizeIfExecutionHistoryApiResponse(json);
      } finally {
        window.clearTimeout(timerId);
      }
    }

    function normalizeIfExecutionHistoryApiResponse(apiResponse) {
      const histories = Array.isArray(apiResponse.histories) ? apiResponse.histories : [];
      return histories.map(row => ({
        id: row.id || row.executionId || "",
        interfaceName: row.interfaceName || "",
        executionType: row.executionType || "",
        sourceFileName: row.sourceFileName || "",
        status: row.status || "success",
        recordCount: Number(row.recordCount || 0),
        successCount: Number(row.successCount || 0),
        errorCount: Number(row.errorCount || 0),
        startedAt: row.startedAt || "",
        endedAt: row.endedAt || "",
        durationMs: Number(row.durationMs || 0),
        message: row.message || ""
      }));
    }

    function wait(ms) {
      return new Promise(resolve => window.setTimeout(resolve, ms));
    }

    function formatDateTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
      }).format(date);
    }

    function getProcessingChip(row) {
      if (row.processingFlag === "1") return <Chip size="small" color="error" variant="outlined" label="取消" />;
      return <Chip size="small" color="primary" variant="outlined" label="追加/更新" />;
    }

    function escapeCsvCell(value) {
      const text = String(value ?? "");
      const escaped = text.replace(/"/g, '""');
      return /[",\r\n]/.test(escaped) ? `"${escaped}"` : escaped;
    }

    function formatCsvFileDate(date) {
      const pad = number => String(number).padStart(2, "0");
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function exportTraceRecordsCsv(records) {
      const headers = [
        "状態",
        "処理フラグ",
        "ロット番号",
        "商品名",
        "個体識別番号",
        "原料ロット番号",
        "作成場所",
        "会社グループコード",
        "実績作成日時",
        "レコードID"
      ];

      const rows = records.map(row => [
        row.processingFlag === "1" ? "取消" : "追加/更新",
        row.processingFlag,
        row.lotNumber,
        row.productName,
        row.individualId,
        row.rawMaterialLotNumber,
        row.createdLocation,
        row.companyGroupCode,
        row.createdAt,
        row.id
      ]);

      const csvBody = [headers, ...rows]
        .map(row => row.map(escapeCsvCell).join(","))
        .join("\r\n");

      const blob = new Blob(["\ufeff" + csvBody], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `trace_records_${formatCsvFileDate(new Date())}.csv`;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    function getIfStatusLabel(status) {
      const labels = {
        success: "正常終了",
        warning: "警告",
        error: "エラー",
        running: "実行中"
      };
      return labels[status] || status || "-";
    }

    function getIfStatusChip(status) {
      if (status === "error") return <Chip size="small" color="error" variant="outlined" label="エラー" />;
      if (status === "warning") return <Chip size="small" color="warning" variant="outlined" label="警告" />;
      if (status === "running") return <Chip size="small" color="info" variant="outlined" label="実行中" />;
      return <Chip size="small" color="success" variant="outlined" label="正常終了" />;
    }

    function formatDurationMs(durationMs) {
      if (!durationMs) return "-";
      if (durationMs < 1000) return `${durationMs}ms`;
      return `${(durationMs / 1000).toFixed(1)}秒`;
    }

    function getDisplayedRowsLabel({ from, to, count }) {
      return `${from}-${to} / ${count !== -1 ? count : `${to}以上`}`;
    }

    function exportIfExecutionHistoryCsv(histories) {
      const headers = [

        "ファイル名",
        "状態",
        "総件数",
        "成功件数",
        "エラー件数",
        "開始日時",
        "終了日時",
        "処理時間ms",

      const rows = histories.map(row => [

        row.interfaceName,
        row.executionType,
        row.sourceFileName,
        getIfStatusLabel(row.status),
        row.recordCount,
        row.successCount,
        row.errorCount,
        row.startedAt,
        row.endedAt,
        row.durationMs,
        row.message
      ]);

      const csvBody = [headers, ...rows]
        .map(row => row.map(escapeCsvCell).join(","))
        .join("\r\n");

      const blob = new Blob(["\ufeff" + csvBody], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `if_execution_history_${formatCsvFileDate(new Date())}.csv`;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    function CustomerPage() {
      const [lotNumber, setLotNumber] = React.useState("");
      const [result, setResult] = React.useState(null);
      const [message, setMessage] = React.useState(null);
      const [loading, setLoading] = React.useState(false);

      React.useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const queryLotNumber = normalizeLotNumber(params.get("lot"));
        if (queryLotNumber) {
          setLotNumber(queryLotNumber);
          const shouldAutoSearch = params.get("autoSearch") !== "false";
          if (shouldAutoSearch) {
            executeSearch(queryLotNumber, { updateInput: false, updateUrl: false });
          }
        }
      }, []);

      React.useEffect(() => {
        function handleMockStateMessage(event) {
          const message = event.data;
          if (!message || message.type !== "APPLY_MOCK_STATE") return;
          const payload = message.payload || {};
          if (payload.pageMode && payload.pageMode !== PAGE_MODES.CUSTOMER) return;

          const nextLotNumber = normalizeLotNumber(payload.lotNumber);
          setLotNumber(nextLotNumber);
          setResult(null);
          setMessage(null);

          if (nextLotNumber && payload.autoSearch) {
            executeSearch(nextLotNumber, { updateInput: false, updateUrl: false });
          }
        }

        window.addEventListener("message", handleMockStateMessage);
        return () => window.removeEventListener("message", handleMockStateMessage);
      }, []);

      async function executeSearch(rawLotNumber, options = {}) {
        const normalizedLotNumber = normalizeLotNumber(rawLotNumber);
        if (options.updateInput !== false) setLotNumber(normalizedLotNumber);
        const validationMessage = validateLotNumber(normalizedLotNumber);
        if (validationMessage) {
          setResult(null);
          setMessage({ severity: "error", text: validationMessage });
          return;
        }
        try {
          setLoading(true);
          setMessage({ severity: "info", text: "検索しています。しばらくお待ちください。" });
          const traceResult = await TraceRepository.searchByLotNumber(normalizedLotNumber);
          setResult(traceResult);
          setMessage(null);
          if (options.updateUrl !== false) {
            const url = new URL(window.location.href);
            url.searchParams.set("lot", normalizedLotNumber);
            window.history.replaceState(null, "", url.toString());
          }
        } catch (error) {
          console.error(error);
          setResult(null);
          setMessage({ severity: "error", text: "検索中にエラーが発生しました。時間をおいて再度お試しください。解決しない場合は問い合わせ先までご連絡ください。" });
        } finally {
          setLoading(false);
        }
      }

      function handleSubmit(event) {
        event.preventDefault();
        executeSearch(lotNumber);
      }

      return (
        <Container maxWidth="md" sx={{ py: { xs: 4, md: 6 } }}>
          <SearchHero />
          <Card elevation={0} sx={{ border: "1px solid", borderColor: "divider", boxShadow: "0 16px 40px rgba(17,24,39,0.08)", overflow: "hidden" }}>

                    value={lotNumber}
                    onChange={(event) => setLotNumber(event.target.value)}
                    placeholder="例：BF202606120001"
                    fullWidth
                    autoComplete="off"
                    inputProps={{ inputMode: "latin", style: { textTransform: "uppercase" } }}
                    InputProps={{ startAdornment: <InputAdornment position="start"><Icon color="primary">search</Icon></InputAdornment> }}
                    helperText="商品ラベルに記載されているロット番号を入力してください。"
                  />
                  <Stack direction={{ xs: "column", sm: "row" }} spacing={1.2} alignItems={{ xs: "stretch", sm: "center" }}>
                    <Button
                      type="submit"
                      variant="contained"
                      size="large"
                      disabled={loading}
                      startIcon={loading ? <CircularProgress color="inherit" size={18} /> : <Icon>search</Icon>}
                    >
                      {loading ? "検索中..." : "検索する"}
                    </Button>
                  </Stack>
                  {message && <Alert severity={message.severity}>{message.text}</Alert>}
                </Stack>
              </Box>
            </CardContent>
            <SearchResult result={result} />
          </Card>
        </Container>
      );
    }

    function saveTextFile(filename, content, mimeType = "text/plain;charset=utf-8;") {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    async function getCurrentHtmlSource() {
      const baseUrl = new URL(window.location.href);
      baseUrl.search = "";
      baseUrl.hash = "";

      let htmlSource = "";
      try {
        const response = await fetch(baseUrl.toString(), { cache: "no-store" });
        if (response.ok) htmlSource = await response.text();
      } catch (error) {
        console.warn("Failed to fetch original HTML. Falling back to current DOM.", error);
      }

      if (!htmlSource) {
        htmlSource = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
      }

      return htmlSource;
    }

    function buildEmbeddedPageQuery(pageMode, payload = {}) {
      const params = new URLSearchParams();
      params.set("embedded", pageMode);

      if (pageMode === PAGE_MODES.CUSTOMER) {
        const lot = normalizeLotNumber(payload.lotNumber || payload.frameLotNumber || "");
        if (lot) params.set("lot", lot);
        if (payload.autoSearch === false) params.set("autoSearch", "false");
      }

      if (pageMode === PAGE_MODES.INTERNAL) {
        const tab = payload.internalTab === "ifHistory" ? "ifHistory" : "records";
        params.set("tab", tab);

        if (tab === "records") {
          const lotNumber = normalizeLotNumber(payload.lotNumberFilter || payload.lotNumber || "");
          if (lotNumber) params.set("lotNumber", lotNumber);
          if (payload.processingFlag && payload.processingFlag !== "all") params.set("processingFlag", payload.processingFlag);
          if (payload.keyword) params.set("keyword", normalizeFreeText(payload.keyword));
        }

        if (tab === "ifHistory") {
          if (payload.ifStatus && payload.ifStatus !== "all") params.set("ifStatus", payload.ifStatus);
          if (payload.interfaceName) params.set("interfaceName", normalizeFreeText(payload.interfaceName));
          if (payload.sourceFileName) params.set("sourceFileName", normalizeFreeText(payload.sourceFileName));
          if (payload.keyword) params.set("keyword", normalizeFreeText(payload.keyword));
        }
      }

      return params.toString();
    }

    function injectEmbeddedBootstrap(htmlSource, pageMode, payload = {}) {
      const queryString = buildEmbeddedPageQuery(pageMode, payload);
      const pageTitle = pageMode === PAGE_MODES.INTERNAL ? "社内向け管理画面" : "牛肉トレーサビリティ検索";
      const bootstrapScript = `  <!-- Export bootstrap: ランチャーなし実画面として起動 -->
  <script>
    window.__BEEF_TRACEABILITY_EXPORTED_PAGE__ = ${JSON.stringify({ pageMode, payload })};
    try {
      var nextUrl = window.location.pathname + "?${queryString}" + window.location.hash;
      window.history.replaceState(null, ${JSON.stringify(pageTitle)}, nextUrl);
      document.title = ${JSON.stringify(pageTitle)};
    } catch (error) {
      console.warn("Failed to apply exported page query.", error);
    }
  <\/script>`;

      if (htmlSource.includes("<!-- App -->")) {
        return htmlSource.replace("  <!-- App -->", `${bootstrapScript}\n\n  <!-- App -->`);
      }

      return htmlSource.replace("</head>", `${bootstrapScript}\n</head>`);
    }

    async function exportStandaloneReactPageHtml(pageMode, payload = {}, filenamePrefix = pageMode) {
      const htmlSource = await getCurrentHtmlSource();
      const standaloneHtml = injectEmbeddedBootstrap(htmlSource, pageMode, payload);

      saveTextFile(
        `${filenamePrefix}_react_page_${formatCsvFileDate(new Date())}.html`,
        standaloneHtml,
        "text/html;charset=utf-8;"
      );
    }

    function buildPageSnapshotHtml(iframeDocument, pageMode) {
      const headHtml = Array.from(iframeDocument.head.children)
        .filter(node => {
          const tagName = node.tagName.toLowerCase();
          if (tagName === "script") return false;
          if (tagName === "link") {
            const rel = (node.getAttribute("rel") || "").toLowerCase();
            return ["stylesheet", "preconnect", "preload"].includes(rel);
          }
          return ["meta", "title", "style"].includes(tagName);
        })
        .map(node => node.outerHTML)
        .join("\n  ");

      const bodyClone = iframeDocument.body.cloneNode(true);
      bodyClone.querySelectorAll("script").forEach(node => node.remove());

      const pageTitle = pageMode === PAGE_MODES.INTERNAL
        ? "社内向け管理画面"
        : "牛肉トレーサビリティ検索";

      return `<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>${pageTitle}</title>
  ${headHtml}
</head>
<body>
${bodyClone.innerHTML}
</body>
</html>`;
    }

    function exportEmbeddedPageHtml(iframeElement, pageMode, filenamePrefix = pageMode) {
      const iframeDocument = iframeElement && (iframeElement.contentDocument || iframeElement.contentWindow?.document);
      if (!iframeDocument) {
        throw new Error("iframe document is not accessible");
      }

      const html = buildPageSnapshotHtml(iframeDocument, pageMode);
      saveTextFile(
        `${filenamePrefix}_page_snapshot_${formatCsvFileDate(new Date())}.html`,
        html,
        "text/html;charset=utf-8;"
      );
    }

    function createHiddenExportIframe(pageMode, payload) {
      return new Promise((resolve, reject) => {
        const iframe = document.createElement("iframe");
        iframe.title = `hidden-export-${pageMode}`;
        iframe.src = getFrameSrc(pageMode);
        iframe.style.cssText = [
          "position:fixed",
          "left:-10000px",
          "top:-10000px",
          "width:1440px",
          "height:1200px",
          "opacity:0",
          "pointer-events:none",
          "border:0"
        ].join(";");

        const timeoutId = window.setTimeout(() => {
          iframe.remove();
          reject(new Error("hidden export iframe load timeout"));
        }, 6000);

        iframe.onload = () => {
          window.clearTimeout(timeoutId);
          window.setTimeout(() => {
            if (payload) {
              iframe.contentWindow.postMessage({ type: "APPLY_MOCK_STATE", payload }, "*");
            }
            window.setTimeout(() => resolve(iframe), 450);
          }, 160);
        };

        document.body.appendChild(iframe);
      });
    }

        iframe.remove();
      }
    }

    function LauncherApp() {
      const [selectedScenarioId, setSelectedScenarioId] = React.useState("blank");
      const [scenarioStepIndex, setScenarioStepIndex] = React.useState(0);
      const [pageMode, setPageMode] = React.useState(PAGE_MODES.CUSTOMER);
      const [selectedLot, setSelectedLot] = React.useState("");
      const [frameLotNumber, setFrameLotNumber] = React.useState("");
      const [scenarioOptions, setScenarioOptions] = React.useState({ autoSearch: false });
      const [mockFrameState, setMockFrameState] = React.useState({ pageMode: PAGE_MODES.CUSTOMER, lotNumber: "", autoSearch: false });
      const [scenarioRevision, setScenarioRevision] = React.useState(0);
      const [viewport, setViewport] = React.useState(VIEWPORTS.DESKTOP);
      const [launcherOpen, setLauncherOpen] = React.useState(true);
      const [toast, setToast] = React.useState(null);
      const [exportTarget, setExportTarget] = React.useState("current");
      const [launcherSize, setLauncherSize] = React.useState({ width: 440, height: 720 });
      const iframeRef = React.useRef(null);
      const launcherPanelRef = React.useRef(null);

      const activeScenario = MOCK_SCENARIOS.find(item => item.id === selectedScenarioId) || MOCK_SCENARIOS[0];
      const activeScenarioSteps = activeScenario.steps || [];
      const activeStep = activeScenarioSteps[scenarioStepIndex] || activeScenarioSteps[0] || activeScenario;
      const frameSrc = React.useMemo(() => getFrameSrc(pageMode), [pageMode]);
      const frameKey = frameSrc;
      const viewportConfig = VIEWPORT_CONFIG[viewport];
      const frameHeight = viewport === VIEWPORTS.DESKTOP ? "100vh" : viewportConfig.height;
      const frameWidth = viewport === VIEWPORTS.DESKTOP ? "100%" : viewportConfig.width;

      function postMockStateToFrame(state = mockFrameState) {
        const targetWindow = iframeRef.current && iframeRef.current.contentWindow;
        if (!targetWindow || !state) return;
        targetWindow.postMessage({ type: "APPLY_MOCK_STATE", payload: state }, "*");
      }

      React.useEffect(() => {
        const timerId = window.setTimeout(() => postMockStateToFrame(mockFrameState), 40);
        return () => window.clearTimeout(timerId);
      }, [mockFrameState, frameSrc]);

      function applyScenarioStep(scenario, stepIndex) {
        const steps = scenario.steps || [];
        const safeIndex = Math.max(0, Math.min(stepIndex, Math.max(steps.length - 1, 0)));
        const step = steps[safeIndex] || scenario;
        const nextPageMode = step.pageMode || scenario.pageMode;

        setScenarioStepIndex(safeIndex);
        setPageMode(nextPageMode);
        setSelectedLot(step.labelLotNumber || step.lotNumber || scenario.lotNumber || "");
        setFrameLotNumber(step.frameLotNumber ?? step.lotNumber ?? scenario.lotNumber ?? "");
        setViewport(step.viewport || scenario.viewport || VIEWPORTS.DESKTOP);
        const nextScenarioOptions = {
          internalTab: step.internalTab || scenario.internalTab,
          ifStatus: step.ifStatus,
          processingFlag: step.processingFlag,
          lotNumberFilter: step.lotNumberFilter,
          autoSearch: step.autoSearch
        };
        setScenarioOptions(nextScenarioOptions);
        setMockFrameState({
          pageMode: nextPageMode,
          lotNumber: step.frameLotNumber ?? step.lotNumber ?? scenario.lotNumber ?? "",
          labelLotNumber: step.labelLotNumber || step.lotNumber || scenario.lotNumber || "",
          ...nextScenarioOptions,
          revision: Date.now()
        });
        setScenarioRevision(prev => prev + 1);
      }

      function showCustomerWithLot(lotNumber) {
        const normalizedLotNumber = normalizeLotNumber(lotNumber);
        setSelectedScenarioId("custom");
        setSelectedLot(normalizedLotNumber);
        setFrameLotNumber(normalizedLotNumber);
        setScenarioStepIndex(0);
        setScenarioOptions({ autoSearch: true });
        setMockFrameState({ pageMode: PAGE_MODES.CUSTOMER, lotNumber: normalizedLotNumber, labelLotNumber: normalizedLotNumber, autoSearch: true, revision: Date.now() });
        setScenarioRevision(prev => prev + 1);
        setPageMode(PAGE_MODES.CUSTOMER);
      }

      function applyScenario(scenarioId) {
        const scenario = MOCK_SCENARIOS.find(item => item.id === scenarioId) || MOCK_SCENARIOS[0];
        setSelectedScenarioId(scenario.id);
        applyScenarioStep(scenario, 0);
      }

      function moveScenarioStep(delta) {
        const steps = activeScenario.steps || [];
        if (!steps.length) return;
        const nextIndex = Math.max(0, Math.min(scenarioStepIndex + delta, steps.length - 1));
        applyScenarioStep(activeScenario, nextIndex);
      }

      function clampNumber(value, min, max) {
        return Math.max(min, Math.min(value, max));
      }

      function beginLauncherResize(event) {
        event.preventDefault();
        event.stopPropagation();

        const panel = launcherPanelRef.current;
        if (!panel) return;

        const startX = event.clientX;
        const startY = event.clientY;
        const startWidth = panel.offsetWidth;
        const startHeight = panel.offsetHeight;

        function handlePointerMove(moveEvent) {
          const maxWidth = Math.max(360, window.innerWidth - 32);
          const maxHeight = Math.max(420, window.innerHeight - 32);
          const nextWidth = clampNumber(startWidth + (startX - moveEvent.clientX), 360, Math.min(760, maxWidth));
          const nextHeight = clampNumber(startHeight + (moveEvent.clientY - startY), 420, maxHeight);
          setLauncherSize({ width: nextWidth, height: nextHeight });
        }

        function handlePointerUp() {
          window.removeEventListener("pointermove", handlePointerMove);
          window.removeEventListener("pointerup", handlePointerUp);
          document.body.style.userSelect = "";
          document.body.style.cursor = "";
        }

        document.body.style.userSelect = "none";
        document.body.style.cursor = "nesw-resize";
        window.addEventListener("pointermove", handlePointerMove);
        window.addEventListener("pointerup", handlePointerUp);
      }

      async function copyFrameUrl() {
        try {
          await navigator.clipboard.writeText(frameSrc);
          setToast({ severity: "success", text: "iframe内ページURLをコピーしました。" });
        } catch (error) {
          console.warn(error);
          setToast({ severity: "warning", text: "クリップボードにコピーできませんでした。別タブで開くボタンを使用してください。" });
        }
      }

      async function handleExportHtml() {
        try {
          if (exportTarget === "current") {
            await exportStandaloneReactPageHtml(pageMode, mockFrameState, pageMode);
          }

          if (exportTarget === "customer") {
            await exportStandaloneReactPageHtml(
              PAGE_MODES.CUSTOMER,
              { pageMode: PAGE_MODES.CUSTOMER, lotNumber: "", autoSearch: false },
              "customer"
            );
          }

          if (exportTarget === "internal") {
            await exportStandaloneReactPageHtml(
              PAGE_MODES.INTERNAL,
              { pageMode: PAGE_MODES.INTERNAL, internalTab: "records" },
              "internal"
            );
          }

          if (exportTarget === "all") {
            await exportStandaloneReactPageHtml(
              PAGE_MODES.CUSTOMER,
              { pageMode: PAGE_MODES.CUSTOMER, lotNumber: "", autoSearch: false },
              "customer"
            );
            await exportStandaloneReactPageHtml(
              PAGE_MODES.INTERNAL,
              { pageMode: PAGE_MODES.INTERNAL, internalTab: "records" },
              "internal"
            );
          }

          setToast({ severity: "success", text: "React/MUI/CDN込みの実画面HTMLをエクスポートしました。" });
        } catch (error) {
          console.error(error);
          setToast({ severity: "error", text: "実画面HTMLエクスポートに失敗しました。" });
        }
      }

      async function handleExportLauncherHtml() {
        try {
          await exportMockSampleHtml();
          setToast({ severity: "success", text: "ランチャー込みの検証用HTMLをエクスポートしました。" });
        } catch (error) {
          console.error(error);
          setToast({ severity: "error", text: "ランチャーHTMLエクスポートに失敗しました。" });
        }
      }

      return (
        <Box sx={{ minHeight: "100vh", bgcolor: "#0f172a", overflow: "hidden" }}>
          <Box sx={{
            minHeight: "100vh",
            width: "100%",
            display: "flex",
            alignItems: viewport === VIEWPORTS.DESKTOP ? "stretch" : "center",
            justifyContent: "center",
            p: viewport === VIEWPORTS.DESKTOP ? 0 : 2,
            overflow: "auto"
          }}>
            <Box sx={{
              width: frameWidth,
              maxWidth: viewport === VIEWPORTS.DESKTOP ? "100%" : "none",
              height: frameHeight,
              bgcolor: "white",
              borderRadius: viewport === VIEWPORTS.DESKTOP ? 0 : 3,
              overflow: "hidden",
              boxShadow: viewport === VIEWPORTS.DESKTOP ? "none" : "0 22px 70px rgba(0,0,0,0.42)"
            }}>
              <iframe
                ref={iframeRef}
                key={frameKey}
                title="実画面プレビュー"
                src={frameSrc}
                onLoad={() => window.setTimeout(() => postMockStateToFrame(mockFrameState), 60)}
                style={{ width: "100%", height: "100%", border: 0, display: "block", background: "#ffffff" }}
              />
            </Box>
          </Box>

          {!launcherOpen && (
            <Fab
              color="primary"
              variant="extended"
              onClick={() => setLauncherOpen(true)}
              sx={{ position: "fixed", top: 16, right: 16, zIndex: 1800, boxShadow: "0 12px 32px rgba(0,0,0,0.32)" }}
            >
              <Icon sx={{ mr: 1 }}>tune</Icon>
              Launcher
            </Fab>
          )}

          {launcherOpen && (
            <Paper
              ref={launcherPanelRef}
              elevation={14}
              sx={{
                position: "fixed",
                top: 16,
                right: 16,
                zIndex: 1800,
                width: { xs: "calc(100% - 32px)", sm: launcherSize.width },
                height: { xs: "auto", sm: launcherSize.height },
                maxHeight: "calc(100vh - 32px)",
                minWidth: { xs: "auto", sm: 360 },
                minHeight: { xs: "auto", sm: 420 },
                overflow: "hidden",
                display: "flex",
                flexDirection: "column",
                borderRadius: 2,
                border: "1px solid rgba(15,23,42,0.14)",
                bgcolor: "rgba(255,255,255,0.97)",
                backdropFilter: "blur(10px)",
                boxShadow: "0 18px 48px rgba(15,23,42,0.24)"
              }}
            >
              <Box sx={{ p: 2, borderBottom: "1px solid", borderColor: "divider" }}>
                <Stack direction="row" alignItems="flex-start" justifyContent="space-between" spacing={2}>
                  <Box>
                    <Stack direction="row" spacing={1} alignItems="center" flexWrap="wrap" useFlexGap>
                      <Typography variant="h6" sx={{ fontWeight: 900 }}>モックランチャー</Typography>
                      <Chip size="small" color="warning" variant="outlined" label="本番非表示" />
                      <Chip size="small" color="primary" variant="outlined" label={TRACE_CONFIG.connectionMode === "api" ? "API MODE" : "MOCK DATA"} />
                    </Stack>
                    <Typography variant="caption" color="text.secondary">
                      フローティング操作領域です。最小化・左下ハンドルでサイズ調整できます。
                    </Typography>
                  </Box>
                  <Tooltip title="最小化">
                    <IconButton onClick={() => setLauncherOpen(false)} size="small">
                      <Icon>minimize</Icon>
                    </IconButton>
                  </Tooltip>
                </Stack>
              </Box>

              <Box sx={{ p: 2, overflow: "auto", flex: 1 }}>
                <Stack spacing={2}>
                  {toast && <Alert severity={toast.severity} onClose={() => setToast(null)}>{toast.text}</Alert>}

                  <Alert severity="info">
                    画面全体はiframe内の実ページです。このパネルはモック操作用のメタUIです。ステップ移動はiframeへ状態だけを送るため、同一ページ内では全体リロードを抑えます。HTML出力は専用のページ出力コントロールから行います。パネルは左下ハンドルでサイズ変更できます。
                  </Alert>

                  <Paper variant="outlined" sx={{ p: 1.5, bgcolor: "grey.50" }}>
                    <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>確認シナリオ</Typography>
                    <FormControl fullWidth size="small">
                      <Select
                        value={selectedScenarioId || "blank"}
                        displayEmpty
                        onChange={(event) => applyScenario(event.target.value)}
                        renderValue={(selected) => {
                          const scenario = MOCK_SCENARIOS.find(item => item.id === selected);
                          return scenario ? scenario.label : "シナリオを選択";
                        }}
                        MenuProps={{ disablePortal: true, PaperProps: { sx: { maxHeight: 320 } } }}
                      >
                        {MOCK_SCENARIOS.map(scenario => (
                          <MenuItem key={scenario.id} value={scenario.id}>{scenario.label}</MenuItem>
                        ))}
                      </Select>
                    </FormControl>
                    <Stack direction="row" spacing={1} alignItems="center" flexWrap="wrap" useFlexGap sx={{ mt: 1 }}>
                      <Chip size="small" color="primary" variant="outlined" label={`現在：${activeScenario.label}`} />
                      <Chip size="small" color={selectedLot ? "success" : "default"} variant="outlined" label={selectedLot ? `ラベル番号：${selectedLot}` : "ラベル番号なし"} />
                      <Chip size="small" color={frameLotNumber ? "success" : "default"} variant="outlined" label={frameLotNumber ? `入力番号：${frameLotNumber}` : "入力番号なし"} />
                      {selectedScenarioId === "blank" && <Chip size="small" color="default" variant="outlined" label="初期値なし" />}
                    </Stack>
                    <Typography variant="caption" color="text.secondary" display="block" sx={{ mt: 1 }}>
                      {activeStep.description || activeScenario.description}
                    </Typography>

                    {activeScenarioSteps.length > 1 && (
                      <Box sx={{ mt: 1.5 }}>
                        <Stepper activeStep={scenarioStepIndex} alternativeLabel sx={{ mb: 1 }}>
                          {activeScenarioSteps.map(step => (
                            <Step key={step.label}>
                              <StepLabel>{step.label}</StepLabel>
                            </Step>
                          ))}
                        </Stepper>
                        <Stack direction="row" spacing={1} justifyContent="space-between">
                          <Button size="small" variant="outlined" startIcon={<Icon>arrow_back</Icon>} onClick={() => moveScenarioStep(-1)} disabled={scenarioStepIndex === 0}>
                            戻る
                          </Button>
                          <Button size="small" variant="contained" endIcon={<Icon>arrow_forward</Icon>} onClick={() => moveScenarioStep(1)} disabled={scenarioStepIndex >= activeScenarioSteps.length - 1}>
                            次へ
                          </Button>
                        </Stack>
                      </Box>
                    )}
                  </Paper>

                  <Box>
                    <Typography variant="caption" color="text.secondary" display="block" sx={{ mb: 0.8 }}>表示ページ</Typography>
                    <ToggleButtonGroup value={pageMode} exclusive onChange={(_, next) => { if (next) { const nextLot = next === PAGE_MODES.CUSTOMER ? selectedLot : ""; const nextOptions = { internalTab: next === PAGE_MODES.INTERNAL ? "records" : undefined, autoSearch: next === PAGE_MODES.CUSTOMER ? false : undefined }; setSelectedScenarioId("custom"); setScenarioStepIndex(0); setPageMode(next); setFrameLotNumber(nextLot); setScenarioOptions(nextOptions); setMockFrameState({ pageMode: next, lotNumber: nextLot, labelLotNumber: selectedLot, ...nextOptions, revision: Date.now() }); setScenarioRevision(prev => prev + 1); } }} size="small" color="primary" fullWidth aria-label="表示ページ切替">
                      <ToggleButton value={PAGE_MODES.CUSTOMER}><Icon fontSize="small" sx={{ mr: 0.6 }}>person</Icon>顧客向け</ToggleButton>
                      <ToggleButton value={PAGE_MODES.INTERNAL}><Icon fontSize="small" sx={{ mr: 0.6 }}>table_view</Icon>社内一覧</ToggleButton>
                    </ToggleButtonGroup>
                  </Box>

                  <Box>
                    <Typography variant="caption" color="text.secondary" display="block" sx={{ mb: 0.8 }}>プレビュー幅</Typography>
                    <ToggleButtonGroup value={viewport} exclusive onChange={(_, next) => next && setViewport(next)} size="small" color="secondary" fullWidth aria-label="viewport切替">
                      <ToggleButton value={VIEWPORTS.DESKTOP}>Desktop</ToggleButton>
                      <ToggleButton value={VIEWPORTS.TABLET}>Tablet</ToggleButton>
                      <ToggleButton value={VIEWPORTS.MOBILE}>Mobile</ToggleButton>
                    </ToggleButtonGroup>
                  </Box>

                  <MockLabelCard selectedLot={selectedLot} onSelectLot={setSelectedLot} onShowCustomer={showCustomerWithLot} />

                  <Paper variant="outlined" sx={{ p: 1.5 }}>
                    <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>ページ出力コントロール</Typography>
                    <Typography variant="caption" color="text.secondary" display="block" sx={{ mb: 1 }}>React / MUI / Emotion / Babel のCDN読込を含む、ランチャーなしの実画面HTMLを出力します。</Typography>
                    <FormControl fullWidth size="small" sx={{ mb: 1 }}>
                      <Select
                        value={exportTarget}
                        onChange={(event) => setExportTarget(event.target.value)}
                        MenuProps={{ disablePortal: true, PaperProps: { sx: { maxHeight: 280 } } }}
                      >
                        <MenuItem value="current">現在表示中のページ</MenuItem>
                        <MenuItem value="customer">顧客向けページ：初期表示</MenuItem>
                        <MenuItem value="internal">社内向け管理画面：データ一覧</MenuItem>
                        <MenuItem value="all">顧客向け＋社内向けを個別出力</MenuItem>
                      </Select>
                    </FormControl>
                    <Stack direction={{ xs: "column", sm: "row" }} spacing={1} flexWrap="wrap" useFlexGap>
                      <Button variant="outlined" startIcon={<Icon>open_in_new</Icon>} onClick={() => window.open(frameSrc, "_blank", "noopener,noreferrer")}>
                        別タブで開く
                      </Button>
                      <Button variant="outlined" startIcon={<Icon>content_copy</Icon>} onClick={copyFrameUrl}>
                        URLコピー
                      </Button>
                      <Button variant="contained" color="secondary" startIcon={<Icon>download</Icon>} onClick={handleExportHtml}>
                        React単体HTML出力
                      </Button>
                      <Button variant="text" color="secondary" startIcon={<Icon>code</Icon>} onClick={handleExportLauncherHtml}>
                        ランチャー込み出力
                      </Button>
                    </Stack>
                    <Typography variant="caption" color="text.secondary" display="block" sx={{ mt: 1 }}>
                      標準出力はiframe内の実画面だけを静的HTMLとして出力します。ランチャーは含めません。
                    </Typography>
                  </Paper>

                  <Paper variant="outlined" sx={{ p: 1.5, bgcolor: "grey.50" }}>
                    <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>現在の状態</Typography>
                    <Stack spacing={0.8}>
                      <Stack direction="row" justifyContent="space-between" spacing={2}>
                        <Typography variant="body2" color="text.secondary">表示ページ</Typography>
                        <Typography variant="body2" sx={{ fontWeight: 800 }}>{pageMode === PAGE_MODES.CUSTOMER ? "顧客向け" : "社内一覧"}</Typography>
                      </Stack>
                      <Stack direction="row" justifyContent="space-between" spacing={2}>
                        <Typography variant="body2" color="text.secondary">表示幅</Typography>
                        <Typography variant="body2" sx={{ fontWeight: 800 }}>{viewportConfig.label}</Typography>
                      </Stack>
                      <Stack direction="row" justifyContent="space-between" spacing={2}>
                        <Typography variant="body2" color="text.secondary">接続</Typography>
                        <Typography variant="body2" sx={{ fontWeight: 800 }}>{TRACE_CONFIG.connectionMode.toUpperCase()}</Typography>
                      </Stack>
                    </Stack>
                  </Paper>
                </Stack>
              </Box>
              <Tooltip title="ドラッグしてモックランチャーのサイズを変更">
                <Box
                  role="separator"
                  aria-label="モックランチャーのサイズ変更ハンドル"
                  onPointerDown={beginLauncherResize}
                  sx={{
                    position: "absolute",
                    left: 0,
                    bottom: 0,
                    width: 34,
                    height: 34,
                    display: { xs: "none", sm: "grid" },
                    placeItems: "center",
                    cursor: "nesw-resize",
                    color: "text.secondary",
                    borderTop: "1px solid",
                    borderRight: "1px solid",
                    borderColor: "divider",
                    bgcolor: "rgba(248,250,252,0.92)",
                    '&:hover': { bgcolor: "grey.100", color: "primary.main" }
                  }}
                >
                  <Icon fontSize="small" sx={{ transform: "rotate(45deg)" }}>drag_indicator</Icon>
                </Box>
              </Tooltip>
            </Paper>
          )}
        </Box>
      );
    }

    function EmbeddedApp() {
      const params = new URLSearchParams(window.location.search);
      const embeddedMode = params.get("embedded") === PAGE_MODES.INTERNAL ? PAGE_MODES.INTERNAL : PAGE_MODES.CUSTOMER;
      return embeddedMode === PAGE_MODES.INTERNAL ? <InternalDataTablePage /> : <CustomerPage />;
    }

    function App() {
      const params = new URLSearchParams(window.location.search);
      const isEmbedded = params.has("embedded");
      return (
        <ThemeProvider theme={theme}>
          <CssBaseline />
          <GlobalStyles styles={{
            body: {
              background: isEmbedded
                ? "radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 32rem), #f6f7f9"
                : "#e2e8f0"
            }
          }} />
          {isEmbedded ? <EmbeddedApp /> : <LauncherApp />}
        </ThemeProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
