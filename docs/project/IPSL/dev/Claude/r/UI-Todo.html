const nowISO = () => {
  const d = new Date(), p = (n) => String(n).padStart(2, "0");
  return \`\${d.getFullYear()}/\${p(d.getMonth()+1)}/\${p(d.getDate())} \${p(d.getHours())}:\${p(d.getMinutes())}:\${p(d.getSeconds())}\`;
};
const appendNote = (prevNote, msg) => {
  const base = (prevNote || "").trim();
  return base ? msg + "｜前歴：" + base : msg;
};
const ensure = (cond, msg) => { if (!cond) throw new Error(msg); };
const isEmpty = (v) => String(v ?? "").trim() === "";
const makeLog = ({ label, role, extra }) =>
  \`\${label}：\${nowISO()}｜権限:\${role}\${extra ? "｜" + extra : ""}\`;

const splitDirection = (row) => {
  const s = String(row.direction || "");
  const parts = s.split("→").map((x) => x.trim());
  if (parts.length !== 2) return { sender: "", receiver: "" };
  return { sender: parts[0], receiver: parts[1] };
};
const senderSideOf = (row) => splitDirection(row).sender;
const receiverSideOf = (row) => splitDirection(row).receiver;

const makeStatusHist = ({ action, role, from, to, reason = "", comment = "" }) => ({
  ts: nowISO(),

const requireFieldsByType = (row, draft) => {

  if (row.actionType === "値下げ") {

    if (isEmpty(draft.discountRate)) errs.push("値下率");

    if (isEmpty(draft.transferTo)) errs.push("移管先");
    if (isEmpty(draft.transferPriceTotal)) errs.push("移管売価計");
  }
  return errs;
};

const parseYmd = (s) => {
  if (!s) return null;
  const t = String(s).trim().replaceAll("-", "/");
  const m = t.match(/^(\\d{4})\\/(\\d{2})\\/(\\d{2})$/);
  if (!m) return null;
  const y = Number(m[1]), mo = Number(m[2]), d = Number(m[3]);
  const dt = new Date(y, mo - 1, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== mo - 1 || dt.getDate() !== d) return null;
  return dt;
};

// ===== Permission（閲覧）=====
const canSeeRow = ({ role, myStore }, row) => {
  if (role === "管理") return true;
  if (role === "商品部") return String(row.direction || "").includes("商品部");
  if (role === "店舗") return row.store === myStore;
  return false;
};

// ===== Requester / Receiver（フェア判定の核）=====
const isRequester = ({ role, myStore }, row) => {
  if (role === "管理") return true;
  const sender = senderSideOf(row);
  if (sender === "商品部") return role === "商品部";
  if (sender === "店舗") return role === "店舗" && row.store === myStore;
  return false;
};

const isReceiver = ({ role, myStore }, row) => {
  if (role === "管理") return true;
  const receiver = receiverSideOf(row);
  if (receiver === "商品部") return role === "商品部";
  if (receiver === "店舗") return role === "店舗" && row.store === myStore;
  return false;
};

// ===== Reducer（履歴記録）=====
function rowsReducer(state, action) {
  const { role, myStore } = action.meta || {};
  const patchOne = (id, fn) => state.map((r) => (r.id === id ? fn(r) : r));

  switch (action.type) {
    case "STATUS_MANUAL": {
      const { id, nextStatus, reasonLabel } = action.payload;
      ensure(STATUS_OPTIONS.includes(nextStatus), "不正なステータスです。");
      return patchOne(id, (r) => {
        ensure(canSeeRow({ role, myStore }, r), "この行のステータス変更権限がありません。");
        const from = r.status;
        const extra = [\`\${from}→\${nextStatus}\`, reasonLabel ? ("理由:" + reasonLabel) : null].filter(Boolean).join("｜");
        return {
          ...r,
          status: nextStatus,
          statusHistory: [
            makeStatusHist({ action: "手動変更", role, from, to: nextStatus, reason: reasonLabel || "" }),
            ...(r.statusHistory || []),
          ],
          note: appendNote(r.note, makeLog({ label: "ステータス変更", role, extra })),
        };
      });
    }

    case "APPROVE": {
      const { id, draft } = action.payload;
      return patchOne(id, (r) => {
        ensure(canSeeRow({ role, myStore }, r), "この行の操作権限がありません。");
        ensure(r.status === "未対応", "未対応の行のみ承諾できます。");
        ensure(isReceiver({ role, myStore }, r) || role === "管理", "承諾は受け手側のみ可能です。");

        const errs = requireFieldsByType(r, draft);
        ensure(errs.length === 0, "必須未入力: " + errs.join(" / "));

        const from = r.status;
        return {
          ...r,
          discountAfterPrice: isEmpty(draft.discountAfterPrice) ? r.discountAfterPrice : draft.discountAfterPrice,
          discountRate: isEmpty(draft.discountRate) ? r.discountRate : draft.discountRate,
          discountTotal: isEmpty(draft.discountTotal) ? r.discountTotal : draft.discountTotal,
          transferTo: isEmpty(draft.transferTo) ? r.transferTo : draft.transferTo,
          transferPriceTotal: isEmpty(draft.transferPriceTotal) ? r.transferPriceTotal : draft.transferPriceTotal,
          status: "完了/承認",
          statusHistory: [
            makeStatusHist({ action: "承諾", role, from, to: "完了/承認", comment: draft.approveComment?.trim() || "" }),
            ...(r.statusHistory || []),
          ],
          note: appendNote(r.note, makeLog({ label: "承諾", role, extra: "コメント：" + (draft.approveComment?.trim() || "-") })),
        };
      });
    }

    case "REJECT": {
      const { id, reason, comment } = action.payload;
      ensure(!isEmpty(comment), "差戻コメントは必須です。");
      return patchOne(id, (r) => {
        ensure(canSeeRow({ role, myStore }, r), "この行の操作権限がありません。");
        ensure(r.status === "未対応", "未対応の行のみ差戻にできます。");
        ensure(isReceiver({ role, myStore }, r) || role === "管理", "差戻は受け手側のみ可能です。");

        const from = r.status;
        return {
          ...r,
          status: "差戻",
          statusHistory: [
            makeStatusHist({ action: "差戻", role, from, to: "差戻", reason, comment: comment.trim() }),
            ...(r.statusHistory || []),
          ],
          note: appendNote(r.note, makeLog({ label: "差戻", role, extra: \`理由：\${reason}｜コメント：\${comment.trim()}\` })),
        };
      });
    }

    case "CANCEL": {
      const { id } = action.payload;
      return patchOne(id, (r) => {
        ensure(canSeeRow({ role, myStore }, r), "この行の操作権限がありません。");
        ensure(r.status === "未対応" || r.status === "差戻", "未対応/差戻の行のみ中止にできます。");
        ensure(isRequester({ role, myStore }, r) || role === "管理", "中止は依頼者のみ可能です。");

        const from = r.status;
        return {
          ...r,
          status: "中止",
          statusHistory: [
            makeStatusHist({ action: "中止", role, from, to: "中止" }),
            ...(r.statusHistory || []),
          ],
          note: appendNote(r.note, makeLog({ label: "中止", role })),
        };
      });
    }

    case "RESUBMIT": {
      const { id, comment } = action.payload;
      ensure(!isEmpty(comment), "再依頼コメントは必須です。");
      return patchOne(id, (r) => {
        ensure(canSeeRow({ role, myStore }, r), "この行の操作権限がありません。");
        ensure(r.status === "差戻", "差戻の行のみ再依頼できます。");
        ensure(isRequester({ role, myStore }, r) || role === "管理", "再依頼は依頼者のみ可能です。");

        const from = r.status;
        return {
          ...r,
          status: "未対応",
          statusHistory: [
            makeStatusHist({ action: "再依頼", role, from, to: "未対応", comment: comment.trim() }),
            ...(r.statusHistory || []),
          ],
          note: appendNote(r.note, makeLog({ label: "再依頼", role, extra: "コメント：" + comment.trim() })),
        };
      });
    }

    case "REVIVE": {
      const { id } = action.payload;
      return patchOne(id, (r) => {
        ensure(canSeeRow({ role, myStore }, r), "この行の操作権限がありません。");
        ensure(r.status === "中止", "中止の行のみ復活できます。");
        ensure(isRequester({ role, myStore }, r) || isReceiver({ role, myStore }, r) || role === "管理", "復活権限がありません。");

        const from = r.status;
        return {
          ...r,
          status: "未対応",
          statusHistory: [
            makeStatusHist({ action: "復活", role, from, to: "未対応" }),
            ...(r.statusHistory || []),
          ],
          note: appendNote(r.note, makeLog({ label: "復活", role })),
        };
      });
    }

    default:
      return state;
  }
}

function App() {
  const apiRef = useGridApiRef();
  const [rows, dispatchRows] = useReducer(rowsReducer, initialRows);
  const isXs = useMediaQuery(theme.breakpoints.down("sm"));

  // ---- identity ----
  const [role, setRole] = useState("商品部");
  const allStores = useMemo(() => Array.from(new Set(rows.map((r) => r.store))), [rows]);
  const [myStore, setMyStore] = useState(allStores[0] || "");

  useEffect(() => {
    if (role !== "店舗") return;
    if (!myStore || !allStores.includes(myStore)) setMyStore(allStores[0] || "");
  }, [role, myStore, allStores]);

  // ---- filters ----
  const [tab, setTab] = useState("すべて");
  const [query, setQuery] = useState("");
  const [storeFilter, setStoreFilter] = useState("全店舗");
  const [typeFilter, setTypeFilter] = useState("全種別");
  const [directionFilter, setDirectionFilter] = useState("全方向");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [rowSelectionModel, setRowSelectionModel] = useState([]);

  // ---- selection ----
  const [selectedRowId, setSelectedRowId] = useState(null);
  const selected = useMemo(() => (selectedRowId ? rows.find((r) => r.id === selectedRowId) : null), [rows, selectedRowId]);

  // ---- details modal + mode（統合）----
  const [detailsOpen, setDetailsOpen] = useState(false);
  const [detailsMode, setDetailsMode] = useState("view"); // view | approve | reject | resubmit

  // ---- drafts（操作入力）----
  const [approveDraft, setApproveDraft] = useState({
    discountAfterPrice: "",
    discountRate: "",
    discountTotal: "",
    transferTo: "",
    transferPriceTotal: "",
    approveComment: "",
  });

  const [rejectReason, setRejectReason] = useState("在庫過多");
  const [rejectComment, setRejectComment] = useState("");

  const [resubmitComment, setResubmitComment] = useState("");

  // ---- other ui ----
  const [editStatus, setEditStatus] = useState("未対応");
  const [statusFoldOpen, setStatusFoldOpen] = useState(false);
  const [histOpen, setHistOpen] = useState(false);

  const [snack, setSnack] = useState({ open: false, message: "", severity: "success" });

  const [textOpen, setTextOpen] = useState(false);
  const [textTitle, setTextTitle] = useState("");
  const [textBody, setTextBody] = useState("");

  const openText = useCallback((title, body) => {
    setTextTitle(title);
    setTextBody(String(body ?? "-"));
    setTextOpen(true);
  }, []);

  const safeDispatch = useCallback((action, okMsg, okSeverity = "success") => {
    try {
      dispatchRows(action);
      setSnack({ open: true, message: okMsg, severity: okSeverity });
      return true;
    } catch (e) {
      setSnack({ open: true, message: e?.message || "エラー", severity: "error" });
      return false;
    }
  }, []);

  // ---- visibility scope ----
  const scopedRows = useMemo(() => rows.filter((r) => canSeeRow({ role, myStore }, r)), [rows, role, myStore]);

  const storesForFilter = useMemo(() => {
    const set = new Set(scopedRows.map((r) => r.store));
    return ["全店舗", ...Array.from(set)];
  }, [scopedRows]);

  useEffect(() => { if (role === "店舗") setStoreFilter("全店舗"); }, [role]);

  const stats = useMemo(() => {
    const kpi = { total: scopedRows.length, pending: 0, done: 0, rejected: 0, canceled: 0 };
    const tabCounts = new Map([["すべて", scopedRows.length], ...STATUS_OPTIONS.map((s) => [s, 0])]);
    for (const r of scopedRows) {
      tabCounts.set(r.status, (tabCounts.get(r.status) || 0) + 1);
      if (r.status === "未対応") kpi.pending++;
      else if (r.status === "完了/承認") kpi.done++;
      else if (r.status === "差戻") kpi.rejected++;
      else if (r.status === "中止") kpi.canceled++;
    }
    return { kpi, tabCounts };
  }, [scopedRows]);

  const { kpi, tabCounts } = stats;

  const makeHay = useCallback((r) => {
    return [
      r.productName, r.productCode, r.store, r.actionType, r.content, r.status, r.note,
      r.price, r.discountAfterPrice, r.discountRate, r.discountTotal, r.transferTo, r.transferPriceTotal
    ].map((x) => String(x ?? "")).join(" ").toLowerCase();
  }, []);

  const filteredRows = useMemo(() => {
    const q = query.trim().toLowerCase();
    const fromDt = parseYmd(dateFrom);
    const toDt = parseYmd(dateTo);
    const fromTs = fromDt ? dayStartTs(fromDt) : null;
    const toTs = toDt ? dayStartTs(toDt) : null;

    return scopedRows
      .filter((r) => (tab === "すべて" ? true : r.status === tab))
      .filter((r) => storeFilter === "全店舗" || r.store === storeFilter)
      .filter((r) => typeFilter === "全種別" || r.actionType === typeFilter)
      .filter((r) => directionFilter === "全方向" || r.direction === directionFilter)
      .filter((r) => {
        if (!fromTs && !toTs) return true;
        const dt = parseYmd(r.date);
        if (!dt) return true;
        const ts = dayStartTs(dt);
        if (fromTs && ts < fromTs) return false;
        if (toTs && ts > toTs) return false;
        return true;
      })
      .filter((r) => (!q ? true : makeHay(r).includes(q)));
  }, [scopedRows, tab, storeFilter, typeFilter, directionFilter, query, dateFrom, dateTo, makeHay]);

  // ===== canDo（フェア：承諾/差戻=受け手、中止/再依頼=依頼者）=====
  const canDo = useCallback((action, row) => {
    if (!row) return false;
    if (!canSeeRow({ role, myStore }, row)) return false;
    if (role === "管理") return true;

    const s = row.status;
    const receiverOK = isReceiver({ role, myStore }, row);
    const requesterOK = isRequester({ role, myStore }, row);

    if (action === "approve")  return receiverOK && s === "未対応";
    if (action === "reject")   return receiverOK && s === "未対応";
    if (action === "cancel")   return requesterOK && (s === "未対応" || s === "差戻");
    if (action === "resubmit") return requesterOK && s === "差戻";
    if (action === "revive")   return (receiverOK || requesterOK) && s === "中止";
    return false;
  }, [role, myStore]);

  // ===== 詳細モーダル（統合オープン）=====
  const openDetails = useCallback((row, mode = "view") => {
    if (!row) return;

    // 「操作ボタン」から呼ばれた場合、権限をここで弾く（UI上はdisabledだが保険）
    if (mode === "approve" && !canDo("approve", row)) {
      setSnack({ open: true, message: "この行は承諾できません。", severity: "warning" });
      mode = "view";
    }
    if (mode === "reject" && !canDo("reject", row)) {
      setSnack({ open: true, message: "この行は差戻できません。", severity: "warning" });
      mode = "view";
    }
    if (mode === "resubmit" && !canDo("resubmit", row)) {
      setSnack({ open: true, message: "この行は再依頼できません。", severity: "warning" });
      mode = "view";
    }

    setSelectedRowId(row.id);
    setEditStatus(row.status);
    setStatusFoldOpen(false);
    setHistOpen(false);
    setDetailsMode(mode);

    // modeごとのドラフト初期化
    if (mode === "approve") {
      setApproveDraft({
        discountAfterPrice: row.discountAfterPrice ?? "",
        discountRate: row.discountRate ?? "",
        discountTotal: row.discountTotal ?? "",
        transferTo: row.transferTo ?? "",
        transferPriceTotal: row.transferPriceTotal ?? "",
        approveComment: "",
      });
    }
    if (mode === "reject") {
      setRejectReason("在庫過多");
      setRejectComment("");
    }
    if (mode === "resubmit") {
      setResubmitComment("");
    }

    setDetailsOpen(true);
  }, [canDo]);

  // ===== Submit（統合：完了後は view に戻す）=====
  const submitApprove = useCallback(() => {
    if (!selected) return;
    const ok = safeDispatch(
      { type: "APPROVE", payload: { id: selected.id, draft: approveDraft }, meta: { role, myStore } },
      "完了にしました。",
      "success"
    );
    if (ok) setDetailsMode("view");
  }, [selected, approveDraft, safeDispatch, role, myStore]);

  const submitReject = useCallback(() => {
    if (!selected) return;
    const ok = safeDispatch(
      { type: "REJECT", payload: { id: selected.id, reason: rejectReason, comment: rejectComment }, meta: { role, myStore } },
      "差戻しました。",
      "info"
    );
    if (ok) setDetailsMode("view");
  }, [selected, rejectReason, rejectComment, safeDispatch, role, myStore]);

  const submitResubmit = useCallback(() => {
    if (!selected) return;
    const ok = safeDispatch(
      { type: "RESUBMIT", payload: { id: selected.id, comment: resubmitComment }, meta: { role, myStore } },
      "再依頼しました。",
      "success"
    );
    if (ok) setDetailsMode("view");
  }, [selected, resubmitComment, safeDispatch, role, myStore]);

  const cancelRow = useCallback((row) => {
    if (!row) return;
    if (!canDo("cancel", row)) return setSnack({ open: true, message: "この行は中止できません。", severity: "warning" });
    safeDispatch({ type: "CANCEL", payload: { id: row.id }, meta: { role, myStore } }, "中止にしました。", "info");
  }, [safeDispatch, role, myStore, canDo]);

  const reviveRow = useCallback((row) => {
    if (!row) return;
    if (!canDo("revive", row)) return setSnack({ open: true, message: "この行は復活できません。", severity: "warning" });
    safeDispatch({ type: "REVIVE", payload: { id: row.id }, meta: { role, myStore } }, "復活しました。", "success");
  }, [safeDispatch, role, myStore, canDo]);

  const updateStatus = useCallback((row, nextStatus, reasonLabel) => {
    if (!row) return;
    safeDispatch(
      { type: "STATUS_MANUAL", payload: { id: row.id, nextStatus, reasonLabel }, meta: { role, myStore } },
      "ステータスを変更しました。"
    );
  }, [safeDispatch, role, myStore]);

  const escapeHtml = (s) =>
    String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");

  const printChecklist = useCallback(() => {
    const w = window.open("", "", "width=1000,height=700");
    const rowsHtml = filteredRows
      .map((r) => {
        const cls =
          r.status === "完了/承認" ? "status-done"
          : r.status === "差戻" ? "status-reject"
          : r.status === "中止" ? "status-cancel"
          : "";
        return (
          "<tr class='" + cls + "'>" +
          "<td class='checkbox'>☐</td>" +
          "<td><strong>" + escapeHtml(r.productName) + "</strong><br><small>" + escapeHtml(r.productCode) + "</small></td>" +
          "<td>" + escapeHtml(r.store) + "</td>" +
          "<td>" + escapeHtml(r.actionType) + "</td>" +
          "<td>" + escapeHtml(r.price ?? r.price === 0 ? r.price : "-") + "</td>" +
          "<td>" + escapeHtml(r.qtyOrRate) + "</td>" +
          "<td>" + escapeHtml(r.content) + "</td>" +
          "<td>" + escapeHtml(r.status) + "</td>" +
          "</tr>"
        );
      })
      .join("");

    const html =
      "<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><title>チェックリスト</title>" +
      "<style>body{font-family:Arial,sans-serif;margin:20px}h1{text-align:center}" +
      "table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;text-align:left;vertical-align:top}" +
      "th{background-color:#f2f2f2}.checkbox{width:20px}.status-done{background-color:#e8f5e9}" +
      ".status-reject{background-color:#ffebee}.status-cancel{background-color:#f5f5f5;color:#666}</style>" +
      "</head><body><h1>やることリスト - チェックリスト</h1><p>印刷日時: " +
      new Date().toLocaleString("ja-JP") +
      "</p><table><thead><tr><th class='checkbox'>☐</th><th>商品</th><th>店舗</th><th>内容</th><th>売価</th><th>数量</th><th>詳細</th><th>ステータス</th></tr></thead><tbody>" +
      rowsHtml +
      "</tbody></table></body></html>";

    w.document.write(html);
    w.document.close();
    w.print();
  }, [filteredRows]);

  const resetFilters = useCallback(() => {
    setQuery("");
    setStoreFilter("全店舗");
    setTypeFilter("全種別");
    setDirectionFilter("全方向");
    setDateFrom("");
    setDateTo("");
    setTab("すべて");
    setSnack({ open: true, message: "フィルタをリセットしました。", severity: "success" });
  }, []);

  const autosizeReq = useRef(0);
  useLayoutEffect(() => {
    if (!apiRef?.current) return;
    const fn = apiRef.current.autosizeColumns;
    if (typeof fn !== "function") return;

    autosizeReq.current += 1;
    const myReq = autosizeReq.current;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (myReq !== autosizeReq.current) return;
        fn(AUTOSIZE);
      });
    });
  }, [apiRef, filteredRows.length, tab, query, storeFilter, typeFilter, directionFilter, dateFrom, dateTo, role, myStore]);

  const columns = useMemo(() => ([
    {
      field: "no",
      headerName: "NO",
      minWidth: 70,
      flex: 0.35,
      sortable: false,
      filterable: false,
      align: "right",
      headerAlign: "right",
      valueGetter: (_value, row) => {
        try {
          const ids = apiRef?.current?.getSortedRowIds?.() ?? [];
          const idx = ids.indexOf(row.id);
          return idx >= 0 ? idx + 1 : "";
        } catch {
          return "";
        }
      },
    },
    {
      field: "status",
      headerName: "ステータス",
      minWidth: 140,
      flex: 0.75,
      renderCell: (p) => (
        <Box sx={{ height: "100%", display: "flex", alignItems: "center" }}>
          <StatusChip v={p.value} />
        </Box>
      ),
    },
    {
      field: "actions",
      headerName: "操作",
      minWidth: 420,
      flex: 1.55,
      sortable: false,
      filterable: false,
      renderCell: (params) => {
        const r = params.row;
        const btnSx = { minWidth: 64, px: 0.9, py: 0.45, fontSize: 14, lineHeight: 1.05, borderRadius: 1.0 };
        return (
          <Box sx={{ height: "100%", display: "flex", alignItems: "center" }}>
            <Stack direction="row" spacing={0.6} alignItems="center">
              <Button size="small" variant="contained" color="success" sx={btnSx}
                onClick={() => openDetails(r, "approve")}
                disabled={!canDo("approve", r)}
              >
                承諾
              </Button>

              <Button size="small" variant="outlined" color="error" sx={btnSx}
                onClick={() => openDetails(r, "reject")}
                disabled={!canDo("reject", r)}
              >
                差戻
              </Button>

              <Button size="small" variant="outlined" color="primary" sx={btnSx}
                onClick={() => openDetails(r, "resubmit")}
                disabled={!canDo("resubmit", r)}
                startIcon={<Replay fontSize="small" />}
              >
                再依頼
              </Button>

              <Button size="small" variant="outlined" color="warning" sx={btnSx}
                onClick={() => cancelRow(r)}
                disabled={!canDo("cancel", r)}
              >
                中止
              </Button>

              <Button size="small" variant="contained" color="primary" sx={btnSx}
                onClick={() => reviveRow(r)}
                disabled={!canDo("revive", r)}
              >
                復活
              </Button>
            </Stack>
          </Box>
        );
      },
    },
    { field: "date", headerName: "希望期日", minWidth: 125, flex: 0.7 },
    {
      field: "actionType",
      headerName: "内容",
      minWidth: 130,
      flex: 0.65,
      renderCell: (p) => (
        <Box sx={{ height: "100%", display: "flex", alignItems: "center" }}>
          <TypeChip v={p.value} />
        </Box>
      ),
    },
    {
      field: "productName",
      headerName: "商品",
      minWidth: 280,
      flex: 2.2,
      renderCell: (p) => (
        <Box>
          <Typography variant="body2" sx={{ fontWeight: 900, lineHeight: 1.3, whiteSpace: "normal", wordBreak: "break-word" }}>
            {p.row.productName}
          </Typography>
          <Typography variant="caption" color="text.secondary">
            {p.row.productCode}
          </Typography>
        </Box>
      ),
    },
    {
      field: "price",
      headerName: "売価",
      minWidth: 120,
      flex: 0.7,
      align: "right",
      headerAlign: "right",
      valueGetter: (_v, row) => (row.price ?? row.price === 0 ? row.price : "-"),
      renderCell: (p) => <Typography variant="body2" sx={{ fontWeight: 900 }}>{fmtYen(p.value)}</Typography>,
    },
    { field: "qtyOrRate", headerName: "数量", minWidth: 120, flex: 0.7 },

    { field: "discountAfterPrice", headerName: "値下後売価", minWidth: 135, flex: 0.75, align: "right", headerAlign: "right",
      valueGetter: (_v, row) => (row.discountAfterPrice ?? row.discountAfterPrice === 0 ? row.discountAfterPrice : "-") },
    { field: "discountRate", headerName: "値下率", minWidth: 110, flex: 0.6, valueGetter: (_v, row) => (row.discountRate ? row.discountRate : "-") },
    { field: "discountTotal", headerName: "値下高", minWidth: 150, flex: 0.9, align: "right", headerAlign: "right",
      valueGetter: (_v, row) => (row.discountTotal ?? row.discountTotal === 0 ? row.discountTotal : "-") },

    { field: "transferTo", headerName: "移管先", minWidth: 170, flex: 1.0, valueGetter: (_v, row) => (row.transferTo ? row.transferTo : "-") },
    { field: "transferPriceTotal", headerName: "移管売価計", minWidth: 150, flex: 0.9, align: "right", headerAlign: "right",
      valueGetter: (_v, row) => (row.transferPriceTotal ?? row.transferPriceTotal === 0 ? row.transferPriceTotal : "-") },

    {
      field: "content",
      headerName: "詳細",
      minWidth: 260,
      flex: 1.7,
      renderCell: (p) => (
        <Typography variant="body2" sx={{ whiteSpace: "normal", wordBreak: "break-word", lineHeight: 1.35 }}>
          {p.value}
        </Typography>
      ),
    },
    { field: "direction", headerName: "方向", minWidth: 150, flex: 0.85, renderCell: (p) => <Chip size="small" label={p.value} variant="outlined" sx={{ fontWeight: 900 }} /> },
    { field: "todoID", headerName: "todoID", minWidth: 110, flex: 0.55, valueGetter: (_v, row) => String(row.id) },
    { field: "datetime", headerName: "登録日", minWidth: 125, flex: 0.7, valueGetter: (_v, row) => (row?.datetime || "").substring(0, 10) },
  ]), [apiRef, openDetails, cancelRow, reviveRow, canDo]);

  const roleLabel = useMemo(() => {
    if (role !== "店舗") return "権限: " + role;
    return "権限: 店舗 " + (myStore || "-");
  }, [role, myStore]);

  const headerChips = useMemo(() => {
    if (!selected) return null;
    return (
      <>
        <Chip icon={iconForType(selected.actionType)} label={selected.actionType} color={(ACTION_META[selected.actionType]?.color) || "default"} />
        <StatusChip v={selected.status} />
      </>
    );
  }, [selected]);

  const detailsTitle = useMemo(() => {
    if (!selected) return "内容";
    const suffix =
      detailsMode === "approve" ? "（承諾）"
      : detailsMode === "reject" ? "（差戻）"
      : detailsMode === "resubmit" ? "（再依頼）"
      : "";
    return "内容" + suffix;
  }, [selected, detailsMode]);

  return (
    <ThemeProvider theme={theme}>
      <CssBaseline />

      <AppBar position="sticky" color="default" elevation={0} sx={{ borderBottom: 1, borderColor: "divider" }}>
        <Toolbar sx={{ gap: 2 }}>
          <Typography variant="h6" sx={{ fontWeight: 900 }}>
            やることリスト（アクション）
          </Typography>

          <Stack direction="row" spacing={1} alignItems="center" sx={{ ml: 1 }}>
            <Chip icon={<SupervisorAccount />} label={roleLabel} variant="outlined" sx={{ fontWeight: 900 }} />
            <Autocomplete
              disablePortal
              size="small"
              options={ROLE_OPTIONS}
              value={role}
              onChange={(_, v) => setRole(v ?? "商品部")}
              disableClearable
              sx={{ width: 170 }}
              renderInput={(p) => <TextField {...p} label="権限" />}
            />
            {role === "店舗" ? (
              <Autocomplete
                disablePortal
                size="small"
                options={allStores}
                value={myStore}
                onChange={(_, v) => setMyStore(v ?? allStores[0] ?? "")}
                disableClearable
                sx={{ width: 190 }}
                renderInput={(p) => <TextField {...p} label="自店舗" />}
              />
            ) : null}
          </Stack>

          <Box sx={{ flex: 1 }} />

          <Stack direction="row" spacing={1} alignItems="center">
            <Badge badgeContent={kpi.pending} color="warning">
              <Chip label={"未対応 " + kpi.pending} color="warning" variant="outlined" />
            </Badge>
            <Chip label={"完了 " + kpi.done} color="success" variant="outlined" />
            <Chip label={"差戻 " + kpi.rejected} color="error" variant="outlined" />
            <Chip label={"中止 " + kpi.canceled} variant="outlined" />
            <Chip label={"合計 " + kpi.total} variant="outlined" />
          </Stack>
        </Toolbar>
      </AppBar>

      <Container maxWidth="xl">
        <Box sx={{ mt: 2, mb: 3 }}>
          <Paper variant="outlined" sx={{ p: 2, borderRadius: 1 }}>
            <Stack spacing={2}>
              <Stack direction={{ xs: "column", md: "row" }} spacing={2} alignItems={{ md: "center" }}>
                <TextField
                  fullWidth
                  label="検索"
                  placeholder="商品名/コード/店舗/詳細/ステータス/備考/売価/値下/移管"
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                  InputProps={{
                    startAdornment: (
                      <Box sx={{ display: "flex", alignItems: "center", mr: 1, color: "text.secondary" }}>
                        <Search fontSize="small" />
                      </Box>
                    ),
                  }}
                />
                <Stack direction="row" spacing={2} sx={{ width: { xs: "100%", md: "auto" } }}>
                  <FilterCombo value={storeFilter} onChange={setStoreFilter} options={storesForFilter} label="店舗" minWidth={190} disabled={role === "店舗"} />
                  <FilterCombo value={typeFilter} onChange={setTypeFilter} options={TYPE_OPTIONS} label="種別" minWidth={170} />
                  <FilterCombo value={directionFilter} onChange={setDirectionFilter} options={DIRECTION_OPTIONS} label="方向" minWidth={200} />
                </Stack>
              </Stack>

              <Stack direction={{ xs: "column", md: "row" }} spacing={2} alignItems={{ md: "center" }}>
                <TextField label="希望期日 From" type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)} InputLabelProps={{ shrink: true }} sx={{ minWidth: 230 }} />
                <TextField label="希望期日 To" type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)} InputLabelProps={{ shrink: true }} sx={{ minWidth: 230 }} />
                <Box sx={{ flex: 1 }} />
                <Tooltip title="フィルタをリセット">
                  <Button variant="outlined" startIcon={<FilterList />} onClick={resetFilters}>リセット</Button>
                </Tooltip>
                <Tooltip title="チェックリストを印刷">
                  <Button variant="outlined" startIcon={<Print />} onClick={printChecklist}>印刷</Button>
                </Tooltip>
              </Stack>

              <Stack direction={{ xs: "column", md: "row" }} spacing={2} alignItems={{ md: "center" }}>
                <Tabs value={tab} onChange={(_, v) => setTab(v)} textColor="primary" indicatorColor="primary" variant="scrollable" scrollButtons="auto">
                  {STATUS_TABS.map((t) => (
                    <Tab key={t.value} value={t.value} label={\`\${t.label}（\${tabCounts.get(t.value) ?? 0}）\`} />
                  ))}
                </Tabs>
                <Box sx={{ flex: 1 }} />
                <Typography variant="body2" color="text.secondary">選択中: {rowSelectionModel.length} 件</Typography>
              </Stack>

              <Divider />

              <Box sx={{ height: 620 }}>
                <DataGrid
                  apiRef={apiRef}
                  rows={filteredRows}
                  columns={columns}
                  density="comfortable"
                  checkboxSelection
                  disableRowSelectionOnClick
                  rowSelectionModel={rowSelectionModel}
                  onRowSelectionModelChange={(m) => setRowSelectionModel(m)}
                  onCellClick={(params) => {
                    if (params.field === "actions") return;
                    if (params.field === "__check__" || params.field === "checkboxSelection") return;
                    openDetails(params.row, "view");
                  }}
                  getRowHeight={() => "auto"}
                  getEstimatedRowHeight={() => 72}
                  getRowClassName={(params) =>
                    params.row.status === "完了/承認" ? "rowDone"
                    : params.row.status === "差戻" ? "rowRejected"
                    : params.row.status === "中止" ? "rowCanceled"
                    : ""
                  }
                  sx={{
                    border: 0,
                    "& .rowDone": { backgroundColor: "rgba(46,125,50,0.08)" },
                    "& .rowRejected": { backgroundColor: "rgba(211,47,47,0.08)" },
                    "& .rowCanceled": { backgroundColor: "rgba(0,0,0,0.04)", color: "rgba(0,0,0,0.6)" },
                    "& .MuiDataGrid-cell": { py: 1.0, alignItems: "center", whiteSpace: "normal", lineHeight: 1.35 },
                    "& .MuiDataGrid-cellContent": { whiteSpace: "normal" },
                  }}
                  initialState={{ pagination: { paginationModel: { pageSize: 10, page: 0 } } }}
                  pageSizeOptions={[10, 25, 50]}
                />
              </Box>
            </Stack>
          </Paper>
        </Box>
      </Container>

      {/* ===== 詳細モーダル（表示 + 操作を統合） ===== */}
      <ModalFrame
        open={detailsOpen}
        onClose={() => setDetailsOpen(false)}
        fullScreen={isXs}
        maxWidth="md"
        paperWidth={920}
        title={detailsTitle}
        headerRight={selected ? <Stack direction="row" spacing={0.6} alignItems="center">{headerChips}</Stack> : null}
        actions={
          <>
            <Button onClick={() => setDetailsOpen(false)} variant="outlined" sx={{ minWidth: 96 }}>閉じる</Button>

            {/* ここは「モード切替」だけ（実行はパネル側） */}
            <Button
              variant="contained"
              color="success"
              onClick={() => selected && openDetails(selected, "approve")}
              disabled={!selected || !canDo("approve", selected)}
              sx={{ minWidth: 110 }}
            >
              承諾
            </Button>

            <Button
              variant="outlined"
              color="error"
              onClick={() => selected && openDetails(selected, "reject")}
              disabled={!selected || !canDo("reject", selected)}
              sx={{ minWidth: 110 }}
            >
              差戻
            </Button>

            <Button
              variant="outlined"
              color="primary"
              onClick={() => selected && openDetails(selected, "resubmit")}
              disabled={!selected || !canDo("resubmit", selected)}
              startIcon={<Replay />}
              sx={{ minWidth: 120 }}
            >
              再依頼
            </Button>

            {/* 中止/復活は入力不要なので即実行 */}
            <Button
              variant="outlined"
              color="warning"
              onClick={() => selected && cancelRow(selected)}
              disabled={!selected || !canDo("cancel", selected)}
              sx={{ minWidth: 110 }}
            >
              中止
            </Button>

            <Button
              variant="contained"
              color="primary"
              onClick={() => selected && reviveRow(selected)}
              disabled={!selected || !canDo("revive", selected)}
              sx={{ minWidth: 110 }}
            >
              復活
            </Button>
          </>
        }
      >
        {selected ? (
          <Stack spacing={0.9}>
            <Card title="対象 / 依頼内容" icon={<Store fontSize="small" />} tone="info">
              <Typography variant="body2" sx={{ fontWeight: 900, lineHeight: 1.2, ...clampSx(2) }}>
                {selected.productName}
              </Typography>
              <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 900 }}>
                店舗:{selected.store} / 希望期日:{selected.date}
              </Typography>

              <Divider sx={{ my: 0.8 }} />

              <Stack direction="row" spacing={1} alignItems="flex-start">
                <Typography variant="body2" sx={{ fontWeight: 900, lineHeight: 1.35, flex: 1 }}>
                  {selected.content}
                </Typography>
                <Tooltip title="全文">
                  <IconButton size="small" onClick={() => openText("依頼内容", selected.content)}>
                    <OpenInFull fontSize="small" />
                  </IconButton>
                </Tooltip>
              </Stack>
            </Card>

            <Card title="判断材料" icon={<Info fontSize="small" />} tone="neutral">
              <Box sx={{ display: "grid", gridTemplateColumns: { xs: "1fr", sm: "1fr 1fr" }, gap: 0.8 }}>
                <KV icon={<QrCode2 fontSize="small" />} label="商品コード" value={selected.productCode} strong />
                <KV icon={<SwapHoriz fontSize="small" />} label="方向" value={selected.direction} />
                <KV icon={<Numbers fontSize="small" />} label="売価" value={fmtYen(selected.price ?? (selected.price === 0 ? 0 : "-"))} strong />
                <KV icon={<Checklist fontSize="small" />} label="数量" value={selected.qtyOrRate} strong />
              </Box>
            </Card>

            {/* ===== 操作パネル（統合） ===== */}
            <Card title="操作パネル" icon={<EditNote fontSize="small" />} tone="neutral">
              <Stack direction={{ xs: "column", sm: "row" }} spacing={1} alignItems={{ sm: "center" }}>
                <Autocomplete
                  disablePortal
                  size="small"
                  options={[
                    { v: "view", label: "表示のみ" },
                    { v: "approve", label: "承諾" },
                    { v: "reject", label: "差戻" },
                    { v: "resubmit", label: "再依頼" },
                  ].filter((x) => {
                    if (!selected) return false;
                    if (x.v === "view") return true;
                    if (x.v === "approve") return canDo("approve", selected);
                    if (x.v === "reject") return canDo("reject", selected);
                    if (x.v === "resubmit") return canDo("resubmit", selected);
                    return false;
                  })}
                  value={{
                    v: detailsMode,
                    label:
                      detailsMode === "approve" ? "承諾"
                      : detailsMode === "reject" ? "差戻"
                      : detailsMode === "resubmit" ? "再依頼"
                      : "表示のみ"
                  }}
                  onChange={(_, val) => setDetailsMode(val?.v ?? "view")}
                  isOptionEqualToValue={(o, v) => o.v === v.v}
                  renderInput={(p) => <TextField {...p} label="モード" />}
                  sx={{ minWidth: 220 }}
                />

                <Box sx={{ flex: 1 }} />

                <Button
                  variant="contained"
                  color="success"
                  disabled={!selected || detailsMode !== "approve" || !canDo("approve", selected)}
                  onClick={submitApprove}
                  sx={{ minWidth: 140 }}
                >
                  承諾して完了
                </Button>

                <Button
                  variant="contained"
                  color="error"
                  disabled={!selected || detailsMode !== "reject" || !canDo("reject", selected)}
                  onClick={submitReject}
                  sx={{ minWidth: 120 }}
                >
                  差戻する
                </Button>

                <Button
                  variant="contained"
                  color="primary"
                  disabled={!selected || detailsMode !== "resubmit" || !canDo("resubmit", selected)}
                  onClick={submitResubmit}
                  startIcon={<Replay />}
                  sx={{ minWidth: 140 }}
                >
                  再依頼する
                </Button>
              </Stack>

              <Divider sx={{ my: 1 }} />

              {/* 承諾入力 */}
              {detailsMode === "approve" ? (
                <Stack spacing={1}>
                  {selected.actionType === "値下げ" ? (
                    <Stack direction={{ xs: "column", sm: "row" }} spacing={1}>
                      <TextField size="small" label="値下後売価" value={approveDraft.discountAfterPrice}
                        onChange={(e) => setApproveDraft((d) => ({ ...d, discountAfterPrice: e.target.value }))} fullWidth />
                      <TextField size="small" label="値下率" placeholder="例：23%" value={approveDraft.discountRate}
                        onChange={(e) => setApproveDraft((d) => ({ ...d, discountRate: e.target.value }))} fullWidth />
                      <TextField size="small" label="値下高" value={approveDraft.discountTotal}
                        onChange={(e) => setApproveDraft((d) => ({ ...d, discountTotal: e.target.value }))} fullWidth />
                    </Stack>
                  ) : null}

                  {selected.actionType === "移管出庫" ? (
                    <Stack direction={{ xs: "column", sm: "row" }} spacing={1}>
                      <TextField size="small" label="移管先" value={approveDraft.transferTo}
                        onChange={(e) => setApproveDraft((d) => ({ ...d, transferTo: e.target.value }))} fullWidth />
                      <TextField size="small" label="移管売価計" value={approveDraft.transferPriceTotal}
                        onChange={(e) => setApproveDraft((d) => ({ ...d, transferPriceTotal: e.target.value }))} fullWidth />
                    </Stack>
                  ) : null}

                  <TextField
                    size="small"
                    label="承諾コメント（任意）"
                    value={approveDraft.approveComment}
                    onChange={(e) => setApproveDraft((d) => ({ ...d, approveComment: e.target.value }))}
                    fullWidth
                    multiline
                    minRows={2}
                  />

                  <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 900 }}>
                    必須項目は種別により変わります（値下げ/移管は入力必須）。
                  </Typography>
                </Stack>
              ) : null}

              {/* 差戻入力 */}
              {detailsMode === "reject" ? (
                <Stack spacing={1}>
                  <Autocomplete
                    disablePortal
                    size="small"
                    options={REJECT_REASONS}
                    value={rejectReason}
                    onChange={(_, v) => setRejectReason(v ?? "在庫過多")}
                    disableClearable
                    renderInput={(p) => <TextField {...p} label="理由" />}
                  />
                  <TextField
                    size="small"
                    label="差戻コメント（必須）"
                    value={rejectComment}
                    onChange={(e) => setRejectComment(e.target.value)}
                    fullWidth
                    multiline
                    minRows={4}
                    required
                    placeholder={[
                      "1) 何がNGか（根拠）",
                      "2) 代替案（条件/期日/受入先など）",
                      "3) 次に誰が何をするか"
                    ].join("\\n")}
                  />
                </Stack>
              ) : null}

              {/* 再依頼入力 */}
              {detailsMode === "resubmit" ? (
                <Stack spacing={1}>
                  <TextField
                    size="small"
                    label="再依頼コメント（必須）"
                    value={resubmitComment}
                    onChange={(e) => setResubmitComment(e.target.value)}
                    fullWidth
                    multiline
                    minRows={4}
                    required
                    placeholder={[
                      "例：移管先を○○店へ変更。数量2個で再依頼。",
                      "例：値下率を15%に修正。週末訴求のため実施希望。"
                    ].join("\\n")}
                  />
                  <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 900 }}>
                    再依頼すると「差戻 → 未対応」に戻り、受け手側で再判断します。
                  </Typography>
                </Stack>
              ) : null}

              {/* view の時は何も出さない（余白を減らす） */}
              {detailsMode === "view" ? (
                <Typography variant="body2" color="text.secondary" sx={{ fontWeight: 900 }}>
                  モードを選ぶと入力欄が表示されます。
                </Typography>
              ) : null}
            </Card>

            {/* 履歴 */}
            <Card title="履歴" icon={<History fontSize="small" />} tone="neutral">
              <Stack direction="row" spacing={0.8} alignItems="center">
                <Button
                  size="small"
                  variant="outlined"
                  onClick={() => setHistOpen((v) => !v)}
                  startIcon={histOpen ? <ExpandLess /> : <ExpandMore />}
                  sx={{ py: 0.4 }}
                >
                  {histOpen ? "閉じる" : "開く"}
                </Button>
                <Typography variant="body2" color="text.secondary" sx={{ fontWeight: 900 }}>
                  {selected.statusHistory?.length ? selected.statusHistory.length + "件" : "0件"}
                </Typography>
              </Stack>

              <Collapse in={histOpen} timeout="auto" unmountOnExit>
                <Box sx={{ mt: 0.8 }}>
                  {selected.statusHistory?.length ? (
                    <Timeline position="alternate" sx={{ m: 0, p: 0 }}>
                      {selected.statusHistory.map((h, idx) => {
                        const v = actionDotVariant(h.action);
                        const headline = [h.from ? (h.from + "→" + h.to) : h.to, h.reason].filter(Boolean).join(" / ");
                        const sub = [h.comment].filter(Boolean).join(" ");
                        return (
                          <TimelineItem key={idx}>
                            <TimelineOppositeContent sx={{ flex: 0.32, pr: 1 }}>
                              <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 900 }}>
                                {h.ts}
                              </Typography>
                              <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 900 }}>
                                {h.role}
                              </Typography>
                            </TimelineOppositeContent>
                            <TimelineSeparator>
                              <TimelineDot variant={v.variant} color={v.color} />
                              {idx < selected.statusHistory.length - 1 ? <TimelineConnector /> : null}
                            </TimelineSeparator>
                            <TimelineContent sx={{ pb: 2 }}>
                              <Typography variant="body2" sx={{ fontWeight: 900, lineHeight: 1.2 }}>
                                {h.action}
                              </Typography>
                              <Typography variant="body2" color="text.secondary" sx={{ fontWeight: 800, lineHeight: 1.25 }}>
                                {headline || "-"}
                              </Typography>
                              {sub ? (
                                <Typography variant="body2" sx={{ mt: 0.4, fontWeight: 800, lineHeight: 1.3 }}>
                                  {sub}
                                </Typography>
                              ) : null}
                            </TimelineContent>
                          </TimelineItem>
                        );
                      })}
                    </Timeline>
                  ) : (
                    <Typography variant="body2" color="text.secondary" sx={{ fontWeight: 900 }}>
                      履歴はありません。
                    </Typography>
                  )}
                </Box>
              </Collapse>
            </Card>

            {/* ステータスメンテ（管理用途） */}
            <Card title="ステータスメンテナンス（管理用途）" icon={<EditNote fontSize="small" />} tone="neutral">
              <Stack direction="row" spacing={0.8} alignItems="center" justifyContent="center">
                <Button
                  size="small"
                  variant="outlined"
                  onClick={() => setStatusFoldOpen((v) => !v)}
                  startIcon={statusFoldOpen ? <ExpandLess /> : <ExpandMore />}
                  sx={{ py: 0.4 }}
                >
                  {statusFoldOpen ? "閉じる" : "開く"}
                </Button>
                <Typography variant="body2" color="text.secondary" sx={{ fontWeight: 900 }}>
                  現在: {selected.status}
                </Typography>
              </Stack>

              <Collapse in={statusFoldOpen} timeout="auto" unmountOnExit>
                <Stack spacing={0.8} sx={{ mt: 0.8 }}>
                  <Autocomplete
                    disablePortal
                    size="small"
                    options={STATUS_OPTIONS}
                    value={editStatus}
                    onChange={(_, v) => setEditStatus(v ?? selected.status)}
                    disableClearable
                    renderInput={(p) => <TextField {...p} label="ステータス" size="small" />}
                  />
                  <Button
                    size="small"
                    variant="contained"
                    onClick={() => updateStatus(selected, editStatus, "詳細")}
                    disabled={editStatus === selected.status}
                    sx={{ py: 0.55 }}
                  >
                    変更
                  </Button>
                  <Typography variant="caption" color="text.secondary" sx={{ fontWeight: 900 }}>
                    変更履歴は「履歴」に追加されます。
                  </Typography>
                </Stack>
              </Collapse>
            </Card>
          </Stack>
        ) : null}
      </ModalFrame>

      {/* ===== 全文表示 ===== */}
      <Dialog
        open={textOpen}
        onClose={() => setTextOpen(false)}
        fullWidth
        maxWidth="sm"
        PaperProps={{ sx: { borderRadius: 1 } }}
      >
        <Box sx={{ px: 1.25, py: 0.8, borderBottom: 1, borderColor: "divider" }}>
          <Stack direction="row" spacing={1} alignItems="center">
            <Typography variant="subtitle2" sx={{ fontWeight: 900, flex: 1, minWidth: 0 }}>
              {textTitle}
            </Typography>
            <IconButton size="small" onClick={() => setTextOpen(false)}>
              <Close fontSize="small" />
            </IconButton>
          </Stack>
        </Box>
        <DialogContent sx={{ p: 1.0 }}>
          <Typography variant="body2" sx={{ whiteSpace: "pre-wrap", lineHeight: 1.4, fontWeight: 800 }}>
            {textBody}
          </Typography>
        </DialogContent>
        <DialogActions sx={{ px: 1.0, py: 0.8 }}>
          <Button onClick={() => setTextOpen(false)} variant="outlined" sx={{ minWidth: 96 }}>閉じる</Button>
        </DialogActions>
      </Dialog>

      <Snackbar
        open={snack.open}
        autoHideDuration={2600}
        onClose={() => setSnack((s) => ({ ...s, open: false }))}
        anchorOrigin={{ vertical: "bottom", horizontal: "center" }}
      >
        <Alert onClose={() => setSnack((s) => ({ ...s, open: false }))} severity={snack.severity} variant="filled" sx={{ width: "100%" }}>
          {snack.message}
        </Alert>
      </Snackbar>
    </ThemeProvider>
  );
}

createRoot(document.getElementById("root")).render(
  <React.StrictMode>
    <App />
  </React.StrictMode>
);
      `;

      const { code } = Babel.transform(appCode, { presets: ["react"] });
      new Function(
        "React",
        "createRoot",
        "MaterialUI",
        "MaterialIcons",
        "MaterialLab",
        "DataGrid",
        "useGridApiRef",
        code
      )(React, createRoot, MaterialUI, MaterialIcons, MaterialLab, DataGrid, useGridApiRef);
    </script>
  </body>
</html>
