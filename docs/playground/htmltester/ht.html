<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>HTML Modal Tester v2 - React 19 + MUI 7</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <style>
    html, body, #root {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: Roboto, sans-serif;
      background: #f0f2f5;
    }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module">
    import React from "https://esm.sh/react@19.2.0";
    import { createRoot } from "https://esm.sh/react-dom@19.2.0/client";
    import * as MaterialUI from "https://esm.sh/@mui/material@7.3.5?deps=react@19.2.0,react-dom@19.2.0";

    const appCode = `
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const {
  ThemeProvider, createTheme, CssBaseline, useMediaQuery,
  Box, Button, Dialog, DialogActions, DialogContent,
  DialogContentText, DialogTitle, Divider, IconButton,
  Paper, Stack, TextField, Tooltip, Typography,
  ToggleButton, ToggleButtonGroup, Snackbar, AppBar, Toolbar,
} = MaterialUI;

// ─── ドラッグハンドル ─────────────────────────────────────────────────────────

const HANDLE_SIZE   = 6;   // px
const RATIO_MIN     = 0.15;
const RATIO_MAX     = 0.85;
const RATIO_DEFAULT = 0.5;

/**
 * useSplitPane
 * containerRef: ペイン領域全体の ref
 * isHorizontal: true=左右分割, false=上下分割
 * returns { ratio, handleProps, isDragging }
 */
function useSplitPane(containerRef, isHorizontal, initialRatio) {
  const [ratio, setRatio]       = useState(initialRatio ?? RATIO_DEFAULT);
  const [dragging, setDragging] = useState(false);
  const draggingRef = useRef(false); // 同期的な判定用

  const onPointerDown = useCallback((e) => {
    e.preventDefault();
    draggingRef.current = true;
    setDragging(true);
    e.currentTarget.setPointerCapture(e.pointerId);
  }, []);

  const onPointerMove = useCallback((e) => {
    if (!draggingRef.current || !containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const r = isHorizontal
      ? (e.clientX - rect.left) / rect.width
      : (e.clientY - rect.top)  / rect.height;
    setRatio(Math.min(RATIO_MAX, Math.max(RATIO_MIN, r)));
  }, [containerRef, isHorizontal]);

  const onPointerUp = useCallback(() => {
    draggingRef.current = false;
    setDragging(false);
  }, []);

  const onDoubleClick = useCallback(() => setRatio(RATIO_DEFAULT), []);

  const handleProps = { onPointerDown, onPointerMove, onPointerUp, onDoubleClick };

  return { ratio, setRatio, handleProps, dragging };
}

// ─── ドラッグハンドル UI ──────────────────────────────────────────────────────

function SplitHandle({ isHorizontal, handleProps, dragging }) {
  const [hover, setHover] = useState(false);
  const active = dragging || hover;

  return (
    <Box
      {...handleProps}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      sx={{
        flexShrink: 0,
        position: "relative",
        zIndex: 10,
        width:  isHorizontal ? HANDLE_SIZE : "100%",
        height: isHorizontal ? "100%"      : HANDLE_SIZE,
        cursor: isHorizontal ? "col-resize" : "row-resize",
        background: active ? "#1976d2" : "#d0d4db",
        transition: "background 0.15s",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        userSelect: "none",
        touchAction: "none",
        "&:hover": { background: "#1976d2" },
      }}
    >
      {/* グリップドット */}
      <Box sx={{
        display: "flex",
        flexDirection: isHorizontal ? "column" : "row",
        gap: "3px",
        pointerEvents: "none",
      }}>
        {[0,1,2].map(i => (
          <Box key={i} sx={{
            width: isHorizontal ? 2 : 4,
            height: isHorizontal ? 4 : 2,
            borderRadius: 1,
            background: active ? "#fff" : "#9aa0ab",
            transition: "background 0.15s",
          }} />
        ))}
      </Box>
    </Box>
  );
}

// ─── フローティングウィンドウ ────────────────────────────────────────────────

const WIN_TITLEBAR_H = 36;
const WIN_MIN_W      = 280;
const WIN_MIN_H      = 180;
const WIN_DEFAULT_W  = 640;
const WIN_DEFAULT_H  = 480;

let winIdCounter = 0;

function createWin(overrides = {}) {
  const id  = ++winIdCounter;
  const tab = createTab();
  // 画面サイズに合わせた初期サイズ（余白 40px）
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const initW = Math.min(WIN_DEFAULT_W, vw - 40);
  const initH = Math.min(WIN_DEFAULT_H, vh - 40);
  const offset = ((id - 1) % 5) * 28;
  return {
    id,
    tabs:      [tab],
    activeTab: tab.id,
    x:         Math.min(40 + offset, vw - initW - 8),
    y:         Math.min(40 + offset, vh - initH - 8),
    w:         initW,
    h:         initH,
    minimized: false,
    maximized: false,
    prevRect:  null,
    zIndex:    1000 + id,
    ...overrides,
  };
}

// ドラッグ移動 + リサイズ共通フック
function useWinDrag(onMove) {
  const dragging = useRef(false);
  const origin   = useRef({ px: 0, py: 0, ox: 0, oy: 0 });

  const onPointerDown = useCallback((e) => {
    e.preventDefault();
    e.stopPropagation();
    dragging.current = true;
    origin.current   = { px: e.clientX, py: e.clientY, ox: 0, oy: 0 };
    e.currentTarget.setPointerCapture(e.pointerId);
  }, []);

  const onPointerMove = useCallback((e) => {
    if (!dragging.current) return;
    const dx = e.clientX - origin.current.px;
    const dy = e.clientY - origin.current.py;
    origin.current.px = e.clientX;
    origin.current.py = e.clientY;
    onMove(dx, dy);
  }, [onMove]);

  const onPointerUp = useCallback(() => { dragging.current = false; }, []);

  return { onPointerDown, onPointerMove, onPointerUp };
}

// ── タブ・ウィンドウ状態ファクトリ ──
let tabIdCounter = 0;
function createTab(url) {
  return { id: ++tabIdCounter, url: url || "", inputUrl: url || "", title: url ? url : "新しいタブ", history: url ? [url] : [], histIdx: 0, iframeKey: 0 };
}

function FloatingWindow({ win, onUpdate, onClose, onFocus }) {
  const activeTab = win.tabs.find(t => t.id === win.activeTab) || win.tabs[0];

  // ── タブ操作 ──
  const updateTab = useCallback((tabId, patch) => {
    onUpdate(win.id, w => ({
      tabs: w.tabs.map(t => t.id === tabId
        ? { ...t, ...(typeof patch === "function" ? patch(t) : patch) }
        : t),
    }));
  }, [win.id, onUpdate]);

  const addTab = useCallback((e) => {
    e.stopPropagation();
    const t = createTab();
    onUpdate(win.id, w => ({ tabs: [...w.tabs, t], activeTab: t.id }));
  }, [win.id, onUpdate]);

  const closeTab = useCallback((e, tabId) => {
    e.stopPropagation();
    onUpdate(win.id, w => {
      const next = w.tabs.filter(t => t.id !== tabId);
      if (next.length === 0) { onClose(win.id); return w; }
      const active = w.activeTab === tabId ? next[next.length - 1].id : w.activeTab;
      return { tabs: next, activeTab: active };
    });
  }, [win.id, onUpdate, onClose]);

  // ── ナビゲーション ──
  const navigate = useCallback((raw) => {
    let url = (raw || "").trim();
    if (!url) return;
    if (!new RegExp("^https?://", "i").test(url)) url = "https://" + url;
    updateTab(activeTab.id, t => {
      const hist = [...t.history.slice(0, t.histIdx + 1), url];
      return { url, inputUrl: url, title: url, history: hist, histIdx: hist.length - 1, iframeKey: t.iframeKey + 1 };
    });
  }, [activeTab, updateTab]);

  const goBack = useCallback((e) => {
    e.stopPropagation();
    updateTab(activeTab.id, t => {
      if (t.histIdx <= 0) return t;
      const idx = t.histIdx - 1;
      return { url: t.history[idx], inputUrl: t.history[idx], histIdx: idx, iframeKey: t.iframeKey + 1 };
    });
  }, [activeTab, updateTab]);

  const goForward = useCallback((e) => {
    e.stopPropagation();
    updateTab(activeTab.id, t => {
      if (t.histIdx >= t.history.length - 1) return t;
      const idx = t.histIdx + 1;
      return { url: t.history[idx], inputUrl: t.history[idx], histIdx: idx, iframeKey: t.iframeKey + 1 };
    });
  }, [activeTab, updateTab]);

  const reload = useCallback((e) => {
    e.stopPropagation();
    updateTab(activeTab.id, t => ({ iframeKey: t.iframeKey + 1 }));
  }, [activeTab, updateTab]);

  // ── ウィンドウ操作 ──
  const minimize = useCallback((e) => {
    e.stopPropagation();
    onUpdate(win.id, { minimized: true });
  }, [win.id, onUpdate]);

  const toggleMaximize = useCallback((e) => {
    e && e.stopPropagation();
    onUpdate(win.id, w => w.maximized
      ? { maximized: false, ...(w.prevRect || {}) }
      : { maximized: true, prevRect: { x: w.x, y: w.y, w: w.w, h: w.h },
          x: 0, y: 0, w: window.innerWidth, h: window.innerHeight });
  }, [win.id, onUpdate]);

  // 画面内に収める（はみ出し補正）
  const fitToScreen = useCallback((e) => {
    e.stopPropagation();
    onUpdate(win.id, w => {
      if (w.maximized) return w;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const newW = Math.min(w.w, vw - 16);
      const newH = Math.min(w.h, vh - 16);
      const newX = Math.max(0, Math.min(w.x, vw - newW - 8));
      const newY = Math.max(0, Math.min(w.y, vh - WIN_TITLEBAR_H - 8));
      return { x: newX, y: newY, w: newW, h: newH };
    });
  }, [win.id, onUpdate]);

  const closeWin = useCallback((e) => {
    e.stopPropagation();
    onClose(win.id);
  }, [win.id, onClose]);

  // ── ドラッグ移動 ──
  const moveDrag = useWinDrag(useCallback((dx, dy) => {
    onUpdate(win.id, w => {
      if (w.maximized) return w;
      return {
        x: Math.max(0, Math.min(window.innerWidth  - w.w, w.x + dx)),
        y: Math.max(0, Math.min(window.innerHeight - WIN_TITLEBAR_H, w.y + dy)),
      };
    });
  }, [win.id, onUpdate]));

  // ── リサイズ（右下） ──
  const resizeDrag = useWinDrag(useCallback((dx, dy) => {
    onUpdate(win.id, w => {
      if (w.maximized) return w;
      return { w: Math.max(WIN_MIN_W, w.w + dx), h: Math.max(WIN_MIN_H, w.h + dy) };
    });
  }, [win.id, onUpdate]));

  // ── アドレスバー入力（ローカル state） ──
  const [addrInput, setAddrInput] = useState(activeTab.inputUrl);
  useEffect(() => { setAddrInput(activeTab.inputUrl); }, [activeTab.id, activeTab.inputUrl]);

  const canBack    = activeTab.histIdx > 0;
  const canForward = activeTab.histIdx < activeTab.history.length - 1;
  const winW = win.maximized ? window.innerWidth  : win.w;
  const winH = win.maximized ? window.innerHeight : win.h;

  return (
    <Box
      onPointerDown={() => onFocus(win.id)}
      sx={{
        position: "fixed",
        left: win.maximized ? 0 : win.x,
        top:  win.maximized ? 0 : win.y,
        width:  winW,
        height: winH,
        zIndex: win.zIndex,
        display: win.minimized ? "none" : "flex",
        flexDirection: "column",
        borderRadius: win.maximized ? 0 : "8px",
        overflow: "hidden",
        boxShadow: win.maximized ? "none" : "0 12px 40px rgba(0,0,0,0.32), 0 2px 8px rgba(0,0,0,0.16)",
        border: win.maximized ? "none" : "1px solid rgba(0,0,0,0.14)",
        background: "#fff",
        userSelect: "none", touchAction: "none",
      }}
    >
      {/* ── タイトルバー ── */}
      <Box
        onPointerDown={(e) => { onFocus(win.id); moveDrag.onPointerDown(e); }}
        onPointerMove={moveDrag.onPointerMove}
        onPointerUp={moveDrag.onPointerUp}
        onDoubleClick={toggleMaximize}
        sx={{
          height: WIN_TITLEBAR_H, flexShrink: 0,
          display: "flex", alignItems: "center", px: 1, gap: 0.5,
          background: "linear-gradient(135deg,#1a237e,#1565c0)",
          cursor: win.maximized ? "default" : "move",
        }}
      >
        {/* macOS 風ボタン — stopPropagation でドラッグ開始を防ぐ */}
        <Box sx={{ display: "flex", gap: "5px", mr: 0.5, flexShrink: 0 }}
          onPointerDown={e => e.stopPropagation()}>
          <Tooltip title="閉じる" arrow>
            <Box onClick={closeWin}
              sx={{ width: 12, height: 12, borderRadius: "50%", background: "#ff5f57", cursor: "pointer",
                display:"flex", alignItems:"center", justifyContent:"center",
                "&:hover": { filter: "brightness(0.8)" } }}>
              <Icon name="close" size={8} style={{ color: "#900", opacity: 0 }}
                className="dot-icon" />
            </Box>
          </Tooltip>
          <Tooltip title="最小化" arrow>
            <Box onClick={minimize}
              sx={{ width: 12, height: 12, borderRadius: "50%", background: "#febc2e", cursor: "pointer",
                display:"flex", alignItems:"center", justifyContent:"center",
                "&:hover": { filter: "brightness(0.8)" } }}>
              <Icon name="remove" size={8} style={{ color: "#7a5000", opacity: 0 }}
                className="dot-icon" />
            </Box>
          </Tooltip>
          <Tooltip title={win.maximized ? "元のサイズに戻す" : "最大化"} arrow>
            <Box onClick={toggleMaximize}
              sx={{ width: 12, height: 12, borderRadius: "50%", background: "#28c840", cursor: "pointer",
                display:"flex", alignItems:"center", justifyContent:"center",
                "&:hover": { filter: "brightness(0.8)" } }}>
              <Icon name={win.maximized ? "fullscreen_exit" : "fullscreen"} size={8}
                style={{ color: "#005a00", opacity: 0 }} className="dot-icon" />
            </Box>
          </Tooltip>
          {/* 白丸: 画面内に収める */}
          <Tooltip title="画面内に収める" arrow>
            <Box onClick={fitToScreen}
              sx={{ width: 12, height: 12, borderRadius: "50%",
                background: "rgba(255,255,255,0.75)",
                border: "1px solid rgba(0,0,0,0.15)",
                cursor: "pointer",
                display:"flex", alignItems:"center", justifyContent:"center",
                "&:hover": { background: "#fff", filter: "brightness(0.92)" } }}>
              <Icon name="fit_screen" size={8} style={{ color: "#444", opacity: 0 }} className="dot-icon" />
            </Box>
          </Tooltip>
        </Box>

        <Typography variant="caption" noWrap
          sx={{ flex: 1, color: "rgba(255,255,255,0.88)", fontSize: 11, fontWeight: 600, textAlign: "center" }}>
          {activeTab.title}
        </Typography>

        {/* minimized 時は FloatingWindow 自体が非表示のためここには何も不要 */}
      </Box>

      {!win.minimized && (<>

        {/* ── タブバー ── */}
        <Box sx={{
          height: 30, flexShrink: 0,
          display: "flex", alignItems: "flex-end",
          background: "#1e3a6e", px: 0.5, gap: "2px",
          overflowX: "auto", overflowY: "hidden",
          "&::-webkit-scrollbar": { height: 3 },
          "&::-webkit-scrollbar-thumb": { background: "rgba(255,255,255,0.3)", borderRadius: 2 },
        }}>
          {win.tabs.map(tab => {
            const isActive = tab.id === win.activeTab;
            return (
              <Box key={tab.id}
                onPointerDown={e => e.stopPropagation()}
                onClick={() => onUpdate(win.id, { activeTab: tab.id })}
                sx={{
                  display: "flex", alignItems: "center", gap: 0.4,
                  px: 1, minWidth: 80, maxWidth: 160, height: 24,
                  borderRadius: "5px 5px 0 0", flexShrink: 0, cursor: "pointer",
                  background: isActive ? "#fff" : "rgba(255,255,255,0.12)",
                  "&:hover": { background: isActive ? "#fff" : "rgba(255,255,255,0.22)" },
                }}>
                <Icon name="language" size={11}
                  style={{ color: isActive ? "#1565c0" : "rgba(255,255,255,0.7)", flexShrink: 0 }} />
                <Typography noWrap variant="caption"
                  sx={{ flex: 1, fontSize: 11, color: isActive ? "#1a1a2e" : "rgba(255,255,255,0.85)", lineHeight: 1 }}>
                  {tab.title.length > 14 ? tab.title.slice(0, 14) + "…" : tab.title}
                </Typography>
                {win.tabs.length > 1 && (
                  <Box onClick={(e) => closeTab(e, tab.id)}
                    sx={{ width: 14, height: 14, borderRadius: "50%", flexShrink: 0,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      "&:hover": { background: "rgba(0,0,0,0.15)" } }}>
                    <Icon name="close" size={10} style={{ color: isActive ? "#555" : "rgba(255,255,255,0.7)" }} />
                  </Box>
                )}
              </Box>
            );
          })}
          <Tooltip title="新しいタブ" arrow>
            <Box onClick={addTab} onPointerDown={e => e.stopPropagation()}
              sx={{ width: 24, height: 24, borderRadius: "5px 5px 0 0", flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
                "&:hover": { background: "rgba(255,255,255,0.2)" } }}>
              <Icon name="add" size={15} style={{ color: "rgba(255,255,255,0.8)" }} />
            </Box>
          </Tooltip>
        </Box>

        {/* ── アドレスバー ── */}
        <Box onPointerDown={e => e.stopPropagation()}
          sx={{
            height: 36, flexShrink: 0,
            display: "flex", alignItems: "center", gap: 0.3,
            px: 0.8, background: "#f5f6f8", borderBottom: "1px solid #e0e0e0",
          }}>
          <Tooltip title="戻る" arrow><span>
            <IconButton size="small" onClick={goBack} disabled={!canBack} sx={{ p: 0.4 }}>
              <Icon name="arrow_back" size={16} style={{ color: canBack ? "#444" : "#ccc" }} />
            </IconButton>
          </span></Tooltip>
          <Tooltip title="進む" arrow><span>
            <IconButton size="small" onClick={goForward} disabled={!canForward} sx={{ p: 0.4 }}>
              <Icon name="arrow_forward" size={16} style={{ color: canForward ? "#444" : "#ccc" }} />
            </IconButton>
          </span></Tooltip>
          <Tooltip title="再読み込み" arrow>
            <IconButton size="small" onClick={reload} sx={{ p: 0.4 }}>
              <Icon name="refresh" size={16} style={{ color: "#444" }} />
            </IconButton>
          </Tooltip>
          <Box component="input"
            value={addrInput}
            onChange={e => setAddrInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") navigate(addrInput); }}
            onFocus={e => e.target.select()}
            placeholder="URL を入力して Enter（例: example.com）"
            sx={{
              flex: 1, border: "1px solid #d0d0d0", borderRadius: "20px",
              px: 1.5, py: 0.35, fontSize: 12, fontFamily: "inherit",
              outline: "none", background: "#fff",
              "&:focus": { borderColor: "#1976d2", boxShadow: "0 0 0 2px rgba(25,118,210,0.15)" },
            }}
          />
          <Tooltip title="移動" arrow>
            <IconButton size="small" onClick={() => navigate(addrInput)} sx={{ p: 0.4 }}>
              <Icon name="send" size={15} style={{ color: "#1976d2" }} />
            </IconButton>
          </Tooltip>
        </Box>

        {/* ── コンテンツ ── */}
        <Box sx={{ flex: 1, overflow: "hidden", position: "relative", background: "#fafafa" }}>
          {activeTab.url ? (
            <iframe key={activeTab.iframeKey} src={activeTab.url} title={activeTab.title}
              style={{ width: "100%", height: "100%", border: "none", display: "block" }} />
          ) : (
            <Box sx={{ width: "100%", height: "100%", display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "center", gap: 2,
              background: "linear-gradient(135deg,#f8f9ff,#fff)" }}>
              <Icon name="language" size={48} style={{ color: "#d0d8f0" }} />
              <Typography variant="body2" color="text.disabled" sx={{ textAlign: "center", px: 3 }}>
                URL を入力して Enter を押してください
              </Typography>
              <Typography variant="caption" color="text.disabled"
                sx={{ textAlign: "center", px: 3, fontSize: 10, lineHeight: 1.8 }}>
                ※ X-Frame-Options が設定されたサイト（Google 等）は<br />
                セキュリティ制限により表示できません
              </Typography>
            </Box>
          )}
        </Box>

      </>)}

      {/* ── リサイズハンドル（右下） ── */}
      {!win.minimized && !win.maximized && (
        <Box
          onPointerDown={resizeDrag.onPointerDown}
          onPointerMove={resizeDrag.onPointerMove}
          onPointerUp={resizeDrag.onPointerUp}
          sx={{ position: "absolute", right: 0, bottom: 0, width: 18, height: 18,
            cursor: "se-resize", zIndex: 20,
            display: "flex", alignItems: "flex-end", justifyContent: "flex-end", p: "3px" }}>
          <svg width="10" height="10" viewBox="0 0 10 10">
            <line x1="2" y1="10" x2="10" y2="2" stroke="#bbb" strokeWidth="1.5" strokeLinecap="round"/>
            <line x1="5" y1="10" x2="10" y2="5" stroke="#bbb" strokeWidth="1.5" strokeLinecap="round"/>
            <line x1="8" y1="10" x2="10" y2="8" stroke="#bbb" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </Box>
      )}
    </Box>
  );
}

const TOOLBAR_H    = 52; // px

// ─── ストレージキー ───────────────────────────────────────────────────────────

const STORAGE_KEY          = "html-tester-code";
const STORAGE_PROFILES_KEY = "html-tester-profiles";
const STORAGE_ACTIVE_KEY   = "html-tester-active-profile";
const MAX_PROFILES         = 20;
const MAX_URL_HISTORY      = 200;

// ─── デフォルト設定 ───────────────────────────────────────────────────────────

const DEFAULT_SETTINGS = {
  fontSize:      13,
  darkMode:      false,
  wordWrap:      false,
  highlightMode: "plain",
  previewScale:  100,
  previewWidth:  "100%",
  splitRatio:    0.5,
};

// ─── プロファイルユーティリティ ───────────────────────────────────────────────

let profileIdCounter = 0;

function newProfileId() {
  return \`profile-\${Date.now()}-\${++profileIdCounter}\`;
}

function createProfile(name, data) {
  return {
    id:        newProfileId(),
    name:      name || "新しいプロファイル",
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    data: {
      code:       data.code       ?? DEFAULT_HTML,
      settings:   { ...DEFAULT_SETTINGS, ...(data.settings || {}) },
      windows:    data.windows    ?? [],
      urlHistory: data.urlHistory ?? [],
    },
  };
}

function loadProfiles() {
  try {
    const raw = localStorage.getItem(STORAGE_PROFILES_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
}

function saveProfiles(profiles) {
  try { localStorage.setItem(STORAGE_PROFILES_KEY, JSON.stringify(profiles)); } catch {}
}

function loadActiveProfileId() {
  try { return localStorage.getItem(STORAGE_ACTIVE_KEY) || null; } catch { return null; }
}

function saveActiveProfileId(id) {
  try { localStorage.setItem(STORAGE_ACTIVE_KEY, id); } catch {}
}

function validateSettings(s) {
  if (!s || typeof s !== "object") return { ...DEFAULT_SETTINGS };
  return {
    fontSize:      (typeof s.fontSize === "number" && s.fontSize >= 10 && s.fontSize <= 24) ? s.fontSize : DEFAULT_SETTINGS.fontSize,
    darkMode:      typeof s.darkMode === "boolean" ? s.darkMode : DEFAULT_SETTINGS.darkMode,
    wordWrap:      typeof s.wordWrap === "boolean" ? s.wordWrap : DEFAULT_SETTINGS.wordWrap,
    highlightMode: ["plain","prism"].includes(s.highlightMode) ? s.highlightMode : DEFAULT_SETTINGS.highlightMode,
    previewScale:  (typeof s.previewScale === "number" && s.previewScale >= 25 && s.previewScale <= 200) ? s.previewScale : DEFAULT_SETTINGS.previewScale,
    previewWidth:  typeof s.previewWidth === "string" ? s.previewWidth : DEFAULT_SETTINGS.previewWidth,
    splitRatio:    (typeof s.splitRatio === "number" && s.splitRatio >= 0.15 && s.splitRatio <= 0.85) ? s.splitRatio : DEFAULT_SETTINGS.splitRatio,
  };
}

function exportAllProfiles(profiles) {
  const blob = new Blob([JSON.stringify({ version: "1.0", exportedAt: new Date().toISOString(), profiles }, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "ht-profiles.json"; a.click();
  URL.revokeObjectURL(url);
}

function exportProfile(profile) {
  const blob = new Blob([JSON.stringify({ version: "1.0", exportedAt: new Date().toISOString(), profiles: [profile] }, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = \`ht-profile-\${profile.name}.json\`; a.click();
  URL.revokeObjectURL(url);
}

// コンソール傍受スクリプト（iframe の srcDoc 先頭に注入）
const CONSOLE_INTERCEPT = \`<script>
(function(){
  var _send = function(level, args) {
    try {
      var msg = Array.from(args).map(function(a){
        try { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a); }
        catch(e) { return String(a); }
      }).join(' ');
      window.parent.postMessage({ type: '__ht_console__', level: level, msg: msg, ts: Date.now() }, '*');
    } catch(e){}
  };
  ['log','warn','error','info','debug'].forEach(function(m){
    var orig = console[m].bind(console);
    console[m] = function(){ orig.apply(console, arguments); _send(m, arguments); };
  });
  window.addEventListener('error', function(e){
    _send('error', [e.message + (e.filename ? ' (' + e.filename + ':' + e.lineno + ')' : '')]);
  });
  window.addEventListener('unhandledrejection', function(e){
    _send('error', ['Unhandled Promise rejection: ' + (e.reason?.message || e.reason)]);
  });
})();
<\/script>\`;

function buildSrcDoc(html) {
  const content = (html || "").trim();
  if (!content) return EMPTY_HTML;
  // <head> があれば直後に注入、なければ先頭に追加
  if (content.includes("<head>")) {
    return content.replace("<head>", "<head>" + CONSOLE_INTERCEPT);
  }
  return CONSOLE_INTERCEPT + content;
}

function useDebounce(value, delay) {
  const [d, setD] = useState(value);
  useEffect(() => {
    const t = setTimeout(() => setD(value), delay);
    return () => clearTimeout(t);
  }, [value, delay]);
  return d;
}

function Icon({ name, size = 20, style }) {
  return <span className="material-icons" style={{ fontSize: size, lineHeight: 1, ...style }}>{name}</span>;
}

// ─── スナップショットパネル ───────────────────────────────────────────────────

const MAX_SNAPSHOTS = 50;

function SnapshotPanel({ open, onClose, snapshots, onRestore, onDelete, onClearAll, darkMode }) {
  const [selected, setSelected] = useState(null);
  const { Dialog, DialogTitle, DialogContent, DialogActions, Button, Chip, List,
          ListItem, ListItemButton, ListItemText, Divider: MuiDivider } = MaterialUI;

  const snap = snapshots.find(s => s.id === selected);

  // パネルを開くたびに最新を選択
  useEffect(() => {
    if (open && snapshots.length > 0) setSelected(snapshots[0].id);
  }, [open]);

  const previewBg  = darkMode ? "#1e1e2e" : "#f8f9fb";
  const previewFg  = darkMode ? "#cdd6f4" : "#1a1a2e";
  const borderC    = darkMode ? "#313244" : "#e0e3e8";

  return (
    <Dialog open={open} onClose={onClose} maxWidth="lg" fullWidth
      PaperProps={{ sx: { borderRadius: 3, height: "80vh", display: "flex", flexDirection: "column" } }}>
      <DialogTitle sx={{ py: 1.5, display: "flex", alignItems: "center", gap: 1, borderBottom: \`1px solid \${borderC}\` }}>
        <Icon name="photo_camera" size={18} style={{ color: "#555" }} />
        <Typography variant="subtitle1" fontWeight={700} sx={{ flex: 1 }}>スナップショット</Typography>
        <Chip label={\`\${snapshots.length} / \${MAX_SNAPSHOTS}\`} size="small" sx={{ fontSize: 11 }} />
      </DialogTitle>

      <Box sx={{ display: "flex", flex: 1, overflow: "hidden" }}>

        {/* 左: スナップショット一覧 */}
        <Box sx={{ width: 220, flexShrink: 0, borderRight: \`1px solid \${borderC}\`,
          overflowY: "auto", background: darkMode ? "#181825" : "#f5f6f8" }}>
          {snapshots.length === 0 ? (
            <Box sx={{ p: 2, color: "#aaa", fontSize: 12, textAlign: "center" }}>
              スナップショットなし
            </Box>
          ) : (
            <List dense disablePadding>
              {snapshots.map((s, i) => (
                <ListItem key={s.id} disablePadding
                  secondaryAction={
                    <Tooltip title="削除" arrow>
                      <IconButton size="small" edge="end" sx={{ p: 0.3 }}
                        onClick={e => { e.stopPropagation(); onDelete(s.id); if (selected === s.id) setSelected(snapshots[i + 1]?.id ?? snapshots[i - 1]?.id ?? null); }}>
                        <Icon name="close" size={12} style={{ color: "#bbb" }} />
                      </IconButton>
                    </Tooltip>
                  }>
                  <ListItemButton selected={selected === s.id} onClick={() => setSelected(s.id)}
                    sx={{ py: 0.8, pr: 4 }}>
                    <ListItemText
                      primary={
                        <Box sx={{ display: "flex", alignItems: "center", gap: 0.5 }}>
                          {s.isLastGood && <Icon name="check_circle" size={12} style={{ color: "#43a047" }} />}
                          {s.isAuto && !s.isLastGood && <Icon name="schedule" size={12} style={{ color: "#888" }} />}
                          <Typography noWrap variant="caption" sx={{ fontSize: 11, fontWeight: 600 }}>
                            {s.label}
                          </Typography>
                        </Box>
                      }
                      secondary={
                        <Typography variant="caption" sx={{ fontSize: 10, color: "#aaa" }}>
                          {new Date(s.ts).toLocaleString("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" })}
                          {" · "}{s.code.length.toLocaleString()} 文字
                        </Typography>
                      }
                    />
                  </ListItemButton>
                </ListItem>
              ))}
            </List>
          )}
        </Box>

        {/* 右: プレビュー */}
        <Box sx={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {snap ? (
            <>
              <Box sx={{ px: 2, py: 1, borderBottom: \`1px solid \${borderC}\`, display: "flex", alignItems: "center", gap: 1 }}>
                <Typography variant="caption" sx={{ fontSize: 11, color: "#888", flex: 1 }}>
                  {snap.label} — {new Date(snap.ts).toLocaleString("ja-JP")}
                </Typography>
                {snap.isLastGood && <Chip label="最後の正常表示" size="small" color="success" sx={{ fontSize: 10, height: 18 }} />}
                <Tooltip title="コードをコピー" arrow>
                  <IconButton size="small" sx={{ p: 0.4 }}
                    onClick={() => navigator.clipboard.writeText(snap.code).catch(() => {})}>
                    <Icon name="content_copy" size={14} />
                  </IconButton>
                </Tooltip>
              </Box>
              <Box sx={{ flex: 1, overflow: "auto", background: previewBg, p: 0 }}>
                <Box component="pre" sx={{
                  m: 0, p: "12px 14px",
                  fontFamily: "ui-monospace,SFMono-Regular,Menlo,Consolas,monospace",
                  fontSize: 12, lineHeight: 1.65,
                  color: previewFg, whiteSpace: "pre-wrap", wordBreak: "break-all",
                }}>
                  {snap.code}
                </Box>
              </Box>
            </>
          ) : (
            <Box sx={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#bbb" }}>
              <Typography variant="body2" color="text.disabled">スナップショットを選択してください</Typography>
            </Box>
          )}
        </Box>
      </Box>

      <DialogActions sx={{ px: 2, py: 1, borderTop: \`1px solid \${borderC}\`, gap: 1 }}>
        <Button size="small" color="error" variant="outlined"
          onClick={onClearAll} disabled={snapshots.length === 0}
          startIcon={<Icon name="delete_sweep" size={14} />}>
          全削除
        </Button>
        <Box sx={{ flex: 1 }} />
        <Button size="small" onClick={onClose} variant="outlined">閉じる</Button>
        <Button size="small" variant="contained" disabled={!snap}
          startIcon={<Icon name="restore" size={14} />}
          onClick={() => { if (snap) { onRestore(snap.code); onClose(); } }}>
          このコードに復元
        </Button>
      </DialogActions>
    </Dialog>
  );
}

function ConsolePanel({ open, onClose, logs, onClear }) {
  const { Dialog, DialogTitle, DialogContent, DialogActions, Button,

  const copyAll = useCallback(async () => {
    const text = logs.map(l => \`[\${l.level.toUpperCase()}] \${new Date(l.ts).toLocaleTimeString()} \${l.msg}\`).join("\\n");
    try { await navigator.clipboard.writeText(text); } catch {}
  }, [logs]);

  return (
    <Dialog open={open} onClose={onClose} maxWidth="md" fullWidth
      PaperProps={{ sx: { borderRadius: 3, height: "70vh", display: "flex", flexDirection: "column" } }}>
      <DialogTitle sx={{ py: 1.5, display: "flex", alignItems: "center", gap: 1, borderBottom: "1px solid #e0e0e0" }}>
