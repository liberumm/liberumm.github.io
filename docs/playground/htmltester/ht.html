<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>HTML Modal Tester Full Stable v1.5 - UI Base + Storage Cache Plus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <style>
    html, body, #root {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: Roboto, sans-serif;
      background: #f0f2f5;
    }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>
  <link rel="icon" href="data:,">

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script id="app-code" type="text/plain">


const { useState, useEffect, useCallback, useMemo, useRef, useReducer } = React;

const {
  ThemeProvider, createTheme, CssBaseline, useMediaQuery,
  Box, Button, Dialog, DialogActions, DialogContent,
  DialogContentText, DialogTitle, Divider, IconButton,
  Stack, Tooltip, Typography,
  ToggleButton, ToggleButtonGroup, Snackbar, AppBar, Toolbar,
} = MaterialUI;

const HANDLE_SIZE   = 6;
const RATIO_MIN     = 0.15;
const RATIO_MAX     = 0.85;
const RATIO_DEFAULT = 0.5;

function useSplitPane(containerRef, isHorizontal, initialRatio) {
  const [ratio, setRatio]       = useState(initialRatio ?? RATIO_DEFAULT);
  const [dragging, setDragging] = useState(false);
  const draggingRef = useRef(false);

  const onPointerDown = useCallback((e) => {
    e.preventDefault();
    draggingRef.current = true;
    setDragging(true);
    e.currentTarget.setPointerCapture?.(e.pointerId);
  }, []);

  const onPointerMove = useCallback((e) => {
    if (!draggingRef.current || !containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const r = isHorizontal
      ? (e.clientX - rect.left) / rect.width
      : (e.clientY - rect.top)  / rect.height;
    setRatio(Math.min(RATIO_MAX, Math.max(RATIO_MIN, r)));
  }, [containerRef, isHorizontal]);

  const onPointerUp = useCallback(() => {
    draggingRef.current = false;
    setDragging(false);
  }, []);

  const onDoubleClick = useCallback(() => setRatio(RATIO_DEFAULT), []);

  return {
    ratio,
    setRatio,
    handleProps: { onPointerDown, onPointerMove, onPointerUp, onDoubleClick },
    dragging,
  };
}

function SplitHandle({ isHorizontal, handleProps, dragging }) {
  const [hover, setHover] = useState(false);
  const active = dragging || hover;

  return (
    <Box
      {...handleProps}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      sx={{
        flexShrink: 0,
        position: "relative",
        zIndex: 10,
        width:  isHorizontal ? HANDLE_SIZE : "100%",
        height: isHorizontal ? "100%"      : HANDLE_SIZE,
        cursor: isHorizontal ? "col-resize" : "row-resize",
        background: active ? "#1976d2" : "#d0d4db",
        transition: "background 0.15s",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        userSelect: "none",
        touchAction: "none",
      }}
    >
      <Box sx={{
        display: "flex",
        flexDirection: isHorizontal ? "column" : "row",
        gap: "3px",
        pointerEvents: "none",
      }}>
        {[0,1,2].map(i => (
          <Box key={i} sx={{
            width: isHorizontal ? 2 : 4,
            height: isHorizontal ? 4 : 2,
            borderRadius: 1,
            background: active ? "#fff" : "#9aa0ab",
          }} />
        ))}
      </Box>
    </Box>
  );
}

const WIN_TITLEBAR_H = 36;
const WIN_MIN_W      = 280;
const WIN_MIN_H      = 180;
const WIN_DEFAULT_W  = 640;
const WIN_DEFAULT_H  = 480;

let winIdCounter = 0;
let tabIdCounter = 0;

function createTab(url) {
  return {
    id: ++tabIdCounter,
    url: url || "",
    inputUrl: url || "",
    title: url ? url : "新しいタブ",
    history: url ? [url] : [],
    histIdx: 0,
    iframeKey: 0,
  };
}

function createWin(overrides = {}) {
  const id  = ++winIdCounter;
  const tab = createTab();
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const initW = Math.min(WIN_DEFAULT_W, vw - 40);
  const initH = Math.min(WIN_DEFAULT_H, vh - 40);
  const offset = ((id - 1) % 5) * 28;
  return {
    id,
    tabs: [tab],
    activeTab: tab.id,
    x: Math.max(0, Math.min(40 + offset, vw - initW - 8)),
    y: Math.max(0, Math.min(40 + offset, vh - initH - 8)),
    w: initW,
    h: initH,
    minimized: false,
    maximized: false,
    prevRect: null,
    zIndex: 1000 + id,
    ...overrides,
  };
}

function useWinDrag(onMove) {
  const dragging = useRef(false);
  const origin = useRef({ px: 0, py: 0 });

  const onPointerDown = useCallback((e) => {
    e.preventDefault();
    e.stopPropagation();
    dragging.current = true;
    origin.current = { px: e.clientX, py: e.clientY };
    e.currentTarget.setPointerCapture?.(e.pointerId);
  }, []);

  const onPointerMove = useCallback((e) => {
    if (!dragging.current) return;
    const dx = e.clientX - origin.current.px;
    const dy = e.clientY - origin.current.py;
    origin.current = { px: e.clientX, py: e.clientY };
    onMove(dx, dy);
  }, [onMove]);

  const onPointerUp = useCallback(() => { dragging.current = false; }, []);

  return { onPointerDown, onPointerMove, onPointerUp };
}

function Icon({ name, size = 20, style, className }) {
  return <span className={`material-icons ${className || ""}`} style={{ fontSize: size, lineHeight: 1, ...style }}>{name}</span>;
}

function FloatingWindow({ win, onUpdate, onClose, onFocus }) {
  const activeTab = win.tabs.find(t => t.id === win.activeTab) || win.tabs[0];
  const [addrInput, setAddrInput] = useState(activeTab.inputUrl);

  useEffect(() => { setAddrInput(activeTab.inputUrl); }, [activeTab.id, activeTab.inputUrl]);

  const updateTab = useCallback((tabId, patch) => {
    onUpdate(win.id, w => ({
      tabs: w.tabs.map(t => t.id === tabId
        ? { ...t, ...(typeof patch === "function" ? patch(t) : patch) }
        : t),
    }));
  }, [win.id, onUpdate]);

  const addTab = useCallback((e) => {
    e.stopPropagation();
    const t = createTab();
    onUpdate(win.id, w => ({ tabs: [...w.tabs, t], activeTab: t.id }));
  }, [win.id, onUpdate]);

  const closeTab = useCallback((e, tabId) => {
    e.stopPropagation();
    onUpdate(win.id, w => {
      const next = w.tabs.filter(t => t.id !== tabId);
      if (next.length === 0) { onClose(win.id); return w; }
      return { tabs: next, activeTab: w.activeTab === tabId ? next[next.length - 1].id : w.activeTab };
    });
  }, [win.id, onUpdate, onClose]);

  const navigate = useCallback((raw) => {
    let url = (raw || "").trim();
    if (!url) return;
    if (!new RegExp("^https?://", "i").test(url)) url = "https://" + url;
    updateTab(activeTab.id, t => {
      const hist = [...t.history.slice(0, t.histIdx + 1), url];
      return { url, inputUrl: url, title: url, history: hist, histIdx: hist.length - 1, iframeKey: t.iframeKey + 1 };
    });
  }, [activeTab, updateTab]);

  const goBack = useCallback((e) => {
    e.stopPropagation();
    updateTab(activeTab.id, t => {
      if (t.histIdx <= 0) return t;
      const idx = t.histIdx - 1;
      return { url: t.history[idx], inputUrl: t.history[idx], histIdx: idx, iframeKey: t.iframeKey + 1 };
    });
  }, [activeTab, updateTab]);

  const goForward = useCallback((e) => {
    e.stopPropagation();
    updateTab(activeTab.id, t => {
      if (t.histIdx >= t.history.length - 1) return t;
      const idx = t.histIdx + 1;
      return { url: t.history[idx], inputUrl: t.history[idx], histIdx: idx, iframeKey: t.iframeKey + 1 };
    });
  }, [activeTab, updateTab]);

  const reload = useCallback((e) => {
    e.stopPropagation();
    updateTab(activeTab.id, t => ({ iframeKey: t.iframeKey + 1 }));
  }, [activeTab, updateTab]);

  const minimize = useCallback((e) => {
    e.stopPropagation();
    onUpdate(win.id, { minimized: true });
  }, [win.id, onUpdate]);

  const toggleMaximize = useCallback((e) => {
    e && e.stopPropagation();
    onUpdate(win.id, w => w.maximized
      ? { maximized: false, ...(w.prevRect || {}) }
      : {
          maximized: true,
          prevRect: { x: w.x, y: w.y, w: w.w, h: w.h },
          x: 0, y: 0, w: window.innerWidth, h: window.innerHeight,
        });
  }, [win.id, onUpdate]);

  const fitToScreen = useCallback((e) => {
    e.stopPropagation();
    onUpdate(win.id, w => {
      if (w.maximized) return w;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const newW = Math.min(w.w, vw - 16);
      const newH = Math.min(w.h, vh - 16);
      return {
        x: Math.max(0, Math.min(w.x, vw - newW - 8)),
        y: Math.max(0, Math.min(w.y, vh - WIN_TITLEBAR_H - 8)),
        w: newW,
        h: newH,
      };
    });
  }, [win.id, onUpdate]);

  const closeWin = useCallback((e) => {
    e.stopPropagation();
    onClose(win.id);
  }, [win.id, onClose]);

  const moveDrag = useWinDrag(useCallback((dx, dy) => {
    onUpdate(win.id, w => {
      if (w.maximized) return w;
      return {
        x: Math.max(0, Math.min(window.innerWidth  - w.w, w.x + dx)),
        y: Math.max(0, Math.min(window.innerHeight - WIN_TITLEBAR_H, w.y + dy)),
      };
    });
  }, [win.id, onUpdate]));

  const resizeDrag = useWinDrag(useCallback((dx, dy) => {
    onUpdate(win.id, w => {
      if (w.maximized) return w;
      return { w: Math.max(WIN_MIN_W, w.w + dx), h: Math.max(WIN_MIN_H, w.h + dy) };
    });
  }, [win.id, onUpdate]));

  const canBack = activeTab.histIdx > 0;
  const canForward = activeTab.histIdx < activeTab.history.length - 1;
  const winW = win.maximized ? window.innerWidth : win.w;
  const winH = win.maximized ? window.innerHeight : win.h;

  return (
    <Box
      onPointerDown={() => onFocus(win.id)}
      sx={{
        position: "fixed",
        left: win.maximized ? 0 : win.x,
        top: win.maximized ? 0 : win.y,
        width: winW,
        height: winH,
        zIndex: win.zIndex,
        display: win.minimized ? "none" : "flex",
        flexDirection: "column",
        borderRadius: win.maximized ? 0 : "8px",
        overflow: "hidden",
        boxShadow: win.maximized ? "none" : "0 12px 40px rgba(0,0,0,0.32), 0 2px 8px rgba(0,0,0,0.16)",
        border: win.maximized ? "none" : "1px solid rgba(0,0,0,0.14)",
        background: "#fff",
        userSelect: "none",
        touchAction: "none",
      }}
    >
      <Box
        onPointerDown={(e) => { onFocus(win.id); moveDrag.onPointerDown(e); }}
        onPointerMove={moveDrag.onPointerMove}
        onPointerUp={moveDrag.onPointerUp}
        onDoubleClick={toggleMaximize}
        sx={{
          height: WIN_TITLEBAR_H,
          flexShrink: 0,
          display: "flex",
          alignItems: "center",
          px: 1,
          gap: 0.5,
          background: "linear-gradient(135deg,#1a237e,#1565c0)",
          cursor: win.maximized ? "default" : "move",
        }}
      >
        <Box sx={{ display: "flex", gap: "5px", mr: 0.5, flexShrink: 0 }} onPointerDown={e => e.stopPropagation()}>
          <Tooltip title="閉じる" arrow><Box onClick={closeWin} sx={dotSx("#ff5f57")} /></Tooltip>
          <Tooltip title="最小化" arrow><Box onClick={minimize} sx={dotSx("#febc2e")} /></Tooltip>
          <Tooltip title={win.maximized ? "元のサイズに戻す" : "最大化"} arrow><Box onClick={toggleMaximize} sx={dotSx("#28c840")} /></Tooltip>
          <Tooltip title="画面内に収める" arrow>
            <Box onClick={fitToScreen} sx={{ ...dotSx("rgba(255,255,255,0.75)"), border: "1px solid rgba(0,0,0,0.15)" }} />
          </Tooltip>
        </Box>
        <Typography variant="caption" noWrap sx={{ flex: 1, color: "rgba(255,255,255,0.88)", fontSize: 11, fontWeight: 600, textAlign: "center" }}>
          {activeTab.title}
        </Typography>
      </Box>

      <Box sx={{ height: 30, flexShrink: 0, display: "flex", alignItems: "flex-end", background: "#1e3a6e", px: 0.5, gap: "2px", overflowX: "auto" }}>
        {win.tabs.map(tab => {
          const isActive = tab.id === win.activeTab;
          return (
            <Box key={tab.id} onPointerDown={e => e.stopPropagation()} onClick={() => onUpdate(win.id, { activeTab: tab.id })}
              sx={{
                display: "flex", alignItems: "center", gap: 0.4, px: 1, minWidth: 80, maxWidth: 160, height: 24,
                borderRadius: "5px 5px 0 0", flexShrink: 0, cursor: "pointer",
                background: isActive ? "#fff" : "rgba(255,255,255,0.12)",
              }}>
              <Icon name="language" size={11} style={{ color: isActive ? "#1565c0" : "rgba(255,255,255,0.7)", flexShrink: 0 }} />
              <Typography noWrap variant="caption" sx={{ flex: 1, fontSize: 11, color: isActive ? "#1a1a2e" : "rgba(255,255,255,0.85)", lineHeight: 1 }}>
                {tab.title.length > 14 ? tab.title.slice(0, 14) + "…" : tab.title}
              </Typography>
              {win.tabs.length > 1 && (
                <Box onClick={(e) => closeTab(e, tab.id)} sx={{ width: 14, height: 14, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", "&:hover": { background: "rgba(0,0,0,0.15)" } }}>
                  <Icon name="close" size={10} style={{ color: isActive ? "#555" : "rgba(255,255,255,0.7)" }} />
                </Box>
              )}
            </Box>
          );
        })}
        <Tooltip title="新しいタブ" arrow>
          <Box onClick={addTab} onPointerDown={e => e.stopPropagation()} sx={{ width: 24, height: 24, borderRadius: "5px 5px 0 0", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
            <Icon name="add" size={15} style={{ color: "rgba(255,255,255,0.8)" }} />
          </Box>
        </Tooltip>
      </Box>

      <Box onPointerDown={e => e.stopPropagation()} sx={{ height: 36, flexShrink: 0, display: "flex", alignItems: "center", gap: 0.3, px: 0.8, background: "#f5f6f8", borderBottom: "1px solid #e0e0e0" }}>
        <Tooltip title="戻る" arrow><span><IconButton size="small" onClick={goBack} disabled={!canBack} sx={{ p: 0.4 }}><Icon name="arrow_back" size={16} style={{ color: canBack ? "#444" : "#ccc" }} /></IconButton></span></Tooltip>
        <Tooltip title="進む" arrow><span><IconButton size="small" onClick={goForward} disabled={!canForward} sx={{ p: 0.4 }}><Icon name="arrow_forward" size={16} style={{ color: canForward ? "#444" : "#ccc" }} /></IconButton></span></Tooltip>
        <Tooltip title="再読み込み" arrow><IconButton size="small" onClick={reload} sx={{ p: 0.4 }}><Icon name="refresh" size={16} style={{ color: "#444" }} /></IconButton></Tooltip>
        <Box component="input"
          value={addrInput}
          onChange={e => setAddrInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") navigate(addrInput); }}
          onFocus={e => e.target.select()}
          placeholder="URL を入力して Enter"
          sx={{
            flex: 1, border: "1px solid #d0d0d0", borderRadius: "20px",
            px: 1.5, py: 0.35, fontSize: 16, fontFamily: "inherit",
            outline: "none", background: "#fff",
          }}
        />
        <Tooltip title="移動" arrow><IconButton size="small" onClick={() => navigate(addrInput)} sx={{ p: 0.4 }}><Icon name="send" size={15} style={{ color: "#1976d2" }} /></IconButton></Tooltip>
      </Box>

      <Box sx={{ flex: 1, overflow: "hidden", position: "relative", background: "#fafafa" }}>
        {activeTab.url ? (
          <iframe key={activeTab.iframeKey} src={activeTab.url} title={activeTab.title} style={{ width: "100%", height: "100%", border: "none", display: "block" }} />
        ) : (
          <Box sx={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2, background: "linear-gradient(135deg,#f8f9ff,#fff)" }}>
            <Icon name="language" size={48} style={{ color: "#d0d8f0" }} />
            <Typography variant="body2" color="text.disabled" sx={{ textAlign: "center", px: 3 }}>URL を入力して Enter を押してください</Typography>
            <Typography variant="caption" color="text.disabled" sx={{ textAlign: "center", px: 3, fontSize: 10, lineHeight: 1.8 }}>
              ※ X-Frame-Options が設定されたサイトは<br />セキュリティ制限により表示できません
            </Typography>
          </Box>
        )}
      </Box>

      {!win.maximized && (
        <Box onPointerDown={resizeDrag.onPointerDown} onPointerMove={resizeDrag.onPointerMove} onPointerUp={resizeDrag.onPointerUp}
          sx={{ position: "absolute", right: 0, bottom: 0, width: 18, height: 18, cursor: "se-resize", zIndex: 20, display: "flex", alignItems: "flex-end", justifyContent: "flex-end", p: "3px" }}>
          <svg width="10" height="10" viewBox="0 0 10 10">
            <line x1="2" y1="10" x2="10" y2="2" stroke="#bbb" strokeWidth="1.5" strokeLinecap="round"/>
            <line x1="5" y1="10" x2="10" y2="5" stroke="#bbb" strokeWidth="1.5" strokeLinecap="round"/>
            <line x1="8" y1="10" x2="10" y2="8" stroke="#bbb" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </Box>
      )}
    </Box>
  );
}

function dotSx(background) {
  return {
    width: 12,
    height: 12,
    borderRadius: "50%",
    background,
    cursor: "pointer",
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
    "&:hover": { filter: "brightness(0.8)" },
  };
}

const TOOLBAR_H    = 52;
const STORAGE_KEY          = "html-tester-code";
const STORAGE_PROFILES_KEY = "html-tester-profiles";
const STORAGE_ACTIVE_KEY   = "html-tester-active-profile";
const STORAGE_SCHEMA_VERSION = 2;
const MAX_PROFILES         = 20;
const MAX_SNAPSHOTS        = 50;
const MAX_CODE_HISTORY      = 80;
const APP_BUILD_LABEL       = "Full Stable v1.7 Drawer Navigation";

const DEFAULT_SETTINGS = {
  fontSize: 13,
  darkMode: false,
  wordWrap: false,
  highlightMode: "plain",
  previewScale: 100,
  previewWidth: "100%",
  splitRatio: 0.5,
};

let profileIdCounter = 0;

function newProfileId() {
  return `profile-${Date.now()}-${++profileIdCounter}`;
}

function createProfile(name, data) {
  return {
    id: newProfileId(),
    name: name || "新しいプロファイル",
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    data: {
      code: data.code ?? DEFAULT_HTML,
      editorTabs: data.editorTabs ?? null,
      activeEditorTabId: data.activeEditorTabId ?? null,
      settings: { ...DEFAULT_SETTINGS, ...(data.settings || {}) },
      windows: data.windows ?? [],
      urlHistory: data.urlHistory ?? [],
    },
  };
}

function normalizeProfileRecord(profile) {
  if (!profile || typeof profile !== "object") return null;
  const data = profile.data && typeof profile.data === "object" ? profile.data : {};
  const normalized = createProfile(profile.name || "復元プロファイル", {
    code: typeof data.code === "string" ? data.code : DEFAULT_HTML,
    editorTabs: Array.isArray(data.editorTabs) ? data.editorTabs : null,
    activeEditorTabId: typeof data.activeEditorTabId === "string" ? data.activeEditorTabId : null,
    settings: validateSettings(data.settings),
    windows: Array.isArray(data.windows) ? data.windows : [],
    urlHistory: Array.isArray(data.urlHistory) ? data.urlHistory : [],
  });
  return {
    ...normalized,
    id: typeof profile.id === "string" && profile.id ? profile.id : normalized.id,
    name: typeof profile.name === "string" && profile.name.trim() ? profile.name.trim() : normalized.name,
    createdAt: profile.createdAt || normalized.createdAt,
    updatedAt: profile.updatedAt || normalized.updatedAt,
  };
}

function migrateProfilePayload(parsed) {
  if (Array.isArray(parsed)) return parsed.map(normalizeProfileRecord).filter(Boolean);
  if (parsed && typeof parsed === "object" && Array.isArray(parsed.profiles)) {
    return parsed.profiles.map(normalizeProfileRecord).filter(Boolean);
  }
  return [];
}

function loadProfiles() {
  try {
    const raw = localStorage.getItem(STORAGE_PROFILES_KEY);
    if (!raw) return [];
    return migrateProfilePayload(JSON.parse(raw));
  } catch { return []; }
}

function saveProfiles(profiles) {
  try {
    localStorage.setItem(STORAGE_PROFILES_KEY, JSON.stringify({
      version: STORAGE_SCHEMA_VERSION,
      updatedAt: new Date().toISOString(),
      profiles: Array.isArray(profiles) ? profiles : [],
    }));
  } catch {}
}

function loadActiveProfileId() {
  try { return localStorage.getItem(STORAGE_ACTIVE_KEY) || null; } catch { return null; }
}

function saveActiveProfileId(id) {
  try { localStorage.setItem(STORAGE_ACTIVE_KEY, id); } catch {}
}

function validateSettings(s) {
  if (!s || typeof s !== "object") return { ...DEFAULT_SETTINGS };
  return {
    fontSize: (typeof s.fontSize === "number" && s.fontSize >= 10 && s.fontSize <= 24) ? s.fontSize : DEFAULT_SETTINGS.fontSize,
    darkMode: typeof s.darkMode === "boolean" ? s.darkMode : DEFAULT_SETTINGS.darkMode,
    wordWrap: typeof s.wordWrap === "boolean" ? s.wordWrap : DEFAULT_SETTINGS.wordWrap,
    highlightMode: ["plain","prism"].includes(s.highlightMode) ? s.highlightMode : DEFAULT_SETTINGS.highlightMode,
    previewScale: (typeof s.previewScale === "number" && s.previewScale >= 25 && s.previewScale <= 200) ? s.previewScale : DEFAULT_SETTINGS.previewScale,
    previewWidth: typeof s.previewWidth === "string" ? s.previewWidth : DEFAULT_SETTINGS.previewWidth,
    splitRatio: (typeof s.splitRatio === "number" && s.splitRatio >= 0.15 && s.splitRatio <= 0.85) ? s.splitRatio : DEFAULT_SETTINGS.splitRatio,
  };
}

function exportAllProfiles(profiles) {
  const blob = new Blob([JSON.stringify({ version: "1.0", exportedAt: new Date().toISOString(), profiles }, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "ht-profiles.json"; a.click();
  URL.revokeObjectURL(url);
}

function exportProfile(profile) {
  const blob = new Blob([JSON.stringify({ version: "1.0", exportedAt: new Date().toISOString(), profiles: [profile] }, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = `ht-profile-${profile.name}.json`; a.click();
  URL.revokeObjectURL(url);
}

const MAX_EDITOR_TABS = 30;
const EDITOR_MODES = { HTML: "html", MARKDOWN: "markdown" };
let editorTabIdCounter = 0;

function normalizeEditorMode(mode) {
  return mode === EDITOR_MODES.MARKDOWN ? EDITOR_MODES.MARKDOWN : EDITOR_MODES.HTML;
}

function inferEditorMode(name, code, explicitMode) {
  const n = String(name || "").toLowerCase();
  const raw = String(code || "");
  const c = raw.trimStart();
  const lower = c.toLowerCase();

  if (/\.(html?|xhtml)$/i.test(n)) return EDITOR_MODES.HTML;
  if (/\.(md|markdown|mmd)$/i.test(n)) return EDITOR_MODES.MARKDOWN;

  if (
    lower.startsWith("<!doctype html") ||
    lower.startsWith("<html") ||
    lower.startsWith("<head") ||
    lower.startsWith("<body") ||
    lower.startsWith("<script") ||
    lower.startsWith("<style") ||
    /^<(div|section|main|article|header|footer|nav|p|h[1-6]|span|button|input|form|canvas|svg|table|ul|ol|li)\b/i.test(c)
  ) {
    return EDITOR_MODES.HTML;
  }

  if (/^#\s+/.test(c) || /```mermaid/i.test(c) || /^[-*+]\s+/m.test(c) || /^>\s+/m.test(c)) {
    return EDITOR_MODES.MARKDOWN;
  }

  return explicitMode ? normalizeEditorMode(explicitMode) : EDITOR_MODES.MARKDOWN;
}

function extensionForMode(mode) {
  return normalizeEditorMode(mode) === EDITOR_MODES.MARKDOWN ? ".md" : ".html";
}

function renameForMode(name, mode) {
  const ext = extensionForMode(mode);
  const cleaned = String(name || (mode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html")).trim();
  if (/\.(html?|md|markdown|mmd)$/i.test(cleaned)) return cleaned.replace(/\.(html?|md|markdown|mmd)$/i, ext);
  return cleaned + ext;
}


function newEditorTabId() {
  return `editor-tab-${Date.now()}-${++editorTabIdCounter}`;
}

function createEditorTab(name, code, mode) {
  const now = new Date().toISOString();
  const resolvedMode = normalizeEditorMode(mode || inferEditorMode(name, code));
  return {
    id: newEditorTabId(),
    name: name || (resolvedMode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html"),
    code: typeof code === "string" ? code : (resolvedMode === EDITOR_MODES.MARKDOWN ? DEFAULT_MARKDOWN : DEFAULT_HTML),
    mode: resolvedMode,
    createdAt: now,
    updatedAt: now,
  };
}

function normalizeEditorTabs(data) {
  const now = new Date().toISOString();
  const rawTabs = Array.isArray(data?.editorTabs) && data.editorTabs.length > 0
    ? data.editorTabs
    : [{ id: null, name: "index.html", code: data?.code ?? DEFAULT_HTML }];

  return rawTabs.slice(0, MAX_EDITOR_TABS).map((tab, index) => ({
    id: typeof tab.id === "string" && tab.id ? tab.id : newEditorTabId(),
    name: typeof tab.name === "string" && tab.name.trim() ? tab.name.trim() : (index === 0 ? "index.html" : `tab-${index + 1}.html`),
    code: typeof tab.code === "string" ? tab.code : DEFAULT_HTML,
    mode: normalizeEditorMode(tab.mode || inferEditorMode(tab.name, tab.code)),
    createdAt: tab.createdAt || now,
    updatedAt: tab.updatedAt || tab.createdAt || now,
  }));
}

function getInitialEditorTabId(data, tabs) {
  if (data?.activeEditorTabId && tabs.some(t => t.id === data.activeEditorTabId)) return data.activeEditorTabId;
  return tabs[0]?.id || null;
}

function getUniqueTabName(tabs, baseName = "untitled.html") {
  const names = new Set(tabs.map(t => t.name));
  if (!names.has(baseName)) return baseName;

  const dot = baseName.lastIndexOf(".");
  const stem = dot > 0 ? baseName.slice(0, dot) : baseName;
  const ext  = dot > 0 ? baseName.slice(dot) : "";

  for (let i = 2; i < 1000; i++) {
    const candidate = `${stem}-${i}${ext}`;
    if (!names.has(candidate)) return candidate;
  }

  return `${stem}-${Date.now()}${ext}`;
}

function safeDownloadFileName(name) {
  const cleaned = String(name || "output.html").replace(/[\\/:*?"<>|]+/g, "_").trim();
  return cleaned || "output.html";
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function createMarkdownRenderer() {
  const md = window.__HT_MD__?.marked;
  if (!md?.Renderer) return null;
  const renderer = new md.Renderer();

  renderer.code = function(codeOrToken, infostring) {
    const isToken = codeOrToken && typeof codeOrToken === "object";
    const text = isToken ? codeOrToken.text : codeOrToken;
    const lang = String((isToken ? codeOrToken.lang : infostring) || "").trim().split(/\s+/)[0].toLowerCase();

    if (lang === "mermaid") {
      return `<div class="mermaid">${escapeHtml(text)}</div>`;
    }

    const cls = lang ? ` class="language-${escapeHtml(lang)}"` : "";
    return `<pre><code${cls}>${escapeHtml(text)}</code></pre>`;
  };

  return renderer;
}

function buildMarkdownSrcDoc(markdown, options = {}) {
  const content = String(markdown || "").trim();
  const dark = Boolean(options.darkMode);
  const md = window.__HT_MD__?.marked;
  const purifier = window.__HT_MD__?.DOMPurify;

  if (!content) {
    return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />${markdownPreviewStyle(dark)}</head><body><main class="markdown-body empty">Markdown を貼り付けてください</main></body></html>`;
  }

  if (!md?.parse || !purifier?.sanitize) {
    const msg = "Markdownライブラリが未ロードです。CDNまたはネットワークを確認してください。";
    return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />${markdownPreviewStyle(dark)}</head><body>${CONSOLE_INTERCEPT}<main class="markdown-body"><h1>Markdown Preview Error</h1><p>${escapeHtml(msg)}</p></main><script>console.error(${JSON.stringify(msg)});<\/script></body></html>`;
  }

  let rendered = "";
  try {
    rendered = md.parse(content, {
      gfm: true,
      breaks: false,
      mangle: false,
      headerIds: false,
      renderer: createMarkdownRenderer() || undefined,
    });
  } catch (e) {
    rendered = `<h1>Markdown Parse Error</h1><pre>${escapeHtml(e.message || String(e))}</pre>`;
  }

  const safeHtml = purifier.sanitize(rendered, {
    ADD_TAGS: ["details", "summary"],
    ADD_ATTR: ["class", "id", "target", "rel"],
  });

  const mermaidTheme = dark ? "dark" : "default";
  const mermaidUrl = window.__HT_MD__?.mermaidUrl || "https://esm.sh/mermaid@11.15.0";
  const mermaidRunner = `<script type="module">
import mermaid from ${JSON.stringify(mermaidUrl)};
try {
  mermaid.initialize({ startOnLoad: false, securityLevel: "strict", theme: ${JSON.stringify(mermaidTheme)} });
  await mermaid.run({ querySelector: ".mermaid" });
} catch (e) {
  console.error("Mermaid render error:", e && e.message ? e.message : e);
}
<\/script>`;

  return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  ${markdownPreviewStyle(dark)}
</head>
<body>
  ${CONSOLE_INTERCEPT}
  <main class="markdown-body">${safeHtml}</main>
  ${mermaidRunner}
</body>
</html>`;
}

function parseSimpleDiffPatch(diffText) {
  const lines = diffText.replace(/\r\n/g, "\n").split("\n");
  const oldLines = [];
  const newLines = [];

  for (const line of lines) {
    if (line.startsWith("---") || line.startsWith("+++") || line.startsWith("@@")) continue;

    if (line.startsWith("-")) {
      oldLines.push(line.slice(1));
      continue;
    }

    if (line.startsWith("+")) {
      newLines.push(line.slice(1));
      continue;
    }

    if (line.startsWith(" ")) {
      oldLines.push(line.slice(1));
      newLines.push(line.slice(1));
    }
  }

  return {
    oldBlock: oldLines.join("\n").trim(),
    newBlock: newLines.join("\n").trim(),
  };
}

function applySimpleDiffPatch(source, diffText) {
  const { oldBlock, newBlock } = parseSimpleDiffPatch(diffText);

  if (!oldBlock || !newBlock) {
    return {
      ok: false,
      code: source,
      message: "差分として認識できませんでした。",
    };
  }

  const count = source.split(oldBlock).length - 1;

  if (count === 0) {
    return {
      ok: false,
      code: source,
      message: "置換対象のコードが現在の内容内に見つかりませんでした。",
    };
  }

  if (count > 1) {
    return {
      ok: false,
      code: source,
      message: `置換対象が ${count} 件見つかりました。誤適用防止のため中止しました。`,
    };
  }

  return {
    ok: true,
    code: source.replace(oldBlock, newBlock),
    message: "差分を適用しました。",
  };
}

function SnapshotPanel({ open, onClose, snapshots, onRestore, onDelete, onClearAll, darkMode }) {
  const [selected, setSelected] = useState(null);
  const { Chip, List, ListItem, ListItemButton, ListItemText } = MaterialUI;
  const snap = snapshots.find(s => s.id === selected);

  useEffect(() => {
    if (open && snapshots.length > 0) setSelected(snapshots[0].id);
  }, [open, snapshots.length]);

  const previewBg  = darkMode ? "#1e1e2e" : "#f8f9fb";
  const previewFg  = darkMode ? "#cdd6f4" : "#1a1a2e";
  const borderC    = darkMode ? "#313244" : "#e0e3e8";

  return (
    <Dialog open={open} onClose={onClose} maxWidth="lg" fullWidth PaperProps={{ sx: { borderRadius: 3, height: "80vh", display: "flex", flexDirection: "column" } }}>
      <DialogTitle sx={{ py: 1.5, display: "flex", alignItems: "center", gap: 1, borderBottom: `1px solid ${borderC}` }}>
        <Icon name="photo_camera" size={18} style={{ color: "#555" }} />
        <Typography variant="subtitle1" fontWeight={700} sx={{ flex: 1 }}>スナップショット</Typography>
        <Chip label={`${snapshots.length} / ${MAX_SNAPSHOTS}`} size="small" sx={{ fontSize: 11 }} />
      </DialogTitle>

      <Box sx={{ display: "flex", flex: 1, overflow: "hidden" }}>
        <Box sx={{ width: 220, flexShrink: 0, borderRight: `1px solid ${borderC}`, overflowY: "auto", background: darkMode ? "#181825" : "#f5f6f8" }}>
          {snapshots.length === 0 ? (
            <Box sx={{ p: 2, color: "#aaa", fontSize: 12, textAlign: "center" }}>スナップショットなし</Box>
          ) : (
            <List dense disablePadding>
              {snapshots.map((s, i) => (
                <ListItem key={s.id} disablePadding secondaryAction={
                  <Tooltip title="削除" arrow>
                    <IconButton size="small" edge="end" sx={{ p: 0.3 }}
                      onClick={e => { e.stopPropagation(); onDelete(s.id); if (selected === s.id) setSelected(snapshots[i + 1]?.id ?? snapshots[i - 1]?.id ?? null); }}>
                      <Icon name="close" size={12} style={{ color: "#bbb" }} />
                    </IconButton>
                  </Tooltip>
                }>
                  <ListItemButton selected={selected === s.id} onClick={() => setSelected(s.id)} sx={{ py: 0.8, pr: 4 }}>
                    <ListItemText
                      primary={<Box sx={{ display: "flex", alignItems: "center", gap: 0.5 }}>
                        {s.isLastGood && <Icon name="check_circle" size={12} style={{ color: "#43a047" }} />}
                        {s.isAuto && !s.isLastGood && <Icon name="schedule" size={12} style={{ color: "#888" }} />}
                        <Typography noWrap variant="caption" sx={{ fontSize: 11, fontWeight: 600 }}>{s.label}</Typography>
                      </Box>}
                      secondary={<Typography variant="caption" sx={{ fontSize: 10, color: "#aaa" }}>
                        {new Date(s.ts).toLocaleString("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" })}
                        {" · "}{s.code.length.toLocaleString()} 文字
                      </Typography>}
                    />
                  </ListItemButton>
                </ListItem>
              ))}
            </List>
          )}
        </Box>

        <Box sx={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {snap ? (
            <>
              <Box sx={{ px: 2, py: 1, borderBottom: `1px solid ${borderC}`, display: "flex", alignItems: "center", gap: 1 }}>
                <Typography variant="caption" sx={{ fontSize: 11, color: "#888", flex: 1 }}>{snap.label} — {new Date(snap.ts).toLocaleString("ja-JP")}</Typography>
                {snap.isLastGood && <MaterialUI.Chip label="最後の正常表示" size="small" color="success" sx={{ fontSize: 10, height: 18 }} />}
                <Tooltip title="コードをコピー" arrow><IconButton size="small" sx={{ p: 0.4 }} onClick={() => navigator.clipboard.writeText(snap.code).catch(() => {})}><Icon name="content_copy" size={14} /></IconButton></Tooltip>
              </Box>
              <Box sx={{ flex: 1, overflow: "auto", background: previewBg }}>
                <Box component="pre" sx={{ m: 0, p: "12px 14px", fontFamily: "ui-monospace,SFMono-Regular,Menlo,Consolas,monospace", fontSize: 12, lineHeight: 1.65, color: previewFg, whiteSpace: "pre-wrap", wordBreak: "break-all" }}>{snap.code}</Box>
              </Box>
            </>
          ) : (
            <Box sx={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#bbb" }}>
              <Typography variant="body2" color="text.disabled">スナップショットを選択してください</Typography>
            </Box>
          )}
        </Box>
      </Box>

      <DialogActions sx={{ px: 2, py: 1, borderTop: `1px solid ${borderC}`, gap: 1 }}>
        <Button size="small" color="error" variant="outlined" onClick={onClearAll} disabled={snapshots.length === 0} startIcon={<Icon name="delete_sweep" size={14} />}>全削除</Button>
        <Box sx={{ flex: 1 }} />
        <Button size="small" onClick={onClose} variant="outlined">閉じる</Button>
        <Button size="small" variant="contained" disabled={!snap} startIcon={<Icon name="restore" size={14} />} onClick={() => { if (snap) { onRestore(snap.code); onClose(); } }}>このコードに復元</Button>
      </DialogActions>
    </Dialog>
  );
}

function PreviewFrame({ srcDoc, previewKey, width, scale, darkMode }) {
  const constrained = width !== "100%";
  const s = (scale || 100) / 100;
  const iframeW = s !== 1 ? `${100 / s}%` : "100%";
  const iframeH = s !== 1 ? `${100 / s}%` : "100%";

  return (
    <Box sx={{ flex: 1, overflow: "auto", background: outerBg, display: "flex", flexDirection: "column", p: constrained ? 1 : 0 }}>
      <Box sx={{ width, mx: "auto", flex: 1, border: constrained ? `1px solid ${darkMode ? "#444" : "#c8cdd6"}` : "none", borderRadius: constrained ? 1 : 0, overflow: "hidden", background: innerBg, transition: "width 0.25s ease", minHeight: 0, position: "relative" }}>

const PRISM_CSS_ID  = "prism-theme-css";
const PRISM_JS_URL  = "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js";
const PRISM_HTML_URL = "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js";

function loadPrism() {
  return new Promise((resolve) => {
    if (window.Prism && window.Prism.languages && window.Prism.languages.markup) { resolve(); return; }
    const loadScript = (src) => new Promise((res) => {
      const s = document.createElement("script");
      s.src = src; s.onload = res; document.head.appendChild(s);
    });
    loadScript(PRISM_JS_URL).then(() => loadScript(PRISM_HTML_URL)).then(resolve);
  });
}

function injectPrismTheme(darkMode) {
  let el = document.getElementById(PRISM_CSS_ID);
  if (!el) { el = document.createElement("style"); el.id = PRISM_CSS_ID; document.head.appendChild(el); }
  el.textContent = darkMode ? `
    .prism-mirror::-webkit-scrollbar { width: 0; height: 0; }
    .prism-mirror { scrollbar-width: none; }
    .prism-mirror .token.doctype,.prism-mirror .token.prolog,.prism-mirror .token.comment { color: #6c7086; }
    .prism-mirror .token.tag,.prism-mirror .token.function { color: #89b4fa; }
    .prism-mirror .token.attr-name,.prism-mirror .token.keyword { color: #cba6f7; }
    .prism-mirror .token.attr-value,.prism-mirror .token.string { color: #a6e3a1; }
    .prism-mirror .token.punctuation { color: #9399b2; }
    .prism-mirror .token.entity,.prism-mirror .token.number,.prism-mirror .token.boolean { color: #fab387; }
    .prism-mirror .token.selector,.prism-mirror .token.property,.prism-mirror .token.operator { color: #89dceb; }
    .prism-mirror .token.script,.prism-mirror .token.style { color: #cdd6f4; }
  ` : `
    .prism-mirror::-webkit-scrollbar { width: 0; height: 0; }
    .prism-mirror { scrollbar-width: none; }
    .prism-mirror .token.doctype,.prism-mirror .token.prolog { color: #999; }
    .prism-mirror .token.comment { color: #6a9955; }
    .prism-mirror .token.tag,.prism-mirror .token.selector,.prism-mirror .token.property { color: #0070c1; }
    .prism-mirror .token.attr-name,.prism-mirror .token.function { color: #9c5d27; }
    .prism-mirror .token.attr-value,.prism-mirror .token.string { color: #a31515; }
    .prism-mirror .token.punctuation,.prism-mirror .token.operator { color: #555; }
    .prism-mirror .token.entity { color: #e07400; }

const EDITOR_FONT = "ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
const LINE_HEIGHT_RATIO = 1.65;

function calcWrappedHeights(lines, fontSize, taInnerWidth) {
  if (taInnerWidth <= 0) return lines.map(() => 1);
  const canvas = calcWrappedHeights._canvas || (calcWrappedHeights._canvas = document.createElement("canvas"));
  const ctx = canvas.getContext("2d");
  ctx.font = `${fontSize}px ${EDITOR_FONT}`;
  return lines.map(line => {
    if (line === "") return 1;
    const w = ctx.measureText(line).width;
    return Math.max(1, Math.ceil(w / taInnerWidth));
  });
}

function CodeEditor({ value, onChange, fontSize, darkMode, wordWrap, highlightMode, perfMode = "normal", showIndentGuides = true, mode = EDITOR_MODES.HTML }) {
  const hostRef = useRef(null);
  const viewRef = useRef(null);
  const valueRef = useRef(value);
  const onChangeRef = useRef(onChange);
  const [metrics, setMetrics] = useState(() => ({
    line: 1,
    col: 1,
    lineCount: String(value || "").split("\n").length,
    charCount: String(value || "").length,
    selCount: 0,
  }));

  useEffect(() => { onChangeRef.current = onChange; }, [onChange]);
  useEffect(() => { valueRef.current = value; }, [value]);

  const updateMetrics = useCallback((state) => {
    const head = state.selection.main.head;
    const line = state.doc.lineAt(head);
    const selCount = Math.abs(state.selection.main.to - state.selection.main.from);
    setMetrics({
      line: line.number,
      col: head - line.from + 1,
      lineCount: state.doc.lines,
      charCount: state.doc.length,
      selCount,
    });
  }, []);

  useEffect(() => {
    if (!hostRef.current || !window.__HT_CM__?.EditorView) return;

    const {
      EditorView: CMEditorView,
      basicSetup: CMBasicSetup,
      cmHtml,
      cmMarkdown,
      oneDark,
    } = window.__HT_CM__;

    const startValue = valueRef.current || "";
    const updateListener = CMEditorView.updateListener.of((update) => {
      if (update.docChanged) {
        const next = update.state.doc.toString();
        valueRef.current = next;
        onChangeRef.current(next);
      }
      if (update.docChanged || update.selectionSet || update.focusChanged) {
        updateMetrics(update.state);
      }
    });

    const baseTheme = CMEditorView.theme({
      "&": {
        height: "100%",
        fontSize: `${fontSize}px`,
        backgroundColor: darkMode ? "#1e1e2e" : "#ffffff",
        color: darkMode ? "#cdd6f4" : "#1a1a2e",
      },
      ".cm-scroller": {
        fontFamily: EDITOR_FONT,
        lineHeight: String(LINE_HEIGHT_RATIO),
      },
      ".cm-content": {
        fontFamily: EDITOR_FONT,
        minHeight: "100%",
        padding: "12px 0",
      },
      ".cm-line": {
        padding: "0 14px",
      },
      ".cm-gutters": {
        fontFamily: EDITOR_FONT,
        borderRight: darkMode ? "1px solid #313244" : "1px solid #e0e3e8",
        backgroundColor: darkMode ? "#181825" : "#f5f6f8",
        color: darkMode ? "#585b70" : "#aab0bc",
      },
      ".cm-activeLine": {
        backgroundColor: darkMode ? "rgba(203,166,247,0.07)" : "rgba(25,118,210,0.055)",
      },
      ".cm-activeLineGutter": {
        backgroundColor: darkMode ? "rgba(203,166,247,0.08)" : "rgba(25,118,210,0.075)",
        color: darkMode ? "#cdd6f4" : "#1976d2",
      },
      ".cm-foldGutter span": {
        padding: "0 2px",
      },
      ".cm-searchMatch": {
        outline: "1px solid rgba(245,158,11,0.7)",
      },
    }, { dark: darkMode });

    const resolvedMode = normalizeEditorMode(mode);
    const languageExt = (highlightMode === "plain" || perfMode === "huge")
      ? []
      : (resolvedMode === EDITOR_MODES.MARKDOWN && cmMarkdown ? cmMarkdown() : cmHtml());
    const wrapExt = wordWrap ? CMEditorView.lineWrapping : [];
    const darkExt = darkMode && oneDark ? oneDark : [];

    const view = new CMEditorView({
      doc: startValue,
      extensions: [
        CMBasicSetup,
        languageExt,
        wrapExt,
        darkExt,
        baseTheme,
        updateListener,
      ],
      parent: hostRef.current,
    });

    viewRef.current = view;
    updateMetrics(view.state);

    return () => {
      view.destroy();
      if (viewRef.current === view) viewRef.current = null;
    };
  }, [fontSize, darkMode, wordWrap, highlightMode, perfMode, mode, updateMetrics]);

  useEffect(() => {
    const view = viewRef.current;
    if (!view) return;
    const current = view.state.doc.toString();
    if (value === current) return;
    view.dispatch({ changes: { from: 0, to: current.length, insert: value || "" } });
  }, [value]);

  const sizeKB = (new TextEncoder().encode(value || "").length / 1024).toFixed(1);
  const bg       = darkMode ? "#1e1e2e" : "#fff";
  const fg       = darkMode ? "#cdd6f4" : "#1a1a2e";
  const statusBg = darkMode ? "#11111b" : "#f0f2f5";
  const statusFg = darkMode ? "#6c7086" : "#7b8190";

  return (
    <Box sx={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0, background: bg, color: fg, overflow: "hidden" }}>
      <Box ref={hostRef} sx={{ flex: 1, minHeight: 0, overflow: "hidden", "& .cm-editor": { height: "100%" } }} />
      <Box sx={{ height: 24, flexShrink: 0, display: "flex", alignItems: "center", gap: 1.5, px: 1.5, background: statusBg, borderTop: `1px solid ${darkMode ? "#313244" : "#e0e3e8"}`, color: statusFg, fontSize: 11, fontFamily: EDITOR_FONT }}>
        <span>行 {metrics.line}, 列 {metrics.col}</span>
        <span>{metrics.lineCount.toLocaleString()} 行</span>
        <span>{metrics.charCount.toLocaleString()} 文字</span>
        {metrics.selCount > 0 && <span>選択 {metrics.selCount.toLocaleString()}</span>}
        <Box sx={{ flex: 1 }} />
        {perfMode !== "normal" && <span>{perfMode === "huge" ? "超大容量モード" : "大容量モード"}</span>}
        <span>{sizeKB} KB</span>
        <span>{normalizeEditorMode(mode) === EDITOR_MODES.MARKDOWN ? "Markdown" : "HTML"}</span>
        <span>CodeMirror</span>
      </Box>
    </Box>
  );
}

function estimateStorageBytes() {
  try {
    let total = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i) || "";
      const value = localStorage.getItem(key) || "";
      total += new TextEncoder().encode(key + value).length;
    }
    return total;
  } catch { return 0; }
}

const PLUS_IDB_NAME = "html-modal-tester-ui-plus";
const PLUS_IDB_VERSION = 1;
const PLUS_CACHE_NAME = "html-modal-tester-ui-plus-cache-v1";
const PLUS_IDB_STORES = ["profiles", "tabs", "snapshots", "journal", "meta"];

function formatBytes(n) {
  const value = Number(n || 0);
  if (value < 1024) return `${value} B`;
  if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
  if (value < 1024 * 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)} MB`;
  return `${(value / 1024 / 1024 / 1024).toFixed(2)} GB`;
}

function byteSizeOf(value) {
  try { return new Blob([typeof value === "string" ? value : JSON.stringify(value)]).size; }
  catch { return String(value ?? "").length; }
}

function openPlusDB() {
  return new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error("IndexedDB is not available")); return; }
    const req = indexedDB.open(PLUS_IDB_NAME, PLUS_IDB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      PLUS_IDB_STORES.forEach(name => {
        if (!db.objectStoreNames.contains(name)) {
          const store = db.createObjectStore(name, { keyPath: "id" });
          if (name !== "meta") store.createIndex("updatedAt", "updatedAt", { unique: false });
        }
      });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("IndexedDB open failed"));
    req.onblocked = () => reject(new Error("IndexedDB is blocked by another tab"));
  });
}

function txDone(tx) {
  return new Promise((resolve, reject) => {
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error || new Error("IndexedDB transaction failed"));
    tx.onabort = () => reject(tx.error || new Error("IndexedDB transaction aborted"));
  });
}

async function putPlusStore(storeName, records) {
  const db = await openPlusDB();
  try {
    const tx = db.transaction(storeName, "readwrite");
    const store = tx.objectStore(storeName);
    for (const rec of records) store.put(rec);
    await txDone(tx);
  } finally {
    db.close();
  }
}

async function getPlusStoreAll(storeName) {
  const db = await openPlusDB();
  try {
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, "readonly");
      const req = tx.objectStore(storeName).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error || new Error("IndexedDB read failed"));
    });
  } finally {
    db.close();
  }
}

async function clearPlusStore(storeName) {
  const db = await openPlusDB();
  try {
    const tx = db.transaction(storeName, "readwrite");
    tx.objectStore(storeName).clear();
    await txDone(tx);
  } finally {
    db.close();
  }
}

async function mirrorWorkspaceToPlusDB(payload) {
  const now = new Date().toISOString();
  const profiles = (payload.profiles || []).map(p => ({ ...p, updatedAt: p.updatedAt || now }));
  const tabs = (payload.editorTabs || []).map((t, index) => ({ ...t, order: index, active: t.id === payload.activeEditorTabId, updatedAt: t.updatedAt || now }));
  const snapshots = (payload.snapshots || []).map(s => ({ ...s, id: s.id || `snap-${s.ts || Date.now()}-${Math.random().toString(36).slice(2)}`, updatedAt: s.updatedAt || now }));
  const journal = (payload.codeHistory || []).map((h, index) => ({ ...h, id: h.id || `journal-${index}-${Date.now()}`, type: "code-history", updatedAt: now }));
  const meta = [{
    id: "workspace",
    version: STORAGE_SCHEMA_VERSION,
    build: APP_BUILD_LABEL,
    activeProfileId: payload.activeProfileId,
    activeEditorTabId: payload.activeEditorTabId,
    settings: payload.settings || {},
    mirroredAt: now,
    updatedAt: now,
  }];

  await putPlusStore("profiles", profiles);
  await putPlusStore("tabs", tabs);
  await putPlusStore("snapshots", snapshots);
  await putPlusStore("journal", journal);
  await putPlusStore("meta", meta);
  return { profiles: profiles.length, tabs: tabs.length, snapshots: snapshots.length, journal: journal.length, meta: meta.length };
}

function getLocalStorageSummary() {
  const rows = [];
  let total = 0;
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      const value = localStorage.getItem(key);
      const size = byteSizeOf(key) + byteSizeOf(value);
      total += size;
      rows.push({ key, size, valuePreview: String(value || "").slice(0, 180) });
    }
  } catch (e) {
    return { ok: false, error: e.message || String(e), total: 0, rows: [] };
  }
  rows.sort((a, b) => b.size - a.size);
  return { ok: true, total, rows };
}

async function getIndexedDBSummary() {
  const stores = [];
  let total = 0;
  for (const storeName of PLUS_IDB_STORES) {
    try {
      const rows = await getPlusStoreAll(storeName);
      const size = rows.reduce((sum, row) => sum + byteSizeOf(row), 0);
      total += size;
      stores.push({ storeName, count: rows.length, size, ok: true });
    } catch (e) {
      stores.push({ storeName, count: 0, size: 0, ok: false, error: e.message || String(e) });
    }
  }
  return { ok: true, total, stores };
}

async function getCacheSummary() {
  if (!window.caches) return { ok: false, total: 0, caches: [], error: "Cache API is not available" };
  const names = await caches.keys();
  const list = [];
  let total = 0;
  for (const name of names) {
    const cache = await caches.open(name);
    const reqs = await cache.keys();
    let size = 0;
    for (const req of reqs) {
      try {
        const res = await cache.match(req);
        const clone = res?.clone();
        const blob = clone ? await clone.blob() : null;
        size += blob ? blob.size : 0;
      } catch {}
    }
    total += size;
    list.push({ name, count: reqs.length, size });
  }
  return { ok: true, total, caches: list };
}

async function cacheCoreDependencies() {
  if (!window.caches) throw new Error("Cache API is not available");
  const cache = await caches.open(PLUS_CACHE_NAME);
  const urls = [
    "https://unpkg.com/@babel/standalone/babel.min.js",
    "https://fonts.googleapis.com/icon?family=Material+Icons",
    "https://esm.sh/react@19.2.0",
    "https://esm.sh/react-dom@19.2.0/client",
    "https://esm.sh/@mui/material@7.3.5?deps=react@19.2.0,react-dom@19.2.0",
    "https://esm.sh/codemirror@6.0.2",
    "https://esm.sh/@codemirror/lang-html@6.4.10",
    "https://esm.sh/@codemirror/lang-markdown@6.3.4",
    "https://esm.sh/@codemirror/theme-one-dark@6.1.3",
    "https://esm.sh/marked@18.0.3",
    "https://esm.sh/dompurify@3.4.5",
    "https://esm.sh/mermaid@11.15.0",
  ];
  const results = [];
  for (const url of urls) {
    try {
      await cache.add(url);
      results.push({ url, ok: true });
    } catch (e) {
      results.push({ url, ok: false, error: e.message || String(e) });
    }
  }
  return results;
}

async function clearAllPlusCaches() {
  if (!window.caches) return 0;
  const names = await caches.keys();
  let count = 0;
  for (const name of names) {
    if (name.startsWith("html-modal-tester") || name.startsWith("html-editor")) {
      const ok = await caches.delete(name);
      if (ok) count++;
    }
  }
  return count;
}

async function getStorageEstimateSafe() {
  try {
    if (!navigator.storage?.estimate) return null;
    return await navigator.storage.estimate();
  } catch {
    return null;
  }
}

async function requestPersistentStorageSafe() {
  try {
    if (!navigator.storage?.persist) return false;
    return await navigator.storage.persist();
  } catch {
    return false;
  }
}

function createCommandBus(handlers, journalRef) {
  return {
    run(type, payload) {
      const handler = handlers?.[type];
      if (!handler) {
        console.warn("Unknown command:", type);
        return undefined;
      }
      const event = { id: `cmd-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, type, payload, ts: Date.now() };
      try {
        journalRef?.current?.push(event);
        if (journalRef?.current?.length > 200) journalRef.current.shift();
      } catch {}
      return handler(payload);
    },
  };
}

function commandItem(type, label, group, icon, commandBus, disabled = false) {
  return {
    type,
    label,
    group,
    icon,
    disabled,
    run: () => { if (!disabled) commandBus.run(type); },
  };
}

function StorageManagerDialog({
  open,
  onClose,
  profiles,
  editorTabs,
  snapshots,
  codeHistory,
  activeProfileId,
  activeEditorTabId,
  settings,
  onExportAll,
  onToast,
}) {
  const [tab, setTab] = useState("overview");
  const [loading, setLoading] = useState(false);
  const [summary, setSummary] = useState(null);
  const [log, setLog] = useState("");

  const refresh = useCallback(async () => {
    if (!open) return;
    setLoading(true);
    try {
      setSummary(await AppServices.storage.overview());
    } finally {
      setLoading(false);
    }
  }, [open]);

  useEffect(() => { refresh(); }, [refresh]);

  const mirrorNow = useCallback(async () => {
    setLoading(true);
    try {
      const res = await AppServices.storage.mirrorWorkspace(AppStateSelectors.workspaceSnapshot({ profiles, editorTabs, snapshots, codeHistory, activeProfileId, activeEditorTabId, settings }));
      setLog(`IndexedDBへミラー保存しました: profiles ${res.profiles}, tabs ${res.tabs}, snapshots ${res.snapshots}, journal ${res.journal}`);
      onToast?.("IndexedDBへミラー保存しました");
      await refresh();
    } catch (e) {
      setLog(`ミラー保存失敗: ${e.message || e}`);
      onToast?.("IndexedDB保存に失敗しました");
    } finally {
      setLoading(false);
    }
  }, [profiles, editorTabs, snapshots, codeHistory, activeProfileId, activeEditorTabId, settings, refresh, onToast]);

  const cacheDeps = useCallback(async () => {
    setLoading(true);
    try {
      const results = await AppServices.storage.cacheDependencies();
      const ok = results.filter(r => r.ok).length;
      setLog(`依存CDNをCache APIへ保存: ${ok}/${results.length} 件成功`);
      onToast?.("依存CDNのキャッシュ処理を実行しました");
      await refresh();
    } catch (e) {
      setLog(`キャッシュ失敗: ${e.message || e}`);
    } finally {
      setLoading(false);
    }
  }, [refresh, onToast]);

  const clearCaches = useCallback(async () => {
    setLoading(true);
    try {
      const count = await AppServices.storage.clearCaches();
      setLog(`アプリ関連Cache APIを ${count} 件削除しました`);
      onToast?.("Cache APIを整理しました");
      await refresh();
    } finally {
      setLoading(false);
    }
  }, [refresh, onToast]);

  const persist = useCallback(async () => {
    const ok = await AppServices.storage.requestPersistent();
    setLog(ok ? "Persistent Storageが許可されました" : "Persistent Storageは未許可または未対応です");
    onToast?.(ok ? "永続ストレージが許可されました" : "永続ストレージは許可されませんでした");
    await refresh();
  }, [refresh, onToast]);

  const cleanupAutoSnapshots = useCallback(async () => {
    try {
      const rows = await getPlusStoreAll("snapshots");
      const manual = rows.filter(s => !s.isAuto);
      await clearPlusStore("snapshots");
      await putPlusStore("snapshots", manual);
      setLog(`IndexedDBミラー内のauto snapshotを削除しました: ${rows.length - manual.length} 件`);
      await refresh();
    } catch (e) {
      setLog(`auto snapshot整理失敗: ${e.message || e}`);
    }
  }, [refresh]);

  const usage = summary?.estimate?.usage || 0;
  const quota = summary?.estimate?.quota || 0;
  const ratio = quota ? Math.round((usage / quota) * 100) : 0;
  const { LinearProgress, Tabs, Tab, Table, TableBody, TableCell, TableHead, TableRow, Chip } = MaterialUI;

  return (
    <Dialog open={open} onClose={onClose} maxWidth="lg" fullWidth PaperProps={{ sx: { borderRadius: 3, height: "82vh", display: "flex", flexDirection: "column" } }}>
      <DialogTitle sx={{ py: 1.4, display: "flex", alignItems: "center", gap: 1 }}>
        <Icon name="storage" size={20} />
        <Typography variant="subtitle1" fontWeight={700} sx={{ flex: 1 }}>Storage / Cache Manager</Typography>
        {loading && <Chip label="更新中" size="small" color="primary" />}
      </DialogTitle>
      <DialogContent sx={{ p: 0, display: "flex", flexDirection: "column", minHeight: 0 }}>
        <Tabs value={tab} onChange={(_, v) => setTab(v)} variant="scrollable" scrollButtons="auto" sx={{ borderBottom: "1px solid #e5e7eb", px: 1 }}>
          <Tab value="overview" label="Overview" />
          <Tab value="idb" label="IndexedDB" />
          <Tab value="local" label="localStorage" />
          <Tab value="cache" label="Cache" />
          <Tab value="cleanup" label="Cleanup" />
        </Tabs>

        <Box sx={{ p: 2, overflow: "auto", flex: 1 }}>
          {tab === "overview" && (
            <Stack spacing={1.5}>
              <Typography variant="body2">ブラウザ保存領域: {formatBytes(usage)} / {quota ? formatBytes(quota) : "不明"} {quota ? `(${ratio}%)` : ""}</Typography>
              <LinearProgress variant={quota ? "determinate" : "indeterminate"} value={Math.min(100, ratio)} />
              <Stack direction="row" spacing={1} flexWrap="wrap">
                <Button variant="contained" size="small" onClick={mirrorNow} startIcon={<Icon name="sync" size={16} />}>現在状態をIndexedDBへミラー</Button>
                <Button variant="outlined" size="small" onClick={persist} startIcon={<Icon name="verified_user" size={16} />}>永続ストレージ要求</Button>
                <Button variant="outlined" size="small" onClick={refresh} startIcon={<Icon name="refresh" size={16} />}>再計測</Button>
                <Button variant="outlined" size="small" onClick={onExportAll} startIcon={<Icon name="download" size={16} />}>バックアップExport</Button>
              </Stack>
              <Typography variant="caption" color="text.secondary">localStorageは既存UI互換、IndexedDBはミラー/復旧/将来移行用として利用します。UIはv1.4を維持しています。</Typography>
            </Stack>
          )}

          {tab === "idb" && (
            <Table size="small">
              <TableHead><TableRow><TableCell>Store</TableCell><TableCell align="right">件数</TableCell><TableCell align="right">推定サイズ</TableCell><TableCell>状態</TableCell></TableRow></TableHead>
              <TableBody>
                {(summary?.indexedDB?.stores || []).map(s => (
                  <TableRow key={s.storeName}><TableCell>{s.storeName}</TableCell><TableCell align="right">{s.count}</TableCell><TableCell align="right">{formatBytes(s.size)}</TableCell><TableCell>{s.ok ? "OK" : s.error}</TableCell></TableRow>
                ))}
              </TableBody>
            </Table>
          )}

          {tab === "local" && (
            <Table size="small">
              <TableHead><TableRow><TableCell>Key</TableCell><TableCell align="right">サイズ</TableCell><TableCell>Preview</TableCell></TableRow></TableHead>
              <TableBody>
                {(summary?.localStorage?.rows || []).map(row => (
                  <TableRow key={row.key}><TableCell>{row.key}</TableCell><TableCell align="right">{formatBytes(row.size)}</TableCell><TableCell><Typography variant="caption" sx={{ wordBreak: "break-all" }}>{row.valuePreview}</Typography></TableCell></TableRow>
                ))}
              </TableBody>
            </Table>
          )}

          {tab === "cache" && (
            <Stack spacing={1.5}>
              <Stack direction="row" spacing={1} flexWrap="wrap">
                <Button variant="contained" size="small" onClick={cacheDeps} startIcon={<Icon name="cloud_download" size={16} />}>依存CDNをCache APIへ保存</Button>
                <Button variant="outlined" color="error" size="small" onClick={clearCaches} startIcon={<Icon name="delete_sweep" size={16} />}>アプリ関連Cache削除</Button>
              </Stack>
              <Table size="small">
                <TableHead><TableRow><TableCell>Cache</TableCell><TableCell align="right">件数</TableCell><TableCell align="right">推定サイズ</TableCell></TableRow></TableHead>
                <TableBody>
                  {(summary?.cache?.caches || []).map(c => (
                    <TableRow key={c.name}><TableCell>{c.name}</TableCell><TableCell align="right">{c.count}</TableCell><TableCell align="right">{formatBytes(c.size)}</TableCell></TableRow>
                  ))}
                </TableBody>
              </Table>
            </Stack>
          )}

          {tab === "cleanup" && (
            <Stack spacing={1.5}>
              <Button variant="outlined" color="warning" onClick={cleanupAutoSnapshots} startIcon={<Icon name="auto_delete" size={16} />}>IndexedDBミラー内のauto snapshotを削除</Button>
              <Button variant="outlined" color="error" onClick={clearCaches} startIcon={<Icon name="delete_sweep" size={16} />}>アプリ関連Cacheを削除</Button>
              <Typography variant="caption" color="text.secondary">手動snapshotと現在のlocalStorageプロファイルは削除しません。危険操作はこの版では明示的な完全初期化にしていません。</Typography>
            </Stack>
          )}
        </Box>

        {log && <Box sx={{ px: 2, py: 1, borderTop: "1px solid #e5e7eb", background: "#f8fafc" }}><Typography variant="caption" sx={{ whiteSpace: "pre-wrap" }}>{log}</Typography></Box>}
      </DialogContent>
      <DialogActions sx={{ px: 2, py: 1 }}>
        <Button onClick={onClose} variant="contained">閉じる</Button>
      </DialogActions>
    </Dialog>
  );
}

function CommandPaletteDialog({ open, onClose, commands }) {
  const [query, setQuery] = useState("");
  useEffect(() => { if (open) setQuery(""); }, [open]);
  const q = query.trim().toLowerCase();
  const filtered = (commands || []).filter(c => !q || c.label.toLowerCase().includes(q) || String(c.group || "").toLowerCase().includes(q)).slice(0, 40);

  const run = (cmd) => {
    onClose();
    setTimeout(() => cmd.run?.(), 0);
  };

  return (
    <Dialog open={open} onClose={onClose} maxWidth="sm" fullWidth PaperProps={{ sx: { borderRadius: 3, overflow: "hidden" } }}>
      <Box sx={{ p: 1.2, borderBottom: "1px solid #e5e7eb", display: "flex", alignItems: "center", gap: 1 }}>
        <Icon name="manage_search" size={20} />
        <MaterialUI.TextField autoFocus fullWidth size="small" placeholder="コマンドを検索... 例: 保存 / 履歴 / storage / preview" value={query} onChange={e => setQuery(e.target.value)} />
      </Box>
      <DialogContent sx={{ p: 0, maxHeight: 420 }}>
        {filtered.map((cmd, i) => (
          <Box key={`${cmd.label}-${i}`} onClick={() => !cmd.disabled && run(cmd)} sx={{ px: 2, py: 1.1, borderBottom: "1px solid #f1f5f9", display: "flex", alignItems: "center", gap: 1, cursor: cmd.disabled ? "not-allowed" : "pointer", opacity: cmd.disabled ? 0.45 : 1, "&:hover": { background: cmd.disabled ? "transparent" : "#f8fafc" } }}>
            <Icon name={cmd.icon || "bolt"} size={18} style={{ color: "#1976d2" }} />
            <Box sx={{ minWidth: 0, flex: 1 }}>
              <Typography variant="body2" fontWeight={700}>{cmd.label}</Typography>
              {cmd.group && <Typography variant="caption" color="text.secondary">{cmd.group}</Typography>}
            </Box>
          </Box>
        ))}
        {filtered.length === 0 && <Box sx={{ p: 3, textAlign: "center", color: "#94a3b8" }}>該当コマンドなし</Box>}
      </DialogContent>
    </Dialog>
  );
}

function InlineConsoleView({ logs, onClear, darkMode = false }) {
  const cBg = darkMode ? "#11111b" : "#fafafa";
  const emptyFg = darkMode ? "#6c7086" : "#aaa";
  return (
    <Box sx={{ height: "100%", display: "flex", flexDirection: "column", background: cBg, overflow: "hidden" }}>
      <Box sx={{ px: 1.5, py: 1, display: "flex", alignItems: "center", gap: 1, borderBottom: `1px solid ${darkMode ? "#313244" : "#e0e0e0"}` }}>
        <Icon name="terminal" size={17} style={{ color: darkMode ? "#cdd6f4" : "#555" }} />
        <Typography variant="caption" fontWeight={700} sx={{ flex: 1, color: darkMode ? "#cdd6f4" : "#333" }}>Console</Typography>
        <Typography variant="caption" sx={{ color: darkMode ? "#a6adc8" : "#777" }}>{logs.length} 件</Typography>
        <Button size="small" variant="outlined" color="error" disabled={logs.length === 0} onClick={onClear} sx={{ py: 0.2, fontSize: 11 }}>Clear</Button>
      </Box>
      <Box sx={{ flex: 1, overflow: "auto", fontFamily: "ui-monospace,SFMono-Regular,Menlo,Consolas,monospace", fontSize: 12 }}>
        {logs.length === 0 ? (
          <Box sx={{ height: "100%", display: "grid", placeItems: "center", color: emptyFg }}>ログはありません</Box>
        ) : logs.map((log, i) => {
          const c = LOG_COLORS[log.level] || LOG_COLORS.log;
          return (
            <Box key={i} sx={{ display: "flex", alignItems: "flex-start", gap: 1, px: 1.5, py: 0.65, background: c.bg, borderBottom: "1px solid rgba(0,0,0,0.04)" }}>
              <Icon name={c.icon} size={14} style={{ color: c.ic, flexShrink: 0, marginTop: 1 }} />
              <Typography variant="caption" sx={{ color: "#aaa", flexShrink: 0, lineHeight: 1.6, fontFamily: "inherit", fontSize: 11 }}>{new Date(log.ts).toLocaleTimeString()}</Typography>
              <Typography component="pre" sx={{ m: 0, color: c.fg, lineHeight: 1.6, fontFamily: "inherit", fontSize: 12, whiteSpace: "pre-wrap", wordBreak: "break-all", flex: 1 }}>{log.msg}</Typography>
            </Box>
          );
        })}
      </Box>
    </Box>
  );
}

function HistoryNavigator({
  codeHistory,
  codeHistoryIndex,
  onUndo,
  onRedo,
  onRestoreHistory,
  snapshots,
  onRestoreSnapshot,
  onTakeSnapshot,
  logs,
  activeTab,
  activeMode,
  canUndo,
  canRedo,
  darkMode = false,
}) {
  const { Chip, List, ListItemButton, ListItemText } = MaterialUI;
  const border = darkMode ? "#313244" : "#e0e3e8";
  const bg = darkMode ? "#181825" : "#fff";
  const muted = darkMode ? "#a6adc8" : "#777";
  const recentSnapshots = snapshots.slice(0, 8);
  const recentHistory = codeHistory.slice(Math.max(0, codeHistory.length - 12)).reverse();

  return (
    <Box sx={{ height: "100%", display: "flex", flexDirection: "column", background: bg, color: darkMode ? "#cdd6f4" : "#1a1a2e", overflow: "hidden" }}>
      <Box sx={{ p: 1.5, borderBottom: `1px solid ${border}`, display: "flex", flexDirection: "column", gap: 1 }}>
        <Box sx={{ display: "flex", alignItems: "center", gap: 1 }}>
          <Icon name="manage_history" size={18} style={{ color: "#1976d2" }} />
          <Typography variant="subtitle2" fontWeight={800} sx={{ flex: 1 }}>History Navigator</Typography>
          <Chip size="small" label={activeMode === EDITOR_MODES.MARKDOWN ? "MD" : "HTML"} sx={{ height: 20, fontSize: 10 }} />
        </Box>
        <Typography variant="caption" sx={{ color: muted }} noWrap>
          {activeTab?.name || "untitled"} · {Number(activeTab?.code?.length || 0).toLocaleString()} chars
        </Typography>
        <Stack direction="row" spacing={1}>
          <Button size="small" fullWidth variant="contained" disabled={!canUndo} startIcon={<Icon name="undo" size={15} />} onClick={onUndo}>Undo</Button>
          <Button size="small" fullWidth variant="contained" disabled={!canRedo} startIcon={<Icon name="redo" size={15} />} onClick={onRedo}>Redo</Button>
        </Stack>
        <Button size="small" variant="outlined" startIcon={<Icon name="photo_camera" size={15} />} onClick={onTakeSnapshot}>Snapshot作成</Button>
      </Box>

      <Box sx={{ flex: 1, overflow: "auto" }}>
        <Box sx={{ p: 1.5, borderBottom: `1px solid ${border}` }}>
          <Typography variant="caption" fontWeight={800} sx={{ color: muted, display: "block", mb: 0.75 }}>コード履歴</Typography>
          {recentHistory.length === 0 ? (
            <Typography variant="caption" sx={{ color: muted }}>履歴はまだありません</Typography>
          ) : (
            <List dense disablePadding>
              {recentHistory.map((h) => {
                const idx = codeHistory.findIndex(x => x.id === h.id);
                const selected = idx === codeHistoryIndex;
                return (
                  <ListItemButton key={h.id} selected={selected} onClick={() => onRestoreHistory(idx)} sx={{ borderRadius: 1, py: 0.45 }}>
                    <ListItemText
                      primary={<Typography variant="caption" noWrap fontWeight={selected ? 800 : 500}>{h.label}</Typography>}
                      secondary={<Typography variant="caption" sx={{ color: muted }}>{new Date(h.ts).toLocaleTimeString("ja-JP")} · {h.code.length.toLocaleString()} chars</Typography>}
                    />
                  </ListItemButton>
                );
              })}
            </List>
          )}
        </Box>

        <Box sx={{ p: 1.5, borderBottom: `1px solid ${border}` }}>
          <Typography variant="caption" fontWeight={800} sx={{ color: muted, display: "block", mb: 0.75 }}>Snapshots</Typography>
          {recentSnapshots.length === 0 ? (
            <Typography variant="caption" sx={{ color: muted }}>スナップショットはありません</Typography>
          ) : (
            <List dense disablePadding>
              {recentSnapshots.map((s) => (
                <ListItemButton key={s.id} onClick={() => onRestoreSnapshot(s.code)} sx={{ borderRadius: 1, py: 0.45 }}>
                  <ListItemText
                    primary={<Typography variant="caption" noWrap fontWeight={s.isLastGood ? 800 : 500}>{s.isLastGood ? "✓ " : ""}{s.label}</Typography>}
                    secondary={<Typography variant="caption" sx={{ color: muted }}>{new Date(s.ts).toLocaleString("ja-JP")} · {s.code.length.toLocaleString()} chars</Typography>}
                  />
                </ListItemButton>
              ))}
            </List>
          )}
        </Box>

        <Box sx={{ p: 1.5 }}>
          <Typography variant="caption" fontWeight={800} sx={{ color: muted, display: "block", mb: 0.75 }}>Recent Logs</Typography>
          {logs.slice(-5).reverse().map((l, i) => (
            <Box key={i} sx={{ display: "flex", gap: 0.75, alignItems: "flex-start", py: 0.35 }}>
              <Icon name={(LOG_COLORS[l.level] || LOG_COLORS.log).icon} size={13} style={{ color: (LOG_COLORS[l.level] || LOG_COLORS.log).ic, flexShrink: 0, marginTop: 2 }} />
              <Typography variant="caption" sx={{ color: darkMode ? "#cdd6f4" : "#333", wordBreak: "break-all" }}>{l.msg}</Typography>
            </Box>
          ))}
          {logs.length === 0 && <Typography variant="caption" sx={{ color: muted }}>ログはありません</Typography>}
        </Box>
      </Box>
    </Box>
  );
}

        <Icon name="manage_history" size={19} />
