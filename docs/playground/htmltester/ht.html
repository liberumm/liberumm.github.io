        <IconButton size="small" onClick={onClose}><Icon name="close" size={17} /></IconButton>
      </DialogTitle>
      <DialogContent sx={{ p: 0, overflow: "hidden" }}>{children}</DialogContent>
    </Dialog>
  );
}

function App() {
  const isWide = useMediaQuery(theme.breakpoints.up("md"));
  const isMobile = useMediaQuery(theme.breakpoints.down("sm"));

  const [profiles, setProfiles] = useState(() => {
    const ps = loadProfiles();
    if (ps.length > 0) return ps;
    const def = createProfile("デフォルト", {
      code: (() => { try { return localStorage.getItem(STORAGE_KEY) || DEFAULT_HTML; } catch { return DEFAULT_HTML; } })(),
    });
    saveProfiles([def]);
    return [def];
  });

  const [activeProfileId, setActiveProfileId] = useState(() => {
    const ps = loadProfiles();
    const saved = loadActiveProfileId();
    if (saved && ps.find(p => p.id === saved)) return saved;
    return ps[0]?.id || null;
  });

  const [confirmSwitch, setConfirmSwitch] = useState(null);
  const activeProfile = AppStateSelectors.activeProfile(profiles, activeProfileId);
  const initS = validateSettings(activeProfile?.data?.settings || DEFAULT_SETTINGS);

  const initialEditorTabs = useMemo(() => normalizeEditorTabs(activeProfile?.data), []);
  const initialEditorTabId = useMemo(() => getInitialEditorTabId(activeProfile?.data, initialEditorTabs), [initialEditorTabs]);

  const [editorTabs, setEditorTabs] = useState(initialEditorTabs);
  const [activeEditorTabId, setActiveEditorTabId] = useState(initialEditorTabId);
  const [html, setHtmlState] = useState(() => {
    const activeTab = initialEditorTabs.find(t => t.id === initialEditorTabId) || initialEditorTabs[0];
    return activeTab?.code ?? activeProfile?.data?.code ?? DEFAULT_HTML;
  });
  const activeEditorTab = useMemo(() => AppStateSelectors.activeEditorTab(editorTabs, activeEditorTabId), [editorTabs, activeEditorTabId]);
  const activeEditorMode = inferEditorMode(activeEditorTab?.name, html, activeEditorTab?.mode);
  const [previewKey, setPreviewKey] = useState(0);
  const [previewWidth, setPreviewWidth] = useState(initS.previewWidth);
  const [fullscreen, setFullscreen] = useState("none");
  const [darkMode, setDarkMode] = useState(initS.darkMode);
  const [fontSize, setFontSize] = useState(initS.fontSize);
  const [wordWrap, setWordWrap] = useState(initS.wordWrap);
  const [highlightMode, setHighlightMode] = useState(initS.highlightMode);
  const [previewScale, setPreviewScale] = useState(initS.previewScale);
  const [appDarkMode, setAppDarkMode] = useState(false);
  const [previewDarkMode, setPreviewDarkMode] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [tabRename, setTabRename] = useState(null);
  const [profileNewOpen, setProfileNewOpen] = useState(false);
  const [profileNewName, setProfileNewName] = useState("新しいプロファイル");
  const [previewDialog, setPreviewDialog] = useState(null);
  const [snackbar, setSnackbar] = useState({ open: false, msg: "" });
  const [consoleLogs, setConsoleLogs] = useState([]);
  const [consoleOpen, setConsoleOpen] = useState(false);
  const [snapshots, setSnapshots] = useState([]);
  const [snapshotOpen, setSnapshotOpen] = useState(false);
  const [historyOpen, setHistoryOpen] = useState(false);
  const [storageManagerOpen, setStorageManagerOpen] = useState(false);
  const [commandPaletteOpen, setCommandPaletteOpen] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [mobileView, setMobileView] = useState("editor");
  const [patchOpen, setPatchOpen] = useState(false);
  const [qualityState, qualityDispatch] = useReducer(qualityReducer, { open: false, results: [] });
  const lastGoodCodeRef = useRef(null);
  const consoleLogsRef = useRef([]);
  const historyMuteRef = useRef(false);
  const commandJournalRef = useRef([]);
  const [codeHistory, setCodeHistory] = useState(() => [{ id: `hist-${Date.now()}-0`, code: html, label: "初期状態", ts: Date.now(), tabId: activeEditorTabId }]);
  const [codeHistoryIndex, setCodeHistoryIndex] = useState(0);
  const [wins, setWins] = useState(() => activeProfile?.data?.windows ?? []);

  const lineCountForPerf = useMemo(() => html.split("\n").length, [html]);
  const isLargeCode = html.length > 50000 || lineCountForPerf > 1500;
  const isHugeCode = html.length > 200000 || lineCountForPerf > 5000;
  const perfMode = isHugeCode ? "huge" : isLargeCode ? "large" : "normal";
  const previewDelay = isHugeCode ? 2000 : isLargeCode ? 1200 : 400;
  const effectiveHighlightMode = isLargeCode ? "plain" : highlightMode;
  const effectiveWordWrap = isLargeCode ? false : wordWrap;
  const showIndentGuides = perfMode === "normal";

  const containerRef = useRef(null);
  const { ratio, setRatio, handleProps, dragging } = useSplitPane(containerRef, isWide, initS.splitRatio);
  const ratioRef = useRef(ratio);
  const setRatioRef = useRef(setRatio);

  useEffect(() => { ratioRef.current = ratio; }, [ratio]);
  useEffect(() => { setRatioRef.current = setRatio; }, [setRatio]);
  useEffect(() => { consoleLogsRef.current = consoleLogs; }, [consoleLogs]);

  useEffect(() => {
    historyMuteRef.current = true;
    const entry = { id: `hist-${Date.now()}-${Math.random().toString(36).slice(2,6)}`, code: html, label: "タブ切替", ts: Date.now(), tabId: activeEditorTabId };
    setCodeHistory([entry]);
    setCodeHistoryIndex(0);
    const t = setTimeout(() => { historyMuteRef.current = false; }, 0);
    return () => clearTimeout(t);
  }, [activeEditorTabId]);

  useEffect(() => {
    if (historyMuteRef.current) return;
    const timer = setTimeout(() => {
      setCodeHistory(prev => {
        const current = prev[codeHistoryIndex];
        if (current?.code === html) return prev;
        const base = prev.slice(0, codeHistoryIndex + 1);
        const next = [...base, {
          id: `hist-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
          code: html,
          label: `編集 ${new Date().toLocaleTimeString("ja-JP")}`,
          ts: Date.now(),
          tabId: activeEditorTabId,
        }].slice(-MAX_CODE_HISTORY);
        setCodeHistoryIndex(next.length - 1);
        return next;
      });
    }, 900);
    return () => clearTimeout(timer);
  }, [html, activeEditorTabId, codeHistoryIndex]);

  const toast = (msg) => setSnackbar({ open: true, msg });

  const getSyncedEditorTabs = useCallback(() => {
    const now = new Date().toISOString();
    return editorTabs.map(tab => tab.id === activeEditorTabId ? { ...tab, code: html, updatedAt: now } : tab);
  }, [editorTabs, activeEditorTabId, html]);

  const setHtml = useCallback((nextCode) => {
    setHtmlState(prev => {
      const value = typeof nextCode === "function" ? nextCode(prev) : nextCode;
      const now = new Date().toISOString();
      setEditorTabs(tabs => tabs.map(tab => tab.id === activeEditorTabId ? { ...tab, code: value, updatedAt: now } : tab));
      return value;
    });
  }, [activeEditorTabId]);

  const canUndoCode = codeHistoryIndex > 0;
  const canRedoCode = codeHistoryIndex < codeHistory.length - 1;

  const restoreCodeHistory = useCallback((index) => {
    const entry = codeHistory[index];
    if (!entry) return;
    historyMuteRef.current = true;
    setCodeHistoryIndex(index);
    setHtml(entry.code);
    setTimeout(() => { historyMuteRef.current = false; }, 0);
    toast("履歴から復元しました");
  }, [codeHistory, setHtml]);

  const undoCode = useCallback(() => {
    if (!canUndoCode) return;
    restoreCodeHistory(codeHistoryIndex - 1);
  }, [canUndoCode, codeHistoryIndex, restoreCodeHistory]);

  const redoCode = useCallback(() => {
    if (!canRedoCode) return;
    restoreCodeHistory(codeHistoryIndex + 1);
  }, [canRedoCode, codeHistoryIndex, restoreCodeHistory]);

  const switchEditorTab = useCallback((id) => {
    if (id === activeEditorTabId) return;
    const target = editorTabs.find(tab => tab.id === id);
    if (!target) return;

    const now = new Date().toISOString();
    setEditorTabs(tabs => tabs.map(tab => tab.id === activeEditorTabId ? { ...tab, code: html, updatedAt: now } : tab));
    setActiveEditorTabId(id);
    setHtmlState(target.code);
    setConsoleLogs([]);
  }, [activeEditorTabId, editorTabs, html]);

  const addEditorTab = useCallback(() => {
    const synced = getSyncedEditorTabs();
    if (synced.length >= MAX_EDITOR_TABS) {
      toast(`コードタブは最大 ${MAX_EDITOR_TABS} 個までです`);
      return;
    }

    const tab = createEditorTab(getUniqueTabName(synced, `untitled-${synced.length + 1}.html`), DEFAULT_HTML);
    setEditorTabs([...synced, tab]);
    setActiveEditorTabId(tab.id);
    setHtmlState(tab.code);
    setConsoleLogs([]);
    toast(`「${tab.name}」を追加しました`);
  }, [getSyncedEditorTabs]);

  const closeEditorTab = useCallback((id) => {
    const synced = getSyncedEditorTabs();
    if (synced.length <= 1) {
      toast("最後のコードタブは閉じられません");
      return;
    }

    const idx = synced.findIndex(tab => tab.id === id);
    if (idx < 0) return;

    const next = synced.filter(tab => tab.id !== id);
    setEditorTabs(next);

    if (id === activeEditorTabId) {
      const nextActive = next[Math.min(idx, next.length - 1)] || next[0];
      setActiveEditorTabId(nextActive.id);
      setHtmlState(nextActive.code);
      setConsoleLogs([]);
    }

    toast("コードタブを閉じました");
  }, [activeEditorTabId, getSyncedEditorTabs]);

  const renameEditorTab = useCallback((id) => {
    const target = editorTabs.find(tab => tab.id === id);
    if (!target) return;
    setTabRename({ id, name: target.name });
  }, [editorTabs]);

  const applyEditorTabRename = useCallback(() => {
    const name = tabRename?.name?.trim();
    if (!tabRename || !name) { setTabRename(null); return; }
    const cleaned = safeDownloadFileName(name);
    setEditorTabs(tabs => tabs.map(tab => tab.id === tabRename.id ? { ...tab, name: cleaned, updatedAt: new Date().toISOString() } : tab));
    setTabRename(null);
    toast(`「${cleaned}」に変更しました`);
  }, [tabRename]);

  const duplicateEditorTab = useCallback(() => {
    const synced = getSyncedEditorTabs();

    if (synced.length >= MAX_EDITOR_TABS) {
      toast(`タブは最大 ${MAX_EDITOR_TABS} 件までです`);
      return;
    }

    const current = synced.find(tab => tab.id === activeEditorTabId) || synced[0];
    const copiedName = current.name.replace(/(\.(html?|md|markdown|mmd))$/i, "-copy$1");
    const tab = createEditorTab(getUniqueTabName(synced, copiedName), current.code, current.mode);
    setEditorTabs([...synced, tab]);
    setActiveEditorTabId(tab.id);
    setHtmlState(tab.code);
    toast("タブを複製しました");
  }, [activeEditorTabId, getSyncedEditorTabs]);

  const changeEditorTabMode = useCallback((mode) => {
    const resolvedMode = normalizeEditorMode(mode);
    const now = new Date().toISOString();
    setEditorTabs(tabs => tabs.map(tab => tab.id === activeEditorTabId
      ? { ...tab, mode: resolvedMode, name: renameForMode(tab.name, resolvedMode), updatedAt: now }
      : tab));
    toast(resolvedMode === EDITOR_MODES.MARKDOWN ? "Markdownプレビューに切り替えました" : "HTMLプレビューに切り替えました");
  }, [activeEditorTabId]);

  const addWin = useCallback(() => setWins(ws => [...ws, createWin()]), []);
  const closeWin = useCallback((id) => setWins(ws => ws.filter(w => w.id !== id)), []);
  const updateWin = useCallback((id, patch) => {
    setWins(ws => ws.map(w => w.id !== id ? w : { ...w, ...(typeof patch === "function" ? patch(w) : patch) }));
  }, []);
  const focusWin = useCallback((id) => {
    setWins(ws => {
      const maxZ = Math.max(...ws.map(w => w.zIndex), 999);
      return ws.map(w => w.id === id ? { ...w, zIndex: maxZ + 1 } : w);
    });
  }, []);

  const getCurrentData = useCallback(() => {
    const syncedTabs = getSyncedEditorTabs();
    return {
      code: html,
      editorTabs: syncedTabs,
      activeEditorTabId,
      settings: { fontSize, darkMode, wordWrap, highlightMode, previewScale, previewWidth, splitRatio: ratioRef.current },
      windows: wins,
      urlHistory: activeProfile?.data?.urlHistory ?? [],
    };
  }, [html, getSyncedEditorTabs, activeEditorTabId, fontSize, darkMode, wordWrap, highlightMode, previewScale, previewWidth, wins, activeProfile]);

  const applyProfile = useCallback((p) => {
    const s = validateSettings(p.data?.settings);
    const tabs = normalizeEditorTabs(p.data);
    const tabId = getInitialEditorTabId(p.data, tabs);
    const activeTab = tabs.find(t => t.id === tabId) || tabs[0];

    setEditorTabs(tabs);
    setActiveEditorTabId(tabId);
    setHtmlState(activeTab?.code ?? p.data?.code ?? DEFAULT_HTML);
    setFontSize(s.fontSize);
    setDarkMode(s.darkMode);
    setWordWrap(s.wordWrap);
    setHighlightMode(s.highlightMode);
    setPreviewScale(s.previewScale);
    setPreviewWidth(s.previewWidth);
    setRatioRef.current(s.splitRatio);
    setWins(p.data?.windows ?? []);
    setActiveProfileId(p.id);
    saveActiveProfileId(p.id);
    setConsoleLogs([]);
  }, []);

  const handleProfileSave = useCallback(() => {
    const data = getCurrentData();
    setProfiles(ps => {
      const next = ps.map(p => p.id !== activeProfileId ? p : { ...p, updatedAt: new Date().toISOString(), data });
      saveProfiles(next);
      return next;
    });
    toast("プロファイルを保存しました");
  }, [activeProfileId, getCurrentData]);

  const handleProfileNew = useCallback(() => {
    setProfileNewName("新しいプロファイル");
    setProfileNewOpen(true);
  }, []);

  const applyProfileNew = useCallback(() => {
    const name = profileNewName.trim() || "新しいプロファイル";
    const p = createProfile(name, getCurrentData());
    setProfiles(ps => {
      const next = [...ps, p].slice(-MAX_PROFILES);
      saveProfiles(next);
      return next;
    });
    setActiveProfileId(p.id);
    saveActiveProfileId(p.id);
    setProfileNewOpen(false);
    toast(`「${name}」を作成しました`);
  }, [profileNewName, getCurrentData]);

  const handleProfileSwitch = useCallback((id) => {
    if (id === activeProfileId) return;
    setConfirmSwitch(id);
  }, [activeProfileId]);

  const doSwitch = useCallback((save) => {
    const targetId = confirmSwitch;
    if (save) handleProfileSave();
    const target = profiles.find(p => p.id === targetId);
    if (target) applyProfile(target);
    setConfirmSwitch(null);
    toast(`「${target?.name}」に切り替えました`);
  }, [confirmSwitch, profiles, handleProfileSave, applyProfile]);

  const handleProfileRename = useCallback((id, name) => {
    if (!name.trim()) return;
    setProfiles(ps => {
      const next = ps.map(p => p.id !== id ? p : { ...p, name: name.trim(), updatedAt: new Date().toISOString() });
      saveProfiles(next);
      return next;
    });
  }, []);

  const handleProfileDuplicate = useCallback((id) => {
    const src = profiles.find(p => p.id === id);
    if (!src) return;
    const p = createProfile(`${src.name} のコピー`, src.data);
    setProfiles(ps => {
      const next = [...ps, p].slice(-MAX_PROFILES);
      saveProfiles(next);
      return next;
    });
    toast(`「${p.name}」を作成しました`);
  }, [profiles]);

  const handleProfileDelete = useCallback((id) => {
    setProfiles(ps => {
      const next = ps.filter(p => p.id !== id);
      saveProfiles(next);
      if (id === activeProfileId && next.length > 0) applyProfile(next[0]);
      return next;
    });
  }, [activeProfileId, applyProfile]);

  const handleProfileExport = useCallback((id) => {
    const p = profiles.find(pr => pr.id === id);
    if (p) exportProfile(p);
  }, [profiles]);

  const handleProfileExportAll = useCallback(() => exportAllProfiles(profiles), [profiles]);

  const handleProfileImport = useCallback((file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const json = JSON.parse(e.target.result);
        const imported = (json.profiles || [json]).filter(p => p && p.name && p.data);
        if (imported.length === 0) { toast("有効なプロファイルが見つかりませんでした"); return; }
        const newProfiles = imported.map(p => createProfile(p.name, {
          code: p.data?.code,
          editorTabs: Array.isArray(p.data?.editorTabs) ? p.data.editorTabs.map(t => ({ ...t, mode: normalizeEditorMode(t.mode || inferEditorMode(t.name, t.code)) })) : null,
          activeEditorTabId: p.data?.activeEditorTabId ?? null,
          settings: validateSettings(p.data?.settings),
          windows: p.data?.windows ?? [],
          urlHistory: p.data?.urlHistory ?? [],
        }));
        setProfiles(ps => {
          const next = [...ps, ...newProfiles].slice(-MAX_PROFILES);
          saveProfiles(next);
          return next;
        });
        toast(`${newProfiles.length} 件のプロファイルをインポートしました`);
      } catch { toast("JSONの読み込みに失敗しました"); }
    };
    reader.readAsText(file);
  }, []);

  const handleProfileReset = useCallback(() => {
    setConfirmReset(true);
  }, []);

  const applyProfileReset = useCallback(() => {
    const s = DEFAULT_SETTINGS;
    const tab = createEditorTab("index.html", DEFAULT_HTML);
    setEditorTabs([tab]);
    setActiveEditorTabId(tab.id);
    setHtmlState(tab.code);
    setFontSize(s.fontSize);
    setDarkMode(s.darkMode);
    setWordWrap(s.wordWrap);
    setHighlightMode(s.highlightMode);
    setPreviewScale(s.previewScale);
    setPreviewWidth(s.previewWidth);
    setRatioRef.current(s.splitRatio);
    setWins([]);
    setConfirmReset(false);
    toast("初期設定に戻しました");
  }, []);

  const debounced = useDebounce(html, previewDelay);
  const srcDoc = useMemo(() => buildSrcDoc(debounced, activeEditorMode, { darkMode: previewDarkMode }), [debounced, activeEditorMode, previewDarkMode]);

  useEffect(() => {
    if (perfMode === "large") {
      toast("大きいコードのため軽量モードにしました");
    } else if (perfMode === "huge") {
      toast("非常に大きいコードのため超軽量モードにしました");
    }
  }, [perfMode]);

  useEffect(() => { setRatio(RATIO_DEFAULT); }, [isWide]);
  useEffect(() => { setDarkMode(appDarkMode); setPreviewDarkMode(appDarkMode); }, [appDarkMode]);

  // Debounced autosave: avoid blocking typing with repeated JSON.stringify/localStorage writes.
  useEffect(() => {
    if (!activeProfileId) return;

    const timer = setTimeout(() => {
      const settings = {
        fontSize,
        darkMode,
        wordWrap,
        highlightMode,
        previewScale,
        previewWidth,
        splitRatio: ratioRef.current,
      };

      setProfiles(ps => {
        const next = ps.map(p => p.id !== activeProfileId ? p : {
          ...p,
          updatedAt: new Date().toISOString(),
          data: {
            ...p.data,
            code: html,
            editorTabs: editorTabs.map(tab => tab.id === activeEditorTabId ? { ...tab, code: html, updatedAt: new Date().toISOString() } : tab),
            activeEditorTabId,
            settings,
            windows: wins,
          },
        });

        saveProfiles(next);
        return next;
      });
    }, 800);

    return () => clearTimeout(timer);
  }, [
    activeProfileId,
    html,
    editorTabs,
    activeEditorTabId,
    fontSize,
    darkMode,
    wordWrap,
    highlightMode,
    previewScale,
    previewWidth,
    wins,
  ]);

  useEffect(() => { if (isMobile) setPreviewWidth("100%"); }, [isMobile]);

  const reload = useCallback(() => { setPreviewKey(k => k + 1); setConsoleLogs([]); }, []);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__ht_console__") {
        setConsoleLogs(prev => [...prev, { level: e.data.level, msg: e.data.msg, ts: e.data.ts }]);
        return;
      }
      if (e.data?.type === "__ht_dialog__") {
        const title = e.data.title || "Preview message";
        const message = String(e.data.message ?? "");
        setPreviewDialog({ title, message });
        setConsoleLogs(prev => [...prev, { level: "info", msg: `[dialog] ${message}`, ts: e.data.ts || Date.now() }]);
      }
    };
    window.addEventListener("message", handler);
    return () => window.removeEventListener("message", handler);
  }, []);

  const addSnapshot = useCallback((code, label, opts = {}) => {
    const snap = {
      id: `snap-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
      label: label || `手動 ${new Date().toLocaleTimeString("ja-JP")}`,
      code,
      ts: Date.now(),
      isAuto: opts.isAuto ?? false,
      isLastGood: opts.isLastGood ?? false,
    };

    const maxSnapshots = code.length > 200000 ? 5 : code.length > 50000 ? 15 : MAX_SNAPSHOTS;

    setSnapshots(prev => {
      const base = opts.isLastGood ? prev.filter(s => !s.isLastGood) : prev;
      return [snap, ...base].slice(0, maxSnapshots);
    });
    return snap;
  }, []);

  const takeSnapshot = useCallback(() => {
    addSnapshot(html, `手動 ${new Date().toLocaleTimeString("ja-JP")}`);
    toast("スナップショットを保存しました");
  }, [html, addSnapshot]);

  const restoreSnapshot = useCallback((code) => {
    addSnapshot(html, `復元前 ${new Date().toLocaleTimeString("ja-JP")}`, { isAuto: true });
    setHtml(code);
    toast("コードを復元しました");
  }, [html, addSnapshot]);

  const applyPatchCode = useCallback((nextCode) => {
    addSnapshot(html, `パッチ適用前 ${new Date().toLocaleTimeString("ja-JP")}`, {
      isAuto: true,
    });

    setHtml(nextCode);
    toast("差分パッチを適用しました");
  }, [html, addSnapshot]);

  const deleteSnapshot = useCallback((id) => setSnapshots(prev => prev.filter(s => s.id !== id)), []);
  const clearSnapshots = useCallback(() => setSnapshots([]), []);

  const openDiagnostics = useCallback(() => {
    qualityDispatch({
      type: "OPEN_DIAGNOSTICS",
      results: runQualityDiagnostics({ html, profiles, editorTabs: getSyncedEditorTabs(), activeEditorTabId, wins, snapshots, consoleLogs, activeMode: activeEditorMode }),
    });
  }, [html, profiles, getSyncedEditorTabs, activeEditorTabId, wins, snapshots, consoleLogs, activeEditorMode]);

  // Improved last-good tracking: watch debounced preview content, not only manual reload key.
  useEffect(() => {
    setConsoleLogs([]);
    const code = debounced;
    const timer = setTimeout(() => {
      if (consoleLogsRef.current.some(l => l.level === "error")) return;
      if (code === lastGoodCodeRef.current) return;
      lastGoodCodeRef.current = code;
      addSnapshot(code, `最後の正常表示 ${new Date().toLocaleTimeString("ja-JP")}`, { isAuto: true, isLastGood: true });
    }, 1500);
    return () => clearTimeout(timer);
  }, [debounced, previewKey, addSnapshot]);

  const sample = useCallback(() => {
    setHtml(activeEditorMode === EDITOR_MODES.MARKDOWN ? DEFAULT_MARKDOWN : DEFAULT_HTML);
    toast("サンプルを投入しました");
  }, [activeEditorMode]);
  const copy = useCallback(async () => {
    try { await navigator.clipboard.writeText(html); toast("コピーしました"); }
    catch { toast("コピーに失敗しました"); }
  }, [html]);

  const download = useCallback(() => {
    const activeTab = editorTabs.find(tab => tab.id === activeEditorTabId);
    const mode = normalizeEditorMode(activeTab?.mode || activeEditorMode);
    const blobType = mode === EDITOR_MODES.MARKDOWN ? "text/markdown;charset=utf-8" : "text/html;charset=utf-8";
    const fallbackName = mode === EDITOR_MODES.MARKDOWN ? "notes.md" : "output.html";
    const url  = URL.createObjectURL(new Blob([html], { type: blobType }));
    const a    = document.createElement("a");
    a.href = url; a.download = safeDownloadFileName(activeTab?.name || fallbackName); a.click();
    URL.revokeObjectURL(url);
    toast("ダウンロードしました");
  }, [html, editorTabs, activeEditorTabId]);

  const clearConfirm = useCallback(() => { setHtml(""); setConfirmClear(false); toast("クリアしました"); }, []);
  const toggleFullscreen = useCallback((pane) => setFullscreen(f => f === pane ? "none" : pane), []);

  const commandBus = useMemo(() => createCommandBus({
    [APP_COMMANDS.SAMPLE]: sample,
    [APP_COMMANDS.COPY]: copy,
    [APP_COMMANDS.DOWNLOAD]: download,
    [APP_COMMANDS.RELOAD_PREVIEW]: reload,
    [APP_COMMANDS.UNDO]: undoCode,
    [APP_COMMANDS.REDO]: redoCode,
    [APP_COMMANDS.OPEN_HISTORY]: () => setHistoryOpen(true),
    [APP_COMMANDS.OPEN_STORAGE]: () => setStorageManagerOpen(true),
    [APP_COMMANDS.OPEN_DRAWER]: () => setDrawerOpen(true),
    [APP_COMMANDS.OPEN_DIAGNOSTICS]: openDiagnostics,
    [APP_COMMANDS.OPEN_PATCH]: () => setPatchOpen(true),
    [APP_COMMANDS.TAKE_SNAPSHOT]: takeSnapshot,
    [APP_COMMANDS.ADD_BROWSER]: addWin,
    [APP_COMMANDS.CLEAR_EDITOR]: () => setConfirmClear(true),
    [APP_COMMANDS.SAVE_PROFILE]: handleProfileSave,
    [APP_COMMANDS.NEW_HTML_TAB]: addEditorTab,
    [APP_COMMANDS.NEW_MARKDOWN_TAB]: () => {
      const synced = getSyncedEditorTabs();
      if (synced.length >= MAX_EDITOR_TABS) { toast(`コードタブは最大 ${MAX_EDITOR_TABS} 個までです`); return; }
      const tab = createEditorTab(getUniqueTabName(synced, `notes-${synced.length + 1}.md`), DEFAULT_MARKDOWN, EDITOR_MODES.MARKDOWN);
      setEditorTabs([...synced, tab]);
      setActiveEditorTabId(tab.id);
      setHtmlState(tab.code);
      setConsoleLogs([]);
      toast(`「${tab.name}」を追加しました`);
    },
  }, commandJournalRef), [sample, copy, download, reload, undoCode, redoCode, openDiagnostics, takeSnapshot, addWin, handleProfileSave, addEditorTab, getSyncedEditorTabs]);

  useEffect(() => {
    const fn = (e) => {
      if (!(e.ctrlKey || e.metaKey)) return;
      const key = String(e.key || "").toLowerCase();
      if (key === "enter") { e.preventDefault(); commandBus.run(APP_COMMANDS.RELOAD_PREVIEW); }
      if (key === "s" && e.shiftKey) { e.preventDefault(); commandBus.run(APP_COMMANDS.OPEN_STORAGE); return; }
      if (key === "s") { e.preventDefault(); commandBus.run(APP_COMMANDS.DOWNLOAD); }
      if (key === "z" && !e.shiftKey) { e.preventDefault(); commandBus.run(APP_COMMANDS.UNDO); }
      if (key === "y" || (key === "z" && e.shiftKey)) { e.preventDefault(); commandBus.run(APP_COMMANDS.REDO); }
      if (key === "h" && e.shiftKey) { e.preventDefault(); commandBus.run(APP_COMMANDS.OPEN_HISTORY); }
      if (key === "m" && e.shiftKey) { e.preventDefault(); commandBus.run(APP_COMMANDS.OPEN_DRAWER); }
      if (key === "k") { e.preventDefault(); setCommandPaletteOpen(true); }
    };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, [commandBus]);


  const commandItems = useMemo(() => [
    commandItem(APP_COMMANDS.SAMPLE, "サンプル投入", "編集", "article", commandBus),
    commandItem(APP_COMMANDS.COPY, "コピー", "編集", "content_copy", commandBus),
    commandItem(APP_COMMANDS.DOWNLOAD, "ダウンロード / Export current tab", "保存", "download", commandBus),
    commandItem(APP_COMMANDS.RELOAD_PREVIEW, "プレビュー再読み込み", "Preview", "refresh", commandBus),
    commandItem(APP_COMMANDS.UNDO, "取り消し Undo", "履歴", "undo", commandBus, !canUndoCode),
    commandItem(APP_COMMANDS.REDO, "やり直し Redo", "履歴", "redo", commandBus, !canRedoCode),
    commandItem(APP_COMMANDS.OPEN_HISTORY, "履歴ナビゲータを開く", "履歴", "manage_history", commandBus),
    commandItem(APP_COMMANDS.OPEN_STORAGE, "Storage / Cache Managerを開く", "Storage", "storage", commandBus),
    commandItem(APP_COMMANDS.OPEN_DRAWER, "Drawer Menuを開く", "Navigation", "menu_open", commandBus),
    commandItem(APP_COMMANDS.OPEN_DIAGNOSTICS, "診断パネルを開く", "Diagnostics", "health_and_safety", commandBus),
    commandItem(APP_COMMANDS.OPEN_PATCH, "差分パッチを適用", "編集", "difference", commandBus),
    commandItem(APP_COMMANDS.CLEAR_EDITOR, "エディタをクリア", "編集", "delete_outline", commandBus),
    commandItem(APP_COMMANDS.TAKE_SNAPSHOT, "スナップショットを保存", "Recovery", "photo_camera", commandBus),
    commandItem(APP_COMMANDS.SAVE_PROFILE, "プロファイルを保存", "保存", "save", commandBus),
    commandItem(APP_COMMANDS.NEW_HTML_TAB, "新規HTMLタブ", "タブ", "code", commandBus),
    commandItem(APP_COMMANDS.NEW_MARKDOWN_TAB, "新規Markdownタブ", "タブ", "article", commandBus),
    commandItem(APP_COMMANDS.ADD_BROWSER, "ブラウザウィンドウを追加", "Browser", "add_circle_outline", commandBus),
  ], [commandBus, canUndoCode, canRedoCode]);

  const showEditor = fullscreen !== "preview";
  const showPreview = fullscreen !== "editor";
  const showEditorPane = isMobile ? (fullscreen === "editor" || (fullscreen === "none" && mobileView === "editor")) : showEditor;
  const showPreviewPane = isMobile ? (fullscreen === "preview" || (fullscreen === "none" && mobileView === "preview")) : showPreview;
  const showHistoryPane = isMobile && fullscreen === "none" && mobileView === "history";
  const showConsolePane = isMobile && fullscreen === "none" && mobileView === "console";
  const showHandle = !isMobile && fullscreen === "none" && showEditor && showPreview;
  const editorSize = isMobile ? "100%" : fullscreen === "editor" ? "100%" : fullscreen === "preview" ? "0%" : `${ratio * 100}%`;
  const previewSize = isMobile ? "100%" : fullscreen === "preview" ? "100%" : fullscreen === "editor" ? "0%" : `${(1 - ratio) * 100}%`;
  const sizeKey = isWide ? "width" : "height";

  return (
    <ThemeProvider theme={theme}>
      <CssBaseline />

      <DrawerNavigation
        open={drawerOpen}
        onClose={() => setDrawerOpen(false)}
        isMobile={isMobile}
        appDarkMode={appDarkMode}
        commandItems={commandItems}
        activeEditorTab={activeEditorTab}
        activeEditorMode={activeEditorMode}
        profiles={profiles}
        snapshots={snapshots}
        consoleLogs={consoleLogs}
        wins={wins}
        codeHistory={codeHistory}
        previewDarkMode={previewDarkMode}
        onToggleAppDarkMode={() => setAppDarkMode(d => !d)}
        onTogglePreviewDarkMode={() => setPreviewDarkMode(d => !d)}
        onSetMobileView={setMobileView}
      />

      <Box sx={{ display: "flex", flexDirection: "column", height: "100vh", overflow: "hidden" }}>
        <AppBar
          position="static"
          elevation={0}
          sx={{
            background: "#1565c0",
            flexShrink: 0,
            overflow: "visible",
            borderBottom: "1px solid rgba(255,255,255,0.12)",
          }}
        >
          <Toolbar
            variant="dense"
            sx={{
              gap: { xs: 0.25, sm: 0.5 },
              minHeight: { xs: 46, sm: TOOLBAR_H },
              px: { xs: 0.5, sm: 1, md: 2 },
              py: { xs: 0.35, md: 0 },
              width: "100%",
              maxWidth: "100vw",
              flexWrap: { xs: "wrap", md: "nowrap" },
              alignContent: "center",
              overflow: "visible",
              "& .MuiIconButton-root": { flexShrink: 0 },
            }}
          >
            <Tooltip title="Drawer Menu (Ctrl+Shift+M)" arrow>
              <IconButton size="small" onClick={() => setDrawerOpen(true)} sx={{ color: "#fff", mr: { xs: 0, sm: 0.25 } }}>
                <Icon name="menu" size={21} />
              </IconButton>
            </Tooltip>

            <Typography
              variant="subtitle1"
              fontWeight={700}
              noWrap
              sx={{
                display: { xs: "none", sm: "block" },
                mr: { sm: 0.5, md: 1.5 },
                fontSize: { sm: 13, md: 15 },
                maxWidth: { sm: 190, md: 280, lg: 360 },
                minWidth: 0,
                color: "#fff",
              }}
            >
              {APP_BUILD_LABEL}
            </Typography>

            <Typography
              variant="caption"
              fontWeight={700}
              noWrap
              sx={{
                display: { xs: "block", sm: "none" },
                flex: 1,
                minWidth: 0,
                maxWidth: "calc(100vw - 230px)",
                color: "#fff",
                fontSize: 12,
              }}
            >
              {activeEditorTab?.name || APP_BUILD_LABEL}
            </Typography>

            <Box sx={{ display: { xs: "flex", md: "none" }, alignItems: "center", gap: 0.1, ml: "auto", flexShrink: 0 }}>
              <Tooltip title="保存 / ダウンロード" arrow>
                <IconButton size="small" onClick={download} sx={{ color: "#fff" }}><Icon name="download" size={19} /></IconButton>
              </Tooltip>
              <Tooltip title="履歴" arrow>
                <IconButton size="small" onClick={() => setHistoryOpen(true)} sx={{ color: "#fff" }}><Icon name="manage_history" size={19} /></IconButton>
              </Tooltip>
              <Tooltip title="Storage / Cache" arrow>
                <IconButton size="small" onClick={() => setStorageManagerOpen(true)} sx={{ color: "#fff" }}><Icon name="storage" size={19} /></IconButton>
              </Tooltip>
              <Tooltip title="Command Palette" arrow>
                <IconButton size="small" onClick={() => setCommandPaletteOpen(true)} sx={{ color: "#fff" }}><Icon name="manage_search" size={19} /></IconButton>
              </Tooltip>
              <Tooltip title={appDarkMode ? "ライトモード" : "ダークモード"} arrow>
                <IconButton size="small" onClick={() => setAppDarkMode(d => !d)} sx={{ color: appDarkMode ? "#ffd700" : "rgba(255,255,255,0.72)" }}>
                  <Icon name={appDarkMode ? "light_mode" : "dark_mode"} size={19} />

            </Box>

            <Divider orientation="vertical" flexItem sx={{ display: { xs: "none", md: "block" }, borderColor: "rgba(255,255,255,0.2)", mx: 0.5 }} />

            <Box sx={{ display: { xs: "none", md: "flex" }, alignItems: "center", gap: 0.25, flexShrink: 0 }}>
              <Tooltip title="サンプル投入" arrow><IconButton size="small" onClick={sample} sx={{ color: "#fff" }}><Icon name="article" size={19} /></IconButton></Tooltip>
              <Tooltip title="コピー" arrow><IconButton size="small" onClick={copy} sx={{ color: "#fff" }}><Icon name="content_copy" size={19} /></IconButton></Tooltip>
              <Tooltip title="HTMLとして保存 (Ctrl+S)" arrow><IconButton size="small" onClick={download} sx={{ color: "#fff" }}><Icon name="download" size={19} /></IconButton></Tooltip>
              <Tooltip title="プレビュー再読み込み (Ctrl+Enter)" arrow><IconButton size="small" onClick={reload} sx={{ color: "#fff" }}><Icon name="refresh" size={19} /></IconButton></Tooltip>
              <Tooltip title="取り消し (Ctrl+Z)" arrow><span><IconButton size="small" onClick={undoCode} disabled={!canUndoCode} sx={{ color: canUndoCode ? "#fff" : "rgba(255,255,255,0.35)" }}><Icon name="undo" size={19} /></IconButton></span></Tooltip>
              <Tooltip title="やり直し (Ctrl+Y / Ctrl+Shift+Z)" arrow><span><IconButton size="small" onClick={redoCode} disabled={!canRedoCode} sx={{ color: canRedoCode ? "#fff" : "rgba(255,255,255,0.35)" }}><Icon name="redo" size={19} /></IconButton></span></Tooltip>
              <Tooltip title="履歴ナビゲータ (Ctrl+Shift+H)" arrow><IconButton size="small" onClick={() => setHistoryOpen(true)} sx={{ color: "#fff" }}><Icon name="manage_history" size={19} /></IconButton></Tooltip>
              <Tooltip title="クリア" arrow><IconButton size="small" onClick={() => setConfirmClear(true)} sx={{ color: "#ffb3b3" }}><Icon name="delete_outline" size={19} /></IconButton></Tooltip>
              <Tooltip title="差分パッチを適用" arrow><IconButton size="small" onClick={() => setPatchOpen(true)} sx={{ color: "#fff" }}><Icon name="difference" size={19} /></IconButton></Tooltip>
              <Tooltip title="診断パネル" arrow><IconButton size="small" onClick={openDiagnostics} sx={{ color: "#fff" }}><Icon name="health_and_safety" size={19} /></IconButton></Tooltip>
              <Tooltip title="Storage / Cache Manager (Ctrl+Shift+S)" arrow><IconButton size="small" onClick={() => setStorageManagerOpen(true)} sx={{ color: "#fff" }}><Icon name="storage" size={19} /></IconButton></Tooltip>
              <Tooltip title="Command Palette (Ctrl+K)" arrow><IconButton size="small" onClick={() => setCommandPaletteOpen(true)} sx={{ color: "#fff" }}><Icon name="manage_search" size={19} /></IconButton></Tooltip>
            </Box>

            <Divider orientation="vertical" flexItem sx={{ display: { xs: "none", md: "block" }, borderColor: "rgba(255,255,255,0.2)", mx: 0.5 }} />

            <Box sx={{ display: { xs: "none", md: "flex" }, alignItems: "center", gap: 0.4, flexShrink: 0, minWidth: 0 }}>
              <Tooltip title="ブラウザウィンドウを追加" arrow><IconButton size="small" onClick={addWin} sx={{ color: "#a5d6ff" }}><Icon name="add_circle_outline" size={19} /></IconButton></Tooltip>
              <Box sx={{ display: { xs: "none", lg: "flex" }, alignItems: "center", gap: 0.4, minWidth: 0, maxWidth: { lg: 320, xl: 520 }, overflow: "hidden" }}>
                {wins.map(w => {
                  const aTab = w.tabs.find(t => t.id === w.activeTab) || w.tabs[0];
                  return (
                    <Tooltip key={w.id} title={w.minimized ? `展開: ${aTab.title}` : `最小化: ${aTab.title}`} arrow>
                      <Box onClick={() => updateWin(w.id, { minimized: !w.minimized })} sx={{ display: "flex", alignItems: "center", gap: 0.4, px: 1, py: 0.3, borderRadius: 1, cursor: "pointer", background: w.minimized ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.08)", border: w.minimized ? "1px solid rgba(255,255,255,0.5)" : "1px solid rgba(255,255,255,0.2)", maxWidth: 130, flexShrink: 1, minWidth: 44 }}>
                        <Icon name="language" size={13} style={{ color: w.minimized ? "#fff" : "#a5d6ff", flexShrink: 0 }} />
                        <Typography noWrap variant="caption" sx={{ fontSize: 11, color: "rgba(255,255,255,0.9)", lineHeight: 1, fontWeight: w.minimized ? 700 : 400 }}>{aTab.title.length > 12 ? aTab.title.slice(0, 12) + "…" : aTab.title}</Typography>
                        {w.minimized && <Box sx={{ width: 5, height: 5, borderRadius: "50%", background: "#ffd700", flexShrink: 0, ml: 0.3 }} />}
                      </Box>
                    </Tooltip>
                  );
                })}
              </Box>
            </Box>

            <Box sx={{ flex: 1, minWidth: { xs: 0, md: 12 } }} />

            <Box sx={{ display: { xs: "none", sm: "block" }, flexShrink: 0, maxWidth: { sm: 170, md: 190 } }}>
              <ProfileMenu
                profiles={profiles}
                activeId={activeProfileId}
                onSwitch={handleProfileSwitch}
                onSave={handleProfileSave}
                onNew={handleProfileNew}
                onRename={handleProfileRename}
                onDuplicate={handleProfileDuplicate}
                onDelete={handleProfileDelete}
                onExport={handleProfileExport}
                onExportAll={handleProfileExportAll}
                onImport={handleProfileImport}
                onReset={handleProfileReset}
              />
            </Box>
            <Tooltip title={appDarkMode ? "アプリ全体: ライトモード" : "アプリ全体: ダークモード"} arrow>
              <IconButton size="small" onClick={() => setAppDarkMode(d => !d)} sx={{ display: { xs: "none", md: "inline-flex" }, color: appDarkMode ? "#ffd700" : "rgba(255,255,255,0.6)" }}>
                <Icon name={appDarkMode ? "light_mode" : "dark_mode"} size={19} />
              </IconButton>
            </Tooltip>
          </Toolbar>
        </AppBar>

        {isMobile && (
          <Box sx={{ flexShrink: 0, background: appDarkMode ? "#111827" : "#fff", borderBottom: `1px solid ${appDarkMode ? "#243044" : "#dde3ec"}` }}>
            <MaterialUI.Tabs
              value={mobileView}
              onChange={(_, v) => setMobileView(v)}
              variant="fullWidth"
              textColor="primary"
              indicatorColor="primary"
              sx={{ minHeight: 42, "& .MuiTab-root": { minHeight: 42, py: 0.5, fontSize: 11 } }}
            >
              <MaterialUI.Tab value="editor" icon={<Icon name="code" size={17} />} iconPosition="start" label="編集" />
              <MaterialUI.Tab value="preview" icon={<Icon name="visibility" size={17} />} iconPosition="start" label="Preview" />
              <MaterialUI.Tab value="history" icon={<Icon name="manage_history" size={17} />} iconPosition="start" label="履歴" />
              <MaterialUI.Tab value="console" icon={<Icon name="terminal" size={17} />} iconPosition="start" label="Log" />
            </MaterialUI.Tabs>
          </Box>
        )}

        <Box ref={containerRef} sx={{ flex: 1, display: "flex", flexDirection: isWide ? "row" : "column", overflow: "hidden", background: "#b0b8c4", position: "relative", cursor: dragging ? (isWide ? "col-resize" : "row-resize") : "default" }}>
          {dragging && <Box sx={{ position: "absolute", inset: 0, zIndex: 100, cursor: isWide ? "col-resize" : "row-resize" }} {...handleProps} />}

          {showEditorPane && (
            <Box sx={{ [sizeKey]: editorSize, flexShrink: 0, display: "flex", flexDirection: "column", overflow: "hidden", background: darkMode ? "#1e1e2e" : "#fff", minWidth: 0, minHeight: 0 }}>
              <PaneHeader title="コード" fullscreen={fullscreen === "editor"} onToggleFullscreen={() => toggleFullscreen("editor")} darkMode={darkMode}>
                <Tooltip title={highlightMode === "prism" ? "プレーンモードに切り替え" : "シンタックスハイライト (CodeMirror)"} arrow><IconButton size="small" onClick={() => setHighlightMode(m => m === "prism" ? "plain" : "prism")} sx={{ p: 0.4, color: highlightMode === "prism" ? "#f59e0b" : (darkMode ? "rgba(205,214,244,0.4)" : "#bbb") }}><Icon name="format_color_text" size={16} /></IconButton></Tooltip>
                <Tooltip title="スナップショットを保存" arrow><IconButton size="small" onClick={takeSnapshot} sx={{ p: 0.4, position: "relative", color: darkMode ? "rgba(205,214,244,0.5)" : "#888" }}><Icon name="photo_camera" size={16} />{snapshots.length > 0 && <Box sx={{ position: "absolute", top: 1, right: 1, width: 5, height: 5, borderRadius: "50%", background: "#1976d2" }} />}</IconButton></Tooltip>
                <Tooltip title={`スナップショット一覧 (${snapshots.length})`} arrow><IconButton size="small" onClick={() => setSnapshotOpen(true)} sx={{ p: 0.4, color: snapshots.some(s => s.isLastGood) ? "#43a047" : (darkMode ? "rgba(205,214,244,0.4)" : "#bbb") }}><Icon name="history" size={16} /></IconButton></Tooltip>
                <Tooltip title={wordWrap ? "折り返しをオフ" : "折り返しをオン"} arrow><IconButton size="small" onClick={() => setWordWrap(w => !w)} sx={{ p: 0.4, color: wordWrap ? "#1976d2" : (darkMode ? "rgba(205,214,244,0.4)" : "#bbb") }}><Icon name="wrap_text" size={16} /></IconButton></Tooltip>
                <Tooltip title="文字を小さく" arrow><IconButton size="small" onClick={() => setFontSize(s => Math.max(10, s - 1))} sx={{ p: 0.4, color: darkMode ? "rgba(205,214,244,0.5)" : "#888" }}><Icon name="text_decrease" size={15} /></IconButton></Tooltip>
                <Typography variant="caption" onClick={() => setFontSize(13)} sx={{ fontSize: 10, minWidth: 18, textAlign: "center", cursor: "pointer", color: fontSize !== 13 ? "#1976d2" : (darkMode ? "rgba(205,214,244,0.5)" : "#aaa"), fontWeight: fontSize !== 13 ? 700 : 400 }}>{fontSize}</Typography>
                <Tooltip title="文字を大きく" arrow><IconButton size="small" onClick={() => setFontSize(s => Math.min(24, s + 1))} sx={{ p: 0.4, color: darkMode ? "rgba(205,214,244,0.5)" : "#888" }}><Icon name="text_increase" size={15} /></IconButton></Tooltip>
                <Tooltip title={darkMode ? "ライトモード" : "ダークモード"} arrow><IconButton size="small" onClick={() => setDarkMode(d => !d)} sx={{ p: 0.4, color: darkMode ? "#ffd700" : "#aaa" }}><Icon name={darkMode ? "light_mode" : "dark_mode"} size={16} /></IconButton></Tooltip>
                {perfMode !== "normal" && (
                  <Tooltip title={`性能モード: ${perfMode} / ${lineCountForPerf.toLocaleString()} 行`} arrow>
                    <Typography variant="caption" sx={{ px: 0.7, py: 0.25, borderRadius: 1, fontSize: 10, fontWeight: 700, color: "#fff", background: perfMode === "huge" ? "#d32f2f" : "#f57c00" }}>
                      {perfMode.toUpperCase()}
                    </Typography>
                  </Tooltip>
                )}
              </PaneHeader>
              <EditorTabBar
                tabs={editorTabs}
                activeId={activeEditorTabId}
                onSwitch={switchEditorTab}
                onNew={addEditorTab}
                onClose={closeEditorTab}
                onRename={renameEditorTab}
                onDuplicate={duplicateEditorTab}
                onModeChange={changeEditorTabMode}
                activeMode={activeEditorMode}
                darkMode={darkMode}
              />
              <CodeEditor
                value={html}
                onChange={setHtml}
                fontSize={isMobile ? Math.max(16, fontSize) : fontSize}
                darkMode={darkMode}
                wordWrap={effectiveWordWrap}
                highlightMode={effectiveHighlightMode}
                perfMode={perfMode}
                showIndentGuides={showIndentGuides}
                mode={activeEditorMode}
              />
            </Box>
          )}

          {showHandle && <SplitHandle isHorizontal={isWide} handleProps={handleProps} dragging={dragging} />}

          {showPreviewPane && (
            <Box sx={{ [sizeKey]: previewSize, flexShrink: 0, display: "flex", flexDirection: "column", overflow: "hidden", background: previewDarkMode ? "#1e1e2e" : "#fff", minWidth: 0, minHeight: 0 }}>
              <PaneHeader title="プレビュー" fullscreen={fullscreen === "preview"} onToggleFullscreen={() => toggleFullscreen("preview")}>
                <Tooltip title={previewDarkMode ? "プレビュー: ライトモード" : "プレビュー: ダークモード"} arrow><IconButton size="small" onClick={() => setPreviewDarkMode(d => !d)} sx={{ p: 0.4, color: previewDarkMode ? "#ffd700" : "#aaa" }}><Icon name={previewDarkMode ? "light_mode" : "dark_mode"} size={16} /></IconButton></Tooltip>
                {!isMobile && <WidthSelector value={previewWidth} onChange={setPreviewWidth} />}

                  </IconButton>
                </Tooltip>
              </PaneHeader>
              <PreviewFrame srcDoc={srcDoc} previewKey={previewKey} width={isMobile ? "100%" : previewWidth} scale={previewScale} darkMode={previewDarkMode} />
            </Box>
          )}

          {showHistoryPane && (
            <Box sx={{ flex: 1, minHeight: 0, overflow: "hidden" }}>
              <HistoryNavigator
                codeHistory={codeHistory}
                codeHistoryIndex={codeHistoryIndex}
                onUndo={undoCode}
                onRedo={redoCode}
                onRestoreHistory={restoreCodeHistory}
                snapshots={snapshots}
                onRestoreSnapshot={restoreSnapshot}
                onTakeSnapshot={takeSnapshot}
                logs={consoleLogs}
                activeTab={activeEditorTab}
                activeMode={activeEditorMode}
                canUndo={canUndoCode}
                canRedo={canRedoCode}
                darkMode={appDarkMode}
              />
            </Box>
          )}

          {showConsolePane && (
            <Box sx={{ flex: 1, minHeight: 0, overflow: "hidden" }}>
              <InlineConsoleView logs={consoleLogs} onClear={() => setConsoleLogs([])} darkMode={appDarkMode} />
            </Box>
          )}
        </Box>
      </Box>


      <HistoryDialog open={historyOpen} onClose={() => setHistoryOpen(false)}>
        <HistoryNavigator
          codeHistory={codeHistory}
          codeHistoryIndex={codeHistoryIndex}
          onUndo={undoCode}
          onRedo={redoCode}
          onRestoreHistory={restoreCodeHistory}
          snapshots={snapshots}
          onRestoreSnapshot={restoreSnapshot}
          onTakeSnapshot={takeSnapshot}
          logs={consoleLogs}
          activeTab={activeEditorTab}
          activeMode={activeEditorMode}
          canUndo={canUndoCode}
          canRedo={canRedoCode}
          darkMode={appDarkMode}
        />
      </HistoryDialog>

      <StorageManagerDialog
        open={storageManagerOpen}
        onClose={() => setStorageManagerOpen(false)}
        profiles={profiles}
        editorTabs={getSyncedEditorTabs()}
        snapshots={snapshots}
        codeHistory={codeHistory}
        activeProfileId={activeProfileId}
        activeEditorTabId={activeEditorTabId}
        settings={{ fontSize, darkMode, wordWrap, highlightMode, previewScale, previewWidth, splitRatio: ratio }}
        onExportAll={handleProfileExportAll}
        onToast={toast}
      />

      <CommandPaletteDialog
        open={commandPaletteOpen}
        onClose={() => setCommandPaletteOpen(false)}
        commands={commandItems}
      />

      <ConfirmDialog open={confirmClear} title="入力内容をクリア" message="テキストエリアの内容をすべて削除します。この操作は元に戻せません。" confirmLabel="クリアする" onConfirm={clearConfirm} onCancel={() => setConfirmClear(false)} />
      <ConfirmDialog open={confirmReset} title="初期設定に戻す" message="現在のプロファイルを初期設定に戻します。この操作は元に戻せません。" confirmLabel="初期化する" onConfirm={applyProfileReset} onCancel={() => setConfirmReset(false)} />

      <Dialog open={Boolean(tabRename)} onClose={() => setTabRename(null)} maxWidth="xs" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}>
        <DialogTitle sx={{ fontWeight: 700, pb: 1 }}>コードタブ名を変更</DialogTitle>
        <DialogContent>
          <MaterialUI.TextField autoFocus fullWidth size="small" value={tabRename?.name || ""} onChange={e => setTabRename(v => v ? { ...v, name: e.target.value } : v)} onKeyDown={e => { if (e.key === "Enter") applyEditorTabRename(); }} />
        </DialogContent>
        <DialogActions sx={{ px: 3, pb: 2, gap: 1 }}>
          <Button onClick={() => setTabRename(null)} variant="outlined" fullWidth>キャンセル</Button>
          <Button onClick={applyEditorTabRename} variant="contained" fullWidth>変更</Button>
        </DialogActions>
      </Dialog>

      <Dialog open={profileNewOpen} onClose={() => setProfileNewOpen(false)} maxWidth="xs" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}>
        <DialogTitle sx={{ fontWeight: 700, pb: 1 }}>新規プロファイルを作成</DialogTitle>
        <DialogContent>
          <MaterialUI.TextField autoFocus fullWidth size="small" value={profileNewName} onChange={e => setProfileNewName(e.target.value)} onKeyDown={e => { if (e.key === "Enter") applyProfileNew(); }} />
        </DialogContent>
        <DialogActions sx={{ px: 3, pb: 2, gap: 1 }}>
          <Button onClick={() => setProfileNewOpen(false)} variant="outlined" fullWidth>キャンセル</Button>
          <Button onClick={applyProfileNew} variant="contained" fullWidth>作成</Button>
        </DialogActions>
      </Dialog>

      <Dialog open={Boolean(previewDialog)} onClose={() => setPreviewDialog(null)} maxWidth="sm" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}>
        <DialogTitle sx={{ fontWeight: 700, pb: 1 }}>{previewDialog?.title || "Preview message"}</DialogTitle>
        <DialogContent>
          <DialogContentText sx={{ whiteSpace: "pre-wrap" }}>{previewDialog?.message || ""}</DialogContentText>
        </DialogContent>
        <DialogActions sx={{ px: 3, pb: 2 }}>
          <Button onClick={() => setPreviewDialog(null)} variant="contained">OK</Button>
        </DialogActions>
      </Dialog>

      {patchOpen && <PatchDialog open={patchOpen} onClose={() => setPatchOpen(false)} currentCode={html} onApply={applyPatchCode} />}

      {consoleOpen && <ConsolePanel open={consoleOpen} onClose={() => setConsoleOpen(false)} logs={consoleLogs} onClear={() => setConsoleLogs([])} />}

      {snapshotOpen && <SnapshotPanel open={snapshotOpen} onClose={() => setSnapshotOpen(false)} snapshots={snapshots} onRestore={restoreSnapshot} onDelete={deleteSnapshot} onClearAll={clearSnapshots} darkMode={darkMode} />}
      <DiagnosticsDialog open={qualityState.open} results={qualityState.results} onClose={() => qualityDispatch({ type: "CLOSE_DIAGNOSTICS" })} />

      {confirmSwitch && (
        <MaterialUI.Dialog open maxWidth="xs" fullWidth PaperProps={{ sx: { borderRadius: 3, mx: 2 } }}>
          <MaterialUI.DialogTitle sx={{ fontWeight: 700, pb: 1 }}>プロファイルを切り替え</MaterialUI.DialogTitle>
          <MaterialUI.DialogContent><MaterialUI.DialogContentText>現在の変更を保存してから切り替えますか？</MaterialUI.DialogContentText></MaterialUI.DialogContent>
          <MaterialUI.DialogActions sx={{ px: 3, pb: 2.5, flexDirection: "column", gap: 1 }}>
            <Button onClick={() => doSwitch(true)} variant="contained" fullWidth>保存して切り替え</Button>
            <Button onClick={() => doSwitch(false)} variant="outlined" fullWidth>保存せず切り替え</Button>
            <Button onClick={() => setConfirmSwitch(null)} variant="text" fullWidth>キャンセル</Button>
          </MaterialUI.DialogActions>
        </MaterialUI.Dialog>
      )}

      <Snackbar open={snackbar.open} autoHideDuration={2200} onClose={() => setSnackbar(s => ({ ...s, open: false }))} message={snackbar.msg} anchorOrigin={{ vertical: "bottom", horizontal: "center" }} />

      {wins.map(w => (
        <FloatingWindow key={w.id} win={w} onUpdate={updateWin} onClose={closeWin} onFocus={focusWin} />
      ))}
    </ThemeProvider>
  );
}

const root = createRoot(document.getElementById("root"));
root.render(<React.StrictMode><App /></React.StrictMode>);
  </script>

  <script type="module">
    import React from "https://esm.sh/react@19.2.0";
    import { createRoot } from "https://esm.sh/react-dom@19.2.0/client";
    import * as MaterialUI from "https://esm.sh/@mui/material@7.3.5?deps=react@19.2.0,react-dom@19.2.0";
    import { EditorView, basicSetup } from "https://esm.sh/codemirror@6.0.2";
    import { html as cmHtml } from "https://esm.sh/@codemirror/lang-html@6.4.10";
    import { markdown as cmMarkdown } from "https://esm.sh/@codemirror/lang-markdown@6.3.4";
    import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark@6.1.3";
    import { marked } from "https://esm.sh/marked@18.0.3";
    import DOMPurify from "https://esm.sh/dompurify@3.4.5";
    import mermaid from "https://esm.sh/mermaid@11.15.0";

    window.__HT_CM__ = { EditorView, basicSetup, cmHtml, cmMarkdown, oneDark };
    window.__HT_MD__ = { marked, DOMPurify, mermaid, mermaidUrl: "https://esm.sh/mermaid@11.15.0" };

    const CONSOLE_INTERCEPT = `<script>
(function(){
  var _send = function(level, args) {
    try {
      var msg = Array.from(args).map(function(a){
        try { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a); }
        catch(e) { return String(a); }
      }).join(' ');
      window.parent.postMessage({ type: '__ht_console__', level: level, msg: msg, ts: Date.now() }, '*');
    } catch(e){}
  };
  ['log','warn','error','info','debug'].forEach(function(m){
    var orig = console[m].bind(console);
    console[m] = function(){ orig.apply(console, arguments); _send(m, arguments); };
  });
  window.addEventListener('error', function(e){
    _send('error', [e.message + (e.filename ? ' (' + e.filename + ':' + e.lineno + ')' : '')]);
  });
  window.addEventListener('unhandledrejection', function(e){
    _send('error', ['Unhandled Promise rejection: ' + (e.reason?.message || e.reason)]);
  });
  window.alert = function(message) {
    var msg = String(message ?? '');
    _send('info', ['alert: ' + msg]);
    try { window.parent.postMessage({ type: '__ht_dialog__', title: 'Preview alert', message: msg, ts: Date.now() }, '*'); } catch(e) {}
  };
  window.confirm = function(message) {
    var msg = String(message ?? '');
    _send('warn', ['confirm() is disabled in sandboxed preview: ' + msg]);
    return false;
  };
  window.prompt = function(message, defaultValue) {
    var msg = String(message ?? '');
    _send('warn', ['prompt() is disabled in sandboxed preview: ' + msg]);
    return defaultValue == null ? null : String(defaultValue);
  };
})();
<\/script>`;

    const runApp = new Function("React", "createRoot", "MaterialUI", "CONSOLE_INTERCEPT", code + "\n//# sourceURL=html-editor-full-stable-v1-6-layered-architecture.jsx");
    runApp(React, createRoot, MaterialUI, CONSOLE_INTERCEPT);
  </script>
