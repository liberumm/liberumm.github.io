<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>HTML Modal Tester - React 18 + MUI v5 UMD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
  />

  <style>
    html, body, #root {
      margin: 0;
      height: 100%;
      font-family: Roboto, sans-serif;
      background: #f7f8fa;
    }

    * {
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18.3.1/umd/react-is.development.js"></script>

  <script crossorigin src="https://unpkg.com/@emotion/react@11.11.4/dist/emotion-react.umd.min.js"></script>
  <script crossorigin src="https://unpkg.com/@emotion/styled@11.14.1/dist/emotion-styled.umd.min.js"></script>

  <script crossorigin src="https://unpkg.com/@mui/material@5.18.0/umd/material-ui.development.js"></script>

  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script type="text/babel">
    const {
      Box,
      Button,
      Container,
      CssBaseline,
      Dialog,
      DialogTitle,
      DialogContent,
      Divider,
      Paper,
      Stack,
      TextField,
      Typography,
      Alert
    } = MaterialUI;

    const DEFAULT_HTML = `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Sample</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: sans-serif;
      background: linear-gradient(135deg, #f5f7ff, #ffffff);
    }
    .card {
      max-width: 520px;
      margin: 40px auto;
      padding: 24px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1 {
      margin-top: 0;
      color: #222;
    }
    p {
      color: #555;
      line-height: 1.7;
    }
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #1976d2;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>テストHTML</h1>
    <p>ここに好きなHTML/CSS/JSを貼ってモーダルで確認できます。</p>
    <button onclick="alert('iframe内で動作しています')">クリック</button>
  </div>
</body>
</html>`;

    function buildSrcDoc(userHtml) {
      const content = (userHtml || "").trim();

      if (!content) {
        return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #fafafa;
      color: #666;
    }
    .empty {
      padding: 24px;
      border: 1px dashed #bbb;
      border-radius: 12px;
      background: white;
    }
  </style>
</head>
<body>
  <div class="empty">HTMLを貼り付けてください</div>
</body>
</html>`;
      }

      return content;
    }

    function App() {
      const [htmlInput, setHtmlInput] = React.useState(DEFAULT_HTML);
      const [open, setOpen] = React.useState(false);
      const [previewKey, setPreviewKey] = React.useState(0);

      const srcDoc = React.useMemo(() => buildSrcDoc(htmlInput), [htmlInput]);

      const handleOpen = () => {
        setPreviewKey((prev) => prev + 1);
        setOpen(true);
      };

      const handleReload = () => {
        setPreviewKey((prev) => prev + 1);
      };

      const handleClear = () => {
        setHtmlInput("");
      };

      const handleSample = () => {
        setHtmlInput(DEFAULT_HTML);
      };

      return (
        <>
          <CssBaseline />

          <Box
            sx={{
              minHeight: "100%",
              py: 4,
              background: "linear-gradient(180deg, #f7f8fa 0%, #eef3ff 100%)"
            }}
          >
            <Container maxWidth="lg">
              <Paper
                elevation={0}
                sx={{
                  p: { xs: 2, md: 4 },
                  borderRadius: 4,
                  border: "1px solid #e5e7eb",
                  backgroundColor: "rgba(255,255,255,0.92)",
                  backdropFilter: "blur(8px)"
                }}
              >
                <Stack spacing={3}>
                  <Box>
                    <Typography variant="h4" fontWeight={700} gutterBottom>
                      HTML モーダルテスター
                    </Typography>
                    <Typography variant="body1" color="text.secondary">
                      好きなHTMLを貼り付けて、モーダルウィンドウ内で即テストできます。
                    </Typography>
                  </Box>

                  <Alert severity="info">
                    貼り付けたHTMLは iframe 内で表示されます。script も実行されるため、信頼できるコードのみテストしてください。
                  </Alert>

                  <TextField
                    label="テストしたいHTML"
                    multiline
                    minRows={18}
                    fullWidth
                    value={htmlInput}
                    onChange={(e) => setHtmlInput(e.target.value)}
                    placeholder="ここにHTMLを貼り付け"
                    sx={{
                      "& .MuiInputBase-root": {
                        fontFamily: "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace",
                        alignItems: "flex-start"
                      },
                      "& textarea": {
                        lineHeight: 1.5
                      }
                    }}
                  />

                  <Stack
                    direction={{ xs: "column", sm: "row" }}
                    spacing={2}
                  >
                    <Button variant="contained" size="large" onClick={handleOpen}>
                      モーダルで表示
                    </Button>
                    <Button variant="outlined" size="large" onClick={handleReload}>
                      プレビュー再読み込み
                    </Button>
                    <Button variant="outlined" size="large" onClick={handleSample}>
                      サンプル投入
                    </Button>
                    <Button variant="text" size="large" color="error" onClick={handleClear}>
                      クリア
                    </Button>
                  </Stack>

                  <Divider />

                  <Box>
                    <Typography variant="h6" gutterBottom>
                      簡易プレビュー
                    </Typography>
                    <Paper
                      variant="outlined"
                      sx={{
                        overflow: "hidden",
                        borderRadius: 3,
                        height: 360,
                        background: "#fff"
                      }}
                    >
                      <iframe
                        key={previewKey + "-inline"}
                        title="inline-preview"
                        srcDoc={srcDoc}
                        style={{
                          width: "100%",
                          height: "100%",
                          border: "none",
                          display: "block",
                          background: "#fff"
                        }}
                      />
                    </Paper>
                  </Box>
                </Stack>
              </Paper>
            </Container>
          </Box>

          <Dialog
            open={open}
            onClose={() => setOpen(false)}
            fullWidth
            maxWidth="lg"
            PaperProps={{
              sx: {
                height: "90vh",
                borderRadius: 3,
                overflow: "hidden"
              }
            }}
          >
            <DialogTitle
              sx={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                gap: 2
              }}
            >
              <Typography variant="h6" fontWeight={700}>
                HTML テストモーダル
              </Typography>

              <Stack direction="row" spacing={1}>
                <Button variant="outlined" onClick={handleReload}>
                  再読み込み
                </Button>
                <Button variant="contained" onClick={() => setOpen(false)}>
                  閉じる
                </Button>
              </Stack>
            </DialogTitle>

            <DialogContent
              dividers
              sx={{
                p: 0,
                background: "#fff"
              }}
            >
              <iframe
                key={previewKey}
                title="modal-preview"
                srcDoc={srcDoc}
                style={{
                  width: "100%",
                  height: "100%",
                  minHeight: "75vh",
                  border: "none",
                  display: "block",
                  background: "#fff"
                }}
              />
            </DialogContent>
          </Dialog>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
