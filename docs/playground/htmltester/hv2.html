function clampValue(value, min, max, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.min(max, Math.max(min, n));
}

function Icon({ name, size = 20, style, className }) {
  return (
    <span
      className={`material-icons ${className || ""}`}
      style={{ fontSize: size, lineHeight: 1, ...style }}
    >
      {name}
    </span>
  );
}

function normalizeEditorMode(mode) {
  return mode === EDITOR_MODES.MARKDOWN ? EDITOR_MODES.MARKDOWN : EDITOR_MODES.HTML;
}

function inferEditorMode(name, code, explicitMode) {
  const n = String(name || "").toLowerCase();
  const raw = String(code || "");
  const c = raw.trimStart();
  const lower = c.toLowerCase();

  if (/\.(html?|xhtml)$/i.test(n)) return EDITOR_MODES.HTML;
  if (/\.(md|markdown|mmd)$/i.test(n)) return EDITOR_MODES.MARKDOWN;

  if (
    lower.startsWith("<!doctype html") ||
    lower.startsWith("<html") ||
    lower.startsWith("<head") ||
    lower.startsWith("<body") ||
    lower.startsWith("<script") ||
    lower.startsWith("<style") ||
    /^<(div|section|main|article|header|footer|nav|p|h[1-6]|span|button|input|form|canvas|svg|table|ul|ol|li)\b/i.test(c)
  ) {
    return EDITOR_MODES.HTML;
  }

  if (/^#\s+/.test(c) || /```mermaid/i.test(c) || /^[-*+]\s+/m.test(c) || /^>\s+/m.test(c)) {
    return EDITOR_MODES.MARKDOWN;
  }

  return explicitMode ? normalizeEditorMode(explicitMode) : EDITOR_MODES.MARKDOWN;
}

function extensionForMode(mode) {
  return normalizeEditorMode(mode) === EDITOR_MODES.MARKDOWN ? ".md" : ".html";
}

function renameForMode(name, mode) {
  const ext = extensionForMode(mode);
  const cleaned = String(name || (mode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html")).trim();
  if (/\.(html?|md|markdown|mmd)$/i.test(cleaned)) {
    return cleaned.replace(/\.(html?|md|markdown|mmd)$/i, ext);
  }
  return cleaned + ext;
}

let tabIdCounter = 0;
function newEditorTabId() {
  return `editor-tab-${Date.now()}-${++tabIdCounter}`;
}

function createEditorTab(name, code, mode) {
  const now = new Date().toISOString();
  const resolvedMode = normalizeEditorMode(mode || inferEditorMode(name, code));
  return {
    id: newEditorTabId(),
    name: name || (resolvedMode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html"),
    code: typeof code === "string" ? code : (resolvedMode === EDITOR_MODES.MARKDOWN ? DEFAULT_MARKDOWN : DEFAULT_HTML),
    mode: resolvedMode,
    createdAt: now,
    updatedAt: now,
  };
}

function getUniqueTabName(tabs, baseName = "untitled.html") {
  const names = new Set((tabs || []).map(t => t.name));
  if (!names.has(baseName)) return baseName;

  const dot = baseName.lastIndexOf(".");
  const stem = dot > 0 ? baseName.slice(0, dot) : baseName;
  const ext = dot > 0 ? baseName.slice(dot) : "";

  for (let i = 2; i < 1000; i++) {
    const candidate = `${stem}-${i}${ext}`;
    if (!names.has(candidate)) return candidate;
  }
  return `${stem}-${Date.now()}${ext}`;
}

function safeDownloadFileName(name) {
  const cleaned = String(name || "output.html").replace(/[\\/:*?"<>|]+/g, "_").trim();
  return cleaned || "output.html";
}

function validateSettings(s) {
  if (!s || typeof s !== "object") return { ...DEFAULT_SETTINGS };
  return {
    fontSize: typeof s.fontSize === "number" && s.fontSize >= 10 && s.fontSize <= 24 ? s.fontSize : DEFAULT_SETTINGS.fontSize,
    darkMode: typeof s.darkMode === "boolean" ? s.darkMode : DEFAULT_SETTINGS.darkMode,
    appDarkMode: typeof s.appDarkMode === "boolean" ? s.appDarkMode : DEFAULT_SETTINGS.appDarkMode,
    previewDarkMode: typeof s.previewDarkMode === "boolean" ? s.previewDarkMode : DEFAULT_SETTINGS.previewDarkMode,
    wordWrap: typeof s.wordWrap === "boolean" ? s.wordWrap : DEFAULT_SETTINGS.wordWrap,
    highlightMode: ["plain", "prism"].includes(s.highlightMode) ? s.highlightMode : DEFAULT_SETTINGS.highlightMode,
    previewScale: typeof s.previewScale === "number" && s.previewScale >= 25 && s.previewScale <= 200 ? s.previewScale : DEFAULT_SETTINGS.previewScale,
    previewWidth: typeof s.previewWidth === "string" ? s.previewWidth : DEFAULT_SETTINGS.previewWidth,
    splitRatio: typeof s.splitRatio === "number" && s.splitRatio >= 0.15 && s.splitRatio <= 0.85 ? s.splitRatio : DEFAULT_SETTINGS.splitRatio,
  };
}

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const rawSettings = localStorage.getItem(STORAGE_SETTINGS_KEY);
    const settings = validateSettings(rawSettings ? JSON.parse(rawSettings) : DEFAULT_SETTINGS);
    const parsed = raw ? JSON.parse(raw) : null;

    if (parsed && Array.isArray(parsed.tabs) && parsed.tabs.length) {
      return {
        tabs: parsed.tabs.slice(0, MAX_EDITOR_TABS).map(t => ({
          ...createEditorTab(t.name, t.code, t.mode),
          id: typeof t.id === "string" ? t.id : newEditorTabId(),
          createdAt: t.createdAt || new Date().toISOString(),
          updatedAt: t.updatedAt || new Date().toISOString(),
        })),
        activeTabId: parsed.activeTabId,
        settings,
      };
    }

    const code = typeof parsed?.code === "string" ? parsed.code : DEFAULT_HTML;
    const tab = createEditorTab("index.html", code, EDITOR_MODES.HTML);
    return { tabs: [tab], activeTabId: tab.id, settings };
  } catch {
    const tab = createEditorTab("index.html", DEFAULT_HTML, EDITOR_MODES.HTML);
    return { tabs: [tab], activeTabId: tab.id, settings: { ...DEFAULT_SETTINGS } };
  }
}

function saveState(tabs, activeTabId, settings) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version: 2,
      updatedAt: new Date().toISOString(),
      tabs,
      activeTabId,
      code: tabs.find(t => t.id === activeTabId)?.code || tabs[0]?.code || "",
    }));
    localStorage.setItem(STORAGE_SETTINGS_KEY, JSON.stringify(settings));
  } catch {}
}

function useDebounce(value, delay) {
  const [d, setD] = useState(value);
  useEffect(() => {
    const t = setTimeout(() => setD(value), delay);
    return () => clearTimeout(t);
  }, [value, delay]);
  return d;
}

function useSplitPane(containerRef, isHorizontal, initialRatio) {
  const [ratio, setRatio] = useState(initialRatio ?? RATIO_DEFAULT);
  const [dragging, setDragging] = useState(false);
  const draggingRef = useRef(false);

  const onPointerDown = useCallback((e) => {
    e.preventDefault();
    draggingRef.current = true;
    setDragging(true);
    e.currentTarget.setPointerCapture?.(e.pointerId);
  }, []);

  const onPointerMove = useCallback((e) => {
    if (!draggingRef.current || !containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const r = isHorizontal
      ? (e.clientX - rect.left) / rect.width
      : (e.clientY - rect.top) / rect.height;
    setRatio(Math.min(RATIO_MAX, Math.max(RATIO_MIN, r)));
  }, [containerRef, isHorizontal]);

  const onPointerUp = useCallback(() => {
    draggingRef.current = false;
    setDragging(false);
  }, []);

  const onDoubleClick = useCallback(() => setRatio(RATIO_DEFAULT), []);

  return {
    ratio,
    setRatio,
    handleProps: { onPointerDown, onPointerMove, onPointerUp, onDoubleClick },
    dragging,
  };
}

function SplitHandle({ isHorizontal, handleProps, dragging, uiColors }) {

    </Box>
  );
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function buildHtmlSrcDoc(html) {
  const content = (html || "").trim();
  if (!content) return EMPTY_HTML;
  if (content.includes("<head>")) return content.replace("<head>", "<head>" + CONSOLE_INTERCEPT);
  if (content.includes("<head ")) return content.replace(/<head([^>]*)>/i, function(m) { return m + CONSOLE_INTERCEPT; });
  return CONSOLE_INTERCEPT + content;
}

function createMarkdownRenderer() {
  const md = window.__HT_MD__?.marked;
  if (!md?.Renderer) return null;
  const renderer = new md.Renderer();

  renderer.code = function(codeOrToken, infostring) {
    const isToken = codeOrToken && typeof codeOrToken === "object";
    const text = isToken ? codeOrToken.text : codeOrToken;
    const lang = String((isToken ? codeOrToken.lang : infostring) || "").trim().split(/\s+/)[0].toLowerCase();

    if (lang === "mermaid") {
      return `<div class="mermaid">${escapeHtml(text)}</div>`;
    }

    const cls = lang ? ` class="language-${escapeHtml(lang)}"` : "";
    return `<pre><code${cls}>${escapeHtml(text)}</code></pre>`;
  };

  return renderer;
}

    table { border-collapse:collapse; width:100%; overflow:auto; display:block; }
    th,td { border:1px solid ${dark ? "#313244" : "#d0d7de"}; padding:6px 10px; }
    img,svg { max-width:100%; height:auto; }
    .mermaid {
      display:flex;

      width:100%;

    }

    }
  </style>`;
}

function buildMarkdownSrcDoc(markdown, options = {}) {
  const content = String(markdown || "").trim();
  const dark = Boolean(options.darkMode);
  const md = window.__HT_MD__?.marked;
  const purifier = window.__HT_MD__?.DOMPurify;

  if (!content) {
    return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />${markdownPreviewStyle(dark)}</head><body><main class="markdown-body empty">Markdown を貼り付けてください</main></body></html>`;
  }

  if (!md?.parse || !purifier?.sanitize) {
    const msg = "Markdownライブラリが未ロードです。CDNまたはネットワークを確認してください。";
    return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />${markdownPreviewStyle(dark)}</head><body>${CONSOLE_INTERCEPT}<main class="markdown-body"><h1>Markdown Preview Error</h1><p>${escapeHtml(msg)}</p></main><script>console.error(${JSON.stringify(msg)});<\/script></body></html>`;
  }

  let rendered = "";
  try {
    rendered = md.parse(content, {
      gfm: true,
      breaks: false,
      mangle: false,
      headerIds: false,
      renderer: createMarkdownRenderer() || undefined,
    });
  } catch (e) {
    rendered = `<h1>Markdown Parse Error</h1><pre>${escapeHtml(e.message || String(e))}</pre>`;
  }

  const safeHtml = purifier.sanitize(rendered, {
    ADD_TAGS: ["details", "summary"],
    ADD_ATTR: ["class", "id", "target", "rel"],
  });

  const mermaidTheme = dark ? "dark" : "default";
  const mermaidUrl = window.__HT_MD__?.mermaidUrl || "https://esm.sh/mermaid@11.15.0";

  // Mermaidは親ページではimportせず、Preview iframe内で必要時のみ1回importする。
  const mermaidRunner = `<script type="module">
import mermaid from ${JSON.stringify(mermaidUrl)};
try {
  mermaid.initialize({
    startOnLoad: false,
    securityLevel: "strict",
    theme: ${JSON.stringify(mermaidTheme)}
  });
  await mermaid.run({ querySelector: ".mermaid" });
} catch (e) {
  console.error("Mermaid render error:", e && e.message ? e.message : e);
}
<\/script>`;

  return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  ${markdownPreviewStyle(dark)}
</head>
<body>
  ${CONSOLE_INTERCEPT}
  <main class="markdown-body">${safeHtml}</main>
  ${mermaidRunner}
</body>
</html>`;
}

function buildSrcDoc(content, mode = EDITOR_MODES.HTML, options = {}) {
  return normalizeEditorMode(mode) === EDITOR_MODES.MARKDOWN
    ? buildMarkdownSrcDoc(content, options)
    : buildHtmlSrcDoc(content);
}

const EDITOR_FONT = "ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
const LINE_HEIGHT_RATIO = 1.65;

function CodeEditor({ value, onChange, fontSize, darkMode, wordWrap, highlightMode, perfMode = "normal", mode = EDITOR_MODES.HTML }) {
  const hostRef = useRef(null);
  const viewRef = useRef(null);
  const valueRef = useRef(value);
  const onChangeRef = useRef(onChange);
  const [metrics, setMetrics] = useState(() => ({
    line: 1,
    col: 1,
    lineCount: String(value || "").split("\n").length,
    charCount: String(value || "").length,
    selCount: 0,
  }));

  useEffect(() => { onChangeRef.current = onChange; }, [onChange]);
  useEffect(() => { valueRef.current = value; }, [value]);

  const updateMetrics = useCallback((state) => {
    const head = state.selection.main.head;
    const line = state.doc.lineAt(head);
    const selCount = Math.abs(state.selection.main.to - state.selection.main.from);
    setMetrics({
      line: line.number,
      col: head - line.from + 1,
      lineCount: state.doc.lines,
      charCount: state.doc.length,
      selCount,
    });
  }, []);

  useEffect(() => {
    if (!hostRef.current || !window.__HT_CM__?.EditorView) return;

    const {
      EditorView: CMEditorView,
      basicSetup: CMBasicSetup,
      cmHtml,
      cmMarkdown,
      oneDark,
    } = window.__HT_CM__;

    const updateListener = CMEditorView.updateListener.of((update) => {
      if (update.docChanged) {
        const next = update.state.doc.toString();
        valueRef.current = next;
        onChangeRef.current(next);
      }
      if (update.docChanged || update.selectionSet || update.focusChanged) {
        updateMetrics(update.state);
      }
    });

    const baseTheme = CMEditorView.theme({
      "&": {
        height: "100%",
        fontSize: `${fontSize}px`,
        backgroundColor: darkMode ? "#1e1e2e" : "#ffffff",
        color: darkMode ? "#cdd6f4" : "#1a1a2e",
      },
      ".cm-scroller": {
        fontFamily: EDITOR_FONT,
        lineHeight: String(LINE_HEIGHT_RATIO),
      },
      ".cm-content": {
        fontFamily: EDITOR_FONT,
        minHeight: "100%",
        padding: "12px 0",
      },
      ".cm-line": {
        padding: "0 14px",
      },
      ".cm-gutters": {
        fontFamily: EDITOR_FONT,
        borderRight: darkMode ? "1px solid #313244" : "1px solid #e0e3e8",
        backgroundColor: darkMode ? "#181825" : "#f5f6f8",
        color: darkMode ? "#8b90a8" : "#7b8190",
      },
      ".cm-activeLine": {
        backgroundColor: darkMode ? "rgba(203,166,247,0.07)" : "rgba(25,118,210,0.055)",
      },
      ".cm-activeLineGutter": {
        backgroundColor: darkMode ? "rgba(203,166,247,0.08)" : "rgba(25,118,210,0.075)",
        color: darkMode ? "#cdd6f4" : "#1976d2",
      },
      ".cm-searchMatch": {
        outline: "1px solid rgba(245,158,11,0.7)",
      },
    }, { dark: darkMode });

    const resolvedMode = normalizeEditorMode(mode);
    const languageExt = (highlightMode === "plain" || perfMode === "huge")
      ? []
      : (resolvedMode === EDITOR_MODES.MARKDOWN && cmMarkdown ? cmMarkdown() : cmHtml());
    const wrapExt = wordWrap ? CMEditorView.lineWrapping : [];
    const darkExt = darkMode && oneDark ? oneDark : [];

    const view = new CMEditorView({
      doc: valueRef.current || "",
      extensions: [
        CMBasicSetup,
        languageExt,
        wrapExt,
        darkExt,
        baseTheme,
        updateListener,
      ],
      parent: hostRef.current,
    });

    viewRef.current = view;
    updateMetrics(view.state);

    return () => {
      view.destroy();
      if (viewRef.current === view) viewRef.current = null;
    };
  }, [fontSize, darkMode, wordWrap, highlightMode, perfMode, mode, updateMetrics]);

  useEffect(() => {
    const view = viewRef.current;
    if (!view) return;
    const current = view.state.doc.toString();
    if (value === current) return;
    view.dispatch({ changes: { from: 0, to: current.length, insert: value || "" } });
  }, [value]);

  const sizeKB = (new TextEncoder().encode(value || "").length / 1024).toFixed(1);
  const bg = darkMode ? "#1e1e2e" : "#fff";
  const fg = darkMode ? "#cdd6f4" : "#1a1a2e";
  const statusBg = darkMode ? "#11111b" : "#f0f2f5";
  const statusFg = darkMode ? "#aeb4cc" : "#7b8190";

  return (
    <Box sx={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0, background: bg, color: fg, overflow: "hidden" }}>
      <Box ref={hostRef} sx={{ flex: 1, minHeight: 0, overflow: "hidden", "& .cm-editor": { height: "100%" } }} />
      <Box sx={{ height: 24, flexShrink: 0, display: "flex", alignItems: "center", gap: 1.5, px: 1.5, background: statusBg, borderTop: `1px solid ${darkMode ? "#313244" : "#e0e3e8"}`, color: statusFg, fontSize: 11, fontFamily: EDITOR_FONT }}>
        <span>行 {metrics.line}, 列 {metrics.col}</span>
        <span>{metrics.lineCount.toLocaleString()} 行</span>
        <span>{metrics.charCount.toLocaleString()} 文字</span>
        {metrics.selCount > 0 && <span>選択 {metrics.selCount.toLocaleString()}</span>}
        <Box sx={{ flex: 1 }} />
        {perfMode !== "normal" && <span>{perfMode === "huge" ? "超大容量モード" : "大容量モード"}</span>}
        <span>{sizeKB} KB</span>
        <span>{normalizeEditorMode(mode) === EDITOR_MODES.MARKDOWN ? "Markdown" : "HTML"}</span>
        <span>CodeMirror</span>
      </Box>
    </Box>
  );
}

function PreviewFrame({ srcDoc, previewKey, width, scale, darkMode }) {
  const constrained = width !== "100%";
  const s = (scale || 100) / 100;
  const iframeW = s !== 1 ? `${100 / s}%` : "100%";
  const iframeH = s !== 1 ? `${100 / s}%` : "100%";
  const outerBg = darkMode
    ? (constrained ? "#2a2a3e" : "#1e1e2e")
    : (constrained ? "#dde1e8" : (s < 1 ? "#e8eaf0" : "#fff"));
  const innerBg = darkMode ? "#1e1e2e" : "#fff";

  return (
    <Box sx={{ flex: 1, overflow: "auto", background: outerBg, display: "flex", flexDirection: "column", p: constrained ? 1 : 0 }}>
      <Box sx={{
        width,
        mx: "auto",
        flex: 1,
        border: constrained ? `1px solid ${darkMode ? "#444" : "#c8cdd6"}` : "none",
        borderRadius: constrained ? 1 : 0,
        overflow: "hidden",
        background: innerBg,
        transition: "width 0.25s ease",
        minHeight: 0,
        position: "relative",
      }}>
        <Box sx={{
          width: iframeW,
          height: iframeH,
          transformOrigin: "top left",
          transform: s !== 1 ? `scale(${s})` : "none",
          position: "absolute",
          top: 0,
          left: 0,
        }}>
          <iframe
            key={previewKey}
            title="preview"
            srcDoc={srcDoc}
            sandbox="allow-scripts allow-forms allow-popups"
            style={{ width: "100%", height: "100%", minHeight: 200, border: "none", display: "block" }}
          />
        </Box>
      </Box>
    </Box>
  );
}

function ConsoleDialog({ open, onClose, logs, onClear }) {
  const copyAll = useCallback(async () => {
    const text = logs.map(l => `[${l.level.toUpperCase()}] ${new Date(l.ts).toLocaleTimeString()} ${l.msg}`).join("\n");
    try { await navigator.clipboard.writeText(text); } catch {}
  }, [logs]);

  return (
    <Dialog open={open} onClose={onClose} maxWidth="md" fullWidth PaperProps={{ sx: { borderRadius: 3, height: "70vh", display: "flex", flexDirection: "column" } }}>
      <DialogTitle sx={{ py: 1.5, display: "flex", alignItems: "center", gap: 1, borderBottom: "1px solid #e0e0e0" }}>
        <Icon name="terminal" size={18} />
        <Typography variant="subtitle1" fontWeight={700} sx={{ flex: 1 }}>デバッグコンソール</Typography>
        <Chip label={`${logs.length} 件`} size="small" sx={{ fontSize: 11 }} />
      </DialogTitle>

      <DialogContent sx={{ p: 0, overflow: "auto", flex: 1, background: "#fafafa" }}>
        {logs.length === 0 ? (
          <Box sx={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "#aaa" }}>
            <Typography variant="body2">ログはありません</Typography>
          </Box>
        ) : (
          <Box sx={{ fontFamily: EDITOR_FONT, fontSize: 12 }}>
            {logs.map((log, i) => (
              <Box key={i} sx={{
                display: "flex",
                gap: 1,
                px: 1.5,
                py: 0.6,
                borderBottom: "1px solid rgba(0,0,0,0.06)",
                background: log.level === "error" ? "#ffebee" : log.level === "warn" ? "#fff8e1" : "#fff",
              }}>
                <Typography variant="caption" sx={{ color: "#999", minWidth: 68, fontFamily: "inherit" }}>{new Date(log.ts).toLocaleTimeString()}</Typography>
                <Typography component="pre" sx={{ m: 0, fontFamily: "inherit", whiteSpace: "pre-wrap", wordBreak: "break-all", flex: 1 }}>{log.msg}</Typography>
              </Box>
            ))}
          </Box>
        )}
      </DialogContent>

      <DialogActions sx={{ px: 2, py: 1, borderTop: "1px solid #e0e0e0", gap: 1 }}>
        <Button size="small" onClick={copyAll} variant="outlined" disabled={logs.length === 0}>全コピー</Button>
        <Button size="small" onClick={onClear} variant="outlined" color="error" disabled={logs.length === 0}>クリア</Button>
        <Box sx={{ flex: 1 }} />
        <Button size="small" onClick={onClose} variant="contained">閉じる</Button>
      </DialogActions>
    </Dialog>
  );
}

function App() {
  const theme = useMemo(() => createTheme({
    palette: { mode: "light", primary: { main: "#1976d2" } },
    typography: { fontFamily: '"Roboto","Helvetica","Arial",sans-serif' },
    shape: { borderRadius: 8 },
  }), []);

  const isWide = useMediaQuery(theme.breakpoints.up("md"));
  const isMobile = useMediaQuery(theme.breakpoints.down("sm"));

  const initial = useMemo(loadSavedState, []);
  const firstActive = initial.tabs.find(t => t.id === initial.activeTabId) || initial.tabs[0];

  const [tabs, setTabs] = useState(initial.tabs);
  const [activeTabId, setActiveTabId] = useState(firstActive?.id || null);
  const [code, setCodeState] = useState(firstActive?.code || DEFAULT_HTML);

  const [fontSize, setFontSize] = useState(initial.settings.fontSize);
  const [darkMode, setDarkMode] = useState(initial.settings.darkMode);
  const [appDarkMode, setAppDarkMode] = useState(initial.settings.appDarkMode);
  const [previewDarkMode, setPreviewDarkMode] = useState(initial.settings.previewDarkMode);
  const [wordWrap, setWordWrap] = useState(initial.settings.wordWrap);
  const [highlightMode, setHighlightMode] = useState(initial.settings.highlightMode);
  const [previewScale, setPreviewScale] = useState(initial.settings.previewScale);
  const [previewWidth, setPreviewWidth] = useState(initial.settings.previewWidth);

  const [mobileView, setMobileView] = useState("editor");
  const [fullscreen, setFullscreen] = useState("none");
  const [previewKey, setPreviewKey] = useState(0);
  const [consoleLogs, setConsoleLogs] = useState([]);
  const [consoleOpen, setConsoleOpen] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [tabRename, setTabRename] = useState(null);
  const [snackbar, setSnackbar] = useState({ open: false, msg: "" });

  const containerRef = useRef(null);
  const { ratio, setRatio, handleProps, dragging } = useSplitPane(containerRef, isWide, initial.settings.splitRatio);

  const activeTab = useMemo(() => tabs.find(t => t.id === activeTabId) || tabs[0], [tabs, activeTabId]);
  const activeMode = inferEditorMode(activeTab?.name, code, activeTab?.mode);

  const uiDark = appDarkMode;
  const uiColors = useMemo(() => ({
    appBg: uiDark ? "#0f172a" : "#f0f2f5",
    paneBg: uiDark ? "#111827" : "#ffffff",
    headerBg: uiDark ? "#1f2937" : "#f8f9fb",
    tabBg: uiDark ? "#111827" : "#eef1f6",
    tabInactiveBg: uiDark ? "rgba(255,255,255,0.045)" : "rgba(255,255,255,0.6)",
    border: uiDark ? "#374151" : "#e0e3e8",
    text: uiDark ? "#e5e7eb" : "#1a1a2e",
    muted: uiDark ? "#9ca3af" : "#6b7280",
    icon: uiDark ? "#e5e7eb" : "#4b5563",
    iconMuted: uiDark ? "#9ca3af" : "#7b8190",
    iconActive: uiDark ? "#93c5fd" : "#1976d2",
    hover: uiDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.04)",
    selectedBg: uiDark ? "rgba(147,197,253,0.16)" : "rgba(25,118,210,0.1)",
  }), [uiDark]);

  const setCode = useCallback((nextCode) => {
    setCodeState(prev => {
      const value = typeof nextCode === "function" ? nextCode(prev) : nextCode;
      setTabs(currentTabs => currentTabs.map(tab => (
        tab.id === activeTabId
          ? { ...tab, code: String(value ?? ""), updatedAt: new Date().toISOString() }
          : tab
      )));
      return String(value ?? "");
    });
  }, [activeTabId]);

  const lineCountForPerf = useMemo(() => code.split("\n").length, [code]);
  const isLargeCode = code.length > PERF_LIMITS.LARGE_CODE_CHARS || lineCountForPerf > PERF_LIMITS.LARGE_CODE_LINES;
  const isHugeCode = code.length > PERF_LIMITS.HUGE_CODE_CHARS || lineCountForPerf > PERF_LIMITS.HUGE_CODE_LINES;
  const perfMode = isHugeCode ? "huge" : isLargeCode ? "large" : "normal";
  const previewDelay = isHugeCode ? PERF_LIMITS.PREVIEW_DELAY_HUGE : isLargeCode ? PERF_LIMITS.PREVIEW_DELAY_LARGE : PERF_LIMITS.PREVIEW_DELAY_NORMAL;
  const effectiveHighlightMode = isLargeCode ? "plain" : highlightMode;
  const effectiveWordWrap = isLargeCode ? false : wordWrap;

  // 改修1: iPhone Safariの自動ズーム対策。
  // 16px未満の編集領域フォーカスで発生するページ拡大を防ぐ。
  const mobileSafeEditorFontSize = isMobile ? Math.max(fontSize, 16) : fontSize;

  // 改修2: スマホ時はPCで保存されたpreviewScaleを持ち込まない。
  // プレビューボタンが効かないように見える原因になる拡大状態を遮断する。
  const mobileSafePreviewScale = isMobile ? 100 : previewScale;

  const debouncedCode = useDebounce(code, previewDelay);
  const srcDoc = useMemo(
    () => buildSrcDoc(debouncedCode, activeMode, { darkMode: previewDarkMode }),
    [debouncedCode, activeMode, previewDarkMode, previewKey]
  );

  useEffect(() => {
    const onMsg = (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type === "__ht_console__") {
        setConsoleLogs(prev => [
          ...prev.slice(-299),
          { level: data.level || "log", msg: String(data.msg || ""), ts: data.ts || Date.now() },
        ]);
      }
      if (data.type === "__ht_dialog__") {
        setSnackbar({ open: true, msg: `${data.title || "Preview"}: ${data.message || ""}` });
      }
    };
    window.addEventListener("message", onMsg);
    return () => window.removeEventListener("message", onMsg);
  }, []);

  useEffect(() => {
    const settings = {
      fontSize,
      darkMode,
      appDarkMode,
      previewDarkMode,
      wordWrap,
      highlightMode,
      // 改修3: スマホで保存する場合も100へ戻し、次回の拡大持ち越しを防ぐ。
      previewScale: isMobile ? 100 : previewScale,
      previewWidth,
      splitRatio: ratio,
    };
    const timer = setTimeout(() => saveState(tabs, activeTabId, settings), 600);
    return () => clearTimeout(timer);
  }, [tabs, activeTabId, fontSize, darkMode, appDarkMode, previewDarkMode, wordWrap, highlightMode, previewScale, previewWidth, ratio, isMobile]);

  const toast = (msg) => setSnackbar({ open: true, msg });

  const switchTab = (id) => {
    if (id === activeTabId) return;
    const synced = tabs.map(t => t.id === activeTabId ? { ...t, code, updatedAt: new Date().toISOString() } : t);
    const target = synced.find(t => t.id === id);
    if (!target) return;
    setTabs(synced);
    setActiveTabId(id);
    setCodeState(target.code);
    setConsoleLogs([]);
  };

  const addTab = (mode = EDITOR_MODES.HTML) => {
    if (tabs.length >= MAX_EDITOR_TABS) {
      toast(`コードタブは最大 ${MAX_EDITOR_TABS} 件です`);
      return;
    }
    const resolvedMode = normalizeEditorMode(mode);
    const baseName = resolvedMode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html";
    const name = getUniqueTabName(tabs, baseName);
    const tab = createEditorTab(name, resolvedMode === EDITOR_MODES.MARKDOWN ? DEFAULT_MARKDOWN : DEFAULT_HTML, resolvedMode);
    const synced = tabs.map(t => t.id === activeTabId ? { ...t, code, updatedAt: new Date().toISOString() } : t);
    setTabs([...synced, tab]);
    setActiveTabId(tab.id);
    setCodeState(tab.code);
    setConsoleLogs([]);
    toast(`「${tab.name}」を追加しました`);
  };

  const closeTab = (id) => {
    if (tabs.length <= 1) {
      toast("最後のタブは閉じられません");
      return;
    }
    const synced = tabs.map(t => t.id === activeTabId ? { ...t, code, updatedAt: new Date().toISOString() } : t);
    const idx = synced.findIndex(t => t.id === id);
    const nextTabs = synced.filter(t => t.id !== id);
    const nextActive = activeTabId === id ? (nextTabs[Math.max(0, idx - 1)] || nextTabs[0]) : nextTabs.find(t => t.id === activeTabId);
    setTabs(nextTabs);
    setActiveTabId(nextActive.id);
    setCodeState(nextActive.code);
    setConsoleLogs([]);
  };

  const duplicateTab = () => {
    if (tabs.length >= MAX_EDITOR_TABS) {
      toast(`コードタブは最大 ${MAX_EDITOR_TABS} 件です`);
      return;
    }
    const synced = tabs.map(t => t.id === activeTabId ? { ...t, code, updatedAt: new Date().toISOString() } : t);
    const src = synced.find(t => t.id === activeTabId) || synced[0];
    const tab = createEditorTab(getUniqueTabName(synced, src.name), src.code, src.mode);
    setTabs([...synced, tab]);
    setActiveTabId(tab.id);
    setCodeState(tab.code);
    setConsoleLogs([]);
  };

  const applyTabRename = () => {
    if (!tabRename) return;
    const name = safeDownloadFileName(tabRename.name || "");
    if (!name) {
      setTabRename(null);
      return;
    }
    setTabs(currentTabs => currentTabs.map(t => (
      t.id === tabRename.id
        ? { ...t, name, mode: inferEditorMode(name, t.code, t.mode), updatedAt: new Date().toISOString() }
        : t
    )));
    setTabRename(null);
    toast("タブ名を変更しました");
  };

  const changeTabMode = (mode) => {
    const resolved = normalizeEditorMode(mode);
    setTabs(currentTabs => currentTabs.map(t => (
      t.id === activeTabId
        ? { ...t, mode: resolved, name: renameForMode(t.name, resolved), updatedAt: new Date().toISOString() }
        : t
    )));
    toast(resolved === EDITOR_MODES.MARKDOWN ? "Markdownに切替" : "HTMLに切替");
  };

  const copyCode = async () => {
    try {
      await navigator.clipboard.writeText(code);
      toast("コピーしました");
    } catch {
      toast("コピーに失敗しました");
    }
  };

  const downloadCode = () => {
    const name = safeDownloadFileName(activeTab?.name || (activeMode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html"));
    const blob = new Blob([code], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = name;
    a.click();
    URL.revokeObjectURL(url);
  };

  const clearEditor = () => {
    setCode("");
    setConfirmClear(false);
    toast("クリアしました");
  };

  const resetAll = () => {
    try {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(STORAGE_SETTINGS_KEY);
    } catch {}
    const tab = createEditorTab("index.html", DEFAULT_HTML, EDITOR_MODES.HTML);
    setTabs([tab]);
    setActiveTabId(tab.id);
    setCodeState(tab.code);
    setFontSize(DEFAULT_SETTINGS.fontSize);
    setDarkMode(DEFAULT_SETTINGS.darkMode);
    setAppDarkMode(DEFAULT_SETTINGS.appDarkMode);
    setPreviewDarkMode(DEFAULT_SETTINGS.previewDarkMode);
    setWordWrap(DEFAULT_SETTINGS.wordWrap);
    setHighlightMode(DEFAULT_SETTINGS.highlightMode);
    setPreviewScale(DEFAULT_SETTINGS.previewScale);
    setPreviewWidth(DEFAULT_SETTINGS.previewWidth);
    setRatio(DEFAULT_SETTINGS.splitRatio);
    setConsoleLogs([]);
    toast("初期化しました");
  };

  const toggleFullscreen = (pane) => setFullscreen(v => v === pane ? "none" : pane);

  const showEditor = fullscreen !== "preview";
  const showPreview = fullscreen !== "editor";
  const showEditorPane = isMobile
    ? (fullscreen === "editor" || (fullscreen === "none" && mobileView === "editor"))
    : showEditor;
  const showPreviewPane = isMobile
    ? (fullscreen === "preview" || (fullscreen === "none" && mobileView === "preview"))
    : showPreview;
  const showHandle = !isMobile && fullscreen === "none" && showEditor && showPreview;
  const editorSize = isMobile ? "100%" : fullscreen === "editor" ? "100%" : fullscreen === "preview" ? "0%" : `${ratio * 100}%`;
  const previewSize = isMobile ? "100%" : fullscreen === "preview" ? "100%" : fullscreen === "editor" ? "0%" : `${(1 - ratio) * 100}%`;
  const sizeKey = isWide ? "width" : "height";

  return (
    <ThemeProvider theme={theme}>
      <CssBaseline />
      <Box sx={{
        display: "flex",
        flexDirection: "column",
        height: "100vh",
        overflow: "hidden",
        background: uiColors.appBg,
        color: uiColors.text,
      }}>
        <AppBar position="static" elevation={0} sx={{ background: "#1565c0", flexShrink: 0 }}>
          <Toolbar variant="dense" sx={{ minHeight: { xs: 54, sm: 52 }, gap: 0.7, px: { xs: 0.75, sm: 1.2 }, overflowX: "auto" }}>
            <Typography variant="subtitle2" fontWeight={800} sx={{ color: "#fff", flexShrink: 0, mr: 0.5 }}>
              Core Lean Secure
            </Typography>
            <Typography variant="caption" sx={{ color: "rgba(255,255,255,0.78)", flexShrink: 0 }}>
              {APP_BUILD_LABEL}
            </Typography>
            <Box sx={{ flex: 1 }} />
            <Tooltip title="保存"><IconButton size="small" onClick={() => toast("保存しました")} sx={{ color: "#fff" }}><Icon name="save" size={19} /></IconButton></Tooltip>
            <Tooltip title="コピー"><IconButton size="small" onClick={copyCode} sx={{ color: "#fff" }}><Icon name="content_copy" size={19} /></IconButton></Tooltip>
            <Tooltip title="ダウンロード"><IconButton size="small" onClick={downloadCode} sx={{ color: "#fff" }}><Icon name="download" size={19} /></IconButton></Tooltip>
            <Tooltip title="クリア"><IconButton size="small" onClick={() => setConfirmClear(true)} sx={{ color: "#fff" }}><Icon name="delete_outline" size={19} /></IconButton></Tooltip>
            <Tooltip title="Console"><IconButton size="small" onClick={() => setConsoleOpen(true)} sx={{ color: "#fff" }}><Icon name="terminal" size={19} /></IconButton></Tooltip>
            <Tooltip title={appDarkMode ? "Light UI" : "Dark UI"}>
              <IconButton size="small" onClick={() => setAppDarkMode(v => !v)} sx={{ color: "#fff" }}>
                <Icon name={appDarkMode ? "light_mode" : "dark_mode"} size={19} />
              </IconButton>
            </Tooltip>
            <Tooltip title="初期化"><IconButton size="small" onClick={resetAll} sx={{ color: "#fff" }}><Icon name="restart_alt" size={19} /></IconButton></Tooltip>
          </Toolbar>
        </AppBar>

        {isMobile && fullscreen === "none" && (
          <ToggleButtonGroup
            value={mobileView}
            exclusive
            size="small"
            // 改修4: nullや未知値を無視し、スマホのPreviewボタン切替を明示化。
            onChange={(_, v) => {
              if (v === "editor" || v === "preview") {
                setMobileView(v);
              }
            }}
            sx={{
              m: 0.6,
              alignSelf: "center",
              background: uiColors.headerBg,
              border: `1px solid ${uiColors.border}`,
              borderRadius: 1.5,
              "& .MuiToggleButton-root": {
                color: uiColors.icon,
                borderColor: uiColors.border,
              },
              "& .Mui-selected": {
                color: uiColors.iconActive,
                backgroundColor: uiColors.selectedBg,
              },
              "& .MuiToggleButton-root:hover": {
                backgroundColor: uiColors.hover,
              },
            }}
          >
            <ToggleButton value="editor">
              <Icon name="code" size={16} />
            </ToggleButton>
            <ToggleButton value="preview">
              <Icon name="visibility" size={16} />
            </ToggleButton>
          </ToggleButtonGroup>
        )}

        <Box
          ref={containerRef}
          sx={{
            flex: 1,
            minHeight: 0,
            display: "flex",
            flexDirection: isWide ? "row" : "column",
            overflow: "hidden",
          }}
        >
          {showEditorPane && (
            <Box sx={{
              [sizeKey]: editorSize,
              flexShrink: 0,
              minWidth: isWide ? 0 : "100%",
              minHeight: isWide ? "100%" : 0,
              display: "flex",
              flexDirection: "column",
              overflow: "hidden",
              background: uiColors.paneBg,
            }}>
              <PaneHeader title="コード" fullscreen={fullscreen === "editor"} onToggleFullscreen={() => toggleFullscreen("editor")} uiColors={uiColors}>
                <Tooltip title="Word wrap">
                  <IconButton size="small" onClick={() => setWordWrap(v => !v)} sx={{ p: 0.4, color: wordWrap ? uiColors.iconActive : uiColors.icon }}>
                    <Icon name="wrap_text" size={16} />
                  </IconButton>
                </Tooltip>
                <Tooltip title="Highlight">
                  <IconButton size="small" onClick={() => setHighlightMode(v => v === "plain" ? "prism" : "plain")} sx={{ p: 0.4, color: highlightMode !== "plain" ? "#f59e0b" : uiColors.icon }}>
                    <Icon name="format_color_text" size={16} />
                  </IconButton>
                </Tooltip>
                <IconButton size="small" onClick={() => setFontSize(s => clampValue(s - 1, UI_LIMITS.FONT_MIN, UI_LIMITS.FONT_MAX, UI_LIMITS.FONT_DEFAULT))} sx={{ p: 0.4 }}>
                  <Icon name="text_decrease" size={15} />
                </IconButton>
                <Typography variant="caption" onClick={() => setFontSize(UI_LIMITS.FONT_DEFAULT)} sx={{ fontSize: 10, minWidth: 18, textAlign: "center", cursor: "pointer", color: uiColors.muted }}>
                  {isMobile ? mobileSafeEditorFontSize : fontSize}
                </Typography>
                <IconButton size="small" onClick={() => setFontSize(s => clampValue(s + 1, UI_LIMITS.FONT_MIN, UI_LIMITS.FONT_MAX, UI_LIMITS.FONT_DEFAULT))} sx={{ p: 0.4 }}>
                  <Icon name="text_increase" size={15} />
                </IconButton>
                <Tooltip title="Editor dark">
                  <IconButton size="small" onClick={() => setDarkMode(v => !v)} sx={{ p: 0.4 }}>
                    <Icon name={darkMode ? "light_mode" : "dark_mode"} size={16} />
                  </IconButton>
                </Tooltip>
              </PaneHeader>

              <EditorTabBar
                tabs={tabs}
                activeId={activeTabId}
                onSwitch={switchTab}
                onNew={() => addTab(EDITOR_MODES.HTML)}
                onClose={closeTab}
                onRename={(id) => {
                  const t = tabs.find(x => x.id === id);
                  if (t) setTabRename({ id, name: t.name });
                }}
                onDuplicate={duplicateTab}
                onModeChange={changeTabMode}
                activeMode={activeMode}
                uiColors={uiColors}
              />

              <CodeEditor
                value={code}
                onChange={setCode}
                fontSize={mobileSafeEditorFontSize}
                darkMode={darkMode}
                wordWrap={effectiveWordWrap}
                highlightMode={effectiveHighlightMode}
                perfMode={perfMode}
                mode={activeMode}
              />
            </Box>
          )}

          {showHandle && (
            <SplitHandle
              isHorizontal={isWide}
              handleProps={handleProps}
              dragging={dragging}
              uiColors={uiColors}
            />
          )}

          {showPreviewPane && (
            <Box sx={{
              [sizeKey]: previewSize,
              flex: fullscreen === "preview" ? 1 : "unset",
              minWidth: 0,
              minHeight: 0,
              display: "flex",
              flexDirection: "column",
              overflow: "hidden",
              background: uiColors.paneBg,
            }}>
              <PaneHeader title="プレビュー" fullscreen={fullscreen === "preview"} onToggleFullscreen={() => toggleFullscreen("preview")} uiColors={uiColors}>
                <Tooltip title="Preview dark">
                  <IconButton size="small" onClick={() => setPreviewDarkMode(v => !v)} sx={{ p: 0.4 }}>
                    <Icon name={previewDarkMode ? "light_mode" : "dark_mode"} size={16} />
                  </IconButton>
                </Tooltip>
                {!isMobile && <WidthSelector value={previewWidth} onChange={setPreviewWidth} />}
                {!isMobile && (
                  <>
                    <IconButton size="small" onClick={() => setPreviewScale(s => clampValue(s - UI_LIMITS.PREVIEW_SCALE_STEP, UI_LIMITS.PREVIEW_SCALE_MIN, UI_LIMITS.PREVIEW_SCALE_MAX, 100))} sx={{ p: 0.4 }}>
                      <Icon name="zoom_out" size={16} />
                    </IconButton>
                    <Typography variant="caption" onClick={() => setPreviewScale(100)} sx={{ fontSize: 11, minWidth: 36, textAlign: "center", cursor: "pointer", color: uiColors.muted }}>
                      {previewScale}%
                    </Typography>
                    <IconButton size="small" onClick={() => setPreviewScale(s => clampValue(s + UI_LIMITS.PREVIEW_SCALE_STEP, UI_LIMITS.PREVIEW_SCALE_MIN, UI_LIMITS.PREVIEW_SCALE_MAX, 100))} sx={{ p: 0.4 }}>
                      <Icon name="zoom_in" size={16} />
                    </IconButton>
                  </>
                )}
                <Tooltip title="再読み込み">
                  <IconButton size="small" onClick={() => setPreviewKey(k => k + 1)}>
                    <Icon name="refresh" size={17} />
                  </IconButton>
                </Tooltip>
              </PaneHeader>

              <PreviewFrame
                srcDoc={srcDoc}
                previewKey={previewKey}
                width={isMobile ? "100%" : previewWidth}
                scale={mobileSafePreviewScale}
                darkMode={previewDarkMode}
              />
            </Box>
          )}
        </Box>
      </Box>

      <ConfirmDialog
        open={confirmClear}
        title="入力内容をクリア"
        message="現在のタブの内容を削除します。"
        confirmLabel="クリア"
        onConfirm={clearEditor}
        onCancel={() => setConfirmClear(false)}
      />

      <Dialog open={Boolean(tabRename)} onClose={() => setTabRename(null)} maxWidth="xs" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}>
        <DialogTitle sx={{ fontWeight: 700, pb: 1 }}>コードタブ名を変更</DialogTitle>
        <DialogContent>
          <TextField
            autoFocus
            fullWidth
            size="small"
            value={tabRename?.name || ""}
            onChange={e => setTabRename(v => v ? { ...v, name: e.target.value } : v)}
            onKeyDown={e => { if (e.key === "Enter") applyTabRename(); }}
          />
        </DialogContent>
        <DialogActions sx={{ px: 3, pb: 2, gap: 1 }}>
          <Button onClick={() => setTabRename(null)} variant="outlined" fullWidth>キャンセル</Button>
          <Button onClick={applyTabRename} variant="contained" fullWidth>変更</Button>
        </DialogActions>
      </Dialog>

      <ConsoleDialog
        open={consoleOpen}
        onClose={() => setConsoleOpen(false)}
        logs={consoleLogs}
        onClear={() => setConsoleLogs([])}
      />

      <Snackbar
        open={snackbar.open}
        autoHideDuration={2200}
        onClose={() => setSnackbar(s => ({ ...s, open: false }))}
        message={snackbar.msg}
        anchorOrigin={{ vertical: "bottom", horizontal: "center" }}
      />
    </ThemeProvider>
  );
}

// Bootstrap
createRoot(document.getElementById("root")).render(
  <React.StrictMode>
    <App />
  </React.StrictMode>
);
  </script>

  <script type="module">
    import React from "https://esm.sh/react@19.2.0";
    import { createRoot } from "https://esm.sh/react-dom@19.2.0/client";
    import * as MaterialUI from "https://esm.sh/@mui/material@7.3.5?deps=react@19.2.0,react-dom@19.2.0";
    import { EditorView, basicSetup } from "https://esm.sh/codemirror@6.0.2";
    import { html as cmHtml } from "https://esm.sh/@codemirror/lang-html@6.4.10";
    import { markdown as cmMarkdown } from "https://esm.sh/@codemirror/lang-markdown@6.3.4";
    import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark@6.1.3";
    import { marked } from "https://esm.sh/marked@18.0.3";
    import DOMPurify from "https://esm.sh/dompurify@3.4.5";

    window.__HT_CM__ = { EditorView, basicSetup, cmHtml, cmMarkdown, oneDark };

    // Mermaid本体はここではimportしない。
    // Markdown Preview iframe内で必要時のみ1回だけimportする。
    window.__HT_MD__ = {
      marked,
      DOMPurify,
      mermaidUrl: "https://esm.sh/mermaid@11.15.0",
    };

    const CONSOLE_INTERCEPT = `<script>
(function(){
  var _send = function(level, args) {
    try {
      var msg = Array.from(args).map(function(a){
        try { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a); }
        catch(e) { return String(a); }
      }).join(' ');
      window.parent.postMessage({ type: '__ht_console__', level: level, msg: msg, ts: Date.now() }, '*');
    } catch(e){}
  };
  ['log','warn','error','info','debug'].forEach(function(m){
    var orig = console[m].bind(console);
    console[m] = function(){ orig.apply(console, arguments); _send(m, arguments); };
  });
  window.addEventListener('error', function(e){
    _send('error', [e.message + (e.filename ? ' (' + e.filename + ':' + e.lineno + ')' : '')]);
  });
  window.addEventListener('unhandledrejection', function(e){
    _send('error', ['Unhandled Promise rejection: ' + (e.reason?.message || e.reason)]);
  });
  window.alert = function(message) {
    var msg = String(message ?? '');
    _send('info', ['alert: ' + msg]);
    try { window.parent.postMessage({ type: '__ht_dialog__', title: 'Preview alert', message: msg, ts: Date.now() }, '*'); } catch(e) {}
  };
  window.confirm = function(message) {
    var msg = String(message ?? '');
    _send('warn', ['confirm() is disabled in sandboxed preview: ' + msg]);
    return false;
  };
  window.prompt = function(message, defaultValue) {
    var msg = String(message ?? '');
    _send('warn', ['prompt() is disabled in sandboxed preview: ' + msg]);
    return defaultValue == null ? null : String(defaultValue);
  };
})();
<\/script>`;

    const appCode = document.getElementById("app-code").textContent;
    const { code } = Babel.transform(appCode, { presets: ["react"] });
    const runApp = new Function(
      "React",
      "createRoot",
      "MaterialUI",
      "CONSOLE_INTERCEPT",
      code + "\n//# sourceURL=html-editor-core-lean-secure-v1-1.jsx"
    );
    runApp(React, createRoot, MaterialUI, CONSOLE_INTERCEPT);
  </script>
</body>
</html>
