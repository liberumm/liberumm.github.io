function estimateSupportAITokens(text) {
  const body = String(text || "");
  if (!body) return 0;
  const asciiWords = body.match(/[A-Za-z0-9_]+/g) || [];
  const cjkChars = body.match(/[\u3040-\u30ff\u3400-\u9fff]/g) || [];
  const symbols = body.replace(/[A-Za-z0-9_\s\u3040-\u30ff\u3400-\u9fff]/g, "").length;
  return Math.max(1, Math.round(asciiWords.length * 1.25 + cjkChars.length * 0.75 + symbols * 0.5));
}

function buildSupportAIMetrics(startedAt, endedAt, text) {
  const durationMs = Math.max(0, Math.round((endedAt || performance.now()) - (startedAt || performance.now())));
  const tokens = estimateSupportAITokens(text);
  const seconds = Math.max(0.001, durationMs / 1000);
  return {
    durationMs,
    chars: String(text || "").length,
    tokens,
    tokensPerSec: Math.round((tokens / seconds) * 10) / 10,
  };
}

function formatSupportAIDuration(ms) {
  const n = Number(ms) || 0;
  return n >= 1000 ? `${(n / 1000).toFixed(1)}s` : `${Math.round(n)}ms`;
}

function collectSupportAISources(response) {
  const sources = [];
  (response?.ragSources || []).forEach((src, i) => {
    sources.push({
      type: "RAG",
      title: src.title || `RAG Source ${i + 1}`,
      text: src.text || src.contextText || "",
      score: src.score,
    });
  });
  (response?.knowledgeSources || []).forEach((src, i) => {
    sources.push({
      type: "Knowledge",
      title: [src.subject, src.predicate, src.object].filter(Boolean).join(" ") || `Knowledge ${i + 1}`,
      text: [src.subject, src.predicate, src.object].filter(Boolean).join(" "),
      score: src.score,
    });
  });
  return sources;
}

async function supportAICopyText(text) {
  const value = String(text || "");
  if (!value) throw new Error("copy text is empty");
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(value);
      return true;
    }
  } catch {}
  const textarea = document.createElement("textarea");
  textarea.value = value;
  textarea.setAttribute("readonly", "readonly");
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  textarea.style.top = "0";
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  try {
    const ok = document.execCommand("copy");
    if (!ok) throw new Error("execCommand copy failed");
    return true;
  } finally {
    document.body.removeChild(textarea);
  }
}

function supportAIIsModelConversationMessage(msg) {
  if (!msg || String(msg.id || "").startsWith("welcome") || msg.pending) return false;
  if (!(msg.role === "user" || msg.role === "assistant")) return false;
  const text = String(msg.text || "").trim();
  if (!text) return false;
  if (msg.role === "assistant" && /^(停止しました|AI停止中|緊急停止しました|受付しました|推論準備中です|生成中です)/.test(text)) return false;
  if (msg.role === "assistant" && /(役割名の除外|JSONの不要|英語の見出しの除外|プロンプトの復唱|事実と推測を分け、知らないことは知らないと)/.test(text)) return false;
  return true;
}

function formatSupportAIConversation(messages = []) {
  const lines = (Array.isArray(messages) ? messages : [])
    .filter(msg => msg && (msg.role === "user" || msg.role === "assistant") && String(msg.text || "").trim())
    .filter(msg => !String(msg.id || "").startsWith("welcome"))
    .map(msg => {
      const role = msg.role === "user" ? "User" : "SupportAI";
      const time = msg.ts ? new Date(msg.ts).toLocaleString("ja-JP") : "";
      const metrics = msg.metrics ? ` / ${formatSupportAIDuration(msg.metrics.durationMs)} / ${msg.metrics.tokens} tok / ${msg.metrics.tokensPerSec} tok/s` : "";
      return `[${role}${time ? ` ${time}` : ""}${metrics}]\n${String(msg.text || "").trim()}`;
    })
    .join("\n\n---\n\n");
  return lines ? `SupportAI 会話ログ\n作成日時: ${new Date().toLocaleString("ja-JP")}\n\n${lines}` : "";
}

function buildSupportAIConversationContext(messages = [], limit = 10) {
  const usable = (Array.isArray(messages) ? messages : [])
    .filter(supportAIIsModelConversationMessage)
    .slice(-limit);
  if (!usable.length) return "";
  return usable.map(msg => `${msg.role === "user" ? "ユーザー" : "SupportAI"}: ${String(msg.text || "").trim()}`).join("\n\n");
}

function supportAIShouldUseConversationHistory(message) {
  const text = String(message || "").trim().toLowerCase();
  if (!text) return false;
  if (/^(続き|つづき|それ|その|これ|この|さっき|前|直前|今の|同じ|もう一度|もっと|詳しく|具体的|例を|なぜ|どうして|じゃあ|では|なら|つまり|要するに)/.test(text)) return true;
  if (/(についてもう|について詳しく|を詳しく|を続けて|の続き|前の|上の|先ほど|さっきの|直前の|今の回答|同じテーマ)/.test(text)) return true;
  return false;
}

function buildSupportAIChatMessages(messages = [], currentUserText = "", reference = null, config = DEFAULT_SUPPORT_AI_CONFIG, limit = 10) {
  const history = supportAIShouldUseConversationHistory(currentUserText)
    ? (Array.isArray(messages) ? messages : [])
      .filter(supportAIIsModelConversationMessage)
      .slice(-limit)
      .map(msg => ({ role: msg.role, content: String(msg.text || "").trim() }))
    : [];
  const referenceText = reference?.text ? `\n\n参照対象（${reference.label}）:\n${reference.text}` : "";
  return [
    { role: "system", content: supportAIBuildChatSystemContent(config) },
    ...history,
    { role: "user", content: `${String(currentUserText || "").trim()}${referenceText}` },
  ];
}

      onToast?.(reason);
      return;
    }
    const target = getTarget();
    const chatReference = chatUsesReferenceContext
      ? supportAIChatReferenceForMessage(message, target)
      : { scope: "none", text: "", range: null, label: "" };
    const ts = Date.now();
    const userMessage = {
      id: `user-${ts}-${Math.random().toString(36).slice(2)}`,
      role: "user",
      text: message,
      ts,
      scope: chatReference.scope,
    };
    const assistantId = `assistant-${ts}-${Math.random().toString(36).slice(2)}`;

      id: assistantId,

      ts: Date.now(),
      pending: true,

      metrics: null,
      sources: [],

    setChatInput("");

    run("ai-chat", async ({ signal, runId }) => {
      const startedAt = performance.now();
      updateChatMessage(assistantId, { text: "推論準備中です。初回はRuntime/モデルの読み込みに時間がかかります...", pending: true });
      const conversationContext = chatUsesMemoryContext ? buildSupportAIConversationContext(chatMessages, 10) : "";
      const prompt = [
        chatParticipantContext ? `このチャットセッションの参加メンバー設定:\n${chatParticipantContext}` : "",
        chatWorkflowContext ? `このチャットセッションの実施ステップ:\n${chatWorkflowContext}` : "",
        chatContextInstruction ? `このチャットセッションのコンテキスト設定:\n${chatContextInstruction}` : "",
        conversationContext ? `これまでの会話:\n${conversationContext}` : "",
        `今回のユーザー発言:\n${message}`,
        chatReference.text ? `参照対象（${chatReference.label}）:\n${chatReference.text}` : "",
      ].filter(Boolean).join("\n\n");
      const messages = buildSupportAIChatMessages(chatUsesMemoryContext ? chatMessages : [], message, chatReference, aiConfig, 10).map((item, index) => (
        index === 0 && (chatParticipantContext || chatWorkflowContext || chatContextInstruction)
          ? { ...item, content: `${item.content}${chatParticipantContext ? `\n\nこのセッションでは、以下のOrganization / Team / Agentの方針を会話の前提として扱ってください。\n${chatParticipantContext}` : ""}${chatWorkflowContext ? `\n\n以下の実施ステップが選択されています。未選択の場合は通常回答でよいですが、選択されている場合はこの順番で進めてください。\n${chatWorkflowContext}` : ""}${chatContextInstruction ? `\n\n以下のコンテキスト設定に従ってください。\n${chatContextInstruction}` : ""}` }
          : item
      ));
      if (!signal?.aborted) {
        updateChatMessage(assistantId, { text: "生成中です。受信した文字からこのカードに表示します...", pending: true });
      }
      let response;
      let partialText = "";
      let tokenBuffer = "";
      let tokenFlushTimer = null;
      let acceptingTokens = true;
      const canAcceptToken = () => (
        acceptingTokens &&
        !signal?.aborted &&
        activeRunIdRef.current === runId &&
        activeChatAssistantIdRef.current === assistantId
      );
      const flushPartial = () => {
        tokenFlushTimer = null;
        if (!canAcceptToken() || !tokenBuffer) return;
        partialText += tokenBuffer;
        tokenBuffer = "";
        const now = performance.now();
        updateChatMessage(assistantId, {
          text: partialText || "生成中です...",
          pending: true,
          metrics: buildSupportAIMetrics(startedAt, now, partialText),
        });
      };
      const pushPartial = (chunk) => {
        if (!canAcceptToken()) return;
        tokenBuffer += String(chunk || "");
        if (tokenFlushTimer) return;
        tokenFlushTimer = setTimeout(flushPartial, 32);
      };
      try {
        response = await ghostRuntime.AI.generate({
          prompt,
          messages,
          rag: { enabled: Boolean(aiConfig.enableRag) },
          knowledge: { enabled: Boolean(aiConfig.enableKnowledge) },
          chat: true,
          onToken: pushPartial,
        });
        flushPartial();
        acceptingTokens = false;
        if (tokenFlushTimer) {
          clearTimeout(tokenFlushTimer);
          tokenFlushTimer = null;
        }
      } catch (error) {
        acceptingTokens = false;
        if (tokenFlushTimer) {
          clearTimeout(tokenFlushTimer);
          tokenFlushTimer = null;
        }
        const message = supportAIErrorMessage(error);
        const metrics = buildSupportAIMetrics(startedAt, performance.now(), message);
        if (!signal?.aborted) {
          updateChatMessage(assistantId, { text: message, pending: false, ok: false, metrics, sources: [] });
        }
        activeChatAssistantIdRef.current = null;
        return { ok: false, type: "text", command: "ai-chat", scope: chatReference.scope, range: chatReference.range, original: chatReference.text, suggestion: "", text: "", error: message };
      }
      acceptingTokens = false;
      const assistantText = response.text || partialText || response.error || "";
      const metrics = buildSupportAIMetrics(startedAt, performance.now(), assistantText);
      const sources = collectSupportAISources(response);
      if (!signal?.aborted) {
        updateChatMessage(assistantId, {
          text: assistantText || "応答が空でした。",
          pending: false,
          ok: response.ok,
          metrics,
          sources,
        });
      }
      activeChatAssistantIdRef.current = null;
      return { ok: response.ok, type: "text", command: "ai-chat", scope: chatReference.scope, range: chatReference.range, original: chatReference.text, suggestion: assistantText, text: assistantText, contextText: response.contextText, knowledgeSources: response.knowledgeSources, error: response.error || null };
    });
  }, [aiConfig, chatInput, chatMessages, chatContextInstruction, chatParticipantContext, chatUsesMemoryContext, chatUsesReferenceContext, chatWorkflowContext, getTarget, ghostRuntime, instruction, onToast, run, runtimeReady, setActiveChatMessages, textReady, textRunnable, updateChatMessage]);

      updateAIConfig({ localAIEnabled: false });
      setAIPhase("disabled");
      setAITaskLabel("AI停止中");
      return;
    }

    const nextConfig = normalizeSupportAIConfig({ ...aiConfig, localAIEnabled: true });
    saveSupportAIConfig(nextConfig);
    setAIConfig(nextConfig);
    const features = [];
    if (nextConfig.enableText) features.push("text");
    if (nextConfig.enableVision) features.push("vision");
    if (nextConfig.enableWhisper) features.push("whisper");
    if (nextConfig.enableTts) features.push(nextConfig.voiceConversationProvider === "lfm-audio" ? "lfmAudio" : "tts");
    setAIPhase(features.length ? "preparing-model" : "loading-runtime");
    setAITaskLabel(features.length ? "有効モデル準備中" : "Runtime読込中");
    setAIInitLogs([]);

    try {
      const activationProviders = createSupportAIProviders(nextConfig);
      const response = await activationProviders.browserLocal.prepare(features, { clearLogs: true, onLog: pushAIInitLog });
      const logs = response.logs || activationProviders.browserLocal.readLogs?.() || [];
      setAIInitLogs(logs);

        const preparedStatus = response.status || activationProviders.browserLocal.status?.() || {};
        const textPrepared = !nextConfig.enableText || Boolean(preparedStatus.prepared?.text);
        setAIPhase(textPrepared ? "idle" : "error");
        setAITaskLabel(textPrepared ? "初期化完了 / 待機中" : "Textモデル準備未完了");
        onToast?.(textPrepared ? "ローカルAIの初期化が完了しました" : "Runtimeは読込済みですがTextモデルが未準備です");
      } else {
        setAIPhase("error");
        setAITaskLabel("Runtime読込失敗");
        setResult({ ok: false, label: "ai-enable", type: "runtime", text: logs.map(formatAIInitLogLine).join("\n"), suggestion: "", error: response.error || "Runtime読込に失敗しました" });
        onToast?.(`AI有効化に失敗: ${response.error || "unknown"}`);
      }

      const message = supportAIErrorMessage(error);
      setAIPhase("error");
      setAITaskLabel("Runtime読込失敗");
      setResult({ ok: false, label: "ai-enable", type: "runtime", text: "", suggestion: "", error: message });

                          <Box component="td" sx={{ p: 0.65, borderBottom: `1px solid ${border}`, fontSize: 12 }}>{fact.predicate}</Box>
                          <Box component="td" sx={{ p: 0.65, borderBottom: `1px solid ${border}`, fontSize: 12 }}>{fact.object}</Box>
                          <Box component="td" sx={{ p: 0.65, borderBottom: `1px solid ${border}`, fontSize: 12 }}>{(fact.tags || []).join(", ") || "-"}</Box>
                          <Box component="td" sx={{ p: 0.65, borderBottom: `1px solid ${border}`, fontSize: 12, whiteSpace: "nowrap" }}>{fact.createdAt ? new Date(fact.createdAt).toLocaleString("ja-JP") : "-"}</Box>
                        </Box>
                      )) : (
                        <Box component="tr"><Box component="td" colSpan={6} sx={{ p: 1, color: muted, fontSize: 12.5 }}>Knowledge Factはまだ登録されていません。</Box></Box>
                      )}
                    </Box>
                  </Box>
                </Box>
              </Box>
            </Box>
          ) : tab === "monitor" ? (
            <Box sx={{ display: "flex", flexDirection: "column", width: "100%", minHeight: 0, height: "100%", border: `1px solid ${border}`, borderRadius: 2, overflow: "hidden", background: dark ? "#020617" : "#fbfdff", minWidth: 0 }}>
              <Box sx={{ px: 1.2, py: 0.8, display: "flex", alignItems: "center", gap: 1, borderBottom: `1px solid ${border}` }}>
                <Typography variant="caption" fontWeight={900} sx={{ flex: 1 }}>{rightPaneTitle}</Typography>
                <MaterialUI.Chip size="small" color={monitorHealth.color} label={monitorHealth.label} />
                <Typography variant="caption" sx={{ color: muted }}>{monitorSnapshot?.at ? new Date(monitorSnapshot.at).toLocaleTimeString("ja-JP") : "未更新"}</Typography>
                <PaneControls side="right" />
              </Box>
              {busy && <MaterialUI.LinearProgress />}
              <Box sx={{ flex: 1, minHeight: 0, overflow: "auto", p: { xs: 1, sm: 1.25 }, WebkitOverflowScrolling: "touch" }}>
                <Grid container spacing={1} sx={{ minWidth: 0 }}>
                  <Grid size={{ xs: 12, sm: 6 }}>
                    <MonitorMetric
                      label="Health"
                      value={monitorHealth.label}
                      color={monitorHealth.color}
                      detail={monitorHealth.detail}
                    />
                  </Grid>
                  <Grid size={{ xs: 12, sm: 6 }}>
                    <MonitorMetric
                      label="Execution"
                      value={busy ? "Running" : "Idle"}
                      color={busy ? "primary" : "success"}
                      detail={`${aiPhase}${aiTaskLabel ? ` / ${aiTaskLabel}` : ""}${monitorSnapshot?.activeAssistant ? " / chat-stream" : ""}`}
                    />
                  </Grid>
                  <Grid size={{ xs: 12, sm: 6 }}>
                    <MonitorMetric
                      label="Latest Generation"
                      value={latestChatMetrics ? `${latestChatMetrics.tokensPerSec} tok/s` : "未計測"}
                      color={latestChatMetrics ? "primary" : "default"}
                      detail={latestChatMetrics ? `${formatSupportAIDuration(latestChatMetrics.durationMs)} / ${latestChatMetrics.tokens} tok / ${latestChatMetrics.chars} 文字` : "会話応答が完了すると生成速度を表示します"}
                    />
                  </Grid>
                  <Grid size={{ xs: 12, sm: 6 }}>
                    <MonitorMetric
                      label="Browser Storage"
                      value={monitorStorage ? `${formatBytes(monitorStorage.usage || 0)} / ${monitorStorage.quota ? formatBytes(monitorStorage.quota) : "不明"}` : "未対応"}
                      color={monitorStorageRatio > 0.85 ? "warning" : "default"}
                      progress={monitorStorageRatio ? monitorStorageRatio * 100 : null}
                      detail={monitorStorage ? `Cache/IndexedDB/localStorage等を含むブラウザ推定値` : "navigator.storage.estimate が利用できません"}
                    />
                  </Grid>
                  <Grid size={{ xs: 12, sm: 6 }}>
                    <MonitorMetric
                      label="JS Heap"
                      value={monitorMemory ? `${formatBytes(monitorMemory.usedJSHeapSize)} / ${formatBytes(monitorMemory.jsHeapSizeLimit)}` : "未対応"}
                      color={monitorMemoryRatio > 0.85 ? "warning" : "default"}
                      progress={monitorMemoryRatio ? monitorMemoryRatio * 100 : null}
                      detail={monitorMemory ? `total ${formatBytes(monitorMemory.totalJSHeapSize)}` : "Safari等ではperformance.memoryが公開されない場合があります"}
                    />
                  </Grid>
                  <Grid size={{ xs: 12, sm: 6 }}>
                    <MonitorMetric
                      label="Model Pipelines"
                      value={`${monitorPipelineCount} loaded`}
                      color={monitorPipelineCount > 4 ? "warning" : "default"}
                      detail={`Text ${monitorPrepared.text ? "ready" : "not-ready"} / Vision ${monitorPrepared.vision ? "ready" : "not-ready"} / Whisper ${monitorPrepared.whisper ? "ready" : "not-ready"} / TTS ${monitorPrepared.tts ? "ready" : "not-ready"}`}
                    />
                  </Grid>
                  <Grid size={{ xs: 12, sm: 6 }}>
                    <MonitorMetric
                      label="Temporary References"
                      value={`${monitorObjectUrlCount} blob URLs`}
                      color={monitorObjectUrlCount ? "warning" : "success"}
                      detail="音声などの一時Object URL。不要なものは停止・クローズ・一時URL解放で破棄します。"
                    />
                  </Grid>
                  <Grid size={{ xs: 12, sm: 6 }}>
                    <MonitorMetric
                      label="Chat Buffer"
                      value={`${chatMessages.length}/${SUPPORT_AI_MEMORY_LIMITS.maxChatMessages}`}
                      color={chatMessages.length > SUPPORT_AI_MEMORY_LIMITS.maxChatMessages * 0.9 ? "warning" : "default"}
                      progress={(chatMessages.length / SUPPORT_AI_MEMORY_LIMITS.maxChatMessages) * 100}
                      detail={`結果欄 ${formatBytes((monitorSnapshot?.resultChars || 0) * 2)} 相当`}
                    />
                  </Grid>
                  <Grid size={{ xs: 12, sm: 6 }}>
                    <MonitorMetric
                      label="Init Log Buffer"
                      value={`${aiInitLogs.length}/${SUPPORT_AI_MEMORY_LIMITS.maxInitLogs}`}
                      color={aiInitLogs.length > SUPPORT_AI_MEMORY_LIMITS.maxInitLogs * 0.9 ? "warning" : "default"}
                      progress={(aiInitLogs.length / SUPPORT_AI_MEMORY_LIMITS.maxInitLogs) * 100}
                      detail="初期化ログは上限で自動トリムされます。"
                    />
                  </Grid>
                  <Grid size={{ xs: 12 }}>
                    <Box sx={{ p: 1, border: `1px solid ${border}`, borderRadius: 2, background: dark ? "rgba(255,255,255,0.035)" : "#ffffff", minWidth: 0 }}>
                      <Typography variant="caption" fontWeight={900}>Runtime / Model</Typography>
                      <Grid container spacing={0.75} sx={{ mt: 0.6 }}>
                        <Grid size={{ xs: 12, sm: 6 }}><StatusItem name="Provider" value={monitorStatus?.label || "unknown"} /></Grid>
                        <Grid size={{ xs: 12, sm: 6 }}><StatusItem name="Device" value={monitorStatus?.browserDevice || "unknown"} color={monitorStatus?.browserDevice === "webgpu" ? "primary" : "default"} /></Grid>
                        <Grid size={{ xs: 12 }}><StatusItem name="Text Model" value={monitorStatus?.textModel || aiConfig.browserTextModel} color={monitorPrepared.text ? "success" : "default"} /></Grid>
                        <Grid size={{ xs: 12 }}><StatusItem name="Vision Model" value={monitorStatus?.visionModel || aiConfig.browserVisionModel} color={monitorPrepared.vision ? "success" : "default"} /></Grid>
                      </Grid>
                    </Box>
                  </Grid>
                  <Grid size={{ xs: 12 }}>
                    <Box sx={{ p: 1, border: `1px solid ${border}`, borderRadius: 2, background: dark ? "#0f172a" : "#f8fafc", minWidth: 0 }}>
                      <Typography variant="caption" fontWeight={900}>Recent Init Logs</Typography>
                      <Box component="pre" sx={{ m: 0, mt: 0.7, maxHeight: 180, overflow: "auto", whiteSpace: "pre-wrap", wordBreak: "break-word", fontFamily: EDITOR_FONT, fontSize: 11.5, lineHeight: 1.55, color: dark ? "#dbeafe" : "#1f2937" }}>
                        {(monitorSnapshot?.recentLogs || aiInitLogs.slice(-8)).length ? (monitorSnapshot?.recentLogs || aiInitLogs.slice(-8)).map(formatAIInitLogLine).join("\n") : "まだログはありません。"}
                      </Box>
                    </Box>
                  </Grid>
                </Grid>
              </Box>
            </Box>
          ) : (
          <Box sx={{ display: "flex", flexDirection: "column", width: "100%", minHeight: 0, height: "100%", border: `1px solid ${border}`, borderRadius: 2, overflow: "hidden", minWidth: 0 }}>
            <Box sx={{ px: 1.2, py: 0.8, display: "flex", alignItems: "center", gap: 1, borderBottom: `1px solid ${border}` }}>
              <Typography variant="caption" fontWeight={800} sx={{ flex: 1 }}>{result?.label || rightPaneTitle}</Typography>
              {busy && <Typography variant="caption" color="primary">実行中...</Typography>}
              {result && <MaterialUI.Chip size="small" color={result.ok ? "success" : "error"} label={result.ok ? "OK" : "ERROR"} />}
              <PaneControls side="right" />
            </Box>
            {busy && <MaterialUI.LinearProgress />}
            <Box component="textarea" value={resultText || result?.error || ""} onChange={e => setResult(r => r ? { ...r, text: e.target.value, suggestion: e.target.value, ok: true } : { ok: true, text: e.target.value, suggestion: e.target.value })} spellCheck={false} style={{ flex: 1, width: "100%", minHeight: supportAIFullScreen ? 220 : 260, resize: "none", border: 0, outline: 0, padding: 14, fontFamily: EDITOR_FONT, fontSize: 16, lineHeight: 1.65, background: dark ? "#020617" : "#fbfdff", color: dark ? "#e5e7eb" : "#111827" }} />
            {result?.history && <Box sx={{ px: 1.2, py: 0.7, borderTop: `1px solid ${border}`, maxHeight: 80, overflow: "auto" }}>{result.history.map((h, i) => <Typography key={i} variant="caption" sx={{ display: "block", color: muted }}>{i + 1}. {h.role}: {h.ok ? "OK" : h.error}</Typography>)}</Box>}
          </Box>
          )}
          </Box>}
        </Box>
      </DialogContent>

      <DialogActions sx={{ px: { xs: 1, sm: 2 }, py: 1, borderTop: `1px solid ${border}`, flexShrink: 0 }}>
        <Stack direction={{ xs: "column", sm: "row" }} spacing={1} sx={{ width: { xs: "100%", sm: "auto" }, ml: { sm: "auto" }, "& .MuiButton-root": { ...responsiveButtonSx, width: { xs: "100%", sm: "auto" } } }}>
          <Button
            onClick={tab === "chat" ? copyChatConversation : tab === "monitor" ? copyAIMonitorSnapshot : () => supportAICopyText(resultText || "").then(() => onToast?.("AI結果をコピーしました")).catch(() => onToast?.("コピーに失敗しました"))}
            disabled={tab === "chat" ? !chatMessages.some(supportAIIsModelConversationMessage) : tab === "monitor" ? false : !resultText}
          >
            {tab === "chat" ? "会話コピー" : tab === "monitor" ? "モニタコピー" : "結果コピー"}
          </Button>
          <Button onClick={() => applySuggestion(result, true)} disabled={tab === "monitor" || !resultText || busy} variant="outlined">カーソルへ挿入</Button>
          <Button onClick={() => applySuggestion(result, false)} disabled={tab === "monitor" || !resultText || busy} variant="contained">結果を反映</Button>
        </Stack>
      </DialogActions>
      <Dialog open={contextPreviewOpen} onClose={() => setContextPreviewOpen(false)} maxWidth="md" fullWidth>
        <DialogTitle sx={{ display: "flex", alignItems: "center", gap: 1 }}>
          <Icon name="preview" size={20} />
          <Typography variant="subtitle1" fontWeight={900} sx={{ flex: 1 }}>コンテキストプレビュー</Typography>
          <IconButton onClick={() => setContextPreviewOpen(false)}><Icon name="close" size={20} /></IconButton>
        </DialogTitle>
        <DialogContent dividers>
          <Box component="pre" sx={{ m: 0, maxHeight: "62vh", overflow: "auto", whiteSpace: "pre-wrap", wordBreak: "break-word", fontFamily: EDITOR_FONT, fontSize: 12.5, lineHeight: 1.65, color: dark ? "#e5e7eb" : "#111827" }}>
            {contextPreviewText || "プレビューするコンテキストはありません。"}
          </Box>
        </DialogContent>
        <DialogActions>
          <Button onClick={() => supportAICopyText(contextPreviewText || "").then(() => onToast?.("コンテキストをコピーしました")).catch(() => onToast?.("コピーに失敗しました"))} disabled={!contextPreviewText}>コピー</Button>
          <Button variant="contained" onClick={() => setContextPreviewOpen(false)}>閉じる</Button>
        </DialogActions>
      </Dialog>
      {!supportAIFullScreen && <>
        <SupportAIResizeHandle edge="right" handleProps={supportAIResize.handleProps} active={supportAIResize.draggingEdge === "right"} />
        <SupportAIResizeHandle edge="bottom" handleProps={supportAIResize.handleProps} active={supportAIResize.draggingEdge === "bottom"} />
        <SupportAIResizeHandle edge="right-bottom" handleProps={supportAIResize.handleProps} active={supportAIResize.draggingEdge === "right-bottom"} />
      </>}
    </Dialog>
  );
}

function CommandDrawer({
  open, onClose, appDarkMode, activeProfileName, activeTab, activeMode, activeModePreference,
  editorTabs, activeEditorTabId, onSwitchTab, onNewHtml, onNewMarkdown,
  onRenameTab, onCloseTab, onDuplicateTab,
  codeHistory, codeHistoryIndex, onRestoreHistory, onUndo, onRedo, canUndo, canRedo,
  snapshotsCount, consoleLogsCount, onSave, onCopy, onDownload, onClear,
  onPatch, onConsole, onStorage, onSnapshots, onTakeSnapshot, onToggleTheme, onSupportAI,
}) {
  const { Drawer, List, ListItemButton, ListItemIcon, ListItemText, Chip } = MaterialUI;
  const dark = Boolean(appDarkMode);
  const panelBg = dark ? '#0f172a' : '#ffffff';
  const cardBg = dark ? 'rgba(255,255,255,0.045)' : '#f7f9fc';
  const border = dark ? 'rgba(255,255,255,0.09)' : '#e5e9f2';
  const fg = dark ? '#e5e7eb' : '#111827';
  const muted = dark ? 'rgba(229,231,235,0.64)' : '#667085';
  const accent = '#1976d2';
  const recentHistory = Array.isArray(codeHistory)
    ? codeHistory.map((entry, index) => ({ entry, index })).slice(-10).reverse()
    : [];

  const SectionTitle = ({ children, right }) => (
    <Box sx={{ display: 'flex', alignItems: 'center', gap: 1, px: 1, pt: 1.25, pb: 0.6 }}>
      <Typography variant="caption" sx={{ color: muted, fontWeight: 800, letterSpacing: 0.7, textTransform: 'uppercase', flex: 1 }}>{children}</Typography>
      {right}
    </Box>
  );

  const Action = ({ icon, label, secondary, onClick, disabled, selected }) => (
    <ListItemButton
      disabled={disabled}
      selected={selected}
      onClick={onClick}
      sx={{
        borderRadius: 1.5,
        mx: 0.6,
        my: 0.15,
        color: fg,
        '&.Mui-selected': { background: dark ? 'rgba(25,118,210,0.22)' : 'rgba(25,118,210,0.10)' },
        '&.Mui-selected:hover': { background: dark ? 'rgba(25,118,210,0.30)' : 'rgba(25,118,210,0.16)' },
      }}
    >
      <ListItemIcon sx={{ minWidth: 34, color: selected ? accent : muted }}><Icon name={icon} size={20} /></ListItemIcon>
      <ListItemText
        primary={label}
        secondary={secondary}
        primaryTypographyProps={{ fontSize: 13, fontWeight: selected ? 800 : 600, noWrap: true }}
        secondaryTypographyProps={{ fontSize: 11, color: muted, noWrap: true }}
      />
    </ListItemButton>
  );

  return (
    <Drawer
      anchor="right"
      open={open}
      onClose={onClose}
      PaperProps={{
        sx: {
          width: { xs: '86vw', sm: 360 },
          maxWidth: 390,
          background: panelBg,
          color: fg,
          borderLeft: `1px solid ${border}`,
          overflow: 'hidden',
        },
      }}
    >
      <Box sx={{ height: '100%', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
        <Box sx={{ px: 1.4, py: 1.25, display: 'flex', alignItems: 'center', gap: 1, borderBottom: `1px solid ${border}` }}>
          <Box sx={{ width: 34, height: 34, borderRadius: 2, display: 'grid', placeItems: 'center', background: dark ? 'rgba(25,118,210,0.22)' : 'rgba(25,118,210,0.10)', color: accent }}>
            <Icon name="auto_awesome" size={20} />
          </Box>
          <Box sx={{ minWidth: 0, flex: 1 }}>
            <Typography noWrap variant="subtitle2" sx={{ fontWeight: 900, lineHeight: 1.2 }}>Core Lean Secure</Typography>
            <Typography noWrap variant="caption" sx={{ color: muted }}>{activeProfileName || 'プロファイル未選択'} · {activeTab?.name || 'タブ未選択'}</Typography>
          </Box>
          <IconButton onClick={onClose} size="small" sx={{ color: muted }}><Icon name="close" size={20} /></IconButton>
        </Box>

        <Box sx={{ flex: 1, minHeight: 0, overflowY: 'auto', WebkitOverflowScrolling: 'touch', p: 0.8 }}>
          <SectionTitle right={<Chip size="small" label={`${normalizeModePreference(activeModePreference) === EDITOR_MODES.AUTO ? 'AUTO / ' : ''}${activeMode === EDITOR_MODES.MARKDOWN ? 'MD' : 'HTML'}`} sx={{ height: 20, fontSize: 10 }} />}>操作</SectionTitle>
          <Box sx={{ px: 0.6, pb: 0.6 }}>
            <Button fullWidth onClick={onSupportAI} variant="contained" color="secondary" size="small" startIcon={<Icon name="auto_awesome" size={16} />} sx={{ justifyContent: 'flex-start' }}>SupportAI</Button>
          </Box>
          <Box sx={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0.6, px: 0.6 }}>
            <Button onClick={onSave} variant="contained" size="small" startIcon={<Icon name="save" size={16} />} sx={{ justifyContent: 'flex-start' }}>保存</Button>
            <Button onClick={onCopy} variant="outlined" size="small" startIcon={<Icon name="content_copy" size={16} />} sx={{ justifyContent: 'flex-start' }}>コピー</Button>
            <Button onClick={onDownload} variant="outlined" size="small" startIcon={<Icon name="download" size={16} />} sx={{ justifyContent: 'flex-start' }}>出力</Button>
            <Button onClick={onPatch} variant="outlined" size="small" startIcon={<Icon name="difference" size={16} />} sx={{ justifyContent: 'flex-start' }}>差分</Button>
          </Box>
          <List dense disablePadding sx={{ mt: 0.6, borderRadius: 2, background: cardBg, border: `1px solid ${border}`, py: 0.4 }}>
            <Action icon="terminal" label="Console" secondary={`${consoleLogsCount || 0} 件のログ`} onClick={onConsole} />
            <Action icon="photo_camera" label="スナップショット保存" secondary={`${snapshotsCount || 0} 件保存中`} onClick={onTakeSnapshot} />
            <Action icon="history" label="スナップショット一覧" secondary="復元・削除" onClick={onSnapshots} />
            <Action icon="security" label="Security & Storage" secondary="容量確認・個別削除" onClick={onStorage} />
            <Action icon={appDarkMode ? 'light_mode' : 'dark_mode'} label={appDarkMode ? 'ライトテーマ' : 'ダークテーマ'} secondary="アプリ全体の見た目" onClick={onToggleTheme} />
            <Action icon="delete_outline" label="現在タブをクリア" secondary="確認ダイアログあり" onClick={onClear} />
          </List>

          <SectionTitle right={<Chip size="small" label={`${editorTabs.length} / ${MAX_EDITOR_TABS}`} sx={{ height: 20, fontSize: 10 }} />}>タブ一覧</SectionTitle>
          <Box sx={{ display: 'flex', gap: 0.6, px: 0.6, pb: 0.6 }}>
            <Button fullWidth size="small" variant="outlined" onClick={onNewHtml} startIcon={<Icon name="add" size={15} />}>HTML</Button>
            <Button fullWidth size="small" variant="outlined" onClick={onNewMarkdown} startIcon={<Icon name="article" size={15} />}>MD</Button>
            <Button size="small" variant="outlined" onClick={onDuplicateTab} sx={{ minWidth: 42 }}><Icon name="content_copy" size={15} /></Button>
          </Box>
          <List dense disablePadding sx={{ borderRadius: 2, background: cardBg, border: `1px solid ${border}`, py: 0.4 }}>
            {editorTabs.map(tab => {
              const active = tab.id === activeEditorTabId;
              return (
                <ListItemButton key={tab.id} selected={active} onClick={() => onSwitchTab(tab.id)} sx={{ borderRadius: 1.5, mx: 0.6, my: 0.15 }}>
                  <ListItemIcon sx={{ minWidth: 34, color: active ? accent : muted }}><Icon name={inferEditorMode(tab.name, tab.code, tab.modePreference ?? tab.mode) === EDITOR_MODES.MARKDOWN ? 'article' : 'code'} size={19} /></ListItemIcon>
                  <ListItemText
                    primary={tab.name}
                    secondary={`${normalizeModePreference(tab.modePreference ?? tab.mode) === EDITOR_MODES.AUTO ? 'Auto / ' : ''}${inferEditorMode(tab.name, tab.code, tab.modePreference ?? tab.mode) === EDITOR_MODES.MARKDOWN ? 'Markdown' : 'HTML'} · ${String(tab.code || '').length.toLocaleString()} 文字`}
                    primaryTypographyProps={{ fontSize: 13, fontWeight: active ? 800 : 600, noWrap: true }}
                    secondaryTypographyProps={{ fontSize: 11, color: muted, noWrap: true }}
                  />
                  <IconButton size="small" onClick={(e) => { e.stopPropagation(); onRenameTab(tab.id); }} sx={{ color: muted }}><Icon name="edit" size={15} /></IconButton>
                  {editorTabs.length > 1 && <IconButton size="small" onClick={(e) => { e.stopPropagation(); onCloseTab(tab.id); }} sx={{ color: muted }}><Icon name="close" size={15} /></IconButton>}
                </ListItemButton>
              );
            })}
          </List>

          <SectionTitle right={<Chip size="small" label={`${Math.max(0, codeHistoryIndex + 1)} / ${codeHistory.length || 0}`} sx={{ height: 20, fontSize: 10 }} />}>ヒストリー</SectionTitle>
          <Box sx={{ display: 'flex', gap: 0.6, px: 0.6, pb: 0.6 }}>
            <Button fullWidth size="small" variant="outlined" disabled={!canUndo} onClick={onUndo} startIcon={<Icon name="undo" size={15} />}>Undo</Button>
            <Button fullWidth size="small" variant="outlined" disabled={!canRedo} onClick={onRedo} startIcon={<Icon name="redo" size={15} />}>Redo</Button>
          </Box>
          <List dense disablePadding sx={{ borderRadius: 2, background: cardBg, border: `1px solid ${border}`, py: 0.4 }}>
            {recentHistory.length === 0 ? (
              <Box sx={{ px: 1.4, py: 1.4, color: muted, fontSize: 12 }}>履歴はまだありません</Box>
            ) : recentHistory.map(({ entry, index }) => (
              <ListItemButton key={entry.id || index} selected={index === codeHistoryIndex} onClick={() => onRestoreHistory(index)} sx={{ borderRadius: 1.5, mx: 0.6, my: 0.15 }}>
                <ListItemIcon sx={{ minWidth: 34, color: index === codeHistoryIndex ? accent : muted }}><Icon name={index === codeHistoryIndex ? 'radio_button_checked' : 'restore'} size={18} /></ListItemIcon>
                <ListItemText
                  primary={entry.label || '編集'}
                  secondary={`${new Date(entry.ts || Date.now()).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' })} · ${String(entry.code || '').length.toLocaleString()} 文字`}
                  primaryTypographyProps={{ fontSize: 13, fontWeight: index === codeHistoryIndex ? 800 : 600, noWrap: true }}
                  secondaryTypographyProps={{ fontSize: 11, color: muted, noWrap: true }}
                />
              </ListItemButton>
            ))}
          </List>
        </Box>
      </Box>
    </Drawer>
  );
}

function App() {
  const isWide = useMediaQuery(theme.breakpoints.up("md"));
  const isMobile = useMediaQuery(theme.breakpoints.down("sm"));
  const loadInitialProfiles = () => {
    const ps = ProfileRepo.load();
    if (ps.length > 0) return ps;
    const def = createProfile("デフォルト", { code: (() => { try { return localStorage.getItem(STORAGE_KEY) || DEFAULT_HTML; } catch { return DEFAULT_HTML; } })() });
    ProfileRepo.save([def]); ProfileRepo.saveActiveId(def.id); return [def];
  };
  const [profiles, setProfiles] = useState(loadInitialProfiles);
  const [activeProfileId, setActiveProfileId] = useState(() => { const ps = ProfileRepo.load(); const saved = ProfileRepo.loadActiveId(); return saved && ps.some(p => p.id === saved) ? saved : (ps[0]?.id || null); });
  const activeProfile = AppStateSelectors.activeProfile(profiles, activeProfileId);
  const initS = validateSettings(activeProfile?.data?.settings || DEFAULT_SETTINGS);
  const initialEditorTabs = useMemo(() => normalizeEditorTabs(activeProfile?.data), []);
  const initialEditorTabId = useMemo(() => getInitialEditorTabId(activeProfile?.data, initialEditorTabs), [initialEditorTabs]);

            <EditorTabBar tabs={editorTabs} activeId={activeEditorTabId} onSwitch={switchEditorTab} onNew={() => addEditorTab(EDITOR_MODES.AUTO)} onClose={closeEditorTab} onRename={(id) => { const t = editorTabs.find(x => x.id === id); if (t) setTabRename({ id, name: t.name }); }} onDuplicate={duplicateEditorTab} onModeChange={changeEditorTabMode} activeMode={activeEditorMode} activeModePreference={activeEditorModePreference} darkMode={darkMode} />
            <CodeEditor value={html} onChange={setHtml} fontSize={effectiveEditorFontSize} darkMode={darkMode} wordWrap={effectiveWordWrap} highlightMode={effectiveHighlightMode} perfMode={perfMode} showIndentGuides={perfMode === "normal"} mode={activeEditorMode} editorApiRef={editorApiRef} />
          </Box>}
          {showHandle && <SplitHandle isHorizontal={isWide} handleProps={handleProps} dragging={dragging} />}
          {showPreviewPane && <Box sx={{ [sizeKey]: previewSize, flex: fullscreen === "preview" ? 1 : "unset", flexShrink: 0, minWidth: 0, minHeight: 0, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            <PaneHeader title="プレビュー" fullscreen={fullscreen === "preview"} onToggleFullscreen={() => toggleFullscreen("preview")} darkMode={previewHeaderDark} showFullscreen={true}>
              <Tooltip title="Preview dark"><IconButton size="small" onClick={() => setPreviewDarkMode(v => !v)} sx={{ p: 0.4 }}><Icon name={previewDarkMode ? "light_mode" : "dark_mode"} size={16} /></IconButton></Tooltip>
              <WidthSelector value={previewWidth} onChange={setPreviewWidth} darkMode={previewHeaderDark} compact={isMobile} />
              {!isMobile && <><IconButton size="small" onClick={() => setPreviewScale(s => clampValue(s - UI_LIMITS.PREVIEW_SCALE_STEP, UI_LIMITS.PREVIEW_SCALE_MIN, UI_LIMITS.PREVIEW_SCALE_MAX, 100))} sx={{ p: 0.4 }}><Icon name="zoom_out" size={16} /></IconButton><Typography variant="caption" onClick={() => setPreviewScale(100)} sx={{ fontSize: 11, minWidth: 36, textAlign: "center", cursor: "pointer" }}>{previewScale}%</Typography><IconButton size="small" onClick={() => setPreviewScale(s => clampValue(s + UI_LIMITS.PREVIEW_SCALE_STEP, UI_LIMITS.PREVIEW_SCALE_MIN, UI_LIMITS.PREVIEW_SCALE_MAX, 100))} sx={{ p: 0.4 }}><Icon name="zoom_in" size={16} /></IconButton></>}
              <Tooltip title="再読み込み"><IconButton size="small" onClick={() => setPreviewKey(k => k + 1)}><Icon name="refresh" size={17} /></IconButton></Tooltip>
            </PaneHeader>
            <PreviewFrame srcDoc={srcDoc} previewKey={previewKey} width={previewWidth} scale={effectivePreviewScale} darkMode={previewDarkMode} onFrameWindowChange={handlePreviewFrameWindow} fitToContainer={isMobile} />
          </Box>}
        </Box>
      </Box>
      <CommandDrawer
        open={drawerOpen}
        onClose={() => setDrawerOpen(false)}
        appDarkMode={appDarkMode}
        activeProfileName={activeProfile?.name}
        activeTab={activeEditorTab}
        activeMode={activeEditorMode}
        activeModePreference={activeEditorModePreference}
        editorTabs={editorTabs}
        activeEditorTabId={activeEditorTabId}
        onSwitchTab={switchEditorTab}
        onNewHtml={() => addEditorTab(EDITOR_MODES.HTML)}
        onNewMarkdown={() => addEditorTab(EDITOR_MODES.MARKDOWN)}
        onRenameTab={(id) => { const t = editorTabs.find(x => x.id === id); if (t) setTabRename({ id, name: t.name }); }}
        onCloseTab={closeEditorTab}
        onDuplicateTab={duplicateEditorTab}
        codeHistory={codeHistory}
        codeHistoryIndex={codeHistoryIndex}
        onRestoreHistory={restoreCodeHistory}
        onUndo={undoCode}
        onRedo={redoCode}
        canUndo={canUndoCode}
        canRedo={canRedoCode}
        snapshotsCount={snapshots.length}
        consoleLogsCount={consoleLogs.length}
        onSave={saveCurrentProfile}
        onCopy={copyCode}
        onDownload={downloadCode}
        onClear={() => setConfirmClear(true)}
        onPatch={() => setPatchOpen(true)}
        onConsole={() => setConsoleOpen(true)}
        onStorage={() => setStorageOpen(true)}
        onSnapshots={() => setSnapshotOpen(true)}
        onTakeSnapshot={takeSnapshot}
        onToggleTheme={() => setAppDarkMode(v => !v)}
        onSupportAI={openSupportAI}
      />
      <SupportAIDialog
        open={supportAIOpen}
        onClose={() => setSupportAIOpen(false)}
        appDarkMode={appDarkMode}
        activeMode={activeEditorMode}
        editorApiRef={editorApiRef}
        fallbackText={html}
        onFallbackSetText={setHtml}
        onToast={toast}
        onForceMarkdown={() => changeEditorTabMode(EDITOR_MODES.MARKDOWN)}
        onForceHtml={() => changeEditorTabMode(EDITOR_MODES.HTML)}
      />
      <ConfirmDialog open={confirmClear} title="入力内容をクリア" message="現在のタブの内容を削除します。" confirmLabel="クリア" onConfirm={clearEditor} onCancel={() => setConfirmClear(false)} />
      <ConfirmDialog open={confirmReset} title="初期設定に戻す" message="現在のプロファイルを初期状態に戻します。" confirmLabel="初期化" onConfirm={resetProfile} onCancel={() => setConfirmReset(false)} />
      <ConfirmDialog open={confirmFullReset} title="完全初期化" message="localStorage、IndexedDB内のアプリデータ、アプリ関連Cacheを削除します。必要なデータは先にExportしてください。SafariのHTTPキャッシュはブラウザ設定側で管理されます。" confirmLabel="完全初期化" onConfirm={fullReset} onCancel={() => setConfirmFullReset(false)} />
      <Dialog open={Boolean(tabRename)} onClose={() => setTabRename(null)} maxWidth="xs" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}><DialogTitle sx={{ fontWeight: 700, pb: 1 }}>コードタブ名を変更</DialogTitle><DialogContent><MaterialUI.TextField autoFocus fullWidth size="small" value={tabRename?.name || ""} onChange={e => setTabRename(v => v ? { ...v, name: e.target.value } : v)} onKeyDown={e => { if (e.key === "Enter") applyEditorTabRename(); }} /></DialogContent><DialogActions sx={{ px: 3, pb: 2, gap: 1 }}><Button onClick={() => setTabRename(null)} variant="outlined" fullWidth>キャンセル</Button><Button onClick={applyEditorTabRename} variant="contained" fullWidth>変更</Button></DialogActions></Dialog>
      <Dialog open={profileNewOpen} onClose={() => setProfileNewOpen(false)} maxWidth="xs" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}><DialogTitle sx={{ fontWeight: 700, pb: 1 }}>新規プロファイル</DialogTitle><DialogContent><MaterialUI.TextField autoFocus fullWidth size="small" value={profileNewName} onChange={e => setProfileNewName(e.target.value)} onKeyDown={e => { if (e.key === "Enter") applyNewProfile(); }} /></DialogContent><DialogActions sx={{ px: 3, pb: 2, gap: 1 }}><Button onClick={() => setProfileNewOpen(false)} variant="outlined" fullWidth>キャンセル</Button><Button onClick={applyNewProfile} variant="contained" fullWidth>作成</Button></DialogActions></Dialog>
      <Dialog open={Boolean(previewDialog)} onClose={() => setPreviewDialog(null)} maxWidth="sm" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}><DialogTitle sx={{ fontWeight: 700, pb: 1 }}>{previewDialog?.title || "Preview message"}</DialogTitle><DialogContent><DialogContentText sx={{ whiteSpace: "pre-wrap" }}>{previewDialog?.message || ""}</DialogContentText></DialogContent><DialogActions sx={{ px: 3, pb: 2 }}><Button onClick={() => setPreviewDialog(null)} variant="contained">OK</Button></DialogActions></Dialog>
      {patchOpen && <PatchDialog open={patchOpen} onClose={() => setPatchOpen(false)} currentCode={html} onApply={applyPatchCode} />}
      {consoleOpen && <ConsolePanel open={consoleOpen} onClose={() => setConsoleOpen(false)} logs={consoleLogs} onClear={() => setConsoleLogs([])} />}
      {snapshotOpen && <SnapshotPanel open={snapshotOpen} onClose={() => setSnapshotOpen(false)} snapshots={snapshots} onRestore={restoreSnapshot} onDelete={deleteSnapshot} onClearAll={clearSnapshots} darkMode={darkMode} />}
      <SecurityStorageDialog open={storageOpen} onClose={() => setStorageOpen(false)} onExportAll={() => exportAllProfiles(getProfilesWithCurrentData())} onFullReset={() => setConfirmFullReset(true)} onToast={toast} />
      <Snackbar open={snackbar.open} autoHideDuration={2200} onClose={() => setSnackbar(s => ({ ...s, open: false }))} message={snackbar.msg} anchorOrigin={{ vertical: "bottom", horizontal: "center" }} />
    </ThemeProvider>
  );
}

// Bootstrap
createRoot(document.getElementById("root")).render(<React.StrictMode><App /></React.StrictMode>);
  </script>

  <script type="module">
    import React from "https://esm.sh/react@19.2.0";
    import { createRoot } from "https://esm.sh/react-dom@19.2.0/client";
    import * as MaterialUI from "https://esm.sh/@mui/material@7.3.5?deps=react@19.2.0,react-dom@19.2.0";

    import { marked } from "https://esm.sh/marked@18.0.3";
    import DOMPurify from "https://esm.sh/dompurify@3.4.5";
    import mermaid from "https://esm.sh/mermaid@11.15.0";

    window.__HT_CM__ = { EditorView, basicSetup, cmHtml, cmMarkdown, oneDark };
    window.__HT_MD__ = { marked, DOMPurify, mermaid, mermaidUrl: "https://esm.sh/mermaid@11.15.0?bundle" };

    const CONSOLE_INTERCEPT = `<script>
(function(){
  var _send = function(level, args) {
    try {
      var msg = Array.from(args).map(function(a){
        try { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a); }
        catch(e) { return String(a); }
      }).join(' ');
      window.parent.postMessage({ type: '__ht_console__', level: level, msg: msg, ts: Date.now() }, '*');
    } catch(e){}
  };
  ['log','warn','error','info','debug'].forEach(function(m){
    var orig = console[m].bind(console);
    console[m] = function(){ orig.apply(console, arguments); _send(m, arguments); };
  });
  window.addEventListener('error', function(e){
    _send('error', [e.message + (e.filename ? ' (' + e.filename + ':' + e.lineno + ')' : '')]);
  });
  window.addEventListener('unhandledrejection', function(e){
    _send('error', ['Unhandled Promise rejection: ' + (e.reason?.message || e.reason)]);
  });
  window.alert = function(message) {
    var msg = String(message ?? '');
    _send('info', ['alert: ' + msg]);
    try { window.parent.postMessage({ type: '__ht_dialog__', title: 'Preview alert', message: msg, ts: Date.now() }, '*'); } catch(e) {}
  };
  window.confirm = function(message) {
    var msg = String(message ?? '');
    _send('warn', ['confirm() is disabled in sandboxed preview: ' + msg]);
    return false;
  };
  window.prompt = function(message, defaultValue) {
    var msg = String(message ?? '');
    _send('warn', ['prompt() is disabled in sandboxed preview: ' + msg]);
    return defaultValue == null ? null : String(defaultValue);
  };
})();
<\/script>`;

      const runApp = new Function("React", "createRoot", "MaterialUI", "CONSOLE_INTERCEPT", code + "\n//# sourceURL=html-editor-core-lean-secure-v1-0.jsx");
      runApp(React, createRoot, MaterialUI, CONSOLE_INTERCEPT);
      window.__HT_APP_STARTED__ = true;
    } catch (error) {
      window.__HT_BOOT_ERROR__?.(error, "Babel / React bootstrap error");
      throw error;
    }
  </script>
