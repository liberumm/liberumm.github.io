function loadSupportAIConfig() {
  try {
    const raw = localStorage.getItem(SUPPORT_AI_CONFIG_KEY);
    if (!raw) return { ...DEFAULT_SUPPORT_AI_CONFIG };
    const parsed = JSON.parse(raw);
    const loaded = normalizeSupportAIConfig(parsed);
    const needsMigration =
      parsed?.policyVersion !== DEFAULT_SUPPORT_AI_CONFIG.policyVersion ||
      String(parsed?.transformersCdnUrl || "").includes("/+esm") ||
      String(parsed?.transformersCdnUrl || "").includes("/dist/transformers.web");
    if (needsMigration) {
      const oldWhisperModel = String(parsed?.browserWhisperModel || loaded.browserWhisperModel || "");
      const oldTtsModel = String(parsed?.browserTtsModel || loaded.browserTtsModel || "");
      const lfmAudioWasMixedIntoPipelines = /LFM2\.5-Audio|LiquidAI\/LFM2\.5-Audio/i.test(`${oldWhisperModel} ${oldTtsModel}`);
      const migrated = normalizeSupportAIConfig({
        ...loaded,
        transformersCdnUrl: DEFAULT_SUPPORT_AI_CONFIG.transformersCdnUrl,
        browserCacheMode: DEFAULT_SUPPORT_AI_CONFIG.browserCacheMode,
        browserDevice: DEFAULT_SUPPORT_AI_CONFIG.browserDevice,
        audioTranscribeProvider: "whisper",
        browserWhisperModel: lfmAudioWasMixedIntoPipelines ? DEFAULT_SUPPORT_AI_CONFIG.browserWhisperModel : loaded.browserWhisperModel,
        browserWhisperDtype: lfmAudioWasMixedIntoPipelines ? DEFAULT_SUPPORT_AI_CONFIG.browserWhisperDtype : loaded.browserWhisperDtype,
        voiceConversationProvider: "lfm-audio",
        browserLfmAudioModel: loaded.browserLfmAudioModel || DEFAULT_SUPPORT_AI_CONFIG.browserLfmAudioModel,
        browserLfmAudioPrecision: loaded.browserLfmAudioPrecision || DEFAULT_SUPPORT_AI_CONFIG.browserLfmAudioPrecision,
        browserTtsModel: lfmAudioWasMixedIntoPipelines ? DEFAULT_SUPPORT_AI_CONFIG.browserTtsModel : loaded.browserTtsModel,
        browserTtsTask: lfmAudioWasMixedIntoPipelines ? DEFAULT_SUPPORT_AI_CONFIG.browserTtsTask : loaded.browserTtsTask,
        browserTtsDtype: lfmAudioWasMixedIntoPipelines ? DEFAULT_SUPPORT_AI_CONFIG.browserTtsDtype : loaded.browserTtsDtype,
        policyVersion: DEFAULT_SUPPORT_AI_CONFIG.policyVersion,
      });
      try { localStorage.setItem(SUPPORT_AI_CONFIG_KEY, JSON.stringify(migrated)); } catch {}
      return migrated;
    }
    return loaded;
  } catch {
    return { ...DEFAULT_SUPPORT_AI_CONFIG };
  }
}

function saveSupportAIConfig(config) {
  try {
    localStorage.setItem(SUPPORT_AI_CONFIG_KEY, JSON.stringify(normalizeSupportAIConfig(config)));
    return true;
  } catch {
    return false;
  }
}

function supportAIProviderLabel(provider) {
  return SUPPORT_AI_PROVIDER_OPTIONS.find(p => p.value === provider)?.label || provider || "Browser Local";
}

function supportAITextFromOpenAICompatible(data) {
  const choice = Array.isArray(data?.choices) ? data.choices[0] : null;
  const content = choice?.message?.content ?? choice?.text ?? data?.text ?? data?.response ?? data?.result ?? "";
  if (Array.isArray(content)) {
    return content.map(part => typeof part === "string" ? part : (part?.text || "")).join("");
  }
  return String(content || "");
}

function supportAITextFromOllama(data) {
  return String(data?.message?.content ?? data?.response ?? data?.text ?? data?.result ?? "");
}

async function supportFetchJson(url, payload, options = {}) {
  const timeoutMs = options.timeoutMs || DEFAULT_SUPPORT_AI_CONFIG.timeoutMs;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload || {}),
      signal: controller.signal,
    });
    const bodyText = await response.text().catch(() => "");
    let data = {};
    try { data = bodyText ? JSON.parse(bodyText) : {}; } catch { data = { text: bodyText }; }
    if (!response.ok) {
      return { ok: false, text: "", error: `${response.status} ${response.statusText}${bodyText ? `: ${bodyText.slice(0, 320)}` : ""}`, raw: data };
    }
    return { ok: true, data, raw: data, error: null };
  } catch (e) {
    return { ok: false, text: "", error: supportAIErrorMessage(e), raw: null };
  } finally {
    clearTimeout(timer);
  }
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = () => reject(reader.error || new Error("File read failed"));
    reader.readAsDataURL(file);
  });
}

function dataUrlToBase64(dataUrl) {
  return String(dataUrl || "").split(",")[1] || "";
}


function supportAIGetBrowserCacheStatus() {
  try {
    const cacheStorage = globalThis.caches;
    const available = !!cacheStorage && typeof cacheStorage.keys === "function" && typeof cacheStorage.open === "function";
    return { available, blocked: false, error: available ? null : "Cache API is not available" };
  } catch (error) {
    return { available: false, blocked: true, error: supportAIErrorMessage(error) };
  }
}

function supportAIResolveBrowserCacheUse(config) {
  const cfg = normalizeSupportAIConfig(config);
  const status = supportAIGetBrowserCacheStatus();
  if (cfg.browserCacheMode === "off") return { useBrowserCache: false, status, reason: "disabled-by-user" };
  if (status.available) return { useBrowserCache: true, status, reason: "available" };
  return { useBrowserCache: false, status, reason: status.blocked ? "blocked-by-sandbox" : "unavailable" };
}

const SUPPORT_AI_IDB_NAME = "html-tester-support-ai-v1";
const SUPPORT_AI_IDB_STORE = "kv";

function supportAIHasIndexedDB() {
  try {
    return typeof indexedDB !== "undefined" && typeof indexedDB.open === "function";
  } catch {
    return false;
  }
}

function supportAIIDBOpen() {
  return new Promise((resolve, reject) => {
    if (!supportAIHasIndexedDB()) return reject(new Error("IndexedDB is not available"));
    const req = indexedDB.open(SUPPORT_AI_IDB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(SUPPORT_AI_IDB_STORE)) db.createObjectStore(SUPPORT_AI_IDB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("IndexedDB open failed"));
    req.onblocked = () => reject(new Error("IndexedDB open blocked"));
  });
}

async function supportAIIDBGet(key, fallback = null) {
  let db = null;
  try {
    db = await supportAIIDBOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(SUPPORT_AI_IDB_STORE, "readonly");
      const req = tx.objectStore(SUPPORT_AI_IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result ?? fallback);
      req.onerror = () => reject(req.error || new Error("IndexedDB get failed"));
    });
  } catch {
    return fallback;
  } finally {
    try { db?.close?.(); } catch {}
  }
}

async function supportAIIDBSet(key, value) {
  let db = null;
  try {
    db = await supportAIIDBOpen();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(SUPPORT_AI_IDB_STORE, "readwrite");
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error || new Error("IndexedDB set failed"));
      tx.objectStore(SUPPORT_AI_IDB_STORE).put(value, key);
    });
    return true;
  } catch {
    return false;
  } finally {
    try { db?.close?.(); } catch {}
  }
}

async function supportAIIDBDelete(key) {
  let db = null;
  try {
    db = await supportAIIDBOpen();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(SUPPORT_AI_IDB_STORE, "readwrite");
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error || new Error("IndexedDB delete failed"));
      tx.objectStore(SUPPORT_AI_IDB_STORE).delete(key);
    });
    return true;
  } catch {
    return false;
  } finally {
    try { db?.close?.(); } catch {}
  }
}

async function supportAIListIndexedDBNames() {
  try {
    if (!supportAIHasIndexedDB() || typeof indexedDB.databases !== "function") return [];
    const list = await indexedDB.databases();
    return (Array.isArray(list) ? list : []).map(item => item?.name).filter(Boolean);
  } catch {
    return [];
  }
}

function supportAIDeleteIndexedDBDatabase(name) {
  return new Promise(resolve => {
    if (!supportAIHasIndexedDB() || !name) return resolve(false);
    let settled = false;
    const finish = value => {
      if (settled) return;
      settled = true;
      resolve(value);
    };
    try {
      const req = indexedDB.deleteDatabase(name);
      req.onsuccess = () => finish(true);
      req.onerror = () => finish(false);
      req.onblocked = () => finish(false);
      setTimeout(() => finish(false), 2500);
    } catch {
      finish(false);
    }
  });
}

function supportAIHasWebGPU() {
  return typeof navigator !== "undefined" && Boolean(navigator.gpu);
}

function supportAIWebGPURequiredMessage() {
  return "iPhoneローカルLLMにはWebGPU対応Safariが必要です。iOS/Safari 26以降で、HTTPSまたは安全なコンテキストから開き、WebGPUが有効な環境で実行してください。";
}

function supportAIResolveBrowserDevice(config, options = {}) {
  const c = normalizeSupportAIConfig(config);
  const strict = options.strict !== false;
  if (c.browserDevice === "webgpu") {
    if (!supportAIHasWebGPU()) {
      if (strict) throw new Error(supportAIWebGPURequiredMessage());
      return "webgpu";
    }
    return "webgpu";
  }
  if (c.browserDevice === "wasm") return "wasm";
  return supportAIHasWebGPU() ? "webgpu" : "wasm";
}

function supportAIFeatureEnabled(config, feature) {
  const c = normalizeSupportAIConfig(config);
  if (!c.localAIEnabled) return false;
  if (feature === "text") return Boolean(c.enableText);
  if (feature === "vision") return Boolean(c.enableVision);
  if (feature === "whisper") return Boolean(c.enableWhisper);
  if (feature === "tts") return Boolean(c.enableTts);
  if (feature === "lfmAudio") return Boolean(c.enableTts && c.voiceConversationProvider === "lfm-audio");
  if (feature === "rag") return Boolean(c.enableRag);
  if (feature === "knowledge") return Boolean(c.enableKnowledge);
  if (feature === "agents") return Boolean(c.enableAgents && c.enableText);
  return true;
}

function supportAIDisabledResult(feature, label) {
  return {
    ok: false,
    text: "",
    error: `${label || feature} はAI設定で無効です。AI設定で有効化してください。`,
    disabledFeature: feature,
  };
}

function supportAIGetPreparedStatus(config) {
  const c = normalizeSupportAIConfig(config);
  const resolvedDevice = supportAIResolveBrowserDevice(c, { strict: false });
  const device = SUPPORT_AI_BROWSER_LOCAL.activeDevice || resolvedDevice;
  return {
    enabled: {
      localAI: Boolean(c.localAIEnabled),
      text: Boolean(c.enableText),
      vision: Boolean(c.enableVision),
      whisper: Boolean(c.enableWhisper),
      tts: Boolean(c.enableTts),
      rag: Boolean(c.enableRag),
      knowledge: Boolean(c.enableKnowledge),
      agents: Boolean(c.enableAgents),
    },
    prepared: { ...SUPPORT_AI_BROWSER_LOCAL.prepared },
    preparedAt: { ...SUPPORT_AI_BROWSER_LOCAL.preparedAt },
    device,
    webGPU: supportAIHasWebGPU(),
    loadedPipelines: SUPPORT_AI_BROWSER_LOCAL.pipelinePromises.size,
    objectUrls: SUPPORT_AI_BROWSER_LOCAL.objectUrls.size,
    logs: supportAIReadInitLogs(50),
    lastError: SUPPORT_AI_BROWSER_LOCAL.lastError || (c.browserDevice === "webgpu" && !supportAIHasWebGPU() ? supportAIWebGPURequiredMessage() : null),
    lastWarning: SUPPORT_AI_BROWSER_LOCAL.lastWarning,
    cache: (() => {
      const resolved = supportAIResolveBrowserCacheUse(c);
      return {
        mode: c.browserCacheMode,
        useBrowserCache: resolved.useBrowserCache,
        available: resolved.status.available,
        blocked: resolved.status.blocked,
        reason: resolved.reason,
        error: resolved.status.error,
      };
    })(),
    remoteModels: Boolean(c.allowRemoteModels),
    localModels: Boolean(c.allowLocalModels),
  };
}

async function supportAIPrepareBrowserLocalFeatures(features = [], rawConfig = DEFAULT_SUPPORT_AI_CONFIG, runtimeOptions = {}) {
  const config = normalizeSupportAIConfig(rawConfig);
  const onLog = runtimeOptions && typeof runtimeOptions.onLog === "function" ? runtimeOptions.onLog : null;
  if (runtimeOptions.clearLogs) supportAIClearInitLogs();
  if (!config.localAIEnabled) {
    supportAIEmitInitLog(onLog, "warn", "ローカルAIが無効です。AI設定でローカルAI全体を有効化してください。");
    return { ok: false, error: "ローカルAIが無効です。", status: supportAIGetPreparedStatus(config) };
  }
  const selected = Array.from(new Set(features.filter(Boolean)));
  const results = [];
  supportAIEmitInitLog(onLog, "info", `初期化開始: ${selected.length ? selected.join(", ") : "対象なし"}`);
  try {
    supportAIEmitInitLog(onLog, "info", "Transformers.js Runtimeを読み込みます", { url: config.transformersCdnUrl });
    await importSupportAITransformers(config, { onLog });
    supportAIEmitInitLog(onLog, "success", "Runtime読込済み");
    const device = supportAIResolveBrowserDevice(config);
    supportAIEmitInitLog(onLog, "info", `推論Device: ${device}`, { webGPU: supportAIHasWebGPU(), requested: config.browserDevice });
    const featureLabels = { text: "Text LLM", vision: "Vision画像理解", whisper: "Whisper ASR", tts: "TTS", lfmAudio: "LFM Audio Voice" };
    for (const feature of selected) {
      if (!supportAIFeatureEnabled(config, feature)) {
        supportAIEmitInitLog(onLog, "warn", `${featureLabels[feature] || feature}: 無効のためスキップ`);
        results.push({ feature, ok: false, skipped: true, error: "disabled" });
        continue;
      }
      if (feature === "lfmAudio") {
        await supportAIGetLfmAudioModel(config, { onLog });
        results.push({ feature, ok: true, model: config.browserLfmAudioModel, task: "lfm-audio-direct", dtype: config.browserLfmAudioPrecision || "q4" });
        continue;
      }
      let task = "";
      let model = "";
      let dtype = "";
      if (feature === "text") {
        task = config.browserTextTask || "text-generation";
        model = config.browserTextModel;
        dtype = config.browserTextDtype || "q4";
      } else if (feature === "vision") {
        task = config.browserVisionTask || "image-to-text";
        model = config.browserVisionModel;
        dtype = config.browserVisionDtype || "q4";
      } else if (feature === "whisper") {
        task = "automatic-speech-recognition";
        model = config.browserWhisperModel;
        dtype = config.browserWhisperDtype || "q8";
      } else if (feature === "tts") {
        task = config.browserTtsTask || "text-to-speech";
        model = config.browserTtsModel;
        dtype = config.browserTtsDtype || "q8";
      } else {
        supportAIEmitInitLog(onLog, "success", `${feature}: モデルロード不要`);
        results.push({ feature, ok: true, note: "no model load required" });
        continue;
      }
      supportAIEmitInitLog(onLog, "info", `${featureLabels[feature] || feature}モデル準備開始`, { task, model, dtype, device });
      await supportAIGetBrowserPipeline(task, model, { device, dtype }, config, { onLog, feature });
      SUPPORT_AI_BROWSER_LOCAL.prepared[feature] = true;
      SUPPORT_AI_BROWSER_LOCAL.preparedAt[feature] = Date.now();
      if (!SUPPORT_AI_BROWSER_LOCAL.activeDevice) SUPPORT_AI_BROWSER_LOCAL.activeDevice = device;
      supportAIEmitInitLog(onLog, "success", `${featureLabels[feature] || feature}モデル準備完了`, { model });
      results.push({ feature, ok: true, model, task, dtype });
    }
    supportAIEmitInitLog(onLog, "success", "初期化完了", { results });
    return { ok: results.every(r => r.ok || r.skipped), results, logs: supportAIReadInitLogs(120), status: supportAIGetPreparedStatus(config) };
  } catch (error) {
    SUPPORT_AI_BROWSER_LOCAL.lastError = supportAIErrorMessage(error);
    supportAIEmitInitLog(onLog, "error", `初期化失敗: ${SUPPORT_AI_BROWSER_LOCAL.lastError}`);
    return { ok: false, results, logs: supportAIReadInitLogs(120), error: SUPPORT_AI_BROWSER_LOCAL.lastError, status: supportAIGetPreparedStatus(config) };
  }
}

async function supportAIClearBrowserModelCaches() {
  supportAIClearPipelineRefs();
  supportAIClearLfmAudioRefs();
  supportAIRevokeAllObjectUrls();
  SUPPORT_AI_BROWSER_LOCAL.modulePromise = null;
  SUPPORT_AI_BROWSER_LOCAL.moduleKey = "";
  supportAIClearInitLogs();
  supportAIAddInitLog("info", "モデルCache削除: メモリ上のpipeline参照とLFM Audio参照を削除しました。");
  SUPPORT_AI_BROWSER_LOCAL.prepared = { runtime: false, text: false, vision: false, whisper: false, tts: false, lfmAudio: false };
  SUPPORT_AI_BROWSER_LOCAL.preparedAt = { runtime: null, text: null, vision: null, whisper: null, tts: null, lfmAudio: null };
  SUPPORT_AI_BROWSER_LOCAL.lastError = null;
  SUPPORT_AI_BROWSER_LOCAL.lastWarning = null;
  let deleted = 0;
  let deletedIndexedDB = 0;
  const indexedDBNames = await supportAIListIndexedDBNames();
  const knownModelDBNames = [
    "transformers-cache",
    "huggingface-cache",
    "onnxruntime-web",
    "onnxruntime-web-cache",
    "onnx-model-cache",
    "onnx-models-v1",
    "ort-wasm-cache",
    "xenova-cache",
  ];
  const modelDBNames = Array.from(new Set([
    ...knownModelDBNames,
    ...indexedDBNames.filter(name => /huggingface|transformers|onnx|ort|xenova|lfm|whisper/i.test(name)),
  ]));
  for (const name of modelDBNames) {
    if (name === SUPPORT_AI_IDB_NAME) continue;
    if (await supportAIDeleteIndexedDBDatabase(name)) deletedIndexedDB += 1;
  }
  const cacheStatus = supportAIGetBrowserCacheStatus();
  if (!cacheStatus.available) {
    const note = cacheStatus.blocked
      ? `この画面はsandbox内で実行されているためCache APIを利用できません。メモリ上のpipeline参照とIndexedDBモデルDB ${deletedIndexedDB} 件を削除しました。ブラウザHTTPキャッシュはSafari側の管理です。`
      : `Cache APIを利用できません。メモリ上のpipeline参照とIndexedDBモデルDB ${deletedIndexedDB} 件を削除しました。ブラウザHTTPキャッシュはSafari側の管理です。`;
    SUPPORT_AI_BROWSER_LOCAL.lastWarning = note;
    return { ok: true, deletedCacheStores: 0, deletedIndexedDB, cacheUnavailable: true, note };
  }
  try {
    const keys = await globalThis.caches.keys();
    for (const key of keys) {
      if (/huggingface|transformers|onnx|xenova|lfm|whisper/i.test(key)) {
        if (await globalThis.caches.delete(key)) deleted += 1;
      }
    }
  } catch (error) {
    const note = `Cache API削除は利用できませんでした: ${supportAIErrorMessage(error)}。メモリ上のpipeline参照は削除済みです。`;
    SUPPORT_AI_BROWSER_LOCAL.lastWarning = note;
    return { ok: true, deletedCacheStores: deleted, deletedIndexedDB, cacheUnavailable: true, note };
  }
  return { ok: true, deletedCacheStores: deleted, deletedIndexedDB, note: `メモリ上のpipeline参照、検出できたTransformers/Hugging Face関連Cache ${deleted} 件、IndexedDBモデルDB ${deletedIndexedDB} 件を削除しました。SafariのHTTPキャッシュや未列挙DBはブラウザ側の管理です。` };
}

async function importSupportAITransformers(config, runtimeOptions = {}) {
  const onLog = runtimeOptions && typeof runtimeOptions.onLog === "function" ? runtimeOptions.onLog : null;
  const cfg = normalizeSupportAIConfig(config);
  const url = cfg.transformersCdnUrl;
  if (!SUPPORT_AI_BROWSER_LOCAL.modulePromise || SUPPORT_AI_BROWSER_LOCAL.moduleKey !== url) {
    SUPPORT_AI_BROWSER_LOCAL.moduleKey = url;
    supportAIClearPipelineRefs();
    supportAIEmitInitLog(onLog, "info", "Transformers.js ESM import開始", { url });
    SUPPORT_AI_BROWSER_LOCAL.modulePromise = import(/* @vite-ignore */ url).then(mod => {
      try {
        const cfg = normalizeSupportAIConfig(config);
        if (mod.env) {
          const cacheResolved = supportAIResolveBrowserCacheUse(cfg);
          mod.env.allowRemoteModels = Boolean(cfg.allowRemoteModels);
          mod.env.allowLocalModels = Boolean(cfg.allowLocalModels);
          mod.env.localModelPath = cfg.localModelPath || "./models/";
          // Transformers.js uses the browser Cache API for model caching when enabled.
          // In sandboxed contexts without allow-same-origin, merely reading window.caches can throw.
          // Disable browser cache automatically in that case so inference can still run.
          if ("useBrowserCache" in mod.env) mod.env.useBrowserCache = Boolean(cacheResolved.useBrowserCache);
          if ("useFSCache" in mod.env) mod.env.useFSCache = false;
          if (!cacheResolved.useBrowserCache && cacheResolved.status.error) {
            SUPPORT_AI_BROWSER_LOCAL.lastWarning = `Cache API無効: ${cacheResolved.status.error}`;
            supportAIEmitInitLog(onLog, "warn", SUPPORT_AI_BROWSER_LOCAL.lastWarning, { cache: cacheResolved });
          } else {
            SUPPORT_AI_BROWSER_LOCAL.lastWarning = null;
            supportAIEmitInitLog(onLog, "info", cacheResolved.useBrowserCache ? "モデルCache: 利用可能" : "モデルCache: 無効", { cache: cacheResolved });
          }
          supportAIConfigureOnnxWebGpuRuntime(mod, cfg, onLog);
          if (mod.env.backends?.onnx?.wasm) {
            mod.env.backends.onnx.wasm.proxy = false;
          }
        }
      } catch {}
      SUPPORT_AI_BROWSER_LOCAL.lastLoadedAt = Date.now();
      SUPPORT_AI_BROWSER_LOCAL.prepared.runtime = true;
      SUPPORT_AI_BROWSER_LOCAL.preparedAt.runtime = Date.now();
      supportAIEmitInitLog(onLog, "success", "Transformers.js Runtime読込完了");
      return mod;
    }).catch(error => {
      SUPPORT_AI_BROWSER_LOCAL.lastError = supportAIErrorMessage(error);
      supportAIEmitInitLog(onLog, "error", `Transformers.js Runtime読込失敗: ${SUPPORT_AI_BROWSER_LOCAL.lastError}`);
      SUPPORT_AI_BROWSER_LOCAL.modulePromise = null;
      throw error;
    });
  }
  return SUPPORT_AI_BROWSER_LOCAL.modulePromise;
}

function supportAIPipelineKey(task, modelId, loadOptions) {
  return JSON.stringify({ task, modelId, loadOptions });
}

function supportAIShouldAutoFallbackToWasm(config, loadOptions) {
  const c = normalizeSupportAIConfig(config);
  // Explicit WebGPU mode is the iPhone local LLM target, so only auto mode may downgrade to WASM.
  return c.browserDevice === "auto" && loadOptions?.device === "webgpu";
}

function supportAIConfigureOnnxWebGpuRuntime(mod, config, onLog) {
  const cfg = normalizeSupportAIConfig(config);
  const wasm = mod?.env?.backends?.onnx?.wasm;
  if (!wasm || cfg.browserDevice !== "webgpu") return;
  wasm.wasmPaths = {
    mjs: `${SUPPORT_AI_ONNX_RUNTIME_DIST_BASE}ort-wasm-simd-threaded.asyncify.mjs`,
    wasm: `${SUPPORT_AI_ONNX_RUNTIME_DIST_BASE}ort-wasm-simd-threaded.asyncify.wasm`,
  };
  supportAIEmitInitLog(onLog, "info", "ONNX Runtime WebGPU WASMをasyncify版に固定", {
    onnxRuntimeWeb: SUPPORT_AI_ONNX_RUNTIME_WEB_VERSION,
    wasmPaths: wasm.wasmPaths,
  });
}

async function importSupportAIOnnxRuntimeWebGpu(onLog = null) {
  const url = `${SUPPORT_AI_ONNX_RUNTIME_DIST_BASE}ort.webgpu.min.mjs`;
  supportAIEmitInitLog(onLog, "info", "ONNX Runtime WebGPU直接読込開始", { url });
  const ortModule = await import(/* @vite-ignore */ url);
  const ort = ortModule?.default?.InferenceSession ? ortModule.default : ortModule;
  try {
    if (ort.env?.wasm) {
      ort.env.wasm.numThreads = 1;
      ort.env.wasm.wasmPaths = {
        mjs: `${SUPPORT_AI_ONNX_RUNTIME_DIST_BASE}ort-wasm-simd-threaded.asyncify.mjs`,
        wasm: `${SUPPORT_AI_ONNX_RUNTIME_DIST_BASE}ort-wasm-simd-threaded.asyncify.wasm`,
      };
    }
  } catch {}
  supportAIEmitInitLog(onLog, "success", "ONNX Runtime WebGPU直接読込完了", { onnxRuntimeWeb: SUPPORT_AI_ONNX_RUNTIME_WEB_VERSION });
  return ort;
}

async function supportAIFetchText(url) {
  const res = await fetch(url, { mode: "cors", credentials: "omit" });
  if (!res.ok) throw new Error(`Failed to fetch ${url}: ${res.status}`);
  return await res.text();
}

function supportAIRewriteLfmAudioModelSource(source, audioProcessorUrl) {
  return String(source || "")
    .replace(/import\s+\*\s+as\s+ort\s+from\s+['"]onnxruntime-web['"]\s*;/, "const ort = globalThis.__SupportAIOrt;")
    .replace(/import\s+\{\s*AutoTokenizer\s*,\s*env\s*\}\s+from\s+['"]@huggingface\/transformers['"]\s*;/, "const { AutoTokenizer, env } = globalThis.__SupportAITransformers;")
    .replace(/import\s+\{\s*loadMelConfig\s*,\s*computeMelSpectrogram\s*,\s*loadAudioFile\s*\}\s+from\s+['"]\.\/audio-processor\.js['"]\s*;/, `import { loadMelConfig, computeMelSpectrogram, loadAudioFile } from "${audioProcessorUrl}";`);
}

async function importSupportAILfmAudioRuntime(config, runtimeOptions = {}) {
  const onLog = runtimeOptions && typeof runtimeOptions.onLog === "function" ? runtimeOptions.onLog : null;
  const key = `${SUPPORT_AI_LFM_AUDIO_SPACE_BASE}|${config.transformersCdnUrl}|${SUPPORT_AI_ONNX_RUNTIME_WEB_VERSION}`;
  if (SUPPORT_AI_BROWSER_LOCAL.lfmAudioRuntimePromise && SUPPORT_AI_BROWSER_LOCAL.lfmAudioRuntimeKey === key) {
    return SUPPORT_AI_BROWSER_LOCAL.lfmAudioRuntimePromise;
  }
  SUPPORT_AI_BROWSER_LOCAL.lfmAudioRuntimeKey = key;
  SUPPORT_AI_BROWSER_LOCAL.lfmAudioRuntimePromise = (async () => {
    const [ort, transformers] = await Promise.all([
      importSupportAIOnnxRuntimeWebGpu(onLog),
      importSupportAITransformers(config, { onLog }),
    ]);
    globalThis.__SupportAIOrt = ort;
    globalThis.__SupportAITransformers = transformers;
    supportAIEmitInitLog(onLog, "info", "LFM Audio公式runtimeソース取得開始", { base: SUPPORT_AI_LFM_AUDIO_SPACE_BASE });
    const [processorSource, modelSource] = await Promise.all([
      supportAIFetchText(`${SUPPORT_AI_LFM_AUDIO_SPACE_BASE}/audio-processor.js`),
      supportAIFetchText(`${SUPPORT_AI_LFM_AUDIO_SPACE_BASE}/audio-model.js`),
    ]);
    const processorUrl = supportAIRegisterObjectUrl(URL.createObjectURL(new Blob([processorSource], { type: "text/javascript" })));
    const patchedModelSource = supportAIRewriteLfmAudioModelSource(modelSource, processorUrl);
    const modelUrl = supportAIRegisterObjectUrl(URL.createObjectURL(new Blob([patchedModelSource], { type: "text/javascript" })));
    const mod = await import(/* @vite-ignore */ modelUrl);
    supportAIEmitInitLog(onLog, "success", "LFM Audio公式runtime読込完了");
    return mod;
  })().catch(error => {
    SUPPORT_AI_BROWSER_LOCAL.lfmAudioRuntimePromise = null;
    SUPPORT_AI_BROWSER_LOCAL.lfmAudioRuntimeKey = "";
    throw error;
  });
  return SUPPORT_AI_BROWSER_LOCAL.lfmAudioRuntimePromise;
}

function supportAILfmAudioModelBase(modelId) {
  const value = String(modelId || DEFAULT_SUPPORT_AI_CONFIG.browserLfmAudioModel).trim();
  if (/^https?:\/\//i.test(value)) return value.replace(/\/$/, "");
  return `https://huggingface.co/${value}/resolve/main`;
}

async function supportAIGetLfmAudioModel(rawConfig = DEFAULT_SUPPORT_AI_CONFIG, runtimeOptions = {}) {
  const config = normalizeSupportAIConfig(rawConfig);
  const onLog = runtimeOptions && typeof runtimeOptions.onLog === "function" ? runtimeOptions.onLog : null;
  if (!supportAIHasWebGPU()) throw new Error(supportAIWebGPURequiredMessage());
  const modelId = config.browserLfmAudioModel;
  const precision = config.browserLfmAudioPrecision || "q4";
  const key = `${modelId}|${precision}|${config.browserDevice}|${SUPPORT_AI_ONNX_RUNTIME_WEB_VERSION}`;
  if (SUPPORT_AI_BROWSER_LOCAL.lfmAudioModelPromise && SUPPORT_AI_BROWSER_LOCAL.lfmAudioModelKey === key) {
    return SUPPORT_AI_BROWSER_LOCAL.lfmAudioModelPromise;
  }
  supportAIClearLfmAudioRefs();
  SUPPORT_AI_BROWSER_LOCAL.lfmAudioModelKey = key;
  SUPPORT_AI_BROWSER_LOCAL.lfmAudioModelPromise = (async () => {
    const runtime = await importSupportAILfmAudioRuntime(config, { onLog });
    const model = new runtime.AudioModel();
    const modelBase = supportAILfmAudioModelBase(modelId);
    supportAIEmitInitLog(onLog, "info", "LFM Audioモデル準備開始", { model: modelId, precision, modelBase });
    await model.load(modelBase, {
      device: "webgpu",
      quantization: precision,
      progressCallback: info => {
        if (!info) return;
        supportAIEmitInitLog(onLog, "info", `LFM Audio load: ${info.file || info.status || ""}`, { progress: info.progress || 0, status: info.status || "" });
      },
    });
    SUPPORT_AI_BROWSER_LOCAL.lfmAudioModel = model;
    SUPPORT_AI_BROWSER_LOCAL.prepared.lfmAudio = true;
    SUPPORT_AI_BROWSER_LOCAL.preparedAt.lfmAudio = Date.now();
    SUPPORT_AI_BROWSER_LOCAL.prepared.tts = true;
    SUPPORT_AI_BROWSER_LOCAL.preparedAt.tts = Date.now();
    SUPPORT_AI_BROWSER_LOCAL.activeDevice = "webgpu";
    supportAIEmitInitLog(onLog, "success", "LFM Audioモデル準備完了", { model: modelId, precision });
    return { model, runtime };
  })().catch(error => {
    SUPPORT_AI_BROWSER_LOCAL.lfmAudioModelPromise = null;
    SUPPORT_AI_BROWSER_LOCAL.lfmAudioModelKey = "";
    SUPPORT_AI_BROWSER_LOCAL.lastError = supportAIErrorMessage(error);
    supportAIEmitInitLog(onLog, "error", `LFM Audioモデル準備失敗: ${SUPPORT_AI_BROWSER_LOCAL.lastError}`);
    throw error;
  });
  return SUPPORT_AI_BROWSER_LOCAL.lfmAudioModelPromise;
}

async function supportAIStartBrowserPipeline(tf, task, modelId, loadOptions) {
  const key = supportAIPipelineKey(task, modelId, loadOptions);
  if (!SUPPORT_AI_BROWSER_LOCAL.pipelinePromises.has(key)) {
    let promise;
    promise = tf.pipeline(task, modelId, loadOptions).then(pipe => {
      SUPPORT_AI_BROWSER_LOCAL.activeDevice = loadOptions?.device || SUPPORT_AI_BROWSER_LOCAL.activeDevice || "auto";
      return pipe;
    }).catch(error => {
      if (SUPPORT_AI_BROWSER_LOCAL.pipelinePromises.get(key) === promise) {
        SUPPORT_AI_BROWSER_LOCAL.pipelinePromises.delete(key);
      }
      throw error;
    });
    SUPPORT_AI_BROWSER_LOCAL.pipelinePromises.set(key, promise);
  }
  return SUPPORT_AI_BROWSER_LOCAL.pipelinePromises.get(key);
}

async function supportAIGetBrowserPipeline(task, modelId, loadOptions, config, runtimeOptions = {}) {
  const onLog = runtimeOptions && typeof runtimeOptions.onLog === "function" ? runtimeOptions.onLog : null;
  const tf = await importSupportAITransformers(config, { onLog });
  if (!tf.pipeline) throw new Error("Transformers.js pipeline が見つかりません。CDN URLを確認してください。");
  const normalizedOptions = { ...(loadOptions || {}) };
  supportAIEmitInitLog(onLog, "info", `pipeline開始: ${task}`, { model: modelId, options: normalizedOptions });
  try {
    const pipe = await supportAIStartBrowserPipeline(tf, task, modelId, normalizedOptions);
    supportAIEmitInitLog(onLog, "success", `pipeline準備成功: ${task}`, { model: modelId, device: normalizedOptions.device || "auto" });
    return pipe;
  } catch (error) {
    const firstMessage = supportAIErrorMessage(error);
    supportAIEmitInitLog(onLog, "error", `pipeline準備失敗: ${task} / ${firstMessage}`, { model: modelId, options: normalizedOptions });
    if (supportAIShouldAutoFallbackToWasm(config, normalizedOptions)) {
      const wasmOptions = { ...normalizedOptions, device: "wasm" };
      SUPPORT_AI_BROWSER_LOCAL.lastWarning = `WebGPUでの${task}モデル準備に失敗したため、WASMへ自動切替しました。元エラー: ${firstMessage}`;
      supportAIEmitInitLog(onLog, "warn", SUPPORT_AI_BROWSER_LOCAL.lastWarning, { model: modelId, fallbackDevice: "wasm" });
      try {
        supportAIEmitInitLog(onLog, "info", `WASMで再試行: ${task}`, { model: modelId, options: wasmOptions });
        const pipe = await supportAIStartBrowserPipeline(tf, task, modelId, wasmOptions);
        SUPPORT_AI_BROWSER_LOCAL.activeDevice = "wasm";
        supportAIEmitInitLog(onLog, "success", `WASM fallback成功: ${task}`, { model: modelId });
        return pipe;
      } catch (wasmError) {
        const wasmMessage = supportAIErrorMessage(wasmError);
        SUPPORT_AI_BROWSER_LOCAL.lastError = `WebGPUとWASMの両方でモデル準備に失敗しました。WebGPU: ${firstMessage} / WASM: ${wasmMessage}`;
        supportAIEmitInitLog(onLog, "error", SUPPORT_AI_BROWSER_LOCAL.lastError, { model: modelId });
        throw new Error(SUPPORT_AI_BROWSER_LOCAL.lastError);
      }
    }
    throw error;
  }
}

function supportAIExtractPipelineText(output) {
  if (typeof output === "string") return output;
  if (Array.isArray(output)) {
    return output.map(item => supportAIExtractPipelineText(item)).filter(Boolean).join("\n");
  }
  if (output && typeof output === "object") {
    if (Array.isArray(output.generated_text)) {
      const messages = output.generated_text;
      const assistant = [...messages].reverse().find(m => m && typeof m === "object" && m.role === "assistant" && typeof m.content === "string");
      const last = assistant || [...messages].reverse().find(m => m && typeof m === "object" && typeof m.content === "string");
      return String(last?.content || "");
    }
    if (output.generated_text && typeof output.generated_text === "object") {
      return String(output.generated_text.content ?? output.generated_text.text ?? "");
    }
    return String(
      output.generated_text ??
      output.summary_text ??
      output.text ??
      output.caption ??
      output.transcription ??
      output.label ??
      output.content ??
      ""
    );
  }
  return "";
}

function supportAIBuildChatSystemContent(config = DEFAULT_SUPPORT_AI_CONFIG) {
  const language = normalizeSupportAIConfig(config).language || "ja";
  const answerLanguage = language === "ja" ? "日本語" : language;

    "短く自然な文章で答えます。",
    "コードを求められた時だけコードを出します。",
  ].join("\n");
}

function supportAIBuildChatMessages(prompt, config = DEFAULT_SUPPORT_AI_CONFIG) {
  return [
    { role: "system", content: supportAIBuildChatSystemContent(config) },
    { role: "user", content: String(prompt || "").trim() },
  ];
}

function supportAICleanGeneratedText(text) {
  let output = String(text || "").replace(/\r\n/g, "\n").trim();
  output = output.replace(/^(assistant|supportai|回答)\s*[:：]\s*/i, "").trim();
  output = output.replace(/\n(?:user|ユーザー|質問)\s*[:：][\s\S]*$/i, "").trim();
  output = output.replace(/<\|endoftext\|>|<\|im_end\|>|<\/s>/g, "").trim();
  output = output
    .replace(/(^|\n)\s*(役割名の除外|JSONの不要|英語の見出しの除外|プロンプトの復唱)[\s\S]*?(?=\n\s*(役割名の除外|JSONの不要|英語の見出しの除外|プロンプトの復唱)|$)/g, "")
    .replace(/事実と推測を分け、知らないことは知らないと\s*/g, "")
    .trim();
  return output;
}

function supportAIEmitTokenChars(onToken, chunk) {
  if (typeof onToken !== "function") return;
  for (const char of Array.from(String(chunk || ""))) {
    try { onToken(char); } catch {}
  }
}

function supportAIShouldAttachDocumentContext(message) {
  const text = String(message || "").toLowerCase();
  const explicitLocalReference = /現在|いま|この|その|上の|下の|貼った|表示中|開いている|エディタ|ページ|ファイル|選択|文書|本文/.test(text);
  if (explicitLocalReference) return true;
  const codeTarget = /コード|html|markdown|md|css|javascript|js/.test(text);
  const editIntent = /修正|校正|要約|解析|レビュー|差分|エラー|バグ|実装|リファクタ|直して|見て|チェック|改善|整形|補完|変換/.test(text);
  return codeTarget && editIntent;
}

function supportAITextChunks(text, chunkSize = 4200) {
  const value = String(text || "");
  const chunks = [];
  for (let start = 0; start < value.length; start += chunkSize) {
    chunks.push({ index: chunks.length + 1, start, end: Math.min(value.length, start + chunkSize), text: value.slice(start, start + chunkSize) });
  }
  return chunks;
}

function supportAIReferenceKeywords(query) {
  return Array.from(new Set(String(query || "").toLowerCase().match(/[a-z0-9_\-]{2,}|[\u3040-\u30ff\u3400-\u9fff]{2,}/g) || []));
}

function supportAIScoreReferenceChunk(query, chunk) {
  const keywords = supportAIReferenceKeywords(query);
  if (!keywords.length) return 0;
  const body = String(chunk?.text || "").toLowerCase();
  return keywords.reduce((score, keyword) => score + (body.includes(keyword) ? 1 : 0), 0);
}

function supportAIExtractReferenceSignals(text, limit = 24) {
  const lines = String(text || "").split(/\r?\n/);
  const patterns = [
    /^\s{0,4}#{1,6}\s+.+/,
    /^\s*<(title|h[1-6]|script|style|section|article|main|header|footer|dialog|form|button|input|textarea|select)\b[^>]*>/i,
    /^\s*(function|const|let|var|class)\s+[A-Za-z0-9_$-]+/,
    /^\s*[A-Za-z0-9_$-]+\s*[:=]\s*(function|\(|async|\{)/,
  ];
  return lines
    .map((line, i) => ({ line: i + 1, text: line.trim() }))
    .filter(item => item.text && patterns.some(pattern => pattern.test(item.text)))
    .slice(0, limit);
}

function supportAISummarizeReferenceChunk(chunk, query) {
  const lines = String(chunk.text || "").split(/\r?\n/);
  const nonEmpty = lines.map(line => line.trim()).filter(Boolean);
  const signals = supportAIExtractReferenceSignals(chunk.text, 6);
  const preview = [
    ...nonEmpty.slice(0, 2),
    ...(nonEmpty.length > 4 ? ["..."] : []),
    ...nonEmpty.slice(-2),
  ].filter(Boolean).join(" / ");
  return {
    index: chunk.index,
    start: chunk.start,
    end: chunk.end,
    score: supportAIScoreReferenceChunk(query, chunk),
    signals,
    preview: preview.slice(0, 420),
  };
}

function supportAIBuildReferenceText(text, query, options = {}) {
  const value = String(text || "");
  const maxFullChars = options.maxFullChars || 16000;
  const chunkSize = options.chunkSize || 4200;
  const maxRelevantChunks = options.maxRelevantChunks || 4;
  if (value.length <= maxFullChars) return value;

  const chunks = supportAITextChunks(value, chunkSize);
  const chunkSummaries = chunks.map(chunk => supportAISummarizeReferenceChunk(chunk, query));
  const ranked = [...chunkSummaries].sort((a, b) => b.score - a.score || a.index - b.index);
  const picked = new Set([
    1,
    chunks.length,
    ...ranked.filter(item => item.score > 0).slice(0, maxRelevantChunks).map(item => item.index),
  ]);
  if (picked.size < Math.min(maxRelevantChunks, chunks.length)) {
    const stride = Math.max(1, Math.floor(chunks.length / Math.min(maxRelevantChunks, chunks.length)));
    for (let i = 1; i <= chunks.length && picked.size < Math.min(maxRelevantChunks + 2, chunks.length); i += stride) picked.add(i);
  }

  const globalSignals = supportAIExtractReferenceSignals(value, 40);
  const mapText = chunkSummaries.map(item => {
    const signals = item.signals.map(signal => `L${signal.line}:${signal.text}`).join(" | ");
    return `- chunk ${item.index}/${chunks.length} chars ${item.start}-${item.end} score=${item.score}: ${signals || item.preview}`;
  }).join("\n");
  const excerpts = [...picked].sort((a, b) => a - b).map(index => {
    const chunk = chunks[index - 1];
    return `--- chunk ${index}/${chunks.length} chars ${chunk.start}-${chunk.end} ---\n${chunk.text}`;
  }).join("\n\n");

  return [
    "[全文圧縮参照]",
    `総文字数: ${value.length}`,
    `総行数: ${value.split(/\r?\n/).length}`,
    `チャンク数: ${chunks.length} / チャンクサイズ: ${chunkSize}`,
    "",
    "[全体シグナル]",
    globalSignals.map(signal => `L${signal.line}: ${signal.text}`).join("\n") || "検出なし",
    "",
    "[全文チャンクマップ]",
    mapText,
    "",
    "[関連/境界チャンク本文]",
    excerpts,
  ].join("\n");
}

function supportAIChatReferenceForMessage(message, target) {
  if (!target || !String(target.text || "").trim()) return { scope: "none", text: "", range: null, label: "" };
  if (target.scope === "selection") {
    return {
      scope: "selection",
      text: supportAIBuildReferenceText(target.text, message),
      range: target.range || null,
      label: "選択範囲",
    };
  }
  if (!supportAIShouldAttachDocumentContext(message)) return { scope: "none", text: "", range: null, label: "" };
  return {
    scope: "document",
    text: supportAIBuildReferenceText(target.text, message),
    range: null,
    label: "現在の文書",
  };
}

async function supportAIBrowserGenerateText(prompt, options = {}, rawConfig = DEFAULT_SUPPORT_AI_CONFIG) {
  const config = normalizeSupportAIConfig({ ...rawConfig, ...options });
  if (!supportAIFeatureEnabled(config, "text")) return supportAIDisabledResult("text", "Text LLM");
  let device = "";
  const model = options.model || config.browserTextModel;
  const task = options.task || config.browserTextTask || "text-generation";
  const dtype = options.dtype || config.browserTextDtype || "q4";
  const useChatInput = Boolean(options.chat);
  try {
    device = supportAIResolveBrowserDevice(config);
    const pipe = await supportAIGetBrowserPipeline(task, model, { device, dtype }, config);
    SUPPORT_AI_BROWSER_LOCAL.prepared.text = true;
    SUPPORT_AI_BROWSER_LOCAL.preparedAt.text = Date.now();
    if (!SUPPORT_AI_BROWSER_LOCAL.activeDevice) SUPPORT_AI_BROWSER_LOCAL.activeDevice = device;
    const maxNewTokens = Math.min(config.maxTokens || 512, config.browserMaxNewTokens || 512);
    const generationOptions = {
      max_new_tokens: maxNewTokens,
      do_sample: useChatInput ? false : config.temperature > 0,
    };
    if (!useChatInput) {
      generationOptions.temperature = config.temperature;
      generationOptions.return_full_text = false;
    }
    if (typeof options.onToken === "function") {
      try {
        const tf = await importSupportAITransformers(config);
        if (tf.TextStreamer && pipe.tokenizer) {
          generationOptions.streamer = new tf.TextStreamer(pipe.tokenizer, {
            skip_prompt: true,
            skip_special_tokens: true,
            callback_function: (chunk) => {
              supportAIEmitTokenChars(options.onToken, chunk);
            },
          });
        }
      } catch {}
    }
    const effectiveInput = useChatInput
      ? (Array.isArray(prompt) ? prompt : supportAIBuildChatMessages(prompt, config))
      : String(prompt || "");
    const output = await pipe(effectiveInput, generationOptions);
    const text = supportAICleanGeneratedText(supportAIExtractPipelineText(output));
    return { ok: Boolean(text), text, provider: "browser-local", model, device, raw: supportAISlimRawOutput(output), usage: null, error: text ? null : "ブラウザ内Text推論は完了しましたが、空の結果でした。" };
  } catch (error) {
    SUPPORT_AI_BROWSER_LOCAL.lastError = supportAIErrorMessage(error);
    return { ok: false, text: "", provider: "browser-local", model, device, error: SUPPORT_AI_BROWSER_LOCAL.lastError };
  }
}

async function supportAIBrowserLfmAudioInterleaved(input = {}, rawConfig = DEFAULT_SUPPORT_AI_CONFIG) {
  const config = normalizeSupportAIConfig({ ...rawConfig, ...input });
  const audio = input.audio || input.file || null;
  const textPrompt = String(input.prompt || input.text || "").trim();
  if ((!audio || typeof audio === "string") && !textPrompt) return { ok: false, text: "", transcript: "", audioUrl: "", error: "LFM Audio音声会話はFile/Blob音声またはテキストを指定してください。" };
  if (!supportAIFeatureEnabled(config, "tts")) return { ...supportAIDisabledResult("tts", "LFM Audio Voice Conversation"), transcript: "", audioUrl: "" };
  const startedAt = performance.now();
  try {
    const onLog = input.onLog || null;
    const { model, runtime } = await supportAIGetLfmAudioModel(config, { onLog });
    const maxNewTokens = Math.min(Number(input.maxNewTokens || config.browserMaxNewTokens || 512), 1024);
    const options = {
      maxNewTokens,
      textTemperature: Number(input.textTemperature ?? config.temperature ?? 0.7),
      audioTemperature: Number(input.audioTemperature ?? 0.8),
      audioTopK: Number(input.audioTopK ?? 64),
      systemPrompt: input.systemPrompt || "Respond with interleaved text and audio.",
      onToken: typeof input.onToken === "function" ? input.onToken : undefined,
    };
    let generated;
    if (audio && typeof audio !== "string") {
      const loaded = await runtime.loadAudioFile(audio);
      generated = await model.generateInterleaved(loaded.audioData, loaded.sampleRate, textPrompt, options);
    } else {
      generated = await model.generateInterleavedFromText(textPrompt, options);
    }
    let audioUrl = "";
    if (Array.isArray(generated?.audioCodes) && generated.audioCodes.length && typeof model.decodeAudioCodes === "function") {
      const waveform = await model.decodeAudioCodes(generated.audioCodes);
      if (waveform?.length) {
        const blob = supportAIEncodeWav(waveform, 24000);
        audioUrl = supportAIRegisterObjectUrl(URL.createObjectURL(blob));
      }
    }
    const text = String(generated?.text || generated?.textOutput || "").trim();
    return {
      ok: Boolean(text || audioUrl),
      provider: "browser-local-lfm-audio",
      model: config.browserLfmAudioModel,
      precision: config.browserLfmAudioPrecision || "q4",
      text,
      transcript: "",
      audioUrl,
      raw: { audioFrames: generated?.audioCodes?.length || 0, durationMs: Math.round(performance.now() - startedAt) },
      error: text || audioUrl ? null : "LFM Audio推論は完了しましたが、テキストまたは音声を生成できませんでした。",
    };
  } catch (error) {
    SUPPORT_AI_BROWSER_LOCAL.lastError = supportAIErrorMessage(error);
    return { ok: false, provider: "browser-local-lfm-audio", model: config.browserLfmAudioModel, precision: config.browserLfmAudioPrecision || "q4", text: "", transcript: "", audioUrl: "", error: SUPPORT_AI_BROWSER_LOCAL.lastError };
  }
}

async function supportAIBrowserLfmAudioTranscribe(input = {}, rawConfig = DEFAULT_SUPPORT_AI_CONFIG) {
  const config = normalizeSupportAIConfig({ ...rawConfig, ...input });
  const audio = input.audio || input.file || null;

    const result = await model.transcribe(loaded.audioData, loaded.sampleRate, {

function supportAIEncodeWav(samples, sampleRate = 16000) {
  const input = samples instanceof Float32Array ? samples : new Float32Array(Array.from(samples || []));
  const buffer = new ArrayBuffer(44 + input.length * 2);
  const view = new DataView(buffer);
  const writeString = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
  writeString(0, "RIFF");
  view.setUint32(4, 36 + input.length * 2, true);
  writeString(8, "WAVE");
  writeString(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, "data");
  view.setUint32(40, input.length * 2, true);
  let offset = 44;
  for (let i = 0; i < input.length; i++, offset += 2) {
    const s = Math.max(-1, Math.min(1, input[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
  }
  return new Blob([view], { type: "audio/wav" });
}

function supportAIExtractAudioBlob(output) {
  if (!output) return null;
  if (output instanceof Blob) return output;
  if (output.blob instanceof Blob) return output.blob;
  if (output.audio instanceof Blob) return output.audio;
  const audio = output.audio || output.waveform || output.array || output.samples;
  if (audio && (Array.isArray(audio) || ArrayBuffer.isView(audio))) {
    const sr = Number(output.sampling_rate || output.sample_rate || output.samplingRate || 16000);
    return supportAIEncodeWav(audio, sr);
  }
  return null;
}

function supportAISpeakWithWebSpeech(text, options = {}) {
  return new Promise((resolve) => {
    try {
      if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) {
        resolve({ ok: false, error: "このブラウザではWeb Speech TTSを利用できません。" });
        return;
      }
      const utterance = new SpeechSynthesisUtterance(String(text || ""));
      utterance.lang = options.language || "ja-JP";
      utterance.rate = Number(options.rate || 1);
      utterance.pitch = Number(options.pitch || 1);
      utterance.onend = () => resolve({ ok: true, spoken: true, provider: "browser-local-web-speech", text: String(text || "") });
      utterance.onerror = (event) => resolve({ ok: false, error: event?.error || "Web Speech TTS failed" });
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    } catch (error) {
      resolve({ ok: false, error: supportAIErrorMessage(error) });
    }
  });
}

async function supportAIBrowserTextToSpeech(text, options = {}, rawConfig = DEFAULT_SUPPORT_AI_CONFIG) {
  const content = String(text || options.prompt || "").trim();
  if (!content) return { ok: false, text: "", audioUrl: "", error: "TTS対象テキストが空です。" };
  const config = normalizeSupportAIConfig({ ...rawConfig, ...options });
  if (!supportAIFeatureEnabled(config, "tts")) return { ...supportAIDisabledResult("tts", "TTS"), audioUrl: "", text: content };
  let device = "";
  const model = options.model || config.browserTtsModel;
  const task = options.task || config.browserTtsTask || "text-to-speech";
  const dtype = options.dtype || config.browserTtsDtype || "q8";
  try {
    device = supportAIResolveBrowserDevice(config);
    const pipe = await supportAIGetBrowserPipeline(task, model, { device, dtype }, config);
    SUPPORT_AI_BROWSER_LOCAL.prepared.tts = true;
    SUPPORT_AI_BROWSER_LOCAL.preparedAt.tts = Date.now();
    if (!SUPPORT_AI_BROWSER_LOCAL.activeDevice) SUPPORT_AI_BROWSER_LOCAL.activeDevice = device;
    const output = await pipe(content, { language: options.language || config.language || "ja" });
    const blob = supportAIExtractAudioBlob(output);
    if (blob) {
      const audioUrl = supportAIRegisterObjectUrl(URL.createObjectURL(blob));
      return { ok: true, text: content, audioUrl, provider: "browser-local-tts", model, device, raw: supportAISlimRawOutput(output), error: null };
    }
    const extracted = supportAIExtractPipelineText(output);
    return { ok: Boolean(extracted), text: extracted || content, audioUrl: "", provider: "browser-local-tts", model, device, raw: supportAISlimRawOutput(output), error: extracted ? null : "TTS pipelineは完了しましたが、音声Blobを抽出できませんでした。" };
  } catch (error) {
    SUPPORT_AI_BROWSER_LOCAL.lastError = supportAIErrorMessage(error);
    if (config.browserUseSpeechSynthesisFallback) {
      const fallback = await supportAISpeakWithWebSpeech(content, { language: config.language === "ja" ? "ja-JP" : config.language });
      if (fallback.ok) return { ...fallback, modality: "browser-local-tts", model: "Web Speech API", audioUrl: "" };
    }
    return { ok: false, text: content, audioUrl: "", provider: "browser-local-tts", model, device, error: SUPPORT_AI_BROWSER_LOCAL.lastError };
  }
}

function createOpenAICompatiblePayload({ prompt, config, model, imageDataUrl = null }) {
  const content = imageDataUrl
    ? [
        { type: "text", text: prompt },
        { type: "image_url", image_url: { url: imageDataUrl } },
      ]
    : prompt;
  return {
    model: model || config.textModel,
    messages: [
      { role: "system", content: "あなたはエディタ統合AIです。必要な結果だけを返します。" },
      { role: "user", content },
    ],
    temperature: config.temperature,
    max_tokens: config.maxTokens,
    stream: false,
  };
}

function createOllamaPayload({ prompt, config, model, imageDataUrl = null }) {
  const message = { role: "user", content: prompt };
  if (imageDataUrl) message.images = [dataUrlToBase64(imageDataUrl)];
  return {
    model: model || config.textModel,
    messages: [message],
    options: {
      temperature: config.temperature,
      num_predict: config.maxTokens,
    },
    stream: false,
  };
}

function shouldUseBrowserLocal(provider) {
  return true;
}

function shouldFallbackToServer(provider) {
  return false;
}

function shouldUseServer(provider) {
  return false;
}

function createSupportAIProviders(rawConfig = DEFAULT_SUPPORT_AI_CONFIG) {
  const config = normalizeSupportAIConfig(rawConfig);

  async function askServerText(prompt, options = {}) {
    const merged = normalizeSupportAIConfig({ ...config, ...options });
    const isOllama = merged.provider === "ollama";
    const endpoint = isOllama ? merged.ollamaEndpoint : merged.endpoint;
    const payload = isOllama
      ? createOllamaPayload({ prompt, config: merged, model: options.model || merged.textModel })
      : createOpenAICompatiblePayload({ prompt, config: merged, model: options.model || merged.textModel });
    const res = await supportFetchJson(endpoint, payload, merged);
    if (!res.ok) return res;
    const text = isOllama ? supportAITextFromOllama(res.data) : supportAITextFromOpenAICompatible(res.data);
    return { ok: true, text, usage: res.data?.usage || null, raw: res.data, provider: merged.provider, error: null };
  }

  async function askText(prompt, options = {}) {
    if (shouldUseBrowserLocal(config.provider)) {
      const local = await supportAIBrowserGenerateText(prompt, options, config);
      if (local.ok || !shouldFallbackToServer(config.provider)) return local;
      const server = await askServerText(prompt, options);
      return server.ok ? { ...server, fallbackFrom: local.error } : { ...server, error: `Browser Local失敗: ${local.error}\nFallback失敗: ${server.error}` };
    }
    if (shouldUseServer(config.provider)) return askServerText(prompt, options);
    return { ok: false, text: "", error: `未対応Providerです: ${config.provider}` };
  }

  async function analyzeServerImage(file, options = {}) {
    if (!file) return { ok: false, text: "", error: "画像ファイルが選択されていません。" };
    const prompt = options.instruction || "この画像を説明してください。";
    const imageDataUrl = await fileToDataUrl(file);
    const merged = normalizeSupportAIConfig({ ...config, ...options });
    const isOllama = merged.provider === "ollama";
    const endpoint = isOllama ? merged.ollamaEndpoint : merged.endpoint;
    const payload = isOllama
      ? createOllamaPayload({ prompt, config: merged, model: options.model || merged.visionModel, imageDataUrl })
      : createOpenAICompatiblePayload({ prompt, config: merged, model: options.model || merged.visionModel, imageDataUrl });
    const res = await supportFetchJson(endpoint, payload, merged);
    if (!res.ok) return res;
    const text = isOllama ? supportAITextFromOllama(res.data) : supportAITextFromOpenAICompatible(res.data);
    return { ok: true, text, usage: res.data?.usage || null, raw: res.data, provider: merged.provider, error: null };
  }

  async function analyzeImage(file, options = {}) {
    if (shouldUseBrowserLocal(config.provider)) {
      const local = await supportAIBrowserAnalyzeImage(file, options, config);
      if (local.ok || !shouldFallbackToServer(config.provider)) return local;
      const server = await analyzeServerImage(file, options);
      return server.ok ? { ...server, fallbackFrom: local.error } : { ...server, error: `Browser Local VL失敗: ${local.error}\nFallback失敗: ${server.error}` };
    }
    return analyzeServerImage(file, options);
  }

  async function transcribeServerAudio(file, options = {}) {
    if (!file) return { ok: false, text: "", error: "音声ファイルが選択されていません。" };
    const merged = normalizeSupportAIConfig({ ...config, ...options });
    const endpoint = String(options.endpoint || merged.whisperEndpoint || merged.audioEndpoint || "").trim();
    if (!endpoint) {
      return { ok: false, text: "", error: "音声文字起こし用Endpointが未設定です。Browser Localを使うか、Whisper/LFM-Audio endpointを設定してください。" };
    }
    const timeoutMs = options.timeoutMs || merged.timeoutMs;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const form = new FormData();
      form.append("file", file);
      form.append("audio", file);
      form.append("model", options.model || merged.whisperModel || merged.browserWhisperModel || "whisper-1");
      form.append("language", options.language || merged.language || "ja");
      const response = await fetch(endpoint, { method: "POST", body: form, signal: controller.signal });
      const bodyText = await response.text().catch(() => "");
      let data = {};
      try { data = bodyText ? JSON.parse(bodyText) : {}; } catch { data = { text: bodyText }; }
      if (!response.ok) return { ok: false, text: "", error: `Audio endpoint error: ${response.status}${bodyText ? ` ${bodyText.slice(0, 240)}` : ""}`, raw: data };
      return { ok: true, text: String(data.text ?? data.result ?? data.transcript ?? ""), error: null, raw: data };
    } catch (e) {
      return { ok: false, text: "", error: supportAIErrorMessage(e) };
    } finally {
      clearTimeout(timer);
    }
  }

  async function transcribeAudio(file, options = {}) {
    if (shouldUseBrowserLocal(config.provider)) {
      const local = await supportAIBrowserTranscribeAudio(file, options, config);
      if (local.ok || !shouldFallbackToServer(config.provider)) return local;
      const server = await transcribeServerAudio(file, options);
      return server.ok ? { ...server, fallbackFrom: local.error } : { ...server, error: `Browser Local ASR失敗: ${local.error}\nFallback失敗: ${server.error}` };
    }
    return transcribeServerAudio(file, options);
  }

  return {
    config,
    status() {
      const device = supportAIResolveBrowserDevice(config, { strict: false });
      const webGPU = supportAIHasWebGPU();
      const deviceError = config.browserDevice === "webgpu" && !webGPU ? supportAIWebGPURequiredMessage() : null;
      return {
        provider: config.provider,
        label: supportAIProviderLabel(config.provider),
        priority: shouldUseBrowserLocal(config.provider) ? (shouldFallbackToServer(config.provider) ? "browser-local-first" : "browser-local-only") : "server",
        transformersCdnUrl: config.transformersCdnUrl,
        browserDevice: device,
        requestedBrowserDevice: config.browserDevice,
        webGPU,
        transformersLoaded: Boolean(SUPPORT_AI_BROWSER_LOCAL.modulePromise),
        preparedStatus: supportAIGetPreparedStatus(config),
        loadedPipelines: SUPPORT_AI_BROWSER_LOCAL.pipelinePromises.size,
        objectUrls: SUPPORT_AI_BROWSER_LOCAL.objectUrls.size,
        lastBrowserLocalError: SUPPORT_AI_BROWSER_LOCAL.lastError || deviceError,
        endpoint: "browser-local-only",
        textModel: config.browserTextModel,
        visionModel: config.browserVisionModel,
        audioTranscribeProvider: config.audioTranscribeProvider,
        whisperModel: config.browserWhisperModel,
        voiceConversationProvider: config.voiceConversationProvider,
        lfmAudioModel: config.browserLfmAudioModel,
        lfmAudioPrecision: config.browserLfmAudioPrecision,
        ttsModel: config.browserTtsModel,
        hasAudioEndpoint: false,
        hasTtsEndpoint: true,
        hasInterleavedEndpoint: true,
        localOnly: true,
        localAIEnabled: config.localAIEnabled,
        enabledFeatures: { text: config.enableText, vision: config.enableVision, whisper: config.enableWhisper, tts: config.enableTts, rag: config.enableRag, knowledge: config.enableKnowledge, agents: config.enableAgents },
        allowRemoteModels: config.allowRemoteModels,
        allowLocalModels: config.allowLocalModels,
        localModelPath: config.localModelPath,
      };
    },
    text: { ask: askText },
    audio: {
      transcribe: transcribeAudio,
      tts: (text, options = {}) => supportAIBrowserTextToSpeech(text, options, config),
      interleaved: async (input = {}) => {
        return supportAIBrowserLfmAudioInterleaved(input, config);
      },
    },
    vision: { analyze: analyzeImage },
    browserLocal: {
      importRuntime: (options = {}) => importSupportAITransformers(config, options),
      prepare: (features = [], options = {}) => supportAIPrepareBrowserLocalFeatures(features, config, options),
      status: () => supportAIGetPreparedStatus(config),
      readLogs: () => supportAIReadInitLogs(120),
      clearLogs: () => supportAIClearInitLogs(),
      clearCache: () => supportAIClearBrowserModelCaches(),
    },
  };
}

async function supportAIConverge(providers, { task, input, policy = "" }, options = {}) {
  const history = [];
  const draft = await supportAIAgentSingle(providers, "writer", `${task}。方針: ${policy}。まず初案を作ってください。`, input, options);
  history.push(draft);
  if (!draft.ok) return { ok: false, text: "", history, error: draft.error };
  const critique = await supportAIAgentSingle(providers, "critic", "初案の弱点、曖昧さ、過剰変更、改善点を指摘してください。", { original: input, draft: draft.text }, options);
  history.push(critique);
  const verification = await supportAIAgentSingle(providers, "verifier", "ユーザー意図、形式、論理、矛盾、条件違反を確認してください。", { original: input, draft: draft.text, critique: critique.text }, options);
  history.push(verification);
  const final = await supportAIAgentSingle(providers, "synthesizer", "初案、批評、検証を踏まえて、最終版だけを出力してください。", { original: input, draft: draft.text, critique: critique.text, verification: verification.text }, options);
  history.push(final);
  return { ok: final.ok, text: final.text || "", history, error: final.error || null };
}

    }))
    : fallback.organizations;
  const defaultOrgId = organizations[0]?.id || "org-default";
  const agents = Array.isArray(value?.agents) && value.agents.length
    ? value.agents.map(agent => ({
      id: String(agent.id || supportAIId("agent")),
      organizationId: String(agent.organizationId || defaultOrgId),
      label: String(agent.label || "Agent"),
      description: String(agent.description || ""),
      role: String(agent.role || "editor"),
      system: String(agent.system || "あなたはSupportAI Agentです。"),
      prompt: String(agent.prompt || agent.system || "あなたはSupportAI Agentです。"),
      model: String(agent.model || ""),
      ragEnabled: agent.ragEnabled !== false,
      knowledgeEnabled: agent.knowledgeEnabled !== false,
      enabled: agent.enabled !== false,
      locked: Boolean(agent.locked),
    }))
    : fallback.agents;
  const agentIdSet = new Set(agents.map(agent => agent.id));
  const teams = Array.isArray(value?.teams) && value.teams.length
    ? value.teams.map(team => ({
      id: String(team.id || supportAIId("team")),
      organizationId: String(team.organizationId || defaultOrgId),
      label: String(team.label || "Team"),
      description: String(team.description || ""),
      agentIds: (Array.isArray(team.agentIds) ? team.agentIds : []).filter(id => agentIdSet.has(id)),
      policy: String(team.policy || ""),
      prompt: String(team.prompt || team.policy || ""),
      ragEnabled: team.ragEnabled !== false,
      knowledgeEnabled: team.knowledgeEnabled !== false,
      enabled: team.enabled !== false,
      locked: Boolean(team.locked),
    }))
    : fallback.teams;
  return { organizations, agents, teams, updatedAt: value?.updatedAt || null };
}

function supportAIDatetimeLocalValue(iso) {
  if (!iso) return "";
  const date = new Date(iso);
  if (Number.isNaN(date.getTime())) return "";
  const offset = date.getTimezoneOffset() * 60000;
  return new Date(date.getTime() - offset).toISOString().slice(0, 16);
}

function supportAIFromDatetimeLocal(value) {
  if (!value) return "";
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? "" : date.toISOString();
}

function supportAIAddInterval(iso, intervalValue = 1, intervalUnit = "days") {
  const base = iso ? new Date(iso) : new Date();
  if (Number.isNaN(base.getTime())) return "";
  const value = Math.max(1, Number(intervalValue || 1));
  const next = new Date(base);
  if (intervalUnit === "minutes") next.setMinutes(next.getMinutes() + value);
  else if (intervalUnit === "hours") next.setHours(next.getHours() + value);
  else if (intervalUnit === "weeks") next.setDate(next.getDate() + value * 7);
  else next.setDate(next.getDate() + value);
  return next.toISOString();
}

function oosGhostMessagesToPrompt(messages) {
  if (!Array.isArray(messages)) return String(messages || "");
  return messages.map(m => {
    if (typeof m === "string") return m;
    const role = m?.role || "user";
    const content = typeof m?.content === "string" ? m.content : JSON.stringify(m?.content ?? "");
    return `${role}: ${content}`;
  }).join("\n");
}

function oosGhostTokenize(text) {
  return Array.from(new Set(String(text || "").toLowerCase().match(/[a-z0-9_\-]{2,}|[\u3040-\u30ff\u3400-\u9fff]{2,}/g) || []));
}

function oosGhostScore(query, text) {
  const q = oosGhostTokenize(query);
  if (!q.length) return 0;
  const body = String(text || "").toLowerCase();
  return q.reduce((sum, token) => sum + (body.includes(token) ? 1 : 0), 0) / q.length;
}

async function oosGhostPostJson(endpoint, payload, config) {
  const timeoutMs = Number(config?.timeoutMs) || 60000;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const response = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      signal: controller.signal,
    });
    const bodyText = await response.text().catch(() => "");
    let data = {};
    try { data = bodyText ? JSON.parse(bodyText) : {}; } catch { data = { text: bodyText }; }
    if (!response.ok) return { ok: false, text: "", error: `Endpoint error: ${response.status}${bodyText ? ` ${bodyText.slice(0, 240)}` : ""}`, raw: data };
    return { ok: true, data, text: String(data.text ?? data.result ?? data.audioUrl ?? ""), error: null };
  } catch (e) {
    return { ok: false, text: "", error: supportAIErrorMessage(e) };
  } finally {
    clearTimeout(timer);
  }
}

function createOOSGhostRuntime({ providers, config }) {
  const runtimeConfig = normalizeSupportAIConfig(config || DEFAULT_SUPPORT_AI_CONFIG);
  const state = loadOOSGhostRuntimeState();
  const startedAt = Date.now();

  function persist() { return saveOOSGhostRuntimeState(state); }

  const Storage = {
    status() {
      let bytes = 0;
      try { bytes = new Blob([localStorage.getItem(OOS_GHOST_RUNTIME_STORAGE_KEY) || ""]).size; } catch {}
      return {
        ok: true,
        storageKey: OOS_GHOST_RUNTIME_STORAGE_KEY,
        ragDocuments: state.ragDocs.length,
        knowledgeFacts: state.knowledgeFacts.length,
        bytes,
        updatedAt: state.updatedAt || null,
      };
    },
    clear() {
      state.ragDocs = [];
      state.knowledgeFacts = [];
      state.updatedAt = new Date().toISOString();
      persist();
      return { ok: true };
    },
    export() {
      return { ok: true, data: JSON.parse(JSON.stringify(state)) };
    },
  };

  const RAG = {
    addDocument(doc = {}) {
      const text = String(doc.text || "").trim();
      if (!text) return { ok: false, error: "RAG document text is empty" };
      const item = {
        id: doc.id || `rag-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        title: String(doc.title || "Untitled").slice(0, 160),
        text,
        tags: Array.isArray(doc.tags) ? doc.tags : [],
        createdAt: doc.createdAt || new Date().toISOString(),
      };
      state.ragDocs = [item, ...state.ragDocs.filter(d => d.id !== item.id)].slice(0, 80);
      state.updatedAt = new Date().toISOString();
      persist();
      return { ok: true, document: item, count: state.ragDocs.length };
    },
    query(query, options = {}) {
      const limit = options.limit || 4;
      const hits = state.ragDocs
        .map(doc => ({ ...doc, score: oosGhostScore(query, `${doc.title}\n${doc.text}`) }))
        .filter(doc => doc.score > 0 || !String(query || "").trim())
        .sort((a, b) => b.score - a.score)
        .slice(0, limit);
      const contextText = hits.map((d, i) => `[#${i + 1} ${d.title}]\n${d.text.slice(0, options.maxChars || 1200)}`).join("\n\n");
      return { ok: true, hits, contextText };
    },
    list() { return { ok: true, documents: [...state.ragDocs] }; },
    clear() { state.ragDocs = []; state.updatedAt = new Date().toISOString(); persist(); return { ok: true }; },
  };

  const Knowledge = {
    addFact(fact = {}) {
      const subject = String(fact.subject || "").trim();
      const predicate = String(fact.predicate || "").trim();
      const object = String(fact.object || "").trim();
      if (!subject || !predicate || !object) return { ok: false, error: "subject / predicate / object are required" };
      const item = {
        id: fact.id || `fact-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        subject, predicate, object,
        tags: Array.isArray(fact.tags) ? fact.tags : [],
        createdAt: fact.createdAt || new Date().toISOString(),
      };
      state.knowledgeFacts = [item, ...state.knowledgeFacts.filter(f => f.id !== item.id)].slice(0, 200);
      state.updatedAt = new Date().toISOString();
      persist();
      return { ok: true, fact: item, count: state.knowledgeFacts.length };
    },
    query(query, options = {}) {
      const limit = options.limit || 8;
      const hits = state.knowledgeFacts
        .map(fact => ({ ...fact, score: oosGhostScore(query, `${fact.subject} ${fact.predicate} ${fact.object} ${(fact.tags || []).join(" ")}`) }))
        .filter(fact => fact.score > 0 || !String(query || "").trim())
        .sort((a, b) => b.score - a.score)
        .slice(0, limit);
      const contextText = hits.map(f => `- ${f.subject} ${f.predicate} ${f.object}`).join("\n");
      return { ok: true, hits, contextText };
    },
    list() { return { ok: true, facts: [...state.knowledgeFacts] }; },
    clear() { state.knowledgeFacts = []; state.updatedAt = new Date().toISOString(); persist(); return { ok: true }; },
  };

  const LLM = {
    async generate(input = {}) {
      const prompt = input.chat && Array.isArray(input.messages)
        ? input.messages
        : (input.prompt || oosGhostMessagesToPrompt(input.messages));
      const result = await providers.text.ask(prompt, input);
      return { ok: result.ok, modality: "text", text: result.text || "", model: input.model || runtimeConfig.textModel, raw: result.raw || null, usage: result.usage || null, error: result.error || null };
    },
  };

  const VL = {
    async generate(input = {}) {
      const image = input.image || input.file;
      if (!image || typeof image === "string") {
        return { ok: false, modality: "vision-language", text: "", error: "ブラウザ版VLはFile/Blob画像を指定してください。" };
      }
      const result = await providers.vision.analyze(image, { instruction: input.prompt || input.instruction, model: input.model || runtimeConfig.visionModel });
      return { ok: result.ok, modality: "vision-language", text: result.text || "", raw: result.raw || null, error: result.error || null };
    },
  };

  const Audio = {
    async transcribe(input = {}) {
      const audio = input.audio || input.file;
      if (!audio || typeof audio === "string") return { ok: false, modality: "audio", text: "", error: "ブラウザ版ASRはFile/Blob音声を指定してください。" };
      const result = await providers.audio.transcribe(audio, { ...input, provider: "whisper", model: input.model || runtimeConfig.browserWhisperModel, endpoint: runtimeConfig.whisperEndpoint || runtimeConfig.audioEndpoint });
      return { ok: result.ok, modality: "audio", text: result.text || "", raw: result.raw || null, error: result.error || null };
    },
    async lfmASR(input = {}) {
      const audio = input.audio || input.file;
      if (!audio || typeof audio === "string") return { ok: false, modality: "lfm-audio-asr", text: "", error: "LFM-Audio ASRはFile/Blob音声を指定してください。" };
      const result = await supportAIBrowserLfmAudioTranscribe(input, runtimeConfig);
      return { ok: result.ok, modality: "lfm-audio-asr", text: result.text || "", raw: result.raw || null, error: result.error || null };
    },
    async tts(input = {}) {
      const result = await providers.audio.tts(input.prompt || input.text || "", input);
      return { ok: result.ok, modality: "tts", text: result.text || input.prompt || input.text || "", audioUrl: result.audioUrl || "", spoken: Boolean(result.spoken), raw: result.raw || null, error: result.error || null };
    },
    async lfmTTS(input = {}) {
      const result = await supportAIBrowserLfmAudioSpeech(input, runtimeConfig);
      return { ok: result.ok, modality: "lfm-audio-tts", text: result.text || input.prompt || input.text || "", audioUrl: result.audioUrl || "", spoken: false, raw: result.raw || null, error: result.error || null };
    },
    async lfmInterleaved(input = {}) {
      const result = await providers.audio.interleaved({ ...input, model: input.model || runtimeConfig.browserLfmAudioModel, precision: input.precision || runtimeConfig.browserLfmAudioPrecision });
      return { ok: result.ok, modality: "lfm-audio-interleaved", text: result.text || "", transcript: result.transcript || "", audioUrl: result.audioUrl || "", spoken: Boolean(result.spoken), raw: result.raw || null, error: result.error || null };
    },
  };

  const Agent = {
    async run({ agentId = "builder", prompt = "", input = null, role = null, options = {} } = {}) {
      if (!runtimeConfig.enableAgents) return { ok: false, agentId, role: role || "", modality: "agent", text: "", error: "Agent / Team はAI設定で無効です。" };
      const preset = OOS_GHOST_AGENT_PRESETS[agentId] || OOS_GHOST_AGENT_PRESETS.builder;
      const roleName = role || preset.role;
      const result = await supportAIAgentSingle(providers, roleName, prompt || preset.system, input || prompt, options);
      return { ok: result.ok, agentId, role: roleName, modality: "agent", text: result.text || "", error: result.error || null };
    },
    async runTeam({ agentIds = ["builder", "auditor"], prompt = "", input = null, options = {} } = {}) {
      const outputs = [];
      for (const agentId of agentIds) {
        outputs.push(await Agent.run({ agentId, prompt, input: input || prompt, options }));
      }
      const synthesis = await supportAIAgentSingle(providers, "synthesizer", "複数Agentの結果を統合し、最終版だけを出力してください。", { prompt, outputs }, options);
      return { ok: synthesis.ok, modality: "team", text: synthesis.text || "", outputs, error: synthesis.error || null };
    },
  };

  const AI = {
    status() {
      return {
        ok: true,
        runtime: "OOS LFM Full Knowledge Runtime min",
        entry: "Ghost.AI.generate",
        provider: providers.status?.() || {},
        capabilities: {
          browserLocal: shouldUseBrowserLocal(runtimeConfig.provider),
          text: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableText),
          visionLanguage: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableVision),
          whisperASR: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableWhisper),
          lfmAudioDirect: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableTts && runtimeConfig.voiceConversationProvider === "lfm-audio"),
          lfmAudioBrowserLocal: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableTts && runtimeConfig.voiceConversationProvider === "lfm-audio"),
          rag: Boolean(runtimeConfig.enableRag),
          knowledge: Boolean(runtimeConfig.enableKnowledge),
          agent: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableAgents && runtimeConfig.enableText),
          webGPU: supportAIHasWebGPU(),
        },
        storage: Storage.status(),
        uptimeMs: Date.now() - startedAt,
      };
    },
    async generate(input = {}) {
      const mode = input.mode || "auto";
      if (mode === "agent") return Agent.run(input);
      if (mode === "team") return Agent.runTeam(input);
      if (mode === "transcribe") return Audio.transcribe(input);
      if (mode === "tts") return Audio.tts(input);
      if (mode === "lfm-asr") return Audio.lfmASR(input);
      if (mode === "lfm-tts") return Audio.lfmTTS(input);
      if (mode === "lfm-interleaved") return Audio.lfmInterleaved(input);
      if (input.audio) return Audio.transcribe(input);
      if (input.image) return VL.generate(input);

      const basePrompt = input.prompt || oosGhostMessagesToPrompt(input.messages);
      let contextText = "";
      let knowledgeText = "";
      let ragResult = null;
      let knowledgeResult = null;
      if (input.rag?.enabled && runtimeConfig.enableRag) {
        ragResult = RAG.query(basePrompt, input.rag);
        contextText = ragResult.contextText || "";
      }
      if (input.knowledge?.enabled && runtimeConfig.enableKnowledge) {
        knowledgeResult = Knowledge.query(basePrompt, input.knowledge);
        knowledgeText = knowledgeResult.contextText || "";
      }
      const prompt = [
        contextText ? "RAG Context:\n" + contextText : "",
        knowledgeText ? "Knowledge Facts:\n" + knowledgeText : "",
        "User Task:",
        basePrompt,
      ].filter(Boolean).join("\n\n");
      let llmInput = { ...input, prompt };
      if (input.chat && Array.isArray(input.messages)) {
        const contextBlock = [
          contextText ? "RAG Context:\n" + contextText : "",
          knowledgeText ? "Knowledge Facts:\n" + knowledgeText : "",
        ].filter(Boolean).join("\n\n");
        const messages = contextBlock
          ? [...input.messages, { role: "user", content: `参照情報:\n${contextBlock}` }]
          : input.messages;
        llmInput = { ...input, prompt: "", messages };
      }
      const response = await LLM.generate(llmInput);
      return { ...response, contextText, ragSources: ragResult?.hits || [], knowledgeSources: knowledgeResult?.hits || [] };
    },
  };

  return { AI, LLM, VL, Audio, RAG, Knowledge, Agent, Storage, config: runtimeConfig };
}

function collectMarkdownIssues(markdown) {
  const errors = [];
  const text = String(markdown || "");
  const codeFenceCount = (text.match(/```/g) || []).length;
  if (codeFenceCount % 2 !== 0) errors.push({ type: "markdown", message: "コードブロックの ``` が閉じられていません。" });
  const headings = text.match(/^#{1,6}\s+.+$/gm) || [];
  let previousLevel = 0;
  headings.forEach(heading => {
    const level = heading.match(/^#+/)[0].length;
    if (previousLevel && level > previousLevel + 1) errors.push({ type: "heading", message: `見出し階層が飛んでいます: ${heading}` });
    previousLevel = level;
  });
  const lines = text.split("\n");
  for (let i = 0; i < lines.length - 1; i++) {
    const current = lines[i];
    const next = lines[i + 1];
    if (current.includes("|") && /^\s*\|?\s*:?-{3,}/.test(next)) {
      const colsA = current.split("|").filter(Boolean).length;
      const colsB = next.split("|").filter(Boolean).length;
      if (colsA !== colsB) errors.push({ type: "table", message: `Markdown表の列数が一致していません。行 ${i + 1}` });
    }
  }
  const blocks = [...text.matchAll(/```(?:mermaid|mmd|marmaid)([\s\S]*?)```/gi)];
  blocks.forEach(block => {
    const body = block[1].trim();
    if (!body) errors.push({ type: "mermaid", message: "空のMermaidブロックがあります。" });
    if (body && !/^(graph|flowchart|sequenceDiagram|classDiagram|stateDiagram|stateDiagram-v2|erDiagram|gantt|pie|mindmap|timeline|journey|quadrantChart|requirementDiagram|gitGraph)/m.test(body)) {
      errors.push({ type: "mermaid", message: "Mermaidブロックの開始構文が不明です。" });
    }
  });
  return errors;
}
