const HANDLE_SIZE   = 6;
const RATIO_MIN     = 0.15;
const RATIO_MAX     = 0.85;
const RATIO_DEFAULT = 0.5;

function useSplitPane(containerRef, isHorizontal, initialRatio) {
  const [ratio, setRatio]       = useState(initialRatio ?? RATIO_DEFAULT);
  const [dragging, setDragging] = useState(false);
  const draggingRef = useRef(false);

  const onPointerDown = useCallback((e) => {
    e.preventDefault();
    draggingRef.current = true;
    setDragging(true);
    e.currentTarget.setPointerCapture?.(e.pointerId);
  }, []);

  const onPointerMove = useCallback((e) => {
    if (!draggingRef.current || !containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const r = isHorizontal
      ? (e.clientX - rect.left) / rect.width
      : (e.clientY - rect.top)  / rect.height;
    setRatio(Math.min(RATIO_MAX, Math.max(RATIO_MIN, r)));
  }, [containerRef, isHorizontal]);

  const onPointerUp = useCallback(() => {
    draggingRef.current = false;
    setDragging(false);
  }, []);

  const onDoubleClick = useCallback(() => setRatio(RATIO_DEFAULT), []);

  return {
    ratio,
    setRatio,
    handleProps: { onPointerDown, onPointerMove, onPointerUp, onDoubleClick },
    dragging,
  };
}

function SplitHandle({ isHorizontal, handleProps, dragging }) {
  const [hover, setHover] = useState(false);
  const active = dragging || hover;

  return (
    <Box
      {...handleProps}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      sx={{
        flexShrink: 0,
        position: "relative",
        zIndex: 10,
        width:  isHorizontal ? HANDLE_SIZE : "100%",
        height: isHorizontal ? "100%"      : HANDLE_SIZE,
        cursor: isHorizontal ? "col-resize" : "row-resize",
        background: active ? "#1976d2" : "#d0d4db",
        transition: "background 0.15s",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        userSelect: "none",
        touchAction: "none",
      }}
    >
      <Box sx={{
        display: "flex",
        flexDirection: isHorizontal ? "column" : "row",
        gap: "3px",
        pointerEvents: "none",

            height: isHorizontal ? 4 : 2,
            borderRadius: 1,
            background: active ? "#fff" : "#9aa0ab",

        ))}

    </Box>
  );
}

function clampValue(value, min, max, fallback = min) {
  const n = Number(value);
  const base = Number.isFinite(n) ? n : fallback;
  return Math.min(max, Math.max(min, base));
}

let profileIdCounter = 0;

function newProfileId() {
  return `profile-${Date.now()}-${++profileIdCounter}`;
}

function createProfile(name, data) {
  return {
    id: newProfileId(),
    name: name || "新しいプロファイル",
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    data: {
      code: data.code ?? DEFAULT_HTML,
      editorTabs: data.editorTabs ?? null,
      activeEditorTabId: data.activeEditorTabId ?? null,
      settings: { ...DEFAULT_SETTINGS, ...(data.settings || {}) },
    },
  };
}

function normalizeProfileRecord(profile) {
  if (!profile || typeof profile !== "object") return null;
  const data = profile.data && typeof profile.data === "object" ? profile.data : {};
  const normalized = createProfile(profile.name || "復元プロファイル", {
    code: typeof data.code === "string" ? data.code : DEFAULT_HTML,
    editorTabs: Array.isArray(data.editorTabs) ? data.editorTabs : null,
    activeEditorTabId: typeof data.activeEditorTabId === "string" ? data.activeEditorTabId : null,
    settings: validateSettings(data.settings),
  });
  return {
    ...normalized,
    id: typeof profile.id === "string" && profile.id ? profile.id : normalized.id,
    name: typeof profile.name === "string" && profile.name.trim() ? profile.name.trim() : normalized.name,
    createdAt: profile.createdAt || normalized.createdAt,
    updatedAt: profile.updatedAt || normalized.updatedAt,
  };
}

function migrateProfilePayload(parsed) {
  if (Array.isArray(parsed)) return parsed.map(normalizeProfileRecord).filter(Boolean);
  if (parsed && typeof parsed === "object" && Array.isArray(parsed.profiles)) {
    return parsed.profiles.map(normalizeProfileRecord).filter(Boolean);
  }
  return [];
}

function loadProfiles() {
  try {
    const raw = localStorage.getItem(STORAGE_PROFILES_KEY);
    if (!raw) return [];
    return migrateProfilePayload(JSON.parse(raw));
  } catch { return []; }
}

function saveProfiles(profiles) {
  try {
    localStorage.setItem(STORAGE_PROFILES_KEY, JSON.stringify({
      version: STORAGE_SCHEMA_VERSION,
      updatedAt: new Date().toISOString(),
      profiles: Array.isArray(profiles) ? profiles : [],
    }));
    return true;
  } catch {
    return false;
  }
}

function loadActiveProfileId() {
  try { return localStorage.getItem(STORAGE_ACTIVE_KEY) || null; } catch { return null; }
}

function saveActiveProfileId(id) {
  try { localStorage.setItem(STORAGE_ACTIVE_KEY, id); } catch {}
}

const ProfileRepo = Object.freeze({

const ProfileDomain = Object.freeze({
  currentData({ code, editorTabs, activeEditorTabId, settings }) {

      code: String(code ?? ""),
      editorTabs: Array.isArray(editorTabs) ? editorTabs : [],
      activeEditorTabId: activeEditorTabId || null,

  saveCurrent(profiles, activeProfileId, data) {
    const now = new Date().toISOString();
    return (Array.isArray(profiles) ? profiles : []).map(p => p.id !== activeProfileId ? p : { ...p, updatedAt: now, data });
  },

  rename(profiles, id, name) {
    const cleaned = String(name || "").trim();
    if (!cleaned) return profiles;
    const now = new Date().toISOString();
    return (Array.isArray(profiles) ? profiles : []).map(p => p.id !== id ? p : { ...p, name: cleaned, updatedAt: now });
  },

  duplicate(profiles, id) {
    const list = Array.isArray(profiles) ? profiles : [];
    const src = list.find(p => p.id === id);
    if (!src) return { ok: false, profiles: list, profile: null, reason: "複製元プロファイルが見つかりません" };
    const profile = createProfile(`${src.name} のコピー`, src.data);
    return { ok: true, profile, profiles: [...list, profile].slice(-MAX_PROFILES) };
  },

  remove(profiles, id) {
    const next = (Array.isArray(profiles) ? profiles : []).filter(p => p.id !== id);
    return next.length > 0 ? next : [createProfile("デフォルト", { code: DEFAULT_HTML })];
  },

  importPayload(payload) {
    const imported = migrateProfilePayload(payload);
    return imported.slice(-MAX_PROFILES);
  },
});

function validateSettings(s) {
  if (!s || typeof s !== "object") return { ...DEFAULT_SETTINGS };
  return {
    fontSize: (typeof s.fontSize === "number" && s.fontSize >= 10 && s.fontSize <= 24) ? s.fontSize : DEFAULT_SETTINGS.fontSize,
    darkMode: typeof s.darkMode === "boolean" ? s.darkMode : DEFAULT_SETTINGS.darkMode,
    wordWrap: typeof s.wordWrap === "boolean" ? s.wordWrap : DEFAULT_SETTINGS.wordWrap,
    highlightMode: ["plain","prism"].includes(s.highlightMode) ? s.highlightMode : DEFAULT_SETTINGS.highlightMode,
    previewScale: (typeof s.previewScale === "number" && s.previewScale >= 25 && s.previewScale <= 200) ? s.previewScale : DEFAULT_SETTINGS.previewScale,
    previewWidth: typeof s.previewWidth === "string" ? s.previewWidth : DEFAULT_SETTINGS.previewWidth,
    splitRatio: (typeof s.splitRatio === "number" && s.splitRatio >= 0.15 && s.splitRatio <= 0.85) ? s.splitRatio : DEFAULT_SETTINGS.splitRatio,
  };
}

const MAX_EDITOR_TABS = 30;
const EDITOR_MODES = { AUTO: "auto", HTML: "html", MARKDOWN: "markdown" };
let editorTabIdCounter = 0;

function normalizeEditorMode(mode) {
  return mode === EDITOR_MODES.MARKDOWN ? EDITOR_MODES.MARKDOWN : EDITOR_MODES.HTML;
}

function normalizeModePreference(mode) {
  if (mode === EDITOR_MODES.HTML) return EDITOR_MODES.HTML;
  if (mode === EDITOR_MODES.MARKDOWN) return EDITOR_MODES.MARKDOWN;
  return EDITOR_MODES.AUTO;
}

function normalizeFenceLanguage(lang) {
  return String(lang || "").trim().split(/\s+/)[0].toLowerCase();
}

function isMermaidFenceLanguage(lang) {
  const normalized = normalizeFenceLanguage(lang);
  return ["mermaid", "mmd", "marmaid"].includes(normalized);
}

function inferEditorMode(name, code, modePreference) {
  const preference = normalizeModePreference(modePreference);
  if (preference === EDITOR_MODES.HTML || preference === EDITOR_MODES.MARKDOWN) return preference;

  const raw = String(code || "");
  const c = raw.trimStart();
  const lower = c.toLowerCase();

  // 拡張子では判定しない。
  // Autoでは「完全なHTML文書」と分かる場合だけHTMLにする。
  // それ以外はMarkdownをデフォルトにして、HTML断片や通常メモの誤判定を避ける。
  if (lower.startsWith("<!doctype html") || lower.startsWith("<html")) {
    return EDITOR_MODES.HTML;
  }

  return EDITOR_MODES.MARKDOWN;
}

function extensionForMode(mode) {
  return normalizeEditorMode(mode) === EDITOR_MODES.MARKDOWN ? ".md" : ".html";
}

function renameForMode(name, mode) {
  const ext = extensionForMode(mode);
  const cleaned = String(name || (mode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html")).trim();
  if (/\.(html?|md|markdown|mmd)$/i.test(cleaned)) return cleaned.replace(/\.(html?|md|markdown|mmd)$/i, ext);
  return cleaned + ext;
}

function newEditorTabId() {
  return `editor-tab-${Date.now()}-${++editorTabIdCounter}`;
}

function createEditorTab(name, code, modePreference = EDITOR_MODES.AUTO) {
  const now = new Date().toISOString();
  const resolvedPreference = normalizeModePreference(modePreference);
  const initialCode = typeof code === "string" ? code : (resolvedPreference === EDITOR_MODES.HTML ? DEFAULT_HTML : DEFAULT_MARKDOWN);
  const actualMode = inferEditorMode(name, initialCode, resolvedPreference);
  return {
    id: newEditorTabId(),
    name: name || (actualMode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html"),
    code: initialCode,
    // modePreference はユーザーの明示指定。auto なら内容でHTML/Markdownを自動解決する。
    // mode は旧データ互換用に同じ値を保持する。実際の描画モードは inferEditorMode で毎回解決する。
    modePreference: resolvedPreference,
    mode: resolvedPreference,
    createdAt: now,
    updatedAt: now,
  };
}

function normalizeEditorTabs(data) {
  const now = new Date().toISOString();
  const rawTabs = Array.isArray(data?.editorTabs) && data.editorTabs.length > 0
    ? data.editorTabs
    : [{ id: null, name: "index.html", code: data?.code ?? DEFAULT_HTML }];

  return rawTabs.slice(0, MAX_EDITOR_TABS).map((tab, index) => {
    const code = typeof tab.code === "string" ? tab.code : DEFAULT_HTML;
    const name = typeof tab.name === "string" && tab.name.trim() ? tab.name.trim() : (index === 0 ? "index.html" : `tab-${index + 1}.html`);
    // v2以前の保存データには modePreference が無い。
    // その場合は旧 mode を強制指定として扱わず auto に戻し、
    // 「HTMLタブにMarkdownを貼ってもHTML扱いのまま」という不具合を断つ。
    const preference = typeof tab.modePreference === "string" ? normalizeModePreference(tab.modePreference) : EDITOR_MODES.AUTO;
    return {
      id: typeof tab.id === "string" && tab.id ? tab.id : newEditorTabId(),
      name,
      code,
      modePreference: preference,
      mode: preference,
      createdAt: tab.createdAt || now,
      updatedAt: tab.updatedAt || tab.createdAt || now,
    };
  });
}

function getInitialEditorTabId(data, tabs) {
  if (data?.activeEditorTabId && tabs.some(t => t.id === data.activeEditorTabId)) return data.activeEditorTabId;
  return tabs[0]?.id || null;
}

function getUniqueTabName(tabs, baseName = "untitled.html") {
  const names = new Set(tabs.map(t => t.name));
  if (!names.has(baseName)) return baseName;

  const dot = baseName.lastIndexOf(".");
  const stem = dot > 0 ? baseName.slice(0, dot) : baseName;
  const ext  = dot > 0 ? baseName.slice(dot) : "";

  for (let i = 2; i < 1000; i++) {
    const candidate = `${stem}-${i}${ext}`;
    if (!names.has(candidate)) return candidate;
  }

  return `${stem}-${Date.now()}${ext}`;
}

function safeDownloadFileName(name) {
  const cleaned = String(name || "output.html").replace(/[\\/:*?"<>|]+/g, "_").trim();
  return cleaned || "output.html";
}
const EditorDomain = Object.freeze({
  syncCurrentTab(tabs, activeEditorTabId, code) {
    const now = new Date().toISOString();
    const list = Array.isArray(tabs) ? tabs : [];
    return list.map(tab => tab.id === activeEditorTabId ? { ...tab, code: String(code ?? ""), updatedAt: now } : tab);
  },

  switchTab(tabs, activeEditorTabId, currentCode, targetTabId) {
    const synced = this.syncCurrentTab(tabs, activeEditorTabId, currentCode);
    const target = synced.find(t => t.id === targetTabId);
    if (!target) return { ok: false, unchanged: true, tabs: synced, activeEditorTabId, code: currentCode, reason: "タブが見つかりません" };
    if (target.id === activeEditorTabId) return { ok: true, unchanged: true, tabs: synced, activeEditorTabId, code: currentCode };
    return { ok: true, tabs: synced, activeEditorTabId: target.id, code: target.code };
  },

  addTab(tabs, activeEditorTabId, currentCode, modePreference = EDITOR_MODES.AUTO) {
    const synced = this.syncCurrentTab(tabs, activeEditorTabId, currentCode);
    if (synced.length >= MAX_EDITOR_TABS) {
      return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: `コードタブは最大 ${MAX_EDITOR_TABS} 件です` };
    }
    const preference = normalizeModePreference(modePreference);
    const initialMode = preference === EDITOR_MODES.HTML ? EDITOR_MODES.HTML : EDITOR_MODES.MARKDOWN;
    const baseName = initialMode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html";
    const name = getUniqueTabName(synced, baseName);
    const code = initialMode === EDITOR_MODES.MARKDOWN ? DEFAULT_MARKDOWN : DEFAULT_HTML;
    const tab = createEditorTab(name, code, preference);
    return { ok: true, tabs: [...synced, tab], activeEditorTabId: tab.id, code: tab.code, tab };
  },

  closeTab(tabs, activeEditorTabId, currentCode, targetTabId) {
    const synced = this.syncCurrentTab(tabs, activeEditorTabId, currentCode);
    if (synced.length <= 1) return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: "最後のタブは閉じられません" };
    const idx = synced.findIndex(t => t.id === targetTabId);
    if (idx < 0) return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: "タブが見つかりません" };
    const nextTabs = synced.filter(t => t.id !== targetTabId);
    const nextActive = activeEditorTabId === targetTabId ? (nextTabs[Math.max(0, idx - 1)] || nextTabs[0]) : nextTabs.find(t => t.id === activeEditorTabId);
    return { ok: true, tabs: nextTabs, activeEditorTabId: nextActive.id, code: nextActive.code };
  },

  renameTab(tabs, tabId, name) {
    const cleaned = String(name || "").trim();
    if (!cleaned) return tabs;
    const now = new Date().toISOString();
    return (Array.isArray(tabs) ? tabs : []).map(tab => tab.id === tabId ? { ...tab, name: cleaned, updatedAt: now } : tab);
  },

  duplicateTab(tabs, activeEditorTabId, currentCode) {
    const synced = this.syncCurrentTab(tabs, activeEditorTabId, currentCode);
    if (synced.length >= MAX_EDITOR_TABS) {
      return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: `コードタブは最大 ${MAX_EDITOR_TABS} 件です` };
    }
    const src = synced.find(t => t.id === activeEditorTabId) || synced[0];
    if (!src) return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: "複製元タブが見つかりません" };
    const tab = createEditorTab(getUniqueTabName(synced, src.name), src.code, src.modePreference ?? src.mode ?? EDITOR_MODES.AUTO);
    return { ok: true, tabs: [...synced, tab], activeEditorTabId: tab.id, code: tab.code, tab };
  },

  changeMode(tabs, activeEditorTabId, modePreference) {
    const resolvedPreference = normalizeModePreference(modePreference);
    const now = new Date().toISOString();
    // モード変更時もファイル名・拡張子は変えない。
    // auto に戻せば内容から再判定し、HTML/MD は明示指定として保持する。
    return (Array.isArray(tabs) ? tabs : []).map(tab =>
      tab.id === activeEditorTabId
        ? { ...tab, modePreference: resolvedPreference, mode: resolvedPreference, updatedAt: now }
        : tab
    );
  },
});

const HistoryDomain = Object.freeze({
  createEntry(code, tabId, label = "編集") {
    return { id: `hist-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, code: String(code ?? ""), label, ts: Date.now(), tabId: tabId || null };
  },

  reset(code, tabId, label = "初期状態") {
    const history = [this.createEntry(code, tabId, label)];
    return { history, index: 0 };
  },

  push(history, index, code, tabId, label = "編集") {
    const list = Array.isArray(history) ? history : [];
    const current = list[Math.max(0, Math.min(index, list.length - 1))];
    if (current && current.code === code && current.tabId === tabId) {
      return { history: list, index: Math.max(0, Math.min(index, list.length - 1)) };
    }
    const base = list.slice(0, Math.max(0, index) + 1);
    const next = [...base, this.createEntry(code, tabId, label)].slice(-RECOVERY_LIMITS.HISTORY_DEFAULT);
    return { history: next, index: next.length - 1 };
  },
});

const SnapshotDomain = Object.freeze({
  create(code, label = "スナップショット", meta = {}) {
    return {
      id: `snap-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
      ts: Date.now(),
      code: String(code ?? ""),
      label,
      isAuto: Boolean(meta.isAuto),
      isLastGood: Boolean(meta.isLastGood),
      mode: normalizeEditorMode(meta.mode),
      tabId: meta.tabId || null,
      tabName: meta.tabName || "",
      profileId: meta.profileId || null,
    };
  },

  push(snapshots, snapshot) {
    if (!snapshot) return Array.isArray(snapshots) ? snapshots : [];
    const list = Array.isArray(snapshots) ? snapshots : [];
    const limit = snapshot.code.length > PERF_LIMITS.HUGE_CODE_CHARS
      ? RECOVERY_LIMITS.SNAPSHOTS_HUGE_CODE
      : snapshot.code.length > PERF_LIMITS.LARGE_CODE_CHARS
        ? RECOVERY_LIMITS.SNAPSHOTS_LARGE_CODE
        : RECOVERY_LIMITS.SNAPSHOTS_DEFAULT;
    return [snapshot, ...list.filter(s => s.id !== snapshot.id)].slice(0, limit);
  },
});

function buildHtmlSrcDoc(html) {
  const content = String(html || "").trim();
  if (!content) return EMPTY_HTML;

  if (/<head\b[^>]*>/i.test(content)) {
    return content.replace(/<head\b([^>]*)>/i, `<head$1>${CONSOLE_INTERCEPT}`);
  }

  if (/<html\b[^>]*>/i.test(content)) {
    return content.replace(/<html\b([^>]*)>/i, `<html$1><head>${CONSOLE_INTERCEPT}</head>`);
  }

  if (/<!doctype html/i.test(content) || /<body\b[^>]*>/i.test(content)) {
    return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
${CONSOLE_INTERCEPT}
</head>
<body>
${content}
</body>
</html>`;
  }

  return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
${CONSOLE_INTERCEPT}
</head>
<body>
${content}
</body>
</html>`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function createMarkdownRenderer() {
  const md = window.__HT_MD__?.marked;
  if (!md?.Renderer) return null;
  const renderer = new md.Renderer();

  renderer.code = function(codeOrToken, infostring) {
    const isToken = codeOrToken && typeof codeOrToken === "object";
    const text = isToken ? codeOrToken.text : codeOrToken;
    const lang = normalizeFenceLanguage(isToken ? codeOrToken.lang : infostring);

    if (isMermaidFenceLanguage(lang)) {
      return `<div class="mermaid" data-original-lang="${escapeHtml(lang)}">${escapeHtml(text)}</div>`;
    }

    const cls = lang ? ` class="language-${escapeHtml(lang)}"` : "";
    return `<pre><code${cls}>${escapeHtml(text)}</code></pre>`;
  };

  return renderer;
}

function buildMarkdownSrcDoc(markdown, options = {}) {
  const content = String(markdown || "").trim();
  const dark = Boolean(options.darkMode);
  const md = window.__HT_MD__?.marked;
  const purifier = window.__HT_MD__?.DOMPurify;

  if (!content) {
    return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />${markdownPreviewStyle(dark)}</head><body><main class="markdown-body empty">Markdown を貼り付けてください</main></body></html>`;
  }

  if (!md?.parse || !purifier?.sanitize) {
    const msg = "Markdownライブラリが未ロードです。CDNまたはネットワークを確認してください。";
    return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />${markdownPreviewStyle(dark)}</head><body>${CONSOLE_INTERCEPT}<main class="markdown-body"><h1>Markdown Preview Error</h1><p>${escapeHtml(msg)}</p></main><script>console.error(${JSON.stringify(msg)});<\/script></body></html>`;
  }

  let rendered = "";
  try {
    rendered = md.parse(content, {
      gfm: true,
      breaks: false,
      mangle: false,
      headerIds: false,
      renderer: createMarkdownRenderer() || undefined,
    });
  } catch (e) {
    rendered = `<h1>Markdown Parse Error</h1><pre>${escapeHtml(e.message || String(e))}</pre>`;
  }

  const safeHtml = purifier.sanitize(rendered, {
    ADD_TAGS: ["details", "summary"],
    ADD_ATTR: ["class", "id", "target", "rel"],
  });

  const mermaidTheme = dark ? "dark" : "default";
  const mermaidUrl = window.__HT_MD__?.mermaidUrl || "https://esm.sh/mermaid@11.15.0?bundle";
  const mermaidRunner = `<script type="module">
import mermaid from ${JSON.stringify(mermaidUrl)};
try {
  const nodes = Array.from(document.querySelectorAll(".mermaid"));
  if (nodes.length > 0) {
    await (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve());
    mermaid.initialize({ startOnLoad: false, securityLevel: "strict", theme: ${JSON.stringify(mermaidTheme)} });
    await mermaid.run({ nodes });
  }
} catch (e) {
  console.error("Mermaid render error:", e && e.message ? e.message : e);
}
<\/script>`;

  return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  ${markdownPreviewStyle(dark)}
</head>
<body>
  ${CONSOLE_INTERCEPT}
  <main class="markdown-body">${safeHtml}</main>
  ${mermaidRunner}
</body>
</html>`;
}

function useDebounce(value, delay) {
  const [d, setD] = useState(value);
  useEffect(() => {

  }, [value, delay]);
  return d;
}

function parseSimpleDiffPatch(diffText) {
  const lines = diffText.replace(/\r\n/g, "\n").split("\n");
  const oldLines = [];
  const newLines = [];

  for (const line of lines) {
    if (line.startsWith("---") || line.startsWith("+++") || line.startsWith("@@")) continue;

    if (line.startsWith("-")) {
      oldLines.push(line.slice(1));
      continue;
    }

    if (line.startsWith("+")) {
      newLines.push(line.slice(1));
      continue;
    }

    if (line.startsWith(" ")) {
      oldLines.push(line.slice(1));
      newLines.push(line.slice(1));
    }
  }

  return {
    oldBlock: oldLines.join("\n").trim(),
    newBlock: newLines.join("\n").trim(),
  };
}

function applySimpleDiffPatch(source, diffText) {
  const { oldBlock, newBlock } = parseSimpleDiffPatch(diffText);

  if (!oldBlock || !newBlock) {
    return {
      ok: false,
      code: source,
      message: "差分として認識できませんでした。",
    };
  }

  const count = source.split(oldBlock).length - 1;

  if (count === 0) {
    return {
      ok: false,
      code: source,
      message: "置換対象のコードが現在の内容内に見つかりませんでした。",
    };
  }

  if (count > 1) {
    return {
      ok: false,
      code: source,
      message: `置換対象が ${count} 件見つかりました。誤適用防止のため中止しました。`,
    };
  }

  return {
    ok: true,
    code: source.replace(oldBlock, newBlock),
    message: "差分を適用しました。",
  };
}

function PatchDialog({ open, onClose, currentCode, onApply }) {
  const [patchText, setPatchText] = useState("");
  const [result, setResult] = useState("");

  useEffect(() => {
    if (open) {
      setPatchText("");
      setResult("");
    }
  }, [open]);

  const handleApply = useCallback(() => {
    const res = applySimpleDiffPatch(currentCode, patchText);

    if (!res.ok) {
      setResult(res.message);
      return;
    }

    onApply(res.code);
    setResult(res.message);
    onClose();
  }, [currentCode, patchText, onApply, onClose]);

  return (
    <Dialog
      open={open}
      onClose={onClose}
      maxWidth="md"
      fullWidth

          style={{
            flex: 1,

        </Button>

  );
}

                <ListItem key={s.id} disablePadding secondaryAction={
                  <Tooltip title="削除" arrow>
                    <IconButton size="small" edge="end" sx={{ p: 0.3 }}
                      onClick={e => { e.stopPropagation(); onDelete(s.id); if (selected === s.id) setSelected(snapshots[i + 1]?.id ?? snapshots[i - 1]?.id ?? null); }}>
                      <Icon name="close" size={12} style={{ color: "#bbb" }} />
                    </IconButton>
                  </Tooltip>
                }>
                  <ListItemButton selected={selected === s.id} onClick={() => setSelected(s.id)} sx={{ py: 0.8, pr: 4 }}>
                    <ListItemText
                      primary={<Box sx={{ display: "flex", alignItems: "center", gap: 0.5 }}>
                        {s.isLastGood && <Icon name="check_circle" size={12} style={{ color: "#43a047" }} />}
                        {s.isAuto && !s.isLastGood && <Icon name="schedule" size={12} style={{ color: "#888" }} />}
                        <Typography noWrap variant="caption" sx={{ fontSize: 11, fontWeight: 600 }}>{s.label}</Typography>
                      </Box>}
                      secondary={<Typography variant="caption" sx={{ fontSize: 10, color: "#aaa" }}>
                        {new Date(s.ts).toLocaleString("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" })}
                        {" · "}{s.code.length.toLocaleString()} 文字
                      </Typography>}
                    />
                  </ListItemButton>
                </ListItem>
              ))}
            </List>
          )}
        </Box>

        <Box sx={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {snap ? (
            <>
              <Box sx={{ px: 2, py: 1, borderBottom: `1px solid ${borderC}`, display: "flex", alignItems: "center", gap: 1 }}>
                <Typography variant="caption" sx={{ fontSize: 11, color: "#888", flex: 1 }}>{snap.label} — {new Date(snap.ts).toLocaleString("ja-JP")}</Typography>
                {snap.isLastGood && <MaterialUI.Chip label="最後の正常表示" size="small" color="success" sx={{ fontSize: 10, height: 18 }} />}
                <Tooltip title="コードをコピー" arrow><IconButton size="small" sx={{ p: 0.4 }} onClick={() => navigator.clipboard.writeText(snap.code).catch(() => {})}><Icon name="content_copy" size={14} /></IconButton></Tooltip>
              </Box>
              <Box sx={{ flex: 1, overflow: "auto", background: previewBg }}>
                <Box component="pre" sx={{ m: 0, p: "12px 14px", fontFamily: "ui-monospace,SFMono-Regular,Menlo,Consolas,monospace", fontSize: 12, lineHeight: 1.65, color: previewFg, whiteSpace: "pre-wrap", wordBreak: "break-all" }}>{snap.code}</Box>
              </Box>
            </>
          ) : (
            <Box sx={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#bbb" }}>
              <Typography variant="body2" color="text.disabled">スナップショットを選択してください</Typography>
            </Box>
          )}
        </Box>
      </Box>

      <DialogActions sx={{ px: 2, py: 1, borderTop: `1px solid ${borderC}`, gap: 1 }}>
        <Button size="small" color="error" variant="outlined" onClick={onClearAll} disabled={snapshots.length === 0} startIcon={<Icon name="delete_sweep" size={14} />}>全削除</Button>
        <Box sx={{ flex: 1 }} />
        <Button size="small" onClick={onClose} variant="outlined">閉じる</Button>
        <Button size="small" variant="contained" disabled={!snap} startIcon={<Icon name="restore" size={14} />} onClick={() => { if (snap) { onRestore(snap.code); onClose(); } }}>このコードに復元</Button>
      </DialogActions>
    </Dialog>
  );
}

        <Button size="small" startIcon={<Icon name="delete_outline" size={14} />} onClick={onClear} variant="outlined" color="error" disabled={logs.length === 0}>クリア</Button>
        <Box sx={{ flex: 1 }} />
        <Button size="small" onClick={onClose} variant="contained">閉じる</Button>
      </DialogActions>
    </Dialog>
  );
}

function parseCssPx(value) {
  const m = String(value || "").trim().match(/^(\d+(?:\.\d+)?)px$/i);
  return m ? Number(m[1]) : null;
}

function PreviewFrame({ srcDoc, previewKey, width, scale, darkMode, onFrameWindowChange, fitToContainer = false }) {
  const outerRef = useRef(null);
  const iframeRef = useRef(null);
  const [outerWidth, setOuterWidth] = useState(0);

  const targetPx = parseCssPx(width);
  const constrained = width !== "100%";
  const userScale = clampValue((scale || 100) / 100, 0.25, 2, 1);
  const availableWidth = Math.max(0, outerWidth - (constrained ? 16 : 0));
  const fitScale = fitToContainer && targetPx && availableWidth
    ? Math.min(1, Math.max(0.25, availableWidth / targetPx))
    : 1;

  const deviceWidth = targetPx ? `${targetPx}px` : "100%";
  const visualWidth = targetPx && fitScale < 1 ? `${Math.floor(targetPx * fitScale)}px` : deviceWidth;
  const visualHeight = fitScale < 1 ? `${100 / fitScale}%` : "100%";
  const iframeW = userScale !== 1 ? `${100 / userScale}%` : "100%";
  const iframeH = userScale !== 1 ? `${100 / userScale}%` : "100%";
  const outerBg = darkMode ? (constrained ? "#2a2a3e" : "#1e1e2e") : (constrained ? "#dde1e8" : (userScale < 1 ? "#e8eaf0" : "#fff"));
  const innerBg = darkMode ? "#1e1e2e" : "#fff";

  useEffect(() => {
    const el = outerRef.current;
    if (!el) return;

    const update = () => setOuterWidth(el.clientWidth || 0);
    update();

    if (typeof ResizeObserver === "undefined") {
      window.addEventListener("resize", update);
      return () => window.removeEventListener("resize", update);
    }

    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  useEffect(() => {
    const win = iframeRef.current?.contentWindow || null;
    onFrameWindowChange?.(win);
    return () => onFrameWindowChange?.(null);
  }, [previewKey, srcDoc, onFrameWindowChange]);

  return (
    <Box
      ref={outerRef}
      sx={{
        flex: 1,
        minHeight: 0,
        overflow: fitScale < 1 ? "hidden" : "auto",
        background: outerBg,
        display: "flex",
        justifyContent: "center",
        alignItems: "stretch",
        p: constrained ? 1 : 0,
        WebkitOverflowScrolling: "touch",
      }}
    >
      <Box
        sx={{
          width: visualWidth,
          height: "100%",
          minHeight: 0,
          flexShrink: 0,
          border: constrained ? `1px solid ${darkMode ? "#444" : "#c8cdd6"}` : "none",
          borderRadius: constrained ? 1 : 0,
          overflow: "hidden",
          background: innerBg,
          position: "relative",
          transition: "width 0.2s ease",
        }}
      >
        <Box
          sx={{
            width: deviceWidth,
            height: visualHeight,
            transformOrigin: "top left",
            transform: fitScale !== 1 ? `scale(${fitScale})` : "none",
            position: "absolute",
            top: 0,
            left: 0,
          }}
        >
          <Box
            sx={{
              width: iframeW,
              height: iframeH,
              transformOrigin: "top left",
              transform: userScale !== 1 ? `scale(${userScale})` : "none",
              position: "absolute",
              top: 0,
              left: 0,
            }}
          >
            <iframe
              ref={iframeRef}
              key={previewKey}
              title="preview"
              srcDoc={srcDoc}
              sandbox="allow-scripts allow-forms"
              style={{ width: "100%", height: "100%", minHeight: 200, border: "none", display: "block" }}
            />
          </Box>
        </Box>
      </Box>
    </Box>
  );
}

const EDITOR_FONT = "ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
const LINE_HEIGHT_RATIO = 1.65;

function CodeEditor({ value, onChange, fontSize, darkMode, wordWrap, highlightMode, perfMode = "normal", showIndentGuides = true, mode = EDITOR_MODES.HTML, editorApiRef = null }) {
  const hostRef = useRef(null);
  const viewRef = useRef(null);
  const valueRef = useRef(value);
  const onChangeRef = useRef(onChange);
  const [metrics, setMetrics] = useState(() => ({
    line: 1,
    col: 1,
    lineCount: String(value || "").split("\n").length,
    charCount: String(value || "").length,
    selCount: 0,
  }));

  useEffect(() => { onChangeRef.current = onChange; }, [onChange]);
  useEffect(() => { valueRef.current = value; }, [value]);

  useEffect(() => {
    if (!editorApiRef) return;

    const readText = () => {
      const view = viewRef.current;
      return view ? view.state.doc.toString() : String(valueRef.current || "");
    };

    const writeText = (text, selection = null) => {
      const value = String(text ?? "");
      const view = viewRef.current;
      if (view) {
        const currentLength = view.state.doc.length;
        const effects = { changes: { from: 0, to: currentLength, insert: value } };
        if (selection) {
          const anchor = clampValue(selection.start ?? 0, 0, value.length, 0);
          const head = clampValue(selection.end ?? anchor, 0, value.length, anchor);
          effects.selection = { anchor, head };
        }
        view.dispatch(effects);
        valueRef.current = value;
        onChangeRef.current(value);
        view.focus();
      } else {
        valueRef.current = value;
        onChangeRef.current(value);
      }
    };

    const api = {
      getText: readText,
      setText: (text) => writeText(text),
      getSelection() {
        const view = viewRef.current;
        if (!view) return "";
        const sel = view.state.selection.main;
        if (sel.empty) return "";
        return view.state.doc.sliceString(sel.from, sel.to);
      },
      getSelectionRange() {
        const view = viewRef.current;
        if (!view) return { start: 0, end: 0 };
        const sel = view.state.selection.main;
        return { start: sel.from, end: sel.to };
      },
      setSelectionRange(start, end) {
        const view = viewRef.current;
        if (!view) return;
        const max = view.state.doc.length;
        const anchor = clampValue(Number(start) || 0, 0, max, 0);
        const head = clampValue(Number(end) || anchor, 0, max, anchor);
        view.dispatch({ selection: { anchor, head }, scrollIntoView: true });
        view.focus();
      },
      replaceSelection(text) {
        const view = viewRef.current;
        const insert = String(text ?? "");
        if (!view) return writeText(insert);
        const sel = view.state.selection.main;
        view.dispatch({
          changes: { from: sel.from, to: sel.to, insert },
          selection: { anchor: sel.from + insert.length },
          scrollIntoView: true,
        });
        const next = view.state.doc.toString();
        valueRef.current = next;
        onChangeRef.current(next);
        view.focus();
      },
      insertText(text) {
        const view = viewRef.current;
        const insert = String(text ?? "");
        if (!view) return writeText(readText() + insert);
        const pos = view.state.selection.main.head;
        view.dispatch({
          changes: { from: pos, to: pos, insert },
          selection: { anchor: pos + insert.length },
          scrollIntoView: true,
        });
        const next = view.state.doc.toString();
        valueRef.current = next;
        onChangeRef.current(next);
        view.focus();
      },
      createSnapshot() {
        return {
          text: readText(),
          selection: this.getSelectionRange(),
          createdAt: Date.now(),
        };
      },
      restoreSnapshot(snapshot) {
        if (!snapshot || typeof snapshot.text !== "string") return { ok: false, error: "No snapshot" };
        writeText(snapshot.text, snapshot.selection || null);
        return { ok: true };
      },
    };

    editorApiRef.current = api;
    return () => {
      if (editorApiRef.current === api) editorApiRef.current = null;
    };
  }, [editorApiRef]);

  const updateMetrics = useCallback((state) => {
    const head = state.selection.main.head;
    const line = state.doc.lineAt(head);
    const selCount = Math.abs(state.selection.main.to - state.selection.main.from);
    setMetrics({
      line: line.number,
      col: head - line.from + 1,
      lineCount: state.doc.lines,
      charCount: state.doc.length,
      selCount,
    });
  }, []);

  useEffect(() => {
    if (!hostRef.current || !window.__HT_CM__?.EditorView) return;

    const {
      EditorView: CMEditorView,
      basicSetup: CMBasicSetup,
      cmHtml,
      cmMarkdown,
      oneDark,
    } = window.__HT_CM__;

    const startValue = valueRef.current || "";
    const updateListener = CMEditorView.updateListener.of((update) => {
      if (update.docChanged) {
        const next = update.state.doc.toString();
        valueRef.current = next;
        onChangeRef.current(next);
      }
      if (update.docChanged || update.selectionSet || update.focusChanged) {
        updateMetrics(update.state);
      }
    });

    const baseTheme = CMEditorView.theme({
      "&": {
        height: "100%",
        fontSize: `${fontSize}px`,
        backgroundColor: darkMode ? "#1e1e2e" : "#ffffff",
        color: darkMode ? "#cdd6f4" : "#1a1a2e",
      },
      ".cm-scroller": {
        fontFamily: EDITOR_FONT,
        lineHeight: String(LINE_HEIGHT_RATIO),
      },
      ".cm-content": {
        fontFamily: EDITOR_FONT,
        minHeight: "100%",
        padding: "12px 0",
      },
      ".cm-line": {
        padding: "0 14px",
      },
      ".cm-gutters": {
        fontFamily: EDITOR_FONT,
        borderRight: darkMode ? "1px solid #313244" : "1px solid #e0e3e8",
        backgroundColor: darkMode ? "#181825" : "#f5f6f8",
        color: darkMode ? "#585b70" : "#aab0bc",
      },
      ".cm-activeLine": {
        backgroundColor: darkMode ? "rgba(203,166,247,0.07)" : "rgba(25,118,210,0.055)",
      },
      ".cm-activeLineGutter": {
        backgroundColor: darkMode ? "rgba(203,166,247,0.08)" : "rgba(25,118,210,0.075)",
        color: darkMode ? "#cdd6f4" : "#1976d2",
      },
      ".cm-foldGutter span": {
        padding: "0 2px",
      },
      ".cm-searchMatch": {
        outline: "1px solid rgba(245,158,11,0.7)",
      },
    }, { dark: darkMode });

    const resolvedMode = normalizeEditorMode(mode);
    const languageExt = (highlightMode === "plain" || perfMode === "huge")
      ? []
      : (resolvedMode === EDITOR_MODES.MARKDOWN && cmMarkdown ? cmMarkdown() : cmHtml());
    const wrapExt = wordWrap ? CMEditorView.lineWrapping : [];
    const darkExt = darkMode && oneDark ? oneDark : [];

    const view = new CMEditorView({
      doc: startValue,
      extensions: [
        CMBasicSetup,
        languageExt,
        wrapExt,
        darkExt,
        baseTheme,
        updateListener,
      ],
      parent: hostRef.current,
    });

    viewRef.current = view;
    updateMetrics(view.state);

    return () => {
      view.destroy();
      if (viewRef.current === view) viewRef.current = null;
    };
  }, [fontSize, darkMode, wordWrap, highlightMode, perfMode, mode, updateMetrics]);

  useEffect(() => {
    const view = viewRef.current;
    if (!view) return;
    const current = view.state.doc.toString();
    if (value === current) return;
    view.dispatch({ changes: { from: 0, to: current.length, insert: value || "" } });
  }, [value]);

  const sizeKB = (new TextEncoder().encode(value || "").length / 1024).toFixed(1);
  const bg       = darkMode ? "#1e1e2e" : "#fff";
  const fg       = darkMode ? "#cdd6f4" : "#1a1a2e";
  const statusBg = darkMode ? "#11111b" : "#f0f2f5";
  const statusFg = darkMode ? "#6c7086" : "#7b8190";

  return (
    <Box sx={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0, background: bg, color: fg, overflow: "hidden" }}>
      <Box ref={hostRef} sx={{ flex: 1, minHeight: 0, overflow: "hidden", "& .cm-editor": { height: "100%" } }} />
      <Box sx={{ height: 24, flexShrink: 0, display: "flex", alignItems: "center", gap: 1.5, px: 1.5, background: statusBg, borderTop: `1px solid ${darkMode ? "#313244" : "#e0e3e8"}`, color: statusFg, fontSize: 11, fontFamily: EDITOR_FONT }}>
        <span>行 {metrics.line}, 列 {metrics.col}</span>
        <span>{metrics.lineCount.toLocaleString()} 行</span>
        <span>{metrics.charCount.toLocaleString()} 文字</span>
        {metrics.selCount > 0 && <span>選択 {metrics.selCount.toLocaleString()}</span>}
        <Box sx={{ flex: 1 }} />
        {perfMode !== "normal" && <span>{perfMode === "huge" ? "超大容量モード" : "大容量モード"}</span>}
        <span>{sizeKB} KB</span>
        <span>{normalizeEditorMode(mode) === EDITOR_MODES.MARKDOWN ? "Markdown" : "HTML"}</span>
        <span>CodeMirror</span>
      </Box>
    </Box>
  );
}

function EditorTabBar({ tabs, activeId, onSwitch, onNew, onClose, onRename, onDuplicate, onModeChange, activeMode, activeModePreference, darkMode }) {
  const bg = darkMode ? "#181825" : "#eef1f6";
  const border = darkMode ? "#313244" : "#d7dce5";
  const activeBg = darkMode ? "#1e1e2e" : "#fff";
  const inactiveBg = darkMode ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.55)";
  const activeFg = darkMode ? "#cdd6f4" : "#1a1a2e";
  const inactiveFg = darkMode ? "rgba(205,214,244,0.62)" : "#5f6673";

  return (
    <Box sx={{ height: 34, flexShrink: 0, display: "flex", alignItems: "center", gap: 0.5, px: 0.75, background: bg, borderBottom: `1px solid ${border}`, overflow: "hidden" }}>
      <Box sx={{ flex: 1, display: "flex", alignItems: "center", gap: 0.4, overflowX: "auto", overflowY: "hidden", height: "100%", pr: 0.5 }}>
        {tabs.map(tab => {
          const active = tab.id === activeId;
          return (
            <Box
              key={tab.id}
              onClick={() => onSwitch(tab.id)}
              onDoubleClick={() => onRename(tab.id)}
              sx={{
                height: 26,
                minWidth: 104,
                maxWidth: 220,
                px: 0.8,
                display: "flex",
                alignItems: "center",
                gap: 0.45,
                borderRadius: "7px 7px 0 0",
                cursor: "pointer",
                flexShrink: 0,
                border: `1px solid ${active ? border : "transparent"}`,
                borderBottomColor: active ? activeBg : "transparent",
                background: active ? activeBg : inactiveBg,
                color: active ? activeFg : inactiveFg,
                boxShadow: active ? "0 -1px 4px rgba(0,0,0,0.04)" : "none",
                "&:hover": { background: active ? activeBg : (darkMode ? "rgba(255,255,255,0.07)" : "rgba(255,255,255,0.8)") },
              }}
            >
              <Icon name={inferEditorMode(tab.name, tab.code, tab.modePreference ?? tab.mode) === EDITOR_MODES.MARKDOWN ? "article" : "code"} size={13} style={{ color: active ? "#1976d2" : "currentColor", flexShrink: 0 }} />
              <Typography noWrap variant="caption" sx={{ flex: 1, fontSize: 11, lineHeight: 1, fontWeight: active ? 700 : 500, color: "inherit" }}>
                {tab.name}
              </Typography>
              <Tooltip title="名前変更" arrow>
                <IconButton size="small" onClick={(e) => { e.stopPropagation(); onRename(tab.id); }} sx={{ p: 0.15, color: "inherit", opacity: active ? 0.75 : 0.35, "&:hover": { opacity: 1 } }}>
                  <Icon name="edit" size={11} />
                </IconButton>
              </Tooltip>
              {tabs.length > 1 && (
                <Tooltip title="閉じる" arrow>
                  <IconButton size="small" onClick={(e) => { e.stopPropagation(); onClose(tab.id); }} sx={{ p: 0.15, color: "inherit", opacity: active ? 0.75 : 0.35, "&:hover": { opacity: 1 } }}>
                    <Icon name="close" size={12} />
                  </IconButton>
                </Tooltip>
              )}
            </Box>
          );
        })}
      </Box>

      <ToggleButtonGroup
        value={normalizeModePreference(activeModePreference)}
        exclusive
        size="small"
        onChange={(_, v) => { if (v) onModeChange(v); }}
        sx={{
          flexShrink: 0,
          mx: 0.25,
          "& .MuiToggleButton-root": {
            px: 0.7,
            py: 0.25,
            fontSize: 10,
            lineHeight: 1.1,
            color: darkMode ? "rgba(205,214,244,0.72)" : "#607080",
            borderColor: border,
          },
        }}
      >

function estimateStorageBytes() {
  try {
    let total = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i) || "";
      const value = localStorage.getItem(key) || "";
      total += new TextEncoder().encode(key + value).length;
    }
    return total;
  } catch { return 0; }
}

function formatBytes(n) {
  const value = Number(n || 0);
  if (value < 1024) return `${value} B`;
  if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
  if (value < 1024 * 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)} MB`;
  return `${(value / 1024 / 1024 / 1024).toFixed(2)} GB`;
}

function byteSizeOf(value) {
  try { return new Blob([typeof value === "string" ? value : JSON.stringify(value)]).size; }
  catch { return String(value ?? "").length; }
}

function getLocalStorageSummary() {
  const rows = [];
  let total = 0;
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      const value = localStorage.getItem(key);
      const size = byteSizeOf(key) + byteSizeOf(value);
      total += size;
      rows.push({ key, size, valuePreview: String(value || "").slice(0, 180) });
    }
  } catch (e) {
    return { ok: false, error: e.message || String(e), total: 0, rows: [] };
  }
  rows.sort((a, b) => b.size - a.size);
  return { ok: true, total, rows };
}

async function getCacheSummary() {
  if (!window.caches) return { ok: false, total: 0, caches: [], error: "Cache API is not available" };
  const names = await caches.keys();
  const list = [];
  let total = 0;
  for (const name of names) {
    const cache = await caches.open(name);
    const reqs = await cache.keys();
    let size = 0;
    for (const req of reqs) {
      try {
        const res = await cache.match(req);
        const clone = res?.clone();
        const blob = clone ? await clone.blob() : null;
        size += blob ? blob.size : 0;
      } catch {}
    }
    total += size;
    list.push({ name, count: reqs.length, size });
  }
  return { ok: true, total, caches: list };
}

async function clearAllPlusCaches() {
  if (!window.caches) return 0;
  const names = await caches.keys();
  let count = 0;
  for (const name of names) {
    if (name.startsWith("html-modal-tester") || name.startsWith("html-editor")) {
      const ok = await caches.delete(name);
      if (ok) count++;
    }
  }
  return count;
}

async function getStorageEstimateSafe() {
  try {
    if (!navigator.storage?.estimate) return null;
    return await navigator.storage.estimate();
  } catch {
    return null;
  }
}

function SecurityStorageDialog({ open, onClose, onExportAll, onFullReset, onToast }) {
  const [summary, setSummary] = useState({ local: null, cache: null, estimate: null });
  const [busy, setBusy] = useState(false);
  const refresh = useCallback(async () => {
    const local = getLocalStorageSummary();
    const cache = await getCacheSummary().catch(e => ({ ok: false, caches: [], total: 0, error: e.message || String(e) }));
    const estimate = await getStorageEstimateSafe();
    setSummary({ local, cache, estimate });
  }, []);
  useEffect(() => { if (open) refresh(); }, [open, refresh]);
  const clearCaches = async () => {
    setBusy(true);
    try {
      const count = await clearAllPlusCaches();
      onToast?.(`${count} 件のアプリ関連Cacheを削除しました`);
      await refresh();
    } finally { setBusy(false); }
  };
  const usage = summary.estimate?.usage || 0;
  const quota = summary.estimate?.quota || 0;
  const appKeys = (summary.local?.rows || []).filter(r => String(r.key || '').startsWith('html-tester-'));
  const appCaches = (summary.cache?.caches || []).filter(c => String(c.name || '').startsWith('html-modal-tester') || String(c.name || '').startsWith('html-editor'));
  return (
    <Dialog open={open} onClose={onClose} maxWidth="sm" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}>
      <DialogTitle sx={{ display: 'flex', alignItems: 'center', gap: 1, fontWeight: 800 }}><Icon name="security" size={20} />Security & Storage</DialogTitle>
      <DialogContent sx={{ display: 'flex', flexDirection: 'column', gap: 1.5 }}>
        <Box sx={{ p: 1.5, border: '1px solid #e0e3e8', borderRadius: 2 }}>
          <Typography variant="body2" fontWeight={700}>ブラウザ保存領域</Typography>
          <Typography variant="caption" color="text.secondary">{formatBytes(usage)} / {quota ? formatBytes(quota) : '不明'}</Typography>
        </Box>
        <Box sx={{ p: 1.5, border: '1px solid #e0e3e8', borderRadius: 2 }}>
          <Typography variant="body2" fontWeight={700}>localStorage</Typography>
          <Typography variant="caption" color="text.secondary">合計 {formatBytes(summary.local?.total || 0)} / アプリキー {appKeys.length} 件</Typography>
          <Box sx={{ mt: 1, maxHeight: 120, overflow: 'auto' }}>
            {appKeys.map(r => <Typography key={r.key} variant="caption" sx={{ display: 'block', wordBreak: 'break-all' }}>{r.key} · {formatBytes(r.size)}</Typography>)}
            {appKeys.length === 0 && <Typography variant="caption" color="text.secondary">アプリ保存データなし</Typography>}
          </Box>
        </Box>
        <Box sx={{ p: 1.5, border: '1px solid #e0e3e8', borderRadius: 2 }}>
          <Typography variant="body2" fontWeight={700}>Cache API</Typography>
          <Typography variant="caption" color="text.secondary">アプリ関連Cache {appCaches.length} 件 / 合計 {formatBytes(summary.cache?.total || 0)}</Typography>
          <Box sx={{ mt: 1, maxHeight: 90, overflow: 'auto' }}>
            {appCaches.map(c => <Typography key={c.name} variant="caption" sx={{ display: 'block', wordBreak: 'break-all' }}>{c.name} · {c.count} items · {formatBytes(c.size)}</Typography>)}
            {appCaches.length === 0 && <Typography variant="caption" color="text.secondary">アプリ関連Cacheなし</Typography>}
          </Box>
        </Box>
        <Typography variant="caption" color="text.secondary">IndexedDBミラー、CDN強制キャッシュ、永続保存要求は使わず、保存箇所をlocalStorage中心に絞ります。</Typography>
      </DialogContent>
      <DialogActions sx={{ px: 3, pb: 2, gap: 1, flexWrap: 'wrap' }}>
        <Button onClick={refresh} variant="outlined" disabled={busy}>再読込</Button>
        <Button onClick={onExportAll} variant="outlined" startIcon={<Icon name="download" size={16} />}>Export</Button>
        <Button onClick={clearCaches} variant="outlined" color="warning" disabled={busy} startIcon={<Icon name="delete_sweep" size={16} />}>Cache削除</Button>
        <Button onClick={onFullReset} variant="contained" color="error" startIcon={<Icon name="restart_alt" size={16} />}>完全初期化</Button>
        <Box sx={{ flex: 1 }} /><Button onClick={onClose} variant="contained">閉じる</Button>
      </DialogActions>
    </Dialog>
  );
}




const SUPPORT_AI_CONFIG_KEY = "html-tester-supportai-local-llm-config";
const SUPPORT_AI_PROVIDER_OPTIONS = Object.freeze([
  { value: "lfm-openai-compatible", label: "LFM / OpenAI互換" },
  { value: "lm-studio", label: "LM Studio" },
  { value: "llama-cpp", label: "llama.cpp server" },
  { value: "ollama", label: "Ollama" },
  { value: "custom-openai-compatible", label: "Custom OpenAI互換" },
]);

const DEFAULT_SUPPORT_AI_CONFIG = Object.freeze({
  provider: "lfm-openai-compatible",
  endpoint: "http://localhost:1234/v1/chat/completions",
  ollamaEndpoint: "http://localhost:11434/api/chat",
  textModel: "lfm",
  visionModel: "lfm",
  audioEndpoint: "",
  temperature: 0.4,
  maxTokens: 2000,
  timeoutMs: 60000,
  language: "ja",
});

function supportAIErrorMessage(error) {
  if (!error) return "Unknown error";
  if (typeof error === "string") return error;
  if (error.name === "AbortError") return "タイムアウトしました。Endpoint、CORS、モデル名を確認してください。";
  return error.message || String(error);
}

function normalizeSupportAIConfig(config) {
  const c = config && typeof config === "object" ? config : {};
  const providerValues = new Set(SUPPORT_AI_PROVIDER_OPTIONS.map(p => p.value));
  const provider = providerValues.has(c.provider) ? c.provider : DEFAULT_SUPPORT_AI_CONFIG.provider;
  const n = (value, fallback, min, max) => {
    const num = Number(value);
    return Number.isFinite(num) ? Math.min(max, Math.max(min, num)) : fallback;
  };
  const s = (value, fallback) => {
    const str = String(value ?? "").trim();
    return str || fallback;
  };
  return {
    provider,
    endpoint: s(c.endpoint, DEFAULT_SUPPORT_AI_CONFIG.endpoint),
    ollamaEndpoint: s(c.ollamaEndpoint, DEFAULT_SUPPORT_AI_CONFIG.ollamaEndpoint),
    textModel: s(c.textModel, DEFAULT_SUPPORT_AI_CONFIG.textModel),
    visionModel: s(c.visionModel, c.textModel || DEFAULT_SUPPORT_AI_CONFIG.visionModel),
    audioEndpoint: String(c.audioEndpoint ?? DEFAULT_SUPPORT_AI_CONFIG.audioEndpoint).trim(),
    temperature: n(c.temperature, DEFAULT_SUPPORT_AI_CONFIG.temperature, 0, 2),
    maxTokens: Math.round(n(c.maxTokens, DEFAULT_SUPPORT_AI_CONFIG.maxTokens, 128, 32000)),
    timeoutMs: Math.round(n(c.timeoutMs, DEFAULT_SUPPORT_AI_CONFIG.timeoutMs, 5000, 300000)),
    language: s(c.language, DEFAULT_SUPPORT_AI_CONFIG.language),
  };
}

function loadSupportAIConfig() {
  try {
    const raw = localStorage.getItem(SUPPORT_AI_CONFIG_KEY);
    if (!raw) return { ...DEFAULT_SUPPORT_AI_CONFIG };
    return normalizeSupportAIConfig(JSON.parse(raw));
  } catch {
    return { ...DEFAULT_SUPPORT_AI_CONFIG };
  }
}

function saveSupportAIConfig(config) {
  try {
    localStorage.setItem(SUPPORT_AI_CONFIG_KEY, JSON.stringify(normalizeSupportAIConfig(config)));
    return true;
  } catch {
    return false;
  }
}

function supportAIProviderLabel(provider) {
  return SUPPORT_AI_PROVIDER_OPTIONS.find(p => p.value === provider)?.label || provider || "Local LLM";
}

function supportAITextFromOpenAICompatible(data) {
  const choice = Array.isArray(data?.choices) ? data.choices[0] : null;
  const content = choice?.message?.content ?? choice?.text ?? data?.text ?? data?.response ?? data?.result ?? "";
  if (Array.isArray(content)) {
    return content.map(part => typeof part === "string" ? part : (part?.text || "")).join("");
  }
  return String(content || "");
}

function supportAITextFromOllama(data) {
  return String(data?.message?.content ?? data?.response ?? data?.text ?? data?.result ?? "");
}

async function supportFetchJson(url, payload, options = {}) {
  const timeoutMs = options.timeoutMs || DEFAULT_SUPPORT_AI_CONFIG.timeoutMs;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload || {}),
      signal: controller.signal,
    });
    const bodyText = await response.text().catch(() => "");
    let data = {};
    try { data = bodyText ? JSON.parse(bodyText) : {}; } catch { data = { text: bodyText }; }
    if (!response.ok) {
      return { ok: false, text: "", error: `${response.status} ${response.statusText}${bodyText ? `: ${bodyText.slice(0, 320)}` : ""}`, raw: data };
    }
    return { ok: true, data, raw: data, error: null };
  } catch (e) {
    return { ok: false, text: "", error: supportAIErrorMessage(e), raw: null };
  } finally {
    clearTimeout(timer);
  }
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = () => reject(reader.error || new Error("File read failed"));
    reader.readAsDataURL(file);
  });
}

function dataUrlToBase64(dataUrl) {
  return String(dataUrl || "").split(",")[1] || "";
}

function createOpenAICompatiblePayload({ prompt, config, model, imageDataUrl = null }) {
  const content = imageDataUrl
    ? [
        { type: "text", text: prompt },
        { type: "image_url", image_url: { url: imageDataUrl } },
      ]
    : prompt;
  return {
    model: model || config.textModel,
    messages: [
      { role: "system", content: "あなたはエディタ統合AIです。必要な結果だけを返します。" },
      { role: "user", content },
    ],
    temperature: config.temperature,
    max_tokens: config.maxTokens,
    stream: false,
  };
}

function createOllamaPayload({ prompt, config, model, imageDataUrl = null }) {
  const message = { role: "user", content: prompt };
  if (imageDataUrl) message.images = [dataUrlToBase64(imageDataUrl)];
  return {
    model: model || config.textModel,
    messages: [message],
    options: {
      temperature: config.temperature,
      num_predict: config.maxTokens,
    },
    stream: false,
  };
}

function createSupportAIProviders(rawConfig = DEFAULT_SUPPORT_AI_CONFIG) {
  const config = normalizeSupportAIConfig(rawConfig);
  const isOllama = config.provider === "ollama";
  const chatEndpoint = isOllama ? config.ollamaEndpoint : config.endpoint;

  async function askText(prompt, options = {}) {
    const merged = normalizeSupportAIConfig({ ...config, ...options });
    const endpoint = isOllama ? merged.ollamaEndpoint : merged.endpoint;
    const payload = isOllama
      ? createOllamaPayload({ prompt, config: merged, model: options.model || merged.textModel })
      : createOpenAICompatiblePayload({ prompt, config: merged, model: options.model || merged.textModel });
    const res = await supportFetchJson(endpoint, payload, merged);
    if (!res.ok) return res;
    const text = isOllama ? supportAITextFromOllama(res.data) : supportAITextFromOpenAICompatible(res.data);
    return { ok: true, text, usage: res.data?.usage || null, raw: res.data, error: null };
  }

  async function analyzeImage(file, options = {}) {
    if (!file) return { ok: false, text: "", error: "画像ファイルが選択されていません。" };
    const prompt = options.instruction || "この画像を説明してください。";
    const imageDataUrl = await fileToDataUrl(file);
    const merged = normalizeSupportAIConfig({ ...config, ...options });
    const endpoint = isOllama ? merged.ollamaEndpoint : merged.endpoint;
    const payload = isOllama
      ? createOllamaPayload({ prompt, config: merged, model: options.model || merged.visionModel, imageDataUrl })
      : createOpenAICompatiblePayload({ prompt, config: merged, model: options.model || merged.visionModel, imageDataUrl });
    const res = await supportFetchJson(endpoint, payload, merged);
    if (!res.ok) return res;
    const text = isOllama ? supportAITextFromOllama(res.data) : supportAITextFromOpenAICompatible(res.data);
    return { ok: true, text, usage: res.data?.usage || null, raw: res.data, error: null };
  }

  async function transcribeAudio(file, options = {}) {
    if (!file) return { ok: false, text: "", error: "音声ファイルが選択されていません。" };
    const endpoint = String(config.audioEndpoint || "").trim();
    if (!endpoint) {
      return {
        ok: false,
        text: "",
        error: "音声文字起こし用Endpointが未設定です。ローカルWhisper等のHTTP endpointをSupportAI設定に入力してください。",
      };
    }
    const timeoutMs = options.timeoutMs || config.timeoutMs;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const form = new FormData();
      form.append("file", file);
      form.append("audio", file);
      form.append("model", options.model || config.textModel);
      form.append("language", options.language || config.language || "ja");
      const response = await fetch(endpoint, { method: "POST", body: form, signal: controller.signal });
      const bodyText = await response.text().catch(() => "");
      let data = {};
      try { data = bodyText ? JSON.parse(bodyText) : {}; } catch { data = { text: bodyText }; }
      if (!response.ok) return { ok: false, text: "", error: `Audio endpoint error: ${response.status}${bodyText ? ` ${bodyText.slice(0, 240)}` : ""}`, raw: data };
      return { ok: true, text: String(data.text ?? data.result ?? data.transcript ?? ""), error: null, raw: data };
    } catch (e) {
      return { ok: false, text: "", error: supportAIErrorMessage(e) };
    } finally {
      clearTimeout(timer);
    }
  }

  return {
    config,
    status() {
      return {
        provider: config.provider,
        label: supportAIProviderLabel(config.provider),
        endpoint: chatEndpoint,
        textModel: config.textModel,
        visionModel: config.visionModel,
        hasAudioEndpoint: Boolean(config.audioEndpoint),
      };
    },
    text: { ask: askText },
    audio: { transcribe: transcribeAudio },
    vision: { analyze: analyzeImage },
  };
}

async function supportAIAgentSingle(providers, roleName, task, input, options = {}) {
  const role = SupportAIRoles[roleName] || SupportAIRoles.editor;
  const prompt = [
    role.system,
    "",
    "タスク:", task,
    "",
    "対象:", typeof input === "string" ? input : JSON.stringify(input, null, 2),
    "",
    "出力は簡潔に、本文として使える形で返してください。",
  ].join("\n");
  const result = await providers.text.ask(prompt, options);
  return { ok: result.ok, role: roleName, task, text: result.text || "", error: result.error || null };
}

async function supportAIConverge(providers, { task, input, policy = "" }, options = {}) {
  const history = [];
  const draft = await supportAIAgentSingle(providers, "writer", `${task}。方針: ${policy}。まず初案を作ってください。`, input, options);
  history.push(draft);
  if (!draft.ok) return { ok: false, text: "", history, error: draft.error };
  const critique = await supportAIAgentSingle(providers, "critic", "初案の弱点、曖昧さ、過剰変更、改善点を指摘してください。", { original: input, draft: draft.text }, options);
  history.push(critique);
  const verification = await supportAIAgentSingle(providers, "verifier", "ユーザー意図、形式、論理、矛盾、条件違反を確認してください。", { original: input, draft: draft.text, critique: critique.text }, options);
  history.push(verification);
  const final = await supportAIAgentSingle(providers, "synthesizer", "初案、批評、検証を踏まえて、最終版だけを出力してください。", { original: input, draft: draft.text, critique: critique.text, verification: verification.text }, options);
  history.push(final);
  return { ok: final.ok, text: final.text || "", history, error: final.error || null };
}

function collectMarkdownIssues(markdown) {
  const errors = [];
  const text = String(markdown || "");
  const codeFenceCount = (text.match(/```/g) || []).length;
  if (codeFenceCount % 2 !== 0) errors.push({ type: "markdown", message: "コードブロックの ``` が閉じられていません。" });
  const headings = text.match(/^#{1,6}\s+.+$/gm) || [];
  let previousLevel = 0;
  headings.forEach(heading => {
    const level = heading.match(/^#+/)[0].length;
    if (previousLevel && level > previousLevel + 1) errors.push({ type: "heading", message: `見出し階層が飛んでいます: ${heading}` });
    previousLevel = level;
  });
  const lines = text.split("\n");
  for (let i = 0; i < lines.length - 1; i++) {
    const current = lines[i];
    const next = lines[i + 1];
    if (current.includes("|") && /^\s*\|?\s*:?-{3,}/.test(next)) {
      const colsA = current.split("|").filter(Boolean).length;
      const colsB = next.split("|").filter(Boolean).length;
      if (colsA !== colsB) errors.push({ type: "table", message: `Markdown表の列数が一致していません。行 ${i + 1}` });
    }
  }
  const blocks = [...text.matchAll(/```(?:mermaid|mmd|marmaid)([\s\S]*?)```/gi)];
  blocks.forEach(block => {
    const body = block[1].trim();
    if (!body) errors.push({ type: "mermaid", message: "空のMermaidブロックがあります。" });
    if (body && !/^(graph|flowchart|sequenceDiagram|classDiagram|stateDiagram|stateDiagram-v2|erDiagram|gantt|pie|mindmap|timeline|journey|quadrantChart|requirementDiagram|gitGraph)/m.test(body)) {
      errors.push({ type: "mermaid", message: "Mermaidブロックの開始構文が不明です。" });
    }
  });
  return errors;
}

function SupportAIDialog({ open, onClose, appDarkMode, activeMode, editorApiRef, fallbackText, onFallbackSetText, onToast, onForceMarkdown, onForceHtml }) {
  const [tab, setTab] = useState("basic");
  const [instruction, setInstruction] = useState("自然で読みやすくしてください");
  const [themeText, setThemeText] = useState("美しいTODOアプリを単一HTMLで作って");
  const [result, setResult] = useState(null);
  const [busy, setBusy] = useState(false);
  const [lastSnapshot, setLastSnapshot] = useState(null);
  const [aiConfig, setAIConfig] = useState(() => loadSupportAIConfig());
  const audioInputRef = useRef(null);
  const imageInputRef = useRef(null);
  const providers = useMemo(() => createSupportAIProviders(aiConfig), [aiConfig]);
  const providerStatus = useMemo(() => providers.status(), [providers]);
  const updateAIConfig = useCallback((patch) => {
    setAIConfig(prev => {
      const next = normalizeSupportAIConfig({ ...prev, ...patch });
      saveSupportAIConfig(next);
      return next;
    });
  }, []);
  const resetAIConfig = useCallback(() => {
    const next = { ...DEFAULT_SUPPORT_AI_CONFIG };
    saveSupportAIConfig(next);
    setAIConfig(next);
    onToast?.("SupportAI設定を初期化しました");
  }, [onToast]);
  const dark = Boolean(appDarkMode);
  const border = dark ? "rgba(255,255,255,0.10)" : "#e5e9f2";
  const surface = dark ? "#0f172a" : "#fff";
  const muted = dark ? "rgba(229,231,235,0.66)" : "#667085";

  const getEditor = useCallback(() => editorApiRef?.current || null, [editorApiRef]);
  const getText = useCallback(() => getEditor()?.getText?.() ?? fallbackText ?? "", [getEditor, fallbackText]);
  const getTarget = useCallback(() => {
    const editor = getEditor();
    const selected = editor?.getSelection?.() || "";
    if (selected.trim()) return { scope: "selection", text: selected };
    return { scope: "document", text: getText() };
  }, [getEditor, getText]);

  const run = useCallback(async (label, fn) => {
    setBusy(true);
    setResult(null);
    try {
      const value = await fn();
      setResult({ label, ...value });
      if (!value.ok) onToast?.(`SupportAI失敗: ${value.error || "unknown"}`);
    } catch (e) {
      const message = supportAIErrorMessage(e);
      setResult({ ok: false, label, text: "", suggestion: "", error: message });

      setBusy(false);
    }
  }, [onToast]);

  const testAIConnection = useCallback(() => run("connection-test", async () => {
    const response = await providers.text.ask("接続テストです。日本語で OK とだけ返してください。", { maxTokens: 64 });
    return { ok: response.ok, type: "text", command: "connection-test", scope: "none", suggestion: response.text || "", text: response.text || "", error: response.error || null };
  }), [providers, run]);

  const runTextCommand = useCallback((command, extraInstruction = "") => run(command, async () => {
    const target = getTarget();
    const prompt = buildSupportAITextPrompt({ command, instruction: extraInstruction || instruction, text: target.text, mode: activeMode });
    const response = await providers.text.ask(prompt);
    return { ok: response.ok, type: "text", command, scope: target.scope, original: target.text, suggestion: response.text || "", text: response.text || "", error: response.error || null };
  }), [activeMode, getTarget, instruction, providers, run]);

  const applySuggestion = useCallback((res = result, insertMode = false) => {
    if (!res || !res.ok || !(res.suggestion || res.text)) return onToast?.("反映できる結果がありません");
    const editor = getEditor();
    const suggestion = String(res.suggestion || res.text || "");
    const snapshot = editor?.createSnapshot?.() || { text: getText(), selection: null, createdAt: Date.now() };
    setLastSnapshot(snapshot);
    if (editor) {
      if (insertMode || res.type === "audio" || res.type === "vision") editor.insertText(suggestion);
      else if (res.scope === "selection") editor.replaceSelection(suggestion);
      else editor.setText(suggestion);
    } else {
      onFallbackSetText?.(insertMode ? `${getText()}${suggestion}` : suggestion);
    }
    onToast?.("AI結果を反映しました");
  }, [getEditor, getText, onFallbackSetText, onToast, result]);

  const undoLast = useCallback(() => {
    const editor = getEditor();
    if (!lastSnapshot) return onToast?.("戻せるAI修正がありません");
    if (editor?.restoreSnapshot) editor.restoreSnapshot(lastSnapshot);
    else onFallbackSetText?.(lastSnapshot.text);
    onToast?.("AI修正を戻しました");
  }, [getEditor, lastSnapshot, onFallbackSetText, onToast]);

  const directFix = useCallback(() => run("direct-fix", async () => {
    const target = getTarget();
    const prompt = buildSupportAITextPrompt({ command: "fix", instruction, text: target.text, mode: activeMode });
    const response = await providers.text.ask(prompt);
    const res = { ok: response.ok, type: "text", command: "fix", scope: target.scope, original: target.text, suggestion: response.text || "", text: response.text || "", error: response.error || null };
    if (res.ok) setTimeout(() => applySuggestion(res), 0);
    return res;
  }), [activeMode, applySuggestion, getTarget, instruction, providers, run]);

  const agentRewrite = useCallback(() => run("agents-converge", async () => {

  const checkMarkdown = useCallback(() => {

  const markdownAutoComplete = useCallback(() => run("markdown-autocomplete", async () => {
    const current = getText();
    const issues = collectMarkdownIssues(current);
    const prompt = buildMarkdownDevPrompt({ theme: themeText || instruction, currentMarkdown: current, errors: issues, mode: current.trim() ? "fix-or-complete" : "generate" });

  const htmlAutoComplete = useCallback(() => run("html-autocomplete", async () => {
    const current = getText();
    const prompt = buildHtmlDevPrompt({ theme: themeText || instruction, currentCode: current, errors: [], mode: current.trim() ? "fix-or-complete" : "generate" });
    const response = await providers.text.ask(prompt);
    return { ok: response.ok, type: "text", command: "html-autocomplete", scope: "document", original: current, suggestion: response.text || "", text: response.text || "", error: response.error || null };
  }), [getText, instruction, providers, run, themeText]);

  const handleAudioFile = useCallback((file) => {
    if (!file) return;
    run("audio-transcribe", async () => {
      const response = await providers.audio.transcribe(file);
      return { ok: response.ok, type: "audio", command: "transcribe", scope: "insert", suggestion: response.text || "", text: response.text || "", error: response.error || null };
    });
  }, [providers, run]);

  const handleImageFile = useCallback((file) => {
    if (!file) return;
    run("vision-analyze", async () => {
      const response = await providers.vision.analyze(file, { instruction: instruction || "この画像の内容を説明してください。" });
      return { ok: response.ok, type: "vision", command: "analyze", scope: "insert", suggestion: response.text || "", text: response.text || "", error: response.error || null };
    });
  }, [instruction, providers, run]);

  const resultText = result?.text || result?.suggestion || "";

  return (
    <Dialog open={open} onClose={onClose} maxWidth="md" fullWidth PaperProps={{ sx: { borderRadius: 3, height: { xs: "92dvh", sm: "82vh" }, display: "flex", flexDirection: "column", background: surface } }}>
      <DialogTitle sx={{ display: "flex", alignItems: "center", gap: 1, py: 1.4, borderBottom: `1px solid ${border}` }}>
        <Icon name="auto_awesome" size={21} />
        <Box sx={{ minWidth: 0, flex: 1 }}>
          <Typography variant="subtitle1" fontWeight={900}>SupportAI</Typography>
          <Typography variant="caption" sx={{ color: muted }}>{providerStatus.label} · {providerStatus.textModel} · {providerStatus.endpoint}</Typography>
        </Box>
        <Button size="small" variant="outlined" onClick={undoLast} startIcon={<Icon name="undo" size={16} />}>AI Undo</Button>
        <IconButton onClick={onClose}><Icon name="close" size={20} /></IconButton>
      </DialogTitle>
      <DialogContent sx={{ p: 0, display: "flex", flexDirection: "column", minHeight: 0, flex: 1 }}>
        <Box sx={{ px: 2, pt: 1.2, borderBottom: `1px solid ${border}` }}>
          <ToggleButtonGroup value={tab} exclusive size="small" onChange={(_, v) => v && setTab(v)} sx={{ flexWrap: "wrap", gap: 0.5, pb: 1 }}>
            <ToggleButton value="basic">基本</ToggleButton>
            <ToggleButton value="direct">直接修正</ToggleButton>
            <ToggleButton value="agents">収束AI</ToggleButton>
            <ToggleButton value="media">音声/画像</ToggleButton>
            <ToggleButton value="dev">開発支援</ToggleButton>
            <ToggleButton value="settings">接続設定</ToggleButton>
          </ToggleButtonGroup>
        </Box>
        <Box sx={{ p: 2, display: "grid", gridTemplateColumns: { xs: "1fr", md: "280px 1fr" }, gap: 1.5, minHeight: 0, flex: 1, overflow: "hidden" }}>
          <Box sx={{ display: "flex", flexDirection: "column", gap: 1, minHeight: 0, overflow: "auto" }}>
            <MaterialUI.TextField label="追加指示" value={instruction} onChange={e => setInstruction(e.target.value)} size="small" multiline minRows={2} />
            <MaterialUI.TextField label="生成テーマ / Dev指示" value={themeText} onChange={e => setThemeText(e.target.value)} size="small" multiline minRows={2} />
            <Box sx={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0.75 }}>
              {tab === "basic" && <>
                <Button size="small" variant="outlined" onClick={() => runTextCommand("summarize")}>要約</Button>
                <Button size="small" variant="outlined" onClick={() => runTextCommand("fix")}>校正</Button>
                <Button size="small" variant="outlined" onClick={() => runTextCommand("rewrite")}>リライト</Button>

              </>}

            <Box sx={{ px: 1.2, py: 0.8, display: "flex", alignItems: "center", gap: 1, borderBottom: `1px solid ${border}` }}>
              <Typography variant="caption" fontWeight={800} sx={{ flex: 1 }}>{result?.label || "結果"}</Typography>

              {result && <MaterialUI.Chip size="small" color={result.ok ? "success" : "error"} label={result.ok ? "OK" : "ERROR"} />}

            {result?.history && <Box sx={{ px: 1.2, py: 0.7, borderTop: `1px solid ${border}`, maxHeight: 80, overflow: "auto" }}>{result.history.map((h, i) => <Typography key={i} variant="caption" sx={{ display: "block", color: muted }}>{i + 1}. {h.role}: {h.ok ? "OK" : h.error}</Typography>)}</Box>}

      </DialogContent>
      <DialogActions sx={{ px: 2, py: 1.2, borderTop: `1px solid ${border}`, gap: 1 }}>
        <Button onClick={() => navigator.clipboard.writeText(resultText || "").then(() => onToast?.("AI結果をコピーしました")).catch(() => onToast?.("コピーに失敗しました"))} disabled={!resultText}>結果コピー</Button>

  const downloadCode = () => { const name = safeDownloadFileName(activeEditorTab?.name || (activeEditorMode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html")); const blob = new Blob([html], { type: "text/plain;charset=utf-8" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = name; a.click(); URL.revokeObjectURL(url); };
  const applyPatchCode = (code) => { setHtml(code); toast("差分を適用しました"); };
  const clearEditor = () => { setHtml(""); setConfirmClear(false); toast("クリアしました"); };
  const resetProfile = () => { const tabs = [createEditorTab("index.html", DEFAULT_HTML, EDITOR_MODES.AUTO)]; setEditorTabs(tabs); setActiveEditorTabId(tabs[0].id); setHtmlState(DEFAULT_HTML); setSnapshots([]); setConsoleLogs([]); setConfirmReset(false); toast("初期設定に戻しました"); };
  const fullReset = async () => { try { [STORAGE_KEY, STORAGE_PROFILES_KEY, STORAGE_ACTIVE_KEY].forEach(k => localStorage.removeItem(k)); await clearAllPlusCaches(); } catch {} const def = createProfile("デフォルト", { code: DEFAULT_HTML }); ProfileRepo.save([def]); ProfileRepo.saveActiveId(def.id); const tabs = normalizeEditorTabs(def.data); setProfiles([def]); setActiveProfileId(def.id); setEditorTabs(tabs); setActiveEditorTabId(tabs[0]?.id || null); setHtmlState(tabs[0]?.code || DEFAULT_HTML); setSnapshots([]); setConsoleLogs([]); setConfirmFullReset(false); setStorageOpen(false); toast("完全初期化しました"); };
  const toggleFullscreen = (pane) => setFullscreen(v => v === pane ? "none" : pane);

  const showPreview = fullscreen !== "editor";
  const showEditorPane = showEditor;
  const showPreviewPane = showPreview;
  const showHandle = !isMobile && fullscreen === "none" && showEditor && showPreview;
  const editorSize = fullscreen === "editor" ? "100%" : fullscreen === "preview" ? "0%" : isMobile ? "50%" : `${ratio * 100}%`;
  const previewSize = fullscreen === "preview" ? "100%" : fullscreen === "editor" ? "0%" : isMobile ? "50%" : `${(1 - ratio) * 100}%`;
  const sizeKey = isWide ? "width" : "height";
  return (

              <Tooltip title="再読み込み"><IconButton size="small" onClick={() => setPreviewKey(k => k + 1)}><Icon name="refresh" size={17} /></IconButton></Tooltip>

  <script type="module">
    import React from "https://esm.sh/react@19.2.0";

    import mermaid from "https://esm.sh/mermaid@11.15.0";

    window.__HT_CM__ = { EditorView, basicSetup, cmHtml, cmMarkdown, oneDark };
    window.__HT_MD__ = { marked, DOMPurify, mermaid, mermaidUrl: "https://esm.sh/mermaid@11.15.0?bundle" };

    const CONSOLE_INTERCEPT = `<script>
(function(){
  var _send = function(level, args) {
    try {
      var msg = Array.from(args).map(function(a){
        try { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a); }
        catch(e) { return String(a); }
      }).join(' ');
      window.parent.postMessage({ type: '__ht_console__', level: level, msg: msg, ts: Date.now() }, '*');
    } catch(e){}
  };
  ['log','warn','error','info','debug'].forEach(function(m){
    var orig = console[m].bind(console);
    console[m] = function(){ orig.apply(console, arguments); _send(m, arguments); };
  });
  window.addEventListener('error', function(e){
    _send('error', [e.message + (e.filename ? ' (' + e.filename + ':' + e.lineno + ')' : '')]);
  });
  window.addEventListener('unhandledrejection', function(e){
    _send('error', ['Unhandled Promise rejection: ' + (e.reason?.message || e.reason)]);
  });
  window.alert = function(message) {
    var msg = String(message ?? '');
    _send('info', ['alert: ' + msg]);
    try { window.parent.postMessage({ type: '__ht_dialog__', title: 'Preview alert', message: msg, ts: Date.now() }, '*'); } catch(e) {}
  };
  window.confirm = function(message) {
    var msg = String(message ?? '');
    _send('warn', ['confirm() is disabled in sandboxed preview: ' + msg]);
    return false;
  };
  window.prompt = function(message, defaultValue) {
    var msg = String(message ?? '');
    _send('warn', ['prompt() is disabled in sandboxed preview: ' + msg]);
    return defaultValue == null ? null : String(defaultValue);
  };
})();
<\/script>`;

    const appCode = document.getElementById("app-code").textContent;

    const runApp = new Function("React", "createRoot", "MaterialUI", "CONSOLE_INTERCEPT", code + "\n//# sourceURL=html-editor-core-lean-secure-v1-0.jsx");
    runApp(React, createRoot, MaterialUI, CONSOLE_INTERCEPT);
  </script>
