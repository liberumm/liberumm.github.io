  <script>
    (function(){
      function stringifyBootError(error) {
        if (!error) return "Unknown error";
        if (typeof error === "string") return error;
        var parts = [];
        if (error.name) parts.push(error.name + ":");
        if (error.message) parts.push(error.message);
        var text = parts.join(" ").trim() || String(error);
        if (error.loc) text += "\n\nLocation: " + error.loc.line + ":" + error.loc.column;
        if (error.codeFrame) text += "\n\n" + error.codeFrame;
        if (error.stack && !String(error.stack).includes(text)) text += "\n\n" + error.stack;
        return text;
      }

      function renderBootConsole(error, phase) {
        var root = document.getElementById("root") || document.body;
        var message = stringifyBootError(error);
        var phaseLabel = phase || "Boot error";
        root.innerHTML = "";
        var wrap = document.createElement("div");
        wrap.style.cssText = [
          "height:100vh",
          "overflow:auto",
          "padding:16px",
          "background:#0f172a",
          "color:#e5e7eb",
          "font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace",
          "box-sizing:border-box"
        ].join(";");

        var title = document.createElement("div");
        title.textContent = "HTML Modal Tester 起動エラー";
        title.style.cssText = "font-weight:800;font-size:18px;margin-bottom:8px;color:#fca5a5";

        var sub = document.createElement("div");
        sub.textContent = phaseLabel + "。Reactアプリ起動前のエラーなので、アプリ内ConsoleではなくBoot Consoleに表示しています。";
        sub.style.cssText = "font-size:13px;margin-bottom:12px;color:#cbd5e1;line-height:1.6";

        var pre = document.createElement("pre");
        pre.textContent = message;
        pre.style.cssText = [
          "white-space:pre-wrap",
          "word-break:break-word",
          "background:#111827",
          "border:1px solid #334155",
          "border-radius:12px",
          "padding:14px",
          "font-size:13px",
          "line-height:1.6",
          "color:#fecaca"
        ].join(";");

        var hint = document.createElement("div");
        hint.textContent = "対処: この表示が出た場合は、Babel構文エラー・CDN読込失敗・起動時例外を確認してください。Preview iframe内のエラーは従来どおりアプリ内Consoleに表示されます。";
        hint.style.cssText = "font-size:12px;margin-top:12px;color:#93c5fd;line-height:1.6";

        wrap.appendChild(title);
        wrap.appendChild(sub);
        wrap.appendChild(pre);
        wrap.appendChild(hint);
        root.appendChild(wrap);
      }

      window.__HT_BOOT_ERROR__ = renderBootConsole;
      window.addEventListener("error", function(event) {
        if (window.__HT_APP_STARTED__) return;
        renderBootConsole(event.error || event.message, "Global script error");
      });
      window.addEventListener("unhandledrejection", function(event) {
        if (window.__HT_APP_STARTED__) return;
        renderBootConsole(event.reason, "Unhandled boot promise rejection");
      });
    })();
  </script>

const { useState, useEffect, useCallback, useMemo, useRef, useReducer } = React;

const {
  ThemeProvider, createTheme, CssBaseline, useMediaQuery,
  Box, Button, Dialog, DialogActions, DialogContent,
  DialogContentText, DialogTitle, Divider, IconButton,

} = MaterialUI;

const HANDLE_SIZE   = 6;
const RATIO_MIN     = 0.15;
const RATIO_MAX     = 0.85;
const RATIO_DEFAULT = 0.5;
const SUPPORT_AI_PANEL_SIZE_KEY = "html-tester-supportai-panel-size";
const SUPPORT_AI_PANEL_DEFAULT_SIZE = Object.freeze({ width: 1120, height: 760 });
const SUPPORT_AI_PANEL_MIN_SIZE = Object.freeze({ width: 420, height: 460 });

function useSplitPane(containerRef, isHorizontal, initialRatio) {
  const [ratio, setRatio]       = useState(initialRatio ?? RATIO_DEFAULT);
  const [dragging, setDragging] = useState(false);
  const draggingRef = useRef(false);

  const onPointerDown = useCallback((e) => {
    e.preventDefault();
    draggingRef.current = true;
    setDragging(true);
    e.currentTarget.setPointerCapture?.(e.pointerId);
  }, []);

  const onPointerMove = useCallback((e) => {
    if (!draggingRef.current || !containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const r = isHorizontal
      ? (e.clientX - rect.left) / rect.width
      : (e.clientY - rect.top)  / rect.height;
    setRatio(Math.min(RATIO_MAX, Math.max(RATIO_MIN, r)));
  }, [containerRef, isHorizontal]);

  const onPointerUp = useCallback(() => {
    draggingRef.current = false;
    setDragging(false);
  }, []);

  const onDoubleClick = useCallback(() => setRatio(RATIO_DEFAULT), []);

  return {
    ratio,
    setRatio,
    handleProps: { onPointerDown, onPointerMove, onPointerUp, onDoubleClick },
    dragging,
  };
}

function SplitHandle({ isHorizontal, handleProps, dragging }) {
  const [hover, setHover] = useState(false);
  const active = dragging || hover;

  return (
    <Box
      {...handleProps}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      sx={{
        flexShrink: 0,
        position: "relative",
        zIndex: 10,
        width:  isHorizontal ? HANDLE_SIZE : "100%",
        height: isHorizontal ? "100%"      : { xs: 12, sm: HANDLE_SIZE },
        cursor: isHorizontal ? "col-resize" : "row-resize",
        background: active ? "#1976d2" : "#d0d4db",
        transition: "background 0.15s",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        userSelect: "none",
        touchAction: "none",
      }}
    >
      <Box sx={{
        display: "flex",
        flexDirection: isHorizontal ? "column" : "row",
        gap: "3px",
        pointerEvents: "none",
      }}>
        {[0,1,2].map(i => (
          <Box key={i} sx={{
            width: isHorizontal ? 2 : 4,
            height: isHorizontal ? 4 : 2,
            borderRadius: 1,
            background: active ? "#fff" : "#9aa0ab",
          }} />
        ))}
      </Box>
    </Box>
  );
}

function readSupportAIPanelSize() {
  try {
    const raw = localStorage.getItem(SUPPORT_AI_PANEL_SIZE_KEY);
    if (!raw) return { ...SUPPORT_AI_PANEL_DEFAULT_SIZE };
    const parsed = JSON.parse(raw);
    const width = Number(parsed?.width);
    const height = Number(parsed?.height);
    return {
      width: Number.isFinite(width) ? width : SUPPORT_AI_PANEL_DEFAULT_SIZE.width,
      height: Number.isFinite(height) ? height : SUPPORT_AI_PANEL_DEFAULT_SIZE.height,
    };
  } catch {
    return { ...SUPPORT_AI_PANEL_DEFAULT_SIZE };
  }
}

function clampSupportAIPanelSize(size) {
  const maxWidth = Math.max(SUPPORT_AI_PANEL_MIN_SIZE.width, (window.innerWidth || SUPPORT_AI_PANEL_DEFAULT_SIZE.width) - 32);
  const maxHeight = Math.max(SUPPORT_AI_PANEL_MIN_SIZE.height, (window.innerHeight || SUPPORT_AI_PANEL_DEFAULT_SIZE.height) - 32);
  return {
    width: Math.round(Math.min(maxWidth, Math.max(SUPPORT_AI_PANEL_MIN_SIZE.width, Number(size?.width) || SUPPORT_AI_PANEL_DEFAULT_SIZE.width))),
    height: Math.round(Math.min(maxHeight, Math.max(SUPPORT_AI_PANEL_MIN_SIZE.height, Number(size?.height) || SUPPORT_AI_PANEL_DEFAULT_SIZE.height))),
  };
}

function saveSupportAIPanelSize(size) {
  try { localStorage.setItem(SUPPORT_AI_PANEL_SIZE_KEY, JSON.stringify(clampSupportAIPanelSize(size))); } catch {}
}

function useSupportAIPanelResize(disabled = false) {
  const [size, setSize] = useState(() => {
    if (typeof window === "undefined") return { ...SUPPORT_AI_PANEL_DEFAULT_SIZE };
    return clampSupportAIPanelSize(readSupportAIPanelSize());
  });
  const [draggingEdge, setDraggingEdge] = useState("");
  const dragRef = useRef(null);

  useEffect(() => {
    if (disabled || typeof window === "undefined") return;
    const onResize = () => setSize(prev => clampSupportAIPanelSize(prev));
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [disabled]);

  const startResize = useCallback((edge, event) => {
    if (disabled) return;
    event.preventDefault();
    event.stopPropagation();
    const pointer = event;
    dragRef.current = {
      edge,
      startX: pointer.clientX,
      startY: pointer.clientY,
      startWidth: size.width,
      startHeight: size.height,
    };
    setDraggingEdge(edge);
    event.currentTarget.setPointerCapture?.(event.pointerId);
  }, [disabled, size.height, size.width]);

  const onPointerMove = useCallback((event) => {
    const drag = dragRef.current;
    if (!drag || disabled) return;
    const next = {
      width: drag.edge.includes("right") ? drag.startWidth + (event.clientX - drag.startX) : drag.startWidth,
      height: drag.edge.includes("bottom") ? drag.startHeight + (event.clientY - drag.startY) : drag.startHeight,
    };
    setSize(clampSupportAIPanelSize(next));
  }, [disabled]);

  const onPointerUp = useCallback(() => {
    if (!dragRef.current) return;
    dragRef.current = null;
    setDraggingEdge("");
    setSize(prev => {
      const next = clampSupportAIPanelSize(prev);
      saveSupportAIPanelSize(next);
      return next;
    });
  }, []);

  const resetSize = useCallback((event) => {
    event?.preventDefault?.();
    const next = clampSupportAIPanelSize(SUPPORT_AI_PANEL_DEFAULT_SIZE);
    setSize(next);
    saveSupportAIPanelSize(next);
  }, []);

  const handleProps = useCallback((edge) => ({
    onPointerDown: (event) => startResize(edge, event),
    onPointerMove,
    onPointerUp,
    onPointerCancel: onPointerUp,
    onDoubleClick: resetSize,
  }), [onPointerMove, onPointerUp, resetSize, startResize]);

  return { size, draggingEdge, handleProps, resetSize };
}

function SupportAIResizeHandle({ edge, handleProps, active }) {
  const isRight = edge === "right";
  const isBottom = edge === "bottom";
  const isCorner = edge === "right-bottom";
  return (
    <Box
      {...handleProps(edge)}
      title="ドラッグでサイズ調整 / ダブルクリックで標準サイズ"
      sx={{
        position: "absolute",
        zIndex: 20,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        userSelect: "none",
        touchAction: "none",
        cursor: isCorner ? "nwse-resize" : isRight ? "col-resize" : "row-resize",
        right: isRight || isCorner ? 0 : 16,
        bottom: isBottom || isCorner ? 0 : 16,
        top: isRight ? 64 : "auto",
        width: isRight ? 10 : isCorner ? 22 : "calc(100% - 32px)",
        height: isBottom ? 10 : isCorner ? 22 : "calc(100% - 80px)",
        background: active ? "rgba(25,118,210,0.24)" : "transparent",
        borderRight: isRight ? "2px solid transparent" : 0,
        borderBottom: isBottom ? "2px solid transparent" : 0,
        "&:hover": {
          background: "rgba(25,118,210,0.18)",
          borderColor: "rgba(25,118,210,0.9)",
        },
      }}
    >
      {isCorner && (
        <Box sx={{ width: 12, height: 12, borderRight: "2px solid rgba(25,118,210,0.85)", borderBottom: "2px solid rgba(25,118,210,0.85)", pointerEvents: "none" }} />
      )}
    </Box>
  );
}

function Icon({ name, size = 20, style, className }) {
  return <span className={`material-icons ${className || ""}`} style={{ fontSize: size, lineHeight: 1, ...style }}>{name}</span>;

const TOOLBAR_H    = 52;
const STORAGE_KEY          = "html-tester-code";
const STORAGE_PROFILES_KEY = "html-tester-profiles";
const STORAGE_ACTIVE_KEY   = "html-tester-active-profile";
const STORAGE_SCHEMA_VERSION = 2;
const MAX_PROFILES         = 20;
const MAX_SNAPSHOTS        = 50;
const MAX_CODE_HISTORY      = 80;
const APP_BUILD_LABEL       = "Core Lean Secure v1.0 Fixed";

// These runtime-readable contracts make the single-file rules visible in
// diagnostics and future maintenance. They intentionally do not change behavior.
const PERF_LIMITS = Object.freeze({
  LARGE_CODE_CHARS: 50000,
  HUGE_CODE_CHARS: 200000,
  LARGE_CODE_LINES: 1500,
  HUGE_CODE_LINES: 5000,
  PREVIEW_DELAY_NORMAL: 400,

});

const RECOVERY_LIMITS = Object.freeze({

  SNAPSHOTS_LARGE_CODE: 15,
  SNAPSHOTS_HUGE_CODE: 5,
  HISTORY_DEFAULT: MAX_CODE_HISTORY,

function clampValue(value, min, max, fallback = min) {
  const n = Number(value);
  const base = Number.isFinite(n) ? n : fallback;
  return Math.min(max, Math.max(min, base));
}

const DEFAULT_SETTINGS = {
  fontSize: 13,
  darkMode: false,
  wordWrap: false,
  highlightMode: "plain",
  previewScale: 100,
  previewWidth: "100%",
  splitRatio: 0.5,
};

let profileIdCounter = 0;

function newProfileId() {
  return `profile-${Date.now()}-${++profileIdCounter}`;
}

function createProfile(name, data) {
  return {
    id: newProfileId(),
    name: name || "新しいプロファイル",
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    data: {
      code: data.code ?? DEFAULT_HTML,
      editorTabs: data.editorTabs ?? null,
      activeEditorTabId: data.activeEditorTabId ?? null,
      settings: { ...DEFAULT_SETTINGS, ...(data.settings || {}) },
    },
  };
}

function normalizeProfileRecord(profile) {
  if (!profile || typeof profile !== "object") return null;
  const data = profile.data && typeof profile.data === "object" ? profile.data : {};
  const normalized = createProfile(profile.name || "復元プロファイル", {
    code: typeof data.code === "string" ? data.code : DEFAULT_HTML,
    editorTabs: Array.isArray(data.editorTabs) ? data.editorTabs : null,
    activeEditorTabId: typeof data.activeEditorTabId === "string" ? data.activeEditorTabId : null,
    settings: validateSettings(data.settings),
  });
  return {
    ...normalized,
    id: typeof profile.id === "string" && profile.id ? profile.id : normalized.id,
    name: typeof profile.name === "string" && profile.name.trim() ? profile.name.trim() : normalized.name,
    createdAt: profile.createdAt || normalized.createdAt,
    updatedAt: profile.updatedAt || normalized.updatedAt,
  };
}

function migrateProfilePayload(parsed) {
  if (Array.isArray(parsed)) return parsed.map(normalizeProfileRecord).filter(Boolean);
  if (parsed && typeof parsed === "object" && Array.isArray(parsed.profiles)) {
    return parsed.profiles.map(normalizeProfileRecord).filter(Boolean);
  }
  return [];
}

function loadProfiles() {
  try {
    const raw = localStorage.getItem(STORAGE_PROFILES_KEY);
    if (!raw) return [];
    return migrateProfilePayload(JSON.parse(raw));
  } catch { return []; }
}

function saveProfiles(profiles) {
  try {
    localStorage.setItem(STORAGE_PROFILES_KEY, JSON.stringify({
      version: STORAGE_SCHEMA_VERSION,
      updatedAt: new Date().toISOString(),
      profiles: Array.isArray(profiles) ? profiles : [],
    }));
    return true;
  } catch {
    return false;
  }
}

function loadActiveProfileId() {
  try { return localStorage.getItem(STORAGE_ACTIVE_KEY) || null; } catch { return null; }
}

function saveActiveProfileId(id) {
  try { localStorage.setItem(STORAGE_ACTIVE_KEY, id); } catch {}
}

const ProfileRepo = Object.freeze({
  load: loadProfiles,
  save: saveProfiles,
  loadActiveId: loadActiveProfileId,
  saveActiveId: saveActiveProfileId,
  exportAll: exportAllProfiles,
  exportOne: exportProfile,
});

const ProfileDomain = Object.freeze({
  currentData({ code, editorTabs, activeEditorTabId, settings }) {
    return {
      code: String(code ?? ""),
      editorTabs: Array.isArray(editorTabs) ? editorTabs : [],
      activeEditorTabId: activeEditorTabId || null,
      settings: validateSettings(settings),
    };
  },

  saveCurrent(profiles, activeProfileId, data) {
    const now = new Date().toISOString();
    return (Array.isArray(profiles) ? profiles : []).map(p => p.id !== activeProfileId ? p : { ...p, updatedAt: now, data });
  },

  rename(profiles, id, name) {
    const cleaned = String(name || "").trim();
    if (!cleaned) return profiles;
    const now = new Date().toISOString();
    return (Array.isArray(profiles) ? profiles : []).map(p => p.id !== id ? p : { ...p, name: cleaned, updatedAt: now });
  },

  duplicate(profiles, id) {
    const list = Array.isArray(profiles) ? profiles : [];
    const src = list.find(p => p.id === id);
    if (!src) return { ok: false, profiles: list, profile: null, reason: "複製元プロファイルが見つかりません" };
    const profile = createProfile(`${src.name} のコピー`, src.data);
    return { ok: true, profile, profiles: [...list, profile].slice(-MAX_PROFILES) };
  },

  remove(profiles, id) {
    const next = (Array.isArray(profiles) ? profiles : []).filter(p => p.id !== id);
    return next.length > 0 ? next : [createProfile("デフォルト", { code: DEFAULT_HTML })];
  },

  importPayload(payload) {
    const imported = migrateProfilePayload(payload);
    return imported.slice(-MAX_PROFILES);
  },
});

function validateSettings(s) {
  if (!s || typeof s !== "object") return { ...DEFAULT_SETTINGS };
  return {
    fontSize: (typeof s.fontSize === "number" && s.fontSize >= 10 && s.fontSize <= 24) ? s.fontSize : DEFAULT_SETTINGS.fontSize,
    darkMode: typeof s.darkMode === "boolean" ? s.darkMode : DEFAULT_SETTINGS.darkMode,
    wordWrap: typeof s.wordWrap === "boolean" ? s.wordWrap : DEFAULT_SETTINGS.wordWrap,
    highlightMode: ["plain","prism"].includes(s.highlightMode) ? s.highlightMode : DEFAULT_SETTINGS.highlightMode,
    previewScale: (typeof s.previewScale === "number" && s.previewScale >= 25 && s.previewScale <= 200) ? s.previewScale : DEFAULT_SETTINGS.previewScale,
    previewWidth: typeof s.previewWidth === "string" ? s.previewWidth : DEFAULT_SETTINGS.previewWidth,
    splitRatio: (typeof s.splitRatio === "number" && s.splitRatio >= 0.15 && s.splitRatio <= 0.85) ? s.splitRatio : DEFAULT_SETTINGS.splitRatio,
  };
}

function exportAllProfiles(profiles) {
  const blob = new Blob([JSON.stringify({ version: "1.0", exportedAt: new Date().toISOString(), profiles }, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "ht-profiles.json"; a.click();
  URL.revokeObjectURL(url);
}

function exportProfile(profile) {
  const blob = new Blob([JSON.stringify({ version: "1.0", exportedAt: new Date().toISOString(), profiles: [profile] }, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = `ht-profile-${profile.name}.json`; a.click();
  URL.revokeObjectURL(url);
}

const MAX_EDITOR_TABS = 30;
const EDITOR_MODES = { AUTO: "auto", HTML: "html", MARKDOWN: "markdown" };
let editorTabIdCounter = 0;

function normalizeEditorMode(mode) {
  return mode === EDITOR_MODES.MARKDOWN ? EDITOR_MODES.MARKDOWN : EDITOR_MODES.HTML;
}

function normalizeModePreference(mode) {
  if (mode === EDITOR_MODES.HTML) return EDITOR_MODES.HTML;
  if (mode === EDITOR_MODES.MARKDOWN) return EDITOR_MODES.MARKDOWN;
  return EDITOR_MODES.AUTO;
}

function normalizeFenceLanguage(lang) {
  return String(lang || "").trim().split(/\s+/)[0].toLowerCase();
}

function isMermaidFenceLanguage(lang) {
  const normalized = normalizeFenceLanguage(lang);
  return ["mermaid", "mmd", "marmaid"].includes(normalized);
}

function inferEditorMode(name, code, modePreference) {
  const preference = normalizeModePreference(modePreference);
  if (preference === EDITOR_MODES.HTML || preference === EDITOR_MODES.MARKDOWN) return preference;

  const raw = String(code || "");
  const c = raw.trimStart();
  const lower = c.toLowerCase();

  // 拡張子では判定しない。
  // Autoでは「完全なHTML文書」と分かる場合だけHTMLにする。
  // それ以外はMarkdownをデフォルトにして、HTML断片や通常メモの誤判定を避ける。
  if (lower.startsWith("<!doctype html") || lower.startsWith("<html")) {
    return EDITOR_MODES.HTML;
  }

  return EDITOR_MODES.MARKDOWN;
}

function extensionForMode(mode) {
  return normalizeEditorMode(mode) === EDITOR_MODES.MARKDOWN ? ".md" : ".html";
}

function renameForMode(name, mode) {
  const ext = extensionForMode(mode);
  const cleaned = String(name || (mode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html")).trim();
  if (/\.(html?|md|markdown|mmd)$/i.test(cleaned)) return cleaned.replace(/\.(html?|md|markdown|mmd)$/i, ext);
  return cleaned + ext;
}

function newEditorTabId() {
  return `editor-tab-${Date.now()}-${++editorTabIdCounter}`;
}

function createEditorTab(name, code, modePreference = EDITOR_MODES.AUTO) {
  const now = new Date().toISOString();
  const resolvedPreference = normalizeModePreference(modePreference);
  const initialCode = typeof code === "string" ? code : (resolvedPreference === EDITOR_MODES.HTML ? DEFAULT_HTML : DEFAULT_MARKDOWN);
  const actualMode = inferEditorMode(name, initialCode, resolvedPreference);
  return {
    id: newEditorTabId(),
    name: name || (actualMode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html"),
    code: initialCode,
    // modePreference はユーザーの明示指定。auto なら内容でHTML/Markdownを自動解決する。
    // mode は旧データ互換用に同じ値を保持する。実際の描画モードは inferEditorMode で毎回解決する。
    modePreference: resolvedPreference,
    mode: resolvedPreference,
    createdAt: now,
    updatedAt: now,
  };
}

function normalizeEditorTabs(data) {
  const now = new Date().toISOString();
  const rawTabs = Array.isArray(data?.editorTabs) && data.editorTabs.length > 0
    ? data.editorTabs
    : [{ id: null, name: "index.html", code: data?.code ?? DEFAULT_HTML }];

  return rawTabs.slice(0, MAX_EDITOR_TABS).map((tab, index) => {
    const code = typeof tab.code === "string" ? tab.code : DEFAULT_HTML;
    const name = typeof tab.name === "string" && tab.name.trim() ? tab.name.trim() : (index === 0 ? "index.html" : `tab-${index + 1}.html`);
    // v2以前の保存データには modePreference が無い。
    // その場合は旧 mode を強制指定として扱わず auto に戻し、
    // 「HTMLタブにMarkdownを貼ってもHTML扱いのまま」という不具合を断つ。
    const preference = typeof tab.modePreference === "string" ? normalizeModePreference(tab.modePreference) : EDITOR_MODES.AUTO;
    return {
      id: typeof tab.id === "string" && tab.id ? tab.id : newEditorTabId(),
      name,
      code,
      modePreference: preference,
      mode: preference,
      createdAt: tab.createdAt || now,
      updatedAt: tab.updatedAt || tab.createdAt || now,
    };
  });
}

function getInitialEditorTabId(data, tabs) {
  if (data?.activeEditorTabId && tabs.some(t => t.id === data.activeEditorTabId)) return data.activeEditorTabId;
  return tabs[0]?.id || null;
}

function getUniqueTabName(tabs, baseName = "untitled.html") {
  const names = new Set(tabs.map(t => t.name));
  if (!names.has(baseName)) return baseName;

  const dot = baseName.lastIndexOf(".");
  const stem = dot > 0 ? baseName.slice(0, dot) : baseName;
  const ext  = dot > 0 ? baseName.slice(dot) : "";

  for (let i = 2; i < 1000; i++) {
    const candidate = `${stem}-${i}${ext}`;
    if (!names.has(candidate)) return candidate;
  }

  return `${stem}-${Date.now()}${ext}`;
}

function safeDownloadFileName(name) {
  const cleaned = String(name || "output.html").replace(/[\\/:*?"<>|]+/g, "_").trim();
  return cleaned || "output.html";
}
const EditorDomain = Object.freeze({
  syncCurrentTab(tabs, activeEditorTabId, code) {
    const now = new Date().toISOString();
    const list = Array.isArray(tabs) ? tabs : [];
    return list.map(tab => tab.id === activeEditorTabId ? { ...tab, code: String(code ?? ""), updatedAt: now } : tab);
  },

  switchTab(tabs, activeEditorTabId, currentCode, targetTabId) {
    const synced = this.syncCurrentTab(tabs, activeEditorTabId, currentCode);
    const target = synced.find(t => t.id === targetTabId);
    if (!target) return { ok: false, unchanged: true, tabs: synced, activeEditorTabId, code: currentCode, reason: "タブが見つかりません" };
    if (target.id === activeEditorTabId) return { ok: true, unchanged: true, tabs: synced, activeEditorTabId, code: currentCode };
    return { ok: true, tabs: synced, activeEditorTabId: target.id, code: target.code };
  },

  addTab(tabs, activeEditorTabId, currentCode, modePreference = EDITOR_MODES.AUTO) {
    const synced = this.syncCurrentTab(tabs, activeEditorTabId, currentCode);
    if (synced.length >= MAX_EDITOR_TABS) {
      return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: `コードタブは最大 ${MAX_EDITOR_TABS} 件です` };
    }
    const preference = normalizeModePreference(modePreference);
    const initialMode = preference === EDITOR_MODES.HTML ? EDITOR_MODES.HTML : EDITOR_MODES.MARKDOWN;
    const baseName = initialMode === EDITOR_MODES.MARKDOWN ? "notes.md" : "index.html";
    const name = getUniqueTabName(synced, baseName);
    const code = initialMode === EDITOR_MODES.MARKDOWN ? DEFAULT_MARKDOWN : DEFAULT_HTML;
    const tab = createEditorTab(name, code, preference);
    return { ok: true, tabs: [...synced, tab], activeEditorTabId: tab.id, code: tab.code, tab };
  },

  closeTab(tabs, activeEditorTabId, currentCode, targetTabId) {
    const synced = this.syncCurrentTab(tabs, activeEditorTabId, currentCode);
    if (synced.length <= 1) return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: "最後のタブは閉じられません" };
    const idx = synced.findIndex(t => t.id === targetTabId);
    if (idx < 0) return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: "タブが見つかりません" };
    const nextTabs = synced.filter(t => t.id !== targetTabId);
    const nextActive = activeEditorTabId === targetTabId ? (nextTabs[Math.max(0, idx - 1)] || nextTabs[0]) : nextTabs.find(t => t.id === activeEditorTabId);
    return { ok: true, tabs: nextTabs, activeEditorTabId: nextActive.id, code: nextActive.code };
  },

  renameTab(tabs, tabId, name) {
    const cleaned = String(name || "").trim();
    if (!cleaned) return tabs;
    const now = new Date().toISOString();
    return (Array.isArray(tabs) ? tabs : []).map(tab => tab.id === tabId ? { ...tab, name: cleaned, updatedAt: now } : tab);
  },

  duplicateTab(tabs, activeEditorTabId, currentCode) {
    const synced = this.syncCurrentTab(tabs, activeEditorTabId, currentCode);
    if (synced.length >= MAX_EDITOR_TABS) {
      return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: `コードタブは最大 ${MAX_EDITOR_TABS} 件です` };
    }
    const src = synced.find(t => t.id === activeEditorTabId) || synced[0];
    if (!src) return { ok: false, tabs: synced, activeEditorTabId, code: currentCode, reason: "複製元タブが見つかりません" };
    const tab = createEditorTab(getUniqueTabName(synced, src.name), src.code, src.modePreference ?? src.mode ?? EDITOR_MODES.AUTO);
    return { ok: true, tabs: [...synced, tab], activeEditorTabId: tab.id, code: tab.code, tab };
  },

  changeMode(tabs, activeEditorTabId, modePreference) {
    const resolvedPreference = normalizeModePreference(modePreference);
    const now = new Date().toISOString();
    // モード変更時もファイル名・拡張子は変えない。
    // auto に戻せば内容から再判定し、HTML/MD は明示指定として保持する。
    return (Array.isArray(tabs) ? tabs : []).map(tab =>
      tab.id === activeEditorTabId
        ? { ...tab, modePreference: resolvedPreference, mode: resolvedPreference, updatedAt: now }
        : tab
    );
  },
});

const HistoryDomain = Object.freeze({
  createEntry(code, tabId, label = "編集") {
    return { id: `hist-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, code: String(code ?? ""), label, ts: Date.now(), tabId: tabId || null };
  },

  reset(code, tabId, label = "初期状態") {
    const history = [this.createEntry(code, tabId, label)];
    return { history, index: 0 };
  },

  push(history, index, code, tabId, label = "編集") {
    const list = Array.isArray(history) ? history : [];
    const current = list[Math.max(0, Math.min(index, list.length - 1))];
    if (current && current.code === code && current.tabId === tabId) {
      return { history: list, index: Math.max(0, Math.min(index, list.length - 1)) };
    }
    const base = list.slice(0, Math.max(0, index) + 1);
    const next = [...base, this.createEntry(code, tabId, label)].slice(-RECOVERY_LIMITS.HISTORY_DEFAULT);
    return { history: next, index: next.length - 1 };
  },
});

const SnapshotDomain = Object.freeze({
  create(code, label = "スナップショット", meta = {}) {
    return {
      id: `snap-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
      ts: Date.now(),
      code: String(code ?? ""),
      label,
      isAuto: Boolean(meta.isAuto),
      isLastGood: Boolean(meta.isLastGood),
      mode: normalizeEditorMode(meta.mode),
      tabId: meta.tabId || null,
      tabName: meta.tabName || "",
      profileId: meta.profileId || null,
    };
  },

  push(snapshots, snapshot) {
    if (!snapshot) return Array.isArray(snapshots) ? snapshots : [];
    const list = Array.isArray(snapshots) ? snapshots : [];
    const limit = snapshot.code.length > PERF_LIMITS.HUGE_CODE_CHARS
      ? RECOVERY_LIMITS.SNAPSHOTS_HUGE_CODE
      : snapshot.code.length > PERF_LIMITS.LARGE_CODE_CHARS
        ? RECOVERY_LIMITS.SNAPSHOTS_LARGE_CODE
        : RECOVERY_LIMITS.SNAPSHOTS_DEFAULT;
    return [snapshot, ...list.filter(s => s.id !== snapshot.id)].slice(0, limit);
  },
});

function buildHtmlSrcDoc(html) {
  const content = String(html || "").trim();
  if (!content) return EMPTY_HTML;

  if (/<head\b[^>]*>/i.test(content)) {
    return content.replace(/<head\b([^>]*)>/i, `<head$1>${CONSOLE_INTERCEPT}`);
  }

  if (/<html\b[^>]*>/i.test(content)) {
    return content.replace(/<html\b([^>]*)>/i, `<html$1><head>${CONSOLE_INTERCEPT}</head>`);
  }

  if (/<!doctype html/i.test(content) || /<body\b[^>]*>/i.test(content)) {
    return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
${CONSOLE_INTERCEPT}
</head>
<body>
${content}
</body>
</html>`;
  }

  return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
${CONSOLE_INTERCEPT}
</head>
<body>
${content}
</body>
</html>`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function createMarkdownRenderer() {
  const md = window.__HT_MD__?.marked;
  if (!md?.Renderer) return null;
  const renderer = new md.Renderer();

  renderer.code = function(codeOrToken, infostring) {
    const isToken = codeOrToken && typeof codeOrToken === "object";
    const text = isToken ? codeOrToken.text : codeOrToken;
    const lang = normalizeFenceLanguage(isToken ? codeOrToken.lang : infostring);

    if (isMermaidFenceLanguage(lang)) {
      return `<div class="mermaid" data-original-lang="${escapeHtml(lang)}">${escapeHtml(text)}</div>`;
    }

    const cls = lang ? ` class="language-${escapeHtml(lang)}"` : "";
    return `<pre><code${cls}>${escapeHtml(text)}</code></pre>`;
  };

  return renderer;
}

function buildMarkdownSrcDoc(markdown, options = {}) {
  const content = String(markdown || "").trim();
  const dark = Boolean(options.darkMode);
  const md = window.__HT_MD__?.marked;
  const purifier = window.__HT_MD__?.DOMPurify;

  if (!content) {
    return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />${markdownPreviewStyle(dark)}</head><body><main class="markdown-body empty">Markdown を貼り付けてください</main></body></html>`;
  }

  if (!md?.parse || !purifier?.sanitize) {
    const msg = "Markdownライブラリが未ロードです。CDNまたはネットワークを確認してください。";
    return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" />${markdownPreviewStyle(dark)}</head><body>${CONSOLE_INTERCEPT}<main class="markdown-body"><h1>Markdown Preview Error</h1><p>${escapeHtml(msg)}</p></main><script>console.error(${JSON.stringify(msg)});<\/script></body></html>`;
  }

  let rendered = "";
  try {
    rendered = md.parse(content, {
      gfm: true,
      breaks: false,
      mangle: false,
      headerIds: false,
      renderer: createMarkdownRenderer() || undefined,
    });
  } catch (e) {
    rendered = `<h1>Markdown Parse Error</h1><pre>${escapeHtml(e.message || String(e))}</pre>`;
  }

  const safeHtml = purifier.sanitize(rendered, {
    ADD_TAGS: ["details", "summary"],
    ADD_ATTR: ["class", "id", "target", "rel"],
  });

  const mermaidTheme = dark ? "dark" : "default";
  const mermaidUrl = window.__HT_MD__?.mermaidUrl || "https://esm.sh/mermaid@11.15.0?bundle";
  const mermaidRunner = `<script type="module">
import mermaid from ${JSON.stringify(mermaidUrl)};
try {
  const nodes = Array.from(document.querySelectorAll(".mermaid"));
  if (nodes.length > 0) {
    await (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve());
    mermaid.initialize({ startOnLoad: false, securityLevel: "strict", theme: ${JSON.stringify(mermaidTheme)} });
    await mermaid.run({ nodes });
  }
} catch (e) {
  console.error("Mermaid render error:", e && e.message ? e.message : e);
}
<\/script>`;

  return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  ${markdownPreviewStyle(dark)}
</head>
<body>
  ${CONSOLE_INTERCEPT}
  <main class="markdown-body">${safeHtml}</main>
  ${mermaidRunner}
</body>
</html>`;
}

function markdownPreviewStyle(dark) {
  return `<style>
    :root { color-scheme: ${dark ? "dark" : "light"}; }
    body { margin:0; background:${dark ? "#11111b" : "#ffffff"}; color:${dark ? "#cdd6f4" : "#1f2328"}; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .markdown-body { box-sizing:border-box; max-width:960px; margin:0 auto; padding:32px clamp(16px, 4vw, 48px); line-height:1.75; font-size:16px; }
    .markdown-body.empty { min-height:100vh; display:grid; place-items:center; color:${dark ? "#6c7086" : "#9aa0aa"}; border:1.5px dashed ${dark ? "#313244" : "#d8dee8"}; }
    h1,h2,h3 { line-height:1.25; margin:1.3em 0 .55em; }
    h1 { padding-bottom:.3em; border-bottom:1px solid ${dark ? "#313244" : "#d8dee8"}; }
    a { color:${dark ? "#89b4fa" : "#0969da"}; }
    blockquote { margin:1em 0; padding:.1em 1em; color:${dark ? "#bac2de" : "#57606a"}; border-left:4px solid ${dark ? "#45475a" : "#d0d7de"}; }
    code { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; background:${dark ? "#1e1e2e" : "#f6f8fa"}; padding:.15em .35em; border-radius:6px; }
    pre { overflow:auto; padding:16px; border-radius:12px; background:${dark ? "#1e1e2e" : "#f6f8fa"}; border:1px solid ${dark ? "#313244" : "#d0d7de"}; }
    pre code { padding:0; background:transparent; }
    table { border-collapse:collapse; width:100%; overflow:auto; display:block; }
    th,td { border:1px solid ${dark ? "#313244" : "#d0d7de"}; padding:6px 10px; }
    img,svg { max-width:100%; height:auto; }
    .mermaid { display:flex; justify-content:center; width:100%; overflow:auto; padding:18px 0; background:${dark ? "#181825" : "#fbfbfd"}; border:1px solid ${dark ? "#313244" : "#e5e7eb"}; border-radius:12px; }
    @media (max-width: 600px) { .markdown-body { padding:20px 14px; font-size:16px; } }
  </style>`;
}

function buildSrcDoc(content, mode = EDITOR_MODES.HTML, options = {}) {
  return normalizeEditorMode(mode) === EDITOR_MODES.MARKDOWN
    ? buildMarkdownSrcDoc(content, options)
    : buildHtmlSrcDoc(content);
}

function useDebounce(value, delay) {
  const [d, setD] = useState(value);
  useEffect(() => {
    const t = setTimeout(() => setD(value), delay);
    return () => clearTimeout(t);
  }, [value, delay]);
  return d;
}

function parseSimpleDiffPatch(diffText) {
  const lines = diffText.replace(/\r\n/g, "\n").split("\n");
  const oldLines = [];
  const newLines = [];

  for (const line of lines) {
    if (line.startsWith("---") || line.startsWith("+++") || line.startsWith("@@")) continue;

    if (line.startsWith("-")) {
      oldLines.push(line.slice(1));
      continue;
    }

    if (line.startsWith("+")) {
      newLines.push(line.slice(1));
      continue;
    }

    if (line.startsWith(" ")) {
      oldLines.push(line.slice(1));
      newLines.push(line.slice(1));
    }
  }

  return {
    oldBlock: oldLines.join("\n").trim(),
    newBlock: newLines.join("\n").trim(),
  };
}

function applySimpleDiffPatch(source, diffText) {
  const { oldBlock, newBlock } = parseSimpleDiffPatch(diffText);

  if (!oldBlock || !newBlock) {
    return {
      ok: false,
      code: source,
      message: "差分として認識できませんでした。",
    };
  }

  const count = source.split(oldBlock).length - 1;

  if (count === 0) {
    return {
      ok: false,
      code: source,
      message: "置換対象のコードが現在の内容内に見つかりませんでした。",
    };
  }

  if (count > 1) {
    return {
      ok: false,
      code: source,
      message: `置換対象が ${count} 件見つかりました。誤適用防止のため中止しました。`,
    };
  }

  return {
    ok: true,
    code: source.replace(oldBlock, newBlock),
    message: "差分を適用しました。",
  };
}

function PatchDialog({ open, onClose, currentCode, onApply }) {
  const [patchText, setPatchText] = useState("");
  const [result, setResult] = useState("");

  useEffect(() => {
    if (open) {
      setPatchText("");
      setResult("");
    }
  }, [open]);

  const handleApply = useCallback(() => {
    const res = applySimpleDiffPatch(currentCode, patchText);

    if (!res.ok) {
      setResult(res.message);
      return;

    onApply(res.code);
    setResult(res.message);
    onClose();
  }, [currentCode, patchText, onApply, onClose]);

  return (
    <Dialog
      open={open}

      maxWidth="md"

          ChatGPT などから受け取った diff を貼り付けてください。現在のコード内から削除行ブロックを探し、追加行ブロックへ置換します。
        </Typography>

-const oldValue = 1;

            flex: 1,

        </Button>

}

function parseCssPx(value) {
  const m = String(value || "").trim().match(/^(\d+(?:\.\d+)?)px$/i);
  return m ? Number(m[1]) : null;
}

function PreviewFrame({ srcDoc, previewKey, width, scale, darkMode, onFrameWindowChange, fitToContainer = false }) {
  const outerRef = useRef(null);
  const iframeRef = useRef(null);
  const [outerWidth, setOuterWidth] = useState(0);

  const targetPx = parseCssPx(width);
  const constrained = width !== "100%";
  const userScale = clampValue((scale || 100) / 100, 0.25, 2, 1);
  const availableWidth = Math.max(0, outerWidth - (constrained ? 16 : 0));
  const fitScale = fitToContainer && targetPx && availableWidth
    ? Math.min(1, Math.max(0.25, availableWidth / targetPx))
    : 1;

  const deviceWidth = targetPx ? `${targetPx}px` : "100%";
  const visualWidth = targetPx && fitScale < 1 ? `${Math.floor(targetPx * fitScale)}px` : deviceWidth;
  const visualHeight = fitScale < 1 ? `${100 / fitScale}%` : "100%";
  const iframeW = userScale !== 1 ? `${100 / userScale}%` : "100%";
  const iframeH = userScale !== 1 ? `${100 / userScale}%` : "100%";
  const outerBg = darkMode ? (constrained ? "#2a2a3e" : "#1e1e2e") : (constrained ? "#dde1e8" : (userScale < 1 ? "#e8eaf0" : "#fff"));
  const innerBg = darkMode ? "#1e1e2e" : "#fff";

  useEffect(() => {
    const el = outerRef.current;
    if (!el) return;

    const update = () => setOuterWidth(el.clientWidth || 0);
    update();

    if (typeof ResizeObserver === "undefined") {
      window.addEventListener("resize", update);
      return () => window.removeEventListener("resize", update);
    }

    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  useEffect(() => {
    const win = iframeRef.current?.contentWindow || null;
    onFrameWindowChange?.(win);
    return () => onFrameWindowChange?.(null);
  }, [previewKey, srcDoc, onFrameWindowChange]);

  return (
    <Box
      ref={outerRef}
      sx={{
        flex: 1,
        minHeight: 0,
        overflow: fitScale < 1 ? "hidden" : "auto",
        background: outerBg,
        display: "flex",
        justifyContent: "center",
        alignItems: "stretch",
        p: constrained ? 1 : 0,
        WebkitOverflowScrolling: "touch",
      }}
    >
      <Box
        sx={{
          width: visualWidth,
          height: "100%",
          minHeight: 0,
          flexShrink: 0,
          border: constrained ? `1px solid ${darkMode ? "#444" : "#c8cdd6"}` : "none",
          borderRadius: constrained ? 1 : 0,
          overflow: "hidden",
          background: innerBg,
          position: "relative",
          transition: "width 0.2s ease",
        }}
      >
        <Box
          sx={{
            width: deviceWidth,
            height: visualHeight,
            transformOrigin: "top left",
            transform: fitScale !== 1 ? `scale(${fitScale})` : "none",
            position: "absolute",
            top: 0,
            left: 0,
          }}
        >
          <Box
            sx={{
              width: iframeW,
              height: iframeH,
              transformOrigin: "top left",
              transform: userScale !== 1 ? `scale(${userScale})` : "none",
              position: "absolute",
              top: 0,
              left: 0,
            }}
          >
            <iframe
              ref={iframeRef}
              key={previewKey}
              title="preview"
              srcDoc={srcDoc}
              sandbox="allow-scripts allow-forms"
              style={{ width: "100%", height: "100%", minHeight: 200, border: "none", display: "block" }}
            />
          </Box>
        </Box>
      </Box>
    </Box>
  );
}

const EDITOR_FONT = "ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
const LINE_HEIGHT_RATIO = 1.65;

function CodeEditor({ value, onChange, fontSize, darkMode, wordWrap, highlightMode, perfMode = "normal", showIndentGuides = true, mode = EDITOR_MODES.HTML, editorApiRef = null }) {
  const hostRef = useRef(null);
  const viewRef = useRef(null);
  const valueRef = useRef(value);
  const onChangeRef = useRef(onChange);
  const [metrics, setMetrics] = useState(() => ({
    line: 1,
    col: 1,
    lineCount: String(value || "").split("\n").length,
    charCount: String(value || "").length,
    selCount: 0,
  }));

  useEffect(() => { onChangeRef.current = onChange; }, [onChange]);
  useEffect(() => { valueRef.current = value; }, [value]);

  useEffect(() => {
    if (!editorApiRef) return;

    const readText = () => {
      const view = viewRef.current;
      return view ? view.state.doc.toString() : String(valueRef.current || "");
    };

    const writeText = (text, selection = null) => {
      const value = String(text ?? "");
      const view = viewRef.current;
      if (view) {
        const currentLength = view.state.doc.length;
        const effects = { changes: { from: 0, to: currentLength, insert: value } };
        if (selection) {
          const anchor = clampValue(selection.start ?? 0, 0, value.length, 0);
          const head = clampValue(selection.end ?? anchor, 0, value.length, anchor);
          effects.selection = { anchor, head };
        }
        view.dispatch(effects);
        valueRef.current = value;
        onChangeRef.current(value);
        view.focus();
      } else {
        valueRef.current = value;
        onChangeRef.current(value);
      }
    };

    const api = {
      getText: readText,
      setText: (text) => writeText(text),
      getSelection() {
        const view = viewRef.current;
        if (!view) return "";
        const sel = view.state.selection.main;
        if (sel.empty) return "";
        return view.state.doc.sliceString(sel.from, sel.to);
      },
      getSelectionRange() {
        const view = viewRef.current;
        if (!view) return { start: 0, end: 0 };
        const sel = view.state.selection.main;
        return { start: sel.from, end: sel.to };
      },
      setSelectionRange(start, end) {
        const view = viewRef.current;
        if (!view) return;
        const max = view.state.doc.length;
        const anchor = clampValue(Number(start) || 0, 0, max, 0);
        const head = clampValue(Number(end) || anchor, 0, max, anchor);
        view.dispatch({ selection: { anchor, head }, scrollIntoView: true });
        view.focus();
      },
      replaceSelection(text) {
        const view = viewRef.current;
        const insert = String(text ?? "");
        if (!view) return writeText(insert);
        const sel = view.state.selection.main;
        view.dispatch({
          changes: { from: sel.from, to: sel.to, insert },
          selection: { anchor: sel.from + insert.length },
          scrollIntoView: true,
        });
        const next = view.state.doc.toString();
        valueRef.current = next;
        onChangeRef.current(next);
        view.focus();
      },
      insertText(text) {
        const view = viewRef.current;
        const insert = String(text ?? "");
        if (!view) return writeText(readText() + insert);
        const pos = view.state.selection.main.head;
        view.dispatch({
          changes: { from: pos, to: pos, insert },
          selection: { anchor: pos + insert.length },
          scrollIntoView: true,
        });
        const next = view.state.doc.toString();
        valueRef.current = next;
        onChangeRef.current(next);
        view.focus();
      },
      createSnapshot() {
        return {
          text: readText(),
          selection: this.getSelectionRange(),
          createdAt: Date.now(),
        };
      },
      restoreSnapshot(snapshot) {
        if (!snapshot || typeof snapshot.text !== "string") return { ok: false, error: "No snapshot" };
        writeText(snapshot.text, snapshot.selection || null);
        return { ok: true };
      },
    };

    editorApiRef.current = api;
    return () => {
      if (editorApiRef.current === api) editorApiRef.current = null;
    };
  }, [editorApiRef]);

  const updateMetrics = useCallback((state) => {
    const head = state.selection.main.head;
    const line = state.doc.lineAt(head);
    const selCount = Math.abs(state.selection.main.to - state.selection.main.from);
    setMetrics({
      line: line.number,
      col: head - line.from + 1,
      lineCount: state.doc.lines,
      charCount: state.doc.length,
      selCount,
    });
  }, []);

  useEffect(() => {
    if (!hostRef.current || !window.__HT_CM__?.EditorView) return;

    const {
      EditorView: CMEditorView,
      basicSetup: CMBasicSetup,
      cmHtml,
      cmMarkdown,
      oneDark,
    } = window.__HT_CM__;

    const startValue = valueRef.current || "";
    const updateListener = CMEditorView.updateListener.of((update) => {
      if (update.docChanged) {
        const next = update.state.doc.toString();
        valueRef.current = next;
        onChangeRef.current(next);
      }
      if (update.docChanged || update.selectionSet || update.focusChanged) {
        updateMetrics(update.state);
      }
    });

    const baseTheme = CMEditorView.theme({
      "&": {
        height: "100%",
        fontSize: `${fontSize}px`,
        backgroundColor: darkMode ? "#1e1e2e" : "#ffffff",
        color: darkMode ? "#cdd6f4" : "#1a1a2e",
      },
      ".cm-scroller": {
        fontFamily: EDITOR_FONT,
        lineHeight: String(LINE_HEIGHT_RATIO),
      },
      ".cm-content": {
        fontFamily: EDITOR_FONT,
        minHeight: "100%",
        padding: "12px 0",
      },
      ".cm-line": {
        padding: "0 14px",
      },
      ".cm-gutters": {
        fontFamily: EDITOR_FONT,
        borderRight: darkMode ? "1px solid #313244" : "1px solid #e0e3e8",
        backgroundColor: darkMode ? "#181825" : "#f5f6f8",
        color: darkMode ? "#585b70" : "#aab0bc",
      },
      ".cm-activeLine": {
        backgroundColor: darkMode ? "rgba(203,166,247,0.07)" : "rgba(25,118,210,0.055)",
      },
      ".cm-activeLineGutter": {
        backgroundColor: darkMode ? "rgba(203,166,247,0.08)" : "rgba(25,118,210,0.075)",
        color: darkMode ? "#cdd6f4" : "#1976d2",
      },
      ".cm-foldGutter span": {
        padding: "0 2px",
      },
      ".cm-searchMatch": {
        outline: "1px solid rgba(245,158,11,0.7)",
      },
    }, { dark: darkMode });

    const resolvedMode = normalizeEditorMode(mode);
    const languageExt = (highlightMode === "plain" || perfMode === "huge")
      ? []
      : (resolvedMode === EDITOR_MODES.MARKDOWN && cmMarkdown ? cmMarkdown() : cmHtml());
    const wrapExt = wordWrap ? CMEditorView.lineWrapping : [];
    const darkExt = darkMode && oneDark ? oneDark : [];

    const view = new CMEditorView({
      doc: startValue,
      extensions: [
        CMBasicSetup,
        languageExt,
        wrapExt,
        darkExt,
        baseTheme,
        updateListener,
      ],
      parent: hostRef.current,
    });

    viewRef.current = view;
    updateMetrics(view.state);

    return () => {
      view.destroy();
      if (viewRef.current === view) viewRef.current = null;
    };
  }, [fontSize, darkMode, wordWrap, highlightMode, perfMode, mode, updateMetrics]);

  useEffect(() => {
    const view = viewRef.current;
    if (!view) return;
    const current = view.state.doc.toString();
    if (value === current) return;
    view.dispatch({ changes: { from: 0, to: current.length, insert: value || "" } });
  }, [value]);

  const sizeKB = (new TextEncoder().encode(value || "").length / 1024).toFixed(1);
  const bg       = darkMode ? "#1e1e2e" : "#fff";
  const fg       = darkMode ? "#cdd6f4" : "#1a1a2e";
  const statusBg = darkMode ? "#11111b" : "#f0f2f5";
  const statusFg = darkMode ? "#6c7086" : "#7b8190";

  return (
    <Box sx={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0, background: bg, color: fg, overflow: "hidden" }}>
      <Box ref={hostRef} sx={{ flex: 1, minHeight: 0, overflow: "hidden", "& .cm-editor": { height: "100%" } }} />
      <Box sx={{ height: 24, flexShrink: 0, display: "flex", alignItems: "center", gap: 1.5, px: 1.5, background: statusBg, borderTop: `1px solid ${darkMode ? "#313244" : "#e0e3e8"}`, color: statusFg, fontSize: 11, fontFamily: EDITOR_FONT }}>
        <span>行 {metrics.line}, 列 {metrics.col}</span>

        <span>{metrics.charCount.toLocaleString()} 文字</span>
        {metrics.selCount > 0 && <span>選択 {metrics.selCount.toLocaleString()}</span>}
        <Box sx={{ flex: 1 }} />
        {perfMode !== "normal" && <span>{perfMode === "huge" ? "超大容量モード" : "大容量モード"}</span>}
        <span>{sizeKB} KB</span>

        <span>CodeMirror</span>
      </Box>
    </Box>
  );
}

function estimateStorageBytes() {
  try {
    let total = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i) || "";
      const value = localStorage.getItem(key) || "";
      total += new TextEncoder().encode(key + value).length;
    }
    return total;
  } catch { return 0; }
}

function formatBytes(n) {
  const value = Number(n || 0);
  if (value < 1024) return `${value} B`;
  if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
  if (value < 1024 * 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)} MB`;
  return `${(value / 1024 / 1024 / 1024).toFixed(2)} GB`;
}

function byteSizeOf(value) {
  try { return new Blob([typeof value === "string" ? value : JSON.stringify(value)]).size; }
  catch { return String(value ?? "").length; }
}

function getLocalStorageSummary() {
  const rows = [];
  let total = 0;
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      const value = localStorage.getItem(key);
      const size = byteSizeOf(key) + byteSizeOf(value);
      total += size;
      rows.push({ key, size, valuePreview: String(value || "").slice(0, 180) });
    }
  } catch (e) {
    return { ok: false, error: e.message || String(e), total: 0, rows: [] };
  }
  rows.sort((a, b) => b.size - a.size);
  return { ok: true, total, rows };
}

async function getCacheSummary() {
  const cacheStatus = supportAIGetBrowserCacheStatus();
  if (!cacheStatus.available) return { ok: false, total: 0, caches: [], blocked: cacheStatus.blocked, error: cacheStatus.error || "Cache API is not available" };
  const names = await globalThis.caches.keys();
  const list = [];
  let total = 0;
  for (const name of names) {
    const cache = await globalThis.caches.open(name);
    const reqs = await cache.keys();
    let size = 0;
    for (const req of reqs) {
      try {
        const res = await cache.match(req);
        const clone = res?.clone();
        const blob = clone ? await clone.blob() : null;
        size += blob ? blob.size : 0;
      } catch {}
    }
    total += size;
    list.push({ name, count: reqs.length, size });
  }
  return { ok: true, total, caches: list };
}

async function clearAppCachesOnly() {
  const cacheStatus = supportAIGetBrowserCacheStatus();
  let count = 0;
  if (cacheStatus.available) {
    const names = await globalThis.caches.keys();
    for (const name of names) {
      if (name.startsWith("html-modal-tester") || name.startsWith("html-editor")) {
        const ok = await globalThis.caches.delete(name);
        if (ok) count++;
      }
    }
  }
  return count;
}

function isAppLocalStorageKey(key) {
  return String(key || "").startsWith("html-tester-");
}

function clearLocalStorageKeys(keys = []) {
  let count = 0;
  const unique = Array.from(new Set(keys.filter(Boolean)));
  for (const key of unique) {
    try {
      if (localStorage.getItem(key) !== null) count += 1;
      localStorage.removeItem(key);
    } catch {}
  }
  return count;
}

function clearAppLocalStorage() {
  const keys = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (isAppLocalStorageKey(key)) keys.push(key);
    }
  } catch {}
  return clearLocalStorageKeys(keys);
}

function classifyIndexedDBName(name) {
  const value = String(name || "");
  return {
    name: value,
    app: value === SUPPORT_AI_IDB_NAME,
    modelLike: /huggingface|transformers|onnx|ort|xenova|lfm|whisper/i.test(value),
  };
}

async function getIndexedDBSummary() {
  if (!supportAIHasIndexedDB()) return { ok: false, available: false, databases: [], error: "IndexedDB is not available" };
  if (typeof indexedDB.databases !== "function") {
    return {
      ok: false,
      available: true,
      databases: [],
      error: "このブラウザではIndexedDB名の一覧取得に未対応です。削除操作は既知のアプリDB名に対して実行できます。",
    };
  }
  const names = await supportAIListIndexedDBNames();
  const databases = names.map(classifyIndexedDBName).sort((a, b) => {
    if (a.app !== b.app) return a.app ? -1 : 1;
    if (a.modelLike !== b.modelLike) return a.modelLike ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  return { ok: true, available: true, databases };
}

async function getStorageEstimateSafe() {
  try {
    if (!navigator.storage?.estimate) return null;
    return await navigator.storage.estimate();
  } catch {
    return null;
  }
}

function getPerformanceMemorySafe() {
  try {
    const memory = performance?.memory;
    if (!memory) return null;
    return {
      jsHeapSizeLimit: memory.jsHeapSizeLimit || 0,
      totalJSHeapSize: memory.totalJSHeapSize || 0,
      usedJSHeapSize: memory.usedJSHeapSize || 0,
    };
  } catch {
    return null;
  }
}

function supportAICompactLogMeta(meta = {}) {
  if (!meta || typeof meta !== "object") return {};
  const compact = {};
  for (const [key, value] of Object.entries(meta)) {
    if (typeof value === "string") {
      compact[key] = value.length > SUPPORT_AI_MEMORY_LIMITS.maxLogMetaString
        ? `${value.slice(0, SUPPORT_AI_MEMORY_LIMITS.maxLogMetaString)}...`
        : value;
    } else if (Array.isArray(value)) {
      compact[key] = value.slice(0, 20);
    } else {
      compact[key] = value;
    }
  }
  return compact;
}

function supportAISlimRawOutput(output) {
  if (!output) return null;
  if (typeof output === "string") return { type: "string", text: output.slice(0, SUPPORT_AI_MEMORY_LIMITS.maxRawText), length: output.length };
  if (Array.isArray(output)) return { type: "array", length: output.length, sample: output.slice(0, 2).map(supportAISlimRawOutput) };
  if (typeof output === "object") {
    const keys = Object.keys(output).slice(0, 24);
    const summary = { type: output.constructor?.name || "object", keys };
    for (const key of ["generated_text", "summary_text", "text", "caption", "transcription", "label", "content"]) {
      if (typeof output[key] === "string") summary[key] = output[key].slice(0, SUPPORT_AI_MEMORY_LIMITS.maxRawText);
    }
    return summary;
  }
  return { type: typeof output, value: String(output) };
}

function supportAITrimChatMessages(messages = []) {
  const list = Array.isArray(messages) ? messages : [];
  if (list.length <= SUPPORT_AI_MEMORY_LIMITS.maxChatMessages) return list;
  const welcome = list.find(msg => msg?.id === "welcome" || String(msg?.id || "").startsWith("welcome-"));
  const tail = list.filter(msg => msg !== welcome).slice(-(SUPPORT_AI_MEMORY_LIMITS.maxChatMessages - (welcome ? 1 : 0)));
  return welcome ? [welcome, ...tail] : tail;
}

function supportAIEmitInitLog(onLog, level, message, meta = {}) {

function formatAIInitLogLine(entry) {
  if (!entry || typeof entry !== "object") return String(entry ?? "");
  const ts = entry.ts ? new Date(entry.ts) : new Date();
  const time = Number.isFinite(ts.getTime())
    ? ts.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", second: "2-digit" })
    : "--:--:--";
  const level = String(entry.level || "info").toUpperCase();
  const message = String(entry.message || "");
  let metaText = "";
  if (entry.meta && typeof entry.meta === "object" && Object.keys(entry.meta).length > 0) {
    try {
      metaText = ` ${JSON.stringify(entry.meta)}`;
    } catch {
      metaText = "";
    }
  }
  return `[${time}] ${level} ${message}${metaText}`;
}

function supportAIErrorMessage(error) {
  if (!error) return "Unknown error";
  const runtimeCodeHint = (value) => {
    const s = String(value || "").trim();
    return /^\d{5,}$/.test(s)
      ? `ONNX/WebGPU Runtime error code ${s}。WebGPU実行またはモデルロードに失敗しました。AI設定でDeviceをWASMにするか、モデル名を確認してください。`
      : s;
  };
  if (typeof error === "number" || typeof error === "bigint") return runtimeCodeHint(error);
  if (typeof error === "string") return runtimeCodeHint(error);
  if (error.name === "AbortError") return "タイムアウトしました。モデルDL、CORS、モデル名、端末メモリを確認してください。";
  const message = runtimeCodeHint(error.message || error.reason || error.code || "");
  if (message) return message;
  try { return JSON.stringify(error); } catch { return String(error); }
}

function normalizeSupportAIProvider(value) {

  };
  const s = (value, fallback) => {
    const str = String(value ?? "").trim();
    return str || fallback;
  };
  const browserDevice = ["auto", "webgpu", "wasm"].includes(c.browserDevice) ? c.browserDevice : DEFAULT_SUPPORT_AI_CONFIG.browserDevice;
  return {
    provider,
    localAIEnabled: typeof c.localAIEnabled === "boolean" ? c.localAIEnabled : DEFAULT_SUPPORT_AI_CONFIG.localAIEnabled,

    enableAgents: typeof c.enableAgents === "boolean" ? c.enableAgents : DEFAULT_SUPPORT_AI_CONFIG.enableAgents,
    transformersCdnUrl: s(c.transformersCdnUrl, DEFAULT_SUPPORT_AI_CONFIG.transformersCdnUrl),
    browserDevice,
    allowRemoteModels: typeof c.allowRemoteModels === "boolean" ? c.allowRemoteModels : DEFAULT_SUPPORT_AI_CONFIG.allowRemoteModels,

    temperature: n(c.temperature, DEFAULT_SUPPORT_AI_CONFIG.temperature, 0, 2),
    maxTokens: Math.round(n(c.maxTokens, DEFAULT_SUPPORT_AI_CONFIG.maxTokens, 128, 32000)),
    timeoutMs: Math.round(n(c.timeoutMs, DEFAULT_SUPPORT_AI_CONFIG.timeoutMs, 5000, 300000)),
    language: s(c.language, DEFAULT_SUPPORT_AI_CONFIG.language),
