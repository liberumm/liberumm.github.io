function supportAIEncodeWav(samples, sampleRate = 16000) {
  const input = samples instanceof Float32Array ? samples : new Float32Array(Array.from(samples || []));
  const buffer = new ArrayBuffer(44 + input.length * 2);
  const view = new DataView(buffer);
  const writeString = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
  writeString(0, "RIFF");
  view.setUint32(4, 36 + input.length * 2, true);
  writeString(8, "WAVE");
  writeString(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, "data");
  view.setUint32(40, input.length * 2, true);
  let offset = 44;
  for (let i = 0; i < input.length; i++, offset += 2) {
    const s = Math.max(-1, Math.min(1, input[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
  }
  return new Blob([view], { type: "audio/wav" });
}

function supportAIExtractAudioBlob(output) {
  if (!output) return null;
  if (output instanceof Blob) return output;
  if (output.blob instanceof Blob) return output.blob;
  if (output.audio instanceof Blob) return output.audio;
  const audio = output.audio || output.waveform || output.array || output.samples;
  if (audio && (Array.isArray(audio) || ArrayBuffer.isView(audio))) {
    const sr = Number(output.sampling_rate || output.sample_rate || output.samplingRate || 16000);
    return supportAIEncodeWav(audio, sr);
  }
  return null;
}

function supportAISpeakWithWebSpeech(text, options = {}) {
  return new Promise((resolve) => {
    try {
      if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) {
        resolve({ ok: false, error: "このブラウザではWeb Speech TTSを利用できません。" });
        return;
      }
      const utterance = new SpeechSynthesisUtterance(String(text || ""));
      utterance.lang = options.language || "ja-JP";
      utterance.rate = Number(options.rate || 1);
      utterance.pitch = Number(options.pitch || 1);
      utterance.onend = () => resolve({ ok: true, spoken: true, provider: "browser-local-web-speech", text: String(text || "") });
      utterance.onerror = (event) => resolve({ ok: false, error: event?.error || "Web Speech TTS failed" });
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    } catch (error) {
      resolve({ ok: false, error: supportAIErrorMessage(error) });
    }
  });
}

async function supportAIBrowserTextToSpeech(text, options = {}, rawConfig = DEFAULT_SUPPORT_AI_CONFIG) {
  const content = String(text || options.prompt || "").trim();
  if (!content) return { ok: false, text: "", audioUrl: "", error: "TTS対象テキストが空です。" };
  const config = normalizeSupportAIConfig({ ...rawConfig, ...options });
  if (!supportAIFeatureEnabled(config, "tts")) return { ...supportAIDisabledResult("tts", "TTS"), audioUrl: "", text: content };
  const device = supportAIResolveBrowserDevice(config);
  const model = options.model || config.browserTtsModel;
  const task = options.task || config.browserTtsTask || "text-to-speech";
  const dtype = options.dtype || config.browserTtsDtype || "q8";
  try {
    const pipe = await supportAIGetBrowserPipeline(task, model, { device, dtype }, config);
    SUPPORT_AI_BROWSER_LOCAL.prepared.tts = true;
    SUPPORT_AI_BROWSER_LOCAL.preparedAt.tts = Date.now();
    if (!SUPPORT_AI_BROWSER_LOCAL.activeDevice) SUPPORT_AI_BROWSER_LOCAL.activeDevice = device;
    const output = await pipe(content, { language: options.language || config.language || "ja" });
    const blob = supportAIExtractAudioBlob(output);
    if (blob) {
      const audioUrl = URL.createObjectURL(blob);
      return { ok: true, text: content, audioUrl, provider: "browser-local-tts", model, device, raw: output, error: null };
    }
    const extracted = supportAIExtractPipelineText(output);
    return { ok: Boolean(extracted), text: extracted || content, audioUrl: "", provider: "browser-local-tts", model, device, raw: output, error: extracted ? null : "TTS pipelineは完了しましたが、音声Blobを抽出できませんでした。" };
  } catch (error) {
    SUPPORT_AI_BROWSER_LOCAL.lastError = supportAIErrorMessage(error);
    if (config.browserUseSpeechSynthesisFallback) {
      const fallback = await supportAISpeakWithWebSpeech(content, { language: config.language === "ja" ? "ja-JP" : config.language });
      if (fallback.ok) return { ...fallback, modality: "browser-local-tts", model: "Web Speech API", audioUrl: "" };
    }
    return { ok: false, text: content, audioUrl: "", provider: "browser-local-tts", model, device, error: SUPPORT_AI_BROWSER_LOCAL.lastError };
  }
}

function createOpenAICompatiblePayload({ prompt, config, model, imageDataUrl = null }) {
  const content = imageDataUrl
    ? [
        { type: "text", text: prompt },
        { type: "image_url", image_url: { url: imageDataUrl } },
      ]
    : prompt;
  return {
    model: model || config.textModel,
    messages: [
      { role: "system", content: "あなたはエディタ統合AIです。必要な結果だけを返します。" },
      { role: "user", content },
    ],
    temperature: config.temperature,
    max_tokens: config.maxTokens,
    stream: false,
  };
}

function createOllamaPayload({ prompt, config, model, imageDataUrl = null }) {
  const message = { role: "user", content: prompt };
  if (imageDataUrl) message.images = [dataUrlToBase64(imageDataUrl)];
  return {
    model: model || config.textModel,
    messages: [message],
    options: {
      temperature: config.temperature,
      num_predict: config.maxTokens,
    },
    stream: false,
  };
}

function shouldUseBrowserLocal(provider) {
  return true;
}

function shouldFallbackToServer(provider) {
  return false;
}

function shouldUseServer(provider) {
  return false;
}

function createSupportAIProviders(rawConfig = DEFAULT_SUPPORT_AI_CONFIG) {
  const config = normalizeSupportAIConfig(rawConfig);

  async function askServerText(prompt, options = {}) {
    const merged = normalizeSupportAIConfig({ ...config, ...options });
    const isOllama = merged.provider === "ollama";
    const endpoint = isOllama ? merged.ollamaEndpoint : merged.endpoint;
    const payload = isOllama
      ? createOllamaPayload({ prompt, config: merged, model: options.model || merged.textModel })
      : createOpenAICompatiblePayload({ prompt, config: merged, model: options.model || merged.textModel });
    const res = await supportFetchJson(endpoint, payload, merged);
    if (!res.ok) return res;
    const text = isOllama ? supportAITextFromOllama(res.data) : supportAITextFromOpenAICompatible(res.data);
    return { ok: true, text, usage: res.data?.usage || null, raw: res.data, provider: merged.provider, error: null };
  }

  async function askText(prompt, options = {}) {
    if (shouldUseBrowserLocal(config.provider)) {
      const local = await supportAIBrowserGenerateText(prompt, options, config);
      if (local.ok || !shouldFallbackToServer(config.provider)) return local;
      const server = await askServerText(prompt, options);
      return server.ok ? { ...server, fallbackFrom: local.error } : { ...server, error: `Browser Local失敗: ${local.error}\nFallback失敗: ${server.error}` };
    }
    if (shouldUseServer(config.provider)) return askServerText(prompt, options);
    return { ok: false, text: "", error: `未対応Providerです: ${config.provider}` };
  }

  async function analyzeServerImage(file, options = {}) {
    if (!file) return { ok: false, text: "", error: "画像ファイルが選択されていません。" };
    const prompt = options.instruction || "この画像を説明してください。";
    const imageDataUrl = await fileToDataUrl(file);
    const merged = normalizeSupportAIConfig({ ...config, ...options });
    const isOllama = merged.provider === "ollama";
    const endpoint = isOllama ? merged.ollamaEndpoint : merged.endpoint;
    const payload = isOllama
      ? createOllamaPayload({ prompt, config: merged, model: options.model || merged.visionModel, imageDataUrl })
      : createOpenAICompatiblePayload({ prompt, config: merged, model: options.model || merged.visionModel, imageDataUrl });
    const res = await supportFetchJson(endpoint, payload, merged);
    if (!res.ok) return res;
    const text = isOllama ? supportAITextFromOllama(res.data) : supportAITextFromOpenAICompatible(res.data);
    return { ok: true, text, usage: res.data?.usage || null, raw: res.data, provider: merged.provider, error: null };
  }

  async function analyzeImage(file, options = {}) {
    if (shouldUseBrowserLocal(config.provider)) {
      const local = await supportAIBrowserAnalyzeImage(file, options, config);
      if (local.ok || !shouldFallbackToServer(config.provider)) return local;
      const server = await analyzeServerImage(file, options);
      return server.ok ? { ...server, fallbackFrom: local.error } : { ...server, error: `Browser Local VL失敗: ${local.error}\nFallback失敗: ${server.error}` };
    }
    return analyzeServerImage(file, options);
  }

  async function transcribeServerAudio(file, options = {}) {
    if (!file) return { ok: false, text: "", error: "音声ファイルが選択されていません。" };
    const merged = normalizeSupportAIConfig({ ...config, ...options });
    const endpoint = String(options.endpoint || merged.whisperEndpoint || merged.audioEndpoint || "").trim();
    if (!endpoint) {
      return { ok: false, text: "", error: "音声文字起こし用Endpointが未設定です。Browser Localを使うか、Whisper/LFM-Audio endpointを設定してください。" };
    }
    const timeoutMs = options.timeoutMs || merged.timeoutMs;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const form = new FormData();
      form.append("file", file);
      form.append("audio", file);
      form.append("model", options.model || merged.textModel);
      form.append("language", options.language || merged.language || "ja");
      const response = await fetch(endpoint, { method: "POST", body: form, signal: controller.signal });
      const bodyText = await response.text().catch(() => "");
      let data = {};
      try { data = bodyText ? JSON.parse(bodyText) : {}; } catch { data = { text: bodyText }; }
      if (!response.ok) return { ok: false, text: "", error: `Audio endpoint error: ${response.status}${bodyText ? ` ${bodyText.slice(0, 240)}` : ""}`, raw: data };
      return { ok: true, text: String(data.text ?? data.result ?? data.transcript ?? ""), error: null, raw: data };
    } catch (e) {
      return { ok: false, text: "", error: supportAIErrorMessage(e) };
    } finally {
      clearTimeout(timer);
    }
  }

  async function transcribeAudio(file, options = {}) {
    if (shouldUseBrowserLocal(config.provider)) {
      const local = await supportAIBrowserTranscribeAudio(file, options, config);
      if (local.ok || !shouldFallbackToServer(config.provider)) return local;
      const server = await transcribeServerAudio(file, options);
      return server.ok ? { ...server, fallbackFrom: local.error } : { ...server, error: `Browser Local ASR失敗: ${local.error}\nFallback失敗: ${server.error}` };
    }
    return transcribeServerAudio(file, options);
  }

  return {
    config,
    status() {
      const device = supportAIResolveBrowserDevice(config);
      return {
        provider: config.provider,
        label: supportAIProviderLabel(config.provider),
        priority: shouldUseBrowserLocal(config.provider) ? (shouldFallbackToServer(config.provider) ? "browser-local-first" : "browser-local-only") : "server",
        transformersCdnUrl: config.transformersCdnUrl,
        browserDevice: device,
        requestedBrowserDevice: config.browserDevice,
        webGPU: Boolean(navigator.gpu),
        transformersLoaded: Boolean(SUPPORT_AI_BROWSER_LOCAL.modulePromise),
        preparedStatus: supportAIGetPreparedStatus(config),
        loadedPipelines: SUPPORT_AI_BROWSER_LOCAL.pipelinePromises.size,
        lastBrowserLocalError: SUPPORT_AI_BROWSER_LOCAL.lastError,
        endpoint: "browser-local-only",
        textModel: config.browserTextModel,
        visionModel: config.browserVisionModel,
        whisperModel: config.browserWhisperModel,
        ttsModel: config.browserTtsModel,
        hasAudioEndpoint: false,
        hasTtsEndpoint: true,
        hasInterleavedEndpoint: true,
        localOnly: true,
        localAIEnabled: config.localAIEnabled,
        enabledFeatures: { text: config.enableText, vision: config.enableVision, whisper: config.enableWhisper, tts: config.enableTts, rag: config.enableRag, knowledge: config.enableKnowledge, agents: config.enableAgents },
        allowRemoteModels: config.allowRemoteModels,
        allowLocalModels: config.allowLocalModels,
        localModelPath: config.localModelPath,
      };
    },
    text: { ask: askText },
    audio: {
      transcribe: transcribeAudio,
      tts: (text, options = {}) => supportAIBrowserTextToSpeech(text, options, config),
      interleaved: async (input = {}) => {
        const audio = input.audio || input.file || null;
        let transcript = input.transcript || "";
        if (audio) {
          const asr = await transcribeAudio(audio, input);
          if (!asr.ok) return { ...asr, modality: "browser-local-interleaved" };
          transcript = asr.text || "";
        }
        const prompt = [
          input.prompt || "次の音声内容に自然に応答してください。",
          transcript ? `音声内容:\n${transcript}` : "",
        ].filter(Boolean).join("\n\n");
        const reply = await askText(prompt, input);
        if (!reply.ok) return { ...reply, transcript, modality: "browser-local-interleaved" };
        const speech = await supportAIBrowserTextToSpeech(reply.text, input, config);
        return { ok: speech.ok, modality: "browser-local-interleaved", text: reply.text || "", transcript, audioUrl: speech.audioUrl || "", spoken: speech.spoken || false, raw: { reply, speech }, error: speech.error || null };
      },
    },
    vision: { analyze: analyzeImage },
    browserLocal: {
      importRuntime: (options = {}) => importSupportAITransformers(config, options),
      prepare: (features = [], options = {}) => supportAIPrepareBrowserLocalFeatures(features, config, options),
      status: () => supportAIGetPreparedStatus(config),
      readLogs: () => supportAIReadInitLogs(120),
      clearLogs: () => supportAIClearInitLogs(),
      clearCache: () => supportAIClearBrowserModelCaches(),
    },
  };
}

async function supportAIConverge(providers, { task, input, policy = "" }, options = {}) {
  const history = [];
  const draft = await supportAIAgentSingle(providers, "writer", `${task}。方針: ${policy}。まず初案を作ってください。`, input, options);
  history.push(draft);
  if (!draft.ok) return { ok: false, text: "", history, error: draft.error };
  const critique = await supportAIAgentSingle(providers, "critic", "初案の弱点、曖昧さ、過剰変更、改善点を指摘してください。", { original: input, draft: draft.text }, options);
  history.push(critique);
  const verification = await supportAIAgentSingle(providers, "verifier", "ユーザー意図、形式、論理、矛盾、条件違反を確認してください。", { original: input, draft: draft.text, critique: critique.text }, options);
  history.push(verification);

  return { ok: final.ok, text: final.text || "", history, error: final.error || null };

const OOS_GHOST_RUNTIME_STORAGE_KEY = "html-tester-oos-ghost-runtime-v1";
const OOS_GHOST_AGENT_PRESETS = Object.freeze({
  builder: { role: "writer", label: "Builder", system: "あなたは実装方針を具体化するBuilderです。" },
  auditor: { role: "verifier", label: "Auditor", system: "あなたは安全性と整合性を検証するAuditorです。" },
  critic: { role: "critic", label: "Critic", system: "あなたは弱点を見つけ改善案に変換するCriticです。" },
  synthesizer: { role: "synthesizer", label: "Synthesizer", system: "あなたは複数意見を統合し最終案だけを返すSynthesizerです。" },
});

function loadOOSGhostRuntimeState() {
  try {
    const raw = localStorage.getItem(OOS_GHOST_RUNTIME_STORAGE_KEY);
    if (!raw) return { ragDocs: [], knowledgeFacts: [], updatedAt: null };
    const parsed = JSON.parse(raw);
    return {
      ragDocs: Array.isArray(parsed.ragDocs) ? parsed.ragDocs.slice(-80) : [],
      knowledgeFacts: Array.isArray(parsed.knowledgeFacts) ? parsed.knowledgeFacts.slice(-200) : [],
      updatedAt: parsed.updatedAt || null,
    };
  } catch {
    return { ragDocs: [], knowledgeFacts: [], updatedAt: null };
  }
}

function saveOOSGhostRuntimeState(state) {
  try {
    localStorage.setItem(OOS_GHOST_RUNTIME_STORAGE_KEY, JSON.stringify({
      ragDocs: Array.isArray(state.ragDocs) ? state.ragDocs.slice(-80) : [],
      knowledgeFacts: Array.isArray(state.knowledgeFacts) ? state.knowledgeFacts.slice(-200) : [],
      updatedAt: new Date().toISOString(),
    }));
    return true;
  } catch {
    return false;
  }
}

function oosGhostMessagesToPrompt(messages) {
  if (!Array.isArray(messages)) return String(messages || "");
  return messages.map(m => {
    if (typeof m === "string") return m;
    const role = m?.role || "user";
    const content = typeof m?.content === "string" ? m.content : JSON.stringify(m?.content ?? "");
    return `${role}: ${content}`;
  }).join("\n");
}

function oosGhostTokenize(text) {
  return Array.from(new Set(String(text || "").toLowerCase().match(/[a-z0-9_\-]{2,}|[\u3040-\u30ff\u3400-\u9fff]{2,}/g) || []));
}

function oosGhostScore(query, text) {
  const q = oosGhostTokenize(query);
  if (!q.length) return 0;
  const body = String(text || "").toLowerCase();
  return q.reduce((sum, token) => sum + (body.includes(token) ? 1 : 0), 0) / q.length;
}

async function oosGhostPostJson(endpoint, payload, config) {
  const timeoutMs = Number(config?.timeoutMs) || 60000;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const response = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      signal: controller.signal,
    });
    const bodyText = await response.text().catch(() => "");
    let data = {};
    try { data = bodyText ? JSON.parse(bodyText) : {}; } catch { data = { text: bodyText }; }
    if (!response.ok) return { ok: false, text: "", error: `Endpoint error: ${response.status}${bodyText ? ` ${bodyText.slice(0, 240)}` : ""}`, raw: data };
    return { ok: true, data, text: String(data.text ?? data.result ?? data.audioUrl ?? ""), error: null };
  } catch (e) {
    return { ok: false, text: "", error: supportAIErrorMessage(e) };
  } finally {
    clearTimeout(timer);
  }
}

function createOOSGhostRuntime({ providers, config }) {
  const runtimeConfig = normalizeSupportAIConfig(config || DEFAULT_SUPPORT_AI_CONFIG);
  const state = loadOOSGhostRuntimeState();
  const startedAt = Date.now();

  function persist() { return saveOOSGhostRuntimeState(state); }

  const Storage = {
    status() {
      let bytes = 0;
      try { bytes = new Blob([localStorage.getItem(OOS_GHOST_RUNTIME_STORAGE_KEY) || ""]).size; } catch {}
      return {
        ok: true,
        storageKey: OOS_GHOST_RUNTIME_STORAGE_KEY,
        ragDocuments: state.ragDocs.length,
        knowledgeFacts: state.knowledgeFacts.length,
        bytes,
        updatedAt: state.updatedAt || null,
      };
    },
    clear() {
      state.ragDocs = [];
      state.knowledgeFacts = [];
      state.updatedAt = new Date().toISOString();
      persist();
      return { ok: true };
    },
    export() {
      return { ok: true, data: JSON.parse(JSON.stringify(state)) };
    },
  };

  const RAG = {
    addDocument(doc = {}) {
      const text = String(doc.text || "").trim();
      if (!text) return { ok: false, error: "RAG document text is empty" };
      const item = {
        id: doc.id || `rag-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        title: String(doc.title || "Untitled").slice(0, 160),
        text,
        tags: Array.isArray(doc.tags) ? doc.tags : [],
        createdAt: doc.createdAt || new Date().toISOString(),
      };
      state.ragDocs = [item, ...state.ragDocs.filter(d => d.id !== item.id)].slice(0, 80);
      state.updatedAt = new Date().toISOString();
      persist();
      return { ok: true, document: item, count: state.ragDocs.length };
    },
    query(query, options = {}) {
      const limit = options.limit || 4;
      const hits = state.ragDocs
        .map(doc => ({ ...doc, score: oosGhostScore(query, `${doc.title}\n${doc.text}`) }))
        .filter(doc => doc.score > 0 || !String(query || "").trim())
        .sort((a, b) => b.score - a.score)
        .slice(0, limit);
      const contextText = hits.map((d, i) => `[#${i + 1} ${d.title}]\n${d.text.slice(0, options.maxChars || 1200)}`).join("\n\n");
      return { ok: true, hits, contextText };
    },
    list() { return { ok: true, documents: [...state.ragDocs] }; },
    clear() { state.ragDocs = []; state.updatedAt = new Date().toISOString(); persist(); return { ok: true }; },
  };

  const Knowledge = {
    addFact(fact = {}) {
      const subject = String(fact.subject || "").trim();
      const predicate = String(fact.predicate || "").trim();
      const object = String(fact.object || "").trim();
      if (!subject || !predicate || !object) return { ok: false, error: "subject / predicate / object are required" };
      const item = {
        id: fact.id || `fact-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        subject, predicate, object,
        tags: Array.isArray(fact.tags) ? fact.tags : [],
        createdAt: fact.createdAt || new Date().toISOString(),
      };
      state.knowledgeFacts = [item, ...state.knowledgeFacts.filter(f => f.id !== item.id)].slice(0, 200);
      state.updatedAt = new Date().toISOString();
      persist();
      return { ok: true, fact: item, count: state.knowledgeFacts.length };
    },
    query(query, options = {}) {
      const limit = options.limit || 8;
      const hits = state.knowledgeFacts
        .map(fact => ({ ...fact, score: oosGhostScore(query, `${fact.subject} ${fact.predicate} ${fact.object} ${(fact.tags || []).join(" ")}`) }))
        .filter(fact => fact.score > 0 || !String(query || "").trim())
        .sort((a, b) => b.score - a.score)
        .slice(0, limit);
      const contextText = hits.map(f => `- ${f.subject} ${f.predicate} ${f.object}`).join("\n");
      return { ok: true, hits, contextText };
    },
    list() { return { ok: true, facts: [...state.knowledgeFacts] }; },
    clear() { state.knowledgeFacts = []; state.updatedAt = new Date().toISOString(); persist(); return { ok: true }; },
  };

  const LLM = {
    async generate(input = {}) {
      const prompt = input.prompt || oosGhostMessagesToPrompt(input.messages);
      const result = await providers.text.ask(prompt, input);
      return { ok: result.ok, modality: "text", text: result.text || "", model: input.model || runtimeConfig.textModel, raw: result.raw || null, usage: result.usage || null, error: result.error || null };
    },
  };

  const VL = {
    async generate(input = {}) {
      const image = input.image || input.file;
      if (!image || typeof image === "string") {
        return { ok: false, modality: "vision-language", text: "", error: "ブラウザ版VLはFile/Blob画像を指定してください。" };
      }
      const result = await providers.vision.analyze(image, { instruction: input.prompt || input.instruction, model: input.model || runtimeConfig.visionModel });
      return { ok: result.ok, modality: "vision-language", text: result.text || "", raw: result.raw || null, error: result.error || null };
    },
  };

  const Audio = {
    async transcribe(input = {}) {
      const audio = input.audio || input.file;
      if (!audio || typeof audio === "string") return { ok: false, modality: "audio", text: "", error: "ブラウザ版ASRはFile/Blob音声を指定してください。" };
      const result = await providers.audio.transcribe(audio, { ...input, endpoint: runtimeConfig.whisperEndpoint || runtimeConfig.audioEndpoint });
      return { ok: result.ok, modality: "audio", text: result.text || "", raw: result.raw || null, error: result.error || null };
    },
    async lfmASR(input = {}) {
      const audio = input.audio || input.file;
      if (!audio || typeof audio === "string") return { ok: false, modality: "lfm-audio-asr", text: "", error: "LFM-Audio ASRはFile/Blob音声を指定してください。" };
      const result = await providers.audio.transcribe(audio, { ...input, endpoint: runtimeConfig.audioEndpoint || runtimeConfig.whisperEndpoint });
      return { ok: result.ok, modality: "lfm-audio-asr", text: result.text || "", raw: result.raw || null, error: result.error || null };
    },
    async lfmTTS(input = {}) {
      const result = await providers.audio.tts(input.prompt || input.text || "", input);
      return { ok: result.ok, modality: "lfm-audio-tts", text: result.text || input.prompt || input.text || "", audioUrl: result.audioUrl || "", spoken: Boolean(result.spoken), raw: result.raw || null, error: result.error || null };
    },
    async lfmInterleaved(input = {}) {
      const result = await providers.audio.interleaved(input);
      return { ok: result.ok, modality: "lfm-audio-interleaved", text: result.text || "", transcript: result.transcript || "", audioUrl: result.audioUrl || "", spoken: Boolean(result.spoken), raw: result.raw || null, error: result.error || null };

  };

  const Agent = {
    async run({ agentId = "builder", prompt = "", input = null, role = null, options = {} } = {}) {
      if (!runtimeConfig.enableAgents) return { ok: false, agentId, role: role || "", modality: "agent", text: "", error: "Agent / Team はAI設定で無効です。" };
      const preset = OOS_GHOST_AGENT_PRESETS[agentId] || OOS_GHOST_AGENT_PRESETS.builder;
      const roleName = role || preset.role;
      const result = await supportAIAgentSingle(providers, roleName, prompt || preset.system, input || prompt, options);
      return { ok: result.ok, agentId, role: roleName, modality: "agent", text: result.text || "", error: result.error || null };
    },
    async runTeam({ agentIds = ["builder", "auditor"], prompt = "", input = null, options = {} } = {}) {
      const outputs = [];
      for (const agentId of agentIds) {
        outputs.push(await Agent.run({ agentId, prompt, input: input || prompt, options }));
      }
      const synthesis = await supportAIAgentSingle(providers, "synthesizer", "複数Agentの結果を統合し、最終版だけを出力してください。", { prompt, outputs }, options);
      return { ok: synthesis.ok, modality: "team", text: synthesis.text || "", outputs, error: synthesis.error || null };
    },
  };

  const AI = {
    status() {
      return {
        ok: true,
        runtime: "OOS LFM Full Knowledge Runtime min",
        entry: "Ghost.AI.generate",
        provider: providers.status?.() || {},
        capabilities: {
          browserLocal: shouldUseBrowserLocal(runtimeConfig.provider),
          text: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableText),
          visionLanguage: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableVision),
          whisperASR: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableWhisper),
          lfmAudioDirect: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableTts),
          lfmAudioBrowserLocal: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableTts),
          rag: Boolean(runtimeConfig.enableRag),
          knowledge: Boolean(runtimeConfig.enableKnowledge),
          agent: Boolean(runtimeConfig.localAIEnabled && runtimeConfig.enableAgents && runtimeConfig.enableText),
          webGPU: Boolean(navigator.gpu),
        },
        storage: Storage.status(),
        uptimeMs: Date.now() - startedAt,
      };
    },
    async generate(input = {}) {
      const mode = input.mode || "auto";
      if (mode === "agent") return Agent.run(input);
      if (mode === "team") return Agent.runTeam(input);
      if (mode === "lfm-asr") return Audio.lfmASR(input);
      if (mode === "lfm-tts") return Audio.lfmTTS(input);
      if (mode === "lfm-interleaved") return Audio.lfmInterleaved(input);
      if (input.audio) return Audio.transcribe(input);
      if (input.image) return VL.generate(input);

      const basePrompt = input.prompt || oosGhostMessagesToPrompt(input.messages);
      let contextText = "";
      let knowledgeText = "";
      let ragResult = null;
      let knowledgeResult = null;
      if (input.rag?.enabled && runtimeConfig.enableRag) {
        ragResult = RAG.query(basePrompt, input.rag);
        contextText = ragResult.contextText || "";
      }
      if (input.knowledge?.enabled && runtimeConfig.enableKnowledge) {
        knowledgeResult = Knowledge.query(basePrompt, input.knowledge);
        knowledgeText = knowledgeResult.contextText || "";
      }
      const prompt = [
        contextText ? "RAG Context:\n" + contextText : "",
        knowledgeText ? "Knowledge Facts:\n" + knowledgeText : "",
        "User Task:",
        basePrompt,
      ].filter(Boolean).join("\n\n");
      const response = await LLM.generate({ ...input, prompt });
      return { ...response, contextText, ragSources: ragResult?.hits || [], knowledgeSources: knowledgeResult?.hits || [] };
    },
  };

  return { AI, LLM, VL, Audio, RAG, Knowledge, Agent, Storage, config: runtimeConfig };
}

function collectMarkdownIssues(markdown) {
  const errors = [];
  const text = String(markdown || "");
  const codeFenceCount = (text.match(/```/g) || []).length;
  if (codeFenceCount % 2 !== 0) errors.push({ type: "markdown", message: "コードブロックの ``` が閉じられていません。" });
  const headings = text.match(/^#{1,6}\s+.+$/gm) || [];
  let previousLevel = 0;
  headings.forEach(heading => {
    const level = heading.match(/^#+/)[0].length;
    if (previousLevel && level > previousLevel + 1) errors.push({ type: "heading", message: `見出し階層が飛んでいます: ${heading}` });
    previousLevel = level;
  });
  const lines = text.split("\n");
  for (let i = 0; i < lines.length - 1; i++) {
    const current = lines[i];
    const next = lines[i + 1];
    if (current.includes("|") && /^\s*\|?\s*:?-{3,}/.test(next)) {
      const colsA = current.split("|").filter(Boolean).length;
      const colsB = next.split("|").filter(Boolean).length;
      if (colsA !== colsB) errors.push({ type: "table", message: `Markdown表の列数が一致していません。行 ${i + 1}` });
    }
  }
  const blocks = [...text.matchAll(/```(?:mermaid|mmd|marmaid)([\s\S]*?)```/gi)];
  blocks.forEach(block => {
    const body = block[1].trim();
    if (!body) errors.push({ type: "mermaid", message: "空のMermaidブロックがあります。" });
    if (body && !/^(graph|flowchart|sequenceDiagram|classDiagram|stateDiagram|stateDiagram-v2|erDiagram|gantt|pie|mindmap|timeline|journey|quadrantChart|requirementDiagram|gitGraph)/m.test(body)) {
      errors.push({ type: "mermaid", message: "Mermaidブロックの開始構文が不明です。" });
    }
  });
  return errors;
}

    return { ok: response.ok, type: "audio", command: "browser-local-tts", scope: "none", suggestion: "", text: response.audioUrl ? `音声URLを生成しました: ${response.audioUrl}` : (response.spoken ? "Web Speech APIで読み上げました。" : ""), audioUrl: response.audioUrl || "", error: response.error || null };
  }), [getTarget, instruction, themeText, ghostRuntime, run]);



  const showGhostStatus = useCallback(() => {
    const status = ghostRuntime.AI.status();
    setRuntimeInfo(status);
    setResult({ ok: true, label: "ghost-status", type: "runtime", text: JSON.stringify(status, null, 2), suggestion: "" });
  }, [ghostRuntime]);

  const addCurrentToRAG = useCallback(() => {
    const text = getText();
    const res = ghostRuntime.RAG.addDocument({ title: `Editor Snapshot ${new Date().toLocaleString("ja-JP")}`, text, tags: [activeMode === EDITOR_MODES.MARKDOWN ? "markdown" : "html"] });
    setRuntimeInfo(ghostRuntime.AI.status());
    setResult({ ok: res.ok, label: "rag-add", type: "runtime", text: JSON.stringify(res, null, 2), suggestion: "", error: res.error || null });
    onToast?.(res.ok ? "現在の文書をRAGに登録しました" : res.error);
  }, [activeMode, getText, ghostRuntime, onToast]);

  const addKnowledgeFact = useCallback(() => {
    const res = ghostRuntime.Knowledge.addFact({ subject: knowledgeSubject, predicate: knowledgePredicate, object: knowledgeObject, tags: ["editor"] });
    setRuntimeInfo(ghostRuntime.AI.status());
    setResult({ ok: res.ok, label: "knowledge-add", type: "runtime", text: JSON.stringify(res, null, 2), suggestion: "", error: res.error || null });
    onToast?.(res.ok ? "Knowledge Factを登録しました" : res.error);
  }, [ghostRuntime, knowledgeObject, knowledgePredicate, knowledgeSubject, onToast]);

  const ghostGenerateWithKnowledge = useCallback(() => run("ghost-generate", async () => {
    const target = getTarget();
    const response = await ghostRuntime.AI.generate({ prompt: `${instruction}\n\n${target.text}`, rag: { enabled: true }, knowledge: { enabled: true } });
    return { ok: response.ok, type: "text", command: "ghost-generate", scope: target.scope, range: target.range, original: target.text, suggestion: response.text || "", text: response.text || "", contextText: response.contextText, knowledgeSources: response.knowledgeSources, error: response.error || null };
  }), [getTarget, ghostRuntime, instruction, run]);

  const ghostRunAgent = useCallback(() => run("ghost-agent", async () => {
    const target = getTarget();
    const response = await ghostRuntime.Agent.run({ agentId: "builder", prompt: instruction || "実装方針を出して", input: target.text });
    return { ok: response.ok, type: "text", command: "ghost-agent", scope: target.scope, range: target.range, original: target.text, suggestion: response.text || "", text: response.text || "", error: response.error || null };
  }), [getTarget, ghostRuntime, instruction, run]);

  const chatSend = useCallback(() => {
    const message = (chatInput || instruction || "現在の内容について、必要な支援をしてください。").trim();
    if (!message) return onToast?.("送信する内容を入力してください");
    const target = getTarget();
    const userMessage = {
      id: `user-${Date.now()}-${Math.random().toString(36).slice(2)}`,
      role: "user",
      text: message,
      ts: Date.now(),
      scope: target.scope,
    };
    setChatMessages(prev => [...prev, userMessage]);
    setChatInput("");

    run("ai-chat", async ({ signal }) => {
      const prompt = [
        message,
        target.text ? `参照対象（${target.scope === "selection" ? "選択範囲" : "現在の文書"}）:\n${target.text}` : "",
      ].filter(Boolean).join("\n\n");
      const response = await ghostRuntime.AI.generate({
        prompt,
        rag: { enabled: Boolean(aiConfig.enableRag) },
        knowledge: { enabled: Boolean(aiConfig.enableKnowledge) },
      });
      const assistantText = response.text || response.error || "";
      if (!signal?.aborted) {
        setChatMessages(prev => [...prev, {
          id: `assistant-${Date.now()}-${Math.random().toString(36).slice(2)}`,
          role: "assistant",
          text: assistantText || "応答が空でした。",
          ts: Date.now(),
          ok: response.ok,
        }]);
      }
      return { ok: response.ok, type: "text", command: "ai-chat", scope: target.scope, range: target.range, original: target.text, suggestion: response.text || "", text: response.text || "", contextText: response.contextText, knowledgeSources: response.knowledgeSources, error: response.error || null };
    });
  }, [aiConfig.enableKnowledge, aiConfig.enableRag, chatInput, getTarget, ghostRuntime, instruction, onToast, run]);

  const clearChatMessages = useCallback(() => {
    setChatMessages([{ id: `welcome-${Date.now()}`, role: "assistant", text: "会話をクリアしました。新しい相談を入力してください。", ts: Date.now() }]);
  }, []);

  const toggleAIEnabled = useCallback(async () => {
    if (aiConfig.localAIEnabled) {
      stopAI("AI停止中");
      updateAIConfig({ localAIEnabled: false });
      setAIPhase("disabled");
      setAITaskLabel("AI停止中");
      return;
    }

    const nextConfig = normalizeSupportAIConfig({ ...aiConfig, localAIEnabled: true });
    saveSupportAIConfig(nextConfig);
    setAIConfig(nextConfig);
    setAIPhase("loading-runtime");
    setAITaskLabel("Runtime読込中");
    setAIInitLogs([]);

    try {
      const activationProviders = createSupportAIProviders(nextConfig);
      const response = await activationProviders.browserLocal.prepare([], { clearLogs: true, onLog: pushAIInitLog });
      const logs = response.logs || activationProviders.browserLocal.readLogs?.() || [];
      setAIInitLogs(logs);
      if (response.ok) {
        setAIPhase("idle");
        setAITaskLabel("AI待機中");
        onToast?.("ローカルAIを有効化しました");
      } else {
        setAIPhase("error");
        setAITaskLabel("Runtime読込失敗");
        setResult({ ok: false, label: "ai-enable", type: "runtime", text: logs.map(formatAIInitLogLine).join("\n"), suggestion: "", error: response.error || "Runtime読込に失敗しました" });
        onToast?.(`AI有効化に失敗: ${response.error || "unknown"}`);
      }
    } catch (error) {
      const message = supportAIErrorMessage(error);
      setAIPhase("error");
      setAITaskLabel("Runtime読込失敗");
      setResult({ ok: false, label: "ai-enable", type: "runtime", text: "", suggestion: "", error: message });
      onToast?.(`AI有効化に失敗: ${message}`);

  }, [aiConfig, onToast, pushAIInitLog, stopAI, updateAIConfig]);

              : "待機中";

  const aiHeaderBusy = busy || aiPhase === "loading-runtime" || aiPhase === "preparing-model";

              <MaterialUI.TextField label="生成テーマ / Dev指示" value={themeText} onChange={e => setThemeText(e.target.value)} size="small" multiline minRows={2} placeholder="例：美しいTODOアプリを単一HTMLで作って" />
            </>}

            {tab === "chat" && <Box sx={{ display: "flex", flexDirection: "column", gap: 1 }}>
              <Box sx={{ p: 1, border: `1px solid ${border}`, borderRadius: 2, background: dark ? "rgba(255,255,255,0.035)" : "#f8fafc" }}>
                <Typography variant="caption" fontWeight={900}>会話モード</Typography>
                <Typography variant="caption" sx={{ display: "block", color: muted, lineHeight: 1.6, mt: 0.5 }}>下のチャット欄に入力すると、現在の選択範囲または文書を必要に応じて参照しながら応答します。画像・音声・RAG・Knowledge・Agentもここから使えます。</Typography>

                <ActionButton onClick={ghostRunAgent} disabled={!aiConfig.enableText || !aiConfig.enableAgents}>Agentで検討</ActionButton>

              </Box>
              <Box sx={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 0.6 }}>
                <MaterialUI.Chip size="small" label={aiConfig.enableRag ? "RAG ON" : "RAG OFF"} color={aiConfig.enableRag ? "success" : "default"} />
                <MaterialUI.Chip size="small" label={aiConfig.enableKnowledge ? "Knowledge ON" : "Knowledge OFF"} color={aiConfig.enableKnowledge ? "success" : "default"} />
                <MaterialUI.Chip size="small" label={aiConfig.enableAgents ? "Agent ON" : "Agent OFF"} color={aiConfig.enableAgents ? "success" : "default"} />
              </Box>
            </Box>}

            {tab === "work" && <Box sx={{ display: "flex", flexDirection: "column", gap: 1 }}>
              <Box sx={{ p: 1, border: `1px solid ${border}`, borderRadius: 2, background: dark ? "rgba(255,255,255,0.035)" : "#f8fafc" }}>

                <ActionButton variant="contained" onClick={() => runTextCommand("fix")} disabled={!aiConfig.enableText}>校正</ActionButton>
                <ActionButton onClick={() => runTextCommand("rewrite")} disabled={!aiConfig.enableText}>リライト</ActionButton>
                <ActionButton onClick={() => runTextCommand("explain")} disabled={!aiConfig.enableText}>説明</ActionButton>
                <ActionButton onClick={() => runTextCommand("shorten")} disabled={!aiConfig.enableText}>短く</ActionButton>
                <ActionButton onClick={() => runTextCommand("expand")} disabled={!aiConfig.enableText}>詳しく</ActionButton>
                <ActionButton variant="contained" onClick={directFix} disabled={!aiConfig.enableText}>選択/全文を校正</ActionButton>
                <Button size="small" variant="outlined" onClick={undoLast} disabled={!lastSnapshot || busy}>AI Undo</Button>
                <ActionButton variant="contained" onClick={htmlAutoComplete} disabled={!aiConfig.enableText}>HTML生成/修正</ActionButton>
                <ActionButton onClick={markdownAutoComplete} disabled={!aiConfig.enableText}>Markdown生成/整形</ActionButton>
                <Button size="small" variant="outlined" onClick={checkMarkdown} disabled={busy}>Markdown検証</Button>
                <Button size="small" variant="outlined" onClick={onForceMarkdown} disabled={busy}>MD固定</Button>
                <Button size="small" variant="outlined" onClick={onForceHtml} disabled={busy}>HTML固定</Button>
              </Box>

            {tab === "settings" && <Box sx={{ display: "flex", flexDirection: "column", gap: 1 }}>

                <Typography variant="caption" fontWeight={900}>AI状態</Typography>
                <Box sx={{ display: "grid", gridTemplateColumns: "1fr", gap: 0.45, mt: 0.8 }}>
                  <StatusItem name="ローカルAI" value={aiConfig.localAIEnabled ? "有効" : "未有効"} color={aiConfig.localAIEnabled ? "success" : "default"} />
                  <StatusItem name="Runtime" value={providerStatus.preparedStatus?.prepared?.runtime ? "読込済み" : "未読込"} color={providerStatus.preparedStatus?.prepared?.runtime ? "success" : "default"} />
                  <StatusItem name="Text" value={providerStatus.preparedStatus?.prepared?.text ? "準備済み" : (aiConfig.enableText ? "未準備" : "無効")} color={providerStatus.preparedStatus?.prepared?.text ? "success" : "default"} />
                  <StatusItem name="Vision" value={providerStatus.preparedStatus?.prepared?.vision ? "準備済み" : (aiConfig.enableVision ? "未準備" : "無効")} color={providerStatus.preparedStatus?.prepared?.vision ? "success" : "default"} />
                  <StatusItem name="Whisper" value={providerStatus.preparedStatus?.prepared?.whisper ? "準備済み" : (aiConfig.enableWhisper ? "未準備" : "無効")} color={providerStatus.preparedStatus?.prepared?.whisper ? "success" : "default"} />
                  <StatusItem name="TTS" value={providerStatus.preparedStatus?.prepared?.tts ? "準備済み" : (aiConfig.enableTts ? "未準備" : "無効")} color={providerStatus.preparedStatus?.prepared?.tts ? "success" : "default"} />
                  <StatusItem name="Device" value={providerStatus.browserDevice === "webgpu" ? "WebGPU使用中" : "WASM使用中"} color={providerStatus.browserDevice === "webgpu" ? "primary" : "default"} />
                  <StatusItem name="Model Cache" value={providerStatus.preparedStatus?.cache?.useBrowserCache ? "利用中" : (providerStatus.preparedStatus?.cache?.blocked ? "sandboxで無効" : "無効")} color={providerStatus.preparedStatus?.cache?.useBrowserCache ? "success" : "default"} />
                </Box>
              </Box>

              <Box sx={{ p: 1, border: `1px solid ${border}`, borderRadius: 2 }}>

                        <Typography variant="caption" sx={{ display: "block", opacity: 0.72, fontWeight: 900, mb: 0.35 }}>{isUser ? "You" : "SupportAI"} · {new Date(msg.ts || Date.now()).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}</Typography>

            <Box component="textarea" value={resultText || result?.error || ""} onChange={e => setResult(r => r ? { ...r, text: e.target.value, suggestion: e.target.value, ok: true } : { ok: true, text: e.target.value, suggestion: e.target.value })} spellCheck={false} style={{ flex: 1, width: "100%", minHeight: supportAIFullScreen ? 220 : 260, resize: "none", border: 0, outline: 0, padding: 14, fontFamily: EDITOR_FONT, fontSize: 16, lineHeight: 1.65, background: dark ? "#020617" : "#fbfdff", color: dark ? "#e5e7eb" : "#111827" }} />

      </DialogContent>

      <DialogActions sx={{ px: { xs: 1, sm: 2 }, py: 1, borderTop: `1px solid ${border}`, gap: 1, flexShrink: 0, display: "grid", gridTemplateColumns: { xs: "1fr 1fr", sm: "auto auto auto" }, justifyContent: { xs: "stretch", sm: "flex-end" }, "& .MuiButton-root": { m: 0 } }}>
        <Button onClick={() => navigator.clipboard.writeText(resultText || "").then(() => onToast?.("AI結果をコピーしました")).catch(() => onToast?.("コピーに失敗しました"))} disabled={!resultText}>結果コピー</Button>
        <Button onClick={() => applySuggestion(result, true)} disabled={!resultText || busy} variant="outlined">カーソルへ挿入</Button>
        <Button onClick={() => applySuggestion(result, false)} disabled={!resultText || busy} variant="contained" sx={{ gridColumn: { xs: "1 / -1", sm: "auto" } }}>結果を反映</Button>

    </Dialog>
  );
}

  codeHistory, codeHistoryIndex, onRestoreHistory, onUndo, onRedo, canUndo, canRedo,

}) {

  const SectionTitle = ({ children, right }) => (
    <Box sx={{ display: 'flex', alignItems: 'center', gap: 1, px: 1, pt: 1.25, pb: 0.6 }}>
      <Typography variant="caption" sx={{ color: muted, fontWeight: 800, letterSpacing: 0.7, textTransform: 'uppercase', flex: 1 }}>{children}</Typography>
      {right}
    </Box>
  );

  const Action = ({ icon, label, secondary, onClick, disabled, selected }) => (
    <ListItemButton
      disabled={disabled}
      selected={selected}
      onClick={onClick}
      sx={{
        borderRadius: 1.5,
        mx: 0.6,
        my: 0.15,
        color: fg,
        '&.Mui-selected': { background: dark ? 'rgba(25,118,210,0.22)' : 'rgba(25,118,210,0.10)' },
        '&.Mui-selected:hover': { background: dark ? 'rgba(25,118,210,0.30)' : 'rgba(25,118,210,0.16)' },
      }}
    >
      <ListItemIcon sx={{ minWidth: 34, color: selected ? accent : muted }}><Icon name={icon} size={20} /></ListItemIcon>
      <ListItemText
        primary={label}
        secondary={secondary}
        primaryTypographyProps={{ fontSize: 13, fontWeight: selected ? 800 : 600, noWrap: true }}
        secondaryTypographyProps={{ fontSize: 11, color: muted, noWrap: true }}
      />
    </ListItemButton>
  );

  return (
    <Drawer
      anchor="right"
      open={open}
      onClose={onClose}
      PaperProps={{
        sx: {
          width: { xs: '86vw', sm: 360 },
          maxWidth: 390,
          background: panelBg,
          color: fg,
          borderLeft: `1px solid ${border}`,
          overflow: 'hidden',
        },
      }}
    >
      <Box sx={{ height: '100%', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
        <Box sx={{ px: 1.4, py: 1.25, display: 'flex', alignItems: 'center', gap: 1, borderBottom: `1px solid ${border}` }}>
          <Box sx={{ width: 34, height: 34, borderRadius: 2, display: 'grid', placeItems: 'center', background: dark ? 'rgba(25,118,210,0.22)' : 'rgba(25,118,210,0.10)', color: accent }}>
            <Icon name="auto_awesome" size={20} />
          </Box>
          <Box sx={{ minWidth: 0, flex: 1 }}>
            <Typography noWrap variant="subtitle2" sx={{ fontWeight: 900, lineHeight: 1.2 }}>Core Lean Secure</Typography>
            <Typography noWrap variant="caption" sx={{ color: muted }}>{activeProfileName || 'プロファイル未選択'} · {activeTab?.name || 'タブ未選択'}</Typography>
          </Box>
          <IconButton onClick={onClose} size="small" sx={{ color: muted }}><Icon name="close" size={20} /></IconButton>
        </Box>

        <Box sx={{ flex: 1, minHeight: 0, overflowY: 'auto', WebkitOverflowScrolling: 'touch', p: 0.8 }}>
          <SectionTitle right={<Chip size="small" label={`${normalizeModePreference(activeModePreference) === EDITOR_MODES.AUTO ? 'AUTO / ' : ''}${activeMode === EDITOR_MODES.MARKDOWN ? 'MD' : 'HTML'}`} sx={{ height: 20, fontSize: 10 }} />}>操作</SectionTitle>
          <Box sx={{ px: 0.6, pb: 0.6 }}>
            <Button fullWidth onClick={onSupportAI} variant="contained" color="secondary" size="small" startIcon={<Icon name="auto_awesome" size={16} />} sx={{ justifyContent: 'flex-start' }}>SupportAI</Button>
          </Box>
          <Box sx={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0.6, px: 0.6 }}>
            <Button onClick={onSave} variant="contained" size="small" startIcon={<Icon name="save" size={16} />} sx={{ justifyContent: 'flex-start' }}>保存</Button>
            <Button onClick={onCopy} variant="outlined" size="small" startIcon={<Icon name="content_copy" size={16} />} sx={{ justifyContent: 'flex-start' }}>コピー</Button>
            <Button onClick={onDownload} variant="outlined" size="small" startIcon={<Icon name="download" size={16} />} sx={{ justifyContent: 'flex-start' }}>出力</Button>
            <Button onClick={onPatch} variant="outlined" size="small" startIcon={<Icon name="difference" size={16} />} sx={{ justifyContent: 'flex-start' }}>差分</Button>
          </Box>
          <List dense disablePadding sx={{ mt: 0.6, borderRadius: 2, background: cardBg, border: `1px solid ${border}`, py: 0.4 }}>
            <Action icon="terminal" label="Console" secondary={`${consoleLogsCount || 0} 件のログ`} onClick={onConsole} />
            <Action icon="photo_camera" label="スナップショット保存" secondary={`${snapshotsCount || 0} 件保存中`} onClick={onTakeSnapshot} />
            <Action icon="history" label="スナップショット一覧" secondary="復元・削除" onClick={onSnapshots} />
            <Action icon="security" label="Security & Storage" secondary="容量確認・完全初期化" onClick={onStorage} />
            <Action icon={appDarkMode ? 'light_mode' : 'dark_mode'} label={appDarkMode ? 'ライトテーマ' : 'ダークテーマ'} secondary="アプリ全体の見た目" onClick={onToggleTheme} />
            <Action icon="delete_outline" label="現在タブをクリア" secondary="確認ダイアログあり" onClick={onClear} />
          </List>

          <SectionTitle right={<Chip size="small" label={`${editorTabs.length} / ${MAX_EDITOR_TABS}`} sx={{ height: 20, fontSize: 10 }} />}>タブ一覧</SectionTitle>
          <Box sx={{ display: 'flex', gap: 0.6, px: 0.6, pb: 0.6 }}>
            <Button fullWidth size="small" variant="outlined" onClick={onNewHtml} startIcon={<Icon name="add" size={15} />}>HTML</Button>
            <Button fullWidth size="small" variant="outlined" onClick={onNewMarkdown} startIcon={<Icon name="article" size={15} />}>MD</Button>
            <Button size="small" variant="outlined" onClick={onDuplicateTab} sx={{ minWidth: 42 }}><Icon name="content_copy" size={15} /></Button>
          </Box>
          <List dense disablePadding sx={{ borderRadius: 2, background: cardBg, border: `1px solid ${border}`, py: 0.4 }}>
            {editorTabs.map(tab => {
              const active = tab.id === activeEditorTabId;
              return (
                <ListItemButton key={tab.id} selected={active} onClick={() => onSwitchTab(tab.id)} sx={{ borderRadius: 1.5, mx: 0.6, my: 0.15 }}>
                  <ListItemIcon sx={{ minWidth: 34, color: active ? accent : muted }}><Icon name={inferEditorMode(tab.name, tab.code, tab.modePreference ?? tab.mode) === EDITOR_MODES.MARKDOWN ? 'article' : 'code'} size={19} /></ListItemIcon>
                  <ListItemText
                    primary={tab.name}
                    secondary={`${normalizeModePreference(tab.modePreference ?? tab.mode) === EDITOR_MODES.AUTO ? 'Auto / ' : ''}${inferEditorMode(tab.name, tab.code, tab.modePreference ?? tab.mode) === EDITOR_MODES.MARKDOWN ? 'Markdown' : 'HTML'} · ${String(tab.code || '').length.toLocaleString()} 文字`}
                    primaryTypographyProps={{ fontSize: 13, fontWeight: active ? 800 : 600, noWrap: true }}
                    secondaryTypographyProps={{ fontSize: 11, color: muted, noWrap: true }}
                  />
                  <IconButton size="small" onClick={(e) => { e.stopPropagation(); onRenameTab(tab.id); }} sx={{ color: muted }}><Icon name="edit" size={15} /></IconButton>
                  {editorTabs.length > 1 && <IconButton size="small" onClick={(e) => { e.stopPropagation(); onCloseTab(tab.id); }} sx={{ color: muted }}><Icon name="close" size={15} /></IconButton>}
                </ListItemButton>
              );
            })}
          </List>

          <SectionTitle right={<Chip size="small" label={`${Math.max(0, codeHistoryIndex + 1)} / ${codeHistory.length || 0}`} sx={{ height: 20, fontSize: 10 }} />}>ヒストリー</SectionTitle>
          <Box sx={{ display: 'flex', gap: 0.6, px: 0.6, pb: 0.6 }}>
            <Button fullWidth size="small" variant="outlined" disabled={!canUndo} onClick={onUndo} startIcon={<Icon name="undo" size={15} />}>Undo</Button>
            <Button fullWidth size="small" variant="outlined" disabled={!canRedo} onClick={onRedo} startIcon={<Icon name="redo" size={15} />}>Redo</Button>
          </Box>
          <List dense disablePadding sx={{ borderRadius: 2, background: cardBg, border: `1px solid ${border}`, py: 0.4 }}>
            {recentHistory.length === 0 ? (
              <Box sx={{ px: 1.4, py: 1.4, color: muted, fontSize: 12 }}>履歴はまだありません</Box>
            ) : recentHistory.map(({ entry, index }) => (
              <ListItemButton key={entry.id || index} selected={index === codeHistoryIndex} onClick={() => onRestoreHistory(index)} sx={{ borderRadius: 1.5, mx: 0.6, my: 0.15 }}>
                <ListItemIcon sx={{ minWidth: 34, color: index === codeHistoryIndex ? accent : muted }}><Icon name={index === codeHistoryIndex ? 'radio_button_checked' : 'restore'} size={18} /></ListItemIcon>
                <ListItemText
                  primary={entry.label || '編集'}
                  secondary={`${new Date(entry.ts || Date.now()).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' })} · ${String(entry.code || '').length.toLocaleString()} 文字`}
                  primaryTypographyProps={{ fontSize: 13, fontWeight: index === codeHistoryIndex ? 800 : 600, noWrap: true }}
                  secondaryTypographyProps={{ fontSize: 11, color: muted, noWrap: true }}
                />
              </ListItemButton>
            ))}
          </List>
        </Box>
      </Box>
    </Drawer>
  );
}

function App() {
  const isWide = useMediaQuery(theme.breakpoints.up("md"));
  const isMobile = useMediaQuery(theme.breakpoints.down("sm"));
  const loadInitialProfiles = () => {
    const ps = ProfileRepo.load();
    if (ps.length > 0) return ps;
    const def = createProfile("デフォルト", { code: (() => { try { return localStorage.getItem(STORAGE_KEY) || DEFAULT_HTML; } catch { return DEFAULT_HTML; } })() });
    ProfileRepo.save([def]); ProfileRepo.saveActiveId(def.id); return [def];
  };
  const [profiles, setProfiles] = useState(loadInitialProfiles);
  const [activeProfileId, setActiveProfileId] = useState(() => { const ps = ProfileRepo.load(); const saved = ProfileRepo.loadActiveId(); return saved && ps.some(p => p.id === saved) ? saved : (ps[0]?.id || null); });
  const activeProfile = AppStateSelectors.activeProfile(profiles, activeProfileId);
  const initS = validateSettings(activeProfile?.data?.settings || DEFAULT_SETTINGS);
  const initialEditorTabs = useMemo(() => normalizeEditorTabs(activeProfile?.data), []);
  const initialEditorTabId = useMemo(() => getInitialEditorTabId(activeProfile?.data, initialEditorTabs), [initialEditorTabs]);
  const [editorTabs, setEditorTabs] = useState(initialEditorTabs);

  const [html, setHtmlState] = useState(() => (initialEditorTabs.find(t => t.id === initialEditorTabId) || initialEditorTabs[0])?.code ?? activeProfile?.data?.code ?? DEFAULT_HTML);
  const activeEditorTab = useMemo(() => AppStateSelectors.activeEditorTab(editorTabs, activeEditorTabId), [editorTabs, activeEditorTabId]);
  const activeEditorModePreference = normalizeModePreference(activeEditorTab?.modePreference ?? activeEditorTab?.mode);
  const activeEditorMode = inferEditorMode(activeEditorTab?.name, html, activeEditorModePreference);
  const [previewKey, setPreviewKey] = useState(0);
  const [previewWidth, setPreviewWidth] = useState(initS.previewWidth);
  const [fullscreen, setFullscreen] = useState("none");
  const [darkMode, setDarkMode] = useState(initS.darkMode);
  const [fontSize, setFontSize] = useState(initS.fontSize);
  const [wordWrap, setWordWrap] = useState(initS.wordWrap);
  const [highlightMode, setHighlightMode] = useState(initS.highlightMode);
  const [previewScale, setPreviewScale] = useState(initS.previewScale);
  const [appDarkMode, setAppDarkMode] = useState(false);
  const appTheme = useMemo(() => createTheme({
    palette: { mode: appDarkMode ? "dark" : "light", primary: { main: "#1976d2" } },
    typography: { fontFamily: '"Roboto","Helvetica","Arial",sans-serif' },
    shape: { borderRadius: 8 },
    components: {
      MuiCssBaseline: {
        styleOverrides: {
          html: { WebkitTextSizeAdjust: "100%" },
          input: { fontSize: "16px" },
          textarea: { fontSize: "16px" },
          select: { fontSize: "16px" },
          ".MuiInputBase-input": { fontSize: "16px" },
        },
      },
    },
  }), [appDarkMode]);
  const [previewDarkMode, setPreviewDarkMode] = useState(false);
  const [consoleLogs, setConsoleLogs] = useState([]);
  const [consoleOpen, setConsoleOpen] = useState(false);
  const [snapshots, setSnapshots] = useState([]);
  const [snapshotOpen, setSnapshotOpen] = useState(false);
  const [patchOpen, setPatchOpen] = useState(false);
  const [storageOpen, setStorageOpen] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [confirmFullReset, setConfirmFullReset] = useState(false);
  const [tabRename, setTabRename] = useState(null);
  const [profileNewOpen, setProfileNewOpen] = useState(false);
  const [profileNewName, setProfileNewName] = useState("新しいプロファイル");
  const [previewDialog, setPreviewDialog] = useState(null);
  const [snackbar, setSnackbar] = useState({ open: false, msg: "" });
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [supportAIOpen, setSupportAIOpen] = useState(false);
  const editorApiRef = useRef(null);
  const historyMuteRef = useRef(false);
  const consoleLogsRef = useRef([]);
  const previewWindowRef = useRef(null);
  const previewHasErrorRef = useRef(false);
  const lastGoodCodeRef = useRef(null);
  const [codeHistory, setCodeHistory] = useState(() => HistoryDomain.reset(html, activeEditorTabId, "初期状態").history);
  const [codeHistoryIndex, setCodeHistoryIndex] = useState(0);
  const lineCountForPerf = useMemo(() => html.split("\n").length, [html]);
  const isLargeCode = html.length > PERF_LIMITS.LARGE_CODE_CHARS || lineCountForPerf > PERF_LIMITS.LARGE_CODE_LINES;

        onToggleTheme={() => setAppDarkMode(v => !v)}
        onSupportAI={openSupportAI}
      />
      <SupportAIDialog
        open={supportAIOpen}
        onClose={() => setSupportAIOpen(false)}
        appDarkMode={appDarkMode}
        activeMode={activeEditorMode}
        editorApiRef={editorApiRef}
        fallbackText={html}
        onFallbackSetText={setHtml}
        onToast={toast}
        onForceMarkdown={() => changeEditorTabMode(EDITOR_MODES.MARKDOWN)}
        onForceHtml={() => changeEditorTabMode(EDITOR_MODES.HTML)}
      />
      <ConfirmDialog open={confirmClear} title="入力内容をクリア" message="現在のタブの内容を削除します。" confirmLabel="クリア" onConfirm={clearEditor} onCancel={() => setConfirmClear(false)} />
      <ConfirmDialog open={confirmReset} title="初期設定に戻す" message="現在のプロファイルを初期状態に戻します。" confirmLabel="初期化" onConfirm={resetProfile} onCancel={() => setConfirmReset(false)} />
      <ConfirmDialog open={confirmFullReset} title="完全初期化" message="localStorageのアプリデータとアプリ関連Cacheを削除します。必要なデータは先にExportしてください。" confirmLabel="完全初期化" onConfirm={fullReset} onCancel={() => setConfirmFullReset(false)} />
      <Dialog open={Boolean(tabRename)} onClose={() => setTabRename(null)} maxWidth="xs" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}><DialogTitle sx={{ fontWeight: 700, pb: 1 }}>コードタブ名を変更</DialogTitle><DialogContent><MaterialUI.TextField autoFocus fullWidth size="small" value={tabRename?.name || ""} onChange={e => setTabRename(v => v ? { ...v, name: e.target.value } : v)} onKeyDown={e => { if (e.key === "Enter") applyEditorTabRename(); }} /></DialogContent><DialogActions sx={{ px: 3, pb: 2, gap: 1 }}><Button onClick={() => setTabRename(null)} variant="outlined" fullWidth>キャンセル</Button><Button onClick={applyEditorTabRename} variant="contained" fullWidth>変更</Button></DialogActions></Dialog>
      <Dialog open={profileNewOpen} onClose={() => setProfileNewOpen(false)} maxWidth="xs" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}><DialogTitle sx={{ fontWeight: 700, pb: 1 }}>新規プロファイル</DialogTitle><DialogContent><MaterialUI.TextField autoFocus fullWidth size="small" value={profileNewName} onChange={e => setProfileNewName(e.target.value)} onKeyDown={e => { if (e.key === "Enter") applyNewProfile(); }} /></DialogContent><DialogActions sx={{ px: 3, pb: 2, gap: 1 }}><Button onClick={() => setProfileNewOpen(false)} variant="outlined" fullWidth>キャンセル</Button><Button onClick={applyNewProfile} variant="contained" fullWidth>作成</Button></DialogActions></Dialog>
      <Dialog open={Boolean(previewDialog)} onClose={() => setPreviewDialog(null)} maxWidth="sm" fullWidth PaperProps={{ sx: { borderRadius: 3 } }}><DialogTitle sx={{ fontWeight: 700, pb: 1 }}>{previewDialog?.title || "Preview message"}</DialogTitle><DialogContent><DialogContentText sx={{ whiteSpace: "pre-wrap" }}>{previewDialog?.message || ""}</DialogContentText></DialogContent><DialogActions sx={{ px: 3, pb: 2 }}><Button onClick={() => setPreviewDialog(null)} variant="contained">OK</Button></DialogActions></Dialog>
      {patchOpen && <PatchDialog open={patchOpen} onClose={() => setPatchOpen(false)} currentCode={html} onApply={applyPatchCode} />}
      {consoleOpen && <ConsolePanel open={consoleOpen} onClose={() => setConsoleOpen(false)} logs={consoleLogs} onClear={() => setConsoleLogs([])} />}
      {snapshotOpen && <SnapshotPanel open={snapshotOpen} onClose={() => setSnapshotOpen(false)} snapshots={snapshots} onRestore={restoreSnapshot} onDelete={deleteSnapshot} onClearAll={clearSnapshots} darkMode={darkMode} />}
      <SecurityStorageDialog open={storageOpen} onClose={() => setStorageOpen(false)} onExportAll={() => exportAllProfiles(getProfilesWithCurrentData())} onFullReset={() => setConfirmFullReset(true)} onToast={toast} />
      <Snackbar open={snackbar.open} autoHideDuration={2200} onClose={() => setSnackbar(s => ({ ...s, open: false }))} message={snackbar.msg} anchorOrigin={{ vertical: "bottom", horizontal: "center" }} />
    </ThemeProvider>
  );
}

// Bootstrap
createRoot(document.getElementById("root")).render(<React.StrictMode><App /></React.StrictMode>);
  </script>

(function(){
  var _send = function(level, args) {

      var msg = Array.from(args).map(function(a){
        try { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a); }
        catch(e) { return String(a); }
      }).join(' ');

  };
  ['log','warn','error','info','debug'].forEach(function(m){
    var orig = console[m].bind(console);

  });
  window.addEventListener('error', function(e){
    _send('error', [e.message + (e.filename ? ' (' + e.filename + ':' + e.lineno + ')' : '')]);
  });

    _send('error', ['Unhandled Promise rejection: ' + (e.reason?.message || e.reason)]);
  });
  window.alert = function(message) {

  };
  window.confirm = function(message) {
    var msg = String(message ?? '');
    _send('warn', ['confirm() is disabled in sandboxed preview: ' + msg]);

  };
  window.prompt = function(message, defaultValue) {
    var msg = String(message ?? '');
    _send('warn', ['prompt() is disabled in sandboxed preview: ' + msg]);
