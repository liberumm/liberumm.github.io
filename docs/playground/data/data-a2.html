  }, [themeMode, tableDensity, previewRows, encoding, delimiter, chunkSize, sampleRows, pageSize, storageWorkspace, storageCollection, memoryMaxMB, memoryMaxRows, mainPanel, tab, rules]);

  function appendLog(text) {
    const line = `[${new Date().toLocaleTimeString()}] ${text}`;
    setLogs((prev) => [...prev.slice(-500), line]);
  }

  function acceptedCsvFiles(fileList) {
    return Array.from(fileList || []).filter((file) => {
      const name = String(file.name || "").toLowerCase();
      return name.endsWith(".csv") || name.endsWith(".txt") || file.type === "text/csv" || file.type === "text/plain" || !file.type;
    });
  }

  function addCandidateFiles(fileList) {
    const list = acceptedCsvFiles(fileList);
    if (!list.length) {
      setStatus("CSV/TXTファイルが見つかりませんでした。");
      return;
    }

    setCandidateFiles((prev) => {
      const seen = new Set(prev.map(fileKey));
      const merged = [...prev];
      const added = [];
      for (const file of list) {
        const key = fileKey(file);
        if (!seen.has(key)) {
          seen.add(key);
          merged.push(file);
          added.push(file);
        }
      }
      if (added.length) {
        setCandidateSelectedKeys((keys) => [...new Set([...keys, ...added.map(fileKey)])]);
        setStatus(`${fmt(added.length)}件のCSVを読み込み候補に追加しました。リストで選択してから取り込んでください。`);
      } else {
        setStatus("同じCSVはすでに読み込み候補リストにあります。");
      }
      return merged;
    });
  }

  function toggleCandidateFile(key) {
    setCandidateSelectedKeys((prev) => prev.includes(key) ? prev.filter((x) => x !== key) : [...prev, key]);
  }

  function selectAllCandidateFiles() {
    setCandidateSelectedKeys(candidateFiles.map(fileKey));
  }

  function clearCandidateSelection() {
    setCandidateSelectedKeys([]);
  }

  function clearCandidateFiles() {
    setCandidateFiles([]);
    setCandidateSelectedKeys([]);
    setStatus("読み込み候補リストをクリアしました。");
  }

  function importSelectedCandidateFiles() {
    const selectedSet = new Set(candidateSelectedKeys);
    const list = candidateFiles.filter((file) => selectedSet.has(fileKey(file)));
    if (!list.length) {
      setStatus("取り込むCSVを読み込み候補リストから選択してください。");
      return;
    }
    handleImportedFiles(list);
    setCandidateFiles([]);
    setCandidateSelectedKeys([]);
  }

  function handleImportedFiles(fileList) {
    const list = acceptedCsvFiles(fileList);
    setFiles(list);
    setActiveFileIndex(0);
    setSchema(null);
    setManifest(null);
    setCleanTable(null);
    setDataTable(null);
    setDataQueryActive(false);
    setDataQueryCount(0);
    setSearchTable(null);
    setPivotTable(null);
    setTimeTable(null);
    resetColumnState([]);
    if (list.length) {
      const defaultName = list.length > 1 ? `merged_${list.length}_csv` : list[0].name.replace(/\.[^.]+$/, "");
      setDatasetName(defaultName);
      setTableName(defaultName);
      setProgress(1);
      setProgressText(`CSV取り込み準備: ${list[0].name}`);
      setStatus(list.length > 1 ? `${fmt(list.length)}件のCSVをIn-memoryに取り込みました。まだStorageには保存されていません。先頭CSVのデータプレビューを表示します。` : `${list[0].name} をIn-memoryに取り込みました。まだStorageには保存されていません。データプレビューを表示します。`);
      setTimeout(() => previewClean(list[0], previewRows, list), 0);
    } else {
      setStatus("CSVファイルを選択してください。");
    }
  }

  function clearSelectedFiles() {
    setFiles([]);
    setActiveFileIndex(0);
    setSchema(null);
    setManifest(null);
    setCleanTable(null);
    resetColumnState([]);
    setStatus("In-memory CSVをクリアしました。Storage保存済みデータセットは削除されません。");
  }

  function changeActiveFile(index) {
    const safeIndex = Math.max(0, Number(index || 0));
    setActiveFileIndex(safeIndex);
    const target = files[safeIndex];
    if (target) previewClean(target, previewRows, files);
  }

  function resetColumnState(cols) {
    const ids = cols.map((c) => c.index);
    setVisibleCols(ids);
    setSearchColumn(String(ids[0] ?? 0));
    setTimeField(String(ids[0] ?? 0));
    setTimeGroupField("-1");
    setTimeValueField("-1");
    setValueField("-1");
    setRowFields([]);
    setColumnFields([]);
  }

  function selectedColumnsForPost(m = manifestRef.current, visible = visibleColsRef.current) {
    const all = m?.columns || [];
    if (!all.length) return [];
    return visible.length === all.length ? [] : visible.map(Number);
  }

  useEffect(() => {
    const source = document.getElementById("worker-code").textContent;
    const url = URL.createObjectURL(new Blob([source], { type: "text/javascript" }));
    const worker = new Worker(url);
    workerRef.current = worker;

    worker.onmessage = (e) => {
      const msg = e.data || {};

      if (msg.type === "PROGRESS") {
        setProgress(msg.value ?? 0);
        setProgressText(msg.text || "");
        if ((msg.value ?? 0) >= 100) { setBusy(false); setBusyLabel(""); }
        return;
      }

      if (msg.type === "ERROR") {
        setBusy(false); setBusyLabel("");
        appendLog(`ERROR: ${msg.message}`);
        setProgressText(msg.message || "Error");
        setStatus(msg.message || "Error");
        return;
      }

      if (msg.type === "SCHEMA_DONE") {
        setSchema(msg.schema);
        setManifest(null);
        resetColumnState(msg.schema.columns || []);
        setStatus(`Analyze done: sample ${fmt(msg.schema.sampleRows)} rows / malformed ${fmt(msg.schema.malformedSampleRows)} / changed cells ${fmt(msg.schema.changedSampleCells)}`);
        appendLog("Schema analyzed");
        return;
      }

      if (msg.type === "MERGE_SCHEMA_DONE") {
        setSchema(msg.schema);
        setManifest(null);
        resetColumnState(msg.schema.columns || []);
        const warningText = msg.typeWarnings?.length ? ` / 型推定差分 ${fmt(msg.typeWarnings.length)}件。マージ時は先頭CSVの型を使用します。` : "";
        setStatus(`Merge OK: ${fmt(msg.fileSchemas?.length)}件のCSVは同じ列構成です。${warningText}`);
        setCleanReport([
          ["Merge files", fmt(msg.fileSchemas?.length)],
          ["Columns", fmt(msg.schema?.columns?.length)],
          ["Type warnings", fmt(msg.typeWarnings?.length || 0)],
        ]);
        appendLog(`CSV merge validated: ${fmt(msg.fileSchemas?.length)} files`);
        return;
      }

      if (msg.type === "CLEAN_PREVIEW") {
        setCleanTable({ header: msg.header, rows: msg.rows });
        setCleanReport(Object.entries(msg.report || {}).map(([k, v]) => [k, fmt(v)]));
        setStatus(`Preview done: ${fmt(msg.report?.previewRows)} rows / changed cells ${fmt(msg.report?.changedCells)} / malformed ${fmt(msg.report?.malformedRows)}`);
        return;
      }

      if (msg.type === "COLUMNAR_DONE") {
        setManifest(msg.manifest);
        setSchema({ columns: msg.manifest.columns });
        resetColumnState(msg.manifest.columns || []);
        setPage(1);
        setDataQueryActive(false);
        setDataQueryCount(0);
        setStatus(`Storage保存完了: ${fmt(msg.manifest.totalRows)} rows / ${fmt(msg.manifest.chunks)} chunks。以後はStorageタブから再オープンできます。`);
        setCleanReport([
          ["Source rows", fmt(msg.manifest.cleanReport?.sourceRows)],
          ["Output rows", fmt(msg.manifest.cleanReport?.totalRows)],
          ["Malformed rows", fmt(msg.manifest.cleanReport?.malformedRows)],
          ["Skipped rows", fmt(msg.manifest.cleanReport?.skippedRows)],
          ["Changed cells", fmt(msg.manifest.cleanReport?.changedCells)],
          ["Null cells", fmt(msg.manifest.cleanReport?.nullCells)],
          ["Invalid numbers", fmt(msg.manifest.cleanReport?.invalidNumbers)],
        ]);
        appendLog(`Columnar cache built: ${msg.manifest.id}`);
        worker.postMessage({ type: "OPFS_LIST" });
        worker.postMessage({ type: "OPFS_ESTIMATE" });
        worker.postMessage({ type: "READ_PAGE", page: 1, pageSize: pageSizeRef.current, columns: [] });
        return;
      }

      if (msg.type === "OPFS_LIST_DONE") {
        const list = msg.datasets || [];
        setDatasets(list);
        setSelectedDataset((current) => current || list?.[0]?.id || "");
        setMergeDatasetIds((current) => current.filter((id) => list.some((d) => d.id === id)));
        setOpfsStatus(list?.length ? `Saved datasets: ${fmt(list.length)}` : "保存済みデータセットはありません。");
        return;
      }

      if (msg.type === "OPFS_ESTIMATE_DONE") {
        setOpfsTime(`Usage ${msg.usage == null ? "unknown" : fmt(msg.usage) + " bytes"} / Quota ${msg.quota == null ? "unknown" : fmt(msg.quota) + " bytes"}`);
        return;
      }

      if (msg.type === "EXTERNAL_STORAGE_STATUS") {
        const ok = msg.ok === true || msg.enabled;
        const probe = msg.lastProbe || msg.probe || null;
        const detail = msg.message || (probe?.message ? probe.message : "");
        setExternalStatus(`${ok ? "External Storage ready" : "External Storage configured"}: ${msg.provider || "custom-http"} / ${msg.endpoint || ""} / prefix ${msg.prefix || ""}${detail ? ` / ${detail}` : ""}`);
        appendLog(`External Storage: ${ok ? "ready" : "status"} ${msg.endpoint || ""}`);
        return;
      }

      if (msg.type === "EXTERNAL_STORAGE_LIST_DONE") {
        const list = msg.datasets || [];
        setExternalDatasets(list);
        setExternalSelectedDataset((current) => current || list?.[0]?.id || "");
        setExternalStatus(list.length ? `External datasets: ${fmt(list.length)}` : "External StorageにDatasetはありません。Sync後に表示されます。");
        return;
      }

      if (msg.type === "EXTERNAL_STORAGE_SYNC_DONE") {
        setExternalDatasets(msg.datasets || []);
        setExternalSelectedDataset(msg.id || "");
        setExternalStatus(`External sync完了: ${msg.manifest?.name || msg.id} / files ${fmt(msg.filesWritten)} / ${fmt(Math.round((msg.bytesWritten || 0) / 1024 / 1024))} MB`);
        appendLog(`External sync done: ${msg.id}`);
        return;
      }

      if (msg.type === "EXTERNAL_STORAGE_OPENED") {
        setFiles([]);
        setActiveFileIndex(0);
        setCleanTable(null);
        setManifest(msg.manifest);
        setSchema({ columns: msg.manifest.columns });
        resetColumnState(msg.manifest.columns || []);
        setPage(1);
        setDataQueryActive(false);
        setDataQueryCount(0);
        setStatus(`External Storageから開きました: ${msg.manifest.name || msg.manifest.id} / ${fmt(msg.manifest.totalRows)} rows`);
        setExternalStatus(`Active external dataset: ${msg.manifest.externalStoragePath || msg.manifest.id}`);
        appendLog(`External opened: ${msg.manifest.id}`);
        worker.postMessage({ type: "READ_PAGE", page: 1, pageSize: pageSizeRef.current, columns: [] });
        return;
      }

      if (msg.type === "OPFS_LOADED") {
        setFiles([]);
        setActiveFileIndex(0);
        setCleanTable(null);
        setManifest(msg.manifest);
        setSchema({ columns: msg.manifest.columns });
        resetColumnState(msg.manifest.columns || []);
        setPage(1);
        setDataQueryActive(false);
        setDataQueryCount(0);
        setStatus(`Storageから開きました: ${msg.manifest.name || msg.manifest.id} / ${fmt(msg.manifest.totalRows)} rows`);
        appendLog(`OPFS opened: ${msg.manifest.id}`);
        worker.postMessage({ type: "READ_PAGE", page: 1, pageSize: pageSizeRef.current, columns: [] });
        return;
      }


      if (msg.type === "OPFS_VIRTUAL_LOADED") {
        setFiles([]);
        setActiveFileIndex(0);
        setCleanTable(null);
        setManifest(msg.manifest);
        setSchema({ columns: msg.manifest.columns });
        resetColumnState(msg.manifest.columns || []);
        setPage(1);
        setDataQueryActive(false);
        setDataQueryCount(0);
        setStatus(`Storage-backed Viewを開きました: ${msg.manifest.name || msg.manifest.id} / ${fmt(msg.manifest.sourceDatasets?.length || 0)} tables / ${fmt(msg.manifest.totalRows)} rows。実体はStorage上に残し、必要チャンクだけ読みます。`);
        appendLog(`Virtual dataset opened: ${msg.manifest.id}`);
        worker.postMessage({ type: "READ_PAGE", page: 1, pageSize: pageSizeRef.current, columns: [] });
        return;
      }

      if (msg.type === "OPFS_MEMORY_LOADED") {
        setFiles([]);
        setActiveFileIndex(0);
        setCleanTable(null);
        setManifest(msg.manifest);
        setSchema({ columns: msg.manifest.columns });
        resetColumnState(msg.manifest.columns || []);
        setPage(1);
        setDataQueryActive(false);
        setDataQueryCount(0);
        setStatus(`Memory Acceleratorを有効化しました: ${msg.manifest.name || msg.manifest.id} / ${fmt(msg.manifest.sourceDatasets?.length || 0)} tables / ${fmt(msg.manifest.totalRows)} rows / estimated ${fmt(msg.manifest.memoryReport?.estimatedMB || 0)} MB。解除するには別Tableを開くかForget Sessionを実行してください。`);
        appendLog(`Memory dataset loaded: ${msg.manifest.id}`);
        worker.postMessage({ type: "READ_PAGE", page: 1, pageSize: pageSizeRef.current, columns: [] });
        return;
      }

      if (msg.type === "OPFS_MERGED") {
        setManifest(msg.manifest);
        setSchema({ columns: msg.manifest.columns });
        resetColumnState(msg.manifest.columns || []);
        setPage(1);
        setDataQueryActive(false);
        setDataQueryCount(0);
        setMergeDatasetIds([]);
        setStatus(`Saved datasets merged: ${fmt(msg.manifest.totalRows)} rows / ${fmt(msg.manifest.chunks)} chunks`);
        setCleanReport([
          ["Source rows", fmt(msg.manifest.cleanReport?.sourceRows)],
          ["Output rows", fmt(msg.manifest.cleanReport?.totalRows)],
          ["Merged datasets", fmt(msg.manifest.sourceDatasets?.length || 0)],
          ["Chunks", fmt(msg.manifest.chunks)],
        ]);
        appendLog(`OPFS datasets merged: ${msg.manifest.id}`);
        worker.postMessage({ type: "OPFS_LIST" });
        worker.postMessage({ type: "OPFS_ESTIMATE" });
        worker.postMessage({ type: "READ_PAGE", page: 1, pageSize: pageSizeRef.current, columns: [] });
        return;
      }

      if (msg.type === "OPFS_DELETED") {
        setDatasets(msg.datasets || []);
        setSelectedDataset(msg.datasets?.[0]?.id || "");
        setOpfsStatus("選択データセットを削除しました。");
        return;
      }

      if (msg.type === "PURGE_DONE") {
        setDatasets(msg.datasets || []);
        setSelectedDataset(msg.datasets?.[0]?.id || "");
        setPurgeConfirm("");
        setOpfsStatus(msg.scope === "all" ? `全データセットを削除しました: ${fmt(msg.count)}件` : "選択データセットを削除しました。");
        return;
      }

      if (msg.type === "SESSION_FORGOTTEN") {
        setManifest(null);
        setSchema(null);
        setDataTable(null);
        setDataQueryActive(false);
        setDataQueryCount(0);
        setCleanTable(null);
        setPivotTable(null);
        setPivotTileMeta(null);
        setPivotTileView(null);
        setTimeTable(null);
        setSearchTable(null);
        setVisibleCols([]);
        setPurgeConfirm("");
        setStatus("現在セッションを破棄しました。OPFS内の保存済みデータセットは残っています。");
        return;
      }

      if (msg.type === "PAGE_RESULT") {
        setDataTable({ header: msg.header, rows: msg.rows });
        setDataStatus(`Rows ${fmt(msg.startRow + 1)} - ${fmt(msg.startRow + msg.rows.length)} / page ${fmt(msg.page)}`);
        setDataTime(ms(msg.ms));
        return;
      }

      if (msg.type === "DATA_QUERY_DONE") {
        if (!msg.active) {
          setDataQueryActive(false);
          setDataQueryCount(0);
          setPage(1);
          setDataStatus("Global filter/sortを解除しました。通常ページ表示に戻ります。");
          worker.postMessage({ type: "READ_PAGE", page: 1, pageSize: pageSizeRef.current, columns: selectedColumnsForPost() });
          return;
        }
        setDataQueryActive(true);
        setDataQueryCount(msg.matches || 0);
        setPage(1);
        const engine = msg.executionEngine?.mode === "worker-pool" ? ` / Worker Pool x${fmt(msg.executionEngine?.workers || 1)}` : "";
        setDataStatus(`Global filter/sort: ${fmt(msg.matches)} rows${msg.capped ? " / max rowsで打ち切り" : ""}${engine}`);
        setDataTime(ms(msg.ms));
        worker.postMessage({ type: "READ_DATA_QUERY_PAGE", page: 1, pageSize: pageSizeRef.current, columns: selectedColumnsForPost() });
        return;
      }

      if (msg.type === "DATA_QUERY_PAGE_RESULT") {
        setDataTable({ header: msg.header, rows: msg.rows });
        setDataQueryCount(msg.totalMatches || 0);
        setDataStatus(`Global rows ${fmt(msg.startRow + 1)} - ${fmt(msg.startRow + msg.rows.length)} / ${fmt(msg.totalMatches)} / page ${fmt(msg.page)}`);
        setDataTime(ms(msg.ms));
        return;
      }

      if (msg.type === "DATA_QUERY_CLEARED") {
        setDataQueryActive(false);
        setDataQueryCount(0);
        setPage(1);
        setDataStatus("Global filter/sortを解除しました。通常ページ表示に戻ります。");
        worker.postMessage({ type: "READ_PAGE", page: 1, pageSize: pageSizeRef.current, columns: selectedColumnsForPost() });
        return;
      }

      if (msg.type === "SEARCH_DONE") {
        setSearchCount(msg.matches || 0);
        setSearchPage(1);
        const engine = msg.executionEngine?.mode === "worker-pool" ? ` / Worker Pool x${fmt(msg.executionEngine?.workers || 1)}` : "";
        setSearchStatus(`Matches: ${fmt(msg.matches)}${msg.capped ? " / maxに到達" : ""}${engine}`);
        setSearchTime(ms(msg.ms));
        worker.postMessage({ type: "READ_SEARCH_PAGE", page: 1, pageSize: pageSizeRef.current, columns: selectedColumnsForPost() });
        return;
      }

      if (msg.type === "SEARCH_PAGE_RESULT") {
        setSearchTable({ header: msg.header, rows: msg.rows });
        setSearchCount(msg.totalMatches || 0);
        setSearchStatus(`Matches: ${fmt(msg.totalMatches)} / showing page ${fmt(msg.page)}`);
        setSearchTime(ms(msg.ms));
        return;
      }

      if (msg.type === "PIVOT_TILE_READY") {
        setPivotTable(null);
        setPivotTileMeta(msg);
        setPivotStatus(`Tile index ready: scanned ${fmt(msg.scanned)} rows / ${fmt(msg.totalDataRows)} row groups / ${fmt(msg.totalDataCols)} column groups${msg.limitHit ? " / limit hit" : ""}`);
        setPivotTime(ms(msg.ms));
        return;
      }

      if (msg.type === "PIVOT_VIEWPORT_DONE") {
        setPivotTileView(msg);
        return;
      }

      if (msg.type === "PIVOT_CSV") {
        downloadText("pivot.csv", msg.csv || "");
        return;
      }

      if (msg.type === "TIME_DONE") {
        setTimeTable({ header: msg.header, rows: msg.rows });
        setTimeStatus(`Scanned ${fmt(msg.scanned)} rows / invalid time ${fmt(msg.invalidTime)}${msg.limitHit ? " / max buckets hit" : ""}`);
        setTimeTime(ms(msg.ms));
        return;
      }

      if (msg.type === "TIME_CSV") {
        downloadText("time_view.csv", msg.csv || "");
      }
    };

    worker.postMessage({ type: "OPFS_LIST" });
    worker.postMessage({ type: "OPFS_ESTIMATE" });

    return () => {
      worker.terminate();
      URL.revokeObjectURL(url);
    };
  }, []);

  function post(msg) {
    const labels = {
      ANALYZE: "CSVスキーマ解析",
      VALIDATE_MERGE: "CSVマージ検証",
      PREVIEW_CLEAN: "CSVプレビュー読み込み",
      BUILD_COLUMNAR: files.length > 1 ? "複数CSVをStorageに保存" : "CSVをStorageに保存",
      MERGE_SAVED: "保存済みデータセットマージ",
      OPFS_OPEN_VIRTUAL: "Storage-backed Virtual Dataset作成",
      OPFS_OPEN_MEMORY: "複数TableをMemory Acceleratorにロード",
      RUN_DATA_QUERY: "全件フィルター/ソート",
      RUN_SEARCH: "検索",
      BUILD_PIVOT: "Pivot集計",
      BUILD_TIME: "時間軸集計",
      EXTERNAL_STORAGE_TEST: "External Storage接続確認",
      EXTERNAL_STORAGE_LIST: "External Storage一覧取得",
      EXTERNAL_STORAGE_SYNC: "External Storage同期",
      EXTERNAL_STORAGE_OPEN: "External Storage Dataset読込",
    };
    if (labels[msg.type]) {
      setBusy(true);
      setBusyLabel(labels[msg.type]);
      setProgress(1);
      setProgressText(`${labels[msg.type]}を開始しています...`);
    }
    if (msg.type === "CANCEL") {
      setBusy(false);
      setBusyLabel("");
      setProgressText("Cancel requested");
    }
    workerRef.current?.postMessage(msg);
  }

  function rulesPayload() {
    return {
      ...rules,
      numericThreshold: Number(rules.numericThreshold || 0.9),
    };
  }

  function csvPayload(targetFile = file, targetFiles = files) {
    return {
      file: targetFile,
      files: targetFiles,
      encoding,
      delimiter: delimiter || ",",
      sampleRows: Number(sampleRows || 20000),
      chunkSize: Number(chunkSize || 100000),
      datasetName: datasetName || tableName || (targetFiles.length > 1 ? `merged_${targetFiles.length}_csv` : targetFile?.name || "dataset"),
      storageWorkspace: storageWorkspace || "Default",
      storageCollection: storageCollection || "General",
      tableName: tableName || datasetName || (targetFiles.length > 1 ? `merged_${targetFiles.length}_csv` : targetFile?.name || "dataset"),
      ...rulesPayload(),
    };
  }

  function requireFile() {
    if (!files.length || !file) {
      setStatus("CSVファイルを選択してください。");
      return false;
    }
    return true;
  }

  function analyzeSchema() {
    if (!requireFile()) return;
    post({ type: "ANALYZE", ...csvPayload(), file });
  }

  function validateMergeSchemas() {
    if (!requireFile()) return;
    if (files.length < 2) {
      analyzeSchema();
      return;
    }
    post({ type: "VALIDATE_MERGE", ...csvPayload() });
  }

  function previewClean(targetFile = file, rows = previewRows, targetFiles = files) {
    if (!targetFile) {
      setStatus("プレビューするCSVを選択してください。");
      return;
    }
    const safeRows = Math.max(1, Number(rows || 200));
    setCleanTable(null);
    setProgress(1);
    setProgressText(`CSVプレビュー準備中: ${targetFile.name}`);
    setStatus(`${targetFile.name} のIn-memoryプレビューを作成中です。${fmt(safeRows)}行を表示します。まだStorage保存はしていません。`);
    post({
      type: "PREVIEW_CLEAN",
      ...csvPayload(targetFile, targetFiles),
      file: targetFile,
      pageSize: safeRows,
      forceAnalyze: true,
    });
  }

  function buildColumnar() {
    if (!requireFile()) return;
    setStatus(`${storageWorkspace || "Default"} / ${storageCollection || "General"} / ${tableName || datasetName || "Table"} へStorage保存します。`);
    post({ type: "BUILD_COLUMNAR", ...csvPayload() });
  }

  function readPage(next = page) {
    if (!manifest) return;
    const max = Math.max(1, pageMax || 1);
    const safe = Math.min(Math.max(1, Number(next || 1)), max);
    setPage(safe);
    if (dataQueryActive) {
      post({ type: "READ_DATA_QUERY_PAGE", page: safe, pageSize: Number(pageSize || 500), columns: selectedColumnsForPost() });
    } else {
      post({ type: "READ_PAGE", page: safe, pageSize: Number(pageSize || 500), columns: selectedColumnsForPost() });
    }
  }

  function goRow() {
    if (!manifest) return;
    const row = Math.max(1, Number(jumpRow || 1));
    const next = Math.ceil(row / Number(pageSize || 500));
    readPage(next);
  }

  function addDataQueryFilter() {
    if (!columns.length) return;
    const col = columns.find((c) => String(c.index) === String(draftFilterColumn));
    if (!col) return;
    const filter = { id: `${Date.now()}-${Math.random()}`, columnIndex: Number(draftFilterColumn), op: draftFilterOp, value: draftFilterValue };
    setDataQueryFilters((prev) => [...prev, filter]);
    setDraftFilterValue("");
  }

  function removeDataQueryFilter(id) {
    setDataQueryFilters((prev) => prev.filter((f) => f.id !== id));
  }

  function runDataQuery() {
    if (!manifest) return;
    post({
      type: "RUN_DATA_QUERY",
      filters: dataQueryFilters,
      sort: dataSortColumn === "-1" ? null : { columnIndex: Number(dataSortColumn), direction: dataSortDirection },
      maxRows: Number(dataQueryMaxRows || 0),
    });
  }

  function clearDataQuery() {
    setDataQueryFilters([]);
    setDraftFilterValue("");
    setDataSortColumn("-1");
    setDataSortDirection("asc");
    post({ type: "CLEAR_DATA_QUERY" });
  }

  function runSearch() {
    if (!manifest) return;
    post({ type: "RUN_SEARCH", columnIndex: searchColumn, op: searchOp, value: searchValue, maxMatches: Number(maxMatches || 100000) });
  }

  function readSearchPage(next = searchPage) {
    if (!manifest) return;
    const max = Math.max(1, searchPageMax || 1);
    const safe = Math.min(Math.max(1, Number(next || 1)), max);
    setSearchPage(safe);
    post({ type: "READ_SEARCH_PAGE", page: safe, pageSize: Number(pageSize || 500), columns: selectedColumnsForPost() });
  }

  function buildPivot() {
    if (!manifest) return;
    setPivotTable(null);
    setPivotTileMeta(null);
    setPivotTileView(null);
    post({
      type: "BUILD_PIVOT",
      rowFields,
      columnFields,
      valueField,
      aggregation,
      maxRows: Number(pivotMaxRows || 1000000),
      maxCols: Number(pivotMaxCols || 10000),
    });
  }

  function requestPivotViewport(payload) {
    workerRef.current?.postMessage({ type: "READ_PIVOT_VIEWPORT", ...(payload || {}) });
  }

  function buildTimeSeries() {
    if (!manifest) return;
    post({
      type: "BUILD_TIME",
      timeField,
      bucket: timeBucket,
      groupField: timeGroupField,
      valueField: timeValueField,
      aggregation: timeAggregation,
      maxBuckets: Number(timeMaxBuckets || 10000),
    });
  }

  function refreshOpfs() {
    post({ type: "OPFS_LIST" });
    post({ type: "OPFS_ESTIMATE" });
  }

  function selectStorageScope(workspace, collection = "All") {
    const ws = workspace || "All";
    const col = collection || "All";
    setBrowseWorkspace(ws);
    setBrowseCollection(col);
    if (ws !== "All") setStorageWorkspace(ws);
    if (col !== "All") setStorageCollection(col);
  }

  function createOrSelectStorageScope() {
    const workspace = normalizeScopeName(storageWorkspace, "Default");
    const collection = normalizeScopeName(storageCollection, "General");
    setCatalogScopes((prev) => uniqueScopes([...prev, { workspace, collection }]));
    selectStorageScope(workspace, collection);
    setOpfsStatus(`${workspace} / ${collection} をCatalogに作成・選択しました。Table保存時の保存先にも使われます。`);
  }

  function activateDataset(id) {
    if (!id) return;
    setSelectedDataset(id);
    post({ type: "OPFS_LOAD", id });
  }

  function loadSelectedDataset() {
    if (!selectedDataset) return;
    activateDataset(selectedDataset);
  }

  function deleteSelectedDataset() {
    if (!selectedDataset) return;
    post({ type: "OPFS_DELETE", id: selectedDataset });
  }

  function externalStorageConfigPayload() {
    return { enabled: true, provider: "custom-http", endpoint: externalEndpoint, prefix: externalPrefix || "quantum_csv_grid_columnar", authMode: externalAuthMode, apiKey: externalApiKey, timeoutMs: 120000 };
  }

  function connectExternalStorage() {
    if (!externalEndpoint.trim()) { setExternalStatus("Endpoint URLを入力してください。"); return; }
    post({ type: "EXTERNAL_STORAGE_TEST", config: externalStorageConfigPayload() });
  }

  function refreshExternalDatasets() {
    if (!externalEndpoint.trim()) { setExternalStatus("Endpoint URLを入力してください。"); return; }
    post({ type: "EXTERNAL_STORAGE_CONFIG", config: externalStorageConfigPayload() });
    post({ type: "EXTERNAL_STORAGE_LIST" });
  }

  function syncActiveDatasetToExternal() {
    if (!manifest?.id || manifest.openedFromExternalStorage || String(manifest.id || "").startsWith("virtual:") || String(manifest.id || "").startsWith("memory:")) {
      setExternalStatus("同期できるActive OPFS物理Datasetを開いてください。Virtual / Memory / Externalは同期対象外です。");
      return;
    }
    post({ type: "EXTERNAL_STORAGE_CONFIG", config: externalStorageConfigPayload() });
    post({ type: "EXTERNAL_STORAGE_SYNC", datasetId: manifest.id });
  }

  function openExternalDatasetFromSelection() {
    const id = externalSelectedDataset || externalManualDatasetId.trim();
    if (!id) { setExternalStatus("External Datasetを選択するか、Dataset IDを入力してください。"); return; }
    post({ type: "EXTERNAL_STORAGE_CONFIG", config: externalStorageConfigPayload() });
    post({ type: "EXTERNAL_STORAGE_OPEN", id });
  }

  function mergeSelectedDatasets() {
    if (mergeDatasetIds.length < 2) {
      setOpfsStatus("マージする保存済みデータセットを2件以上選択してください。");
      return;
    }
    post({ type: "MERGE_OPFS_DATASETS", ids: mergeDatasetIds, datasetName: datasetName || tableName || `merged_${mergeDatasetIds.length}_saved`, storageWorkspace, storageCollection, tableName: tableName || datasetName || `merged_${mergeDatasetIds.length}_saved` });
  }


  function openVirtualDatasetFromSelection() {
    if (mergeDatasetIds.length < 2) {
      setOpfsStatus("Storage-backed ViewにするStorage Tableを2件以上選択してください。");
      return;
    }
    post({ type: "OPFS_OPEN_VIRTUAL", ids: mergeDatasetIds, name: virtualDatasetName || `virtual_${mergeDatasetIds.length}_tables` });
  }

  function openMemoryDatasetFromSelection() {
    if (mergeDatasetIds.length < 1) {
      setOpfsStatus("Memory AcceleratorにロードするStorage Tableを1件以上選択してください。");
      return;
    }
    post({ type: "OPFS_OPEN_MEMORY", ids: mergeDatasetIds, name: memoryDatasetName || `memory_${mergeDatasetIds.length}_tables`, maxMemoryMB: Number(memoryMaxMB || 512), maxRows: Number(memoryMaxRows || 0) });
  }

  function openVisibleScopeAsMemoryDataset() {
    const ids = visibleStorageDatasets.map((d) => d.id);
    if (ids.length < 1) {
      setOpfsStatus("現在のWorkspace / Collectionスコープには高速化対象のTableがありません。");
      return;
    }
    const name = memoryDatasetName || `${browseWorkspace || "All"}_${browseCollection || "All"}_memory`.replace(/[^A-Za-z0-9_぀-ヿ㐀-鿿-]+/g, "_");
    post({ type: "OPFS_OPEN_MEMORY", ids, name, maxMemoryMB: Number(memoryMaxMB || 512), maxRows: Number(memoryMaxRows || 0) });
  }

  function openVisibleScopeAsVirtualDataset() {
    const ids = visibleStorageDatasets.map((d) => d.id);
    if (ids.length < 2) {
      setOpfsStatus("現在のWorkspace / CollectionスコープにはStorage-backed View化できるTableが2件以上ありません。");
      return;
    }
    const name = virtualDatasetName || `${browseWorkspace || "All"}_${browseCollection || "All"}_virtual`.replace(/[^A-Za-z0-9_぀-ヿ㐀-鿿-]+/g, "_");
    post({ type: "OPFS_OPEN_VIRTUAL", ids, name });
  }

  function guardedPurge(type) {
    if (purgeConfirm !== "DELETE") {
      setOpfsStatus("確認欄に DELETE と入力してください。");
      return;
    }
    if (type === "session") post({ type: "FORGET_SESSION" });
    if (type === "selected" && selectedDataset) post({ type: "PURGE_SELECTED", id: selectedDataset });
    if (type === "all") post({ type: "PURGE_ALL" });
  }

  const manifestRows = manifest ? [
    ["ID", manifest.id],
    ["Name", manifest.name],
    ["Workspace", manifest.storageWorkspace || "Default"],
    ["Collection", manifest.storageCollection || "General"],
    ["Table", manifest.tableName || manifest.name],
    ["Storage path", manifest.storagePath || `${manifest.storageWorkspace || "Default"} / ${manifest.storageCollection || "General"} / ${manifest.tableName || manifest.name}`],
    ["Mode", manifest.mode],
    ["Original file", manifest.originalFileName],
    ["Rows", fmt(manifest.totalRows)],
    ["Source rows", fmt(manifest.sourceRows)],
    ["Chunks", fmt(manifest.chunks)],
    ["Chunk rows", fmt(manifest.chunkSize)],
    ["Columns", fmt(manifest.columns?.length)],
    ["Encoding", manifest.encoding],
    ["Delimiter", manifest.delimiter],
    ["Created", manifest.createdAt],
    ["Malformed rows", fmt(manifest.cleanReport?.malformedRows)],
    ["Skipped rows", fmt(manifest.cleanReport?.skippedRows)],
    ["Changed cells", fmt(manifest.cleanReport?.changedCells)],
    ["Null cells", fmt(manifest.cleanReport?.nullCells)],
    ["Invalid numbers", fmt(manifest.cleanReport?.invalidNumbers)],
  ] : [];

  const schemaTable = columns.length ? {
    header: ["#", "Column", "Type", "Numeric ratio", "Sample non-null", "Sample nulls", "Examples"],
    rows: columns.map((c) => [
      c.index + 1,
      c.name,
      c.type,
      c.numericRatio == null ? "" : Math.round(c.numericRatio * 1000) / 1000,
      fmt(c.sampleNonNull),
      fmt(c.sampleNulls),
      (c.examples || []).join(" / "),
    ]),
  } : null;

  const hierarchicalDatasets = useMemo(() => datasets.map((d) => ({
    ...d,
    workspace: d.workspace || "Default",
    collection: d.collection || "General",
    tableName: d.tableName || d.name || d.id,
    path: d.path || `${d.workspace || "Default"} / ${d.collection || "General"} / ${d.tableName || d.name || d.id}`,
  })), [datasets]);

  const scopeRows = useMemo(() => uniqueScopes([
    ...catalogScopes,
    ...hierarchicalDatasets.map((d) => ({ workspace: d.workspace, collection: d.collection })),
  ]), [catalogScopes, hierarchicalDatasets]);
  const workspaceOptions = useMemo(() => ["All", ...[...new Set(scopeRows.map((d) => d.workspace))].sort()], [scopeRows]);
  const collectionOptions = useMemo(() => {
    const scoped = browseWorkspace === "All" ? scopeRows : scopeRows.filter((d) => d.workspace === browseWorkspace);
    return ["All", ...[...new Set(scoped.map((d) => d.collection))].sort()];
  }, [scopeRows, browseWorkspace]);
  const visibleStorageDatasets = useMemo(() => hierarchicalDatasets.filter((d) => (browseWorkspace === "All" || d.workspace === browseWorkspace) && (browseCollection === "All" || d.collection === browseCollection)), [hierarchicalDatasets, browseWorkspace, browseCollection]);
  const selectedDatasetInfo = useMemo(() => hierarchicalDatasets.find((d) => d.id === selectedDataset) || null, [hierarchicalDatasets, selectedDataset]);

  const storageHierarchyTable = {
    header: ["Workspace", "Collection", "Tables", "Rows", "Size"],
    rows: Object.values(hierarchicalDatasets.reduce((acc, d) => {
      const key = `${d.workspace}\u001f${d.collection}`;
      if (!acc[key]) acc[key] = { workspace: d.workspace, collection: d.collection, tables: 0, rows: 0, size: 0 };
      acc[key].tables += 1;
      acc[key].rows += Number(d.rows || 0);
      acc[key].size += Number(d.fileSize || 0);
      return acc;
    }, Object.fromEntries(scopeRows.map((scope) => [`${scope.workspace}\u001f${scope.collection}`, { workspace: scope.workspace, collection: scope.collection, tables: 0, rows: 0, size: 0 }])))).sort((a,b) => `${a.workspace}/${a.collection}`.localeCompare(`${b.workspace}/${b.collection}`, "ja")).map((x) => [x.workspace, x.collection, fmt(x.tables), fmt(x.rows), `${fmt(x.size)} bytes`]),
  };

  const datasetTable = {
    header: ["Workspace", "Collection", "Table", "Name", "Original", "Created", "Rows", "Source rows", "Cols", "Chunks", "Size", "Mode", "ID"],
    rows: visibleStorageDatasets.map((d) => [
      d.workspace,
      d.collection,
      d.tableName,
      d.name,
      d.originalFileName,
      d.createdAt ? new Date(d.createdAt).toLocaleString() : "",
      fmt(d.rows),
      fmt(d.sourceRows),
      fmt(d.columns),
      fmt(d.chunks),
      `${fmt(d.fileSize)} bytes`,
      d.mode,
      d.id,
    ]),
  };

  const externalDatasetTable = {
    header: ["Workspace", "Collection", "Table", "Rows", "Columns", "Chunks", "Mode", "ID"],
    rows: externalDatasets.map((d) => [d.workspace || "External", d.collection || "General", d.tableName || d.name || d.id, fmt(d.rows), fmt(d.columns), fmt(d.chunks), d.mode || "external", d.id]),
  };

  const workNavigator = ({ toggleLeftCollapsed } = {}) => (
    <Section
      title="Workspace Tree"
      icon={<Storage />}
      hint="Work全体の共通ナビゲータです。Tableをクリックすると、そのTableがすぐActive Datasetになります。Storage-backedで扱い、必要なときだけIn-memory高速化します。"
      hideCollapse
      actions={toggleLeftCollapsed ? (
        <Tooltip title="Workspace Treeを横に折りたたむ">
          <IconButton size="small" onClick={toggleLeftCollapsed}>◀</IconButton>
        </Tooltip>
      ) : null}
    >
      <Stack direction="row" spacing={0.5} useFlexGap flexWrap="wrap" sx={{ mb: 0.75 }}>
        <Button size="small" variant="outlined" onClick={refreshOpfs}>Refresh</Button>
        <Button size="small" variant={browseWorkspace === "All" && browseCollection === "All" ? "contained" : "outlined"} onClick={() => selectStorageScope("All", "All")}>All</Button>
        <Chip size="small" label={`${fmt(visibleStorageDatasets.length)} tables`} />
      </Stack>
      <StorageCatalogTree
        datasets={hierarchicalDatasets}
        extraScopes={scopeRows}
        browseWorkspace={browseWorkspace}
        browseCollection={browseCollection}
        selectedDataset={selectedDataset}
        activeManifest={manifest}
        candidateFiles={candidateFiles}
        importedFiles={files}
        activeFileIndex={activeFileIndex}
        onSelectScope={selectStorageScope}
        onSelectDataset={setSelectedDataset}
        onActivateDataset={activateDataset}
        onSelectInMemory={() => setMainPanel("management")}
      />
      {selectedDatasetInfo ? (
        <Alert severity="info" sx={{ mt: 0.75 }}>
          Selected: {selectedDatasetInfo.workspace} / {selectedDatasetInfo.collection} / {selectedDatasetInfo.tableName}<br />
          {fmt(selectedDatasetInfo.rows)} rows / {fmt(selectedDatasetInfo.columns)} cols
        </Alert>
      ) : (
        <Alert severity="info" sx={{ mt: 0.75 }}>TableをクリックするとActive Datasetとして開きます。</Alert>
      )}
      <Stack direction="row" spacing={0.6} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
        <Button size="small" variant="contained" disabled={!selectedDataset} onClick={loadSelectedDataset}>Reload selected</Button>
        <Button size="small" variant="outlined" color="secondary" disabled={visibleStorageDatasets.length < 2} onClick={openVisibleScopeAsVirtualDataset}>Open scope lazy</Button>
        <Button size="small" variant="outlined" color="warning" disabled={visibleStorageDatasets.length < 1} onClick={openVisibleScopeAsMemoryDataset}>Accelerate scope</Button>
      </Stack>
      <Alert severity="success" sx={{ mt: 0.75 }}>
        Active: {manifest ? (manifest.storagePath || manifest.name || manifest.id) : "未選択"}
        {manifest?.mode === "virtual-dataset" ? ` / Storage-backed ${fmt(manifest.sourceDatasets?.length || 0)} tables` : ""}
        {manifest?.mode === "memory-dataset" ? ` / Memory ${fmt(manifest.sourceDatasets?.length || 0)} tables / ${fmt(manifest.memoryReport?.estimatedMB || 0)} MB` : ""}
      </Alert>
      <Typography variant="caption" color="text.secondary" sx={{ display: "block", mt: 0.5 }}>
        Data / Search / Pivot / Time / Schema は、ここで選んだActive Datasetを共通で使います。Storage-backedなら全データをメモリに載せず扱えます。
      </Typography>
    </Section>
  );

  return (
    <ThemeProvider theme={theme}>
      <CssBaseline />
      <UiSettingsContext.Provider value={{ dense: tableDensity === "dense" }}>
      <Box sx={{ minHeight: "100vh", background: themeMode === "dark" ? "linear-gradient(135deg,#020617 0%,#111827 100%)" : "linear-gradient(135deg,#f6f7fb 0%,#eef2ff 100%)", py: 1 }}>
        <Container maxWidth={false} sx={{ px: { xs: 1, sm: 1.25 }, maxWidth: "1680px" }}>
          <Paper elevation={0} sx={{ p: 1.1, mb: 1 }}>
            <Stack direction={{ xs: "column", md: "row" }} spacing={1} justifyContent="space-between" alignItems={{ xs: "flex-start", md: "center" }}>
              <Box>
                <Typography variant="h4">Quantum CSV Grid Columnar Clean</Typography>
                <Typography variant="body2" color="text.secondary" sx={{ mt: 0.25 }}>
                  Data / Work / Settings / Storage-backed Virtual Dataset / OPFS Column Store
                </Typography>
              </Box>
              <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap" alignItems="center">
                <Chip color="success" label="Column Store + Cleaning Pipeline" />
                <FormControlLabel
                  control={<Switch checked={tableDensity === "normal"} onChange={(event) => setTableDensity(event.target.checked ? "normal" : "dense")} />}
                  label={tableDensity === "dense" ? "Dense table" : "Normal table"}
                />
                <FormControlLabel
                  control={<Switch checked={themeMode === "dark"} onChange={(event) => setThemeMode(event.target.checked ? "dark" : "light")} />}
                  label={themeMode === "dark" ? "Dark" : "Light"}
                />
                <Button size="small" variant="outlined" onClick={() => { localStorage.removeItem(SETTINGS_KEY); setStatus("保存済みUI設定を削除しました。再読み込み後に初期値へ戻ります。"); }}>Reset UI settings</Button>
              </Stack>
            </Stack>
          </Paper>

          <Paper elevation={0} sx={{ mb: 0.5 }}>
            <Tabs value={mainPanel} onChange={(e, v) => setMainPanel(v)} variant="scrollable" scrollButtons="auto">
              <Tab value="management" icon={<Storage />} iconPosition="start" label="Data" />
              <Tab value="work" icon={<TableChart />} iconPosition="start" label="Work" />
              <Tab value="settings" icon={<Schema />} iconPosition="start" label="Settings" />
            </Tabs>
          </Paper>

          <Stack direction="row" useFlexGap flexWrap="wrap" spacing={0.6} sx={{ mb: 0.75 }} alignItems="center">
            <Chip label={`State: ${manifest ? "Storage" : files.length ? "In-memory" : candidateFiles.length ? "Candidate" : "Empty"}`} color={manifest ? "success" : files.length ? "warning" : candidateFiles.length ? "info" : "default"} />
            <Chip label={`Dataset: ${manifest?.name || (files.length > 1 ? `${files.length} CSV selected` : file?.name) || "未選択"}`} />
            <Chip label={`Rows: ${fmt(manifest?.totalRows)}`} />
            <Chip label={`Columns: ${fmt(columns.length)}`} />
            <Chip label={`Chunks: ${fmt(manifest?.chunks)}`} />
            {manifest?.mode === "virtual-dataset" && <Chip color="secondary" label={`Storage-backed: ${fmt(manifest.sourceDatasets?.length || 0)} tables`} />}
            {manifest?.mode === "memory-dataset" && <Chip color="warning" label={`Memory: ${fmt(manifest.sourceDatasets?.length || 0)} tables / ${fmt(manifest.memoryReport?.estimatedMB || 0)} MB`} />}
            {busy && <Chip color="warning" label={busyLabel || "Processing"} />}
            <Box sx={{ minWidth: 220, flex: 1 }}>
              <LinearProgress variant={busy && Number(progress || 0) <= 1 ? "indeterminate" : "determinate"} value={Number(progress || 0)} />
            </Box>
            <Typography variant="caption" color="text.secondary">{progressText}</Typography>
          </Stack>

          {mainPanel === "management" && (
            <ResizableSplit
              storageKey="quantumCsvGrid.dataManagementSplit.leftWidth.v2"
              defaultLeft={390}
              minLeft={300}
              maxLeft={660}
              minRight={620}
              collapsible
              collapseStorageKey="quantumCsvGrid.dataManagementSplit.leftCollapsed.v1"
              collapsedWidth={52}
              collapsedTitle="Storage / OPFS"
              left={({ toggleLeftCollapsed } = {}) => (
                <Stack spacing={0.75} sx={{ minWidth: 0 }}>
                  <Section
                    title="Storage / OPFS 保存"
                    icon={<Storage />}
                    hint="保存先指定、Storage Catalog、Open/Delete、Storage-backed View作成をここで管理します。状態確認は右ペインのData Importに集約します。"
                    hideCollapse
                    actions={toggleLeftCollapsed ? (
                      <Tooltip title="Storage / OPFSペインを横に折りたたむ">
                        <IconButton size="small" onClick={toggleLeftCollapsed}>◀</IconButton>
                      </Tooltip>
                    ) : null}
                  >
                    <Paper variant="outlined" sx={{ p: 0.8, borderRadius: 1.5, mt: 0.75 }}>
                      <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 0.35 }}>保存先</Typography>
                      <Stack spacing={0.6}>
                        <TextField label="Workspace" size="small" value={storageWorkspace} onChange={(e) => setStorageWorkspace(e.target.value)} fullWidth />
                        <TextField label="Collection" size="small" value={storageCollection} onChange={(e) => setStorageCollection(e.target.value)} fullWidth />
                        <TextField label="Table" size="small" value={tableName || datasetName} onChange={(e) => { setTableName(e.target.value); setDatasetName(e.target.value); }} fullWidth />
                      </Stack>
                      <Typography variant="caption" color="text.secondary" sx={{ display: "block", mt: 0.5 }}>
                        保存階層: {(storageWorkspace || "Default")} / {(storageCollection || "General")} / {(tableName || datasetName || "Table")}。CSV選択・プレビュー時点ではまだIn-memoryです。
                      </Typography>
                      <Stack direction="row" spacing={0.5} useFlexGap flexWrap="wrap" sx={{ mt: 0.6 }}>
                        <Button size="small" variant="outlined" onClick={createOrSelectStorageScope}>Workspace / Collectionを作成・選択</Button>
                        <Button size="small" variant="text" onClick={() => { setStorageWorkspace("Default"); setStorageCollection("General"); selectStorageScope("Default", "General"); }}>Default / General</Button>
                      </Stack>
                      <Typography variant="caption" color="text.secondary" sx={{ display: "block", mt: 0.35 }}>
                        空のWorkspace / CollectionもCatalogに表示されます。Table保存時はこの保存先に入ります。
                      </Typography>
                    </Paper>

                    <Stack direction="row" spacing={0.6} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
                      <Tooltip title="CSVを選択しただけではStorageには保存されません。この操作でOPFSに列指向キャッシュとして保存します。">
                        <span>
                          <Button variant="contained" color="success" disabled={busy || !files.length} startIcon={<Storage />} onClick={buildColumnar}>
                            {files.length > 1 ? "選択CSVをマージしてStorageに保存" : "Storageに保存"}
                          </Button>
                        </span>
                      </Tooltip>
                      <Button variant="outlined" onClick={refreshOpfs}>Refresh</Button>
                      <Button variant="outlined" onClick={() => post({ type: "OPFS_ESTIMATE" })}>Storage Estimate</Button>
                    </Stack>

                    {files.length > 0 && !manifest && (
                      <Alert severity="warning" sx={{ mt: 0.75 }}>
                        現在のCSVはIn-memoryです。ブラウザ内Storageへ残すには「Storageに保存」を実行してください。プレビュー・Analyzeだけでは保存されません。
                      </Alert>
                    )}
                    {manifest && (
                      <Alert severity="success" sx={{ mt: 0.75 }}>
                        Storage active: {(manifest.storagePath || `${manifest.storageWorkspace || "Default"} / ${manifest.storageCollection || "General"} / ${manifest.tableName || manifest.name || manifest.id}`)} / {fmt(manifest.totalRows)} rows / {fmt(manifest.chunks)} chunks。
                      </Alert>
                    )}

                    <Divider sx={{ my: 1 }} />
                    <Stack direction="row" spacing={0.5} sx={{ mb: 0.75 }} useFlexGap flexWrap="wrap">
                      <Button size="small" variant={browseWorkspace === "All" && browseCollection === "All" ? "contained" : "outlined"} onClick={() => selectStorageScope("All", "All")}>
                        All Workspaces
                      </Button>
                      <Chip size="small" label={`Scope: ${browseWorkspace}${browseCollection !== "All" ? ` / ${browseCollection}` : ""}`} />
                      <Chip size="small" label={`${fmt(visibleStorageDatasets.length)} tables`} />
                    </Stack>
                    <StorageCatalogTree
                      datasets={hierarchicalDatasets}
                      extraScopes={scopeRows}
                      browseWorkspace={browseWorkspace}
                      browseCollection={browseCollection}
                      selectedDataset={selectedDataset}
                      activeManifest={manifest}
                      candidateFiles={candidateFiles}
                      importedFiles={files}
                      activeFileIndex={activeFileIndex}
                      onSelectScope={selectStorageScope}
                      onSelectDataset={setSelectedDataset}
                      onActivateDataset={activateDataset}
                      onSelectInMemory={() => setMainPanel("management")}
                    />
                    {selectedDatasetInfo && (
                      <Alert severity="info" sx={{ mt: 0.75 }}>
                        Selected: {selectedDatasetInfo.workspace} / {selectedDatasetInfo.collection} / {selectedDatasetInfo.tableName} / {fmt(selectedDatasetInfo.rows)} rows
                      </Alert>
                    )}
                    <Stack direction="row" spacing={0.6} sx={{ mt: 0.75 }} useFlexGap flexWrap="wrap">
                      <Button variant="contained" disabled={!selectedDataset} onClick={loadSelectedDataset}>Reload selected</Button>
                      <Button color="error" variant="outlined" disabled={!selectedDataset} startIcon={<Delete />} onClick={deleteSelectedDataset}>Delete Saved</Button>
                    </Stack>

                    <Divider sx={{ my: 1 }} />
                    <TextField
                      select
                      label="Source Tables"
                      size="small"
                      fullWidth
                      value={mergeDatasetIds}
                      onChange={(e) => setMergeDatasetIds(typeof e.target.value === "string" ? e.target.value.split(",") : e.target.value)}
                      SelectProps={{
                        multiple: true,
                        renderValue: (selected) => selected.length ? `${selected.length}件選択` : "未選択",
                      }}
                    >
                      {visibleStorageDatasets.map((d) => (
                        <MenuItem key={d.id} value={d.id}>
                          <Checkbox checked={mergeDatasetIds.includes(d.id)} />
                          <Typography variant="body2">{d.workspace} / {d.collection} / {d.tableName} / {fmt(d.rows)} rows</Typography>
                        </MenuItem>
                      ))}
                    </TextField>
                    <Stack direction="row" spacing={0.6} sx={{ mt: 0.75 }} useFlexGap flexWrap="wrap" alignItems="center">
                      <Button variant="outlined" onClick={mergeSelectedDatasets}>Merge into Storage Table</Button>
                      <TextField label="Storage-backed View name" size="small" value={virtualDatasetName} onChange={(e) => setVirtualDatasetName(e.target.value)} sx={{ minWidth: 220, flex: 1 }} />
                      <Button variant="contained" color="secondary" onClick={openVirtualDatasetFromSelection}>Open selected lazy</Button>
                    </Stack>
                    <Stack direction="row" spacing={0.6} sx={{ mt: 0.75 }} useFlexGap flexWrap="wrap" alignItems="center">
                      <TextField label="Memory Accelerator name" size="small" value={memoryDatasetName} onChange={(e) => setMemoryDatasetName(e.target.value)} sx={{ minWidth: 200, flex: 1 }} />
                      <SmallNumberField label="Max memory MB" value={memoryMaxMB} onChange={setMemoryMaxMB} min="64" step="64" />
                      <SmallNumberField label="Max rows 0=all" value={memoryMaxRows} onChange={setMemoryMaxRows} min="0" step="10000" />
                      <Button variant="contained" color="warning" onClick={openMemoryDatasetFromSelection}>Accelerate selected in memory</Button>
                    </Stack>
                    <Alert severity="info" sx={{ mt: 0.75 }}>
                      Mergeは新しい物理TableをStorageに作ります。Storage-backed Viewは物理コピーせず遅延読み込みします。標準はStorage-backed lazy viewです。In-memoryは同じ対象を高速化したいときだけ明示的に使います。容量上限を守ってください。
                    </Alert>

                    <Divider sx={{ my: 1 }} />
                    <Alert severity="warning">
                      OPFS内の列指向キャッシュを論理削除します。ブラウザ・OS・SSD都合の物理上書き消去は保証できません。
                    </Alert>
                    <TextField label="Confirm text" placeholder="DELETE" size="small" fullWidth value={purgeConfirm} onChange={(e) => setPurgeConfirm(e.target.value)} sx={{ mt: 0.75 }} />
                    <Stack direction="row" spacing={0.6} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
                      <Button color="error" variant="outlined" onClick={() => guardedPurge("session")}>Forget Session</Button>
                      <Button color="error" variant="outlined" onClick={() => guardedPurge("selected")}>Purge Selected</Button>
                      <Button color="error" variant="contained" onClick={() => guardedPurge("all")}>Purge ALL</Button>
                    </Stack>

                <Stack direction="row" spacing={0.75} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
                  <TextField label="Root prefix" size="small" value={externalPrefix} onChange={(e) => setExternalPrefix(e.target.value)} sx={{ minWidth: 230 }} />
                  <TextField select label="Auth" size="small" value={externalAuthMode} onChange={(e) => setExternalAuthMode(e.target.value)} sx={{ width: 145 }}>
                    <MenuItem value="none">None</MenuItem>
                    <MenuItem value="bearer">Bearer</MenuItem>
                    <MenuItem value="api-key">X-API-Key</MenuItem>
                  </TextField>
                </Stack>
                <TextField label="API key / token（保存しない）" type="password" size="small" fullWidth value={externalApiKey} onChange={(e) => setExternalApiKey(e.target.value)} sx={{ mt: 0.75 }} />
                <Stack direction="row" spacing={0.75} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
                  <Button variant="contained" onClick={connectExternalStorage}>Connect/Test</Button>
                  <Button variant="outlined" onClick={refreshExternalDatasets}>List Remote</Button>
                  <Button variant="outlined" color="success" onClick={syncActiveDatasetToExternal}>Sync Active OPFS Dataset</Button>
                </Stack>
                <TextField select label="Remote Dataset" size="small" fullWidth value={externalSelectedDataset} onChange={(e) => setExternalSelectedDataset(e.target.value)} sx={{ mt: 0.75 }}>
                  {externalDatasets.map((d) => <MenuItem key={d.id} value={d.id}>{d.workspace || "External"} / {d.collection || "General"} / {d.tableName || d.name || d.id} / {fmt(d.rows)} rows</MenuItem>)}
                </TextField>
                <TextField label="Manual Dataset ID（list不可の場合）" size="small" fullWidth value={externalManualDatasetId} onChange={(e) => setExternalManualDatasetId(e.target.value)} sx={{ mt: 0.75 }} />
                <Stack direction="row" spacing={0.75} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
                  <Button variant="contained" color="secondary" onClick={openExternalDatasetFromSelection}>Open Remote Dataset</Button>
                </Stack>
                <Alert severity="success" sx={{ mt: 0.75 }}>{externalStatus}</Alert>
                <Divider sx={{ my: 2 }} />
                <Alert severity="warning">
                  OPFS内の列指向キャッシュを論理削除します。ブラウザ・OS・SSD都合の物理上書き消去は保証できません。
                </Alert>
                <TextField label="Confirm text" placeholder="DELETE" size="small" fullWidth value={purgeConfirm} onChange={(e) => setPurgeConfirm(e.target.value)} sx={{ mt: 0.75 }} />
                <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
                  <Button color="error" variant="outlined" onClick={() => guardedPurge("session")}>Forget Current Session</Button>
                  <Button color="error" variant="outlined" onClick={() => guardedPurge("selected")}>Purge Selected</Button>
                  <Button color="error" variant="contained" onClick={() => guardedPurge("all")}>Purge ALL</Button>
                </Stack>
                <Typography variant="body2" color="text.secondary" sx={{ mt: 0.75 }}>{opfsStatus}</Typography>
              </Section>
              )}
              right={(
              <Section title="Storage Tables" hint="左のツリーでスコープを絞り、ここでTableを一覧比較します。横幅が足りない場合はテーブル内だけ横スクロールします。">
                <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>Workspace / Collection summary</Typography>
                <DataTable table={storageHierarchyTable} tableId="storageHierarchy" height={220} minColumnWidth={170} />
                <Typography variant="subtitle2" sx={{ fontWeight: 900, mt: 2, mb: 1 }}>Tables in selected scope</Typography>
                <DataTable table={datasetTable} tableId="storageTables" height={300} minColumnWidth={170} />
                <Typography variant="subtitle2" sx={{ fontWeight: 900, mt: 2, mb: 1 }}>External Storage datasets</Typography>
                <DataTable table={externalDatasetTable} tableId="externalStorageTables" height={260} minColumnWidth={170} />
                <Typography variant="caption" color="text.secondary">{opfsTime}</Typography>
              </Section>
              )}
            />
          )}

          {tab === "schema" && (
            <Box sx={{ display: "grid", gridTemplateColumns: { xs: "minmax(0, 1fr)", md: "340px minmax(0, 1fr)" }, gap: 0.5, minWidth: 0, maxWidth: "100%" }}>
              <Section title="Manifest" icon={<Schema />}>
                <KeyValue rows={manifestRows} />
              </Section>
              <Section title="Columns">
                <DataTable table={schemaTable} tableId="schema" height={520} />
              </Section>
            </Box>
          )}

          {tab === "log" && (
            <Section title="Log" icon={<Article />}>
              <Box component="pre" sx={{ height: 560, overflow: "auto", m: 0, p: 2, bgcolor: "#0b1020", color: "#d1d5db", borderRadius: 1.5, fontFamily: "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace", fontSize: 12, lineHeight: 1.6 }}>
                {logs.join("\n")}
              </Box>
            </Section>
          )}
                </>
              )}
            />
          )}


          {mainPanel === "settings" && (
            <Box sx={{ display: "grid", gridTemplateColumns: { xs: "1fr", md: "minmax(0, 1fr) minmax(0, 1fr)" }, gap: 0.75 }}>
              <Section title="UI Settings" icon={<Schema />} hint="見やすさと作業密度を調整します。設定はlocalStorageに保存されます。">
                <FormControlLabel
                  control={<Switch checked={tableDensity === "normal"} onChange={(event) => setTableDensity(event.target.checked ? "normal" : "dense")} />}
                  label={tableDensity === "dense" ? "Dense table" : "Normal table"}
                />
                <FormControlLabel
                  control={<Switch checked={themeMode === "dark"} onChange={(event) => setThemeMode(event.target.checked ? "dark" : "light")} />}
                  label={themeMode === "dark" ? "Dark theme" : "Light theme"}
                />
                <Stack direction="row" spacing={0.75} useFlexGap flexWrap="wrap" sx={{ mt: 1 }}>
                  <SmallNumberField label="Preview rows" value={previewRows} onChange={setPreviewRows} min="1" step="100" />
                  <SmallNumberField label="Page size" value={pageSize} onChange={setPageSize} min="10" step="10" />
                </Stack>
                <Button size="small" variant="outlined" sx={{ mt: 1 }} onClick={() => { localStorage.removeItem(SETTINGS_KEY); setStatus("保存済みUI設定を削除しました。再読み込み後に初期値へ戻ります。"); }}>Reset UI settings</Button>
              </Section>
              <Section title="CSV / Performance Defaults" icon={<Storage />} hint="大容量CSVではChunk rowsを小さめにするとメモリ負荷を抑えられます。">
                <Stack direction="row" spacing={0.75} useFlexGap flexWrap="wrap">
                  <TextField select label="Default Encoding" size="small" value={encoding} onChange={(e) => setEncoding(e.target.value)} sx={{ width: 170 }}>
                    <MenuItem value="utf-8">UTF-8</MenuItem>
                    <MenuItem value="shift_jis">Shift-JIS / CP932</MenuItem>
                  </TextField>
                  <TextField label="Delimiter" size="small" value={delimiter} onChange={(e) => setDelimiter(e.target.value.slice(0, 1) || ",")} sx={{ width: 92 }} />
                  <SmallNumberField label="Chunk rows" value={chunkSize} onChange={setChunkSize} min="1000" step="1000" />
                  <SmallNumberField label="Sample rows" value={sampleRows} onChange={setSampleRows} min="100" step="100" />
                  <SmallNumberField label="Memory max MB" value={memoryMaxMB} onChange={setMemoryMaxMB} min="64" step="64" />
                  <SmallNumberField label="Memory max rows" value={memoryMaxRows} onChange={setMemoryMaxRows} min="0" step="10000" />
                </Stack>
                <Alert severity="info" sx={{ mt: 1 }}>
                  Storage上のTableはIn-memory化しなくても扱えます。標準はStorage-backed lazy readです。In-memoryは必要なTableだけを明示的にメモリへ載せる高速化オプションで、上限MB/行数で制御します。
                </Alert>
              </Section>
              <Section title="Memory Policy" icon={<Article />} hint="要件として固定する運用ルールです。">
                <KeyValue rows={[
                  ["In-memory OK", "現在ページ / プレビュー / RowRef / 集計結果 / 必要チャンク / 明示ロードしたMemory Dataset"],
                  ["In-memory NG", "自動で全Workspace全Table / 全列全行 / 未使用辞書 / 未使用チャンクを読むこと"],
                  ["Memory Accelerator", "選択TableだけWorkerメモリへ明示ロードして高速化。上限MB/行数を超えたら停止"],
                  ["Storage-backed View", "標準の横断方式。物理コピーせず、必要列・必要チャンクだけ読む"],
                  ["Phase 1", "同一スキーマTableのみ横断可能"],
                ]} />
              </Section>
              <Section title="Danger Zone" icon={<Delete />} hint="Storageの削除はData ManagementのStorage Navigatorから行います。">
                <Alert severity="warning">現在セッション破棄やStorage削除はDataタブのStorage Navigatorで実行してください。</Alert>
              </Section>
            </Box>
          )}
        </Container>
      </Box>
      </UiSettingsContext.Provider>
    </ThemeProvider>
  );
}

const root = createRoot(document.getElementById("root"));
root.render(
  <React.StrictMode>
    <App />
  </React.StrictMode>
);

  
  </script>

  <!-- React 19 / MUI 7.3.5 / Icons via CDN ESM -->
  <script type="module">
    import React from "https://esm.sh/react@19.2.0";
    import { createRoot } from "https://esm.sh/react-dom@19.2.0/client";
    import * as MaterialUI from "https://esm.sh/@mui/material@7.3.5?deps=react@19.2.0,react-dom@19.2.0";
    import UploadFile from "https://esm.sh/@mui/icons-material@7.3.5/UploadFile?deps=react@19.2.0,react-dom@19.2.0";
    import CloudUpload from "https://esm.sh/@mui/icons-material@7.3.5/CloudUpload?deps=react@19.2.0,react-dom@19.2.0";
    import FolderOpen from "https://esm.sh/@mui/icons-material@7.3.5/FolderOpen?deps=react@19.2.0,react-dom@19.2.0";
    import Analytics from "https://esm.sh/@mui/icons-material@7.3.5/Analytics?deps=react@19.2.0,react-dom@19.2.0";
    import Storage from "https://esm.sh/@mui/icons-material@7.3.5/Storage?deps=react@19.2.0,react-dom@19.2.0";
    import Search from "https://esm.sh/@mui/icons-material@7.3.5/Search?deps=react@19.2.0,react-dom@19.2.0";
    import TableChart from "https://esm.sh/@mui/icons-material@7.3.5/TableChart?deps=react@19.2.0,react-dom@19.2.0";
    import Timeline from "https://esm.sh/@mui/icons-material@7.3.5/Timeline?deps=react@19.2.0,react-dom@19.2.0";
    import Delete from "https://esm.sh/@mui/icons-material@7.3.5/Delete?deps=react@19.2.0,react-dom@19.2.0";
    import CleaningServices from "https://esm.sh/@mui/icons-material@7.3.5/CleaningServices?deps=react@19.2.0,react-dom@19.2.0";
    import Download from "https://esm.sh/@mui/icons-material@7.3.5/Download?deps=react@19.2.0,react-dom@19.2.0";
    import Send from "https://esm.sh/@mui/icons-material@7.3.5/Send?deps=react@19.2.0,react-dom@19.2.0";
    import Schema from "https://esm.sh/@mui/icons-material@7.3.5/Schema?deps=react@19.2.0,react-dom@19.2.0";
    import Article from "https://esm.sh/@mui/icons-material@7.3.5/Article?deps=react@19.2.0,react-dom@19.2.0";

    const MaterialIcons = {
      UploadFile,
      CloudUpload,
      FolderOpen,
      Analytics,
      Storage,
      Search,
      TableChart,
      Timeline,
      Delete,
      CleaningServices,
      Download,
      Send,
      Schema,
      Article,
    };

    const appCode = document.getElementById("app-code").textContent;

    const missingIcons = Object.entries(MaterialIcons)
      .filter(([, component]) => !component)
      .map(([name]) => name);
    if (missingIcons.length) {
      throw new Error(`Missing MUI icon imports: ${missingIcons.join(", ")}`);
    }

    const { code } = window.Babel.transform(appCode, {
      presets: [["react", { runtime: "classic" }]],
      sourceType: "script",
    });

    const runApp = new Function(
      "React",
      "createRoot",
      "MaterialUI",
      "MaterialIcons",
      code
    );

    runApp(React, createRoot, MaterialUI, MaterialIcons);
  </script>
</body>
