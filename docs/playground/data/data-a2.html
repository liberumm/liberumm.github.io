  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700&display=swap" />

<body>
  <div id="root"></div>

  <!-- Babel Standalone: JSX -> JS -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Heavy CSV/OPFS processing stays as a Worker. No JSX is needed inside the Worker. -->
  <script id="worker-code" type="text/plain">


let state = {
  file:null,
  encoding:"utf-8",
  delimiter:",",
  dataset:null,
  dir:null,
  manifest:null,
  schema:null,
  schemaFileKey:null,
  searchMatches:[],
  dataQueryMatches:null,
  dataQueryMeta:null,
  pivotTable:null,
  pivotTileIndex:null,
  timeTable:null,
  virtual:null,
  memory:null,
  remoteExecution:{enabled:false,endpoint:"",token:"",mode:"local-first",timeoutMs:120000,lastProbe:null},
  externalStorage:{enabled:false,provider:"custom-http",endpoint:"",authMode:"none",apiKey:"",prefix:"quantum_csv_grid_columnar",timeoutMs:120000,lastProbe:null},
  externalDataset:null,
  cancelled:false
};

function post(type, payload={}){ self.postMessage({type,...payload}); }
function now(){ return performance.now(); }
function fmt(n){ return Number(n || 0).toLocaleString(); }
let progressLastPostAt = 0;
let progressCurrentValue = 0;
function bytesLabel(pos,total){
  const mb = 1024 * 1024;
  if (!total) return `${fmt(pos)} bytes`;
  return `${fmt(Math.round(pos / mb))}/${fmt(Math.round(total / mb))} MB`;
}
function fileKey(file){ return file ? `${file.name}|${file.size}|${file.lastModified || 0}` : ""; }

function stableRulesKey(rules){
  return JSON.stringify({
    trim:!!rules.trim,
    nfkc:!!rules.nfkc,
    controls:!!rules.controls,
    collapse:!!rules.collapse,
    emptyNull:!!rules.emptyNull,
    numericSymbols:!!rules.numericSymbols,
    dedupSpaces:!!rules.dedupSpaces,
    skipBadRows:!!rules.skipBadRows,
    nullTokens:[...(rules.nullTokens || [])].map(String).sort(),
    numericThreshold:Number(rules.numericThreshold ?? 0.9)
  });
}
function schemaCacheKey(file, encoding, delimiter, rules){
  return JSON.stringify({
    file:fileKey(file),
    encoding:String(encoding || "utf-8"),
    delimiter:String(delimiter || ","),
    rules:stableRulesKey(rules || {})
  });
}
function postProgress(value, text, payload={}){
  const t = now();
  const v = Number.isFinite(Number(value)) ? Math.max(0, Math.min(100, Number(value))) : progressCurrentValue;
  progressCurrentValue = v;
  if (t - progressLastPostAt < 140 && v < 100 && v > 0) return;
  progressLastPostAt = t;
  post("PROGRESS", { value:v, text, ...payload });
}

const chunkColumnCache = {
  map: new Map(),
  bytes: 0,
  maxBytes: 128 * 1024 * 1024,
  maxEntries: 128,
  hits: 0,
  misses: 0,
  evictions: 0
};

function clearChunkCache(){
  chunkColumnCache.map.clear();
  chunkColumnCache.bytes = 0;
  chunkColumnCache.hits = 0;
  chunkColumnCache.misses = 0;
  chunkColumnCache.evictions = 0;
}

function estimateStringBytes(s){
  return typeof s === "string" ? s.length * 2 : 0;
}

function estimateColumnDataBytes(colData){
  if (!colData) return 0;
  if (colData.type === "number") return Number(colData.data?.byteLength || 0);
  let bytes = Number(colData.ids?.byteLength || 0);
  const dict = Array.isArray(colData.dict) ? colData.dict : [];
  for (let i=0; i<dict.length; i++) bytes += estimateStringBytes(dict[i]) + 8;
  return bytes;
}

function touchChunkCacheEntry(key, entry){
  chunkColumnCache.map.delete(key);
  entry.lastUsed = now();
  chunkColumnCache.map.set(key, entry);
  return entry.value;
}

function putChunkCacheEntry(key, value, bytes){
  const safeBytes = Math.max(0, Number(bytes || 0));
  if (safeBytes > chunkColumnCache.maxBytes) return value;
  if (chunkColumnCache.map.has(key)){
    const old = chunkColumnCache.map.get(key);
    chunkColumnCache.bytes -= Number(old.bytes || 0);
    chunkColumnCache.map.delete(key);
  }
  chunkColumnCache.map.set(key, {value, bytes:safeBytes, lastUsed:now()});
  chunkColumnCache.bytes += safeBytes;

  while (
    chunkColumnCache.map.size > chunkColumnCache.maxEntries ||
    chunkColumnCache.bytes > chunkColumnCache.maxBytes
  ){
    const firstKey = chunkColumnCache.map.keys().next().value;
    if (firstKey === undefined) break;
    const old = chunkColumnCache.map.get(firstKey);
    chunkColumnCache.bytes -= Number(old?.bytes || 0);
    chunkColumnCache.map.delete(firstKey);
    chunkColumnCache.evictions++;
  }
  return value;
}

function chunkCacheKey(datasetId, physicalChunkIndex, columnIndex, type){
  return `${datasetId || "active"}\u001f${physicalChunkIndex}\u001f${columnIndex}\u001f${type || ""}`;
}

function chunkCacheSnapshot(){
  return {
    entries: chunkColumnCache.map.size,
    mb: Math.round(chunkColumnCache.bytes / 1024 / 1024),
    hits: chunkColumnCache.hits,
    misses: chunkColumnCache.misses,
    evictions: chunkColumnCache.evictions
  };
}

function parseCSVLine(line, delimiter){
  if (line.endsWith("\r")) line = line.slice(0,-1);
  const out=[]; let cur="", inQuotes=false;
  for (let i=0;i<line.length;i++){
    const ch=line[i];
    if (ch === '"'){
      if (inQuotes && line[i+1] === '"'){ cur+='"'; i++; }
      else inQuotes=!inQuotes;
    } else if (ch === delimiter && !inQuotes){ out.push(cur); cur=""; }
    else cur+=ch;
  }
  out.push(cur);
  return out;
}

function cleanHeaderName(name, i, rules){
  let s = String(name ?? "");
  if (rules.nfkc) try{s=s.normalize("NFKC")}catch{}
  if (rules.trim) s=s.trim();
  if (rules.controls) s=s.replace(/[\u0000-\u001F\u007F]/g,"");
  if (rules.collapse) s=s.replace(/[\s\u3000]+/g," ");
  s = s.replace(/[\\/:*?"<>|#%&{}$!'@+`=]/g,"_");
  return s || `Column${i+1}`;
}

function uniqueNames(names){
  const seen=new Map();
  return names.map(n=>{
    const base=n || "Column";
    const c=seen.get(base)||0;
    seen.set(base,c+1);
    return c ? `${base}_${c+1}` : base;
  });
}

function makeRules(msg){
  const tokens = String(msg.nullTokens ?? "").split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  return {
    trim:!!msg.ruleTrim,
    nfkc:!!msg.ruleNfkc,
    controls:!!msg.ruleControls,
    collapse:!!msg.ruleCollapse,
    emptyNull:!!msg.ruleEmptyNull,
    numericSymbols:!!msg.ruleNumericSymbols,
    dedupSpaces:!!msg.ruleDedupSpaces,
    skipBadRows:!!msg.ruleSkipBadRows,
    nullTokens:tokens,
    numericThreshold:Number(msg.numericThreshold ?? 0.9)
  };
}

function cleanCell(raw, rules){
  let s = raw == null ? "" : String(raw);
  let changed = false;
  const before = s;
  if (rules.nfkc) { try{ const n=s.normalize("NFKC"); changed ||= n!==s; s=n; }catch{} }
  if (rules.controls) { const n=s.replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g,""); changed ||= n!==s; s=n; }
  if (rules.dedupSpaces) { const n=s.replace(/\u3000/g," "); changed ||= n!==s; s=n; }
  if (rules.trim) { const n=s.trim(); changed ||= n!==s; s=n; }
  if (rules.collapse) { const n=s.replace(/[ \t]+/g," "); changed ||= n!==s; s=n; }
  if (rules.emptyNull && s === "") return {value:null, changed: changed || before !== s, wasNull:true};
  if (rules.nullTokens.some(t => s.toLowerCase() === t.toLowerCase())) return {value:null, changed:true, wasNull:true};
  return {value:s, changed:changed || before !== s, wasNull:false};
}

function numberCandidate(value, rules){
  if (value == null) return {ok:false, value:NaN};
  let s = String(value).trim();
  if (!s) return {ok:false, value:NaN};
  if (rules.numericSymbols) {
    let pct = false;
    if (s.endsWith("%")) { pct = true; s = s.slice(0,-1); }
    s = s.replace(/[,\s]/g,"").replace(/[￥¥$€£]/g,"");
    s = s.replace(/[()]/g, m => m === "(" ? "-" : "");
    const n = Number(s);
    if (Number.isFinite(n)) return {ok:true, value:pct ? n/100 : n};
  }
  const n = Number(s);
  return Number.isFinite(n) ? {ok:true,value:n} : {ok:false,value:NaN};
}

async function* fileLines(file, encoding, start=0, progressLabel="", progressBase=0, progressSpan=100){
  const decoder = new TextDecoder(encoding);
  const chunkSize = 4 * 1024 * 1024;
  let pos=start;
  let record="";
  let inQuotes=false;
  let pendingQuote=false;

  function* consumeText(text){
    for (let i=0;i<text.length;i++){
      let ch=text[i];

      if (pendingQuote){
        if (inQuotes && ch === '"'){
          record += '""';
          pendingQuote = false;
          continue;
        }
        record += '"';
        inQuotes = !inQuotes;
        pendingQuote = false;
      }

      if (ch === '"'){
        pendingQuote = true;
        continue;
      }

      if (ch === "\n" && !inQuotes){
        yield record.replace(/\r$/,"");
        record="";
      } else {
        record += ch;
      }
    }
  }

  while(pos < file.size){
    if (state.cancelled) throw new Error("Cancelled");
    const end=Math.min(file.size,pos+chunkSize);
    const text=decoder.decode(await file.slice(pos,end).arrayBuffer(), {stream:end<file.size});
    pos=end;
    if (progressLabel){
      const pct = file.size ? Math.floor((pos / file.size) * 100) : 100;
      const value = Math.min(99, Math.floor(progressBase + (pct / 100) * progressSpan));
      postProgress(value, `${progressLabel}: ${bytesLabel(pos,file.size)} (${pct}%)`, {loadedBytes:pos,totalBytes:file.size,stage:progressLabel});
    }
    yield* consumeText(text);
  }

  const tail=decoder.decode();
  if (tail) yield* consumeText(tail);
  if (pendingQuote){
    record += '"';
    pendingQuote=false;
  }
  if (record.length) yield record.replace(/\r$/,"");
}

function opfsAvailable(){ return !!(self.navigator && navigator.storage && navigator.storage.getDirectory); }
async function rootDir(){
  if (!opfsAvailable()) throw new Error("OPFS is not available. Open this HTML via localhost if file:// is restricted.");
  const root=await navigator.storage.getDirectory();
  return await root.getDirectoryHandle("quantum_csv_grid_columnar", {create:true});
}
function safeId(text){
  return String(text || "dataset").normalize("NFKC").replace(/[\\/:*?"<>|#%&{}$!'@+`=\s]+/g,"_").replace(/_+/g,"_").slice(0,80) || "dataset";
}
function makeDatasetId(name){
  const stamp = new Date().toISOString().replace(/[-:.TZ]/g,"").slice(0,17);
  const rand = crypto.getRandomValues(new Uint32Array(1))[0].toString(36);
  return `${safeId(name)}_${stamp}_${rand}`;
}
function cleanMetaValue(text, fallback){
  const s=String(text || "").normalize("NFKC").trim();
  return s || fallback;
}
function manifestWorkspace(m){ return cleanMetaValue(m?.storageWorkspace || m?.workspace, "Default"); }
function manifestCollection(m){ return cleanMetaValue(m?.storageCollection || m?.collection, "General"); }
function manifestTableName(m){ return cleanMetaValue(m?.tableName || m?.name || m?.id, "Table"); }
function manifestPath(m){ return `${manifestWorkspace(m)} / ${manifestCollection(m)} / ${manifestTableName(m)}`; }
async function writeText(dir,name,text){ const h=await dir.getFileHandle(name,{create:true}); const w=await h.createWritable(); await w.write(text); await w.close(); }
async function readText(dir,name){ const h=await dir.getFileHandle(name); return await (await h.getFile()).text(); }
async function writeJson(dir,name,obj){ await writeText(dir,name,JSON.stringify(obj)); }
async function readJson(dir,name){ return JSON.parse(await readText(dir,name)); }
async function writeBuffer(dir,name,buffer){ const h=await dir.getFileHandle(name,{create:true}); const w=await h.createWritable(); await w.write(buffer); await w.close(); }
async function readBuffer(dir,name){ const h=await dir.getFileHandle(name); return await (await h.getFile()).arrayBuffer(); }

async function fileByteLength(dir,name){
  const h=await dir.getFileHandle(name);
  return Number((await h.getFile()).size || 0);
}

async function cleanupDatasetDir(root,id){
  try{ await root.removeEntry(id,{recursive:true}); }catch{}
}

function integrityFeatureFlags(base={}){
  return {
    ...(base || {}),
    columnStats:true,
    rowCountAddressing:true,
    quoteNewlineCSV:true,
    lruChunkCache:true,
    integrityCheck:true,
    repairLayer:true,
    queryPlan:true,
    predicatePushdown:true,
    chunkExecutionEngine:true,
    chunkWorkerPool:true,
    distributedAggregateReduce:true,
    remoteExecutionAdapter:true,
    browserExternalStorageAdapter:true
  };
}

function integritySummary(ok, issues=[], warnings=[], repairs=[]){
  return {
    ok:!!ok,
    checkedAt:new Date().toISOString(),
    issueCount:issues.length,
    warningCount:warnings.length,
    repairCount:repairs.length,
    issues:issues.slice(0,50),
    warnings:warnings.slice(0,50),
    repairs:repairs.slice(0,50)
  };
}

function issueText(e){ return e && e.message ? e.message : String(e || "Unknown error"); }
function expectedColumnBytes(rowCount,type){ return Number(rowCount || 0) * (type === "number" ? 8 : 4); }
function rowCountFromBytes(byteLength,type){
  const width = type === "number" ? 8 : 4;
  const n = Number(byteLength || 0);
  if (!Number.isFinite(n) || n < 0 || n % width !== 0) return null;
  return n / width;
}

async function readDictArray(chunkDir,col){
  const dict=await readJson(chunkDir,dictFileName(col.index));
  if (!Array.isArray(dict)) throw new Error(`Dictionary is not an array: ${dictFileName(col.index)}`);
  return dict;
}

async function rebuildColumnStatFromFiles(chunkDir,col,rowCount){
  const rc=Number(rowCount || 0);
  if (col.type === "number"){
    const buf=await readBuffer(chunkDir,colFileName(col.index,col.type));
    const arr=new Float64Array(buf);
    if (arr.length !== rc) throw new Error(`Number column row count mismatch for ${col.name || col.index}: ${arr.length} !== ${rc}`);
    let nulls=0, min=null, max=null;
    for (let i=0;i<arr.length;i++){
      const v=arr[i];
      if (!Number.isFinite(v)){ nulls++; continue; }
      min = min == null ? v : Math.min(min,v);
      max = max == null ? v : Math.max(max,v);
    }
    return makeColumnStatForMeta({type:"number", nulls, invalidNumbers:0, min, max}, rc);
  }

  const buf=await readBuffer(chunkDir,colFileName(col.index,col.type));
  const ids=new Int32Array(buf);
  if (ids.length !== rc) throw new Error(`String column row count mismatch for ${col.name || col.index}: ${ids.length} !== ${rc}`);
  const dict=await readDictArray(chunkDir,col);
  let nulls=0;
  for (let i=0;i<ids.length;i++){
    const id=ids[i];
    if (id < 0){ nulls++; continue; }
    if (id >= dict.length) throw new Error(`String dictionary id out of range in ${col.name || col.index}: ${id} >= ${dict.length}`);
  }
  return makeColumnStatForMeta({type:"string", nulls, distinct:dict.length}, rc, dict);
}

function isColumnStatUsable(stat,col,rowCount){
  if (!stat) return false;
  if ((stat.type || col.type) !== col.type) return false;
  if (Number(stat.rowCount ?? rowCount) !== Number(rowCount || 0)) return false;
  if (!Number.isFinite(Number(stat.nullCount ?? stat.nulls ?? 0))) return false;
  if (col.type === "number"){
    const nullCount=Number(stat.nullCount ?? stat.nulls ?? 0);
    if (nullCount < Number(rowCount || 0)){
      if (stat.min == null || stat.max == null) return false;
      if (!Number.isFinite(Number(stat.min)) || !Number.isFinite(Number(stat.max))) return false;
    }
  }
  return true;
}

async function validateAndRepairDatasetDir(id,dir,options={}){
  const repair = options.repair !== false;
  const rebuildStats = !!options.rebuildStats;
  const issues=[], warnings=[], repairs=[];
  let manifest, chunks;

  async function persistIntegrity(ok){
    const summary=integritySummary(ok,issues,warnings,repairs);
    if (repair){ try{ await writeJson(dir,"_integrity.json",summary); }catch{} }
    return summary;
  }

  try{ manifest=await readJson(dir,"manifest.json"); }
  catch(e){ issues.push(`manifest.json unreadable: ${issueText(e)}`); return {ok:false,issues,warnings,repairs,integrity:await persistIntegrity(false)}; }

  try{ chunks=await readJson(dir,"chunks.json"); }
  catch(e){ issues.push(`chunks.json unreadable: ${issueText(e)}`); return {ok:false,manifest,issues,warnings,repairs,integrity:await persistIntegrity(false)}; }

  if (!manifest || typeof manifest !== "object") issues.push("manifest.json is not an object");
  if (!Array.isArray(chunks)) issues.push("chunks.json is not an array");
  const columns=Array.isArray(manifest?.columns) ? manifest.columns : [];
  if (!columns.length) issues.push("manifest.columns is empty or missing");
  for (const col of columns){
    if (!Number.isFinite(Number(col.index))) issues.push(`column has invalid index: ${JSON.stringify(col)}`);
    if (col.type !== "number" && col.type !== "string") issues.push(`column has unsupported type: ${col.name || col.index}`);
  }
  if (issues.length) return {ok:false,manifest,chunks:Array.isArray(chunks)?chunks:[],issues,warnings,repairs,integrity:await persistIntegrity(false)};

  let changedManifest=false, changedChunks=false;
  if (manifest.id !== id){ manifest.id=id; changedManifest=true; repairs.push("manifest.id normalized to directory id"); }
  manifest.features=integrityFeatureFlags(manifest.features);
  if (Number(manifest.formatVersion || 0) < 5){ manifest.formatVersion=5; changedManifest=true; repairs.push("manifest.formatVersion upgraded to 5"); }

  const repairedChunks=[];
  let totalRows=0;

  for (let i=0;i<chunks.length;i++){
    let chunkDir;
    try{ chunkDir=await dir.getDirectoryHandle(`chunk_${String(i).padStart(6,"0")}`); }
    catch(e){ issues.push(`missing chunk directory chunk_${String(i).padStart(6,"0")}: ${issueText(e)}`); continue; }

    let diskMeta=null;
    try{ diskMeta=await readJson(chunkDir,"meta.json"); }
    catch(e){ warnings.push(`chunk ${i} meta.json unreadable; reconstructing from chunks.json/files: ${issueText(e)}`); }

    const originalMeta={...(chunks[i] || {}), ...(diskMeta || {})};
    const meta={...originalMeta};
    const inferred=[];
    const dictCache=new Map();

    for (const col of columns){
      try{
        const bytes=await fileByteLength(chunkDir,colFileName(col.index,col.type));
        const rc=rowCountFromBytes(bytes,col.type);
        if (rc == null){ issues.push(`chunk ${i} ${col.name || col.index} has invalid byte length ${bytes}`); continue; }
        inferred.push(rc);
        if (col.type === "string"){
          const dict=await readDictArray(chunkDir,col);
          dictCache.set(col.index,dict);
        }
      }catch(e){
        issues.push(`chunk ${i} column ${col.name || col.index} unreadable: ${issueText(e)}`);
      }
    }
    if (issues.length) continue;

    const uniqueCounts=[...new Set(inferred.map(Number))];
    if (uniqueCounts.length !== 1){
      issues.push(`chunk ${i} column row counts disagree: ${uniqueCounts.join(", ")}`);
      continue;
    }
    const rowCount=uniqueCounts[0];

    if (Number(meta.chunkIndex) !== i){ meta.chunkIndex=i; repairs.push(`chunk ${i} meta.chunkIndex repaired`); }
    if (Number(meta.rowCount || 0) !== rowCount){ meta.rowCount=rowCount; repairs.push(`chunk ${i} rowCount repaired to ${rowCount}`); }

    if (!Array.isArray(meta.stats)) meta.stats=[];
    if (!meta.columnStats || typeof meta.columnStats !== "object" || Array.isArray(meta.columnStats)) meta.columnStats={};

    for (const col of columns){
      const key=String(col.index);
      let raw=meta.columnStats[key] || meta.stats[col.index] || null;
      let stat=normalizeColumnStat(raw,rowCount);
      let mustRebuild=!isColumnStatUsable(stat,col,rowCount);
      if (col.type === "string" && rebuildStats && stat && !stat.lowerHashComplete && (dictCache.get(col.index)?.length || 0) <= 8192) mustRebuild=true;

      if (mustRebuild && rebuildStats){
        stat=await rebuildColumnStatFromFiles(chunkDir,col,rowCount);
        repairs.push(`chunk ${i} column ${col.name || col.index} statistics rebuilt`);
      }

      if (stat && isColumnStatUsable(stat,col,rowCount)){
        meta.columnStats[key]=stat;
      } else if (mustRebuild && !rebuildStats){
        warnings.push(`chunk ${i} column ${col.name || col.index} statistics need rebuild on open`);
      }
    }

    totalRows += rowCount;
    repairedChunks.push(meta);

    const metaChanged = JSON.stringify(meta) !== JSON.stringify(originalMeta);
    if (repair && metaChanged){
      await writeJson(chunkDir,"meta.json",meta);
      changedChunks=true;
    }
  }

  if (issues.length) return {ok:false,manifest,chunks:repairedChunks,issues,warnings,repairs,integrity:await persistIntegrity(false)};

  if (Number(manifest.chunks || 0) !== repairedChunks.length){ manifest.chunks=repairedChunks.length; changedManifest=true; repairs.push(`manifest.chunks repaired to ${repairedChunks.length}`); }
  if (Number(manifest.totalRows || 0) !== totalRows){ manifest.totalRows=totalRows; changedManifest=true; repairs.push(`manifest.totalRows repaired to ${totalRows}`); }
  if (!Number.isFinite(Number(manifest.sourceRows || 0)) || Number(manifest.sourceRows || 0) < totalRows){ manifest.sourceRows=Math.max(totalRows,Number(manifest.sourceRows || 0)); changedManifest=true; repairs.push("manifest.sourceRows normalized"); }

  const summary=integritySummary(true,issues,warnings,repairs);
  manifest.integrity=summary;
  changedManifest=true;

  if (repair){
    if (changedChunks || JSON.stringify(chunks) !== JSON.stringify(repairedChunks)) await writeJson(dir,"chunks.json",repairedChunks);
    if (changedManifest) await writeJson(dir,"manifest.json",manifest);
    await writeJson(dir,"_integrity.json",summary);
  }
  return {ok:true,manifest,chunks:repairedChunks,issues,warnings,repairs,integrity:summary};
}

async function loadValidatedDataset(id,options={}){
  const root=await rootDir();
  const dir=await root.getDirectoryHandle(id);
  const checked=await validateAndRepairDatasetDir(id,dir,{repair:true,rebuildStats:!!options.rebuildStats});
  if (!checked.ok){
    const msg=(checked.issues || []).slice(0,3).join(" / ") || "unknown integrity error";
    throw new Error(`Dataset integrity check failed for ${id}: ${msg}`);
  }
  return {id,dir,manifest:checked.manifest,chunks:checked.chunks,integrity:checked.integrity};
}

async function loadDatasetForWorkerReadOnly(id){
  const root=await rootDir();
  const dir=await root.getDirectoryHandle(id);
  const checked=await validateAndRepairDatasetDir(id,dir,{repair:false,rebuildStats:false});
  if (!checked.ok){
    const msg=(checked.issues || []).slice(0,3).join(" / ") || "unknown integrity error";
    throw new Error(`Worker Pool read-only integrity check failed for ${id}: ${msg}`);
  }
  return {id,dir,manifest:checked.manifest,chunks:checked.chunks,integrity:checked.integrity};
}

async function openVirtualDatasetForWorkerReadOnly(ids, name){
  clearChunkCache();
  const list=(Array.isArray(ids) ? ids : []).filter(Boolean);
  if (list.length < 2) throw new Error("Virtual worker pool requires at least two saved tables");
  const sources=[];
  for (const id of list) sources.push(await loadDatasetForWorkerReadOnly(id));
  const base=sources[0].manifest;
  const baseSig=schemaFullSignatureFromColumns(base.columns);
  for (const item of sources.slice(1)){
    const sig=schemaFullSignatureFromColumns(item.manifest.columns);
    if (sig !== baseSig) throw new Error(`Virtual worker pool blocked: ${item.manifest.name || item.id} has a different column name/type layout`);
  }

  let rowOffset=0;
  const globalChunks=[];
  const virtualSources=sources.map((item, sourceIndex)=>{
    const src={id:item.id,dir:item.dir,manifest:item.manifest,chunks:item.chunks,rowOffset,rows:Number(item.manifest.totalRows || 0)};
    for (let c=0; c<item.chunks.length; c++){
      const rowCount=Number(item.chunks[c]?.rowCount || 0);
      globalChunks.push({sourceIndex, sourceChunkIndex:c, rowStart:rowOffset, rowEnd:rowOffset + rowCount, rowCount, stats:item.chunks[c]?.stats, columnStats:item.chunks[c]?.columnStats, indexVersion:item.chunks[c]?.indexVersion});
      rowOffset += rowCount;
    }
    return src;
  });

  const tableName=cleanMetaValue(name || `virtual_${list.length}_tables`, `virtual_${list.length}_tables`);
  const manifest={
    ...base,
    id:`virtual:${list.join("+")}`,
    name:tableName,
    storageWorkspace:"Virtual",
    storageCollection:"Cross Workspace",
    tableName,
    storagePath:`Virtual / Cross Workspace / ${tableName}`,
    originalFileName:sources.map(x=>x.manifest.name || x.id).join(" + "),
    sourceDatasets:sources.map(x=>({id:x.id,workspace:manifestWorkspace(x.manifest),collection:manifestCollection(x.manifest),tableName:manifestTableName(x.manifest),name:x.manifest.name,rows:x.manifest.totalRows,chunks:x.manifest.chunks,createdAt:x.manifest.createdAt})),
    createdAt:new Date().toISOString(),
    mode:"virtual-dataset",
    totalRows:rowOffset,
    sourceRows:sources.reduce((a,x)=>a+Number(x.manifest.sourceRows || x.manifest.totalRows || 0),0),
    chunks:globalChunks.length,
    fileSize:sources.reduce((a,x)=>a+Number(x.manifest.fileSize || 0),0)
  };
  state.virtual={sources:virtualSources, globalChunks};
  state.memory=null;
  state.dir=null;
  state.manifest=manifest;
  state.dataset={id:manifest.id,manifest,chunks:globalChunks};
}

function colFileName(index, type){ return `col_${String(index).padStart(4,"0")}.${type === "number" ? "f64" : "i32"}.bin`; }
function dictFileName(index){ return `col_${String(index).padStart(4,"0")}.dict.json`; }


function hashString32(value){
  // FNV-1a 32-bit. Used only as a compact membership index for exact string equality skips.
  let h = 2166136261;
  const s = String(value ?? "").toLowerCase();
  for (let i=0;i<s.length;i++){
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function makeColumnStatForMeta(stat, rowCount, stringValues){
  const nullCount = Number(stat?.nulls ?? stat?.nullCount ?? 0);
  const base={
    type:stat?.type || "string",
    rowCount:Number(rowCount || 0),
    nullCount,
    nonNullCount:Math.max(0, Number(rowCount || 0) - nullCount),
    changedCells:Number(stat?.changedCells || 0)
  };
  if (base.type === "number"){
    return {
      ...base,
      invalidNumbers:Number(stat?.invalidNumbers || 0),
      min:stat?.min == null ? null : Number(stat.min),
      max:stat?.max == null ? null : Number(stat.max)
    };
  }
  const distinctCount = Array.isArray(stringValues) ? stringValues.length : Number(stat?.distinct ?? stat?.distinctCount ?? 0);
  const lowerHashLimit = 8192;
  const lowerHashComplete = Array.isArray(stringValues) && stringValues.length <= lowerHashLimit;
  const lowerHashes = lowerHashComplete
    ? [...new Set(stringValues.map(v => hashString32(v)))].sort((a,b)=>a-b)
    : undefined;
  return {
    ...base,
    distinctCount,
    lowerHashComplete,
    ...(lowerHashComplete ? {lowerHashes} : {})
  };
}

function normalizeColumnStat(raw, rowCount){
  if (!raw) return null;
  const type = raw.type || "string";
  const nullCount = Number(raw.nullCount ?? raw.nulls ?? 0);
  const base={
    type,
    rowCount:Number(raw.rowCount ?? rowCount ?? 0),
    nullCount,
    nonNullCount:Number(raw.nonNullCount ?? Math.max(0, Number(rowCount || raw.rowCount || 0) - nullCount)),
    changedCells:Number(raw.changedCells || 0)
  };
  if (type === "number"){
    return {
      ...base,
      invalidNumbers:Number(raw.invalidNumbers || 0),
      min:raw.min == null ? null : Number(raw.min),
      max:raw.max == null ? null : Number(raw.max)
    };
  }
  return {
    ...base,
    distinctCount:Number(raw.distinctCount ?? raw.distinct ?? 0),
    lowerHashComplete:!!raw.lowerHashComplete,
    lowerHashes:Array.isArray(raw.lowerHashes) ? raw.lowerHashes : null
  };
}

function chunkMetaForIndex(chunkIndex){
  if (activeIsMemory()) return state.dataset?.chunks?.[chunkIndex] || state.memory?.chunks?.[chunkIndex] || null;
  if (activeIsExternalStorage()) return state.externalDataset?.chunks?.[chunkIndex] || state.dataset?.chunks?.[chunkIndex] || null;
  if (activeIsVirtual()){
    const vc=state.virtual?.globalChunks?.[chunkIndex];
    const src=vc ? state.virtual.sources[vc.sourceIndex] : null;
    return src?.chunks?.[vc.sourceChunkIndex] || vc || null;
  }
  return state.dataset?.chunks?.[chunkIndex] || null;
}

function columnStatFromChunkMeta(meta, columnIndex){
  if (!meta) return null;
  const key=String(columnIndex);
  const raw = meta.columnStats?.[key] || meta.columnStats?.[columnIndex] || meta.stats?.[columnIndex] || null;
  return normalizeColumnStat(raw, meta.rowCount);
}

function arrayIncludesNumber(arr, value){
  if (!Array.isArray(arr)) return false;
  let lo=0, hi=arr.length-1;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    const mv=Number(arr[mid]);
    if (mv===value) return true;
    if (mv<value) lo=mid+1; else hi=mid-1;
  }
  return false;
}

function canSkipByNumberStat(stat, op, target){
  if (!stat || stat.type !== "number") return false;
  const rowCount=Number(stat.rowCount || 0);
  const nullCount=Number(stat.nullCount || 0);
  if (op === "isnull") return nullCount === 0;
  if (op === "notnull") return nullCount >= rowCount;
  const t=Number(target);
  if (!Number.isFinite(t)) return true;
  const min=stat.min == null ? null : Number(stat.min);
  const max=stat.max == null ? null : Number(stat.max);
  if (!Number.isFinite(min) || !Number.isFinite(max)) return true;
  if (op === "gt") return max <= t;
  if (op === "ge") return max < t;
  if (op === "lt") return min >= t;
  if (op === "le") return min > t;
  if (op === "eq") return t < min || t > max;
  if (op === "ne") return min === max && min === t && nullCount === 0;
  return false;
}

function canSkipByStringStat(stat, op, target){
  if (!stat || stat.type !== "string") return false;
  const rowCount=Number(stat.rowCount || 0);
  const nullCount=Number(stat.nullCount || 0);
  if (op === "isnull") return nullCount === 0;
  if (op === "notnull") return nullCount >= rowCount;
  if (op === "eq" && stat.lowerHashComplete && Array.isArray(stat.lowerHashes)){
    const h=hashString32(target);
    return !arrayIncludesNumber(stat.lowerHashes,h);
  }
  return false;
}

function canSkipByColumnStat(stat, op, target, type){
  if (!stat) return false;
  return (type === "number" || stat.type === "number")
    ? canSkipByNumberStat(stat, op, target)
    : canSkipByStringStat(stat, op, target);
}

function canSkipChunkByFilters(chunkIndex, filters){
  if (!filters || !filters.length) return false;
  const meta=chunkMetaForIndex(chunkIndex);
  for (const f of filters){
    const col=state.manifest.columns[f.columnIndex];
    const stat=columnStatFromChunkMeta(meta, f.columnIndex);
    if (canSkipByColumnStat(stat, f.op, f.value, col?.type)) return true;
  }
  return false;
}

function canSkipChunkForSearch(chunkIndex, columnIndex, op, value){
  const col=state.manifest.columns[columnIndex];
  const meta=chunkMetaForIndex(chunkIndex);
  const stat=columnStatFromChunkMeta(meta, columnIndex);
  return canSkipByColumnStat(stat, op, value, col?.type);
}

function canSkipChunkForTime(chunkIndex, timeField){
  const meta=chunkMetaForIndex(chunkIndex);
  const stat=columnStatFromChunkMeta(meta, timeField);
  return !!stat && Number(stat.rowCount || meta?.rowCount || 0) > 0 && Number(stat.nullCount || 0) >= Number(stat.rowCount || meta?.rowCount || 0);
}


const QUERY_PLAN_VERSION = 1;

function normalizeQueryOp(op, type){
  const raw=String(op || "contains").toLowerCase().trim();
  const aliases={
    "=":"eq", "==":"eq", "===":"eq",
    "!=" :"ne", "!==":"ne", "<>":"ne",
    ">":"gt", ">=":"ge", "<":"lt", "<=":"le",
    "is null":"isnull", "null":"isnull",
    "is not null":"notnull", "not null":"notnull"
  };
  const x=aliases[raw] || raw;
  if (["eq","ne","gt","ge","lt","le","contains","isnull","notnull"].includes(x)) return x;
  return type === "number" ? "eq" : "contains";
}

function normalizeProjection(columns){
  const set=new Set();
  for (const raw of Array.isArray(columns) ? columns : []){
    const idx=Number(raw);
    if (Number.isFinite(idx) && idx >= 0 && state.manifest?.columns?.[idx]) set.add(idx);
  }
  return [...set].sort((a,b)=>a-b);
}

function normalizeQueryPredicate(raw){
  const columnIndex=Number(raw?.columnIndex);
  const col=state.manifest?.columns?.[columnIndex];
  if (!Number.isFinite(columnIndex) || columnIndex < 0 || !col) return null;
  const op=normalizeQueryOp(raw?.op, col.type);
  return {
    columnIndex,
    columnName:col.name,
    type:col.type,
    op,
    value:raw?.value ?? "",
    source:raw?.source || "filter",
    rowLevel:raw?.rowLevel !== false,
    pushdown:raw?.pushdown !== false
  };
}

function buildQueryPlan({name="query", predicates=[], projection=[], sort=null, limit=0, pushdown=true}={}){
  const compiledPredicates=(Array.isArray(predicates) ? predicates : [])
    .map(normalizeQueryPredicate)
    .filter(Boolean);

  let sortSpec=null;
  const sortColumn = sort && sort.columnIndex !== "" && sort.columnIndex != null ? Number(sort.columnIndex) : -1;
  const sortCol=state.manifest?.columns?.[sortColumn];
  if (Number.isFinite(sortColumn) && sortColumn >= 0 && sortCol){
    sortSpec={
      columnIndex:sortColumn,
      columnName:sortCol.name,
      type:sortCol.type,
      direction:sort?.direction === "desc" ? "desc" : "asc"
    };
  }

  const required=new Set(normalizeProjection(projection));
  for (const p of compiledPredicates) required.add(p.columnIndex);
  if (sortSpec) required.add(sortSpec.columnIndex);

  return {
    version:QUERY_PLAN_VERSION,
    name,
    predicates:compiledPredicates,
    projection:normalizeProjection(projection),
    sort:sortSpec,
    requiredColumns:[...required].sort((a,b)=>a-b),
    limit:Number(limit || 0) > 0 ? Number(limit) : Number.POSITIVE_INFINITY,
    pushdown:!!pushdown
  };
}

function canSkipChunkByQueryPlan(chunkIndex, plan){
  if (!plan?.pushdown || !Array.isArray(plan.predicates) || !plan.predicates.length) return false;
  for (const p of plan.predicates){
    if (!p.pushdown) continue;
    const meta=chunkMetaForIndex(chunkIndex);
    const stat=columnStatFromChunkMeta(meta, p.columnIndex);
    if (canSkipByColumnStat(stat, p.op, p.value, p.type)) return true;
  }
  return false;
}

function rowMatchesQueryPlan(chunk, localRow, plan){
  if (!Array.isArray(plan?.predicates) || !plan.predicates.length) return true;
  for (const p of plan.predicates){
    if (!p.rowLevel) continue;
    const v=valueFromColumn(chunk.columns.get(p.columnIndex), localRow);
    if (!compareValue(v, p.op, p.value, p.type)) return false;
  }
  return true;
}

function queryPlanSummary(plan){
  return {
    version:plan?.version || QUERY_PLAN_VERSION,
    name:plan?.name || "query",
    predicates:(plan?.predicates || []).map(p=>({
      columnIndex:p.columnIndex,
      columnName:p.columnName,
      op:p.op,
      type:p.type,
      source:p.source,
      rowLevel:p.rowLevel,
      pushdown:p.pushdown
    })),
    sort:plan?.sort || null,
    aggregate:plan?.aggregate ? {
      type:plan.aggregate.type,
      mode:plan.aggregate.mode || null,
      countMode:!!plan.aggregate.countMode,
      distributedReduce:true
    } : null,
    requiredColumns:plan?.requiredColumns || [],
    predicatePushdown:!!plan?.pushdown,
    executionEngine:"chunk-v1",
    workerPoolReady:true,
    distributedAggregateReduce:!!plan?.aggregate
  };
}

const CHUNK_EXECUTION_ENGINE_VERSION = 1;

function executionTaskId(prefix="task"){
  const rand = crypto.getRandomValues(new Uint32Array(1))[0].toString(36);
  return `${prefix}_${Date.now().toString(36)}_${rand}`;
}

function activeChunkCount(){
  return Number(state.manifest?.chunks || state.dataset?.chunks?.length || 0);
}

function normalizePlanLimit(value){
  const n = Number(value);
  return Number.isFinite(n) && n > 0 ? n : Number.POSITIVE_INFINITY;
}

function selectChunksForPlan(plan){
  const total = activeChunkCount();
  const explicit = Array.isArray(plan?.chunks) ? plan.chunks : null;
  if (explicit && explicit.length){
    return [...new Set(explicit.map(Number).filter(i => Number.isFinite(i) && i >= 0 && i < total))].sort((a,b)=>a-b);
  }
  return Array.from({length:total}, (_,i)=>i);
}

function executionProgressText(label, ctx){
  return `${label}... ${ctx.position + 1}/${ctx.totalChunks} / skipped ${fmt(ctx.skippedChunks)} / rows ${fmt(ctx.scanned)} / matches ${fmt(ctx.matched)}`;
}

function sortPlanRows(sortable, sortSpec){
  if (!Array.isArray(sortable) || !sortSpec) return [];
  const sortDirection = sortSpec.direction === "desc" ? "desc" : "asc";
  const dir = sortDirection === "desc" ? -1 : 1;
  const type = sortSpec.type;
  return sortable.sort((a,b)=>{
    if (type === "number") {
      const an = Number(a.value), bn = Number(b.value);
      const av = Number.isFinite(an) ? an : (sortDirection === "desc" ? -Infinity : Infinity);
      const bv = Number.isFinite(bn) ? bn : (sortDirection === "desc" ? -Infinity : Infinity);
      return (av - bv) * dir || (a.rowId - b.rowId);
    }
    return String(a.value ?? "").localeCompare(String(b.value ?? ""), "ja", {numeric:true}) * dir || (a.rowId - b.rowId);
  });
}


const CHUNK_DISTRIBUTED_AGG_VERSION = 1;

function cloneAgg(a){
  return {
    count:Number(a?.count || 0),
    n:Number(a?.n || 0),
    sum:Number(a?.sum || 0),
    min:a?.min == null ? null : Number(a.min),
    max:a?.max == null ? null : Number(a.max)
  };
}

function mergeAggInto(target, source){
  if (!source) return target;
  target.count += Number(source.count || 0);
  target.n += Number(source.n || 0);
  target.sum += Number(source.sum || 0);
  const smin = source.min == null ? null : Number(source.min);
  const smax = source.max == null ? null : Number(source.max);
  if (Number.isFinite(smin)) target.min = target.min == null ? smin : Math.min(target.min, smin);
  if (Number.isFinite(smax)) target.max = target.max == null ? smax : Math.max(target.max, smax);
  return target;
}

function valuesFromSetLike(value){
  if (!value) return [];
  if (value instanceof Set) return [...value];
  if (Array.isArray(value)) return value;
  if (typeof value.values === "function") return [...value.values()];
  return [];
}

function entriesFromMapLike(value){
  if (!value) return [];
  if (value instanceof Map) return [...value.entries()];
  if (Array.isArray(value)) return value;
  if (typeof value.entries === "function") return [...value.entries()];
  if (typeof value === "object") return Object.entries(value);
  return [];
}

function ensureAggInMap(map, key){
  let a = map.get(key);
  if (!a){ a = makeAgg(); map.set(key, a); }
  return a;
}

function createChunkAggregateMetrics(aggregate){
  if (!aggregate) return {};
  if (aggregate.type === "pivot"){
    return {
      aggregateType:"pivot",
      rowKeys:new Set(),
      colKeys:new Set(),
      cells:new Map(),
      rowTotals:new Map(),
      colTotals:new Map(),
      grand:makeAgg(),
      limitHit:false
    };
  }
  if (aggregate.type === "timeSeries"){
    return {
      aggregateType:"timeSeries",
      states:new Map(),
      timeBucketSet:new Set(),
      invalidTime:0,
      limitHit:false
    };
  }
  return {aggregateType:String(aggregate.type || "unknown")};
}

function applyPivotAggregateRow(metrics, chunk, localRow, aggregate){
  const rowIdx = Array.isArray(aggregate.rowIdx) ? aggregate.rowIdx : [];
  const colIdx = Array.isArray(aggregate.colIdx) ? aggregate.colIdx : [];
  const valIdx = Number(aggregate.valIdx);
  const countMode = !!aggregate.countMode;
  const rk = keyOf(rowIdx.map(i => keyCellValue(valueFromColumn(chunk.columns.get(i), localRow))));
  const ck = keyOf(colIdx.map(i => keyCellValue(valueFromColumn(chunk.columns.get(i), localRow))));
  metrics.rowKeys.add(rk);
  metrics.colKeys.add(ck);
  const v = countMode ? "" : valueFromColumn(chunk.columns.get(valIdx), localRow);
  let rm = metrics.cells.get(rk);
  if (!rm){ rm = new Map(); metrics.cells.set(rk, rm); }
  addAgg(ensureAggInMap(rm, ck), v, countMode);
  addAgg(ensureAggInMap(metrics.rowTotals, rk), v, countMode);
  addAgg(ensureAggInMap(metrics.colTotals, ck), v, countMode);
  addAgg(metrics.grand, v, countMode);
}

function applyTimeSeriesAggregateRow(metrics, chunk, localRow, aggregate){
  const timeIdx = Number(aggregate.timeIdx);
  const groupIdx = Number(aggregate.groupIdx);
  const valIdx = Number(aggregate.valIdx);
  const hasGroup = !!aggregate.hasGroup;
  const countMode = !!aggregate.countMode;
  const bucketLimit = Math.max(1, Number(aggregate.bucketLimit || 5000));
  const rawTime = valueFromColumn(chunk.columns.get(timeIdx), localRow);
  const bucketKey = parseTimeBucket(rawTime, aggregate.bucket || "month");
  if (!bucketKey){ metrics.invalidTime++; return; }
  if (!metrics.timeBucketSet.has(bucketKey)){
    if (metrics.timeBucketSet.size >= bucketLimit){ metrics.limitHit = true; return; }
    metrics.timeBucketSet.add(bucketKey);
  }
  const groupKey = hasGroup ? keyCellValue(valueFromColumn(chunk.columns.get(groupIdx), localRow)) : "(All)";
  const key = JSON.stringify([bucketKey, groupKey]);
  const v = countMode ? "" : valueFromColumn(chunk.columns.get(valIdx), localRow);
  addAgg(ensureAggInMap(metrics.states, key), v, countMode);
}

function applyAggregateRowToPartial(partial, chunk, localRow, aggregate){
  if (!aggregate || !partial?.metrics) return;
  if (aggregate.type === "pivot") applyPivotAggregateRow(partial.metrics, chunk, localRow, aggregate);
  else if (aggregate.type === "timeSeries") applyTimeSeriesAggregateRow(partial.metrics, chunk, localRow, aggregate);
}

function mergePivotAggregatePartials(partials, {rowLimit, colLimit}={}){
  const rowKeys=[], colKeys=[], rowSet=new Set(), colSet=new Set();
  const cells=new Map(), rowTotals=new Map(), colTotals=new Map(), grand=makeAgg();
  let limitHit=false;
  const safeRowLimit=Math.max(1, Number(rowLimit || 1000000));
  const safeColLimit=Math.max(1, Number(colLimit || 10000));

  function includeRow(key){
    if (rowSet.has(key)) return true;
    if (rowKeys.length >= safeRowLimit){ limitHit=true; return false; }
    rowSet.add(key); rowKeys.push(key); return true;
  }
  function includeCol(key){
    if (colSet.has(key)) return true;
    if (colKeys.length >= safeColLimit){ limitHit=true; return false; }
    colSet.add(key); colKeys.push(key); return true;
  }

  for (const partial of Array.isArray(partials) ? partials : []){
    const m=partial?.metrics || {};
    if (m.limitHit) limitHit=true;
    const cellEntries=entriesFromMapLike(m.cells);
    if (cellEntries.length){
      for (const [rk, rawCols] of cellEntries){
        if (!includeRow(String(rk))) continue;
        for (const [ck, rawAgg] of entriesFromMapLike(rawCols)){
          if (!includeCol(String(ck))) continue;
          const agg=cloneAgg(rawAgg);
          let rm=cells.get(String(rk));
          if (!rm){ rm=new Map(); cells.set(String(rk),rm); }
          mergeAggInto(ensureAggInMap(rm, String(ck)), agg);
          mergeAggInto(ensureAggInMap(rowTotals, String(rk)), agg);
          mergeAggInto(ensureAggInMap(colTotals, String(ck)), agg);
          mergeAggInto(grand, agg);
        }
      }
    } else {
      // Backward-compatible fallback for partials that only contain totals.
      for (const rk of valuesFromSetLike(m.rowKeys)) includeRow(String(rk));
      for (const ck of valuesFromSetLike(m.colKeys)) includeCol(String(ck));
    }
  }

  rowKeys.sort();
  colKeys.sort();
  return {rowKeys, colKeys, cells, rowTotals, colTotals, grand, limitHit};
}

function mergeTimeSeriesAggregatePartials(partials, {bucketLimit}={}){
  const states=new Map();
  const timeBucketSet=new Set();
  const safeBucketLimit=Math.max(1, Number(bucketLimit || 5000));
  let invalidTime=0, limitHit=false;

  for (const partial of Array.isArray(partials) ? partials : []){
    const m=partial?.metrics || {};
    invalidTime += Number(m.invalidTime || 0);
    if (m.limitHit) limitHit=true;
    for (const [key, rawAgg] of entriesFromMapLike(m.states)){
      let bucketKey="", groupKey="";
      try { [bucketKey, groupKey] = JSON.parse(key); } catch { [bucketKey, groupKey] = String(key).split("\u001f"); }
      if (!timeBucketSet.has(bucketKey)){
        if (timeBucketSet.size >= safeBucketLimit){ limitHit=true; continue; }
        timeBucketSet.add(bucketKey);
      }
      mergeAggInto(ensureAggInMap(states, String(key)), cloneAgg(rawAgg));
    }
  }

  return {states, timeBucketSet, invalidTime, limitHit};
}

async function executeChunkExecutionPlan(plan, options={}){
  const taskId = options.taskId || executionTaskId(plan?.name || "query");
  const chunks = selectChunksForPlan(plan);
  const collectRows = !!options.collectRows;
  const collectSort = !!options.collectSort && !!plan?.sort;
  const collectAggregate = !!plan?.aggregate;
  const collectPartials = !!options.collectPartials || collectAggregate;
  const limit = normalizePlanLimit(options.limit ?? plan?.limit);
  const progressLabel = options.progressLabel || plan?.name || "Executing chunks";
  const progressEvery = Math.max(1, Number(options.progressEvery || 5));
  const progress = options.progress !== false;
  const refs = [];
  const sortable = [];
  const partials = [];
  const t0 = now();
  let skippedChunks = 0, scanned = 0, matched = 0, stoppedByLimit = false;

  const totalChunks = chunks.length;
  if (!totalChunks){
    return {
      taskId, engineVersion:CHUNK_EXECUTION_ENGINE_VERSION, chunks, refs, sortable, partials,
      scanned, matched, skippedChunks, capped:false, ms:now()-t0, queryPlan:queryPlanSummary(plan)
    };
  }

  outer:
  for (let position=0; position<chunks.length; position++){
    if (state.cancelled) throw new Error("Cancelled");
    const chunkIndex = chunks[position];
    const ctxBase = () => ({
      taskId, plan, chunkIndex, position, totalChunks, scanned, matched, skippedChunks, refs, sortable, partials
    });

    if (canSkipChunkByQueryPlan(chunkIndex, plan)){
      skippedChunks++;
      if (progress && (position % progressEvery === 0 || position === chunks.length - 1)){
        const ctx=ctxBase();
        post("PROGRESS",{
          value:Math.floor(((position + 1) / totalChunks) * 100),
          text:typeof options.progressText === "function" ? options.progressText(ctx) : executionProgressText(progressLabel, ctx)
        });
      }
      continue;
    }

    const chunk = await readChunkColumns(chunkIndex, plan?.requiredColumns || []);
    const base = chunkBaseRow(chunkIndex);
    const partial = {taskId, chunkIndex, rowStart:base, rowCount:chunk.rowCount, scanned:0, matched:0, refs:[], sortable:[], metrics:createChunkAggregateMetrics(plan?.aggregate)};

    if (typeof options.onChunkStart === "function") await options.onChunkStart({...ctxBase(), chunk, base, partial});

    for (let localRow=0; localRow<chunk.rowCount; localRow++){
      scanned++;
      partial.scanned++;
      if (!rowMatchesQueryPlan(chunk, localRow, plan)) continue;
      matched++;
      partial.matched++;
      const rowId = base + localRow;

      if (collectSort){
        const value = valueFromColumn(chunk.columns.get(plan.sort.columnIndex), localRow);
        const item = {rowId, value};
        sortable.push(item);
        partial.sortable.push(item);
      } else if (collectRows){
        refs.push(rowId);
        partial.refs.push(rowId);
      }

      if (collectAggregate) applyAggregateRowToPartial(partial, chunk, localRow, plan.aggregate);

      if (typeof options.onMatch === "function"){
        const signal = await options.onMatch({...ctxBase(), chunk, base, localRow, rowId, partial});
        if (signal === "stop"){
          stoppedByLimit = true;
          break outer;
        }
      }

      if (!collectSort && collectRows && refs.length >= limit){
        stoppedByLimit = true;
        break outer;
      }
    }

    if (typeof options.onChunkEnd === "function") await options.onChunkEnd({...ctxBase(), chunk, base, partial});
    if (collectPartials) partials.push(partial);

    if (progress && (position % progressEvery === 0 || position === chunks.length - 1)){
      const ctx=ctxBase();
      post("PROGRESS",{
        value:Math.floor(((position + 1) / totalChunks) * 100),
        text:typeof options.progressText === "function" ? options.progressText(ctx) : executionProgressText(progressLabel, ctx)
      });
    }
  }

  return {
    taskId,
    engineVersion:CHUNK_EXECUTION_ENGINE_VERSION,
    chunks,
    refs,
    sortable,
    partials,
    scanned,
    matched,
    skippedChunks,
    capped:stoppedByLimit,
    ms:now()-t0,
    queryPlan:queryPlanSummary(plan)
  };
}


const REMOTE_EXECUTION_ADAPTER_VERSION = 1;

function normalizeRemoteExecutionConfig(config={}){
  const endpoint=String(config.endpoint || "").trim();
  const mode=["off","local-first","remote-first","remote-only"].includes(config.mode) ? config.mode : (config.enabled ? "remote-first" : "off");
  return {
    enabled:!!config.enabled && !!endpoint && mode !== "off",
    endpoint,
    token:String(config.token || ""),
    mode,
    timeoutMs:Math.max(5000, Math.min(15 * 60 * 1000, Number(config.timeoutMs || 120000))),
    lastProbe:config.lastProbe || null
  };
}

function configureRemoteExecution(config={}){
  state.remoteExecution=normalizeRemoteExecutionConfig(config);
  return remoteExecutionStatus();
}

function remoteExecutionStatus(extra={}){
  const cfg=state.remoteExecution || {};
  return {
    remoteExecutionAdapterVersion:REMOTE_EXECUTION_ADAPTER_VERSION,
    enabled:!!cfg.enabled,
    endpoint:cfg.endpoint || "",
    mode:cfg.mode || "off",
    timeoutMs:Number(cfg.timeoutMs || 120000),
    lastProbe:cfg.lastProbe || null,
    ...extra
  };
}

function canUseRemoteExecution(plan, options={}, chunks=[]){
  const cfg=state.remoteExecution || {};
  if (!cfg.enabled || !cfg.endpoint || cfg.mode === "off") return false;
  if (options.remote === false) return false;
  if (activeIsMemory()) return false;
  if (activeIsExternalStorage()) return false;
  if (!Array.isArray(chunks) || !chunks.length) return false;
  if (typeof fetch !== "function" || typeof AbortController === "undefined") return false;
  if (!(options.collectRows || options.collectSort || options.collectPartials || plan?.aggregate)) return false;
  const context=chunkExecutionContextSnapshot();
  // OPFS-backed storage cannot be read by an arbitrary server. The remote endpoint must either
  // understand this context or return {fallback:true}. This adapter keeps the local path intact.
  if (context.mode !== "storage" && context.mode !== "virtual") return false;
  return true;
}

function serializableRemoteExecutionRequest(plan, options={}, chunks=[]){
  return {
    protocol:"quantum-csv-grid.remote-execution.v1",
    adapterVersion:REMOTE_EXECUTION_ADAPTER_VERSION,
    requestId:options.taskId || executionTaskId(`${plan?.name || "query"}_remote`),
    createdAt:new Date().toISOString(),
    context:chunkExecutionContextSnapshot(),
    plan:{...plan,chunks,limit:Number.isFinite(Number(plan?.limit)) ? Number(plan.limit) : null},
    options:{
      collectRows:!!options.collectRows,
      collectSort:!!options.collectSort,
      collectPartials:!!options.collectPartials || !!plan?.aggregate,
      limit:Number.isFinite(Number(options.limit ?? plan?.limit)) ? Number(options.limit ?? plan?.limit) : null,
      progress:false
    }
  };
}

async function fetchJsonWithTimeout(url, payload, {token="", timeoutMs=120000}={}){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(new Error("Remote execution timeout")), timeoutMs);
  try{
    const res=await fetch(url,{
      method:"POST",
      headers:{
        "content-type":"application/json",
        ...(token ? {"authorization":`Bearer ${token}`} : {})
      },
      body:JSON.stringify(payload),
      signal:controller.signal
    });
    const text=await res.text();
    let data=null;
    try{ data=text ? JSON.parse(text) : null; }catch{ data={raw:text}; }
    if (!res.ok) throw new Error(data?.message || data?.error || `Remote execution HTTP ${res.status}`);
    return data;
  }finally{
    clearTimeout(timer);
  }
}

function normalizeRemoteExecutionResult(plan, options, chunks, response, t0){
  if (!response || response.fallback) throw new Error(response?.message || "Remote executor requested local fallback");
  const result=response.result || response;
  const refs=Array.isArray(result.refs) ? result.refs : [];
  const sortable=Array.isArray(result.sortable) ? result.sortable : [];
  const partials=Array.isArray(result.partials) ? result.partials : [];
  return {
    taskId:result.taskId || response.requestId || options.taskId || executionTaskId(`${plan?.name || "query"}_remote`),
    engineVersion:CHUNK_EXECUTION_ENGINE_VERSION,
    remoteExecutionAdapterVersion:REMOTE_EXECUTION_ADAPTER_VERSION,
    executionMode:"remote-execution",
    remoteEndpoint:state.remoteExecution?.endpoint || "",
    chunks:Array.isArray(result.chunks) ? result.chunks : chunks,
    refs,
    sortable,
    partials,
    scanned:Number(result.scanned || 0),
    matched:Number(result.matched || refs.length || sortable.length || 0),
    skippedChunks:Number(result.skippedChunks || 0),
    capped:!!result.capped,
    ms:Number(result.ms || (now()-t0)),
    queryPlan:{...queryPlanSummary(plan), executionEngine:"remote-v1", remoteExecution:{version:REMOTE_EXECUTION_ADAPTER_VERSION, endpoint:state.remoteExecution?.endpoint || ""}}
  };
}

async function probeRemoteExecution(config={}){
  const merged=normalizeRemoteExecutionConfig({...state.remoteExecution,...config,enabled:true});
  if (!merged.endpoint) throw new Error("Remote execution endpoint is empty");
  const t0=now();
  const response=await fetchJsonWithTimeout(merged.endpoint,{protocol:"quantum-csv-grid.remote-execution.v1",type:"PING",createdAt:new Date().toISOString()},{token:merged.token,timeoutMs:Math.min(merged.timeoutMs,15000)});
  state.remoteExecution={...merged,lastProbe:{ok:true,checkedAt:new Date().toISOString(),ms:Math.round(now()-t0),response}};
  return remoteExecutionStatus({probe:response});
}

async function executeChunkExecutionPlanRemote(plan, options={}, chunks=null){
  const selected=chunks || selectChunksForPlan(plan);
  const cfg=state.remoteExecution || {};
  const t0=now();
  const request=serializableRemoteExecutionRequest(plan, options, selected);
  post("PROGRESS",{value:1,text:`${options.progressLabel || plan?.name || "Executing chunks"} with Remote Execution... chunks ${fmt(selected.length)}`});
  const response=await fetchJsonWithTimeout(cfg.endpoint,request,{token:cfg.token,timeoutMs:cfg.timeoutMs});
  const result=normalizeRemoteExecutionResult(plan,{...options,taskId:request.requestId},selected,response,t0);
  post("PROGRESS",{value:100,text:`Remote Execution complete... chunks ${fmt(selected.length)} / rows ${fmt(result.scanned)} / matches ${fmt(result.matched)}`});
  return result;
}

function normalizeExternalStorageConfig(config={}){

function configureExternalStorage(config={}){

function externalStorageStatus(extra={}){

function externalStorageHeaders(contentType=""){
  const cfg=state.externalStorage || {};
  const headers={};
  if (contentType) headers["content-type"]=contentType;
  if (cfg.authMode === "bearer" && cfg.apiKey) headers["authorization"]=`Bearer ${cfg.apiKey}`;

function encodeExternalPath(path){
  return String(path || "").split("/").filter(Boolean).map(encodeURIComponent).join("/");
}

function externalDatasetBasePath(id){
  return `${normalizeExternalStoragePrefix(state.externalStorage?.prefix)}/datasets/${safeId(id)}`;
}

function externalUrlForFile(path){
  const endpoint=String(state.externalStorage?.endpoint || "").replace(/\/+$/g, "");
  if (!endpoint) throw new Error("External Storage endpoint is empty");
  return `${endpoint}/files/${encodeExternalPath(path)}`;

function externalUrlForList(prefix){
  const endpoint=String(state.externalStorage?.endpoint || "").replace(/\/+$/g, "");
  if (!endpoint) throw new Error("External Storage endpoint is empty");
  return `${endpoint}/list?prefix=${encodeURIComponent(String(prefix || ""))}`;

async function externalFetch(url, init={}, timeoutMs){
  if (!state.externalStorage?.enabled) throw new Error("External Storage is not connected");
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(new Error("External Storage request timeout")), Number(timeoutMs || state.externalStorage.timeoutMs || 120000));
  try{
    const res=await fetch(url,{...init, signal:controller.signal});
    if (!res.ok){
      let message=`External Storage HTTP ${res.status}`;
      try{ const text=await res.text(); if (text) message += `: ${text.slice(0,300)}`; }catch{}
      throw new Error(message);
    }
    return res;
  }finally{
    clearTimeout(timer);
  }
}

async function externalReadText(path){
  const res=await externalFetch(externalUrlForFile(path),{method:"GET",headers:externalStorageHeaders()}, state.externalStorage?.timeoutMs);
  return await res.text();
}
async function externalReadJson(path){ return JSON.parse(await externalReadText(path)); }
async function externalReadBuffer(path){
  const res=await externalFetch(externalUrlForFile(path),{method:"GET",headers:externalStorageHeaders()}, state.externalStorage?.timeoutMs);
  return await res.arrayBuffer();
}
async function externalWriteText(path, text){
  await externalFetch(externalUrlForFile(path),{method:"PUT",headers:externalStorageHeaders("application/json; charset=utf-8"),body:String(text ?? "")}, state.externalStorage?.timeoutMs);
}
async function externalWriteJson(path, obj){ await externalWriteText(path, JSON.stringify(obj)); }
async function externalWriteBuffer(path, buffer){
  await externalFetch(externalUrlForFile(path),{method:"PUT",headers:externalStorageHeaders("application/octet-stream"),body:buffer}, state.externalStorage?.timeoutMs);
}

function parseExternalListPayload(payload){
  const raw=Array.isArray(payload) ? payload : (payload?.paths || payload?.items || payload?.objects || payload?.keys || []);
  return raw.map((item)=> typeof item === "string" ? item : (item?.path || item?.key || item?.name || item?.url || "")).map(String).filter(Boolean);
}

async function externalListPaths(prefix){
  const res=await externalFetch(externalUrlForList(prefix),{method:"GET",headers:externalStorageHeaders()}, state.externalStorage?.timeoutMs);
  const text=await res.text();
  if (!text) return [];
  let payload;
  try{ payload=JSON.parse(text); }catch{ return text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean); }
  return parseExternalListPayload(payload);

function externalDatasetIdFromManifestPath(path){
  const prefix=`${normalizeExternalStoragePrefix(state.externalStorage?.prefix)}/datasets/`;
  const s=String(path || "");
  if (!s.startsWith(prefix) || !s.endsWith("/manifest.json")) return "";
  return s.slice(prefix.length, -"/manifest.json".length).split("/")[0] || "";

async function testExternalStorage(config={}){
  configureExternalStorage({...state.externalStorage,...config,enabled:true});
  const t0=now();
  const prefix=`${normalizeExternalStoragePrefix(state.externalStorage.prefix)}/datasets/`;
  try{

    state.externalStorage.lastProbe={ok:true,checkedAt:new Date().toISOString(),ms:Math.round(now()-t0),count:paths.length};
