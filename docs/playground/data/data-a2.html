// ===== Common Tile Table Engine =====
// 1ファイル構成を維持しつつ、通常の行テーブル表示をこの共通基盤へ集約する。
// DataTable / GraphQueryVirtualTable は薄いAdapterになり、行・列virtual、列幅調整、選択、lazy読込を共通化する。
const TILE_TABLE_MAX_SCROLL_PX = 12000000;
const TILE_TABLE_OVERSCAN_ROWS = 12;
const TILE_TABLE_OVERSCAN_COL_PX = 420;

function defaultTileColumnWidth(index, minColumnWidth = 150) {
  if (index === 0) return Math.max(96, Number(minColumnWidth || 150));
  return Math.max(72, Number(minColumnWidth || 150));
}

function clampTileColumnWidth(width, fallback = 150) {
  return Math.max(56, Math.min(1600, Math.round(Number(width) || fallback || 150)));
}

function normalizeTileCell(value) {
  if (value == null) return "";
  if (typeof value === "object") {
    try { return JSON.stringify(value); } catch { return String(value); }
  }
  return String(value);
}

function useTileColumnWidths(header, tableId, minColumnWidth = 150) {
  const headerKey = useMemo(() => (header || []).join("\u001f"), [header]);
  const [columnWidths, setColumnWidths] = useState({});
  const resizeRef = useRef(null);

  useEffect(() => {
    setColumnWidths({});
  }, [headerKey, tableId]);

  useEffect(() => {
    return () => {
      const state = resizeRef.current;
      if (!state) return;
      window.removeEventListener("mousemove", state.onMove);
      window.removeEventListener("mouseup", state.onUp);
      window.removeEventListener("touchmove", state.onMove);
      window.removeEventListener("touchend", state.onUp);
      resizeRef.current = null;
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    };
  }, []);

  const getColumnWidth = useCallback((index) => {
    const value = Number(columnWidths[index]);
    return Number.isFinite(value) && value > 0 ? value : defaultTileColumnWidth(index, minColumnWidth);
  }, [columnWidths, minColumnWidth]);

  const setColumnWidth = useCallback((index, width) => {
    const fallback = defaultTileColumnWidth(index, minColumnWidth);
    const nextWidth = clampTileColumnWidth(width, fallback);
    setColumnWidths((prev) => ({ ...prev, [index]: nextWidth }));
  }, [minColumnWidth]);

  const resetColumnWidth = useCallback((index) => {
    setColumnWidths((prev) => {
      const next = { ...prev };
      delete next[index];
      return next;
    });
  }, []);

  const clearColumnWidths = useCallback(() => setColumnWidths({}), []);

  const clientXOf = (event) => event.touches?.[0]?.clientX ?? event.clientX ?? 0;

  const startColumnResize = useCallback((event, index) => {
    event.preventDefault();
    event.stopPropagation();
    const startX = clientXOf(event);
    const startWidth = getColumnWidth(index);
    const onMove = (moveEvent) => {
      moveEvent.preventDefault?.();
      setColumnWidth(index, startWidth + clientXOf(moveEvent) - startX);
    };
    const onUp = () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
      resizeRef.current = null;
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    };
    resizeRef.current = { onMove, onUp };
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
  }, [getColumnWidth, setColumnWidth]);

  const handleResizerKeyDown = useCallback((event, index) => {
    if (event.key === "ArrowLeft") { event.preventDefault(); setColumnWidth(index, getColumnWidth(index) - (event.shiftKey ? 40 : 12)); }
    if (event.key === "ArrowRight") { event.preventDefault(); setColumnWidth(index, getColumnWidth(index) + (event.shiftKey ? 40 : 12)); }
    if (event.key === "Home") { event.preventDefault(); setColumnWidth(index, 56); }
    if (event.key === "End") { event.preventDefault(); setColumnWidth(index, 420); }
    if (["Enter", "Backspace", "Delete"].includes(event.key)) { event.preventDefault(); resetColumnWidth(index); }
  }, [getColumnWidth, resetColumnWidth, setColumnWidth]);

  return { columnWidths, getColumnWidth, setColumnWidth, resetColumnWidth, clearColumnWidths, startColumnResize, handleResizerKeyDown };
}

function useTileViewport(ref) {
  const [size, setSize] = useState({ width: 900, height: 420 });
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const update = () => setSize({ width: Math.max(240, el.clientWidth || 900), height: Math.max(120, el.clientHeight || 420) });
    update();
    if (typeof ResizeObserver === "undefined") {
      window.addEventListener("resize", update);
      return () => window.removeEventListener("resize", update);
    }
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, [ref]);
  return size;
}

function CommonTileTableView({
  tableId = "tileTable",
  header = [],
  rows = [],
  height = 520,
  dense = false,
  filterable = true,
  sortable = true,
  minColumnWidth = 150,
  showRowNumber = false,
  rowNumberOffset = 0,
  emptyMessage = "表示するデータがありません",
  externalLazy = false,
  totalRows = null,
  loadedStart = 0,
  page = 1,
  pageSize = 1000,
  onReadPage = null,
  statusLabel = "",
  sourceLabel = "TileTable",
}) {
  const baseHeader = Array.isArray(header) ? header : [];
  const baseRows = Array.isArray(rows) ? rows : [];
  const rowHeight = dense ? 28 : 34;
  const filterHeight = filterable && !externalLazy ? (dense ? 36 : 42) : 0;
  const headerHeight = dense ? 34 : 40;
  const stickyHeight = filterHeight + headerHeight;
  const scrollRef = useRef(null);
  const rafRef = useRef(0);
  const requestRef = useRef({ page: Number(page || 1), at: 0 });
  const viewport = useTileViewport(scrollRef);
  const [scroll, setScroll] = useState({ top: 0, left: 0 });
  const [sort, setSort] = useState({ index: -1, direction: "asc" });
  const [filters, setFilters] = useState({});
  const [selectedAbsRow, setSelectedAbsRow] = useState(-1);

  const displayHeader = useMemo(() => showRowNumber ? ["#", ...baseHeader] : baseHeader, [baseHeader, showRowNumber]);
  const headerKey = useMemo(() => displayHeader.join("\u001f"), [displayHeader]);
  const { columnWidths, getColumnWidth, resetColumnWidth, clearColumnWidths, startColumnResize, handleResizerKeyDown } = useTileColumnWidths(displayHeader, tableId, minColumnWidth);

  useEffect(() => {
    setSort({ index: -1, direction: "asc" });
    setFilters({});
    setSelectedAbsRow(-1);
  }, [headerKey, tableId]);

  useEffect(() => {
    requestRef.current.page = Number(page || 1);
  }, [page]);

  useEffect(() => () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
  }, []);

  const decoratedRows = useMemo(() => {
    if (!showRowNumber) return baseRows;
    const offset = Number(rowNumberOffset || 0);
    const start = Number(loadedStart || 0);
    return baseRows.map((row, index) => [start + index + offset + 1, ...(Array.isArray(row) ? row : [])]);
  }, [baseRows, showRowNumber, rowNumberOffset, loadedStart]);

  const processedRows = useMemo(() => {
    if (externalLazy) return decoratedRows;
    let next = decoratedRows;
    const activeFilters = Object.entries(filters).filter(([, value]) => String(value || "").trim() !== "");
    if (activeFilters.length) {
      next = next.filter((row) => activeFilters.every(([index, value]) => {
        const q = String(value || "").toLowerCase();
        return normalizeTileCell(row?.[Number(index)]).toLowerCase().includes(q);
      }));
    }
    if (sort.index >= 0) {
      const dir = sort.direction === "desc" ? -1 : 1;
      next = [...next].sort((a, b) => {
        const av = a?.[sort.index];
        const bv = b?.[sort.index];
        const an = Number(av);
        const bn = Number(bv);
        if (Number.isFinite(an) && Number.isFinite(bn)) return (an - bn) * dir;
        return normalizeTileCell(av).localeCompare(normalizeTileCell(bv), "ja", { numeric: true }) * dir;
      });
    }
    return next;
  }, [decoratedRows, externalLazy, filters, sort]);

  const safeTotal = Math.max(0, Number(totalRows == null ? processedRows.length : totalRows) || 0, externalLazy ? baseRows.length : 0);
  const safePageSize = Math.max(1, Number(pageSize || 1000) || 1000);
  const totalPages = Math.max(1, Math.ceil(Math.max(1, safeTotal) / safePageSize));
  const safeLoadedStart = externalLazy ? Math.max(0, Number(loadedStart || 0) || 0) : 0;

  useEffect(() => {
    if (!externalLazy || !displayHeader.length || !safeTotal || baseRows.length) return;
    const t = performance.now();
    if (t - requestRef.current.at < 120) return;
    requestRef.current = { page: Math.max(1, Number(page || 1)), at: t };
    onReadPage?.(Math.max(1, Number(page || 1)));
  }, [externalLazy, displayHeader.length, safeTotal, baseRows.length, page, onReadPage]);

  const widths = useMemo(() => displayHeader.map((_, i) => getColumnWidth(i)), [displayHeader, getColumnWidth, columnWidths]);
  const prefix = useMemo(() => {
    const out = [];
    let x = 0;
    for (const w of widths) { out.push(x); x += w; }
    out.total = x;
    return out;
  }, [widths]);
  const totalWidth = Math.max(720, Number(prefix.total || 0));
  const bodyViewportHeight = Math.max(120, Number(height || 520) - stickyHeight);
  const logicalContentHeight = Math.max(1, safeTotal * rowHeight);
  const contentHeight = Math.max(bodyViewportHeight, Math.min(logicalContentHeight, TILE_TABLE_MAX_SCROLL_PX));
  const compressedY = logicalContentHeight > TILE_TABLE_MAX_SCROLL_PX;
  const maxScrollableTop = Math.max(1, contentHeight - bodyViewportHeight);
  const viewportRows = Math.max(1, Math.ceil(bodyViewportHeight / rowHeight));

  const virtualRowFromBodyTop = useCallback((bodyTop) => {
    if (!safeTotal) return 0;
    const top = Math.max(0, Number(bodyTop || 0));
    if (!compressedY) return Math.max(0, Math.min(Math.max(0, safeTotal - 1), Math.floor(top / rowHeight)));
    const ratio = Math.max(0, Math.min(1, top / maxScrollableTop));
    return Math.max(0, Math.min(Math.max(0, safeTotal - viewportRows), Math.floor(ratio * Math.max(0, safeTotal - viewportRows))));
  }, [compressedY, maxScrollableTop, rowHeight, safeTotal, viewportRows]);

  const bodyTopFromVirtualRow = useCallback((row) => {
    if (!safeTotal) return 0;
    if (!compressedY) return Math.max(0, row * rowHeight);
    const denom = Math.max(1, safeTotal - viewportRows);
    return Math.max(0, Math.min(maxScrollableTop, (Math.max(0, row) / denom) * maxScrollableTop));
  }, [compressedY, maxScrollableTop, rowHeight, safeTotal, viewportRows]);

  const handleScroll = useCallback((event) => {
    const el = event.currentTarget;
    const nextTop = el.scrollTop || 0;
    const nextLeft = el.scrollLeft || 0;
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => setScroll({ top: nextTop, left: nextLeft }));

    if (externalLazy && safeTotal && typeof onReadPage === "function") {
      const bodyTop = Math.max(0, nextTop - stickyHeight);
      const virtualStart = virtualRowFromBodyTop(bodyTop);
      const nextPage = Math.min(Math.max(1, Math.floor(virtualStart / safePageSize) + 1), totalPages);
      const t = performance.now();
      if (nextPage !== requestRef.current.page && t - requestRef.current.at > 120) {
        requestRef.current = { page: nextPage, at: t };
        onReadPage(nextPage);
      }
    }
  }, [externalLazy, onReadPage, safePageSize, safeTotal, stickyHeight, totalPages, virtualRowFromBodyTop]);

  const toggleSort = (index) => {
    if (!sortable || externalLazy) return;
    setSort((prev) => {
      if (prev.index !== index) return { index, direction: "asc" };
      if (prev.direction === "asc") return { index, direction: "desc" };
      return { index: -1, direction: "asc" };
    });
  };

  if (!displayHeader.length) {
    return (
      <Box sx={{ height, display: "grid", placeItems: "center", color: "text.secondary", border: "1px dashed", borderColor: "divider", borderRadius: 1.5 }}>
        {emptyMessage}
      </Box>
    );
  }

  const bodyScrollTop = Math.max(0, scroll.top - stickyHeight);
  const visibleAbsStartRaw = Math.max(0, virtualRowFromBodyTop(bodyScrollTop) - TILE_TABLE_OVERSCAN_ROWS);
  const visibleAbsEndRaw = Math.min(safeTotal, visibleAbsStartRaw + viewportRows + TILE_TABLE_OVERSCAN_ROWS * 2);
  let renderRows = [];
  let renderAbsStart = visibleAbsStartRaw;
  let localStart = 0;
  let loadedRangeText = `${fmt(1)} - ${fmt(processedRows.length)}`;

  if (externalLazy) {
    const loadedAbsStart = safeLoadedStart;
    const loadedAbsEnd = loadedAbsStart + decoratedRows.length;
    const visibleMissesLoadedTile = decoratedRows.length > 0 && (visibleAbsEndRaw <= loadedAbsStart || visibleAbsStartRaw >= loadedAbsEnd);
    renderAbsStart = visibleMissesLoadedTile ? loadedAbsStart : visibleAbsStartRaw;
    const renderAbsEnd = visibleMissesLoadedTile ? Math.min(loadedAbsEnd, loadedAbsStart + viewportRows + TILE_TABLE_OVERSCAN_ROWS * 2) : visibleAbsEndRaw;
    localStart = Math.max(0, renderAbsStart - loadedAbsStart);
    const localEnd = Math.min(decoratedRows.length, Math.max(localStart, renderAbsEnd - loadedAbsStart));
    renderRows = decoratedRows.slice(localStart, localEnd);
    loadedRangeText = decoratedRows.length ? `${fmt(loadedAbsStart + 1)} - ${fmt(Math.min(loadedAbsEnd, safeTotal))}` : "未読込";
  } else {
    localStart = visibleAbsStartRaw;
    const localEnd = Math.min(processedRows.length, visibleAbsEndRaw);
    renderRows = processedRows.slice(localStart, localEnd);
    renderAbsStart = localStart;
  }

  const rowTop = bodyTopFromVirtualRow(renderAbsStart);
  const colStart = (() => {
    const left = Math.max(0, scroll.left - TILE_TABLE_OVERSCAN_COL_PX);
    for (let i = 0; i < widths.length; i++) {
      if ((prefix[i] || 0) + widths[i] >= left) return i;
    }
    return 0;

            <Box sx={{ position: "sticky", top: 0, left: 0, zIndex: 10, width: totalWidth, height: stickyHeight, bgcolor: "background.paper", borderBottom: "1px solid", borderColor: "divider" }}>

                  {visibleCols.map((i) => (
                    <Box key={`filter:${i}`} sx={{ position: "absolute", left: prefix[i], top: 0, width: widths[i], height: filterHeight, p: dense ? 0.35 : 0.5, borderRight: "1px solid", borderColor: "divider" }}>
                      <TextField
                        value={filters[i] || ""}

                  ))}

              )}
              <Box sx={{ position: "absolute", top: filterHeight, left: 0, height: headerHeight, width: totalWidth, bgcolor: "background.paper" }}>
                {visibleCols.map((i) => (
                  <Box key={`header:${i}`} sx={{ position: "absolute", left: prefix[i], top: 0, width: widths[i], height: headerHeight, px: 1, py: dense ? 0.65 : 0.85, pr: 1.6, fontWeight: 900, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", borderRight: "1px solid", borderColor: "divider", color: "text.primary" }}>
                    {sortable && !externalLazy ? (
                      <TableSortLabel active={sort.index === i} direction={sort.index === i ? sort.direction : "asc"} onClick={() => toggleSort(i)} sx={{ minWidth: 0, ".MuiTableSortLabel-icon": { flexShrink: 0 } }}>
                        <Box component="span" sx={{ overflow: "hidden", textOverflow: "ellipsis" }}>{displayHeader[i]}</Box>

                    )}
                    <Box

                      onMouseDown={(event) => startColumnResize(event, i)}
                      onTouchStart={(event) => startColumnResize(event, i)}

                      onKeyDown={(event) => handleResizerKeyDown(event, i)}
                      sx={{
                        position: "absolute", top: 0, right: 0, bottom: 0, width: 10, cursor: "col-resize", zIndex: 4, outline: "none",
                        "&::after": { content: '\"\"', position: "absolute", top: 7, bottom: 7, right: 3, width: 2, bgcolor: "divider", borderRadius: 999, opacity: 0.55 },
                        "&:hover::after, &:focus-visible::after": { bgcolor: "primary.main", opacity: 1, width: 3 },

                ))}
              </Box>
            </Box>

            <Box sx={{ position: "absolute", left: 0, right: 0, top: stickyHeight + rowTop, width: totalWidth }}>
              {renderRows.map((row, rowIndex) => {
                const absRow = renderAbsStart + rowIndex;
                return (
                  <Box
                    key={`r:${absRow}:${rowIndex}`}
                    onClick={() => setSelectedAbsRow(absRow)}
                    sx={{ position: "relative", height: rowHeight, width: totalWidth, borderBottom: "1px solid", borderColor: "divider", cursor: "pointer", bgcolor: selectedAbsRow === absRow ? "action.selected" : "background.paper", "&:hover": { bgcolor: "action.hover" } }}
                  >
                    {visibleCols.map((ci) => {
                      const cell = row?.[ci];
                      const text = normalizeTileCell(cell);
                      return (
                        <Box key={`c:${ci}`} title={text} sx={{ position: "absolute", left: prefix[ci], top: 0, width: widths[ci], height: rowHeight, px: 1, py: dense ? 0.45 : 0.7, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", borderRight: "1px solid", borderColor: "divider", fontSize: dense ? 12 : 13 }}>
                          {text}
                        </Box>
                      );
                    })}

                );

            </Box>
          </Box>
        </Box>
      </Box>
      <Stack direction="row" justifyContent="space-between" alignItems="center" spacing={1} sx={{ mt: 0.75, flexWrap: "wrap" }}>
        <Typography variant="caption" color="text.secondary">
          TileTable共通基盤: 行/列virtual表示、列幅リサイズ、選択行表示、lazy読込を共通化。{externalLazy ? "表示範囲に応じて必要ページだけ読みます。" : `表示中 ${fmt(processedRows.length)} / 元 ${fmt(baseRows.length)} 行。`}
        </Typography>
        <Stack direction="row" spacing={0.5} sx={{ flexWrap: "wrap" }}>
          {hasColumnWidths && <Button size="small" onClick={clearColumnWidths}>Reset column widths</Button>}
          {hasLocalControls && <Button size="small" onClick={() => { setFilters({}); setSort({ index: -1, direction: "asc" }); }}>Clear table filters</Button>}
        </Stack>
      </Stack>
    </Box>
  );
}

function ColumnCheckList({ columns, selected, onChange, height = 170 }) {
  const selectedSet = new Set(selected.map(Number));
  const toggle = (index) => {
    const next = new Set(selectedSet);
    if (next.has(index)) next.delete(index);
    else next.add(index);
    onChange([...next].sort((a, b) => a - b));
  };

  return (
    <Box sx={{ height, overflow: "auto", border: "1px solid", borderColor: "divider", borderRadius: 1.5, p: 1 }}>
      <FormGroup>
        {columns.map((c) => (
          <FormControlLabel
            key={c.index}
            control={<Checkbox size="small" checked={selectedSet.has(c.index)} onChange={() => toggle(c.index)} />}
            label={`${c.name} (${c.type})`}
          />
        ))}
      </FormGroup>
    </Box>
  );
}

  const selectedSet = new Set(visible.map(Number));

const GRAPH_QUERY_SESSIONS_KEY = "quantumCsvGrid.graphQuery.sessions.v1";

function newGraphSessionId(){
  return `gq_session_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
}

function stripGraphNodeForSession(node){
  if (!node || typeof node !== "object") return null;
  return {
    id:String(node.id || newGraphSessionId()),
    type:node.type || undefined,
    position:{x:Number(node.position?.x || 0), y:Number(node.position?.y || 0)},
    parentId:node.parentId || undefined,
    extent:node.extent || undefined,
    data:{...(node.data || {})},
  };
}

function stripGraphEdgeForSession(edge){
  if (!edge || typeof edge !== "object") return null;
  return {
    id:String(edge.id || `edge_${Date.now().toString(36)}`),
    source:String(edge.source || ""),
    target:String(edge.target || ""),
    sourceHandle:edge.sourceHandle || undefined,
    targetHandle:edge.targetHandle || undefined,
    type:edge.type || undefined,
    animated:edge.animated !== false,
    reconnectable:edge.reconnectable !== false,
    data:{...(edge.data || {})},
    markerEnd:edge.markerEnd || undefined,
  };
}

function graphSessionDatasetRefs(nodes){
  return graphSourceNodes(nodes || []).map((n) => ({
    sourceId:n.id,
    alias:n.data?.alias || n.id,
    datasetId:n.data?.datasetId || "__active__",
  }));
}

function normalizeGraphSession(raw){
  if (!raw || typeof raw !== "object") return null;
  const nodes = Array.isArray(raw.nodes) ? raw.nodes.map(stripGraphNodeForSession).filter(Boolean) : [];
  const edges = Array.isArray(raw.edges) ? raw.edges.map(stripGraphEdgeForSession).filter(Boolean) : [];
  if (!nodes.length) return null;
  const id = String(raw.id || newGraphSessionId());
  const now = new Date().toISOString();
  return {
    id,
    name:String(raw.name || "Graph Query Session"),
    createdAt:raw.createdAt || now,
    updatedAt:raw.updatedAt || raw.createdAt || now,
    nodes,
    edges,
    sqlText:String(raw.sqlText || ""),
    sqlMode:!!raw.sqlMode,
    datasets:Array.isArray(raw.datasets) ? raw.datasets : graphSessionDatasetRefs(nodes),
    resultSaved:false,
    version:1,
  };
}

function loadGraphQuerySessions(){
  try{
    const raw=JSON.parse(localStorage.getItem(GRAPH_QUERY_SESSIONS_KEY) || "[]");
    return (Array.isArray(raw) ? raw : raw.sessions || []).map(normalizeGraphSession).filter(Boolean);
  }catch{ return []; }
}

function saveGraphQuerySessions(sessions){
  try{
    const list=(Array.isArray(sessions) ? sessions : []).map(normalizeGraphSession).filter(Boolean).slice(0,100);
    localStorage.setItem(GRAPH_QUERY_SESSIONS_KEY, JSON.stringify({version:1, updatedAt:new Date().toISOString(), sessions:list}));
    return true;
  }catch{ return false; }
}

function defaultGraphNodes(columns=[]){
  return [
    makeGraphNode("source", "source", { x: 20, y: 140 }, columns),
    makeGraphNode("filter-1", "filter", { x: 240, y: 70 }, columns),
    makeGraphNode("sort-1", "sort", { x: 460, y: 170 }, columns),
    makeGraphNode("output", "output", { x: 700, y: 140 }, columns),
  ].map((n) => ({ ...n, data: { ...n.data, label: normalizeGraphNodeLabel(n, columns) } }));
}

function defaultGraphEdges(){
  return [
    { id: "source-filter", source: "source", target: "filter-1", animated: true, reconnectable:true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
    { id: "filter-sort", source: "filter-1", target: "sort-1", animated: true, reconnectable:true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
    { id: "sort-output", source: "sort-1", target: "output", animated: true, reconnectable:true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
  ];
}

function restoreGraphSessionNodes(session, columns=[], datasets=[]){
  return (Array.isArray(session?.nodes) ? session.nodes : defaultGraphNodes(columns)).map((node) => {
    const n={...node, data:{...(node.data || {})}};
    n.data.label=normalizeGraphNodeLabel(n, columns, datasets);
    return n;
  });
}

function restoreGraphSessionEdges(session){
  return (Array.isArray(session?.edges) ? session.edges : defaultGraphEdges()).map((edge) => ({
    ...edge,
    animated:edge.animated !== false,
    reconnectable:edge.reconnectable !== false,
    markerEnd:edge.markerEnd || (RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined),
  }));
}

const CATALOG_SCOPES_KEY = "quantumCsvGrid.storageCatalogScopes.v1";
function loadCatalogScopes() {
  try {
    const rows = JSON.parse(localStorage.getItem(CATALOG_SCOPES_KEY) || "[]");
    return Array.isArray(rows) ? rows.filter((x) => x && x.workspace && x.collection) : [];
  } catch {
    return [];
  }
}
function saveCatalogScopes(scopes) {
  try { localStorage.setItem(CATALOG_SCOPES_KEY, JSON.stringify(scopes || [])); }
  catch {}
}
function normalizeScopeName(value, fallback) {
  return String(value || fallback || "").trim() || fallback;
}
function uniqueScopes(scopes) {
  const map = new Map();
  for (const s of scopes || []) {
    const workspace = normalizeScopeName(s.workspace, "Default");
    const collection = normalizeScopeName(s.collection, "General");
    map.set(`${workspace}\u001f${collection}`, { workspace, collection });
  }
  return [...map.values()].sort((a, b) => `${a.workspace}/${a.collection}`.localeCompare(`${b.workspace}/${b.collection}`, "ja"));
}


const STORAGE_SPLIT_KEY = "quantumCsvGrid.storageSplit.leftWidth.v1";
function clampNumber(value, min, max) {
  const n = Number(value);
  if (!Number.isFinite(n)) return min;
  return Math.min(Math.max(n, min), max);
}

function ResizableSplit({
  left,
  right,
  storageKey = STORAGE_SPLIT_KEY,
  defaultLeft = 340,
  minLeft = 260,
  maxLeft = 620,
  minRight = 360,
  gap = 0.5,
  collapsible = false,
  collapseStorageKey,
  collapsedWidth = 52,
  collapsedTitle = "Workspace Tree",
}) {
  const containerRef = useRef(null);
  const [leftWidth, setLeftWidth] = useState(() => {
    try { return clampNumber(localStorage.getItem(storageKey), minLeft, maxLeft); }
    catch { return defaultLeft; }
  });
  const [dragging, setDragging] = useState(false);
  const resolvedCollapseStorageKey = collapseStorageKey || `${storageKey}.collapsed`;
  const [leftCollapsed, setLeftCollapsed] = useState(() => {
    if (!collapsible) return false;
    try { return localStorage.getItem(resolvedCollapseStorageKey) === "1"; }
    catch { return false; }
  });

  useEffect(() => {
    try { localStorage.setItem(storageKey, String(Math.round(leftWidth))); }
    catch {}
  }, [leftWidth, storageKey]);

  useEffect(() => {
    if (!collapsible) return;
    try { localStorage.setItem(resolvedCollapseStorageKey, leftCollapsed ? "1" : "0"); }
    catch {}
  }, [collapsible, resolvedCollapseStorageKey, leftCollapsed]);

  useEffect(() => {
    if (!dragging) return;
    const onMove = (event) => {
      const rect = containerRef.current?.getBoundingClientRect();
      if (!rect) return;
      const availableMax = Math.max(minLeft, rect.width - minRight - 12);
      const next = clampNumber(event.clientX - rect.left, minLeft, Math.min(maxLeft, availableMax));
      setLeftWidth(next);
    };
    const onUp = () => setDragging(false);
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    return () => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    };
  }, [dragging, minLeft, maxLeft, minRight]);

  const resetWidth = () => setLeftWidth(defaultLeft);
  const toggleLeftCollapsed = () => setLeftCollapsed((v) => !v);
  const effectiveLeftWidth = collapsible && leftCollapsed ? collapsedWidth : leftWidth;
  const leftNode = typeof left === "function" ? left({ leftCollapsed, setLeftCollapsed, toggleLeftCollapsed }) : left;

  return (
    <Box
      ref={containerRef}
      sx={{
        display: "grid",
        gridTemplateColumns: { xs: "minmax(0, 1fr)", md: `${Math.round(effectiveLeftWidth)}px 8px minmax(0, 1fr)` },
        gap: { xs: gap, md: 0 },
        minWidth: 0,
        maxWidth: "100%",
        width: "100%",
        alignItems: "stretch",
      }}
    >
      <Box sx={{ minWidth: 0, maxWidth: "100%", overflow: "hidden" }}>
        {collapsible && leftCollapsed ? (
          <Paper
            variant="outlined"
            sx={{
              height: "100%",
              minHeight: 420,
              p: 0.45,
              borderRadius: 1.5,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 0.75,
              bgcolor: "background.paper",
            }}
          >
            <Tooltip title="Workspace Treeを横に展開">
              <IconButton size="small" color="primary" onClick={toggleLeftCollapsed}>▶</IconButton>
            </Tooltip>
            <Typography
              variant="caption"
              sx={{
                writingMode: "vertical-rl",
                textOrientation: "mixed",
                fontWeight: 900,
                letterSpacing: 0.4,
                color: "text.secondary",
                userSelect: "none",
              }}
            >
              {collapsedTitle}
            </Typography>
          </Paper>
        ) : leftNode}
      </Box>
      <Tooltip title={leftCollapsed ? "クリックまたはEnterでWorkspace Treeを展開" : "ドラッグで左右ペイン幅を調整。ダブルクリックで左ペインを横に折りたたみます。"}>
        <Box
          role="separator"
          aria-orientation="vertical"
          tabIndex={0}
          onPointerDown={(event) => {
            event.preventDefault();
            if (collapsible && leftCollapsed) { toggleLeftCollapsed(); return; }
            setDragging(true);
          }}
          onDoubleClick={() => collapsible ? toggleLeftCollapsed() : resetWidth()}
          onKeyDown={(event) => {
            if (collapsible && leftCollapsed && ["Enter", " ", "ArrowRight"].includes(event.key)) { event.preventDefault(); toggleLeftCollapsed(); return; }
            if (event.key === "ArrowLeft") setLeftWidth((v) => clampNumber(v - 24, minLeft, maxLeft));
            if (event.key === "ArrowRight") setLeftWidth((v) => clampNumber(v + 24, minLeft, maxLeft));
            if (event.key === "Home") setLeftWidth(minLeft);
            if (event.key === "End") setLeftWidth(maxLeft);
          }}
          sx={{
            display: { xs: "none", md: "flex" },
            alignItems: "center",
            justifyContent: "center",
            mx: 0.5,
            borderRadius: 999,
            cursor: "col-resize",
            outline: "none",
            bgcolor: dragging ? "primary.main" : "divider",
            opacity: dragging ? 0.9 : 0.72,
            transition: "background-color .12s ease, opacity .12s ease, transform .12s ease",
            "&:hover": { bgcolor: "primary.main", opacity: 0.75, transform: "scaleX(1.35)" },
            "&:focus-visible": { boxShadow: 3, bgcolor: "primary.main", opacity: 0.8 },
          }}
        >
          <Box sx={{ width: 2, height: 42, borderRadius: 999, bgcolor: "background.paper", opacity: 0.9 }} />
        </Box>
      </Tooltip>
      <Box sx={{ minWidth: 0, maxWidth: "100%" }}>{right}</Box>
    </Box>
  );
}


function CsvDropZone({
  candidateFiles,
  candidateSelectedKeys,
  importedFiles,
  activeFileIndex,
  activeFile,
  onCandidateFilesAdded,
  onToggleCandidate,
  onSelectAllCandidates,
  onClearCandidateSelection,
  onClearCandidates,
  onImportSelected,
  onActiveChange,
  onClearImported,
}) {
  const inputRef = useRef(null);
  const [dragging, setDragging] = useState(false);

  const openDialog = () => inputRef.current?.click();

  const acceptFiles = (fileList) => {
    const picked = Array.from(fileList || []).filter((file) => {
      const name = String(file.name || "").toLowerCase();
      return name.endsWith(".csv") || name.endsWith(".txt") || file.type === "text/csv" || file.type === "text/plain" || !file.type;
    });
    onCandidateFilesAdded(picked);
  };

  const onDrop = (event) => {
    event.preventDefault();
    event.stopPropagation();
    setDragging(false);
    acceptFiles(event.dataTransfer?.files);
  };

  const selectedCount = candidateFiles.filter((file) => candidateSelectedKeys.includes(fileKey(file))).length;

  return (
    <Box sx={{ display: "grid", gridTemplateColumns: { xs: "1fr", lg: "minmax(420px, 1fr) 520px" }, gap: 0.8, width: "100%" }}>
      <Box>
        <Box
          role="button"
          tabIndex={0}
          onClick={openDialog}
          onKeyDown={(event) => {
            if (event.key === "Enter" || event.key === " ") openDialog();
          }}
          onDragEnter={(event) => { event.preventDefault(); setDragging(true); }}

        <Stack direction="row" spacing={0.5} useFlexGap flexWrap="wrap" alignItems="center" sx={{ mt: 0.6 }}>

            <Box>
              <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>読み込み候補リスト</Typography>
              <Typography variant="caption" color="text.secondary">
                {candidateFiles.length ? `${fmt(candidateFiles.length)}件中 ${fmt(selectedCount)}件を選択中` : "CSVを追加するとここに表示されます"}
              </Typography>
            </Box>
            <Stack direction="row" spacing={0.5}>

          <TableContainer sx={{ maxHeight: 142, border: "1px solid", borderColor: "divider", borderRadius: 1.5 }}>
            <Table stickyHeader size="small">
              <TableHead>

                </TableRow>
              </TableHead>
              <TableBody>
                {candidateFiles.length ? candidateFiles.map((file) => {
                  const key = fileKey(file);
                  const checked = candidateSelectedKeys.includes(key);
                  return (
                    <TableRow hover key={key} selected={checked} onClick={() => onToggleCandidate(key)} sx={{ cursor: "pointer" }}>
                      <TableCell padding="checkbox">
                        <Checkbox size="small" checked={checked} onChange={() => onToggleCandidate(key)} onClick={(event) => event.stopPropagation()} />

                      <TableCell align="right" sx={{ whiteSpace: "nowrap" }}>{fmt(file.size)} bytes</TableCell>
                    </TableRow>
                  );
                }) : (
                  <TableRow>
                    <TableCell colSpan={3} sx={{ color: "text.secondary", textAlign: "center", py: 1.2 }}>候補はまだありません</TableCell>
                  </TableRow>
                )}
              </TableBody>
            </Table>
          </TableContainer>

          <Stack direction="row" spacing={0.5} useFlexGap flexWrap="wrap" sx={{ mt: 0.6 }}>
            <Button variant="contained" size="small" disabled={!selectedCount} onClick={onImportSelected}>
              選択したCSVを取り込み
            </Button>
            <Button variant="outlined" size="small" disabled={!candidateFiles.length} onClick={onClearCandidates}>
              候補リストをクリア
            </Button>
          </Stack>
        </Paper>

        <TextField
          select
          label="取り込み済みCSV / active"
          size="small"
          value={String(activeFileIndex)}
          onChange={(event) => onActiveChange(Number(event.target.value))}
          disabled={!importedFiles.length}
          fullWidth
        >
          {importedFiles.length ? importedFiles.map((file, index) => (
            <MenuItem key={`${file.name}-${file.size}-${file.lastModified}-${index}`} value={String(index)}>
              {index + 1}. {file.name} / {fmt(file.size)} bytes
            </MenuItem>
          )) : <MenuItem value="0">未取り込み</MenuItem>}
        </TextField>
      </Stack>
    </Box>
  );
}

function DataLifecyclePanel({
  candidateFiles,
  importedFiles,
  activeFile,
  schema,
  manifest,
  opfsTime,
  busy,
  onSaveToStorage,
  onClearImported,
  onRefreshStorage,
  onOpenStorageTab,
}) {
  const candidateBytes = candidateFiles.reduce((a, f) => a + Number(f.size || 0), 0);
  const importedBytes = importedFiles.reduce((a, f) => a + Number(f.size || 0), 0);
  const memoryActive = importedFiles.length > 0;
  const storageActive = !!manifest;
  const memoryUnsaved = memoryActive && !storageActive;

  return (
    <Paper elevation={0} sx={{ p: 0.75, borderRadius: 1.5, bgcolor: "background.default", border: "1px solid", borderColor: "divider", width: "100%" }}>
      <Stack direction={{ xs: "column", lg: "row" }} spacing={0.6} alignItems="stretch">
        <LifecycleCard title="1. 読み込み候補" color="info" active={candidateFiles.length > 0}>
          <div>{candidateFiles.length ? `${fmt(candidateFiles.length)} files / ${humanBytes(candidateBytes)}` : "CSVはまだ候補リストにありません。"}</div>
          <div>ここは未取り込みです。チェックして「選択したCSVを取り込み」を押すまで分析対象にはなりません。</div>
        </LifecycleCard>

        <LifecycleCard
          title="2. In-memory"
          color={memoryUnsaved ? "warning" : "success"}
          active={memoryActive}
          action={memoryActive ? (
            <Stack direction="row" spacing={0.4} useFlexGap flexWrap="wrap">
              <Button size="small" variant="contained" color={memoryUnsaved ? "warning" : "success"} disabled={busy} onClick={onSaveToStorage} startIcon={<Storage />}>
                {importedFiles.length > 1 ? "選択CSVをマージしてStorageに保存" : "このCSVをStorageに保存"}
              </Button>
              <Button size="small" variant="outlined" disabled={busy} onClick={onClearImported}>In-memory CSVをクリア</Button>
            </Stack>
          ) : null}
        >
          <div>{memoryActive ? `${fmt(importedFiles.length)} CSV / ${humanBytes(importedBytes)}` : "取り込み済みCSVはありません。"}</div>
          <div>{activeFile ? `Active: ${activeFile.name}` : "Active CSVなし"}</div>
          <div>{schema ? `Schema: ${fmt(schema.columns?.length || 0)} columns analyzed` : "Schema: 未解析。プレビューだけではStorage保存されません。"}</div>
        </LifecycleCard>

        <LifecycleCard
          title="3. Storage / OPFS"
          color="success"
          active={storageActive}
          action={(
            <Stack direction="row" spacing={0.4} useFlexGap flexWrap="wrap">
              <Button size="small" variant="outlined" onClick={onRefreshStorage}>Storage更新</Button>
              <Button size="small" variant="outlined" onClick={onOpenStorageTab}>Storageタブへ</Button>
            </Stack>
          )}
        >
          <div>{storageActive ? `${manifest.name || manifest.id} / ${fmt(manifest.totalRows)} rows / ${fmt(manifest.chunks)} chunks` : "保存済みアクティブデータセットはありません。"}</div>
          <div>{storageActive ? "CSVは列指向キャッシュとしてブラウザ内Storageに保存済みです。" : "Storageに格納するには、In-memory CSVから保存アクションを実行します。"}</div>
          <div>{opfsTime || "Storage estimate 未取得"}</div>
        </LifecycleCard>
      </Stack>
    </Paper>
  );
}

function StorageCatalogTree({
  datasets,
  extraScopes = [],
  browseWorkspace,
  browseCollection,
  selectedDataset,
  activeManifest,
  candidateFiles = [],
  importedFiles = [],
  activeFileIndex = 0,
  onSelectScope,
  onSelectDataset,
  onActivateDataset,
  onSelectInMemory,
}) {
  const tree = useMemo(() => {
    const root = new Map();
    for (const d of datasets || []) {
      const workspace = d.workspace || "Default";
      const collection = d.collection || "General";
      if (!root.has(workspace)) root.set(workspace, new Map());
      const collections = root.get(workspace);
      if (!collections.has(collection)) collections.set(collection, []);
      collections.get(collection).push(d);
    }
    for (const scope of extraScopes || []) {
      const workspace = scope.workspace || "Default";
      const collection = scope.collection || "General";
      if (!root.has(workspace)) root.set(workspace, new Map());
      const collections = root.get(workspace);
      if (!collections.has(collection)) collections.set(collection, []);
    }
    return [...root.entries()].sort((a, b) => a[0].localeCompare(b[0], "ja"));
  }, [datasets, extraScopes]);

  const activeStorageId = activeManifest && !String(activeManifest.id || "").startsWith("virtual:") ? activeManifest.id : "";
  const virtualSourceIds = new Set((activeManifest?.sourceDatasets || []).map((x) => x.id).filter(Boolean));
  const activeFile = importedFiles[activeFileIndex] || importedFiles[0] || null;
  const activeMode = activeManifest?.mode === "virtual-dataset" ? "Storage-backed" : activeManifest?.mode === "memory-dataset" ? "Memory Accelerator" : activeManifest ? "Storage" : importedFiles.length ? "In-memory CSV" : "None";

  const StatusChip = ({ label, color = "default", variant = "outlined" }) => (
    <Chip size="small" label={label} color={color} variant={variant} sx={{ height: 18, fontSize: 10.5 }} />
  );

  const localSession = (
    <Box sx={{ border: "1px solid", borderColor: "divider", borderRadius: 1.5, p: 0.6, mb: 0.75, bgcolor: "action.hover" }}>
      <Stack direction="row" spacing={0.5} alignItems="center" justifyContent="space-between" sx={{ mb: 0.35 }}>
        <Typography variant="caption" sx={{ fontWeight: 900 }}>Local Session</Typography>
        <StatusChip label={activeMode} color={activeMode === "Storage-backed" ? "secondary" : activeMode === "Memory Accelerator" ? "warning" : activeMode === "Storage" ? "success" : activeMode === "In-memory CSV" ? "warning" : "default"} variant="filled" />
      </Stack>

      <Stack spacing={0.35}>
        <Box sx={{ px: 0.45, py: 0.35, borderRadius: 1, bgcolor: candidateFiles.length ? "info.main" : "transparent", color: candidateFiles.length ? "info.contrastText" : "text.secondary" }}>
          <Stack direction="row" spacing={0.4} alignItems="center" justifyContent="space-between">
            <Typography variant="caption" noWrap>Import Queue</Typography>
            <StatusChip label={`${fmt(candidateFiles.length)} candidate`} color={candidateFiles.length ? "info" : "default"} variant={candidateFiles.length ? "filled" : "outlined"} />
          </Stack>
        </Box>

        <Button
          fullWidth
          size="small"
          color={importedFiles.length ? "warning" : "inherit"}
          variant={importedFiles.length && !activeManifest ? "contained" : "text"}
          onClick={onSelectInMemory}
          disabled={!importedFiles.length && !onSelectInMemory}
          sx={{ justifyContent: "flex-start", px: 0.55, textAlign: "left", maxWidth: "100%" }}
        >
          <Box sx={{ width: "100%", minWidth: 0 }}>
            <Stack direction="row" spacing={0.35} alignItems="center" justifyContent="space-between">
              <Typography variant="body2" noWrap>In-memory CSV</Typography>
              <Stack direction="row" spacing={0.25}>
                <StatusChip label={`${fmt(importedFiles.length)} CSV`} color={importedFiles.length ? "warning" : "default"} variant={importedFiles.length ? "filled" : "outlined"} />
                {importedFiles.length > 0 && <StatusChip label="not persisted" color="warning" />}
              </Stack>
            </Stack>
            <Typography variant="caption" color={importedFiles.length && !activeManifest ? "inherit" : "text.secondary"} noWrap>
              {activeFile ? `${activeFile.name} / ${humanBytes(activeFile.size)}` : "No imported CSV"}
            </Typography>
          </Box>
        </Button>

        {activeManifest && (
          <Box sx={{ px: 0.55, py: 0.35, borderRadius: 1, border: "1px solid", borderColor: activeManifest.mode === "virtual-dataset" ? "secondary.main" : activeManifest.mode === "memory-dataset" ? "warning.main" : "success.main", bgcolor: "background.paper" }}>
            <Stack direction="row" spacing={0.35} alignItems="center" justifyContent="space-between">
              <Typography variant="body2" noWrap>Active Dataset</Typography>
              <Stack direction="row" spacing={0.25}>
                <StatusChip label={activeManifest.mode === "virtual-dataset" ? "Storage-backed" : activeManifest.mode === "memory-dataset" ? "Memory" : "Storage"} color={activeManifest.mode === "virtual-dataset" ? "secondary" : activeManifest.mode === "memory-dataset" ? "warning" : "success"} variant="filled" />
                {(activeManifest.mode === "virtual-dataset" || activeManifest.mode === "memory-dataset") && <StatusChip label={`${fmt(activeManifest.sourceDatasets?.length || 0)} sources`} color={activeManifest.mode === "memory-dataset" ? "warning" : "secondary"} />}
              </Stack>
            </Stack>
            <Typography variant="caption" color="text.secondary" noWrap>
              {activeManifest.storagePath || activeManifest.name || activeManifest.id} / {fmt(activeManifest.totalRows)} rows
            </Typography>
          </Box>
        )}
      </Stack>
    </Box>
  );

  const hasTreeNodes = tree.length > 0;

  return (
    <Box>
      {localSession}
      <Box sx={{ maxHeight: 430, overflow: "auto", border: "1px solid", borderColor: "divider", borderRadius: 1.5, p: 0.5 }}>
        {!hasTreeNodes && (
          <Box sx={{ border: "1px dashed", borderColor: "divider", borderRadius: 1.5, p: 1, color: "text.secondary" }}>
            Storageに保存済みのTableはまだありません。Workspace / Collectionを作成するか、CSVをStorageに保存してください。
          </Box>
        )}
        {tree.map(([workspace, collections]) => {
          const workspaceRows = [...collections.values()].flat();
          const workspaceActive = browseWorkspace === workspace;
          const workspaceHasActive = workspaceRows.some((d) => d.id === activeStorageId || virtualSourceIds.has(d.id));
          return (
            <Box key={workspace} sx={{ mb: 0.5 }}>
              <Button
                fullWidth
                size="small"
                variant={workspaceActive ? "contained" : "text"}
                onClick={() => onSelectScope(workspace, "All")}
                sx={{ justifyContent: "space-between", px: 0.8 }}
              >
                <span>▾ {workspace}</span>
                <Stack direction="row" spacing={0.3} alignItems="center">
                  {workspaceHasActive && <StatusChip label="active scope" color="success" />}
                  <Chip size="small" label={`${workspaceRows.length} tables`} />
                </Stack>
              </Button>
              {[...collections.entries()].sort((a, b) => a[0].localeCompare(b[0], "ja")).map(([collection, tables]) => {
                const collectionActive = browseWorkspace === workspace && browseCollection === collection;
                const collectionHasActive = tables.some((d) => d.id === activeStorageId || virtualSourceIds.has(d.id));
                return (
                  <Box key={`${workspace}/${collection}`} sx={{ ml: 1, mt: 0.35 }}>
                    <Button
                      fullWidth
                      size="small"
                      variant={collectionActive ? "outlined" : "text"}
                      onClick={() => onSelectScope(workspace, collection)}
                      sx={{ justifyContent: "space-between", px: 0.8 }}
                    >
                      <span>└ {collection}</span>
                      <Stack direction="row" spacing={0.3} alignItems="center">
                        {collectionHasActive && <StatusChip label="active" color="success" />}
                        <Chip size="small" label={`${tables.length}`} />
                      </Stack>
                    </Button>
                    <Box sx={{ ml: 1.5, mt: 0.25 }}>
                      {tables.sort((a, b) => String(a.tableName).localeCompare(String(b.tableName), "ja")).map((d) => {
                        const isSelected = selectedDataset === d.id;
                        const isActiveTable = activeStorageId === d.id;
                        const isVirtualSource = virtualSourceIds.has(d.id);
                        return (
                          <Button
                            key={d.id}
                            fullWidth
                            size="small"
                            color={isSelected ? "primary" : "inherit"}
                            variant={isSelected ? "contained" : "text"}
                            onClick={() => {
                              onSelectScope?.(workspace, collection);
                              onSelectDataset?.(d.id);
                              if (onActivateDataset) onActivateDataset(d.id);
                            }}
                            sx={{ justifyContent: "flex-start", px: 0.8, textAlign: "left", maxWidth: "100%" }}
                          >
                            <Box sx={{ minWidth: 0, width: "100%" }}>
                              <Stack direction="row" spacing={0.35} alignItems="center" justifyContent="space-between">
                                <Typography variant="body2" noWrap>• {d.tableName}</Typography>
                                <Stack direction="row" spacing={0.25} alignItems="center" sx={{ flexShrink: 0 }}>
                                  {isActiveTable && <StatusChip label="Active" color="success" variant="filled" />}
                                  {isVirtualSource && <StatusChip label="Source" color="secondary" variant="filled" />}
                                  {isSelected && !isActiveTable && <StatusChip label="Selected" color="primary" />}
                                  <StatusChip label="Storage" />
                                </Stack>
                              </Stack>
                              <Typography variant="caption" color={isSelected ? "inherit" : "text.secondary"} noWrap>
                                {fmt(d.rows)} rows / {fmt(d.columns)} cols / {humanBytes(d.fileSize)}
                              </Typography>
                            </Box>
                          </Button>
                        );
                      })}
                    </Box>
                  </Box>
                );
              })}
            </Box>
          );
        })}
      </Box>
    </Box>
  );
}

function PivotTileGrid({ meta, view, onRequest, height = 640 }) {
  const scrollerRef = useRef(null);
  const timerRef = useRef(null);
  const lastKeyRef = useRef("");
  const [scrollInfo, setScrollInfo] = useState({ top: 0, left: 0 });

  const rowHeight = 28;
  const colWidth = 132;
  const rowHeaderWidth = 260;
  const colHeaderHeight = 34;
  const maxScrollPx = 24000000;

  function requestVisible() {
    if (!meta || !onRequest || !scrollerRef.current) return;
    const el = scrollerRef.current;
    const bodyTop = Math.max(0, el.scrollTop - colHeaderHeight);
    const bodyLeft = Math.max(0, el.scrollLeft - rowHeaderWidth);
    const rowStart = Math.max(0, Math.floor(bodyTop / rowHeight) - 8);
    const colStart = Math.max(0, Math.floor(bodyLeft / colWidth) - 4);
    const viewportRows = Math.ceil(el.clientHeight / rowHeight) + 18;
    const viewportCols = Math.ceil(el.clientWidth / colWidth) + 10;
    const key = `${rowStart}:${colStart}:${viewportRows}:${viewportCols}:${meta.totalRows}:${meta.totalCols}`;
    if (lastKeyRef.current === key) return;
    lastKeyRef.current = key;
    onRequest({ rowStart, colStart, viewportRows, viewportCols, overscan: 1 });
  }

  function handleScroll() {
    const el = scrollerRef.current;
    if (el) setScrollInfo({ top: el.scrollTop, left: el.scrollLeft });
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(requestVisible, 40);
  }

  useEffect(() => {
    lastKeyRef.current = "";
    const id = setTimeout(requestVisible, 0);
    return () => {
      clearTimeout(id);
      if (timerRef.current) clearTimeout(timerRef.current);
    };
  }, [meta?.totalRows, meta?.totalCols]);

  if (!meta) {
    return <Alert severity="info">PivotをBuildすると、ページ移動なしのlazy tile gridで表示します。</Alert>;
  }

  const totalRows = Math.max(1, Number(meta.totalRows || 1));
  const totalCols = Math.max(1, Number(meta.totalCols || 1));
  const logicalHeight = colHeaderHeight + totalRows * rowHeight;
  const logicalWidth = rowHeaderWidth + totalCols * colWidth;
  const innerHeight = Math.min(logicalHeight, maxScrollPx);
  const innerWidth = Math.min(logicalWidth, maxScrollPx);
  const yScale = logicalHeight > maxScrollPx ? logicalHeight / maxScrollPx : 1;
  const xScale = logicalWidth > maxScrollPx ? logicalWidth / maxScrollPx : 1;

  const rowLabels = new Map();
  const colLabels = new Map();
  const body = [];
  for (const tile of view?.tiles || []) {
    for (let r = tile.rowStart; r < tile.rowEnd; r++) {
      if (!rowLabels.has(r)) rowLabels.set(r, (tile.rowLabels?.[r - tile.rowStart] || []).join(" / "));
    }
    for (let c = tile.colStart; c < tile.colEnd; c++) {
      if (!colLabels.has(c)) colLabels.set(c, (tile.colLabels?.[c - tile.colStart] || []).join(" / "));
    }
    for (let rr = 0; rr < (tile.values || []).length; rr++) {
      const r = tile.rowStart + rr;
      for (let cc = 0; cc < (tile.values[rr] || []).length; cc++) {
        const c = tile.colStart + cc;
        body.push({ r, c, value: tile.values[rr][cc] });
      }
    }
  }

  function cellBaseSx(r, c, extra = {}) {
    return {
      position: "absolute",
      top: Math.round((colHeaderHeight + r * rowHeight) / yScale),
      left: Math.round((rowHeaderWidth + c * colWidth) / xScale),
      width: Math.max(48, Math.round(colWidth / xScale)),
      height: Math.max(18, Math.round(rowHeight / yScale)),
      boxSizing: "border-box",
      borderRight: "1px solid",
      borderBottom: "1px solid",
      borderColor: "divider",
      overflow: "hidden",
      whiteSpace: "nowrap",
      textOverflow: "ellipsis",
      px: 0.75,
      py: 0.25,
      fontSize: 12,
      lineHeight: "20px",
      bgcolor: "background.paper",
      ...extra,
    };
  }

  return (
    <Box>
      <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap" sx={{ mb: 0.75 }}>
        <Chip size="small" label={`Rows ${fmt(meta.totalRows)}`} />
        <Chip size="small" label={`Columns ${fmt(meta.totalCols)}`} />
        <Chip size="small" label={`Tile ${meta.tileRows}×${meta.tileCols}`} />
        <Chip size="small" label={`Viewport r${fmt(view?.rowStart || 0)}-r${fmt(view?.rowEnd || 0)} / c${fmt(view?.colStart || 0)}-c${fmt(view?.colEnd || 0)}`} />
      </Stack>
      <Box
        ref={scrollerRef}
        onScroll={handleScroll}
        sx={{
          height,
          overflow: "auto",
          border: "1px solid",
          borderColor: "divider",
          borderRadius: 1.5,
          bgcolor: "background.default",
          position: "relative",
          overscrollBehavior: "contain",
        }}
      >
        <Box sx={{ position: "relative", width: innerWidth, height: innerHeight, minWidth: "100%" }}>
          <Box sx={{ position: "absolute", top: 0, left: 0, width: rowHeaderWidth, height: colHeaderHeight, bgcolor: "background.paper", borderRight: "1px solid", borderBottom: "1px solid", borderColor: "divider", px: 1, lineHeight: `${colHeaderHeight}px`, fontWeight: 900, fontSize: 12 }}>
            {(meta.rowHeaderNames || []).join(" / ")}
          </Box>
          {[...colLabels.entries()].map(([c, label]) => (
            <Box key={`ch:${c}`} sx={cellBaseSx(0, c, { top: 0, height: colHeaderHeight, fontWeight: 900, bgcolor: "background.paper" })} title={label}>
              {label}
            </Box>
          ))}
          {[...rowLabels.entries()].map(([r, label]) => (
            <Box key={`rh:${r}`} sx={{ position: "absolute", top: Math.round((colHeaderHeight + r * rowHeight) / yScale), left: 0, width: rowHeaderWidth, height: Math.max(18, Math.round(rowHeight / yScale)), boxSizing: "border-box", borderRight: "1px solid", borderBottom: "1px solid", borderColor: "divider", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis", px: 1, py: 0.25, fontSize: 12, lineHeight: "20px", bgcolor: "background.paper", fontWeight: label === "Grand Total" ? 900 : 500 }} title={label}>
              {label}
            </Box>
          ))}
          {body.map((cell) => (
            <Box key={`b:${cell.r}:${cell.c}`} sx={cellBaseSx(cell.r, cell.c, { fontWeight: cell.r === meta.totalRows - 1 || cell.c === meta.totalCols - 1 ? 900 : 400 })} title={String(cell.value ?? "")}>
              {cell.value}
            </Box>
          ))}
        </Box>
      </Box>
      <Typography variant="caption" color="text.secondary">
        Lazy tile grid: 表示範囲と周辺タイルだけWorkerから取得します。スクロール位置: top {fmt(scrollInfo.top)} / left {fmt(scrollInfo.left)}。
      </Typography>
    </Box>
  );
}



const GRAPH_SQL_DATASET_NAME = "active_dataset";

function sqlIdentifier(name){
  const s = String(name || "column");
  return /^[A-Za-z_][A-Za-z0-9_]*$/.test(s) ? s : `"${s.replace(/"/g, '""')}"`;
}

function sqlLiteral(value){
  if (value == null || value === "") return "''";
  if (typeof value === "number" && Number.isFinite(value)) return String(value);
  return `'${String(value).replace(/'/g, "''")}'`;
}

function columnByIndex(columns, index){
  return (columns || []).find((c) => Number(c.index) === Number(index)) || null;
}

function columnBySqlName(columns, raw){
  const name = String(raw || "").trim().replace(/^"|"$/g, "").replace(/^`|`$/g, "").replace(/\s*\/\*.*?\*\//g, "").trim();
  return (columns || []).find((c) => String(c.name).toLowerCase() === name.toLowerCase() || String(c.index) === name) || null;
}

const GRAPH_SQL_COMMANDS = {
  WITH: "サブクエリ定義",

  ON: "結合条件",

function sqlCommandComment(command){
  const key = String(command || "").toUpperCase().replace(/\s+/g, "_");
  const jp = GRAPH_SQL_COMMANDS[key] || "SQLコマンド";
  return `-- ${String(command).toUpperCase()}（${jp}）`;
}

const GRAPH_OPERATOR_DEFS = [

function graphOperatorDef(op){
  return GRAPH_OPERATOR_DEFS.find((d) => d.op === String(op || "").toLowerCase()) || GRAPH_OPERATOR_DEFS.find((d) => d.op === "contains");
}

function graphOperatorLabel(op){
  const d = graphOperatorDef(op);
  return `${d.code}（${d.jp}） ${d.symbol}`;
}

function graphOperatorShortLabel(op){
  const d = graphOperatorDef(op);
  return `${d.code}（${d.jp}）`;
}

function graphOperatorNeedsValue(op){
  return !["isnull","notnull","isempty","notempty"].includes(String(op || "").toLowerCase());
}

function graphOperatorOptionsForColumn(col){
  const type = col?.type === "number" ? "number" : "string";
  return GRAPH_OPERATOR_DEFS.filter((d) => d.types.includes(type));
}

function normalizeGraphOperatorForColumn(op, col){
  const opts = graphOperatorOptionsForColumn(col);
  return opts.some((d) => d.op === op) ? op : (col?.type === "number" ? "eq" : "contains");
}

function stripSqlComments(sql){
  return String(sql || "")
    .replace(/\/\*[\s\S]*?\*\//g, " ")
    .split(/\r?\n/)
    .map((line) => line.replace(/--.*$/g, ""))
    .join("\n");
}

function normalizeSqlLikeOperator(pattern, negated=false){
  const raw = parseSqlValue(pattern);
  const starts = raw.startsWith("%");
  const ends = raw.endsWith("%");
  const value = raw.replace(/^%/, "").replace(/%$/, "");
  if (negated) return { op:"notcontains", value };
  if (starts && ends) return { op:"contains", value };
  if (!starts && ends) return { op:"startswith", value };
  if (starts && !ends) return { op:"endswith", value };
  return { op:"contains", value };
}

function normalizeGraphAlias(value, fallback="t"){
  const s = String(value || "").normalize("NFKC").trim().replace(/[^A-Za-z0-9_\u3040-\u30ff\u3400-\u9fff-]+/g, "_");
  return s || fallback;
}

function graphDatasetColumns(source, activeColumns, datasets){
  const datasetId = source?.datasetId || "__active__";
  if (!datasetId || datasetId === "__active__") return activeColumns || [];
  const ds = (datasets || []).find((d) => String(d.id) === String(datasetId));
  return ds?.schemaColumns || ds?.columnsMeta || [];
}

function graphDatasetLabel(datasetId, datasets, manifest){
  if (!datasetId || datasetId === "__active__") return manifest?.tableName || manifest?.name || "Active Dataset";
  const ds = (datasets || []).find((d) => String(d.id) === String(datasetId));
  return ds?.path || ds?.tableName || ds?.name || datasetId;
}

function graphSourceNodes(nodes){
  return (nodes || []).filter((n) => n.data?.kind === "source" && !n.data?.disabled);
}

function graphSourceAlias(node){
  return normalizeGraphAlias(node?.data?.alias || (node?.id === "source" ? "t1" : node?.id), node?.id || "t");
}

function graphFieldValue(sourceId, columnIndex){ return `${sourceId}:${Number(columnIndex)}`; }
function parseGraphFieldValue(value){
  const [sourceId, col] = String(value || "").split(":");
  const columnIndex = Number(col);
  return sourceId && Number.isFinite(columnIndex) ? { sourceId, columnIndex } : null;
}

function graphAllFieldOptions(nodes, activeColumns, datasets){
  const out = [];
  for (const src of graphSourceNodes(nodes)){
    const alias = graphSourceAlias(src);
    const cols = graphDatasetColumns(src.data || {}, activeColumns, datasets);
    for (const c of cols || []) out.push({ sourceId:src.id, alias, columnIndex:Number(c.index), name:c.name, type:c.type, value:graphFieldValue(src.id, c.index) });
  }
  return out;
}

function graphSourceById(nodes, id){ return graphSourceNodes(nodes).find((n) => String(n.id) === String(id)) || null; }

function defaultProjection(columns){
  return (columns || []).slice(0, Math.min(12, columns.length)).map((c) => Number(c.index));
}

function normalizeGraphNodeLabel(node, columns, datasets=[]) {
  if (!node) return "Node";
  const data = node.data || {};
  const col = columnByIndex(columns, data.columnIndex);
  if (data.kind === "source") return `Source: ${data.alias || (node.id === "source" ? "t1" : node.id)}`;
  if (data.kind === "join") return `Join: ${data.joinType || "inner"}`;
  if (data.kind === "select") return `Select: ${(data.selectedFields || data.selectedColumns || []).length || "all"} cols`;
  if (data.kind === "filter") return `Filter: ${col?.name || "column"} ${graphOperatorShortLabel(data.op || "contains")}`;
  if (data.kind === "sort") return `Sort: ${col?.name || "column"} ${(data.direction || "asc").toUpperCase()}`;
  if (data.kind === "limit") return `Limit: ${Number(data.maxRows || 0) || "all"}`;
  if (data.kind === "derived") return `Derived: ${data.newColumnName || "new_column"}`;
  if (data.kind === "aggregate") return `Aggregate: ${data.aggregation || "Count"}`;
  if (data.kind === "subquery") return `Subquery: ${data.alias || node.id}`;
  if (data.kind === "output") return "Output: Result Table";
  return data.label || "Node";
}

function makeGraphNode(id, kind, position, columns, extra={}) {
  const firstCol = columns[0]?.index ?? 0;
  const base = { id, position, data: { kind, label: kind }, style: graphNodeStyle(kind), ...extra };
  if (kind === "source") return { ...base, data: { kind, label: "Source", datasetId: extra?.data?.datasetId || "__active__", alias: extra?.data?.alias || (id === "source" ? "t1" : id.replace(/[^A-Za-z0-9_]/g, "_")) } };
  if (kind === "join") return { ...base, data: { kind, label: "Join", leftSourceId: "source", rightSourceId: "", leftColumnIndex: firstCol, rightColumnIndex: firstCol, joinType: "inner" } };
  if (kind === "select") return { ...base, data: { kind, label: "Select", selectedColumns: defaultProjection(columns), selectedFields: [] } };
  if (kind === "filter") return { ...base, data: { kind, label: "Filter", columnIndex: firstCol, op: "contains", value: "" } };
  if (kind === "sort") return { ...base, data: { kind, label: "Sort", columnIndex: firstCol, direction: "asc" } };
  if (kind === "limit") return { ...base, data: { kind, label: "Limit", maxRows: "0" } };

  if (kind === "aggregate") return { ...base, data: { kind, label: "Aggregate", groupBy: [], valueField: "-1", aggregation: "Count" } };
  if (kind === "subquery") return { ...base, data: { kind, label: "Subquery", alias: id.replace(/[^A-Za-z0-9_]/g, "_") } };
