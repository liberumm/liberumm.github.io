function opToSql(op, value, colType="string") {
  const o = String(op || "contains").toLowerCase();
  const typedValue = colType === "number" && Number.isFinite(Number(value)) ? Number(value) : sqlLiteral(value);
  if (o === "contains") return `LIKE ${sqlLiteral(`%${value || ""}%`)} /* CONTAINS（含む） */`;
  if (o === "notcontains") return `NOT LIKE ${sqlLiteral(`%${value || ""}%`)} /* NOT CONTAINS（含まない） */`;
  if (o === "startswith") return `LIKE ${sqlLiteral(`${value || ""}%`)} /* STARTS WITH（前方一致） */`;
  if (o === "endswith") return `LIKE ${sqlLiteral(`%${value || ""}`)} /* ENDS WITH（後方一致） */`;
  if (o === "regex") return `REGEXP ${sqlLiteral(value)} /* REGEX（正規表現） */`;
  if (o === "eq") return `= ${typedValue} /* EQ（等しい） */`;
  if (o === "ne") return `<> ${typedValue} /* NE（等しくない） */`;
  if (o === "gt") return `> ${typedValue} /* GT（より大きい） */`;
  if (o === "ge") return `>= ${typedValue} /* GE（以上） */`;
  if (o === "lt") return `< ${typedValue} /* LT（より小さい） */`;
  if (o === "le") return `<= ${typedValue} /* LE（以下） */`;
  if (o === "isnull") return "IS NULL /* NULL */";
  if (o === "notnull") return "IS NOT NULL /* NULLではない */";
  if (o === "isempty") return "IS EMPTY /* 空文字またはNULL */";
  if (o === "notempty") return "IS NOT EMPTY /* 空ではない */";
  return `LIKE ${sqlLiteral(`%${value || ""}%`)} /* CONTAINS（含む） */`;
}

function filterToSql(filter, columns) {
  const col = columnByIndex(columns, filter.columnIndex);
  return `${sqlIdentifier(col?.name || `Column${Number(filter.columnIndex)+1}`)} ${opToSql(filter.op, filter.value, col?.type)}`;
}

function graphSourceSqlName(source){ return sqlIdentifier(graphSourceAlias(source)); }

function graphColumnSqlName(field, plan, activeColumns, datasets){
  const source = (plan.sources || []).find((s) => s.id === field.sourceId) || {id:field.sourceId, alias:field.sourceId, datasetId:"__active__"};
  const sourceNodeLike = {data:{datasetId:source.datasetId}};
  const cols = graphDatasetColumns(sourceNodeLike.data, activeColumns, datasets);
  const col = columnByIndex(cols, field.columnIndex);
  return `${sqlIdentifier(source.alias || source.id)}.${sqlIdentifier(col?.name || `Column${Number(field.columnIndex)+1}`)}`;
}


function normalizeGraphDerivedColumns(items=[]) {
  return (Array.isArray(items) ? items : [])
    .map((d, i) => ({
      id: String(d?.id || `derived_${i + 1}`),
      newColumnName: String(d?.newColumnName || `new_column_${i + 1}`).trim() || `new_column_${i + 1}`,
      valueMode: d?.valueMode === "formula" ? "formula" : "constant",
      constantValue: d?.constantValue ?? "",
      formulaExpression: String(d?.formulaExpression || "").trim(),
    }))
    .filter((d) => d.newColumnName);
}

function graphDerivedSqlExpression(d) {
  const alias = sqlIdentifier(d.newColumnName || "new_column");
  if (d.valueMode === "formula") {
    const expr = String(d.formulaExpression || "NULL").trim() || "NULL";
    return `${expr} AS ${alias} /* 計算列 */`;
  }
  return `${sqlLiteral(d.constantValue ?? "")} AS ${alias} /* 固定値列 */`;
}

const GRAPH_DERIVED_FORBIDDEN = /\b(window|document|fetch|XMLHttpRequest|localStorage|sessionStorage|indexedDB|Function|eval|import|constructor|prototype|globalThis|self|postMessage)\b/i;
const GRAPH_DERIVED_FN_CACHE = new Map();

function valueByFlexibleName(rowMap, name) {
  const key = String(name || "");
  if (Object.prototype.hasOwnProperty.call(rowMap, key)) return rowMap[key];
  const lower = key.toLowerCase();
  const found = Object.keys(rowMap).find((k) => String(k).toLowerCase() === lower);
  return found == null ? undefined : rowMap[found];
}

function evaluateGraphDerivedColumn(d, rowMap) {
  try {
    if ((d.valueMode || "constant") !== "formula") return d.constantValue ?? "";
    const expr = String(d.formulaExpression || "").trim();
    if (!expr) return "";
    if (GRAPH_DERIVED_FORBIDDEN.test(expr)) return "#BLOCKED";
    const col = (name) => valueByFlexibleName(rowMap, name);
    const num = (v, fallback=0) => {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    };
    const str = (v) => v == null ? "" : String(v);
    const concat = (...xs) => xs.map((x) => x == null ? "" : String(x)).join("");
    const coalesce = (...xs) => xs.find((x) => x !== null && x !== undefined && x !== "") ?? "";
    const lower = (v) => str(v).toLowerCase();
    const upper = (v) => str(v).toUpperCase();
    const round = (v, digits=0) => {
      const m = Math.pow(10, Number(digits) || 0);
      return Math.round(num(v) * m) / m;
    };

    const splitText = (v, sep="/") => str(v).split(sep);
    const pathParts = (v) => str(v).replace(/\\+/g,"/").split("/").filter(Boolean);
    const pathPart = (v, index=0) => {
      const parts = pathParts(v);
      let i = Number(index) || 0;
      if (i < 0) i = parts.length + i;
      return parts[i] ?? "";
    };
    const basename = (v) => {
      const parts = pathParts(v);
      return parts.length ? parts[parts.length - 1] : "";
    };
    const filename = basename;
    const dirname = (v) => {
      const s = str(v).replace(/\\+/g,"/");
      const p = s.lastIndexOf("/");
      return p >= 0 ? s.slice(0, p) : "";
    };
    const ext = (v) => {
      const b = basename(v);
      const p = b.lastIndexOf(".");
      return p > 0 ? b.slice(p + 1) : "";
    };
    const extname = (v) => {
      const e = ext(v);
      return e ? `.${e}` : "";
    };
    const stem = (v) => {
      const b = basename(v);
      const p = b.lastIndexOf(".");
      return p > 0 ? b.slice(0, p) : b;
    };
    const before = (v, mark) => {
      const s = str(v), m = str(mark);
      const p = s.indexOf(m);
      return p >= 0 ? s.slice(0, p) : "";
    };
    const after = (v, mark) => {
      const s = str(v), m = str(mark);
      const p = s.indexOf(m);
      return p >= 0 ? s.slice(p + m.length) : "";
    };
    const between = (v, start, end) => {
      const a = after(v, start);
      return a ? before(a, end) : "";
    };
    const sliceText = (v, start=0, end=undefined) => str(v).slice(Number(start)||0, end == null ? undefined : Number(end));
    const left = (v, n=1) => str(v).slice(0, Math.max(0, Number(n)||0));
    const right = (v, n=1) => {
      const s = str(v);
      return s.slice(Math.max(0, s.length - (Number(n)||0)));
    };
    const replaceText = (v, search, replacement="") => str(v).split(str(search)).join(str(replacement));
    const regexExtract = (v, pattern, group=1, flags="") => {
      try{
        const re = new RegExp(String(pattern), String(flags).replace(/[^gimsuy]/g,""));
        const m = re.exec(str(v));
        return m ? (m[Number(group)||0] ?? "") : "";
      }catch{ return ""; }
    };
    let fn = GRAPH_DERIVED_FN_CACHE.get(expr);
    if (!fn) {
      fn = new Function(
        "col", "num", "str", "concat", "coalesce", "lower", "upper", "round", "abs", "min", "max", "row",
        "split", "part", "pathParts", "pathPart", "basename", "filename", "dirname", "ext", "extname", "stem",
        "before", "after", "between", "sliceText", "left", "right", "replaceText", "regexExtract",
        `"use strict"; return (${expr});`
      );
      if (GRAPH_DERIVED_FN_CACHE.size > 100) GRAPH_DERIVED_FN_CACHE.clear();
      GRAPH_DERIVED_FN_CACHE.set(expr, fn);
    }
    const value = fn(
      col, num, str, concat, coalesce, lower, upper, round, Math.abs, Math.min, Math.max, rowMap,
      splitText, pathPart, pathParts, pathPart, basename, filename, dirname, ext, extname, stem,
      before, after, between, sliceText, left, right, replaceText, regexExtract
    );
    return value == null ? "" : value;
  } catch (e) {
    return `#ERR ${e?.message || "formula"}`;
  }
}

function applyGraphDerivedColumnsToTable(table, derivedColumns=[]) {
  const normalized = normalizeGraphDerivedColumns(derivedColumns);
  if (!table || !Array.isArray(table.header) || !normalized.length) return table;
  const header = [...table.header, ...normalized.map((d) => d.newColumnName)];
  const evaluators = normalized.map((d) => (rowMap) => evaluateGraphDerivedColumn(d, rowMap));
  const rows = (table.rows || []).map((row) => {
    const rowMap = {};
    table.header.forEach((h, i) => { rowMap[h] = row[i]; });
    const extra = evaluators.map((fn) => fn(rowMap));
    return [...row, ...extra];
  });
  return { ...table, header, rows };
}

function graphYieldFrame(){
  return new Promise((resolve) => {
    if (typeof requestAnimationFrame === "function") requestAnimationFrame(() => resolve());
    else setTimeout(resolve, 0);
  });
}

async function applyGraphDerivedColumnsToTableAsync(table, derivedColumns=[], options={}) {
  const normalized = normalizeGraphDerivedColumns(derivedColumns);
  if (!table || !Array.isArray(table.header) || !normalized.length) return table;
  const header = [...table.header, ...normalized.map((d) => d.newColumnName)];
  const rows = [];
  const sourceRows = table.rows || [];
  const evaluators = normalized.map((d) => (rowMap) => evaluateGraphDerivedColumn(d, rowMap));
  const chunkSize = Math.max(25, Number(options.chunkSize || 120));
  const onProgress = typeof options.onProgress === "function" ? options.onProgress : null;
  for (let start=0; start<sourceRows.length; start += chunkSize) {
    const end = Math.min(sourceRows.length, start + chunkSize);
    for (let r=start; r<end; r++) {
      const row = sourceRows[r] || [];
      const rowMap = {};
      table.header.forEach((h, i) => { rowMap[h] = row[i]; });
      const extra = evaluators.map((fn) => fn(rowMap));
      rows.push([...row, ...extra]);
    }
    if (onProgress) onProgress(end, sourceRows.length);
    if (end < sourceRows.length) await graphYieldFrame();
  }
  return { ...table, header, rows };
}

function graphToSqlPreview(plan, columns, datasets=[]) {
  const subqueries = plan.subqueries || [];
  const lines = [];
  if (subqueries.length) {
    lines.push(sqlCommandComment("WITH"));
    lines.push("WITH " + subqueries.map((s) => {
      const body = [`${sqlCommandComment("SELECT")}
SELECT *`, `${sqlCommandComment("FROM")}
FROM ${GRAPH_SQL_DATASET_NAME}`];
      if (s.filters?.length) body.push(`${sqlCommandComment("WHERE")}
WHERE ${s.filters.map((f) => filterToSql(f, columns)).join(" AND ")}`);
      return `${sqlIdentifier(s.alias)} AS (\n  ${body.join("\n  ")}\n)`;
    }).join(",\n"));
  }

  if (plan.mode === "join" && (plan.sources || []).length >= 2 && (plan.joins || []).length) {
    const fields = (plan.selectedFields || []).map(parseGraphFieldValue).filter(Boolean);
    const derivedSelects = normalizeGraphDerivedColumns(plan.derivedColumns).map(graphDerivedSqlExpression);
    const baseSelects = fields.length ? fields.map((f) => graphColumnSqlName(f, plan, columns, datasets)) : ["*"];
    const selectList = [...baseSelects, ...derivedSelects].join(", ");
    const join = plan.joins[0];
    const left = (plan.sources || []).find((s) => s.id === join.leftSourceId) || plan.sources[0];
    const right = (plan.sources || []).find((s) => s.id === join.rightSourceId) || plan.sources[1];
    const leftCol = columnByIndex(graphDatasetColumns({datasetId:left.datasetId}, columns, datasets), join.leftColumnIndex);
    const rightCol = columnByIndex(graphDatasetColumns({datasetId:right.datasetId}, columns, datasets), join.rightColumnIndex);
    lines.push(sqlCommandComment("SELECT"));
    lines.push(`SELECT ${selectList}`);
    lines.push(sqlCommandComment("FROM"));
    lines.push(`FROM ${sqlIdentifier(left.alias)} /* ${graphDatasetLabel(left.datasetId, datasets)} */`);
    lines.push(sqlCommandComment("JOIN"));
    lines.push(`${String(join.joinType || "inner").toUpperCase()} JOIN ${sqlIdentifier(right.alias)} /* ${graphDatasetLabel(right.datasetId, datasets)} */`);
    lines.push(sqlCommandComment("ON"));
    lines.push(`  ON ${sqlIdentifier(left.alias)}.${sqlIdentifier(leftCol?.name || "key")} = ${sqlIdentifier(right.alias)}.${sqlIdentifier(rightCol?.name || "key")}`);
    if (Number(plan.maxRows || 0) > 0) { lines.push(sqlCommandComment("LIMIT")); lines.push(`LIMIT ${Number(plan.maxRows || 0)}`); }
    return `${lines.join("\n")};`;
  }

  const projection = plan.projection?.length ? plan.projection : [];
  const derivedSelects = normalizeGraphDerivedColumns(plan.derivedColumns).map(graphDerivedSqlExpression);
  const baseSelects = projection.length
    ? projection.map((idx) => sqlIdentifier(columnByIndex(columns, idx)?.name || `Column${Number(idx)+1}`))
    : ["*"];
  const selectList = [...baseSelects, ...derivedSelects].join(", ");
  const fromName = plan.sourceAlias || GRAPH_SQL_DATASET_NAME;
  const whereSql = (plan.filters || []).map((f) => filterToSql(f, columns));
  const sortCol = plan.sort ? columnByIndex(columns, plan.sort.columnIndex) : null;
  lines.push(sqlCommandComment("SELECT"));
  lines.push(`SELECT ${selectList}`);
  lines.push(sqlCommandComment("FROM"));
  lines.push(`FROM ${sqlIdentifier(fromName)}`);
  if (whereSql.length) { lines.push(sqlCommandComment("WHERE")); lines.push(`WHERE ${whereSql.join(" AND ")}`); }
  if (sortCol) { lines.push(sqlCommandComment("ORDER BY")); lines.push(`ORDER BY ${sqlIdentifier(sortCol.name)} ${(plan.sort.direction || "asc").toUpperCase()}`); }
  if (Number(plan.maxRows || 0) > 0) { lines.push(sqlCommandComment("LIMIT")); lines.push(`LIMIT ${Number(plan.maxRows || 0)}`); }
  return `${lines.join("\n")};`;
}

function compileGraphQuery(nodes, edges, columns, datasets=[]) {
  const filters = [];
  let sort = null;
  let maxRows = 0;
  let projection = [];
  let selectedFields = [];
  const derivedColumns = [];
  const subqueries = [];
  const active = (nodes || []).filter((n) => !(n.data || {}).disabled);
  const sources = graphSourceNodes(active).map((n, idx) => ({
    id:n.id,
    datasetId:n.data?.datasetId || "__active__",
    alias:graphSourceAlias(n),
    name:graphDatasetLabel(n.data?.datasetId || "__active__", datasets),
    order:idx
  }));
  const joins = [];
  for (const n of active) {
    const d = n.data || {};
    if (d.kind === "join") {
      joins.push({
        id:n.id,
        leftSourceId:d.leftSourceId || sources[0]?.id || "source",
        rightSourceId:d.rightSourceId || sources[1]?.id || "",
        leftColumnIndex:Number(d.leftColumnIndex),
        rightColumnIndex:Number(d.rightColumnIndex),
        joinType:d.joinType === "left" ? "left" : "inner"
      });
    }
    if (d.kind === "filter") {
      filters.push({ id: n.id, columnIndex: Number(d.columnIndex), op: d.op || "contains", value: d.value ?? "", parentId: n.parentId || null });
    }
    if (d.kind === "sort") sort = { columnIndex: Number(d.columnIndex), direction: d.direction === "desc" ? "desc" : "asc" };
    if (d.kind === "limit") maxRows = Math.max(0, Number(d.maxRows || 0));
    if (d.kind === "derived") {
      derivedColumns.push({
        id:n.id,
        newColumnName:d.newColumnName || "new_column",
        valueMode:d.valueMode === "formula" ? "formula" : "constant",
        constantValue:d.constantValue ?? "",
        formulaExpression:d.formulaExpression || ""
      });
    }
    if (d.kind === "select") {
      projection = (Array.isArray(d.selectedColumns) ? d.selectedColumns : []).map(Number).filter((idx) => (columns || []).some((c) => Number(c.index) === idx));
      selectedFields = (Array.isArray(d.selectedFields) ? d.selectedFields : []).map(String).filter(Boolean);
    }
    if (d.kind === "subquery") {
      const childFilters = active
        .filter((x) => x.parentId === n.id && x.data?.kind === "filter")
        .map((x) => ({ id: x.id, columnIndex: Number(x.data.columnIndex), op: x.data.op || "contains", value: x.data.value ?? "" }));
      subqueries.push({ id: n.id, alias: d.alias || n.id, filters: childFilters });
    }
  }
  const mode = sources.length >= 2 && joins.length ? "join" : "single";
  const plan = { mode, sources, joins, filters, sort, maxRows, projection, selectedFields, derivedColumns: normalizeGraphDerivedColumns(derivedColumns), subqueries, edges: (edges || []).map((e) => ({ id:e.id, source:e.source, target:e.target })) };
  plan.sql = graphToSqlPreview(plan, columns, datasets);
  return plan;
}

function parseSqlValue(raw) {
  let s = String(raw || "").trim().replace(/;$/g, "");
  if ((s.startsWith("'") && s.endsWith("'")) || (s.startsWith('"') && s.endsWith('"'))) s = s.slice(1, -1).replace(/''/g, "'");
  return s;
}

function parseSqlToGraphPlan(sql, columns) {
  const original = String(sql || "").trim();
  const errors = [];
  if (!original) return { filters: [], sort: null, maxRows: 0, projection: [], errors: ["SQLが空です。"] };
  let body = stripSqlComments(original).replace(/;\s*$/g, "").trim();
  const selectMatches = [...body.matchAll(/\bSELECT\b/ig)];
  if (selectMatches.length > 1) body = body.slice(selectMatches[selectMatches.length - 1].index);
  const m = body.match(/select\s+([\s\S]+?)\s+from\s+([\s\S]+?)(?:\s+where\s+([\s\S]+?))?(?:\s+order\s+by\s+([\s\S]+?))?(?:\s+limit\s+(\d+))?\s*$/i);
  if (!m) return { filters: [], sort: null, maxRows: 0, projection: [], errors: ["対応SQLは SELECT ... FROM ... WHERE ... ORDER BY ... LIMIT ... の限定構文です。"] };
  const selectPart = m[1].trim();
  const wherePart = (m[3] || "").trim();
  const orderPart = (m[4] || "").trim();
  const limitPart = (m[5] || "").trim();
  let projection = [];
  if (selectPart !== "*") {
    projection = selectPart.split(",").map((x) => columnBySqlName(columns, x.trim())?.index).filter((x) => x != null).map(Number);
    if (!projection.length) errors.push("SELECT列を解決できませんでした。列名を確認してください。");
  }
  const filters = [];
  if (wherePart) {
    const parts = wherePart.split(/\s+AND\s+/i).map((x) => x.trim()).filter(Boolean);
    for (const part of parts) {
      let fm = part.match(/^(.+?)\s+IS\s+NOT\s+NULL$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:"notnull",value:""}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s+IS\s+NULL$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:"isnull",value:""}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s+IS\s+NOT\s+EMPTY$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:"notempty",value:""}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s+IS\s+EMPTY$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:"isempty",value:""}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s+NOT\s+LIKE\s+(.+)$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); const like=normalizeSqlLikeOperator(fm[2], true); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:like.op,value:like.value}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s+LIKE\s+(.+)$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); const like=normalizeSqlLikeOperator(fm[2], false); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:like.op,value:like.value}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s+(REGEXP|RLIKE)\s+(.+)$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:"regex",value:parseSqlValue(fm[3])}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s+STARTS\s+WITH\s+(.+)$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:"startswith",value:parseSqlValue(fm[2])}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s+ENDS\s+WITH\s+(.+)$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:"endswith",value:parseSqlValue(fm[2])}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s+CONTAINS\s+(.+)$/i);
      if (fm) { const c=columnBySqlName(columns,fm[1]); if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:"contains",value:parseSqlValue(fm[2])}); else errors.push(`WHERE列を解決できません: ${fm[1]}`); continue; }
      fm = part.match(/^(.+?)\s*(>=|<=|<>|!=|=|>|<|\bEQ\b|\bNE\b|\bLT\b|\bGT\b|\bLE\b|\bGE\b)\s*(.+)$/i);
      if (fm) {
        const c=columnBySqlName(columns,fm[1]);
        const opToken=String(fm[2] || "").toUpperCase();
        const opMap={">=":"ge","<=":"le","<>":"ne","!=":"ne","=":"eq",">":"gt","<":"lt", "EQ":"eq", "NE":"ne", "LT":"lt", "GT":"gt", "LE":"le", "GE":"ge"};
        if(c) filters.push({id:`sql-${filters.length}`,columnIndex:Number(c.index),op:opMap[opToken] || opMap[fm[2]] || "eq",value:parseSqlValue(fm[3])}); else errors.push(`WHERE列を解決できません: ${fm[1]}`);
        continue;
      }
      errors.push(`未対応WHERE条件: ${part}`);
    }
  }
  let sort = null;
  if (orderPart) {
    const om = orderPart.match(/^(.+?)(?:\s+(ASC|DESC))?$/i);
    const c = om ? columnBySqlName(columns, om[1]) : null;
    if (c) sort = { columnIndex: Number(c.index), direction: String(om[2] || "asc").toLowerCase() === "desc" ? "desc" : "asc" };
    else errors.push(`ORDER BY列を解決できません: ${orderPart}`);
  }
  return { filters, sort, maxRows: Number(limitPart || 0), projection, errors };
}


function graphNodeById(nodes, id){ return (nodes || []).find((n) => String(n.id) === String(id)) || null; }
function graphEdgeColor(edge, nodes){
  const sourceKind = graphNodeById(nodes, edge?.source)?.data?.kind || "node";
  const targetKind = graphNodeById(nodes, edge?.target)?.data?.kind || "node";
  const sourceMeta = graphKindMeta(sourceKind);
  const targetMeta = graphKindMeta(targetKind);
  return targetMeta?.accent || sourceMeta?.accent || "#64748b";
}
function autoArrangeGraphNodesNoOverlap(nodes){
  const widths = { subquery: 480, source: 220, join: 230, select: 220, filter: 220, sort: 220, limit: 190, derived: 240, aggregate: 230, output: 210 };
  const heights = { subquery: 340, source: 100, join: 115, select: 105, filter: 120, sort: 105, limit: 95, derived: 130, aggregate: 115, output: 95 };
  const gapX = 48, gapY = 34;
  const placed = [];
  const intersects = (a, b) => !(a.x + a.w + gapX < b.x || b.x + b.w + gapX < a.x || a.y + a.h + gapY < b.y || b.y + b.h + gapY < a.y);
  return (nodes || []).map((n, idx) => {
    const kind = n.data?.kind || "node";
    let x = Number(n.position?.x ?? (idx * 220));
    let y = Number(n.position?.y ?? 80);
    const box = { x, y, w: widths[kind] || 220, h: heights[kind] || 105 };
    let guard = 0;
    while (placed.some((p) => intersects(box, p)) && guard < 300) {
      box.x += 36;
      box.y += box.x > 1180 ? 145 : 0;
      if (box.x > 1180) box.x = 40;
      guard++;
    }
    placed.push({ ...box });
    return { ...n, position: { x: box.x, y: box.y } };
  });
}

function formulaColumnExpression(field){
  const name = String(field?.name ?? "");
  const alias = String(field?.alias ?? "").trim();
  const qualified = alias && alias !== "t1" ? `${alias}.${name}` : name;
  return `col(${JSON.stringify(qualified)})`;
}
function FormulaRecipePanel({ onPick, fieldOptions=[] }) {
  const [filterText, setFilterText] = useState("");
  const groups = useMemo(() => {
    const map = new Map();
    for (const recipe of GRAPH_FORMULA_RECIPES) {
      if (!map.has(recipe.group)) map.set(recipe.group, []);
      map.get(recipe.group).push(recipe);
    }
    return [...map.entries()];
  }, []);
  const filteredFields = useMemo(() => {
    const q = String(filterText || "").trim().toLowerCase();
    const list = Array.isArray(fieldOptions) ? fieldOptions : [];
    return (q ? list.filter((f) => `${f.alias}.${f.name} ${f.type}`.toLowerCase().includes(q)) : list).slice(0, 80);
  }, [fieldOptions, filterText]);
  return (
    <Paper variant="outlined" sx={{ p: 1, bgcolor: "rgba(255,255,255,0.72)", borderRadius: 1.5 }}>
      <Stack spacing={0.8}>
        <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>数式ヘルプ / 入力支援</Typography>
        <Alert severity="info" sx={{ py: 0.25 }}>
          列名チップを押すと col("列名") を挿入します。JOIN結果では alias.column 形式も使えます。
        </Alert>
        <TextField size="small" label="カラム検索" value={filterText} onChange={(e) => setFilterText(e.target.value)} placeholder="path, amount, t1.name など" />
        {!!filteredFields.length && (
          <Box>
            <Typography variant="caption" sx={{ fontWeight: 900, color: "text.secondary" }}>接続データソースのカラム / クリックで col(...) 挿入</Typography>
            <Stack direction="row" useFlexGap flexWrap="wrap" spacing={0.5} sx={{ mt: 0.35, maxHeight: 120, overflow: "auto" }}>
              {filteredFields.map((f) => (
                <Tooltip key={`${f.value}-${f.alias}-${f.name}`} title={`${formulaColumnExpression(f)} / ${f.type || ""}`}>
                  <Chip size="small" clickable label={`${f.alias}.${f.name}`} onClick={() => onPick?.(formulaColumnExpression(f))} sx={{ fontWeight: 700 }} />
                </Tooltip>
              ))}
            </Stack>
          </Box>
        )}
        {groups.map(([group, recipes]) => (
          <Box key={group}>
            <Typography variant="caption" sx={{ fontWeight: 900, color: "text.secondary" }}>{group}</Typography>
            <Stack direction="row" useFlexGap flexWrap="wrap" spacing={0.5} sx={{ mt: 0.35 }}>
              {recipes.map((recipe) => (
                <Tooltip key={`${group}-${recipe.label}`} title={`${recipe.expr} / ${recipe.desc}`}>
                  <Button size="small" variant="outlined" onClick={() => onPick?.(recipe.expr)} sx={{ textTransform:"none" }}>
                    {recipe.label}
                  </Button>
                </Tooltip>
              ))}
            </Stack>
          </Box>
        ))}
      </Stack>
    </Paper>
  );
}


function GraphQueryVirtualTable({ table, totalRows=0, page=1, pageSize=1000, onReadPage=()=>{}, height=420 }) {
  const header = table?.header || [];
  const rows = table?.rows || [];
  const safePage = Math.max(1, Number(page || 1));
  const safePageSize = Math.max(1, Number(pageSize || 1000));
  const tablePage = Math.max(1, Number(table?.page || safePage || 1));
  const tablePageSize = Math.max(1, Number(table?.pageSize || safePageSize || 1000));
  const tableStartRow = Number.isFinite(Number(table?.startRow))
    ? Math.max(0, Number(table.startRow || 0))
    : (tablePage - 1) * tablePageSize;
  const safeTotal = Math.max(Number(totalRows || 0), rows.length);

  return (
    <CommonTileTableView
      tableId="graphQueryResultLazy"
      header={header}
      rows={rows}
      height={height}
      dense={false}
      filterable={false}
      sortable={false}
      minColumnWidth={160}
      externalLazy
      totalRows={safeTotal}
      loadedStart={tableStartRow}
      page={safePage}
      pageSize={safePageSize}
      onReadPage={onReadPage}
      emptyMessage="Graph Queryを実行すると、ここに結果パネルが表示されます。"
      sourceLabel="Graph Query Result"
      statusLabel={`全${fmt(safeTotal)}行 / page ${fmt(safePage)} / tile ${fmt(safePageSize)} rows`}
    />
  );
}

function GraphQueryEditor({ columns, datasets=[], manifest=null, nodes, setNodes, edges, setEdges, onApply, onReadPage=()=>{}, onClearResult=()=>{}, onExportCsv=()=>{}, onResultSearch=()=>{}, onResultSearchPage=()=>{}, onResultPivot=()=>{}, onResultTime=()=>{}, resultSearchTable=null, resultSearchCount=0, resultSearchPage=1, resultSearchStatus="", resultSearchTime="", resultPivotTable=null, resultPivotStatus="", resultPivotTime="", resultTimeTable=null, resultTimeStatus="", resultTimeTime="", disabled, dataQueryActive, dataQueryCount, resultTable, resultStatus, resultTime, resultPage, resultPageMax, resultViewMode="tile", setResultViewMode=()=>{}, resultRowsPerTile="1000", setResultRowsPerTile=()=>{}, sqlText="", setSqlText=()=>{}, sqlMode=false, setSqlMode=()=>{}, graphSessions=[], activeSessionId="", sessionName="", setSessionName=()=>{}, onSessionNew=()=>{}, onSessionSave=()=>{}, onSessionSaveAs=()=>{}, onSessionLoad=()=>{}, onSessionDelete=()=>{}, onSessionDuplicate=()=>{}, autoStandby=true, setAutoStandby=()=>{}, onDatasetStandby=()=>{} }) {
  const [selectedId, setSelectedId] = useState(nodes?.[0]?.id || "source");
  const [sqlErrors, setSqlErrors] = useState([]);
  const [showMiniMap, setShowMiniMap] = useState(false);

  const [resultSearchValue, setResultSearchValue] = useState("");
  const [resultSearchMax, setResultSearchMax] = useState("100000");
  const [resultPivotRows, setResultPivotRows] = useState([]);
  const [resultPivotCols, setResultPivotCols] = useState([]);
  const [resultPivotValue, setResultPivotValue] = useState("-1");
  const [resultPivotAgg, setResultPivotAgg] = useState("Count");
  const [resultTimeField, setResultTimeField] = useState("0");
  const [resultTimeBucket, setResultTimeBucket] = useState("month");
  const [resultTimeGroup, setResultTimeGroup] = useState("-1");
  const [resultTimeValue, setResultTimeValue] = useState("-1");
  const [resultTimeAgg, setResultTimeAgg] = useState("Count");
  const flowPanelRef = useRef(null);
  const selectedNode = useMemo(() => nodes.find((n) => n.id === selectedId) || null, [nodes, selectedId]);
  const plan = useMemo(() => compileGraphQuery(nodes, edges, columns, datasets), [nodes, edges, columns, datasets]);
  const graphReady = !!ReactFlowCanvas;
  const resultHeader = Array.isArray(resultTable?.header) ? resultTable.header : [];
  useEffect(() => {
    if (!resultHeader.length) return;
    if (Number(resultSearchColumn) >= resultHeader.length) setResultSearchColumn("0");
    if (Number(resultTimeField) >= resultHeader.length) setResultTimeField("0");
  }, [resultHeader.length]);
  const safeSetSqlText = typeof setSqlText === "function" ? setSqlText : () => {};
  const safeSetSqlMode = typeof setSqlMode === "function" ? setSqlMode : () => {};

  useEffect(() => {
    setResultRowsDraft(String(resultRowsPerTile || "1000"));
  }, [resultRowsPerTile]);

  const applyResultRowsPerTile = () => {
    const nextNumber = Math.max(50, Math.floor(Number(resultRowsDraft || resultRowsPerTile || 100) || 100));
    const next = String(nextNumber);
    setResultRowsPerTile(next);
    setTimeout(() => onReadPage(1, nextNumber), 0);
  };

  const switchGraphResultToTile = () => {
    setResultViewMode("tile");
    setTimeout(() => onReadPage(1), 0);
  };

  const switchGraphResultToPage = () => {
    setResultViewMode("page");
    setResultRowsDraft("100");
    setResultRowsPerTile("100");
    setTimeout(() => onReadPage(1, 100), 0);
  };

  useEffect(() => {
    if (!sqlMode) safeSetSqlText(plan.sql || "");
  }, [plan.sql, sqlMode, safeSetSqlText]);

  const updateNodeData = (id, patch) => {
    setNodes((prev) => prev.map((n) => {
      if (n.id !== id) return n;
      const next = { ...n, data: { ...(n.data || {}), ...patch } };
      next.data.label = normalizeGraphNodeLabel(next, columns, datasets);
      return next;
    }));
  };

  const addNode = (kind, extra={}) => {
    const id = `${kind}-${Date.now().toString(36)}`;
    const x = kind === "subquery" ? 130 : kind === "source" ? 30 + graphSourceNodes(nodes).length * 220 : 190 + Math.max(0, nodes.length - 2) * 130;
    const y = kind === "source" ? 360 : kind === "join" ? 260 : kind === "filter" ? 105 : kind === "sort" ? 210 : kind === "select" ? 40 : kind === "derived" ? 300 : kind === "aggregate" ? 330 : kind === "subquery" ? 355 : 380;
    const node = makeGraphNode(id, kind, { x, y }, columns, extra);
    node.data.label = normalizeGraphNodeLabel(node, columns, datasets);
    setNodes((prev) => [...prev, node]);
    if (!["subquery", "source"].includes(kind)) {
      setEdges((prev) => [...prev, { id: `e-${prev.length}-${Date.now().toString(36)}`, source: "source", target: id, animated: true, reconnectable: true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined }]);
    }
    setSelectedId(id);
  };

  const resetGraph = () => {
    const baseNodes = [
      makeGraphNode("source", "source", { x: 20, y: 130 }, columns),
      makeGraphNode("select-1", "select", { x: 230, y: 40 }, columns),
      makeGraphNode("filter-1", "filter", { x: 230, y: 145 }, columns),
      makeGraphNode("sort-1", "sort", { x: 460, y: 145 }, columns),
      makeGraphNode("limit-1", "limit", { x: 690, y: 145 }, columns),
      makeGraphNode("output", "output", { x: 910, y: 130 }, columns),
    ].map((n) => ({ ...n, data: { ...n.data, label: normalizeGraphNodeLabel(n, columns) } }));
    setNodes(baseNodes);
    setEdges([
      { id: "source-select", source: "source", target: "select-1", animated: true, reconnectable: true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
      { id: "select-filter", source: "select-1", target: "filter-1", animated: true, reconnectable: true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
      { id: "filter-sort", source: "filter-1", target: "sort-1", animated: true, reconnectable: true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
      { id: "sort-limit", source: "sort-1", target: "limit-1", animated: true, reconnectable: true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
      { id: "limit-output", source: "limit-1", target: "output", animated: true, reconnectable: true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
    ]);
    setSelectedId("filter-1");
    safeSetSqlMode(false);
  };


  const autoArrangeGraph = () => {
    setNodes((prev) => autoArrangeGraphNodesNoOverlap(prev));
  };

  const downloadFlowImage = async () => {
    try {
      if (!htmlToImageToPng) { alert("画像出力ライブラリを読み込めませんでした。"); return; }
      const target = flowPanelRef.current?.querySelector?.(".react-flow__viewport") || flowPanelRef.current;
      if (!target) { alert("フローキャンバスが見つかりません。"); return; }
      const dataUrl = await htmlToImageToPng(target, { cacheBust: true, backgroundColor: "#ffffff", pixelRatio: 2 });
      const a = document.createElement("a");
      a.download = `graph_query_flow_${new Date().toISOString().replace(/[:.]/g,"-")}.png`;
      a.href = dataUrl;
      a.click();
    } catch (e) {
      alert(`画像出力に失敗しました: ${e?.message || e}`);
    }
  };

  const firstSubqueryId = () => nodes.find((n) => n.data?.kind === "subquery")?.id || null;

  const handleNodeAction = (action, id) => {
    const node = nodes.find((n) => n.id === id);
    if (!node) return;
    if (action === "delete") {
      if (["source", "output"].includes(id) || node.data?.kind === "subquery") return;
      setNodes((prev) => prev.filter((n) => n.id !== id));
      setEdges((prev) => prev.filter((e) => e.source !== id && e.target !== id));
      setSelectedId("source");
      return;
    }
    if (action === "toggle") { updateNodeData(id, { disabled: !node.data?.disabled }); return; }
    if (action === "duplicate") {
      const next = { ...node, id: `${node.data?.kind || "node"}-${Date.now().toString(36)}`, position: { x: node.position.x + 40, y: node.position.y + 40 }, selected: false, parentId: node.parentId, extent: node.extent, data: { ...(node.data || {}) } };
      setNodes((prev) => [...prev, next]); setSelectedId(next.id); return;
    }
    if (action === "intoSubquery") {
      const subId = firstSubqueryId();
      if (!subId || ["source", "output"].includes(id) || node.data?.kind === "subquery") return;
      setNodes((prev) => prev.map((n) => n.id === id ? { ...n, parentId: subId, extent: "parent", position: { x: 30, y: 80 + Math.random()*120 } } : n));
      return;
    }
    if (action === "outSubquery") {
      setNodes((prev) => prev.map((n) => n.id === id ? { ...n, parentId: undefined, extent: undefined, position: { x: 250 + Math.random()*160, y: 280 + Math.random()*120 } } : n));
      return;
    }
  };

  const handleEdgeAction = (action, id) => {
    const edge = edges.find((e) => e.id === id);
    if (!edge) return;
    if (action === "delete") { setEdges((prev) => prev.filter((e) => e.id !== id)); return; }
    if (action === "reverse") { setEdges((prev) => prev.map((e) => e.id === id ? { ...e, source: e.target, target: e.source } : e)); return; }
    if (action === "insertFilter") {
      const nodeId = `filter-${Date.now().toString(36)}`;
      const node = makeGraphNode(nodeId, "filter", { x: (nodes.find(n=>n.id===edge.source)?.position?.x || 200) + 120, y: (nodes.find(n=>n.id===edge.source)?.position?.y || 100) + 45 }, columns);
      node.data.label = normalizeGraphNodeLabel(node, columns, datasets);
      setNodes((prev) => [...prev, node]);
      setEdges((prev) => prev.filter((e) => e.id !== id).concat([
        { id: `${edge.source}-${nodeId}`, source: edge.source, target: nodeId, animated: true, reconnectable: true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
        { id: `${nodeId}-${edge.target}`, source: nodeId, target: edge.target, animated: true, reconnectable: true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined },
      ]));
      setSelectedId(nodeId);
    }
  };

  const handleReconnect = (oldEdge, newConnection) => {
    setEdges((eds) => {
      const nextConnection = {
        ...newConnection,
        type: "queryEdge",
        animated: true,
        reconnectable: true,
        markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined,
      };
      if (rfReconnectEdge) return rfReconnectEdge(oldEdge, nextConnection, eds);
      return eds.map((e) => e.id === oldEdge.id ? { ...e, ...nextConnection, id: oldEdge.id } : e);
    });
  };

  const nodeTypes = useMemo(() => ({ queryNode: QueryGraphNode }), []);
  const edgeTypes = useMemo(() => ({ queryEdge: QueryGraphEdge }), []);
  const renderedNodes = useMemo(() => nodes.map((n) => ({
    ...n,
    type: "queryNode",
    data: { ...(n.data || {}), onNodeAction: handleNodeAction },
    style: { ...(n.style || graphNodeStyle(n.data?.kind)), ...(selectedId === n.id ? { boxShadow: "0 0 0 2px #2563eb" } : {}) },
  })), [nodes, selectedId, columns]);
  const renderedEdges = useMemo(() => edges.map((e) => ({ ...e, type: "queryEdge", data: { ...(e.data || {}), color: graphEdgeColor(e, nodes), onEdgeAction: handleEdgeAction } })), [edges, nodes, columns]);

  const runFromSql = () => {
    const parsed = parseSqlToGraphPlan(sqlText, columns);
    setSqlErrors(parsed.errors || []);
    if (parsed.errors?.length) return;
    onApply(parsed, { source: "sql" });
  };

  const runFromGraph = () => {
    setSqlErrors([]);
    onApply(plan, { source: "graph" });
  };

  const selectedProjection = selectedNode?.data?.selectedColumns || [];
  const sourceNodes = graphSourceNodes(nodes);
  const allFieldOptions = graphAllFieldOptions(nodes, columns, datasets);
  const selectedFields = selectedNode?.data?.selectedFields || [];
  const selectedLeftSource = graphSourceById(nodes, selectedNode?.data?.leftSourceId || sourceNodes[0]?.id);
  const selectedRightSource = graphSourceById(nodes, selectedNode?.data?.rightSourceId || sourceNodes[1]?.id);
  const leftJoinColumns = graphDatasetColumns(selectedLeftSource?.data || {}, columns, datasets);
  const rightJoinColumns = graphDatasetColumns(selectedRightSource?.data || {}, columns, datasets);
  return (
    <Stack spacing={1.1} sx={{ minWidth: 0 }}>
      <Paper elevation={0} sx={{ p: 1, bgcolor: "background.default", borderRadius: 2 }}>
        <Stack direction="row" useFlexGap flexWrap="wrap" spacing={1} alignItems="center">
          <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>Session / クエリ保存</Typography>
          <TextField size="small" label="セッション名" value={sessionName || ""} onChange={(e) => setSessionName(e.target.value)} sx={{ minWidth: 220 }} />
          <TextField select size="small" label="開く" value={activeSessionId || ""} onChange={(e) => e.target.value && onSessionLoad(e.target.value)} sx={{ minWidth: 260 }}>
            <MenuItem value="">未選択</MenuItem>
            {(graphSessions || []).map((s) => <MenuItem key={s.id} value={s.id}>{s.name} / {new Date(s.updatedAt || s.createdAt || Date.now()).toLocaleString()}</MenuItem>)}
          </TextField>
          <Button size="small" variant="outlined" onClick={onSessionNew}>新規</Button>
          <Button size="small" variant="contained" onClick={() => onSessionSave(false)}>保存</Button>
          <Button size="small" variant="outlined" onClick={() => onSessionSaveAs()}>別名保存</Button>
          <Button size="small" variant="outlined" onClick={onSessionDuplicate} disabled={!activeSessionId}>複製</Button>

          <FormControlLabel control={<Switch size="small" checked={!!autoStandby} onChange={(e) => setAutoStandby(e.target.checked)} />} label="Dataset自動スタンバイ" />
          <Chip size="small" label={`保存対象: ノード/エッジ/SQLのみ・結果は保存しません`} />
        </Stack>

          <Stack direction="row" useFlexGap flexWrap="wrap" spacing={0.75} alignItems="center" sx={{ mb: 1 }}>
            <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>Graph Query / グラフィカルクエリ</Typography>

            <Tooltip title="初期ノード構成へ戻します"><Button size="small" onClick={resetGraph}>リセット</Button></Tooltip>

            <Tooltip title="ミニマップの表示/非表示を切り替えます"><Button size="small" variant={showMiniMap ? "contained" : "outlined"} onClick={() => setShowMiniMap((v) => !v)}>{showMiniMap ? "ミニマップ非表示" : "ミニマップ表示"}</Button></Tooltip>
            <Tooltip title="現在のフロー図をPNG画像として保存します"><Button size="small" variant="outlined" onClick={downloadFlowImage}>画像保存</Button></Tooltip>
            <Tooltip title="グラフからQueryPlanを生成して実行"><span><Button size="small" variant="contained" onClick={runFromGraph} disabled={disabled || (!columns.length && !datasets.length)}>グラフ実行</Button></span></Tooltip>
            {dataQueryActive && <Chip color="success" size="small" label={`実行中 ${Number(dataQueryCount || 0).toLocaleString()} 行`} />}
          </Stack>
          {!graphReady ? (
            <Alert severity="warning">React Flow CDNを読み込めませんでした。ネットワークまたはCDN制限を確認してください。</Alert>
          ) : (
            <Box ref={flowPanelRef} className="graph-query-flow-panel" sx={{ height: 560, border: "1px solid", borderColor: "divider", borderRadius: 2, overflow: "hidden", bgcolor: "background.paper" }}>
              <ReactFlowCanvas
                nodes={renderedNodes}
                edges={renderedEdges}
                nodeTypes={nodeTypes}
                edgeTypes={edgeTypes}
                onNodesChange={(changes) => setNodes((nds) => rfApplyNodeChanges ? rfApplyNodeChanges(changes, nds) : nds)}
                onEdgesChange={(changes) => setEdges((eds) => rfApplyEdgeChanges ? rfApplyEdgeChanges(changes, eds) : eds)}
                onConnect={(params) => setEdges((eds) => rfAddEdge ? rfAddEdge({ ...params, type: "queryEdge", animated: true, reconnectable: true, markerEnd: RFMarkerType ? { type: RFMarkerType.ArrowClosed } : undefined }, eds) : eds)}
                onReconnect={handleReconnect}
                edgesReconnectable={true}
                onNodeClick={(e, node) => setSelectedId(node.id)}
                onlyRenderVisibleElements={true}
                elevateEdgesOnSelect={true}
                fitView
              >
                {showMiniMap && RFMiniMap && <RFMiniMap pannable zoomable nodeColor={(node) => graphKindMeta(node?.data?.kind).accent} />}
                {RFControls && <RFControls />}
                {RFBackground && <RFBackground gap={18} />}
              </ReactFlowCanvas>
            </Box>
          )}
          <Typography variant="caption" color="text.secondary" sx={{ display: "block", mt: 0.75 }}>
            ノードは種類ごとに色分け、エッジは接続元/先に応じた色で表示します。ミニマップは必要時だけ表示、画像保存、重なり回避配置に対応しています。計算列は非同期チャンク処理で結果テーブルに追加されます。
          </Typography>
        </Paper>

        <Paper elevation={0} sx={{ p: 1, bgcolor: "background.default", borderRadius: 2 }}>
          <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>選択ノード</Typography>
          {!selectedNode ? (
            <Typography variant="body2" color="text.secondary">ノードを選択してください。</Typography>
          ) : (
            <Stack spacing={1}>
              <Chip label={`${selectedNode.id} / ${graphKindMeta(selectedNode.data?.kind).jp}`} sx={{ bgcolor: graphKindMeta(selectedNode.data?.kind).bg, border: "1px solid", borderColor: graphKindMeta(selectedNode.data?.kind).border, fontWeight: 900 }} />
              {selectedNode.data?.kind === "source" && (
                <>
                  <TextField select label="Dataset" size="small" value={selectedNode.data.datasetId || "__active__"} onChange={(e) => { const datasetId=e.target.value; updateNodeData(selectedNode.id, { datasetId }); onDatasetStandby(datasetId, { sourceId:selectedNode.id, sourceCount:sourceNodes.length }); }} fullWidth>
                    <MenuItem value="__active__">Active Dataset: {manifest?.tableName || manifest?.name || "active"}</MenuItem>
                    {datasets.map((d) => <MenuItem key={d.id} value={d.id}>{d.path || d.tableName || d.name || d.id}</MenuItem>)}
                  </TextField>
                  <TextField label="Alias" size="small" value={selectedNode.data.alias || selectedNode.id} onChange={(e) => updateNodeData(selectedNode.id, { alias: e.target.value })} fullWidth />

                </>
              )}
              {selectedNode.data?.kind === "join" && (
                <>
                  <TextField select label="左Source" size="small" value={selectedNode.data.leftSourceId || sourceNodes[0]?.id || ""} onChange={(e) => updateNodeData(selectedNode.id, { leftSourceId: e.target.value })} fullWidth>
                    {sourceNodes.map((n) => <MenuItem key={n.id} value={n.id}>{graphSourceAlias(n)} / {graphDatasetLabel(n.data?.datasetId, datasets, manifest)}</MenuItem>)}
                  </TextField>
                  <TextField select label="右Source" size="small" value={selectedNode.data.rightSourceId || sourceNodes[1]?.id || ""} onChange={(e) => updateNodeData(selectedNode.id, { rightSourceId: e.target.value })} fullWidth>
                    {sourceNodes.map((n) => <MenuItem key={n.id} value={n.id}>{graphSourceAlias(n)} / {graphDatasetLabel(n.data?.datasetId, datasets, manifest)}</MenuItem>)}
                  </TextField>
                  <TextField select label="JOIN種別" size="small" value={selectedNode.data.joinType || "inner"} onChange={(e) => updateNodeData(selectedNode.id, { joinType: e.target.value })} fullWidth>
                    <MenuItem value="inner">INNER JOIN</MenuItem>
                    <MenuItem value="left">LEFT JOIN</MenuItem>
                  </TextField>
                  <TextField select label="左キー" size="small" value={String(selectedNode.data.leftColumnIndex ?? leftJoinColumns[0]?.index ?? 0)} onChange={(e) => updateNodeData(selectedNode.id, { leftColumnIndex: Number(e.target.value) })} fullWidth>
                    {leftJoinColumns.map((c) => <MenuItem key={c.index} value={String(c.index)}>{c.name} ({c.type})</MenuItem>)}
                  </TextField>
                  <TextField select label="右キー" size="small" value={String(selectedNode.data.rightColumnIndex ?? rightJoinColumns[0]?.index ?? 0)} onChange={(e) => updateNodeData(selectedNode.id, { rightColumnIndex: Number(e.target.value) })} fullWidth>
                    {rightJoinColumns.map((c) => <MenuItem key={c.index} value={String(c.index)}>{c.name} ({c.type})</MenuItem>)}
                  </TextField>
                </>
              )}
              {selectedNode.data?.kind === "select" && (
                sourceNodes.length >= 2 ? (
                  <FormControl size="small" fullWidth>
                    <InputLabel>JOIN出力カラム</InputLabel>
                    <Select multiple value={selectedFields.map(String)} label="JOIN出力カラム" onChange={(e) => updateNodeData(selectedNode.id, { selectedFields: Array.isArray(e.target.value) ? e.target.value : String(e.target.value).split(',') })} renderValue={(vals) => `${vals.length} 列`}>
                      {allFieldOptions.map((f) => <MenuItem key={f.value} value={f.value}><Checkbox checked={selectedFields.includes(f.value)} />{f.alias}.{f.name} ({f.type})</MenuItem>)}
                    </Select>
                  </FormControl>
                ) : (
                  <FormControl size="small" fullWidth>
                    <InputLabel>出力カラム</InputLabel>
                    <Select multiple value={selectedProjection.map(String)} label="出力カラム" onChange={(e) => updateNodeData(selectedNode.id, { selectedColumns: (Array.isArray(e.target.value) ? e.target.value : String(e.target.value).split(',')).map(Number) })} renderValue={(vals) => `${vals.length} 列`}>
                      {columns.map((c) => <MenuItem key={c.index} value={String(c.index)}><Checkbox checked={selectedProjection.map(Number).includes(Number(c.index))} />{c.name} ({c.type})</MenuItem>)}
                    </Select>
                  </FormControl>
                )
              )}
              {selectedNode.data?.kind === "filter" && (
                <>
                  <TextField select label="対象カラム" size="small" value={String(selectedNode.data.columnIndex ?? columns[0]?.index ?? 0)} onChange={(e) => { const nextIndex = Number(e.target.value); const nextCol = columnByIndex(columns, nextIndex); updateNodeData(selectedNode.id, { columnIndex: nextIndex, op: normalizeGraphOperatorForColumn(selectedNode.data.op || "contains", nextCol) }); }} fullWidth>
                    {columns.map((c) => <MenuItem key={c.index} value={String(c.index)}>{c.name} ({c.type})</MenuItem>)}
                  </TextField>
                  <TextField select label="比較演算子 / Operator" size="small" value={selectedNode.data.op || "contains"} onChange={(e) => updateNodeData(selectedNode.id, { op: e.target.value })} fullWidth helperText={graphOperatorDef(selectedNode.data.op || "contains")?.category || "比較"}>
                    {graphOperatorOptionsForColumn(columnByIndex(columns, selectedNode.data.columnIndex)).map((x) => <MenuItem key={x.op} value={x.op}>{x.code}（{x.jp}） — {x.symbol}</MenuItem>)}
                  </TextField>
                  <TextField label="値 / Value" size="small" value={selectedNode.data.value || ""} onChange={(e) => updateNodeData(selectedNode.id, { value: e.target.value })} fullWidth disabled={!graphOperatorNeedsValue(selectedNode.data.op || "contains")} placeholder={graphOperatorNeedsValue(selectedNode.data.op || "contains") ? "比較する値を入力" : "この演算子では値は不要です"} />
                  <Alert severity="info" sx={{ py: 0.25 }}>比較演算子: EQ（等しい）, NE（等しくない）, LT（より小さい）, GT（より大きい）, LE（以下）, GE（以上）。文字列: CONTAINS（含む）, NOT CONTAINS（含まない）, STARTS WITH（前方一致）, ENDS WITH（後方一致）, REGEX（正規表現）。</Alert>
                </>
              )}
              {selectedNode.data?.kind === "sort" && (
                <>
                  <TextField select label="並び替えカラム" size="small" value={String(selectedNode.data.columnIndex ?? columns[0]?.index ?? 0)} onChange={(e) => updateNodeData(selectedNode.id, { columnIndex: Number(e.target.value) })} fullWidth>
                    {columns.map((c) => <MenuItem key={c.index} value={String(c.index)}>{c.name} ({c.type})</MenuItem>)}
                  </TextField>
                  <TextField select label="方向" size="small" value={selectedNode.data.direction || "asc"} onChange={(e) => updateNodeData(selectedNode.id, { direction: e.target.value })} fullWidth>
                    <MenuItem value="asc">ASC（昇順）</MenuItem><MenuItem value="desc">DESC（降順）</MenuItem>
                  </TextField>
                </>
              )}
              {selectedNode.data?.kind === "limit" && <SmallNumberField label="最大行数 0=全件" value={String(selectedNode.data.maxRows ?? "0")} onChange={(v) => updateNodeData(selectedNode.id, { maxRows: v })} min="0" step="100000" fullWidth />}
              {selectedNode.data?.kind === "derived" && (
                <>
                  <TextField label="新しい列名" size="small" value={selectedNode.data.newColumnName || "new_column"} onChange={(e) => updateNodeData(selectedNode.id, { newColumnName: e.target.value })} fullWidth />
                  <TextField select label="作成方法" size="small" value={selectedNode.data.valueMode || "constant"} onChange={(e) => updateNodeData(selectedNode.id, { valueMode: e.target.value })} fullWidth>
                    <MenuItem value="constant">固定値をセット</MenuItem>
                    <MenuItem value="formula">行ごとの数式で計算</MenuItem>
                  </TextField>
                  {(selectedNode.data.valueMode || "constant") === "constant" ? (
                    <TextField label="セットする値" size="small" value={selectedNode.data.constantValue || ""} onChange={(e) => updateNodeData(selectedNode.id, { constantValue: e.target.value })} fullWidth placeholder="例: 未分類 / 1 / TRUE" />

                    <TextField label="数式 / Formula" size="small" multiline minRows={3} value={selectedNode.data.formulaExpression || ""} onChange={(e) => updateNodeData(selectedNode.id, { formulaExpression: e.target.value })} fullWidth placeholder={'例: num(col("amount")) * 1.1\n例: basename(col("full_path"))\n例: dirname(col("full_path"))\n例: pathPart(col("full_path"), -2)\n例: regexExtract(col("full_path"), "([^/]+)\\.csv$", 1)'} />
                  )}
                  {(selectedNode.data.valueMode || "constant") === "formula" && (
                    <FormulaRecipePanel fieldOptions={allFieldOptions} onPick={(expr) => updateNodeData(selectedNode.id, { formulaExpression: selectedNode.data.formulaExpression ? `${selectedNode.data.formulaExpression}${selectedNode.data.formulaExpression.endsWith(" ") ? "" : " "}${expr}` : expr })} />
                  )}
                  <Alert severity="info" sx={{ py: 0.25 }}>数式では col("列名") で同じ行の列値を参照します。num/str/concat/coalesce/lower/upper/round のほか、basename, dirname, ext, stem, pathPart, before/after/between, sliceText, left/right, replaceText, regexExtract でパスや文字列を切り出せます。計算列は保存済みDatasetを破壊せず、Graph Query結果テーブルに追加されます。</Alert>
                </>
              )}
              {selectedNode.data?.kind === "aggregate" && <Alert severity="info">集計ノードはSQLプレビューへ表現を追加するための予約ノードです。実集計はPivot/Time基盤へ接続する次段階で有効化します。</Alert>}
              {selectedNode.data?.kind === "subquery" && <TextField label="サブクエリ名" size="small" value={selectedNode.data.alias || selectedNode.id} onChange={(e) => updateNodeData(selectedNode.id, { alias: e.target.value })} fullWidth />}
              {selectedNode.data?.kind === "output" && <Alert severity="info">このノードは結果出力です。JOIN/条件抽出/並び替え/件数制限/列選択を追加して条件を作成します。</Alert>}
              <Divider />
              <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>コンパイル済みプラン</Typography>
              <Typography component="pre" variant="caption" sx={{ p: 1, bgcolor: "background.paper", borderRadius: 1, overflow: "auto", maxHeight: 180 }}>{JSON.stringify({ mode: plan.mode, sources: plan.sources, joins: plan.joins, filters: plan.filters, sort: plan.sort, maxRows: plan.maxRows, projection: plan.projection, selectedFields: plan.selectedFields, derivedColumns: plan.derivedColumns, subqueries: plan.subqueries }, null, 2)}</Typography>
            </Stack>
          )}
        </Paper>
      </Box>

      <Paper elevation={0} sx={{ p: 1, bgcolor: "background.default", borderRadius: 2 }}>
        <Stack direction="row" useFlexGap flexWrap="wrap" spacing={1} alignItems="center" sx={{ mb: 1 }}>
          <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>SQLプレビュー / SQL実行</Typography>
          <FormControlLabel control={<Switch size="small" checked={sqlMode} onChange={(e) => safeSetSqlMode(e.target.checked)} />} label="SQLを編集" />
          <Button size="small" variant="contained" onClick={sqlMode ? runFromSql : runFromGraph} disabled={disabled || (!columns.length && !datasets.length)}>{sqlMode ? "SQL実行" : "グラフ実行"}</Button>
          <Button size="small" onClick={() => { safeSetSqlMode(false); safeSetSqlText(plan.sql || ""); setSqlErrors([]); }}>グラフから同期</Button>
        </Stack>
        <TextField multiline minRows={7} fullWidth value={sqlMode ? sqlText : (plan.sql || "")} onChange={(e) => { safeSetSqlMode(true); safeSetSqlText(e.target.value); }} InputProps={{ readOnly: !sqlMode }} sx={{ '& textarea': { fontFamily: 'Roboto Mono, Consolas, monospace', fontSize: 12 } }} />
        {sqlErrors.length > 0 && <Alert severity="warning" sx={{ mt: 0.75 }}>{sqlErrors.join(" / ")}</Alert>}
        <Typography variant="caption" color="text.secondary">対応SQL: SELECT（列選択） / FROM（入力元） / WHERE（条件抽出） / ORDER BY（並び替え） / LIMIT（件数制限）。比較: EQ/NE/LT/GT/LE/GE または =, &lt;&gt;, &lt;, &gt;, &lt;=, &gt;=。文字列: LIKE, NOT LIKE, CONTAINS, STARTS WITH, ENDS WITH, REGEXP/RLIKE。WITHはPreview出力対応、JOINはGraph実行で対応済みです。</Typography>
      </Paper>

      <Paper elevation={0} sx={{ p: 1, bgcolor: "background.default", borderRadius: 2 }}>
        <Stack direction="row" useFlexGap flexWrap="wrap" spacing={1} alignItems="center" sx={{ mb: 0.75 }}>
          <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>Graph Query Result / 実行結果</Typography>
          <Button size="small" color="warning" variant="outlined" onClick={() => onClearResult()}>結果クリア</Button>
          <Button size="small" variant="contained" startIcon={<Download />} onClick={onExportCsv} disabled={!Number(dataQueryCount || 0)}>CSV全件出力</Button>
          <Button size="small" variant={resultViewMode === "tile" ? "contained" : "outlined"} onClick={switchGraphResultToTile}>全件パネル表示</Button>
          <Button size="small" variant={resultViewMode === "page" ? "contained" : "outlined"} onClick={switchGraphResultToPage}>ページ表示（100件）</Button>
          {resultViewMode === "page" && <SmallNumberField label="ページ行数" value={resultRowsDraft} onChange={setResultRowsDraft} min="50" step="50" sx={{ width: 130 }} />}
          {resultViewMode === "page" && <Button size="small" variant="outlined" onClick={applyResultRowsPerTile}>件数を適用</Button>}
          {resultViewMode === "page" && <Button size="small" onClick={() => onReadPage(Math.max(1, Number(resultPage || 1) - 1))}>Prev</Button>}
          {resultViewMode === "page" && <Typography variant="caption">Page {Number(resultPage || 1).toLocaleString()} / {Number(resultPageMax || 0).toLocaleString()}</Typography>}
          {resultViewMode === "page" && <Button size="small" onClick={() => onReadPage(Math.min(Number(resultPageMax || 1), Number(resultPage || 1) + 1))}>Next</Button>}
          {resultViewMode === "tile" && <Chip size="small" color="primary" label={`lazy全件パネル / 読込中 ${Number(resultTable?.rows?.length || 0).toLocaleString()} / 全 ${Number(dataQueryCount || 0).toLocaleString()}`} />}
          <Chip size="small" label={`${Number(dataQueryCount || 0).toLocaleString()} rows`} />
        </Stack>
        {resultViewMode === "tile" ? (
          <GraphQueryVirtualTable table={resultTable} totalRows={Number(dataQueryCount || 0)} page={Number(resultPage || 1)} pageSize={Number(resultRowsPerTile || 1000)} onReadPage={onReadPage} height={420} />
        ) : (
          <DataTable table={resultTable} tableId="graphQueryResult" height={360} />
        )}
        <Stack direction="row" justifyContent="space-between" sx={{ mt: 0.6 }}>
          <Typography variant="caption" color="text.secondary">{resultStatus || "Run graph query to show results here."}</Typography>
          <Typography variant="caption" color="text.secondary">{resultTime || ""}</Typography>
        </Stack>

      </Paper>

      <Paper elevation={0} sx={{ p: 1, bgcolor: "background.default", borderRadius: 2 }}>
        <Stack direction="row" useFlexGap flexWrap="wrap" spacing={1} alignItems="center" sx={{ mb: 1 }}>
          <Typography variant="subtitle2" sx={{ fontWeight: 900 }}>Graph Result Analysis / 結果データの再分析</Typography>
          <Chip size="small" color="info" variant="outlined" label="結果は保存せず、最新Graph Resultをlazy再スキャン" />
        </Stack>
        {!resultHeader.length ? (
          <Alert severity="info">Graph Queryを実行すると、その結果データに対してSearch / Pivot / Timeを実行できます。</Alert>
        ) : (
          <>
            <Tabs value={resultAnalysisTab} onChange={(e,v)=>setResultAnalysisTab(v)} sx={{ minHeight: 34, mb: 1 }}>
              <Tab value="search" label="Search（検索）" sx={{ minHeight: 34 }} />
              <Tab value="pivot" label="Pivot（集計）" sx={{ minHeight: 34 }} />
              <Tab value="time" label="Time（時系列）" sx={{ minHeight: 34 }} />
            </Tabs>
            {resultAnalysisTab === "search" && (
              <Stack spacing={1}>
                <Stack direction="row" useFlexGap flexWrap="wrap" spacing={1} alignItems="center">
                  <TextField select size="small" label="対象列" value={resultSearchColumn} onChange={(e)=>setResultSearchColumn(e.target.value)} sx={{ minWidth: 220 }}>
                    {resultHeader.map((h,i)=><MenuItem key={i} value={String(i)}>{h}</MenuItem>)}
                  </TextField>
                  <TextField select size="small" label="演算子" value={resultSearchOp} onChange={(e)=>setResultSearchOp(e.target.value)} sx={{ minWidth: 190 }}>
                    {GRAPH_OPERATOR_DEFS.map((x)=><MenuItem key={x.op} value={x.op}>{x.code}（{x.jp}）</MenuItem>)}
                  </TextField>
                  <TextField size="small" label="値" value={resultSearchValue} onChange={(e)=>setResultSearchValue(e.target.value)} sx={{ minWidth: 220 }} />
                  <SmallNumberField label="最大一致" value={resultSearchMax} onChange={setResultSearchMax} min="1" step="10000" sx={{ width: 130 }} />
                  <Button size="small" variant="contained" onClick={()=>onResultSearch({ columnIndex:Number(resultSearchColumn), op:resultSearchOp, value:resultSearchValue, maxMatches:Number(resultSearchMax || 100000) })}>結果内検索</Button>
                  <Button size="small" onClick={()=>onResultSearchPage(Math.max(1, Number(resultSearchPage || 1)-1))}>Prev</Button>
                  <Typography variant="caption">Page {Number(resultSearchPage || 1).toLocaleString()} / {Math.max(1, Math.ceil(Number(resultSearchCount || 0) / 500)).toLocaleString()}</Typography>
                  <Button size="small" onClick={()=>onResultSearchPage(Math.min(Math.max(1, Math.ceil(Number(resultSearchCount || 0) / 500)), Number(resultSearchPage || 1)+1))}>Next</Button>
                </Stack>
                <DataTable table={resultSearchTable} tableId="graphResultSearch" height={260} />
                <Stack direction="row" justifyContent="space-between"><Typography variant="caption" color="text.secondary">{resultSearchStatus}</Typography><Typography variant="caption" color="text.secondary">{resultSearchTime}</Typography></Stack>
              </Stack>
            )}
            {resultAnalysisTab === "pivot" && (
              <Stack spacing={1}>
                <Stack direction="row" useFlexGap flexWrap="wrap" spacing={1} alignItems="center">
                  <TextField select SelectProps={{ multiple:true }} size="small" label="行フィールド" value={resultPivotRows} onChange={(e)=>setResultPivotRows(typeof e.target.value === "string" ? e.target.value.split(",") : e.target.value)} sx={{ minWidth: 230 }}>
                    {resultHeader.map((h,i)=><MenuItem key={i} value={String(i)}>{h}</MenuItem>)}
                  </TextField>
                  <TextField select SelectProps={{ multiple:true }} size="small" label="列フィールド" value={resultPivotCols} onChange={(e)=>setResultPivotCols(typeof e.target.value === "string" ? e.target.value.split(",") : e.target.value)} sx={{ minWidth: 230 }}>
                    {resultHeader.map((h,i)=><MenuItem key={i} value={String(i)}>{h}</MenuItem>)}
                  </TextField>
                  <TextField select size="small" label="値フィールド" value={resultPivotValue} onChange={(e)=>setResultPivotValue(e.target.value)} sx={{ minWidth: 210 }}>
                    <MenuItem value="-1">Count（件数）</MenuItem>{resultHeader.map((h,i)=><MenuItem key={i} value={String(i)}>{h}</MenuItem>)}
                  </TextField>
                  <TextField select size="small" label="集計" value={resultPivotAgg} onChange={(e)=>setResultPivotAgg(e.target.value)} sx={{ width: 150 }}>
                    {["Count","Sum","Average","Min","Max"].map(x=><MenuItem key={x} value={x}>{x}</MenuItem>)}
                  </TextField>
                  <Button size="small" variant="contained" onClick={()=>onResultPivot({ rowFields:resultPivotRows.map(Number), columnFields:resultPivotCols.map(Number), valueField:Number(resultPivotValue), aggregation:resultPivotAgg, maxRows:10000, maxCols:1000 })}>Pivot作成</Button>
                </Stack>
                <DataTable table={resultPivotTable} tableId="graphResultPivot" height={300} />
                <Stack direction="row" justifyContent="space-between"><Typography variant="caption" color="text.secondary">{resultPivotStatus}</Typography><Typography variant="caption" color="text.secondary">{resultPivotTime}</Typography></Stack>
              </Stack>
            )}
            {resultAnalysisTab === "time" && (
              <Stack spacing={1}>
                <Stack direction="row" useFlexGap flexWrap="wrap" spacing={1} alignItems="center">
                  <TextField select size="small" label="時刻列" value={resultTimeField} onChange={(e)=>setResultTimeField(e.target.value)} sx={{ minWidth: 220 }}>
                    {resultHeader.map((h,i)=><MenuItem key={i} value={String(i)}>{h}</MenuItem>)}
                  </TextField>
                  <TextField select size="small" label="粒度" value={resultTimeBucket} onChange={(e)=>setResultTimeBucket(e.target.value)} sx={{ width: 140 }}>
                    {[["year","年"],["month","月"],["day","日"],["hour","時"]].map(([v,l])=><MenuItem key={v} value={v}>{l}</MenuItem>)}
                  </TextField>
                  <TextField select size="small" label="グループ" value={resultTimeGroup} onChange={(e)=>setResultTimeGroup(e.target.value)} sx={{ minWidth: 210 }}>
                    <MenuItem value="-1">なし</MenuItem>{resultHeader.map((h,i)=><MenuItem key={i} value={String(i)}>{h}</MenuItem>)}
                  </TextField>
                  <TextField select size="small" label="値" value={resultTimeValue} onChange={(e)=>setResultTimeValue(e.target.value)} sx={{ minWidth: 190 }}>

                  </TextField>
                  <Button size="small" variant="contained" onClick={()=>onResultTime({ timeField:Number(resultTimeField), bucket:resultTimeBucket, groupField:Number(resultTimeGroup), valueField:Number(resultTimeValue), aggregation:resultTimeAgg, maxBuckets:10000 })}>Time作成</Button>
                </Stack>
                <DataTable table={resultTimeTable} tableId="graphResultTime" height={300} />
                <Stack direction="row" justifyContent="space-between"><Typography variant="caption" color="text.secondary">{resultTimeStatus}</Typography><Typography variant="caption" color="text.secondary">{resultTimeTime}</Typography></Stack>
              </Stack>
            )}
          </>
        )}
      </Paper>
    </Stack>
  );
}

  async function setGraphResultTableWithDerived(table, derivedColumns=[]) {
    const seq = ++graphDerivedApplySeqRef.current;
    const normalized = normalizeGraphDerivedColumns(derivedColumns);
    const outputColumnNames = graphExecutionRef.current?.outputColumnNames || null;

    if (!table || !Array.isArray(table.header)) {
      setGraphResultTable(table || null);
      return;
    }

    if (!normalized.length) {
      setGraphResultTable(projectGraphResultOutputTable(table, outputColumnNames, []));
      return;
    }

    const sourceRows = Array.isArray(table.rows) ? table.rows.length : 0;
    const previewHeader = outputColumnNames?.length
      ? [...outputColumnNames, ...normalized.map((d) => d.newColumnName)]
      : [...table.header, ...normalized.map((d) => d.newColumnName)];
    setGraphResultTable({ ...table, header: previewHeader, rows: [] });
    setGraphResultStatus(`計算列を適用中... 0/${fmt(sourceRows)} rows / ${fmt(normalized.length)}列`);

    try {
      const applied = await applyGraphDerivedColumnsToTableAsync(table, normalized, {
        chunkSize: 80,
        onProgress: (done, total) => {
          if (seq !== graphDerivedApplySeqRef.current) return;
          if (done === total || done % 240 === 0) {

          }
