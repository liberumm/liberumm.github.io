function dataTableStorageId(tableId, header) {
  if (tableId) return String(tableId).replace(/[^a-zA-Z0-9_.:-]/g, "_");
  const raw = (header || []).join("|");
  let hash = 0;
  for (let i = 0; i < raw.length; i++) hash = ((hash << 5) - hash + raw.charCodeAt(i)) | 0;
  return `auto_${Math.abs(hash)}`;
}

function DataTable({ table, tableId, height = 520, dense: denseProp, filterable = true, sortable = true, minColumnWidth = 150 }) {
  const ui = React.useContext(UiSettingsContext);
  const dense = denseProp ?? ui.dense;
  const header = table?.header || [];
  const rows = table?.rows || [];
  const [sort, setSort] = useState({ index: -1, direction: "asc" });
  const [filters, setFilters] = useState({});
  const [columnWidths, setColumnWidths] = useState({});
  const resizeRef = useRef(null);
  const headerKey = header.join("\u001f");
  const storageId = useMemo(() => dataTableStorageId(tableId, header), [tableId, headerKey]);
  const widthStorageKey = `qcsv:datatable:columnWidths:${storageId}`;

  useEffect(() => {
    setSort({ index: -1, direction: "asc" });
    setFilters({});
  }, [headerKey]);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(widthStorageKey);
      const parsed = raw ? JSON.parse(raw) : {};
      setColumnWidths(parsed && typeof parsed === "object" ? parsed : {});
    } catch {
      setColumnWidths({});
    }
  }, [widthStorageKey]);

  useEffect(() => {
    try {
      if (Object.keys(columnWidths).length) localStorage.setItem(widthStorageKey, JSON.stringify(columnWidths));
      else localStorage.removeItem(widthStorageKey);
    } catch {}
  }, [columnWidths, widthStorageKey]);

  useEffect(() => {
    return () => {
      const state = resizeRef.current;
      if (state) {
        window.removeEventListener("mousemove", state.onMove);
        window.removeEventListener("mouseup", state.onUp);
        window.removeEventListener("touchmove", state.onMove);
        window.removeEventListener("touchend", state.onUp);
        resizeRef.current = null;
      }
    };
  }, []);

  const getColumnWidth = (index) => {
    const value = Number(columnWidths[index]);
    return Number.isFinite(value) && value > 0 ? value : minColumnWidth;
  };

  const setColumnWidth = (index, width) => {
    const nextWidth = Math.max(72, Math.min(1200, Math.round(Number(width) || minColumnWidth)));
    setColumnWidths((prev) => ({ ...prev, [index]: nextWidth }));
  };

  const resetColumnWidth = (index) => {
    setColumnWidths((prev) => {
      const next = { ...prev };
      delete next[index];
      return next;
    });
  };

  const clientXOf = (event) => event.touches?.[0]?.clientX ?? event.clientX ?? 0;

  const startColumnResize = (event, index) => {
    event.preventDefault();
    event.stopPropagation();
    const startX = clientXOf(event);
    const startWidth = getColumnWidth(index);
    const onMove = (moveEvent) => {
      moveEvent.preventDefault?.();
      const delta = clientXOf(moveEvent) - startX;
      setColumnWidth(index, startWidth + delta);
    };
    const onUp = () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
      resizeRef.current = null;
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    };
    resizeRef.current = { onMove, onUp };
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
  };

  const handleResizerKeyDown = (event, index) => {
    if (event.key === "ArrowLeft") { event.preventDefault(); setColumnWidth(index, getColumnWidth(index) - (event.shiftKey ? 40 : 12)); }
    if (event.key === "ArrowRight") { event.preventDefault(); setColumnWidth(index, getColumnWidth(index) + (event.shiftKey ? 40 : 12)); }
    if (event.key === "Home") { event.preventDefault(); setColumnWidth(index, 72); }
    if (event.key === "End") { event.preventDefault(); setColumnWidth(index, 420); }
    if (event.key === "Enter" || event.key === "Backspace" || event.key === "Delete") { event.preventDefault(); resetColumnWidth(index); }
  };

  const filteredRows = useMemo(() => {
    let next = rows;
    const activeFilters = Object.entries(filters).filter(([, value]) => String(value || "").trim() !== "");
    if (activeFilters.length) {
      next = next.filter((row) => activeFilters.every(([index, value]) => {
        const q = String(value).toLowerCase();
        return String(row[Number(index)] ?? "").toLowerCase().includes(q);
      }));
    }

    if (sort.index >= 0) {
      const dir = sort.direction === "desc" ? -1 : 1;
      next = [...next].sort((a, b) => {
        const av = a?.[sort.index];
        const bv = b?.[sort.index];
        const an = Number(av);
        const bn = Number(bv);
        if (Number.isFinite(an) && Number.isFinite(bn)) return (an - bn) * dir;
        return String(av ?? "").localeCompare(String(bv ?? ""), "ja", { numeric: true }) * dir;
      });
    }
    return next;
  }, [rows, filters, sort]);

  const toggleSort = (index) => {
    if (!sortable) return;
    setSort((prev) => {
      if (prev.index !== index) return { index, direction: "asc" };
      if (prev.direction === "asc") return { index, direction: "desc" };
      return { index: -1, direction: "asc" };
    });
  };

  if (!header.length) {
    return (
      <Box sx={{ height, display: "grid", placeItems: "center", color: "text.secondary", border: "1px dashed", borderColor: "divider", borderRadius: 1.5 }}>
        表示するデータがありません
      </Box>
    );
  }

  const widths = header.map((_, i) => getColumnWidth(i));
  const tableMinWidth = Math.max(720, widths.reduce((sum, width) => sum + width, 0));
  const hasColumnWidths = Object.keys(columnWidths).length > 0;

  return (
    <Box sx={{ width: "100%", maxWidth: "100%", minWidth: 0, overflow: "hidden" }}>
      <TableContainer sx={{ width: "100%", maxWidth: "100%", maxHeight: height, overflowX: "auto", overflowY: "auto", border: "1px solid", borderColor: "divider", borderRadius: 1.5 }}>
        <Table stickyHeader size={dense ? "small" : "medium"} sx={{ minWidth: tableMinWidth, tableLayout: "fixed", borderCollapse: "separate" }}>
          <colgroup>
            {widths.map((width, i) => <col key={i} style={{ width: `${width}px` }} />)}
          </colgroup>
          <TableHead>
            {filterable && (
              <TableRow>
                {header.map((h, i) => (
                  <TableCell
                    key={`filter-${i}`}
                    sx={{
                      position: "sticky",
                      top: 0,
                      zIndex: 9,
                      bgcolor: "background.paper",
                      p: dense ? 0.5 : 1,
                      width: widths[i],
                      minWidth: 72,
                      maxWidth: 1200,
                      boxShadow: "inset 0 -1px 0",
                      borderColor: "divider",
                    }}
                  >
                    <TextField
                      value={filters[i] || ""}
                      onChange={(event) => setFilters((prev) => ({ ...prev, [i]: event.target.value }))}
                      placeholder={`${h} filter`}
                      size="small"
                      variant="outlined"
                      fullWidth
                      inputProps={{ style: { fontSize: dense ? 12 : 14, padding: dense ? "5px 7px" : undefined } }}
                    />
                  </TableCell>
                ))}
              </TableRow>
            )}
            <TableRow>
              {header.map((h, i) => (
                <TableCell
                  key={i}
                  sx={{
                    position: "sticky",
                    top: filterable ? (dense ? 42 : 56) : 0,
                    zIndex: 8,
                    fontWeight: 900,
                    bgcolor: "background.paper",
                    whiteSpace: "nowrap",
                    width: widths[i],
                    minWidth: 72,
                    maxWidth: 1200,
                    pr: 1.6,
                    boxShadow: "inset 0 -1px 0",
                    color: "text.primary",
                    borderColor: "divider",
                  }}
                >
                  <Box sx={{ display: "flex", alignItems: "center", minWidth: 0 }}>
                    {sortable ? (
                      <TableSortLabel
                        active={sort.index === i}
                        direction={sort.index === i ? sort.direction : "asc"}
                        onClick={() => toggleSort(i)}
                        sx={{ minWidth: 0, ".MuiTableSortLabel-icon": { flexShrink: 0 } }}
                      >
                        <Box component="span" sx={{ overflow: "hidden", textOverflow: "ellipsis" }}>{h}</Box>
                      </TableSortLabel>
                    ) : (
                      <Box component="span" sx={{ overflow: "hidden", textOverflow: "ellipsis" }}>{h}</Box>
                    )}
                  </Box>
                  <Box
                    role="separator"
                    aria-label={`${h} 列幅を調整`}
                    tabIndex={0}
                    onMouseDown={(event) => startColumnResize(event, i)}
                    onTouchStart={(event) => startColumnResize(event, i)}
                    onDoubleClick={() => resetColumnWidth(i)}
                    onKeyDown={(event) => handleResizerKeyDown(event, i)}
                    sx={{
                      position: "absolute",
                      top: 0,
                      right: 0,
                      bottom: 0,
                      width: 10,
                      cursor: "col-resize",
                      zIndex: 3,
                      outline: "none",
                      "&::after": {
                        content: '""',
                        position: "absolute",
                        top: 7,
                        bottom: 7,
                        right: 3,
                        width: "2px",
                        bgcolor: "divider",
                        borderRadius: 999,
                        opacity: 0.55,
                      },
                      "&:hover::after, &:focus-visible::after": { bgcolor: "primary.main", opacity: 1, width: "3px" },
                    }}
                  />
                </TableCell>
              ))}
            </TableRow>
          </TableHead>
          <TableBody>
            {filteredRows.map((row, ri) => (
              <TableRow hover key={ri}>
                {header.map((_, ci) => {
                  const cell = row?.[ci];
                  return (
                    <TableCell
                      key={ci}
                      title={String(cell ?? "")}
                      sx={{ width: widths[ci], minWidth: 72, maxWidth: 1200, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}
                    >
                      {String(cell ?? "")}
                    </TableCell>
                  );
                })}
              </TableRow>
            ))}
          </TableBody>
        </Table>
      </TableContainer>
      <Stack direction="row" justifyContent="space-between" alignItems="center" spacing={1} sx={{ mt: 0.75, flexWrap: "wrap" }}>
        <Typography variant="caption" color="text.secondary">
          表示中 {fmt(filteredRows.length)} / 元 {fmt(rows.length)} 行。フィルター/ソートは現在読み込んだ表示データに適用します。ヘッダーはスクロール時に固定されます。列幅はヘッダー右端をドラッグで調整できます。
        </Typography>
        <Stack direction="row" spacing={0.5} sx={{ flexWrap: "wrap" }}>
          {hasColumnWidths && (
            <Button size="small" onClick={() => setColumnWidths({})}>
              Reset column widths
            </Button>
          )}
          {(Object.values(filters).some((v) => String(v || "").trim()) || sort.index >= 0) && (
            <Button size="small" onClick={() => { setFilters({}); setSort({ index: -1, direction: "asc" }); }}>
              Clear table filters
            </Button>
          )}
        </Stack>
      </Stack>
    </Box>
  );
}

function KeyValue({ rows }) {
  if (!rows?.length) return null;
  return (
    <Box sx={{ display: "grid", gridTemplateColumns: "170px 1fr", borderTop: "1px solid", borderColor: "divider" }}>
      {rows.flatMap(([k, v]) => [
        <Box key={`${k}-k`} sx={{ p: 0.7, color: "text.secondary", bgcolor: "action.hover", borderBottom: "1px solid", borderColor: "divider" }}>{k}</Box>,
        <Box key={`${k}-v`} sx={{ p: 0.7, borderBottom: "1px solid", borderColor: "divider", overflowWrap: "anywhere" }}>{String(v ?? "")}</Box>,
      ])}
    </Box>
  );
}

function ColumnCheckList({ columns, selected, onChange, height = 170 }) {
  const selectedSet = new Set(selected.map(Number));
  const toggle = (index) => {
    const next = new Set(selectedSet);
    if (next.has(index)) next.delete(index);
    else next.add(index);
    onChange([...next].sort((a, b) => a - b));
  };

  return (
    <Box sx={{ height, overflow: "auto", border: "1px solid", borderColor: "divider", borderRadius: 1.5, p: 1 }}>
      <FormGroup>
        {columns.map((c) => (
          <FormControlLabel
            key={c.index}
            control={<Checkbox size="small" checked={selectedSet.has(c.index)} onChange={() => toggle(c.index)} />}
            label={`${c.name} (${c.type})`}
          />
        ))}
      </FormGroup>
    </Box>
  );
}

function VisibleColumns({ columns, visible, onChange }) {
  const selectedSet = new Set(visible.map(Number));
  const toggle = (index) => {
    const next = new Set(selectedSet);
    if (next.has(index)) next.delete(index);
    else next.add(index);
    onChange([...next].sort((a, b) => a - b));
  };
  const all = () => onChange(columns.map((c) => c.index));
  const none = () => onChange([]);

  return (
    <Box>
      <Stack direction="row" spacing={0.5} sx={{ mb: 0.5 }}>
        <Button size="small" onClick={all}>全選択</Button>
        <Button size="small" onClick={none}>全解除</Button>
        <Typography variant="caption" color="text.secondary" sx={{ alignSelf: "center" }}>
          未選択なら空の表になります。全列選択時はWorkerへ空配列を送り、全列読み込み扱いにします。
        </Typography>
      </Stack>
      <Box sx={{ display: "flex", flexWrap: "wrap", gap: 0.5, maxHeight: 116, overflow: "auto", border: "1px solid", borderColor: "divider", borderRadius: 1.5, p: 1 }}>
        {columns.map((c) => (
          <Chip
            key={c.index}
            label={c.name}
            size="small"
            variant={selectedSet.has(c.index) ? "filled" : "outlined"}
            color={selectedSet.has(c.index) ? "primary" : "default"}
            onClick={() => toggle(c.index)}
          />
        ))}
      </Box>
    </Box>
  );
}


function fileKey(file) {
  return `${file?.name || ""}::${file?.size || 0}::${file?.lastModified || 0}`;
}

const SETTINGS_KEY = "quantumCsvGrid.react.step12.settings.v1";
function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}"); }
  catch { return {}; }
}
function saveSettings(settings) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
  catch {}
}

const CATALOG_SCOPES_KEY = "quantumCsvGrid.storageCatalogScopes.v1";
function loadCatalogScopes() {
  try {
    const rows = JSON.parse(localStorage.getItem(CATALOG_SCOPES_KEY) || "[]");
    return Array.isArray(rows) ? rows.filter((x) => x && x.workspace && x.collection) : [];
  } catch {
    return [];
  }
}
function saveCatalogScopes(scopes) {
  try { localStorage.setItem(CATALOG_SCOPES_KEY, JSON.stringify(scopes || [])); }
  catch {}
}
function normalizeScopeName(value, fallback) {
  return String(value || fallback || "").trim() || fallback;
}
function uniqueScopes(scopes) {
  const map = new Map();
  for (const s of scopes || []) {
    const workspace = normalizeScopeName(s.workspace, "Default");
    const collection = normalizeScopeName(s.collection, "General");
    map.set(`${workspace}\u001f${collection}`, { workspace, collection });
  }
  return [...map.values()].sort((a, b) => `${a.workspace}/${a.collection}`.localeCompare(`${b.workspace}/${b.collection}`, "ja"));
}


const STORAGE_SPLIT_KEY = "quantumCsvGrid.storageSplit.leftWidth.v1";
function clampNumber(value, min, max) {
  const n = Number(value);
  if (!Number.isFinite(n)) return min;
  return Math.min(Math.max(n, min), max);
}

function ResizableSplit({
  left,
  right,
  storageKey = STORAGE_SPLIT_KEY,
  defaultLeft = 340,
  minLeft = 260,
  maxLeft = 620,
  minRight = 360,
  gap = 0.5,
  collapsible = false,
  collapseStorageKey,
  collapsedWidth = 52,
  collapsedTitle = "Workspace Tree",
}) {
  const containerRef = useRef(null);
  const [leftWidth, setLeftWidth] = useState(() => {
    try { return clampNumber(localStorage.getItem(storageKey), minLeft, maxLeft); }
    catch { return defaultLeft; }
  });
  const [dragging, setDragging] = useState(false);
  const resolvedCollapseStorageKey = collapseStorageKey || `${storageKey}.collapsed`;
  const [leftCollapsed, setLeftCollapsed] = useState(() => {
    if (!collapsible) return false;
    try { return localStorage.getItem(resolvedCollapseStorageKey) === "1"; }
    catch { return false; }
  });

  useEffect(() => {
    try { localStorage.setItem(storageKey, String(Math.round(leftWidth))); }
    catch {}
  }, [leftWidth, storageKey]);

  useEffect(() => {
    if (!collapsible) return;
    try { localStorage.setItem(resolvedCollapseStorageKey, leftCollapsed ? "1" : "0"); }
    catch {}
  }, [collapsible, resolvedCollapseStorageKey, leftCollapsed]);

  useEffect(() => {
    if (!dragging) return;
    const onMove = (event) => {
      const rect = containerRef.current?.getBoundingClientRect();
      if (!rect) return;
      const availableMax = Math.max(minLeft, rect.width - minRight - 12);
      const next = clampNumber(event.clientX - rect.left, minLeft, Math.min(maxLeft, availableMax));
      setLeftWidth(next);
    };
    const onUp = () => setDragging(false);
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    return () => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    };
  }, [dragging, minLeft, maxLeft, minRight]);

  const resetWidth = () => setLeftWidth(defaultLeft);
  const toggleLeftCollapsed = () => setLeftCollapsed((v) => !v);
  const effectiveLeftWidth = collapsible && leftCollapsed ? collapsedWidth : leftWidth;
  const leftNode = typeof left === "function" ? left({ leftCollapsed, setLeftCollapsed, toggleLeftCollapsed }) : left;

  return (
    <Box
      ref={containerRef}
      sx={{
        display: "grid",
        gridTemplateColumns: { xs: "minmax(0, 1fr)", md: `${Math.round(effectiveLeftWidth)}px 8px minmax(0, 1fr)` },
        gap: { xs: gap, md: 0 },
        minWidth: 0,
        maxWidth: "100%",
        width: "100%",
        alignItems: "stretch",
      }}
    >
      <Box sx={{ minWidth: 0, maxWidth: "100%", overflow: "hidden" }}>
        {collapsible && leftCollapsed ? (
          <Paper
            variant="outlined"
            sx={{
              height: "100%",
              minHeight: 420,
              p: 0.45,
              borderRadius: 1.5,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 0.75,
              bgcolor: "background.paper",
            }}
          >
            <Tooltip title="Workspace Treeを横に展開">
              <IconButton size="small" color="primary" onClick={toggleLeftCollapsed}>▶</IconButton>
            </Tooltip>
            <Typography
              variant="caption"
              sx={{
                writingMode: "vertical-rl",
                textOrientation: "mixed",
                fontWeight: 900,
                letterSpacing: 0.4,
                color: "text.secondary",
                userSelect: "none",
              }}
            >
              {collapsedTitle}
            </Typography>
          </Paper>
        ) : leftNode}
      </Box>
      <Tooltip title={leftCollapsed ? "クリックまたはEnterでWorkspace Treeを展開" : "ドラッグで左右ペイン幅を調整。ダブルクリックで左ペインを横に折りたたみます。"}>
        <Box
          role="separator"
          aria-orientation="vertical"
          tabIndex={0}
          onPointerDown={(event) => {
            event.preventDefault();
            if (collapsible && leftCollapsed) { toggleLeftCollapsed(); return; }
            setDragging(true);
          }}
          onDoubleClick={() => collapsible ? toggleLeftCollapsed() : resetWidth()}
          onKeyDown={(event) => {
            if (collapsible && leftCollapsed && ["Enter", " ", "ArrowRight"].includes(event.key)) { event.preventDefault(); toggleLeftCollapsed(); return; }
            if (event.key === "ArrowLeft") setLeftWidth((v) => clampNumber(v - 24, minLeft, maxLeft));
            if (event.key === "ArrowRight") setLeftWidth((v) => clampNumber(v + 24, minLeft, maxLeft));
            if (event.key === "Home") setLeftWidth(minLeft);
            if (event.key === "End") setLeftWidth(maxLeft);
          }}
          sx={{
            display: { xs: "none", md: "flex" },
            alignItems: "center",
            justifyContent: "center",
            mx: 0.5,
            borderRadius: 999,
            cursor: "col-resize",
            outline: "none",
            bgcolor: dragging ? "primary.main" : "divider",
            opacity: dragging ? 0.9 : 0.72,
            transition: "background-color .12s ease, opacity .12s ease, transform .12s ease",
            "&:hover": { bgcolor: "primary.main", opacity: 0.75, transform: "scaleX(1.35)" },
            "&:focus-visible": { boxShadow: 3, bgcolor: "primary.main", opacity: 0.8 },
          }}
        >
          <Box sx={{ width: 2, height: 42, borderRadius: 999, bgcolor: "background.paper", opacity: 0.9 }} />
        </Box>
      </Tooltip>
      <Box sx={{ minWidth: 0, maxWidth: "100%" }}>{right}</Box>
    </Box>
  );
}

function StorageCatalogTree({
  datasets,
  extraScopes = [],
  browseWorkspace,
  browseCollection,
  selectedDataset,
  activeManifest,
  candidateFiles = [],
  importedFiles = [],
  activeFileIndex = 0,
  onSelectScope,
  onSelectDataset,
  onActivateDataset,
  onSelectInMemory,
}) {
  const tree = useMemo(() => {
    const root = new Map();
    for (const d of datasets || []) {
      const workspace = d.workspace || "Default";
      const collection = d.collection || "General";
      if (!root.has(workspace)) root.set(workspace, new Map());
      const collections = root.get(workspace);
      if (!collections.has(collection)) collections.set(collection, []);
      collections.get(collection).push(d);
    }
    for (const scope of extraScopes || []) {
      const workspace = scope.workspace || "Default";
      const collection = scope.collection || "General";
      if (!root.has(workspace)) root.set(workspace, new Map());
      const collections = root.get(workspace);
      if (!collections.has(collection)) collections.set(collection, []);
    }
    return [...root.entries()].sort((a, b) => a[0].localeCompare(b[0], "ja"));
  }, [datasets, extraScopes]);

  const activeStorageId = activeManifest && !String(activeManifest.id || "").startsWith("virtual:") ? activeManifest.id : "";
  const virtualSourceIds = new Set((activeManifest?.sourceDatasets || []).map((x) => x.id).filter(Boolean));
  const activeFile = importedFiles[activeFileIndex] || importedFiles[0] || null;
  const activeMode = activeManifest?.mode === "virtual-dataset" ? "Storage-backed" : activeManifest?.mode === "memory-dataset" ? "Memory Accelerator" : activeManifest ? "Storage" : importedFiles.length ? "In-memory CSV" : "None";

  const StatusChip = ({ label, color = "default", variant = "outlined" }) => (
    <Chip size="small" label={label} color={color} variant={variant} sx={{ height: 18, fontSize: 10.5 }} />
  );

  const localSession = (
    <Box sx={{ border: "1px solid", borderColor: "divider", borderRadius: 1.5, p: 0.6, mb: 0.75, bgcolor: "action.hover" }}>
      <Stack direction="row" spacing={0.5} alignItems="center" justifyContent="space-between" sx={{ mb: 0.35 }}>
        <Typography variant="caption" sx={{ fontWeight: 900 }}>Local Session</Typography>
        <StatusChip label={activeMode} color={activeMode === "Storage-backed" ? "secondary" : activeMode === "Memory Accelerator" ? "warning" : activeMode === "Storage" ? "success" : activeMode === "In-memory CSV" ? "warning" : "default"} variant="filled" />
      </Stack>

      <Stack spacing={0.35}>
        <Box sx={{ px: 0.45, py: 0.35, borderRadius: 1, bgcolor: candidateFiles.length ? "info.main" : "transparent", color: candidateFiles.length ? "info.contrastText" : "text.secondary" }}>
          <Stack direction="row" spacing={0.4} alignItems="center" justifyContent="space-between">
            <Typography variant="caption" noWrap>Import Queue</Typography>
            <StatusChip label={`${fmt(candidateFiles.length)} candidate`} color={candidateFiles.length ? "info" : "default"} variant={candidateFiles.length ? "filled" : "outlined"} />
          </Stack>
        </Box>

        <Button
          fullWidth
          size="small"
          color={importedFiles.length ? "warning" : "inherit"}
          variant={importedFiles.length && !activeManifest ? "contained" : "text"}
          onClick={onSelectInMemory}
          disabled={!importedFiles.length && !onSelectInMemory}
          sx={{ justifyContent: "flex-start", px: 0.55, textAlign: "left", maxWidth: "100%" }}
        >
          <Box sx={{ width: "100%", minWidth: 0 }}>
            <Stack direction="row" spacing={0.35} alignItems="center" justifyContent="space-between">
              <Typography variant="body2" noWrap>In-memory CSV</Typography>
              <Stack direction="row" spacing={0.25}>
                <StatusChip label={`${fmt(importedFiles.length)} CSV`} color={importedFiles.length ? "warning" : "default"} variant={importedFiles.length ? "filled" : "outlined"} />
                {importedFiles.length > 0 && <StatusChip label="not persisted" color="warning" />}
              </Stack>
            </Stack>
            <Typography variant="caption" color={importedFiles.length && !activeManifest ? "inherit" : "text.secondary"} noWrap>
              {activeFile ? `${activeFile.name} / ${humanBytes(activeFile.size)}` : "No imported CSV"}
            </Typography>
          </Box>
        </Button>

        {activeManifest && (
          <Box sx={{ px: 0.55, py: 0.35, borderRadius: 1, border: "1px solid", borderColor: activeManifest.mode === "virtual-dataset" ? "secondary.main" : activeManifest.mode === "memory-dataset" ? "warning.main" : "success.main", bgcolor: "background.paper" }}>
            <Stack direction="row" spacing={0.35} alignItems="center" justifyContent="space-between">
              <Typography variant="body2" noWrap>Active Dataset</Typography>
              <Stack direction="row" spacing={0.25}>
                <StatusChip label={activeManifest.mode === "virtual-dataset" ? "Storage-backed" : activeManifest.mode === "memory-dataset" ? "Memory" : "Storage"} color={activeManifest.mode === "virtual-dataset" ? "secondary" : activeManifest.mode === "memory-dataset" ? "warning" : "success"} variant="filled" />
                {(activeManifest.mode === "virtual-dataset" || activeManifest.mode === "memory-dataset") && <StatusChip label={`${fmt(activeManifest.sourceDatasets?.length || 0)} sources`} color={activeManifest.mode === "memory-dataset" ? "warning" : "secondary"} />}
              </Stack>
            </Stack>
            <Typography variant="caption" color="text.secondary" noWrap>
              {activeManifest.storagePath || activeManifest.name || activeManifest.id} / {fmt(activeManifest.totalRows)} rows
            </Typography>
          </Box>
        )}
      </Stack>
    </Box>
  );

  const hasTreeNodes = tree.length > 0;

  return (
    <Box>
      {localSession}
      <Box sx={{ maxHeight: 430, overflow: "auto", border: "1px solid", borderColor: "divider", borderRadius: 1.5, p: 0.5 }}>
        {!hasTreeNodes && (
          <Box sx={{ border: "1px dashed", borderColor: "divider", borderRadius: 1.5, p: 1, color: "text.secondary" }}>
            Storageに保存済みのTableはまだありません。Workspace / Collectionを作成するか、CSVをStorageに保存してください。
          </Box>
        )}
        {tree.map(([workspace, collections]) => {
          const workspaceRows = [...collections.values()].flat();
          const workspaceActive = browseWorkspace === workspace;

function PivotTileGrid({ meta, view, onRequest, height = 640 }) {
  const scrollerRef = useRef(null);
  const timerRef = useRef(null);
  const lastKeyRef = useRef("");
  const [scrollInfo, setScrollInfo] = useState({ top: 0, left: 0 });

  const rowHeight = 28;
  const colWidth = 132;
  const rowHeaderWidth = 260;
  const colHeaderHeight = 34;
  const maxScrollPx = 24000000;

  function requestVisible() {
    if (!meta || !onRequest || !scrollerRef.current) return;
    const el = scrollerRef.current;
    const bodyTop = Math.max(0, el.scrollTop - colHeaderHeight);
    const bodyLeft = Math.max(0, el.scrollLeft - rowHeaderWidth);
    const rowStart = Math.max(0, Math.floor(bodyTop / rowHeight) - 8);
    const colStart = Math.max(0, Math.floor(bodyLeft / colWidth) - 4);
    const viewportRows = Math.ceil(el.clientHeight / rowHeight) + 18;
    const viewportCols = Math.ceil(el.clientWidth / colWidth) + 10;
    const key = `${rowStart}:${colStart}:${viewportRows}:${viewportCols}:${meta.totalRows}:${meta.totalCols}`;
    if (lastKeyRef.current === key) return;
    lastKeyRef.current = key;
    onRequest({ rowStart, colStart, viewportRows, viewportCols, overscan: 1 });
  }

  function handleScroll() {
    const el = scrollerRef.current;
    if (el) setScrollInfo({ top: el.scrollTop, left: el.scrollLeft });
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(requestVisible, 40);
  }

  useEffect(() => {
    lastKeyRef.current = "";
    const id = setTimeout(requestVisible, 0);
    return () => {
      clearTimeout(id);
      if (timerRef.current) clearTimeout(timerRef.current);
    };
  }, [meta?.totalRows, meta?.totalCols]);

  if (!meta) {
    return <Alert severity="info">PivotをBuildすると、ページ移動なしのlazy tile gridで表示します。</Alert>;
  }

  const totalRows = Math.max(1, Number(meta.totalRows || 1));
  const totalCols = Math.max(1, Number(meta.totalCols || 1));
  const logicalHeight = colHeaderHeight + totalRows * rowHeight;
  const logicalWidth = rowHeaderWidth + totalCols * colWidth;
  const innerHeight = Math.min(logicalHeight, maxScrollPx);
  const innerWidth = Math.min(logicalWidth, maxScrollPx);
  const yScale = logicalHeight > maxScrollPx ? logicalHeight / maxScrollPx : 1;
  const xScale = logicalWidth > maxScrollPx ? logicalWidth / maxScrollPx : 1;

  const rowLabels = new Map();
  const colLabels = new Map();
  const body = [];
  for (const tile of view?.tiles || []) {
    for (let r = tile.rowStart; r < tile.rowEnd; r++) {
      if (!rowLabels.has(r)) rowLabels.set(r, (tile.rowLabels?.[r - tile.rowStart] || []).join(" / "));
    }
    for (let c = tile.colStart; c < tile.colEnd; c++) {
      if (!colLabels.has(c)) colLabels.set(c, (tile.colLabels?.[c - tile.colStart] || []).join(" / "));
    }
    for (let rr = 0; rr < (tile.values || []).length; rr++) {
      const r = tile.rowStart + rr;
      for (let cc = 0; cc < (tile.values[rr] || []).length; cc++) {
        const c = tile.colStart + cc;
        body.push({ r, c, value: tile.values[rr][cc] });
      }
    }
  }

  function cellBaseSx(r, c, extra = {}) {
    return {
      position: "absolute",
      top: Math.round((colHeaderHeight + r * rowHeight) / yScale),
      left: Math.round((rowHeaderWidth + c * colWidth) / xScale),
      width: Math.max(48, Math.round(colWidth / xScale)),
      height: Math.max(18, Math.round(rowHeight / yScale)),
      boxSizing: "border-box",
      borderRight: "1px solid",
      borderBottom: "1px solid",
      borderColor: "divider",
      overflow: "hidden",
      whiteSpace: "nowrap",
      textOverflow: "ellipsis",
      px: 0.75,
      py: 0.25,
      fontSize: 12,
      lineHeight: "20px",
      bgcolor: "background.paper",
      ...extra,
    };
  }

  return (
    <Box>
      <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap" sx={{ mb: 0.75 }}>
        <Chip size="small" label={`Rows ${fmt(meta.totalRows)}`} />
        <Chip size="small" label={`Columns ${fmt(meta.totalCols)}`} />
        <Chip size="small" label={`Tile ${meta.tileRows}×${meta.tileCols}`} />
        <Chip size="small" label={`Viewport r${fmt(view?.rowStart || 0)}-r${fmt(view?.rowEnd || 0)} / c${fmt(view?.colStart || 0)}-c${fmt(view?.colEnd || 0)}`} />
      </Stack>
      <Box
        ref={scrollerRef}
        onScroll={handleScroll}
        sx={{
          height,
          overflow: "auto",
          border: "1px solid",
          borderColor: "divider",
          borderRadius: 1.5,
          bgcolor: "background.default",
          position: "relative",
          overscrollBehavior: "contain",
        }}
      >
        <Box sx={{ position: "relative", width: innerWidth, height: innerHeight, minWidth: "100%" }}>
          <Box sx={{ position: "absolute", top: 0, left: 0, width: rowHeaderWidth, height: colHeaderHeight, bgcolor: "background.paper", borderRight: "1px solid", borderBottom: "1px solid", borderColor: "divider", px: 1, lineHeight: `${colHeaderHeight}px`, fontWeight: 900, fontSize: 12 }}>
            {(meta.rowHeaderNames || []).join(" / ")}
          </Box>
          {[...colLabels.entries()].map(([c, label]) => (
            <Box key={`ch:${c}`} sx={cellBaseSx(0, c, { top: 0, height: colHeaderHeight, fontWeight: 900, bgcolor: "background.paper" })} title={label}>
              {label}
            </Box>
          ))}
          {[...rowLabels.entries()].map(([r, label]) => (
            <Box key={`rh:${r}`} sx={{ position: "absolute", top: Math.round((colHeaderHeight + r * rowHeight) / yScale), left: 0, width: rowHeaderWidth, height: Math.max(18, Math.round(rowHeight / yScale)), boxSizing: "border-box", borderRight: "1px solid", borderBottom: "1px solid", borderColor: "divider", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis", px: 1, py: 0.25, fontSize: 12, lineHeight: "20px", bgcolor: "background.paper", fontWeight: label === "Grand Total" ? 900 : 500 }} title={label}>
              {label}
            </Box>
          ))}
          {body.map((cell) => (
            <Box key={`b:${cell.r}:${cell.c}`} sx={cellBaseSx(cell.r, cell.c, { fontWeight: cell.r === meta.totalRows - 1 || cell.c === meta.totalCols - 1 ? 900 : 400 })} title={String(cell.value ?? "")}>
              {cell.value}
            </Box>
          ))}
        </Box>
      </Box>
      <Typography variant="caption" color="text.secondary">
        Lazy tile grid: 表示範囲と周辺タイルだけWorkerから取得します。スクロール位置: top {fmt(scrollInfo.top)} / left {fmt(scrollInfo.left)}。
      </Typography>
    </Box>
  );
}
