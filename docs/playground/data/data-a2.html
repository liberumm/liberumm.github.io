  }catch(e){
    state.externalStorage.lastProbe={ok:false,checkedAt:new Date().toISOString(),ms:Math.round(now()-t0),message:issueText(e)};
    return externalStorageStatus({ok:false,message:`Connected config saved, but list failed: ${issueText(e)}`});
  }
}

async function listExternalDatasets(){
  const prefix=`${normalizeExternalStoragePrefix(state.externalStorage?.prefix)}/datasets/`;
  const paths=await externalListPaths(prefix);
  const ids=[...new Set(paths.map(externalDatasetIdFromManifestPath).filter(Boolean))].sort();
  const rows=[];
  for (const id of ids){
    try{
      const base=externalDatasetBasePath(id);
      const m=await externalReadJson(`${base}/manifest.json`);
      rows.push({id,workspace:manifestWorkspace(m),collection:manifestCollection(m),tableName:manifestTableName(m),path:manifestPath(m),name:m.name||id,originalFileName:m.originalFileName||"",createdAt:m.createdAt||"",rows:m.totalRows||0,sourceRows:m.sourceRows||0,columns:(m.columns||[]).length,chunks:m.chunks||0,fileSize:m.fileSize||0,mode:m.mode||"",external:true});
    }catch(e){
      rows.push({id,name:id,workspace:"External",collection:"Unreadable",tableName:id,path:`External / Unreadable / ${id}`,rows:0,columns:0,chunks:0,mode:`error: ${issueText(e)}`,external:true});
    }
  }
  rows.sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt)));
  return rows;
}

async function syncDatasetToExternal(datasetId){
  if (!state.externalStorage?.enabled) throw new Error("External Storage is not connected");
  const id=datasetId || state.dataset?.id || state.manifest?.id;
  if (!id || String(id).startsWith("virtual:") || String(id).startsWith("memory:") || state.manifest?.openedFromExternalStorage) throw new Error("Sync requires one physical OPFS dataset");
  const loaded=await loadValidatedDataset(id,{rebuildStats:true});
  const {dir,manifest,chunks}=loaded;
  const base=externalDatasetBasePath(id);
  const columns=manifest.columns || [];
  const t0=now();
  let filesWritten=0, bytesWritten=0;
  postProgress(1, `External sync start: ${manifest.name || id}`);
  await externalWriteJson(`${base}/manifest.json`, {...manifest, externalStorageSyncedAt:new Date().toISOString()}); filesWritten++;
  await externalWriteJson(`${base}/chunks.json`, chunks); filesWritten++;
  for (let c=0; c<chunks.length; c++){
    if (state.cancelled) throw new Error("Cancelled");
    const chunkName=`chunk_${String(c).padStart(6,"0")}`;
    const chunkDir=await dir.getDirectoryHandle(chunkName);
    try{ await externalWriteText(`${base}/${chunkName}/meta.json`, await readText(chunkDir,"meta.json")); filesWritten++; }catch{}
    for (const col of columns){
      const colName=colFileName(col.index,col.type);
      const buf=await readBuffer(chunkDir,colName);
      await externalWriteBuffer(`${base}/${chunkName}/${colName}`, buf);
      filesWritten++; bytesWritten += Number(buf.byteLength || 0);
      if (col.type === "string"){
        const dictName=dictFileName(col.index);
        const dictText=await readText(chunkDir,dictName);
        await externalWriteText(`${base}/${chunkName}/${dictName}`, dictText);
        filesWritten++; bytesWritten += dictText.length * 2;
      }
    }
    postProgress(Math.min(99, Math.floor(((c+1)/Math.max(1,chunks.length))*100)), `External sync... chunks ${fmt(c+1)}/${fmt(chunks.length)} / files ${fmt(filesWritten)}`);
  }
  return {id,manifest,filesWritten,bytesWritten,ms:now()-t0,base};
}

async function openExternalDataset(id){
  if (!state.externalStorage?.enabled) throw new Error("External Storage is not connected");
  const datasetId=safeId(id);
  if (!datasetId) throw new Error("External dataset id is empty");
  clearChunkCache();
  const base=externalDatasetBasePath(datasetId);
  const manifest=await externalReadJson(`${base}/manifest.json`);
  const chunks=await externalReadJson(`${base}/chunks.json`);
  if (!manifest || !Array.isArray(manifest.columns)) throw new Error("External manifest is invalid");
  if (!Array.isArray(chunks)) throw new Error("External chunks.json is invalid");
  const openedManifest={...manifest,id:manifest.id || datasetId,openedFromExternalStorage:true,externalStoragePath:base};
  state.virtual=null; state.memory=null; state.dir=null;
  state.externalDataset={id:datasetId,base,manifest:openedManifest,chunks};
  state.manifest=openedManifest;
  state.dataset={id:datasetId,manifest:openedManifest,chunks};
  state.searchMatches=[]; state.dataQueryMatches=null; state.dataQueryMeta=null; state.pivotTable=null; state.pivotTileIndex=null; state.timeTable=null;
  return {manifest:openedManifest,chunks};
}

function activeIsExternalStorage(){ return !!state.externalDataset && !!state.manifest?.openedFromExternalStorage; }


const CHUNK_WORKER_POOL_VERSION = 1;

function chunkExecutionContextSnapshot(){
  if (activeIsMemory()) return {mode:"memory", reason:"In-memory chunks cannot be shared across nested workers yet"};
  if (activeIsExternalStorage()) return {mode:"external", reason:"External Storage credentials stay in the main worker memory only"};
  if (activeIsVirtual()){
    return {
      mode:"virtual",
      sourceIds:(state.virtual?.sources || []).map(s => s.id).filter(Boolean),
      name:state.manifest?.name || "virtual_worker_pool"
    };
  }
  const id=state.dataset?.id || state.manifest?.id;
  return id ? {mode:"storage", datasetId:id} : {mode:"none", reason:"No active storage-backed dataset"};
}

async function hydrateChunkExecutionContext(context){
  if (!context || context.mode === "none") throw new Error(context?.reason || "Chunk worker context is empty");
  if (context.mode === "memory") throw new Error(context.reason || "Memory dataset is not supported by worker pool");
  if (context.mode === "storage"){
    const loaded=await loadDatasetForWorkerReadOnly(context.datasetId);
    state.virtual=null;
    state.memory=null;
    state.dir=loaded.dir;
    state.manifest=loaded.manifest;
    state.dataset={id:loaded.id,manifest:loaded.manifest,chunks:loaded.chunks};
    return;
  }
  if (context.mode === "virtual"){
    await openVirtualDatasetForWorkerReadOnly(context.sourceIds || [], context.name || "virtual_worker_pool");
    return;
  }
  throw new Error(`Unsupported chunk worker context: ${context.mode}`);
}

function defaultChunkWorkerCount(chunkCount){
  const cores=Number(navigator?.hardwareConcurrency || 4);
  return Math.max(1, Math.min(Number(chunkCount || 1), Math.max(1, cores - 1), 6));
}

function canUseChunkWorkerPool(plan, options, chunks){
  if (options?.parallel === false) return false;
  if (options?.onMatch || options?.onChunkStart || options?.onChunkEnd) return false;
  if (!(options?.collectRows || options?.collectSort || options?.collectPartials || plan?.aggregate)) return false;
  if (!Array.isArray(chunks) || chunks.length < 2) return false;
  if (activeIsMemory()) return false;
  if (activeIsExternalStorage()) return false;
  if (typeof Worker === "undefined") return false;
  if (!self.location || !self.location.href) return false;
  const context=chunkExecutionContextSnapshot();
  if (context.mode !== "storage" && context.mode !== "virtual") return false;
  return !!plan;
}

function shardChunksContiguously(chunks, workerCount){
  const n=Math.max(1, Math.min(Number(workerCount || 1), chunks.length));
  const out=[];
  const size=Math.ceil(chunks.length / n);
  for (let i=0;i<n;i++){
    const batch=chunks.slice(i*size, (i+1)*size);
    if (batch.length) out.push(batch);
  }
  return out;
}

function serializableExecutionOptions(options={}){
  return {
    collectRows:!!options.collectRows,
    collectSort:!!options.collectSort,
    collectPartials:!!options.collectPartials,
    limit:Number.POSITIVE_INFINITY,
    progress:false,
    parallel:false
  };
}

function runChunkExecutorWorker({requestId, batchIndex, context, plan, options}){
  return new Promise((resolve,reject)=>{
    let worker;
    try{ worker=new Worker(self.location.href); }
    catch(err){ reject(err); return; }
    let settled=false;
    const cleanup=()=>{ try{ worker.terminate(); }catch{} };
    worker.onmessage=(e)=>{
      const msg=e.data || {};
      if (msg.type === "CHUNK_BATCH_DONE" && msg.requestId === requestId){
        if (settled) return;
        settled=true;
        cleanup();
        resolve({...msg.result,batchIndex});
      } else if (msg.type === "ERROR"){
        if (settled) return;
        settled=true;
        cleanup();
        reject(new Error(msg.message || "Chunk executor failed"));
      }
    };
    worker.onerror=(err)=>{
      if (settled) return;
      settled=true;
      cleanup();
      reject(new Error(err?.message || "Chunk executor worker error"));
    };
    worker.postMessage({type:"EXECUTE_CHUNK_BATCH", requestId, batchIndex, context, plan, options});
  });
}

function reduceChunkWorkerResults(plan, options, chunks, batches, results, t0){
  const ordered=[...results].sort((a,b)=>Number(a.batchIndex||0)-Number(b.batchIndex||0));
  let refs=[], sortable=[], partials=[];
  let scanned=0, matched=0, skippedChunks=0;
  for (const r of ordered){
    scanned += Number(r.scanned || 0);
    matched += Number(r.matched || 0);
    skippedChunks += Number(r.skippedChunks || 0);
    if (Array.isArray(r.refs)) refs.push(...r.refs);
    if (Array.isArray(r.sortable)) sortable.push(...r.sortable);
    if (Array.isArray(r.partials)) partials.push(...r.partials);
  }

  const limit=normalizePlanLimit(options.limit ?? plan?.limit);
  let capped=false;
  if (options.collectRows && Number.isFinite(limit) && refs.length > limit){
    refs=refs.slice(0, limit);
    capped=true;
  }
  if (options.collectSort && Number.isFinite(limit) && sortable.length > limit){
    // Keep the full sortable list for correct final ordering. The caller sorts and slices.
    capped=true;
  }

  return {
    taskId:options.taskId || executionTaskId(plan?.name || "query"),
    engineVersion:CHUNK_EXECUTION_ENGINE_VERSION,
    workerPoolVersion:CHUNK_WORKER_POOL_VERSION,
    executionMode:"worker-pool",
    workerCount:batches.length,
    chunks,
    refs,
    sortable,
    partials,
    scanned,
    matched,
    skippedChunks,
    capped,
    ms:now()-t0,
    queryPlan:{...queryPlanSummary(plan), executionEngine:"chunk-pool-v1", workerPool:{version:CHUNK_WORKER_POOL_VERSION, workers:batches.length}, distributedReduce:!!plan?.aggregate}
  };
}

async function executeChunkExecutionPlanLocalMaybeParallel(plan, options={}){
  const chunks=selectChunksForPlan(plan);
  if (!canUseChunkWorkerPool(plan, options, chunks)){
    const exec=await executeChunkExecutionPlan(plan, options);
    exec.executionMode=exec.executionMode || "single-worker";
    return exec;
  }

  const t0=now();
  const context=chunkExecutionContextSnapshot();
  const workerCount=defaultChunkWorkerCount(chunks.length);
  const batches=shardChunksContiguously(chunks, workerCount);
  const taskId=options.taskId || executionTaskId(`${plan?.name || "query"}_pool`);
  const progressLabel=options.progressLabel || plan?.name || "Executing chunks";
  post("PROGRESS",{value:1,text:`${progressLabel} with Worker Pool... workers ${batches.length} / chunks ${fmt(chunks.length)}`});

  try{
    let completed=0;
    const results=await Promise.all(batches.map((batch,batchIndex)=>{
      const batchPlan={...plan,chunks:batch,limit:Number.POSITIVE_INFINITY};
      const batchOptions=serializableExecutionOptions(options);
      return runChunkExecutorWorker({requestId:`${taskId}_${batchIndex}`, batchIndex, context, plan:batchPlan, options:batchOptions})
        .then(result=>{
          completed++;
          post("PROGRESS",{value:Math.min(99,Math.floor((completed / batches.length) * 100)),text:`${progressLabel} with Worker Pool... batches ${completed}/${batches.length}`});
          return result;
        });
    }));
    return reduceChunkWorkerResults(plan,{...options,taskId},chunks,batches,results,t0);
  }catch(err){
    post("PROGRESS",{value:0,text:`Worker Pool fallback: ${err?.message || err}`});
    const exec=await executeChunkExecutionPlan(plan,{...options,parallel:false});
    exec.executionMode="single-worker-fallback";
    exec.workerPoolError=err?.message || String(err);
    return exec;
  }
}


async function executeChunkExecutionPlanMaybeParallel(plan, options={}){
  const chunks=selectChunksForPlan(plan);
  const cfg=state.remoteExecution || {};
  const remoteEligible=canUseRemoteExecution(plan, options, chunks);

  if (remoteEligible && (cfg.mode === "remote-first" || cfg.mode === "remote-only")){
    try{
      return await executeChunkExecutionPlanRemote(plan, options, chunks);
    }catch(err){
      if (cfg.mode === "remote-only") throw err;
      post("PROGRESS",{value:0,text:`Remote Execution fallback: ${err?.message || err}`});
    }
  }

  const local=await executeChunkExecutionPlanLocalMaybeParallel(plan, options);
  if (remoteEligible && cfg.mode === "local-first"){
    local.remoteExecutionAvailable=true;
    local.queryPlan={...(local.queryPlan || queryPlanSummary(plan)), remoteExecution:{version:REMOTE_EXECUTION_ADAPTER_VERSION, available:true, mode:cfg.mode}};
  }
  return local;
}

function compactStringColumnForMemory(idsArr, dict){
  const used=new Map();
  const newDict=[];
  const remapped=new Int32Array(idsArr.length);
  for (let i=0;i<idsArr.length;i++){
    const oldId=idsArr[i];
    if (oldId < 0){ remapped[i] = -1; continue; }
    let newId=used.get(oldId);
    if (newId == null){
      newId=newDict.length;
      used.set(oldId,newId);
      newDict.push(dict[oldId] ?? "");
    }
    remapped[i]=newId;
  }
  return {ids:remapped, dict:newDict};
}

async function analyzeSchema({file, encoding, delimiter, sampleRows, rules}){
  state.file=file; state.encoding=encoding; state.delimiter=delimiter;
  postProgress(1, `Preparing CSV schema: ${file.name}`);
  const iter=fileLines(file, encoding, 0, `Reading sample ${file.name}`, 2, 58);
  const first=await iter.next();
  if (first.done) throw new Error("CSV is empty");
  const rawHeaders=parseCSVLine(first.value, delimiter);
  const headers=uniqueNames(rawHeaders.map((h,i)=>cleanHeaderName(h,i,rules)));
  const stats=headers.map(()=>({nonNull:0,num:0,nulls:0,examples:[]}));
  let sampled=0, malformed=0, changed=0;

  for await (const line of iter){
    if (sampled >= sampleRows) break;
    if (!line && sampled >= sampleRows) break;
    let cells=parseCSVLine(line, delimiter);
    if (cells.length !== headers.length) malformed++;
    if (rules.skipBadRows && cells.length !== headers.length) continue;
    while(cells.length < headers.length) cells.push("");
    if (cells.length > headers.length) cells=cells.slice(0, headers.length);

    for (let i=0;i<headers.length;i++){
      const c=cleanCell(cells[i], rules);
      if (c.changed) changed++;
      if (c.value == null){ stats[i].nulls++; continue; }
      stats[i].nonNull++;
      const n=numberCandidate(c.value, rules);
      if (n.ok) stats[i].num++;
      if (stats[i].examples.length < 3) stats[i].examples.push(c.value);
    }
    sampled++;
    if (sampled % 1000 === 0) postProgress(Math.min(88, 60 + Math.floor(sampled/Math.max(1,sampleRows)*28)), `Analyzing sample rows... ${fmt(sampled)}/${fmt(sampleRows)}`);
  }

  const columns=headers.map((name,i)=>{
    const s=stats[i];
    const ratio=s.nonNull ? s.num / s.nonNull : 0;
    return {index:i,name,type: ratio >= rules.numericThreshold ? "number" : "string", sampleNonNull:s.nonNull, sampleNulls:s.nulls, numericRatio:ratio, examples:s.examples};
  });

  state.schema={headers, columns, rules, sampleRows:sampled, malformedSampleRows:malformed, changedSampleCells:changed};
  state.schemaFileKey=schemaCacheKey(file, encoding, delimiter, rules);
  postProgress(92, `Schema sample complete: ${fmt(sampled)} rows / ${fmt(headers.length)} columns`);
  return state.schema;
}

function initChunk(columns){
  return {
    rows:0,
    numeric: columns.map(c => c.type === "number" ? [] : null),
    stringIds: columns.map(c => c.type === "string" ? [] : null),
    dictMaps: columns.map(c => c.type === "string" ? new Map() : null),
    dictValues: columns.map(c => c.type === "string" ? [] : null),
    stats: columns.map(c => ({
      type:c.type,nulls:0,invalidNumbers:0,changedCells:0,min:null,max:null,distinct:0
    }))
  };
}

function addRowToChunk(chunk, cells, columns, rules){
  for (const col of columns){
    const raw = cells[col.index] ?? "";
    const cleaned = cleanCell(raw, rules);
    if (cleaned.changed) chunk.stats[col.index].changedCells++;

    if (col.type === "number"){
      if (cleaned.value == null){
        chunk.numeric[col.index].push(NaN);
        chunk.stats[col.index].nulls++;
      } else {
        const n=numberCandidate(cleaned.value, rules);
        if (n.ok){
          chunk.numeric[col.index].push(n.value);
          const st=chunk.stats[col.index];
          st.min = st.min == null ? n.value : Math.min(st.min,n.value);
          st.max = st.max == null ? n.value : Math.max(st.max,n.value);
        } else {
          chunk.numeric[col.index].push(NaN);
          chunk.stats[col.index].nulls++;
          chunk.stats[col.index].invalidNumbers++;
        }
      }
    } else {
      if (cleaned.value == null){
        chunk.stringIds[col.index].push(-1);
        chunk.stats[col.index].nulls++;
      } else {
        const map=chunk.dictMaps[col.index];
        let id=map.get(cleaned.value);
        if (id === undefined){
          id=chunk.dictValues[col.index].length;
          map.set(cleaned.value,id);
          chunk.dictValues[col.index].push(cleaned.value);
        }
        chunk.stringIds[col.index].push(id);
      }
    }
  }
  chunk.rows++;
}

async function flushChunk(datasetDir, chunkIndex, chunk, columns){
  const chunkDir=await datasetDir.getDirectoryHandle(`chunk_${String(chunkIndex).padStart(6,"0")}`, {create:true});
  const columnStats={};
  for (const col of columns){
    if (col.type === "number"){
      const arr=new Float64Array(chunk.numeric[col.index]);
      await writeBuffer(chunkDir, colFileName(col.index,col.type), arr.buffer);
      columnStats[String(col.index)] = makeColumnStatForMeta(chunk.stats[col.index], chunk.rows);
    } else {
      const arr=new Int32Array(chunk.stringIds[col.index]);
      await writeBuffer(chunkDir, colFileName(col.index,col.type), arr.buffer);
      await writeJson(chunkDir, dictFileName(col.index), chunk.dictValues[col.index]);
      chunk.stats[col.index].distinct = chunk.dictValues[col.index].length;
      columnStats[String(col.index)] = makeColumnStatForMeta(chunk.stats[col.index], chunk.rows, chunk.dictValues[col.index]);
    }
  }
  const meta={chunkIndex,rowCount:chunk.rows,stats:chunk.stats,columnStats,indexVersion:1};
  await writeJson(chunkDir,"meta.json",meta);
  return meta;
}

function schemaHeaderSignature(schema){
  return (schema?.columns || []).map(c => c.name).join("\u001f");
}
function schemaFullSignatureFromColumns(columns){
  return (columns || []).map(c => `${c.name}\u001e${c.type}`).join("\u001f");
}
function schemaMismatchMessage(a,b){
  const ac=a?.columns||[], bc=b?.columns||[];
  if (ac.length !== bc.length) return `Column count mismatch: ${ac.length} vs ${bc.length}`;
  const diffs=[];
  for (let i=0;i<ac.length;i++){
    if (ac[i].name !== bc[i].name) diffs.push(`#${i+1}: ${ac[i].name} != ${bc[i].name}`);
    if (diffs.length >= 5) break;
  }
  return diffs.length ? diffs.join(" / ") : "Column names are different";
}
function schemaTypeWarnings(base, other, fileName){
  const warnings=[];
  const ac=base?.columns||[], bc=other?.columns||[];
  for (let i=0;i<Math.min(ac.length,bc.length);i++){
    if (ac[i].type !== bc[i].type) warnings.push(`${fileName} #${i+1} ${ac[i].name}: ${bc[i].type} -> ${ac[i].type}`);
    if (warnings.length >= 10) break;
  }
  return warnings;
}
async function analyzeFilesForMerge({files, encoding, delimiter, sampleRows, rules}){
  const list=(Array.isArray(files) && files.length ? files : []).filter(Boolean);
  if (!list.length) throw new Error("CSV file is not selected");
  const fileSchemas=[];
  let base=null;
  const typeWarnings=[];
  for (let i=0;i<list.length;i++){
    if (state.cancelled) throw new Error("Cancelled");
    postProgress(Math.floor(i/Math.max(1,list.length)*100), `Analyzing CSV ${i+1}/${list.length}: ${list[i].name}`);
    const schema=await analyzeSchema({file:list[i], encoding, delimiter, sampleRows:Number(sampleRows||20000), rules});
    fileSchemas.push({
      name:list[i].name,
      size:list[i].size,
      columns:schema.columns.length,
      sampleRows:schema.sampleRows,
      malformedSampleRows:schema.malformedSampleRows,
      changedSampleCells:schema.changedSampleCells,
      signature:schemaHeaderSignature(schema)
    });
    if (!base) base=schema;
    else {
      if (schemaHeaderSignature(base) !== schemaHeaderSignature(schema)) {
        throw new Error(`Merge blocked: ${list[i].name} has a different column layout. ${schemaMismatchMessage(base,schema)}`);
      }
      typeWarnings.push(...schemaTypeWarnings(base,schema,list[i].name));
    }
  }
  state.schema=base;
  return {schema:base,fileSchemas,typeWarnings};
}

async function buildSingleColumnarCache(msg){
  clearChunkCache();
  const rules=makeRules(msg);
  const cacheKey=schemaCacheKey(msg.file, msg.encoding, msg.delimiter, rules);
  let schema=state.schema;
  if (!schema || !schema.columns || state.schemaFileKey !== cacheKey || msg.forceAnalyze){
    schema=await analyzeSchema({file:msg.file, encoding:msg.encoding, delimiter:msg.delimiter, sampleRows:Number(msg.sampleRows||20000), rules});
  }

  state.file=msg.file; state.encoding=msg.encoding; state.delimiter=msg.delimiter;
  const root=await rootDir();
  const id=makeDatasetId(msg.datasetName || msg.file.name);
  const dir=await root.getDirectoryHandle(id,{create:true});
  const t0=now();

  try{
    const columns=schema.columns;
    const chunkSize=Math.max(1000,Number(msg.chunkSize||100000));
    const iter=fileLines(msg.file, msg.encoding, 0, `Reading ${msg.file.name} for cache`, 8, 72);
    await iter.next(); // header

    let chunk=initChunk(columns);
    let chunkIndex=0, totalRows=0, sourceRows=0, skippedRows=0, malformedRows=0;
    const chunkMetas=[];

    for await (const line of iter){
      if (state.cancelled) throw new Error("Cancelled");
      sourceRows++;
      let cells=parseCSVLine(line, msg.delimiter);
      if (cells.length !== columns.length) malformedRows++;
      if (rules.skipBadRows && cells.length !== columns.length){ skippedRows++; continue; }
      while(cells.length < columns.length) cells.push("");
      if (cells.length > columns.length) cells=cells.slice(0, columns.length);

      addRowToChunk(chunk,cells,columns,rules);
      totalRows++;

      if (chunk.rows >= chunkSize){
        const meta=await flushChunk(dir,chunkIndex,chunk,columns);
        chunkMetas.push(meta);
        chunkIndex++;
        chunk=initChunk(columns);
        postProgress(progressCurrentValue, `Writing chunk ${fmt(chunkIndex)}... rows ${fmt(totalRows)}`);
      }
      if (sourceRows % 50000 === 0){
        postProgress(progressCurrentValue, `Building columnar... source rows ${fmt(sourceRows)} / output rows ${fmt(totalRows)} / chunks ${fmt(chunkIndex)}`);
      }
    }
    if (chunk.rows > 0){
      const meta=await flushChunk(dir,chunkIndex,chunk,columns);
      chunkMetas.push(meta);
      chunkIndex++;
    }

    postProgress(88, `Finalizing columnar cache... ${fmt(totalRows)} rows / ${fmt(chunkIndex)} chunks`);

    const cleanReport={
      sourceRows,totalRows,skippedRows,malformedRows,
      changedCells:chunkMetas.flatMap(c=>c.stats).reduce((a,s)=>a+(s.changedCells||0),0),
      nullCells:chunkMetas.flatMap(c=>c.stats).reduce((a,s)=>a+(s.nulls||0),0),
      invalidNumbers:chunkMetas.flatMap(c=>c.stats).reduce((a,s)=>a+(s.invalidNumbers||0),0)
    };

    const tableName=cleanMetaValue(msg.tableName || msg.datasetName || msg.file.name, msg.file.name);
    const manifest={
      id,
      name:msg.datasetName || tableName,
      storageWorkspace:cleanMetaValue(msg.storageWorkspace, "Default"),
      storageCollection:cleanMetaValue(msg.storageCollection, "General"),
      tableName,
      storagePath:`${cleanMetaValue(msg.storageWorkspace, "Default")} / ${cleanMetaValue(msg.storageCollection, "General")} / ${tableName}`,
      originalFileName:msg.file.name,
      sourceFiles:[{name:msg.file.name,size:msg.file.size,sourceRows,totalRows,skippedRows,malformedRows}],
      createdAt:new Date().toISOString(), mode:"columnar-clean",
      formatVersion:5, features:integrityFeatureFlags({}),
      encoding:msg.encoding, delimiter:msg.delimiter, fileSize:msg.file.size,
      chunkSize,totalRows,sourceRows,chunks:chunkIndex,
      columns, rules, cleanReport
    };
    postProgress(94, "Writing manifest and chunk metadata...");
    await writeJson(dir,"manifest.json",manifest);
    await writeJson(dir,"chunks.json",chunkMetas);

    state.dataset={id,manifest,chunks:chunkMetas};
    state.virtual=null; state.memory=null; state.manifest=manifest; state.dir=dir; state.searchMatches=[]; state.dataQueryMatches=null; state.dataQueryMeta=null; state.pivotTable=null; state.pivotTileIndex=null; state.timeTable=null;
    return {manifest,chunks:chunkMetas,ms:now()-t0};
  }catch(err){
    await cleanupDatasetDir(root,id);
    throw err;
  }
}

async function buildMergedColumnarCache(msg){
  clearChunkCache();
  const rules=makeRules(msg);
  const files=(Array.isArray(msg.files) && msg.files.length ? msg.files : [msg.file]).filter(Boolean);
  if (files.length < 2) return buildSingleColumnarCache({...msg,file:files[0]});

  const analyzed=await analyzeFilesForMerge({files, encoding:msg.encoding, delimiter:msg.delimiter, sampleRows:Number(msg.sampleRows||20000), rules});
  const schema=analyzed.schema;
  const columns=schema.columns;
  state.file=files[0]; state.encoding=msg.encoding; state.delimiter=msg.delimiter;

  const root=await rootDir();
  const id=makeDatasetId(msg.datasetName || `merged_${files.length}_csv`);
  const dir=await root.getDirectoryHandle(id,{create:true});
  const t0=now();

  try{
    const chunkSize=Math.max(1000,Number(msg.chunkSize||100000));
    let chunk=initChunk(columns);
    let chunkIndex=0, totalRows=0, sourceRows=0, skippedRows=0, malformedRows=0;
    const sourceFiles=[];
    const chunkMetas=[];

    for (let f=0; f<files.length; f++){
      const file=files[f];
      const iter=fileLines(file, msg.encoding, 0, `Reading CSV ${f+1}/${files.length} ${file.name}`, Math.floor((f/files.length)*80)+8, Math.max(1, Math.floor(80/files.length)));
      await iter.next(); // header
      let fileSourceRows=0, fileTotalRows=0, fileSkippedRows=0, fileMalformedRows=0;
      postProgress(Math.floor((f/files.length)*80)+8, `Merging CSV ${f+1}/${files.length}: ${file.name}`);

      for await (const line of iter){
        if (state.cancelled) throw new Error("Cancelled");
        fileSourceRows++; sourceRows++;
        let cells=parseCSVLine(line, msg.delimiter);
        if (cells.length !== columns.length){ malformedRows++; fileMalformedRows++; }
        if (rules.skipBadRows && cells.length !== columns.length){ skippedRows++; fileSkippedRows++; continue; }
        while(cells.length < columns.length) cells.push("");
        if (cells.length > columns.length) cells=cells.slice(0, columns.length);

        addRowToChunk(chunk,cells,columns,rules);
        totalRows++; fileTotalRows++;

        if (chunk.rows >= chunkSize){
          const meta=await flushChunk(dir,chunkIndex,chunk,columns);
          chunkMetas.push(meta);
          chunkIndex++;
          chunk=initChunk(columns);
        }
        if (sourceRows % 50000 === 0){
          postProgress(progressCurrentValue, `Merging... source rows ${fmt(sourceRows)} / output rows ${fmt(totalRows)} / chunks ${fmt(chunkIndex)}`);
        }
      }
      sourceFiles.push({name:file.name,size:file.size,sourceRows:fileSourceRows,totalRows:fileTotalRows,skippedRows:fileSkippedRows,malformedRows:fileMalformedRows});
    }

    if (chunk.rows > 0){
      const meta=await flushChunk(dir,chunkIndex,chunk,columns);
      chunkMetas.push(meta);
      chunkIndex++;
    }

    postProgress(88, `Finalizing merged cache... ${fmt(totalRows)} rows / ${fmt(chunkIndex)} chunks`);

    const cleanReport={
      sourceRows,totalRows,skippedRows,malformedRows,
      changedCells:chunkMetas.flatMap(c=>c.stats).reduce((a,s)=>a+(s.changedCells||0),0),
      nullCells:chunkMetas.flatMap(c=>c.stats).reduce((a,s)=>a+(s.nulls||0),0),
      invalidNumbers:chunkMetas.flatMap(c=>c.stats).reduce((a,s)=>a+(s.invalidNumbers||0),0),
      typeWarnings:analyzed.typeWarnings
    };

    const tableName=cleanMetaValue(msg.tableName || msg.datasetName || `merged_${files.length}_csv`, `merged_${files.length}_csv`);
    const manifest={
      id,
      name:msg.datasetName || tableName,
      storageWorkspace:cleanMetaValue(msg.storageWorkspace, "Default"),
      storageCollection:cleanMetaValue(msg.storageCollection, "General"),
      tableName,
      storagePath:`${cleanMetaValue(msg.storageWorkspace, "Default")} / ${cleanMetaValue(msg.storageCollection, "General")} / ${tableName}`,
      originalFileName:files.map(f=>f.name).join(" + "),
      sourceFiles,
      createdAt:new Date().toISOString(), mode:"columnar-clean-merged-csv",
      formatVersion:5, features:integrityFeatureFlags({}),
      encoding:msg.encoding, delimiter:msg.delimiter, fileSize:files.reduce((a,f)=>a+(f.size||0),0),
      chunkSize,totalRows,sourceRows,chunks:chunkIndex,
      columns, rules, cleanReport
    };
    await writeJson(dir,"manifest.json",manifest);
    await writeJson(dir,"chunks.json",chunkMetas);

    state.dataset={id,manifest,chunks:chunkMetas};
    state.virtual=null; state.memory=null; state.manifest=manifest; state.dir=dir; state.searchMatches=[]; state.dataQueryMatches=null; state.dataQueryMeta=null; state.pivotTable=null; state.pivotTileIndex=null; state.timeTable=null;
    return {manifest,chunks:chunkMetas,ms:now()-t0,typeWarnings:analyzed.typeWarnings};
  }catch(err){
    await cleanupDatasetDir(root,id);
    throw err;
  }
}

async function buildColumnarCache(msg){
  const files=(Array.isArray(msg.files) && msg.files.length ? msg.files : [msg.file]).filter(Boolean);
  if (files.length > 1) return buildMergedColumnarCache({...msg,files});

}

      nullCells:sources.reduce((a,x)=>a+Number(x.manifest.cleanReport?.nullCells || 0),0),
      invalidNumbers:sources.reduce((a,x)=>a+Number(x.manifest.cleanReport?.invalidNumbers || 0),0)
    }
  };
  state.virtual={sources:virtualSources, globalChunks};
  state.externalDataset=null;
  state.dir=null; state.manifest=manifest; state.dataset={id:manifest.id,manifest,chunks:globalChunks};
  state.searchMatches=[]; state.dataQueryMatches=null; state.dataQueryMeta=null; state.pivotTable=null; state.pivotTileIndex=null; state.timeTable=null;
  return {manifest,chunks:globalChunks};
}



async function openMemoryDataset(ids, name, options={}){
  clearChunkCache();
  const list=(Array.isArray(ids) ? ids : []).filter(Boolean);
  if (list.length < 1) throw new Error("Select at least one saved table to load into memory");
  const maxRows=Number(options.maxRows || 0);
  const maxBytes=Number(options.maxMemoryMB || 512) * 1024 * 1024;
  const opened=[];
  for (const id of list){
    opened.push(await loadValidatedDataset(id,{rebuildStats:true}));
  }
  const base=opened[0].manifest;
  const baseSig=schemaFullSignatureFromColumns(base.columns);
  for (const item of opened.slice(1)){
    const sig=schemaFullSignatureFromColumns(item.manifest.columns);
    if (sig !== baseSig) throw new Error(`In-memory Dataset blocked: ${item.manifest.name || item.id} has a different column name/type layout`);
  }

  const columns=base.columns || [];
  const memoryChunks=[];
  const memorySources=opened.map((item, sourceIndex)=>({
    sourceIndex,
    id:item.id,
    manifest:item.manifest,
    rows:Number(item.manifest.totalRows || 0),
    chunks:Number(item.manifest.chunks || item.chunks.length || 0)
  }));
  let rowOffset=0;
  let estimatedBytes=0;
  const t0=now();

  for (let sourceIndex=0; sourceIndex<opened.length; sourceIndex++){
    const item=opened[sourceIndex];
    for (let c=0; c<item.chunks.length; c++){
      if (state.cancelled) throw new Error("Cancelled");
      if (maxRows > 0 && rowOffset >= maxRows) break;
      const chunkDir=await item.dir.getDirectoryHandle(`chunk_${String(c).padStart(6,"0")}`);
      const meta=await readJson(chunkDir,"meta.json");
      const originalRowCount=Number(meta.rowCount || 0);
      const takeRows=maxRows > 0 ? Math.min(originalRowCount, maxRows - rowOffset) : originalRowCount;
      if (takeRows <= 0) break;
      const colMap=new Map();

      for (const col of columns){
        if (col.type === "number"){
          const buf=await readBuffer(chunkDir,colFileName(col.index,col.type));
          let arr=new Float64Array(buf);
          if (takeRows < arr.length) arr=arr.slice(0,takeRows);
          estimatedBytes += arr.byteLength;
          colMap.set(col.index,{type:"number", data:arr});
        } else {
          const buf=await readBuffer(chunkDir,colFileName(col.index,col.type));
          let idsArr=new Int32Array(buf);
          if (takeRows < idsArr.length) idsArr=idsArr.slice(0,takeRows);
          let dict=await readJson(chunkDir,dictFileName(col.index));
          if (takeRows < originalRowCount){
            const compact=compactStringColumnForMemory(idsArr, dict);
            idsArr=compact.ids;
            dict=compact.dict;
          }
          estimatedBytes += idsArr.byteLength + JSON.stringify(dict).length * 2;
          colMap.set(col.index,{type:"string", ids:idsArr, dict});
        }
        if (maxBytes > 0 && estimatedBytes > maxBytes){
          throw new Error(`In-memory load stopped: estimated memory ${fmt(Math.round(estimatedBytes/1024/1024))} MB exceeded limit ${fmt(Math.round(maxBytes/1024/1024))} MB`);
        }
      }

      memoryChunks.push({sourceIndex,sourceChunkIndex:c,rowStart:rowOffset,rowEnd:rowOffset + takeRows,rowCount:takeRows,columns:colMap});
      rowOffset += takeRows;
      post("PROGRESS",{value:Math.min(99, Math.floor(((sourceIndex + (c+1)/Math.max(1,item.chunks.length)) / opened.length) * 100)), text:`Loading to In-memory... table ${sourceIndex+1}/${opened.length} / chunk ${c+1}/${item.chunks.length} / rows ${fmt(rowOffset)} / est ${fmt(Math.round(estimatedBytes/1024/1024))} MB`});
    }
  }

  const tableName=cleanMetaValue(name || `memory_${list.length}_tables`, `memory_${list.length}_tables`);
  const manifest={
    ...base,
    id:`memory:${list.join("+")}`,
    name:tableName,
    storageWorkspace:"In-memory",
    storageCollection:"Session",
    tableName,
    storagePath:`In-memory / Session / ${tableName}`,
    originalFileName:opened.map(x=>x.manifest.name || x.id).join(" + "),
    sourceDatasets:opened.map(x=>({
      id:x.id,workspace:manifestWorkspace(x.manifest),collection:manifestCollection(x.manifest),tableName:manifestTableName(x.manifest),name:x.manifest.name,rows:x.manifest.totalRows,chunks:x.manifest.chunks,createdAt:x.manifest.createdAt
    })),
    createdAt:new Date().toISOString(),
    mode:"memory-dataset",
    totalRows:rowOffset,
    sourceRows:opened.reduce((a,x)=>a+Number(x.manifest.sourceRows || x.manifest.totalRows || 0),0),
    chunks:memoryChunks.length,
    fileSize:opened.reduce((a,x)=>a+Number(x.manifest.fileSize || 0),0),
    memoryReport:{estimatedBytes,estimatedMB:Math.round(estimatedBytes/1024/1024),maxMemoryMB:Number(options.maxMemoryMB || 512),maxRows,loadedTables:opened.length,loadMs:now()-t0},
    cleanReport:{
      sourceRows:opened.reduce((a,x)=>a+Number(x.manifest.cleanReport?.sourceRows || x.manifest.sourceRows || 0),0),
      totalRows:rowOffset,
      skippedRows:opened.reduce((a,x)=>a+Number(x.manifest.cleanReport?.skippedRows || 0),0),
      malformedRows:opened.reduce((a,x)=>a+Number(x.manifest.cleanReport?.malformedRows || 0),0),
      changedCells:opened.reduce((a,x)=>a+Number(x.manifest.cleanReport?.changedCells || 0),0),
      nullCells:opened.reduce((a,x)=>a+Number(x.manifest.cleanReport?.nullCells || 0),0),
      invalidNumbers:opened.reduce((a,x)=>a+Number(x.manifest.cleanReport?.invalidNumbers || 0),0)
    }
  };
  const chunkMetas=memoryChunks.map((ch,i)=>{
    const source=opened[ch.sourceIndex];
    const srcMeta=source?.chunks?.[ch.sourceChunkIndex] || null;
    const fullChunk = Number(srcMeta?.rowCount || 0) === Number(ch.rowCount || 0);
    return {chunkIndex:i,rowCount:ch.rowCount,sourceIndex:ch.sourceIndex,sourceChunkIndex:ch.sourceChunkIndex,rowStart:ch.rowStart,rowEnd:ch.rowEnd,...(fullChunk && srcMeta ? {stats:srcMeta.stats,columnStats:srcMeta.columnStats,indexVersion:srcMeta.indexVersion} : {})};
  });
  state.memory={sources:memorySources,chunks:memoryChunks,estimatedBytes,maxBytes};
  state.virtual=null; state.externalDataset=null; state.dir=null; state.manifest=manifest; state.dataset={id:manifest.id,manifest,chunks:chunkMetas};
  state.searchMatches=[]; state.dataQueryMatches=null; state.dataQueryMeta=null; state.pivotTable=null; state.pivotTileIndex=null; state.timeTable=null;
  return {manifest,chunks:chunkMetas};
}

function activeIsVirtual(){ return !!state.virtual && state.manifest?.mode === "virtual-dataset"; }
function activeIsMemory(){ return !!state.memory && state.manifest?.mode === "memory-dataset"; }
// activeIsExternalStorage is defined by the Browser External Storage Adapter block above.
function chunkBaseRow(chunkIndex){
  if (activeIsMemory()) return Number(state.memory.chunks[chunkIndex]?.rowStart || 0);
  if (activeIsVirtual()) return Number(state.virtual.globalChunks[chunkIndex]?.rowStart || 0);
  const chunks=state.dataset?.chunks || [];
  let start=0;
  for (let i=0;i<chunkIndex;i++) start += Number(chunks[i]?.rowCount || 0);
  return start;
}

async function mergeSavedDatasets(ids, datasetName, storageMeta={}){
  clearChunkCache();
  const list=(Array.isArray(ids) ? ids : []).filter(Boolean);
  if (list.length < 2) throw new Error("Select at least two saved datasets to merge");
  const root=await rootDir();
  const opened=[];
  for (const id of list){
    opened.push(await loadValidatedDataset(id,{rebuildStats:true}));
  }
  const base=opened[0].manifest;
  const baseSig=schemaFullSignatureFromColumns(base.columns);
  for (const item of opened.slice(1)){
    const sig=schemaFullSignatureFromColumns(item.manifest.columns);
    if (sig !== baseSig) throw new Error(`Merge blocked: saved dataset ${item.manifest.name || item.id} has a different column name/type layout`);
  }

  const id=makeDatasetId(datasetName || `merged_${list.length}_saved`);
  const targetDir=await root.getDirectoryHandle(id,{create:true});

  try{
    const columns=base.columns;
    const chunkMetas=[];
    let chunkIndex=0;

    for (let d=0; d<opened.length; d++){
      const item=opened[d];
      for (let c=0; c<item.chunks.length; c++){
        if (state.cancelled) throw new Error("Cancelled");
        post("PROGRESS",{value:Math.floor((d/opened.length)*100), text:`Merging saved dataset ${d+1}/${opened.length}: chunk ${c+1}/${item.chunks.length}`});
        const sourceChunkDir=await item.dir.getDirectoryHandle(`chunk_${String(c).padStart(6,"0")}`);
        const targetChunkDir=await targetDir.getDirectoryHandle(`chunk_${String(chunkIndex).padStart(6,"0")}`, {create:true});
        for (const col of columns){
          await writeBuffer(targetChunkDir, colFileName(col.index,col.type), await readBuffer(sourceChunkDir, colFileName(col.index,col.type)));
          if (col.type === "string") await writeJson(targetChunkDir, dictFileName(col.index), await readJson(sourceChunkDir, dictFileName(col.index)));
        }
        const meta=await readJson(sourceChunkDir,"meta.json");
        const copiedMeta={...meta,chunkIndex};
        await writeJson(targetChunkDir,"meta.json",copiedMeta);
        chunkMetas.push(copiedMeta);
        chunkIndex++;
      }
    }

    function sumReport(key){ return opened.reduce((a,x)=>a+Number(x.manifest.cleanReport?.[key]||0),0); }
    const totalRows=opened.reduce((a,x)=>a+Number(x.manifest.totalRows||0),0);
    const sourceRows=opened.reduce((a,x)=>a+Number(x.manifest.sourceRows||0),0);
    const cleanReport={
      sourceRows,totalRows,
      skippedRows:sumReport("skippedRows"),
      malformedRows:sumReport("malformedRows"),
      changedCells:sumReport("changedCells"),
      nullCells:sumReport("nullCells"),
      invalidNumbers:sumReport("invalidNumbers")
    };
    const tableName=cleanMetaValue(storageMeta.tableName || datasetName || `merged_${list.length}_saved`, `merged_${list.length}_saved`);
    const manifest={
      id,
      name:datasetName || tableName,
      storageWorkspace:cleanMetaValue(storageMeta.storageWorkspace, manifestWorkspace(base)),
      storageCollection:cleanMetaValue(storageMeta.storageCollection, manifestCollection(base)),
      tableName,
      storagePath:`${cleanMetaValue(storageMeta.storageWorkspace, manifestWorkspace(base))} / ${cleanMetaValue(storageMeta.storageCollection, manifestCollection(base))} / ${tableName}`,
      originalFileName:opened.map(x=>x.manifest.name || x.id).join(" + "),
      sourceDatasets:opened.map(x=>({id:x.id,name:x.manifest.name,rows:x.manifest.totalRows,chunks:x.manifest.chunks,createdAt:x.manifest.createdAt})),
      createdAt:new Date().toISOString(),
      mode:"columnar-clean-merged-opfs",
      formatVersion:5, features:integrityFeatureFlags({}),
      encoding:base.encoding,
      delimiter:base.delimiter,
      fileSize:opened.reduce((a,x)=>a+Number(x.manifest.fileSize||0),0),
      chunkSize:base.chunkSize,
      totalRows,
      sourceRows,
      chunks:chunkMetas.length,
      columns,
      rules:base.rules,
      cleanReport
    };
    await writeJson(targetDir,"manifest.json",manifest);
    await writeJson(targetDir,"chunks.json",chunkMetas);
    state.dataset={id,manifest,chunks:chunkMetas};
    state.virtual=null; state.memory=null; state.manifest=manifest; state.dir=targetDir; state.searchMatches=[]; state.dataQueryMatches=null; state.dataQueryMeta=null; state.pivotTable=null; state.pivotTileIndex=null; state.timeTable=null;
    return {manifest,chunks:chunkMetas};
  }catch(err){
    await cleanupDatasetDir(root,id);
    throw err;
  }
}

async function resolveChunkReadTarget(chunkIndex){
  let chunkDir, sourceManifest=state.manifest, datasetId=state.dataset?.id || state.manifest?.id || "active";
  let physicalChunkIndex=Number(chunkIndex);
  let catalogMeta=null;

  if (activeIsVirtual()){
    const vc=state.virtual.globalChunks[chunkIndex];
    if (!vc) throw new Error(`Virtual chunk is out of range: ${chunkIndex}`);
    const src=state.virtual.sources[vc.sourceIndex];
    sourceManifest=src.manifest;
    datasetId=src.id || src.manifest?.id || `source_${vc.sourceIndex}`;
    physicalChunkIndex=Number(vc.sourceChunkIndex);
    catalogMeta=vc;
    chunkDir=await src.dir.getDirectoryHandle(`chunk_${String(physicalChunkIndex).padStart(6,"0")}`);
  } else if (activeIsExternalStorage()){
    catalogMeta=state.externalDataset?.chunks?.[chunkIndex] || state.dataset?.chunks?.[chunkIndex] || null;
    datasetId=state.externalDataset?.id || state.dataset?.id || state.manifest?.id || "external";
    sourceManifest=state.externalDataset?.manifest || state.manifest;
    physicalChunkIndex=Number(chunkIndex);
  } else {
    catalogMeta=state.dataset?.chunks?.[chunkIndex] || null;
    chunkDir=await state.dir.getDirectoryHandle(`chunk_${String(chunkIndex).padStart(6,"0")}`);
  }

  let rowCount=Number(catalogMeta?.rowCount || 0);
  let meta=catalogMeta;
  if (!rowCount){
    if (activeIsExternalStorage()) meta=await externalReadJson(`${state.externalDataset.base}/chunk_${String(physicalChunkIndex).padStart(6,"0")}/meta.json`);
    else meta=await readJson(chunkDir,"meta.json");
    rowCount=Number(meta.rowCount || 0);
  }

  return {chunkDir, sourceManifest, datasetId, physicalChunkIndex, rowCount, meta, external:activeIsExternalStorage(), externalBase:state.externalDataset?.base || ""};
}

async function readCachedColumn(target, col){
  const key=chunkCacheKey(target.datasetId, target.physicalChunkIndex, col.index, col.type);
  const hit=chunkColumnCache.map.get(key);
  if (hit){
    chunkColumnCache.hits++;
    return touchChunkCacheEntry(key, hit);
  }

  chunkColumnCache.misses++;
  let value;
  const chunkPath=`${target.externalBase}/chunk_${String(target.physicalChunkIndex).padStart(6,"0")}`;
  if (col.type === "number"){
    const buf=target.external ? await externalReadBuffer(`${chunkPath}/${colFileName(col.index,col.type)}`) : await readBuffer(target.chunkDir,colFileName(col.index,col.type));
    value={type:"number", data:new Float64Array(buf)};
  } else {
    const buf=target.external ? await externalReadBuffer(`${chunkPath}/${colFileName(col.index,col.type)}`) : await readBuffer(target.chunkDir,colFileName(col.index,col.type));
    const dict=target.external ? await externalReadJson(`${chunkPath}/${dictFileName(col.index)}`) : await readJson(target.chunkDir,dictFileName(col.index));
    value={type:"string", ids:new Int32Array(buf), dict};
  }
  return putChunkCacheEntry(key, value, estimateColumnDataBytes(value));
}

async function readChunkColumns(chunkIndex, colIndices){
  if (activeIsMemory()){
    const memChunk=state.memory.chunks[chunkIndex];
    if (!memChunk) throw new Error(`In-memory chunk is out of range: ${chunkIndex}`);
    const result={rowCount:memChunk.rowCount, columns:new Map(), cache:chunkCacheSnapshot()};
    for (const idx of colIndices){
      const stored=memChunk.columns.get(Number(idx));
      if (stored) result.columns.set(Number(idx), stored);
    }
    return result;
  }

  const target=await resolveChunkReadTarget(chunkIndex);
  const result={rowCount:target.rowCount, columns:new Map(), cache:chunkCacheSnapshot()};
  const cols=(target.sourceManifest.columns || state.manifest.columns || []);
  const unique=[...new Set((Array.isArray(colIndices) ? colIndices : []).map(Number).filter(i=>Number.isFinite(i)))];

  for (const idx of unique){
    const col=cols[idx];
    if (!col) continue;
    result.columns.set(idx, await readCachedColumn(target, col));
  }
  result.cache=chunkCacheSnapshot();
  return result;
}

function valueFromColumn(colData, localRow){
  if (!colData) return "";
  if (colData.type === "number"){
    const v=colData.data[localRow];
    return Number.isNaN(v) ? "" : v;
  }
  const id=colData.ids[localRow];
  return id < 0 ? "" : (colData.dict[id] ?? "");
}

function rowAddress(globalRow){
  const target=Math.max(0, Number(globalRow || 0));
  if (activeIsMemory()){
    for (let i=0; i<state.memory.chunks.length; i++){
      const ch=state.memory.chunks[i];
      if (target >= ch.rowStart && target < ch.rowEnd) return {chunkIndex:i, localRow:target - ch.rowStart};
    }
    const last=state.memory.chunks[state.memory.chunks.length-1];
    return {chunkIndex:Math.max(0,state.memory.chunks.length-1), localRow:Math.max(0, Number(last?.rowCount || 1) - 1)};
  }
  if (activeIsVirtual()){
    for (let i=0; i<state.virtual.globalChunks.length; i++){
      const ch=state.virtual.globalChunks[i];
      if (target >= ch.rowStart && target < ch.rowEnd) return {chunkIndex:i, localRow:target - ch.rowStart};
    }
    const last=state.virtual.globalChunks[state.virtual.globalChunks.length-1];
    return {chunkIndex:Math.max(0,state.virtual.globalChunks.length-1), localRow:Math.max(0, Number(last?.rowCount || 1) - 1)};
  }
  const chunks=state.dataset?.chunks || [];
  let start=0;
  for (let i=0;i<chunks.length;i++){
    const rowCount=Number(chunks[i]?.rowCount || 0);
    const end=start + rowCount;
    if (target >= start && target < end) return {chunkIndex:i, localRow:target - start};
    start=end;
  }
  const last=chunks[chunks.length-1];
  return {chunkIndex:Math.max(0,chunks.length-1), localRow:Math.max(0, Number(last?.rowCount || 1) - 1)};
}

function normalizeCols(cols){
  if (!Array.isArray(cols) || cols.length===0) return state.manifest.columns.map(c=>c.index);
  return cols.map(Number).filter(i=>Number.isFinite(i) && i>=0 && i<state.manifest.columns.length);
}

async function readPage(page,pageSize,cols){
  const selected=normalizeCols(cols);
  const total=state.manifest.totalRows;
  let start=Math.max(0,(page-1)*pageSize);
  const rows=[];
  while(rows.length < pageSize && start + rows.length < total){
    const global=start + rows.length;
    const addr=rowAddress(global);
    const chunk=await readChunkColumns(addr.chunkIndex, selected);
    for (let r=addr.localRow; r<chunk.rowCount && rows.length<pageSize && start+rows.length<total; r++){
      rows.push(selected.map(i=>valueFromColumn(chunk.columns.get(i),r)));
    }
  }
  return {header:selected.map(i=>state.manifest.columns[i].name), rows, startRow:start};
}

async function readRowsByGlobal(rowIds, cols){
  const selected=normalizeCols(cols);
  const rows=[];
  let currentChunk=-1, chunk=null;
  for (const global of rowIds){
    const addr=rowAddress(global);
    if (addr.chunkIndex !== currentChunk){
      currentChunk=addr.chunkIndex;
      chunk=await readChunkColumns(currentChunk, selected);
    }
    rows.push(selected.map(i=>valueFromColumn(chunk.columns.get(i),addr.localRow)));
  }
  return {header:selected.map(i=>state.manifest.columns[i].name), rows};
}

function compareValue(v, op, target, type){
  const isNull = v === "" || v == null || (typeof v === "number" && Number.isNaN(v));
  if (op === "isnull") return isNull;
  if (op === "notnull") return !isNull;
  if (type === "number"){
    const n=Number(v), t=Number(target);
    if (!Number.isFinite(n) || !Number.isFinite(t)) return false;
    if (op==="eq") return n===t; if (op==="ne") return n!==t; if (op==="gt") return n>t; if (op==="ge") return n>=t; if (op==="lt") return n<t; if (op==="le") return n<=t;
    return String(n).includes(String(target));
  }
  const s=String(v ?? "").toLowerCase(), q=String(target ?? "").toLowerCase();
  if (op==="contains") return s.includes(q); if (op==="eq") return s===q; if (op==="ne") return s!==q;
  return false;
}

async function runSearch({columnIndex, op, value, maxMatches}){
  const idx=Number(columnIndex);
  const col=state.manifest.columns[idx];
  if (!col) throw new Error("Search column is not selected");
  const cap=normalizePlanLimit(maxMatches);
  const plan=buildQueryPlan({
    name:"search",
    predicates:[{columnIndex:idx, op, value, source:"search"}],
    projection:[idx],
    limit:cap,
    pushdown:true
  });

  const exec=await executeChunkExecutionPlanMaybeParallel(plan,{
    collectRows:true,
    limit:cap,
    progressLabel:"Searching chunks",
    progressEvery:5,
    progressText:(ctx)=>`Searching chunks... ${ctx.position+1}/${ctx.totalChunks} / skipped ${fmt(ctx.skippedChunks)} / matches ${fmt(ctx.refs.length)}`
  });

  state.searchMatches=exec.refs;
  return {
    matches:exec.refs.length,
    capped:exec.capped,
    scanned:exec.scanned,
    skippedChunks:exec.skippedChunks,
    queryPlan:exec.queryPlan,
    executionEngine:{version:exec.engineVersion,mode:exec.executionMode || "single-worker",workerPoolVersion:exec.workerPoolVersion || null,workers:exec.workerCount || 1,taskId:exec.taskId,chunks:exec.chunks.length},
    ms:exec.ms
  };
}

function normalizeGlobalFilters(filters){
  return (Array.isArray(filters) ? filters : [])
    .map(f => {
      const columnIndex=Number(f.columnIndex);
      const col=state.manifest.columns[columnIndex];
      return { columnIndex, op:normalizeQueryOp(f.op || "contains", col?.type), value:f.value ?? "", source:"globalFilter" };
    })
    .filter(f => Number.isFinite(f.columnIndex) && f.columnIndex >= 0 && state.manifest.columns[f.columnIndex]);
}

async function runDataQuery({filters, sort, maxRows}){
  const normalizedFilters = normalizeGlobalFilters(filters);
  const requestedLimit = normalizePlanLimit(maxRows);
  const plan=buildQueryPlan({
    name:"dataQuery",
    predicates:normalizedFilters,
    projection:[],
    sort,
    limit:requestedLimit,
    pushdown:true
  });
  const hasSort=!!plan.sort;
  if (!plan.predicates.length && !hasSort) {
    state.dataQueryMatches = null;
    state.dataQueryMeta = null;
    return {matches:state.manifest.totalRows, active:false, capped:false, ms:0, queryPlan:queryPlanSummary(plan)};
  }

  const scanLimit = hasSort ? Number.POSITIVE_INFINITY : requestedLimit;
  const exec=await executeChunkExecutionPlanMaybeParallel(plan,{
    collectRows:!hasSort,
    collectSort:hasSort,
    limit:scanLimit,
    progressLabel:"Global filter/sort chunks",
    progressEvery:5,
    progressText:(ctx)=>{
      const found = hasSort ? ctx.sortable.length : ctx.refs.length;
      return `Global filter/sort chunks... ${ctx.position+1}/${ctx.totalChunks} / skipped ${fmt(ctx.skippedChunks)} / matches ${fmt(found)}`;
    }
  });

  let capped = exec.capped;
  if (hasSort) {
    const sorted = sortPlanRows(exec.sortable, plan.sort);
    capped = Number.isFinite(requestedLimit) && sorted.length > requestedLimit;
    state.dataQueryMatches = Number.isFinite(requestedLimit) ? sorted.slice(0, requestedLimit).map(x=>x.rowId) : sorted.map(x=>x.rowId);
  } else {
    state.dataQueryMatches = exec.refs;
  }

  state.dataQueryMeta = {
    filters:normalizedFilters,
    sort:plan.sort ? {columnIndex:plan.sort.columnIndex,direction:plan.sort.direction} : null,
    capped,
    queryPlan:exec.queryPlan,
    executionEngine:{version:exec.engineVersion,mode:exec.executionMode || "single-worker",workerPoolVersion:exec.workerPoolVersion || null,workers:exec.workerCount || 1,taskId:exec.taskId,chunks:exec.chunks.length}
  };
  return {
    matches:state.dataQueryMatches.length,
    active:true,
    capped,
    scanned:exec.scanned,
    skippedChunks:exec.skippedChunks,
    queryPlan:exec.queryPlan,
    executionEngine:{version:exec.engineVersion,mode:exec.executionMode || "single-worker",workerPoolVersion:exec.workerPoolVersion || null,workers:exec.workerCount || 1,taskId:exec.taskId,chunks:exec.chunks.length},
    ms:exec.ms
  };
}

async function readDataQueryPage(page,pageSize,cols){
  if (!Array.isArray(state.dataQueryMatches)) throw new Error("Global data query is not active");
  const total = state.dataQueryMatches.length;
  const start = Math.max(0,(page-1)*pageSize);
  const ids = state.dataQueryMatches.slice(start, start + pageSize);
  const result = await readRowsByGlobal(ids, cols);
  return {...result, startRow:start, totalMatches:total};
}

function makeAgg(){ return {count:0,n:0,sum:0,min:null,max:null}; }
function addAgg(a, v, countMode){
  a.count++;
  if (countMode) return;
  const n=Number(v);
  if (Number.isFinite(n)){ a.n++; a.sum+=n; a.min=a.min==null?n:Math.min(a.min,n); a.max=a.max==null?n:Math.max(a.max,n); }
}
function aggValue(a,mode){
  if (!a) return "";
  if (mode==="Count") return a.count;
  if (mode==="Sum") return a.n ? Math.round(a.sum*1e6)/1e6 : "";
  if (mode==="Average") return a.n ? Math.round((a.sum/a.n)*1e6)/1e6 : "";
  if (mode==="Min") return a.n ? a.min : "";
  if (mode==="Max") return a.n ? a.max : "";
  return a.count;
}
function keyCellValue(v){
  return v === "" || v == null || (typeof v === "number" && Number.isNaN(v))
    ? "(blank)"
    : String(v);
}
function keyOf(parts){
  return parts.length ? JSON.stringify(parts.map(keyCellValue)) : JSON.stringify(["(All)"]);
}
function splitKey(k){
  try {
    const arr = JSON.parse(k);
    return Array.isArray(arr) ? arr.map(v => String(v)) : [String(arr)];
  } catch {
    return String(k).split("\u001f");
  }
}

const PIVOT_TILE_ROWS = 64;
const PIVOT_TILE_COLS = 32;

function pivotColumnLabel(key, colIdx){
  return colIdx.length ? splitKey(key).join(" / ") : "Value";
}

function pivotRowLabelParts(key){
  return splitKey(key);
}

async function buildPivot({rowFields,columnFields,valueField,aggregation,maxRows,maxCols}){
  const rowIdx=(rowFields||[]).map(Number).filter(i => state.manifest?.columns?.[i]);
  const colIdx=(columnFields||[]).map(Number).filter(i => state.manifest?.columns?.[i]);
  const valIdx=Number(valueField);
  const countMode = !Number.isFinite(valIdx) || valIdx < 0 || !state.manifest?.columns?.[valIdx];
  const mode=countMode?"Count":aggregation;
  const rowLimit=Math.max(1, Number(maxRows || 1000000));
  const colLimit=Math.max(1, Number(maxCols || 10000));
  const required=[...new Set([...rowIdx,...colIdx,...(countMode?[]:[valIdx])])];
  const plan=buildQueryPlan({
    name:"pivotTile",
    projection:required,
    pushdown:true
  });
  plan.aggregate={
    type:"pivot",
    rowIdx,
    colIdx,
    valIdx:countMode ? -1 : valIdx,
    countMode,
    mode,
    rowLimit,
    colLimit
  };

  state.pivotTable=null;
  state.pivotTileIndex=null;

  const exec=await executeChunkExecutionPlanMaybeParallel(plan,{
    collectPartials:true,
    progressLabel:"Pivot distributed reduce",
    progressEvery:1,
    progressText:(ctx)=>`Pivot distributed reduce... ${ctx.position+1}/${ctx.totalChunks} / rows ${fmt(ctx.scanned)} / partials ${fmt(ctx.partials.length)}`
  });

  const reduced=mergePivotAggregatePartials(exec.partials,{rowLimit,colLimit});
  const rowHeaderNames = rowIdx.length ? rowIdx.map(i=>state.manifest.columns[i].name) : ["Rows"];
  const colHeaderNames = colIdx.length ? colIdx.map(i=>state.manifest.columns[i].name) : ["Columns"];

  state.pivotTileIndex={
    rowKeys:reduced.rowKeys,
    colKeys:reduced.colKeys,
    cells:reduced.cells,
    rowTotals:reduced.rowTotals,
    colTotals:reduced.colTotals,
    grand:reduced.grand,
    mode,
    countMode,
    rowIdx,
    colIdx,
    valueField:countMode ? -1 : valIdx,
    rowHeaderNames,
    colHeaderNames,
    tileRows:PIVOT_TILE_ROWS,
    tileCols:PIVOT_TILE_COLS,
    scanned:exec.scanned,
    limitHit:reduced.limitHit || exec.capped,
    queryPlan:exec.queryPlan,
    ms:exec.ms,
    executionEngine:{
      version:exec.engineVersion,
      mode:exec.executionMode || "single-worker",
      workerPoolVersion:exec.workerPoolVersion || null,
      workers:exec.workerCount || 1,
      distributedAggregateReduceVersion:CHUNK_DISTRIBUTED_AGG_VERSION,
      taskId:exec.taskId,
      chunks:exec.chunks.length
    },
    builtAt:new Date().toISOString()
  };

  return pivotTileMeta();
}

function pivotTileMeta(){
  const p=state.pivotTileIndex;
  if (!p) throw new Error("Pivot tile index is empty");
  return {
    totalRows:p.rowKeys.length + 1,
    totalDataRows:p.rowKeys.length,
    totalCols:p.colKeys.length + 1,
    totalDataCols:p.colKeys.length,
    tileRows:p.tileRows,
    tileCols:p.tileCols,
    rowHeaderNames:p.rowHeaderNames,
    colHeaderNames:p.colHeaderNames,
    mode:p.mode,
    scanned:p.scanned,
    limitHit:p.limitHit,
    queryPlan:p.queryPlan,
    executionEngine:p.executionEngine || null,
    ms:p.ms,
    builtAt:p.builtAt
  };
}

function pivotCellValue(rowIndex, colIndex){
  const p=state.pivotTileIndex;
  if (!p) return "";
  const isGrandRow = rowIndex >= p.rowKeys.length;
  const isGrandCol = colIndex >= p.colKeys.length;
  if (isGrandRow && isGrandCol) return aggValue(p.grand, p.mode);
  if (isGrandRow){
    const ck=p.colKeys[colIndex];
    return aggValue(p.colTotals.get(ck), p.mode);
  }
  if (isGrandCol){
    const rk=p.rowKeys[rowIndex];
    return aggValue(p.rowTotals.get(rk), p.mode);
  }
  const rk=p.rowKeys[rowIndex];
  const ck=p.colKeys[colIndex];
  return aggValue((p.cells.get(rk)||new Map()).get(ck), p.mode);
}

function pivotRowLabel(rowIndex){
  const p=state.pivotTileIndex;
  if (!p) return [""];
  if (rowIndex >= p.rowKeys.length) return ["Grand Total"];
  return pivotRowLabelParts(p.rowKeys[rowIndex]);
}

function pivotColLabel(colIndex){
  const p=state.pivotTileIndex;
  if (!p) return [""];
  if (colIndex >= p.colKeys.length) return ["Grand Total"];
  return [pivotColumnLabel(p.colKeys[colIndex], p.colIdx)];
}

function readPivotViewport({rowStart=0,colStart=0,viewportRows=90,viewportCols=40,overscan=1}={}){
  const p=state.pivotTileIndex;
  if (!p) throw new Error("Pivot tile index is empty");
  const meta=pivotTileMeta();
  const totalRows=meta.totalRows, totalCols=meta.totalCols;
  const safeRows=Math.max(1, Math.min(240, Number(viewportRows || 90)));
  const safeCols=Math.max(1, Math.min(120, Number(viewportCols || 40)));
  const extra=Math.max(0, Math.min(3, Number(overscan || 0)));
  const rs=Math.max(0, Math.min(totalRows-1, Math.floor(Number(rowStart || 0))));
  const cs=Math.max(0, Math.min(totalCols-1, Math.floor(Number(colStart || 0))));
  const re=Math.min(totalRows, rs + safeRows);
  const ce=Math.min(totalCols, cs + safeCols);
  const tileY0=Math.max(0, Math.floor(rs/p.tileRows)-extra);
  const tileY1=Math.min(Math.floor((totalRows-1)/p.tileRows), Math.floor(Math.max(rs,re-1)/p.tileRows)+extra);
  const tileX0=Math.max(0, Math.floor(cs/p.tileCols)-extra);
  const tileX1=Math.min(Math.floor((totalCols-1)/p.tileCols), Math.floor(Math.max(cs,ce-1)/p.tileCols)+extra);
  const tiles=[];

  for (let ty=tileY0; ty<=tileY1; ty++){
    const row0=ty*p.tileRows;
    const row1=Math.min(totalRows,row0+p.tileRows);
    const rowLabels=[];
    for (let r=row0; r<row1; r++) rowLabels.push(pivotRowLabel(r));
    for (let tx=tileX0; tx<=tileX1; tx++){
      const col0=tx*p.tileCols;
      const col1=Math.min(totalCols,col0+p.tileCols);
      const colLabels=[];
      for (let c=col0; c<col1; c++) colLabels.push(pivotColLabel(c));
      const values=[];
      for (let r=row0; r<row1; r++){
        const row=[];
        for (let c=col0; c<col1; c++) row.push(pivotCellValue(r,c));
        values.push(row);
      }
      tiles.push({tileY:ty,tileX:tx,rowStart:row0,rowEnd:row1,colStart:col0,colEnd:col1,rowLabels,colLabels,values});
    }
  }

  return {...meta,rowStart:rs,rowEnd:re,colStart:cs,colEnd:ce,tileY0,tileY1,tileX0,tileX1,tiles,generatedAt:now()};
}

function exportPivotCsvFromTileIndex(){
  const p=state.pivotTileIndex;
  if (!p) throw new Error("Pivot tile index is empty");
  const header=[...p.rowHeaderNames, ...p.colKeys.map(k=>pivotColumnLabel(k,p.colIdx)), "Grand Total"];
  const lines=[header.map(csvEscape).join(",")];
  for (let r=0; r<p.rowKeys.length; r++){
    const row=[...pivotRowLabel(r)];
    while(row.length < p.rowHeaderNames.length) row.push("");
    for (let c=0; c<p.colKeys.length; c++) row.push(pivotCellValue(r,c));
    row.push(pivotCellValue(r,p.colKeys.length));
    lines.push(row.map(csvEscape).join(","));
  }
  const grand=["Grand Total"];
  while(grand.length < p.rowHeaderNames.length) grand.push("");
  for (let c=0; c<p.colKeys.length; c++) grand.push(pivotCellValue(p.rowKeys.length,c));
  grand.push(pivotCellValue(p.rowKeys.length,p.colKeys.length));
  lines.push(grand.map(csvEscape).join(","));
  return lines.join("\n");
}


function parseTimeBucket(value, bucket){
  if (value == null || value === "") return null;
  let s = String(value).trim();
  if (!s) return null;

  // Normalize common Japanese/date separators.
  s = s
    .replace(/[年月]/g, "-")
    .replace(/[日]/g, "")
    .replace(/\//g, "-")
    .replace("T", " ");

  let d = new Date(s);
  if (Number.isNaN(d.getTime())) {
    // YYYYMMDD or YYYYMMDDHHMMSS fallback.
    const m = s.match(/^(\d{4})(\d{2})(\d{2})(\d{2})?(\d{2})?(\d{2})?/);
    if (m) {
      d = new Date(
        Number(m[1]),
        Number(m[2]) - 1,
        Number(m[3]),
        Number(m[4] || 0),
        Number(m[5] || 0),
        Number(m[6] || 0)
      );
    }
  }
  if (Number.isNaN(d.getTime())) return null;

  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const da = String(d.getDate()).padStart(2, "0");
  const h = String(d.getHours()).padStart(2, "0");

  if (bucket === "year") return `${y}`;
  if (bucket === "month") return `${y}-${mo}`;
  if (bucket === "day") return `${y}-${mo}-${da}`;
  if (bucket === "hour") return `${y}-${mo}-${da} ${h}:00`;
  return `${y}-${mo}`;
}

async function buildTimeSeries({timeField, bucket, groupField, valueField, aggregation, maxBuckets}){
  const timeIdx = Number(timeField);
  const groupIdx = Number(groupField);
  const valIdx = Number(valueField);
  const hasGroup = Number.isFinite(groupIdx) && groupIdx >= 0 && !!state.manifest.columns[groupIdx];
  const countMode = !Number.isFinite(valIdx) || valIdx < 0 || !state.manifest.columns[valIdx];
  const mode = countMode ? "Count" : aggregation;
  const required = [...new Set([timeIdx, ...(hasGroup ? [groupIdx] : []), ...(countMode ? [] : [valIdx])])];

  if (!state.manifest.columns[timeIdx]) throw new Error("Time field is not selected");
  const bucketLimit = Math.max(1, Number(maxBuckets || 5000));
  const plan=buildQueryPlan({
    name:"timeSeries",
    predicates:[{columnIndex:timeIdx, op:"notnull", value:"", rowLevel:false, source:"timeField"}],
    projection:required,
    pushdown:true
  });
  plan.aggregate={
    type:"timeSeries",
    timeIdx,
    bucket:bucket || "month",
    groupIdx:hasGroup ? groupIdx : -1,
    valIdx:countMode ? -1 : valIdx,
    hasGroup,
    countMode,
    mode,
    bucketLimit
  };

  const exec=await executeChunkExecutionPlanMaybeParallel(plan,{
    collectPartials:true,
    progressLabel:"Time distributed reduce",
    progressEvery:1,
    progressText:(ctx)=>`Time distributed reduce... ${ctx.position+1}/${ctx.totalChunks} / skipped ${fmt(ctx.skippedChunks)} / rows ${fmt(ctx.scanned)} / partials ${fmt(ctx.partials.length)}`
  });

  const reduced=mergeTimeSeriesAggregatePartials(exec.partials,{bucketLimit});
  const header = hasGroup ? ["Time", "Group", mode] : ["Time", mode];
  const rows = [...reduced.states.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([key, agg])=>{
    let b = "", g = "";
    try { [b, g] = JSON.parse(key); } catch { [b, g] = String(key).split("\u001f"); }
    return hasGroup ? [b, g, aggValue(agg, mode)] : [b, aggValue(agg, mode)];
  });

  state.timeTable = {header, rows};
  return {
    header,
    rows,
    scanned:exec.scanned,
    invalidTime:reduced.invalidTime,
    limitHit:reduced.limitHit || exec.capped,
    skippedChunks:exec.skippedChunks,
    queryPlan:exec.queryPlan,
    executionEngine:{
      version:exec.engineVersion,
      mode:exec.executionMode || "single-worker",
      workerPoolVersion:exec.workerPoolVersion || null,
      workers:exec.workerCount || 1,
      distributedAggregateReduceVersion:CHUNK_DISTRIBUTED_AGG_VERSION,
      taskId:exec.taskId,
      chunks:exec.chunks.length
    },
    ms:exec.ms
  };
}


function csvEscape(v){
  if (v == null) return "";
  let s=String(v).replaceAll('"','""');
  return /[",\r\n]/.test(s) ? `"${s}"` : s;
}

self.onmessage=async(e)=>{
  const msg=e.data||{};
  try{
    if (msg.type==="EXECUTE_CHUNK_BATCH"){
      state.cancelled=false;
      await hydrateChunkExecutionContext(msg.context);
      const result=await executeChunkExecutionPlan(msg.plan,{...(msg.options || {}),progress:false,parallel:false});
      post("CHUNK_BATCH_DONE",{requestId:msg.requestId,batchIndex:msg.batchIndex,result});
      return;
    }

    if (msg.type==="REMOTE_EXECUTION_CONFIG"){
      post("REMOTE_EXECUTION_STATUS", configureRemoteExecution(msg.config || msg));
      return;
    }

    if (msg.type==="REMOTE_EXECUTION_STATUS"){
      post("REMOTE_EXECUTION_STATUS", remoteExecutionStatus());
      return;
    }

    if (msg.type==="REMOTE_EXECUTION_PING"){
      post("REMOTE_EXECUTION_STATUS", await probeRemoteExecution(msg.config || {}));
      return;
    }

    if (msg.type==="EXTERNAL_STORAGE_CONFIG"){
      post("EXTERNAL_STORAGE_STATUS", configureExternalStorage(msg.config || msg));
      return;
    }

    if (msg.type==="EXTERNAL_STORAGE_TEST"){
      post("EXTERNAL_STORAGE_STATUS", await testExternalStorage(msg.config || {}));
      return;
    }

    if (msg.type==="EXTERNAL_STORAGE_LIST"){
      const datasets=await listExternalDatasets();
      post("EXTERNAL_STORAGE_LIST_DONE", {datasets, status:externalStorageStatus()});
      return;
    }

    if (msg.type==="EXTERNAL_STORAGE_SYNC"){
      state.cancelled=false;
      const result=await syncDatasetToExternal(msg.datasetId || state.dataset?.id || state.manifest?.id);
      const datasets=await listExternalDatasets().catch(()=>[]);
      post("EXTERNAL_STORAGE_SYNC_DONE", {...result,datasets});
      return;
    }

    if (msg.type==="EXTERNAL_STORAGE_OPEN"){
      state.cancelled=false;
      const opened=await openExternalDataset(msg.id || msg.datasetId);
      post("EXTERNAL_STORAGE_OPENED", opened);
      return;
    }

    if (msg.type==="CANCEL"){state.cancelled=true; return;}

    if (msg.type==="ANALYZE"){
      state.cancelled=false;
      postProgress(0,"Analyzing schema...");
      const rules=makeRules(msg);
      const schema=await analyzeSchema({file:msg.file,encoding:msg.encoding,delimiter:msg.delimiter,sampleRows:Number(msg.sampleRows||20000),rules});
      post("SCHEMA_DONE",{schema});
      postProgress(100,"Analyze complete");
      return;
    }

    if (msg.type==="VALIDATE_MERGE"){
      state.cancelled=false;
      postProgress(0,"Validating CSV merge layout...");
      const rules=makeRules(msg);
      const result=await analyzeFilesForMerge({files:msg.files,encoding:msg.encoding,delimiter:msg.delimiter,sampleRows:Number(msg.sampleRows||20000),rules});
      post("MERGE_SCHEMA_DONE",result);
      postProgress(100,"Merge validation complete");
      return;
    }

    if (msg.type==="PREVIEW_CLEAN"){
      state.cancelled=false;
      const rules=makeRules(msg);
      const previewLimit=Number(msg.pageSize||200);
      postProgress(1, `Preparing preview: ${msg.file.name}`);
      let schema=state.schema;
      const cacheKey=schemaCacheKey(msg.file, msg.encoding, msg.delimiter, rules);
      if (msg.forceAnalyze || !schema || state.schemaFileKey !== cacheKey) {
        const sampleForPreview = Math.max(200, Math.min(Number(msg.sampleRows||1000), Math.max(1000, previewLimit)));
        schema=await analyzeSchema({file:msg.file,encoding:msg.encoding,delimiter:msg.delimiter,sampleRows:sampleForPreview,rules});
      }
      postProgress(65, `Reading preview rows: 0/${fmt(previewLimit)}`);
      const iter=fileLines(msg.file,msg.encoding,0,`Reading preview ${msg.file.name}`,65,25);
      await iter.next();
      const rows=[]; let source=0, changed=0, malformed=0;
      for await (const line of iter){
        if (rows.length >= previewLimit) break;
        source++;
        let cells=parseCSVLine(line,msg.delimiter);
        if (cells.length !== schema.columns.length) malformed++;
        while(cells.length<schema.columns.length) cells.push("");
        if (cells.length>schema.columns.length) cells=cells.slice(0,schema.columns.length);
        const row=[];
        for (const col of schema.columns){
          const c=cleanCell(cells[col.index],rules); if(c.changed) changed++;
          if (col.type==="number"){
            const n=numberCandidate(c.value,rules);
            row.push(c.value==null ? "" : (n.ok ? n.value : ""));
          } else row.push(c.value ?? "");
        }
        rows.push(row);
        if (rows.length % 25 === 0) postProgress(90, `Cleaning preview rows... ${fmt(rows.length)}/${fmt(previewLimit)}`);
      }
      postProgress(100, `Preview complete: ${fmt(rows.length)} rows`);
      post("CLEAN_PREVIEW",{header:schema.columns.map(c=>c.name),rows,report:{previewRows:rows.length,sourceRowsRead:source,changedCells:changed,malformedRows:malformed,fileSize:msg.file.size}});
      return;
    }

    if (msg.type==="BUILD_COLUMNAR"){
      state.cancelled=false;
      postProgress(0,"Building columnar cache...");
      const result=await buildColumnarCache(msg);
      post("COLUMNAR_DONE",result);
      postProgress(100,"Columnar cache complete");
      return;
    }

    if (msg.type==="OPFS_LIST"){ post("OPFS_LIST_DONE",{datasets:await listDatasets()}); return; }
    if (msg.type==="OPFS_ESTIMATE"){ post("OPFS_ESTIMATE_DONE", navigator.storage?.estimate ? await navigator.storage.estimate() : {usage:null,quota:null}); return; }
    if (msg.type==="OPFS_LOAD"){
      state.cancelled=false;
      const result=await openDataset(msg.id);
      post("OPFS_LOADED",result);
      return;
    }
    if (msg.type==="OPFS_OPEN_VIRTUAL"){
      state.cancelled=false;
      post("PROGRESS",{value:1,text:"Opening Storage-backed Virtual Dataset..."});
      const result=await openVirtualDataset(msg.ids, msg.name);
      post("OPFS_VIRTUAL_LOADED",result);
      post("PROGRESS",{value:100,text:"Virtual Dataset ready"});
      return;
    }
    if (msg.type==="OPFS_OPEN_MEMORY"){
      state.cancelled=false;
      post("PROGRESS",{value:1,text:"Loading selected Storage Tables into In-memory Dataset..."});
      const result=await openMemoryDataset(msg.ids, msg.name, {maxMemoryMB:msg.maxMemoryMB, maxRows:msg.maxRows});
      post("OPFS_MEMORY_LOADED",result);
      post("PROGRESS",{value:100,text:"In-memory Dataset ready"});
      return;
    }
    if (msg.type==="OPFS_DELETE"){
      await deleteDataset(msg.id);
      post("OPFS_DELETED",{datasets:await listDatasets()});
      return;
    }

    if (msg.type==="MERGE_OPFS_DATASETS"){
      state.cancelled=false;
      post("PROGRESS",{value:0,text:"Merging saved OPFS datasets..."});
      const result=await mergeSavedDatasets(msg.ids, msg.datasetName, {storageWorkspace:msg.storageWorkspace, storageCollection:msg.storageCollection, tableName:msg.tableName});
      post("OPFS_MERGED",result);
      post("PROGRESS",{value:100,text:"Saved dataset merge complete"});
      return;
    }

    if (msg.type==="PURGE_SELECTED"){
      await deleteDataset(msg.id);
      if (state.manifest && state.manifest.id === msg.id) forgetSession();
      post("PURGE_DONE",{scope:"selected",datasets:await listDatasets()});
      return;
    }

    if (msg.type==="PURGE_ALL"){
      const count = await purgeAllDatasets();
      post("PURGE_DONE",{scope:"all",count,datasets:await listDatasets()});
      return;
    }

    if (msg.type==="FORGET_SESSION"){
      forgetSession();
      post("SESSION_FORGOTTEN",{datasets:await listDatasets()});
      return;
    }

    if (msg.type==="READ_PAGE"){
      state.cancelled=false;
      const t0=now();
      const result=await readPage(Number(msg.page||1),Number(msg.pageSize||500),msg.columns||[]);
      post("PAGE_RESULT",{...result,page:Number(msg.page||1),ms:now()-t0});
      return;
    }

    if (msg.type==="RUN_DATA_QUERY"){
      state.cancelled=false;
      post("PROGRESS",{value:0,text:"Building global filter/sort row index..."});
      const result=await runDataQuery(msg);
      post("DATA_QUERY_DONE",result);
      post("PROGRESS",{value:100,text:result.active ? "Global data query complete" : "Global data query cleared"});
      return;
    }

    if (msg.type==="READ_DATA_QUERY_PAGE"){
      state.cancelled=false;
      const t0=now();
      const result=await readDataQueryPage(Number(msg.page||1),Number(msg.pageSize||500),msg.columns||[]);
      post("DATA_QUERY_PAGE_RESULT",{...result,page:Number(msg.page||1),ms:now()-t0});
      return;
    }

    if (msg.type==="CLEAR_DATA_QUERY"){
      state.dataQueryMatches=null;
      state.dataQueryMeta=null;
      post("DATA_QUERY_CLEARED",{});
      return;
    }

    if (msg.type==="RUN_SEARCH"){
      state.cancelled=false;
      post("PROGRESS",{value:0,text:"Searching columnar cache..."});
      const result=await runSearch(msg);
      post("SEARCH_DONE",result);
      post("PROGRESS",{value:100,text:"Search complete"});
      return;
    }

    if (msg.type==="READ_SEARCH_PAGE"){
      state.cancelled=false;
      const page=Number(msg.page||1), pageSize=Number(msg.pageSize||500);
      const ids=state.searchMatches.slice((page-1)*pageSize,(page-1)*pageSize+pageSize);
      const t0=now();
      const result=await readRowsByGlobal(ids,msg.columns||[]);
      post("SEARCH_PAGE_RESULT",{...result,page,pageSize,totalMatches:state.searchMatches.length,ms:now()-t0});
      return;
    }

    if (msg.type==="BUILD_PIVOT"){
      state.cancelled=false;
      post("PROGRESS",{value:0,text:"Building pivot tile index..."});
      const result=await buildPivot(msg);
      post("PIVOT_TILE_READY",result);
      post("PIVOT_VIEWPORT_DONE",readPivotViewport({rowStart:0,colStart:0,viewportRows:90,viewportCols:40,overscan:1}));
      post("PROGRESS",{value:100,text:"Pivot tile index complete"});
      return;
    }

    if (msg.type==="READ_PIVOT_VIEWPORT"){
      post("PIVOT_VIEWPORT_DONE",readPivotViewport(msg));
      return;
    }

    if (msg.type==="BUILD_TIME"){
      state.cancelled=false;
      post("PROGRESS",{value:0,text:"Building time-oriented view..."});
      const result=await buildTimeSeries(msg);
      post("TIME_DONE",result);
      post("PROGRESS",{value:100,text:"Time view complete"});
      return;
    }

    if (msg.type==="EXPORT_TIME"){
      if (!state.timeTable) throw new Error("Time view table is empty");
      const lines=[state.timeTable.header.map(csvEscape).join(",")];
      for (const r of state.timeTable.rows) lines.push(r.map(csvEscape).join(","));
      post("TIME_CSV",{csv:lines.join("\n")});
      return;
    }

    if (msg.type==="EXPORT_PIVOT"){
      const csv=exportPivotCsvFromTileIndex();
      post("PIVOT_CSV",{csv});
      return;
    }

  }catch(err){
    post("ERROR",{message:err?.message || String(err)});
    postProgress(0,"Error");
  }
};

function fmt(n) {

function humanBytes(n) {
  const value = Number(n || 0);
  if (!value) return "0 B";
  const units = ["B", "KB", "MB", "GB", "TB"];
  let size = value;
  let unit = 0;
  while (size >= 1024 && unit < units.length - 1) { size /= 1024; unit++; }
  return `${unit === 0 ? size : size.toFixed(size >= 100 ? 0 : size >= 10 ? 1 : 2)} ${units[unit]}`;
}

function ms(n) {
  return `${Math.round(Number(n || 0)).toLocaleString()} ms`;
}

function exportTimestamp(date = new Date()) {
  const pad = (n) => String(n).padStart(2, "0");
  return [
    date.getFullYear(),
    pad(date.getMonth() + 1),
    pad(date.getDate()),
    "_",
    pad(date.getHours()),
    pad(date.getMinutes()),
    pad(date.getSeconds()),
  ].join("");
}

function withExportTimestamp(filename, date = new Date()) {
  const safe = String(filename || "export.csv").trim() || "export.csv";
  const dot = safe.lastIndexOf(".");
  const stamp = exportTimestamp(date);
  if (dot > 0 && dot < safe.length - 1) {
    return `${safe.slice(0, dot)}_${stamp}${safe.slice(dot)}`;
  }
  return `${safe}_${stamp}`;
}

function downloadText(filename, text, type = "text/csv;charset=utf-8") {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = withExportTimestamp(filename);
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
