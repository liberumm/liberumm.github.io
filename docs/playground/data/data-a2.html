                  {externalProvider === "s3-compatible" && <TextField label="Bucket" size="small" value={s3Bucket} onChange={(e) => setS3Bucket(e.target.value)} sx={{ minWidth: 180 }} />}
                  {externalProvider === "s3-compatible" && <TextField label="Region" size="small" value={s3Region} onChange={(e) => setS3Region(e.target.value)} sx={{ width: 120 }} />}
                </Stack>
                {externalProvider === "custom-http" && <TextField label="API key / token（保存しない）" type="password" size="small" fullWidth value={externalApiKey} onChange={(e) => setExternalApiKey(e.target.value)} sx={{ mt: 0.75 }} />}
                {externalProvider === "s3-compatible" && (
                  <Stack spacing={0.75} sx={{ mt: 0.75 }}>
                    <TextField label="Access Key ID（保存しない）" type="password" size="small" fullWidth value={s3AccessKeyId} onChange={(e) => setS3AccessKeyId(e.target.value)} />
                    <TextField label="Secret Access Key（保存しない）" type="password" size="small" fullWidth value={s3SecretAccessKey} onChange={(e) => setS3SecretAccessKey(e.target.value)} />
                    <TextField label="Session Token optional（保存しない）" type="password" size="small" fullWidth value={s3SessionToken} onChange={(e) => setS3SessionToken(e.target.value)} />
                    <Alert severity="warning">S3/R2のCORSで GET / PUT、Authorization、x-amz-date、x-amz-content-sha256、x-amz-security-token、content-type を許可してください。キーは最小権限の専用キーを使ってください。</Alert>
                  </Stack>
                )}
                <Stack direction="row" spacing={0.75} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
                  <Button variant="contained" onClick={connectExternalStorage}>Connect/Test</Button>
                  <Button variant="outlined" onClick={refreshExternalDatasets}>List Remote</Button>
                  <Button variant="outlined" color="success" onClick={syncActiveDatasetToExternal}>Sync Active OPFS Dataset</Button>
                </Stack>
                <TextField select label="Remote Dataset" size="small" fullWidth value={externalSelectedDataset} onChange={(e) => setExternalSelectedDataset(e.target.value)} sx={{ mt: 0.75 }}>
                  {externalDatasets.map((d) => <MenuItem key={d.id} value={d.id}>{d.workspace || "External"} / {d.collection || "General"} / {d.tableName || d.name || d.id} / {fmt(d.rows)} rows</MenuItem>)}
                </TextField>
                <Stack direction="row" spacing={0.75} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
                  <Button variant="contained" color="secondary" onClick={openExternalDatasetFromSelection}>Open Remote Dataset</Button>
                </Stack>
                <Alert severity="success" sx={{ mt: 0.75 }}>{externalStatus}</Alert>
                <Divider sx={{ my: 2 }} />
                <Alert severity="warning">
                  OPFS内の列指向キャッシュを論理削除します。ブラウザ・OS・SSD都合の物理上書き消去は保証できません。
                </Alert>
                <TextField label="Confirm text" placeholder="DELETE" size="small" fullWidth value={purgeConfirm} onChange={(e) => setPurgeConfirm(e.target.value)} sx={{ mt: 0.75 }} />
                <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap" sx={{ mt: 0.75 }}>
                  <Button color="error" variant="outlined" onClick={() => guardedPurge("session")}>Forget Current Session</Button>
                  <Button color="error" variant="outlined" onClick={() => guardedPurge("selected")}>Purge Selected</Button>
                  <Button color="error" variant="contained" onClick={() => guardedPurge("all")}>Purge ALL</Button>
                </Stack>
                <Typography variant="body2" color="text.secondary" sx={{ mt: 0.75 }}>{opfsStatus}</Typography>
              </Section>
              )}
              right={(
              <Section title="Storage Tables" hint="左のツリーでスコープを絞り、ここでTableを一覧比較します。横幅が足りない場合はテーブル内だけ横スクロールします。">
                <Typography variant="subtitle2" sx={{ fontWeight: 900, mb: 1 }}>Workspace / Collection summary</Typography>
                <DataTable table={storageHierarchyTable} tableId="storageHierarchy" height={220} minColumnWidth={170} />
                <Typography variant="subtitle2" sx={{ fontWeight: 900, mt: 2, mb: 1 }}>Tables in selected scope</Typography>
                <DataTable table={datasetTable} tableId="storageTables" height={300} minColumnWidth={170} />
                <Typography variant="subtitle2" sx={{ fontWeight: 900, mt: 2, mb: 1 }}>External Storage datasets</Typography>
                <DataTable table={externalDatasetTable} tableId="externalStorageTables" height={260} minColumnWidth={170} />
                <Typography variant="caption" color="text.secondary">{opfsTime}</Typography>
              </Section>
              )}
            />
          )}

          {tab === "schema" && (
            <Box sx={{ display: "grid", gridTemplateColumns: { xs: "minmax(0, 1fr)", md: "340px minmax(0, 1fr)" }, gap: 0.5, minWidth: 0, maxWidth: "100%" }}>
              <Section title="Manifest" icon={<Schema />}>
                <KeyValue rows={manifestRows} />
              </Section>
              <Section title="Columns">
                <DataTable table={schemaTable} tableId="schema" height={520} />
              </Section>
            </Box>
          )}

          {tab === "log" && (
            <Section title="Log" icon={<Article />}>
              <Box component="pre" sx={{ height: 560, overflow: "auto", m: 0, p: 2, bgcolor: "#0b1020", color: "#d1d5db", borderRadius: 1.5, fontFamily: "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace", fontSize: 12, lineHeight: 1.6 }}>
                {logs.join("\n")}
              </Box>
            </Section>
          )}
                </>
              )}
            />
          )}


          {mainPanel === "settings" && (
            <Box sx={{ display: "grid", gridTemplateColumns: { xs: "1fr", md: "minmax(0, 1fr) minmax(0, 1fr)" }, gap: 0.75 }}>
              <Section title="UI Settings" icon={<Schema />} hint="見やすさと作業密度を調整します。設定はlocalStorageに保存されます。">
                <FormControlLabel
                  control={<Switch checked={tableDensity === "normal"} onChange={(event) => setTableDensity(event.target.checked ? "normal" : "dense")} />}
                  label={tableDensity === "dense" ? "Dense table" : "Normal table"}
                />
                <FormControlLabel
                  control={<Switch checked={themeMode === "dark"} onChange={(event) => setThemeMode(event.target.checked ? "dark" : "light")} />}
                  label={themeMode === "dark" ? "Dark theme" : "Light theme"}
                />
                <Stack direction="row" spacing={0.75} useFlexGap flexWrap="wrap" sx={{ mt: 1 }}>
                  <SmallNumberField label="Preview rows" value={previewRows} onChange={setPreviewRows} min="1" step="100" />
                  <SmallNumberField label="Page size" value={pageSize} onChange={setPageSize} min="10" step="10" />
                </Stack>
                <Button size="small" variant="outlined" sx={{ mt: 1 }} onClick={() => { localStorage.removeItem(SETTINGS_KEY); setStatus("保存済みUI設定を削除しました。再読み込み後に初期値へ戻ります。"); }}>Reset UI settings</Button>
              </Section>
              <Section title="CSV / Performance Defaults" icon={<Storage />} hint="大容量CSVではChunk rowsを小さめにするとメモリ負荷を抑えられます。">
                <Stack direction="row" spacing={0.75} useFlexGap flexWrap="wrap">
                  <TextField select label="Default Encoding" size="small" value={encoding} onChange={(e) => setEncoding(e.target.value)} sx={{ width: 170 }}>
                    <MenuItem value="utf-8">UTF-8</MenuItem>
                    <MenuItem value="shift_jis">Shift-JIS / CP932</MenuItem>
                  </TextField>
                  <TextField label="Delimiter" size="small" value={delimiter} onChange={(e) => setDelimiter(e.target.value.slice(0, 1) || ",")} sx={{ width: 92 }} />
                  <SmallNumberField label="Chunk rows" value={chunkSize} onChange={setChunkSize} min="1000" step="1000" />
                  <SmallNumberField label="Sample rows" value={sampleRows} onChange={setSampleRows} min="100" step="100" />
                  <SmallNumberField label="Memory max MB" value={memoryMaxMB} onChange={setMemoryMaxMB} min="64" step="64" />
                  <SmallNumberField label="Memory max rows" value={memoryMaxRows} onChange={setMemoryMaxRows} min="0" step="10000" />
                </Stack>
                <Alert severity="info" sx={{ mt: 1 }}>
                  Storage上のTableはIn-memory化しなくても扱えます。標準はStorage-backed lazy readです。In-memoryは必要なTableだけを明示的にメモリへ載せる高速化オプションで、上限MB/行数で制御します。
                </Alert>
              </Section>
              <Section title="Memory Policy" icon={<Article />} hint="要件として固定する運用ルールです。">
                <KeyValue rows={[
                  ["In-memory OK", "現在ページ / プレビュー / RowRef / 集計結果 / 必要チャンク / 明示ロードしたMemory Dataset"],
                  ["In-memory NG", "自動で全Workspace全Table / 全列全行 / 未使用辞書 / 未使用チャンクを読むこと"],
                  ["Memory Accelerator", "選択TableだけWorkerメモリへ明示ロードして高速化。上限MB/行数を超えたら停止"],
                  ["Storage-backed View", "標準の横断方式。物理コピーせず、必要列・必要チャンクだけ読む"],
                  ["Phase 1", "同一スキーマTableのみ横断可能"],
                ]} />
              </Section>
              <Section title="Danger Zone" icon={<Delete />} hint="Storageの削除はData ManagementのStorage Navigatorから行います。">
                <Alert severity="warning">現在セッション破棄やStorage削除はDataタブのStorage Navigatorで実行してください。</Alert>
              </Section>
            </Box>
          )}
        </Container>
      </Box>
      </UiSettingsContext.Provider>
    </ThemeProvider>
  );
}

const root = createRoot(document.getElementById("root"));
root.render(
  <React.StrictMode>
    <App />
  </React.StrictMode>
);

  
  
  
  </script>

  <!-- React 19 / MUI 7.3.5 / Icons via CDN ESM -->
  <script type="module">
    import React from "https://esm.sh/react@19.2.0";
    import { createRoot } from "https://esm.sh/react-dom@19.2.0/client";
    import * as MaterialUI from "https://esm.sh/@mui/material@7.3.5?deps=react@19.2.0,react-dom@19.2.0";
    import UploadFile from "https://esm.sh/@mui/icons-material@7.3.5/UploadFile?deps=react@19.2.0,react-dom@19.2.0";
    import CloudUpload from "https://esm.sh/@mui/icons-material@7.3.5/CloudUpload?deps=react@19.2.0,react-dom@19.2.0";
    import FolderOpen from "https://esm.sh/@mui/icons-material@7.3.5/FolderOpen?deps=react@19.2.0,react-dom@19.2.0";
    import Analytics from "https://esm.sh/@mui/icons-material@7.3.5/Analytics?deps=react@19.2.0,react-dom@19.2.0";
    import Storage from "https://esm.sh/@mui/icons-material@7.3.5/Storage?deps=react@19.2.0,react-dom@19.2.0";
    import Search from "https://esm.sh/@mui/icons-material@7.3.5/Search?deps=react@19.2.0,react-dom@19.2.0";
    import TableChart from "https://esm.sh/@mui/icons-material@7.3.5/TableChart?deps=react@19.2.0,react-dom@19.2.0";
    import Timeline from "https://esm.sh/@mui/icons-material@7.3.5/Timeline?deps=react@19.2.0,react-dom@19.2.0";
    import Delete from "https://esm.sh/@mui/icons-material@7.3.5/Delete?deps=react@19.2.0,react-dom@19.2.0";
    import CleaningServices from "https://esm.sh/@mui/icons-material@7.3.5/CleaningServices?deps=react@19.2.0,react-dom@19.2.0";
    import Download from "https://esm.sh/@mui/icons-material@7.3.5/Download?deps=react@19.2.0,react-dom@19.2.0";
    import Send from "https://esm.sh/@mui/icons-material@7.3.5/Send?deps=react@19.2.0,react-dom@19.2.0";
    import Schema from "https://esm.sh/@mui/icons-material@7.3.5/Schema?deps=react@19.2.0,react-dom@19.2.0";
    import Article from "https://esm.sh/@mui/icons-material@7.3.5/Article?deps=react@19.2.0,react-dom@19.2.0";
    import * as ReactFlowLib from "https://esm.sh/@xyflow/react@12.8.4?deps=react@19.2.0,react-dom@19.2.0";
    import * as HtmlToImage from "https://esm.sh/html-to-image@1.11.11";

    const MaterialIcons = {
      UploadFile,
      CloudUpload,
      FolderOpen,
      Analytics,
      Storage,
      Search,
      TableChart,
      Timeline,
      Delete,
      CleaningServices,
      Download,
      Send,
      Schema,
      Article,
    };

    const appCode = document.getElementById("app-code").textContent;

    const missingIcons = Object.entries(MaterialIcons)
      .filter(([, component]) => !component)
      .map(([name]) => name);
    if (missingIcons.length) {
      throw new Error(`Missing MUI icon imports: ${missingIcons.join(", ")}`);
    }

    const { code } = window.Babel.transform(appCode, {
      presets: [["react", { runtime: "classic" }]],
      sourceType: "script",
    });

    const runApp = new Function(
      "React",
      "createRoot",
      "MaterialUI",
      "MaterialIcons",
      "ReactFlowLib",
      "HtmlToImage",
      code
    );

    runApp(React, createRoot, MaterialUI, MaterialIcons, ReactFlowLib, HtmlToImage);
  </script>
</body>
